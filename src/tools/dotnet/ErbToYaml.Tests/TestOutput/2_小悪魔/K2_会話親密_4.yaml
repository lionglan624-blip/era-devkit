- id: fallback
  content: >-
    「えっ……そ、そこは……」

    %CALLNAME:MASTER%が%CALLNAME:人物_小悪魔%の後ろに手を伸ばした。

    %CALLNAME:人物_小悪魔%は困惑した表情を浮かべている。

    「あの……こういうのは……その……」

    %CALLNAME:人物_小悪魔%は言葉を探しているようだった。

    「……嫌ってわけじゃないですけど……恥ずかしいですわ」

    もじもじと落ち着かない様子で、%CALLNAME:人物_小悪魔%は俯いた。

    「ひゃっ……！　ちょっと、いきなり……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の大胆な行動に声を上げた。

    しかし、その声には怒りよりも驚きが勝っている。

    「お尻なんて……そんな……」

    %CALLNAME:人物_小悪魔%の頬が徐々に赤く染まっていく。

    「……悪魔だからって、なんでもOKってわけじゃないですのよ……？」

    抗議するような口調だが、本気で怒っているわけではなさそうだ。

    「やっ……そこは……だめ、です……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_小悪魔%の禁域に触れている。

    %CALLNAME:人物_小悪魔%は身を強張らせたが、振り払おうとはしなかった。

    「こんなこと……されたの、初めてですわ……」

    %CALLNAME:人物_小悪魔%の翼が恥ずかしそうに小さく畳まれている。

    「%CALLNAME:MASTER%は……どうしてこんなことを……？」

    戸惑いながらも、どこか期待を滲ませた瞳で問いかけた。

    「あ……あの……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に後ろを触られ、どうしていいかわからない様子だ。

    「そこは……その……恥ずかしい場所なんですけど……」

    %CALLNAME:人物_小悪魔%は顔を赤くしながら、もごもごと訴えた。

    「……でも、%CALLNAME:MASTER%なら……少しだけ……」

    %CALLNAME:人物_小悪魔%はそっと目を閉じ、覚悟を決めたように身を委ねた。
