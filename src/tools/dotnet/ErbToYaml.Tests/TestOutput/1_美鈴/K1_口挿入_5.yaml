- id: fallback
  content: >-
    「……足で……本当にするんですか……」

    %CALLNAME:人物_美鈴%は呆れたような視線を向けた。

    「……まあ、命令なら仕方ないですけど……」

    渋々といった様子で、%CALLNAME:人物_美鈴%は一物に足を伸ばした。

    「……こうやって動かせばいいんでしょう……」

    事務的な足つきで、%CALLNAME:人物_美鈴%は上下に擦り始めた。

    「……早く終わらせてください……門番の仕事があるので……」

    「……はあ……またですか……」

    %CALLNAME:人物_美鈴%はため息をついた。

    「……仕方ないですね……」

    乗り気ではない様子で、%CALLNAME:人物_美鈴%は足を添えた。

    「……力加減、これでいいですか……」

    %CALLNAME:人物_美鈴%は淡々と足を動かしている。

    「……早めにお願いしますよ……」

    「……門番の仕事じゃないんですけどね、これ……」

    %CALLNAME:人物_美鈴%は不満げに呟いた。

    「……まあ、頼まれたからにはやりますけど……」

    %CALLNAME:人物_美鈴%は機械的に足を動かした。

    「……反応とか、よくわからないですけど……」

    %CALLNAME:人物_美鈴%は表情を変えずに足で擦り続けた。

    「……適当でいいなら、これで……」

    「……別に、断ってもいいんですよ……？」

    %CALLNAME:人物_美鈴%は冷めた視線を向けた。

    「……でも、お嬢様に怒られるのも面倒ですし……」

    諦めたように、%CALLNAME:人物_美鈴%は一物に足を押し当てた。

    「……こうですか……別に興味ないですけど……」

    %CALLNAME:人物_美鈴%は無感情に足を動かした。

    「……終わったら言ってください……」
