- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%の上に覆いかぶさった。

    「お客様のご要望ですから……このように致しますわ」

    瀟洒なメイドは、感情を完全に押し殺して%CALLNAME:MASTER%を抱いた。

    「……早く済ませますので」

    「私には、お嬢様のお世話という仕事がありますので」

    %CALLNAME:TARGET%の態度は事務的で、冷たさを帯びていた。

    「……ふぅ……」

    %CALLNAME:TARGET%は小さく息を吐きながら、淡々と%CALLNAME:MASTER%の上で腰を動かしていた。

    「上から見下ろしていると、貴方の考えが読めるような気がしますわね」

    「私に何を期待しているのか……無駄ですけれど」

    %CALLNAME:TARGET%は表情を変えることなく、機械的に動き続ける。

    「……感情移入などしませんわよ」

    完璧なメイドは、あくまでプロフェッショナルを貫いていた。

    「……これは仕事です」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「お客様の相手をするのも、メイドの務め……」

    %CALLNAME:TARGET%は淡々と%CALLNAME:MASTER%を抱き続けている。

    「……っ」

    一瞬、表情が揺らいだが、すぐに戻る。

    「……何でもありませんわ」

    冷静さを取り繕いながら、%CALLNAME:TARGET%は腰を動かし続けた。

    「……貴方に感情を見せる必要はありませんわ」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見下ろした。

    「私はメイド。貴方はお客様。それ以上でも以下でもありません」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を無視して腰を振る。

    「……ん……」

    僅かに声が漏れ、%CALLNAME:TARGET%は唇を噛んだ。

    「……早く終わらせますわ」

    瀟洒な従者は、最後まで感情を見せずに%CALLNAME:MASTER%を抱き続けた。
