    「ん……ぁ……後ろの穴、いいの……もっと……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に身を預けながら、甘い吐息を漏らしている。

    「……最強のあたいがアナルで喜んじゃうなんて……%CALLNAME:MASTER%のせいよ……」

    責めるような言い方だが、その声には幸せそうな響きがあった。

    「……ずっとこうしてて……あたい、%CALLNAME:MASTER%のそばにいたいの……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の胸に顔を埋めた。
