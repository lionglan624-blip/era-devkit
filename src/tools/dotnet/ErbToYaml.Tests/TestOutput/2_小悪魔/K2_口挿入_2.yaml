    「……んっ……はぁ……変な感じですわ……でも嫌じゃない……」

    %CALLNAME:人物_小悪魔%の尻尾がそわそわと揺れている。

    %CALLNAME:人物_小悪魔%は意を決したように、%CALLNAME:MASTER%の上に跨った。

    「んっ……は、はぅ……ん……」

