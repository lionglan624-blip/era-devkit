- id: fallback
  content: >-
    「うふふ、%CALLNAME:MASTER%……こっちに来て」

    %CALLNAME:人物_美鈴%は甘い声で%CALLNAME:MASTER%を手招きし、その胸に飛び込んできた。

    %CALLNAME:MASTER%は%CALLNAME:人物_美鈴%の髪を優しく撫でる。

    「……んー……%CALLNAME:MASTER%の手、あったかいわ……」

    %CALLNAME:人物_美鈴%は目を細めて、心底幸せそうに微笑んだ。

    妙に%CALLNAME:MASTER%の体を触る%CALLNAME:人物_美鈴%の手が、いやらしく感じる。

    恐らく、気のせいではないだろう。

    「ひゃっ……耳は、らめぇ……」

    %CALLNAME:MASTER%は%CALLNAME:人物_美鈴%の耳を甘く噛んだ。

    「んっ……ちょ、耳は……弱いの……」

    %CALLNAME:人物_美鈴%はとろんとした顔になって、熱い息を吐いている。

    「……%CALLNAME:MASTER%ったら、いじわる……でも、嫌いじゃないの……」

    %CALLNAME:人物_美鈴%は頬を紅く染めて、%CALLNAME:MASTER%にもたれかかった。

    「……ねえ、%CALLNAME:MASTER%」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の背中に腕を回し、ぎゅっと抱きついてきた。

    「こうしてると、門番の疲れも吹き飛ぶの」

    柔らかな体が密着し、甘い香りが漂ってくる。

    「……%CALLNAME:MASTER%の匂い、好きよ……落ち着くの……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の胸に顔を埋めて、幸せそうに息を吐いた。

    「んっ……」

    %CALLNAME:MASTER%は%CALLNAME:人物_美鈴%の髪に顔を埋めている。

    すぅ、と深く息を吸う。

    なんだかふわふわとした気分になる、甘い香りが漂ってきた。

    「……ちょっと、いつまで嗅いでるのよ……」

    %CALLNAME:人物_美鈴%は頬を紅く染めて、恥ずかしそうに言った。

    「……でも、嬉しいわ。もっとしてもいいのよ……？」
  priority: 4
- id: talent_3_1
  content: >-
    「――%CALLNAME:MASTER%」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の名前を呼んで、手を繋いできた。

    「―――――」

    %CALLNAME:人物_美鈴%に言葉はない。

    だが、心底幸せそうだった。

    繋いだ手に、そっと力が込められる。

    「あっ……%CALLNAME:MASTER%……」

    %CALLNAME:MASTER%は%CALLNAME:人物_美鈴%の手を取り、指を絡めた。

    「……え、えっと……その……」

    %CALLNAME:人物_美鈴%は顔を赤くしながら、繋いだ手を見つめている。

    「……嬉しい……な……」

    照れくさそうに俯きながらも、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の手を握り返してきた。

    「んっ……%CALLNAME:MASTER%、髪、触ってる……？」

    %CALLNAME:MASTER%は%CALLNAME:人物_美鈴%の長い髪を指で梳いている。

    「……えへへ、くすぐったいけど……気持ちいいわ……」

    %CALLNAME:人物_美鈴%は目を閉じて、その感触を楽しんでいる。

    「……もうちょっと、続けてくれる……？」

    甘えるような声で、%CALLNAME:人物_美鈴%はそう言った。

    「わっ……急に抱きつかないでよぉ……」

    %CALLNAME:MASTER%は後ろから%CALLNAME:人物_美鈴%を抱きしめた。

    「……でも……嫌じゃないから……」

    %CALLNAME:人物_美鈴%は小さく呟きながら、%CALLNAME:MASTER%の腕に自分の手を添えた。

    「……%CALLNAME:MASTER%の腕、あったかい……」

    %CALLNAME:人物_美鈴%は幸せそうに目を閉じて、その温もりを感じていた。
