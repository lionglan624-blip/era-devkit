entries:
- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%のおちんちん、あたしが気持ちよくするね？」

    %CALLNAME:TARGET%は嬉しそうに%CALLNAME:MASTER%の前にしゃがみ込んだ。

    小さな手で%CALLNAME:MASTER%のものを包み込み、上下に動かし始める。

    「ん、しょ……こう？　気持ちいい……？」

    %CALLNAME:TARGET%は一生懸命な顔で%CALLNAME:MASTER%を見上げている。

    「あたし、%CALLNAME:MASTER%のこと大好きだから……いっぱいしてあげるの」

    妖精の小さな手が、懸命に%CALLNAME:MASTER%を擦り上げていく……

    「今日もあたしにさせてくれるの？　やったぁ！」

    %CALLNAME:TARGET%は満面の笑みで%CALLNAME:MASTER%の一物を手に取った。

    「前より上手になったって、褒めてくれる……？」

    %CALLNAME:TARGET%はそう言いながら、慣れた手つきで扱き始めた。

    「んっ……熱い……%CALLNAME:MASTER%、気持ちいいんだ……」

    嬉しそうに%CALLNAME:TARGET%は手の動きを速めた。

    「えへへ、あたしの手でこんなになっちゃうんだね……」

    「%CALLNAME:MASTER%……あたし、もっと上手になりたいの」

    %CALLNAME:TARGET%は真剣な表情で%CALLNAME:MASTER%の前に跪いた。

    「だから……いっぱい練習させてね？」

    小さな手が%CALLNAME:MASTER%のものを握り、ゆっくりと動き出す。

    「ここ、触ると気持ちいいって……咲夜さんが言ってた……」

    %CALLNAME:TARGET%は裏筋を指でなぞりながら、期待に満ちた目で見上げた。

    「……ね、あたし、ちゃんとできてる……？」

    「あ……%CALLNAME:MASTER%、元気になってる……えへへ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の股間を見つめて、嬉しそうに微笑んだ。

    「あたしがいると、こうなっちゃうの？　……嬉しいな」

    %CALLNAME:TARGET%は愛おしそうに%CALLNAME:MASTER%のものを両手で包み込んだ。

    「ふふっ……ぴくって動いた……かわいい」

    %CALLNAME:TARGET%はくすくす笑いながら、優しく扱いている。

    「%CALLNAME:MASTER%……大好き。ずっとあたしのそばにいてね……」
  priority: 4
- id: talent_3_1
  content: >-
    「え、えっと……こ、こうすればいいの……？」

    %CALLNAME:TARGET%は真っ赤になりながら、おずおずと%CALLNAME:MASTER%のものに手を伸ばした。

    初めて触れる感触に驚きながらも、そっと握りしめる。

    「わぁ……熱い……こんなに硬いんだ……」

    %CALLNAME:TARGET%は困惑しながらも、見よう見まねで手を動かし始めた。

    「……%CALLNAME:MASTER%、痛くないですか……？」

    心配そうに%CALLNAME:TARGET%は%CALLNAME:MASTER%の顔を窺っている。

    「あの……%CALLNAME:MASTER%のために……頑張ります……」

    %CALLNAME:TARGET%は緊張した面持ちで%CALLNAME:MASTER%の一物を手に取った。

    「こういうの、あたし初めてだから……下手でごめんね……」

    ぎこちない手つきで、%CALLNAME:TARGET%は懸命に擦り始めた。

    「んしょ……んしょ……こう……？」

    一生懸命な%CALLNAME:TARGET%の姿は、どこか健気だった。

    「……気持ちよくなって、くれたら……嬉しいな……」

    「は、恥ずかしいよぅ……でも……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、%CALLNAME:MASTER%の股間に手を伸ばした。

    「%CALLNAME:MASTER%が気持ちよくなるなら……あたし、頑張る……」

    小さな手が%CALLNAME:MASTER%のものを包み、ゆっくりと動き出す。

    「……んっ……ぬるっとしてきた……これ、気持ちいいってこと……？」

    %CALLNAME:TARGET%は先走りの感触に驚きながらも、手を止めなかった。

    「……%CALLNAME:MASTER%……あたしのこと、好き……？」

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は上目遣いに%CALLNAME:MASTER%を見つめた。

    「あたし……%CALLNAME:MASTER%のこと、好きだから……」

    恥ずかしそうに俯きながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%のものを握った。

    「だから……こういうこと、させて……ね……？」

    小さな手がたどたどしく動き、%CALLNAME:MASTER%に快感を与えようと頑張っている。

    %CALLNAME:TARGET%は真剣な表情で、%CALLNAME:MASTER%の反応を見守っていた。
