character: フラン
situation: K6_挿入
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……後ろから、お尻の穴……？」

    %CALLNAME:人物_フラン%は四つんばいの姿勢で振り返った。

    顔が見えない体勢で、最も敏感な場所を委ねる不安と喜び。

    「……%CALLNAME:MASTER%になら、どこでもいいのさ。全部、あげるって決めたから」

    %CALLNAME:MASTER%が菊穴に亀頭を押し当てると、%CALLNAME:人物_フラン%は息を詰めた。

    「んっ……後ろからだと、もっときつい……でも、%CALLNAME:MASTER%が入ってくる……」

    悪魔の妹は、恋人を信じて痛みを受け入れていた。

    「ふぁ……この体勢で後ろの穴って……すごいのさ……」

    %CALLNAME:人物_フラン%は尻を突き出しながら、恋人を受け入れた。

    腸壁が後ろからの侵入をきゅう、と締め付けている。

    「顔が見えないから……ちょっと寂しいけど……」

    %CALLNAME:MASTER%が背中に覆いかぶさると、%CALLNAME:人物_フラン%は安堵の息を漏らした。

    「あぁ……こうやって抱きしめてくれるなら……大丈夫なのさ……」

    恋人の体温を背中に感じながら、悪魔の妹は幸せそうに微笑んだ。

    「%CALLNAME:MASTER%……私のお尻、後ろからどう見える……？」

    %CALLNAME:人物_フラン%は四つんばいのまま、恥ずかしそうに問いかけた。

    自分では見えない姿で、最も恥ずかしい穴を晒している。

    「……%CALLNAME:MASTER%だけに見せるのさ。私の全部」

    %CALLNAME:MASTER%が奥まで突き入れると、%CALLNAME:人物_フラン%は背中を反らせた。

    「んぅっ……！　後ろから奥まで……お腹の中、かき回されてる……」

    痛みと快感が混じり合う感覚に、紅い瞳が潤んでいく。

    「獣みたいな体勢で……お尻の穴まで……」

    %CALLNAME:人物_フラン%は恥ずかしさに頬を染めながら呟いた。

    しかし、その声には拒絶の色はない。

    「でもね、%CALLNAME:MASTER%……こうしてると、壊さなくて済む気がするの」

    %CALLNAME:MASTER%が激しく腰を動かすと、%CALLNAME:人物_フラン%は甘い悲鳴を上げた。

    「あぁ……っ！　後ろから来ると……お尻の穴……もっと感じる……」

    495年の孤独を知る少女は、恋人との繋がりに涙を浮かべていた。
  priority: 4
- id: talent_3_1
  content: >-
    「え……後ろからで、しかもお尻の穴……？」

    %CALLNAME:人物_フラン%は驚きに目を見開いた。

    四つんばいで後ろの穴を晒す姿勢に、顔が真っ赤に染まる。

    「……本で読んだことないのさ。こんな遊び」

    %CALLNAME:MASTER%が菊穴に亀頭を押し当てると、%CALLNAME:人物_フラン%は身体を強張らせた。

    「ひっ……き、きつい……っ！　後ろからだと余計に……」

    未知の刺激に戸惑いながらも、悪魔の妹は拒絶しなかった。

    「こ、この体勢で後ろの穴なんて……恥ずかしいのさ……」

    %CALLNAME:人物_フラン%は尻を突き出しながら、顔を伏せた。

    見られたくない部分を、後ろから全部見られている。

    「……%CALLNAME:MASTER%だけだよ？　こんな姿見せるの」

    %CALLNAME:MASTER%が腸内に侵入すると、%CALLNAME:人物_フラン%は声を詰まらせた。

    「んっ……あぁ……お尻の中……きつくて、変な感じ……」

    羞恥と快感に翻弄されながら、悪魔の妹は身を委ねていた。

    「%CALLNAME:MASTER%……後ろにいると顔が見えないの……」

    %CALLNAME:人物_フラン%は不満そうに振り返った。

    しかし、後ろを向くと自分の晒す姿がさらに意識されて。

    「や、やだ……見ないでって言いたいのに……見てほしいって思うの……」

    %CALLNAME:MASTER%が奥まで突き入れると、%CALLNAME:人物_フラン%は叫んだ。

    「あっ……！　奥まで……！　お腹の中、ぐちゃぐちゃになりそう……」

    矛盾する感情に、悪魔の妹は翻弄されていた。

    「こういう遊び……他の人ともしてるの……？」

    %CALLNAME:人物_フラン%は嫉妬を隠さずに問いかけた。

    四つんばいでお尻の穴を犯される姿勢のまま、紅い瞳で睨む。

    「……私とだけにしてよね。こんな恥ずかしいこと」

    %CALLNAME:MASTER%が激しく腰を動かすと、その表情が歪んだ。

    「んぅ……っ！　やだ……頭、真っ白になる……%CALLNAME:MASTER%のせいなのさ……」

    独占欲と快楽に、悪魔の妹は溺れていった。
  priority: 3
