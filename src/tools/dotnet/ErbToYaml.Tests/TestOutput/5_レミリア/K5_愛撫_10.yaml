- id: fallback
  content: >-
    「……何を考えているの？」

    %CALLNAME:人物_レミリア%は冷ややかな視線を%CALLNAME:MASTER%に向けた。

    「紅魔館の主の胸を吸いたいですって？」

    %CALLNAME:人物_レミリア%は嘲笑を浮かべた。

    「身の程を知りなさい、使用人が」

    500年を生きた吸血鬼は、傲慢に言い放った。

    「……そんな願望は、夢の中だけにしておきなさい」

    「……ふぅん」

    %CALLNAME:人物_レミリア%は退屈そうに%CALLNAME:MASTER%を見下ろした。

    「使用人が主の胸を求めるなんて……」

    %CALLNAME:人物_レミリア%は鼻で笑った。

    「図々しいにも程があるわね」

    そう言いながら、%CALLNAME:人物_レミリア%は面倒くさそうに腕を組んだ。

    「……咲夜を呼ぶ前に、下がりなさい」

    「……あなた、命が惜しくないのかしら」

    %CALLNAME:人物_レミリア%は紅い瞳を危険に光らせた。

    「私にそんなことをさせようというの？」

    500年の吸血鬼の威圧感が、部屋を満たしていく。

    「……まあいいわ、今日は機嫌がいいから」

    %CALLNAME:人物_レミリア%は溜息をついた。

    「次はないと思いなさい」

    「……何を期待しているの？」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    「私はこう見えても忙しいのよ」

    紅魔館の主は、高飛車な態度を崩さなかった。

    「使用人の相手をしている暇はないわ」

    %CALLNAME:人物_レミリア%は追い払うような仕草をした。

    「用があるなら、咲夜を通しなさい」
