    %CALLNAME:TARGET%はぼそりと呟いた。

    「この体勢……いっぱい、もらえる……」

    サキュバスの眷属として、%CALLNAME:TARGET%は%CALLNAME:MASTER%から精気を求めていた。

    「ふぅん……けものみたいな体勢……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に尻を向けながら、小首を傾げた。

    悪魔の少女の瞳には、獲物を見定めるような光が宿っている。

    「いいよ……あたしで、きもちよくなって……」

    %CALLNAME:TARGET%は本能に従い、%CALLNAME:MASTER%を誘うように腰を揺らした。

    「そのかわり……ぜんぶ、しぼりとるから……」

