character: レミリア
situation: K5_口挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、そんなところまで私に舐めさせたいの？」

    %CALLNAME:人物_レミリア%は艶やかに微笑みながら、%CALLNAME:MASTER%の後ろに顔を近づけた。

    紅い舌がゆっくりと恥ずかしい場所に触れると、吸血鬼は嬉しそうに瞳を細めた。

    「……こんな背徳的なこと、%CALLNAME:MASTER%にしかしてあげないわよ」

    %CALLNAME:人物_レミリア%は丁寧に舌を這わせ、ゆっくりと舐め始めた。

    「……ん、%CALLNAME:MASTER%の味……覚えてあげるわ」

    500年を生きた吸血鬼が、恋人のためだけに最も卑しい奉仕をしていた。

    「んっ……%CALLNAME:MASTER%、ここもこんなに感じるのね」

    %CALLNAME:人物_レミリア%は興味深そうに舌を動かしながら、%CALLNAME:MASTER%の反応を観察していた。

    吸血鬼のひんやりとした舌が、秘められた場所を舐め上げていく。

    「ククク……舌で刺激すると、声が抑えられないのね」

    %CALLNAME:人物_レミリア%は愛おしそうに舌を動かしながら、%CALLNAME:MASTER%の表情を見つめていた。

    「……%CALLNAME:MASTER%の全部を、私の舌で味わってあげるわ」

    館の主は、恋人の隅々まで舌で支配することに喜びを感じていた。

    「……ねぇ、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は舌を動かしながら、甘えるような声で呼びかけた。

    「こうして恥ずかしいところを舐めていると……私、興奮しちゃうのよ」

    紅魔館の主とは思えない、素直な告白だった。

    「……%CALLNAME:MASTER%の味、全部私のものにしたいの」

    %CALLNAME:人物_レミリア%は頬を染めながら、舌での奉仕を続けた。

    500年の孤独を知る吸血鬼は、愛する者のすべてを舌で感じたかった。

    「ふふ……%CALLNAME:MASTER%、可愛い声ね」

    %CALLNAME:人物_レミリア%は意地悪そうに微笑みながら、舌の動きを激しくした。

    「こんなところを舐められて、こんなになっちゃって……」

    %CALLNAME:人物_レミリア%は時折、舌先で入り口をくすぐってみせる。

    「もっと乱れていいのよ？　今夜は私が、%CALLNAME:MASTER%を舌で堕としてあげるわ」

    そう言いながらも、その瞳には深い愛情が宿っていた。

    「……%CALLNAME:MASTER%の恥ずかしい味、全部教えてちょうだい」
  priority: 4
- id: talent_3_1
  content: >-
    「……こ、ここを舐めればいいのね？」

    %CALLNAME:人物_レミリア%は顔を紅くしながら、%CALLNAME:MASTER%の後ろに顔を近づけた。

    おそるおそる舌を伸ばし、触れた瞬間、小さく息を呑む。

    「っ……こんな恥ずかしいところを舌で……」

    %CALLNAME:人物_レミリア%はぎこちなく舌を動かし始めた。

    「べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただの好奇心よ、好奇心」

    素直になれない吸血鬼は、必死に照れを隠しながら舐めていた。

    「ふん……こんなことで声を出すなんて、恥ずかしくないの？」

    %CALLNAME:人物_レミリア%は強がりながらも、舌は止めなかった。

    「……で、でも、%CALLNAME:MASTER%が喜ぶなら……仕方ないわ」

    そう呟きながら、%CALLNAME:人物_レミリア%は舌の動きを少しだけ丁寧にした。

    「……感謝しなさいよ。紅魔館の主が直々にこんなところを舐めてあげてるんだから」

    高飛車な言葉とは裏腹に、%CALLNAME:人物_レミリア%の頬は真っ赤だった。

    「……私も恥ずかしいんだからね」

    「……%CALLNAME:MASTER%、そんな顔しないで」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の反応に、どきりとしていた。

    「……ここを舐めると、そんなに気持ちいいの？」

    少し嬉しそうに、%CALLNAME:人物_レミリア%は舌を動かし続けた。

    「……ふん、当然よね。私は紅魔館の主なんだから」

    そう言いながらも、%CALLNAME:人物_レミリア%はこっそり%CALLNAME:MASTER%の表情を確認していた。

    「……もう少しだけ、舐めてあげてもいいわよ」

    「あっ……ここ、舌で触ると反応する……」

    %CALLNAME:人物_レミリア%は舌先の反応に、興味津々の様子だった。

    「ふぅん……こうすると、もっと声が出るのね……」

    %CALLNAME:人物_レミリア%は観察するように、舌の動きを変えてみる。

    「……べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただ、その……」

    言い訳が思いつかず、%CALLNAME:人物_レミリア%は口をつぐんだ。

    「……うるさいわね。黙って感じていなさい」
  priority: 3
  condition:
