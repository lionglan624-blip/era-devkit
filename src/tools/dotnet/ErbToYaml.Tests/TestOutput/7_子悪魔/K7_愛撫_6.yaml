- id: fallback
  content: >-
    「ふぇっ……こ、これをですか……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%のものを見て固まっている。

    「え、えっと……あの……」

    戸惑いながらも、%CALLNAME:TARGET%はおずおずと顔を近づけた。

    「……%CALLNAME:MASTER%がそうしてほしいなら……」

    小さな舌がおそるおそる先端に触れる。

    「……ん……なんか、変な感じ……」

    %CALLNAME:TARGET%は困惑しながらも、言われるままに舐めている。

    「……こ、こうでいいんですか……？」

    %CALLNAME:TARGET%は不安げに%CALLNAME:MASTER%を見上げた。

    ぎこちない動きで、先端を舐めている。

    「あたし、こういうの初めてで……」

    %CALLNAME:TARGET%の頬は真っ赤に染まっている。

    「……んっ……」

    言われた通りにしようと、%CALLNAME:TARGET%は懸命だった。

    「……%CALLNAME:MASTER%、教えてください……」

    「あの……本当にこれでいいんですか……？」

    %CALLNAME:TARGET%は困惑した表情で%CALLNAME:MASTER%を見ている。

    「妖精のあたしなんかで……」

    それでも言われた通り、%CALLNAME:TARGET%は口を開けた。

    「……んむ……」

    ぎこちなく口に含み、%CALLNAME:TARGET%は固まっている。

    「……ど、どうすればいいの……」

    助けを求めるように、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げた。

    「%CALLNAME:MASTER%……あの……」

    %CALLNAME:TARGET%はおずおずと%CALLNAME:MASTER%の前に跪いた。

    何をすべきかは分かっているようだが、戸惑っている。

    「……緊張するの……優しくしてくださいね……」

    %CALLNAME:TARGET%はそっと舌を伸ばし、先端に触れた。

    「……ん……」

    恐る恐る舐め始め、少しずつ口に含もうとしている。

    「……こ、こうかな……」
