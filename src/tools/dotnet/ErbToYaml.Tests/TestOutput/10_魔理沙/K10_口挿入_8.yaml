character: 魔理沙
situation: K10_口挿入
entries:
- id: fallback
  content: >-
    「んっ……お前の匂い、好きだぜ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の股間に顔を埋めた。

    「こうやって舐めると……気持ちいいんだろ？」

    %CALLNAME:人物_魔理沙%は恋人の反応を見ながら、ゆっくりと舌を這わせ始めた。

    「んむっ……ここ、敏感なんだな……」

    %CALLNAME:人物_魔理沙%は嬉しそうに微笑みながら、丁寧に舌を動かした。

    「ふふ……お前のここ、だんだん濡れてきたな」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%のVを優しく舐めた。

    「私の舌で……こんなに感じてくれてるのか」

    「こうして繋がってると……嬉しいぜ」

    %CALLNAME:人物_魔理沙%は恋人の顔を見上げながら、丁寧に奉仕した。

    「もっと気持ちよくしてやるから……任せとけ」

    「……こういうの、上手くなってきただろ？」

    %CALLNAME:人物_魔理沙%は照れくさそうに笑いながら、器用に舌を動かした。

    「お前の反応が良くなってる……私の腕が上がったってことだな」

    %CALLNAME:MASTER%が気持ちよさそうにすると、%CALLNAME:人物_魔理沙%は得意げになった。

    「ふふん、努力してるんだぜ……お前のためにな」

    %CALLNAME:人物_魔理沙%は恋人を喜ばせることに夢中になっていた。

    「なあ……ちゃんとこっち見てろよ」

    %CALLNAME:人物_魔理沙%は舌を動かしながら、%CALLNAME:MASTER%の目を見上げた。

    「私がお前を気持ちよくしてるとこ……見ててくれ」

    %CALLNAME:人物_魔理沙%の舌が動くたび、%CALLNAME:MASTER%の体が震える。

    「……恥ずかしいけど、見られてると頑張れるんだぜ」

    %CALLNAME:人物_魔理沙%は恋人と視線を合わせながら、愛情を込めて奉仕を続けた。
  priority: 4
- id: talent_3_1
  content: >-
    「ち、違うからな！　べ、別にやりたくてやってるわけじゃ……」

    %CALLNAME:人物_魔理沙%は顔を真っ赤にしながら、%CALLNAME:MASTER%の股間に顔を近づけた。

    「た、頼まれたから仕方なくやってるだけだぜ……」

    %CALLNAME:人物_魔理沙%は照れ隠しに強がりながらも、舌は丁寧に動いている。

    「んっ……な、なんだよこの匂い……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに顔を背けようとしながらも、奉仕は止めなかった。

    「こ、こんなことして……変態なんだからな、お前は」

    %CALLNAME:人物_魔理沙%は文句を言いながらも、舌を動かし続けている。

    「……でも、気持ちいいなら……まあ、仕方ないか」

    %CALLNAME:人物_魔理沙%の舌使いは慣れないながらも、一生懸命だった。

    「んむっ……なんか、ここ濡れてきてる……反応してるってことか……」

    「……勝手に変な声出すなよ、恥ずかしいだろ……」

    「んっ……なんか、味が変わってきた……？」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、舌を動かし続けた。

    「こ、これって……気持ちいいってことなんだよな……？」

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_魔理沙%は複雑な表情になった。

    「……別に嬉しくなんかないぜ……ただ、悪い気はしないってだけだ」

    %CALLNAME:人物_魔理沙%は照れながらも、少し得意げだった。

    「……お前、もうちょっと反応してくれてもいいんだぜ」

    %CALLNAME:人物_魔理沙%は少し不満そうに顔を上げた。

    「こっちは頑張ってるんだから……」

    %CALLNAME:MASTER%が気持ちよさそうな顔をすると、%CALLNAME:人物_魔理沙%は照れた。

    「なっ……そ、そんな顔されると困る……」

    「……もう、勝手にしろよ……」

    %CALLNAME:人物_魔理沙%は照れ隠しに目を逸らしながら、奉仕を続けた。
  priority: 3
