  content: >-
    「……これも……サービスですから……」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「……ですが……向かい合ったまま……後ろを……というのは……」

    %CALLNAME:MASTER%の動きに、%CALLNAME:TARGET%の体が反応してしまう。

    「っ……あ……」

    「……これは……仕方がないこと……ですわ……」

    %CALLNAME:TARGET%は恥ずかしさを堪えながら、プロとしての矜持を保とうとしていた。

    「……ん……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は複雑な表情を浮かべている。

    「向かい合うと……私の顔が見えてしまいますわね……」

    「こんな……恥ずかしい表情……」

    %CALLNAME:MASTER%が深く突くと、%CALLNAME:TARGET%の体が震えた。

    「あっ……そこは……後ろ……なのに……」

    言葉を途中で飲み込み、%CALLNAME:TARGET%は唇を噛んだ。

    「……これは……お仕事……ですから……」

    %CALLNAME:TARGET%は何度も自分に言い聞かせている。

    しかし、体は否応なく快感を覚え始めていた。

    「……ぅ……お尻で……こんなに……」

    「%CALLNAME:MASTER%……貴方は……困った方ですわね……」

    %CALLNAME:TARGET%は非難しながらも、抵抗する様子はなかった。

    「……もう少し……続けても……構いませんわ……」

    「……っ……」

    %CALLNAME:TARGET%は声を堪えようとしたが、漏れてしまう。

    「……プロとして……こんな声を出すべきではないのに……」

    「後ろで……感じている……なんて……」

    「%CALLNAME:MASTER%、貴方は……私を堕落させようと……」

    恨めしそうに言いながらも、%CALLNAME:TARGET%の体は%CALLNAME:MASTER%を受け入れていた。

    「……でも……止めないでくださいまし……」
