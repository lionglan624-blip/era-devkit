  content: >-
    「……二人で、私を使うんだ」

    %CALLNAME:人物_フラン%は無表情で呟いた。

    前と後ろに誰かがいる。495年の孤独にはなかった光景だ。

    「壊れるかな……？　私の身体……」

    二人が動くと、%CALLNAME:人物_フラン%はわずかに表情を変えた。

    「……ん……両方から……来ると……変な感じ」

    悪魔の妹は、二人に弄ばれる感覚を淡々と受け止めていた。

    「%CALLNAME:MASTER%……これって、珍しい遊びなの？」

    %CALLNAME:人物_フラン%は感情のない瞳で尋ねた。

    二人に同時に使われる体験は、少女には初めてだった。

    「地下室には……遊び相手もいなかったから」

    二人が腰を動かすと、%CALLNAME:人物_フラン%は声を漏らした。

    「……あ……前と後ろ……両方……埋まってる……変なの」

    どこか虚ろな声で、悪魔の妹は感覚を言葉にした。

    「……」

    %CALLNAME:人物_フラン%は黙って二人を受け入れた。

    前からも後ろからも押し込まれる感覚。不思議と不快ではない。

    「私……壊す側だったのに。今は壊される側なのさ」

    二人が同時に動くと、%CALLNAME:人物_フラン%は小さく声を上げた。

    「んっ……あ……壊れても……いいかも……退屈よりはまし」

    495年の孤独より、壊される方がまだ刺激的だと、悪魔の妹は思った。

    「二人に挟まれてると……きゅっとしてドカーン、しにくいね」

    %CALLNAME:人物_フラン%は独り言のように呟いた。

    前にも後ろにも人がいると、破壊の余地がない。

    「%CALLNAME:MASTER%……私が壊れるの、見たいの？」

    二人が激しく動くと、%CALLNAME:人物_フラン%は虚ろな目で呟いた。

    「……あぁ……両方……すごい……壊れる……かも……ね」

    悪魔の妹は、自分が壊れる瞬間に興味を持っているようだった。
