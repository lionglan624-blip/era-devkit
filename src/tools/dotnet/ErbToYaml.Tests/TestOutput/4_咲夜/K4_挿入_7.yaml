- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%……こんな体勢は……恥ずかしいですわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の膝の上で、顔を赤らめている。

    「顔を……見ないでくださいまし……」

    しかし、%CALLNAME:MASTER%に顔を向けられ、視線が絡み合ってしまう。

    「あ……んっ……見られて……いますわね……」

    「……嫌じゃ……ないですけれど……」

    %CALLNAME:TARGET%は小さな声で、正直な気持ちを漏らした。

    「……%CALLNAME:MASTER%……こんなに近いと……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の顔の近さに戸惑いを見せた。

    「メイドとして……こんな姿を見せるのは……」

    しかし、体は正直に快感を受け入れ始めていた。

    「あ……奥が……当たって……」

    「%CALLNAME:MASTER%……もっと……動いて……」

    恥じらいながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみついた。

    「……ふぁ……向かい合っていると……全部見られてしまいますわ……」

    %CALLNAME:TARGET%は自分の表情を隠そうとしたが、叶わなかった。

    「お嬢様のお世話より……今は……」

    言いかけて、%CALLNAME:TARGET%は口を噤む。

    「……いけませんわね、こんなこと考えては……」

    「でも……止められないの……%CALLNAME:MASTER%……」

    葛藤しながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%から目を逸らせなかった。

    「……%CALLNAME:MASTER%……抱きしめても……いいですか……」

    %CALLNAME:TARGET%は躊躇いがちに%CALLNAME:MASTER%の背中に手を回した。

    「こうしていると……なんだか安心しますの……」

    許可を求めながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を引き寄せた。

    「あ……近い……顔が……ん……っ……」

    「……もう少しだけ……このままでいさせてください……」

    %CALLNAME:TARGET%は甘い声を漏らしながら、恋人のように振る舞っていた。
