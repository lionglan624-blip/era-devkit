entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の唇にそっと口づけた。

    「ん……ちゅ……れろ……」

    %CALLNAME:人物_小悪魔%は嬉しそうに舌を絡めてきた。

    しばらく互いの唇を味わってから、ゆっくりと唇を離す。

    「……ふふっ、悪魔の口づけは魔性の味がするでしょう？」

    %CALLNAME:人物_小悪魔%は蕩けた表情で%CALLNAME:MASTER%を見上げた。

    「もっと……もっとしてくださいな……私、%CALLNAME:MASTER%のキスが大好きですの」

    「ん……んむ……ちゅる……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%と深く口づけを交わしている。

    悪魔の舌がいたずらっぽく絡みついてくる。

    「れろ……ちゅぷ……ぷはぁ……」

    ようやく唇を離すと、%CALLNAME:人物_小悪魔%は熱に浮かされた表情になっていた。

    「……ふふっ、一度味わったら、もう離れられなくなりますわよ……？」

    %CALLNAME:人物_小悪魔%はいたずらっぽく笑いながら、もう一度唇を寄せてきた。

    %CALLNAME:MASTER%が%CALLNAME:人物_小悪魔%にキスをしようとすると、

    %CALLNAME:人物_小悪魔%の方から唇を重ねてきた。

    「ん……ちゅ……んむ……」

    甘い吐息と共に、悪魔の舌が絡みついてくる。

    「れろ……ちゅる……ぷあっ……」

    %CALLNAME:人物_小悪魔%は蕩けた顔で、%CALLNAME:MASTER%に体を預けてきた。

    「%CALLNAME:MASTER%……もう、離しませんわよ……？」

    「%CALLNAME:MASTER%……キス、してくださいな……」

    %CALLNAME:人物_小悪魔%は甘えるように自分から唇を差し出してきた。

    %CALLNAME:MASTER%がその唇を受け止めると、%CALLNAME:人物_小悪魔%は幸せそうに目を細める。

    「ん……ちゅる……れろ……んむ……」

    悪魔の舌が蜜を求めるように絡みついてくる。

    「ぷはっ……はぁ……%CALLNAME:MASTER%の唇、甘いですわ……」

    %CALLNAME:人物_小悪魔%は恍惚とした瞳で%CALLNAME:MASTER%を見つめた。

    「……私、もう%CALLNAME:MASTER%なしでは生きられませんの……」
