entries:
- id: fallback
  content: >-
    「ん……%CALLNAME:MASTER%……後ろで、上に乗っても、いい？」

    %CALLNAME:人物_美鈴%は恥ずかしそうに%CALLNAME:MASTER%の上に跨った。

    門番として鍛えた太ももが、しっかりと%CALLNAME:MASTER%の腰を挟む。

    「後ろを……自分から使うなんて……恥ずかしいけど……」

    %CALLNAME:人物_美鈴%はゆっくりと腰を沈め、アナルに受け入れた。

    「……ふふ、%CALLNAME:MASTER%のこと……全部、受け止めるわ」

    武術家らしい柔軟な体が、深く繋がった。

    「あ……ん……後ろだと……角度が違う……」

    %CALLNAME:人物_美鈴%は上から腰を揺らしながら、甘い声を漏らした。

    アナルで%CALLNAME:MASTER%を受け入れる体勢に、体が熱くなる。

    「……%CALLNAME:MASTER%の顔……見ながら……こんなこと……」

    %CALLNAME:人物_美鈴%は羞恥に頬を染めながらも、腰の動きを止めない。

    「……でも、嫌じゃないの……%CALLNAME:MASTER%となら」

    恋人への愛情が、恥ずかしさを超えていた。

    「はぁ……自分で動くと……奥まで、当たる……」

    %CALLNAME:人物_美鈴%は腰の角度を調整しながら、快感を探った。

    「後ろなのに……だんだん、気持ちよくなってきて……」

    %CALLNAME:人物_美鈴%は潤んだ瞳で%CALLNAME:MASTER%を見下ろした。

    「……%CALLNAME:MASTER%も、感じてる……？」

    %CALLNAME:人物_美鈴%は嬉しそうに微笑みながら、さらに腰を沈めた。

    「……私の後ろで、気持ちよくなって」

    「……ん……この体勢だと……%CALLNAME:MASTER%を独り占め……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の胸に手をつき、ゆっくりと動いた。

    「いつもは門番として守ってるけど……今は……」

    %CALLNAME:人物_美鈴%は身を屈め、%CALLNAME:MASTER%の耳元に囁いた。

    「……私の後ろで、%CALLNAME:MASTER%を気持ちよくさせてあげる」

    アナルで繋がったまま、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%を優しく抱きしめた。

    「……大好きよ、%CALLNAME:MASTER%」
