    %CALLNAME:人物_チルノ%の小さな胸が%CALLNAME:MASTER%の手に包まれた。

    「……あたい、こんな小さいの……触って楽しい……？」

    %CALLNAME:人物_チルノ%は不安そうに聞いたが、体は離そうとしなかった。

    「……でも、%CALLNAME:MASTER%に触られるの……嫌じゃないの……」

    消え入りそうな声で、%CALLNAME:人物_チルノ%はそう呟いた。

    「あっ……やん……そこ、気持ちいい……」

    %CALLNAME:人物_チルノ%の体が小さく震えた。

    「最強のあたいが……こんな声出しちゃうなんて……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに俯いた。

    「……%CALLNAME:MASTER%にだけよ……こんな姿見せるの……」

    強がりの中に、甘えが混じっていた。

    「ひゃぁっ……も、もう……！」

    %CALLNAME:人物_チルノ%は声を抑えようとして唇を噛んだ。

    「あたいの胸……そんなに触って……どうする気なのよ……」

    %CALLNAME:人物_チルノ%は照れくさそうに%CALLNAME:MASTER%を睨んだ。

    「……ふん、いいわよ。最強のあたいが相手してあげるんだから……」

