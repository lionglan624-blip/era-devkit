- id: talent_3_1
  content: >-
    「ひゃっ……！ ち、乳首……ですか……？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に乳首を触られ、顔を真っ赤に染めた。

    「そ、そこ……恥ずかしいところ……ですわ……」

    %CALLNAME:人物_小悪魔%は身を捩りながらも、%CALLNAME:MASTER%の手を払おうとはしない。

    「……%CALLNAME:MASTER%がしたいなら……我慢しますけど……」

    小さな声で、%CALLNAME:人物_小悪魔%はそう呟いた。

    「んっ……あ……そんなに摘ままないで……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_小悪魔%の乳首を弄ぶ。

    %CALLNAME:人物_小悪魔%は困ったような、でもどこか期待しているような表情をしている。

    「……%CALLNAME:MASTER%って……意外と大胆なんですのね……」

    「……でも……嫌いじゃない……ですわ……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに目を逸らしながら、そう言った。

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の服の中に手を入れ、乳首に触れた。

    「ひぁっ……！ い、いきなり……」

    %CALLNAME:人物_小悪魔%はびくりと体を震わせた。

    「……もう……%CALLNAME:MASTER%のいじわる……」

    %CALLNAME:人物_小悪魔%は頬を膨らませながらも、されるがままになっている。

    「……私の乳首……そんなに気になりますの……？」

    「あ……やぁ……そこ、触られると……変な気持ちに……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に乳首を弄られながら、切ない声を漏らしている。

    「悪魔でも……こういうのには弱いんですのよ……？」

    %CALLNAME:人物_小悪魔%は照れくさそうに%CALLNAME:MASTER%を見上げた。

    「……もう少しだけ……続けても……いいですわ……」

    そう言って、%CALLNAME:人物_小悪魔%は控えめに体を預けてきた。
