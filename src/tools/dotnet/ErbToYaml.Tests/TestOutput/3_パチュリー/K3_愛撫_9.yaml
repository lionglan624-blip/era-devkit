- id: fallback
  content: >-
    「……何をしているの」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の行動を冷静に観察している。

    「……人間の性行動に関する実地調査、ということにしておくわ」

    %CALLNAME:TARGET%は自分を納得させるように言った。

    「……まあ、続けなさい。データは多い方がいいわ」

    「っ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に乳首を吸われ、一瞬身を強張らせた。

    「……興味深いわね。触覚だけでこんなに反応するなんて」

    %CALLNAME:TARGET%は自分の体の反応を分析するような目で見下ろしている。

    「……もう少し、調べさせてもらうわ」

    そう言って、%CALLNAME:TARGET%は%CALLNAME:MASTER%を止めなかった。

    「……ふぅん」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の行為を、まるで実験を眺めるように見ている。

    「……乳首への吸引刺激が快感神経に作用する……文献通りね」

    %CALLNAME:TARGET%は淡々と呟いたが、頬は微かに上気している。

    「……理論と実践は違うわね。これは」

    「……む」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に吸われながら、怪訝そうな顔をした。

    「……あなた、そういうことが好きなの？」

    %CALLNAME:TARGET%は観察するような目で%CALLNAME:MASTER%を見つめた。

    「……まあ、私も嫌いじゃないわ。体が弱い割に、敏感みたいね」

    %CALLNAME:TARGET%はぼそりと呟いた。
  priority: 2
- id: fallback
  content: >-
    「……何をしているの」

    %CALLNAME:TARGET%は冷ややかな目で%CALLNAME:MASTER%を見下ろした。

    「私の体に興味があるなら、解剖学の本を貸してあげるわ」

    %CALLNAME:TARGET%は素っ気なく言い放った。

    「……触るなら、許可を取りなさい」

    「……むきゅ」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「あなた、図書館に何しに来たの」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%から距離を取った。

    「……本を読む気がないなら、出て行って」

    「……」

    %CALLNAME:TARGET%は黙って%CALLNAME:MASTER%の頭を押し退けた。

    「図書館の利用規約には、そんな行為は書いていないわ」

    %CALLNAME:TARGET%は冷たく言い放ち、魔導書を開いた。

    「……精霊魔法で追い出すわよ。次やったら」

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついた。

    「あなたは本を読みに来たんじゃないの？」

    %CALLNAME:TARGET%は呆れたような表情を浮かべている。

    「……まあいいわ。私の研究対象にでもなりなさい」

    そう言って、%CALLNAME:TARGET%は冷めた目で%CALLNAME:MASTER%を観察し始めた。
  priority: 1
