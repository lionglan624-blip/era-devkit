- id: fallback
  content: >-
    「ちょっ……何してんのよ！？」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%を蹴飛ばそうとして、体を引いた。

    「いきなりそんなとこ舐めようとするなんて、信じらんない！」

    %CALLNAME:人物_チルノ%は怒った表情で%CALLNAME:MASTER%を睨んでいる。

    「あたいをなめてんの？　凍らせるわよ！」

    冷気が辺りに漂い始め、%CALLNAME:人物_チルノ%の怒りが伝わってくる。

    「はぁ？　何考えてんの%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は呆れたような顔で後ずさった。

    「そういうのは……もっと仲良くなってからでしょ、普通！」

    %CALLNAME:人物_チルノ%は腰に手を当てて、怒りを露わにしている。

    「あたいは最強の妖精なんだから、変なことしたら許さないわよ！」

    %CALLNAME:人物_チルノ%は威嚇するように胸を張った。

    「な、何……！」

    %CALLNAME:人物_チルノ%は反射的に脚を閉じて、%CALLNAME:MASTER%から離れた。

    「%CALLNAME:MASTER%、頭おかしいんじゃないの？」

    %CALLNAME:人物_チルノ%は警戒するような目で%CALLNAME:MASTER%を見ている。

    「……そういうのは、もっとお互いのこと知ってからにしなさいよね」

    %CALLNAME:人物_チルノ%はきっぱりと拒否の姿勢を示した。

    「……」

    %CALLNAME:人物_チルノ%は無言で%CALLNAME:MASTER%を見つめた。

    「……あのさ%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は真剣な表情で口を開いた。

    「あたい、まだアンタのことよく知らないんだけど」

    「……そういうことするなら、ちゃんと順番ってものがあるでしょ」

    %CALLNAME:人物_チルノ%は冷静に、しかし毅然と言い放った。
