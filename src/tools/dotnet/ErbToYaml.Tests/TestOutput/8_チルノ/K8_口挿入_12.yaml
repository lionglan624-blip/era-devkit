- id: fallback
  content: >-
    「は？　なんであたいがそんなとこ舐めなきゃいけないのよ！」

    %CALLNAME:人物_チルノ%は不機嫌な顔で言った。

    「舐めろって言われても……嫌なものは嫌！」

    %CALLNAME:人物_チルノ%は顔を背けて拒否した。

    「最強のあたいをなんだと思ってるの！」

    氷の妖精は怒りを露わにした。

    「……っ！　こんなこと強制しないでよ！」

    %CALLNAME:人物_チルノ%は嫌そうな顔で%CALLNAME:MASTER%を睨んだ。

    仕方なく舌を伸ばすが、触れるのは最小限だ。

    「これでいいでしょ……もう舐めたくない」

    %CALLNAME:人物_チルノ%はさっさと顔を離した。

    「……早く終わらせてよ」

    氷の妖精は不快感を隠そうともしなかった。

    「あたいをこんなことに使うなんて……許さないから」

    %CALLNAME:人物_チルノ%は怒りを込めて言った。

    渋々舌を動かすが、その動きには全く愛情がない。

    「さっさと満足して帰ってよ……」

    %CALLNAME:人物_チルノ%は早く終わらせたいと思っていた。

    「いつかこの借り、絶対返すからね！」

    氷の妖精の目には復讐の光が宿っていた。

    「……」

    %CALLNAME:人物_チルノ%は無言で%CALLNAME:MASTER%の秘部に舌を近づけた。

    その舌の動きには全く温かみがなく、ただ冷たいだけだ。

    「これで満足……？」

    %CALLNAME:人物_チルノ%は冷たい目で%CALLNAME:MASTER%を見た。

    「あたいはお前のおもちゃじゃない……」

    氷の妖精は抵抗を諦めていないようだった。
