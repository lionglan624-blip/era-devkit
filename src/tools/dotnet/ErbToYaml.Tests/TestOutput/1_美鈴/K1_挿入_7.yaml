- id: talent_3_1
  content: >-
    「ひゃっ……こ、この体勢……顔が、すごく近くて……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の膝の上で、真っ赤になった。

    向かい合って座る体勢に、心臓が跳ね上がる。

    「……は、恥ずかしいです……でも……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに俯いた。

    「……%CALLNAME:MASTER%の顔、近くで見られるの……嬉しいです……」

    照れ隠しの言葉に、本心が滲み出ていた。

    「あ……ん……座ったままだと……深い、です……っ」

    %CALLNAME:人物_美鈴%は甘い声を漏らしながら、%CALLNAME:MASTER%にしがみついた。

    「……向かい合ってると……気持ち、隠せなくて……」

    %CALLNAME:人物_美鈴%は顔を真っ赤に染めた。

    「……%CALLNAME:MASTER%……私……」

    言いかけて、%CALLNAME:人物_美鈴%は首を横に振った。

    「……ごめんなさい……恥ずかしくて、言えないです……」

    「……んっ……こうやって抱き合ってると……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに%CALLNAME:MASTER%の肩に顔を埋めた。

    「……心臓の音、聞こえちゃいますよね……速くて、恥ずかしい……」

    %CALLNAME:人物_美鈴%は照れた声で呟いた。

    「……%CALLNAME:MASTER%のも、聞こえます……」

    %CALLNAME:人物_美鈴%は嬉しそうに微笑んだ。

    「……同じくらい速くて……なんだか、安心します」

    「は、はぅ……向かい合ってると、視線が合っちゃって……」

    %CALLNAME:人物_美鈴%は恥ずかしさに目を逸らそうとした。

    でも、すぐに%CALLNAME:MASTER%の顔に視線が戻ってしまう。

    「……%CALLNAME:MASTER%……見つめないでください……」

    %CALLNAME:人物_美鈴%は懇願するように言った。

    「……でも……本当は……目を逸らしたくない、です……」

    矛盾した言葉に、恋心が透けて見えた。
