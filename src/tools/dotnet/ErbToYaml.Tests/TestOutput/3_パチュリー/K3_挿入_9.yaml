character: パチュリー
situation: K3_挿入
entries:
- id: fallback
  content: >-
    「……っ……あ……」

    %CALLNAME:TARGET%は背を向けたまま、%CALLNAME:MASTER%を受け入れている。

    顔を見られないことに、どこか安堵している自分がいた。

    「……%CALLNAME:MASTER%、私の背中……見ているの……？」

    %CALLNAME:TARGET%は肩越しに振り返ろうとして、やめた。

    「……見ていていいわ。あなたには、全てを見せているのだから」

    「はぁ……んっ……深い……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に背を預けながら、小さく喘いだ。

    大図書館の静寂の中、体温が背中に伝わってくる。

    「……この体位、顔を見なくていいのね……」

    %CALLNAME:TARGET%は少し寂しそうに呟いた。

    「……でも、あなたの体温を感じられるわ。それで十分」

    「ぁ……んん……っ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに合わせて、体を揺らしている。

    背中越しに伝わる鼓動が、二人を繋いでいる。

    「……%CALLNAME:MASTER%……後ろから抱いて……」

    %CALLNAME:TARGET%は珍しく甘えた声を出した。

    「……顔を見せなくていいなら、少しだけ素直になれる気がする」

    「……ふぅ……あ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に背中を預けながら、満ち足りた表情を浮かべている。

    「……体が弱いから、もたれかかれる体位は楽でいいわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕に手を重ねた。

    「……こうしていると、守られている気がする」

    そう言って、%CALLNAME:TARGET%は%CALLNAME:MASTER%の手を胸元に引き寄せた。
  priority: 4
- id: talent_3_1
  content: >-
    「っ……あ……入って……」

    %CALLNAME:TARGET%は背を向けたまま、%CALLNAME:MASTER%を受け入れている。

    「……この体位は、顔を見られなくて済むわ」

    %CALLNAME:TARGET%は安堵したように呟いた。

    「……表情を分析されなくていいから……少しだけ、楽」

    頬を紅潮させながらも、%CALLNAME:TARGET%は素直に感想を漏らした。

    「んっ……ふ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに、体を強張らせている。

    「……本では、背面位は深く入ると書いてあったけれど……」

    %CALLNAME:TARGET%は知識を確認するように呟いた。

    「……むきゅ……本当だったのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕にしがみついた。

    「あ……やぁ……そんなに奥まで……」

    %CALLNAME:TARGET%は思わず声を漏らし、慌てて口を押さえた。

    「……背を向けていても、声は聞こえるのね……」

    %CALLNAME:TARGET%は今更ながらに気づいた。

    「……%CALLNAME:MASTER%、今のは聞かなかったことに……」

    照れ隠しのように、%CALLNAME:TARGET%は小さく呟いた。

    「……ん……ぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に背を預けながら、静かに喘いでいる。

    「……私の背中、どう見えているのかしら……」

    %CALLNAME:TARGET%は自分では見えない部分を気にしている。

    「……変な格好になっていないか、教えて……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕を握りしめた。
