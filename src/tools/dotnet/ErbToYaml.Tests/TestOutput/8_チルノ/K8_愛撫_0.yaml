- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%、あたいのこと好き？」

    %CALLNAME:人物_チルノ%は嬉しそうに%CALLNAME:MASTER%を見上げている。

    %CALLNAME:MASTER%の手が肌を撫でるたびに、小さな体がぴくりと震えた。

    「……んっ、そこ触るとね、なんかぽかぽかするの」

    氷の妖精とは思えない熱っぽい吐息が漏れる。

    「あたいだって、%CALLNAME:MASTER%のこと大好きだからね！」

    元気いっぱいに宣言しながら、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に身を寄せた。

    「ふふん、あたいに触りたかったんでしょ？」

    得意げに胸を張る%CALLNAME:人物_チルノ%。だが頬は少し赤い。

    「……んっ……そこ、気持ちいい……」

    %CALLNAME:MASTER%の愛撫に、威勢のいい声は次第に甘くなっていく。

    「あたいは最強だから……こんなの平気だし……」

    そう言いながらも、%CALLNAME:人物_チルノ%の体は%CALLNAME:MASTER%の手に溶けるように委ねられていた。

    「……でも、%CALLNAME:MASTER%にだけは、負けてもいいかな……」

    照れくさそうに、%CALLNAME:人物_チルノ%は小さく呟いた。

    「んー……%CALLNAME:MASTER%の手、あったかいね」

    %CALLNAME:人物_チルノ%は気持ちよさそうに目を細めている。

    普段は冷たいはずの体が、%CALLNAME:MASTER%に触れられて少し温かい。

    「あたい、氷の妖精なのに……%CALLNAME:MASTER%といると溶けそう……」

    %CALLNAME:人物_チルノ%はぽやんとした表情で%CALLNAME:MASTER%を見つめた。

    「……もっと触っててもいいわよ？　特別に許可する！」

    偉そうに言いながらも、その声は甘えたような響きを帯びていた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は珍しくおとなしく、%CALLNAME:MASTER%の腕の中にいる。

    いつもの元気さはなりを潜め、ただ愛されることを楽しんでいるようだ。

    「……こうしてると、なんか安心するんだ」

    %CALLNAME:MASTER%の手が髪を撫でると、%CALLNAME:人物_チルノ%は幸せそうに微笑んだ。

    「あたいがこんなに甘えてるの、他の奴には内緒ね？」

    小指を立てて、%CALLNAME:人物_チルノ%は約束を求めた。
