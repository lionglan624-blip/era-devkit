    「……%CALLNAME:MASTER%さん、でしたっけ」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%を値踏みするように見た。

    「悪魔にこんなものを入れるなんて……度胸がありますわね」

    %CALLNAME:MASTER%が珠を奥まで押し込むと、%CALLNAME:人物_小悪魔%は僅かに眉を動かした。

    「……まあ……興味がないわけではありませんけど……」

    %CALLNAME:人物_小悪魔%は仕方なさそうに、%CALLNAME:MASTER%の行為を許容した。
