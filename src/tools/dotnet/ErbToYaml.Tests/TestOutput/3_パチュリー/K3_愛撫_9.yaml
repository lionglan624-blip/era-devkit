- id: talent_3_1
  content: >-
    「っ……何を……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が胸に顔を埋めてきたことに驚いた。

    しかし、抵抗するどころか、自ら胸を差し出すように体を反らせた。

    「……吸いたいなら、吸いなさい。研究の一環よ」

    %CALLNAME:TARGET%は頬を染めながら、言い訳するように呟いた。

    「……でも、優しくしてね」

    「あ……ん……そんなに強く……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に乳首を吸われ、思わず声を漏らした。

    「……感じてなんかないわ。ただ、体が敏感なだけよ」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らした。

    「……%CALLNAME:MASTER%……もう少しだけ……続けてもいいわよ」

    そう言って、%CALLNAME:TARGET%は%CALLNAME:MASTER%の頭を引き寄せた。

    「……ふぁ……っ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の舌使いに、身を震わせた。

    「こ、こんなこと……本には書いてなかったわ……」

    %CALLNAME:TARGET%は動揺を隠すように、淡々と言おうとしたが、声が震えている。

    「……あなたの口、温かい……もう少し、感じさせて」

    %CALLNAME:TARGET%は小さく呟いた。

    「んっ……やぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に吸われながら、小さく喘いでいる。

    手元の魔導書が、いつの間にか床に落ちている。

    「……%CALLNAME:MASTER%、あなたのせいで集中できないじゃない」

    %CALLNAME:TARGET%は恨めしそうに、でもどこか嬉しそうに言った。

    「……責任、取ってもらうわよ」
