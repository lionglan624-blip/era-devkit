entries:
- id: fallback
  content: >-
    「んぅ……%CALLNAME:MASTER%、うしろから……あたしのこと、ほしいの……？」

    %CALLNAME:TARGET%は四つん這いになりながら、嬉しそうに振り返った。

    悪魔の尻尾がゆらゆらと揺れ、%CALLNAME:MASTER%を誘っている。

    「いいよ……あたし、%CALLNAME:MASTER%になら……ぜんぶ、あげる……」

    %CALLNAME:TARGET%は自ら腰を持ち上げ、%CALLNAME:MASTER%を受け入れやすくした。

    「んっ……奥まで、きて……あたしの中、%CALLNAME:MASTER%でいっぱいにして……」

    サキュバスの本能が騒ぎ、%CALLNAME:TARGET%は甘く%CALLNAME:MASTER%を求めていた。

    「ふぁ……この体勢……なんか、けものみたい……」

    %CALLNAME:TARGET%は頬を染めながら、%CALLNAME:MASTER%に尻を向けている。

    悪魔の少女の体は期待に震え、蜜が溢れ始めていた。

    「でも……%CALLNAME:MASTER%とだから……うれしい……」

    %CALLNAME:TARGET%は恥じらいながらも、%CALLNAME:MASTER%を待ち受けている。

    「はやく……あたしの中、あつくして……だいすき……」

    愛情と本能が混ざり合い、%CALLNAME:TARGET%は%CALLNAME:MASTER%を切望していた。

    「あっ……%CALLNAME:MASTER%の、入ってきた……おくまで……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を受け入れ、背中を反らせた。

    四つん這いの姿勢で、悪魔の少女は%CALLNAME:MASTER%に全てを預けている。

    「んっ……きもちいい……この体勢、すき……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに合わせて腰を揺らした。

    「もっと……つよくしても、いいよ……あたし、%CALLNAME:MASTER%のもの、だから……」

    サキュバスの血が騒ぎ、%CALLNAME:TARGET%は激しく%CALLNAME:MASTER%を求めていた。

    「んっ……はぁ……%CALLNAME:MASTER%、うしろから、あたしのこと、見てる……？」

    %CALLNAME:TARGET%は四つん這いのまま、恥じらうように振り返った。

    悪魔の瞳が潤み、愛おしそうに%CALLNAME:MASTER%を見つめている。

    「あたし……%CALLNAME:MASTER%に見られてると……どきどきする……」

    %CALLNAME:TARGET%は尻を高く持ち上げ、%CALLNAME:MASTER%を誘った。

    「ね……いっぱい、あたしのこと、かわいがって……えへへ……」

    無邪気な笑顔と悪魔の色香が混じり合い、%CALLNAME:TARGET%は%CALLNAME:MASTER%を魅了していた。
