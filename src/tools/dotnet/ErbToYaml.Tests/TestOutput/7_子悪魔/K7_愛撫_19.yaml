- id: fallback
  content: >-
    「いやです……そんなの、何に使うんですか……黒くて、怖い……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したニプルキャップを見て、後ずさりした。

    「……えっ、おっぱいに付ける……？　いやっ……！」

    しかし逃げ場がなく、ニプルキャップが乳首に装着されてしまう。

    「ひゃあっ……！？　やっ、やめて……震えて……乳首が、止まらない……！」

    振動が始まり、%CALLNAME:TARGET%は涙目になって%CALLNAME:MASTER%に懇願した。

    「……咲夜さん、助けて……おっぱいが、びりびりして……」

    「な、何ですかそれ……近づけないでください……！」

    %CALLNAME:TARGET%は恐怖で体を強張らせている。

    「……そんなの……おっぱいに付ける……？　いやです……！」

    しかし%CALLNAME:MASTER%に押さえつけられ、ニプルキャップが乳首に装着されてしまう。

    「やっ……んっ……！？　な、何これ……震えて……乳首が、ずっとびりびりして……！」

    %CALLNAME:TARGET%は初めての感覚にパニックになりながら、涙を溢れさせた。

    「お願いです……外して……おっぱいが、変になっちゃう……」

    「……っ」

    %CALLNAME:TARGET%はニプルキャップを見て、言葉も出ないほど怯えていた。

    声を上げる間もなく、ニプルキャップが乳首に装着される。

    「ひぁっ……！　んっ……やっ……震えて……乳首が、ずっと……！」

    妖精の小さな体が、絶え間ない振動に翻弄されている。

    「……どうして……おっぱいに……こんなもの……」

    %CALLNAME:TARGET%は理解できないまま、逃げられない刺激に震えていた。

    「あたし……何か悪いことしましたか……」

    %CALLNAME:TARGET%は泣きそうな顔で%CALLNAME:MASTER%を見上げた。

    「こんな……おっぱいに……震えるやつを……」

    ニプルキャップが乳首に装着され、振動が妖精の体を責め始める。

    「んっ……あぁっ……！　乳首が、ずっとびりびりして……逃げられない……！」

    %CALLNAME:TARGET%は抵抗する力も失い、振動に蹂躙されている。

    「……もう……どうにでも、してください……」
  priority: 1
