- id: fallback
  content: >-
    %CALLNAME:MASTER%が搾乳機を取り出すと、%CALLNAME:TARGET%は怪訝な表情を浮かべた。

    「……それは何ですの。見たことのない機械ですわね」

    用途を察した%CALLNAME:TARGET%は、冷ややかな視線を向けた。

    「……お客様、それを私に使おうというおつもり？」

    %CALLNAME:TARGET%の声は冷静だが、僅かに動揺が見え隠れしていた。

    「……まあ、メイドとしてのおもてなしの範囲内なら……」

    「っ……これは……」

    搾乳機が装着された瞬間、%CALLNAME:TARGET%は小さく驚いた。

    「……乳首を吸うタイプ……」

    %CALLNAME:TARGET%は戸惑いながらも、すぐには振り払わなかった。

    「変な使い方をしないでくださいまし……もう手遅れですけれど」

    %CALLNAME:TARGET%は皮肉めいた口調で言いながら、吸引を耐えている。

    「……ん……」

    搾乳機の吸引に、%CALLNAME:TARGET%は僅かに眉をひそめた。

    「……悪くはありませんわね……いえ、そういう意味ではなく……」

    %CALLNAME:TARGET%は慌てて言い訳しながらも、声が僅かに上ずっている。

    「……お客様の相手も、メイドの務めですから」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    搾乳機が%CALLNAME:TARGET%の乳首を吸い続けている。

    「……」

    %CALLNAME:TARGET%は無言で吸引を受け止め、表情を変えまいと努めていた。

    「……%CALLNAME:MASTER%、それで満足ですの」

    %CALLNAME:TARGET%は淡々と問いかけながらも、声には僅かな震えがあった。

    「……早く終わらせてくださいまし」
