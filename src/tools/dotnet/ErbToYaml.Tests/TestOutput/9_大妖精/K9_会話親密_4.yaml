    %CALLNAME:TARGET%は驚きながらも、そっと%CALLNAME:MASTER%に抱き返した。

    「…もう、急に甘えん坊さんなんだから…」

    頬を赤く染めながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%の背中に手を添えた。

    「…あったかいね…こういうの、嬉しいの…」

    控えめな声でそう言って、%CALLNAME:TARGET%は照れくさそうに微笑んだ。

    「あ…%CALLNAME:MASTER%？」

    %CALLNAME:MASTER%に抱きしめられて、%CALLNAME:TARGET%は一瞬固まった。

    「…もう、いきなりなんだから…」

    だが、その声は嬉しそうに揺れている。

    %CALLNAME:TARGET%は照れながらも、%CALLNAME:MASTER%の体に身を預けた。

    「…あったかいね、%CALLNAME:MASTER%って…」

    %CALLNAME:TARGET%は恥ずかしそうに、でも幸せそうに%CALLNAME:MASTER%の胸に頬を寄せた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の小さな体を後ろから抱きしめた。

    「ひゃっ…！ %CALLNAME:MASTER%…？」

    %CALLNAME:TARGET%の耳がみるみる赤くなっていく。

    「…も、もう…こういうの、恥ずかしいよ…」

    そう言いながらも、%CALLNAME:TARGET%は離れようとはしなかった。

    「…でも…嬉しい…かも…」

    %CALLNAME:TARGET%は小声でそう呟いて、%CALLNAME:MASTER%の腕にそっと手を重ねた。

    「あの、%CALLNAME:MASTER%…」

    %CALLNAME:TARGET%が何か言いかけた時、%CALLNAME:MASTER%は%CALLNAME:TARGET%を抱きしめた。

    「わわっ…！？」

    %CALLNAME:TARGET%は言葉を失って、顔を真っ赤にした。

    「…もう、突然すぎるよ…」

    だが、%CALLNAME:TARGET%の背中の羽は嬉しそうにはためいている。

    「…ふふ、%CALLNAME:MASTER%の匂い…落ち着くの…」

    %CALLNAME:TARGET%は恥ずかしそうにしながらも、%CALLNAME:MASTER%の胸に顔を埋めた。
