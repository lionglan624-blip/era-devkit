    %CALLNAME:TARGET%は幸せそうに微笑み、自ら腰を動かし始めた。

    「あたしね……%CALLNAME:MASTER%のために、いっぱいうごく……だいすき……」

    サキュバスの本能と愛情が混ざり合い、%CALLNAME:TARGET%は甘く%CALLNAME:MASTER%を求めていた。

    「%CALLNAME:MASTER%……あたしがぜんぶ、する……まかせて……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に手を置き、腰を上下させている。

    悪魔の尻尾がゆらゆらと揺れ、%CALLNAME:TARGET%は一生懸命に腰を振っていた。

    「あっ……ん……あたしがうごくと……%CALLNAME:MASTER%、きもちいい……？」

    %CALLNAME:TARGET%は額に汗を浮かべながら、%CALLNAME:MASTER%を見つめた。

    「いっぱい……あたしの中に、だして……？　あたし、ぜんぶ、もらう……」

    愛情と献身に満ちた笑顔で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を締め付けていった。

    「んっ……%CALLNAME:MASTER%の、おくまで……あたしの中、あつい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上で腰を揺らしながら、恍惚とした表情を浮かべている。

    悪魔の少女は自分のペースで%CALLNAME:MASTER%を味わい、甘い声を漏らしていた。

    「あたし……%CALLNAME:MASTER%のうえにいると……しあわせ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を取り、自分の胸に当てた。

    「ね……いっぱい、さわって……あたしのこと、かんじて……？」

    サキュバスの献身と愛が溢れ、%CALLNAME:TARGET%は%CALLNAME:MASTER%に全てを捧げていた。

    「ふぁ……%CALLNAME:MASTER%、あたしのこと、見て……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上で腰を動かしながら、愛おしそうに見下ろしている。

    悪魔の瞳が潤み、%CALLNAME:MASTER%への愛情で満ちていた。

    「あたしね……%CALLNAME:MASTER%が、きもちよさそうだと……うれしいの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の頬に手を添え、微笑んだ。

    「ずっと……あたし、%CALLNAME:MASTER%のうえで……こうしてたい……えへへ……」

    無邪気な笑顔と悪魔の色香が混じり合い、%CALLNAME:TARGET%は%CALLNAME:MASTER%を魅了していた。
