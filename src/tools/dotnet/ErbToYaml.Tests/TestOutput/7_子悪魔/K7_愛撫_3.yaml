- id: fallback
  content: >-
    「ひゃっ……！　な、なに……！？」

    %CALLNAME:TARGET%は驚いて身を引いた。

    %CALLNAME:MASTER%の手がお尻に触れていることに気づき、顔を真っ赤にしている。

    「そ、そんなとこ触らないでください……！」

    %CALLNAME:TARGET%は慌てて距離を取ろうとしている。

    「……咲夜さんに言いつけますよ……！」

    妖精は怯えながら、%CALLNAME:MASTER%を警戒していた。

    「え、えっと……%CALLNAME:MASTER%……？」

    %CALLNAME:TARGET%は困惑した表情で立ち尽くしている。

    「……どうしてお尻なんか触るんですか……」

    %CALLNAME:TARGET%は理解できないという顔で%CALLNAME:MASTER%を見上げた。

    「……あたし、何か悪いことしました……？」

    不安そうな瞳で、%CALLNAME:TARGET%は%CALLNAME:MASTER%の真意を探っていた。

    「ちょ、ちょっと……！」

    %CALLNAME:TARGET%は驚いてお尻を押さえた。

    「いきなりそんなとこ触らないでください……！」

    %CALLNAME:TARGET%は抗議の声を上げながら、%CALLNAME:MASTER%から距離を取った。

    「……もう、びっくりしたの……」

    妖精は警戒しながら、%CALLNAME:MASTER%を見つめている。

    「……そういうのは、もっと仲良くなってから……」

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の手を見つめている。

    何が起きているのか分からない様子だ。

    「……あの、%CALLNAME:MASTER%……何がしたいの……？」

    %CALLNAME:TARGET%は困惑した表情で首を傾げた。

    「……あたし、お尻触られるの、よくわからないです……」

    妖精は不思議そうに、%CALLNAME:MASTER%の反応を待っていた。
