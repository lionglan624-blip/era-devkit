    「%CALLNAME:MASTER%さんって……変な趣味をお持ちですわね……」

    %CALLNAME:人物_小悪魔%はため息混じりに自らの体を弄り始めた。

    「……んっ……見て満足ですの……？」

    %CALLNAME:人物_小悪魔%は冷めた目で%CALLNAME:MASTER%を見ている。

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の言葉に眉をひそめた。

    「……悪魔の自慰が見たい……ですの……」

    「……まあいいですわ。さっさと終わらせましょう……」

