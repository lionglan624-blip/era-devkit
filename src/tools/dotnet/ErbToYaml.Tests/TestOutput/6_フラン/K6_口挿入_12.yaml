- id: fallback
  content: >-
    「……ここを、舐めてほしいの？」

    %CALLNAME:人物_フラン%は首を傾げながら、%CALLNAME:MASTER%の秘所を見つめた。

    地下室で過ごした長い年月、こんな行為のことは知らなかった。

    「ふぅん……変なこと考えるのさ、%CALLNAME:MASTER%って……」

    %CALLNAME:人物_フラン%は興味本位で舌を伸ばし、そっと舐めてみた。

    「……こうすると……喜ぶんだ……不思議なのさ……」

    その声には、純粋な好奇心だけがあった。

    「%CALLNAME:MASTER%……私、こういうことよく知らないのさ……」

    %CALLNAME:人物_フラン%は正直に告白しながら、言われた通りに舌を動かしていた。

    495年の隔離生活で、世間の男女のことは何も知らない。

    「でも……%CALLNAME:MASTER%が教えてくれるなら……」

    %CALLNAME:人物_フラン%はぎこちなく、それでも一生懸命に舐め続けた。

    「……ここ？　……もっと強く？　……わかった……」

    素直に従う姿に、かつての凶暴さは見られなかった。

    「なんだか……変な気分になってきた……」

    %CALLNAME:人物_フラン%は舌を動かしながら、自分の変化に戸惑っていた。

    %CALLNAME:MASTER%を舐めていると、胸の奥がざわざわする。

    「……これって、どういう気持ちなの……？」

    %CALLNAME:人物_フラン%は無自覚のまま、より深く舌を差し入れた。

    「……%CALLNAME:MASTER%のこと、もっと知りたくなってきたのさ……」

    その言葉は、芽生え始めた恋心の表れだった。

    「……%CALLNAME:MASTER%といると、不思議な気持ちになるのさ」

    %CALLNAME:人物_フラン%はぼんやりと呟きながら、舌を動かし続けていた。

    こうして誰かに触れていたいという気持ちが、胸の中で膨らんでいく。

    「私……%CALLNAME:MASTER%のことは、傷つけたくないの……」

    %CALLNAME:人物_フラン%は真剣な表情で%CALLNAME:MASTER%を見つめた。

    「……だから、優しくするのさ……こうして、ずっと……」

    悪魔の妹は、初めての感情に戸惑いながらも向き合っていた。
  priority: 2
- id: fallback
  content: >-
    「……こんなところを舐めろって言うの？」

    %CALLNAME:人物_フラン%は冷めた目で%CALLNAME:MASTER%を見つめた。

    その視線には、警戒と不快感が入り混じっている。

    「……まぁ、言われたからやるけど……」

    %CALLNAME:人物_フラン%は気怠そうに舌を伸ばした。

    「……さっさと終わらせるからね……」

    義務的な動きで、最低限の奉仕をするだけだった。

    「……ふぅん……」

    %CALLNAME:人物_フラン%は興味なさそうに舌を動かしていた。

    その表情には、退屈さが滲み出ている。

    「……こういうの、何が楽しいの……？」

    %CALLNAME:人物_フラン%は投げやりな質問を投げかけた。

    「……まぁ、いいけど……あんたが喜ぶなら……」

    そこに愛情は欠片もなかった。

    「……」

    %CALLNAME:人物_フラン%は無言で舌を動かしていた。

    その紅い瞳は、どこか虚ろに%CALLNAME:MASTER%を見ている。

    「……お姉さまが見たら、なんて言うかな……」

    %CALLNAME:人物_フラン%はぽつりと呟いた。

    「……でも、私はどうでもいいのさ……」

    悪魔の妹は、心をどこかに置き去りにしていた。

    「……これで満足……？」

    %CALLNAME:人物_フラン%は退屈そうに舌を動かしながら、問いかけた。

    噛みちぎってしまおうかという衝動が、一瞬頭をよぎる。

    「……別に、壊してもいいんだけど……」

    %CALLNAME:人物_フラン%は危険な微笑みを浮かべた。

    「……今日のところは、やめておいてあげる……」

    その言葉には、狂気の残滓が垣間見えた。
  priority: 1
