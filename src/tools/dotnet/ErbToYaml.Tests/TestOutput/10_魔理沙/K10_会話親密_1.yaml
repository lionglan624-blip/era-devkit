character: 魔理沙
situation: K10_会話親密
entries:
- id: fallback
  content: >-
    「――おっ、%CALLNAME:MASTER%がお茶を淹れてくれたのか？　嬉しいぜ」

    %CALLNAME:TARGET%は満面の笑みで湯飲みを受け取った。

    ふーふー、と息を吹きかけてから、ずず、と音を立ててお茶を啜る。

    「……ん、美味いぜ。%CALLNAME:MASTER%、腕上げたな」

    %CALLNAME:TARGET%は満足げに目を細めた。

    「……こうやって二人でお茶飲む時間、なんか落ち着くんだよな」

    照れくさそうに頬を掻きながら、%CALLNAME:TARGET%はそっと%CALLNAME:MASTER%に寄り添った。

    「お、私にお茶？　気が利くじゃないか」

    %CALLNAME:TARGET%は軽口を叩きながらも、嬉しそうに湯飲みを手に取った。

    ずずず、と音を立ててお茶を啜る。

    「……うん、美味しいぜ。%CALLNAME:MASTER%の淹れたお茶、好きなんだ」

    %CALLNAME:TARGET%は言ってから、自分の言葉に照れて視線を逸らした。

    「……べ、別に深い意味はないからな！　ただのお茶の感想だぜ」

    顔を赤くしながらも、%CALLNAME:TARGET%は幸せそうにお茶を飲み続けた。

    「――ん……」

    %CALLNAME:TARGET%は差し出された湯飲みを見て、ふわりと微笑んだ。

    「%CALLNAME:MASTER%、今日はなんだか優しいな」

    そう言いながら、ゆっくりとお茶を受け取る。

    「……いい香りだ。%CALLNAME:MASTER%、お茶淹れるの上手くなったな」

    湯気の立つ湯飲みに顔を近づけ、%CALLNAME:TARGET%は幸せそうに目を閉じた。

    「……魔法の研究で疲れても、%CALLNAME:MASTER%のお茶があれば頑張れるぜ」

    普通の魔法使いは、恋人の心遣いに胸を温かくしていた。

    「あ、ありがとう」

    %CALLNAME:TARGET%は嬉しそうに湯飲みを受け取った。

    そっと口をつけ、ゆっくりとお茶を味わう。

    「……%CALLNAME:MASTER%って、本当に気が利くよな」

    %CALLNAME:TARGET%は照れくさそうに笑う。

    「……ふふ、なんだか、恋人に世話焼いてもらってるみたいで嬉しいぜ」

    その言葉に自分で気づいて、%CALLNAME:TARGET%は帽子のつばを下げて顔を隠した。

    「……死ぬまで、こうやってお茶淹れてくれよな」
  priority: 4
- id: talent_3_1
  content: >-
    「――へぇ、%CALLNAME:MASTER%がお茶を？　珍しいじゃないか」

    %CALLNAME:TARGET%は少し驚いた顔で湯飲みを受け取った。

    ふーふー、と息を吹きかけてから、そっと口をつける。

    「……ん、悪くないな。なかなかやるじゃないか」

    %CALLNAME:TARGET%は素っ気なく言ったが、その表情はどこか嬉しそうだ。

    「……また、淹れてくれよな。待ってるぜ」

    小さな声で呟いてから、%CALLNAME:TARGET%は慌てて視線を逸らした。

    「お、お茶？　ありがとうな」

    %CALLNAME:TARGET%は少し照れながら湯飲みを手に取った。

    ずず、と音を立ててお茶を啜る。

    「……うん、美味いぜ。%CALLNAME:MASTER%って、こういうの得意なのか？」

    %CALLNAME:TARGET%はちらりとこちらを見ながらそう言った。

    「……私も紅茶なら淹れられるけどな。今度、勝負してやるぜ」

    張り合うように言いながらも、%CALLNAME:TARGET%はお茶を大事そうに飲んでいた。

    「わ、私に……？」

    %CALLNAME:TARGET%は少し戸惑いながらも、湯飲みを受け取る。

    両手で湯飲みを包み込み、じっと見つめる。

    「……%CALLNAME:MASTER%、いつもこうやって……」

    何か言いかけて、%CALLNAME:TARGET%は言葉を飲み込んだ。

    「……ありがとう。美味いぜ」

    心の中の想いを隠すように、%CALLNAME:TARGET%はゆっくりとお茶を啜った。

    「あら……じゃなかった、お……」

    %CALLNAME:TARGET%は差し出された湯飲みに、思わず顔がほころんだ。

    「……ふふ、私にお茶を差し入れてくれるなんてな」

    そう言いながら、ありがたそうにお茶を受け取る。

    「……うん、あったかい」

    %CALLNAME:TARGET%はお茶を飲みながら、%CALLNAME:MASTER%の横顔をちらりと見た。

    「……%CALLNAME:MASTER%って、なんか……いいよな」

    その言葉の意味は、本人にもよくわかっていなかった。
  priority: 3
