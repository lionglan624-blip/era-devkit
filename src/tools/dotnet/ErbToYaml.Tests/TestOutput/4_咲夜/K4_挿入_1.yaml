entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……この体勢は……少し恥ずかしいですわ……」

    %CALLNAME:TARGET%は四つんばいの姿勢で、頬を染めながら振り返った。

    「まるで獣のよう……ですけれど……」

    「貴方になら……こんな姿も見せられますわ……」

    %CALLNAME:MASTER%が後ろから腰を進めると、%CALLNAME:TARGET%は甘い声を漏らした。

    「あ……んっ……奥まで……届いて……」

    「もっと……激しくしても……構いませんのよ……」

    「ふぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は腰を高く上げ、%CALLNAME:MASTER%を受け入れていた。

    「こうして……後ろから抱かれていると……」

    「貴方に支配されているような気持ちになりますわ……」

    %CALLNAME:MASTER%の動きに合わせて、%CALLNAME:TARGET%の体が前後に揺れる。

    「あ……深い……気持ちいい……」

    「瀟洒なんて……今は……どうでもいいですわ……」

    「……んぅ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%はシーツを握りしめながら、後ろを向いた。

    「この体勢……すごく深く入りますのね……」

    %CALLNAME:MASTER%が腰を打ち付けるたび、%CALLNAME:TARGET%の喘ぎが大きくなる。

    「あっ……そこ……当たって……」

    「完璧でなくても……いいですわ……」

    「今は……ただ……貴方を感じていたいの……」

    「……あ……%CALLNAME:MASTER%、もっと強く……」

    %CALLNAME:TARGET%は自ら腰を後ろに押し付けていた。

    「こんな……はしたない姿……貴方にしか見せられませんわ……」

    「ん……あぁ……奥が……とろけそう……」

    %CALLNAME:MASTER%が激しく動くと、%CALLNAME:TARGET%は声を抑えられなくなる。

    「%CALLNAME:MASTER%……好き……ですわ……」

    完璧なメイドは、恋人の腕の中で獣のように乱れていた。
