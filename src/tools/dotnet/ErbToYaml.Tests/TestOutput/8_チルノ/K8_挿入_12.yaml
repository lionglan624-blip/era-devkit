    「う、うるさいわね……あたいの声なんか……聞かないでよ……」

    恥ずかしさを隠すように、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の胸に顔を埋めた。

    「前と後ろ……両方から……なんて……初めて……」

    %CALLNAME:人物_チルノ%は戸惑いながらも、感覚を確かめていた。

    二つの快感が混ざり合い、思考がぼんやりとしていく。

    「こ、これくらい……あたいには余裕なんだから……っ」

    %CALLNAME:MASTER%が深く突くと、%CALLNAME:人物_チルノ%は体を反らせた。

    「あぁっ……！　%CALLNAME:MASTER%の方が……もっと奥まで……き、気のせいよ……！」

    素直になれない氷の妖精は、頬を真っ赤に染めていた。

    「あっ……二人の動き……揃ってないから……変な感じ……」

    %CALLNAME:人物_チルノ%は前後から異なるリズムで突かれていた。

    複雑な快感に、少女の強がりは早くも限界を迎えようとしている。

    「う……あたいは……最強……なのに……っ」

    二人が激しく動くと、%CALLNAME:人物_チルノ%はしがみつくしかなかった。

    「%CALLNAME:MASTER%……っ、ばか……こんなの……ずるい……よ……」

    涙目で恋人を見上げる姿には、普段の自信はなかった。
