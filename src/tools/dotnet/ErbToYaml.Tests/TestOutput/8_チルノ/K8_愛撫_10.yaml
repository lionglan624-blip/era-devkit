character: チルノ
situation: K8_愛撫
entries:
- id: fallback
  content: >-
    「えへへ……あたいの乳首、気持ちいい？」

    %CALLNAME:人物_チルノ%は嬉しそうに%CALLNAME:MASTER%に胸を差し出した。

    「あたいは最強だから、%CALLNAME:MASTER%を満足させるなんて簡単なのよ」

    %CALLNAME:MASTER%の舌が乳首を這うたびに、小さな体がぴくりと跳ねる。

    「……んっ……そこ、もっと舐めて……」

    氷の妖精とは思えない熱っぽい声で、%CALLNAME:人物_チルノ%はおねだりした。

    「あたいの体、%CALLNAME:MASTER%だけのものなんだからね！」

    「ふふん、あたいの胸に夢中なんでしょ？」

    %CALLNAME:人物_チルノ%は得意げに笑った。

    「ちっちゃいけど……%CALLNAME:MASTER%は大好きなんだもんね」

    %CALLNAME:MASTER%が乳首を舌で転がすと、%CALLNAME:人物_チルノ%の息が乱れる。

    「やっ……そこ弱いってば……」

    強がりながらも、その声には甘えが滲んでいた。

    「……もっとしていいよ。%CALLNAME:MASTER%にだけは、全部見せてあげる」

    「ね、%CALLNAME:MASTER%……あたいの乳首、美味しい？」

    %CALLNAME:人物_チルノ%は甘えた声で尋ねた。

    「氷の妖精だから、きっとひんやりして気持ちいいでしょ」

    %CALLNAME:MASTER%が吸い付く感触に、%CALLNAME:人物_チルノ%は目を細めた。

    「んぅ……そうやって吸われると、体がぽかぽかしてくる……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の頭を抱き寄せた。

    「%CALLNAME:MASTER%といると、あたい溶けちゃいそう……」

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は珍しく静かな声で%CALLNAME:MASTER%の名を呼んだ。

    「こうやって%CALLNAME:MASTER%に触られてると……すごく安心するの」

    %CALLNAME:MASTER%の唇が乳首に触れるたびに、幸福感が広がっていく。

    「あたいね……%CALLNAME:MASTER%に出会えて、よかったって思ってる」

    %CALLNAME:人物_チルノ%は照れくさそうに、でも幸せそうに微笑んだ。

    「……これ、他の奴には絶対言わないでね。最強の秘密だから」
  priority: 4
- id: talent_3_1
  content: >-
    「ひゃっ……！　そ、そこは……！」

    %CALLNAME:人物_チルノ%は驚いて身を震わせた。

    「い、いきなり乳首なんか……恥ずかしいんだからね……」

    しかし%CALLNAME:MASTER%を押しのけようとはせず、顔を真っ赤にしている。

    「……べ、別に嫌じゃないけど……こんなの初めてだから……」

    %CALLNAME:人物_チルノ%は戸惑いながらも、%CALLNAME:MASTER%の愛撫を受け入れた。

    「んっ……やぁ……そんなに舐めたら……」

    %CALLNAME:人物_チルノ%は甘い声を抑えきれずにいた。

    「%CALLNAME:MASTER%……あたいのこと、好きでこんなことしてるの……？」

    不安と期待が入り混じった瞳で%CALLNAME:MASTER%を見つめる。

    「……そうだったら……嬉しいかも……」

    %CALLNAME:人物_チルノ%は小さな声で本音を漏らした。

    「あっ……んん……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に身を預けた。

    「%CALLNAME:MASTER%の馬鹿……あたいをこんな気持ちにさせて……」

    文句を言いながらも、その声には嬉しさが滲んでいた。

    「……もう、好きにしなさいよね」

    %CALLNAME:人物_チルノ%は観念したように目を閉じた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は熱っぽい目で%CALLNAME:MASTER%を見た。

    「あたいの胸……そんなに気に入った……？」

    恥ずかしそうに尋ねながら、%CALLNAME:人物_チルノ%の心臓は早鐘を打っている。

    「……%CALLNAME:MASTER%がそんなに夢中になってくれると……悪い気しないよ」

    %CALLNAME:人物_チルノ%は照れくさそうに視線を逸らした。
