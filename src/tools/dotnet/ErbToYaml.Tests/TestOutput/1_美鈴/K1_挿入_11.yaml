    「す、すみません……変な声……」

    二穴を同時に責められる刺激に、体が勝手に反応してしまう。

    「……こんなところで……感じるなんて……」

    %CALLNAME:人物_美鈴%は戸惑いながらも、状況を受け入れていた。

    「……%CALLNAME:MASTER%は……私をどうしたいのですか……」

    「……二人に……挟まれて……」

    %CALLNAME:人物_美鈴%は複雑な表情を浮かべた。

    「……こんな体勢……想像したこともありませんでした……」

    %CALLNAME:人物_美鈴%は小さく息を吐いた。

