character: フラン
situation: K6_口挿入
entries:
- id: fallback
  content: >-
    「ねえ、%CALLNAME:MASTER%……ここに、口づけしてもいい……？」

    %CALLNAME:人物_フラン%は恋人の秘所を前に、紅い瞳を潤ませた。

    最も秘められた場所に許されることへの喜びが、表情に滲んでいる。

    「んっ……%CALLNAME:MASTER%の匂い……好き……」

    %CALLNAME:人物_フラン%はそっと舌を伸ばし、愛しむように舐め始めた。

    「壊したくないから……優しく、するね……ちゅ、れろ……」

    495年の孤独を知る少女は、壊すことなく愛せる喜びに浸っていた。

    「%CALLNAME:MASTER%のここ……こんなに濡れてるの……私のせい……？」

    %CALLNAME:人物_フラン%は嬉しそうに微笑みながら、舌先で秘蜜を掬った。

    恋人を感じさせていることへの喜びが、紅い瞳に宿る。

    「ふふ……甘いのさ……もっと味わいたいな……」

    %CALLNAME:人物_フラン%は優しく舌を這わせ、丁寧に舐め上げた。

    「ねぇ……気持ちいい？　……うん、もっと頑張るね……」

    悪魔の妹は、恋人への奉仕に心から満たされていた。

    「こうして%CALLNAME:MASTER%を舐めてると……繋がってるって、感じるの」

    %CALLNAME:人物_フラン%は恋人の足の間で、幸せそうに奉仕していた。

    地下室の孤独を知る少女にとって、この親密さは何よりの証。

    「んっ……ここ、ぴくってしてる……敏感なところ、見つけたのさ」

    %CALLNAME:人物_フラン%は得意げに、その場所を重点的に舐めた。

    「%CALLNAME:MASTER%の全部を知りたいの……こうして、教えて……」

    その言葉には、純粋な愛情と繋がりへの渇望が込められていた。

    「%CALLNAME:MASTER%……大好き……こうしてる時が、一番幸せなのさ……」

    %CALLNAME:人物_フラン%は恋人の秘所に顔を埋めながら、恍惚の表情を浮かべた。

    紅い瞳は潤み、舌は止まることなく動き続ける。

    「んっ……れろ……%CALLNAME:MASTER%の味……覚えたの……」

    %CALLNAME:人物_フラン%は愛しむように、蜜壺の奥まで舌を伸ばした。

    「ねぇ……イっていいからね……？　全部、受け止めてあげる……」

    495年の孤独を超え、愛する人への献身に身を委ねていた。
  priority: 4
- id: talent_3_1
  content: >-
    「えっ……こ、ここを舐めるの……？」

    %CALLNAME:人物_フラン%は興味と戸惑いの入り混じった表情で、%CALLNAME:MASTER%の秘所を見つめた。

    おそるおそる舌先で触れると、その熱さと味に驚く。

    「わっ……熱い……それに、変な味……でも、嫌じゃないのさ……」

    %CALLNAME:人物_フラン%はぎこちなく舌を動かし始めた。

    「こ、こうすればいいの？　……%CALLNAME:MASTER%の顔、変わってる……」

    初めての経験に、%CALLNAME:人物_フラン%の頬は真っ赤に染まっていた。

    「ふぅん……%CALLNAME:MASTER%、私がここ舐めると、こんな声出すんだ……」

    %CALLNAME:人物_フラン%は面白そうに、舌の動きを変えてみる。

    強く吸ったり、優しく撫でたり、その反応を楽しんでいる。

    「ふふ……なんだか、%CALLNAME:MASTER%を支配してる気分なのさ」

    %CALLNAME:人物_フラン%はいたずらっぽく笑いながら、敏感な場所を舌先でつついた。

    「ねぇ……もっと乱れた顔、見せてよ……」

    その言葉には、独占欲と征服感が滲んでいた。

    「%CALLNAME:MASTER%のここ……私だけが知ってるんだよね……？」

    %CALLNAME:人物_フラン%は確認するように問いかけながら、舌を這わせていた。

    他の誰かに見せることを想像し、表情が少しだけ曇る。

    「……他の誰にも見せちゃダメだからね……私だけのなのさ……」

    %CALLNAME:人物_フラン%は独占を主張するように、深く舌を差し入れた。

    「ふふ……冗談だよ……半分だけ……」

    その冗談は、やはり冗談になりきれていなかった。

    「あっ……%CALLNAME:MASTER%、今びくってしたよね……」

    %CALLNAME:人物_フラン%は舌で触れた時の反応に、興味津々の様子だった。

    まるで新しい発見をした子供のように、目を輝かせている。

    「もっと舐めてあげようか？　私、%CALLNAME:MASTER%の好きなところ、覚えたいのさ」

    %CALLNAME:人物_フラン%は真剣な表情で、敏感な場所を探りながら舐め続けた。

    「ね……気持ちいいところ、もっと教えて……？」

    恋慕の少女は、愛しい人の全てを知りたがっていた。
