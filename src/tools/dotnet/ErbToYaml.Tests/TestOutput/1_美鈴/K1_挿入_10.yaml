- id: fallback
  content: >-
    「ん……%CALLNAME:MASTER%……背中、預けるね……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に背中を預けながら、後ろを貫かれていた。

    背面座位でアナルに受け入れる体勢は、相手への信頼がなければできない。

    「……顔は見えないけど……%CALLNAME:MASTER%の体温、感じるから……」

    %CALLNAME:人物_美鈴%は甘い吐息を漏らした。

    「……後ろから抱きしめて……離さないで……」

    武術家の引き締まった背中が、恋人の胸に完全に委ねられていた。

    「はぁ……ん……っ……深い……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の膝の上で、背中を反らせた。

    背面座位でアナルを突かれるたびに、甘い声が漏れる。

    「……この体勢、奥まで届いちゃう……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに呟いた。

    「……%CALLNAME:MASTER%の手……お腹に回して……」

    「……もっと、繋がってるって感じたいの……」

    「あっ……そこ……気持ちいい……」

    %CALLNAME:人物_美鈴%は自ら腰を動かし始めた。

    アナルでの快感に、体が素直に反応してしまう。

    「……恥ずかしいな……こんなところで腰振っちゃって……」

    %CALLNAME:人物_美鈴%は顔を赤らめながらも、動きを止めなかった。

    「……%CALLNAME:MASTER%に開発されちゃったから……仕方ないよね……」

    愛しい人のために体を動かす%CALLNAME:人物_美鈴%の姿があった。

    「……ふぅ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に体重を預けて、穏やかに息を吐いた。

    「……背中を向けてるから、%CALLNAME:MASTER%の顔が見えなくて寂しいけど……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の腕を自分の腰に誘導した。

    「……こうして抱きしめられてると……安心する……」

    「……私の体、好きに使っていいから……」

    全身で恋人への愛情を示していた。
