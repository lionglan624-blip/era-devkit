- id: fallback
  content: >-
    「……っ……これが、背面座位……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に背を向けたまま、受け入れている。

    「……本で読んだ通り、視覚情報が制限されるわね……」

    %CALLNAME:TARGET%は冷静を保とうとしているが、声が震えている。

    「……その分、他の感覚が……むきゅ……」

    分析しようとする言葉が、途切れ途切れになっている。

    「んっ……ふぅ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きを、感覚だけで捉えようとしている。

    「……興味深いわ。顔が見えないと、集中力が……」

    %CALLNAME:TARGET%は淡々と言おうとしたが、息が上がっている。

    「……なぜ、こんなに体が敏感になるのかしら……」

    自分の反応に、%CALLNAME:TARGET%自身が戸惑っている。

    「あ……そこ……っ」

    %CALLNAME:TARGET%は思わず声を漏らし、背を丸めた。

    「……不覚だわ。背を向けているから油断した……」

    %CALLNAME:TARGET%は恥ずかしそうに首を振った。

    「……%CALLNAME:MASTER%、私の背中を……あまり見ないで」

    そう言いながらも、体は正直に反応し続けている。

    「……」

    %CALLNAME:TARGET%は黙って%CALLNAME:MASTER%の行為を受けている。

    研究者として、異なる体位の感覚を比較しようとしている。

    「……%CALLNAME:MASTER%、質問があるわ」

    %CALLNAME:TARGET%は息を整えながら、肩越しに振り返った。

    「……私の背中と、顔と……どちらを見たいの……？」
  priority: 2
- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情のまま、%CALLNAME:MASTER%に背を向けている。

    「……この体位なら、顔を見なくて済むわ」

    %CALLNAME:TARGET%は淡々と言い放った。

    「……好きにしなさい。私は本のことを考えているから」

    それだけを告げ、%CALLNAME:TARGET%は目を閉じた。

    「……ふぅ……むきゅ……」

    %CALLNAME:TARGET%は溜息をつきながら、形式的に体を委ねている。

    「……背面位というのは、愛情表現には向いていないわね」

    %CALLNAME:TARGET%は事実を述べるように言った。

    「……まあ、あなたとの間に愛情などないから、丁度いいのかもしれないけれど」

    投げやりな態度で、%CALLNAME:TARGET%は身を任せた。

    「……むきゅ……痛い……」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「……もっと丁寧にして。体が弱いのだから」

    %CALLNAME:TARGET%は体の弱さを訴えた。

    「……こういうことをするなら、配慮くらいはしなさい」

    冷たい口調で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を窘めた。

    「……」

    %CALLNAME:TARGET%は虚空を見つめながら、%CALLNAME:MASTER%の行為を受けている。

    頭の中では、次に読む本のことを考えているようだ。

    「……終わったら、すぐに出て行って」

    %CALLNAME:TARGET%は冷淡に言った。

    「……私に背を向けさせておいて、遠慮も何もないでしょう」
  priority: 1
