- id: fallback
  content: >-
    「ん……おしりで……いいよ……」

    %CALLNAME:TARGET%は無感情な瞳で、%CALLNAME:MASTER%と向き合って座った。

    悪魔の本能に従い、少女の体は%CALLNAME:MASTER%を締め付け始めていた。

