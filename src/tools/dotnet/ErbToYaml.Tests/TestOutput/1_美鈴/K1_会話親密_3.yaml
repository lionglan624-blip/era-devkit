- id: talent_3_1
  content: >-
    「も、もう……そんなところ触って……」

    %CALLNAME:人物_美鈴%は顔を赤くして、でも逃げようとはしない。

    「%CALLNAME:MASTER%ったら、えっちなんだから……」

    %CALLNAME:人物_美鈴%は恥じらいながらも、その場に留まっている。

    「……嫌じゃないけど、恥ずかしいわよ。」

    頬を染めたまま、%CALLNAME:人物_美鈴%は小さく呟いた。

    「やっ……そこは……」

    %CALLNAME:人物_美鈴%はビクッと体を震わせた。

    %CALLNAME:MASTER%の手が、尻の曲線をゆっくりとなぞる。

    「……%CALLNAME:MASTER%だから、いいけど……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに目を逸らした。

    その耳は赤く染まっていた。

    「んっ……あ……」

    %CALLNAME:人物_美鈴%は小さく声を漏らした。

    「……急にそういうことするの、ずるいわ」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%を上目遣いで見ている。

    「……心の準備くらい、させてよね」

    そう言いながらも、%CALLNAME:人物_美鈴%は逃げようとはしなかった。

    %CALLNAME:MASTER%の手が、%CALLNAME:人物_美鈴%の尻に触れる。

    「ひゃっ……も、もう……」

    %CALLNAME:人物_美鈴%は顔を真っ赤にして、体を硬くした。

    「……服越しなのに、手の熱さが伝わってくる……」

    %CALLNAME:人物_美鈴%はそう呟きながらも、%CALLNAME:MASTER%から離れようとはしない。

    その瞳は潤んで、期待と恥じらいが混じっていた。
