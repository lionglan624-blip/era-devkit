entries:
- id: fallback
  content: >-
    「……そ、そこは……っ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の指が後ろに触れ、小さく身を震わせた。

    500年を生きた吸血鬼も、そこを触れられるのは恥ずかしいらしい。

    「んっ……やぁ……%CALLNAME:MASTER%のいじわる……」

    %CALLNAME:人物_レミリア%は紅い瞳を潤ませながら、恋人を見上げた。

    「……でも、%CALLNAME:MASTER%になら……許してあげる……」

    館の主は恥ずかしそうに目を伏せながら、身体を委ねていた。

    「あっ……そ、そっちは……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_レミリア%の菊門をくすぐる。

    %CALLNAME:人物_レミリア%は顔を真っ赤にしながら、小さく声を漏らした。

    「ひゃっ……んん……恥ずかしいところ、触らないで……」

    だが、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手を払いのけようとはしなかった。

    「……%CALLNAME:MASTER%だから、特別なんだからね……」

    吸血鬼の主は、恋人にだけ見せる無防備な姿を晒していた。

    「や……そこ、だめ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に後ろの穴をいじられ、甘い声を漏らした。

    高貴な吸血鬼らしからぬ、恥じらいに満ちた表情。

    「んあっ……ふぅ……そんなところ、感じちゃうなんて……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胸に顔を埋めて、震えていた。

    「……私ったら、はしたないわね……」

    恋人の前でだけ見せる、甘えた姿だった。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は恥ずかしそうに%CALLNAME:MASTER%の名を呼んだ。

    %CALLNAME:MASTER%の指が後ろを優しく撫でるたび、小さな身体がびくりと震える。

    「あ……んっ……そこ、敏感なの……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の服を握りしめた。

    「……こんなところまで、%CALLNAME:MASTER%のものになっちゃったわ……」

    500年を生きた吸血鬼は、恋人の腕の中で蕩けていた。
  priority: 4
- id: talent_3_1
  content: >-
    「っ……！　そ、そこは違うわよ！」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の指が後ろに触れ、思わず声を上げた。

    「な、何を考えているの、%CALLNAME:MASTER%……」

    顔を真っ赤にしながら、%CALLNAME:人物_レミリア%は抗議する。

    「んっ……や、やめなさい……」

    だが、その声には隠しきれない甘さが混じっていた。

    「……べ、別に感じてなんかいないわよ……」

    「ひゃっ……そ、そんなところ……」

    %CALLNAME:人物_レミリア%は後ろの穴を触られ、小さく跳ねた。

    「あ、あなたって本当に……変態ね……」

    そう言いながらも、%CALLNAME:人物_レミリア%の目は潤んでいる。

    「んん……や……こんなの、はしたない……」

    %CALLNAME:人物_レミリア%は恥ずかしそうに顔を背けた。

    「……で、でも、やめろとは……言ってないわよ……」

    「や……っ、そっちは……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の行為に顔を真っ赤にした。

    「私を何だと思っているの……こんなところ……」

    威厳のある声を出そうとするが、完全に上擦っている。

    「あっ……ふぅ……」

    %CALLNAME:人物_レミリア%は小さく声を漏らし、慌てて口を押さえた。

    「……聞かなかったことにしなさい……っ」

    「……%CALLNAME:MASTER%、あなた……」

    %CALLNAME:人物_レミリア%は呆れたような声を出した。

    だが%CALLNAME:MASTER%が後ろの穴を撫で続けると、

    「やっ……んん……そこ、変な感じがする……」

    %CALLNAME:人物_レミリア%は恥ずかしそうに身をよじった。

    「……本当に、どうかしているわ……%CALLNAME:MASTER%も、私も……」

    高貴な吸血鬼は、恥じらいに震えていた。
