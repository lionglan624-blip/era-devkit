entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……見ててね……？」

    %CALLNAME:人物_フラン%は恥じらいながらも、嬉しそうに微笑んだ。

    秘所に指を這わせると、小さな吐息が漏れる。

    「んっ……私、%CALLNAME:MASTER%のことを考えながらするのさ……」

    %CALLNAME:人物_フラン%はゆっくりと指を動かし始めた。

    495年の孤独を経て見つけた恋人のために、自らを慰めるのだ。

    「……気持ちいいのは、%CALLNAME:MASTER%が見てくれてるからだよ」

    「あっ……んっ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の前で、夢中になって自らを弄っていた。

    紅い瞳は恍惚に潤み、頬は桜色に染まっている。

    「%CALLNAME:MASTER%……私、おかしくなっちゃいそう……」

    %CALLNAME:人物_フラン%は甘い声を上げながら、指の動きを速めた。

    「でも……%CALLNAME:MASTER%に見られてると、もっと気持ちよくなるのさ……」

    悪魔の妹は、恋人の視線を浴びて快楽に溺れていく。

    「ねぇ、%CALLNAME:MASTER%……私のこんな姿、どう……？」

    %CALLNAME:人物_フラン%は自らの秘所を弄りながら、上目遣いに聞いた。

    「やぁ……恥ずかしいのに、やめられないのさ……」

    %CALLNAME:人物_フラン%の指はぐちゅぐちゅと淫らな音を立てている。

    「私……%CALLNAME:MASTER%のためなら、なんでも見せてあげる……」

    地下室で孤独だった少女は、今、恋人の前で全てを曝け出していた。

    「……だって、%CALLNAME:MASTER%は私のこと、壊さないでくれるから……」

    「ふぁ……あっ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_フラン%は身悶えしながら、自らの身体を弄んでいた。

    片手で秘所を、もう片方の手で小さな胸を愛撫する。

    「見て……私、%CALLNAME:MASTER%のことだけ考えてるのさ……」

    %CALLNAME:人物_フラン%の声は次第に高くなっていく。

    「んっ……好き……%CALLNAME:MASTER%のこと、大好き……」

    恋人への想いを口にしながら、少女は快楽の波に身を任せていた。
  priority: 4
- id: talent_3_1
  content: >-
    「え……自分で、するの……？」

    %CALLNAME:人物_フラン%は戸惑いながらも、%CALLNAME:MASTER%の言葉に従った。

    おずおずと秘所に手を伸ばす。

    「んっ……こう……するの……？」

    %CALLNAME:人物_フラン%は顔を赤くしながら、ぎこちなく指を動かした。

    「%CALLNAME:MASTER%に見られてると思うと……変な気分になるのさ……」

    その声には、恥ずかしさと密かな喜びが混じっていた。

    「あっ……やだ……声、出ちゃう……」

    %CALLNAME:人物_フラン%は自らの声を恥じるように、唇を噛んだ。

    しかし、指の動きは止まらない。

    「%CALLNAME:MASTER%……そんなに見ないでよぉ……」

    %CALLNAME:人物_フラン%は顔を背けながらも、脚を閉じようとはしなかった。

    「……でも、見てほしいのも本当なのさ……」

    素直になれない悪魔の妹は、そう呟いた。

    「こんなの……初めてなのさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の前で、自らの秘所を弄っていた。

    「誰かに見られながらなんて……恥ずかしい……」

    %CALLNAME:人物_フラン%の指は、次第に濡れた音を立て始める。

    「んっ……あっ……でも、%CALLNAME:MASTER%なら……」

    %CALLNAME:人物_フラン%は恋心を抱く相手に見守られながら、快感に身を委ねていった。

    「……見ててくれるの、嬉しいかも……」

    「%CALLNAME:MASTER%……私、ちゃんとできてる……？」

    %CALLNAME:人物_フラン%は不安そうに聞きながら、自らを弄り続けた。

    「こういうの、よくわからないのさ……」

    %CALLNAME:人物_フラン%の身体は、快感に正直に反応している。

    「あっ……なんか……変な感じが……来るのさ……」

    %CALLNAME:人物_フラン%は初めての感覚に戸惑いながらも、指を止めなかった。

    「%CALLNAME:MASTER%……見ててね……？」
