- id: fallback
  content: >-
    「……後ろから、入れるの……？」

    %CALLNAME:人物_フラン%は首を傾げながら、言われた通りに%CALLNAME:MASTER%の背後に立った。

    こんな体勢で行為をするのは、495年の人生で初めてのこと。

    「わっ……入った……変な感じ……」

    %CALLNAME:人物_フラン%は繋がった感覚に目を丸くした。

    「……でも……嫌じゃないのさ……」

    未知の感覚に戸惑いながらも、%CALLNAME:人物_フラン%は静かに腰を動かし始めた。

    「……%CALLNAME:MASTER%の背中……温かいのさ……」

    %CALLNAME:人物_フラン%は恐る恐る相手の背中に手を添えた。

    後ろからだと、相手の表情が見えないことに少し不安を覚える。

    「……こうやって動くと……%CALLNAME:MASTER%、気持ちいい……？」

    %CALLNAME:人物_フラン%は確認するように問いかけながら腰を振った。

    「……教えてくれると……嬉しいのさ……」

    芽生え始めた感情が、言葉に現れていた。

    「ねぇ……この体勢、%CALLNAME:MASTER%は好きなの……？」

    %CALLNAME:人物_フラン%は純粋な疑問を投げかけた。

    自分から動くことへの不慣れさが、動きに現れている。

    「……そう……じゃあ、頑張るのさ……」

    %CALLNAME:人物_フラン%は懸命に腰を動かし始めた。

    「……%CALLNAME:MASTER%のこと……もっと知りたいのさ……」

    思慕の芽が、少しずつ育っていた。

    「……後ろからだと、顔が見えないね……」

    %CALLNAME:人物_フラン%は少し寂しそうに呟いた。

    でも代わりに、背中越しに伝わる体温を感じることができる。

    「……でも……こうしてると、%CALLNAME:MASTER%の鼓動が聞こえる気がするのさ……」

    %CALLNAME:人物_フラン%は相手の背中に耳を当てながら、腰を動かした。

    「……不思議……胸がざわざわする……」

    芽生えた感情に、%CALLNAME:人物_フラン%は戸惑いを隠せなかった。
  priority: 2
- id: fallback
  content: >-
    「……後ろからしろって？」

    %CALLNAME:人物_フラン%は面倒そうに%CALLNAME:MASTER%の背後に立った。

    その視線には、警戒と無関心が入り混じっている。

    「……まぁ、いいけど……」

    %CALLNAME:人物_フラン%は気怠そうに腰を押し付けた。

    「……さっさと終わらせてよ……私、暇じゃないのさ……」

    義務的な動きには、感情の欠片もなかった。

    「……ふぅん……後ろからがいいんだ……」

    %CALLNAME:人物_フラン%は興味なさそうに相手の背後についた。

    繋がっていても、心はどこか遠くにある。

    「……どうでもいいけど……」

    %CALLNAME:人物_フラン%は機械的に腰を動かした。

    「……早く終わらないかな……」

    そこに感情の欠片はなかった。

    「……」

    %CALLNAME:人物_フラン%は無言で%CALLNAME:MASTER%の背後から行為を始めた。

    紅い瞳は虚ろに、どこか別の場所を見ている。

    「……お姉さまなら、こんなこと……しなくていいのに……」

    %CALLNAME:人物_フラン%はぽつりと呟いた。

    「……まぁ、いいや……どうせ関係ないのさ……」

    悪魔の妹は、心を閉ざしたまま腰を動かし続けた。

    「……壊してもいいなら、もっと楽しいのに……」

    %CALLNAME:人物_フラン%は不穏な笑みを浮かべながら、%CALLNAME:MASTER%の背後に立った。

    その紅い瞳の奥に、狂気の光が垣間見える。

    「……冗談だよ……半分だけね……」

    %CALLNAME:人物_フラン%は気怠そうに腰を動かした。

    「……あんたのこと、壊す価値もないのさ……」

    その言葉は、興味のなさと危うさを同時に示していた。
  priority: 1
