- id: fallback
  content: >-
    「……何ですか？」

    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%の髪に触れようとしている。

    %CALLNAME:人物_咲夜%は仕事の手を止め、怪訝そうな表情を浮かべた。

    「……髪を触りたいのですか？ 変わった趣味ですわね」

    されるがままに髪を撫でられながら、%CALLNAME:人物_咲夜%は呟いた。

    「……まあ、お仕事の邪魔にならないのでしたら、好きになさいな」

    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%の手に触れた。

    「……っ」

    %CALLNAME:人物_咲夜%は小さく体を震わせたが、手を引っ込めなかった。

    「……何をするおつもりですか？」

    %CALLNAME:人物_咲夜%は警戒するような視線を向けている。

    「……まあ、手を触るくらいでしたら……構いませんけど……」

    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%の肩に手を置いた。

    %CALLNAME:人物_咲夜%は一瞬身を固くしたが、すぐにいつもの表情に戻った。

    「……どうされました？ 何かご用でも？」

    %CALLNAME:人物_咲夜%は仕事の手を止めて、%CALLNAME:MASTER%を見上げている。

    「……用がないのでしたら、触れるのはお控えいただきたいのですけど」

    そう言いながらも、%CALLNAME:人物_咲夜%は%CALLNAME:MASTER%の手を振り払おうとはしなかった。

    %CALLNAME:MASTER%が%CALLNAME:人物_咲夜%に近づくと、彼女は仕事の手を止めた。

    「……何か？」

    %CALLNAME:人物_咲夜%は冷静な表情でこちらを見ている。

    %CALLNAME:MASTER%がその頬にそっと触れると、%CALLNAME:人物_咲夜%は微かに眉を動かした。

    「……不思議な方ですわね。何故、私などに……」

    %CALLNAME:人物_咲夜%は困惑しながらも、その触れ合いを受け入れていた。
  priority: 2
- id: fallback
  content: >-
    「……何ですか？」

    %CALLNAME:MASTER%が%CALLNAME:人物_咲夜%に触れようとすると、

    %CALLNAME:人物_咲夜%は冷たい目でこちらを見据えた。

    「唐突に触れるのはお止めいただけますか？」

    「そういうことは、もっと親しい間柄でなさることですわよ」

    %CALLNAME:人物_咲夜%は淡々と言い放ち、仕事に戻った。

    「……」

    %CALLNAME:MASTER%が%CALLNAME:人物_咲夜%に近づくと、

    %CALLNAME:人物_咲夜%は一瞬で距離を取った。時を止めたかのように素早い動きだった。

    「お客様とはいえ、馴れ馴れしくされるのは困りますわ」

    「用があるのでしたら、まず言葉でおっしゃいな」

    %CALLNAME:人物_咲夜%はそれ以上取り合う気配を見せなかった。

    %CALLNAME:MASTER%が%CALLNAME:人物_咲夜%の髪に手を伸ばした。

    %CALLNAME:人物_咲夜%は優雅な動きでその手を避けた。

    「……何のつもりかしら？」

    %CALLNAME:人物_咲夜%の声は冷淡そのものだった。

    「私はお嬢様に仕えるメイドですわ。軽率な行動は控えていただけますか？」

    そう言い残して、%CALLNAME:人物_咲夜%は仕事に戻った。

    %CALLNAME:MASTER%が%CALLNAME:人物_咲夜%の手に触れようとした瞬間、

    銀髪のメイドはその場から消えていた。

    「……ここですわ」

    振り返ると、%CALLNAME:人物_咲夜%は数歩離れた場所に立っていた。

    「時を止める程度の能力、ご存知なかったかしら？」

    %CALLNAME:人物_咲夜%は冷たく微笑みながら、そう告げた。

    「お客様にはもう少し、礼儀をお学びになっていただきたいものですわね」
  priority: 1
