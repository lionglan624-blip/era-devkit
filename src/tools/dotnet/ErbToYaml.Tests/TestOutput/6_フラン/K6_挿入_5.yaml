character: フラン
situation: K6_挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、こうしてると……」

    %CALLNAME:人物_フラン%は恋人の上に跨りながら、嬉しそうに微笑んだ。

    上から見下ろす位置で、大切な人の表情がよく見える。

    「私のペースで動けるから……%CALLNAME:MASTER%を壊さなくて済むのさ」

    %CALLNAME:人物_フラン%がゆっくりと腰を落とすと、二人は深く繋がった。

    「んっ……あぁ……奥まで来てる……私が%CALLNAME:MASTER%を包んでる……」

    495年の孤独を経た少女は、恋人との繋がりを全身で感じていた。

    「%CALLNAME:MASTER%……動かないでね？　私がしてあげるから」

    %CALLNAME:人物_フラン%は恋人の胸に手を当てながら、真剣な目で言った。

    力を抑えて、壊さないように。それでいて離さないように。

    「こうやって自分で動くと……ちゃんと加減できるのさ」

    %CALLNAME:人物_フラン%が腰を揺らし始めると、甘い吐息が漏れた。

    「あっ……ん……%CALLNAME:MASTER%の顔、気持ちよさそう……嬉しいの……」

    恋人に快感を与えられることが、悪魔の妹には何よりの喜びだった。

    「上に乗ってると……%CALLNAME:MASTER%の全部が見えるのさ」

    %CALLNAME:人物_フラン%は恋人を見下ろしながら、頬を染めて呟いた。

    自分で主導権を握れる体勢に、どこか安心している様子だ。

    「%CALLNAME:MASTER%の表情も、声も……全部、私のものなの」

    %CALLNAME:人物_フラン%が腰を回すように動くと、繋がった部分がきゅうっと締まった。

    「んぅ……はぁ……この体勢……すごく、気持ちいい……」

    悪魔の妹は、恋人を独り占めする幸せを噛みしめていた。

    「ねぇ、%CALLNAME:MASTER%……私ね、こうしてる時が一番幸せなのさ」

    %CALLNAME:人物_フラン%は恋人の上で腰を動かしながら、愛おしそうに微笑んだ。

    紅い瞳には、かつての狂気の代わりに深い愛情が宿っている。

    「私が上にいれば……%CALLNAME:MASTER%を壊す心配がないから」

    %CALLNAME:人物_フラン%が激しく腰を落とすと、二人の喘ぎ声が重なった。

    「あぁ……っ！　%CALLNAME:MASTER%……私……壊さないで、愛せてるよ……」

    495年の孤独を知る少女は、恋人への愛を身体で証明していた。
  priority: 4
- id: talent_3_1
  content: >-
    「こ、こうやって上に乗るの……？」

    %CALLNAME:人物_フラン%は戸惑いながらも、%CALLNAME:MASTER%の上に跨った。

    見下ろす位置から、好きな人の顔がよく見える。

    「……なんだか、%CALLNAME:MASTER%が私のものになったみたいで……嬉しいのさ」

    %CALLNAME:人物_フラン%がゆっくりと腰を下ろすと、声を詰まらせた。

    「んっ……あ……入ってくる……自分で動くと、違う感じがする……」

    悪魔の妹は、未知の感覚に戸惑いながらも腰を揺らし始めた。

    「ふふ……%CALLNAME:MASTER%、今は私の下なのさ」

    %CALLNAME:人物_フラン%は得意げに微笑みながら、腰を動かした。

    普段とは違う立場に、どこか興奮している様子だ。

    「こうしてると……%CALLNAME:MASTER%は私から逃げられないって、わかるの」

    %CALLNAME:人物_フラン%が深く腰を落とすと、甘い声を漏らした。

    「あっ……ん……奥まで……私が自分で入れてるのさ……」

    独占欲と快楽が混じり合い、悪魔の妹を酔わせていた。

    「%CALLNAME:MASTER%……私のこと、下から見て……どう思う？」

    %CALLNAME:人物_フラン%は恥ずかしそうに、それでも期待を込めて問いかけた。

    好きな人に見つめられながら上で動く、その背徳感に頬を染めて。

    「……綺麗って言ってくれたら、もっと頑張るのさ」

    %CALLNAME:人物_フラン%が腰を回すように動くと、二人の身体が密着する。

    「んぅ……あぁ……この角度……%CALLNAME:MASTER%のこと全部感じられる……」

    恋する気持ちが、快感をさらに増幅させていた。

    「本で読んだことあるのさ……騎乗位って」

    %CALLNAME:人物_フラン%は知識を披露するように言った。

    しかし実際に上に跨ると、顔が羞恥で真っ赤に染まった。

    「でも、こんなに気持ちいいなんて……書いてなかったよ」

    %CALLNAME:人物_フラン%が自分のペースで腰を動かすと、快感が押し寄せてくる。

    「んっ……！　やだ……頭、ぼうっとする……%CALLNAME:MASTER%のせいなのさ……」

    想像を超える感覚に、悪魔の妹は翻弄されていた。
