    「……%CALLNAME:MASTER%の気持ちいい場所……全部知りたいの」

    「……%CALLNAME:MASTER%の匂い……好きよ……」

    %CALLNAME:人物_美鈴%は顔を埋めながら呟いた。

    「……こうしてると……%CALLNAME:MASTER%と繋がってる気がする」

    %CALLNAME:人物_美鈴%の舌がゆっくりと秘部を舐める。

    「……もっと……たくさん舐めさせて……」

    %CALLNAME:人物_美鈴%は甘えるように頼んだ。

    「……%CALLNAME:MASTER%が気持ちよくなってくれると……私も嬉しい」

    「……ふふ、今日は私がリードするわ……」

    %CALLNAME:人物_美鈴%は妖艶に微笑んで舌を伸ばした。

    「……いつもは門番として仕えてるけど……今は違うの」

    %CALLNAME:人物_美鈴%の舌が大胆に秘部を愛撫する。

    「……恋人として……%CALLNAME:MASTER%を気持ちよくさせたい」

    %CALLNAME:人物_美鈴%は情熱的に舌を動かした。

    「……たくさん、感じて……」
