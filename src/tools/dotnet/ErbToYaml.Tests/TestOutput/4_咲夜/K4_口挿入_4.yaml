entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……こうして全身で奉仕させてくださいまし……」

    %CALLNAME:TARGET%は石鹸を丁寧に泡立て、自らの身体に塗りたくった。

    白い泡が、完璧なメイドの肢体を滑らかに覆っていく。

    「私の身体で……貴方を洗って差し上げますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の身体に、ゆっくりと全身を擦り付けた。

    ぬるり、と石鹸が二人の肌を滑らかに繋ぐ。

    「ふふ……貴方の肌、とても温かいですわ……」

    %CALLNAME:TARGET%は愛おしそうに微笑みながら、身体を絡めていった。

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は石鹸まみれの胸を、%CALLNAME:MASTER%の胸板に押し付けた。

    むにゅり、と柔らかな感触が広がる。

    「こうして……貴方と触れ合えることが……幸せですわ……」

    %CALLNAME:TARGET%は脚を絡め、腰を密着させていく。

    石鹸の滑りが、互いの肌を敏感にしていた。

    「もっと……深く……洗って差し上げますわね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の一物に太腿を擦り付けた。

    「……ほら……こちらも綺麗にいたしますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の一物を太腿で挟み込んだ。

    ぬるぬると石鹸の泡が潤滑を良くしていく。

    「ふふ……貴方のここ、どんどん硬くなっていきますわ……」

    %CALLNAME:TARGET%は腰を前後に動かし、一物を太腿で擦り上げた。

    「瀟洒なメイドの太腿奉仕……いかがですか……？」

    「このまま……最後まで……お世話いたしますわ……」

    %CALLNAME:TARGET%は蕩けた顔で、奉仕に没頭していった。

    「……%CALLNAME:MASTER%……私を見ていてください……」

    %CALLNAME:TARGET%は視線を合わせながら、全身を絡めていく。

    「こうして……貴方に身体を預けられる日が来るなんて……」

    %CALLNAME:TARGET%の瞳が潤んでいた。

    「……んっ……ぬるぬるして……気持ちいいですわ……」

    %CALLNAME:TARGET%は自分も感じながら、献身的に身体を擦り付けた。

    「貴方と一つになれる感覚……最高ですわ……」

    完璧なメイドは、恋人のために全身全霊で奉仕していた。
