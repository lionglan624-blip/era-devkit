    「ふぁ……っ、%CALLNAME:MASTER%……そこ、くすぐったいの……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の舌使いに、腰を小刻みに揺らしている。

    れろり、と菊穴をなぞられるたびに、甘い声が漏れる。

    「……こんな恥ずかしいこと……%CALLNAME:MASTER%にしかさせないんだから……」

    %CALLNAME:人物_美鈴%は枕に顔を埋めながら、そう囁いた。

    「……もっと、舐めて……後ろ、感じてきちゃった……」

    蕩けた声で、%CALLNAME:人物_美鈴%はおねだりした。

    「あっ……んっ……舌、入ってくる……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の舌が菊穴に侵入する感覚に、声を上げた。

    熱くて柔らかい感触が、後ろの穴を犯している。

    「……やっ……そんな奥まで……」

    %CALLNAME:人物_美鈴%はシーツを握りしめ、快感に耐えている。

    「……%CALLNAME:MASTER%の舌で、お尻が……おかしくなっちゃう……」

    恥ずかしさと快感が入り混じった表情で、%CALLNAME:人物_美鈴%は喘いだ。

    「んぅ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_美鈴%は後ろを舐められながら、とろんとした瞳で振り返った。

    門番としての凛々しさはどこへやら、今はただ愛される女の顔だ。

    「……私のお尻、そんなに好き……？」

    %CALLNAME:人物_美鈴%は照れ笑いを浮かべながら問いかけた。

    「……%CALLNAME:MASTER%になら、全部舐めてもらいたいな……」

    甘えるように、%CALLNAME:人物_美鈴%はそう囁いて腰を突き出した。
