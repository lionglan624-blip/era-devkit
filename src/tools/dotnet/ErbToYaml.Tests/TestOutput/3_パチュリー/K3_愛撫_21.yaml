- id: fallback
  content: >-
    「……何をしているの」

    %CALLNAME:TARGET%は淡々と問いかけたが、%CALLNAME:MASTER%の指が乳首に触れると息を呑んだ。

    「……乳首への刺激と快感の相関……まあ、興味がないわけじゃないわ」

    %CALLNAME:TARGET%は実験でも行うかのように、自分の反応を分析しようとしている。

    「……ふぅん……こういう感覚なのね……」

    しかしその声は、僅かに震えていた。

    「……っ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に乳首を摘ままれ、小さく息を漏らした。

    「……乳首の神経分布は……体の他の部位より密集しているはずよ……」

    %CALLNAME:TARGET%は知識人らしい分析を試みるが、声が上擦っている。

    「……興味深いわね……もう少し……データを……」

    言葉の途中で、%CALLNAME:TARGET%は唇を噛んで黙った。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の愛撫を受けている。

    本を読む手は止まり、視線は虚空を彷徨っている。

    「……悪くないわね……乳首への刺激は……」

    %CALLNAME:TARGET%はぼそりと呟いた。

    「……でも、調子に乗らないで。私はあなたの観察対象になっているだけよ」

    そう言いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の指を拒まなかった。

    「……ん……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指に、微かに反応している。

    「……そういう行為の理論は……本で学んだけど……」

    %CALLNAME:MASTER%が乳首を転がすと、%CALLNAME:TARGET%の言葉が途切れた。

    「……実践と理論は……違うのね……」

    %CALLNAME:TARGET%は認めたくなさそうに、そう呟いた。
