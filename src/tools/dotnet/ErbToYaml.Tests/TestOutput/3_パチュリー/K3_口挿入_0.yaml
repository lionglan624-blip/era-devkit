character: パチュリー
situation: K3_口挿入
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、これで良いのかしら……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の一物を細い指で包み込んだ。

    本で読んだ知識を思い出しながら、ゆっくりと手を動かし始める。

    「……熱い……本には書いてなかったわ、この温度は……」

    %CALLNAME:TARGET%は頬を染めながら、手の動きを続けた。

    「……あなたを気持ち良くできるなら……これも研究の一環よ……」

    照れ隠しの言い訳をしながらも、手は止まらなかった。

    「んっ……あなたの……硬くなってきたわね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を観察しながら手を動かしている。

    「……こうすると、気持ち良いの？　反応から推測するに……」

    %CALLNAME:TARGET%は学者らしく分析しながらも、表情は蕩けていた。

    「……あなたを感じられて、嬉しいわ……」

    そう小さく呟いて、%CALLNAME:TARGET%はペースを少し上げた。

    「……ふぅ……腕が疲れてきたわ……」

    %CALLNAME:TARGET%は体が弱いながらも、%CALLNAME:MASTER%への奉仕を続けていた。

    「……でも、あなたの喜ぶ顔が見たいから……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げて、微笑んだ。

    「……もう少し、頑張るわ……」

    脆弱な体に鞭打ちながら、愛する人のために手を動かし続けた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の一物を両手で包み込み、丁寧に擦り上げている。

    「……こうして触れていると、あなたの体温が伝わってくるわ……」

    %CALLNAME:TARGET%は穏やかな表情で言った。

    「……私の手で、あなたを満たせるなら……光栄よ」

    知識の魔女は、愛する人への奉仕に静かな喜びを感じていた。
