    %CALLNAME:人物_美鈴%は涙目になりながらも、%CALLNAME:MASTER%の視線から逃げなかった。

    「%CALLNAME:MASTER%……本当に、見たいの……？」

    %CALLNAME:人物_美鈴%は不安げに問いかけながら、秘部に手を添えた。

    「……%CALLNAME:MASTER%が見たいって言うなら……」

    %CALLNAME:人物_美鈴%はゆっくりと指を動かし始めた。

    「んっ……あ……%CALLNAME:MASTER%のせいで……変になっちゃう……」

    %CALLNAME:人物_美鈴%は熱い吐息を漏らしながら、%CALLNAME:MASTER%を見つめた。
