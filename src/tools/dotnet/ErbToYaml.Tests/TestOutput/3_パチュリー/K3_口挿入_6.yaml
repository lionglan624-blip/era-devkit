  content: >-
    「……これを舐めればいいのですか」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%の後ろを見た。

    「……わかりました……早く済ませて」

    %CALLNAME:TARGET%は機械的に舌を伸ばした。

    「……私は読みたい本があるの……手短に」

    冷淡な態度で、%CALLNAME:TARGET%は義務的に舌を動かし始めた。

    「……」

    %CALLNAME:TARGET%は黙って舌を動かしている。

    「……れろ……こうすれば良いのでしょう……」

    %CALLNAME:TARGET%は事務的に言った。

    「……興味はありませんが……言われたから従っているだけよ」

    無感動な態度で、%CALLNAME:TARGET%は舌を動かし続けた。

    「……はぁ……」

    %CALLNAME:TARGET%は溜息をつきながら舌を動かしている。

    「……こんなことに時間を費やすなんて……」

    %CALLNAME:TARGET%は不満そうに呟いた。

    「……本を読んでいた方がよほど有意義なのに……」

    明らかに嫌々ながら、%CALLNAME:TARGET%は舌を動かし続けた。

    「……終わったら出て行ってくださいね」

    %CALLNAME:TARGET%は冷たく言い放った。

    「……私はあなたの相手をする暇はないの……」

    %CALLNAME:TARGET%は最低限の動きで舌を動かしている。

    「……早く終わらせて……それだけよ」

    投げやりな態度で、%CALLNAME:TARGET%は義務を果たしていた。
