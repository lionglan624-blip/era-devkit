- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%がマッサージャーを見せると、%CALLNAME:人物_レミリア%は目を逸らした。

    「……そ、そんなもので私を……」

    しかし振動が肌に触れた瞬間、強がりは崩れた。

    「っ……ん、あっ……」

    %CALLNAME:人物_レミリア%は唇を噛みしめ、声を抑えようとした。

    「べ、別に気持ちよくなんか……んんっ……」

    素直になれない吸血鬼は、快感に抗いながらも身体を預けていた。

    「……何よ、それ」

    %CALLNAME:人物_レミリア%はマッサージャーを睨みつけたが、逃げようとはしなかった。

    「ふ、ふん……その程度で私が……ひゃっ！」

    振動が秘部に触れ、%CALLNAME:人物_レミリア%は悲鳴のような声を上げた。

    「ちょ、ちょっと……そこは……あぁっ……」

    高貴な吸血鬼は、機械の振動の前に無様に喘いでいた。

    「……%CALLNAME:MASTER%のせいよ、全部……」

    恨めしそうに言いながらも、その瞳は潤んでいた。

    %CALLNAME:MASTER%がマッサージャーのスイッチを入れると、%CALLNAME:人物_レミリア%は身構えた。

    「……ま、まさか本当に使う気？」

    期待と不安が入り混じった表情で、吸血鬼は恋心を隠せずにいた。

    「あっ……や、やぁ……こんなの……んっ……」

    振動が身体を駆け抜け、%CALLNAME:人物_レミリア%は小さく身悶えした。

    「……っ、もう……%CALLNAME:MASTER%の馬鹿……」

    照れ隠しの悪態も、甘い声に溶けていった。

    「……いいわよ、好きにしなさい」

    %CALLNAME:人物_レミリア%は不機嫌そうに言いながらも、身体の力を抜いた。

    マッサージャーの振動が敏感な場所を刺激すると、吸血鬼は声を殺した。

    「んっ……ぁ……っ……！」

    必死に平静を装おうとするが、紅い瞳は既に蕩けていた。

    「……べ、別に……%CALLNAME:MASTER%だから許してるだけよ……」

    その言葉は、ほとんど告白のようだった。
