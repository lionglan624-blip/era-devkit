- id: fallback
  content: >-
    「っ……何を……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の秘所に手を伸ばすと、%CALLNAME:TARGET%は驚いた声を上げた。

    「そのような行為は……許可しておりませんわ……」

    しかし%CALLNAME:TARGET%の抵抗は完全なものではなかった。

    「……%CALLNAME:MASTER%……本当に、困りますわ……」

    %CALLNAME:TARGET%は戸惑いながらも、強く拒絶はしなかった。

    「あ……」

    %CALLNAME:MASTER%が秘所を開こうとすると、%CALLNAME:TARGET%は体を強張らせた。

    「……そこは……見ないでくださいまし……」

    %CALLNAME:TARGET%は困惑した様子で、%CALLNAME:MASTER%を見つめている。

    「お客様にこのような姿を見せるなど……メイドとして……」

    言葉とは裏腹に、%CALLNAME:TARGET%の体は抵抗していなかった。

    「……っ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に秘所を見られ、顔を伏せた。

    「……何故、このようなことを……」

    %CALLNAME:TARGET%は問いかけながらも、%CALLNAME:MASTER%を止めようとはしない。

    「……お嬢様には、報告いたしませんから……」

    「今回だけですわよ……」

    %CALLNAME:TARGET%は恥ずかしそうに呟いた。

    「や……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の秘所を開いていく。

    %CALLNAME:TARGET%は小さく声を漏らしながら、%CALLNAME:MASTER%の行為を見つめていた。

    「……そんなところを、見て……何が楽しいのですか……」

    %CALLNAME:TARGET%は困惑と羞恥の入り混じった表情を浮かべている。

    「……まあ、いいですわ……好きになさいまし……」

    諦めたように、%CALLNAME:TARGET%は力を抜いた。
  priority: 2
- id: fallback
  content: >-
    「っ……！？」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の秘所に触れようとすると、%CALLNAME:TARGET%は素早く身を引いた。

    「何をなさっているのですか……正気ですか……」

    %CALLNAME:TARGET%の声は冷たく、その目は警戒を湛えている。

    「紅魔館のメイド長に手を出すとは……度胸がありますわね」

    瀟洒なメイドは、時を止める準備を整えていた。

    「……は？」

    %CALLNAME:TARGET%は信じられないものを見るような目で%CALLNAME:MASTER%を見た。

    「私の秘所を見ようと……本気で言っているのですか」

    %CALLNAME:TARGET%は冷ややかな笑みを浮かべた。

    「お嬢様にお仕えする身として、そのような無礼は許しませんわ」

    「今すぐお引き取りになるか、私に時を止められるか……お選びなさいまし」

    %CALLNAME:TARGET%の手には、いつの間にかナイフが握られていた。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の手を払いのけた。

    「お客様であっても、越えてはならない一線がありますわ」

    %CALLNAME:TARGET%は冷たい視線を向けている。

    「私の体に触れる権利など、貴方にはありませんわ」

    「次はありませんから……よく覚えておくことですわね」

    瀟洒なメイドは、毅然とした態度で立ち去ろうとした。

    「なっ……」

    %CALLNAME:MASTER%が秘所に手を伸ばすと、%CALLNAME:TARGET%は驚きと怒りの声を上げた。

    「無礼にも程がありますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を睨みつけた。

    「私を誰だと思っているのですか」

    「お嬢様のお世話がなければ、今すぐ貴方の首を刎ねていたところですわ」

    時を司るメイドの目は、氷のように冷たかった。
  priority: 1
