character: フラン
situation: K6_口挿入
entries:
- id: fallback
  content: >-
    「ねえ、%CALLNAME:MASTER%……胸で、包んであげたいの……」

    %CALLNAME:人物_フラン%は恋人の前に身を低くし、小ぶりな胸を寄せた。

    紅い瞳に愛おしさが滲み、そっと一物を胸の谷間に導く。

    「んっ……熱いのさ……%CALLNAME:MASTER%の気持ちが伝わってくる……」

    %CALLNAME:人物_フラン%は優しく胸を押し当て、ゆっくりと上下に動き始めた。

    「壊したくないから……柔らかく、するね……ふふ……」

    495年の孤独を知る少女は、壊すことなく愛せる喜びに満たされていた。

    「%CALLNAME:MASTER%のここ……私の胸で温めてあげる……」

    %CALLNAME:人物_フラン%は嬉しそうに微笑みながら、胸で一物を挟み込んだ。

    先端が顔の近くに出てくるたび、愛おしそうに見つめる。

    「ん……私の胸、小さいけど……気持ちいい……？」

    %CALLNAME:人物_フラン%は少し不安そうに問いかけながら、胸を揺らし続けた。

    「よかった……%CALLNAME:MASTER%が喜んでくれると、私も嬉しいのさ」

    恋人への奉仕に、%CALLNAME:人物_フラン%の頬も紅く染まっていた。

    「こうして%CALLNAME:MASTER%を包んでると……繋がってる気がするの……」

    %CALLNAME:人物_フラン%は恋人の一物を胸で優しく包み込んでいた。

    地下室の孤独を知る少女にとって、この温もりは何よりの証。

    「んふふ……%CALLNAME:MASTER%、熱くなってきた……」

    %CALLNAME:人物_フラン%は嬉しそうに胸を動かし、先端に口づけした。

    「私の胸で……もっともっと気持ちよくなってね……」

    その言葉には、純粋な愛と繋がりへの渇望が込められていた。

    「%CALLNAME:MASTER%……大好き……」

    %CALLNAME:人物_フラン%は恋人の一物を胸で包みながら、上目遣いで見つめていた。

    紅い瞳には%CALLNAME:MASTER%だけが映り、胸は優しく動き続ける。

    「私の胸……%CALLNAME:MASTER%のために使って……」

    %CALLNAME:人物_フラン%は愛おしそうに胸を押し当て、時折舌で先端を舐めた。

    「出そうになったら……胸にいっぱい出していいよ……？」

    悪魔の妹は、恋人への奉仕に心から満たされていた。
  priority: 4
- id: talent_3_1
  content: >-
    「えっ……む、胸で挟むの……？」

    %CALLNAME:人物_フラン%は戸惑いと興味の混じった表情で、自分の胸を見下ろした。

    おそるおそる胸を寄せ、一物を挟み込む。

    「わ……熱い……私の胸、押しつぶされそう……」

    %CALLNAME:人物_フラン%は顔を紅らめながら、ゆっくりと動き始めた。

    「こ、こうすればいいの？　……変な遊びなのさ……」

    初めての経験に、少女の心臓は高鳴っていた。

    「ふぅん……%CALLNAME:MASTER%、私の胸だと気持ちいいんだ……」

    %CALLNAME:人物_フラン%は面白そうに、胸の動かし方を変えてみる。

    ぎゅっと挟んだり、ゆっくり擦ったり、その反応を楽しんでいる。

    「ふふ……%CALLNAME:MASTER%の顔、変なの……もっと見せてよ……」

    %CALLNAME:人物_フラン%はいたずらっぽく笑いながら、動きを速めた。

    「ねえ……私の胸で出したくなってきた……？」

    その言葉には、独占欲と好奇心が滲んでいた。

    「%CALLNAME:MASTER%のここ……私の胸でしか挟ませないんだからね……」

    %CALLNAME:人物_フラン%は確認するように問いかけながら、胸を動かしていた。

    他の誰かにさせることを想像し、表情が少しだけ曇る。

    「……他の子の胸なんか、触らないでね……」

    %CALLNAME:人物_フラン%は少し強めに挟み、独占を主張した。

    「私だけの……私だけの%CALLNAME:MASTER%……ふふ……」

    その執着は、冗談になりきれていなかった。

    「あ……%CALLNAME:MASTER%、びくってなった……」

    %CALLNAME:人物_フラン%は胸の間の反応に興味津々の様子だった。

    まるで新しい玩具を見つけた子供のように、目を輝かせている。

    「もっと挟んであげようか？　私、上手になりたいのさ」

    %CALLNAME:人物_フラン%は真剣な表情で、%CALLNAME:MASTER%を喜ばせようと努力していた。

    「ね……気持ちいい？　……うん、もっと頑張るね……」

    恋慕の少女は、愛しい人への奉仕に夢中だった。
