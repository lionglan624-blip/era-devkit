entries:
- id: fallback
  content: >-
    「ん……ちゅ、る……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の唇にそっとキスをした。

    %CALLNAME:TARGET%は目を閉じて、%CALLNAME:MASTER%のキスを受け入れている。

    「んふふ……%CALLNAME:MASTER%の唇、あったかいのさ……」

    %CALLNAME:TARGET%の翼がぱたぱたと嬉しそうに揺れている。紅い瞳が蕩けたように潤んでいる。

    「もっとして……？ キスされてると、壊したくならないのさ……不思議だね」

    %CALLNAME:TARGET%は無邪気な笑顔で、また唇を求めてきた。

    「%CALLNAME:MASTER%……キス、しよ？」

    %CALLNAME:TARGET%は自分からつま先立ちになって、%CALLNAME:MASTER%の唇に触れた。

    「ん、ちゅ……れろ……ちゅっ」

    %CALLNAME:TARGET%は不慣れながらも、一生懸命に唇を重ねている。

    「はぁ……%CALLNAME:MASTER%の味がするのさ……」

    唇を離した%CALLNAME:TARGET%は、蕩けた表情で%CALLNAME:MASTER%を見つめている。

    「495年、ずっと知らなかったの。こんなにあったかいこと……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の首に腕を回し、また唇を近づけてきた。

    「ん……んむっ……」

    %CALLNAME:MASTER%と%CALLNAME:TARGET%は深く唇を重ね合っている。

    「ちゅる……れろ……ん……」

    %CALLNAME:TARGET%の舌が、ぎこちなく%CALLNAME:MASTER%の口内を探っている。

    「ぷはぁっ……あはは、舌まで入れちゃったのさ……」

    %CALLNAME:TARGET%は頬を染めながらも、幸せそうに笑っている。

    「%CALLNAME:MASTER%、ずっと私のそばにいてね……？」

    495年の孤独を埋めるように、%CALLNAME:TARGET%は%CALLNAME:MASTER%に寄り添った。

    「ねえ、%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を取り、自分の頬に当てた。

    「キスして……？ 私から言うの、恥ずかしいんだけど……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の唇にそっと口づけた。

    「ん……ちゅ、ぷ……んぅ……」

    %CALLNAME:TARGET%は幸せそうに目を細め、%CALLNAME:MASTER%のキスを受け止めている。

    「……ふふ、%CALLNAME:MASTER%のキス、大好きなのさ」

    唇を離した%CALLNAME:TARGET%は、無邪気に笑って%CALLNAME:MASTER%に抱きついた。
  priority: 4
- id: talent_3_1
  content: >-
    「ん……っ！？」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%に唇を重ねた。

    %CALLNAME:TARGET%は驚いて目を見開いたが、やがて瞳を閉じた。

    「……ちゅ、ん……ぷは……」

    唇が離れると、%CALLNAME:TARGET%は頬を真っ赤に染めていた。

    「キスって……こういうのなんだ……本で読んだのと、ちょっと違うのさ……」

    %CALLNAME:TARGET%は照れくさそうに視線を逸らした。

    「……もう一回、してもいい……？」

    「あっ……%CALLNAME:MASTER%……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%にキスをした。

    「んっ……ん……」

    %CALLNAME:TARGET%はぎこちなく唇を動かしている。翼が緊張するように畳まれた。

    「……%CALLNAME:MASTER%の唇、あったかい……のさ……」

    %CALLNAME:TARGET%は熱っぽい瞳で%CALLNAME:MASTER%を見上げた。

    「地下にいた時は、こんなこと知らなかったの……」

    「ねえ、また遊びに来てくれる？ 地下は寂しいから……」

    「……んっ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%のキスを受け止めた。

    「ちゅ……ん……」

    控えめに唇を重ね合う二人。%CALLNAME:TARGET%の手が%CALLNAME:MASTER%の服を掴んでいる。

    「はぁ……ドキドキするのさ……」

    %CALLNAME:TARGET%の心臓が早鳴りしているのが伝わってくる。

    「……%CALLNAME:MASTER%といると、壊したくならないの……なんでだろう……」

    不思議そうに、でも嬉しそうに%CALLNAME:TARGET%は微笑んだ。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の顎を優しく持ち上げ、唇を重ねた。

    「ん……ちゅ……ぷ……」

    %CALLNAME:TARGET%は最初こそ戸惑っていたが、次第に身を預けてきた。

    「……はぁ……なんだか、ふわふわするのさ……」

    %CALLNAME:TARGET%は夢見心地の表情で%CALLNAME:MASTER%を見つめている。

    「ねえ、%CALLNAME:MASTER%……私のこと、好き……？」

    紅い瞳が不安げに揺れている。495年の孤独が、その問いに宿っていた。
