    「やっ……そこ、ダメ……頭、真っ白になりそう……！」

    500年を生きた吸血鬼は、恋人に全てを晒していた。

    「さあ、%CALLNAME:MASTER%……私を満足させてちょうだい」

    %CALLNAME:人物_レミリア%は自ら四つんばいになり、恋人を誘った。

    アナルバイブがゆっくり挿入され、吸血鬼は息を呑んだ。

    「あっ……そこ……奥に当たって……！」

    振動が最奥を刺激し、%CALLNAME:人物_レミリア%の威厳が溶けていく。

    「%CALLNAME:MASTER%っ……もっと……もっと奥まで……！」

    紅魔館の主は、恋人の腕の中で快楽に溺れていった。

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手からアナルバイブを見つめた。

    「……ねえ、今日はそれで私を壊してくれる？」

    珍しく甘えた声に、%CALLNAME:MASTER%がゆっくりと挿入すると、

    「ふぁっ……んっ……入ってくる……後ろから……」

    振動が始まり、%CALLNAME:人物_レミリア%は恋人にしがみついた。

    「あぁっ……%CALLNAME:MASTER%……好きっ……中、気持ちいいっ……」

    永遠を生きる吸血鬼は、刹那の快楽に全てを委ねていた。
