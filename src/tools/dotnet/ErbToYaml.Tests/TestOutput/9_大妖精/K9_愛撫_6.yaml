    「あっ……ん……%CALLNAME:MASTER%の手、あったかい……」

    小さな翅がふるふると震え、喜びを表している。

    「……もっと、触っていいよ……わたし、%CALLNAME:MASTER%のものだから……」

    %CALLNAME:人物_大妖精%は甘えるように%CALLNAME:MASTER%に身を預けた。

