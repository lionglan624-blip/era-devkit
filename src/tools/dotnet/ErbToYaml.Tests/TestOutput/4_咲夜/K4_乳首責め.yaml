character: 咲夜
situation: K4_乳首責め
entries:
- id: fallback
  content: >-
    「あっ……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:MASTER%の指先が%CALLNAME:TARGET%の乳首を捉えた。

    %CALLNAME:TARGET%は瀟洒な仮面を脱ぎ捨て、甘い声を漏らしている。

    「そこ……弱いって……知っているくせに……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の乳首をゆっくりと転がすように責めた。

    「やぁ……もっと……もっと触ってくださいまし……」

    %CALLNAME:TARGET%は恥じらいながらも、%CALLNAME:MASTER%に甘えるように体を預けた。

    「んぁ……っ……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の乳首を指先でつまむと、%CALLNAME:TARGET%は声を漏らした。

    くりくりと擦るように刺激を与えると、%CALLNAME:TARGET%の体が小さく震える。

    「%CALLNAME:MASTER%……そんな風に……されると……」

    %CALLNAME:TARGET%は潤んだ瞳で%CALLNAME:MASTER%を見つめている。

    「……お嬢様には、こんな顔……絶対に見せられませんわ……」

    %CALLNAME:TARGET%は恥ずかしそうに目を伏せながらも、%CALLNAME:MASTER%の手を受け入れていた。

    「ひぁ……っ！」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の乳首を軽くひっぱると、甲高い声が漏れた。

    %CALLNAME:TARGET%は驚きながらも、嫌がる素振りを見せない。

    「意地悪……ですわね……」

    %CALLNAME:MASTER%は緩急をつけながら、%CALLNAME:TARGET%の乳首を責め続けた。

    「んっ……あぁ……そこ……気持ちいい……」

    完璧なメイドが見せる、恋人だけへの蕩けた表情がそこにはあった。

    「あぁっ……やぁ……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の乳首を弄んでいる。

    時を止める力を持つ従者は、今は快感の前に無力だった。

    「……こんな風に……時間を忘れて……」

    %CALLNAME:TARGET%は熱い息を吐きながら、%CALLNAME:MASTER%にしがみついた。

    「%CALLNAME:MASTER%……私……貴方にだけは……全てを委ねられますの……」

    %CALLNAME:TARGET%は甘く囁きながら、%CALLNAME:MASTER%の愛撫に身を任せていた。
  priority: 4
- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%……そこは……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の乳首に触れた。

    %CALLNAME:TARGET%は息を呑み、%CALLNAME:MASTER%を見つめている。

    「……困りますわ……そのような……」

    抗議しようとしながらも、%CALLNAME:TARGET%の体は正直に反応していた。

    「んっ……や……感じて……しまいますわ……」

    %CALLNAME:TARGET%は顔を赤らめながら、小さく身じろぎした。

    「あ……っ……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の乳首をつまんで転がした。

    %CALLNAME:TARGET%は堪えきれずに声を漏らしている。

    「……メイドとして、こんな姿は……」

    %CALLNAME:TARGET%は恥じらいながらも、%CALLNAME:MASTER%の手を払いのけなかった。

    「……でも……%CALLNAME:MASTER%だから……」

    %CALLNAME:TARGET%の声には、隠しきれない甘さが滲んでいた。

    「んぁ……や……%CALLNAME:MASTER%……」

    %CALLNAME:MASTER%の指先が%CALLNAME:TARGET%の乳首を責めている。

    %CALLNAME:TARGET%は必死に声を抑えようとしていたが、次第に我慢できなくなっていた。

    「そ、そんなに……責めないで……くださいまし……」

    くりくりと刺激を与えられるたび、%CALLNAME:TARGET%の体がびくりと震える。

    「……っ……お嬢様のお世話が……あるのに……」

    そう言いながらも、%CALLNAME:TARGET%は逃げようとはしなかった。

    「ひっ……あ……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の乳首を軽くひっぱった。

    %CALLNAME:TARGET%は驚きの声を上げ、%CALLNAME:MASTER%を見つめている。

    「……意地悪ですわね……%CALLNAME:MASTER%は……」

    %CALLNAME:TARGET%は恨めしそうに言いながらも、その目には恋情が宿っていた。

    「……もう……少しだけ……許して差し上げますわ……」

    %CALLNAME:TARGET%は観念したように息を吐いた。
