    %CALLNAME:人物_美鈴%は視線を泳がせた。

    「……すみません……慣れなくて……」

    戸惑いながらも、拒む様子はなかった。

    「あ……ん……っ……」

    %CALLNAME:人物_美鈴%は思わず声を漏らし、慌てて口を押さえた。

    「す、すみません……座ったままだと、深くて……」

    顔を真っ赤にしながら、%CALLNAME:人物_美鈴%は謝った。

    「……%CALLNAME:MASTER%がこの体勢をお望みなら……」

    戸惑いながらも、%CALLNAME:人物_美鈴%は身を委ねていた。

    「……っ……向かい合ってると……」

    %CALLNAME:人物_美鈴%は困ったように呟いた。

    「……%CALLNAME:MASTER%の表情が、よく見えますね……」

    %CALLNAME:人物_美鈴%は途切れ途切れに話した。

    「……私……どんな顔してるんでしょうか……」

    不安そうな瞳が、%CALLNAME:MASTER%を見つめていた。

    「……ん……」

    %CALLNAME:人物_美鈴%は静かに%CALLNAME:MASTER%を受け入れていた。

    「……こうして向かい合ってると……なんだか……」

    %CALLNAME:人物_美鈴%は言葉を選ぶように言った。

    「……%CALLNAME:MASTER%のこと……近くに感じます……」

    「……悪い気分じゃ、ないです……」

