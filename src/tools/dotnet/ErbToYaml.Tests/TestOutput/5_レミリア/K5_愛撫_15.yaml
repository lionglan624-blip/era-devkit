character: レミリア
situation: K5_愛撫
entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%がオナホールを取り出すと、%CALLNAME:人物_レミリア%は紅い瞳を細めた。

    「ふふ……私の代わりにそれを使うの？」

    吸血鬼は恋人の傍に寄り添い、オナホールを見つめた。

    「……ねえ、私が動かしてあげましょうか？」

    %CALLNAME:人物_レミリア%は珍しく甘えた声で申し出た。

    「%CALLNAME:MASTER%の気持ちいい顔、見たいもの」

    紅魔館の主は、恋人のためならば喜んで手を貸すのだった。

    「今夜はそれで遊ぶのね」

    %CALLNAME:人物_レミリア%はオナホールを興味深そうに眺めた。

    「ふふ……私の身体と、どっちが気持ちいいのかしら？」

    小悪魔めいた笑みを浮かべ、%CALLNAME:人物_レミリア%はオナホールを受け取った。

    「さあ、私に任せなさい……ゆっくり、してあげるわ」

    吸血鬼は恋人の快楽を引き出すように、丁寧に動かし始めた。

    「%CALLNAME:MASTER%……私を見て。あなたの顔、素敵よ」

    %CALLNAME:人物_レミリア%はオナホールを手に取り、じっと見つめた。

    「……こんな物より、私の方がいいに決まってるわ」

    そう言いながらも、%CALLNAME:人物_レミリア%はオナホールを%CALLNAME:MASTER%に宛てがった。

    「ん……入ったわね。どう、気持ちいい？」

    吸血鬼は恋人の反応を楽しむように、ゆっくりと動かした。

    「ふふ……そんな顔されると、私も嬉しくなるわ」

    500年を生きた吸血鬼は、恋人に奉仕する悦びを覚えていた。

    「%CALLNAME:MASTER%、今日は私に任せてちょうだい」

    %CALLNAME:人物_レミリア%は自らオナホールを手に取った。

    「あなたが気持ちよくなる姿……私が一番近くで見たいの」

    吸血鬼は恋人に寄り添い、丁寧にオナホールを動かし始めた。

    「んっ……すごい、熱くなってきてる……」

    %CALLNAME:人物_レミリア%は頬を染め、恋人の反応に見入った。

    「%CALLNAME:MASTER%……好きよ。もっと、気持ちよくなって」
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%がオナホールを取り出すと、%CALLNAME:人物_レミリア%は頬を染めた。

    「……そ、それで何をするつもり？」

    吸血鬼は目を逸らしながらも、%CALLNAME:MASTER%から離れなかった。

    「べ、別に手伝いたいわけじゃ……」

    %CALLNAME:人物_レミリア%は言い訳しながら、そっとオナホールに手を伸ばした。

    「……こうすればいいの？　変な顔しないでよ……」

    高貴な吸血鬼は、照れ隠しに悪態をつきながらも手を動かした。

    「……何よ、そのいやらしい物は」

    %CALLNAME:人物_レミリア%はオナホールを睨んだが、興味を隠しきれなかった。

    「私の代わりにそんな物を……ふん、面白くないわね」

    不機嫌そうに言いながら、%CALLNAME:人物_レミリア%はオナホールを奪い取った。

    「……私がやってあげるわよ。下手なんでしょうどうせ」

    吸血鬼は照れ隠しの悪態を吐きながら、ぎこちなく動かし始めた。

    「……べ、別に%CALLNAME:MASTER%のためじゃないんだからね」

    %CALLNAME:MASTER%がオナホールを見せると、%CALLNAME:人物_レミリア%は眉をひそめた。

    「私より、そんな物の方がいいっていうの……？」

    拗ねたような声で言いながら、%CALLNAME:人物_レミリア%はオナホールに手を伸ばした。

    「……いいわよ、見せてあげる。私の方が上手いってこと」

    吸血鬼は対抗心を燃やし、丁寧にオナホールを動かした。

    「ほら、気持ちいいでしょう？　こんな物に負けないわ」

    %CALLNAME:人物_レミリア%の頬は、赤く染まっていた。

    「……また変な物を持ってきて」

    %CALLNAME:人物_レミリア%は溜息をつきながらも、%CALLNAME:MASTER%の隣に座った。

    「仕方ないわね……手伝ってあげる」

    吸血鬼はオナホールを受け取り、ぎこちなく動かし始めた。

    「こ、こうでいいの……？　変な声出さないでよ、恥ずかしいから……」

    %CALLNAME:人物_レミリア%は顔を背けながらも、手は止めなかった。

    「……%CALLNAME:MASTER%のばか。こんな姿、誰にも見せないでよ」
  priority: 3
