- id: fallback
  content: >-
    「なっ……！ 胸は困るわ……」

    %CALLNAME:MASTER%の手が触れた瞬間、%CALLNAME:人物_咲夜%は硬直した。

    「ん……む……」

    驚きながらも、%CALLNAME:人物_咲夜%は振り払わなかった。

    「……いきなりは困るわ。心の準備というものがあるでしょう？」

    %CALLNAME:人物_咲夜%は頬を赤らめながら、小さく抗議した。

    「ちょ、ちょっと……そこは……」

    %CALLNAME:人物_咲夜%は戸惑いながらも、%CALLNAME:MASTER%の手を払いのけなかった。

    その表情はぎこちなく、しかし拒絶ではない。

    「……ぁ……」

    「……もう少し、雰囲気を作ってからにしてほしいわ」

    %CALLNAME:人物_咲夜%は照れを隠すように、そっぽを向いた。

    %CALLNAME:MASTER%が胸に手を伸ばすと、%CALLNAME:人物_咲夜%は身を固くした。

    「んっ……」

    控えめな愛撫に、%CALLNAME:人物_咲夜%は戸惑っている。

    「……%CALLNAME:MASTER%、あなたは……」

    何かを言いかけて、%CALLNAME:人物_咲夜%は口を噤んだ。

    「……いえ、何でもないわ」

    「……%CALLNAME:MASTER%？」

    %CALLNAME:人物_咲夜%は近づいてくる手を、じっと見つめた。

    「あっ……」

    胸に触れられると、%CALLNAME:人物_咲夜%は小さく息を呑んだ。

    「……急にそういうことをされると、困るわ」

    %CALLNAME:人物_咲夜%はそう言いながらも、その頬は微かに紅潮していた。
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:MASTER%が%CALLNAME:人物_咲夜%の胸に手を伸ばした瞬間――

    「何をなさるの？」

    %CALLNAME:人物_咲夜%は時を止め、優雅に距離を取った。

    「軽率な行動は控えなさい。私はお嬢様のメイドよ」

    %CALLNAME:人物_咲夜%は冷ややかな眼差しで%CALLNAME:MASTER%を見つめている。

    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%の胸に触れようとした。

    「……。」

    %CALLNAME:人物_咲夜%は無言のまま、優雅に身を翻した。

    「そのような行為は、もっと親しい間柄ですることだわ」

    %CALLNAME:人物_咲夜%は淡々とそう言い、その場を後にした。

    %CALLNAME:MASTER%が手を伸ばすと、%CALLNAME:人物_咲夜%は目を細めた。

    「……勘違いなさらないで」

    %CALLNAME:人物_咲夜%はナイフを一本取り出し、優雅に弄んでいる。

    「私はお嬢様にお仕えする身。不躾な振る舞いは看過できないわ」

    %CALLNAME:人物_咲夜%の瞳は、冷たく光っていた。

    「あら」

    %CALLNAME:人物_咲夜%は%CALLNAME:MASTER%の意図を察し、小首を傾げた。

    「随分と大胆ね。でも、お断りするわ」

    %CALLNAME:人物_咲夜%は優雅に一歩下がり、距離を取った。

    「まずは信頼を得てからにしなさい。……お茶をお持ちしましょうか？」
  priority: 1
