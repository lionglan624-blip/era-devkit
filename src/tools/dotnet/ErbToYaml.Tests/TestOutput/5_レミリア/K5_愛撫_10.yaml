  content: >-
    「んっ……あ……そこ、敏感なのよ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に胸を吸われながら、小さく身を震わせた。

    500年を生きた吸血鬼が、人間に乳首を吸われて喘いでいる。

