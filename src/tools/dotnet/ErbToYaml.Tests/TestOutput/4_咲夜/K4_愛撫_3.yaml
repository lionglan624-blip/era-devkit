character: 咲夜
situation: K4_愛撫
entries:
- id: fallback
  content: >-
    「……挿れて……くださいまし……」

    %CALLNAME:TARGET%は頬を染め、%CALLNAME:MASTER%に囁いた。

    瀟洒なメイドの仮面を脱ぎ捨て、恋する乙女の顔で。

    「あっ……%CALLNAME:MASTER%の指……熱いですわ……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の膣内に沈んでいく。

    %CALLNAME:TARGET%は甘い吐息を漏らしながら、%CALLNAME:MASTER%の指を締め付けた。

    「……奥まで……もっと深く……」

    恋人だけに見せる、蕩けた表情だった。

    「んっ……ああ……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の膣壁をなぞっている。

    %CALLNAME:TARGET%は身を震わせながら、%CALLNAME:MASTER%に体を預けていた。

    「そこ……いいですわ……もっと、動かして……」

    完璧なメイドらしからぬ、甘えた声が漏れる。

    「%CALLNAME:MASTER%の指……私の中、全部知られてしまいますわね……」

    %CALLNAME:TARGET%は恥ずかしそうに、でも幸せそうに微笑んだ。

    「……%CALLNAME:MASTER%、指、上手になりましたわね……」

    %CALLNAME:TARGET%は熱い息を吐きながら、%CALLNAME:MASTER%を見つめた。

    「んっ……ふぁ……そこ、弱いところですわ……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の敏感な場所を見つけ、的確に刺激する。

    「……私の体、貴方に全部覚えられてしまいましたわ……」

    %CALLNAME:TARGET%は観念したように甘い声を上げた。

    「……もっと……奥を、かき回して……」

    「あっ……やぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指に貫かれ、小さく悲鳴を上げた。

    膣内で動く指の感触に、%CALLNAME:TARGET%の理性が蕩けていく。

    「%CALLNAME:MASTER%……私、貴方の指だけで……」

    言葉を続けられず、%CALLNAME:TARGET%は甘い喘ぎを漏らした。

    「……こんなに感じてしまうなんて……」

    「……お嬢様には、絶対に内緒にしてくださいね……」

    恋人だけに許した、瀟洒な従者の秘密の姿だった。
  priority: 4
- id: talent_3_1
  content: >-
    「っ……指を、挿れるの……？」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%を拒まなかった。

    「……%CALLNAME:MASTER%がお望みなら……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の中に沈んでいく。

    「あっ……熱い……」

    %CALLNAME:TARGET%は声を漏らし、顔を背けた。

    「……感じて、しまいますわ……」

    「んっ……そ、そこは……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の膣壁を撫でている。

    %CALLNAME:TARGET%は恥じらいながらも、逃げようとはしなかった。

    「……メイドとして、こんな姿は……」

    「……でも、貴方だから……」

    %CALLNAME:TARGET%の声には、隠しきれない甘さが滲んでいた。

    「……もう少しだけ……続けてくださいまし……」

    「……あ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指に貫かれ、小さく声を上げた。

    「……こんなところで、こんなこと……」

    抗議しようとしながらも、%CALLNAME:TARGET%の体は正直に反応している。

    「……っ……奥に、当たって……」

    %CALLNAME:TARGET%は快感に耐えきれず、%CALLNAME:MASTER%にしがみついた。

    「ひっ……やめ……いえ……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の膣内で動いている。

    %CALLNAME:TARGET%は拒もうとして、言葉を飲み込んだ。

    「……%CALLNAME:MASTER%は、本当に意地悪ですわね……」

    恨めしそうに言いながらも、%CALLNAME:TARGET%は抵抗をやめた。

    「……こんな風に触られたら……私……」

    %CALLNAME:TARGET%の瞳は潤み、頬は紅く上気していた。
  priority: 3
