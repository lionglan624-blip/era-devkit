- id: fallback
  content: >-
    「ひゃっ……！ な、なにするんですか……！？」

    %CALLNAME:TARGET%は驚いて体を硬くした。

    「む、胸は……恥ずかしいよ……」

    %CALLNAME:TARGET%は困惑しながらも、強くは拒絶しない。

    「……あの、いきなりは、ちょっと……心の準備が……」

    妖精の耳がほんのりと赤くなっていた。

    「……嫌じゃないけど……恥ずかしいの……」

    %CALLNAME:MASTER%が胸に手を伸ばすと、%CALLNAME:TARGET%は身を縮こまらせた。

    「あ、あの……胸、触るんですか……？」

    %CALLNAME:TARGET%は戸惑いながらも、逃げ出そうとはしなかった。

    「……ん……」

    触れられると、%CALLNAME:TARGET%は小さく声を漏らした。

    「……よくわからないけど……へんな気持ち……」

    妖精は困った顔で、自分の感覚を理解しようとしている。

    「ふぇ……？　胸……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の意図に気づき、目を瞬かせた。

    「い、いきなりは……やだよ……」

    でも、強く振り払う気配はなかった。

    「……あたし、こういうの、されたことなくて……」

    %CALLNAME:TARGET%は恥ずかしそうに視線を落とした。

    「もうちょっと……仲良くなってからじゃ、だめ……？」

    「え、ええっと……」

    %CALLNAME:MASTER%が近づくと、%CALLNAME:TARGET%は落ち着かない様子でそわそわしている。

    「胸……触るの……？　あたしの……？」

    %CALLNAME:TARGET%は信じられないという顔で首を傾げた。

    「……んっ……」

    触れられると、%CALLNAME:TARGET%は戸惑いながらも声を漏らした。

    「あの……優しくしてね……？　お願い……」

    妖精は不安そうに、でもどこか期待するような目で%CALLNAME:MASTER%を見ている。
  priority: 2
- id: fallback
  content: >-
    「ひっ……！ な、なにするの……！？」

    %CALLNAME:TARGET%は驚いて両腕で胸を隠した。

    「む、胸は……だめ……！　怖いよ……」

    %CALLNAME:TARGET%は怯えた表情でこちらを見ている。

    「あの……そういうのは、やめてください……」

    妖精の小さな体が、不安そうに震えていた。

    %CALLNAME:MASTER%が手を伸ばすと、%CALLNAME:TARGET%は慌てて後ずさった。

    「い、いきなり胸なんて……！」

    %CALLNAME:TARGET%は目を潤ませながら、首を横に振っている。

    「あたし、まだそんなの……できないよ……」

    「咲夜さんに、怒られちゃう……」

    妖精は泣きそうな顔で、その場から逃げ出したそうにしている。

    「ふぇっ……！？ や、やだ……！」

    %CALLNAME:TARGET%は胸を庇うように身を丸めた。

    「なんで……胸なんて触るの……？」

    %CALLNAME:TARGET%は困惑と恐怖が入り混じった顔で%CALLNAME:MASTER%を見ている。

    「あたし、なにかしちゃった……？　ごめんなさい……」

    妖精は自分が悪いことをしたのかと、不安そうに俯いた。

    「でも……胸は、やだよ……」

    「……！」

    %CALLNAME:MASTER%が近づいてくると、%CALLNAME:TARGET%は警戒した様子で距離を取った。

    「あの……胸は、触らないで……お願い……」

    %CALLNAME:TARGET%は小さな声で、でもはっきりと拒否の意思を示した。

    「もっとお話してから……じゃないと、あたし、怖いの……」

    妖精は申し訳なさそうに、でも譲らない姿勢で立っていた。

    「……ごめんなさい」
  priority: 1
