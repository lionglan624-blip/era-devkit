    「……こうすれば満足するの……？」

    %CALLNAME:TARGET%は疑問を口にしながら、足を動かし続けている。

    「……こんな奉仕で……不思議ね……」

    %CALLNAME:TARGET%は首を傾げた。

    「……まあ、あなたがそう望むなら……続けるわ」

    淡々と、しかし確実に足は動き続けていた。

