- id: fallback
  content: >-
    「……何をしているの」

    %CALLNAME:人物_パチュリー%は冷たい声で%CALLNAME:MASTER%を制止しようとした。

    「許可した覚えはないわ」

    しかし体は正直に反応してしまい、%CALLNAME:人物_パチュリー%は眉を顰めた。

    「……早く終わらせなさい」

    %CALLNAME:人物_パチュリー%は不本意そうに、しかし抵抗を諦めた。

    「やめなさい」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%を睨みつけた。

    「……私の体に、何の権利があって触れるの」

    指が入り込むと、%CALLNAME:人物_パチュリー%は屈辱に顔を歪めた。

    「ん……っ……この……」

    %CALLNAME:人物_パチュリー%は怒りを込めて%CALLNAME:MASTER%を睨んだが、声は震えていた。

    「……」

    %CALLNAME:人物_パチュリー%は無言で%CALLNAME:MASTER%を見つめた。

    その瞳には軽蔑と不快感が浮かんでいる。

    「勝手にしなさい。……ただし、覚えておきなさい」

    指が秘所に触れても、%CALLNAME:人物_パチュリー%は表情を変えない。

    「この借りは、いつか返してもらうわ」

