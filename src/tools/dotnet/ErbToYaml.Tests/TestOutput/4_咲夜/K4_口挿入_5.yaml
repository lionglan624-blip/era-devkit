character: 咲夜
situation: K4_口挿入
entries:
- id: fallback
  content: >-
    「どうかしら……私の足は、気持ちいいかしら？」

    咲夜は完璧なメイドらしく、足の動きも滑らかで淀みがない。

    絹のように滑らかな足裏が%CALLNAME:MASTER%の逸物を包み込むように擦る。

    「ふふ、こういうことも……貴方様の為なら厭わないわ」

    咲夜は微笑みながら、足指で亀頭を優しくつまんだ。

    「こんなこと……恋人になったからこそ、できることね」

    咲夜は頬を僅かに染めながら、足で%CALLNAME:MASTER%を愛撫している。

    足裏の温もりと柔らかな感触が、心地よい刺激を与えてくる。

    「もっと……気持ちよくなって頂戴ね、私の愛する人……」

    咲夜の瞳には深い愛情が宿っていた。

    「少し恥ずかしいけれど……貴方様の為なら」

    咲夜はいつもの瀟洒さを保ちながらも、頬に赤みを滲ませている。

    足指がゆっくりと鈴口をなぞり、%CALLNAME:MASTER%の背筋を快感が駆け上がった。

    「ふふ、感じているのね……嬉しいわ」

    メイドの誇りと恋人としての喜びが、その仕草に表れていた。

    「こうして……触れ合えることが、幸せなの」

    咲夜は穏やかな表情で、足を器用に動かしている。

    熟練した動きで%CALLNAME:MASTER%の逸物を挟み、上下に擦る。

    「全てを捧げたい……そう思うほど、貴方様を愛しているわ」

    咲夜の言葉と温かな足裏が、深い絆を感じさせた。
  priority: 4
- id: talent_3_1
  content: >-
    「こんなこと……恥ずかしいけれど……」

    咲夜は赤面しながらも、足を動かし続けている。

    %CALLNAME:MASTER%への想いが、この行為を受け入れさせているのだろう。

    「私……貴方様のためなら、何でもしたいの」

    震える声でそう告げる姿が、彼女の恋心を物語っていた。

    「足で、こんな……でも、貴方様が望むなら」

    咲夜の足は戸惑いながらも、%CALLNAME:MASTER%の逸物を丁寧に扱っている。

    瀟洒なメイドの仮面の下に、乙女の羞恥心が垣間見える。

    「ん……こうすれば、気持ちいいかしら……？」

    必死に奉仕しようとする姿が愛おしかった。

    「私の足……気に入って頂けたかしら」

    咲夜は恥じらいながらも、足裏で優しく逸物を撫でている。

    %CALLNAME:MASTER%の反応を窺う瞳には、期待と不安が入り混じっていた。

    「もっと……上手になりたいわ、貴方様のために」

    健気な言葉が、咲夜の想いの深さを示していた。

    「こうして……貴方様に触れていると、胸が苦しくなるの」

    咲夜は複雑な表情を浮かべながら、足で奉仕を続けている。

    その動きには、想い人を喜ばせたいという必死さが滲み出ていた。

    「これが恋なのね……止められないわ」

    咲夜は自分の感情を受け入れるように、そう呟いた。
  priority: 3
  condition:
    type: Talent
    talentType: 3
    threshold: 1
- id: fallback
  content: >-
    「……こういうことも、お望みなのね」

    咲夜は複雑な表情で、足を動かしている。

    完璧なメイドとして、要求には応えようとする姿勢が見て取れた。

    「少々、慣れないことではありますが」

    それでも、足裏は丁寧に%CALLNAME:MASTER%を刺激していた。

    「メイドとして……お応えしなければ」

    咲夜は使命感を持って足を動かしているようだ。

    しかし、頬に浮かぶ僅かな赤みが、動揺を物語っていた。

    「こうでよろしいかしら……？」

    問いかける声は、いつもより少し柔らかかった。

    「不思議なもの……嫌ではないのよ」

    咲夜は自分自身に驚いているような表情を見せた。

    足指が%CALLNAME:MASTER%の逸物をなぞり、反応を確かめている。

    「貴方様のためなら……厭わないわ」

    その言葉には、芽生え始めた感情の兆しがあった。

    「……少し、緊張しているの」

    咲夜は普段の完璧さとは違う、人間らしい一面を見せていた。

    足の動きはぎこちないが、真摯に%CALLNAME:MASTER%と向き合っている。

    「お許しくださいね……慣れるまで」

    謙虚な言葉が、咲夜の誠実さを表していた。
  priority: 2
- id: fallback
  content: >-
    「……こういうことがお望みなのですね」

    咲夜は感情を表に出さず、淡々と足を動かしている。

    メイドとしての職務を全うしようという姿勢だけが伝わってくる。

    「お気に召すかどうかは分かりませんが」

    冷静な口調で、足裏が%CALLNAME:MASTER%を刺激した。

    「紅魔館のメイドとして、お仕えするのみです」

    咲夜は完璧な所作で足を動かしているが、瞳は冷ややかだった。

    業務の一環として行っているのが明らかだった。

    「お気に召しましたら、お声をおかけくださいませ」

    形式的な言葉だけが返ってきた。

    「……初めてのことですので、ご容赦を」

    咲夜は戸惑いを隠しきれずにいる。

    それでもメイドの矜持か、足の動きは止めなかった。

    「こちらでよろしいでしょうか」

    確認するような声には、温かみが欠けていた。

    「……」

    咲夜は無言で足を動かしている。

    表情からは何も読み取れず、ただ義務的な動作だけが続いていた。

    「終わりましたらお知らせくださいませ」

    まるで掃除でもするかのような言葉だった。
  priority: 1
