- id: fallback
  content: >-
    「え……こ、こんなことするの……？」

    %CALLNAME:人物_チルノ%は困惑した表情で%CALLNAME:MASTER%を見た。

    「あたいが入れるなんて……よくわかんないんだけど……」

    戸惑いながらも、%CALLNAME:人物_チルノ%は言われた通りに腰を進めた。

    「んっ……はぁ……これで……いいの……？」

    %CALLNAME:人物_チルノ%は繋がった感覚に戸惑っている。

    「……なんか、変な感じ……」

    氷の妖精は自分の体の反応を不思議そうに感じていた。

    「……%CALLNAME:MASTER%って、変なことばっかり頼むよね」

    %CALLNAME:人物_チルノ%は呆れたような顔をした。

    「まあ……やれって言うなら、やってあげるけど」

    %CALLNAME:人物_チルノ%は仕方なさそうに%CALLNAME:MASTER%に覆いかぶさった。

    「んっ……あっ……」

    繋がった瞬間、%CALLNAME:人物_チルノ%は思わず声を上げた。

    「……なにこれ……%CALLNAME:MASTER%の中、変な感じがする……」

    氷の妖精は戸惑いながらも動き始めた。

    「はあ……わかったわよ」

    %CALLNAME:人物_チルノ%はため息をつきながら%CALLNAME:MASTER%を見下ろした。

    「こうすればいいんでしょ……」

    渋々といった様子で腰を進めると、%CALLNAME:人物_チルノ%は眉をひそめた。

    「んっ……あったかい……っていうか、熱い……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%との温度差に驚いていた。

    「……早く終わらせてよね」

    氷の妖精は不機嫌そうに言った。

    「……あたいがこんなことするなんて」

    %CALLNAME:人物_チルノ%は信じられないという顔をした。

    「%CALLNAME:MASTER%のせいで、なんか変になっちゃう……」

    %CALLNAME:人物_チルノ%は戸惑いながら%CALLNAME:MASTER%と繋がった。

    「はぁ……んっ……」

    %CALLNAME:人物_チルノ%は自分の体の反応に戸惑っていた。

    「……%CALLNAME:MASTER%といると、よくわかんなくなる……」

    氷の妖精は複雑な表情で呟いた。
