- id: fallback
  content: >-
    「……ふん、四つん這いになりなさい。私が後ろから可愛がってあげるわ」

    %CALLNAME:人物_レミリア%は傲慢に命じた。

    %CALLNAME:MASTER%の背後に立ち、腰を掴む。

    「……さあ、動くわよ。覚悟しなさい」

