character: フラン
situation: K6_挿入
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……後ろから抱きしめてくれるの……？」

    %CALLNAME:人物_フラン%は恋人の胡坐の上に座りながら、嬉しそうに呟いた。

    背中に感じる温もりが、495年の孤独で冷え切った心を溶かしていく。

    「こうしてると……%CALLNAME:MASTER%が私を守ってくれてるみたいなのさ」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の体を持ち上げ、ゆっくりと下ろした。

    「んっ……ぁ……入ってくる……後ろから抱きしめられながら……幸せ……」

    悪魔の妹は、恋人に包まれる安心感に身を委ねていた。

    「ね、%CALLNAME:MASTER%……ぎゅってして……？」

    %CALLNAME:人物_フラン%は甘えた声で後ろの恋人にねだった。

    背中を預けられる相手がいる喜びを、今は素直に表現できる。

    「私……%CALLNAME:MASTER%の腕の中にいると、壊さないでいられるの」

    %CALLNAME:MASTER%が腰を突き上げると、%CALLNAME:人物_フラン%は声を上げた。

    「あっ……んっ……後ろから突かれるの……気持ちいい……のさ……」

    恋人の腕の中で、悪魔の妹は破壊衝動を忘れて快楽に身を任せていた。

    「%CALLNAME:MASTER%の体温……背中で感じるの……好き」

    %CALLNAME:人物_フラン%は恋人の胸に背中を預けながら囁いた。

    地下室では決して感じられなかった、他者の温もり。

    「こうして繋がってると……ひとりじゃないって……わかるのさ」

    %CALLNAME:MASTER%が胸を弄りながら腰を動かすと、甘い声が漏れた。

    「んふぅ……あぁ……%CALLNAME:MASTER%……いっぱい……感じる……」

    495年の孤独を知る少女は、恋人との繋がりを全身で噛み締めていた。

    「後ろにいるの……見えないのに、わかるよ……%CALLNAME:MASTER%だって」

    %CALLNAME:人物_フラン%は振り向かずに、しかし確信を持って言った。

    恋人の気配は、たとえ目を閉じていても感じ取れる。

    「%CALLNAME:MASTER%にだけは……後ろを見せてもいいのさ」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の腰を掴んで突き上げると、嬌声が響いた。

    「あぁっ……んっ……奥まで……きてるぅ……%CALLNAME:MASTER%……好き……っ」

    背中を預ける信頼は、恋人への愛情の証だった。
  priority: 4
- id: talent_3_1
  content: >-
    「こ、後ろからなの……？　顔、見えないから……ちょっと安心……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の胡坐の上で、照れくさそうに呟いた。

    好きな人の前だと、どんな顔をしていいかわからなくなる。

    「で、でも……%CALLNAME:MASTER%が後ろにいるって思うと……ドキドキする」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の体を持ち上げて下ろすと、声が漏れた。

    「んっ……あ……入ってきた……後ろから抱きしめられながら……恥ずかしい……」

    悪魔の妹は、羞恥と喜びが入り混じった表情を浮かべていた。

    「%CALLNAME:MASTER%……今、どんな顔してる……？」

    %CALLNAME:人物_フラン%は後ろを振り返れずに問いかけた。

    好きな人の表情が気になるけれど、見る勇気がない。

    「私のこと……見てる……？　恥ずかしいのさ……」

    %CALLNAME:MASTER%が腰を突き上げると、%CALLNAME:人物_フラン%は甘い声を上げた。

    「あっ……んっ……気持ち、いい……%CALLNAME:MASTER%も、気持ちいい……？」

    好きな人を喜ばせたいという想いが、その問いかけに込められていた。

    「%CALLNAME:MASTER%に背中、見せてるの……緊張するのさ」

    %CALLNAME:人物_フラン%は背中に感じる視線に身を固くした。

    好きな人に無防備な背中を晒すのは、予想以上に恥ずかしい。

    「で、でも……%CALLNAME:MASTER%なら……後ろを預けても、大丈夫、だよね……？」

    %CALLNAME:MASTER%が胸を弄りながら腰を動かすと、吐息が漏れた。

    「ひゃ……あ……胸も……んっ……全部、%CALLNAME:MASTER%に触られてる……」

    好きな人への信頼が、少しずつ悪魔の妹の警戒心を解いていた。

    「こうしてると……%CALLNAME:MASTER%を壊さないでいられる……かも」

    %CALLNAME:人物_フラン%は自分の手を見つめながら呟いた。

    好きな人を傷つけてしまう恐怖が、常に心の片隅にある。

    「後ろからなら……私の力、加減できる気がするのさ」

    %CALLNAME:MASTER%が深く突き入れると、%CALLNAME:人物_フラン%は声を上げた。

    「あぁっ……んっ……奥に……きてる……%CALLNAME:MASTER%……っ」

    好きな人を壊したくない優しさが、その体勢を選ばせていた。
  priority: 3
