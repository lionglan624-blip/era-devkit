character: 小悪魔
situation: K2_会話親密
entries:
- id: fallback
  content: >-
    「――あら、%CALLNAME:MASTER%がお茶を？」

    %CALLNAME:人物_小悪魔%は嬉しそうに湯飲みを受け取った。

    ふうふう、と息を吹きかけてから、ちびちびとお茶を啜る。

    「……うふふ、美味しいですわ。%CALLNAME:MASTER%って、お茶淹れるの上手なんですね」

    %CALLNAME:人物_小悪魔%はいたずらっぽく微笑みながら、%CALLNAME:MASTER%を見つめた。

    「……ねえ、これからも私にお茶淹れてくださる？」

    悪魔の尻尾を揺らしながら、%CALLNAME:人物_小悪魔%は甘えるようにそうねだった。

    「わぁ、ありがとうございます！」

    %CALLNAME:人物_小悪魔%は両手で湯飲みを包み込むように持った。

    ずず、と音を立ててお茶を啜る。

    「……はぁ、あったまりますわ」

    %CALLNAME:人物_小悪魔%はほっと息を吐き、幸せそうに目を細めた。

    「パチュリー様のお手伝いも、%CALLNAME:MASTER%のお茶があると頑張れるんですよ」

    そう言って、%CALLNAME:人物_小悪魔%は恋人だけに見せる柔らかな笑顔を浮かべた。

    「――ふふっ、%CALLNAME:MASTER%ったら」

    %CALLNAME:人物_小悪魔%は湯飲みを受け取り、香りを楽しむように鼻を近づけた。

    「いい香り……%CALLNAME:MASTER%が淹れてくれたお茶って、なんでこんなに美味しいのかしら」

    %CALLNAME:人物_小悪魔%はゆっくりとお茶を口に含み、至福の表情を浮かべた。

    「ねえ、%CALLNAME:MASTER%。これ、愛情が入ってますでしょう？」

    %CALLNAME:人物_小悪魔%は悪戯っぽく微笑み、%CALLNAME:MASTER%の頬に軽くキスをした。

    「悪魔だから、そういうの分かっちゃうんですよ」

    「――あ、お茶ですか？　嬉しいです」

    %CALLNAME:人物_小悪魔%は湯飲みを受け取り、%CALLNAME:MASTER%の隣に座った。

    ずずず、とお茶を啜りながら、%CALLNAME:MASTER%の肩に頭を預ける。

    「……こうしてると、悪魔だってこと忘れちゃいそうですわ」

    %CALLNAME:人物_小悪魔%は幸せそうに目を閉じた。

    「%CALLNAME:MASTER%といると、ぽかぽかするんです……お茶のせいだけじゃないですよ」

    尻尾がゆらゆらと揺れている。
  priority: 4
- id: talent_3_1
  content: >-
    「――え、お茶？　%CALLNAME:MASTER%が淹れてくださったんですか？」

    %CALLNAME:人物_小悪魔%は少し驚いた様子で湯飲みを受け取った。

    そっと口をつけて、ゆっくりとお茶を味わう。

    「……うん、美味しいですわ。ありがとうございます」

    %CALLNAME:人物_小悪魔%は頬を少し染めながら、微笑んだ。

    「……なんだか、こういうの……嬉しいですの」

    照れくさそうに視線を逸らしながら、%CALLNAME:人物_小悪魔%はぽつりと呟いた。

    「あ、わざわざありがとうございます」

    %CALLNAME:人物_小悪魔%は嬉しそうに湯飲みを受け取った。

    ずず、とお茶を啜る音が静かに響く。

    「……あちっ」

    %CALLNAME:人物_小悪魔%は熱さに思わず舌を出した。

    「……ふふ、でも美味しいですわ。%CALLNAME:MASTER%って、気が利くんですね」

    恥ずかしそうにしながらも、%CALLNAME:人物_小悪魔%は嬉しそうにお茶を飲み続けた。

    「――わ、私にですか？」

    %CALLNAME:人物_小悪魔%は少し目を丸くして湯飲みを受け取った。

    「……ありがとうございます。パチュリー様以外の方からお茶をいただくの、珍しいですわ」

    %CALLNAME:人物_小悪魔%はふぅふぅと息を吹きかけてから、お茶を啜った。

    「……美味しい。%CALLNAME:MASTER%って、こういうことされるんですね」

    %CALLNAME:人物_小悪魔%は尻尾を揺らしながら、少し照れた様子で%CALLNAME:MASTER%を見た。

    「……また、淹れてくださいます？」

    「――お茶……わざわざありがとうございます」

    %CALLNAME:人物_小悪魔%は湯飲みを両手で包み込んだ。

    「図書館のお仕事、ちょうど一休みしたかったところなんです」

    そう言ってお茶を啜ると、%CALLNAME:人物_小悪魔%は嬉しそうに息を吐いた。

    「%CALLNAME:MASTER%って、タイミングがいいんですね……ふふ」

    何かを期待するような視線を向けながら、%CALLNAME:人物_小悪魔%は微笑んだ。
