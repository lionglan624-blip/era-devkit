    サキュバスの眷属として、%CALLNAME:TARGET%は%CALLNAME:MASTER%から精気を搾り取ろうとしていた。

    「ふぅん……あたしがうえだと……%CALLNAME:MASTER%、にげられない……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見下ろし、小首を傾げた。

    悪魔の少女の瞳には、獲物を押さえつけた捕食者の光が宿っている。

    「いいよ……じっとしてて……」

    %CALLNAME:TARGET%は本能に従い、%CALLNAME:MASTER%の上で腰を動かし始めた。

    「あたしが……ぜんぶ、とる……」

