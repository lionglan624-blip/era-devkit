- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%にキスをしようとした。

    「ひっ……！ な、なに……するの……！？」

    %CALLNAME:TARGET%は驚いて後ずさった。

    「い、いきなりキスなんて……わたし、怖いよ……」

    %CALLNAME:TARGET%は身を縮こまらせて、不安そうにこちらを見ている。

    「……もうちょっと仲良くなってから……に、してください……」

    「え、えっ……！？」

    %CALLNAME:MASTER%が顔を近づけると、%CALLNAME:TARGET%は慌てて顔を背けた。

    「あの……キスは、ちょっと……まだ早いと思うの……」

    %CALLNAME:TARGET%は困った顔でもじもじしている。

    「咲夜さんに怒られちゃうし……だ、だめです……」

    妖精の小さな体が、緊張で強張っていた。

    「ふぇっ……！？」

    %CALLNAME:MASTER%が顔を近づけてきて、%CALLNAME:TARGET%は目を丸くした。

    「あ、あの、あたし、そういうの、よくわからなくて……」

    %CALLNAME:TARGET%は両手を前に出して、慌てて距離を取った。

    「き、キスって……恋人同士がするものですよね……？」

    妖精は困惑した顔で首を傾げている。

    「あたし、まだ……そういうのは……」

    %CALLNAME:MASTER%が急に顔を近づけてきた。

    「ひゃっ……！？」

    %CALLNAME:TARGET%は驚いて、ぴょんと後ろに跳んだ。

    「な、なにするんですかぁ……！」

    %CALLNAME:TARGET%は頬を赤くして、抗議するように%CALLNAME:MASTER%を見ている。

    「キスとか……急にそんなこと言われても……困ります……」

    妖精は怯えながらも、どこか好奇心を隠しきれない様子だった。

    「……もうちょっと、仲良くなってからに、しません……？」
  priority: 1
