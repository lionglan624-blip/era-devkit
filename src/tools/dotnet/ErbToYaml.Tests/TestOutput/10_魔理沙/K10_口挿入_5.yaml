    「……コツが分かってきたかもな」

    「ふーん……こういう感触なのか」

    %CALLNAME:人物_魔理沙%は知的好奇心から、足の動かし方を工夫した。

    「足で擦ると……硬くなるんだな……不思議なもんだぜ」

    %CALLNAME:人物_魔理沙%は足を動かしながら、%CALLNAME:MASTER%の反応を見ていた。

    「……なんか、こうしてると私も変な気分になってくるな……」

    %CALLNAME:人物_魔理沙%は自分の体の反応に戸惑っていた。

    「これが……足扱きってやつか」

    「……%CALLNAME:MASTER%、これで合ってるのか？」

    %CALLNAME:人物_魔理沙%は真剣な表情で訊ねた。

    「私、こういうの初めてだから……ちゃんと教えてくれよ」

    %CALLNAME:MASTER%が足の動かし方を教えると、%CALLNAME:人物_魔理沙%は素直に従った。

    「なるほど……こうやって動かすのか……」

    %CALLNAME:人物_魔理沙%は教わった通りに足を動かし、真剣に練習していた。

    「……覚えが早いって言ってくれよな」
