entries:
- id: fallback
  content: >-
    「――%CALLNAME:MASTER%……全身で、洗ってあげるわ……」

    %CALLNAME:人物_美鈴%は甘い声でそう言って、石鹸を泡立て始めた。

    たっぷりの泡を体中に塗りたくり、%CALLNAME:人物_美鈴%はぬるぬるとした肌を%CALLNAME:MASTER%に押し付けてきた。

    「……ふふ、気持ちいいでしょ……？　私の体、%CALLNAME:MASTER%専用よ……」

    %CALLNAME:人物_美鈴%は胸を%CALLNAME:MASTER%の胸板に擦り付け、全身を絡めてきた。

    「……ん……私も、%CALLNAME:MASTER%の体に触れてると……幸せ……」

    愛おしげに、%CALLNAME:人物_美鈴%は一物にも泡立った指を這わせた。

    「……ねえ、%CALLNAME:MASTER%……こうやって密着してると……」

    %CALLNAME:人物_美鈴%は頬を染めながら、石鹸で滑りやすくなった体を擦り付けた。

    「……私たち、一つになってるみたい……」

    %CALLNAME:人物_美鈴%は柔らかい胸で%CALLNAME:MASTER%の体を撫で回した。

    「……ほら、ここも……きれいにしてあげる……」

    そう言って、%CALLNAME:人物_美鈴%は泡立った手で一物を優しく包み込んだ。

    「……%CALLNAME:MASTER%の気持ちいいところ、全部知ってるから……任せて……」

    「……%CALLNAME:MASTER%の体、泡で洗うの……好き……」

    %CALLNAME:人物_美鈴%はうっとりと目を細めながら、%CALLNAME:MASTER%に体を絡めた。

    武術家の鍛えられた体が、泡のおかげでぬるぬると滑る。

    「……乳首、擦れて……私も、気持ちいい……」

    %CALLNAME:人物_美鈴%は自分の快感も感じながら、体を動かし続けた。

    「……%CALLNAME:MASTER%……一緒に、気持ちよくなろう……？」

    %CALLNAME:人物_美鈴%は太腿も絡めて、一物を挟み込んで擦り始めた。

    「――私の体全部、%CALLNAME:MASTER%のためにあるの……」

    %CALLNAME:人物_美鈴%は愛を込めて囁きながら、泡立った体で%CALLNAME:MASTER%を包み込んだ。

    「……胸も、お腹も、脚も……全部使って、%CALLNAME:MASTER%を気持ちよくしてあげる……」

    %CALLNAME:人物_美鈴%は蛇のように体を絡め、一物にも陰部を擦り付けた。

    「……ふふ、%CALLNAME:MASTER%の顔、とろけそう……」

    %CALLNAME:人物_美鈴%は嬉しそうに笑いながら、動きを速めた。

    「……このまま……いっぱい出して……全部、受け止めてあげる……」
  priority: 4
- id: talent_3_1
  content: >-
    「……あ、泡踊り……？　それって……」

    %CALLNAME:人物_美鈴%は顔を真っ赤にして、石鹸を手に取った。

    「……そ、そういうの……したことないけど……」

    おずおずと泡を体に塗り、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に近づいた。

    「……わ、ぬるぬる……こ、こうすればいいの……？」

    ぎこちない動きで体を擦り付けながら、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の反応を窺った。

    「……変じゃ、ない……？　ちゃんとできてる……？」

    「……%CALLNAME:MASTER%が、してほしいって言うから……」

    %CALLNAME:人物_美鈴%は照れ隠しに言い訳をしながら、石鹸を泡立てた。

    「……嫌じゃ、ないから……やってあげる……」

    体中に泡を塗り、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に体を押し付けた。

    「……ん……滑って……胸が、当たっちゃう……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに、でも一生懸命に体を動かした。

    「……こう……？　教えて、もっと上手にしたいから……」

    「……ほ、ほら……私だって、これくらい……」

    %CALLNAME:人物_美鈴%は強がるように言いながら、泡立った体で%CALLNAME:MASTER%に抱きついた。

    しかしその動きはまだぎこちなく、頑張りが伝わってくる。

    「……ふ、ん……乳首が擦れて……変な感じ……」

    %CALLNAME:人物_美鈴%は自分の快感に驚いた顔をした。

    「……で、でも……%CALLNAME:MASTER%が喜んでくれるなら……」

    「……もう少し、続けてあげても……いい、かな……」

    「……%CALLNAME:MASTER%……私で、いいの……？」

    %CALLNAME:人物_美鈴%は不安そうに見上げながら、泡を塗りたくった。

    「……門番なんかの私が……こんなこと……」

    躊躇いながらも、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に体を寄せた。

    「……ん……%CALLNAME:MASTER%がそれでいいなら……頑張る……」

    %CALLNAME:人物_美鈴%は覚悟を決めたように全身を擦り付け始めた。

    「……私……一生懸命、するから……」
