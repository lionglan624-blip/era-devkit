entries:
- id: fallback
  content: >-
    「ねえ、%CALLNAME:MASTER%……こうして上に乗っても、いい……？」

    %CALLNAME:人物_フラン%は恋人の上にゆっくりと跨り、太腿で一物を挟み込んだ。

    紅い瞳に愛おしさが滲み、柔らかな肌が熱いそれを包む。

    「んっ……すっごく熱いのさ……%CALLNAME:MASTER%の気持ち、伝わってくる……」

    %CALLNAME:人物_フラン%は腰を優しく前後に揺らし始めた。

    「壊したくないから……ゆっくり、するね……ふふ……」

    495年の孤独を知る少女は、壊すことなく愛せる喜びに満たされていた。

    「%CALLNAME:MASTER%のここ……私の太腿で挟んであげる……」

    %CALLNAME:人物_フラン%は嬉しそうに微笑みながら、柔らかな股で一物を包んだ。

    恋人の反応を確かめるように、ゆっくりと腰を動かす。

    「ん……私のここ、濡れてきちゃった……%CALLNAME:MASTER%のせいなのさ……」

    %CALLNAME:人物_フラン%は頬を紅く染めながら、腰の動きを続けた。

    「気持ちいい……？　……よかった……もっとしてあげるね……」

    恋人への奉仕に、%CALLNAME:人物_フラン%自身も快感を覚え始めていた。

    「こうして%CALLNAME:MASTER%の上にいると……繋がってる気がするの……」

    %CALLNAME:人物_フラン%は恋人に跨りながら、太腿でしっかりと挟み込んでいた。

    地下室の孤独を知る少女にとって、この体温の共有は何よりの証。

    「んふふ……%CALLNAME:MASTER%、ぴくぴくしてる……」

    %CALLNAME:人物_フラン%は嬉しそうに腰を動かし、自分の秘所でも擦り上げた。

    「私も気持ちよくなってきた……ずっとこうしていたいのさ……」

    その言葉には、純粋な愛と繋がりへの渇望が込められていた。

    「%CALLNAME:MASTER%……大好き……」

    %CALLNAME:人物_フラン%は恋人に跨りながら、上目遣いで見つめていた。

    紅い瞳には%CALLNAME:MASTER%だけが映り、腰は優しく動き続ける。

    「私の太腿……%CALLNAME:MASTER%のために使って……」

    %CALLNAME:人物_フラン%は愛おしそうに腰を動かし、一物を柔肌で包んだ。

    「出そうになったら……私の上に全部出していいよ……？」

    悪魔の妹は、恋人への奉仕に心から満たされていた。
