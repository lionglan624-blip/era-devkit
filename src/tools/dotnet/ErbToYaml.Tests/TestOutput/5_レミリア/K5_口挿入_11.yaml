character: レミリア
situation: K5_口挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、私に触られたいの？」

    %CALLNAME:人物_レミリア%は艶やかに微笑みながら、%CALLNAME:MASTER%の肌に手を伸ばした。

    細い指が触れると、冷たい感触が心地よく広がる。

    「……%CALLNAME:MASTER%の体、温かいわね。私の冷たい手で、もっと感じさせてあげる」

    %CALLNAME:人物_レミリア%は愛おしげに%CALLNAME:MASTER%の肌を撫でた。

    「こうして触れていると……私も温かくなるような気がするわ」

    紅魔館の主は、恋人の体温を指先で味わうように愛撫を続けた。

    「今夜は……ゆっくり、触れさせてもらうわね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の傍に寄り添い、その肌に指を這わせた。

    紅い瞳が愛おしげに%CALLNAME:MASTER%を見つめる。

    「こうして触れていると……%CALLNAME:MASTER%が生きていることを感じられるわ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胸に手を当て、心臓の鼓動を確かめた。

    「……この音を聞いていると、私も幸せになれる」

    500年を生きた吸血鬼が、恋人の体温に安らぎを見出していた。

    「……%CALLNAME:MASTER%の体、全部私のものよ」

    %CALLNAME:人物_レミリア%は独占欲を込めて%CALLNAME:MASTER%の肌を撫でた。

    細い指が隅々まで触れ、その反応を楽しむ。

    「ふふ……ここを触ると、こんな顔をするのね」

    %CALLNAME:人物_レミリア%は悪戯っぽく笑い、敏感な場所を重点的に愛撫した。

    「%CALLNAME:MASTER%の全部を知りたいの……もっと見せて」

    紅魔館の主は、恋人の体を隅々まで愛おしむように触れ続けた。

    「ほら……私の手、冷たいでしょう？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の頬に手を当て、微笑んだ。

    そのまま指先を滑らせ、首筋から胸へと愛撫が移る。

    「でも……%CALLNAME:MASTER%に触れていると、少しずつ温まってくるの」

    %CALLNAME:人物_レミリア%は幸せそうに目を細めた。

    「もっと触れさせて……%CALLNAME:MASTER%の温もりで、私を満たして」

    永遠を生きる吸血鬼が、恋人の体温を求めて甘えるように寄り添った。
  priority: 4
- id: talent_3_1
  content: >-
    「……少し、触れさせてもらうわね」

    %CALLNAME:人物_レミリア%は少し恥ずかしそうに%CALLNAME:MASTER%の肌に手を伸ばした。

    細い指が触れると、紅い瞳が僅かに揺れる。

    「……温かい。生きている証拠ね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の肌を優しく撫でた。

    「こうして触れていると……不思議な気持ちになるわ」

    紅魔館の主は、照れ隠しのように視線を逸らしながら愛撫を続けた。

    「……私の手、冷たすぎないかしら」

    %CALLNAME:人物_レミリア%は気遣わしげに%CALLNAME:MASTER%の様子を窺った。

    吸血鬼の冷たい指が、人の温もりを求めるように肌を撫でる。

    「……%CALLNAME:MASTER%の体に触れていると、私まで温かくなるような……」

    %CALLNAME:人物_レミリア%は頬を染めて呟いた。

    「……変なことを言ったわね。忘れて」

    500年の吸血鬼は、慣れない感情に戸惑いながら愛撫を続けた。

    「……こうするのは、久しぶりね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の傍に座り、その肌に手を当てた。

    冷たい指が、温もりを確かめるようにゆっくりと動く。

    「……%CALLNAME:MASTER%の体、覚えておきたいわ」

    %CALLNAME:人物_レミリア%は真剣な表情で呟いた。

    「……何百年経っても、忘れないように」

    紅魔館の主は、この瞬間を記憶に刻むように丁寧に触れ続けた。

    「……触れたいと思ったの。変かしら」

    %CALLNAME:人物_レミリア%は率直に言い、%CALLNAME:MASTER%の肌に触れた。

    細い指が胸から腹部へと滑っていく。

    「……%CALLNAME:MASTER%の体、不思議と落ち着くわ」

    %CALLNAME:人物_レミリア%は安らいだ表情を見せた。

    「もう少しだけ……こうしていてもいいかしら」

    500年の孤独を知る吸血鬼が、人の温もりに安らぎを見出していた。
  priority: 3
  condition:
    type: Talent
    talentType: 3
