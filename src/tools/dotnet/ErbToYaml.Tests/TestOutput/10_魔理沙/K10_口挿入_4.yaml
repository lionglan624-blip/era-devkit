- id: fallback
  content: >-
    「え、えっと……こういうの、初めてなんだが……」

    %CALLNAME:人物_魔理沙%は戸惑いながら、石鹸を泡立て体に塗りたくった。

    「本で読んだことはあるけど……実際にやるのは……」

    %CALLNAME:人物_魔理沙%はおそるおそる%CALLNAME:MASTER%の体に体を擦り付けた。

    「うわっ……ぬるぬるする……こうやって擦るのか……」

    %CALLNAME:人物_魔理沙%は興味深そうに、ゆっくりと体を動かし始めた。

    「……不思議な感触だな、これ……」

    「こうか……？　合ってるのか……？」

    %CALLNAME:人物_魔理沙%は不安そうに%CALLNAME:MASTER%の顔を窺った。

    「体の動かし方がよくわからないんだ……教えてくれよ」

    %CALLNAME:人物_魔理沙%の動きはぎこちないが、真剣だった。

    「んっ……なるほど、こうすると反応するのか……」

    %CALLNAME:人物_魔理沙%は魔法の実験のように、興味津々で体を動かした。

    「……泡で滑りやすいから、コツが掴みにくいな」

    「ふーん……こういう感触なのか」

    %CALLNAME:人物_魔理沙%は知的好奇心から、体の動かし方を工夫した。

    「泡で擦ると……なんか私も気持ちよくなってくるな……」

    %CALLNAME:人物_魔理沙%は体を動かしながら、%CALLNAME:MASTER%の反応を見ていた。

    「……なんか、こうしてると変な気分になってくるぜ……」

    %CALLNAME:人物_魔理沙%は自分の体の反応に戸惑っていた。

    「これが……泡踊りってやつか……」

    「……%CALLNAME:MASTER%、これで合ってるのか？」

    %CALLNAME:人物_魔理沙%は真剣な表情で訊ねた。

    「私、こういうの初めてだから……ちゃんと教えてくれよ」

    %CALLNAME:MASTER%が体の動かし方を教えると、%CALLNAME:人物_魔理沙%は素直に従った。

    「なるほど……こうやって全身を使うのか……」

    %CALLNAME:人物_魔理沙%は教わった通りに体を動かし、真剣に練習していた。

    「……覚えが早いって言ってくれよな」
