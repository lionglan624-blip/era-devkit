character: フラン
situation: K6_愛撫
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……それ、つぶつぶなのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にあるアナルビーズを興味深そうに見つめた。

    宝石のように連なった珠に、紅い瞳が輝いている。

    「私のお尻に入れるの？　全部？　楽しみなのさ」

    %CALLNAME:MASTER%がゆっくりとアナルビーズを挿入すると、%CALLNAME:人物_フラン%は甘い声を上げた。

    「んっ……はぁっ……一つずつ入ってくる……変な感じ……」

    %CALLNAME:人物_フラン%は恋人にしがみつき、一珠ごとの刺激に身を震わせた。

    「あっ……んっ……%CALLNAME:MASTER%……きもちいい……」

    %CALLNAME:人物_フラン%はアナルビーズの挿入感に、蕩けた表情を浮かべた。

    珠が一つ入るたびに、甘い吐息が漏れる。

    「お尻の中で……ぷちぷちしてる……のさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見上げて、幸せそうに微笑んだ。

    「%CALLNAME:MASTER%と遊ぶの、大好きなのさ」

    495年の孤独を知る少女は、恋人との時間に至福を感じていた。

    「えへへ……またそれ使うんだね」

    %CALLNAME:人物_フラン%はアナルビーズを見て、嬉しそうに笑った。

    「私のお尻、%CALLNAME:MASTER%のおもちゃ箱なのさ」

    アナルビーズが挿入されると、%CALLNAME:人物_フラン%は声を詰まらせた。

    「ひゃあっ……！　一個一個、入ってくる……！」

    %CALLNAME:人物_フラン%は恋人の腕に爪を立て、快感に耐えた。

    「%CALLNAME:MASTER%……私、お尻からも壊れちゃいそう……」

    「%CALLNAME:MASTER%……今日もお尻にそれ入れるの？」

    %CALLNAME:人物_フラン%はアナルビーズを見て、期待に頬を染めた。

    自ら臀部を突き出し、恋人を待っていた。

    「んっ……あっ……入ってきた……一個、また一個……」

    珠が全て入ると、%CALLNAME:人物_フラン%は深い息を吐いた。

    「あっ……ずっしり……重いのさ……」

    悪魔の妹は、恋人に与えられる背徳的な快楽に酔いしれていた。
  priority: 4
- id: talent_3_1
  content: >-
    「な、なに……？　それ、数珠みたいなのさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つアナルビーズを警戒しながら見た。

    「お、お尻に入れるの……？　恥ずかしいんだけど……」

    しかし拒否はせず、%CALLNAME:人物_フラン%は顔を赤くして待っていた。

    挿入されると、%CALLNAME:人物_フラン%は目を見開いた。

    「ひゃあっ！？　次々入ってくる……！　やっ、そんなの初めて……！」

    その声は悲鳴に近かったが、逃げようとはしなかった。

    「あっ……やっ……%CALLNAME:MASTER%……お尻がいっぱいになっちゃう……」

    %CALLNAME:人物_フラン%はアナルビーズの感触に、切ない声を漏らした。

    「そんなに奥まで……ぷちぷち……意地悪なのさ……」

    %CALLNAME:人物_フラン%は恨めしそうに、でもどこか期待を込めて%CALLNAME:MASTER%を見た。

    「……こんな恥ずかしいところ、%CALLNAME:MASTER%にしか見せられないの……」

    紅い瞳には、羞恥と背徳的な快感が入り混じっていた。

    「ちょ、ちょっと……お尻は心の準備が……」

    %CALLNAME:人物_フラン%はアナルビーズを見て、身構えた。

    しかし%CALLNAME:MASTER%は待たず、ゆっくりと挿入を始めた。

    「んあっ！？　やっ、いきなり……！　あっ、あっ、どんどん入ってくる……！」

    連なる珠に、%CALLNAME:人物_フラン%は甘い悲鳴を上げた。

    「お尻の中……すごい……変になっちゃう……のさ……」

    %CALLNAME:人物_フラン%は混乱しながらも、%CALLNAME:MASTER%の手を握りしめていた。

    「んっ……はぁっ……これ、お腹の中でごろごろしてる……」

    %CALLNAME:人物_フラン%はアナルビーズの重さに、息を荒くしていた。

    「%CALLNAME:MASTER%……こんな気持ち……知らなかった……のさ……」

    495年の孤独を知る少女は、新しい感覚に戸惑っていた。

    「……でも、%CALLNAME:MASTER%とだから……受け入れられるの」

    %CALLNAME:人物_フラン%は照れながら、快感に身を任せた。
