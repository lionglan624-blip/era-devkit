- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……その……奥の方……」

    %CALLNAME:TARGET%は二つの熱に貫かれながら、特別な刺激を感じていた。

    「お腹の裏……天井のところ……擦られて……」

    %CALLNAME:MASTER%が意図的にその場所を刺激すると、%CALLNAME:TARGET%の体が大きく震える。

    「ひぁっ……！　そこ……強すぎますわ……」

    「でも……貴方だから……全部……受け入れられますわ……」

    瀟洒なメイドは、愛する人に最も敏感な場所を委ね、蕩けていた。

    「ふぁ……%CALLNAME:MASTER%……すごい……ですわ……」

    %CALLNAME:TARGET%は膣の天井を擦り上げられ、理性が飛びそうになっている。

    「こんな……強い感覚……初めて……」

    「ぐり、って……奥を……責められると……」

    %CALLNAME:MASTER%がさらに強く擦ると、%CALLNAME:TARGET%の声が悲鳴のように高くなる。

    「あああっ……！　頭……真っ白に……」

    「……もう……貴方なしでは……生きていけませんわ……」

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の顔を見つめながら、快楽に溺れている。

    「二人に抱かれながら……貴方に奥を……責められて……」

    「こんなに……気持ちいいなんて……」

    %CALLNAME:MASTER%が膣の天井を擦り上げるたび、%CALLNAME:TARGET%の体が跳ねる。

    「あっ……そこ……また……来て……」

    「……完璧なメイドなど……貴方の前では……忘れてしまいますわ……」

    「……あ……%CALLNAME:MASTER%……お願い……」

    %CALLNAME:TARGET%は快楽の波に飲まれながら、%CALLNAME:MASTER%に縋り付いた。

    「もっと……奥を……擦って……」

    「……自分から……こんなこと……言うなんて……」

    %CALLNAME:MASTER%が期待に応え、強く膣の天井を責めた。

    「んあああっ……！　達……達しそう……ですわ……」

    完璧なメイドは、恋人だけに見せる淫らな表情で快楽に身を委ねていた。
