- id: talent_3_1
  content: >-
    「えっ……そ、そこは……」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の手を見つめ、顔を赤らめた。

    指が入り込むと、%CALLNAME:人物_パチュリー%は小さく声を漏らす。

    「んっ……あ……恥ずかしいわ……」

    %CALLNAME:人物_パチュリー%は本で顔を隠そうとしたが、本を持つ手が震えている。

    「……で、でも……嫌じゃないの……」

    そう呟きながら、%CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%に身を任せた。

    「あっ……な、何するの……」

    %CALLNAME:人物_パチュリー%は慌てたように声を上げたが、%CALLNAME:MASTER%を止めようとはしなかった。

    指が秘所に触れると、%CALLNAME:人物_パチュリー%は息を呑んだ。

    「ん……ふ……そんなところ……」

    %CALLNAME:人物_パチュリー%の体は正直で、既に蜜が溢れ始めている。

    「……読書の、邪魔よ……」

    抗議の言葉とは裏腹に、%CALLNAME:人物_パチュリー%の声は甘く掠れていた。

    「ひっ……」

    %CALLNAME:人物_パチュリー%は指が入った瞬間、小さく悲鳴を上げた。

    「あ……あなた、いきなり……」

    抗議しようとするも、快感で言葉が途切れてしまう。

    「んんっ……は、恥ずかしいからっ……見ないで……」

    %CALLNAME:人物_パチュリー%は顔を真っ赤にして目を伏せた。

    「……でも、やめないで……」

    消え入りそうな声で、%CALLNAME:人物_パチュリー%はそう呟いた。

    「……%CALLNAME:MASTER%？」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の意図を察し、頬を染めた。

    「……分かったわ。でも、ここでは……」

    %CALLNAME:人物_パチュリー%は周囲を気にしながらも、そっと脚を開いた。

    「んっ……あ……入ってる……」

    指が秘所を探ると、%CALLNAME:人物_パチュリー%は熱い息を漏らした。

    「……あなたにだから、許すのよ……」
