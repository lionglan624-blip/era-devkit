character: レミリア
situation: K5_挿入
entries:
- id: fallback
  content: >-
    「……二人、同時に……？」

    %CALLNAME:人物_レミリア%は驚きながらも、その瞳に期待を滲ませた。

    「いいわ……あなたたちになら、全部預けてあげる」

    二つの熱が同時に%CALLNAME:人物_レミリア%の中に入ってくる。

    「っ……あ、ぁあ……っ！ 両方……同時に……っ」

    %CALLNAME:人物_レミリア%は甘い悲鳴を上げ、二人にしがみついた。

    「こんなに……満たされるなんて……っ、頭が……真っ白……」

    500年の吸血鬼は、二つの快楽に蕩けていった。

    「んっ……二人がかりで……贅沢ね……」

    %CALLNAME:人物_レミリア%は艶やかに微笑み、二人を受け入れる体勢を取った。

    「さあ……私を満たして頂戴」

    前と後ろから同時に貫かれ、%CALLNAME:人物_レミリア%は声を上げた。

    「あぁっ……はぁ……っ、凄い……両方から……っ」

    %CALLNAME:人物_レミリア%は二人の律動に身を任せた。

    「もっと……もっと激しく……私を壊して……っ」

    紅魔館の主は、二つの快楽に溺れていた。

    「……二人とも、私のことが欲しいの？」

    %CALLNAME:人物_レミリア%は悪戯っぽく笑い、両腕を広げた。

    「いいわよ……二人とも、私のものだもの」

    二つの熱が%CALLNAME:人物_レミリア%を同時に貫いた。

    「っ……ひゃ、ぁあ……っ！ お腹の中で……ぶつかって……っ」

    %CALLNAME:人物_レミリア%は背を反らせて喘いだ。

    「二人の愛を……同時に感じるなんて……幸せ……っ」

    吸血鬼は二人の腕の中で、幸福に身を震わせた。

    「ふふ……こうして二人に挟まれると……安心するわ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%と目を合わせながら微笑んだ。

    「私の全部を……あなたたちにあげる」

    前後から同時に挿入され、%CALLNAME:人物_レミリア%は息を呑んだ。

    「っ……あ……ぁあ……っ！ 奥まで……両方とも……っ」

    %CALLNAME:人物_レミリア%は二人の体に爪を立てた。

    「こんな……贅沢な快楽……永遠に続けばいいのに……っ」

    永遠を生きる吸血鬼が、刹那の快楽に溺れていた。
  priority: 4
- id: talent_3_1
  content: >-
    「な……っ、二人同時って……正気なの……！？」

    %CALLNAME:人物_レミリア%は頬を真っ赤に染めて抗議した。

    「……わ、分かったわよ……今日だけよ……っ」

    二つの熱が同時に%CALLNAME:人物_レミリア%に挿入された。

    「っ！ あ、ぁあ……っ！ 無理……両方なんて……っ」

    %CALLNAME:人物_レミリア%は悲鳴を上げながら二人にしがみついた。

    「ば、馬鹿……っ、こんなの……っ、頭おかしく……なる……っ」

    強がりも、圧倒的な快感の前には無力だった。

    「ふ、二人がかりとか……卑怯じゃない……っ」

    %CALLNAME:人物_レミリア%は恨めしそうに二人を見た。

    「……べ、別に嫌じゃないけど……っ」

    前後から同時に貫かれ、%CALLNAME:人物_レミリア%は声を失った。

    「ひ……っ、ぁあ……っ！ お腹……いっぱい……っ」

    %CALLNAME:人物_レミリア%は涙目で喘いだ。

    「こ、こんなの……あなたたちのせいよ……っ」

    責めながらも、その体は二つの快楽を求めていた。

    「……ふん、二人がかりじゃないと私を落とせないの？」

    %CALLNAME:人物_レミリア%は虚勢を張ってみせた。

    しかし、二つの熱が同時に入ってくると、

    「ひゃっ……あ、あぁ……っ！ ま、待って……っ」

    威厳のある態度は一瞬で崩れ去った。

    「両方……動かないで……っ、おかしく……なる……っ」

    %CALLNAME:人物_レミリア%は二人の体にしがみつき、快感に耐えた。

    「……ず、ずるいわよ……二人がかりなんて……っ」

    「に、二人同時って……恥ずかしいじゃない……」

    %CALLNAME:人物_レミリア%は顔を真っ赤にして俯いた。

    「……今日だけよ……付き合ってあげるの……」

    二つの熱が%CALLNAME:人物_レミリア%を挟み込んだ。

    「っ……あ……ぁあ……っ！ 中で……ぶつかって……っ」

    %CALLNAME:人物_レミリア%は声を殺そうとしたが、無理だった。

    「や……っ、声……出ちゃう……っ、もう……っ」

    紅魔館の主は、快感に身を震わせていた。
