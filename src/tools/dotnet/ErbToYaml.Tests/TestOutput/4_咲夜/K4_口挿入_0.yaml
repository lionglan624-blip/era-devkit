- id: fallback
  content: >-
    「……これもメイドの務めですわ……」

    %CALLNAME:TARGET%は事務的に%CALLNAME:MASTER%の前に跪いた。

    「お客様のご要望にお応えするのは当然のこと……」

    しかし、実際に握ると少し表情が揺らいだ。

    「……思ったより……熱いですわね……」

    「とにかく……お世話いたしますわ……」

    %CALLNAME:TARGET%はぎこちなく手を動かし始めた。

    「……ん……こうすれば……よろしいでしょうか……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を窺いながら手を動かしている。

    「……っ……反応がありますわね……」

    「プロとして……最適な方法を……」

    %CALLNAME:TARGET%は集中しているが、頬が僅かに染まっている。

    「……少し……変な気分ですわ……」

    自分の動揺を隠そうと、%CALLNAME:TARGET%は淡々と続けた。

    「……これは仕事です……」

    %CALLNAME:TARGET%は自分に言い聞かせながら手を動かしている。

    「お客様の相手をするのもメイドの務め……」

    「……でも……こんなに……」

    %CALLNAME:TARGET%は言葉を詰まらせ、唇を噛んだ。

    「……何でもありませんわ……続けますわよ……」

    動揺を隠しながら、%CALLNAME:TARGET%は奉仕を続けた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は複雑な表情で%CALLNAME:MASTER%を見上げた。

    「こうして差し上げるのは……嫌ではありませんわ……」

    「いえ……何でもありませんの……」

    %CALLNAME:TARGET%は慌てて視線を逸らし、手の動きに集中した。

    「……早く済ませてくださいまし……」

    本心を隠しながら、%CALLNAME:TARGET%は黙々と手を動かした。
  priority: 2
- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%の前に跪いた。

    「お客様のご要望ですから……致しましょう」

    瀟洒なメイドは、感情を押し殺して一物を握った。

    「……早く済ませていただけますか」

    「私には、お嬢様のお世話という仕事がありますので」

    %CALLNAME:TARGET%の手つきは機械的で、事務的な冷たさを帯びていた。

    「……ふぅ……」

    %CALLNAME:TARGET%は小さく息を吐きながら、淡々と手を動かしていた。

    「こうして差し上げれば満足でしょう」

    「私に何を期待しているのか存じませんが……無駄ですわよ」

    %CALLNAME:TARGET%はペースを変えることなく、機械的に動き続ける。

    「……感情移入などしませんわ」

    完璧なメイドは、あくまでプロフェッショナルを貫いていた。

    「……これは仕事ですわ」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「お客様の相手をするのも、メイドの務め……」

    %CALLNAME:TARGET%は淡々と手を上下させている。

    「……っ」

    一瞬、表情が揺らいだが、すぐに戻った。

    「……何でもありませんわ」

    「……貴方に感情を見せる必要はありませんわ」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見た。

    「私はメイド。貴方はお客様。それ以上でも以下でもありません」

    %CALLNAME:TARGET%は規則正しく手を動かし続ける。

    「……ん……」

    僅かに声が漏れ、%CALLNAME:TARGET%は唇を噛んだ。

    「……早く終わらせてくださいまし」
  priority: 1
