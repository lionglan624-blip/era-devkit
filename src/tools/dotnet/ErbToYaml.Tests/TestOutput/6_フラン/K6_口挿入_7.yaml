- id: talent_3_1
  content: >-
    「えっ……こ、ここを舐めるの……？」

    %CALLNAME:人物_フラン%は顔を真っ赤にしながら、恐る恐る顔を近づけた。

    背徳的な行為に、心臓が早鐘のように鳴っている。

    「ん……変な匂い……でも、%CALLNAME:MASTER%の匂いだから……」

    %CALLNAME:人物_フラン%はおずおずと舌を伸ばし、そっと触れた。

    「……こ、こうすればいいの……？　変な遊びなのさ……」

    恥ずかしさと興奮が入り混じり、頬は真っ赤に染まっていた。

    「%CALLNAME:MASTER%……こんなところ舐めさせて……変態なのさ……」

    %CALLNAME:人物_フラン%は非難するような口調で、しかし舌は動かし続けていた。

    背徳的な行為に、奇妙な興奮を覚えている。

    「んっ……ここ、舐めると%CALLNAME:MASTER%震えるね……」

    %CALLNAME:人物_フラン%は興味深そうに、舌の動きを変えてみた。

    「ふふ……もっと恥ずかしい顔、見せてよ……」

    その言葉には、独占欲と嗜虐心が滲んでいた。

    「%CALLNAME:MASTER%のここ……私だけが舐めるんだよね……？」

    %CALLNAME:人物_フラン%は確認するように問いかけながら、舌を這わせた。

    他の誰かにこの場所を許すことは、絶対に許せない。

    「……私以外の誰かにさせたら……壊すからね……」

    %CALLNAME:人物_フラン%は危険な光を瞳に宿らせながら、深く舌を押し込んだ。

    「ふふ……冗談だよ……本気だけど……」

    独占欲に駆られた少女の言葉は、冗談にならなかった。

    「あ……%CALLNAME:MASTER%、ここ舐めると力が抜けるんだ……」

    %CALLNAME:人物_フラン%は発見に目を輝かせながら、舌を動かし続けた。

    恋慕の相手の反応を引き出せることが、嬉しくてたまらない。

    「もっと舐めてあげようか……？　私、上手になりたいのさ」

    %CALLNAME:人物_フラン%は真剣な表情で、丁寧に奉仕を続けた。

    「ね……%CALLNAME:MASTER%……気持ちいい……？」

    愛しい人を喜ばせたい一心で、背徳的な行為に没頭していた。
