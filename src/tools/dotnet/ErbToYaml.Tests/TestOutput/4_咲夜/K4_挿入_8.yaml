- id: fallback
  content: >-
    「……この体勢は……少し近すぎますわね……」

    %CALLNAME:TARGET%は後ろから抱かれる体勢に、僅かに緊張していた。

    「メイドとして……お客様の要望にはお応えしますが……」

    しかし、%CALLNAME:MASTER%の体温を感じると、言葉が途切れる。

    「……あ……温かい……」

    「……これは……サービスの一環……ですわ……」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「……ん……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は複雑な表情を浮かべている。

    「後ろからですと……貴方の表情が見えませんわね……」

    「でも……体温は伝わってきますの……困りますわ……」

    %CALLNAME:MASTER%が深く突くと、%CALLNAME:TARGET%の体が跳ねた。

    「あっ……そこは……」

    言葉を途中で飲み込み、%CALLNAME:TARGET%は唇を噛んだ。

    「……これは……仕事……ですから……」

    %CALLNAME:TARGET%は何度も自分に言い聞かせている。

    しかし、%CALLNAME:MASTER%に抱きしめられる感覚は、心地よかった。

    「……ぅ……変な気分になってきましたわ……」

    「%CALLNAME:MASTER%のせいですからね……」

    %CALLNAME:TARGET%は責任を押し付けながらも、抵抗する様子はなかった。

    「……もう少し……続けても構いませんわ……」

    「……っ……」

    %CALLNAME:TARGET%は声を堪えようとしたが、漏れてしまう。

    「……プロとして……こんな声を出すべきではないのに……」

    「後ろから抱かれると……安心してしまいますわね……」

    恨めしそうに言いながらも、%CALLNAME:TARGET%は身を預けていた。

    「……でも……嫌ではありませんの……」

    小さな声で、%CALLNAME:TARGET%はそう認めた。
  priority: 2
- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%の腕の中に収まっている。

    「お客様のご要望ですから……お相手いたしますわ」

    瀟洒なメイドは、感情を完全に押し殺していた。

    「……この体勢は……少々近すぎますが……」

    「お望みであれば……続けますわ……」

    %CALLNAME:TARGET%の声は、事務的な冷たさを帯びていた。

    「……ふぅ……」

    %CALLNAME:TARGET%は小さく息を吐いた。

    「後ろからですと、貴方の顔が見えませんわね」

    「……それが救いかもしれませんが」

    %CALLNAME:MASTER%が動いても、%CALLNAME:TARGET%は表情を崩さない。

    「……感情移入などしませんわよ」

    完璧なメイドは、あくまでプロフェッショナルを貫いていた。

    「……これは仕事です」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「後ろから抱かれても……何も感じませんわ……」

    「……っ」

    一瞬、%CALLNAME:TARGET%の体が震えたが、すぐに戻る。

    「……何でもありませんわ」

    冷静さを取り繕いながら、%CALLNAME:TARGET%は息を整えた。

    「……貴方に感情を見せる必要はありませんわ」

    %CALLNAME:TARGET%は冷たい目で前を見つめた。

    「私はメイド。貴方はお客様。それだけの関係ですわ」

    「……ん……」

    僅かに声が漏れ、%CALLNAME:TARGET%は唇を噛んだ。

    「……早く終わらせてください。お嬢様がお呼びですので」

    瀟洒な従者は、最後まで感情を見せようとしなかった。
  priority: 1
