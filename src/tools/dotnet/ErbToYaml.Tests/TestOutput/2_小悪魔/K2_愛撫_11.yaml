- id: talent_3_1
  content: >-
    「えっ……ローター……ですか……？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%が持つ小さな器具を見て頬を染めた。

    %CALLNAME:MASTER%がスイッチを入れて近づけると、%CALLNAME:人物_小悪魔%は身構えた。

    「あっ……振動が……こそばゆいですわ……」

    「%CALLNAME:MASTER%さん……こういうの……お好きなんですのね……」

    恥ずかしそうにしながらも、%CALLNAME:人物_小悪魔%は拒絶しなかった。

    「んっ……あ……」

    %CALLNAME:MASTER%がローターを%CALLNAME:人物_小悪魔%の肌に当てた。

    振動が伝わると、%CALLNAME:人物_小悪魔%は思わず声を漏らした。

    「こ……これ……すごいですわ……頭がぼうっとしてきます……」

    「%CALLNAME:MASTER%さん……こんな道具……どこで……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに%CALLNAME:MASTER%を見上げた。

    「あっ……そこに当てられると……っ」

    %CALLNAME:人物_小悪魔%はローターの振動に体を震わせた。

    「こういうの……使われるの……初めてですわ……」

    %CALLNAME:MASTER%がゆっくりと動かすと、%CALLNAME:人物_小悪魔%は甘い声を漏らす。

    「……%CALLNAME:MASTER%さんになら……見せてもいいかも……」

    恥じらいながらも、%CALLNAME:人物_小悪魔%はその刺激を受け入れていた。

    「やぁっ……そこ……敏感なんですっ……」

    %CALLNAME:MASTER%はローターを%CALLNAME:人物_小悪魔%の弱い場所に押し当てた。

    「んぁっ……こんなの……ずるいですわ……」

    %CALLNAME:人物_小悪魔%は抗議するような声を上げながらも、体は正直に反応していた。

    「……%CALLNAME:MASTER%さん……もう少し……優しくしてくださいな……」

    その目には、恥じらいと共に期待の色が浮かんでいた。
