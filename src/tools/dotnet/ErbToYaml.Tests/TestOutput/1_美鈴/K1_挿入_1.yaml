  content: >-
    「え、えっと……この体勢は……」

    %CALLNAME:人物_美鈴%は困惑した表情で振り返った。

    四つんばいという体勢に、どこか落ち着かない様子だ。

    「……背中を向けるのは……その……」

    %CALLNAME:人物_美鈴%は不安そうに視線を泳がせた。

    「……でも、%CALLNAME:MASTER%なら……大丈夫、ですよね……」

    戸惑いながらも、%CALLNAME:人物_美鈴%は身を委ねていた。

    「あ……ん……っ……」

    %CALLNAME:人物_美鈴%は思わず声を漏らし、顔を伏せた。

    「す、すみません……変な声……」

    顔を真っ赤にしながら、%CALLNAME:人物_美鈴%は謝った。

    「……後ろからだと……声が……抑えられなくて……」

    戸惑いながらも、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%を拒まなかった。

    「……っ……この体勢だと……すごく、深い……」

    %CALLNAME:人物_美鈴%は苦しそうに息を吐いた。

    「……%CALLNAME:MASTER%は……この体勢が、好きなんですか……」

    %CALLNAME:人物_美鈴%は肩越しに%CALLNAME:MASTER%を見た。

    「……私のこと……どう、思ってるんですか……」

