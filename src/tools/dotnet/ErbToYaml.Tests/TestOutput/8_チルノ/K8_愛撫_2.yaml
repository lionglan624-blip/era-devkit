    「……んっ、はむ……」

    恥ずかしそうに、でも懸命に舌を動かしている。

    「%CALLNAME:MASTER%……気持ちいい……？」

    不安げに確認する%CALLNAME:人物_チルノ%の目は潤んでいた。

    「べ、別にあたいがしたいわけじゃないんだからね！」

    そう言いながらも、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の前に跪いた。

    「……ん、れろ……こ、こうでしょ？」

    強がりながらも、その奉仕は丁寧だった。

    「……%CALLNAME:MASTER%のためにしてるんだから、感謝しなさいよね」

    %CALLNAME:人物_チルノ%は照れ隠しに、そう付け加えた。

    「……あたい、上手にできるかな」

    %CALLNAME:人物_チルノ%は珍しく不安そうな表情を浮かべた。

    「んっ……ちゅ、ぷ……」

    ぎこちないながらも、一生懸命に奉仕する%CALLNAME:人物_チルノ%。

    「……もっと上手くなるから……待っててね」

    決意を込めた目で、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%を見上げた。

    「%CALLNAME:MASTER%……こうするの、恥ずかしいよ……」

    %CALLNAME:人物_チルノ%は俯きながらも、奉仕の姿勢を崩さない。

    「……はむっ……ん……」

    冷たい舌が熱を帯びて、%CALLNAME:MASTER%を包み込む。

    「……でも、%CALLNAME:MASTER%が喜んでくれるなら……」

    消え入りそうな声で、%CALLNAME:人物_チルノ%は本音を漏らした。
