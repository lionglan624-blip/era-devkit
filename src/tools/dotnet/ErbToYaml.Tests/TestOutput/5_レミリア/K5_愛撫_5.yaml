  content: >-
    「……っ！　何をしているの！」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の行為に驚いた声を上げた。

    「そ、そんなところに触るなんて……」

    %CALLNAME:人物_レミリア%の顔には、困惑と戸惑いが浮かんでいる。

    「……ふん、下僕の分際で大胆ね」

    そう言いながらも、%CALLNAME:人物_レミリア%は強く拒絶しなかった。

    「……今日だけよ、特別に許してあげるのは」

    「……何を考えているのかしら」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    %CALLNAME:MASTER%の指が後ろに触れると、

    「っ……そ、そこは……」

    %CALLNAME:人物_レミリア%の声が少し上擦った。

    「……まあ、使用人への褒美として許してあげるわ」

    高飛車な態度を取りながらも、その頬はほんのり紅い。

    「……ふん」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を睨みつけた。

    「変わった趣味ね、%CALLNAME:MASTER%」

    だが%CALLNAME:MASTER%が後ろを撫で続けると、

    「っ……んん……」

    %CALLNAME:人物_レミリア%は小さく息を漏らした。

    「……気に入らないわね。あなたに反応してしまうなんて」

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は複雑な表情で%CALLNAME:MASTER%を見た。

    「私を何だと思っているの」

    %CALLNAME:MASTER%の指が後ろの穴に触れ、

    「……っ」

    %CALLNAME:人物_レミリア%は小さく身を震わせた。

    「……ふん、まあいいわ。好きにしなさい」

    館の主は、複雑な心境を隠しきれていなかった。
