entries:
- id: fallback
  content: >-
    「ん……こうやって触ると、気持ちいいのか？」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の股間に手を伸ばした。

    「お前のこと、気持ちよくしてやりたいんだぜ……だから、教えてくれよ」

    %CALLNAME:人物_魔理沙%は恋人の反応を見ながら、ゆっくりと指を這わせ始めた。

    「あっ……なんか、熱いな……ここが気持ちいいんだろ？」

    %CALLNAME:人物_魔理沙%は嬉しそうに微笑みながら、愛撫を続けた。

    「ふふ……お前のここ、すごく敏感だな」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%のVを優しく撫でた。

    「こうして触ってると……なんか、繋がってる気がするぜ」

    「私の手で……お前が感じてくれてるって思うと、嬉しいな」

    %CALLNAME:人物_魔理沙%は恋人の顔を見上げながら、丁寧に愛撫した。

    「もっと気持ちよくしてやるから……任せとけ」

    「……こういうの、だんだん上手くなってきただろ？」

    %CALLNAME:人物_魔理沙%は照れくさそうに笑いながら、器用に指を動かした。

    「前よりも反応が良くなってる……私の腕が上がったってことだな」

    %CALLNAME:MASTER%が気持ちよさそうにすると、%CALLNAME:人物_魔理沙%は得意げになった。

    「ふふん、私だって努力してるんだぜ……お前のためにな」

    %CALLNAME:人物_魔理沙%は恋人を喜ばせることに夢中になっていた。

    「なあ……ちゃんとこっち見てろよ」

    %CALLNAME:人物_魔理沙%は愛撫しながら、%CALLNAME:MASTER%の目を見つめた。

    「私がお前のこと、こうして気持ちよくしてるんだぜ……見ててくれ」

    %CALLNAME:人物_魔理沙%の指が動くたび、%CALLNAME:MASTER%の体が反応する。

    「……恥ずかしいけど、お前に見られてると……頑張れるんだぜ」

    %CALLNAME:人物_魔理沙%は恋人と視線を合わせながら、愛情を込めて奉仕を続けた。
  priority: 4
- id: talent_3_1
  content: >-
    「ち、違うからな！　べ、別にやりたくてやってるわけじゃ……」

    %CALLNAME:人物_魔理沙%は顔を真っ赤にしながら、%CALLNAME:MASTER%のVに手を伸ばした。

    「た、頼まれたから仕方なくやってるだけだぜ……」

    %CALLNAME:人物_魔理沙%は照れ隠しに強がりながらも、手は丁寧に動いている。

    「あっ……な、なんだよその顔……笑うなよ……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに顔を背けながらも、愛撫は止めなかった。

    「こ、こんなことして……変態なんだからな、お前は」

    %CALLNAME:人物_魔理沙%は文句を言いながらも、指を動かし続けている。

    「……でも、気持ちいいなら……まあ、仕方ないか」

    %CALLNAME:人物_魔理沙%の手つきは慣れないながらも、一生懸命だった。

    「んっ……なんか、ここ濡れてきてる……反応してるってことか……」

    「……勝手に変な声出すなよ、恥ずかしいだろ……」

    「んっ……なんか、反応が変わってきた……？」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、指を動かし続けた。

    「こ、これって……気持ちいいってことなんだよな……？」

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_魔理沙%は複雑な表情になった。

    「……別に嬉しくなんかないぜ……ただ、悪い気はしないってだけだ」

    %CALLNAME:人物_魔理沙%は照れながらも、少し得意げだった。

    「……お前、もうちょっと反応してくれてもいいんだぜ」

    %CALLNAME:人物_魔理沙%は少し不満そうに呟いた。

    「こっちは一生懸命やってるんだから……」

    %CALLNAME:MASTER%が気持ちよさそうな顔をすると、%CALLNAME:人物_魔理沙%は照れた。

    「なっ……そ、そんな顔されると困る……」

    「……もう、勝手にしろよ……」

    %CALLNAME:人物_魔理沙%は照れ隠しに目を逸らしながら、愛撫を続けた。
