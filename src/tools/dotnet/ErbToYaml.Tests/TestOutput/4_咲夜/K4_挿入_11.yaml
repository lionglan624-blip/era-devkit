    「……んっ……二人に……挟まれて……」

    %CALLNAME:TARGET%は羞恥と快楽の間で揺れている。

    「メイドとして……こんな姿は……見せたくなかったのに……」

    「でも……体が……勝手に……」

    前後から同時に責められ、%CALLNAME:TARGET%の理性が揺らぐ。

    「あ……ダメ……声が……出ちゃう……」

    「%CALLNAME:MASTER%……貴方のせいですわ……」

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は助けを求めるように名前を呼んだ。

    「二人に犯されて……壊れそう……ですわ……」

    「でも……貴方が見ていてくれるなら……」

    二つの動きが激しくなり、%CALLNAME:TARGET%の意識が飛びそうになる。

    「あっ……んんっ……もう……」

    恥じらいの涙を浮かべながら、%CALLNAME:TARGET%は快楽に身を委ねていった。
