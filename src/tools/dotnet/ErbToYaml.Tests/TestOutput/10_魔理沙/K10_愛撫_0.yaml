    「……まあ、私も嫌いじゃないけどな」

    %CALLNAME:人物_魔理沙%は頬を染めながら、恋人に寄り添った。

    「あっ……そこ、くすぐったいぜ……」

    %CALLNAME:人物_魔理沙%は小さく身じろぎした。

    「……お前さ、わざとやってるだろ」

    抗議しながらも、%CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の手を止めようとはしない。

    「……ったく、お前にはかなわないな」

    %CALLNAME:人物_魔理沙%は観念したように、恋人の胸に顔を埋めた。

    「……ん……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の愛撫に身を任せている。

    魔法使いとしての威勢はどこへやら、今は恋人に甘える少女だ。

    「……%CALLNAME:MASTER%といると、なんか落ち着くんだよな」

    %CALLNAME:人物_魔理沙%は珍しく素直な言葉を口にした。

    「……もうちょっと、こうしてていいか？」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに、でも嬉しそうに呟いた。
