    「…でも、離さないでね」

    小さな声でそう囁いて、%CALLNAME:人物_美鈴%は幸せそうに微笑んだ。

    「%CALLNAME:MASTER%、来てくれたのね」

    %CALLNAME:人物_美鈴%の方から%CALLNAME:MASTER%に抱きついた。

    「今日は疲れちゃって…少しだけ、こうさせて」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の胸に顔を埋めた。

    「…%CALLNAME:MASTER%のそばにいると、安心するの」

    %CALLNAME:人物_美鈴%はそのまま目を閉じて、穏やかな吐息をついた。

