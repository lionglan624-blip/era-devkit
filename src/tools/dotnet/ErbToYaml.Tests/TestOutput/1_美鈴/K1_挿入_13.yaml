  content: >-
    「……後ろを使って、上に乗れと……ですか……」

    %CALLNAME:人物_美鈴%は困惑した表情で%CALLNAME:MASTER%に跨った。

    アナルで%CALLNAME:MASTER%を受け入れる体勢に、体が緊張している。

