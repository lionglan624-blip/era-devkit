character: フラン
situation: K6_挿入
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……この体勢だと、顔が見えないね……」

    %CALLNAME:人物_フラン%は背を向けたまま、少し寂しそうに呟いた。

    だが、恋人に背中を預ける安心感が、その寂しさを上回っている。

    「でも……背中から抱きしめられてるの、わかるから……いいのさ」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の後孔に挿入すると、甘い声が漏れた。

    「んっ……ぁ……お尻に入ってきた……%CALLNAME:MASTER%の……全部……」

    悪魔の妹は、恋人に身を委ねる幸福に紅い瞳を細めた。

    「背中から……%CALLNAME:MASTER%の体温、感じるの……好き」

    %CALLNAME:人物_フラン%は恋人の腕の中で、幸せそうに身を預けた。

    495年の孤独には、こんな温もりは無かった。

    「こうしてると……壊さないでいられる……%CALLNAME:MASTER%のこと」

    %CALLNAME:MASTER%が後孔を突き上げると、%CALLNAME:人物_フラン%は背を仰け反らせた。

    「ひゃっ……あぁっ……お尻の奥……すごい……ん……っ」

    恋人の体温に包まれながら、悪魔の妹は快楽に身を任せていた。

    「%CALLNAME:MASTER%……もっとぎゅってして……背中から」

    %CALLNAME:人物_フラン%は恋人に抱きしめられることをねだった。

    後ろから包み込まれる感覚は、守られているようで心地いい。

    「顔は見えないけど……%CALLNAME:MASTER%の鼓動、聞こえるのさ」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の後孔を抉ると、切ない声が上がった。

    「あっ……んんっ……奥まで……きてるぅ……好き……%CALLNAME:MASTER%……っ」

    悪魔の妹は、恋人の鼓動を背中で感じながら快楽に溺れていた。

    「この体勢……なんだか不思議なのさ」

    %CALLNAME:人物_フラン%は背を向けながらも、恋人の手を握った。

    顔が見えなくても、繋いだ手から愛情が伝わってくる。

    「でも……%CALLNAME:MASTER%が後ろにいるって、わかるから……怖くない」

    %CALLNAME:MASTER%が腰を打ち付けると、%CALLNAME:人物_フラン%は甘い悲鳴を上げた。

    「あぁっ……んっ……お尻……いっぱい……%CALLNAME:MASTER%で……いっぱい……」

    愛する人を背に感じながら、悪魔の妹は幸福の涙を零した。
  priority: 4
- id: talent_3_1
  content: >-
    「は、背中向きだと……顔、見られないから……ちょっと安心……」

    %CALLNAME:人物_フラン%は頬を染めながら、%CALLNAME:MASTER%に背を向けた。

    好きな人に乱れる顔を見られずに済むのは、少し救われる。

    「で、でも……%CALLNAME:MASTER%に背中向けるの、寂しいかも……」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の後孔に挿入すると、痛みに声が漏れた。

    「いたっ……んっ……お尻……きつい……でも、顔見られないから……頑張れる」

    悪魔の妹は、好きな人に痛む顔を見せずに済む安堵を感じていた。

    「%CALLNAME:MASTER%……今、私の背中、どんな風に見えてる……？」

    %CALLNAME:人物_フラン%は恥ずかしそうに尋ねた。

    好きな人に背中を見られているのが、なんだか気になる。

    「変な汗……かいてないかな……恥ずかしいのさ」

    %CALLNAME:MASTER%が後孔を突き上げると、%CALLNAME:人物_フラン%は声を上げた。

    「ひぃっ……あぁ……お尻の奥……響く……%CALLNAME:MASTER%……っ」

    好きな人に見つめられているかもしれない背中が、熱くなっていた。

    「こ、この体勢だと……%CALLNAME:MASTER%を壊さないですむ……かも」

    %CALLNAME:人物_フラン%は自分に言い聞かせるように呟いた。

    背を向けていれば、破壊の衝動を抑えやすい気がする。

    「好きな人……壊したくないから……お尻は、我慢する」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_フラン%は吐息を漏らした。

    「あっ……ん……慣れてきた……かも……でも、振り返りたい……」

    好きな人の顔が見たい気持ちと、見られたくない気持ちが交錯していた。

    「%CALLNAME:MASTER%……手、繋いでくれる……？　顔見えないから……」

    %CALLNAME:人物_フラン%は勇気を出して、後ろに手を伸ばした。

    顔が見えない分、手を繋いでいると安心できる。

    「こうしてると……ちゃんと繋がってるって、わかるのさ」

    %CALLNAME:MASTER%が深く突き入れると、%CALLNAME:人物_フラン%は繋いだ手を強く握った。

    「あぁっ……んっ……痛い……けど……手、離さないで……お願い……」

    好きな人の手の温もりが、悪魔の妹の痛みを和らげていた。
  priority: 3
  condition:
    type: Talent
    talentType: 3
    threshold: 1
- id: fallback
  content: >-
    「背中向きで……お尻に入れるの？　変な体勢なのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%に背を向けながら首を傾げた。

    495年の孤独の中では、こんな体勢は想像もしなかった。

    「まあ……%CALLNAME:MASTER%がそうしたいなら、やってみる」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の後孔に挿入すると、眉を顰めた。

    「いた……っ……お尻に入ってくる……後ろからだと、見えないのさ」

    悪魔の妹は、見えない位置からの感覚に戸惑っていた。

    「%CALLNAME:MASTER%……この体勢だと、顔が見えないね」

    %CALLNAME:人物_フラン%は素朴な感想を口にした。

    相手の表情が見えないのは、少し物足りない気がする。

    「……でも、背中から何かが来る感じ、新鮮かも」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_フラン%は小さく声を上げた。

    「んっ……ぁ……動くと……お尻の奥……響く……」

    見えない分、感覚が鋭くなっている気がして、悪魔の妹は戸惑った。

    「こうして背中を向けてると……壊さないですむかも」

    %CALLNAME:人物_フラン%は自分の手を見つめながら呟いた。

    相手が見えなければ、破壊の衝動も起きにくい気がする。

    「地下室では……誰かに背を向けること、なかったから」

    %CALLNAME:MASTER%が後孔を突くと、%CALLNAME:人物_フラン%は吐息を漏らした。

    「ん……あ……お尻……きつい……でも、なんか……不思議」

    悪魔の妹は、見えない相手との繋がりに奇妙な感覚を覚えていた。

    「%CALLNAME:MASTER%って、背中から見るの好きなの……？」

    %CALLNAME:人物_フラン%は素朴な疑問を口にした。

    世界を知らない少女にとって、全てが未知の体験だ。

    「……495年、ずっとひとりだったから。背中を見せる相手、いなかった」

    %CALLNAME:MASTER%が深く挿入すると、%CALLNAME:人物_フラン%は声を漏らした。

    「んっ……あ……奥まで……きてる……見えないと、余計に感じるのさ」

    その言葉は、悪魔の妹なりの素直な感想だった。
  priority: 2
- id: fallback
  content: >-
    「ふぅん……背中を向けて、お尻に入れるんだ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%に背を向けながら呟いた。

    相手の顔が見えないのは、少しつまらない。

    「顔が見えないのは……退屈だね」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の後孔に挿入すると、眉が動いた。

    「……いた。……でも、見えない分、どこからくるかわからなくて面白いかも」

    悪魔の妹は、予測できない感覚に興味を示していた。

    「%CALLNAME:MASTER%……背中向きだと、表情が見えないのさ」

    %CALLNAME:人物_フラン%は少し不満そうに言った。

    相手の反応を観察できないのは、楽しみが半減する。

    「まあ……%CALLNAME:MASTER%が壊れる瞬間が見えなくても、音でわかるかな」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_フラン%は無表情のまま声を上げた。

    「……ん……あ……痛い……けど、後ろからだと逃げられないのさ」

    悪魔の妹は、相手を逃がさない体勢に満足げだった。

    「……」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%に背を向けた。

    495年の孤独が生んだ、どこか虚ろな雰囲気。

    「背中を向けると……きゅっとしてドカーン、しにくいね」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の後孔を突くと、表情がわずかに揺れた。

    「……いた……でも、見えないところから来ると……なんか、新鮮」

    予測できない感覚に、悪魔の妹は僅かに興味を示した。

    「%CALLNAME:MASTER%……後ろにいるんだよね」

    %CALLNAME:人物_フラン%は振り返らずに確認した。

    見えないところに誰かがいる感覚は、奇妙に新鮮だ。

    「地下室では……後ろに誰かがいたことなんてなかったのさ」

    %CALLNAME:MASTER%が後孔を抉ると、%CALLNAME:人物_フラン%は声を漏らした。

    「んっ……あ……お尻……すごい……見えないと、余計に感じるね」

    悪魔の妹は、495年の孤独にはなかった感覚を味わっていた。
  priority: 1
