character: 美鈴
situation: K1_会話親密
entries:
- id: fallback
  content: >-
    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の言葉に幸せそうな笑みを浮かべた。

    「――へぇ、そんなことがあったんだ」

    %CALLNAME:人物_美鈴%は相槌をうちながら%CALLNAME:MASTER%の話を聞いている。

    「ふふ、%CALLNAME:MASTER%って話してると面白いわよね」

    %CALLNAME:人物_美鈴%は温かな眼差しで%CALLNAME:MASTER%を見つめている。

    「……ねえ、この後も一緒にいてくれる？」

    甘えるような声で、%CALLNAME:人物_美鈴%はそう言った。

    「――それでね、%CALLNAME:MASTER%」

    %CALLNAME:人物_美鈴%は楽しそうに話をしている。

    門番の仕事中だというのに、まるでデートでもしているかのような雰囲気だ。

    「……聞いてる？　もう、ぼーっとしないでよ」

    %CALLNAME:人物_美鈴%は頬を膨らませながらも、嬉しそうだった。

    「まあいいわ。それでね――」

    「――%CALLNAME:MASTER%？　聞いてる？」

    聞いてるよ、と%CALLNAME:MASTER%が答えると、

    「そう？　なら良かった」

    %CALLNAME:人物_美鈴%は安心したように微笑んだ。

    「……%CALLNAME:MASTER%がちゃんと聞いてくれてると、嬉しいの」

    %CALLNAME:人物_美鈴%は少し照れくさそうに、でも幸せそうにそう言った。

    「――幸せだなぁ」

    唐突に%CALLNAME:人物_美鈴%がそう呟いた。

    どうしたの、と%CALLNAME:MASTER%が問うと、

    「いや……こうやって%CALLNAME:MASTER%と過ごす時間が、私は好きなの」

    「門番の仕事よりも、ずっとずっと大切なんだから」

    %CALLNAME:人物_美鈴%は照れたように笑いながら、%CALLNAME:MASTER%の手を握った。
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%と話しながら、ずっと%CALLNAME:MASTER%を見つめていた。

    「――ふぅん、そんなことが、ねぇ」

    %CALLNAME:人物_美鈴%は感心したようにそう言った。

    「%CALLNAME:MASTER%って、色んなことしてるのね」

    %CALLNAME:人物_美鈴%はまじまじと%CALLNAME:MASTER%を見つめている。

    「……私ももっと、%CALLNAME:MASTER%のこと知りたいな」

    少し頬を赤らめながら、%CALLNAME:人物_美鈴%はそう言った。

    「――それでね、%CALLNAME:MASTER%」

    %CALLNAME:人物_美鈴%は笑みを浮かべながら、嬉々として話をしている。

    心底楽しそうな様子だ。

    「%CALLNAME:MASTER%は最近何かあった？」

    む、私の話をご所望ですかな、お嬢さん。

    「ふふ、聞かせて。%CALLNAME:MASTER%のこと、もっと教えてよ」

    「……ねえ、%CALLNAME:MASTER%」

    %CALLNAME:人物_美鈴%は少し恥ずかしそうにこちらを見た。

    「こうやって話してる時間、私……好きなの」

    %CALLNAME:人物_美鈴%は門番の帽子を深く被り直し、照れを隠した。

    「……また、話しに来てくれると嬉しいな」

    「――あのさ、%CALLNAME:MASTER%」

    %CALLNAME:人物_美鈴%は少し言いづらそうに口を開いた。

    「……最近、%CALLNAME:MASTER%のことばっかり考えちゃうの」

    %CALLNAME:人物_美鈴%は恥ずかしそうに視線を逸らした。

    「門番の仕事中でも、ふと……気づいたら%CALLNAME:MASTER%のこと考えてて」

    「……これって、やっぱり……」

    %CALLNAME:人物_美鈴%は言葉を飲み込み、頬を赤く染めた。
