character: フラン
situation: K6_愛撫
entries:
- id: fallback
  content: >-
    「ねぇ……%CALLNAME:MASTER%、それ何？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にある電気按摩を興味深そうに見つめた。

    外の世界の道具だと説明すると、紅い瞳がきらきらと輝いた。

    「へぇ……私にも使ってみてよ」

    %CALLNAME:MASTER%が電源を入れて押し当てると、%CALLNAME:人物_フラン%は小さく身を震わせた。

    「ひゃっ……！　ふふ、変な感じ……でも、気持ちいいのさ」

    %CALLNAME:人物_フラン%は恋人に身を預け、その刺激に酔いしれていた。

    「あっ……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_フラン%は電気按摩の振動に、蕩けるような声を漏らした。

    495年の孤独を知る少女は、今は恋人の腕の中で快楽に浸っている。

    「もっと……もっと強くしてもいいのさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見上げて甘えるように言った。

    「私、壊れたりしないから……%CALLNAME:MASTER%となら」

    その言葉には、深い信頼が込められていた。

    「ふぁっ……！　んんっ……これ、すごいのさ……」

    %CALLNAME:人物_フラン%は電気按摩から伝わる快感に、小さく身悶えた。

    %CALLNAME:MASTER%が角度を変えるたび、新しい刺激が走る。

    「あっ、そこっ……んっ、いいっ……」

    %CALLNAME:人物_フラン%は頬を紅く染めながら、%CALLNAME:MASTER%にしがみついた。

    「%CALLNAME:MASTER%……私、こんなに気持ちよくなっていいの？」

    純粋な問いかけに、%CALLNAME:MASTER%は優しく頷いた。

    「えへへ……%CALLNAME:MASTER%の玩具、面白いね」

    %CALLNAME:人物_フラン%は電気按摩を無邪気に見つめた。

    「私、こういうの初めてなのさ」

    %CALLNAME:MASTER%がスイッチを入れて押し当てると、%CALLNAME:人物_フラン%は甘い声を漏らした。

    「ひゃっ……！　あっ、んっ……これ、やばいのさ……」

    %CALLNAME:人物_フラン%は快感に翻弄されながらも、幸せそうに笑っていた。

    「%CALLNAME:MASTER%と一緒だと、何でも楽しいよ」
  priority: 4
- id: talent_3_1
  content: >-
    「な、何それ……？　変なものなのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つ電気按摩を警戒するように見た。

    しかし、その紅い瞳には好奇心も宿っている。

    「……まあ、%CALLNAME:MASTER%がするなら……いいよ」

    電源が入れられ、振動が伝わると、%CALLNAME:人物_フラン%は驚いて目を見開いた。

    「ひゃぁっ！？　な、なにこれっ……！　すごく……変な感じなのさ……」

    初めての感覚に戸惑いながらも、%CALLNAME:人物_フラン%は逃げようとはしなかった。

    「あっ……んっ……こ、これ……」

    %CALLNAME:人物_フラン%は電気按摩の振動に、思わず声を漏らした。

    「やっ……%CALLNAME:MASTER%……急にそんな……」

    %CALLNAME:人物_フラン%は頬を赤らめながら、%CALLNAME:MASTER%を見つめた。

    「……でも、嫌じゃないのさ」

    素直になれない悪魔の妹は、そっぽを向きながらそう呟いた。

    その声は、期待を隠しきれていなかった。

    「ふぁっ……！　ま、待ってよ……」

    %CALLNAME:人物_フラン%は電気按摩を当てられ、身を捩った。

    「こんなの……知らないのさ……体が、変になっちゃう……」

    %CALLNAME:人物_フラン%は困惑しながらも、%CALLNAME:MASTER%の手を払いのけようとはしなかった。

    「……%CALLNAME:MASTER%は、私のこと……からかってるの？」

    その問いかけには、不安と期待が入り混じっていた。

    「……もう少しだけ……してもいいのさ」

    「んっ……はぁっ……これ、強いのさ……」

    %CALLNAME:人物_フラン%は電気按摩の刺激に、息を荒くしていた。

    「%CALLNAME:MASTER%……私、こんな気持ち……よくわからない」

    %CALLNAME:人物_フラン%は自分の体の反応を不思議そうに見つめた。

    「……でも、%CALLNAME:MASTER%がしてくれるなら……」

    %CALLNAME:人物_フラン%は小さく頷いた。

    その紅い瞳は、%CALLNAME:MASTER%への信頼を映していた。
