character: パチュリー
situation: K3_愛撫
entries:
- id: fallback
  content: >-
    「……ん、そこ……」

    %CALLNAME:TARGET%は本を置いて、%CALLNAME:MASTER%に身を委ねている。

    「%CALLNAME:MASTER%、あなたの舌……熱いわ」

    %CALLNAME:TARGET%は淡々と呟くが、頬は微かに上気している。

    「……動かない大図書館が、あなたにだけは動かされてしまうのね」

    そう言って%CALLNAME:TARGET%は、%CALLNAME:MASTER%の頭に手を添えた。

    「……もっと、してくれて、いいわ」

    「あ……ぁ……」

    %CALLNAME:TARGET%は珍しく声を漏らしている。

    %CALLNAME:MASTER%の舌が敏感な場所を這う度に、%CALLNAME:TARGET%の体が微かに震える。

    「……本で読んだ知識とは……違うわね……」

    %CALLNAME:TARGET%は熱い息を吐きながら、%CALLNAME:MASTER%を見下ろした。

    「実体験は……得難い、わ……ん……」

    %CALLNAME:TARGET%の指が%CALLNAME:MASTER%の髪を掴んだ。

    「……%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は静かに%CALLNAME:MASTER%の名を呼んだ。

    「あなたがそうしてくれると……考えがまとまらなくなるの」

    %CALLNAME:MASTER%が舌を動かし続けると、%CALLNAME:TARGET%は目を細めた。

    「……困った人ね。私の思考を乱すなんて」

    そう言いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の頭を離そうとはしない。

    「……でも、嫌では……ないわ……」

    「ふぅ……ん……」

    %CALLNAME:TARGET%は小さく喘ぎながら、椅子の肘掛けを握っている。

    「%CALLNAME:MASTER%……あなた、上達したわね」

    %CALLNAME:MASTER%が舌を這わせると、%CALLNAME:TARGET%の腰が僅かに浮いた。

    「……ひゃ……ん……」

    思わず漏れた声に、%CALLNAME:TARGET%は顔を赤くした。

    「……今の、忘れなさい」
  priority: 4
- id: talent_3_1
  content: >-
    「……な、何をするの」

    %CALLNAME:TARGET%は動揺しながらも、抵抗はしなかった。

    %CALLNAME:MASTER%が秘所に顔を埋めると、%CALLNAME:TARGET%は小さく身じろぎした。

    「そ、そんなところ……汚いわよ……」

    しかし%CALLNAME:TARGET%の声は、拒絶というより羞恥に震えている。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は本で顔を隠そうとしたが、手が震えて上手くいかない。

    「……っ」

    %CALLNAME:TARGET%は声を殺して快感に耐えている。

    %CALLNAME:MASTER%の舌が敏感な突起を撫でると、%CALLNAME:TARGET%の体が跳ねた。

    「や……そこは、だめ……」

    %CALLNAME:TARGET%は弱々しく抗議するが、その声は熱を帯びている。

    「本には……こんなこと……書いてなかった、わ……」

    %CALLNAME:TARGET%は羞恥で顔を真っ赤にしている。

    「あ……ぁ……」

    %CALLNAME:TARGET%は、%CALLNAME:MASTER%にされるがままになっている。

    「%CALLNAME:MASTER%……あなたは……何を考えているの……」

    %CALLNAME:MASTER%が答える代わりに舌を這わせると、%CALLNAME:TARGET%は小さく喘いだ。

    「……んっ……変な、気持ち……」

    %CALLNAME:TARGET%は淡々とした口調を保とうとするが、声が上ずっている。

    「……もう、知らないわ……」

    「……%CALLNAME:MASTER%、待って」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を制止しようとした。

    しかし%CALLNAME:MASTER%が舌を動かし始めると、その手は力を失った。

    「……ひ……ぅ……」

    %CALLNAME:TARGET%は唇を噛んで声を堪えている。

    「……どうして、あなたは……私を……こんな……」

    %CALLNAME:TARGET%の瞳は潤んで、%CALLNAME:MASTER%を見つめている。
  priority: 3
  condition:
    type: Talent
