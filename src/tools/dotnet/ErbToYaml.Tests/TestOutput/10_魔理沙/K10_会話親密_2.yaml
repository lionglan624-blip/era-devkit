- id: fallback
  content: >-
    「……手？　握りたいのか？」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の手に触れようとした。

    %CALLNAME:TARGET%は少し戸惑った表情を浮かべている。

    「……ま、まあ、いいけどな。変な意味はないんだろ？」

    おずおずと手を差し出す%CALLNAME:TARGET%。

    %CALLNAME:MASTER%がその手を取ると、%CALLNAME:TARGET%は小さく息を呑んだ。

    「……あったかいな、%CALLNAME:MASTER%の手って」

    「……おい、何するんだよ」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の髪に触れた。

    %CALLNAME:TARGET%は困惑した表情で%CALLNAME:MASTER%を見つめている。

    「私の髪に興味があるのか？　変なやつだな」

    されるがままに髪を撫でられながら、%CALLNAME:TARGET%は小さくため息をついた。

    「……まあ、嫌じゃないけどな。お前だから、だけどな」

    %CALLNAME:TARGET%は気恥ずかしそうに視線を逸らした。

    「……おい、近いぞ」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%に近づくと、%CALLNAME:TARGET%は少し身を引いた。

    「……なんだよ、急に」

    だが、逃げるような素振りは見せない。

    「……ま、まあ、そのくらいなら、いいけどな」

    %CALLNAME:TARGET%は帽子のつばを押さえながら、ぼそりと呟いた。

    「……%CALLNAME:MASTER%って、たまに大胆だよな」

    「……なんだ、%CALLNAME:MASTER%。私に用か？」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の肩に軽く触れた。

    %CALLNAME:TARGET%は少し驚いた表情を見せたが、振り払わなかった。

    「……別に、嫌ってわけじゃないんだけどな」

    %CALLNAME:TARGET%は視線を泳がせながら、照れくさそうにしている。

    「……お前となら、こういうのも悪くないかもな」

    そう言って、%CALLNAME:TARGET%は小さく笑った。
  priority: 2
- id: fallback
  content: >-
    「……おい、何するつもりだ？」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%に触れようとすると、

    %CALLNAME:TARGET%は金色の瞳を警戒するように光らせた。

    「私に触りたいのか？　まあ、手くらいなら許してやるけどな」

    「……けど、変なことするなよ？　箒で殴るぞ」

    %CALLNAME:TARGET%は腕を組みながら、探るようにこちらを見ている。

    「……私は普通の魔法使いだからな。簡単には懐かないぜ」

    「……なんだ、近いぞ」

    %CALLNAME:MASTER%が近づくと、%CALLNAME:TARGET%は一歩後ずさった。

    「私とお前の関係で、こういうのは早いんじゃないか？」

    「もうちょっと仲良くなってからにしてくれよな」

    %CALLNAME:TARGET%は帽子のつばを押さえながら、そっぽを向いた。

    「……別に、お前が嫌いってわけじゃないんだけどな」

    だが、その顔は少しだけ赤かった。

    「おい、いきなり触るな」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%に触れようとすると、%CALLNAME:TARGET%はさっと身をかわした。

    「……私は魔法使いだぞ？　そう簡単に触らせると思ったか？」

    %CALLNAME:TARGET%は挑戦的な笑みを浮かべている。

    「……どうしても触りたいなら、私を楽しませてみせろよ」

    「弾幕勝負でも何でもいいぜ。勝ったら触らせてやるよ」

    普通の魔法使いは、意地悪そうに笑った。

    「……なんだ、%CALLNAME:MASTER%」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%を見つめていると、%CALLNAME:TARGET%は不思議そうに首を傾げた。

    「私の顔に何かついてるか？」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の頬に手を伸ばすと、%CALLNAME:TARGET%は目を丸くした。

    「お、おい……なんだよ、いきなり」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を払い除けようとしたが、その動きは緩かった。

    「……まあ、お前なら、ちょっとくらいは許してやるけどな」
  priority: 1
