- id: fallback
  content: >-
    「え……この体勢でお尻……？　そんなこともするんだ……」

    %CALLNAME:人物_チルノ%は四つんばいにされ、困惑していた。

    %CALLNAME:MASTER%が菊穴に挿入すると、%CALLNAME:人物_チルノ%は目を見開いた。

    「わっ……すごい変な感じ……お腹の中から押されてる……」

    %CALLNAME:人物_チルノ%の菊穴は異物をきゅっと締め付けている。

    「後ろ向いてるから……%CALLNAME:MASTER%の顔見えないね……」

    「へぇ……後ろ向きでお尻かぁ……動物みたいだね」

    %CALLNAME:人物_チルノ%は興味深そうに四つんばいになっていた。

    しかし菊穴を貫かれると、その表情は驚きに変わった。

    「んっ……いたっ……正面よりもきつい……」

    %CALLNAME:人物_チルノ%は涙目になりながら、感覚を確かめていた。

    「この体勢だと……なんかもっと深いとこまで来てる気がする……」

    「あ……%CALLNAME:MASTER%、後ろからお尻に……」

    %CALLNAME:人物_チルノ%は四つんばいのまま、体の変化を観察していた。

    %CALLNAME:MASTER%が菊穴を押し広げると、きゅうと締め付けてくる。

    「んっ……きつい……この体勢だとお腹押される感じ強い……」

    %CALLNAME:人物_チルノ%は困惑しながらも、好奇心を隠せなかった。

    「後ろ向いてるから……どんな顔してるか見られなくて済むね……」

    「……%CALLNAME:MASTER%、この体勢でお尻って……変なの？」

    %CALLNAME:人物_チルノ%は不安そうに振り返った。

    よくわからないまま、四つんばいで菊穴を%CALLNAME:MASTER%に晒している。

    「んっ……きつくて……でも、なんか……慣れてきたかも……」

    %CALLNAME:人物_チルノ%の体が少しずつ%CALLNAME:MASTER%を受け入れていた。

    「……よくわかんないけど……後ろからでも、嫌じゃないかな……」
  priority: 2
- id: fallback
  content: >-
    「な……っ！　この体勢でお尻なんて……やめてよ！」

    %CALLNAME:人物_チルノ%は四つんばいにされ、必死に抵抗した。

    しかし%CALLNAME:MASTER%に逃げ場を塞がれ、菊穴を貫かれてしまった。

    「いたっ……痛い……っ！　後ろの穴は……やめて……っ」

    %CALLNAME:人物_チルノ%の菊穴は異物を拒むようにぎゅうと締め付けている。

    「獣みたいにされて……こんな屈辱……最強のあたいが……っ」

    「やめ……こんな格好でお尻なんて……！　離しなさいよ！」

    %CALLNAME:人物_チルノ%は四つんばいのまま逃れようとするが、動けない。

    菊穴を無理やり広げられ、%CALLNAME:人物_チルノ%は涙を流した。

    「いたい……お腹痛い……後ろからこんなとこ……やめてよ……っ」

    %CALLNAME:人物_チルノ%の小さな体は、%CALLNAME:MASTER%の下で震えていた。

    「凍らせてやる……絶対に……こんな体勢でこんなことした罪……っ」

    「ひっ……後ろから、お尻……っ！」

    %CALLNAME:人物_チルノ%は四つんばいで菊穴を貫かれ、悲鳴を上げた。

    菊穴は異物を押し出そうとぎゅうぎゅうと締め付けている。

    「あたいは……最強なのに……獣みたいにされて……こんな……っ」

    %CALLNAME:人物_チルノ%の目には涙が溢れていた。

    「……絶対許さない……こんなみじめな姿……絶対に……」

    「……っ」

    %CALLNAME:人物_チルノ%は声も出せず、四つんばいで菊穴を犯されていた。

    獣のような体勢で後ろの穴を貫かれる屈辱に、顔を伏せている。

    「……やめて……後ろから……お尻……」

    %CALLNAME:人物_チルノ%の菊穴は抵抗するように%CALLNAME:MASTER%を締め付けた。

    「あたいを……こんな風にした罪……一生忘れないから……」
  priority: 1
