character: 子悪魔
situation: K7_会話親密
entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%の唇にそっと口付けた。

    「ん……ちゅ、る……んむ……」

    %CALLNAME:TARGET%は目を閉じて、幸せそうにキスを受け入れている。

    舌を絡め合うと、妖精の小さな体がとろりと力を抜いた。

    「ふぁ……%CALLNAME:MASTER%……あたしね、キスするとぽかぽかするの……」

    %CALLNAME:TARGET%は潤んだ瞳で%CALLNAME:MASTER%を見上げている。

    「えへへ……キス、だいすき……%CALLNAME:MASTER%のこと、だいすきなの……」

    幸せそうな笑顔を浮かべながら、%CALLNAME:TARGET%はもう一度唇を近づけてきた。

    「%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は自分から背伸びをして、%CALLNAME:MASTER%に口付けた。

    「ちゅ……んっ……れろ……」

    拙いながらも一生懸命に舌を絡ませてくる。

    「……ぷはっ……えへへ、あたしからしちゃった」

    %CALLNAME:TARGET%は照れくさそうに笑っている。

    「キスしてると、あたし、とけちゃいそう……だいすきなの、%CALLNAME:MASTER%のこと」

    妖精の頬は、幸せそうに紅く染まっていた。

    「んっ……ちゅる、んむ……」

    %CALLNAME:MASTER%と%CALLNAME:TARGET%は深く口付けを交わしている。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の服をぎゅっと握りしめながら、夢中でキスに応えている。

    「……ぷあっ……はぁ、はぁっ……」

    唇を離すと、%CALLNAME:TARGET%は熱に浮かされたような表情をしていた。

    「……もっと、して……？　あたし、とけちゃいそう……」

    %CALLNAME:TARGET%は蕩けた顔で続きをせがんできた。

    「……ねぇ、%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の袖をちょんちょんと引っ張った。

    「キス……してほしいな……」

    おねだりするような上目遣いで、%CALLNAME:TARGET%は唇を突き出している。

    %CALLNAME:MASTER%がそっと唇を重ねると、%CALLNAME:TARGET%は幸せそうに目を閉じた。

    「んっ……ちゅ……れろ……ん……」

    しばらくキスを交わしてから、%CALLNAME:TARGET%は蕩けた顔で微笑んだ。

    「えへへ……%CALLNAME:MASTER%の唇、あまい……大好き……」
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%にキスをした。

    「んっ……！ ちゅ……んむ……」

    %CALLNAME:TARGET%は驚きながらも、おずおずとキスを受け入れている。

    「……ぷ、はぁ……」

    唇を離すと、%CALLNAME:TARGET%は顔を真っ赤にして俯いた。

    「キス……されちゃった……えへへ、嬉しい……」

    %CALLNAME:TARGET%は照れくさそうに笑いながら、胸に手を当てている。

    「……咲夜さんには、ナイショにしてね……？」

    「ふぇっ……キス……？」

    %CALLNAME:MASTER%が顔を近づけると、%CALLNAME:TARGET%は目を閉じた。

    「ちゅ……ん……」

    ふたりの唇が重なる。%CALLNAME:TARGET%は硬くなりながらも、逃げようとはしなかった。

    「……んっ……ぷあ……」

    唇が離れると、%CALLNAME:TARGET%は真っ赤な顔でぽわぽわとしている。

    「あ、あの……嬉しい、です……こういうの、初めてで……」

    %CALLNAME:TARGET%は恥ずかしそうに、でも嬉しそうにそう言った。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の頬に手を添えて、そっと口付けた。

    「んっ……ちゅる……」

    %CALLNAME:TARGET%は緊張しながらも、キスに応えようとしている。

    「……ぷは……あっ……」

    %CALLNAME:TARGET%の顔は湯上がりのように紅くなっている。

    「%CALLNAME:MASTER%……あたし、どきどきしてるの……」

    %CALLNAME:TARGET%は胸を押さえながら、照れくさそうに微笑んだ。

    「……嬉しい。%CALLNAME:MASTER%とキスできて、嬉しいの」

    「あ、あの……」

    %CALLNAME:TARGET%はもじもじしながら%CALLNAME:MASTER%を見上げている。

    %CALLNAME:MASTER%がそっと顔を近づけると、%CALLNAME:TARGET%は恥ずかしそうに目を閉じた。

    「んっ……ちゅ……」

    軽く唇が触れ合う。%CALLNAME:TARGET%の体がびくりと震えた。

    「……ぷは……あぅ……」

    唇を離すと、%CALLNAME:TARGET%は自分の唇に触れてぼんやりとしている。

    「……今の……キス……ですよね……」

    %CALLNAME:TARGET%は夢見心地のような顔で呟いた。

    「……えへへ……また、してくれますか……？」
