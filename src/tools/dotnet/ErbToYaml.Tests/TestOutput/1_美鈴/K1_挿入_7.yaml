- id: fallback
  content: >-
    「ん……%CALLNAME:MASTER%……こうしてると、心臓の音、伝わるね」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の膝の上に座り、腕を首に回した。

    向かい合って密着する体勢で、互いの体温が溶け合う。

    「……顔、近い……でも、嫌じゃないよ……むしろ、幸せ」

    %CALLNAME:人物_美鈴%は頬を染めながら、そっと額を%CALLNAME:MASTER%に預けた。

    「このまま……ずっと繋がっていたいな」

    武術家の強い腕が、愛おしげに%CALLNAME:MASTER%を抱きしめた。

    「あ……ん……座ったままだと、奥まで……深く、感じる……」

    %CALLNAME:人物_美鈴%は甘い吐息を漏らしながら、腰をくねらせた。

    正面から向き合う体勢で、%CALLNAME:MASTER%の表情がよく見える。

    「%CALLNAME:MASTER%の顔……見ながらできるの、いいね」

    %CALLNAME:人物_美鈴%は幸せそうに微笑み、そっと唇を寄せた。

    「……キス、してもいい？」

    恋人同士の親密さを、%CALLNAME:人物_美鈴%は全身で表現していた。

    「はぁ……%CALLNAME:MASTER%の胡坐の上……落ち着く……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の肩に顔を埋めた。

    「こうやって抱き合ってると……守られてる気分になるの」

    %CALLNAME:人物_美鈴%は普段の凛々しさを忘れ、甘えるように身を預けた。

    「……いつもは門番として気を張ってるけど……」

    %CALLNAME:人物_美鈴%は小さく笑った。

    「%CALLNAME:MASTER%の腕の中なら……素の私でいられるから」

    「……ん……こうして向かい合ってると……全部、伝わる……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の胸に手を当てた。

    「鼓動、速い……私も、同じだよ……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに微笑んだ。

    「……ねえ、%CALLNAME:MASTER%……私のこと、好き？」

    答えを待たずに、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に口づけた。

    「……ふふ、答えなくていいよ……わかってるから」
