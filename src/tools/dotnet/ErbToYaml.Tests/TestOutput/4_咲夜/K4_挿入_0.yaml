- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%……こんな体勢は……」

    %CALLNAME:TARGET%は恥ずかしそうに顔を背けようとした。

    「顔を……見ないでください……」

    しかし、%CALLNAME:MASTER%に顔を向けられ、目が合ってしまう。

    「……っ……恥ずかしい……ですわ……」

    「でも……嫌じゃ……ないの……」

    %CALLNAME:TARGET%は小さな声で、正直な気持ちを漏らした。

    「あ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに合わせて、声を漏らしている。

    「メイドとして……こんな姿は……見せたくなかったのに……」

    「でも……貴方になら……」

    %CALLNAME:MASTER%の腰が深く沈むと、%CALLNAME:TARGET%の体が震えた。

    「あっ……奥……当たって……」

    「%CALLNAME:MASTER%……もっと……」

    「……ふぁ……こんなに……感じてしまうなんて……」

    %CALLNAME:TARGET%は自分の反応に戸惑いながらも、%CALLNAME:MASTER%を受け入れている。

    「お嬢様のお世話より……今は……」

    言いかけて、%CALLNAME:TARGET%は口を噤んだ。

    「……いけませんわね、こんなこと考えては……」

    「でも……止められないの……%CALLNAME:MASTER%……」

    葛藤しながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%から目を逸らせなかった。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は躊躇いがちに%CALLNAME:MASTER%の背中に手を回した。

    「こうして……抱きしめても……いいですか……」

    許可を求めながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を引き寄せた。

    「あ……近い……顔が……」

    「……ん……っ……%CALLNAME:MASTER%……」

    恥ずかしさと心地よさの狭間で、%CALLNAME:TARGET%は甘い声を漏らし続けた。
