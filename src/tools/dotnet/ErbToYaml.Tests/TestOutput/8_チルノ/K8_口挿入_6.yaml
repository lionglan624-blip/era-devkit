    「……%CALLNAME:MASTER%が気持ちよくなってくれると……あたいも嬉しいの」

    最後に小声で呟きながら、%CALLNAME:人物_チルノ%は奉仕を続けた。

    「%CALLNAME:MASTER%……ここ、触ってほしいの……？」

    %CALLNAME:人物_チルノ%は珍しくおとなしい声で尋ねた。

    「あたいの指……冷たいけど……大丈夫……？」

    そっと%CALLNAME:MASTER%の後ろに指を這わせる。

    「んっ……こうすると……%CALLNAME:MASTER%、びくってするのね……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の反応を確かめながら、指を動かした。

    「……%CALLNAME:MASTER%のこと、もっと気持ちよくしてあげたいな……」

    甘えた声で囁きながら、愛撫を続けている。

    「……%CALLNAME:MASTER%、あたいに任せて」

    %CALLNAME:人物_チルノ%は真剣な表情で%CALLNAME:MASTER%の後ろに回った。

    小さな手で%CALLNAME:MASTER%の臀部を広げ、窄まりに指を添える。

    「ここ……敏感なんでしょ？　知ってるわよ」

    %CALLNAME:人物_チルノ%の冷たい指がゆっくりと円を描くように動く。

    「んふふ……%CALLNAME:MASTER%の全部、あたいが知ってるんだから……」

    恥ずかしそうにしながらも、%CALLNAME:人物_チルノ%は丁寧に奉仕を続けた。
