  content: >-
    「……背面で、後ろをお使いに」

    %CALLNAME:人物_美鈴%は淡々とした口調で言った。

    背面座位でアナルを貫かれる体勢に、顔を歪める。

    「……門番の務めとして……お受けします」

    %CALLNAME:人物_美鈴%は感情を殺した声で言った。

    「……ただ、背中を見せるのは……本来なら許されることではありません」

    武術家として、背後を預けることへの抵抗感が滲み出ていた。

    「……っ……」

    %CALLNAME:人物_美鈴%は声を押し殺しながら、%CALLNAME:MASTER%の動きに応じていた。

    「……こんな体勢で後ろを……お使いになるのですね」

    %CALLNAME:人物_美鈴%は機械的に言った。

    「……お望みなら、続けます……」

    その声には、苦痛と屈辱が滲んでいた。

    「……これも、務めですから……」

    「……」

    %CALLNAME:人物_美鈴%は無言で%CALLNAME:MASTER%に背中を向けたまま座っていた。

    「……背中を預けろとは……」

    %CALLNAME:人物_美鈴%は静かに言った。

    「……武術家に背後を取らせるとは、屈辱ですね」

    「……ですが、お好きにどうぞ」

    鍛え抜かれた背中が、硬く強張っていた。

    「……わかりました」

    %CALLNAME:人物_美鈴%は小さく頷いた。

    「……背面で後ろを……お使いになるのですね」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に背中を向けた。

    「……ただ、勘違いしないでください」

    「……背中を預けているのは、体勢の都合です」

    「……信頼しているわけでは、ありません」
