character: フラン
situation: K6_挿入
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……正面から、お尻に入れるの……？」

    %CALLNAME:人物_フラン%は恋人の腰に脚を絡めながら、嬉しそうに微笑んだ。

    正面から見つめ合える体勢は、495年の孤独には無かった至福の時間。

    「こうしてると……%CALLNAME:MASTER%の顔、ずっと見ていられるのさ」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の後孔にゆっくりと挿入した。

    「んっ……ぁ……お尻に入ってくる……痛い……でも、%CALLNAME:MASTER%の顔が見えるから……平気」

    悪魔の妹は、恋人と正面から繋がる幸福に紅い瞳を潤ませていた。

    「ね、%CALLNAME:MASTER%……ぎゅってしながら、後ろに入れて……」

    %CALLNAME:人物_フラン%は恋人の首に腕を回しながらねだった。

    正面から抱きしめられながらなら、どんな痛みも受け入れられる気がする。

    「私……%CALLNAME:MASTER%に抱きしめられてると、壊さないでいられるの」

    %CALLNAME:MASTER%が後孔を突き上げると、%CALLNAME:人物_フラン%は甘い悲鳴を上げた。

    「ひゃっ……あぁ……お尻の奥……すごい……%CALLNAME:MASTER%……っ」

    恋人の腕の中で、悪魔の妹は痛みと快楽を同時に味わっていた。

    「%CALLNAME:MASTER%の紅い瞳……私と同じ色だね」

    %CALLNAME:人物_フラン%は恋人の顔を見つめながら囁いた。

    正面から見つめ合える今、互いの瞳に映る自分を確認できる。

    「こうして繋がってると……ふたりでひとつみたい……なのさ」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の後孔を抉ると、背中が仰け反った。

    「あぁっ……んっ……お尻の中……いっぱい……%CALLNAME:MASTER%で……」

    495年の孤独を知る少女は、恋人と一体になる喜びに酔いしれていた。

    「お尻でするのって……恥ずかしいけど……%CALLNAME:MASTER%となら、平気」

    %CALLNAME:人物_フラン%は頬を染めながらも、恋人を受け入れた。

    恋人の前では、どんな姿を晒しても怖くない。

    「%CALLNAME:MASTER%の前でなら……全部、見せてもいいのさ」

    %CALLNAME:MASTER%が腰を打ち付けると、%CALLNAME:人物_フラン%は切ない声を漏らした。

    「あっ……んんっ……奥まで……きてるぅ……好き……%CALLNAME:MASTER%……好き……っ」

    悪魔の妹は、愛の証として恋人のすべてを受け入れていた。
  priority: 4
- id: talent_3_1
  content: >-
    「せ、正面から……お尻に……？　恥ずかしい……のさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の顔を見て、頬を赤らめた。

    好きな人に正面から見つめられながら、後孔に入れられる羞恥。

    「で、でも……%CALLNAME:MASTER%がしたいなら……我慢する……」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の後孔に挿入すると、痛みに顔を歪めた。

    「いたっ……んっ……お尻……きつい……でも……%CALLNAME:MASTER%の顔、見えてるから……」

    悪魔の妹は、好きな人のために痛みを堪えていた。

    「%CALLNAME:MASTER%……今、私のこと、どんな顔で見てる……？」

    %CALLNAME:人物_フラン%は恥ずかしそうに問いかけた。

    好きな人に痛がる顔を見られているのが、たまらなく恥ずかしい。

    「変な顔……してないかな……恥ずかしいのさ……」

    %CALLNAME:MASTER%が後孔を突き上げると、%CALLNAME:人物_フラン%は声を上げた。

    「ひぃっ……あぁ……お尻の奥……すごい……%CALLNAME:MASTER%……っ」

    好きな人に見つめられながら乱れる羞恥に、悪魔の妹は耐えていた。

    「こ、こうしてると……%CALLNAME:MASTER%を壊さないでいられる……かも」

    %CALLNAME:人物_フラン%は抱き合う体勢で自分に言い聞かせた。

    正面から抱きしめていれば、破壊の力を抑えられる気がする。

    「お尻は……痛いけど……%CALLNAME:MASTER%のそばにいられるから……」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_フラン%は吐息を漏らした。

    「あっ……ん……慣れてきた……かも……%CALLNAME:MASTER%……」

    好きな人を壊さないために、悪魔の妹は痛みを受け入れていた。

    「%CALLNAME:MASTER%……私の目、見て……？」

    %CALLNAME:人物_フラン%は勇気を出して、%CALLNAME:MASTER%を見つめた。

    好きな人と目を合わせるのは、こんなにも緊張する。

    「紅い目……怖くない……？　私の目、みんな怖がるから……」

    %CALLNAME:MASTER%が深く突き入れると、%CALLNAME:人物_フラン%は涙を滲ませた。

    「あぁっ……んっ……痛い……けど……%CALLNAME:MASTER%が見てくれてる……から……」

    好きな人に紅い瞳を受け入れてもらえる喜びが、痛みを和らげていた。
