- id: talent_3_1
  content: >-
    「……%CALLNAME:MASTER%……こ、こうすればよろしいでしょうか……」

    %CALLNAME:TARGET%は顔を赤らめながら、泡だらけの身体を近づけた。

    「あ、あの……全身で洗うなんて……恥ずかしいですわ……」

    しかし、%CALLNAME:TARGET%は意を決して%CALLNAME:MASTER%に身体を擦り付けた。

    ぬるり、と肌が触れ合い、%CALLNAME:TARGET%は小さく息を呑んだ。

    「……っ……思ったより……近いですわね……」

    「で、でも……貴方のためなら……」

    %CALLNAME:TARGET%は恥ずかしさを堪えながら、奉仕を続けた。

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は胸を押し付け、ゆっくりと身体を動かした。

    「こ、こうすると……反応がありますわね……」

    「ふふ……貴方の気持ちいいところ……分かってきましたわ……」

    %CALLNAME:TARGET%は少し得意げに微笑んだ。

    「もっと……上手にできるよう……努力しますから……」

    恥ずかしさと嬉しさが入り混じった表情で、%CALLNAME:TARGET%は奉仕を続けた。

    「……こんな……ことをしているなんて……」

    %CALLNAME:TARGET%は自分の行動に戸惑いながらも、身体を止めなかった。

    「メイドとして……お世話するのは当然……ですけれど……」

    「で、でも……全身で……なんて……」

    %CALLNAME:TARGET%は言葉を詰まらせながらも、身体を密着させた。

    ぬるぬると石鹸が滑り、二人の肌を繋いでいく。

    「……%CALLNAME:MASTER%だから……できることですわ……」

    %CALLNAME:TARGET%は小さく呟きながら、奉仕に専念した。

    「……%CALLNAME:MASTER%……あまり見ないでくださいまし……」

    %CALLNAME:TARGET%は俯きながら、身体を擦り付けている。

    「こんな……はしたない姿……」

    「でも……貴方に喜んでいただけるなら……」

    %CALLNAME:TARGET%は顔を上げ、潤んだ瞳で%CALLNAME:MASTER%を見た。

    「……最後まで……お世話させてくださいまし……」

    恥ずかしさを堪えながら、%CALLNAME:TARGET%は懸命に身体を動かした。
