    慣れない動きながらも、懸命に腰を使って%CALLNAME:MASTER%を悦ばせようとしている。

    「%CALLNAME:MASTER%……気持ちいい……ですか……？」

    %CALLNAME:TARGET%は不安げに%CALLNAME:MASTER%の反応を窺った。

    「……あたし……もっと上手になりたいな……」

    「%CALLNAME:MASTER%の背中……あったかい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中に頬を寄せながら腰を動かしていた。

    「んっ……はぁ……後ろから抱きしめると……%CALLNAME:MASTER%の心臓の音……聞こえる……」

    小さな体が懸命に動いて、%CALLNAME:MASTER%の体を揺らしている。

    「あっ……ん……%CALLNAME:MASTER%の中……ぎゅって締まってきて……」

    %CALLNAME:TARGET%は甘い声を漏らした。

    「……あたしも……気持ちよくなってきちゃった……」
