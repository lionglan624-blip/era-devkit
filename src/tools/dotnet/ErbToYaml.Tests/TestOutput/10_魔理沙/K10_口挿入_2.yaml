character: 魔理沙
situation: K10_口挿入
entries:
- id: fallback
  content: >-
    「ん……こうやって挟むと、気持ちいいのか？」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の一物を胸で挟んだ。

    「私の胸、そんなに大きくないけど……お前のためなら頑張るぜ」

    %CALLNAME:人物_魔理沙%は両手で胸を寄せ、ゆっくりと上下に動き始めた。

    「んっ……こう？　ちゃんと気持ちよくなってるか……？」

    %CALLNAME:人物_魔理沙%は恋人の反応を確かめながら、一生懸命奉仕を続けた。

    「ふふ……お前のここ、すごく熱いな」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の一物を胸で包み込んだ。

    「私の胸で……こうして挟んでると、繋がってる気がするぜ」

    「んっ……ふぅ……どうだ、気持ちいいか……？」

    %CALLNAME:人物_魔理沙%は恋人の顔を見上げながら、胸を揺らした。

    「もっと気持ちよくしてやるから……任せとけ」

    「……だんだんコツが分かってきたかもな」

    %CALLNAME:人物_魔理沙%は自信を持って胸を動かした。

    「んっ……こうやって強く挟むと……反応するんだよな」

    %CALLNAME:MASTER%が気持ちよさそうにすると、%CALLNAME:人物_魔理沙%は得意げになった。

    「ふふん、私だって努力してるんだぜ……お前のためにな」

    %CALLNAME:人物_魔理沙%は恋人を喜ばせることに夢中になっていた。

    「なあ……ちゃんとこっち見てろよ」

    %CALLNAME:人物_魔理沙%は胸を動かしながら、%CALLNAME:MASTER%の目を見つめた。

    「私がお前を気持ちよくしてるとこ……ちゃんと見ててくれ」

    「んっ……ふぅ……こうすると、いいんだろ……？」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに頬を染めながらも、奉仕を続けた。

    「……見られてると、なんか……頑張れるんだぜ」
  priority: 4
- id: talent_3_1
  content: >-
    「ち、違うからな！　べ、別にやりたくてやってるわけじゃ……」

    %CALLNAME:人物_魔理沙%は顔を真っ赤にしながら、胸で%CALLNAME:MASTER%の一物を挟んだ。

    「私の胸、大きくないって分かってるだろ……文句言うなよ……」

    %CALLNAME:人物_魔理沙%は照れ隠しに強がりながらも、胸を動かし始めた。

    「んっ……こ、こうか……？　あっ、笑うなよ……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに顔を背けながらも、手は止めなかった。

    「こ、こんなことして……変態なんだからな、お前は」

    %CALLNAME:人物_魔理沙%は文句を言いながらも、胸を動かし続けている。

    「私の胸なんかで満足するなんて……物好きだぜ」

    「んっ……ふぅ……こうすると、いいのか……？」

    %CALLNAME:人物_魔理沙%の動きは慣れないながらも、一生懸命だった。

    「……勝手に変な声出すなよ、恥ずかしいだろ……」

    「んっ……なんか、大きくなってきた……？」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、胸を動かし続けた。

    「こ、これって……私の胸でも気持ちいいってこと……？」

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_魔理沙%は複雑な表情になった。

    「……別に嬉しくなんかないぜ……ただ、悪い気はしないってだけだ」

    %CALLNAME:人物_魔理沙%は照れながらも、少し得意げだった。

    「……お前、もうちょっと反応してくれてもいいんだぜ」

    %CALLNAME:人物_魔理沙%は少し不満そうに呟いた。

    「こっちは一生懸命やってるんだから……」

    「んっ……ふぅ……こう、強く挟むと……」

    %CALLNAME:MASTER%が気持ちよさそうな顔をすると、%CALLNAME:人物_魔理沙%は照れた。

    「なっ……そ、そんな顔されると困る……もう、勝手にしろよ……」
