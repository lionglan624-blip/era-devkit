character: パチュリー
situation: K3_会話親密
entries:
- id: fallback
  content: >-
    「――あら、%CALLNAME:MASTER%がお茶を？」

    %CALLNAME:人物_パチュリー%は読んでいた本から顔を上げ、静かに湯飲みを受け取った。

    ふう、と息を吹きかけてから、小さく口をつける。

    「……うん。悪くないわ」

    %CALLNAME:人物_パチュリー%は淡々と言ったが、その目元は僅かに緩んでいる。

    「……本を読むのには、こういうお茶があると助かるの」

    そう言いながら、%CALLNAME:人物_パチュリー%は恋人だけに見せる穏やかな表情を浮かべた。

    「わざわざ淹れてくれたの？　……ありがとう」

    %CALLNAME:人物_パチュリー%は本を閉じ、両手で湯飲みを包み込むように持った。

    ずず、と静かにお茶を啜る。

    「……ふぅ。あったまるわね」

    %CALLNAME:人物_パチュリー%はほっと息を吐き、珍しく柔らかな笑みを浮かべた。

    「……%CALLNAME:MASTER%がいると、読書が捗るの。不思議よね」

    本に視線を落としながら、%CALLNAME:人物_パチュリー%はぽつりとそう呟いた。

    「――ん、ありがと」

    %CALLNAME:人物_パチュリー%は本のページに栞を挟み、湯飲みを受け取った。

    静かにお茶を啜りながら、%CALLNAME:MASTER%の顔を見つめている。

    「……%CALLNAME:MASTER%の淹れるお茶、好きよ」

    珍しく素直な言葉が%CALLNAME:人物_パチュリー%の口から零れた。

    「……本と、お茶と、あなた。私の幸せの三要素ね」

    %CALLNAME:人物_パチュリー%は照れたように視線を逸らし、再び本を開いた。

    「――……ふぅ」

    %CALLNAME:人物_パチュリー%は差し出された湯飲みを無言で受け取った。

    ゆっくりとお茶を味わい、静かに目を閉じる。

    「……この香り、落ち着くわ」

    本を膝の上に置いたまま、%CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の隣に寄り添った。

    「……少しだけ、読書を休憩するわ。あなたと一緒に」

    そう言って、%CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の肩に頭をもたせかけた。
  priority: 4
- id: talent_3_1
  content: >-
    「――え、お茶？　%CALLNAME:MASTER%が淹れたの？」

    %CALLNAME:人物_パチュリー%は少し驚いた様子で湯飲みを受け取った。

    そっと口をつけて、ゆっくりとお茶を味わう。

    「……美味しいわ。ありがとう」

    %CALLNAME:人物_パチュリー%は素っ気なく言ったが、頬が微かに染まっている。

    「……別に、嬉しいわけじゃないのよ。ただ、読書のお供にちょうどいいだけ」

    そう言いながらも、%CALLNAME:人物_パチュリー%はどこか嬉しそうにお茶を啜った。

    「あ、ありがとう……」

    %CALLNAME:人物_パチュリー%は珍しく言葉を詰まらせながら、湯飲みを受け取った。

    ずず、とお茶を啜る音が図書館に静かに響く。

    「……あちっ」

    %CALLNAME:人物_パチュリー%は熱さに少し眉を寄せた。

    「……もう少し冷ましてから飲むべきだったわ。焦ったのよ、別に」

    言い訳のように呟きながら、%CALLNAME:人物_パチュリー%は視線を逸らした。

    「――……あら」

    %CALLNAME:人物_パチュリー%は差し出された湯飲みを見つめ、少し戸惑った様子を見せた。

    「……わざわざ私のために？」

    そう呟きながら、両手で湯飲みを受け取る。

    お茶の温かさが手のひらに伝わり、%CALLNAME:人物_パチュリー%は小さく息を吐いた。

    「……こういうの、慣れていないから」

    %CALLNAME:人物_パチュリー%は本で顔を隠すようにしながら、ぽつりと呟いた。

    「――ん……」

    %CALLNAME:人物_パチュリー%は黙って湯飲みを手に取り、静かにお茶を啜った。

    本から顔を上げ、ちらりと%CALLNAME:MASTER%を見る。

    「……%CALLNAME:MASTER%は、よく気が付くわね」

    そう言いながら、%CALLNAME:人物_パチュリー%は少し頬を赤らめている。

    「……まあ、読書中に喉が渇いていたのは事実よ」

    素直になれない自分を誤魔化すように、%CALLNAME:人物_パチュリー%は本に視線を落とした。
