- id: fallback
  content: >-
    %CALLNAME:MASTER%が電動マッサージャを取り出すと、%CALLNAME:TARGET%は怪訝な表情を浮かべた。

    「……それは何ですの」

    %CALLNAME:TARGET%は警戒しながらも、興味深そうにマッサージャを見つめている。

    「……お客様、妙なことをお考えではありませんわよね」

    そう言いながらも、%CALLNAME:TARGET%の声には厳しさが欠けていた。

    「……まあ、マッサージ程度なら……」

    「っ……これは……」

    振動が体に触れた瞬間、%CALLNAME:TARGET%は小さく驚いた。

    「……電動式、ですのね……」

    %CALLNAME:TARGET%は戸惑いながらも、すぐには振り払わなかった。

    「……変なところに当てないでくださいまし」

    %CALLNAME:TARGET%は落ち着いた声で言いながら、振動を受け止めている。

    「……ん……」

    マッサージャの振動に、%CALLNAME:TARGET%は僅かに眉をひそめた。

    「……悪くはありませんわね」

    %CALLNAME:TARGET%は冷静を装いながらも、少し気持ちよさそうな表情を見せた。

    「……お客様のおもてなしも、メイドの務めですから」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    電動マッサージャの振動が%CALLNAME:TARGET%の肩に当てられた。

    「……」

    %CALLNAME:TARGET%は無言で振動を受け止めている。

    「……%CALLNAME:MASTER%、それで満足ですの」

    %CALLNAME:TARGET%は淡々と問いかけながらも、拒否はしなかった。

    「……まあ、肩こりには効きそうですわね」
