- id: fallback
  content: >-
    「……それ、珠がいっぱいついてるやつか」

    %CALLNAME:人物_魔理沙%はアナルビーズを見て、小さく息を吐いた。

    「お前の趣味は相変わらず変わってるぜ……まあ、いいけどさ」

    %CALLNAME:MASTER%が%CALLNAME:人物_魔理沙%の尻を突き出させ、一粒ずつ挿入していく。

    「んっ……入ってく……一個ずつ、飲み込んでる感じがするぜ……」

    %CALLNAME:人物_魔理沙%は恋人に身を委ね、異物感に耐えた。

    「おっ、今日はビーズか。バイブの次はそれなんだな」

    %CALLNAME:人物_魔理沙%は諦めたような笑みを見せた。

    「……私のお尻、お前専用の遊び場じゃないんだぜ？」

    それでも四つん這いになり、%CALLNAME:MASTER%にお尻を差し出す。

    「あっ……ぬるっとして……珠が次々と……んんっ……」

    最後の珠が飲み込まれると、%CALLNAME:人物_魔理沙%は安堵のため息をついた。

    「珠を連ねたやつ……なるほど、引き抜くときが本番ってわけか」

    %CALLNAME:人物_魔理沙%は研究者のような目でビーズを見つめた。

    「面白い発想だぜ……ま、試してみようじゃないか」

    %CALLNAME:MASTER%がゆっくりと挿入していくと、%CALLNAME:人物_魔理沙%は体を震わせた。

    「くっ……一個入る度に、腸壁が押し広げられて……変な感覚だぜ……」

    %CALLNAME:人物_魔理沙%は恋人の肩に顔を埋め、快感を噛み殺した。

    「ふーん……お前、私のお尻が好きすぎないか？」

    %CALLNAME:人物_魔理沙%はアナルビーズを見て呆れたように笑った。

    「仕方ないな……恋人の特権で、好きにしろよ」

    %CALLNAME:MASTER%がビーズを菊穴に押し当て、一粒目を挿入する。

    「あっ……入った……んっ、二個目……三個目……全部入るのか、これ……」

    全ての珠を飲み込んだ%CALLNAME:人物_魔理沙%は、頬を紅く染めて%CALLNAME:MASTER%を見上げた。
