    %CALLNAME:TARGET%は%CALLNAME:MASTER%の乳首を吸いながら、荒い息をついていた。

    「……%CALLNAME:MASTER%……こうしていると……」

    %CALLNAME:TARGET%は恨めしそうに%CALLNAME:MASTER%を見上げている。

    「私まで……甘い気持ちになってしまいますわ……」

    %CALLNAME:TARGET%の頬は紅く染まり、瞳は潤んでいた。

    「……%CALLNAME:MASTER%は……意地悪ですわね……」

