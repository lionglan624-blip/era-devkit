- id: fallback
  content: >-
    「……これもメイドの務めですわ……」

    %CALLNAME:TARGET%は事務的に%CALLNAME:MASTER%の秘所に顔を近づけた。

    「お客様のご要望にお応えするのは当然のこと……」

    しかし、実際に舐め始めると少し表情が揺らいだ。

    「……思ったより……甘い……ですわね……」

    「とにかく……お世話いたしますわ……んっ……」

    %CALLNAME:TARGET%はぎこちなく舌を動かし始めた。

    「……ん……こうすれば……よろしいでしょうか……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を窺いながら舌を動かしている。

    「お体の様子を見ながら……調整いたしますわ……」

    「……っ……少し……深く……舐めますわね……」

    %CALLNAME:TARGET%の舌使いは次第に丁寧になっていく。

    「……これは仕事……ですから……」

    自分に言い聞かせるように呟きながら、%CALLNAME:TARGET%は奉仕を続けた。

    「……お客様の体をお世話するのも……メイドの仕事……」

    %CALLNAME:TARGET%は淡々と舌を動かしている。

    「感情を込める必要はありませんわ……んむっ……」

    「……っ」

    ふと、%CALLNAME:TARGET%の動きが優しくなった。

    「……いえ、何でもありませんわ」

    プロフェッショナルを装いながら、%CALLNAME:TARGET%は奉仕を続けた。

    「……%CALLNAME:MASTER%……じっとしていてくださいまし」

    %CALLNAME:TARGET%は真剣な表情で%CALLNAME:MASTER%の秘所を舐めている。

    「お体の状態を確認しながら……奉仕いたしますわ」

    「ここは……敏感……ですわね……れろっ……」

    %CALLNAME:TARGET%は丁寧に舌を這わせていく。

    「……これもサービスの一環……ですから……」

    小さな声で、%CALLNAME:TARGET%はそう付け加えた。
  priority: 2
- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%の秘所に顔を近づけている。

    「お客様のご要望ですから……お相手いたしますわ」

    瀟洒なメイドは、感情を完全に押し殺していた。

    「……んっ……早く済ませてくださいまし」

    「私には、お嬢様のお世話という仕事がありますので」

    %CALLNAME:TARGET%の舌使いは、事務的で機械的だった。

    「……ふぅ……」

    %CALLNAME:TARGET%は小さく息を吐きながら秘所を舐めている。

    「こう舐めればいいのですね……分かりましたわ」

    「感情を込める必要はありませんでしょう……んむっ……」

    %CALLNAME:TARGET%は淡々と舌を動かす。

    「……感情移入などしませんわよ」

    完璧なメイドは、あくまでプロフェッショナルを貫いていた。

    「……これは仕事です」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「お客様の相手をするのも、メイドの務め……れろっ……」

    「……っ」

    一瞬、%CALLNAME:TARGET%の表情が揺らいだが、すぐに戻る。

    「……何でもありませんわ」

    冷静さを取り繕いながら、%CALLNAME:TARGET%は奉仕を続けた。

    「……貴方に感情を見せる必要はありませんわ」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見ている。

    「私はメイド。貴方はお客様。それ以上でも以下でもありません」

    「……ん……んむっ……」

    僅かに表情が緩んだが、すぐに引き締めた。

    「……早く終わらせてください。お嬢様がお呼びですので」

    瀟洒な従者は、最後まで感情を見せずに奉仕を続けた。
  priority: 1
