  content: >-
    「いやです……そんなの、何に使うんですか……つぶつぶが、いっぱい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したアナルビーズを見て、後ずさりした。

    「……えっ、お、お尻に入れる……？　いやっ……！」

    しかし逃げ場がなく、アナルビーズが菊座に押し当てられてしまう。

    「ひゃあっ……！？　やっ、やめて……ぽこって、入ってきて……抜けない……！」

    珠が一つずつ肛門に挿入され、%CALLNAME:TARGET%は涙目になって%CALLNAME:MASTER%に懇願した。

    「……咲夜さん、助けて……お尻の中に、つぶつぶがいっぱい……」

    「な、何ですかそれ……近づけないでください……！」

    %CALLNAME:TARGET%は恐怖で体を強張らせている。

    「……そんなの……お尻に入れる……？　いやです……！」

    しかし%CALLNAME:MASTER%に押さえつけられ、アナルビーズが肛門に挿入されてしまう。

    「やっ……んっ……！？　な、何これ……一つ、また一つって……お尻に入ってきて……！」

    %CALLNAME:TARGET%は初めての感覚にパニックになりながら、涙を溢れさせた。

    「お願いです……抜いて……お尻の中、珠でいっぱいで……」

    「……っ」

    %CALLNAME:TARGET%はアナルビーズを見て、言葉も出ないほど怯えていた。

    声を上げる間もなく、アナルビーズが肛門に挿入される。

    「ひぁっ……！　んっ……やっ……ぽこ、ぽこって……お尻の中に、珠が……！」

    妖精の小さな体が、一珠ずつ増える異物感に翻弄されている。

    「……どうして……こんなところに……こんなもの……」

    %CALLNAME:TARGET%は理解できないまま、逃げられない感覚に震えていた。

    「あたし……何か悪いことしましたか……」

    %CALLNAME:TARGET%は泣きそうな顔で%CALLNAME:MASTER%を見上げた。

    「こんな……お尻に……つぶつぶを……」

    アナルビーズが肛門に一珠ずつ挿入され、妖精の体が大きく跳ねる。

    「んっ……あぁっ……！　お尻の中で……珠が増えてく……逃げられない……！」

    %CALLNAME:TARGET%は抵抗する力も失い、珠が一つずつ挿入される感覚に蹂躙されている。

    「……もう……どうにでも、してください……」
