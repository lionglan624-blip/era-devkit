- id: talent_3_1
  content: >-
    「えっ……こ、これを口に入れるの……？」

    %CALLNAME:人物_フラン%は戸惑いと興味の混じった表情で、一物を見つめた。

    おそるおそる舌を伸ばし、先端に触れる。

    「わ……熱い……それに、なんか変な味……」

    %CALLNAME:人物_フラン%は顔を紅らめながら、もう一度舐めてみた。

    「でも……%CALLNAME:MASTER%の味なんだよね……ちゅ……」

    初めての経験に、少女の心臓は高鳴っていた。

    「ふぅん……%CALLNAME:MASTER%、私がこうすると気持ちいいんだ……」

    %CALLNAME:人物_フラン%は面白そうに、舌の動きを変えてみる。

    舐めたり吸ったり、反応を楽しんでいる。

    「ふふ……%CALLNAME:MASTER%の顔、変なの……じゅる、ちゅ……」

    %CALLNAME:人物_フラン%はいたずらっぽく笑いながら、深く咥えた。

    「ねえ……もっと気持ちいい顔、見せてよ……」

    その言葉には、独占欲と好奇心が滲んでいた。

    「%CALLNAME:MASTER%のここ……私だけが舐めていいんだよね……？」

    %CALLNAME:人物_フラン%は確認するように問いかけながら、舌を這わせていた。

    他の誰かにさせることを想像し、表情が少しだけ曇る。

    「……他の子にはさせないでね……んむ、ちゅる……」

    %CALLNAME:人物_フラン%は少し強めに吸い、独占を主張した。

    「私だけの……私だけの%CALLNAME:MASTER%……じゅるる……」

    その執着は、冗談になりきれていなかった。

    「あ……%CALLNAME:MASTER%、びくってなった……」

    %CALLNAME:人物_フラン%は口の中の反応に興味津々の様子だった。

    まるで新しい玩具を見つけた子供のように、目を輝かせている。

    「もっと舐めてあげる……私、上手になりたいのさ……」

    %CALLNAME:人物_フラン%は真剣な表情で、%CALLNAME:MASTER%を喜ばせようと努力していた。

    「ね……気持ちいい？　……うん、もっと頑張るね……ちゅ、れろ……」

    恋慕の少女は、愛しい人への奉仕に夢中だった。
