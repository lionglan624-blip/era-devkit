- id: fallback
  content: >-
    「……向かい合って、座る体勢ですか」

    %CALLNAME:人物_美鈴%は淡々とした口調で言った。

    事務的に%CALLNAME:MASTER%の膝に座る。

    「……%CALLNAME:MASTER%がそうしたいのなら、構いませんが」

    %CALLNAME:人物_美鈴%は感情を殺した声で言った。

    「……あまり、顔を見つめないでください」

    その声には、かすかな拒絶が含まれていた。

    「……っ……」

    %CALLNAME:人物_美鈴%は声を抑えながら、%CALLNAME:MASTER%の動きに応じていた。

    「……門番の務めとして、お受けします」

    %CALLNAME:人物_美鈴%は機械的に言った。

    「……この体勢は、顔が近くて……少し、やりづらいですね」

    その瞳には、感情を押し殺した色が浮かんでいた。

    「……」

    %CALLNAME:人物_美鈴%は無言で%CALLNAME:MASTER%を見つめた。

    「……%CALLNAME:MASTER%は、向かい合うのがお好みですか」

    %CALLNAME:人物_美鈴%は静かに問いかけた。

    「……私の顔を見て、何を思うのですか」

    武術家の鋭い眼差しが、%CALLNAME:MASTER%の心を探っていた。

    「……わかりました」

    %CALLNAME:人物_美鈴%は小さく頷いた。

    「……お嬢様の客人として、もてなすのも門番の務めです」

    %CALLNAME:人物_美鈴%は自分に言い聞かせるように呟いた。

    「……ただ、勘違いしないでください」

    「……これは、ただの義務です」

    毅然とした態度の中に、かすかな寂しさが見え隠れしていた。
