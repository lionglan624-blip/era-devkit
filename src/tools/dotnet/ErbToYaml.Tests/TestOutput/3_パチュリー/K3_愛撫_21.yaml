- id: talent_3_1
  content: >-
    「っ……な、何を……そこは……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指が乳首に触れた瞬間、身を強張らせた。

    しかし抵抗することなく、%CALLNAME:TARGET%はされるがままになっている。

    「……乳首、なんて……恥ずかしいじゃない……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、視線を逸らした。

    「……%CALLNAME:MASTER%、見ないで……そんな、顔……」

    そう言いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%から離れようとはしなかった。

    「……ん……あ……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の乳首を摘まみ始めると、%CALLNAME:TARGET%は小さく声を漏らした。

    手元の魔導書は開いたまま、ページが止まっている。

    「……集中、できないじゃない……乳首ばかり……」

    %CALLNAME:TARGET%は恨めしそうに呟くが、その声には熱がこもっている。

    「……むきゅ……もう少し、優しくして……」

    %CALLNAME:TARGET%は本を閉じ、%CALLNAME:MASTER%に身を預けた。

    「……ひゃ……っ……や……」

    %CALLNAME:MASTER%が乳首を引っ張ると、%CALLNAME:TARGET%は思わず声を上げた。

    「そ、そんなに……引っ張ったら……だめ……」

    %CALLNAME:TARGET%は弱々しく抗議するが、体は正直に反応している。

    「……変な声、出ちゃう……聞かないで……」

    %CALLNAME:TARGET%は羞恥に顔を伏せながら、%CALLNAME:MASTER%の愛撫を受け入れていた。

    「……%CALLNAME:MASTER%……本当に、意地悪ね……」

    「……ぁ……や……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に乳首を弄ばれながら、甘い吐息を漏らしている。

    大図書館の埃っぽい空気の中、%CALLNAME:TARGET%の匂いが%CALLNAME:MASTER%を包む。

    「……こんなところで……小悪魔に見られたら……」

    %CALLNAME:TARGET%は周囲を気にしながらも、%CALLNAME:MASTER%の手を払いのけない。

    「……乳首だけで……こんなに……恥ずかしい……」

    %CALLNAME:TARGET%は赤い顔で、%CALLNAME:MASTER%に縋りついた。
