    「……%CALLNAME:MASTER%って、もしかしてこういうの好きなの……？」

    「んっ……やだ、そこ……」

    %CALLNAME:人物_美鈴%はビクッと肩を震わせた。

    「……お尻を触るのは、その、ちょっと……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに視線を逸らした。

    だが、その頬は紅く染まり、完全に嫌がっているわけではなさそうだ。

