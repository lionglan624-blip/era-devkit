    %CALLNAME:人物_大妖精%は嬉しそうに微笑みながら、手の動きを続けている。

    泡が%CALLNAME:MASTER%の一物を包み込み、滑らかな刺激が快感を高めていく。

    「……%CALLNAME:MASTER%が気持ちよくなってくれると、わたしも嬉しいの……」

    愛おしさを込めて、%CALLNAME:人物_大妖精%は全身で奉仕を続けた。

    「えへへ……%CALLNAME:MASTER%、泡だらけになっちゃったね……」

    %CALLNAME:人物_大妖精%は自分も%CALLNAME:MASTER%も泡まみれになりながら、楽しそうに体を擦り合わせている。

    妖精の柔らかな体が滑るように動き、心地よい刺激を与えていく。

    「……ぬるぬる、気持ちいいね……わたしもなんだかふわふわする……」

    %CALLNAME:人物_大妖精%は頬を染めながら、%CALLNAME:MASTER%の体を抱きしめるように密着した。

