- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%にキスをしようとした。

    「……何をしているの」

    %CALLNAME:人物_パチュリー%は冷たい目でこちらを見据え、魔導書を盾のように構えた。

    「そういう行為は、もっと親しい間柄でするものよ」

    「勝手に唇を奪おうだなんて……無礼にも程があるわ」

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%に近づくと、

    %CALLNAME:人物_パチュリー%は淡々とした声で言った。

    「……その距離感、何のつもりかしら」

    %CALLNAME:人物_パチュリー%は魔法の気配を漂わせながら、%CALLNAME:MASTER%を見つめている。

    「キスなんて論外よ。まず、私の信頼を得ることから始めなさい」

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%に顔を寄せようとした。

    「やめなさい」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の動きを魔法で制止した。

    「私の唇に触れる資格があると思っているの？」

    %CALLNAME:人物_パチュリー%は冷淡な視線を向けた。

    「身の程を弁えなさい」

    「……」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の接近に、冷ややかな視線を返した。

    「キスをしようというの？ 私に？」

    %CALLNAME:人物_パチュリー%は本から顔を上げることなく言った。

    「関係性というものを理解していないようね」

    「出直してきなさい」
