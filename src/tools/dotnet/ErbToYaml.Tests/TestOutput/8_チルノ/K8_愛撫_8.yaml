character: チルノ
situation: K8_愛撫
entries:
- id: fallback
  content: >-
    「ほ、ほら……見せてあげるから……」

    チルノは%CALLNAME:MASTER%に秘部を広げられ、真っ赤になりながらも威勢を張っている。

    「あたいの最強なところ……%CALLNAME:MASTER%だけに見せてあげるんだからね！」

    %CALLNAME:MASTER%が両指で花弁を左右に開くと、桃色の内壁が露わになった。

    「……や、やっぱ恥ずかしいわね……でも、嫌じゃないよ……」

    チルノは頬を染めながら、%CALLNAME:MASTER%の視線を受け入れている。

    「%CALLNAME:MASTER%の恋人なんだから……全部見せてあげる……」

    「あっ……そこ、開いてるの、見えちゃうよ……」

    チルノは%CALLNAME:MASTER%に秘部を覗き込まれ、恥ずかしそうに身をよじった。

    しかし脚を閉じようとはせず、むしろ%CALLNAME:MASTER%が見やすいように体を預けている。

    「……%CALLNAME:MASTER%、あたいのこと好き……？　こういうとこも……」

    チルノは不安と期待の入り混じった目で、%CALLNAME:MASTER%を見上げた。

    「好きって言って……あたい、%CALLNAME:MASTER%のこと大好きだから……」

    威勢のいいチルノが、恋人の前では素直に甘えている。

    「えへへ……%CALLNAME:MASTER%はあたいのここ、好きなの？」

    チルノは照れくさそうに笑いながら、%CALLNAME:MASTER%に秘部を見せている。

    %CALLNAME:MASTER%が花弁を広げて内壁を覗き込むと、チルノの秘部は愛液で濡れ始めた。

    「あっ……見られてると思ったら……なんか変な感じになってきた……」

    チルノは体をぴくりと震わせながら、熱い息を吐いた。

    「……%CALLNAME:MASTER%のせいだからね……あたいがこんな風になるの……」

    チルノは照れ隠しのように、%CALLNAME:MASTER%を軽くにらんだ。

    「んっ……あたいの中、見てるの……？」

    チルノは%CALLNAME:MASTER%に秘部を広げられながら、小さく声を漏らした。

    鮮やかな桃色の膣内が露わになり、%CALLNAME:MASTER%の視線に晒されている。

    「……恥ずかしいけど……%CALLNAME:MASTER%に見られるの……嫌じゃない……」

    チルノは赤い顔のまま、%CALLNAME:MASTER%の顔を見つめた。

    「あたいったら最強だから……恥ずかしくても我慢できるわよ……」

    精一杯強がりながらも、チルノの体は%CALLNAME:MASTER%に委ねられていた。
