- id: fallback
  content: >-
    「……後ろから……こうすればいいの……？」

    %CALLNAME:TARGET%は戸惑いながら%CALLNAME:MASTER%の背後に立った。

    知識としては知っているが、実践するのは別の話だ。

    「……んっ……これが……後ろから繋がるということ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に挿入しながら、表情を曇らせた。

    「……興味深い体勢ね……研究対象としては……」

    %CALLNAME:TARGET%は照れ隠しに学者らしい言い訳をした。

    「……動けばいいのかしら……」

    %CALLNAME:TARGET%はぎこちなく腰を揺らし始めた。

    「……むきゅ……体力が……もう限界よ……」

    %CALLNAME:TARGET%は早くも息を切らしている。

    「……後ろからだと、体勢が安定しなくて……」

    %CALLNAME:TARGET%は困った様子で動きを続けた。

    「……はぁ……はぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背後で息を乱していた。

    「……こんな激しい動きは……普段しないから……」

    %CALLNAME:TARGET%は弱々しく言い訳した。

    「……あなたが望んだから……仕方なく……」

    %CALLNAME:TARGET%は顔を背けながら呟いた。

    「……これで満足なの……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中を見つめながら問いかけた。

    「……私の体力では、これが限界よ……」

    %CALLNAME:TARGET%は息を切らしながら言った。

    「……むきゅ……本を読む時間がなくなるわ……」

    %CALLNAME:TARGET%は不満を漏らしたが、動きは止めなかった。
  priority: 2
- id: fallback
  content: >-
    「……何故こんな体勢を……」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%の背中を見つめた。

    「……私の体力を消耗させて、何が楽しいの……」

    %CALLNAME:TARGET%は不満を隠さなかった。

    「……早く終わらせなさい。本を読む時間が減るわ」

    %CALLNAME:TARGET%は淡々と言い放った。

    「……むきゅ……何故私がこんな目に……」

    %CALLNAME:TARGET%は苛立ちを隠さずに呟いた。

    「……後ろからだと、余計に体勢が辛いのよ……」

    %CALLNAME:TARGET%は息を切らしながら文句を言った。

    「……あなたの相手をする義理はないはずなのに……」

    %CALLNAME:TARGET%は冷淡に言った。

    「……」

    %CALLNAME:TARGET%は無表情のまま、機械的に動いていた。

    頭の中では、次に読む本の内容を反芻している。

    「……終わったら、すぐに出て行って」

    %CALLNAME:TARGET%は冷淡に告げた。

    「……私の研究時間を奪わないで」

    「……これは単なる作業よ」

    %CALLNAME:TARGET%は感情のない声で言った。

    「……体を動かすのは好きではないし、意味も感じないわ」

    %CALLNAME:TARGET%は淡々と動きを続けた。

    「……早く終わらせて、大図書館から出て行きなさい」

    %CALLNAME:TARGET%は事務的に言い放った。
  priority: 1
