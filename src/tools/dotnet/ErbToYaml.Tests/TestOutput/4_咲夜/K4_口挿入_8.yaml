- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%……私が……するのですか……」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%の上に位置を取った。

    「……入りますわよ……」

    ゆっくりと腰を進めると、%CALLNAME:TARGET%の表情が変わった。

    「……あ……貴方の中……凄い……」

    「こんなに……締め付けられて……」

    %CALLNAME:TARGET%は羞恥に頬を染めながらも、動きを止めなかった。

    「あ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を見ながら、腰を揺らしている。

    「こんな……はしたないこと……」

    「でも……貴方が望むなら……」

    %CALLNAME:TARGET%は奥まで押し込むと、小さく息を吐いた。

    「あっ……ここ……気持ちいいの……？」

    「%CALLNAME:MASTER%……もっと……声を聞かせて……」

    「……ふぁ……私が……こんなこと……」

    %CALLNAME:TARGET%は自分が主導権を握っていることに戸惑っていた。

    「でも……貴方を喜ばせたいの……」

    言いながら、%CALLNAME:TARGET%は腰の動きを続けた。

    「……貴方の中……熱くて……」

    「私まで……変になってしまいそう……」

    葛藤しながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%から離れられなかった。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は躊躇いがちに%CALLNAME:MASTER%の体を抱き寄せた。

    「こうして……繋がっていても……いいですか……」

    許可を求めながら、%CALLNAME:TARGET%は腰を深く押し込んだ。

    「あ……奥まで……」

    「……ん……っ……%CALLNAME:MASTER%……」

    恥ずかしさと快感の狭間で、%CALLNAME:TARGET%は甘い声を漏らしていた。
