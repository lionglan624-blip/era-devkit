    「武術で鍛えた腰使い……%CALLNAME:MASTER%のために使うね……」

    門番は、恋人を優しく抱きしめながら腰を動かし始めた。

    「ん……%CALLNAME:MASTER%の中、私を締め付けてる……」

    %CALLNAME:人物_美鈴%は正常位の体勢で恋人を見下ろしながら呟いた。

    恋人の後孔に挿入しながら、愛おしそうに頬を撫でる。

    「%CALLNAME:MASTER%の表情が変わるの……見ていて幸せよ……」

    %CALLNAME:人物_美鈴%は腰をゆっくりと動かし続けた。

    「……私が%CALLNAME:MASTER%を満たしてあげる……」

    武術家の引き締まった体が、恋人のために動いていた。

    「はぁ……%CALLNAME:MASTER%の奥まで届いてる……」

    %CALLNAME:人物_美鈴%は恋人の両脚を抱えながら、頬を染めた。

    正常位の体勢で挿入しながら、愛しそうに顔を見つめている。

    「……私のが……%CALLNAME:MASTER%の中にいるの……すごい……」

    %CALLNAME:人物_美鈴%は恋人の反応を確かめながら腰を動かした。

    「もっと深く……%CALLNAME:MASTER%の全部が欲しいの……」

    門番は、恋人との繋がりに幸福を感じていた。

    「……%CALLNAME:MASTER%……こうして上から見ると、全部見えるね」

    %CALLNAME:人物_美鈴%は正常位で恋人を貫きながら、穏やかに微笑んだ。

    恋人の表情が変わるのを見て、嬉しそうに髪を揺らす。

    「私が動くと、%CALLNAME:MASTER%の顔が変わるの……かわいい……」

    %CALLNAME:人物_美鈴%は奥まで突き入れながら、恋人に覆いかぶさった。

    「……ずっと繋がっていたい……大切な%CALLNAME:MASTER%だから……」

    武術家は、恋人を愛する喜びに満たされていた。
