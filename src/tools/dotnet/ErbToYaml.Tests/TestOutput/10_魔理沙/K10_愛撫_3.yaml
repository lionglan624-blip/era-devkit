    %CALLNAME:人物_魔理沙%は自分の言葉に頬を染めながら、%CALLNAME:MASTER%にしがみついた。

    「……お前の指、あったかいぜ……もっと奥まで、いいからな」

    %CALLNAME:人物_魔理沙%は恋人だけに見せる甘えた表情で、そう囁いた。

    「ふぁっ……そこ、そこだぜ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の指が動くたびに、小さく腰を揺らしている。

    「お前……私の弱いところ、全部知ってるだろ……」

    %CALLNAME:人物_魔理沙%は悔しそうに、でも嬉しそうに呟いた。

    「……努力家のお前に、こうして調教されちゃったぜ」

    %CALLNAME:人物_魔理沙%は照れ隠しに軽口を叩きながらも、快感に身を任せていた。

    「……このまま、溶かされちまいそうだぜ……」

    %CALLNAME:人物_魔理沙%はとろけた表情で、%CALLNAME:MASTER%を見上げた。

    「やっ……%CALLNAME:MASTER%、指……すごいぜ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の膝の上で、指の動きに翻弄されている。

    魔法の研究に没頭する時の真剣さとは違う、蕩けた瞳で見つめてくる。

    「……お前のこと考えると、身体が勝手に……っ」

    %CALLNAME:人物_魔理沙%の中は、既にたっぷりと濡れていた。

    「……もう、お前なしじゃダメになっちまったぜ」

    恥ずかしそうに顔を背けながらも、%CALLNAME:人物_魔理沙%は腰を押し付けた。

    「あっ……ん……お前の指、熱いぜ……」

    %CALLNAME:人物_魔理沙%は目を閉じて、%CALLNAME:MASTER%の愛撫に身を委ねている。

    「……私さ、お前と出会えて……本当に、よかったって思うぜ」

    甘い声の合間に、%CALLNAME:人物_魔理沙%は本音を漏らした。

    「……魔法も大事だけど、お前との時間も……っ、同じくらい大事だからな」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の胸に顔を埋めながら、甘い声を上げた。

    「……ずっと、こうしていたいぜ……」

    %CALLNAME:人物_魔理沙%は幸せそうに、恋人の温もりに包まれていた。
