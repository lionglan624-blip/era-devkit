    「……こうやって……擦って……動かして……」

    見よう見まねで体を動かし、%CALLNAME:人物_美鈴%は不器用に奉仕した。

    「……早く済ませてくださいね……？」

    「……これも、修行の一環……ですよね……？」

    %CALLNAME:人物_美鈴%は自分に言い聞かせるように呟いた。

    「……全身の連携とか……そういう……」

    無理のある言い訳をしながら、%CALLNAME:人物_美鈴%は泡だらけの体を%CALLNAME:MASTER%に押し当てた。

    「……ん……なんか、私も……変な感じ……」

    %CALLNAME:人物_美鈴%は胸が擦れる感触に驚いた顔をした。

    「……これって……気持ちいい、ってことですか……？」

    「……一回だけ……ですからね……？」

    %CALLNAME:人物_美鈴%はそう言いながら、石鹸を手に取った。

    「……誰かに見られたら困りますし……」

    周囲を気にしながら、%CALLNAME:人物_美鈴%は泡立った体を%CALLNAME:MASTER%に密着させた。

    「……ん……ぬるぬるして、滑る……」

    %CALLNAME:人物_美鈴%は顔を赤らめながら、体を動かした。

    「……ほ、本当に一回だけですからね……」
