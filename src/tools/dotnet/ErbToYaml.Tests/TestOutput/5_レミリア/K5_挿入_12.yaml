character: レミリア
situation: K5_挿入
entries:
- id: fallback
  content: >-
    「……二人に、挟まれて……っ」

    %CALLNAME:人物_レミリア%は二人の間に身を預けた。

    「いいわ……あなたたちに、全部委ねる……」

    二つの熱が同時に%CALLNAME:人物_レミリア%を貫いていく。

    「っ……ぁあ……っ！ 両方から……来て……っ」

    %CALLNAME:人物_レミリア%は甘い悲鳴を上げ、二人にしがみついた。

    「こんなに……満たされて……頭が……溶けそう……」

    500年の吸血鬼は、信頼する者たちに身を預けていた。

    「んっ……二人がかりで……私を責めるの……？」

    %CALLNAME:人物_レミリア%は二人を見上げ、身を開いた。

    「……いいわ。あなたたちになら……壊されてもいい」

    前と後ろから同時に挿入され、%CALLNAME:人物_レミリア%は喘いだ。

    「あぁっ……はぁ……っ、凄い……体の奥まで……っ」

    %CALLNAME:人物_レミリア%は二人の律動に翻弄された。

    「もっと……もっと深く……二人で私を……っ」

    紅魔館の主は、愛する者たちに蹂躙される快楽に酔いしれた。

    「……二人とも、私が欲しいの……？」

    %CALLNAME:人物_レミリア%は微笑みながら、二人を受け入れた。

    「好きにして頂戴……私はあなたたちのもの」

    二つの熱が%CALLNAME:人物_レミリア%を同時に襲った。

    「っ……ひゃ、ぁあ……っ！ お腹の奥で……ぶつかって……っ」

    %CALLNAME:人物_レミリア%は背を反らせて悦んだ。

    「二人に犯されるの……幸せよ……っ」

    吸血鬼は二人の腕の中で、幸福に震えていた。

    「ふふ……二人に挟まれるなんて……贅沢ね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%と目を合わせながら身を委ねた。

    「あなたたちの全部……受け止めてあげる」

    前後から同時に貫かれ、%CALLNAME:人物_レミリア%は息を呑んだ。

    「っ……あ……ぁあ……っ！ 奥まで……両方とも……っ」

    %CALLNAME:人物_レミリア%は二人の体に爪を立てた。

    「このまま……永遠に二人に抱かれていたい……っ」

    永遠を生きる吸血鬼が、二人の愛に溺れていった。
  priority: 4
- id: talent_3_1
  content: >-
    「な……っ、二人で私を……っ！？」

    %CALLNAME:人物_レミリア%は頬を真っ赤に染めて抵抗した。

    「ま、待って……心の準備が……っ」

    二つの熱が容赦なく%CALLNAME:人物_レミリア%を貫いた。

    「っ！ あ、ぁあ……っ！ 無理……両方なんて……っ」

    %CALLNAME:人物_レミリア%は悲鳴を上げながら二人にしがみついた。

    「ば、馬鹿……っ、こんなの……っ、おかしくなっちゃう……っ」

    強がりも、二人がかりの快感の前には無力だった。

    「ふ、二人がかりで攻めるなんて……卑怯よ……っ」

    %CALLNAME:人物_レミリア%は恨めしそうに二人を見上げた。

    「……べ、別に逃げないけど……っ」

    前後から同時に挿入され、%CALLNAME:人物_レミリア%は声を失った。

    「ひ……っ、ぁあ……っ！ お腹……いっぱい……っ」

    %CALLNAME:人物_レミリア%は涙目で喘いだ。

    「こ、こんなの……あなたたちのせいよ……っ」

    責めながらも、その体は二つの快楽に震えていた。

    「……ふん、二人がかりじゃないと私を堕とせないの……？」

    %CALLNAME:人物_レミリア%は虚勢を張ってみせたが、

    二つの熱が同時に入ってくると、

    「ひゃっ……あ、あぁ……っ！ ま、待って……っ」

    威厳のある態度は一瞬で崩れ去った。

    「両方……動かないで……っ、頭が……真っ白……っ」

    %CALLNAME:人物_レミリア%は二人の体にしがみつき、快感に耐えた。

    「……ず、ずるいわよ……こんなの……っ」

    「に、二人同時なんて……恥ずかしいじゃない……」

    %CALLNAME:人物_レミリア%は顔を真っ赤にして俯いた。

    「……覚悟、決めたから……来なさいよ……」

    二つの熱が%CALLNAME:人物_レミリア%を挟み込んだ。

    「っ……あ……ぁあ……っ！ 中で……動いて……っ」

    %CALLNAME:人物_レミリア%は声を殺そうとしたが、無理だった。

    「や……っ、声……止まらない……っ、もう……っ」

    紅魔館の主は、二人に責められ快感に溺れていた。
