character: フラン
situation: K6_口挿入
entries:
- id: fallback
  content: >-
    「ねえ、%CALLNAME:MASTER%……ここ、触ってもいい……？」

    %CALLNAME:人物_フラン%はおずおずと恋人の秘所に手を伸ばした。

    紅い瞳には好奇心と愛しさが入り混じっている。

    「わぁ……温かいのさ……すごく柔らかい……」

    %CALLNAME:人物_フラン%は繊細な指先で、そっとその場所を撫でた。

    「壊さないように……優しく……気持ちいい？」

    495年間何も壊さずにいられなかった少女は、恋人の全てを知りたいと願っていた。

    「%CALLNAME:MASTER%のここ……私だけに触らせてくれるの？」

    %CALLNAME:人物_フラン%は嬉しそうに微笑みながら、指を這わせた。

    恋人の秘密の場所を触れる特別さに、頬を赤らめる。

    「ふふ……なんだか、すっごく特別な気分なのさ」

    %CALLNAME:人物_フラン%は愛しむように、くすぐるような動きで撫でた。

    「ねぇ……もっと奥まで触っていい？　……そう……優しくね……」

    恋人の新しい一面を知れることが、何よりの喜びだった。

    「こうして%CALLNAME:MASTER%のここを触ってると……繋がってるって、感じるの」

    %CALLNAME:人物_フラン%は恋人の傍に寄り添いながら、指を動かしていた。

    地下室の孤独を知る少女にとって、秘密を共有することは特別な意味を持つ。

    「んふふ……%CALLNAME:MASTER%、ここ触ると声変わるのさ……」

    %CALLNAME:人物_フラン%は得意げに、繊細なタッチで探り続ける。

    「もっと……もっと気持ちよくしてあげたいな……」

    その言葉には、純粋な愛情が込められていた。

    「%CALLNAME:MASTER%……大好き……全部、触りたいの……」

    %CALLNAME:人物_フラン%は恋人に身を寄せながら、丁寧に愛撫を続けていた。

    紅い瞳は%CALLNAME:MASTER%だけを映し、細い指は優しく動き続ける。

    「こうしてると……私が私でいられる気がするの……」

    %CALLNAME:人物_フラン%は時折顔を上げて、恋人の表情を確認する。

    「ねぇ……気持ちいいところ、教えて？　もっと上手になりたいから……」

    悪魔の妹は、恋人への奉仕に心から満たされていた。
  priority: 4
- id: talent_3_1
  content: >-
    「えっ……こ、ここを触るの……？」

    %CALLNAME:人物_フラン%は興味と戸惑いの混じった表情で、%CALLNAME:MASTER%の秘所を見つめた。

    おそるおそる指先で触れると、その柔らかさと熱さに驚く。

    「わ……すっごく温かい……不思議な感触なのさ……」

    %CALLNAME:人物_フラン%はそっと指を這わせて、様子を伺った。

    「こ、こうすればいいの？　……なんだか恥ずかしいのさ……」

    初めての経験に、%CALLNAME:人物_フラン%の頬は真っ赤に染まっていた。

    「ふぅん……%CALLNAME:MASTER%、私が触ると、こんな顔するんだ……」

    %CALLNAME:人物_フラン%は面白そうに、指の動きを変えてみる。

    強く押したり、軽く撫でたり、その反応を楽しんでいる。

    「ふふ……なんだか、%CALLNAME:MASTER%を操ってる気分なのさ」

    %CALLNAME:人物_フラン%はいたずらっぽく笑いながら、動きを速めた。

    「ねぇ……もっと気持ちいい顔、見せてよ……」

    その言葉には、独占欲と好奇心が滲んでいた。

    「%CALLNAME:MASTER%のここ……私だけに触らせてくれるんだよね……？」

    %CALLNAME:人物_フラン%は確認するように問いかけながら、指を動かしていた。

    他の誰かに触られることを想像し、表情が少しだけ曇る。

    「……他の人には、触らせないでよね」

    %CALLNAME:人物_フラン%はむっとした顔で、少し力を込めて撫でた。

    「私のものなんだから……壊さないから、大丈夫だよ」

    495年の孤独を知る少女は、独占欲を隠せなかった。

    「へぇ……ここを触ると、%CALLNAME:MASTER%はこうなるんだ」

    %CALLNAME:人物_フラン%は発見したように呟きながら、指を動かした。

    初めての経験に目を輝かせながら、恋い慕う相手の反応を観察する。

    「んふふ……面白いのさ。こっちを触ると、声が出るんだね」

    %CALLNAME:人物_フラン%は楽しそうに、色々な場所を触ってみた。

    「もっと触っていい？　……%CALLNAME:MASTER%のこと、もっと知りたいの」

    悪魔の妹は、新しい遊びに夢中になっていた。
  priority: 3
