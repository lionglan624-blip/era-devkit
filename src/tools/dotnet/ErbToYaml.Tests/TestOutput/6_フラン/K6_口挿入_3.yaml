- id: talent_3_1
  content: >-
    「えっ……こ、こうやって上に乗るの……？」

    %CALLNAME:人物_フラン%は戸惑いと興味の混じった表情で、恋人の上に跨った。

    おそるおそる太腿で挟むと、その硬さと熱さに驚く。

    「わ……すっごく熱い……私のここに、当たってる……」

    %CALLNAME:人物_フラン%は顔を紅らめながら、ゆっくりと腰を動かし始めた。

    「こ、こうすればいいの？　……変な遊びなのさ……」

    初めての経験に、少女の心臓は高鳴っていた。

    「ふぅん……%CALLNAME:MASTER%、私がこうすると気持ちいいんだ……」

    %CALLNAME:人物_フラン%は面白そうに、腰の動かし方を変えてみる。

    ゆっくり擦ったり、ぎゅっと挟んだり、その反応を楽しんでいる。

    「ふふ……私も変な感じがする……なんか、濡れてきた……」

    %CALLNAME:人物_フラン%はいたずらっぽく笑いながら、動きを速めた。

    「ねえ……もっと気持ちいい顔、見せてよ……」

    その言葉には、独占欲と好奇心が滲んでいた。

    「%CALLNAME:MASTER%のここ……私だけが挟んでいいんだよね……？」

    %CALLNAME:人物_フラン%は確認するように問いかけながら、腰を動かしていた。

    他の誰かにさせることを想像し、表情が少しだけ曇る。

    「……他の子にはさせないでね……私だけだよ……」

    %CALLNAME:人物_フラン%は少し強めに挟み、独占を主張した。

    「私だけの……私だけの%CALLNAME:MASTER%……ふふ……」

    その執着は、冗談になりきれていなかった。

    「あ……%CALLNAME:MASTER%、びくってなった……」

    %CALLNAME:人物_フラン%は股間の反応に興味津々の様子だった。

    まるで新しい玩具を見つけた子供のように、目を輝かせている。

    「もっと挟んであげようか？　私、上手になりたいのさ」

    %CALLNAME:人物_フラン%は真剣な表情で、%CALLNAME:MASTER%を喜ばせようと努力していた。

    「ね……気持ちいい？　……うん、もっと頑張るね……」

    恋慕の少女は、愛しい人への奉仕に夢中だった。
