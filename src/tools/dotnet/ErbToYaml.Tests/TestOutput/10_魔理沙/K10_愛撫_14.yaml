entries:
- id: fallback
  content: >-
    「んっ……また持ち出してきたのか、それ」

    %CALLNAME:MASTER%が電動マッサージャを取り出すと、%CALLNAME:人物_魔理沙%は苦笑した。

    「お前、本当にそういう道具好きだよな……」

    低い唸りを上げるマッサージャが秘所に押し当てられると、%CALLNAME:人物_魔理沙%の体が震える。

    「あっ……やぁ……強いって……んんっ……」

    %CALLNAME:人物_魔理沙%は恋人の肩にしがみついて、甘い声を漏らした。

    「ふぁ……っ！　いきなり当てるなって……」

    %CALLNAME:MASTER%が無言でマッサージャを押し付けると、%CALLNAME:人物_魔理沙%は身を捩った。

    「んあっ……こ、これ……ローターより強いぜ……」

    振動が敏感な場所を直接刺激し、%CALLNAME:人物_魔理沙%の腰が浮く。

    「あぁっ……や、やめ……やめろって……好きにしていいから……」

    矛盾した言葉を呟きながら、%CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%に身を預けた。

    「ん……またそれかよ」

    %CALLNAME:人物_魔理沙%は呆れたように言ったが、拒絶はしなかった。

    「……お前の手の方が好きなんだけどな」

    マッサージャが肌に触れた瞬間、%CALLNAME:人物_魔理沙%は小さく息を呑んだ。

    「あっ……でも、これはこれで……んんっ……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに顔を逸らしながら、快感に身を任せた。

    「……今日はそれで攻めるつもりか？」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の手にあるマッサージャを見て言った。

    「まあ……お前がしたいなら、いいけどさ」

    マッサージャの振動が始まると、%CALLNAME:人物_魔理沙%は眉をひそめた。

    「ひゃっ……あぁ……そこ、敏感なんだって……」

    %CALLNAME:人物_魔理沙%は恋人の腕に縋りながら、快楽に溺れていった。
  priority: 4
- id: talent_3_1
  content: >-
    「な、何だそれ……でかいぜ……」

    %CALLNAME:人物_魔理沙%はマッサージャを見て目を丸くした。

    「そ、そんなの使うのか……？　ちょっと待ってくれよ」

    しかし%CALLNAME:MASTER%は構わずスイッチを入れ、%CALLNAME:人物_魔理沙%の秘所に押し当てた。

    「ひゃあっ！　ちょ、強っ……！　んあぁっ……！」

    %CALLNAME:人物_魔理沙%は予想以上の刺激に、悲鳴のような声を上げた。

    「えっ……それ何に使う……って、うわっ！」

    %CALLNAME:MASTER%がマッサージャを近づけると、%CALLNAME:人物_魔理沙%は後ずさった。

    「ま、待てって！　振動してるじゃないか！」

    だが逃げ場はなく、マッサージャは%CALLNAME:人物_魔理沙%の体に押し当てられた。

    「あぁっ！　んんっ……こ、こんなの……っ」

    %CALLNAME:人物_魔理沙%は声を抑えきれず、顔を真っ赤にした。

    「お、おい……その振動するの、まさか……」

    %CALLNAME:人物_魔理沙%の予感は的中した。

    「あっ……や、やめ……そこはダメだって……」

    マッサージャの強烈な振動が、%CALLNAME:人物_魔理沙%の敏感な場所を責め立てる。

    「んあっ……あぁっ……頭、真っ白になり……そうだぜ……」

    %CALLNAME:人物_魔理沙%は快感に翻弄されながら、助けを求めるように%CALLNAME:MASTER%を見た。

    「そ、それって……」

    %CALLNAME:人物_魔理沙%はマッサージャを凝視した。

    「……見るからにやばそうだぜ」

    案の定、それは%CALLNAME:人物_魔理沙%の予想を超える刺激をもたらした。

    「ひぁっ……！　や、やめ……もう無理……っ！」

    %CALLNAME:人物_魔理沙%は必死に耐えようとしたが、体は正直に反応していた。
