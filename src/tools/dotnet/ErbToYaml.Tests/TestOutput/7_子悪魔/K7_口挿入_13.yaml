entries:
- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%の後ろから……こうするんだよね？」

    %CALLNAME:TARGET%は嬉しそうに%CALLNAME:MASTER%の背後に回った。

    小さな手で%CALLNAME:MASTER%の腰を支え、ゆっくりと先端を宛がう。

    「んっ……入って……いくね……」

    %CALLNAME:TARGET%は幸せそうな表情で腰を押し出した。

    「あたし、%CALLNAME:MASTER%と後ろから繋がるの……なんかドキドキする」

    妖精の小さな腰が、懸命に%CALLNAME:MASTER%を悦ばせようと動いていく……

    「今日もあたしにさせてくれるの？　やったぁ！」

    %CALLNAME:TARGET%は満面の笑みで%CALLNAME:MASTER%の背中に覆いかぶさった。

    「%CALLNAME:MASTER%のこと、後ろからいっぱい気持ちよくしてあげるね」

    %CALLNAME:TARGET%は慣れた様子で腰を前後に動かし始めた。

    「んっ……はぁ……この体勢だと……%CALLNAME:MASTER%の背中に抱きつけるね……」

    嬉しそうに%CALLNAME:TARGET%は腰の動きを速めた。

    「えへへ、後ろからぎゅってしながら……気持ちよくなってね……？」

    「%CALLNAME:MASTER%……あたし、後ろからするのも上手になりたいの」

    %CALLNAME:TARGET%は真剣な表情で%CALLNAME:MASTER%の後ろにまわった。

    「だから……いっぱい練習させてね？」

    小さな腰が%CALLNAME:MASTER%の中で動き始める。

    「んっ……この角度だと……奥まで届いちゃうかも……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中に頬を寄せながら腰を振った。

    「……ね、あたし、ちゃんとできてる……？」

    「あ……%CALLNAME:MASTER%、四つん這いになってくれたの……えへへ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%のお尻を見つめて、嬉しそうに微笑んだ。

    「後ろから……あたしが動くから、任せてね」

    %CALLNAME:TARGET%は愛おしそうに%CALLNAME:MASTER%の腰を抱え込んだ。

    「ふふっ……中がぎゅって……あたしのこと、離さないでいてくれてる？」

    %CALLNAME:TARGET%は甘えるように背中に体を預けている。

    「%CALLNAME:MASTER%……大好き。ずっとこうしていたいな……」
  priority: 4
- id: talent_3_1
  content: >-
    「え、えっと……後ろから……こうすればいいの……？」

    %CALLNAME:TARGET%は真っ赤になりながら、おずおずと%CALLNAME:MASTER%の背後に立った。

    初めての体勢に戸惑いながらも、そっと腰を押し出す。

    「わぁ……この角度だと……なんか違う感じ……」

    %CALLNAME:TARGET%は困惑しながらも、見よう見まねで腰を動かし始めた。

    「……%CALLNAME:MASTER%、痛くないですか……？」

    心配そうに%CALLNAME:TARGET%は%CALLNAME:MASTER%の背中を撫でている。

    「あの……%CALLNAME:MASTER%のために……後ろから頑張ります……」

    %CALLNAME:TARGET%は緊張した面持ちで%CALLNAME:MASTER%の後ろに回った。

    「こういう体勢、あたし初めてだから……下手でごめんね……」

    ぎこちない手つきで、%CALLNAME:TARGET%は%CALLNAME:MASTER%の腰を支えた。

    「んしょ……んしょ……こう……？」

    一生懸命な%CALLNAME:TARGET%の動きは、どこか健気だった。

    「……気持ちよくなって、くれたら……嬉しいな……」

    「は、恥ずかしいよぅ……後ろからなんて……でも……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、%CALLNAME:MASTER%の背後に立った。

    「%CALLNAME:MASTER%が気持ちよくなるなら……あたし、頑張る……」

    小さな腰が%CALLNAME:MASTER%に向かって、ゆっくりと動き出す。

    「んっ……入った……%CALLNAME:MASTER%の中、温かい……」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%の背中に顔を埋めた。

    「……%CALLNAME:MASTER%のこと、好きだから……頑張れるの……」

    「%CALLNAME:MASTER%……あ、あたしが後ろから……するんですか……？」

    %CALLNAME:TARGET%は恥じらいながらも、%CALLNAME:MASTER%の背後に移動した。

    「こ、こういうの……なんだか恥ずかしい……です……」

    %CALLNAME:TARGET%は小さく息を吸い、ゆっくりと腰を動かし始めた。

    「んっ……はぁ……%CALLNAME:MASTER%の中……すごく……」

    %CALLNAME:TARGET%は照れくさそうに%CALLNAME:MASTER%の背中を見つめている。

    「……でも……%CALLNAME:MASTER%とこうして繋がってるの……幸せ……」
