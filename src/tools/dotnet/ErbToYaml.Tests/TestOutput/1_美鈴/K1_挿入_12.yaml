- id: fallback
  content: >-
    「ん……っ……%CALLNAME:MASTER%……二人に、貫かれてる……」

    %CALLNAME:人物_美鈴%は二人に挟まれながら、甘い吐息を漏らした。

    前と後ろを同時に満たされる感覚に、全身が痺れる。

    「……こんな姿……恥ずかしいけど……」

    %CALLNAME:人物_美鈴%は愛おしげに%CALLNAME:MASTER%を見つめた。

    「……%CALLNAME:MASTER%が見てくれてるから……頑張れるわ……」

    二人に貫かれながらも、その瞳は%CALLNAME:MASTER%だけを見ていた。

    「はぁ……あっ……奥まで……両方、来てる……」

    %CALLNAME:人物_美鈴%は快感に体を震わせた。

    二穴を同時に突かれるたびに、甘い悲鳴が漏れる。

    「……こんなに満たされるなんて……思わなかった……」

    %CALLNAME:人物_美鈴%は蕩けた表情で微笑んだ。

    「……%CALLNAME:MASTER%……私のこと、見ていて……」

    愛する人に見守られながら、%CALLNAME:人物_美鈴%は快感に身を任せた。

    「あっ……そこ……二人で突かれると……っ……」

    %CALLNAME:人物_美鈴%は声を抑えきれずに喘いだ。

    前後から交互に突かれる刺激に、体がびくびくと跳ねる。

    「……もう……頭、真っ白……」

    %CALLNAME:人物_美鈴%は恍惚とした表情で呟いた。

    「……でも……%CALLNAME:MASTER%がいるから……安心できる……」

    快楽に溺れながらも、%CALLNAME:人物_美鈴%は恋人への信頼を忘れなかった。

    「……ふぅ……二人に……挟まれて……」

    %CALLNAME:人物_美鈴%は息も絶え絶えに呟いた。

    「……私の体……こんなに気持ちよくなるなんて……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の手を探り、しっかりと握った。

    「……%CALLNAME:MASTER%……離さないで……」

    「……何があっても……私は%CALLNAME:MASTER%のものだから……」

    二人に貫かれながらも、心は%CALLNAME:MASTER%だけに向いていた。
