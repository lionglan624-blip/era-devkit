character: フラン
situation: K6_口挿入
entries:
- id: fallback
  content: >-
    「ねえ、%CALLNAME:MASTER%……ここも、触ってみていい……？」

    %CALLNAME:人物_フラン%はおずおずと恋人の後ろに手を伸ばした。

    紅い瞳には好奇心と愛しさが入り混じっている。

    「わぁ……ここって、こんな形してるんだ……」

    %CALLNAME:人物_フラン%は繊細な指先で、そっとその場所を撫でた。

    「壊さないように……優しく……気持ちいい？」

    495年間何も壊さずにいられなかった少女は、恋人の全てを知りたいと願っていた。

    「%CALLNAME:MASTER%のここ……私だけに見せてくれるの？」

    %CALLNAME:人物_フラン%は嬉しそうに微笑みながら、指を這わせた。

    恋人の隠された場所を触れる特別さに、頬を赤らめる。

    「ふふ……なんだか、すっごく特別な気分なのさ」

    %CALLNAME:人物_フラン%は愛しむように、くすぐるような動きで撫でた。

    「ねぇ……もっと力入れてもいい？　……そう……優しくね……」

    恋人の新しい一面を知れることが、何よりの喜びだった。

    「こうして%CALLNAME:MASTER%のここを触ってると……繋がってるって、感じるの」

    %CALLNAME:人物_フラン%は恋人の傍に寄り添いながら、指を動かしていた。

    地下室の孤独を知る少女にとって、秘密を共有することは特別な意味を持つ。

    「んふふ……%CALLNAME:MASTER%、ここ触ると声変わるのさ……」

    %CALLNAME:人物_フラン%は得意げに、繊細なタッチで探り続ける。

    「もっと……もっと気持ちよくしてあげたいな……」

    その言葉には、純粋な愛情が込められていた。

    「%CALLNAME:MASTER%……大好き……全部、知りたいの……」

    %CALLNAME:人物_フラン%は恋人に身を寄せながら、丁寧に愛撫を続けていた。

    紅い瞳は%CALLNAME:MASTER%だけを映し、細い指は優しく動き続ける。

    「こうしてると……私が私でいられる気がするの……」

    %CALLNAME:人物_フラン%は時折顔を上げて、恋人の表情を確認する。

    「ねぇ……気持ちよくなったら、教えて？　もっとしてあげるから……」

    悪魔の妹は、恋人の秘密の場所への奉仕に心から満たされていた。
  priority: 4
- id: talent_3_1
  content: >-
    「えっ……こ、ここを触るの……？」

    %CALLNAME:人物_フラン%は興味と戸惑いの混じった表情で、%CALLNAME:MASTER%の後ろを見つめた。

    おそるおそる指先で触れると、その反応に驚く。

    「わ……触ると、こんな顔するんだ……」

    %CALLNAME:人物_フラン%はそっと指を添えて、探るように動かし始めた。

    「こ、こうすればいいの？　……変な遊びなのさ……」

    初めての経験に、%CALLNAME:人物_フラン%の頬は真っ赤に染まっていた。

    「ふぅん……%CALLNAME:MASTER%、ここを触ると、こんな声出すんだ……」

    %CALLNAME:人物_フラン%は面白そうに、指の動きを変えてみる。

    強く押したり、円を描いたり、その反応を楽しんでいる。

    「ふふ……なんだか、%CALLNAME:MASTER%を支配してる気分なのさ」

    %CALLNAME:人物_フラン%はいたずらっぽく笑いながら、動きを変えた。

    「ねぇ……もっと恥ずかしい顔、見せてよ……」

    その言葉には、独占欲と好奇心が滲んでいた。

    「%CALLNAME:MASTER%のここ……私だけが知ってる秘密、だよね……？」

    %CALLNAME:人物_フラン%は確認するように問いかけながら、指を動かしていた。

    他の誰かに触られることを想像し、表情が少しだけ曇る。

    「……私以外の誰かにさせたら、許さないからね……」

    %CALLNAME:人物_フラン%は少し強めに押し、独占を主張した。

    「ふふ……冗談だよ……半分だけ……」

    その冗談は、冗談になりきれていなかった。

    「あ……%CALLNAME:MASTER%、ここ触ると震えるんだ……」

    %CALLNAME:人物_フラン%は指先の反応に興味津々の様子だった。

    まるで新しい玩具を見つけた子供のように、目を輝かせている。

    「もっと触ってあげようか？　私、上手になりたいのさ」

    %CALLNAME:人物_フラン%は真剣な表情で、%CALLNAME:MASTER%を喜ばせようと努力していた。

    「ね……気持ちいい？　……うん、もっと頑張るね……」

    恋慕の少女は、愛しい人への奉仕に夢中だった。
