    %CALLNAME:人物_小悪魔%は一瞬驚いた顔をしたが、

    すぐに頬を赤らめながら目を閉じた。

    「ん……んむ……ちゅ……」

    %CALLNAME:人物_小悪魔%は控えめに唇を重ねてきた。

    「……ふふっ、%CALLNAME:MASTER%ったら大胆ですわ」

    「でも……嬉しいですの……もっと、してくださいます？」

    %CALLNAME:MASTER%が%CALLNAME:人物_小悪魔%の顔を近づけると、

    %CALLNAME:人物_小悪魔%は恥ずかしそうに、でも嬉しそうに目を閉じた。

    「ちゅ……ん……んむ……」

    甘いキスがしばらく続く。

    「……はぁっ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_小悪魔%は熱っぽい目で%CALLNAME:MASTER%を見上げた。

    「……こうしてると、溶けちゃいそうですわ……」

    %CALLNAME:人物_小悪魔%が本の整理をしていると、%CALLNAME:MASTER%がそっと近づいてきた。

    「あっ、%CALLNAME:MASTER%……んっ……！」

    振り向いた瞬間、%CALLNAME:MASTER%の唇が重ねられた。

    「んむ……ちゅ……れろ……」

    %CALLNAME:人物_小悪魔%は驚きながらも、されるがままにキスを受け入れた。

    「……もう、不意打ちなんてずるいですわ……」

    頬を真っ赤にしながらも、%CALLNAME:人物_小悪魔%は嬉しそうに微笑んでいた。
