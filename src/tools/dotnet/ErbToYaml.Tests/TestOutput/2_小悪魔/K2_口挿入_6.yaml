entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……ふふっ、こんなところまで舐めてほしいなんて……」

    %CALLNAME:人物_小悪魔%は悪戯っぽい笑みを浮かべながら、%CALLNAME:MASTER%の秘部に顔を寄せた。

    悪魔特有の長い舌がゆっくりと伸び、窄まりの周りを舐め始める。

    「悪魔の舌……気持ちいいでしょう？　んっ……れろ……」

    %CALLNAME:人物_小悪魔%は愛おしそうに舌を這わせ、%CALLNAME:MASTER%の反応を楽しんでいる。

    「ふふ……%CALLNAME:MASTER%の味……全部知ってますわ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の後ろに回り込み、そっと顔を近づけた。

    「ここ……敏感ですわよね……ふふっ」

    温かい息を吹きかけながら、長い舌で窄まりを丁寧に舐め上げていく。

    「んっ……ちゅる……こうすると……びくってしますわよね……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の反応を楽しむように、舌の動きに緩急をつける。

    「私の舌……気持ちいい……？　ふふ……正直に言ってくださいませ……」

    「ねえ、%CALLNAME:MASTER%……私、こういうの……好きですわ……」

    %CALLNAME:人物_小悪魔%は蕩けるような目で%CALLNAME:MASTER%を見上げながら、舌を伸ばした。

    悪魔の舌が器用に動き、窄まりの襞を一つ一つ舐め上げていく。

    「んん……れろれろ……%CALLNAME:MASTER%の味……大好き……」

    %CALLNAME:人物_小悪魔%は恍惚とした表情で奉仕を続けている。

    「もっと……もっと舐めさせてくださいませ……」

    「%CALLNAME:MASTER%……私の舌、上手になりました？」

    %CALLNAME:人物_小悪魔%は嬉しそうに尾を揺らしながら、%CALLNAME:MASTER%の秘部に舌を這わせた。

    ぴちゃぴちゃと淫らな音を立てながら、丁寧に舐め続ける。

    「ちゅる……んっ……ここ、すごく締まってきましたわ……」

    %CALLNAME:人物_小悪魔%は指で軽く窄まりを広げ、奥まで舌を差し入れた。

    「ふふ……%CALLNAME:MASTER%の全部……私のものですわ……」
