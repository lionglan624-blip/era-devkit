- id: talent_3_1
  content: >-
    「……%CALLNAME:MASTER%……こ、こうすれば……よろしいでしょうか……」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%の秘所に顔を近づけた。

    「んっ……」

    「……っ……甘い……匂い……ですわ……」

    %CALLNAME:TARGET%は顔を赤らめながら、ぎこちなく舌を動かした。

    「……気持ちよくなっていただけていますか……」

    心配そうに%CALLNAME:MASTER%を見上げる。

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は次第に舌使いが滑らかになっていく。

    「こうすると……反応がありますわね……」

    「れろっ……ちゅっ……」

    %CALLNAME:TARGET%は少し得意げに微笑んだ。

    「もっと……上手になりますから……」

    恥ずかしさと嬉しさが入り混じった表情で奉仕を続ける。

    「……こんな……ことをしているなんて……」

    %CALLNAME:TARGET%は自分の行動に戸惑いながらも、舌を止めなかった。

    「メイドとして……お世話するのは当然……ですけれど……」

    「で、でも……%CALLNAME:MASTER%だから……」

    %CALLNAME:TARGET%は言葉を途中で飲み込み、奉仕に集中した。

    「……んむっ……もう少し……このまま……」

    複雑な心境を隠しながら、%CALLNAME:TARGET%は舌を動かし続けた。

    「……%CALLNAME:MASTER%……見ないでくださいまし……」

    %CALLNAME:TARGET%は俯きながら、秘所に顔を埋めている。

    「こんな……はしたないこと……」

    「でも……貴方のために……んっ……」

    %CALLNAME:TARGET%は意を決したように舌を動かした。

    「……最後まで……お世話させてくださいまし……」

    恥ずかしさを堪えながら、%CALLNAME:TARGET%は懸命に奉仕を続けた。
