- id: fallback
  content: >-
    「……私が、そうするの……？」

    %CALLNAME:TARGET%は困惑しながらも、%CALLNAME:MASTER%の指示に従った。

    「……本で読んだ知識では、この体位は……」

    %CALLNAME:TARGET%は理論を確認しながら、ゆっくりと動いた。

    「……んっ……予想通り、体力を消耗するわね……むきゅ」

    %CALLNAME:TARGET%は早くも息切れを感じ始めた。

    「はぁ……ん……っ……」

    %CALLNAME:TARGET%は義務的に腰を動かしながら、小さく喘いでいる。

    「……%CALLNAME:MASTER%、こういうことを命じるなんて……」

    %CALLNAME:TARGET%は複雑な表情を浮かべた。

    「……でも、指示に従うのが私の役目……」

    %CALLNAME:TARGET%は淡々と続けた。

    「ぁ……やぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中を見つめながら、困惑している。

    「……こんな体勢で本が読めないのは困るわ……」

    %CALLNAME:TARGET%は的外れなことを考えていた。

    「……早く終わらせて、研究に戻りたい……」

    %CALLNAME:TARGET%は本音を漏らした。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の背後に立っている。

    理論的には理解しているが、実践するのは気が進まない。

    「……むきゅ……体力が持たないわ……」

    %CALLNAME:TARGET%は溜息をついた。

    「……%CALLNAME:MASTER%、もう少し協力して」
  priority: 2
- id: fallback
  content: >-
    「……何故、私がこんなことを……」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「……体力がないのに、こんな主導的な体位を強いるなんて」

    %CALLNAME:TARGET%は溜息をついた。

    「……さっさと終わらせるから、静かにして」

    %CALLNAME:TARGET%は冷たい口調で言い放った。

    「……むきゅ……もう疲れたわ……」

    %CALLNAME:TARGET%は早々に動きを止めた。

    「……こんなことに体力を使いたくない」

    %CALLNAME:TARGET%は露骨に不満を示した。

    「……後は自分でして。私は本に戻るから」

    %CALLNAME:TARGET%は冷淡に言った。

    「……」

    %CALLNAME:TARGET%は無表情のまま、%CALLNAME:MASTER%の背後に立っている。

    頭の中では、次に読む本のことを考えているようだ。

    「……終わったら、すぐに大図書館から出て行って」

    %CALLNAME:TARGET%は冷淡に言った。

    「……むきゅ……体力の無駄遣いだわ」

    「……なぜ私がこんな体勢を……」

    %CALLNAME:TARGET%は不満げに呟いた。

    「……本で読んだ知識によれば、これは相当な体力を使う体位……」

    %CALLNAME:TARGET%は理論武装しながら、最低限の動きだけを続けた。

    「……私には向いていないわ。早く終わらせましょう」

    %CALLNAME:TARGET%は事務的に言い放った。
  priority: 1
