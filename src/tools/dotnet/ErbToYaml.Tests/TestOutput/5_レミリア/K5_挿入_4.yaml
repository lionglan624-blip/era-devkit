character: レミリア
situation: K5_挿入
entries:
- id: fallback
  content: >-
    「ふふ……今日は私がご主人様よ、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は妖艶に微笑み、%CALLNAME:MASTER%を押し倒した。

    馬乗りになった小さな身体が、%CALLNAME:MASTER%を見下ろす。

    「500年の吸血鬼に犯されるなんて、光栄に思いなさい」

    そう言って%CALLNAME:人物_レミリア%は自ら腰を下ろし、%CALLNAME:MASTER%を飲み込んだ。

    「んっ……あぁ……全部、入ったわ……」

    紅魔館の主は、恋人を支配する悦びに酔いしれていた。

    「動かないで、%CALLNAME:MASTER%。今日は私に任せなさい」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の上に跨り、紅い瞳で見下ろした。

    その小さな手が%CALLNAME:MASTER%の肩を押さえつける。

    「私の好きなように、してあげるから……」

    %CALLNAME:人物_レミリア%が腰を揺らし始めると、甘い声が漏れた。

    「はぁっ……ん……この角度、いいわ……深くて……」

    永遠を生きる吸血鬼が、自ら快楽を貪っていた。

    「%CALLNAME:MASTER%……私に抱かれたいでしょう？」

    %CALLNAME:人物_レミリア%は悪戯っぽく微笑み、%CALLNAME:MASTER%の上に座った。

    自ら%CALLNAME:MASTER%を受け入れ、うっとりと目を細める。

    「ふふ……いい顔してるわね、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は腰を上下に動かし始めた。

    「あっ……んっ……私が動くから、あなたは気持ちよくなってなさい……」

    500年の吸血鬼は、愛する者を甘やかすように支配していた。

    「今夜は……私が%CALLNAME:MASTER%を食べてあげる」

    %CALLNAME:人物_レミリア%は牙を見せて微笑み、%CALLNAME:MASTER%に覆いかぶさった。

    吸血鬼の本能が、獲物を押さえつけるように%CALLNAME:MASTER%を組み敷く。

    「ふふ……逃げられないわよ？」

    そう言って%CALLNAME:人物_レミリア%は腰を落とし、%CALLNAME:MASTER%を深く飲み込んだ。

    「あぁっ……これよ……%CALLNAME:MASTER%を支配する感覚……」

    紅魔館の主は、恋人を征服する悦びに身を震わせた。
  priority: 4
- id: talent_3_1
  content: >-
    「な、何よその顔。今日は私がリードするの！」

    %CALLNAME:人物_レミリア%は頬を染めながら%CALLNAME:MASTER%を押し倒した。

    馬乗りになるも、どこかぎこちない。

    「べ、別にあんたのためじゃないから……私がしたいだけよ」

    %CALLNAME:人物_レミリア%が腰を下ろすと、小さく声を上げた。

    「んっ……あ……入った……こ、これくらい、なんてことないわ」

    強がりながらも、その体は正直に快感を求めていた。

    「あんたはいつも好き勝手するから……今日は私の番よ！」

    %CALLNAME:人物_レミリア%は不満そうに言いながら%CALLNAME:MASTER%の上に跨った。

    自ら%CALLNAME:MASTER%を受け入れようとするが、焦って上手くいかない。

    「ちょ……っ、笑わないでよ……！」

    ようやく結合すると、%CALLNAME:人物_レミリア%の頬はさらに赤くなった。

    「やぁっ……あ……じ、自分で動くのって、こんなに……」

    支配者のつもりが、快感に翻弄される姿を晒していた。

    「ふん……たまには私が上になってあげるわ」

    %CALLNAME:人物_レミリア%は高飛車に言いながら%CALLNAME:MASTER%の上に座った。

    しかし腰を動かし始めると、すぐに息が乱れた。

    「あ……っ、この角度……深い……っ」

    %CALLNAME:人物_レミリア%は必死に威厳を保とうとした。

    「ば、馬鹿……変な顔で見ないで……っ」

    支配しているはずなのに、どちらが支配されているのかわからなくなっていた。

    「……今日は、私の好きにさせてもらうわ」

    %CALLNAME:人物_レミリア%は照れ隠しに%CALLNAME:MASTER%から目を逸らしながら跨った。

    自分から動く恥ずかしさで、耳まで真っ赤になる。

    「見ないでったら……恥ずかしいでしょ……」

    %CALLNAME:人物_レミリア%が腰を揺らすと、甘い声が漏れた。

    「んっ……あぁ……っ、こ、これは……私が気持ちいいだけだから……」

    素直になれないまま、%CALLNAME:人物_レミリア%は快楽を貪っていた。
  priority: 3
  condition:
    type: Talent
    talentType: 3
    threshold: 1
- id: fallback
  content: >-
    「……ふぅん、こういうのもあるのね」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を見下ろした。

    主導権を握ることに抵抗はない。むしろ本来の姿だ。

    「私が上に立つのは当然のこと……試してみましょう」

    %CALLNAME:人物_レミリア%が腰を落とすと、表情がわずかに揺らいだ。

    「……っ、なるほど。この角度は……悪くないわね」

    500年の吸血鬼は、新しい快感を冷静に分析しようとしていた。

    「……使用人を組み敷くなど、主として当然のことよ」

    %CALLNAME:人物_レミリア%は威厳を込めて言い、%CALLNAME:MASTER%の上に座った。

    支配する立場は心地よい。紅魔館の主としての本能だ。

    「さあ……私を楽しませなさい」

    %CALLNAME:人物_レミリア%が腰を動かすと、予想以上の快感が走った。

    「っ……ほう、これは……なかなか……」

    認めたくない悦びが、吸血鬼の身体を巡っていた。

    「……私が上に立つ方が自然でしょう？」

    %CALLNAME:人物_レミリア%は当然のように%CALLNAME:MASTER%の上に跨った。

    500年の威厳を持って、%CALLNAME:MASTER%を見下ろす。

    「いいわ……このまま私の好きにさせてもらう」

    %CALLNAME:人物_レミリア%が自ら動き始めると、息が乱れた。

    「ん……っ、思った以上に……悪くないわね……」

    威厳を保とうとしながらも、その頬はほんのり紅かった。

    「……ふむ、これが逆の立場というものね」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を観察した。

    主として使用人の上に立つのは、むしろ自然なこと。

    「まあいいわ。試してみましょう」

    %CALLNAME:人物_レミリア%が腰を揺らすと、思わず声が漏れた。

    「……っ、この体勢は……なるほど……」

    吸血鬼は、支配する側の快感に目覚め始めていた。
  priority: 2
- id: fallback
  content: >-
    「……ふふ、下僕を犯すのも主の特権よ」

    %CALLNAME:人物_レミリア%は冷たい微笑みを浮かべ、%CALLNAME:MASTER%を押し倒した。

    馬乗りになった姿は、まさに獲物を狩る吸血鬼のもの。

    「光栄に思いなさい。500年の吸血鬼に抱かれるのだから」

    %CALLNAME:人物_レミリア%が腰を下ろすと、%CALLNAME:MASTER%を見下ろした。

    「……ふん、まあまあね。もっと楽しませてちょうだい」

    紅魔館の主は、使用人を道具のように使い捨てる姿勢を崩さなかった。

    「……今日は私が楽しませてもらうわ」

    %CALLNAME:人物_レミリア%は傲慢に宣言し、%CALLNAME:MASTER%の上に座った。

    使用人を組み敷くのは、主として当然の行為。

    「下僕は黙って私を楽しませなさい」

    %CALLNAME:人物_レミリア%が腰を動かし始めると、わずかに目を細めた。

    「……悪くないわね。精々頑張りなさい」

    500年の吸血鬼は、感情を表に出さずに快楽を貪っていた。

    「……ほう、抵抗しないのね。賢明だわ」

    %CALLNAME:人物_レミリア%は冷笑を浮かべ、%CALLNAME:MASTER%を見下ろした。

    獲物を押さえつける捕食者の余裕で、上に跨る。

    「逃げようとしても無駄よ。吸血鬼の力を侮らないことね」

    %CALLNAME:人物_レミリア%が腰を落とすと、%CALLNAME:MASTER%を飲み込んだ。

    「……ふん、この程度では物足りないわね」

    紅魔館の主は、余裕を崩さずに%CALLNAME:MASTER%を見下ろしていた。

    「……退屈しのぎに、お前を使ってあげるわ」

    %CALLNAME:人物_レミリア%は溜息をつきながら%CALLNAME:MASTER%の上に座った。

    使用人は道具に過ぎない。主が楽しむためのもの。

    「感謝しなさい。私に抱かれることなど、本来はありえないのだから」

    %CALLNAME:人物_レミリア%が腰を揺らすと、わずかに息を吐いた。

    「……まあ、使えなくはないわね」

    高飛車な態度のまま、%CALLNAME:人物_レミリア%は自分の快楽のために%CALLNAME:MASTER%を使い続けた。
  priority: 1
