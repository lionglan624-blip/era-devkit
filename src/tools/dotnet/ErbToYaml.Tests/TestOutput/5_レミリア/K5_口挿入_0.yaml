character: レミリア
situation: K5_口挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、私に奉仕されたいの？」

    %CALLNAME:人物_レミリア%は艶やかに微笑みながら、%CALLNAME:MASTER%のそれに手を伸ばした。

    細い指が触れると、その熱さに紅い瞳が僅かに見開かれる。

    「……こんなに熱いのね。私の冷たい手で、鎮めてあげるわ」

    %CALLNAME:人物_レミリア%は優雅な手つきで、ゆっくりと上下に動かし始めた。

    「……%CALLNAME:MASTER%だけよ、私にこんなことをさせるのは」

    500年を生きた吸血鬼が、恋人のためだけに誇りを捨てていた。

    「んっ……%CALLNAME:MASTER%のここ、すごく硬いわね」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%のそれを握っていた。

    吸血鬼のひんやりとした手が、%CALLNAME:MASTER%の熱を奪っていく。

    「ククク……こうして私が触ると、もっと熱くなるのね」

    %CALLNAME:人物_レミリア%は愛おしそうに手を動かしながら、%CALLNAME:MASTER%の表情を見つめていた。

    「……気持ちいい？　そう、よかったわ」

    館の主は、恋人の快感を自らの喜びとしていた。

    「……ねぇ、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は手を動かしながら、甘えるような声で呼びかけた。

    「こうして触れているとね……私、幸せなのよ」

    紅魔館の主とは思えない、素直な告白だった。

    「……%CALLNAME:MASTER%のためなら、何でもしてあげる」

    %CALLNAME:人物_レミリア%は頬を染めながら、奉仕を続けた。

    500年の孤独を知る吸血鬼は、愛する者との繋がりを噛みしめていた。

    「ふふ……%CALLNAME:MASTER%、可愛い顔してるわね」

    %CALLNAME:人物_レミリア%は意地悪そうに微笑みながら、手の動きを速めた。

    「私の手で、こんなになっちゃって……」

    %CALLNAME:人物_レミリア%は時折、先端を親指で撫でてみせる。

    「もっと乱れていいのよ？　今夜は私が、あなたを支配してあげるわ」

    そう言いながらも、その瞳には深い愛情が宿っていた。

    「……出そうになったら、教えてね。ちゃんと受け止めてあげるから」
  priority: 4
- id: talent_3_1
  content: >-
    「……こ、これを触ればいいのね？」

    %CALLNAME:人物_レミリア%は顔を紅くしながら、%CALLNAME:MASTER%のそれを見つめていた。

    おそるおそる指を伸ばし、触れた瞬間、小さく息を呑む。

    「っ……熱い……生きてるみたい……」

    %CALLNAME:人物_レミリア%はぎこちなく手を動かし始めた。

    「べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただの興味よ、興味」

    素直になれない吸血鬼は、必死に照れを隠していた。

    「ふん……こんなことで喜ぶなんて、単純ね」

    %CALLNAME:人物_レミリア%は強がりながらも、手は止めなかった。

    「……で、でも、%CALLNAME:MASTER%が喜ぶなら……仕方ないわ」

    そう呟きながら、%CALLNAME:人物_レミリア%は手の動きを少しだけ丁寧にした。

    「……感謝しなさいよ。紅魔館の主が直々に触ってあげてるんだから」

    高飛車な言葉とは裏腹に、%CALLNAME:人物_レミリア%の頬は真っ赤だった。

    「……%CALLNAME:MASTER%、そんな顔しないで」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の反応に、どきりとしていた。

    「……私が触ると、そんなに気持ちいいの？」

    少し嬉しそうに、%CALLNAME:人物_レミリア%は手を動かし続けた。

    「……ふん、当然よね。私は紅魔館の主なんだから」

    そう言いながらも、%CALLNAME:人物_レミリア%はこっそり%CALLNAME:MASTER%の表情を確認していた。

    「……もう少しだけ、してあげてもいいわよ」

    「あっ……動いた……」

    %CALLNAME:人物_レミリア%は手の中の反応に、興味津々の様子だった。

    「ふぅん……こうすると、もっと反応するのね……」

    %CALLNAME:人物_レミリア%は観察するように、手の動きを変えてみる。

    「……べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただ、その……」

    言い訳が思いつかず、%CALLNAME:人物_レミリア%は口をつぐんだ。

    「……うるさいわね。黙って受けていなさい」
