    「ひぁっ……！　そこ、直接は……っ」

    %CALLNAME:人物_美鈴%は声を押し殺しながら、恋人の胸に顔を埋めた。

    「……%CALLNAME:MASTER%の前だと、すぐ感じちゃう……」

    「……また、これ使うの？」

    %CALLNAME:人物_美鈴%は少し照れながらも、嬉しそうに微笑んだ。

    「……私のこと、もっと感じさせたいんでしょ？　わかってるわよ」

    クリキャップの振動が敏感な部分を刺激し、%CALLNAME:人物_美鈴%は声を漏らす。

    「あぁっ……やっ……%CALLNAME:MASTER%……もう……」

    門番としての威厳はどこへやら、%CALLNAME:人物_美鈴%は恋人に甘えていた。
