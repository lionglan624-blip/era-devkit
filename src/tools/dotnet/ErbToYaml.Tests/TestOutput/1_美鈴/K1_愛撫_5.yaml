- id: talent_3_1
  content: >-
    「ひゃっ……！　ちょ、ちょっと、そこは……！」

    %CALLNAME:人物_美鈴%は驚いて身体を強張らせた。

    しかし%CALLNAME:MASTER%の手を払いのけることはしなかった。

    「あ、あんなところ触るなんて……恥ずかしい……」

    %CALLNAME:人物_美鈴%は顔を真っ赤にして俯いた。

    「……で、でも……%CALLNAME:MASTER%がしたいなら……」

    小さな声で、%CALLNAME:人物_美鈴%は覚悟を決めたように言った。

    「んっ……や、やだ……変な声、出ちゃう……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の指が後ろを弄るたび、甘い声を漏らしている。

    自分でも予想しなかった反応に、%CALLNAME:人物_美鈴%は困惑していた。

    「……なんで、こんなところで……」

    羞恥に震えながらも、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%を拒めない。

    「……%CALLNAME:MASTER%のこと、好きだから……嫌じゃない、の……」

    消え入りそうな声で、%CALLNAME:人物_美鈴%は本音を漏らした。

    「そ、そこ……だめ……っ」

    %CALLNAME:人物_美鈴%は弱々しく抗議したが、身体は逃げようとしない。

    むしろ%CALLNAME:MASTER%の指に合わせて、無意識に腰が動いている。

    「あ……っ、なんで……こんな……」

    %CALLNAME:人物_美鈴%は自分の反応に戸惑いを隠せなかった。

    「……%CALLNAME:MASTER%、意地悪……」

    涙目で見上げながらも、%CALLNAME:人物_美鈴%はどこか嬉しそうだった。

    「あ……後ろなんて……恥ずかしいよ……」

    %CALLNAME:人物_美鈴%はシーツを握りしめ、羞恥に耐えている。

    %CALLNAME:MASTER%の指が菊座を優しくマッサージするのを感じながら、

    「……っ、変な感じ……でも、嫌じゃない……」

    %CALLNAME:人物_美鈴%は正直に感想を口にした。

    「……%CALLNAME:MASTER%……私のこと、好き……？」

    不安そうに問いかけながら、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の愛を確かめようとした。
