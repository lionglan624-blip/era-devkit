    献身的な笑顔で、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%を受け入れた。

    「%CALLNAME:MASTER%……今日も……搾乳機で遊びたいんですの……？」

    %CALLNAME:人物_小悪魔%は悪戯っぽく笑いながら、%CALLNAME:MASTER%を見た。

    「ふふ……使い魔として……%CALLNAME:MASTER%の欲望には忠実でいたいですわ……」

    そう言って、%CALLNAME:人物_小悪魔%は自ら胸元を露わにした。

