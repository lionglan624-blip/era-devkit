    %CALLNAME:人物_小悪魔%は少し呆れたように、でもどこか嬉しそうに言った。

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の乳首を軽くつまんだ。

    「ひゃっ……！ も、もう……」

