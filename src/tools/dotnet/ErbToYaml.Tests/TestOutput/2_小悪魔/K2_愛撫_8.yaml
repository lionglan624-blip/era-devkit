character: 小悪魔
situation: K2_愛撫
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、こういうの……見たかったんでしょう？」

    %CALLNAME:人物_小悪魔%は艶めかしく微笑みながら、自らの秘所に指を這わせた。

    「悪魔の自慰……特別にお見せしますわ……」

    %CALLNAME:人物_小悪魔%はゆっくりと指を動かし、甘い吐息を漏らし始める。

    「んっ……あ……%CALLNAME:MASTER%に見られてると思うと……余計に感じちゃいますわ……」

    %CALLNAME:人物_小悪魔%は恍惚とした表情で%CALLNAME:MASTER%を見つめながら、自らを慰め続けた。

    「……全部、%CALLNAME:MASTER%のためですのよ……？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の前に座り、ゆっくりと足を開いた。

    「いやらしい悪魔の姿……見せてあげますわ……」

    %CALLNAME:人物_小悪魔%は指で自らの花弁をなぞりながら、艶やかな声を上げる。

    「あっ……んっ……%CALLNAME:MASTER%がいると……こんなに濡れてしまって……」

    %CALLNAME:人物_小悪魔%の指は蜜に濡れ、淫らな水音を立てている。

    「ふふ……恥ずかしいですわ……でも、%CALLNAME:MASTER%になら……」

    %CALLNAME:人物_小悪魔%は妖艶に笑いながら、快楽に身を任せていった。

    「%CALLNAME:MASTER%のこと……考えながら……するんですのよ……？」

    %CALLNAME:人物_小悪魔%は頬を染めながら、自らの秘部を弄り始めた。

    「んぅ……ここ……%CALLNAME:MASTER%に触られてるみたいに……」

    %CALLNAME:人物_小悪魔%は指を膣口に沿わせながら、甘い喘ぎ声を漏らしている。

    「あっ……やぁ……%CALLNAME:MASTER%……見てて……ください……」

    %CALLNAME:人物_小悪魔%は潤んだ瞳で%CALLNAME:MASTER%を見上げながら、自慰に没頭していった。

    「悪魔も……こういうこと……するんですのよ……？」

    %CALLNAME:人物_小悪魔%は悪戯っぽく笑いながら、自らの体を愛撫し始めた。

    %CALLNAME:人物_小悪魔%の指が秘所に触れると、甘い声が漏れる。

    「はぁ……あっ……%CALLNAME:MASTER%の前だと……より一層……」

    %CALLNAME:人物_小悪魔%は足を震わせながら、陶酔した表情を浮かべている。

    「ん……気持ちいい……ですわ……もっと見てて……」

    そう言って、%CALLNAME:人物_小悪魔%は更に激しく指を動かした。
