    「れろ……ちゅ……これでいいでしょう？」

    %CALLNAME:人物_小悪魔%はさっさと終わらせたい様子だ。

    「……早く満足してくださいませ」

    「はあ……」

    %CALLNAME:人物_小悪魔%はため息をつきながら、言われた通りに口を使った。

    動きは事務的で、感情がこもっていない。

    「……こんなことして、何が楽しいんですか……」

    %CALLNAME:人物_小悪魔%はじっとりとした目で%CALLNAME:MASTER%を見上げた。

    「……図書館の仕事が溜まってるんですから……」

    %CALLNAME:人物_小悪魔%は無言で膝をつき、一物に顔を寄せた。

    「……ふん」

