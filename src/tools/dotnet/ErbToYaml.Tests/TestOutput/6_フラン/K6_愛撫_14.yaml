entries:
- id: fallback
  content: >-
    「ねぇ、%CALLNAME:MASTER%……それ、なあに？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にある小さなキャップを興味深そうに覗き込んだ。

    特別な場所に付ける道具だと説明すると、紅い瞳がきらりと輝いた。

    「私にも付けてみてよ。%CALLNAME:MASTER%がくれるものなら、なんでも嬉しいのさ」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の陰核にクリキャップをかぶせ、電源を入れた。

    「ひゃっ……！　んんっ……！　これ、すごいのさ……直接ぶるぶるしてる……」

    %CALLNAME:人物_フラン%は恋人にしがみつき、甘い声を漏らした。

    「あっ……んっ……%CALLNAME:MASTER%……これ、やばいよ……」

    %CALLNAME:人物_フラン%はクリキャップの振動に、蕩けた表情を浮かべた。

    敏感な突起に直接伝わる刺激は、他のどんな玩具よりも強烈だった。

    「ふぁっ……！　そこ、一番敏感なところなのさ……でも、いいの……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見上げて、恥ずかしそうに微笑んだ。

    「%CALLNAME:MASTER%に全部見せてあげる……私の一番弱いところ」

    「えへへ……%CALLNAME:MASTER%、また変なの持ってきたね」

    %CALLNAME:人物_フラン%はクリキャップを無邪気に見つめた。

    %CALLNAME:MASTER%がそっとキャップをかぶせると、%CALLNAME:人物_フラン%は小さく身じろいだ。

    「ん……ぴったりくっついてる……なんか恥ずかしいのさ」

    電源を入れると、%CALLNAME:人物_フラン%は甲高い声を上げた。

    「ひぃっ！？　あっ、んんっ……！　逃げられない……気持ちいいのさ……！」

    「%CALLNAME:MASTER%……これ、前に付けてくれたやつ？」

    %CALLNAME:人物_フラン%はクリキャップを見て、頬を染めた。

    「あれ、すごく気持ちよかった……また、してくれるの？」

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_フラン%は嬉しそうに脚を開いた。

    「んっ……あっ……やっぱりすごいのさ……一番いいところに当たってる……」

    %CALLNAME:人物_フラン%は恋人の腕の中で、純粋に快楽を受け入れていた。
  priority: 4
- id: talent_3_1
  content: >-
    「な、なにそれ……？　変な形なのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つクリキャップを警戒しながらも興味深そうに見た。

    「そ、そこに付けるの……？　は、恥ずかしいんだけど……」

    %CALLNAME:人物_フラン%は顔を赤くしながらも、拒否はしなかった。

    振動が伝わると、%CALLNAME:人物_フラン%は驚いて目を見開いた。

    「ひゃあっ！？　ちょ、ちょっと……！　そこ、直接は……！　んんっ……！」

    「あっ……やっ……%CALLNAME:MASTER%……これ、強すぎるのさ……」

    %CALLNAME:人物_フラン%はクリキャップの刺激に、切なげな声を漏らした。

    「そこ……一番敏感なところなの……知ってて、やってるんでしょ……？」

    %CALLNAME:人物_フラン%は恨めしそうに、でもどこか嬉しそうに%CALLNAME:MASTER%を見た。

    「……もう、%CALLNAME:MASTER%のいじわる。でも……嫌じゃないのさ」

    その紅い瞳には、羞恥と期待が入り混じっていた。

    「ふぁっ……！　ま、待ってよ……心の準備が……」

    %CALLNAME:人物_フラン%はクリキャップを付けられ、身を捩った。

    「こんなところに……ぴったりくっつけるなんて……恥ずかしいのさ……」

    振動が始まると、%CALLNAME:人物_フラン%は甘い悲鳴を上げた。

    「んあっ！？　やっ、やめっ……！　いや、やめないで……どっちかわかんない……」

    %CALLNAME:人物_フラン%は混乱しながらも、%CALLNAME:MASTER%の手を握りしめていた。

    「んっ……はぁっ……これ、ずっとぶるぶるしてる……」

    %CALLNAME:人物_フラン%はクリキャップに翻弄され、息を荒くしていた。

    「%CALLNAME:MASTER%……私、こんな気持ち……初めてなのさ……」

    495年の孤独を知る少女は、新しい感覚に戸惑っていた。

    「……でも、%CALLNAME:MASTER%とだから……怖くないよ」

    %CALLNAME:人物_フラン%は照れながら、小さく微笑んだ。
