- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、何のおつもりでしょうか」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の胸に手を伸ばした。

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見つめている。

    「……私はメイドですわ。そのようなお相手をするつもりはございません」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を静かに払いのけた。

    「……お茶をお持ちしましょうか？」

    %CALLNAME:TARGET%は何事もなかったかのように、仕事に戻ろうとした。

    「……困りますわね」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の乳房に触れようとしている。

    %CALLNAME:TARGET%は一歩後ろに下がり、距離を取った。

    「……お嬢様のお客様とはいえ、限度がございますわ」

    「……このようなお戯れは、お控えくださいまし」

    %CALLNAME:TARGET%は冷ややかな声で告げた。

    「……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の胸に触れた。

    %CALLNAME:TARGET%は無表情のまま、%CALLNAME:MASTER%の手を掴んで止めた。

    「……私を誰だとお思いですか」

    「……紅魔館のメイド長ですわ。このような無礼は……」

    %CALLNAME:TARGET%の瞳は冷たく光っていた。

    「……そのような行為は、お控えください」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の胸に手を伸ばしてきた。

    %CALLNAME:TARGET%は素早く身を翻し、%CALLNAME:MASTER%の手を躱した。

    「……私はお嬢様にお仕えする身ですわ」

    「……%CALLNAME:MASTER%のお相手をする暇はございません」

    %CALLNAME:TARGET%は瀟洒な笑みを浮かべながらも、その目は笑っていなかった。
  priority: 1
