- id: fallback
  content: >-
    「ふぇっ……な、何するんですか……！？」

    %CALLNAME:TARGET%は驚いて脚を閉じようとしたが、%CALLNAME:MASTER%に阻まれた。

    「そ、そこは……見ちゃダメ……です……」

    %CALLNAME:TARGET%は真っ赤な顔で懇願するように%CALLNAME:MASTER%を見ている。

    しかし、舌が触れた瞬間、抵抗する力が抜けてしまった。

    「あっ……んっ……こ、こういうのって……」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%の行為を受け入れつつあった。

    「あの……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は困惑した表情で%CALLNAME:MASTER%を見下ろしている。

    「こういうことって……仲良しさんがすることですよね……？」

    %CALLNAME:MASTER%の舌が秘所を這うと、%CALLNAME:TARGET%は小さく声を漏らした。

    「ひっ……やっ……そ、そこ……」

    %CALLNAME:TARGET%は初めての感覚に戸惑いながら、体を震わせている。

    「……%CALLNAME:MASTER%……あたし、どうすればいいの……」

    「そ、そんなところ舐めたら……汚いですよ……」

    %CALLNAME:TARGET%は恥ずかしさで顔を真っ赤にしている。

    しかし、%CALLNAME:MASTER%は構わずに舌を這わせた。

    「あっ……ふぇ……へ、変な感じ……」

    %CALLNAME:TARGET%は初めての快楽に戸惑いながら、身を強張らせている。

    「……%CALLNAME:MASTER%……優しくしてくれますか……？」

    不安そうな目で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめていた。

    「……あの、%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%はおずおずと%CALLNAME:MASTER%の頭を見下ろしている。

    「こういうのって……痛くないんですか……？」

    %CALLNAME:MASTER%の舌が答えるように優しく動くと、%CALLNAME:TARGET%は安堵の息を漏らした。

    「んっ……あ……痛くない……むしろ……」

    %CALLNAME:TARGET%は自分の反応に驚いているようだった。

    「……%CALLNAME:MASTER%になら……もうちょっとだけ、いいです……」
