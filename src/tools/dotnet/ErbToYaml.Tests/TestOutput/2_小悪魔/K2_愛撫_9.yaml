    「……あの、%CALLNAME:MASTER%」

    %CALLNAME:人物_小悪魔%はもじもじと体を揺らしている。

    「……私から言うの……恥ずかしいですけど……」

    %CALLNAME:人物_小悪魔%は顔を赤くしながら、胸元を開いた。

    「……乳首……舐めてくれませんの……？」

    %CALLNAME:MASTER%が乳首を口に含むと、%CALLNAME:人物_小悪魔%は嬉しそうに目を閉じた。

    「んぅ……%CALLNAME:MASTER%……気持ちいい……ですわ……」
