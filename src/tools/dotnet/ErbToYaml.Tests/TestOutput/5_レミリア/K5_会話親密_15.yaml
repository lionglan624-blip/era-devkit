    「……っ、調子に乗らないことね……ふ、ぁ……」

    %CALLNAME:TARGET%は息を乱しながらも、抵抗はしなかった。

    「やっ……あ、ん……そこは……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の敏感な場所を撫でている。

    「……っ、貴方……大胆ね……」

    %CALLNAME:TARGET%は目を閉じ、快感に耐えている様子だ。

    「……まあ、悪くはないわ……ふ、ぁ……」

    紅い瞳が潤み始め、%CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみついた。

    「あっ……ん、んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の愛撫に、甘い声を漏らした。

    「……い、いきなり何を……」

    戸惑いながらも、%CALLNAME:TARGET%の身体は正直に反応している。

    「……もう、仕方ないわね……少しだけ許してあげるわ……」

    %CALLNAME:TARGET%は上気した頬で、%CALLNAME:MASTER%から視線を逸らした。

    「ひ、ぁっ……やっ……！」

    %CALLNAME:MASTER%の指先が%CALLNAME:TARGET%の秘所をくすぐり、身体が跳ねた。

    「……っ、貴方、どこでそんなこと覚えたの……」

    %CALLNAME:TARGET%は威厳を崩さぬよう努めているが、息が荒くなっている。

    「……次も、期待しているわよ……ふ、ぅ……」

    %CALLNAME:TARGET%は熱い吐息とともに、そう呟いた。
