- id: fallback
  content: >-
    「ふぁっ……ぁ……両方に……%CALLNAME:MASTER%と……」

    %CALLNAME:人物_フラン%は前と後ろを同時に貫かれ、声を詰まらせた。

    二人分の体温が身体の奥まで染み渡っていく。

    「私……壊れちゃう……？　でも……二人に愛されてるって、わかるの……」

    %CALLNAME:MASTER%と相手が同時に動くと、%CALLNAME:人物_フラン%は甘い悲鳴を上げた。

    「あぁっ……んんっ……前も後ろも……いっぱい……幸せ……なのさ……」

    495年の孤独を知る少女は、二人に包まれる幸福に紅い瞳を潤ませた。

    「%CALLNAME:MASTER%……もう一人も……私の中にいるのさ」

    %CALLNAME:人物_フラン%は恋人を見上げながら、震える声で告げた。

    前と後ろ、両方を埋め尽くす熱が、少女の心を満たしていく。

    「こんなの……地下室で一人だった私には、想像もできなかった……」

    二人が交互に腰を動かすと、%CALLNAME:人物_フラン%は背を仰け反らせた。

    「ひゃぁっ……あぁ……交互に……くるぅ……壊れちゃ……っ……幸せ……」

    悪魔の妹は、愛する人たちに満たされる喜びに涙を流した。

    「んっ……ぁ……二人の鼓動が……私の中で、感じるの……」

    %CALLNAME:人物_フラン%は恋人に縋りつきながら呟いた。

    前から、後ろから。二つの脈動が少女の身体を揺さぶる。

    「%CALLNAME:MASTER%……私、壊さないでいられてる……二人とも……」

    激しい動きに、%CALLNAME:人物_フラン%は声を抑えられなくなった。

    「あぁっ……んっ……両方……すごい……でも、大丈夫……壊さない……っ」

    破壊の衝動を抑えながら快楽に浸る、悪魔の妹の幸せな試練だった。

    「はぁ……ふぁ……二人に抱きしめられてるみたい……」

    %CALLNAME:人物_フラン%は恍惚の表情で恋人を見つめた。

    前も後ろも塞がれた少女の身体は、二つの熱に支配されている。

    「495年、ずっと一人だったのに……今は二人も……私を……」

    二人が同時に奥を突くと、%CALLNAME:人物_フラン%は絶頂の波に飲まれた。

    「あぁぁっ……んんっ……いっぱい……されて……幸せ……%CALLNAME:MASTER%……っ」

    愛に満たされた悪魔の妹は、幸福の涙を流し続けた。
