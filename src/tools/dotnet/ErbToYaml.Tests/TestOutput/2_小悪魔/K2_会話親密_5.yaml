- id: talent_3_1
  content: >-
    「んっ……あ……そ、そこは……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に秘所を触られ、顔を真っ赤に染めた。

    「恥ずかしい……ですわ……」

    それでも抵抗はせず、%CALLNAME:人物_小悪魔%は身を委ねている。

    「……%CALLNAME:MASTER%になら……いい、かも……」

    小さな声で、照れながらそう呟いた。

    「ひゃっ……！　な、何を……っ」

    %CALLNAME:人物_小悪魔%は突然の刺激に声を上げた。

    しかしその声には嫌悪よりも、戸惑いと期待が混じっている。

    「そんなところ触って……どうするおつもりですの……？」

    %CALLNAME:人物_小悪魔%は上目遣いで%CALLNAME:MASTER%を見つめた。

    その瞳には、微かな期待の色が見える。

    「あっ……やぁ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の指に弄ばれ、切ない声を漏らしている。

    「こんなの……初めて、ですの……」

    %CALLNAME:人物_小悪魔%の尻尾が恥ずかしそうにくるりと丸まった。

    「%CALLNAME:MASTER%……私のこと、どう思ってるんですか……？」

    不安と期待を滲ませながら、%CALLNAME:人物_小悪魔%は問いかけた。

    「んんっ……そ、そこ……気持ち……」

    %CALLNAME:人物_小悪魔%は言いかけて口を噤んだ。

    気持ちいい、とは言えない羞恥心が彼女を襲っている。

    「……%CALLNAME:MASTER%のばか……」

    恨めしそうに、しかしどこか嬉しそうに%CALLNAME:人物_小悪魔%は呟いた。

    悪魔の少女は、自分の中で芽生えた感情に戸惑っていた。
