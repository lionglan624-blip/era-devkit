character: フラン
situation: K6_挿入
entries:
- id: fallback
  content: >-
    「んっ……%CALLNAME:MASTER%、後ろから……？」

    %CALLNAME:人物_フラン%は四つんばいの姿勢で振り返った。

    恋人の顔が見えない体勢に、少しだけ不安そうな表情を見せる。

    「……でも、%CALLNAME:MASTER%の体温は感じるから、大丈夫なのさ」

    %CALLNAME:MASTER%が後ろから貫くと、%CALLNAME:人物_フラン%は甘い声を漏らした。

    「あぁ……ん……顔は見えないけど……繋がってるって、わかる……」

    悪魔の妹は、恋人を信じて身を委ねていた。

    「獣みたい……って思ったけど……」

    %CALLNAME:人物_フラン%は尻を突き出しながら、恥ずかしそうに呟いた。

    %CALLNAME:MASTER%が背後から抱きしめると、その体が小さく震えた。

    「こうやって抱きしめてくれるなら……悪くないのさ」

    %CALLNAME:MASTER%が激しく腰を打ちつけると、%CALLNAME:人物_フラン%は声を上げた。

    「はぁっ……ん……%CALLNAME:MASTER%、もっと強く……壊れないから……私のこと」

    その言葉には、恋人への絶対的な信頼が込められていた。

    「%CALLNAME:MASTER%……後ろから見てて、何が見える……？」

    %CALLNAME:人物_フラン%は四つんばいのまま、興味深そうに問いかけた。

    自分では見えない姿を、恋人に委ねている。

    「……恥ずかしいけど、%CALLNAME:MASTER%になら全部見せてあげる」

    %CALLNAME:MASTER%が奥まで突き入れると、%CALLNAME:人物_フラン%は背中を反らせた。

    「んぅっ……あぁ……この角度、奥まで届いて……すごいのさ……」

    紅い瞳が快感に潤んでいく。

    「ねぇ、%CALLNAME:MASTER%……私の羽、邪魔じゃない……？」

    %CALLNAME:人物_フラン%は後ろを向いたまま、心配そうに尋ねた。

    七色の結晶が揺れる羽を、小さく畳もうとする。

    「……邪魔じゃないって言ってくれて、嬉しいのさ」

    %CALLNAME:MASTER%が羽を避けながら腰を動かすと、%CALLNAME:人物_フラン%は幸せそうに微笑んだ。

    「あっ……ん……%CALLNAME:MASTER%といると……私、壊すことばかり考えなくなる……」

    495年の孤独を癒すように、悪魔の妹は恋人との繋がりを感じていた。
  priority: 4
- id: talent_3_1
  content: >-
    「え……こ、こうするの……？」

    %CALLNAME:人物_フラン%は四つんばいの姿勢に戸惑いを見せた。

    後ろから見られていることに、顔を真っ赤に染めている。

    「……%CALLNAME:MASTER%だけだよ？　こんな姿見せるの」

    %CALLNAME:MASTER%が後ろから挿入すると、%CALLNAME:人物_フラン%は声を詰まらせた。

    「ひゃっ……！　後ろからだと……全然違う……感じがする……」

    悪魔の妹は、未知の快感に身を震わせていた。

    「獣みたいな体勢……って言うんでしょ？」

    %CALLNAME:人物_フラン%は知識を披露するように言った。

    しかし実際にその姿勢を取ると、顔が羞恥で紅く染まった。

    「本で読んだことあるの……でも、実際にするのは初めて……」

    %CALLNAME:MASTER%が腰を動かし始めると、%CALLNAME:人物_フラン%は言葉を失った。

    「んぅ……あっ……こんなの……本には書いてなかった……」

    想像を超える感覚に、悪魔の妹は翻弄されていた。

    「%CALLNAME:MASTER%……後ろにいると、顔が見えないの……」

    %CALLNAME:人物_フラン%は少し不満そうに振り返った。

    その紅い瞳には、寂しさと期待が入り混じっている。

    「……ちゃんと私のこと、見てる……？」

    %CALLNAME:MASTER%が奥まで突き入れると、%CALLNAME:人物_フラン%は甘い声を漏らした。

    「はぁ……ん……見えなくても……%CALLNAME:MASTER%がいるって……わかるから……」

    繋がりを確かめるように、%CALLNAME:人物_フラン%は腰を揺らし始めた。

    「こういう遊び、他の人ともしてるの……？」

    %CALLNAME:人物_フラン%は嫉妬を隠さずに問いかけた。

    四つんばいの姿勢のまま、紅い瞳で%CALLNAME:MASTER%を睨む。

    「……私とだけにしてよね。じゃないと……壊しちゃうから」

    %CALLNAME:MASTER%が激しく突き上げると、その表情が歪んだ。

    「あっ……んっ……やだ……こんなの……%CALLNAME:MASTER%のせいなのさ……」

    独占欲と快楽に、悪魔の妹は溺れていった。
