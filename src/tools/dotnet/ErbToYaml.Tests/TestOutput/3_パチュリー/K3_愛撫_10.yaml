- id: talent_3_1
  content: >-
    「……%CALLNAME:MASTER%の胸を……吸えばいいの？」

    %CALLNAME:TARGET%は頬を染めながら、%CALLNAME:MASTER%の胸元を見つめた。

    「……まあ、実験だと思えば……」

    %CALLNAME:TARGET%の唇が%CALLNAME:MASTER%の乳首に触れ、恐る恐る吸い始めた。

    「……ん……思ったより、柔らかい……」

    %CALLNAME:TARGET%は少し驚いたような表情を浮かべた。

    「……ちゅ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の乳首を吸いながら、上目遣いで様子を窺っている。

    「……こ、こんなこと……本には書いてなかったわ」

    %CALLNAME:TARGET%の舌が乳首の周りを舐めると、自分でも驚いたように目を見開いた。

    「……も、もう少しだけ……続けてもいいわよ」

    %CALLNAME:TARGET%は恥ずかしそうに小さく呟いた。

    「……はむ……れろ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋めながら、夢中で乳首を吸っている。

    手元の本が、いつの間にか落ちている。

    「……%CALLNAME:MASTER%のせいで集中できないじゃない」

    %CALLNAME:TARGET%は恨めしそうに、でもどこか嬉しそうに言った。

    「……責任、取ってもらうわよ」

    「……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の乳首を吸いながら、小さく声を漏らした。

    「……あなたって、こういうことが好きなのね……」

    %CALLNAME:TARGET%は少し呆れたような、でも嬉しそうな表情で吸い続けている。

    「……でも、誰にも言わないでね。図書館の司書がこんなこと……」

    %CALLNAME:TARGET%は頬を赤らめながら、また乳首に吸い付いた。
