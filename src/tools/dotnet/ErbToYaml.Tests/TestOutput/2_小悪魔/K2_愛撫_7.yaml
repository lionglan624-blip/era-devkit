character: 小悪魔
situation: K2_愛撫
entries:
- id: fallback
  content: >-
    「んっ……そんなに見たいんですの……？ 私の、ここ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に秘所を開かれ、甘い吐息を漏らした。

    「悪魔のそこ……じっくり見てくださいな……」

    %CALLNAME:人物_小悪魔%は自ら指を添えて、花弁をさらに広げて見せた。

    「ふふ……%CALLNAME:MASTER%に見られると……ここ、疼いちゃいますわ……」

    %CALLNAME:人物_小悪魔%は潤んだ瞳で%CALLNAME:MASTER%を見上げ、妖艶に微笑んだ。

    「あっ……やぁ……開いちゃ……いやぁ……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_小悪魔%の秘裂を左右に押し開いた。

    「んふふ……嘘ですわ……もっと見てくださいな……」

    %CALLNAME:人物_小悪魔%は恥ずかしがるふりをしながら、腰を持ち上げている。

    「……%CALLNAME:MASTER%だけですわよ……ここ、見せてあげるの……」

    悪魔らしい妖艶な笑みを浮かべ、%CALLNAME:人物_小悪魔%は自らの秘所を晒していた。

    %CALLNAME:人物_小悪魔%は自ら脚を広げて、秘所を%CALLNAME:MASTER%に見せつけた。

    「今日は……ここ、たっぷり鑑賞してくださいな……？」

    %CALLNAME:MASTER%が指で花弁を開くと、%CALLNAME:人物_小悪魔%の蜜が糸を引いた。

    「んっ……ああ……見られてるだけで……こんなに濡れちゃうなんて……」

    %CALLNAME:人物_小悪魔%は恍惚とした表情で、%CALLNAME:MASTER%の視線を受け止めていた。

    「……%CALLNAME:MASTER%のせいですわよ……？ 私を、こんな風にしたの……」

    「ひゃうっ……息、吹きかけないでくださいな……」

    %CALLNAME:MASTER%は開いた%CALLNAME:人物_小悪魔%の秘所に、そっと息を吹きかけた。

    %CALLNAME:人物_小悪魔%は体をびくりと震わせて、甘い声を上げた。

    「もう……%CALLNAME:MASTER%ったら、いじわる……」

    「……でも、嫌じゃないですわ……むしろ、もっとしてほしいかも……」

    %CALLNAME:人物_小悪魔%は悪戯っぽく舌を出して、幸せそうに笑った。
