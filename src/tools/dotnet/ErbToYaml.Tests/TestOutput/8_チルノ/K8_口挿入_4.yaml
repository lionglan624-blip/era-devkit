character: チルノ
situation: K8_口挿入
entries:
- id: fallback
  content: >-
    「ふふーん、%CALLNAME:MASTER%！　あたいが体で洗ってあげるわ！」

    %CALLNAME:人物_チルノ%は自信満々に石鹸を泡立て始めた。

    小さな体中に泡を塗りたくると、ひんやりとした冷気と共に泡が立ち上がる。

    「ほら、準備できたわよ！　最強のあたいの泡踊り、見せてあげる！」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の体に抱きついてきた。

    氷の妖精らしい冷たい肌と、ぬるぬるとした石鹸の感触が全身を包み込む。

    「んしょ、んしょ……こうやって擦れば気持ちいいでしょ？」

    %CALLNAME:人物_チルノ%は全身を%CALLNAME:MASTER%に擦り付けながら、得意げに笑った。

    「えへへ……%CALLNAME:MASTER%、あたいの体で洗ってあげるね」

    %CALLNAME:人物_チルノ%は嬉しそうに泡を体中に塗りつけた。

    「ほら、いっぱい泡立てたよ！　あたいの体、冷たいけど気持ちいいでしょ？」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に全身を押し付けてきた。

    氷の妖精らしいひんやりとした肌と泡が、%CALLNAME:MASTER%の体を包み込む。

    「んっ……ぬるぬるして変な感じ……でもね、%CALLNAME:MASTER%と一緒だと楽しいの」

    %CALLNAME:人物_チルノ%は全身を擦り付けながら、甘えた声で囁いた。

    「……あたいのこと、好き？」

    「ほら、最強のあたいが奉仕してあげるわ！」

    %CALLNAME:人物_チルノ%は張り切って石鹸を泡立てた。

    小さな体中が泡で覆われると、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に抱きついた。

    「んー……上手くできてるかな？　ねえ、気持ちいい？」

    氷の妖精らしい冷たい肌が、泡と共に%CALLNAME:MASTER%の体を撫でていく。

    ぬる、と胸が%CALLNAME:MASTER%の胸板に押し付けられ、一物には太ももが絡みつく。

    「えへへ……%CALLNAME:MASTER%の体、あったかいね」

    %CALLNAME:人物_チルノ%は心地よさそうに体を擦り付け続けた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は珍しくおとなしく、泡を体に塗りつけている。

    「こうやって%CALLNAME:MASTER%と繋がってると……落ち着くの」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に全身を押し付けた。

    ひんやりとした肌と、滑らかな泡の感触が心地よい。

    「ん……ぬるぬるして……変な感じ……でも、いい感じ……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに体を擦り付け続けた。

    「あたいも……%CALLNAME:MASTER%のこと、大好きだからね……」
  priority: 4
- id: talent_3_1
  content: >-
    「え……泡で体を洗うって……あたいの体で……？」

    %CALLNAME:人物_チルノ%は戸惑いながらも、石鹸を手に取った。

    「……わ、わかったわよ。やってあげる！」

    意を決したように、%CALLNAME:人物_チルノ%は体中に泡を塗りたくった。

    「んっ……こ、こうすればいいの？」

    ひんやりとした肌が%CALLNAME:MASTER%に押し付けられ、泡がぬるぬると広がる。

    「ひゃっ……なんか、変な感じ……」

    %CALLNAME:人物_チルノ%は顔を赤くしながら、体を擦り付け続けた。

    「あっ……そ、その……」

    %CALLNAME:人物_チルノ%は真っ赤な顔で泡を体に塗っている。

    「べ、別にやりたくてやってるわけじゃないんだからね！」

    そう言いながらも、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に体を押し付けた。

    ぬるり、と泡が二人の間で広がり、冷たい肌が密着する。

    「……%CALLNAME:MASTER%が喜ぶなら……まあ、やってあげてもいいけど」

    照れ隠しにそっぽを向きながら、%CALLNAME:人物_チルノ%は体を動かし続けた。

    「……ちゃんと気持ちよくなってよね」

    「んっ……こ、こうかな……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに%CALLNAME:MASTER%の体に全身を擦り付けている。

    泡だらけの冷たい肌が、熱い体に絡みつく。

    「あたいだって……こういうの、できないわけじゃないんだから」

    強がりを言いながらも、その動きはぎこちない。

    「……ど、どう？　気持ちいい……よね？」

    %CALLNAME:人物_チルノ%は不安げに%CALLNAME:MASTER%を見上げた。

    胸や太ももがぬるぬると擦れ、%CALLNAME:人物_チルノ%自身も小さく声を上げている。

    「……%CALLNAME:MASTER%のせいだからね」

    %CALLNAME:人物_チルノ%は困ったような顔で呟いた。

    「あたいがこんなことしてるのは……全部%CALLNAME:MASTER%のせいなんだから」

    文句を言いながらも、%CALLNAME:人物_チルノ%は泡だらけの体を%CALLNAME:MASTER%に押し付けている。

    「……でも、%CALLNAME:MASTER%のためなら……やってあげる」

    %CALLNAME:人物_チルノ%は恥ずかしそうに俯きながら、体を擦り付け続けた。

    ひんやりとした肌と泡が、%CALLNAME:MASTER%の全身を包み込んでいく。

    「……あたいも、ちょっと気持ちいいかも……なんて」
  priority: 3
  condition:
    type: Talent
    talentType: 3
    threshold: 1
- id: fallback
  content: >-
    「え……泡踊り……？　体で洗うの……？」

    %CALLNAME:人物_チルノ%は困惑した表情で石鹸を見つめた。

    「う、うーん……まあ、いいけど……」

    渋々といった様子で、%CALLNAME:人物_チルノ%は泡を体に塗り始めた。

    「ひゃっ！　なんか、ぬるぬるして変な感じ……」

    泡だらけになると、%CALLNAME:人物_チルノ%は恐る恐る%CALLNAME:MASTER%に近づいた。

    「……こ、こうすればいいの……？」

    戸惑いながらも、%CALLNAME:人物_チルノ%は体を押し付け始めた。

    「ちょ、ちょっと%CALLNAME:MASTER%……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに%CALLNAME:MASTER%を見た。

    「いきなりこんなこと頼むなんて……信じらんない」

    文句を言いながらも、%CALLNAME:人物_チルノ%は泡を体に塗った。

    「……まあ、あたいは最強だから、できないわけないけどさ」

    強がりを言いつつ、ぎこちなく体を擦り付け始めた。

    ぬるり、と冷たい肌が%CALLNAME:MASTER%の体を滑る。

    「……これで満足なんでしょ？」

    「んー……よくわかんないけど……」

    %CALLNAME:人物_チルノ%は首を傾げながら泡を見つめた。

    「こうやって体で洗えばいいの？」

    好奇心半分、戸惑い半分といった様子で泡を塗りたくった。

    「わっ、ぬるぬるする……」

    %CALLNAME:人物_チルノ%は泡の感触に驚きながらも、%CALLNAME:MASTER%に体を押し付けた。

    「……へえ、こうすると気持ちいいんだ」

    少しずつ動きに慣れてきたようだ。

    「……はあ」

    %CALLNAME:人物_チルノ%はため息をつきながら、石鹸を手に取った。

    「あたいにこんなこと頼むなんて……%CALLNAME:MASTER%って変なの」

    そう言いながらも、%CALLNAME:人物_チルノ%は泡を体に塗り始めた。

    「……まあ、やってあげないこともないけど」

    仕方なさそうに、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に体を押し付けた。

    ひんやりとした肌と泡が、%CALLNAME:MASTER%の体を撫でていく。

    「……早く終わらせてよね」
  priority: 2
- id: fallback
  content: >-
    「はあ？　泡踊り？　何言ってんの%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は呆れたような顔をした。

    「なんであたいがそんなことしなきゃいけないのよ」

    %CALLNAME:人物_チルノ%は腕を組んで%CALLNAME:MASTER%を睨んでいる。

    「調子乗んないでよね！　凍らせるわよ！」

    辺りに冷気が漂い始め、%CALLNAME:人物_チルノ%の怒りが伝わってくる。

    ……だが、結局は渋々と泡を体に塗り始めた。

    「……ほら、やってやってるんだから感謝しなさいよね」

    「ちょっと……なにさ、これ」

    %CALLNAME:人物_チルノ%は嫌そうな顔で石鹸を見た。

    「こんなのあたいの体に塗って洗えって言うの？　信じらんない」

    %CALLNAME:人物_チルノ%は文句を言いながらも、命令には従った。

    「……ほら、擦ってやってるんだから感謝しなさいよね」

    不機嫌そうに泡だらけの体を押し付けながらも、%CALLNAME:人物_チルノ%は動き続けている。

    「早く終わらせてよね！」

    冷たい肌が泡と共に%CALLNAME:MASTER%の体を擦り上げる。

    「あのさ、%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%はじっと%CALLNAME:MASTER%を見つめた。

    「あたいをなんだと思ってんの？」

    %CALLNAME:人物_チルノ%は不満げな表情で腰に手を当てた。

    「最強の妖精であるこのあたいに……そんなこと頼む？」

    %CALLNAME:人物_チルノ%は怒りながらも、結局は泡を体に塗り始めた。

    ひんやりとした肌と泡が、%CALLNAME:MASTER%の体に押し付けられる。

    「……覚えときなさいよね」

    「……」

    %CALLNAME:人物_チルノ%は無言で%CALLNAME:MASTER%を睨んでいる。

    「%CALLNAME:MASTER%って、ほんっと馬鹿じゃないの」

    %CALLNAME:人物_チルノ%は呆れたような声で言い放った。

    「まあいいわ。やってあげる」

    そう言いながら、%CALLNAME:人物_チルノ%は仕方なさそうに泡を体に塗り始めた。

    冷たい肌と泡が%CALLNAME:MASTER%の体に押し付けられ、ぬるぬると擦れる。

    「……でも、あんまり調子に乗んないでよね」
  priority: 1
