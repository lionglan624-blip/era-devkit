character: レミリア
situation: K5_会話親密
entries:
- id: fallback
  content: >-
    「ん……あぁ……そこ、いじわるね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に後ろの蕾を弄ばれ、甘い吐息を漏らしている。

    500年を生きた吸血鬼が、こんな姿を見せるのは%CALLNAME:MASTER%だけだった。

    「……ふふ、私をこんなにしてしまうなんて……」

    %CALLNAME:TARGET%は紅い瞳を潤ませ、妖艶に微笑んだ。

    「……永遠に私のものでいなさい。全てを許しているのだから。」

    「はぁ……んっ……そこは、恥ずかしい……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の後孔を優しく撫でている。

    紅魔館の主は羞恥に頬を染め、いつもの威厳はどこかへ消えていた。

    「……貴方だけよ、私をこんな姿にできるのは……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕に縋りつき、切なげに喘いだ。

    「……もっと……私の全てを知りなさい……」

    「あっ……ん、ぁ……そこ、変な感じ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に後ろを弄られ、体を震わせている。

    「……ククク、私がこんな声を出すなんて……」

    500年の孤独を知る吸血鬼は、%CALLNAME:MASTER%の前でだけ素直になれた。

    「……貴方は私の運命そのもの……逃がさないわよ……」

    %CALLNAME:TARGET%は熱い吐息とともに%CALLNAME:MASTER%を見つめた。

    「んぁっ……あ、ああっ……いやらしい……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の後ろの蕾を執拗に弄んでいる。

    紅い悪魔は快楽に身を委ね、普段の傲慢さを忘れていた。

    「……はぁ……私をここまで乱すのは貴方だけ……」

    %CALLNAME:TARGET%は蕩けた表情で%CALLNAME:MASTER%の首元に顔を埋めた。

    「……永遠の夜を、貴方と過ごしたいの……」
  priority: 4
- id: talent_3_1
  content: >-
    「ひゃっ……！ そ、そこは……」

    %CALLNAME:TARGET%は驚きながらも、%CALLNAME:MASTER%を拒まなかった。

    紅魔館の主の頬が紅く染まっている。

    「……こんなところを触るなんて……いやらしいのね……」

    でも、その声には嫌悪の響きはなかった。

    「……仕方ないわね。少しだけ、許してあげる……」

    「あっ……ん……そこ、恥ずかしい……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の秘められた場所を探っている。

    「……私をこんな気持ちにさせて……」

    %CALLNAME:TARGET%は複雑な表情で%CALLNAME:MASTER%を見つめた。

    「……ふふ、貴方には何か特別なものを感じるわ……」

    500年の吸血鬼は、戸惑いながらも%CALLNAME:MASTER%を受け入れた。

    「んっ……やっ……そこは……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に後ろを弄られ、身を捩った。

    「……こんなこと、誰にもされたことがないわ……」

    紅魔館の主は羞恥に耐えながら、%CALLNAME:MASTER%の手を受け入れている。

    「……貴方だから……許すのよ……」

    %CALLNAME:TARGET%は視線を逸らしながら、そう呟いた。

    「あ……ぁっ……変な感じ……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の後孔を優しく刺激している。

    「……私をこんな気持ちにさせて、どうするつもり……？」

    %CALLNAME:TARGET%は問いかけながらも、体は%CALLNAME:MASTER%を求めていた。

    「……ふふ、面白い人間ね、貴方は……」

    紅い瞳が、複雑な感情を湛えて%CALLNAME:MASTER%を見つめた。
  priority: 3
