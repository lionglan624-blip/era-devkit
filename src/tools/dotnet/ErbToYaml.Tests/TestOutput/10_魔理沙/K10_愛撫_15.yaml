entries:
- id: fallback
  content: >-
    「んっ……また持ち出してきたのか、それ」

    %CALLNAME:MASTER%が小さなキャップ状の道具を取り出すと、%CALLNAME:人物_魔理沙%は苦笑した。

    「クリキャップ……お前、本当に直接的なの好きだよな」

    キャップが敏感な突起を包み込むように被せられる。

    「ひゃっ……！　あぁ……直接吸い付かれてるみたいだぜ……」

    %CALLNAME:人物_魔理沙%は恋人にしがみつき、甘い声を漏らした。

    「ふぁ……っ！　いきなりそこに被せるなって……」

    %CALLNAME:MASTER%がクリキャップを陰核に装着すると、%CALLNAME:人物_魔理沙%は身を捩った。

    「んあっ……吸われてる……振動も……っ」

    キャップ内部の振動が密閉された空間で増幅され、逃げ場のない刺激が走る。

    「あぁっ……や、やめ……もう無理だって……好きにしていいから……」

    矛盾した言葉を呟きながら、%CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%に身を預けた。

    「ん……またそれかよ」

    %CALLNAME:人物_魔理沙%は呆れたように言ったが、拒絶はしなかった。

    「……お前の指の方が好きなんだけどな」

    クリキャップが装着された瞬間、%CALLNAME:人物_魔理沙%は小さく息を呑んだ。

    「あっ……でも、これ……逃げられない感じが……んんっ……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに顔を逸らしながら、快感に身を任せた。

    「……今日はそれで責めるつもりか？」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の手にあるクリキャップを見て言った。

    「まあ……お前がしたいなら、別にいいけどさ」

    キャップの振動が始まると、%CALLNAME:人物_魔理沙%は眉をひそめた。

    「ひゃっ……あぁ……そこ、直接だから……敏感なんだって……」

    %CALLNAME:人物_魔理沙%は恋人の腕に縋りながら、逃げ場のない快楽に溺れていった。
  priority: 4
- id: talent_3_1
  content: >-
    「な、何だそれ……小さいけど……」

    %CALLNAME:人物_魔理沙%はクリキャップを見て目を丸くした。

    「そ、それをどこに使うんだ……？　ま、まさか……」

    しかし%CALLNAME:MASTER%は構わず%CALLNAME:人物_魔理沙%の陰核にキャップを被せた。

    「ひゃあっ！　ちょ、直接……！　んあぁっ……振動してる……！」

    %CALLNAME:人物_魔理沙%は予想以上の刺激に、悲鳴のような声を上げた。

    「えっ……その小さいの何に使う……って、うわっ！」

    %CALLNAME:MASTER%がクリキャップを近づけると、%CALLNAME:人物_魔理沙%は後ずさった。

    「ま、待てって！　そこに被せるのか！？」

    だが逃げ場はなく、キャップは%CALLNAME:人物_魔理沙%の敏感な場所を包み込んだ。

    「あぁっ！　んんっ……吸い付いて……離れない……っ」

    %CALLNAME:人物_魔理沙%は声を抑えきれず、顔を真っ赤にした。

    「お、おい……その小さいの、まさか……」

    %CALLNAME:人物_魔理沙%の予感は的中した。

    「あっ……や、やめ……そこは直接はダメだって……」

    クリキャップの密閉された振動が、%CALLNAME:人物_魔理沙%の陰核を責め立てる。

    「んあっ……あぁっ……逃げられ……ない……頭、真っ白に……」

    %CALLNAME:人物_魔理沙%は快感に翻弄されながら、助けを求めるように%CALLNAME:MASTER%を見た。

    「そ、それって……」

    %CALLNAME:人物_魔理沙%はクリキャップを凝視した。

    「……見るからにやばそうだぜ、その形……」

    案の定、それは%CALLNAME:人物_魔理沙%の予想を超える刺激をもたらした。

    「ひぁっ……！　や、やめ……逃げ場がない……っ！」

    %CALLNAME:人物_魔理沙%は必死に耐えようとしたが、体は正直に反応していた。
