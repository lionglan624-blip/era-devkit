character: レミリア
situation: K5_挿入
entries:
- id: fallback
  content: >-
    「……後ろ？　ふふ、%CALLNAME:MASTER%は変わったことが好きね」

    %CALLNAME:人物_レミリア%は艶やかに微笑み、自ら脚を広げた。

    正面から抱かれる体勢で、%CALLNAME:MASTER%が菊穴に亀頭をあてがう。

    「んっ……ゆっくり、入れて……」

    %CALLNAME:MASTER%がゆっくりと挿入すると、%CALLNAME:人物_レミリア%の小さな身体が震えた。

    「あ……っ、きつい……でも、%CALLNAME:MASTER%を感じるわ……」

    500年の吸血鬼が、恋人だけに許す禁断の悦びに身を委ねていた。

    「今日は……そっちでしたいの？」

    %CALLNAME:人物_レミリア%は期待と羞恥が入り混じった表情で%CALLNAME:MASTER%を見上げた。

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_レミリア%は覚悟を決めたように目を閉じた。

    「いいわ……%CALLNAME:MASTER%になら……全部、あげる」

    %CALLNAME:MASTER%が菊穴に挿入すると、締め付けるような圧迫感が伝わってきた。

    「ひぁっ……あ、あぁ……っ、奥まで……届いてる……」

    %CALLNAME:人物_レミリア%は恋人の腕の中で、背徳の快感に溺れていった。

    「んっ……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の首に腕を回し、紅い瞳で見つめた。

    正面から繋がる体勢で、%CALLNAME:MASTER%が後孔へと侵入していく。

    「あ……っ、そこ……きゅう、って締まっちゃう……」

    %CALLNAME:人物_レミリア%の菊穴が%CALLNAME:MASTER%を強く締め付けてくる。

    「%CALLNAME:MASTER%……もっと、奥まで……」

    永遠を生きる吸血鬼が、禁断の快楽に身を焦がしていた。

    「ふふ……顔を見ながら、後ろで……なんて」

    %CALLNAME:人物_レミリア%は恥ずかしそうに、しかし嬉しそうに微笑んだ。

    %CALLNAME:MASTER%が菊穴にゆっくりと押し入ると、その身体がびくりと震えた。

    「やぁっ……んん……違う穴だと……感覚が……」

    %CALLNAME:人物_レミリア%は慣れない刺激に声を上げた。

    「……っ、恥ずかしいけど……%CALLNAME:MASTER%となら、いいわ」

    高貴な吸血鬼の頬が紅く染まり、その瞳は恍惚に潤んでいた。
