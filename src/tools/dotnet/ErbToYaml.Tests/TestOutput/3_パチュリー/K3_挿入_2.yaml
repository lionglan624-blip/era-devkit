- id: fallback
  content: >-
    「……これが、肛門性交……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を受け入れながら、興味深そうな目をしている。

    「……本で読んだ通り、独特の感覚ね……いえ、少し違うかしら」

    %CALLNAME:TARGET%は冷静を保とうとしているが、顔が歪んでいる。

    「……痛い……これは生理的反応として当然……むきゅ……」

    分析しようとする言葉が、途切れ途切れになっている。

    「んっ……ふぅ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きを、なんとか観察しようとしている。

    「……興味深いわ。肛門での挿入というのは……」

    %CALLNAME:TARGET%は淡々と言おうとしたが、声が震えた。

    「……なぜ、こんなに体が強張るのかしら……」

    自分の反応に、%CALLNAME:TARGET%自身が戸惑っている。

    「あ……そこ……っ」

    %CALLNAME:TARGET%は思わず声を漏らし、慌てて口を押さえた。

    「……不覚だわ。声が出るなんて……」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らした。

    「……%CALLNAME:MASTER%、今のは聞かなかったことにして……」

    そう言いながらも、体は%CALLNAME:MASTER%を拒んでいない。

    「……」

    %CALLNAME:TARGET%は黙って%CALLNAME:MASTER%を受け入れている。

    研究者として、様々な体験を記録しておくべきかもしれない。

    「……%CALLNAME:MASTER%、質問があるわ」

    %CALLNAME:TARGET%は息を整えながら、%CALLNAME:MASTER%を見上げた。

    「……なぜ、そこを選んだの？ 私の反応を見たかった？」
  priority: 2
- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情のまま、%CALLNAME:MASTER%を受け入れている。

    「……そこでするの？ まあ、好きにしなさい」

    %CALLNAME:TARGET%は淡々と言い放った。

    「……ただし、体が弱いから乱暴にしないで」

    それだけを告げ、%CALLNAME:TARGET%は目を閉じた。

    「……ふぅ……」

    %CALLNAME:TARGET%は溜息をつきながら、%CALLNAME:MASTER%の行為を受けている。

    「……肛門で、なんて……変わった趣味ね」

    %CALLNAME:TARGET%は事実を述べるように言った。

    「……痛いから、早く終わらせて。読みかけの本があるの」

    投げやりな態度で、%CALLNAME:TARGET%は身を委ねた。

    「……むきゅ……」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「……痛いわ。もう少し配慮して」

    %CALLNAME:TARGET%は体の弱さと痛みを訴えた。

    「……こういう行為は、私には向いていないのよ」

    冷たい口調で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を窘めた。

    「……」

    %CALLNAME:TARGET%は天井を見つめながら、%CALLNAME:MASTER%の行為を受けている。

    頭の中では、次に読む本のことを考えているようだ。

    「……終わったら、すぐに出て行って」

    %CALLNAME:TARGET%は冷淡に言った。

    「……大図書館で、こんなことをされるのは不愉快よ」
  priority: 1
