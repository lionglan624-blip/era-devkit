    「ふぅん……%CALLNAME:MASTER%、うしろからするの、すきなの？」

    %CALLNAME:TARGET%は余裕を見せながら、%CALLNAME:MASTER%を受け止めている。

    しかし体は正直で、悪魔の少女の奥から蜜が溢れ始めていた。

    「あっ……ん……これ、きもちいいかも……」

    %CALLNAME:TARGET%は驚いたように声を漏らした。

    「%CALLNAME:MASTER%、やっぱりじょうず……」

    興味深そうに呟きながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに身を委ねていた。

    「へえ……これが、こうはいい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に尻を向け、興味津々な様子だった。

    悪魔の本能が目覚め、少女の体は次第に熱を帯びていった。

    「%CALLNAME:MASTER%の、あたしの中……ぐりぐりしてる……」

    %CALLNAME:TARGET%は頬を染めながら、%CALLNAME:MASTER%の動きを感じていた。

    「……もうちょっと、してみたい……」

    好奇心と芽生えた快楽に誘われ、%CALLNAME:TARGET%は%CALLNAME:MASTER%を求めていた。
