- id: fallback
  content: >-
    「えっ……ちょっと、何を……」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の手に触れようとした。

    %CALLNAME:人物_小悪魔%はさりげなく距離を取っている。

    「あの、そういうことは……もう少し親しくなってからにしてくださいな」

    %CALLNAME:人物_小悪魔%は困ったような笑みを浮かべながら、そう言った。

    「あの……髪を触られるのは、ちょっと……」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の髪に触れようとした。

    %CALLNAME:人物_小悪魔%は少し身を引いて、距離を取っている。

    「悪魔だからって何でもいいわけじゃないんですのよ？」

    %CALLNAME:人物_小悪魔%は丁寧だが、はっきりと拒む意思を示した。

    「……あの、何かご用ですか？」

    %CALLNAME:MASTER%が近づいてきたので、%CALLNAME:人物_小悪魔%は怪訝そうに首を傾げた。

    「スキンシップ……ですか？ あの、ここ図書館なんですけど……」

    %CALLNAME:人物_小悪魔%は困惑した様子で、本棚を背にしている。

    「パチュリー様に見られたら、あたし怒られちゃいますわ……」

    やんわりと、しかし確実に距離を取ろうとしている。

    「ひゃっ……!?」

    %CALLNAME:MASTER%が不意に近づいたので、%CALLNAME:人物_小悪魔%は驚いて身を竦めた。

    「び、びっくりしましたわ……急に何ですか……」

    %CALLNAME:人物_小悪魔%は警戒するように%CALLNAME:MASTER%を見ている。

    「……あたし、そんなに簡単に触らせる悪魔じゃありませんの」

    丁寧な口調の中に、はっきりとした拒絶の意思が込められていた。
