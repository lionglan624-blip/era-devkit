entries:
- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%のここ、触ってもいい……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の後ろに回り込み、小さな手を伸ばした。

    「んっ……こうすると……気持ちいいですか……？」

    細い指先が%CALLNAME:MASTER%の秘部をそっと撫でる。

    「あたし、%CALLNAME:MASTER%のこと、全部知りたいの……」

    %CALLNAME:TARGET%は嬉しそうに微笑みながら、指を動かし続けた。

    「……%CALLNAME:MASTER%が感じてる顔、見てると……あたしも嬉しくなるの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に寄り添いながら、そっと手を後ろへ伸ばした。

    「%CALLNAME:MASTER%……あたしがここ、触ってあげるね……」

    小さな指が窄まりの周りを円を描くように撫でる。

    「んふふ……%CALLNAME:MASTER%、びくってしたね……？」

    %CALLNAME:TARGET%は悪戯っぽく笑いながら、指に力を込めた。

    「あたしの指……上手……？　もっと気持ちよくしてあげるね……」

    「……%CALLNAME:MASTER%だけの妖精メイドだもん……」

    「%CALLNAME:MASTER%……ここ、敏感なんでしょ……？」

    %CALLNAME:TARGET%は甘えるように%CALLNAME:MASTER%に身を寄せながら、指を動かした。

    「あたしね、%CALLNAME:MASTER%が気持ちよくなってくれると……嬉しいの……」

    細い指先が丁寧に%CALLNAME:MASTER%の秘部を解していく。

    「んっ……こうやって……くるくるって……」

    %CALLNAME:TARGET%は頬を赤く染めながら、一生懸命奉仕した。

    「……あたしの指で……%CALLNAME:MASTER%を気持ちよくできるの、嬉しいな……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背後から抱きつくようにして、手を伸ばした。

    「えへへ……%CALLNAME:MASTER%のおしり……触らせてね……？」

    小さな手が%CALLNAME:MASTER%の秘部をくすぐるように撫でる。

    「あたし……こういうの、できるようになったの……」

    %CALLNAME:TARGET%は誇らしげに微笑みながら、指を動かし続けた。

    「%CALLNAME:MASTER%が喜んでくれるなら……あたし、何でもするよ……？」

    「……大好きだから……全部、あたしにまかせて……」
