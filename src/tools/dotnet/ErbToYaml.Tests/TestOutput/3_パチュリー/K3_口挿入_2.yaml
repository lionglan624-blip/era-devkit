- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、胸で……してあげるわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の前に座り、胸元を開いた。

    「……私の胸は大きくないけれど……あなたのためなら……」

    そう言って、%CALLNAME:TARGET%は小ぶりな乳房で一物を挟んだ。

    「……んっ……こう……動けばいいのかしら……」

    体が弱いながらも、%CALLNAME:TARGET%は懸命に胸を上下させた。

    「……あなたが喜んでくれるなら……この研究も悪くないわ……」

    「……ん、ふ……私の胸……気持ち良い……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の顔を見上げながら尋ねた。

    「……本で読んだ技法を……試してみるわ……」

    %CALLNAME:TARGET%は乳房を押し付けるように動かした。

    「……柔らかい部分で包むように……こう……」

    学者らしく工夫しながら、%CALLNAME:TARGET%は奉仕を続けた。

    「……あなたの喜ぶ顔……もっと見せて……」

    「……ふぅ……胸で擦るの……思ったより疲れるわ……」

    %CALLNAME:TARGET%は息を切らしながらも、手を止めなかった。

    「……でも……あなたのためだから……頑張れるの……」

    %CALLNAME:TARGET%は恥ずかしそうに微笑んだ。

    「……ん……先端が顔の近くに来るわ……」

    そう言って、%CALLNAME:TARGET%は時折舌で先端を舐めた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は穏やかな表情で名前を呼んだ。

    「……こうして触れていると……あなたの熱さが伝わってくるの……」

    %CALLNAME:TARGET%は胸を優しく動かしている。

    「……私の体は弱いけれど……心はあなたに捧げているわ……」

    知識の魔女は、愛する人への奉仕に静かな喜びを感じていた。
