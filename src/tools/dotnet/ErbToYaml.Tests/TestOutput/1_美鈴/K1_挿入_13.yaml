    %CALLNAME:人物_美鈴%は苦しそうに息を吐いた。

    「……%CALLNAME:MASTER%のお望みなら……従います……」

    戸惑いながらも、拒む様子はなかった。

    「あ……っ……」

    %CALLNAME:人物_美鈴%は思わず声を漏らし、体を震わせた。

    「……すみません……変な声……」

    アナルからの刺激に、体が勝手に反応してしまう。

