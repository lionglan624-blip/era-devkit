    「ん……この体勢、ちょっと恥ずかしいけど……」

    %CALLNAME:人物_魔理沙%は素直に四つん這いになった。

    「お前の前だから……見せられるんだぜ……？」

    %CALLNAME:MASTER%が背後から激しく動き始めると、%CALLNAME:人物_魔理沙%は喘いだ。

    「あっ……んっ……やっ……そんなに激しく……」

