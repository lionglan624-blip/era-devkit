- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%のおっぱい、あったかい……」

    %CALLNAME:TARGET%は幸せそうに目を細めて、%CALLNAME:MASTER%の胸に顔を埋めた。

    小さな唇が乳首に吸い付き、ちゅぷちゅぷと甘い音を立てている。

    「んっ……ちゅ……%CALLNAME:MASTER%の匂い、大好き……」

    %CALLNAME:TARGET%は両手で%CALLNAME:MASTER%の胸を包み込むように抱きついた。

    「……ずっとこうしてたい……%CALLNAME:MASTER%に甘えてるの、幸せだなぁ……」

    妖精は恋人に甘えられる喜びを、全身で感じていた。

    「%CALLNAME:MASTER%……あたし、赤ちゃんみたいになっちゃってる……」

    %CALLNAME:TARGET%は照れくさそうに笑いながら、乳首を舌先でくすぐった。

    「でもね……こうしてると、すごく安心するの……」

    妖精の小さな舌が乳首を転がし、%CALLNAME:MASTER%の体に甘い痺れを走らせる。

    「……ちゅっ……れろ……%CALLNAME:MASTER%、気持ちいい……？」

    %CALLNAME:TARGET%は上目遣いで%CALLNAME:MASTER%を見つめた。

    「あたしも……%CALLNAME:MASTER%を気持ちよくできて……嬉しいな……」

    「……んむ……ちゅぅ……」

    %CALLNAME:TARGET%は夢中で%CALLNAME:MASTER%の乳首を吸っている。

    時折甘噛みするように歯を立て、%CALLNAME:MASTER%をくすぐった。

    「えへへ……%CALLNAME:MASTER%の胸、柔らかくて気持ちいい……」

    妖精の小さな手が、もう片方の胸をそっと揉みしだいている。

    「……ねぇ、%CALLNAME:MASTER%……あたしのことも、吸ってほしいな……」

    %CALLNAME:TARGET%は恥ずかしそうに、でも期待を込めてお願いした。

    「%CALLNAME:MASTER%が好きだから……いっぱい甘えちゃうね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕の中で、幸せそうに体を預けた。

    「んっ……ちゅぷ……おっぱい、おいしい……」

    妖精は無邪気な表情で、夢中になって乳首を吸い続けている。

    %CALLNAME:TARGET%の体が%CALLNAME:MASTER%の温もりに包まれて、とろけるように緩んでいた。

    「……%CALLNAME:MASTER%……大好き……ずっと一緒にいてね……」

    妖精は愛しい人の胸の中で、至福の時間を過ごしていた。
