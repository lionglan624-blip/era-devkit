    「そっちは慣れてないんだぜ……」

    だが逃げ場はなく、アナルバイブはゆっくりと挿入された。

    「んっ……あぁっ……うねうね……腸壁に……っ」

    %CALLNAME:人物_魔理沙%は涙目になりながら、未知の感覚に翻弄された。

    「お、おい……それ、結構大きくないか……？」

    %CALLNAME:人物_魔理沙%はアナルバイブを見て目を丸くした。

    「本当に入るのか……？　無理だろ……」

    だが%CALLNAME:MASTER%は少しずつ挿入し、振動を開始した。

    「あっ……入った……振動して……中で暴れて……っ」

    %CALLNAME:人物_魔理沙%は声を抑えきれず、顔を真っ赤にした。

    「ちょ、ちょっと……そっちは……」

    %CALLNAME:人物_魔理沙%はアナルバイブを見て動揺した。

    「恥ずかしいんだけど……でも、お前が望むなら……」

    菊穴にアナルバイブが挿入され、%CALLNAME:人物_魔理沙%は息を呑んだ。

    「んあっ……これ……お尻の中で……振動してる……っ」

    %CALLNAME:人物_魔理沙%は快感に耐えながら、%CALLNAME:MASTER%を見上げた。
