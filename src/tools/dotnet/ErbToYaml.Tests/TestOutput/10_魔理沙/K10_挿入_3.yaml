    %CALLNAME:人物_魔理沙%は恋人を受け入れながら、自らも腰を揺らした。

    「……%CALLNAME:MASTER%、顔見えないから……声、聞かせてくれよ」

    %CALLNAME:人物_魔理沙%は四つん這いのまま、不安そうに呟いた。

    「お前がちゃんといるって……わかりたいんだ」

    %CALLNAME:MASTER%が優しく腸内に侵入すると、%CALLNAME:人物_魔理沙%は長い息を吐いた。

