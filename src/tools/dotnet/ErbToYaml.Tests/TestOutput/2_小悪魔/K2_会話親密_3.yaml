- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の胸にそっと手を添えた。

    「んっ……ふふ、触りたかったんですの……？」

    %CALLNAME:人物_小悪魔%は甘えるような声を漏らしながら、体を預けてきた。

    %CALLNAME:MASTER%の指が柔らかな膨らみを優しく揉みほぐす。

    「あん……そこ、気持ちいい……もっと触ってくださいな……」

    %CALLNAME:人物_小悪魔%は蕩けた表情で%CALLNAME:MASTER%を見上げた。

    「悪魔の体、%CALLNAME:MASTER%のものですわ……好きにしていいですのよ？」

    「%CALLNAME:MASTER%……また私の胸が恋しくなりましたの？」

    %CALLNAME:人物_小悪魔%はいたずらっぽく微笑みながら、自ら胸を差し出すようにした。

    %CALLNAME:MASTER%がその柔らかさを堪能すると、%CALLNAME:人物_小悪魔%は甘い吐息を漏らした。

    「んん……%CALLNAME:MASTER%の手、温かい……」

    %CALLNAME:人物_小悪魔%は恍惚とした瞳で目を細めている。

    「ふふっ……悪魔の魅力に取り憑かれちゃいましたわね……？」

    そう言いながらも、%CALLNAME:人物_小悪魔%の尻尾が嬉しそうにゆらゆらと揺れていた。

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の前で服の襟を緩めた。

    「今日は……たっぷり触ってくださいな」

    %CALLNAME:MASTER%が胸に手を伸ばすと、%CALLNAME:人物_小悪魔%は嬉しそうに身を委ねた。

    「あっ……んん……%CALLNAME:MASTER%の指、上手ですわ……」

    柔らかな膨らみが%CALLNAME:MASTER%の手の中で形を変える。

    「もっと……奥まで揉んで……私の全部、感じさせてくださいな……」

    %CALLNAME:人物_小悪魔%は熱っぽい吐息を漏らしながら、%CALLNAME:MASTER%にしがみついてきた。

    「んっ……あっ……そこ、敏感なんですの……」

    %CALLNAME:MASTER%の手が%CALLNAME:人物_小悪魔%の胸を優しく愛撫している。

    %CALLNAME:人物_小悪魔%は甘い声を抑えきれずに身を捩った。

    「%CALLNAME:MASTER%……もっと強くしても……いいですのよ……」

    %CALLNAME:人物_小悪魔%の瞳は潤んで、頬は薔薇色に染まっている。

    「私……%CALLNAME:MASTER%に触られると……頭がふわふわしちゃうんですの……」

    蕩けるような笑みを浮かべながら、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に甘えてきた。
