character: 咲夜
situation: K4_会話親密
entries:
- id: fallback
  content: >-
    「――あら、%CALLNAME:MASTER%がお茶を？」

    %CALLNAME:TARGET%は静かに湯飲みを受け取り、そっと香りを確かめた。

    ふう、と息を吹きかけてから、優雅に口をつける。

    「……ふふ、悪くありませんわ。お上手になられましたね」

    %CALLNAME:TARGET%は珍しく柔らかな微笑みを浮かべた。

    「……お嬢様へお出しするのは、まだ早いですけれど」

    「私には、これで十分ですわ」

    そう言って、%CALLNAME:TARGET%は恋人だけに見せる穏やかな表情でお茶を楽しんでいる。

    「まあ……私にお茶を淹れてくださるの？」

    %CALLNAME:TARGET%は両手で湯飲みを包み込むように受け取った。

    ずず、と上品にお茶を啜る。

    「……はぁ、美味しゅうございます」

    %CALLNAME:TARGET%は満足そうに息を吐いた。

    「いつもは私がお出しする側ですから……こうして%CALLNAME:MASTER%に淹れていただけると」

    「……少し、特別な気分になりますわね」

    完璧なメイドの頬が、僅かに染まっている。

    「……ん」

    %CALLNAME:TARGET%は湯飲みを受け取り、両手で包み込んだ。

    湯気の向こうで、瀟洒なメイドの顔がほころんでいる。

    「……%CALLNAME:MASTER%の淹れるお茶は、不思議と落ち着きますわ」

    %CALLNAME:TARGET%はゆっくりとお茶を啜り、ほぅ、と温かい息を吐いた。

    「……こうしていると、時を止めるのがもったいなく感じます」

    「貴方との時間は、そのまま過ごしたいの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%だけに見せる、甘い微笑みを浮かべた。

    「――ありがとう、%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は優雅な所作で湯飲みを受け取った。

    「……ふふ、今日は良い茶葉を使われましたわね」

    ひと口啜り、%CALLNAME:TARGET%は満足そうに目を細める。

    「メイドとして、お茶の味には少々うるさいのですけれど」

    「%CALLNAME:MASTER%の淹れるお茶には、それだけではない何かがありますの」

    %CALLNAME:TARGET%は湯飲みを見つめながら、小さく呟いた。

    「……愛情、かしら。ふふ、恥ずかしいことを言ってしまいましたわね」
  priority: 4
- id: talent_3_1
  content: >-
    「――え、私に？　……ありがとうございます」

    %CALLNAME:TARGET%は少し驚いた様子で湯飲みを受け取った。

    そっと口をつけ、ゆっくりとお茶を味わう。

    「……ん、良い香り。なかなかの腕前ですわね」

    %CALLNAME:TARGET%は感心したように頷いた。

    「……まあ、私の淹れるお茶には及びませんけれど」

    「お気持ちは、嬉しく頂戴いたしますわ」

    そう言いながら、%CALLNAME:TARGET%はどこか嬉しそうにお茶を飲んでいる。

    「あら、%CALLNAME:MASTER%がお茶を？　珍しいこともあるものですわね」

    %CALLNAME:TARGET%は湯飲みを受け取り、香りを確かめた。

    ずず、と音を立ててお茶を啜る。

    「……ふむ、思ったより悪くありませんわ」

    %CALLNAME:TARGET%は感心したように呟いた。

    「この調子で精進なさいませ。いつかお嬢様にお出しできるくらいに」

    %CALLNAME:TARGET%は厳しいことを言いながらも、どこか楽しそうだった。

    「――まあ、お茶ですか」

    %CALLNAME:TARGET%は少し照れた様子で湯飲みを受け取った。

    「……いただきますわ」

    ずず、と静かにお茶を啜る音が響く。

    「……ん、温かい。身体が温まりますわね」

    %CALLNAME:TARGET%は湯飲みを両手で包みながら、%CALLNAME:MASTER%を見つめている。

    「……こうしてお茶をいただくのも、悪くありませんわね」

    そう言う%CALLNAME:TARGET%の表情は、いつもより柔らかい。

    「――あ、%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は差し出された湯飲みを見て、僅かに目を見開いた。

    「……私に淹れてくださったの？」

    「……ありがとうございます」

    %CALLNAME:TARGET%は丁寧に礼を述べてから、お茶を口に運んだ。

    「……美味しゅうございますわ。心がこもっているのがわかります」

    ぽつりとそう呟いてから、%CALLNAME:TARGET%は小さく咳払いをした。

    「……今のは、メイドとしての評価ですわ。それ以上の意味はありませんから」
  priority: 3
  condition:
    type: Talent
    talentType: 3
    threshold: 1
- id: fallback
  content: >-
    「――あら？　お茶……淹れてくださったの？」

    %CALLNAME:TARGET%は少し戸惑いながらも、湯飲みを受け取った。

    「いただきますわ」

    そう言って、静かにお茶を口に含む。

    「……ん、美味しゅうございます。ありがとうございます」

    %CALLNAME:TARGET%は丁寧に礼を述べた。

    「私に？　……まあ、いただきますわ」

    %CALLNAME:TARGET%は少し遠慮がちに湯飲みを手に取った。

    ずず、とお茶を啜る音が静かに響く。

    「……あったかいですわね。お気遣い、痛み入ります」

    %CALLNAME:TARGET%は控えめに微笑んだ。

    「――お茶を……私に？」

    %CALLNAME:TARGET%は湯飲みを受け取り、不思議そうに眺めている。

    「……いつもは私がお出しする側なのですけれど」

    ひと口啜り、%CALLNAME:TARGET%は小さく頷いた。

    「……悪くありませんわ。ありがとうございます」

    %CALLNAME:TARGET%は礼儀正しく礼を言った。

    「……あら」

    %CALLNAME:TARGET%は差し出された湯飲みを見て、少し驚いた様子だった。

    「……お気遣いいただいて、ありがとうございます」

    %CALLNAME:TARGET%は湯飲みを受け取り、静かにお茶を味わった。

    「……温度も良い頃合いですわね」

    そう言って、%CALLNAME:TARGET%はメイドらしい評価を口にした。
  priority: 2
- id: fallback
  content: >-
    「――ん？　……お茶ですか」

    %CALLNAME:TARGET%は少し警戒しながらも、湯飲みを受け取った。

    「……いただきますわ」

    そう言って、様子を窺うようにお茶を啜る。

    「……普通に美味しゅうございますわね。ありがとうございます」

    %CALLNAME:TARGET%は事務的に礼を言った。

    「あら……私にお茶を？」

    %CALLNAME:TARGET%は湯飲みを受け取り、ゆっくりとお茶を飲んだ。

    「変なものは入っておりませんわよね？」

    冗談とも本気ともつかない口調で、%CALLNAME:TARGET%はそう言った。

    「……まあ、お客様からお茶を頂くのも、たまには悪くありませんわね」

    「……お茶、ですか」

    %CALLNAME:TARGET%は無表情のまま湯飲みを受け取った。

    ずず、と音を立ててお茶を啜る。

    「……まあ、飲めますわね」

    「本来であれば、私がお出しする側なのですけれど」

    %CALLNAME:TARGET%は淡々とそう言った。

    「――はい？　お茶を……？」

    %CALLNAME:TARGET%は少し怪訝そうな表情で湯飲みを見つめた。

    「……何か企んでおられますの？」

    それでも礼儀正しく湯飲みを受け取り、お茶を口にする。

    「……普通のお茶ですわね。ありがとうございます」

    %CALLNAME:TARGET%は警戒心を解かぬまま、事務的に礼を述べた。
  priority: 1
