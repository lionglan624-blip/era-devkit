    %CALLNAME:人物_美鈴%は少し距離を取って、警戒するように立った。

    「ひゃっ！？ な、何するんですか！」

    %CALLNAME:人物_美鈴%は飛び上がるように驚いた。

    「いきなりお尻を触るなんて……失礼です！」

    %CALLNAME:人物_美鈴%は顔を赤くして、怒りと恥ずかしさが混じった表情をしている。

    「もう、%CALLNAME:MASTER%ってば……」

    %CALLNAME:人物_美鈴%はため息をつきながらも、どこか呆れたような顔をしていた。

    「えっ……ちょ、ちょっと待って！」

    %CALLNAME:人物_美鈴%は慌てて%CALLNAME:MASTER%の手を払いのけようとした。

