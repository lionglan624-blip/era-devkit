- id: talent_3_1
  content: >-
    「ちょ、ちょっと……正面からなんて、恥ずかしいんだけど……」

    %CALLNAME:人物_チルノ%は真っ赤な顔で%CALLNAME:MASTER%から目を逸らした。

    しかし、腰は%CALLNAME:MASTER%の動きに合わせて揺れている。

    「べ、別に気持ちいいとか……そういうんじゃないからね……っ」

    %CALLNAME:人物_チルノ%の強がりも、今は声が上ずっている。

    「……ばか、そんなに見つめないでよ……」

    「んあっ……ま、まって%CALLNAME:MASTER%……！」

    %CALLNAME:人物_チルノ%は慌てて%CALLNAME:MASTER%の肩にしがみついた。

    「こ、この体勢……顔見られるのが……」

    %CALLNAME:人物_チルノ%の頬は真っ赤に染まっている。

    「……っ、そんな顔で見ないでってば……っ！」

    恥ずかしさを隠すように、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の胸に顔を埋めた。

    「はぁっ……あ……%CALLNAME:MASTER%の、奥まで……」

    %CALLNAME:人物_チルノ%は甘い声を漏らしてしまい、慌てて口を押さえた。

    「い、今の聞かなかったことにしなさいよね！」

    威勢よく言うが、声は震えている。

    「……っ、だから、そんなに動かれたら……声、出ちゃう……」

    %CALLNAME:人物_チルノ%は観念したように、%CALLNAME:MASTER%にしがみついた。

    「……%CALLNAME:MASTER%、あんまり見ないで」

    %CALLNAME:人物_チルノ%は恥ずかしそうに目を伏せた。

    「こんな顔してるの、見られたくないんだから……」

    正面から繋がっているせいで、表情は隠しきれない。

    「……っ、もう……%CALLNAME:MASTER%のせいだからね、これ……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に責任を押し付けながらも、離れようとはしなかった。
