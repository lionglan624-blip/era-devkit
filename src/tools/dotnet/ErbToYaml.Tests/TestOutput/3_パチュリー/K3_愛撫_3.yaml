character: パチュリー
situation: K3_愛撫
entries:
- id: fallback
  content: >-
    「……ん……%CALLNAME:MASTER%、指を……」

    %CALLNAME:TARGET%は魔導書を閉じ、%CALLNAME:MASTER%に身を委ねた。

    %CALLNAME:MASTER%の指がゆっくりと膣内へと挿入される。

    「……あなたの指、熱いわ……私の中で……動いてる……」

    %CALLNAME:TARGET%は淡々とした口調を保とうとするが、吐息が熱を帯びている。

    「……本の知識では、この感覚は……わからなかったわ」

    そう呟きながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%の肩に額を預けた。

    「あ……そこ……奥まで……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の膣内をゆっくりとなぞっている。

    %CALLNAME:TARGET%の体が微かに震え、大図書館の静寂に甘い吐息が響いた。

    「……%CALLNAME:MASTER%……あなたは、私の弱いところを……よく知っているのね」

    %CALLNAME:TARGET%は潤んだ瞳で%CALLNAME:MASTER%を見上げた。

    「……動かない大図書館が……あなたの指で動かされてしまうわ……」

    「……ふぅ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指に身を任せ、静かに喘いでいる。

    膣内の粘膜が%CALLNAME:MASTER%の指を優しく包み込んでいる。

    「……あなたの指……私の中で……とても心地いいの」

    %CALLNAME:TARGET%は珍しく素直な言葉を口にした。

    「……もう少し……そうしていて……」

    そう言って%CALLNAME:TARGET%は、%CALLNAME:MASTER%の手を握った。

    「……んぁ……っ……」

    %CALLNAME:MASTER%が指を曲げると、%CALLNAME:TARGET%は思わず声を漏らした。

    %CALLNAME:TARGET%の膣壁が%CALLNAME:MASTER%の指をきゅっと締め付ける。

    「……%CALLNAME:MASTER%……そこ、だめ……頭が……真っ白になる……」

    %CALLNAME:TARGET%は普段の冷静さを失い、%CALLNAME:MASTER%にしがみついた。

    「……あなたになら……全部、壊されてもいいわ……」

    甘い囁きが、大図書館の埃っぽい空気に溶けていった。
  priority: 4
- id: talent_3_1
  content: >-
    「……っ!? そ、そこに……指を……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の行為に驚き、身を強張らせた。

    しかし逃げ出すことはなく、恥ずかしそうに目を伏せている。

    「……本で読んだことは、あるけど……実際に、されると……」

    %CALLNAME:TARGET%の声が途切れ、頬が赤く染まった。

    「……%CALLNAME:MASTER%、優しく……してね……」

    「……んっ……あ……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の膣内に挿入される。

    %CALLNAME:TARGET%は声を殺そうとするが、甘い吐息が漏れてしまう。

    「……こんなところで……小悪魔に見られたら……」

    %CALLNAME:TARGET%は周囲を気にしながらも、%CALLNAME:MASTER%の指を受け入れている。

    「……もっと奥の書架に……行きましょう……？」

    「……やぁ……そこ……」

    %CALLNAME:MASTER%が指を動かすと、%CALLNAME:TARGET%の体がびくりと震えた。

    手元の本はいつの間にか閉じられ、%CALLNAME:TARGET%は%CALLNAME:MASTER%に集中している。

    「……本より……あなたの指の方が……気になってしまうわ……」

    %CALLNAME:TARGET%は恥ずかしそうに呟いた。

    「……困った人ね……私の読書を邪魔して……」

    「……ひぅ……っ……」

    %CALLNAME:TARGET%は思わず甘い声を上げ、慌てて口を押さえた。

    %CALLNAME:MASTER%の指が膣壁をこすると、%CALLNAME:TARGET%の腰が浮いた。

    「……む、むきゅ……そんなに……動かさないで……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を睨むが、その視線には力がない。

    「……でも……止めないで……」

    矛盾した言葉が、%CALLNAME:TARGET%の口から漏れた。
