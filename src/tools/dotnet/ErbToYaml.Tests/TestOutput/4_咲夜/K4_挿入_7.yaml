- id: fallback
  content: >-
    「……この体勢をご所望ですか」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%の膝の上に座った。

    「お客様のご要望ですから……お相手いたしますわ」

    淡々と腰を下ろしていき、%CALLNAME:MASTER%を受け入れる。

    「……っ……」

    「……早く済ませてくださいまし」

    瀟洒なメイドは、感情を完全に押し殺していた。

    「……」

    %CALLNAME:TARGET%は黙って%CALLNAME:MASTER%の上で腰を動かしている。

    「向かい合う必要があるのですか……顔を見せる必要性を感じませんけれど」

    冷たい目で%CALLNAME:MASTER%を見つめながら、%CALLNAME:TARGET%は事務的に動く。

    「……感情移入などしませんわよ」

    「仕事として、こなしているだけですから」

    完璧なメイドは、あくまでプロフェッショナルを貫いていた。

    「……お客様の相手をするのも、メイドの務め……」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    機械的に腰を動かしながら、感情を見せない。

    「……っ」

    一瞬、%CALLNAME:TARGET%の表情が揺らいだが、すぐに戻る。

    「……何でもありませんわ」

    冷静さを取り繕いながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめた。

    「……貴方に感情を見せる必要はありませんわ」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見た。

    「私はメイド。貴方はお客様。それだけのことですわ」

    淡々と腰を上下させながら、%CALLNAME:TARGET%は義務を果たす。

    「……早く終わらせてください」

    「お嬢様のお世話がありますので」

    瀟洒な従者は、最後まで感情を見せなかった。
