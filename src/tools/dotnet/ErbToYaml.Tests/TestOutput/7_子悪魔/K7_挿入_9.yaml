    無邪気な声で淫らな言葉を紡ぎながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を絡め取った。

    「……ん、おしり……ひろがる……」

    %CALLNAME:TARGET%は後ろの穴を広げられながら、淡々と感想を漏らした。

    感情のない瞳とは裏腹に、体は本能的に%CALLNAME:MASTER%を求めていた。

    「%CALLNAME:MASTER%……おかお、みえる……でも、べつに……」

    %CALLNAME:TARGET%は表情を変えずに%CALLNAME:MASTER%を見つめた。

    「あたし、おなかすいてるから……いっぱい、ちょうだい……」

    サキュバスの血が騒ぎ、%CALLNAME:TARGET%は飢えたように%CALLNAME:MASTER%を締め付けた。

    「あたしね……おしり、はじめて……」

    %CALLNAME:TARGET%は正面から後ろを貫かれながら、不思議そうな顔をしている。

    しかし悪魔の本能は既に目覚め、%CALLNAME:MASTER%を搾り取ろうとしていた。

    「でも……体が、しってる……こうすれば……もらえる……」

