character: 咲夜
situation: K4_会話親密
entries:
- id: fallback
  content: >-
    %CALLNAME:人物_咲夜%は%CALLNAME:MASTER%の言葉に瀟洒な微笑みを浮かべた。

    「――へえ、そんなことがあったの」

    %CALLNAME:人物_咲夜%は優雅に相槌をうちながら%CALLNAME:MASTER%の話を聞いている。

    「ふふ、%CALLNAME:MASTER%のお話は聞いていて飽きないわね」

    %CALLNAME:人物_咲夜%はいつもより柔らかな眼差しで%CALLNAME:MASTER%を見つめている。

    「……もう少し、こうしていてもいいかしら？」

    完璧なメイドらしからぬ甘えた声で、%CALLNAME:人物_咲夜%はそう囁いた。

    「――それでね、%CALLNAME:MASTER%」

    %CALLNAME:人物_咲夜%は珍しく楽しそうに話をしている。

    いつもの瀟洒な佇まいはそのままに、どこか満ち足りた表情だ。

    「……聞いてくださってる？　もう、ぼんやりしないで」

    %CALLNAME:人物_咲夜%はやんわりと咎めながらも、嬉しそうだった。

    「まあいいわ。それで、続きなのだけれど――」

    「――%CALLNAME:MASTER%？　聞いてらっしゃる？」

    聞いてるよ、と%CALLNAME:MASTER%が答えると、

    「そう。なら良かったわ」

    %CALLNAME:人物_咲夜%は安心したように微笑んだ。

    「……%CALLNAME:MASTER%がちゃんと聞いてくださると、私も嬉しいの」

    %CALLNAME:人物_咲夜%は小さな声で、しかし幸せそうにそう言った。

    「――幸せね」

    唐突に%CALLNAME:人物_咲夜%がそう呟いた。

    どうしたの、と%CALLNAME:MASTER%が問うと、

    「……こうやって%CALLNAME:MASTER%とお話しする時間が、私には何より大切なの」

    「お嬢様へのお仕えと同じくらい……いいえ、それ以上に」

    %CALLNAME:人物_咲夜%は頬を染めながら、%CALLNAME:MASTER%の手にそっと触れた。
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:人物_咲夜%は%CALLNAME:MASTER%と話しながら、時折%CALLNAME:MASTER%を見つめていた。

    「――ふうん、そんなことが、ねえ」

    %CALLNAME:人物_咲夜%は感心したようにそう言った。

    「%CALLNAME:MASTER%も、いろいろあるのね」

    %CALLNAME:人物_咲夜%はまじまじと%CALLNAME:MASTER%を見つめている。

    「……私も、%CALLNAME:MASTER%のこと、もっと知りたいわ」

    言い終えてから、%CALLNAME:人物_咲夜%は小さく咳払いをした。

    「――それでね、%CALLNAME:MASTER%」

    %CALLNAME:人物_咲夜%は笑みを浮かべながら、話をしている。

    普段の瀟洒な佇まいの中に、心底楽しそうな様子が垣間見える。

    「%CALLNAME:MASTER%は最近何かあった？」

    私のことも聞いてくださるの、と%CALLNAME:人物_咲夜%。

    「……聞かせてくださらない？　%CALLNAME:MASTER%のお話」

    「……ねえ、%CALLNAME:MASTER%」

    %CALLNAME:人物_咲夜%は少し恥ずかしそうにこちらを見た。

    「こうやってお話ししている時間、私……嫌いじゃないわ」

    %CALLNAME:人物_咲夜%はエプロンの裾を軽く直し、照れを隠した。

    「……また、お話ししに来てくださると、嬉しいわ」

    「――%CALLNAME:MASTER%？　聞いてくださってる？」

    ん、ああ、聞いてるよ、と%CALLNAME:MASTER%が答える。

    「そう？　聞いていらっしゃらなかったら、お仕置きしようかと思ったのに」

    %CALLNAME:人物_咲夜%は冗談めかしてそう言った。

    実は半分聞き流していたとは言えず、%CALLNAME:MASTER%は苦笑を浮かべた。

    「……ふふ、その顔、やっぱり聞いてなかったのね」
