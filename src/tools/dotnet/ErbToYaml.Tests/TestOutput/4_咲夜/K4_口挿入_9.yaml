- id: talent_3_1
  content: >-
    「……%CALLNAME:MASTER%……私が……後ろから……」

    %CALLNAME:TARGET%は緊張しながら%CALLNAME:MASTER%の背後に立った。

    「こんな体勢は……初めてですから……少し、緊張しますわ……」

    %CALLNAME:TARGET%は慎重に腰を進めていく。

    「んっ……入りましたわ……」

    「%CALLNAME:MASTER%……痛くありませんか……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を気にしながら動き始めた。

    「……あ……%CALLNAME:MASTER%の中……こんなに……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を後ろから抱きながら、声を漏らした。

    「私が動くと……%CALLNAME:MASTER%の声が……」

    恥ずかしそうに頬を染めながらも、%CALLNAME:TARGET%は腰を動かし続ける。

    「……ふぁ……こんな気持ちになるなんて……」

    「%CALLNAME:MASTER%……もう少し……続けさせてくださいまし……」

    %CALLNAME:TARGET%は想い人との繋がりを確かめていた。

    「……%CALLNAME:MASTER%を……こうして後ろから……」

    %CALLNAME:TARGET%は自分の大胆さに戸惑いながらも腰を動かしている。

    「メイドが……こんなことをするなんて……」

    「……でも……%CALLNAME:MASTER%のためなら……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腰を掴み、深く突いた。

    「あっ……ここ……気持ちいいですか……？」

    葛藤しながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%を悦ばせようとしていた。

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背に身を寄せながら腰を動かしている。

    「後ろから抱くと……%CALLNAME:MASTER%の匂いがして……」

    「……ドキドキしてしまいますわ……」

    %CALLNAME:TARGET%はリズムを保ちながら、深く繋がっていく。

    「……%CALLNAME:MASTER%……もっと……声を聞かせて……」

    恥ずかしさを堪えながら、%CALLNAME:TARGET%は想いを込めて動き続けた。
