character: パチュリー
situation: K3_愛撫
entries:
- id: fallback
  content: >-
    「……ん……%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は読みかけの魔導書を閉じ、%CALLNAME:MASTER%の手を受け入れた。

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の胸に触れ、柔らかな感触を確かめている。

    「……あなたに触れられると、魔力が乱れるの」

    %CALLNAME:TARGET%は淡々と言いながらも、頬が微かに紅潮している。

    「……でも、嫌じゃないわ。むしろ……もっと、触れて」

    そう呟いて、%CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に身を預けた。

    「あ……ぁ……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の乳房を揉みしだいている。

    大図書館の静寂の中、%CALLNAME:TARGET%の甘い吐息だけが響いていた。

    「……%CALLNAME:MASTER%、あなたの手……温かいわ……」

    %CALLNAME:TARGET%は目を閉じ、%CALLNAME:MASTER%の愛撫に身を委ねている。

    「……本には書いていない感覚ね……これは……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手に自分の手を重ねた。

    「……ふぅ……ん……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の膝の上で、胸を愛撫されている。

    %CALLNAME:MASTER%が乳首を指先で弾くと、%CALLNAME:TARGET%の体がびくりと震えた。

    「っ……そこ……敏感なの……知ってるでしょう……」

    %CALLNAME:TARGET%は恨めしそうに%CALLNAME:MASTER%を見上げるが、その瞳は潤んでいる。

    「……意地悪ね……でも、止めないで……」

    普段の知的な雰囲気とは異なる、甘えた声が漏れた。

    「……やぁ……%CALLNAME:MASTER%……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の乳首を摘み、転がしている。

    %CALLNAME:TARGET%は本を手放し、%CALLNAME:MASTER%にしがみついた。

    「……胸だけで、こんなに……頭が真っ白になるなんて……」

    %CALLNAME:TARGET%の吐息が熱を帯び、%CALLNAME:MASTER%の耳を擽った。

    「……%CALLNAME:MASTER%……私の全部、あなたのものよ……」

    動かない大図書館が、%CALLNAME:MASTER%の腕の中で甘く蕩けていた。
  priority: 4
- id: talent_3_1
  content: >-
    「っ……な、何を……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手が胸に触れた瞬間、身を強張らせた。

    しかし抵抗することなく、%CALLNAME:TARGET%はされるがままになっている。

    「……胸、なんて……恥ずかしいじゃない……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、視線を逸らした。

    「……%CALLNAME:MASTER%、見ないで……」

    そう言いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%から離れようとはしなかった。

    「……ん……あ……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の胸を揉み始めると、%CALLNAME:TARGET%は小さく声を漏らした。

    手元の魔導書は開いたまま、ページが止まっている。

    「……集中、できないじゃない……」

    %CALLNAME:TARGET%は恨めしそうに呟くが、その声には熱がこもっている。

    「……%CALLNAME:MASTER%……もう少し、優しくして……」

    %CALLNAME:TARGET%は本を閉じ、%CALLNAME:MASTER%に向き直った。

    「……ひゃ……っ……」

    %CALLNAME:MASTER%が乳首に触れると、%CALLNAME:TARGET%は思わず声を上げた。

    「そ、そこは……だめ……」

    %CALLNAME:TARGET%は弱々しく抗議するが、体は正直に反応している。

    「……むきゅ……変な声、出ちゃう……」

    %CALLNAME:TARGET%は羞恥に顔を伏せながら、%CALLNAME:MASTER%の愛撫を受け入れていた。

    「……%CALLNAME:MASTER%……本当に、意地悪ね……」

    「……ぁ……や……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に胸を揉まれながら、甘い吐息を漏らしている。

    大図書館の埃っぽい空気の中、%CALLNAME:TARGET%の匂いが%CALLNAME:MASTER%を包む。

    「……こんなところで……小悪魔に見られたら……」

    %CALLNAME:TARGET%は周囲を気にしながらも、%CALLNAME:MASTER%の手を払いのけない。

    「……もっと奥に……行きましょう……？」

    %CALLNAME:TARGET%は赤い顔で%CALLNAME:MASTER%を誘った。
