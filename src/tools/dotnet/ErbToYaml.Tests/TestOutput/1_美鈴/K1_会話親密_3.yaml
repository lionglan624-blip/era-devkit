- id: fallback
  content: >-
    「んっ……やぁ……」

    %CALLNAME:人物_美鈴%はされるがままに、%CALLNAME:MASTER%に尻をなでられている。

    「……%CALLNAME:MASTER%、その手つき……いやらしいわ……」

    %CALLNAME:人物_美鈴%は熱い息を漏らしながらも、抵抗はしなかった。

    むしろ身を寄せて、%CALLNAME:MASTER%の愛撫を受け入れている。

    「……もっと、触ってもいいのよ……？」

    「あっ……もう……そこ……」

    %CALLNAME:人物_美鈴%は頬を染めて、%CALLNAME:MASTER%の手を受け入れている。

    「……門番の仕事中なのに……こういうことするんだから……」

    そう言いながらも、%CALLNAME:人物_美鈴%は身を寄せてきた。

    柔らかな尻が%CALLNAME:MASTER%の手に押し付けられる。

    「……もう少しだけなら、いいけど……」

    「んぅ……くぅ……」

    %CALLNAME:人物_美鈴%は甘い声を漏らしながら、尻をなでる手に身を委ねている。

    「……%CALLNAME:MASTER%の手、温かいわね……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに、でも嬉しそうに微笑んだ。

    「……こういうの、嫌いじゃないの。%CALLNAME:MASTER%にだけ、ね」

    %CALLNAME:人物_美鈴%は甘えるように%CALLNAME:MASTER%にもたれかかった。

    %CALLNAME:MASTER%の手が、%CALLNAME:人物_美鈴%の尻をゆっくりと撫でる。

    「ん……ふふ、そこ、好きなんでしょ……？」

    %CALLNAME:人物_美鈴%は悪戯っぽく微笑みながら、腰を少し揺らした。

    「……私も、%CALLNAME:MASTER%に触られるの、嫌いじゃないわ」

    そう言って、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の肩に頭を預けた。

    門番の威厳などどこへやら、すっかり甘えた様子だ。
