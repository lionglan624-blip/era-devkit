- id: fallback
  content: >-
    「……胸を触りたいの？　私の？」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%を見つめた。

    その紅い瞳には、好奇心と危険な光が宿っている。

    「いいよ、触っても。……壊れちゃっても知らないのさ」

    %CALLNAME:MASTER%が乳房に手を伸ばすと、%CALLNAME:人物_フラン%は小さく息を漏らした。

    「……ふぅん。あなたって、変な人なのさ」

    悪魔の妹は、感情の読めない声でそう呟いた。

    「きゅっとしてドカーンって知ってる？」

    %CALLNAME:人物_フラン%は無邪気に笑いながら、%CALLNAME:MASTER%を見た。

    「私、なんでも壊せるのさ。あなたの手だって、私の胸だって」

    %CALLNAME:MASTER%が怯まずに胸に触れると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……度胸あるね。今日は特別に、壊さないであげる」

    %CALLNAME:人物_フラン%は気まぐれにそう言い放った。

    「……つまんないことしたら、わからないけど」

    「……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手を無言で見つめた。

    495年の孤独が生んだ、どこか虚ろな瞳。

    「地下に来て、私の胸を触るなんて……変わってるのさ」

    %CALLNAME:MASTER%が乳房に触れても、%CALLNAME:人物_フラン%はほとんど反応しなかった。

    「……ふぅん。これが、そういうこと、なのかな」

    悪魔の妹は、退屈そうに%CALLNAME:MASTER%を眺めていた。

    「あなた、私と遊びたいの？」

    %CALLNAME:人物_フラン%は紅い瞳を%CALLNAME:MASTER%に向けた。

    「私と遊ぶのは危ないのさ。コンティニューできないんだから」

    それでも%CALLNAME:MASTER%が胸に手を伸ばすと、%CALLNAME:人物_フラン%は小首を傾げた。

    「……面白いね、あなた。壊してほしいの？」

    %CALLNAME:人物_フラン%の言葉に悪意はない。ただ、純粋な疑問だった。

    「……まあ、いいのさ。しばらくは壊さないで遊んであげる」
  priority: 1
