character: レミリア
situation: K5_愛撫
entries:
- id: fallback
  content: >-
    「そんな玩具を使うの？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手にあるローターを見て、紅い瞳を輝かせた。

    「ふふ……いいわ、私を楽しませてちょうだい」

    小さな振動が肌に触れ、吸血鬼の身体が微かに震えた。

    「んっ……これ、面白いわね……」

    %CALLNAME:人物_レミリア%は恋人に身を預け、新たな刺激を受け入れていく。

    「もっと強くしてもいいのよ、%CALLNAME:MASTER%」

    「今日は違う刺激が欲しいのね」

    %CALLNAME:人物_レミリア%はローターを見て、期待に満ちた笑みを浮かべた。

    %CALLNAME:MASTER%が振動を始めると、吸血鬼は甘い声を漏らした。

    「あっ……ん……そこ、気持ちいい……」

    500年を生きた吸血鬼が、恋人の前で無防備に喘ぐ。

    「%CALLNAME:MASTER%……もっと、もっとちょうだい……」

    %CALLNAME:人物_レミリア%は紅い瞳を潤ませ、恋人を求めた。

    %CALLNAME:MASTER%がローターの振動を強めると、%CALLNAME:人物_レミリア%の身体が跳ねた。

    「ひゃっ……ぁ、あぁっ……！」

    吸血鬼は恋人にしがみつき、押し寄せる快楽に身を震わせた。

    「やぁ……そんな強く……んんっ……」

    %CALLNAME:人物_レミリア%のカリスマは、振動の前に崩れていく。

    「%CALLNAME:MASTER%……好きよ……止めないで……」

    紅魔館の主は、恋人の腕の中で甘く啼いた。

    「面白い玩具を持っているじゃない」

    %CALLNAME:人物_レミリア%は余裕の笑みでローターを見た。

    「さあ、私を満足させてみなさい」

    振動が敏感な場所に触れ、吸血鬼は息を呑んだ。

    「……っ、これは……んっ……予想以上ね……」

    %CALLNAME:人物_レミリア%は高慢な態度を崩し、快楽に溺れていった。

    「あぁ……%CALLNAME:MASTER%……もう、あなたなしでは……」
  priority: 4
- id: talent_3_1
  content: >-
    「変な物を持ってこないで」

    %CALLNAME:人物_レミリア%はローターを見て、頬を染めながら顔を背けた。

    だが、振動が肌に触れた瞬間、その強がりは崩れた。

    「っ……ん、あっ……」

    %CALLNAME:人物_レミリア%は唇を噛みしめ、声を抑えようとした。

    「べ、別に気持ちよくなんか……んんっ……」

    高貴な吸血鬼は、快感に抗いながらも身体を預けていた。

    「そんな玩具で、私をどうするつもり？」

    %CALLNAME:人物_レミリア%は睨みつけるように%CALLNAME:MASTER%を見た。

    しかしローターの振動が始まると、その表情は一変した。

    「ひっ……やっ……こんなの、知らない……」

    吸血鬼の小さな身体が、機械の振動に翻弄されていく。

    「……%CALLNAME:MASTER%のせいよ……こんな気持ちになるのは……」

    %CALLNAME:人物_レミリア%は恨めしそうに言いながらも、瞳は潤んでいた。

    「人間の玩具ね……興味深いわ」

    %CALLNAME:人物_レミリア%は傲慢な態度を取りながらも、好奇心を隠せなかった。

    振動が肌を這い、吸血鬼は思わず声を漏らした。

    「あっ……ん……これ、予想外に……」

    %CALLNAME:人物_レミリア%は動揺を隠せず、%CALLNAME:MASTER%にしがみついた。

    「……っ、もう……%CALLNAME:MASTER%の馬鹿……」

    照れ隠しの悪態も、甘い声に溶けていった。

    %CALLNAME:MASTER%がローターを見せると、%CALLNAME:人物_レミリア%は身構えた。

    「……また、そういうもので私を……」

    高貴な吸血鬼の仮面が剥がれていく。

    振動が秘部に触れ、%CALLNAME:人物_レミリア%は声を殺した。

    「んっ……ぁ……っ……！」

    必死に平静を装おうとするが、紅い瞳は既に蕩けていた。

    「……べ、別に……%CALLNAME:MASTER%だから許してるだけよ……」
  priority: 3
  condition:
    type: Talent
    talentType: 3
    threshold: 1
- id: fallback
  content: >-
    「それは何かしら？」

    %CALLNAME:人物_レミリア%はローターを怪訝そうに見つめた。

    「使用人が主にそんなものを使うの？　大胆ね」

    振動が肌に触れ、吸血鬼は小さく息を呑んだ。

    「……っ、ん……」

    %CALLNAME:人物_レミリア%は威厳を保とうとしながらも、頬が紅く染まっていく。

    「……まあ、今日のところは許してあげるわ」

    「ローターというのね……人間の発明は面白いわ」

    %CALLNAME:人物_レミリア%は興味深そうに首を傾げた。

    %CALLNAME:MASTER%が振動を始めると、吸血鬼は目を見開いた。

    「っ……！　これ、思ったより……」

    500年を生きた吸血鬼にも、この感覚は新鮮だった。

    「……ふ、ふん……悪くないわね……」

    %CALLNAME:人物_レミリア%は認めるように呟いた。

    「人間の発明品か……興味がないわけではないわね」

    %CALLNAME:人物_レミリア%はローターを観察するように見た。

    振動が身体に触れ、吸血鬼は小さく身じろぎした。

    「……ん……っ……」

    威厳を保とうとしながらも、その表情は微かに緩んでいた。

    「……%CALLNAME:MASTER%、続けても構わないわよ」

    紅魔館の主は、許可を与えるように言った。

    「それで私をどうするつもり？」

    %CALLNAME:人物_レミリア%は紅い瞳で%CALLNAME:MASTER%を見つめた。

    「度胸だけはあるわね、使用人」

    ローターの振動が肌を這い、吸血鬼は小さく震えた。

    「……っ、ん……これは……」

    %CALLNAME:人物_レミリア%は驚きを隠せず、%CALLNAME:MASTER%を見上げた。

    「……特別よ、あなただけ」
  priority: 2
- id: fallback
  content: >-
    「下賤な玩具を私に使うつもり？」

    %CALLNAME:人物_レミリア%は冷たい視線で%CALLNAME:MASTER%を見据えた。

    「使用人が主にそんなものを向けるなど、不敬よ」

    吸血鬼の威圧感が、%CALLNAME:MASTER%を押し返す。

    「500年を生きた私を、そんな玩具で楽しませられると思っているの？」

    %CALLNAME:人物_レミリア%は高飛車に言い放った。

    「……今回だけは見逃してあげるわ。次はないわよ」

    「……下品ね」

    %CALLNAME:人物_レミリア%はローターを見て、嫌悪感を露わにした。

    「そんな安っぽい道具で、私を喜ばせようというの？」

    吸血鬼は高飛車な態度を崩さなかった。

    「紅魔館の主を舐めているのかしら」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を値踏みするように見た。

    「咲夜を呼ぶ前に、下がりなさい」

    「玩具遊びがしたいの？」

    %CALLNAME:人物_レミリア%は嘲笑を浮かべた。

    「使用人の分際で、随分と図々しいわね」

    吸血鬼の紅い瞳が、危険に光る。

    「私はあなたの遊び相手ではないわよ」

    %CALLNAME:人物_レミリア%は氷のような声で言った。

    「分かったら、さっさと仕事に戻りなさい」

    「それを私に使うつもり？」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    「大胆というか、無礼というか……」

    吸血鬼は溜息をつき、%CALLNAME:MASTER%を睨みつけた。

    「私はこう見えても忙しいのよ」

    「用があるなら、咲夜を通しなさい」

    紅魔館の主は、%CALLNAME:MASTER%を追い払うような仕草をした。
  priority: 1
