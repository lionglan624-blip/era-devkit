- id: fallback
  content: >-
    「……自慰？　何を言っているの」

    %CALLNAME:TARGET%は本を置き、怪訝な顔で%CALLNAME:MASTER%を見た。

    「……まったく、理解できないわ」

    しかし、なぜか%CALLNAME:TARGET%は要求を完全には拒まなかった。

    「……見たいなら、勝手にすれば」

    素っ気なく言いながら、%CALLNAME:TARGET%はゆっくりと手を動かし始めた。

    「……こんなこと、なぜ私が……」

    %CALLNAME:TARGET%は不満げな表情を浮かべながらも、行為を続けている。

    「……ん……」

    小さく声が漏れ、%CALLNAME:TARGET%は慌てて口を押さえた。

    「……今の、聞かなかったことにして」

    %CALLNAME:TARGET%は顔を逸らし、恥ずかしさを隠そうとしている。

    「……これは、研究のためよ」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「……人体の反応を、観察するための……」

    指が動くにつれ、その言い訳も怪しくなってくる。

    「……あ……変な気分になってきたわ……」

    %CALLNAME:TARGET%は困惑した表情を浮かべた。

    「……」

    %CALLNAME:TARGET%は黙って自らを弄っている。

    視線は本に向けられているが、明らかに集中できていない。

    「……あなた、なぜ見ているの」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を睨んだ。

    「……見られていると、集中できないじゃない」
  priority: 2
- id: fallback
  content: >-
    「……何を言っているのかしら」

    %CALLNAME:TARGET%は冷ややかな目で%CALLNAME:MASTER%を見た。

    「自慰を見せろ？　頭がおかしくなったの？」

    %CALLNAME:TARGET%は本のページをめくりながら、無視を決め込んでいる。

    「精霊魔法で追い出されたくなければ、二度とそんなことを言わないで」

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついた。

    「私の図書館で、そんな破廉恥なことを言うなんて」

    %CALLNAME:TARGET%は呆れた表情を浮かべている。

    「あなたには教養というものが欠けているようね」

    「……出て行って」

    %CALLNAME:TARGET%は短く言い放った。

    「私は忙しいの。下らない要求に付き合っている暇はないわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を完全に無視し、魔導書に没頭し始めた。

    「……話しかけないで。集中できないから」

    「……むきゅー」

    %CALLNAME:TARGET%は不快そうに顔を顰めた。

    「あなた、私を何だと思っているの」

    「私は大図書館の主よ。そんな見世物じゃないわ」

    %CALLNAME:TARGET%は手元の魔導書を開き、%CALLNAME:MASTER%を視界から締め出した。
  priority: 1
