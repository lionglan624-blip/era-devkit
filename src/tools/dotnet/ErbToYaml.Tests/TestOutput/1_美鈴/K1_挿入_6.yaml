  content: >-
    「ん……%CALLNAME:MASTER%……後ろに、入れてもいい？」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の上に跨り、菊門に亀頭をあてがった。

    門番として鍛えた太ももが、しっかりと%CALLNAME:MASTER%の腰を挟む。

