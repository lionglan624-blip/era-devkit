- id: fallback
  content: >-
    「――ん？　……お茶ですか」

    %CALLNAME:人物_小悪魔%は少し警戒した様子で湯飲みを受け取った。

    「……いただきます」

    そう言って、様子を窺うようにお茶を啜る。

    「……普通に美味しいですね。ありがとうございます」

    %CALLNAME:人物_小悪魔%は事務的に礼を言った。

    「あ、どうも……」

    %CALLNAME:人物_小悪魔%は湯飲みを受け取り、ゆっくりとお茶を飲んだ。

    「……パチュリー様のお手伝い中でしたので、これは助かりますわ」

    %CALLNAME:人物_小悪魔%は丁寧だが、どこかよそよそしい口調でそう言った。

    「――お茶……ですか？」

    %CALLNAME:人物_小悪魔%は少し不審そうに湯飲みを見つめた。

    「何か入れたりしてないですよね？　悪魔は毒には強いですけど」

    %CALLNAME:人物_小悪魔%は一口飲んで、ほっとした様子を見せた。

    「……美味しいですわ。疑ってすみません」

    %CALLNAME:人物_小悪魔%は警戒を解いたものの、まだ距離を保っていた。

    「――ん、これは……お茶ですか」

    %CALLNAME:人物_小悪魔%は無表情で湯飲みを受け取った。

    「……どうも」

    静かにお茶を啜りながら、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%を観察している。

    「図書館に用がないなら、あまり長居しないでくださいね」

    %CALLNAME:人物_小悪魔%は丁寧だが、壁を感じさせる態度で言った。
  priority: 1
