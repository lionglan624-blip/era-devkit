character: フラン
situation: K6_挿入
entries:
- id: fallback
  content: >-
    「んっ……%CALLNAME:MASTER%……こうして繋がってると……」

    %CALLNAME:人物_フラン%は恋人の身体を両腕で抱きしめた。

    まるで宝物が壊れてしまわないか確かめるように、力加減に気を配りながら。

    「私、今すっごく幸せなのさ……」

    %CALLNAME:MASTER%が腰を動かすたび、%CALLNAME:人物_フラン%の瞳が潤んでいく。

    「壊さないでいられてる……%CALLNAME:MASTER%のこと、壊さないでいられてるよ……」

    495年の孤独を知る少女は、恋人との結合に涙を浮かべていた。

    「あぁ……%CALLNAME:MASTER%の顔、近いね……」

    %CALLNAME:人物_フラン%は正常位の体勢で恋人を見上げていた。

    その紅い瞳には、かつての狂気は影を潜めている。

    「こうやって見つめ合えるの……嬉しいのさ」

    %CALLNAME:MASTER%が奥まで突き入れると、%CALLNAME:人物_フラン%は甘い声を漏らした。

    「んぅ……もっと奥まで……%CALLNAME:MASTER%のこと、全部感じたいの」

    悪魔の妹は、恋人に身も心も委ねていた。

    「ふぁ……ん……%CALLNAME:MASTER%の体温、伝わってくる……」

    %CALLNAME:人物_フラン%は正面から抱かれながら、恋人の胸に顔を埋めた。

    地下室でひとりだった頃には、夢見ることさえできなかった温もり。

    「ねぇ、%CALLNAME:MASTER%……私のこと、ずっとこうしててくれる？」

    %CALLNAME:MASTER%の返事を待たず、%CALLNAME:人物_フラン%は自ら腰を揺らし始めた。

    「はぁ……ん……だって、気持ちいいんだもん……%CALLNAME:MASTER%といると……」

    その声には、愛しさと切なさが入り混じっていた。

    「%CALLNAME:MASTER%……私の中、どう……？」

    %CALLNAME:人物_フラン%は恥ずかしそうに、それでも真っ直ぐ恋人を見つめた。

    %CALLNAME:MASTER%が動くたび、二人の身体が密着する。

    「んっ……あぁ……こんなに近くにいるのに、もっと近づきたくなる……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の背中に爪を立てないよう、細心の注意を払いながら抱きついた。

    「私……%CALLNAME:MASTER%だけは絶対に壊さない……約束するから……」

    悪魔の妹は、恋人への誓いを胸に刻んでいた。
  priority: 4
- id: talent_3_1
  content: >-
    「えっ……こ、こうするの……？」

    %CALLNAME:人物_フラン%は驚いたように目を見開いた。

    正面から抱かれる姿勢に、顔を真っ赤に染めている。

    「……でも、嫌じゃないのさ。%CALLNAME:MASTER%なら」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_フラン%は小さく声を上げた。

    「あっ……ん……こんなの、初めて……」

    悪魔の妹は、未知の快感に身を震わせていた。

    「ひゃっ……%CALLNAME:MASTER%の顔、すっごく近い……」

    %CALLNAME:人物_フラン%は照れくさそうに視線を逸らした。

    しかし、すぐにまた%CALLNAME:MASTER%を見つめ直す。

    「……%CALLNAME:MASTER%の目、ちゃんと私だけを見てる？」

    %CALLNAME:MASTER%が奥まで挿入すると、%CALLNAME:人物_フラン%は息を詰まらせた。

    「んぅ……お、奥まで来てる……変な感じなのに、気持ちいい……」

    その言葉には、独占欲と歓びが滲んでいた。

    「ねぇ、%CALLNAME:MASTER%……これが、みんながする遊びなの？」

    %CALLNAME:人物_フラン%は純粋な疑問を口にした。

    しかし、その身体は既に快感に染まり始めている。

    「あ……んっ……思ってたより、ずっと気持ちいいのさ……」

    %CALLNAME:MASTER%の動きに合わせて、%CALLNAME:人物_フラン%は無意識に腰を揺らした。

    「……%CALLNAME:MASTER%とだけだよ？　こういうことするの」

    紅い瞳が、真剣な光を帯びていた。

    「あぁ……%CALLNAME:MASTER%……そこ……」

    %CALLNAME:人物_フラン%は快感に眉を寄せながら、%CALLNAME:MASTER%にしがみついた。

    壊してしまわないように、力加減を必死に抑えながら。

    「私、%CALLNAME:MASTER%のこと……好き、なのかな……」

    %CALLNAME:MASTER%が激しく突き上げると、%CALLNAME:人物_フラン%は言葉を失った。

    「んぅっ……！　や、やだ……頭、真っ白になりそう……」

    恋心と快楽に、悪魔の妹は翻弄されていた。
