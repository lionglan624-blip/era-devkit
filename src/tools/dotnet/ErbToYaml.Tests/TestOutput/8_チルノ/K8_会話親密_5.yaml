- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%にキスをした。

    「ふぇっ……！ キ、キスしたの……？」

    %CALLNAME:TARGET%は目を丸くして固まっている。

    「べ、別に嫌じゃないけど……こういうのって、どうすればいいのよ……」

    %CALLNAME:TARGET%は照れ隠しに髪をいじりながら、ちらちらとこちらを見ている。

    「……も、もう少しだけなら……いいわよ」

    「んっ……！」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の唇に軽くキスをした。

    %CALLNAME:TARGET%は固まったまま、%CALLNAME:MASTER%の顔を見つめている。

    「……い、いきなりすぎるのよ、馬鹿……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、小さな声で抗議した。

    「……次は、ちゃんと言ってからにしなさいよね……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の頬にそっと触れ、キスをした。

    「んっ……ふぁ……」

    %CALLNAME:TARGET%は驚きながらも、逃げずにじっとしている。

    「……な、なによ……あたいのキス、冷たかったでしょ……」

    %CALLNAME:TARGET%は照れ隠しなのか、そっぽを向いた。

    「……べ、別に嫌じゃないから……もう一回くらいなら……」

    「ん……」

    %CALLNAME:MASTER%が唇を重ねると、%CALLNAME:TARGET%はおとなしく受け入れた。

    冷たい唇が、ほんの少しだけ熱を持ったような気がする。

    「……ぷは……」

    %CALLNAME:TARGET%は頬を染めて、%CALLNAME:MASTER%を見上げている。

    「あたい……キスとか、よくわかんないけど……」

    「……%CALLNAME:MASTER%のは、そんなに嫌じゃなかったわ」
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%にキスをしようとした。

    「はぁ！？ な、なにすんのよ！ キスとか馬鹿じゃないの！？」

    %CALLNAME:TARGET%は冷気を纏いながら距離を取った。

    「あたいは最強なんだから、そんな隙なんて見せないわよ！」

    「……仲良くなってからにしなさいよね、まったく！」

    「んっ……！？」

    %CALLNAME:MASTER%が唇を近づけると、%CALLNAME:TARGET%は慌てて顔を背けた。

    「ちょ、ちょっと！ 何考えてんのよ！」

    %CALLNAME:TARGET%は顔を赤くしながらも、冷気を放っている。

    「あたいにキスしたいなら……も、もっとあたいのこと知ってからにしなさいよね！」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%に近づいた。

    「え、ちょ、なに……近い近い！」

    %CALLNAME:TARGET%は慌てて後ろに下がろうとしたが、壁に阻まれた。

    「あたいに何するつもりよ！ 最強の妖精をなめないでよね！」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、冷気で牽制している。

    「ひゃっ……！」

    %CALLNAME:MASTER%が唇を近づけると、%CALLNAME:TARGET%は素早く身をかわした。

    「い、いきなり何すんのよ！ あたいはそんな簡単に落ちないんだから！」

    %CALLNAME:TARGET%は腰に手を当て、胸を張って%CALLNAME:MASTER%を見据えている。

    「キスしたいなら……あたいを認めさせてからにしなさいよね！」
  priority: 1
