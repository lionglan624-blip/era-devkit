- id: fallback
  content: >-
    「え……えっと……それ、何に使うんですか……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したオナホールを不思議そうに見つめた。

    「……あ、あたしの……あそこに入れて……使う……？　ほ、本当ですか……？」

    おずおずと脚を開くと、オナホールが秘所に押し当てられる。

    「ひっ……！　ふぇっ……！？　な、何か……入ってきて……！」

    オナホールが膣内に挿入され、%CALLNAME:TARGET%は驚きのあまり体を強張らせた。

    「あ、あの……あたしの体……道具みたいに……初めてで……怖い……」

    「そ、それを……あたしの……あそこに……入れるんですか……？」

    %CALLNAME:TARGET%は不安そうに%CALLNAME:MASTER%を見上げた。

    「……%CALLNAME:MASTER%が言うなら……」

    覚悟を決めて目を閉じると、オナホールが膣内にゆっくりと挿入された。

    「んっ……！　ひぁっ……こ、これ……あたしの中が……使われて……！」

    初めての感覚に戸惑いながら、%CALLNAME:TARGET%は小さく震えていた。

    「……優しく……してくださいね……お願い……」

    「あの……そういう道具……あたし、苦手で……」

    %CALLNAME:TARGET%は怯えた目でオナホールを見つめている。

    しかし%CALLNAME:MASTER%に促され、渋々ながら体を預けた。

    「んぅ……っ……やっ……入って……あたしの中が……道具に……変な感じ……」

    オナホールに翻弄され、%CALLNAME:TARGET%の体が小刻みに震える。

    「あぅ……こうやって……使われるの……初めて……」

    妖精は困惑しながらも、%CALLNAME:MASTER%を信じて耐えていた。

    「……%CALLNAME:MASTER%には……あたしは逆らいません……」

    %CALLNAME:TARGET%は観念したように呟いて、オナホールを受け入れる体勢を取った。

    オナホールが膣内に挿入され、妖精の体が道具として準備される。

    「ふぁっ……んっ……！　こ、こんなの……初めて……」

    %CALLNAME:TARGET%は目を閉じて、未知の感覚に身を委ねている。

    「……%CALLNAME:MASTER%が……喜んでくれるなら……」

    小さな声でそう言って、妖精は健気に自分の体を捧げた。
  priority: 2
- id: fallback
  content: >-
    「いやです……そんなの、何に使うんですか……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したオナホールを見て、後ずさりした。

    「……えっ、あ、あたしの体に入れて……使う……？　いやっ……！」

    しかし逃げ場がなく、オナホールが秘所に押し当てられてしまう。

    「ひゃあっ……！？　やっ、やめて……入ってきて……あたしの体が……！」

    オナホールが膣内に挿入され、%CALLNAME:TARGET%は涙目になって%CALLNAME:MASTER%に懇願した。

    「……咲夜さん、助けて……あたしの体が……道具みたいに……」

    「な、何ですかそれ……近づけないでください……！」

    %CALLNAME:TARGET%は恐怖で体を強張らせている。

    「……そんなの……あたしの体に入れる……？　いや……！」

    しかし%CALLNAME:MASTER%に押さえつけられ、オナホールが膣内に挿入されてしまう。

    「やっ……んっ……！？　な、何これ……あたしの中が……使われて……！」

    %CALLNAME:TARGET%は初めての感覚にパニックになりながら、涙を溢れさせた。

    「お願い……抜いて……こんな風に……使わないで……」

    「……っ」

    %CALLNAME:TARGET%はオナホールを見て、言葉も出ないほど怯えていた。

    声を上げる間もなく、オナホールが膣内に挿入される。

    「ひぁっ……！　んっ……やっ……あたしの中が……道具に……！」

    妖精の小さな体が、道具として使われる羞恥に翻弄されている。

    「……どうして……あたしの体を……こんな風に……」

    %CALLNAME:TARGET%は理解できないまま、屈辱に震えていた。

    「あたし……何か悪いことしましたか……」

    %CALLNAME:TARGET%は泣きそうな顔で%CALLNAME:MASTER%を見上げた。

    「こんな……あたしの体を……道具みたいに……」

    オナホールが膣内に挿入され、妖精の体が大きく跳ねる。

    「んっ……あぁっ……！　あたしの中が……使われて……逃げられない……！」

    %CALLNAME:TARGET%は抵抗する力も失い、道具として蹂躙されている。

    「……もう……どうにでも、してください……」
  priority: 1
