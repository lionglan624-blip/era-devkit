- id: fallback
  content: >-
    「……これを……舌で……」

    %CALLNAME:TARGET%は興味深そうに%CALLNAME:MASTER%の後ろを見つめた。

    「……舐めてみるわ……研究として……」

    %CALLNAME:TARGET%は言い訳をしながら、おそるおそる舌を伸ばした。

    「……ん……独特の感触ね……」

    学者として観察しながら、%CALLNAME:TARGET%は舌を動かし始めた。

    「……ふむ……こうすると反応が変わるのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を観察しながら舌を動かしている。

    「……ちゅ……れろ……舐め方……変数が多いわ……」

    %CALLNAME:TARGET%は学者らしく分析していた。

    「……でも、なぜか胸が騒ぐの……これは何かしら……」

    自分の感情に戸惑いを覚えていた。

    「……あなたはこれで満足するの……？」

    %CALLNAME:TARGET%は疑問を口にしながら、舌を動かし続けている。

    「……こんな場所を舐めて……不思議ね……」

    %CALLNAME:TARGET%は首を傾げた。

    「……まあ、あなたがそう望むなら……続けるわ」

    淡々と、しかし確実に舌は動き続けていた。

    「……」

    %CALLNAME:TARGET%は黙々と舌を動かしていた。

    「……顎が疲れてきたわ……体が弱いのだから、仕方ないでしょう」

    %CALLNAME:TARGET%は少し休みながら言った。

    「……でも、約束したから……最後まで続けるわ」

    そう言って、%CALLNAME:TARGET%は再び舌を動かし始めた。
