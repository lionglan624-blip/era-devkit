    「……あの……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は不安そうな目で見上げてから、そっと胸に顔を埋めた。

    「……こうしてると……安心します……」

    妖精の唇が乳首を含み、ちゅぷちゅぷと吸い上げる音が響く。

    「んっ……%CALLNAME:MASTER%に甘えてるみたいで……嬉しいな……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の温もりに包まれて、少しずつ緊張が解けていった。

