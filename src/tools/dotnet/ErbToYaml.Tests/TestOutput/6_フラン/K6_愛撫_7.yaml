character: フラン
situation: K6_愛撫
entries:
- id: fallback
  content: >-
    「あっ……やぁ……乳首……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%に乳首を弄られ、甘い声を漏らした。

    495年間、誰にも触れられなかった敏感な蕾が、恋人の指に翻弄される。

    「んっ……%CALLNAME:MASTER%……そこ、すごく……気持ちいいのさ……」

    %CALLNAME:MASTER%が乳首を摘んで転がすと、%CALLNAME:人物_フラン%は背中を反らせた。

    「もっと……もっとしてほしいの……壊れちゃいそうなくらい……」

    悪魔の妹は、恋人の愛撫に蕩けるような表情を浮かべていた。

    「ひゃぁっ……！　つ、摘まないでぇ……」

    %CALLNAME:MASTER%が乳首をきゅっと摘むと、%CALLNAME:人物_フラン%は可愛らしい悲鳴を上げた。

    しかしその紅い瞳は、もっとしてほしいと訴えていた。

    「嘘……やめないで……%CALLNAME:MASTER%……」

    %CALLNAME:MASTER%が責めを続けると、%CALLNAME:人物_フラン%は身体を震わせた。

    「私の乳首……%CALLNAME:MASTER%のものなのさ……好きにしていいよ……」

    %CALLNAME:人物_フラン%は熱っぽい吐息を漏らしながら、恋人に身を委ねた。

    「んんっ……そこ……弱いって、知ってるくせに……」

    %CALLNAME:人物_フラン%は恥ずかしそうに%CALLNAME:MASTER%を見上げた。

    %CALLNAME:MASTER%が指先で乳首を弾くと、%CALLNAME:人物_フラン%は甲高い声を上げた。

    「やぁっ！　……はぁ、はぁ……意地悪……」

    地下に閉じ込められていた頃には知らなかった、甘い痺れが全身を駆け抜ける。

    「……でも、%CALLNAME:MASTER%になら……いじめられてもいいのさ……」

    %CALLNAME:人物_フラン%は蕩けた笑顔で、恋人に微笑みかけた。

    「あ……あぁ……乳首だけで……こんなに……」

    %CALLNAME:MASTER%が両の乳首を同時に責めると、%CALLNAME:人物_フラン%は快楽に溺れた。

    「すごい……すごいのさ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_フラン%は涙目になりながらも、幸せそうに微笑んでいた。

    「私……壊すことしか知らなかったのに……こんなに気持ちよくしてもらえるなんて……」

    %CALLNAME:MASTER%の愛撫に身を任せながら、%CALLNAME:人物_フラン%は小さく呟いた。

    「……%CALLNAME:MASTER%のこと、大好きなのさ……」
  priority: 4
- id: talent_3_1
  content: >-
    「ひゃっ……！　ち、乳首……？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%に乳首を触られ、顔を真っ赤にした。

    「そ、そんなとこ……触らないでよぅ……」

    戸惑いながらも、%CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手を払いのけようとはしなかった。

    「……っ、あ……なんか……変な感じ……」

    %CALLNAME:MASTER%の指が乳首を転がすと、%CALLNAME:人物_フラン%は小さく身を震わせた。

    「……%CALLNAME:MASTER%には……触られても……嫌じゃないのさ……」

    「やっ……あっ……そこ、敏感なの……」

    %CALLNAME:人物_フラン%は乳首を弄られ、可愛らしい声を漏らした。

    「こんなこと……したことないのさ……」

    %CALLNAME:MASTER%が乳首を摘むと、%CALLNAME:人物_フラン%は目を潤ませた。

    「んっ……やぁっ……もう……%CALLNAME:MASTER%の意地悪……」

    恥ずかしそうにしながらも、%CALLNAME:人物_フラン%は逃げようとしなかった。

    「……でも、やめないで……もうちょっと……」

    「あ……そこ……くすぐったい……」

    %CALLNAME:MASTER%が乳首を指先で弾くと、%CALLNAME:人物_フラン%は身を捩った。

    「んっ……なんだろう、この感じ……気持ちいいのかな……」

    %CALLNAME:人物_フラン%は自分の身体の反応を不思議そうに見つめた。

    「……%CALLNAME:MASTER%に触られると、身体が熱くなるのさ……」

    %CALLNAME:人物_フラン%は頬を染めながら、%CALLNAME:MASTER%を見上げた。

    「……これって、普通のこと……？」

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手を、そっと自分の胸に導いた。

    「乳首……触って……いいよ。%CALLNAME:MASTER%になら……」

    %CALLNAME:MASTER%の指が乳首に触れると、%CALLNAME:人物_フラン%は熱い吐息を漏らした。

    「あっ……んっ……やっぱり、変な感じするのさ……」

    %CALLNAME:人物_フラン%は恥ずかしそうに、でも嬉しそうに微笑んだ。

    「……%CALLNAME:MASTER%のこと……好きだから……触らせてあげるの……」
