character: 子悪魔
situation: K7_愛撫
entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%がピンク色の玩具を取り出すと、%CALLNAME:TARGET%は見覚えのある道具に目を輝かせた。

    「あっ……それ、知ってるの……ぶるぶるってするやつ……」

    %CALLNAME:TARGET%は自分から脚を開いて、受け入れる体勢になる。

    ローターが秘所に押し当てられた瞬間、妖精の体がびくんと跳ねた。

    「んっ……ふぁっ……やぁ……すごい、気持ちいいの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみつきながら、甘い声を漏らしている。

    「……えへへ……%CALLNAME:MASTER%と一緒だと……怖くないの……」

    「あっ……それ、前に使ったやつですよね……！」

    %CALLNAME:TARGET%は嬉しそうにローターを見つめた。

    「また使ってくれるんですか……？　あたし、あれ好きなの……」

    ローターが秘所に触れると、妖精の体が甘く震え始める。

    「んぅ……あぁっ……振動が……体の奥まで響いてくる……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋めながら快楽に浸っている。

    「……もっと……いっぱい、して……」

    「あれ、使ってくれますか……？　嬉しいの……」

    %CALLNAME:TARGET%は自分から腰を浮かせて、ローターを迎え入れる姿勢を取った。

    ローターの振動が秘所に伝わり、妖精の息が荒くなる。

    「ひゃっ……んっ……あっ……すごいの……体がとろけちゃう……」

    %CALLNAME:TARGET%は幸せそうな表情で、快楽に身を任せている。

    「%CALLNAME:MASTER%……あたし、%CALLNAME:MASTER%のこと……大好き……」

    言葉の途中で甘い喘ぎが漏れ、妖精は蕩けた顔になった。

    「今日も、いっぱい、感じさせてくれますか……？」

    %CALLNAME:TARGET%は期待に満ちた瞳で%CALLNAME:MASTER%を見上げた。

    ローターが押し当てられると、妖精の体がとろんと力を失う。

    「あっ……んあっ……そこ、そこがいいの……」

    %CALLNAME:TARGET%は自分から腰を動かし、振動をより深く感じようとしている。

    「あたし……%CALLNAME:MASTER%のものだから……全部、受け止めるの……」

    妖精は蕩けた表情で、%CALLNAME:MASTER%に全てを委ねていた。
  priority: 4
- id: talent_3_1
  content: >-
    「えっ……そ、それ、なんですか……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出した小さなローターを見て、顔を赤くした。

    「こ、こういうの……使うんですか……？　恥ずかしい……」

    しかし逃げることはせず、おずおずと脚を開く。

    ローターが秘所に触れた瞬間、%CALLNAME:TARGET%は小さな悲鳴を上げた。

    「ひゃあっ……！　あっ、んっ……ぶ、ぶるぶるしてる……っ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕を掴みながら、快楽に耐えている。

    「あの……それって……怖くないですか……？」

    %CALLNAME:TARGET%は不安げにローターを見つめている。

    「動いてる……音も出てる……」

    しかし%CALLNAME:MASTER%を信じて、身を任せた。

    「んっ……あぁっ……！　つ、強い……体が、変になっちゃう……」

    妖精の体がローターの振動に合わせてぴくぴくと震えている。

    「……%CALLNAME:MASTER%が……こうしたいなら……あたし、我慢するから……」

    「ま、また、それ使うの……？」

    %CALLNAME:TARGET%は恥ずかしそうに視線を逸らしながら、スカートを捲り上げた。

    ローターが秘所に押し当てられると、妖精は声を押し殺して耐えようとした。

    「んぅ……っ……だ、ダメ……声、出ちゃう……」

    しかし堪えきれず、甘い声が漏れてしまう。

    「あっ……やっ……%CALLNAME:MASTER%、見ないで……こんな顔……」

    %CALLNAME:TARGET%は片手で顔を覆いながら、腰を小さく揺らしていた。

    「……こういうの、緊張しちゃいます……」

    %CALLNAME:TARGET%は緊張した面持ちで、ローターが近づくのを待っている。

    振動が始まると、妖精の目がとろんと蕩けていった。

    「ふぁっ……んっ……あぁっ……体の奥が、きゅんってする……」

    %CALLNAME:TARGET%は自分でも驚くほど大きな声を上げてしまい、慌てて口を押さえた。

    「ご、ごめんなさい……変な声……でも、止められないの……」

    妖精は羞恥に染まりながらも、%CALLNAME:MASTER%の愛撫を受け入れていた。
