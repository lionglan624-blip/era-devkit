entries:
- id: fallback
  content: >-
    「ねえ%CALLNAME:MASTER%、後ろから抱きしめられてるの……なんかいいね」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の膝の上に背を向けて座っている。

    %CALLNAME:MASTER%が後ろから腕を回すと、%CALLNAME:人物_チルノ%は小さく身じろぎした。

    「んっ……入ってきた……あったかい……」

    氷の妖精は%CALLNAME:MASTER%の体温を背中越しに感じている。

    「こうしてると……%CALLNAME:MASTER%に包まれてる感じ……えへへ」

    %CALLNAME:人物_チルノ%は安心したように%CALLNAME:MASTER%に体を預けた。

    「%CALLNAME:MASTER%、あたいの胸触れるでしょ、この体勢」

    %CALLNAME:人物_チルノ%は背中を%CALLNAME:MASTER%に預けたまま、振り向いてくる。

    「後ろからされるの……嫌いじゃないかも……」

    %CALLNAME:MASTER%が動くと、%CALLNAME:人物_チルノ%の体が小刻みに揺れる。

    「んっ……はぁ……%CALLNAME:MASTER%の心臓の音、背中から聞こえる……」

    %CALLNAME:人物_チルノ%は嬉しそうに目を細めた。

    「えへへ……顔見えないから、恥ずかしくないね」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に背中を預け、リラックスしている。

    「あっ……奥まで……こうすると深いね……」

    %CALLNAME:MASTER%が胸に手を当てると、%CALLNAME:人物_チルノ%は小さく声を上げた。

    「んっ……あ……%CALLNAME:MASTER%に独り占めされてる……」

    %CALLNAME:人物_チルノ%は気持ちよさそうに%CALLNAME:MASTER%の腕の中で揺れている。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は後ろを振り向き、潤んだ瞳で%CALLNAME:MASTER%を見上げた。

    「後ろから抱きしめられてると……守られてる感じがする」

    %CALLNAME:人物_チルノ%の冷たいはずの体が、今は熱を帯びている。

    「んっ……はぁ……ずっと、こうしてたい……」

    そう言って、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の腕に自分の手を重ねた。
