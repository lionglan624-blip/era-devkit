- id: fallback
  content: >-
    「……これも……お客様へのサービスですわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に覆いかぶさりながら、事務的に呟いた。

    「メイドとして……ご要望にお応えするのは当然のこと……」

    しかし、%CALLNAME:MASTER%の中に入った瞬間、表情が揺らいだ。

    「っ……あ……%CALLNAME:MASTER%の中……」

    「……少し……気持ちいいですわ……」

    %CALLNAME:TARGET%は何とか平静を保とうとしていた。

    「……ん……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は複雑な表情で%CALLNAME:MASTER%の上で腰を動かしている。

    「このように……上から抱くのは……メイドとしては本来……」

    「でも……お客様のご要望ですから……」

    奥まで入ると、思わず声が漏れてしまう。

    「あっ……締まって……」

    言葉を途中で飲み込み、%CALLNAME:TARGET%は唇を噛んだ。

    「……これは……仕事……ですから……」

    %CALLNAME:TARGET%は何度も自分に言い聞かせながら%CALLNAME:MASTER%を抱いている。

    しかし、体は主導権を握る快感を覚え始めていた。

    「……ぅ……変な気分になってきましたわ……」

    「%CALLNAME:MASTER%のせいですからね……」

    %CALLNAME:TARGET%は責任を押し付けながらも、腰を深く沈めていく。

    「……もう少し……続けても構いませんわ……」

    「……っ……」

    %CALLNAME:TARGET%は声を堪えようとしたが、%CALLNAME:MASTER%の反応を見るたびに漏れてしまう。

    「……プロとして……こんな積極的になるべきではないのに……」

    「%CALLNAME:MASTER%、貴方は……私を困らせてばかりですわね……」

    恨めしそうに言いながらも、%CALLNAME:TARGET%の腰は止まらない。

    「……でも……嫌ではありませんの……」

    小さな声で認めながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を抱き続けた。
