    「……ん、れろ……なんか、ぬるっとしたの出てきた……」

    %CALLNAME:人物_美鈴%は先走りに驚いた顔をした。

    「……これって……気持ちいい、ってことですか……？」

    「……一回だけ……ですからね……？」

    %CALLNAME:人物_美鈴%はそう言いながら、一物に顔を寄せた。

    「……誰かに見られたら困りますし……」

    周囲を気にしながら、%CALLNAME:人物_美鈴%は先端を口に含んだ。

    「……あむ……んっ……思ったより、大きい……」

    %CALLNAME:人物_美鈴%は頬を膨らませながら、懸命に舌を動かした。

    「……じゅる……ほ、本当に一回だけですからね……」
