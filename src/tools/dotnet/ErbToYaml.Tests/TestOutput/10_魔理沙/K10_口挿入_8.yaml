- id: fallback
  content: >-
    「え、えっと……こういうの、初めてなんだが……」

    %CALLNAME:人物_魔理沙%は戸惑いながら、%CALLNAME:MASTER%の股間に顔を近づけた。

    「……本で読んだことはあるけど、実際にやるのは……」

    %CALLNAME:人物_魔理沙%はおそるおそる舌を伸ばし、その感触に驚いた。

    「うわっ……こういう味なのか……」

    %CALLNAME:人物_魔理沙%は興味深そうに、ゆっくりと舌を動かし始めた。

    「こうか……？　合ってるのか……？」

    %CALLNAME:人物_魔理沙%は不安そうに%CALLNAME:MASTER%の顔を窺った。

    「痛かったら言えよな……加減がよくわからないんだ」

    %CALLNAME:人物_魔理沙%の舌使いはぎこちないが、真剣だった。

    「……なるほど、ここを舐めると反応するのか……」

    %CALLNAME:人物_魔理沙%は魔法の実験のように、興味津々で舌を動かした。

    「ふーん……こういう味なんだな」

    %CALLNAME:人物_魔理沙%は知的好奇心から、舌の動かし方を工夫した。

    「舐めてると、なんか濡れてくるんだな……体って不思議だぜ」

    %CALLNAME:人物_魔理沙%は奉仕しながら、%CALLNAME:MASTER%の反応を見ていた。

    「……なんか、こうしてると私も変な気分になってくるな……」

    %CALLNAME:人物_魔理沙%は自分の体の反応に戸惑っていた。

    「……%CALLNAME:MASTER%、これで合ってるのか？」

    %CALLNAME:人物_魔理沙%は真剣な表情で顔を上げた。

    「私、こういうの初めてだから……ちゃんと教えてくれよ」

    %CALLNAME:MASTER%が頭を撫でて教えると、%CALLNAME:人物_魔理沙%は素直に従った。

    「なるほど……こうやって舌を動かすのか……」

    %CALLNAME:人物_魔理沙%は教わった通りに奉仕し、真剣に練習していた。
