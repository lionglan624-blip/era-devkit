- id: talent_3_1
  content: >-
    「ふぇ……こんな体勢で……なんか、はずかしい……」

    %CALLNAME:TARGET%は四つん這いになりながら、戸惑いの表情を浮かべている。

    しかし悪魔の本能は正直で、体は%CALLNAME:MASTER%を求め始めていた。

    「でも……%CALLNAME:MASTER%となら……いい、かも……」

    %CALLNAME:TARGET%は恥じらいながらも、%CALLNAME:MASTER%を受け入れた。

    「んっ……あたし、なんで……こんなにどきどきするの……？」

    芽生えた感情と本能が混ざり合い、%CALLNAME:TARGET%は困惑していた。

    「あっ……%CALLNAME:MASTER%の、うしろから……きてる……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を受け入れ、小さな声を漏らした。

    四つん這いの姿勢で、悪魔の少女は恥じらいを感じていた。

    「これ……けものみたい……でも……きらいじゃない……」

    %CALLNAME:TARGET%は複雑な表情で呟いた。

    「%CALLNAME:MASTER%……もっと、ちかくにきて……？」

    不安と期待が入り混じった声で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を求めた。

    「んぅ……この体勢……%CALLNAME:MASTER%の顔、見えない……」

    %CALLNAME:TARGET%は少し寂しそうに振り返った。

    しかし体は本能に従い、%CALLNAME:MASTER%を締め付けている。

    「あたし……%CALLNAME:MASTER%のこと、もっと見たいのに……」

    %CALLNAME:TARGET%は困ったように呟いた。

    「……でも、きもちいいから……いいの……」

    感情と快楽の狭間で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を受け止めていた。

    「はぁ……ふぁ……%CALLNAME:MASTER%、うしろから……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに合わせて腰を揺らしている。

    悪魔の本能が快楽を貪りながらも、心のどこかで別の感情が芽生えていた。

    「あたし……%CALLNAME:MASTER%と、つながってると……しあわせ……」

    %CALLNAME:TARGET%は自分でも驚いたように呟いた。

    「……えへへ、なんか、へんなこと言った……」

    照れ隠しのように笑いながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%に身を委ねた。
