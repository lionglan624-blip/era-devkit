  content: >-
    「……」

    %CALLNAME:TARGET%は二人に犯されながらも、無表情を保とうとしている。

    「前と後ろを……同時に……これ以上の屈辱はありませんわ」

    瀟洒なメイドは、感情を押し殺して耐えている。

    「……っ……」

