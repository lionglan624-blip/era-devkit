- id: fallback
  content: >-
    「はぁ!?　なにこれ、変なの!」

    %CALLNAME:TARGET%はニプルキャップを見て露骨に嫌そうな顔をした。

    「乳首に付ける?　ふざけんじゃないわよ!」

    威勢よく拒否の姿勢を見せる。

    「最強のあたいにそんな変なことする気!?　許さないんだから!」

    氷の妖精は不機嫌そうに翅をばたつかせた。

    「どっか行きなさいよ、変態!」

    「ちょっ、何すんのよ!」

    強引に進められ、%CALLNAME:TARGET%は悲鳴を上げた。

    「いやっ、挟まれ……て……冷たっ……気持ち悪い!」

    嫌悪感を露わにしながら、%CALLNAME:TARGET%はもがいた。

    「こんなの最強のあたいに対する侮辱よ!」

    抵抗しながらも、どうにもできない悔しさが滲んでいる。

    「絶対許さないんだから……覚えてなさいよ!」

    「またそれ!?　いい加減にしなさいよ!」

    %CALLNAME:TARGET%は嫌そうにニプルキャップを睨んだ。

    「あんた、本当に変態よね……最低……」

    心底嫌そうな表情を浮かべている。

    「……さっさと終わらせなさいよ、気分悪いんだから」

    渋々ながらも、%CALLNAME:TARGET%は耐えることを選んだ。

    「最強のあたいを、こんな風に……絶対覚えてるから」

    「……またこれ?　飽きないの、あんた?」

    %CALLNAME:TARGET%は呆れと諦めの表情を見せた。

    「本当にどうしようもない変態ね、あんた」

    文句を言いながらも、抵抗する気力が薄れているようだ。

    「……好きにすればいいわよ、もう……」

    無気力にそう言いながら、%CALLNAME:TARGET%はため息をついた。

    「最強のあたいが、なんでこんな目に遭わなきゃなんないのよ……」
  priority: 1
