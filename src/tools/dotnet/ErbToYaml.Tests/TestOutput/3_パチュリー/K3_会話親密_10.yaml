entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%の手が%CALLNAME:人物_パチュリー%の胸に触れた。

    「ん……あなたの手、暖かいわね……」

    %CALLNAME:人物_パチュリー%は読みかけの本を閉じ、静かに身を預けている。

    「んっ……ふぅ……」

    %CALLNAME:MASTER%が優しく胸を揉むと、%CALLNAME:人物_パチュリー%は小さく息を漏らした。

    「……不思議ね。あなたに触れられると、体が熱くなるの」

    %CALLNAME:人物_パチュリー%は頬を染めながら、%CALLNAME:MASTER%の目を見つめた。

    「……もう少し、このままでいさせて」

    大図書館の静寂の中、%CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の胸に手を伸ばした。

    「あ……んっ……」

    %CALLNAME:人物_パチュリー%は目を閉じ、%CALLNAME:MASTER%の愛撫を受け入れている。

    「はぁ……そこ……感じるわ……」

    %CALLNAME:人物_パチュリー%は甘い吐息を漏らしながら、%CALLNAME:MASTER%に寄りかかった。

    「……本より、あなたの手の方が……今は、心地いいの」

    %CALLNAME:人物_パチュリー%は恥ずかしそうに呟いた。

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の手を自らの胸に導いた。

    「……触って。今日は、あなたに触れられたい気分なの」

    %CALLNAME:MASTER%がそっと胸を包み込むと、%CALLNAME:人物_パチュリー%は瞳を潤ませた。

    「んぅ……ふ……あ……」

    %CALLNAME:人物_パチュリー%は身を震わせながら、快感に酔いしれている。

    「あなたの魔法……私を溶かすのね……」

    「……むきゅ……もっと……」

    %CALLNAME:人物_パチュリー%は珍しく甘えた声を出した。

    %CALLNAME:MASTER%の指が%CALLNAME:人物_パチュリー%の胸をなぞった。

    「ひっ……ん……」

    %CALLNAME:人物_パチュリー%は小さく声を上げ、体を震わせた。

    「……あなたといると、私の体は正直になるわ」

    「ふぁ……んっ……敏感なところ、分かってるのね……」

    %CALLNAME:人物_パチュリー%は頬を赤らめ、甘い表情で%CALLNAME:MASTER%を見上げた。

    「……魔法の研究より、あなたに触れられる時間の方が好きよ」

    %CALLNAME:人物_パチュリー%はそっと%CALLNAME:MASTER%の手を握った。
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の胸に手を置いた。

    「ひゃっ……ちょ、ちょっと……」

    %CALLNAME:人物_パチュリー%は驚きながらも、%CALLNAME:MASTER%の手を払いのけなかった。

    「んっ……そんなところ……」

    %CALLNAME:人物_パチュリー%は恥ずかしそうに目を逸らしながら、されるがままになっている。

    「……本には書いてない感覚ね……これが……」

    %CALLNAME:人物_パチュリー%は頬を染めながら、小さく呟いた。

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%の胸に触れると、

    彼女は思わず本を落としそうになった。

    「あっ……何を……」

    %CALLNAME:人物_パチュリー%は抗議しようとしたが、言葉が途切れた。

    「んぅ……ふ……」

    %CALLNAME:人物_パチュリー%は戸惑いながらも、%CALLNAME:MASTER%の手の動きに体を委ねている。

    「……あなたに触れられると……頭が働かなくなるわ……」

    %CALLNAME:人物_パチュリー%の胸に%CALLNAME:MASTER%の手が触れた。

    「むきゅっ……！」

    %CALLNAME:人物_パチュリー%は驚きの声を上げ、顔を真っ赤にした。

    「そ、そんな……急に触らないで……」

    しかし%CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の手を払おうとはしなかった。

    「……あなただから……少しだけ……許してあげるわ……」

    %CALLNAME:人物_パチュリー%は恥ずかしそうに俯いた。

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%に近づき、胸に手を添えた。

    「ん……あ……」

    %CALLNAME:人物_パチュリー%は小さく息を呑み、体を硬くした。

    「……こういうこと……慣れていないのよ……」

    %CALLNAME:人物_パチュリー%は上気した顔で%CALLNAME:MASTER%を見上げた。

    「でも……あなたになら……嫌ではないわ……」

    %CALLNAME:人物_パチュリー%の心臓が激しく鳴っているのが伝わってきた。
