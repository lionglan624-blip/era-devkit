- id: fallback
  content: >-
    「なにそれ?　おもちゃ?」

    %CALLNAME:TARGET%は見慣れない器具を不思議そうに見つめた。

    「へぇ、%CALLNAME:MASTER%のを入れるの?　変なの」

    好奇心は隠せないが、戸惑いも見える。

    「……あたいがやるの?　ふーん……」

    %CALLNAME:TARGET%は偉そうに言いながら、器具を手に取った。

    「最強のあたいなら、何でもできるわよ」

    「こう……すればいいの……?」

    %CALLNAME:TARGET%は困惑しながら、オナホールを動かした。

    「なんか変な感じ……ぬるぬるしてる……」

    初めての体験に、表情がくるくると変わる。

    「……%CALLNAME:MASTER%、変な顔してる」

    %CALLNAME:TARGET%は不思議そうに首を傾げた。

    「これ、気持ちいいやつなの……?」

    「ねぇ、これって何に使うの?」

    %CALLNAME:TARGET%は怪訝そうにオナホールを眺めた。

    「え、あたいにやれって?　……しょうがないわね」

    渋々ながらも器具を手に取る。

    「……動かすの?　こうかな……」

    見様見真似で動かしながら、%CALLNAME:TARGET%は困惑していた。

    「あたいは最強だけど、こういうのは……よくわかんない」

    「あ、またこれ?　この前もやったやつでしょ」

    %CALLNAME:TARGET%は覚えているらしく、器具を見つめた。

    「……%CALLNAME:MASTER%、好きなの?　こういうの」

    少し慣れた手つきで動かし始める。

    「あたいがやってあげてるんだから、感謝しなさいよ」

    偉そうに言いながらも、%CALLNAME:TARGET%は真剣に奉仕した。

    「……なんか、%CALLNAME:MASTER%が気持ちよさそうだと……変な気分」
  priority: 2
- id: fallback
  content: >-
    「何それ、気持ち悪いわね」

    %CALLNAME:TARGET%は嫌悪感を隠さずにオナホールを見つめた。

    「あたいにそんなの使わせる気?　冗談じゃないわよ」

    威勢よく言い放ちながら、%CALLNAME:TARGET%は腕を組んだ。

    「最強のあたいがそんなことするわけないでしょ!」

    明らかに不機嫌そうに、%CALLNAME:TARGET%は顔をしかめた。

    「どっか他所でやりなさいよね!」

    「はぁ!?　なんであたいがそんなことしなきゃいけないの!」

    %CALLNAME:TARGET%は抗議の声を上げた。

    「変態じゃないの、あんた!」

    不満げに翅をぱたつかせている。

    「最強のあたいに、こんな変なことさせるなんて……」

    %CALLNAME:TARGET%は文句を言いながらも、しぶしぶ器具を手に取った。

    「……さっさと終わらせなさいよね!」

    「これって何なのよ、気持ち悪い……」

    %CALLNAME:TARGET%はオナホールを胡散臭げに見つめた。

    「あたいにこれで何しろっていうの……」

    説明を聞いて、さらに顔をしかめる。

    「……はぁ、しょうがないわね、やってあげるわよ」

    渋々動かしながらも、%CALLNAME:TARGET%は明らかに不本意だった。

    「あんたって本当に変なのね」

    「また!?　またこれやれっての!?」

    %CALLNAME:TARGET%は呆れた顔で言った。

    「あんた、本当に変なのに執着するわね」

    文句を言いながらも、器具を手に取る。

    「……さっさと終わらせるから、じっとしてなさい」

    乱暴な手つきで動かしながら、%CALLNAME:TARGET%は溜息をついた。

    「最強のあたいを、こんなことに使うなんて……」
  priority: 1
