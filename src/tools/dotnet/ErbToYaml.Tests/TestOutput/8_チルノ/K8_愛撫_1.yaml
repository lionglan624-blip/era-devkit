character: チルノ
situation: K8_愛撫
entries:
- id: fallback
  content: >-
    「ひゃっ……！　あ、あたいのそこ、舐めるの……？」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の舌が秘所に触れると、小さな体をぴくりと震わせた。

    %CALLNAME:MASTER%の舌が冷たい肌を這うたびに、氷の妖精とは思えない熱が生まれる。

    「んっ……やぁ……なにこれ、あったかい……」

    %CALLNAME:人物_チルノ%は困惑しながらも、気持ちよさに身を委ねていく。

    「……%CALLNAME:MASTER%、もっとして……あたいのこと、もっと好きにして……」

    甘えるように、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の頭を抱え込んだ。

    「えへへ……%CALLNAME:MASTER%、あたいのこと、そんなに好き？」

    %CALLNAME:人物_チルノ%は嬉しそうに笑いながら、%CALLNAME:MASTER%を見下ろしている。

    %CALLNAME:MASTER%が舌で敏感な場所を探り当てると、

    「ふぁっ！　そ、そこっ……すごいっ……」

    %CALLNAME:人物_チルノ%の腰が跳ね、冷気が辺りに漂う。

    「……あたい、溶けちゃいそう……%CALLNAME:MASTER%のせいだからね……」

    氷の妖精が恋人に溶かされていく。%CALLNAME:人物_チルノ%は幸せそうに微笑んだ。

    「ん……%CALLNAME:MASTER%の舌、気持ちいい……」

    %CALLNAME:人物_チルノ%はとろんとした表情で、恋人の愛撫を受け入れている。

    普段の威勢の良さはどこへやら、今はただ愛される喜びに浸っていた。

    「……もっと、奥まで……あたいの全部、%CALLNAME:MASTER%のものだから……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに、でも幸せそうにそう囁いた。

    「……大好き……あたい、%CALLNAME:MASTER%のこと大好き……」

    愛の言葉とともに、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に全てを委ねた。

    「やぁ……そんなに見つめないでよぉ……」

    %CALLNAME:人物_チルノ%は顔を真っ赤にして、両手で顔を覆った。

    しかし%CALLNAME:MASTER%の舌が秘所を這うと、すぐに声が漏れてしまう。

    「あっ……ん……っ、だめ……声、出ちゃう……」

    %CALLNAME:人物_チルノ%は必死に喘ぎ声を堪えようとしている。

    「……%CALLNAME:MASTER%ばか……あたいをこんなにしちゃって……」

    恨めしそうに、でも愛おしそうに、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%を見つめた。
