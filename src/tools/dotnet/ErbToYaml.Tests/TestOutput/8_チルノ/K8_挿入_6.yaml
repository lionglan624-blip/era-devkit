character: チルノ
situation: K8_挿入
entries:
- id: fallback
  content: >-
    「えへへ、あたいのお尻でも上に乗っちゃうね、%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は嬉しそうに%CALLNAME:MASTER%の上に跨り、お尻の穴を当てた。

    ゆっくりと腰を落とすと、菊穴に%CALLNAME:MASTER%が入っていく。

    「んっ……きつい……でも、こうしてると%CALLNAME:MASTER%を独り占めできる……」

    %CALLNAME:人物_チルノ%の菊穴はぎゅうと%CALLNAME:MASTER%を締め付けてくる。

    「あたいのお尻も……%CALLNAME:MASTER%だけのものだからね」

    「今日はお尻であたいがリードするから、%CALLNAME:MASTER%は動かないでね」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の胸に手を置いて、腰を上下させている。

    菊穴が%CALLNAME:MASTER%を締め付けながら、小さな体が動くたびに繋がりが深くなる。

    「はぁっ……ん……後ろの穴でも気持ちいい……変だね……」

    氷の妖精の腸壁は熱を帯び、%CALLNAME:MASTER%を包み込んでいた。

    「あたいの全部……%CALLNAME:MASTER%にあげるから……えへへ」

    「ねえ%CALLNAME:MASTER%、お尻でも気持ちいい？　あたいが頑張ってるんだよ」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%を見下ろしながら問いかけた。

    騎乗位で菊穴に%CALLNAME:MASTER%を迎え入れながら、自らペースを調整している。

    「んあっ……あ……この穴だと奥が違う感じ……っ」

    %CALLNAME:人物_チルノ%は甘い声を漏らしながら、さらに腰を揺らした。

    「あたいが一番でしょ……お尻でもこんなにできるんだから」

    「……%CALLNAME:MASTER%、こうやってお尻で繋がってると、なんか特別な感じ」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上に跨ったまま、少し照れた顔をした。

    ゆっくりと腰を揺らしながら、菊穴で%CALLNAME:MASTER%を感じている。

    「んっ……はぁ……きついけど……%CALLNAME:MASTER%と繋がってる……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の胸に倒れ込み、甘えるように動き続けた。

    「好き……お尻までちゃんと%CALLNAME:MASTER%のものにしてね……」
  priority: 4
- id: talent_3_1
  content: >-
    「べ、別にお尻で上に乗りたかったわけじゃないし……」

    %CALLNAME:人物_チルノ%は真っ赤な顔で%CALLNAME:MASTER%の上に跨り、菊穴を当てた。

    ゆっくりと腰を落とすと、きつい穴に%CALLNAME:MASTER%が入っていく。

    「んっ……こ、こうすればお尻でも自分のペースでできるから……それだけよ……」

    %CALLNAME:人物_チルノ%の菊穴はぎゅうと%CALLNAME:MASTER%を締め付けた。

    「……見ないでよ、お尻なんて恥ずかしいんだから……」

    「ちょ……お尻でこの体勢って、恥ずかしすぎなんだけど……！」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上に跨り、顔を真っ赤にしていた。

    しかし菊穴は%CALLNAME:MASTER%を締め付けながら、ゆっくりと上下している。

    「んあっ……っ、お尻で自分から動くなんて……変な感じ……っ」

    %CALLNAME:人物_チルノ%は恥ずかしさを隠すように目を閉じた。

    「……っ、笑ったら凍らせるからね……お尻でこんなことしてるの……」

    「はぁっ……あ……お尻だと違う……きつくて変な感じ……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上で腰を揺らしながら声を漏らした。

    菊穴が%CALLNAME:MASTER%を締め付け、上に乗っているのに顔は真っ赤だ。

    「んっ……や……こんな声、お尻で出したくないのに……っ」

    %CALLNAME:人物_チルノ%は必死に声を堪えようとしていた。

    「……っ、%CALLNAME:MASTER%のせいだからね、お尻でこんなの……」

    「……%CALLNAME:MASTER%、あんまり見ないでよ……お尻で繋がってるとこなんて……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに%CALLNAME:MASTER%を睨んだ。

    しかし菊穴での動きは止めず、ゆっくりと%CALLNAME:MASTER%を感じている。

    「んっ……はぁ……こうしてると……お尻でもあたいが決められるから……」

    %CALLNAME:人物_チルノ%の腸壁はひくひくと%CALLNAME:MASTER%を包み込んでいた。

    「……べ、別に嫌いじゃないけど……お尻なんて恥ずかしすぎ……」
  priority: 3
