- id: fallback
  content: >-
    「……これが、騎乗位での肛門性交……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨りながら、興味深そうな目をしている。

    「……本で読んだ通り、自分でペースを調整できるのと、肛門の狭さ……」

    %CALLNAME:TARGET%は冷静を保とうとしているが、顔が歪んでいる。

    「……んっ……沈めると、この深さ……むきゅ……痛い……」

    分析しようとする言葉が、途切れ途切れになっている。

    「んっ……ふぅ……」

    %CALLNAME:TARGET%は自分のペースで動きながら、%CALLNAME:MASTER%を観察している。

    「……興味深いわ。この体位で肛門だと、体力と感覚の両方が……」

    %CALLNAME:TARGET%は淡々と言おうとしたが、息が上がっている。

    「……なぜ、こんなに複雑な感覚なのかしら……」

    自分の体の反応に、%CALLNAME:TARGET%自身が戸惑っている。

    「あ……そこ……っ」

    %CALLNAME:TARGET%は自分で角度を変えた瞬間、思わず声を漏らした。

    「……不覚だわ。肛門で、自分で動いているのに声が出るなんて……」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らした。

    「……%CALLNAME:MASTER%、今のは研究のための反応よ……」

    そう言いながらも、同じ角度で動きを続けている。

    「……」

    %CALLNAME:TARGET%は黙って%CALLNAME:MASTER%の上で動いている。

    研究者として、困難な体位と行為の組み合わせも記録しておくべきだ。

    「……%CALLNAME:MASTER%、質問があるわ」

    %CALLNAME:TARGET%は息を整えながら、%CALLNAME:MASTER%を見下ろした。

    「……騎乗位で肛門というのは、どういう意図なの……」
