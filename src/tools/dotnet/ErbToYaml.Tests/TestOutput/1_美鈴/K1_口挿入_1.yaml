- id: talent_3_1
  content: >-
    「……く、口で……するの……？」

    %CALLNAME:人物_美鈴%は顔を真っ赤にして、一物を見つめた。

    「……そ、そういうの……したことないけど……」

    おずおずと顔を近づけ、%CALLNAME:人物_美鈴%は恐る恐る舌を伸ばした。

    「……んっ……熱い……こ、こうすればいいの……？」

    ぎこちない動きで舌を這わせながら、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の反応を窺った。

    「……変じゃ、ない……？　ちゃんとできてる……？」

    「……%CALLNAME:MASTER%が、してほしいって言うから……」

    %CALLNAME:人物_美鈴%は照れ隠しに言い訳をしながら膝をついた。

    「……嫌じゃ、ないから……やってあげる……」

    一物に顔を近づけ、%CALLNAME:人物_美鈴%は躊躇いがちに口を開けた。

    「……あむ……んっ……お、大きい……」

    先端だけを咥えて、%CALLNAME:人物_美鈴%は必死に舌を動かした。

    「……じゅる……こう……？　教えて、もっと上手にしたいから……」

    「……ほ、ほら……私だって、これくらい……」

    %CALLNAME:人物_美鈴%は強がるように言いながら、一物に顔を寄せた。

    しかしその動きはたどたどしく、緊張が伝わってくる。

    「……ちゅ、れろ……ん……味、変……でも、嫌じゃない……」

    %CALLNAME:人物_美鈴%は頬を染めながら、舌で一物を舐め上げた。

    「……はむっ……んぐ……喉に当たる……」

    無理に深く咥えようとして、%CALLNAME:人物_美鈴%は少しむせた。

    「……%CALLNAME:MASTER%……私で、いいの……？」

    %CALLNAME:人物_美鈴%は不安そうに見上げた。

    「……門番なんかの私が……こんなこと……」

    躊躇いながらも、%CALLNAME:人物_美鈴%は一物に唇を寄せた。

    「……ん、ちゅ……%CALLNAME:MASTER%がいいなら……頑張る……」

    %CALLNAME:人物_美鈴%は覚悟を決めたように一物を口に含んだ。

    「……じゅる、んっ……私……一生懸命、するから……」
