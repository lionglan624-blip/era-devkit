    「……普段は門を守る側だけど……たまには、守られるのも悪くないかな」

    武術家の凛々しい背中が、恋人の胸に心地よく預けられていた。

    「はぁ……んっ……後ろからだと、奥まで……深く入ってくるね……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の膝の上で、甘い息を吐いた。

    背面から貫かれる体勢に、身体が熱を帯びていく。

    「……%CALLNAME:MASTER%の手……胸に……触ってくれる？」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の手を自分の胸へと導いた。

    「……前も後ろも……全部、%CALLNAME:MASTER%に委ねたいの……」

    恋人への絶対的な信頼が、その言葉に込められていた。

    「……ふふ、この体勢だと結合部、見えちゃうね……」

    %CALLNAME:人物_美鈴%は下を向いて、繋がっている場所を見つめた。

    「……恥ずかしいけど……%CALLNAME:MASTER%と繋がってる証だから……嫌じゃないよ」

    %CALLNAME:人物_美鈴%は照れたように笑った。

    「……ねえ、%CALLNAME:MASTER%……もっと奥まで、きて……？」

    %CALLNAME:人物_美鈴%は自ら腰を沈め、より深く繋がろうとした。

    「……一つになってる感覚……好きだよ……」

    「あ……ん……背中が%CALLNAME:MASTER%に触れてると……安心する……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の胸に背をぴったり押し付けた。

    「……心臓の鼓動、伝わってくる……」

    %CALLNAME:人物_美鈴%は幸せそうに目を細めた。

    「……ねえ、%CALLNAME:MASTER%……耳元で、好きって言って……？」

    甘えるような声で、%CALLNAME:人物_美鈴%はおねだりした。

    「……聞きながら……このまま、溶けちゃいたいな……」
