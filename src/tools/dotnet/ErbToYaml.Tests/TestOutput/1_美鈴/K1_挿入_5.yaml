    「……%CALLNAME:MASTER%が気持ちよさそうだと……私も、嬉しくて……」

    恋心を抑えきれず、%CALLNAME:人物_美鈴%は懸命に%CALLNAME:MASTER%を喜ばせようとした。

    「……っ……上からだと……奥まで、入って……」

