character: チルノ
situation: K8_愛撫
entries:
- id: fallback
  content: >-
    「んっ……%CALLNAME:MASTER%、あったかい……」

    チルノは恋人に胸を触られて、珍しく大人しくなっている。

    氷の妖精である彼女にとって、%CALLNAME:MASTER%の体温は心地よいようだ。

    「あたいの胸、ちっちゃいけど……気持ちいい？」

    %CALLNAME:MASTER%が優しく揉みほぐすと、チルノは甘い声を漏らした。

    「……もっと触っていいよ。あたい、%CALLNAME:MASTER%になら何されても嬉しいから」

    チルノは照れくさそうに、でも幸せそうに微笑んだ。

    「ひゃっ……！　そこ、くすぐったいってば……」

    チルノは%CALLNAME:MASTER%の愛撫にびくりと体を震わせた。

    「でも……やめないで。%CALLNAME:MASTER%に触られてると、ぽかぽかするの」

    %CALLNAME:MASTER%が胸を優しく撫でると、チルノの冷たい肌がほんのり温まっていく。

    「んー……あたい最強だけど、%CALLNAME:MASTER%の前だと力抜けちゃうな……」

    チルノは%CALLNAME:MASTER%に身を預け、目を細めた。

    「……ずっとこうしてて」

    「あっ……んっ……」

    %CALLNAME:MASTER%がチルノの胸を揉むと、彼女は気持ちよさそうに声を上げた。

    「%CALLNAME:MASTER%、上手だね……あたいのこと、よくわかってる」

    チルノは得意げな表情だが、頬は赤く染まっている。

    %CALLNAME:MASTER%が指先で乳首に触れると、チルノはぴくんと跳ねた。

    「やぁ……そこ弱いんだから……！」

    抗議しながらも、チルノは逃げようとはしなかった。

    「えへへ……%CALLNAME:MASTER%、あたいの胸好き？」

    チルノは無邪気に問いかけながら、%CALLNAME:MASTER%に擦り寄った。

    「あたいもね、%CALLNAME:MASTER%に触られるの好きだよ」

    %CALLNAME:MASTER%が胸を揉みしだくと、チルノは幸せそうに息を吐いた。

    「ん……あたいの体、冷たいでしょ？　でも%CALLNAME:MASTER%と一緒だと暖かくなるの」

    チルノは不思議そうに、でも嬉しそうに言った。

    「……これって、好きってことだよね？」
  priority: 4
- id: talent_3_1
  content: >-
    「ひゃっ……！　む、胸……？」

    チルノは突然の愛撫に驚いて%CALLNAME:MASTER%を見た。

    「べ、別にいいけど……あたいの胸なんか触って楽しいの？」

    照れ隠しに強がりを言いながら、チルノの顔は赤くなっている。

    %CALLNAME:MASTER%が胸を揉み始めると、チルノは小さく声を漏らした。

    「んっ……そ、そんなに揉まなくても……」

    言いながらも、チルノは%CALLNAME:MASTER%の手を払いのけようとはしなかった。

    「あっ……ちょっと、いきなりは……」

    チルノは%CALLNAME:MASTER%の手が胸に触れた瞬間、体を強張らせた。

    しかし、すぐに力を抜いて、%CALLNAME:MASTER%を上目遣いで見た。

    「……%CALLNAME:MASTER%って、あたいのこと好きなの？」

    %CALLNAME:MASTER%が優しく胸を撫でると、チルノは恥ずかしそうに視線を逸らした。

    「……好きなら、もっと触ってもいいよ」

    チルノは小さな声でそう言った。

    「んー……」

    チルノは%CALLNAME:MASTER%の愛撫に、複雑な表情を浮かべている。

    「あたい、こういうの……よくわかんないけど……」

    %CALLNAME:MASTER%が胸を優しく揉むと、チルノは熱い息を吐いた。

    「……気持ちいい、かも」

    チルノは素直に認めると、%CALLNAME:MASTER%にもたれかかった。

    「%CALLNAME:MASTER%ともっと一緒にいたいな……」

    「わっ……！　胸触った……」

    チルノは驚いて目を丸くしたが、逃げ出すことはしなかった。

    「……あたいの胸、小さいから、つまんないでしょ」

    少し寂しそうに言うチルノを、%CALLNAME:MASTER%は優しく抱き寄せた。

    %CALLNAME:MASTER%が胸を丁寧に愛撫すると、チルノの表情が緩んだ。

    「えへへ……%CALLNAME:MASTER%は優しいね」

    チルノは照れくさそうに笑った。
