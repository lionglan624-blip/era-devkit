    %CALLNAME:TARGET%は緊張した面持ちで%CALLNAME:MASTER%の一物を胸で挟んだ。

    「むにゅ……こういうの、初めてだから……」

    ぎこちない動きで、%CALLNAME:TARGET%は懸命に胸を動かしている。

    「んしょ……こう……？」

    一生懸命な%CALLNAME:TARGET%の姿は、どこか健気だった。

    「……気持ちよくなって、くれたら……嬉しいな……」

    「は、恥ずかしいよぅ……でも……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、%CALLNAME:MASTER%の一物を胸で挟んだ。

    「%CALLNAME:MASTER%が気持ちよくなるなら……あたし、頑張る……」

    小さな胸が%CALLNAME:MASTER%のものを包み、ゆっくりと動き出す。

    「……んっ……ぬるっとしてきた……これ、気持ちいいってこと……？」

    %CALLNAME:TARGET%は先走りの感触に驚きながらも、胸を止めなかった。

    「……%CALLNAME:MASTER%……あたしのこと、好き……？」

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は上目遣いに%CALLNAME:MASTER%を見つめた。

    「あたし……%CALLNAME:MASTER%のこと、好きだから……」

    恥ずかしそうに俯きながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%のものを胸で挟んだ。

    「だから……おっぱいで、させて……ね……？」

    小さな胸がたどたどしく動き、%CALLNAME:MASTER%に快感を与えようと頑張っている。

    %CALLNAME:TARGET%は真剣な表情で、%CALLNAME:MASTER%の反応を見守っていた。
