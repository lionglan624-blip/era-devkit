    「……もう、いきなりそういうことしないでよね」

    %CALLNAME:人物_チルノ%は怒ったふりをしながらも、どこか嬉しそうだった。

    「あ……あの……%CALLNAME:MASTER%……」

    %CALLNAME:人物_チルノ%は珍しく控えめな声を出した。

