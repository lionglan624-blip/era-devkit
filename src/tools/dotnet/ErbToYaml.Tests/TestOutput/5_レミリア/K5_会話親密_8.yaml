- id: fallback
  content: >-
    「んっ……ふふ、大胆ね、お前……」

    %CALLNAME:TARGET%はされるがままに、%CALLNAME:MASTER%に尻をなでられている。

    その手付きを確かめるように、紅い瞳が細められた。

    「……紅魔館の主の身体を、こんな風に触れるのはお前だけよ」

    %CALLNAME:TARGET%は熱い吐息を漏らしながら、背中を預けてきた。

    「もっと……もっと撫でなさい。お前になら、全て許すわ」

    「あっ……そこ、いいわ……」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の臀部を優しく撫でている。

    %CALLNAME:TARGET%は小さく身を震わせながらも、逃げようとはしない。

    「ククク……お前の手は温かいわね……」

    %CALLNAME:TARGET%は満足げに目を閉じ、その感触に身を委ねた。

    「……このひとときだけは、ただの女でいさせて」

    「やぁ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の膝に座り、尻を撫でられている。

    500年を生きた吸血鬼が、まるで甘える猫のように身を委ねていた。

    「……こうしていると、お前の体温が伝わってくるわ」

    %CALLNAME:TARGET%は紅い頬で%CALLNAME:MASTER%を見上げた。

    「私を温めて……ずっと、こうしていて……」

    「……んぅ……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%のドレス越しに、その丸みを確かめている。

    %CALLNAME:TARGET%は恥じらいながらも、その手を止めようとはしない。

    「……お前だけよ。私にこんな姿を見せるのは」

    高貴な吸血鬼の仮面を脱いで、%CALLNAME:TARGET%は甘えるように囁いた。

    「……もう少しだけ、このまま……いいでしょう？」
  priority: 4
- id: talent_3_1
  content: >-
    「んっ……何をしているの、お前……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に尻をなでられ、頬を染めている。

    威厳を保とうと腕を組んだが、その身体は逃げていない。

    「使用人のくせに大胆ね……」

    %CALLNAME:TARGET%は紅い瞳を逸らしながらも、されるがままでいた。

    「……でも、嫌いじゃないわ。特別に許してあげる」

    「やっ……そこは……」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の臀部に触れている。

    %CALLNAME:TARGET%は一瞬ビクッと震えたが、すぐに平静を装った。

    「……敏感なところを、よく知っているわね」

    %CALLNAME:TARGET%は熱い息を吐きながらも、高飛車な態度を崩さない。

    「……他の者には絶対に言わないこと。いいわね？」

    「あっ……くぅ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に尻を撫でられ、顔を背けている。

    その耳は紅く染まり、吸血鬼らしからぬ動揺を見せていた。

    「……私を喜ばせようというの？」

    %CALLNAME:TARGET%は小さく身を震わせながら、%CALLNAME:MASTER%を横目で見た。

    「……ふん、認めてあげるわ。続けなさい」

    「……っ」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の腰に手を回し、尻を撫でている。

    %CALLNAME:TARGET%は驚いた顔をしたが、その手を払いのけはしなかった。

    「……こんなことを許すのは、お前だけなんだから」

    %CALLNAME:TARGET%は紅い顔で、強がるように呟いた。

    「……感謝しなさいよね」
