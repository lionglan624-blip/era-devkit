- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は緊張した面持ちで%CALLNAME:MASTER%の上に覆いかぶさった。

    「こ、こんな体勢……恥ずかしいですわ……」

    しかし、%CALLNAME:MASTER%への想いが%CALLNAME:TARGET%を動かした。

    「……っ……あ……入って……いきますわ……」

    「%CALLNAME:MASTER%……気持ちいいですか……？」

    %CALLNAME:TARGET%は不安と期待が入り混じった表情で恋人を見下ろした。

    「あ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の中で腰を動かしている。

    「こうして……貴方を抱いていると……」

    「貴方のことばかり……考えてしまいますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を握りしめた。

    「あっ……奥まで……届いて……」

    「%CALLNAME:MASTER%……もっと声を聞かせて……」

    「……ふぁ……%CALLNAME:MASTER%の中……こんなに……」

    %CALLNAME:TARGET%は自分の感覚に戸惑いながらも、腰を動かし続けていた。

    「貴方を……抱きたかったの……」

    「で、でも……こんな積極的な姿……」

    %CALLNAME:TARGET%は顔を赤らめながら、腰を揺らしてしまう。

    「……ん……っ……%CALLNAME:MASTER%……」

    葛藤しながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%を求め続けた。

    「……%CALLNAME:MASTER%……そんな目で見ないでください……」

    %CALLNAME:TARGET%は目を逸らしながらも、腰は動きを止めなかった。

    「こんな……私の姿……恥ずかしいですわ……」

    「あ……でも……貴方の中……気持ちよくて……止められないの……」

    %CALLNAME:TARGET%は快感に抗えず、より深く腰を沈めた。

    「……ん……っ……%CALLNAME:MASTER%……」

    恥ずかしさと心地よさの狭間で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を抱き続けた。
