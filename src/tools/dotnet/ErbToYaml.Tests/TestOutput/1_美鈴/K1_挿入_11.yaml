entries:
- id: fallback
  content: >-
    「ん……っ……%CALLNAME:MASTER%……両方、一緒に……」

    %CALLNAME:人物_美鈴%は二人に同時に貫かれながら、甘い声を漏らした。

    前と後ろから同時に責められる快感に、全身が震える。

    「……こんな体勢……恥ずかしいけど……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%を見つめながら微笑んだ。

    「……%CALLNAME:MASTER%のためなら……私の全部、捧げるから……」

    武術家の鍛えられた体が、二人の動きに合わせて揺れていた。

    「はぁ……あっ……奥まで……両方……届いてる……」

    %CALLNAME:人物_美鈴%は快感に溺れそうになりながら、必死にしがみついた。

    二穴を同時に貫かれる刺激は、想像以上に激しい。

    「……頭、真っ白になりそう……」

    %CALLNAME:人物_美鈴%は蕩けた表情で喘いだ。

    「……でも、%CALLNAME:MASTER%と繋がってるから……大丈夫……」

    愛する人への信頼が、快感に身を任せる勇気をくれた。

    「あっ……そこ……二人で動かれると……っ……」

    %CALLNAME:人物_美鈴%は体を震わせながら、甘い悲鳴を上げた。

    前後から交互に突かれるたびに、快感が幾重にも重なる。

    「……もう……自分で体、コントロールできない……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに顔を赤らめた。

    「……%CALLNAME:MASTER%……私のこと、壊しても、いいから……」

    恋人への全幅の信頼を、その言葉に込めていた。

    「……ふぅ……二人に……挟まれてる……」

    %CALLNAME:人物_美鈴%は息も絶え絶えに呟いた。

    「……こんなに満たされるなんて……思わなかった……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の手を探り、ぎゅっと握った。

    「……%CALLNAME:MASTER%の隣にいるために……強くなったはずなのに……」

    「……今は、弱くていい……?」

    愛おしげに%CALLNAME:MASTER%を見つめる瞳が潤んでいた。
