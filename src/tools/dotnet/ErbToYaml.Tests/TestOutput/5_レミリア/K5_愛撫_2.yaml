- id: fallback
  content: >-
    「……何のつもりかしら」

    %CALLNAME:人物_レミリア%は冷ややかな目で%CALLNAME:MASTER%を見た。

    「私にそんなことをさせようというの？」

    しかし、その表情にはわずかな興味が見え隠れしている。

    「……ふん、いいわ。特別に見せてあげる」

    %CALLNAME:人物_レミリア%は高飛車な態度を崩さないまま、%CALLNAME:MASTER%の前に跪いた。

    「……感謝なさい、下僕」

    「……ふぅん、度胸はあるわね」

    %CALLNAME:人物_レミリア%は値踏みするような目で%CALLNAME:MASTER%を見た。

    「まあいいわ。退屈しのぎに付き合ってあげる」

    そう言いながら、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に近づいた。

    「……あまり期待しないことね」

    小さな唇が、そっと%CALLNAME:MASTER%に触れた。

    %CALLNAME:人物_レミリア%は複雑な表情を浮かべていた。

    「……何よ、欲しいの？」

    %CALLNAME:人物_レミリア%は挑発的に微笑んだ。

    「紅魔館の主に奉仕させるなんて、大した度胸ね」

    そう言いながらも、%CALLNAME:人物_レミリア%は拒否しなかった。

    「……まあ、お遊びに付き合ってあげるわ」

    冷たい唇が、%CALLNAME:MASTER%にそっと触れた。

    「……あなたって、面白いわね」

    「……随分と大胆ね、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を見つめた。

    「使用人の分際で、私にそんなことを求めるなんて」

    %CALLNAME:人物_レミリア%は小さく笑った。

    「……今日は機嫌がいいから、許してあげる」

    そう言って、%CALLNAME:人物_レミリア%はゆっくりと%CALLNAME:MASTER%に近づいた。

    500年を生きた吸血鬼の心に、何かが芽生え始めていた。
