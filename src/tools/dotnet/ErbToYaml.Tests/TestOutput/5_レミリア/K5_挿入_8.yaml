character: レミリア
situation: K5_挿入
entries:
- id: fallback
  content: >-
    「ん……%CALLNAME:MASTER%、後ろから抱いて」

    %CALLNAME:人物_レミリア%は床に座り、%CALLNAME:MASTER%に背を向けた。

    %CALLNAME:MASTER%が後ろから抱きしめると、%CALLNAME:人物_レミリア%は安心したように息を吐いた。

    「こうして後ろから抱かれていると……安心するわ」

    %CALLNAME:MASTER%が腰を持ち上げ、ゆっくりと挿入した。

    「あっ……んん……奥まで、挿入ってくる……」

    紅魔館の主は恋人の胸に身を預けながら、幸せそうに微笑んだ。

    「ふふ……今日は後ろからがいいの？」

    %CALLNAME:人物_レミリア%は艶やかに微笑みながら、%CALLNAME:MASTER%の胡坐の上に座った。

    背中越しに%CALLNAME:MASTER%の体温が伝わってくる。

    「やぁっ……深い……こうして繋がっていると、%CALLNAME:MASTER%を全部感じるわ……」

    %CALLNAME:MASTER%が胸を愛撫すると、%CALLNAME:人物_レミリア%は甘い声を漏らした。

    「あっ、んっ……胸も、触って……もっと……」

    500年の吸血鬼が、恋人の腕の中で蕩けていく。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胸に背を預けた。

    後ろから抱きしめられ、二人の体が密着する。

    「こうして後ろから……繋がっているのも、いいわね」

    %CALLNAME:MASTER%がゆっくりと腰を動かすと、%CALLNAME:人物_レミリア%は息を弾ませた。

    「あぁっ……%CALLNAME:MASTER%の、奥まで届いてる……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手を握り、幸せに浸っていた。

    「んっ……後ろから抱いてくれる……？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に背を向けて座った。

    %CALLNAME:MASTER%が後ろから抱きしめ、腰を持ち上げる。

    「あっ……挿入ったわね……ん、奥まで……」

    %CALLNAME:人物_レミリア%は繋がった場所を見下ろし、頬を染めた。

    「やぁ……見えちゃうわね……恥ずかしい……」

    恋人にだけ見せる無防備な姿で、%CALLNAME:人物_レミリア%は腰を揺らした。
  priority: 4
- id: talent_3_1
  content: >-
    「な……っ、後ろからなんて……」

    %CALLNAME:人物_レミリア%は頬を染めながら、%CALLNAME:MASTER%に背を向けた。

    「べ、別に顔を見られたくないからじゃないんだから……」

    %CALLNAME:MASTER%が後ろから挿入すると、%CALLNAME:人物_レミリア%は小さく声を上げた。

    「あっ……んん……奥まで……っ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の腕にしがみついた。

    「……こ、こっちなら顔が見えないから……少しは、まし……」

    高貴な吸血鬼の背中は、紅く染まっていた。

    「こ、こんな体勢で……私を弄ぶつもり？」

    %CALLNAME:人物_レミリア%は強がりながら、%CALLNAME:MASTER%の胡坐の上に座った。

    背中越しに%CALLNAME:MASTER%の体温が伝わってくる。

    「やっ……後ろから抱かれると……変な感じ……」

    %CALLNAME:MASTER%が胸を触ると、%CALLNAME:人物_レミリア%は声を堪えた。

    「っ……あ、胸も、触って……ば、馬鹿……」

    罵りの言葉とは裏腹に、その体は正直に反応していた。

    「……ふん、顔を見ないでいいのは、助かるわね」

    %CALLNAME:人物_レミリア%は照れ隠しに言い、%CALLNAME:MASTER%に背を預けた。

    だが、%CALLNAME:MASTER%の腕に包まれると、その強がりは薄れていった。

    「んっ……あぁ……っ、奥まで、挿入ってる……」

    %CALLNAME:人物_レミリア%は繋がった場所を見て、顔を真っ赤にした。

    「やぁっ……見え、見えちゃう……こんなの……」

    その声には、隠しきれない羞恥と快感が滲んでいた。

    「……後ろからなんて、趣味が悪いわね」

    %CALLNAME:人物_レミリア%は文句を言いながらも、%CALLNAME:MASTER%の上に座った。

    「べ、別にこうしたいわけじゃ……っ」

    %CALLNAME:MASTER%が腰を突き上げると、言葉が途切れた。

    「あっ……んっ……深い……っ、やぁ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手を握りしめた。

    「……今日だけよ……こんなの許すの……」

    紅魔館の主は、素直になれない想いを胸に秘めていた。
  priority: 3
