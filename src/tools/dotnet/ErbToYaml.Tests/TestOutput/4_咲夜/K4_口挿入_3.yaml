    %CALLNAME:TARGET%の秘所から溢れる蜜が、二人の間を滑らかに繋いでいく。

    「……もっと……貴方のために……」

    %CALLNAME:TARGET%は頬を染めながら、さらに腰の動きを速めた。

    「……%CALLNAME:MASTER%……私を見ていてくださいまし……」

    %CALLNAME:TARGET%は上目遣いで%CALLNAME:MASTER%を見つめながら腰を動かした。

    「こんな姿……貴方にしか見せられませんわ……」

    「んっ……あぁ……ぬるぬるして……きました……」

    愛液が溢れ、淫らな音を立てながら奉仕が続けられる。

    「……愛していますわ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は恍惚とした表情で囁いた。

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は髪を揺らしながら、情熱的に腰を振っていた。

    「貴方のここ……私だけのもの……ですわ……」

    「あ……んっ……硬くなって……きましたわ……」

    %CALLNAME:TARGET%は独占欲を滲ませながら、さらに密着度を高めた。

    「……どうぞ……いつでも……出してくださいまし……」

    恋人への愛情を込めて、%CALLNAME:TARGET%は腰を動かし続けた。
