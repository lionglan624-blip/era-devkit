character: 子悪魔
situation: K7_会話親密
entries:
- id: fallback
  content: >-
    「――わぁ、%CALLNAME:MASTER%がお茶淹れてくれたの？」

    %CALLNAME:TARGET%は両手を合わせて、きらきらと瞳を輝かせた。

    小さな手で湯飲みを包み込むように持ち、ふーふーと一生懸命息を吹きかける。

    「……んっ、あったかい……おいしいの……」

    %CALLNAME:TARGET%は幸せそうに目を細めた。

    「ねえねえ、また淹れてくれる？　あたし、%CALLNAME:MASTER%のお茶、大好きなんだよ」

    そう言いながら、%CALLNAME:TARGET%は嬉しそうに%CALLNAME:MASTER%の腕に頬をすりよせた。

    「わ、ありがとう！」

    %CALLNAME:TARGET%は跳ねるような足取りで駆け寄ってきた。

    ずず、と音を立ててお茶を啜る。小さな体がぽかぽかと温まっていく。

    「……はぁ、あったまる……しあわせ……」

    %CALLNAME:TARGET%はほっと息を吐いて、柔らかく微笑んだ。

    「咲夜さんのお茶も美味しいけど……%CALLNAME:MASTER%のお茶は、なんか特別なの」

    照れくさそうにそう言って、%CALLNAME:TARGET%は%CALLNAME:MASTER%の顔をちらっと見上げた。

    「――あっ、お茶だ！」

    %CALLNAME:TARGET%は湯飲みを両手で受け取ると、嬉しそうにくるくると回った。

    「えへへ、%CALLNAME:MASTER%って、やっぱり優しいね」

    こくこく、と音を立てて飲む%CALLNAME:TARGET%。その姿はまるで小動物のようだ。

    「……んふふ、おいしい。体があったまるの」

    %CALLNAME:TARGET%は満足そうに目を閉じて、お茶の香りを楽しんでいる。

    「……ねえ、お茶、一緒に飲もう？　並んで座って」

    甘えるような声で、%CALLNAME:TARGET%は%CALLNAME:MASTER%の袖を引っ張った。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の淹れたお茶を、大事そうに両手で持っている。

    「……%CALLNAME:MASTER%のお茶、あったかくて、やさしい味がするの」

    ずず、と静かにお茶を啜る音が響く。

    「あたしね、こういう時間が一番好きなの……」

    %CALLNAME:TARGET%はそっと%CALLNAME:MASTER%に寄り添った。

    「お茶飲みながら、%CALLNAME:MASTER%とお話して……えへへ、しあわせ」

    妖精の小さな体から、ぽかぽかとした温もりが伝わってくる。

    湯飲みを抱えて微笑む%CALLNAME:TARGET%は、心底幸せそうだった。
  priority: 4
- id: talent_3_1
  content: >-
    「――え、お茶？　%CALLNAME:MASTER%が淹れてくれたの？」

    %CALLNAME:TARGET%は少し驚いた様子で湯飲みを受け取った。

    両手でそっと湯飲みを持ち、ゆっくりとお茶を味わう。

    「……うん、美味しいです……ありがとう」

    %CALLNAME:TARGET%は頬を少し赤くしながら、嬉しそうに微笑んだ。

    「あの……こういうの、嬉しいな……えへへ」

    照れくさそうに視線を落としながら、%CALLNAME:TARGET%はぽつりとそう呟いた。

    「あ、わざわざありがとうございます」

    %CALLNAME:TARGET%は嬉しそうに湯飲みを受け取った。

    ずず、とお茶を啜る音が静かに響く。

    「……あちっ」

    %CALLNAME:TARGET%は熱さに思わず舌を出した。

    「……ふふ、でも美味しいです。%CALLNAME:MASTER%って、優しいんですね」

    恥ずかしそうにしながらも、%CALLNAME:TARGET%はにこにことお茶を飲み続けた。

    「――わ、お茶……あたしに……？」

    %CALLNAME:TARGET%は戸惑いながらも、嬉しそうに湯飲みを受け取った。

    こくり、と小さく一口飲む。温かさが体に染み渡っていく。

    「……おいしい。あったかい……」

    %CALLNAME:TARGET%は湯飲みを両手で抱えて、ほう、と息を吐いた。

    「%CALLNAME:MASTER%、お茶淹れるの上手ですね……」

    %CALLNAME:TARGET%は照れくさそうに、でも嬉しそうにそう言った。

    「……また、淹れてくれると……嬉しいな」

    「あっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%はお茶を差し出されて、目をぱちくりさせた。

    「えっと……いただきます」

    おずおずと湯飲みを受け取り、そっとお茶を口に含む。

    「……んっ、美味しい……」

    %CALLNAME:TARGET%の表情がふわりと緩んだ。

    「こういうことしてもらうの、初めてかも……」

    %CALLNAME:TARGET%は頬を赤らめながら、大事そうにお茶を飲み続けた。
  priority: 3
  condition:
