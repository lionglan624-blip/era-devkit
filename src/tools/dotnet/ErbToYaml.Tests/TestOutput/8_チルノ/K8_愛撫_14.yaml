- id: fallback
  content: >-
    「――へぇ、これがブルブルするやつなの?」

    %CALLNAME:TARGET%は興味深そうに電動マッサージャを見つめた。

    「あたいったら最強だから、こんなの余裕……ひゃっ!?」

    予想外の振動に、思わず身体がビクンと跳ねる。

    「な、なにこれ!?　すごいブルブルする!」

    %CALLNAME:TARGET%は目を丸くして驚いている。

    「――ふーん、人間ってこういうの使うのね」

    %CALLNAME:TARGET%は不思議そうに首を傾げた。

    電動マッサージャの振動が身体に伝わると、

    「わっ!?　ちょっと、これ変な感じ……っ」

    「……でも、なんか……嫌いじゃないかも」

    純粋な感想を口にして、%CALLNAME:TARGET%は小さく首を傾げた。

    「――ね、ねぇ、これって何に使うの?」

    %CALLNAME:TARGET%は怪訝そうな顔でマッサージャを見ている。

    スイッチを入れて身体に当てると、

    「ひゃあっ!?　な、なんで震えてるの!?」

    「こ、こんなの初めて……っ、変な感じ……」

    妖精には馴染みのない感覚に、%CALLNAME:TARGET%は戸惑っている。

    「――あ、またあのブルブルするやつ?」

    %CALLNAME:TARGET%は記憶にあるらしく、少し身構えた。

    電動マッサージャの振動が身体を伝わると、

    「っ……やっぱり、すごいのよね、これ……」

    「あたいったら最強だけど、これはちょっと……くすぐったいわ」

    そう言いながら、%CALLNAME:TARGET%は不思議そうな表情を浮かべていた。
  priority: 2
- id: fallback
  content: >-
    「――は?　なにそれ、おもちゃ?」

    %CALLNAME:TARGET%は警戒しながらマッサージャを睨んだ。

    「あたいに何するつもりよ……ひゃっ!?」

    突然の振動に、思わず身体がビクンと跳ねる。

    「な、なによこれ!?　へ、変なのあてないでよ!」

    %CALLNAME:TARGET%は慌てて距離を取ろうとした。

    「――ちょっと、なに持ってんのよ」

    %CALLNAME:TARGET%は怪しげな目でマッサージャを見つめた。

    「あたいをどうするつもり……っ!?」

    振動が身体に伝わり、驚いた声を上げる。

    「やっ、やだ!　こんな変なの!　離せってば!」

    最強の氷精は、未知の感覚に抵抗を示した。

    「――あたいは最強なんだから、そんなのに負けないわよ!」

    %CALLNAME:TARGET%は強気に言い放った。

    しかしマッサージャの振動を受けると、

    「っ!?　う、うそ……なにこれ……っ」

    「こ、こんなのずるいわよ!　あんた卑怯よ!」

    予想外の感覚に、%CALLNAME:TARGET%は悔しそうに叫んだ。

    「――なによ、また変なことするつもり?」

    %CALLNAME:TARGET%は不信感を隠さずに言った。

    電動マッサージャのスイッチが入ると、

    「ひぁっ!?　ちょ、やめ……っ、なんでこんな……っ」

    「あ、あんたなんか……っ、最強のあたいが……っ」

    抵抗しながらも、%CALLNAME:TARGET%の身体は正直に反応してしまっていた。
  priority: 1
