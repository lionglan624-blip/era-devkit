- id: fallback
  content: >-
    「ちょっと……何するんですの！？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の手を払いのけた。

    「いきなりそんなところを触るなんて……非常識ですわ！」

    %CALLNAME:人物_小悪魔%は頬を膨らませて怒っている。

    「悪魔だからって、馬鹿にしてるんですの……？」

    睨むような視線を向けながらも、どこか寂しそうな表情も見せた。

    「やめてくださいな……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%から距離を取った。

    「そんなことされる筋合い、ありませんわ」

    %CALLNAME:人物_小悪魔%は警戒するように腕を組んでいる。

    「……もう少し仲良くなってから、お願いしますわね」

    そう言いながらも、%CALLNAME:人物_小悪魔%は完全には拒絶していないようだった。

    「はぁ……何を考えてるんですの……」

    %CALLNAME:人物_小悪魔%は呆れたようにため息をついた。

    「悪魔だからって、そんな簡単に体を許すと思いましたの？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%をじっと見つめている。

    「……もっと私のこと、知ってからにしてくださいな」

    冷たい口調ながらも、どこか期待を残した言い方だった。

    「そういうのは……困りますわ」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の手を押しとどめた。

    「私、そんなに軽い悪魔じゃありませんの」

    %CALLNAME:人物_小悪魔%は少し傷ついたような表情をしている。

    「……本気で私のことが好きなら……もう少し待ってくださいな」

    そう言い残して、%CALLNAME:人物_小悪魔%はそっぽを向いた。
  priority: 1
