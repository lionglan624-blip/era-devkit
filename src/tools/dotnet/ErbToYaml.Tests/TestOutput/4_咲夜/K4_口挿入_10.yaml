- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%……こんな体勢……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨りながら、顔を赤く染めている。

    「自分から……動くなんて……恥ずかしいですわ……」

    しかし、%CALLNAME:MASTER%のために腰を落としていく。

    「……っ……あ……入って……」

    「見ないで……ください……こんな顔……」

    %CALLNAME:TARGET%は羞恥に顔を背けながらも、動きを止めなかった。

    「あ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上でぎこちなく腰を動かしている。

    「メイドとして……こんな姿勢は……」

    「でも……%CALLNAME:MASTER%が……望むなら……」

    %CALLNAME:TARGET%が腰を深く落とすと、甘い声が漏れた。

    「あっ……奥……当たって……」

    「%CALLNAME:MASTER%……もっと……動いても……いいですか……」

    「……ふぁ……こんなに……感じてしまうなんて……」

    %CALLNAME:TARGET%は自分の反応に戸惑いながらも、腰を揺らし続けている。

    「上から……%CALLNAME:MASTER%の顔が見えて……」

    「……ドキドキしてしまいますわ……」

    「こんな気持ち……いけないのに……」

    「でも……止められないの……%CALLNAME:MASTER%……」

    葛藤しながらも、%CALLNAME:TARGET%は奉仕を続けた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は躊躇いがちに、%CALLNAME:MASTER%の手を取った。

    「私の腰……支えてくださいまし……」

    「一人では……うまく動けなくて……」

    %CALLNAME:MASTER%に支えられながら、%CALLNAME:TARGET%は腰を動かす。

    「……ん……っ……%CALLNAME:MASTER%……」

    恥ずかしさと心地よさの狭間で、%CALLNAME:TARGET%は甘い声を漏らした。
