situation: K4_愛撫
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……見ていてくださいまし……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の前で、ゆっくりと自らの秘所に手を伸ばした。

    瀟洒なメイドの指が、しとどに濡れた花弁をなぞっている。

    「んっ……あぁ……こんな姿……貴方にしか見せられませんわ……」

    %CALLNAME:TARGET%は頬を染めながら、%CALLNAME:MASTER%を見つめている。

    「……お嬢様のお世話の合間に……貴方のことを想って……こうして……」

    %CALLNAME:TARGET%は恥ずかしそうに告白しながらも、指の動きを速めた。

    「……見ていてくださいね……私が……どれほど貴方を想っているか……」

    「はぁ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の前で自慰に耽っている。

    普段の完璧なメイドの姿は影を潜め、恋する女の表情がそこにはあった。

    「……%CALLNAME:MASTER%……私のこと……ちゃんと見ていてくださいまし……」

    %CALLNAME:TARGET%は潤んだ瞳で%CALLNAME:MASTER%を見上げている。

    「時を止めても……この気持ちは止められませんの……」

    %CALLNAME:TARGET%の指が花弁の間を滑り、甘い声が漏れた。

    「あっ……%CALLNAME:MASTER%……貴方のことを想うと……止まらなくて……」

    「……ぁ……んっ……」

    %CALLNAME:TARGET%は恥じらいながらも、%CALLNAME:MASTER%の前で自らを慰めている。

    指先が敏感な場所を捉えるたび、%CALLNAME:TARGET%の体が小さく震えた。

    「こんな……はしたない姿……メイドとして失格ですわね……」

    そう言いながらも、%CALLNAME:TARGET%の手は止まらない。

    「でも……貴方の前でなら……見せてもいいと思えるの……」

    %CALLNAME:TARGET%は甘い声を漏らしながら、%CALLNAME:MASTER%に縋るような視線を向けた。

    「……%CALLNAME:MASTER%……私を……見ていて……」

    「あっ……やぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の視線を感じながら、自らの体を弄んでいる。

    瀟洒な従者の仮面はとうに外れ、蕩けた表情が覗いていた。

    「……%CALLNAME:MASTER%に見られていると……余計に……感じて……」

    %CALLNAME:TARGET%の指は蜜に濡れ、淫靡な音を立てている。

    「んっ……あぁ……貴方のせいですわ……こんなに……」

    %CALLNAME:TARGET%は恨めしそうに言いながらも、その目は幸せそうに潤んでいた。

    「……もっと……見ていてくださいまし……」
  priority: 4
- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%……こんなこと……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の前で自慰を命じられ、顔を真っ赤にしている。

    「メイドとして……このような姿を……」

    %CALLNAME:TARGET%は震える手で、ゆっくりと自らの秘所に触れた。

    「んっ……」

    小さな声が漏れ、%CALLNAME:TARGET%は恥ずかしそうに顔を背けた。

    「……見ないでくださいまし……でも……%CALLNAME:MASTER%だから……」

    %CALLNAME:TARGET%は葛藤しながらも、指の動きを止めなかった。

    「……あ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に見られながら、自らの体を慰めている。

    「こんな……恥ずかしいことを……させるなんて……」

    %CALLNAME:TARGET%は抗議めいた言葉を口にしながらも、指の動きは止まらない。

    「んっ……や……感じて……しまいますわ……」

    %CALLNAME:TARGET%の頬は羞恥で紅く染まっている。

    「……%CALLNAME:MASTER%のせいですわ……こんな……」

    そう言いながらも、%CALLNAME:TARGET%の瞳には恋情が宿っていた。

    「はぁ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の前で、自らの秘所を弄んでいる。

    「お嬢様に知られたら……どうしましょう……」

    そう呟きながらも、%CALLNAME:TARGET%の手は止まらなかった。

    「……%CALLNAME:MASTER%……こんな姿……見て愉しいですか……」

    %CALLNAME:TARGET%は恨めしそうに%CALLNAME:MASTER%を見つめている。

    「……でも……貴方だから……見せている……のですから……」

    %CALLNAME:TARGET%の声には、隠しきれない甘さが滲んでいた。

    「……っ……やぁ……」

    %CALLNAME:TARGET%は恥じらいながら、自らの体を慰めていた。

    「こんなこと……メイドとして……許されないのに……」

    %CALLNAME:TARGET%の指は蜜に濡れ、淫らな音を立てている。

    「あ……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の名を呼びながら、感じている。

    「……意地悪ですわ……こんな姿……見せるなんて……」

    そう言いながらも、%CALLNAME:TARGET%は自慰を止めなかった。
