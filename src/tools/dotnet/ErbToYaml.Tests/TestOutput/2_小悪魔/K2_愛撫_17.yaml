entries:
- id: fallback
  content: >-
    「あら……%CALLNAME:MASTER%……それ、珠が連なっていますわね……」

    %CALLNAME:人物_小悪魔%は興味深そうにアナルビーズを見つめた。

    %CALLNAME:MASTER%が一つ目の珠を%CALLNAME:人物_小悪魔%の後孔に押し込んだ。

    「んっ……一つずつ……入ってくる……不思議な感覚……」

    %CALLNAME:人物_小悪魔%は甘い吐息を漏らしながら、次の珠を待った。

    「……%CALLNAME:MASTER%……全部、入れてくださいな……」

    「んふふ……また珠ですの……？」

    %CALLNAME:人物_小悪魔%は悪戯っぽく微笑みながら、%CALLNAME:MASTER%を見上げた。

    珠が一つ、また一つと%CALLNAME:人物_小悪魔%の菊穴に飲み込まれていく。

    「あっ……んっ……一つずつ……奥に……」

    「この感覚……悪魔でも……癖になりそうですわ……」

    %CALLNAME:人物_小悪魔%は恍惚とした表情で体を震わせた。

    「あぁっ……%CALLNAME:MASTER%……珠が……」

    %CALLNAME:MASTER%がアナルビーズを深く押し込むと、%CALLNAME:人物_小悪魔%は背筋を反らせた。

    「中で……珠が動いて……んっ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の腕にしがみついた。

    「……悪魔の私を……こんな場所で……蕩かすなんて……」

    そう言いながらも、%CALLNAME:人物_小悪魔%の目は潤んでいた。

    「やっ……珠が……出てくる……」

    %CALLNAME:MASTER%がゆっくりとアナルビーズを引き抜き始めた。

    珠が一つ抜ける度に、%CALLNAME:人物_小悪魔%は小さく声を上げた。

    「あっ……んっ……一つずつ……抜けて……」

    「%CALLNAME:MASTER%……もっと……ゆっくり……」

    甘えるように、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に身を預けた。
