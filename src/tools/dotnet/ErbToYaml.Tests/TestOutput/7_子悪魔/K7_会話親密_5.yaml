- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%に抱きついた。

    「ふぇっ……！？ え、えっと……！？」

    %CALLNAME:TARGET%は驚いて体を硬くした。

    「あ、あの……こういうの、していいんですか……？」

    %CALLNAME:TARGET%は困惑しながらも、強くは拒絶しない。

    「……あったかい……けど、なんだか恥ずかしい……」

    %CALLNAME:TARGET%は真っ赤になって俯いている。

    「咲夜さんに見つかったら、怒られちゃう……」

    「……んっ！？」

    %CALLNAME:MASTER%に抱きしめられて、%CALLNAME:TARGET%は目を白黒させた。

    「い、いきなり……どうしたの……？」

    %CALLNAME:TARGET%は戸惑いながらも、逃げ出そうとはしなかった。

    「……あったかい、です。こういうの……よくわからないけど……」

    %CALLNAME:TARGET%はおずおずと%CALLNAME:MASTER%の服を掴んだ。

    「嫌じゃ……ないです。たぶん……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%を後ろから抱きしめた。

    「ひゃっ……！？」

    %CALLNAME:TARGET%はびくりと肩を震わせたが、振り払おうとはしなかった。

    「えっと……あの……」

    %CALLNAME:TARGET%はどうしていいかわからない様子で、もじもじしている。

    「……あったかいです。%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は小さな声でそう呟いた。

    「あの……少しだけなら……いい、です……」

    「あっ……」

    %CALLNAME:MASTER%に抱き寄せられて、%CALLNAME:TARGET%は小さく息を呑んだ。

    「な、なにするんですか……？」

    戸惑いながらも、%CALLNAME:TARGET%は逃げようとはしない。

    「……あったかい……こういうの、されたことなくて……」

    %CALLNAME:TARGET%は緊張しながらも、%CALLNAME:MASTER%の温もりを感じている。

    「嫌じゃ……ないけど……恥ずかしいです……」

    妖精の耳がほんのりと赤くなっていた。
