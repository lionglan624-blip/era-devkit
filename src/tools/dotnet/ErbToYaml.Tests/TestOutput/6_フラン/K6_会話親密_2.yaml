- id: fallback
  content: >-
    「ひゃっ……な、何するのさ！」

    %CALLNAME:TARGET%は驚いて飛び跳ねた。翼がばさりと開く。

    「お尻を触るなんて……えっちなのさ」

    %CALLNAME:TARGET%は困惑しながらも、すぐには離れようとしなかった。

    「んっ……や、やめてよぉ……」

    %CALLNAME:TARGET%は戸惑った表情で%CALLNAME:MASTER%を見上げた。

    「こういうの……よくわからないのさ……」

    %CALLNAME:TARGET%の翼が落ち着きなく揺れている。

    「……っ！ そこ……触らないでよ……」

    %CALLNAME:TARGET%は顔を真っ赤にして抗議した。

    「本で読んだことはあるけど……実際にされると、変な感じなのさ」

    %CALLNAME:TARGET%は恥ずかしそうに身をすくめた。

    「あっ……%CALLNAME:MASTER%……？」

    %CALLNAME:TARGET%は不意打ちに体を硬くした。

    「急に何するのさ……びっくりしたよ……」

    %CALLNAME:TARGET%は困った顔をしながらも、逃げ出しはしなかった。
  priority: 2
- id: fallback
  content: >-
    「……触らないで」

    %CALLNAME:TARGET%の瞳に赤い光が宿った。

    「私に触ると……きゅっとして、ドカーンだよ？」

    %CALLNAME:TARGET%は危険な笑みを浮かべ、%CALLNAME:MASTER%を睨みつけた。

    「……何してるのさ」

    %CALLNAME:TARGET%は冷たい声で問いかけた。翼が警戒するように広がる。

    「勝手に触らないでよ……壊しちゃうよ？」

    %CALLNAME:TARGET%の指先がかすかに光を帯びた。

    「やめて」

    %CALLNAME:TARGET%は感情のこもらない声で言った。

    「……そういうの、よくわからないの。興味ないのさ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を払いのけた。

    「……ふぅん」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%を見つめた。

    「面白いことするね。でも、つまらないのさ」

    %CALLNAME:TARGET%の翼が苛立たしげに揺れている。
  priority: 1
