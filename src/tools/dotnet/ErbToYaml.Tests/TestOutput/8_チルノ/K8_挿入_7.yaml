entries:
- id: fallback
  content: >-
    「ねえ%CALLNAME:MASTER%、こうやって向かい合ってすると、顔近いね」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の膝の上に座り、正面から見つめている。

    「んっ……入ってきた……あったかい……」

    氷の妖精の体が、%CALLNAME:MASTER%に密着している。

    「こうしてると……%CALLNAME:MASTER%を独り占めしてる気分……えへへ」

    %CALLNAME:人物_チルノ%は嬉しそうに%CALLNAME:MASTER%に抱きついた。

    「%CALLNAME:MASTER%、あたいの顔ちゃんと見て」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の胡坐の上に跨り、顔を覗き込んでくる。

    ゆっくりと腰を落とすと、%CALLNAME:MASTER%が中に入っていく。

    「はぁっ……ん……こうやって繋がってるの、好き……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の首に腕を回し、頬を寄せた。

    「あたいだけの%CALLNAME:MASTER%……うん、最高……」

    「えへへ……向かい合うと、%CALLNAME:MASTER%の心臓の音聞こえる」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の胸に耳を当てている。

    対面座位で繋がりながら、小さな体が揺れている。

    「んっ……あ……奥まで来てる……気持ちいい……」

    %CALLNAME:人物_チルノ%は甘い声を漏らしながら、%CALLNAME:MASTER%にしがみついた。

    「……こういうの、最強とかじゃなくて……幸せ……」

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上に座ったまま、潤んだ瞳で見上げた。

    「こうして向かい合ってると……安心する」

    %CALLNAME:人物_チルノ%の冷たいはずの体が、今は熱を帯びている。

    「んっ……はぁ……ずっと、このままがいい……」

    そう言って、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に体を預けた。
