character: レミリア
situation: K5_挿入
entries:
- id: fallback
  content: >-
    「ふふ……今日は私が上に乗るわ、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は艶やかに微笑み、%CALLNAME:MASTER%を押し倒した。

    小さな身体が%CALLNAME:MASTER%の上に跨り、紅い瞳で見下ろす。

    「さあ……私の好きにさせてもらうわね」

    そう言って%CALLNAME:人物_レミリア%は自ら腰を下ろし、%CALLNAME:MASTER%を深く飲み込んだ。

    「んっ……あぁ……奥まで、入ってる……」

    紅魔館の主は、恋人の上で悦びに身を委ねていた。

    「%CALLNAME:MASTER%、動かないで。私に任せなさい」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胸に手を置き、腰を揺らし始めた。

    上から見下ろす紅い瞳には、愛おしさと支配欲が入り混じっている。

    「はぁっ……ん……この角度、いいわ……」

    %CALLNAME:人物_レミリア%は自ら快楽を貪るように腰を振った。

    「%CALLNAME:MASTER%……私に抱かれるのは、気持ちいい？」

    500年の吸血鬼が、恋人を支配する悦びに酔いしれていた。

    「んっ……%CALLNAME:MASTER%の上、居心地がいいわ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の上で小さく腰を揺らした。

    深く繋がったまま、二人の視線が絡み合う。

    「ふふ……こうして見下ろすのも、悪くないわね」

    %CALLNAME:人物_レミリア%が腰を上下に動かすと、甘い声が漏れた。

    「あっ……やぁ……自分で動くと、違う感覚ね……」

    永遠を生きる吸血鬼が、この一瞬の快楽に身を焦がしていた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の上に座り、紅い瞳で見つめた。

    自ら繋がりにいく姿に、吸血鬼のプライドなど微塵も見えない。

    「私があなたを気持ちよくしてあげる……」

    そう囁いて%CALLNAME:人物_レミリア%は腰を動かし始めた。

    「はぁ……っ、深い……%CALLNAME:MASTER%を、感じるわ……」

    高貴な吸血鬼の頬は恍惚に染まり、その瞳は愛おしさに潤んでいた。
  priority: 4
- id: talent_3_1
  content: >-
    「な……っ、た、たまには私が上でもいいでしょ……！」

    %CALLNAME:人物_レミリア%は頬を染めながら%CALLNAME:MASTER%の上に跨った。

    自分から動くのは恥ずかしいが、支配欲が勝った。

    「べ、別にあんたのためじゃないから……っ」

    %CALLNAME:人物_レミリア%が腰を下ろすと、小さく声を上げた。

    「あっ……入った……こ、これくらい、なんてことないわ」

    強がりながらも、その体は正直に快感を求めていた。

    「上に乗るくらい、できるに決まってるでしょ……」

    %CALLNAME:人物_レミリア%はぶつぶつ言いながら%CALLNAME:MASTER%の上に座った。

    しかし腰を動かそうとすると、どこかぎこちない。

    「ちょ……っ、笑わないでよ……！」

    %CALLNAME:人物_レミリア%は恥ずかしさを隠すように目を逸らした。

    「やぁっ……あ……じ、自分で動くのって、こんなに……」

    支配者のつもりが、快感に翻弄される姿を晒していた。

    「ふん……今日は私が主導権を握るわ」

    %CALLNAME:人物_レミリア%は高飛車に言いながら%CALLNAME:MASTER%の上に跨った。

    しかし腰を動かし始めると、すぐに息が乱れた。

    「あ……っ、この角度……深い……っ」

    %CALLNAME:人物_レミリア%は必死に威厳を保とうとした。

    「ば、馬鹿……変な顔で見ないでよ……っ」

    上に乗っているはずなのに、どちらが支配されているのかわからなくなっていた。

    「……今日は、私の好きにさせてもらうから」

    %CALLNAME:人物_レミリア%は照れ隠しに%CALLNAME:MASTER%から目を逸らしながら跨った。

    自分から動く恥ずかしさで、耳まで真っ赤になる。

    「見ないでったら……恥ずかしいでしょ……」

    %CALLNAME:人物_レミリア%が腰を揺らすと、甘い声が漏れた。

    「んっ……あぁ……っ、こ、これは……私がしたいだけだから……」

    素直になれないまま、%CALLNAME:人物_レミリア%は快楽を貪っていた。
  priority: 3
  condition:
    type: Talent
    talentType: 3
    threshold: 1
- id: fallback
  content: >-
    「……ふぅん、上に乗るのも悪くないわね」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を見下ろした。

    主として上に立つのは当然のこと。

    「まあいいわ。試してみましょう」

    %CALLNAME:人物_レミリア%が腰を落とすと、表情がわずかに揺らいだ。

    「……っ、なるほど。この角度は……悪くないわね」

    500年の吸血鬼は、新しい快感を冷静に分析しようとしていた。

    「……私が上に立つのは当然のことよ」

    %CALLNAME:人物_レミリア%は威厳を込めて言い、%CALLNAME:MASTER%の上に座った。

    支配する立場は心地よい。紅魔館の主としての本能だ。

    「さあ……どんな気分かしら」

    %CALLNAME:人物_レミリア%が腰を動かすと、予想以上の快感が走った。

    「っ……ほう、これは……なかなか……」

    認めたくない悦びが、吸血鬼の身体を巡っていた。

    「……こういう体勢もあるのね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の上に跨り、興味深そうに見下ろした。

    500年の威厳を持って、%CALLNAME:MASTER%を観察する。

    「いいわ……このまま私の好きにさせてもらう」

    %CALLNAME:人物_レミリア%が自ら動き始めると、息が乱れた。

    「ん……っ、思った以上に……違う感覚ね……」

    威厳を保とうとしながらも、その頬はほんのり紅かった。

    「……ふむ、騎乗というものを試してみましょう」

    %CALLNAME:人物_レミリア%は冷静を装って%CALLNAME:MASTER%の上に座った。

    主として使用人の上に立つのは、むしろ自然なこと。

    「動くわよ……」

    %CALLNAME:人物_レミリア%が腰を揺らすと、思わず声が漏れた。

    「……っ、この体勢は……なるほど、深いわね……」

    吸血鬼は、支配する側の快感に目覚め始めていた。
  priority: 2
- id: fallback
  content: >-
    「……ふふ、下僕の上に乗るのも主の特権よ」

    %CALLNAME:人物_レミリア%は冷たい微笑みを浮かべ、%CALLNAME:MASTER%の上に座った。

    馬乗りになった姿は、まさに獲物を支配する吸血鬼のもの。

    「光栄に思いなさい。500年の吸血鬼に跨られるのだから」

    %CALLNAME:人物_レミリア%が腰を下ろすと、%CALLNAME:MASTER%を見下ろした。

    「……ふん、まあまあね。もっと楽しませてちょうだい」

    紅魔館の主は、使用人を道具のように扱う姿勢を崩さなかった。

    「……今日は私が楽しませてもらうわ」

    %CALLNAME:人物_レミリア%は傲慢に宣言し、%CALLNAME:MASTER%の上に跨った。

    使用人を組み敷くのは、主として当然の行為。

    「下僕は黙って私を楽しませなさい」

    %CALLNAME:人物_レミリア%が腰を動かし始めると、わずかに目を細めた。

    「……悪くないわね。精々頑張りなさい」

    500年の吸血鬼は、感情を表に出さずに快楽を貪っていた。

    「……ほう、大人しくしているのね。賢明だわ」

    %CALLNAME:人物_レミリア%は冷笑を浮かべ、%CALLNAME:MASTER%の上に座った。

    獲物を押さえつける捕食者の余裕で、見下ろす。

    「逃げようとしても無駄よ。吸血鬼の力を侮らないことね」

    %CALLNAME:人物_レミリア%が腰を落とし、%CALLNAME:MASTER%を深く飲み込んだ。

    「……ふん、この程度では物足りないわね」

    紅魔館の主は、余裕を崩さずに%CALLNAME:MASTER%を見下ろしていた。

    「……退屈しのぎに、お前を使ってあげるわ」

    %CALLNAME:人物_レミリア%は溜息をつきながら%CALLNAME:MASTER%の上に座った。

    使用人は道具に過ぎない。主が楽しむためのもの。

    「感謝しなさい。私に跨られることなど、本来はありえないのだから」

    %CALLNAME:人物_レミリア%が腰を揺らすと、わずかに息を吐いた。

    「……まあ、使えなくはないわね」

    高飛車な態度のまま、%CALLNAME:人物_レミリア%は自分の快楽のために%CALLNAME:MASTER%を使い続けた。
  priority: 1
