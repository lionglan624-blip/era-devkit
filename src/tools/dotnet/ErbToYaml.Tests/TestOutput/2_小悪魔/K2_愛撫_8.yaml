- id: talent_3_1
  content: >-
    「え、ええっ……自慰を……見たいんですの……？」

    %CALLNAME:人物_小悪魔%は顔を真っ赤にして、おずおずと足を開いた。

    「……%CALLNAME:MASTER%がそう仰るなら……仕方ありませんわね……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに目を逸らしながら、秘所に手を伸ばした。

    「んっ……あ……見ないでって言っても……見るんでしょう……？」

    %CALLNAME:人物_小悪魔%は照れながらも、ゆっくりと指を動かし始めた。

    「……%CALLNAME:MASTER%のせいで……恥ずかしいですわ……」

    「こ、こんなところ……見せるの……初めてですわ……」

    %CALLNAME:人物_小悪魔%は震える手で自らの秘部に触れた。

    「あっ……んっ……恥ずかしい……ですわ……」

    %CALLNAME:人物_小悪魔%の指がぎこちなく動く。

    「……%CALLNAME:MASTER%に見られてると思うと……変な気持ちになっちゃいますわ……」

    %CALLNAME:人物_小悪魔%は恥じらいながらも、徐々に快楽に身を任せていった。

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の視線を感じながら、自らの体を愛撫し始めた。

    「……見てるんですの……？　恥ずかしい……ですわ……」

    「んっ……やぁ……」

    %CALLNAME:人物_小悪魔%の指が秘所を撫でると、甘い声が漏れた。

    「……%CALLNAME:MASTER%の前で……こんなこと……悪魔として……情けない……」

    %CALLNAME:人物_小悪魔%はそう言いながらも、指を止めることはなかった。

    「あ、あの……本当にするんですの……？」

    %CALLNAME:人物_小悪魔%は不安そうに%CALLNAME:MASTER%を見上げた。

    「……%CALLNAME:MASTER%が見たいって言うなら……」

    %CALLNAME:人物_小悪魔%は覚悟を決めたように、ゆっくりと秘所に手を伸ばした。

    「んっ……あ……こ、こうですの……？」

    %CALLNAME:人物_小悪魔%は戸惑いながらも、自らを慰め始めた。

    「……%CALLNAME:MASTER%……笑わないでくださいね……？」
