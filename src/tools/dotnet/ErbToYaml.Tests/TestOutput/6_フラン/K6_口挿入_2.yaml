- id: fallback
  content: >-
    「……胸で、挟むの？」

    %CALLNAME:人物_フラン%は首を傾げながら、自分の胸を見下ろした。

    地下室で過ごした長い年月、こんなことは知らなかった。

    「ふぅん……こういう使い方もあるのさ……」

    %CALLNAME:人物_フラン%は興味本位で胸を寄せてみた。

    「……こうすると……喜ぶんだ……変なの……」

    その声には、純粋な好奇心だけがあった。

    「%CALLNAME:MASTER%……私、こういうことよく知らないのさ……」

    %CALLNAME:人物_フラン%は正直に告白しながら、言われた通りに胸を動かしていた。

    495年の隔離生活で、世間のことは何も知らない。

    「でも……%CALLNAME:MASTER%が教えてくれるなら……」

    %CALLNAME:人物_フラン%はぎこちなく、それでも一生懸命に奉仕する。

    「……こう？　……もう少し強く？　……わかった……」

    素直に従う姿に、かつての凶暴さは見られなかった。

    「なんだか……胸がむずむずするのさ……」

    %CALLNAME:人物_フラン%は胸を動かしながら、自分の変化に戸惑っていた。

    %CALLNAME:MASTER%に触れていると、身体の奥がざわざわする。

    「……これって、どういう気持ちなの……？」

    %CALLNAME:人物_フラン%は無自覚のまま、胸の動きを速めていた。

    「……%CALLNAME:MASTER%のこと、もっと知りたくなってきたのさ……」

    その言葉は、芽生え始めた感情の表れだった。

    「……%CALLNAME:MASTER%といると、不思議な気持ちになるのさ」

    %CALLNAME:人物_フラン%はぼんやりと呟きながら、胸を動かし続けていた。

    壊してしまいたい衝動と、大切にしたい気持ちが入り混じる。

    「私……%CALLNAME:MASTER%のことは、壊したくないの……」

    %CALLNAME:人物_フラン%は真剣な表情で%CALLNAME:MASTER%を見つめた。

    「……だから、こうして優しくするのさ……」

    悪魔の妹は、初めての感情に戸惑いながらも向き合っていた。
  priority: 2
- id: fallback
  content: >-
    「……胸で挟めって言うの？」

    %CALLNAME:人物_フラン%は冷めた目で%CALLNAME:MASTER%を見つめた。

    その視線には、警戒と退屈が入り混じっている。

    「……まぁ、いいけど……」

    %CALLNAME:人物_フラン%は気怠そうに胸を寄せた。

    「……早く終わらせてよね……」

    義務的な動きで、最低限の奉仕をするだけだった。

    「……ふぅん……」

    %CALLNAME:人物_フラン%は興味なさそうに胸を動かしていた。

    その表情には、退屈さが滲み出ている。

    「……こういうの、何が楽しいの……？」

    %CALLNAME:人物_フラン%は投げやりな質問を投げかけた。

    「……まぁ、いいけど……あんたが喜ぶなら……」

    そこに愛情は欠片もなかった。

    「……」

    %CALLNAME:人物_フラン%は無言で胸を動かしていた。

    その紅い瞳は、どこか虚ろに%CALLNAME:MASTER%を見ている。

    「……お姉さまなら、こんなこと許さないのにね……」

    %CALLNAME:人物_フラン%はぽつりと呟いた。

    「……でも、私はどうでもいいのさ……」

    悪魔の妹は、心をどこかに置き去りにしていた。

    「……これで満足……？」

    %CALLNAME:人物_フラン%は退屈そうに胸を動かしながら、問いかけた。

    壊してしまおうかという衝動が、一瞬頭をよぎる。

    「……別に、握りつぶしてもいいんだけど……」

    %CALLNAME:人物_フラン%は危険な微笑みを浮かべた。

    「……今日のところは、やめておいてあげる……」

    その言葉には、狂気の残滓が垣間見えた。
  priority: 1
