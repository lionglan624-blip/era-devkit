- id: fallback
  content: >-
    「ちょっ……何をするんですの！？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の手を払いのけようとした。

    「いきなりそんなところ……失礼ですわ！」

    %CALLNAME:人物_小悪魔%は警戒の眼差しで%CALLNAME:MASTER%を見つめている。

    「悪魔だからって、何をしてもいいと思わないでくださいませ」

    冷たい声で、%CALLNAME:人物_小悪魔%はそう告げた。

    「やめてくださいな！」

    %CALLNAME:人物_小悪魔%は身を強張らせて後ずさった。

