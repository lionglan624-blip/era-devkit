    「……後ろでも、気持ちよくなっちゃったみたい……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに微笑みながら、そう告白した。

    「あっ……やぁ……そこ……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に後ろの穴を弄られて、甘い声を上げている。

    「ふぁ……ん……%CALLNAME:MASTER%の指、上手……」

    %CALLNAME:人物_美鈴%の体がぴくぴくと反応している。

    「……こんな場所で感じちゃうなんて……変態さんになっちゃったかも……」

    %CALLNAME:人物_美鈴%は照れくさそうに笑いながら、%CALLNAME:MASTER%にしがみついた。

    %CALLNAME:人物_美鈴%は自分からお尻を%CALLNAME:MASTER%の方に向けた。

    「……%CALLNAME:MASTER%……そこ、触って……？」

    %CALLNAME:人物_美鈴%は恥ずかしそうに顔を伏せながら、そうお願いしている。

    「んっ……あ……やっぱり、%CALLNAME:MASTER%の指、気持ちいい……」

    %CALLNAME:人物_美鈴%は後ろの穴を愛撫されながら、蕩けた表情を浮かべている。

    「……門番失格、かしら……ふふ……」

    %CALLNAME:人物_美鈴%は幸せそうに笑って、%CALLNAME:MASTER%に体を預けた。
