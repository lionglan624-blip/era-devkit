- id: talent_3_1
  content: >-
    「んっ……ちゅ……む……」

    %CALLNAME:人物_咲夜%は%CALLNAME:MASTER%のキスを受け入れながら、頬を染めている。

    その唇は控えめながらも、確かに%CALLNAME:MASTER%を求めていた。

    「ちゅる……ん……ぷ、は……」

    「……メイドとしては失格ね……こんなにも、熱くなってしまうなんて」

    %CALLNAME:人物_咲夜%は恥ずかしそうに目を伏せながらも、その唇は微かに微笑んでいた。

    「ん……%CALLNAME:MASTER%……」

    %CALLNAME:人物_咲夜%は静かに目を閉じ、%CALLNAME:MASTER%の唇を待っている。

    「ちゅ、ん……れろ……んむ……」

    控えめながらも、%CALLNAME:人物_咲夜%の舌が%CALLNAME:MASTER%の唇に触れた。

    その仕草に、彼女の秘めた想いが滲み出ている。

    「……はぁ……お嬢様には、内緒にしてくださいね……？」

    %CALLNAME:人物_咲夜%は上気した顔で、そう囁いた。

    %CALLNAME:MASTER%が近づくと、%CALLNAME:人物_咲夜%は少し身構えた。

    しかし、唇が触れると抵抗なく目を閉じた。

    「ん……ちゅ……んむ……」

    %CALLNAME:人物_咲夜%は静かに%CALLNAME:MASTER%のキスを受け止めている。

    「……ぷは……あ……」

    「……いつから、こんな気持ちになったのかしら……」

    %CALLNAME:人物_咲夜%は自分自身に戸惑いながらも、どこか嬉しそうだった。

    「%CALLNAME:MASTER%、また……」

    %CALLNAME:人物_咲夜%は少し呆れたような、しかし嬉しそうな顔をした。

    「んっ……ちゅる……はぁ……」

    唇が触れ合い、%CALLNAME:人物_咲夜%の体温が伝わってくる。

    「……むぅ……ぷはっ……」

    「……仕方ないわね。少しだけ、お相手して差し上げるわ」

    そう言いながらも、%CALLNAME:人物_咲夜%は自ら唇を寄せ直した。
