- id: fallback
  content: >-
    「……何の真似かしら」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が持つアナルバイブを見て、冷ややかな目を向けた。

    「そんな下品な道具を私の後ろに……」

    しかし挿入された瞬間、%CALLNAME:TARGET%の表情が強張った。

    「……っ……中で……うねってる……」

    冷淡を装おうとするが、%CALLNAME:TARGET%の体は小さく震えていた。

    「……」

    %CALLNAME:TARGET%は無表情でアナルバイブのうねりを受けている。

    その表情は読み取れないが、呼吸が微かに乱れている。

    「……これで満足……かしら……」

    %CALLNAME:TARGET%は冷めた声で問いかけたが、語尾が震えていた。

    「……早く終わらせて……読書に戻りたいのだけど……」

    「……むきゅ」

    %CALLNAME:TARGET%は不快そうに眉を寄せたが、その反応は本物だった。

    アナルバイブのうねりが腸内を責め、%CALLNAME:TARGET%の冷淡な態度を揺さぶっている。

    「……下品な道具ね……でも……悪くは……ない……かも……」

    %CALLNAME:TARGET%は認めたくないように、視線を逸らした。

    「……勘違いしないで。ただの感想よ」

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついたが、それは快感を逃がすためだった。

    「あなたは私の後ろに何を求めているの……理解に苦しむわ……」

    %CALLNAME:TARGET%は呆れた表情を浮かべているが、その体はうねりに反応している。

    「……好きにしなさい……ただし……読書の邪魔は……」

    言い終える前に、%CALLNAME:TARGET%は小さく声を漏らした。
