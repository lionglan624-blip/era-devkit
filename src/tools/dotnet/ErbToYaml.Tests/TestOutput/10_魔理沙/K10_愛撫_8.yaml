character: 魔理沙
situation: K10_愛撫
entries:
- id: fallback
  content: >-
    「……ん、お前、そこを見たいのか？」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%に秘部を広げられ、呆れたような顔をした。

    %CALLNAME:MASTER%が両指で花弁を左右に開くと、桃色の内壁が露わになる。

    「……まあ、恋人なんだから見せてやるぜ」

    %CALLNAME:人物_魔理沙%は頬を染めながらも、%CALLNAME:MASTER%の視線を受け入れている。

    「……でも、あんまりじろじろ見るなよな……恥ずかしいだろ」

    照れ隠しに強がるものの、%CALLNAME:人物_魔理沙%の声は少し甘く震えていた。

    「あっ……そ、そこは……」

    %CALLNAME:人物_魔理沙%は秘部を開かれて、思わず声を漏らした。

    鮮やかな桃色の内壁が、%CALLNAME:MASTER%の目の前に晒される。

    「……お前さ、こういうの好きだよな。変態だぜ」

    そう言いながらも、%CALLNAME:人物_魔理沙%は脚を閉じようとはしなかった。

    「……ったく、お前の前だと私、なんでも見せちまうな」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに、でも嬉しそうに呟いた。

    「んっ……開かれてる……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%に秘部を広げられ、熱い息を吐いた。

    愛液で濡れ光る膣内が露わになり、ひくひくと蠢いている。

    「……%CALLNAME:MASTER%に見られてると思うと、変な気持ちになるぜ」

    %CALLNAME:人物_魔理沙%は顔を真っ赤にしながら、%CALLNAME:MASTER%を見つめた。

    「……私のこと、ちゃんと見てくれてるんだな」

    その言葉には、恋人への信頼と愛情が滲んでいた。

    「……そこ、自分でも見たことないんだぜ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%に秘部を開かれながら、ぼそりと呟いた。

    %CALLNAME:MASTER%はじっくりと%CALLNAME:人物_魔理沙%の秘部を鑑賞している。

    「……どうだ？　私の……その……綺麗か？」

    珍しく不安そうに問いかける%CALLNAME:人物_魔理沙%。

    「……お前に綺麗って言われたら、嬉しいかもな」

    %CALLNAME:人物_魔理沙%は恋人の答えを待つように、%CALLNAME:MASTER%の顔を見つめた。
