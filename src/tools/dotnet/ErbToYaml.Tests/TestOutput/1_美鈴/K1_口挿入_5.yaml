  content: >-
    「……え、足で……ですか……」

    %CALLNAME:人物_美鈴%は困惑した表情で一物を見つめた。

    「……そういうの……経験ないんですけど……」

    おずおずと、%CALLNAME:人物_美鈴%は足を伸ばした。

    「……と、とりあえず……踏めばいいんですよね……」

    %CALLNAME:人物_美鈴%は恐る恐る足裏を一物に押し当てた。

    「……これで合ってます……？」

    「……%CALLNAME:MASTER%のお願いだから……やりますけど……」

    %CALLNAME:人物_美鈴%は仕方なさそうに呟いた。

    「……本当は門番の仕事中なんですけどね……」

    ぶつぶつ言いながらも、%CALLNAME:人物_美鈴%は足を添えた。

    「……こうやって上下に動かせばいいんですよね……」

    %CALLNAME:人物_美鈴%は見よう見まねで足を動かし始めた。

    「……変なこと考えないでくださいよ……？」

    「……これも、修行の一環……ですよね……？」

    %CALLNAME:人物_美鈴%は自分に言い聞かせるように呟いた。

    「……足先の器用さとか……そういう……」

    無理のある言い訳をしながら、%CALLNAME:人物_美鈴%は足を動かす。

    「……あ……なんか、ぬるっとしたの、出てきた……」

    %CALLNAME:人物_美鈴%は先走りに驚いた顔をした。

    「……これって……気持ちいい、ってこと……？」

    「……一回だけ……ですからね……？」

    %CALLNAME:人物_美鈴%はそう言いながら、一物に足を伸ばした。

    「……誰かに見られたら困りますし……」

    周囲を気にしながら、%CALLNAME:人物_美鈴%は足裏で一物を擦り始めた。

    「……ん……思ったより、熱い……」

    %CALLNAME:人物_美鈴%は顔を赤らめながら、足を動かした。

    「……早く済ませましょう……」
