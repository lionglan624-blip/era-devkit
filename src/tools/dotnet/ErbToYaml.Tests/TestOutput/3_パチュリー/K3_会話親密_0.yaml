- id: fallback
  content: >-
    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の話を興味なさそうに聞いていた。

    「――ふぅん、そう」

    %CALLNAME:人物_パチュリー%は素っ気ない返事をした。

    「あまり興味のある話題ではないわね」

    しかし%CALLNAME:人物_パチュリー%は本のページをめくっていない。

    「……でも、聞いてあげるわ。暇だから」

    「――それだけ？」

    %CALLNAME:人物_パチュリー%は淡々と言った。

    「もう少し知的な話題を期待していたのだけど」

    %CALLNAME:MASTER%が苦笑すると、

    「……まあいいわ。あなたに多くを求めても仕方ないものね」

    %CALLNAME:人物_パチュリー%は小さく溜息をついた。

    「――……」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の話を聞きながら、本のページをめくっている。

    「……あら、もう終わり？」

    %CALLNAME:人物_パチュリー%は顔を上げ、%CALLNAME:MASTER%を見た。

    「別に、あなたの話に興味があるわけじゃないわ。ただ……」

    %CALLNAME:人物_パチュリー%は言葉を濁し、視線を逸らした。

    「……静かすぎると、集中できないの。それだけよ」

    「――この本の話、聞きたい？」

    %CALLNAME:人物_パチュリー%は唐突にそう言った。

    「……あなたの話ばかり聞いていても、退屈だから」

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_パチュリー%は少し嬉しそうに本を持ち上げた。

    「これはね、七曜の精霊魔法について書かれた古書なの」

    「……ふん、少しは知的な時間を過ごしなさい」
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:人物_パチュリー%は本から顔を上げず、%CALLNAME:MASTER%の話を聞いている。

    「――…何の用？」

    %CALLNAME:人物_パチュリー%は本から目を離さずにそう言った。

    「話があるなら手短に。読書の邪魔なの」

    %CALLNAME:MASTER%の話が終わると、%CALLNAME:人物_パチュリー%は興味なさそうに頷いた。

    「……ふぅん。それだけ？　ならもう行っていいわよ」

    「――……」

    %CALLNAME:人物_パチュリー%は黙って本を読んでいる。

    しばらくして、ようやく口を開いた。

    「聞いていないわけじゃないわ。ただ、返事をする価値があるかどうか考えていたの」

    「……結論としては、微妙ね」

    「――…誰？」

    %CALLNAME:人物_パチュリー%は本から視線を上げることなく、冷ややかに問いかけた。

    「ああ、あなた。……何か用？」

    %CALLNAME:MASTER%が話しかけても、%CALLNAME:人物_パチュリー%は素っ気ない態度を崩さない。

    「私は忙しいの。用がないなら出て行って」

    %CALLNAME:人物_パチュリー%はそう言って、再び本に没頭し始めた。

    「――…また来たの」

    %CALLNAME:人物_パチュリー%は溜息混じりにそう言った。

    「私の図書館に用があるなら、静かにしていて」

    %CALLNAME:MASTER%の話に、%CALLNAME:人物_パチュリー%は形だけ頷いている。

    「……ふぅん。それで？」

    興味なさそうな返事だったが、追い返そうとはしなかった。
  priority: 1
