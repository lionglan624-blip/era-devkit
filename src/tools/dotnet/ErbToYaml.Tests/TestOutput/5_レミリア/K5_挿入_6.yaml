- id: fallback
  content: >-
    「……ふむ、後ろを使う遊びもあるのね」

    %CALLNAME:人物_レミリア%は冷静を装い、%CALLNAME:MASTER%の上に跨った。

    主として新しい快楽を探求するのは当然のこと。

    「いいわ……試してあげる」

    %CALLNAME:人物_レミリア%が腰を落とすと、予想外の感覚に息を呑んだ。

    「……っ、なるほど。これは……独特ね……」

    500年の吸血鬼は、動揺を隠しながら新たな快感を分析しようとした。

    「……後ろを試すのも、悪くないかもしれないわね」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を見下ろし、座った。

    支配者として、あらゆる快楽を知っておくべき。

    「さて……どんな感じかしら」

    %CALLNAME:人物_レミリア%が後ろに迎え入れると、表情がわずかに揺らいだ。

    「っ……こ、これは……思った以上に……」

    威厳を保とうとしても、禁断の快感に吸血鬼の身体は反応していた。

    「……ほう、こういう体勢もあるのね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の上に跨り、後ろを宛てがった。

    主として実験するのだから、何も恥ずかしくはない。

    「お前は動くな。私が確かめるわ」

    %CALLNAME:人物_レミリア%がゆっくり腰を沈めると、眉をひそめた。

    「……ふぅ……っ、この感覚は……なるほど……」

    認めたくない悦びが、吸血鬼の冷静さを少しずつ崩していった。

    「……後ろでの行為に興味があるわ。協力しなさい」

    %CALLNAME:人物_レミリア%は命令口調で言い、%CALLNAME:MASTER%の上に座った。

    主としての探求心で、禁断の領域に踏み込む。

    「いいわ……入れるわよ」

    %CALLNAME:人物_レミリア%が後ろに受け入れると、思わず声が漏れた。

    「あ……っ、これは……想像と違う……」

    500年の威厳が、未知の快感に揺らいでいた。
  priority: 2
- id: fallback
  content: >-
    「……ふふ、下僕にはこういう遊びもしてあげるわ」

    %CALLNAME:人物_レミリア%は冷笑を浮かべ、%CALLNAME:MASTER%の上に跨った。

    後ろを使う背徳的な行為も、主の気まぐれに過ぎない。

    「光栄に思いなさい。500年の吸血鬼がこんなことをするのだから」

    %CALLNAME:人物_レミリア%が腰を沈めると、わずかに息を吐いた。

    「……ふん、まあ悪くはないわね」

    紅魔館の主は、感情を表に出さずに禁断の行為を楽しんでいた。

    「……今日は少し変わった遊びをしてあげるわ」

    %CALLNAME:人物_レミリア%は傲慢に宣言し、%CALLNAME:MASTER%の上に座った。

    後ろを使うことさえ、使用人への施しに過ぎない。

    「感謝しなさい。こんな姿を見せてやるのだから」

    %CALLNAME:人物_レミリア%が後ろに迎え入れると、わずかに目を細めた。

    「……悪くないわ。もっと楽しませなさい」

    500年の吸血鬼は、余裕を崩さずに背徳の快楽を貪った。

    「……ほう、大人しくしているのね。賢明だわ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を見下ろし、後ろを宛てがった。

    獲物を弄ぶように、ゆっくりと腰を落とす。

    「逃げても無駄よ。私の玩具として使ってあげる」

    %CALLNAME:人物_レミリア%が深く飲み込むと、冷笑を浮かべた。

    「……ふふ、この背徳感も悪くないわね」

    紅魔館の主は、禁断の行為を余裕の表情で楽しんでいた。

    「……退屈だから、少し刺激的な遊びをしてあげるわ」

    %CALLNAME:人物_レミリア%は溜息をつき、%CALLNAME:MASTER%の上に跨った。

    後ろを使う禁忌さえ、永遠を生きる者の戯れに過ぎない。

    「動くんじゃないわよ。私が楽しむのだから」

    %CALLNAME:人物_レミリア%が腰を沈めると、わずかに眉を上げた。

    「……ふぅん、こういう感覚も……まあ、悪くはないわね」

    高飛車な態度のまま、吸血鬼は背徳の快楽に身を委ねていた。
  priority: 1
