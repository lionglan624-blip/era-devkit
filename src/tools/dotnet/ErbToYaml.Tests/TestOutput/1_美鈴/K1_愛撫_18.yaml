- id: fallback
  content: >-
    「ちょっ……何ですか、それ！？　小さい道具が……」

    %CALLNAME:人物_美鈴%はクリップローターを見て、驚いて後ずさった。

    「いきなりそういうのは……困ります！」

    %CALLNAME:人物_美鈴%は警戒するような目で%CALLNAME:MASTER%を見た。

    「……門番として、そんな道具を体につけられるのは……」

    %CALLNAME:人物_美鈴%は困惑しながらも、毅然とした態度を保とうとした。

    「えっ……」

    %CALLNAME:人物_美鈴%は取り出されたクリップローターに固まった。

    「あ、あの……%CALLNAME:MASTER%？　何を考えてるんですか……」

    %CALLNAME:人物_美鈴%は戸惑いを隠せない。

    「……すみません、乳首に道具をつけるのは……ちょっと……」

    %CALLNAME:人物_美鈴%は困った顔で、静かに距離を取った。

    「な、何を……！」

    %CALLNAME:人物_美鈴%は反射的に胸を隠した。

    「……私、まだあなたのことよく知らないんですけど」

    %CALLNAME:人物_美鈴%は冷たい視線を向けた。

    「そういう道具を持ち出すのは……もっと親しくなってからにしてください」

    %CALLNAME:人物_美鈴%はきっぱりと拒絶した。

    「……」

    %CALLNAME:人物_美鈴%は無言で%CALLNAME:MASTER%の手を止めた。

    「%CALLNAME:MASTER%……何をお考えかわかりませんが」

    %CALLNAME:人物_美鈴%は真剣な表情で%CALLNAME:MASTER%を見つめた。

    「私はまだ、あなたのことをよく知りません」

    「……そういう道具を使うような関係ではないと思います」
