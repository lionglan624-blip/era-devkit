- id: fallback
  content: >-
    「……お尻？　なんでそんなところに入れるの？」

    %CALLNAME:人物_フラン%は不思議そうに首を傾げた。

    495年の孤独の中では、こんな行為のことは知らなかった。

    「……まあ、%CALLNAME:MASTER%がそうしたいなら、やってみてもいいけど」

    %CALLNAME:人物_フラン%がゆっくりと腰を下ろすと、顔をしかめた。

    「っ……！　い、痛いのさ……これ、本当に気持ちいいの……？」

    悪魔の妹は戸惑いながらも、新しい体験への興味を隠せなかった。

    「%CALLNAME:MASTER%って、変なことするのさ……」

    %CALLNAME:人物_フラン%は呆れたように言いながらも、言われた通りに跨った。

    後ろから入れるなど、考えたこともなかった。

    「……495年、ひとりだったから。こういうの、知らなかったの」

    %CALLNAME:人物_フラン%が腰を落とすと、痛みに眉をしかめた。

    「う……ん……変な感じ……前とは違う……でも、悪くは……ないかも……」

    その言葉は、%CALLNAME:人物_フラン%なりの精一杯の肯定だった。

    「……これ、怖くないの？　私が力入れちゃったら、壊れちゃうよ？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見下ろしながら問いかけた。

    上から押さえつける体勢で、しかも痛みがある。力の加減が難しい。

    「……%CALLNAME:MASTER%って、本当に変な人なのさ」

    %CALLNAME:人物_フラン%がゆっくり腰を動かすと、痛みと共に不思議な感覚が生まれた。

    「んっ……あれ……痛いだけじゃない……なんか、変な感じがする……」

    悪魔の妹は、未知の感覚に戸惑いながらも興味深そうに動き続けた。

    「お姉様は……こういうこと、知ってるのかな……」

    %CALLNAME:人物_フラン%はぼんやりと呟きながら、%CALLNAME:MASTER%の上で腰を揺らした。

    自分だけが知らない世界が、まだたくさんあるらしい。

    「……地下室にいたら、永遠に知らなかったのさ」

    %CALLNAME:人物_フラン%が深く腰を落とすと、痛みに声を漏らした。

    「っ……ん……痛いけど……%CALLNAME:MASTER%といると、新しいこと知れるから……」

    その言葉には、素直な感謝の気持ちが込められていた。
  priority: 2
- id: fallback
  content: >-
    「ふぅん……そこに入れると、どうなるのさ？」

    %CALLNAME:人物_フラン%は興味深そうに%CALLNAME:MASTER%を見下ろした。

    その紅い瞳には、新しい玩具を見つけた子供のような好奇心が宿っている。

    「……やってみるのさ。壊れないでね？」

    %CALLNAME:人物_フラン%がゆっくりと腰を落とすと、顔をしかめた。

    「っ……痛い……でも、面白いのさ。前とは違う感じがする……」

    悪魔の妹は、痛みすらも新しい遊びとして受け入れていた。

    「きゅっとしてドカーンって、ここでもできるのかな？」

    %CALLNAME:人物_フラン%は危険なことを無邪気に呟きながら、腰を動かした。

    上から押さえつける体勢で、相手は完全に無防備だ。

    「ここって、壊れやすそうだよね……%CALLNAME:MASTER%のこと」

    しかし、%CALLNAME:人物_フラン%自身が動くと、痛みに表情が揺らいだ。

    「う……っ……痛いのさ……でも、壊すのと違う痛み……不思議……」

    破壊の衝動と自分の感じる痛みが混じり合い、悪魔の妹を困惑させていた。

    「……」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%を見下ろした。

    495年の孤独が生んだ、どこか虚ろな瞳。

    「ここにも入るんだ……人間って、壊れやすいのに変な作りしてるのさ」

    %CALLNAME:人物_フラン%が腰を落とすと、痛みに眉をひそめた。

    「んっ……痛い……でも、こうして繋がってると……壊したくなくなる……変なの」

    破壊衝動を鈍らせる何かに、悪魔の妹は戸惑いを隠せなかった。

    「%CALLNAME:MASTER%……ここに入れると、壊れちゃわない？」

    %CALLNAME:人物_フラン%は警告するように言いながら、好奇心を抑えきれない様子だった。

    新しい遊び方を見つけた興奮が、紅い瞳に灯っている。

    「コンティニューできないんだよ？　私が力入れたら終わりなのさ」

    しかし、%CALLNAME:人物_フラン%が腰を動かすと、痛みに声を漏らした。

    「あっ……う……これ、私も痛いんだ……玩具で遊んでるつもりだったのに……」

    予想外の感覚に、悪魔の妹は戸惑いながらも動きを止めなかった。
  priority: 1
