- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%に抱きついた。

    「……っ！？ %CALLNAME:MASTER%……！？」

    %CALLNAME:人物_咲夜%は顔を赤くして固まった。

    「い、いきなり抱きつくなんて……困るわ」

    戸惑いながらも、%CALLNAME:人物_咲夜%は%CALLNAME:MASTER%を押し退けはしなかった。

    「……まあ、温かいわ……嫌じゃないけれど……」

    恥ずかしそうに目を逸らしながら、%CALLNAME:人物_咲夜%は小声でそう言った。

    「わっ……」

    突然の抱擁に、%CALLNAME:人物_咲夜%は動揺した声を上げた。

    「%CALLNAME:MASTER%、急にどうしたの……」

    %CALLNAME:人物_咲夜%は困惑しながらも、抵抗はしなかった。

    「……疲れているの？ お茶でも淹れましょうか」

    戸惑いながらも、%CALLNAME:人物_咲夜%は%CALLNAME:MASTER%の背中を軽く叩いた。

    「……温かいわね。でも、あまり長いのは困るわ」

    %CALLNAME:MASTER%が近づいてくると、%CALLNAME:人物_咲夜%は身構えた。

    「え、ちょっ……」

    だが、抱きつかれてしまうと、%CALLNAME:人物_咲夜%は抵抗できなかった。

    「……%CALLNAME:MASTER%、これは……その……」

    %CALLNAME:人物_咲夜%は顔を真っ赤にしながら、どうすればいいか分からない様子だった。

    「……一応、メイドとしてはお客様に失礼なのだけれど……」

    小声でそう言いながらも、%CALLNAME:人物_咲夜%は%CALLNAME:MASTER%から離れようとはしなかった。

    「……%CALLNAME:MASTER%？」

    抱きしめられた%CALLNAME:人物_咲夜%は、目を丸くした。

    「こういうことは……もう少し、親しくなってからにしてほしいのだけれど……」

    %CALLNAME:人物_咲夜%は困ったように眉を下げた。

    「……でも、悪い気はしないわ。不思議ね」

    %CALLNAME:人物_咲夜%は戸惑いながらも、%CALLNAME:MASTER%の温もりを感じていた。
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%に抱きつこうとした。

    「……何をなさっているの？」

    %CALLNAME:人物_咲夜%は冷静に身を引いた。

    「いきなり抱きつくなんて……礼儀がなっていないわ」

    困惑した表情で、%CALLNAME:人物_咲夜%は%CALLNAME:MASTER%を見つめた。

    「……もう少し距離を縮めてからにしてちょうだい」

    %CALLNAME:人物_咲夜%は瀟洒に微笑みながらも、明確に距離を取った。

    「……ちょっと」

    %CALLNAME:MASTER%が近づいてきて、%CALLNAME:人物_咲夜%は後ずさった。

    「抱きつくのは……その……」

    %CALLNAME:人物_咲夜%は居心地悪そうに視線を泳がせた。

    「メイドとして、お客様との適切な距離があるの」

    丁重に、しかし明確に、%CALLNAME:人物_咲夜%は距離を置いた。

    「……」

    %CALLNAME:MASTER%が抱きつこうとすると、%CALLNAME:人物_咲夜%は素早く身を躱した。

    「瀟洒なメイドは、不意を突かれても冷静なものよ」

    %CALLNAME:人物_咲夜%は涼しい顔でそう言った。

    「……お客様、少し落ち着いてくださいな」

    丁寧だが、どこか冷たい声だった。

    %CALLNAME:MASTER%が腕を広げて近づくと、%CALLNAME:人物_咲夜%は眉をひそめた。

    「……何のつもりかしら？」

    「いきなり抱きつこうなんて、お行儀が悪いわ」

    %CALLNAME:人物_咲夜%は%CALLNAME:MASTER%の動きを制するように手を上げた。

    「まずはお茶でもいかが？ 落ち着いてからにしてちょうだい」

    完璧なメイドスマイルで、%CALLNAME:人物_咲夜%はそう切り返した。
  priority: 1
