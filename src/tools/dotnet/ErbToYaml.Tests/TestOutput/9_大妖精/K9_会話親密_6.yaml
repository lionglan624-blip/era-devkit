- id: fallback
  content: >-
    「きゃぁっ！？　な、何するんですか……！」

    %CALLNAME:TARGET%は驚いて胸を隠した。

    「そ、そんなところ……触らないでください……」

    %CALLNAME:TARGET%は怯えた目で%CALLNAME:MASTER%を見ている。

    「……わたし、そういうの……分からないです……」

    「ひゃっ……！　%CALLNAME:MASTER%さん……？」

    %CALLNAME:TARGET%は突然の接触に身を硬くした。

    「あ、あの……こういうことは……困ります……」

    %CALLNAME:TARGET%は困惑と不安を滲ませながら、助けを求めるように周囲を見回した。

    「……チルノちゃん、どこにいるのかな……」

    「えっ……あ、あの……」

    %CALLNAME:TARGET%は何が起きているのか理解できていないようだ。

    「……これは……どういうことなんですか……？」

    %CALLNAME:TARGET%は不安そうに%CALLNAME:MASTER%を見上げている。

    「……人間の人は……こういうことを……するんですか……？」

    「やっ……！　駄目です……胸は……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を押し退けようとした。

    「わ、わたし……まだ……心の準備が……」

    %CALLNAME:TARGET%は怯えながらも、強く拒絶はできないでいる。

    「……お願い……優しく……してください……」

    %CALLNAME:TARGET%は小さな声で懇願した。
