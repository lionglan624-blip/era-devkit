character: 小悪魔
situation: K2_口挿入
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……ふふっ、私の足がほしいんですの？」

    %CALLNAME:人物_小悪魔%は悪戯っぽく笑いながら、足を持ち上げた。

    そっと%CALLNAME:MASTER%の一物に足裏を押し当てる。

    「悪魔の足……味わってくださいませ……んっ……」

    %CALLNAME:人物_小悪魔%は愛おしそうに足を動かし、一物を柔らかく撫でた。

    「ふふ……%CALLNAME:MASTER%の……どんどん硬くなってきますわ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の一物を両足で挟み込んだ。

    「んっ……こうやって……挟んであげると……」

    柔らかな足裏が一物を包み込み、ゆっくりと擦り始める。

    「ふふ……気持ちいいでしょう？　私の足……」

    %CALLNAME:人物_小悪魔%は上目遣いで%CALLNAME:MASTER%を見つめながら、足を動かした。

    「もっと……もっと気持ちよくしてあげますわ……」

    「ねえ、%CALLNAME:MASTER%……私の足、上手になりました？」

    %CALLNAME:人物_小悪魔%は足で一物を挟みながら、嬉しそうに目を細めている。

    足指で鈴口をつついて、%CALLNAME:MASTER%の反応を楽しんでいる。

    「んっ……ふふ、こうすると……びくってしますわよね……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の弱点を熟知しているかのように、緩急をつけて動く。

    「悪魔に足で奉仕されるって……どんな気分ですの……？　ふふっ……」

    %CALLNAME:人物_小悪魔%は蕩けるような笑みを浮かべ、足を一物に絡ませた。

    「%CALLNAME:MASTER%……私、あなたのこと……本当に好き……」

    ねっとりと足指を動かしながら、%CALLNAME:人物_小悪魔%は愛を囁く。

    「だから……こうやって足でも奉仕できるのが……幸せですわ……」

    %CALLNAME:人物_小悪魔%は両足で一物をしっかりと挟み込み、上下に擦り上げた。

    「ん……じゅり……ふふ、全部……受け止めますわ……」
  priority: 4
- id: talent_3_1
  content: >-
    「え、えっと……あ、足で……ですか……？」

    %CALLNAME:人物_小悪魔%は顔を赤くしながらも、足を差し出した。

    おずおずと足裏を一物に押し当てている。

    「こ、こうすれば……いいんですよね……んっ……」

    %CALLNAME:人物_小悪魔%は恐る恐る足を動かし、一物を撫でた。

    「……熱い……こんなに熱いんですのね……」

    %CALLNAME:人物_小悪魔%は両足で一物を挟み、ゆっくりと動かしている。

    「んっ……こ、こうですか……？　気持ちいいですか……？」

    慣れない動きながらも、一生懸命に奉仕しようとしている。

    「あ、あの……難しいですわ……足って……」

    %CALLNAME:人物_小悪魔%は困った顔をしながらも、やめようとはしない。

    「……もう少し……頑張りますから……」

    「%CALLNAME:MASTER%……こんなこと、させるなんて……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに俯きながら、足を動かした。

    「でも……%CALLNAME:MASTER%になら……いいかも……って……」

    足指で一物を挟んで、上下に擦り始める。

    「……ふ……ん……変な感じですわ……でも嫌じゃない……」

    %CALLNAME:人物_小悪魔%の尻尾がそわそわと揺れている。

    %CALLNAME:人物_小悪魔%は意を決したように、両足で一物を挟み込んだ。

    「んっ……は、はぁ……ん……」

    頬が赤く染まり、目が潤んでいる。

    「ふ……ん……%CALLNAME:MASTER%……あまり見ないでください……」

    恥ずかしそうにしながらも、%CALLNAME:人物_小悪魔%は足を動かし続けた。

    「……足で奉仕なんて……悪魔として、どうなんでしょう……」
