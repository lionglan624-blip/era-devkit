    「まあ、ボクも色々集めてるから、人のことは言えないけどさ」

    「あ……ん、吸われると、力が抜けるな……」

    %CALLNAME:人物_魔理沙%は搾乳機に身を任せながら、甘い声を漏らした。

    機械のリズムに合わせて、%CALLNAME:人物_魔理沙%の呼吸も乱れていく。

    「恋人にこんな姿見せるなんて……ちょっと恥ずかしいけど」

    %CALLNAME:人物_魔理沙%は照れながらも、%CALLNAME:MASTER%の手を握った。

    「……お前となら、何でもできる気がするぜ」

    「はぁ……これ、意外と気持ちいいかも……」

    %CALLNAME:人物_魔理沙%は搾乳機の刺激に体を委ねた。

    規則的な吸引が%CALLNAME:人物_魔理沙%の胸を刺激し続ける。

    「魔法使いのボクが、こんなことされてるなんて……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに笑った。

    「でも、お前の前だから、素直になれるんだぜ」
