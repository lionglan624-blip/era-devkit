- id: fallback
  content: >-
    「……これもメイドの務め……ですわね……」

    %CALLNAME:TARGET%は複雑な表情で、自らの胸を%CALLNAME:MASTER%の一物に押し当てた。

    「……お客様のおもてなしも、仕事の内ですわ」

    淡々とした口調の中に、微かな動揺が見え隠れしている。

    「んっ……こうすればよろしいのかしら……」

    %CALLNAME:TARGET%は胸を動かしながら、%CALLNAME:MASTER%の反応を窺った。

    「……%CALLNAME:MASTER%、これでよろしいのでしょうか……」

    %CALLNAME:TARGET%はメイドとしての態度を保ちながら、胸で奉仕している。

    「……不慣れで申し訳ありませんわ……」

    「んっ……こう……かしら……」

    %CALLNAME:TARGET%の動きはぎこちないが、懸命さが伝わってくる。

    「……満足いただけますよう、努めますわ……」

    「……っ……」

    %CALLNAME:TARGET%は自らの胸で%CALLNAME:MASTER%を挟みながら、複雑な思いを抱えていた。

    「……お嬢様のご客人に……このような……」

    「いえ……何でもありませんわ……」

    %CALLNAME:TARGET%は感情を押し殺すように、淡々と胸を動かし続けた。

    「……ご満足いただければ、それで……」

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は胸を動かしながら、%CALLNAME:MASTER%の顔を見つめた。

    「……不思議ですわね……こんなこと……」

    「メイドとして……これも仕事と割り切っているはずなのに……」

    %CALLNAME:TARGET%の胸の動きに、微かな熱がこもり始めている。

    「……いえ、気にしないでくださいまし……」
