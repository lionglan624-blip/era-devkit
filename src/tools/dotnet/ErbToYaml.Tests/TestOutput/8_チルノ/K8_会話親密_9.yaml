    「や、ぁ……！　そこっ……気持ちいい……！」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_チルノ%の敏感な場所を的確に刺激している。

    %CALLNAME:人物_チルノ%の秘所は蜜を溢れさせ、恋人の指を離そうとしない。

    「……あたいのこと、全部知ってるのね……%CALLNAME:MASTER%は……」

    %CALLNAME:人物_チルノ%は蕩けた表情で、%CALLNAME:MASTER%の胸に顔を埋めた。

    「……ずっとこうしてて……あたい、%CALLNAME:MASTER%の指だけで……幸せ……」

