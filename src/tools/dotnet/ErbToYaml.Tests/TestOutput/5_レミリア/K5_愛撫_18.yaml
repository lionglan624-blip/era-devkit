entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%がアナルビーズを取り出すと、%CALLNAME:人物_レミリア%は紅い瞳を細めた。

    「ふふ……今夜は珠で私を弄ぶつもり？」

    吸血鬼は自ら腰を持ち上げ、恋人の手を受け入れた。

    「んっ……ひとつ、入った……また、ひとつ……」

    珠がひとつずつ飲み込まれるたび、%CALLNAME:人物_レミリア%は小さく震えた。

    「あぁっ……%CALLNAME:MASTER%……全部、入って……気持ちいいわ」

    紅魔館の主は、恋人に全てを預けて甘く喘いでいた。

    「……%CALLNAME:MASTER%、その連なった珠は何かしら」

    %CALLNAME:人物_レミリア%はアナルビーズを見て、妖艶に微笑んだ。

    恋人の手に身を任せ、吸血鬼は目を閉じた。

    「っ……ひとつずつ、入ってくる……不思議な感触ね……」

    珠が次々と腸内に収まり、%CALLNAME:人物_レミリア%は堪えきれず声を漏らした。

    「やっ……奥まで、全部……頭、ぼうっとしてきた……」

    500年を生きた吸血鬼は、恋人の前で無防備に身悶えしていた。

    「さあ、%CALLNAME:MASTER%……その珠で私を満たしてちょうだい」

    %CALLNAME:人物_レミリア%は自ら四つんばいになり、恋人を誘った。

    アナルビーズがひとつずつ挿入され、吸血鬼は息を呑んだ。

    「あっ……ひとつ……また、ひとつ……奥に……」

    珠が連なって腸内を埋めていき、%CALLNAME:人物_レミリア%の威厳が溶けていく。

    「%CALLNAME:MASTER%っ……全部入れて……もっと感じさせて……」

    紅魔館の主は、恋人の手で珠に貫かれる快感に溺れていった。

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手にあるアナルビーズを見つめた。

    「……ねえ、今日はひとつずつ抜いて、私を狂わせてくれる？」

    珍しく甘えた声に、%CALLNAME:MASTER%がゆっくりと珠を挿入していく。

    「ふぁっ……んっ……入ってくる……奥まで、連なって……」

    全ての珠が収まり、%CALLNAME:人物_レミリア%は恋人にしがみついた。

    「あぁっ……%CALLNAME:MASTER%……好きよ……このまま、抜いて……狂わせて……」

    永遠を生きる吸血鬼は、珠ひとつずつの快感を求めて喘いでいた。
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%がアナルビーズを見せると、%CALLNAME:人物_レミリア%は頬を染めた。

    「……そ、その連なった珠を、そこに入れるの……？」

    珠が挿入されると、吸血鬼は息を呑んで身を強張らせた。

    「っ……ひとつずつ、入って……ひゃぁっ！」

    珠が次々と腸内に収まり、%CALLNAME:人物_レミリア%は思わず声を上げた。

    「やっ……全部入った……変な感じ……聞かないでよ、こんな声……！」

    必死に声を殺しながらも、%CALLNAME:人物_レミリア%の身体は珠の異物感に震えていた。

    「……何よ、その妙な珠の連なりは」

    %CALLNAME:人物_レミリア%はアナルビーズを睨んだが、逃げようとはしなかった。

    挿入を許すと、吸血鬼は小さく身悶えした。

    「んっ……深い……奥まで、珠が……っ……」

    珠がひとつずつ腸内を満たし、%CALLNAME:人物_レミリア%は唇を噛んだ。

    「っ……こんなの、ずるいわ……%CALLNAME:MASTER%のばか……」

    恨めしそうに言いながらも、その瞳は珠の刺激に潤んでいた。

    %CALLNAME:MASTER%がアナルビーズを取り出すと、%CALLNAME:人物_レミリア%は目を逸らした。

    「……べ、別に怖くなんかないわよ、そんな珠くらい」

    しかし珠が挿入された瞬間、その強がりは崩れ去った。

    「ひっ……！　奥に、ひとつずつ……やぁっ！」

    珠が次々と入っていき、%CALLNAME:人物_レミリア%は声を堪えきれなかった。

    「やっ……止めて……全部入れないで……わ、分からないわよぉ……！」

    高貴な吸血鬼は、珠の連なりに翻弄されていた。

    「……いいわよ、好きにしなさい」

    %CALLNAME:人物_レミリア%は不機嫌そうに言いながらも、背を向けて四つんばいになった。

    アナルビーズがゆっくりと挿入され、吸血鬼は小さく震えた。

    「っ……ひとつ、また、ひとつ……入ってくる……」

    珠が腸内に連なり、%CALLNAME:人物_レミリア%は声を漏らした。

    「あっ……んんっ……%CALLNAME:MASTER%……もう、嫌いよ……」

    その言葉とは裏腹に、%CALLNAME:人物_レミリア%は珠の感触から逃れようとしなかった。
