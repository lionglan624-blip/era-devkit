- id: fallback
  content: >-
    「は?　なにこれ、丸いのがいっぱい繋がってる」

    %CALLNAME:TARGET%はアナルビーズを怪訝そうに見つめた。

    「お尻に入れるって……%CALLNAME:MASTER%って変なもの持ってるわね」

    好奇心はあるようだが、警戒心も見え隠れしている。

    「……最強のあたいにそれ使う気?　ふーん……」

    偉そうに言いながらも、拒絶はしていない。

    「……まあ、ちょっとだけなら付き合ってあげるわよ」

    「ひゃっ!?　入ってきた!　丸いのが!」

    アナルビーズの感触に、%CALLNAME:TARGET%は驚いた。

    「なによこれ……一個ずつ入ってくるの……」

    初めての体験に、困惑が隠せない。

    「……%CALLNAME:MASTER%、やっぱり変態なんじゃないの……」

    文句を言いながらも、%CALLNAME:TARGET%は耐えていた。

    「最強のあたいがこんなので負けるわけないでしょ……」

    「また丸いの?　あんた本当にこういうの好きね」

    %CALLNAME:TARGET%は呆れた顔でアナルビーズを見た。

    「……しょうがないわね、付き合ってあげる」

    渋々ながらも、前回よりは抵抗が少ない。

    「……んっ……やっぱり変な感じ……一個ずつ……」

    少しは慣れたのか、%CALLNAME:TARGET%は落ち着いていた。

    「……あんたって、ホント変わってるわよね」

    「ねぇ、これ面白いの?　%CALLNAME:MASTER%的には」

    %CALLNAME:TARGET%は素朴な疑問を投げかけた。

    「あたいのお尻にこんなの入れて、何が楽しいのよ」

    理解できないといった表情だが、拒絶はしていない。

    「……まあ、%CALLNAME:MASTER%が楽しいなら……いいけどさ」

    どこか呆れながらも、%CALLNAME:TARGET%は受け入れた。

    「最強のあたいに付き合わせてるんだから、感謝しなさいよね」
  priority: 2
- id: fallback
  content: >-
    「はぁ!?　なにこれ、気持ち悪い!」

    %CALLNAME:TARGET%はアナルビーズを見て露骨に嫌そうな顔をした。

    「お尻に入れる?　ふざけんじゃないわよ!」

    威勢よく拒否の姿勢を見せる。

    「最強のあたいにそんな変なことする気!?　許さないんだから!」

    氷の妖精は不機嫌そうに翅をばたつかせた。

    「どっか行きなさいよ、変態!」

    「ちょっ、何すんのよ!」

    強引に進められ、%CALLNAME:TARGET%は悲鳴を上げた。

    「いやっ、入って……丸いのが……気持ち悪い!」

    嫌悪感を露わにしながら、%CALLNAME:TARGET%はもがいた。

    「こんなの最強のあたいに対する侮辱よ!」

    抵抗しながらも、どうにもできない悔しさが滲んでいる。

    「絶対許さないんだから……覚えてなさいよ!」

    「またそれ!?　いい加減にしなさいよ!」

    %CALLNAME:TARGET%は嫌そうにアナルビーズを睨んだ。

    「あんた、本当に変態よね……最低……」

    心底嫌そうな表情を浮かべている。

    「……さっさと終わらせなさいよ、気分悪いんだから」

    渋々ながらも、%CALLNAME:TARGET%は耐えることを選んだ。

    「最強のあたいを、こんな風に……絶対覚えてるから」

    「……またこれ?　飽きないの、あんた?」

    %CALLNAME:TARGET%は呆れと諦めの表情を見せた。

    「本当にどうしようもない変態ね、あんた」

    文句を言いながらも、抵抗する気力が薄れているようだ。

    「……好きにすればいいわよ、もう……」

    無気力にそう言いながら、%CALLNAME:TARGET%はため息をついた。

    「最強のあたいが、なんでこんな目に遭わなきゃなんないのよ……」
  priority: 1
