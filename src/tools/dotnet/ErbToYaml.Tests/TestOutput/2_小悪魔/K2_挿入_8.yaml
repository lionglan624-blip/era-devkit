- id: fallback
  content: >-
    「%CALLNAME:MASTER%……背中、あったかい……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の膝に背を向けて座り、体を預けた。

    %CALLNAME:MASTER%が後ろから腰を動かすと、%CALLNAME:人物_小悪魔%は甘い吐息を漏らす。

