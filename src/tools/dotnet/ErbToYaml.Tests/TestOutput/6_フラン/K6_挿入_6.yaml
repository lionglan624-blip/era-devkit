character: フラン
situation: K6_挿入
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……こっちに入れるの、恥ずかしいのに……」

    %CALLNAME:人物_フラン%は恋人の上に跨りながら、頬を染めて呟いた。

    しかし、その紅い瞳は嫌悪ではなく、信頼と愛情で潤んでいる。

    「でも……%CALLNAME:MASTER%となら、どこでも繋がりたいって思っちゃうのさ」

    %CALLNAME:人物_フラン%がゆっくりと腰を落とすと、背中側から熱いものが入り込んでいく。

    「んっ……ぁ……違う感じ……でも、%CALLNAME:MASTER%を感じられる……」

    悪魔の妹は、恋人だけに許した背徳を全身で味わっていた。

    「私が上にいれば……%CALLNAME:MASTER%を壊さないでいられるの」

    %CALLNAME:人物_フラン%は恋人を見下ろしながら、愛おしそうに微笑んだ。

    自分のペースで動ける体勢だからこそ、力を加減できる。

    「お尻は……ちょっと痛いけど……%CALLNAME:MASTER%が気持ちよくなってくれるなら」

    %CALLNAME:人物_フラン%が腰を揺らすと、甘い吐息と苦痛が混じった声が漏れた。

    「あぁ……んっ……奥まで……私の中、全部%CALLNAME:MASTER%でいっぱい……」

    495年の孤独を知る少女は、痛みすら恋人との繋がりの証として受け入れていた。

    「ふふ……%CALLNAME:MASTER%、今の私……どんな顔してる……？」

    %CALLNAME:人物_フラン%は恋人の上で腰を動かしながら、恥ずかしそうに問いかけた。

    後ろから繋がる背徳感に、顔が羞恥で染まっている。

    「……%CALLNAME:MASTER%にだけだよ？　こんな恥ずかしいとこ、見せるの」

    %CALLNAME:人物_フラン%が深く腰を落とすと、快感と痛みが混じった声を上げた。

    「んぅっ……！　あ……変な感じなのに……気持ちいい……のかも……」

    悪魔の妹は、恋人だけに見せる姿に陶酔していた。

    「%CALLNAME:MASTER%……私のこと、汚いって思わない……？」

    %CALLNAME:人物_フラン%は不安そうに恋人を見つめた。

    背徳的な行為に、普段の無邪気さが影を潜めている。

    「……思わないって言ってくれたら、もっと頑張るのさ」

    %CALLNAME:MASTER%の言葉を聞いて、%CALLNAME:人物_フラン%は安心したように微笑んだ。

    「んっ……あぁ……後ろから繋がってるって……こんなに特別な感じがするなんて……」

    恋人に全てを受け入れられる喜びが、悪魔の妹を満たしていた。
  priority: 4
- id: talent_3_1
  content: >-
    「え……お尻に入れるの……？　そういうのもあるんだ……」

    %CALLNAME:人物_フラン%は驚きながらも、好奇心を隠せない様子だった。

    本で読んだことはあるが、実際に試すのは初めてだ。

    「……%CALLNAME:MASTER%がしたいなら、やってみるのさ」

    %CALLNAME:人物_フラン%がゆっくりと腰を落とすと、息を詰まらせた。

    「っ……！　痛……でも、%CALLNAME:MASTER%が入ってくる感じ……わかる……」

    悪魔の妹は、痛みを堪えながらも好きな人との新しい繋がりを受け入れていた。

    「こ、こうすると……%CALLNAME:MASTER%は気持ちいいの……？」

    %CALLNAME:人物_フラン%は上から見下ろしながら、不安そうに問いかけた。

    後ろから繋がる感覚は、違う場所とは全く異なる。

    「私……%CALLNAME:MASTER%のためなら、頑張れるのさ」

    %CALLNAME:人物_フラン%が腰を揺らすと、鋭い痛みと共に不思議な快感が走った。

    「んっ……あ……変な感じ……でも、嫌じゃない……%CALLNAME:MASTER%だから……」

    好きな人を喜ばせたい一心で、悪魔の妹は腰を動かし続けた。

    「%CALLNAME:MASTER%……私のお尻……変じゃない……？」

    %CALLNAME:人物_フラン%は恥ずかしそうに視線を逸らした。

    普段とは違う場所を使うことへの羞恥心で、顔が真っ赤になっている。

    「……ここまで%CALLNAME:MASTER%に見せたの、私だけだよね……？」

    %CALLNAME:人物_フラン%が深く腰を落とすと、声を押し殺すように唇を噛んだ。

    「う……っ……痛いのに……%CALLNAME:MASTER%と繋がってると思うと……嫌じゃないの……」

    独占欲と羞恥心が混じり合い、悪魔の妹の心を揺さぶっていた。

    「本に書いてあったのさ……こういうやり方もあるって……」

    %CALLNAME:人物_フラン%は知識をひけらかすように言った。

    しかし実際に試してみると、想像とは全く違う感覚だった。

    「でも……こんなに痛いなんて書いてなかったよ……」

    %CALLNAME:人物_フラン%が腰を動かすと、涙目になりながらも止めようとはしなかった。

    「んっ……ぁ……%CALLNAME:MASTER%が気持ちよさそうだから……もうちょっとだけ……」

    好きな人のためなら痛みも我慢できると、悪魔の妹は自分に言い聞かせていた。
  priority: 3
