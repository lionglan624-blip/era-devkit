entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……後ろから失礼しますわね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背後に回り、腰に手を添えた。

    「こうして貴方を抱けるなんて……幸せですわ……」

    ゆっくりと%CALLNAME:TARGET%は%CALLNAME:MASTER%の中に入っていく。

    「んっ……%CALLNAME:MASTER%の中……温かい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中に顔を寄せ、甘い吐息を漏らした。

    「このまま……ずっと繋がっていたいですわ……」

    「……ふふ……%CALLNAME:MASTER%、感じていますの？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の耳元で囁きながら、腰を動かし始めた。

    「貴方の中に入っていると……私も気持ちよくなってきますわ……」

    「あ……んっ……もっと奥まで……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腰を引き寄せ、深く繋がった。

    「%CALLNAME:MASTER%……好きよ……」

    瀟洒なメイドは、恋人を後ろから優しく抱きしめた。

    「……%CALLNAME:MASTER%……こうして後ろから抱いていると……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の髪を撫でながら、ゆっくりと動いた。

    「貴方のこと……全部私のものにしたくなりますわ……」

    「んっ……あぁ……気持ちいい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の体を愛おしそうに撫でた。

    「%CALLNAME:MASTER%……もっと声を聞かせて……」

    完璧なメイドは、恋人の反応を楽しみながら腰を揺らし続けた。

    「……あ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中に頬を寄せた。

    「こうして繋がっていると……時を止めてしまいたくなりますわ……」

    ゆっくりと腰を動かしながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を抱きしめた。

    「んっ……%CALLNAME:MASTER%の中……締まってきて……」

    「もっと……一緒に気持ちよくなりましょう……」

    %CALLNAME:TARGET%は恋人の温もりを感じながら、幸せそうに微笑んだ。
