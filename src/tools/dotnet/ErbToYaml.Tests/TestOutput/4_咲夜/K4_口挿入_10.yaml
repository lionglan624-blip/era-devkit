entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……私から……動きますわね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨り、ゆっくりと腰を落としていく。

    禁断の場所に%CALLNAME:MASTER%を受け入れながら、%CALLNAME:TARGET%は甘い吐息を漏らした。

    「んっ……あ……奥まで……入って……」

    「こんな姿……貴方にしか見せられませんわ……」

    %CALLNAME:TARGET%は腰を揺らしながら、恋人を見下ろした。

    「……気持ちいい……ですか……？」

    「ふぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に手を置き、リズミカルに腰を動かしている。

    「こうして上から……貴方を感じていると……」

    「時を止めたくなりますわ……このまま……ずっと……」

    %CALLNAME:TARGET%が腰を深く落とすたび、甘い声が漏れる。

    「あっ……奥……当たって……」

    「%CALLNAME:MASTER%……もっと……欲しいですわ……」

    「……んぅ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は上から%CALLNAME:MASTER%を見つめながら、腰を揺らしている。

    「こんな……はしたない姿……メイドとして失格ですわね……」

    「でも……貴方の前では……完璧でなくていいの……」

    %CALLNAME:TARGET%は自ら腰を激しく動かし始めた。

    「あ……深い……気持ちいい……」

    瀟洒なメイドは、恋人の上で蕩けた表情を浮かべていた。

    「……あ……%CALLNAME:MASTER%、見ていて……くださいまし……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に見られながら、腰を使い続けている。

    「私が……どんな顔をしているか……」

    「貴方だけに……見せたい……ですの……」

    %CALLNAME:MASTER%の視線を感じながら、%CALLNAME:TARGET%は更に激しく動いた。

    「んっ……あぁ……もっと……奥まで……」

    完璧なメイドは、恋人への愛を全身で表現していた。
