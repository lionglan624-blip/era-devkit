- id: fallback
  content: >-
    「――ん？ ……お茶？」

    %CALLNAME:人物_フラン%は警戒するような目で湯飲みを受け取った。

    「……変なもの、入ってないよね？」

    そう言いながらも、%CALLNAME:人物_フラン%はお茶を口に含んだ。

    「……ふぅん、普通だね」

    %CALLNAME:人物_フラン%は興味なさそうにそう言った。

    「でも、急に近づかないでね。壊しちゃうかもしれないから」

    「あれ……お茶を持ってきたの？」

    %CALLNAME:人物_フラン%は湯飲みを受け取り、ゆっくりとお茶を飲んだ。

    「……ふぅん」

    %CALLNAME:人物_フラン%は特に感想を述べなかった。

    「私に何か用？ それとも、壊されに来たの？」

    %CALLNAME:人物_フラン%は紅い瞳を%CALLNAME:MASTER%に向けた。危うい光が揺れている。

    「……」

    %CALLNAME:人物_フラン%はお茶を差し出す%CALLNAME:MASTER%を、無表情に見つめた。

    「……あげるの？ 私に？」

    しばらく湯飲みを眺めてから、ゆっくりと受け取った。

    ちびり、とお茶を啜る。

    「……別に、嬉しくなんかないのさ」

    %CALLNAME:人物_フラン%はそっぽを向いたが、湯飲みは手放さなかった。

    「お茶……？」

    %CALLNAME:人物_フラン%は湯飲みを受け取り、しばらく中身を覗き込んでいた。

    「……毒とか、入ってないよね？」

    疑いの目で%CALLNAME:MASTER%を見てから、お茶を口に含む。

    「……普通だった」

    %CALLNAME:人物_フラン%は何かを期待していたように、少し残念そうな顔をした。

    「ねえ、%CALLNAME:MASTER%は怖くないの？ 私のこと」

    紅い瞳が、じっと%CALLNAME:MASTER%を見据えている。
  priority: 1
