    「やっ……止めて……強くしないで……わ、分からなくなるぅ……！」

    高貴な吸血鬼は、振動の刺激に翻弄されていた。

    「……いいわよ、好きにしなさい」

    %CALLNAME:人物_レミリア%は不機嫌そうに言いながらも、胸を突き出した。

    ニプルキャップがゆっくりと装着され、吸血鬼は小さく震えた。

    「っ……挟まれて、また、振動が……」

    クリップが乳首を刺激し続け、%CALLNAME:人物_レミリア%は声を漏らした。

