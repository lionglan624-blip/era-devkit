- id: fallback
  content: >-
    「……乳首？　吸いたいの？」

    %CALLNAME:人物_フラン%は首を傾げて、%CALLNAME:MASTER%を見つめた。

    「ふぅん……じゃあ、いいのさ」

    %CALLNAME:人物_フラン%は無造作に胸を差し出した。

    「……別に、どうでもいいから」

    %CALLNAME:人物_フラン%は興味なさそうに呟いた。

    「……つまんないことしたら、遊び終わりだからね」

    「……こういうこと、したいの？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を値踏みするように見つめた。

    紅い瞳には、興味と退屈が混在している。

    「私、こういうの、あんまり知らないのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%に身を任せた。

    「……地下にいると、誰も触ってくれないから」

    その声には、どこか寂しさが滲んでいた。

    「……」

    %CALLNAME:人物_フラン%は無表情で、%CALLNAME:MASTER%に乳首を吸われていた。

    「……面白いの、これ？」

    %CALLNAME:人物_フラン%は淡々と呟いた。

    「私には、よくわからないのさ」

    495年の孤独が生んだ、どこか虚ろな瞳。

    「……でも、%CALLNAME:MASTER%がしたいなら、してもいいのさ」

    「きゅっとしてドカーン、って知ってる？」

    %CALLNAME:人物_フラン%は無邪気に笑いながら、%CALLNAME:MASTER%に乳首を吸われていた。

    「私の能力……でも、%CALLNAME:MASTER%には使わないのさ」

    %CALLNAME:人物_フラン%は興味なさそうに%CALLNAME:MASTER%を見下ろした。

    「……ねぇ、これ、気持ちいいの？」

    %CALLNAME:人物_フラン%は退屈そうに聞いた。

    「私にはよくわからないけど、好きにしていいのさ」
