- id: fallback
  content: >-
    「……何するつもり？」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%に触れようとすると、

    %CALLNAME:人物_フラン%は紅い瞳を細めてこちらを見据えた。

    「触りたいの？ 私を？」

    「……壊しちゃうかもしれないけど、いいの？」

    %CALLNAME:人物_フラン%の瞳に危うい光が宿っている。

    「……ふぅん」

    %CALLNAME:MASTER%が近づくと、%CALLNAME:人物_フラン%は無表情でこちらを見た。

    「私に触りたいなんて、変わってるね」

    「495年、誰も触ってくれなかったのに」

    %CALLNAME:人物_フラン%は皮肉めいた笑みを浮かべた。

    「……そんなに壊されたいの？」

    「……手を出すの？」

    %CALLNAME:MASTER%が手を伸ばすと、%CALLNAME:人物_フラン%はじっとその手を見つめた。

    「……触らせてあげてもいいけどさ」

    %CALLNAME:人物_フラン%の紅い瞳が、冷たく光っている。

    「きゅっとして、ドカーン……ってなっても、知らないよ？」

    無邪気な笑顔の奥に、狂気が垣間見えた。

    「……近いよ」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%に近づくと、彼女は一歩後ずさった。

    「あんまり近づかないほうがいいのさ」

    「私……自分でも、いつ壊しちゃうかわかんないから」

    %CALLNAME:人物_フラン%は自嘲気味に笑った。

    「……でも、そういうの気にしないなら、いいけど」
