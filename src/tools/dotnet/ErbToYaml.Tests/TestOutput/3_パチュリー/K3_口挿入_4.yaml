entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、泡……用意したわ……」

    %CALLNAME:TARGET%は石鹸を手のひらで泡立てて、自らの体に塗り広げた。

    白い泡が%CALLNAME:TARGET%の白い肌を覆い、ぬるぬると光を反射している。

    「……本で読んだのよ……こうすると、気持ち良いらしいわ……」

    そう言って、%CALLNAME:TARGET%は%CALLNAME:MASTER%の体に自らを押し付けた。

    「……んっ……ぬるぬるして……変な感覚ね……」

    %CALLNAME:TARGET%は頬を染めながら、ゆっくりと体を擦りつけ始めた。

    「……はぁ……こうして……擦りつければ良いのかしら……」

    %CALLNAME:TARGET%は泡まみれの体を%CALLNAME:MASTER%に密着させている。

    「……あなたの体温が……直接伝わってくるわ……」

    %CALLNAME:TARGET%は穏やかに微笑みながら、体を上下に動かした。

    「……体力的には辛いけれど……あなたのためなら……」

    そう呟いて、%CALLNAME:TARGET%は懸命に奉仕を続けた。

    「……ん……胸が……当たって……」

    %CALLNAME:TARGET%の胸が%CALLNAME:MASTER%の胸板に押し付けられている。

    泡の滑りで、むにゅりと形が変わるのが分かる。

    「……恥ずかしいわ……でも、あなたが喜んでくれるなら……」

    %CALLNAME:TARGET%は顔を赤くしながらも、動きを止めなかった。

    「……愛しているから……全身で伝えるわ……」

    「……ふぅ……少し、休ませて……」

    %CALLNAME:TARGET%は体が弱いため、息を切らしている。

    「……むきゅ……体力が足りないわ……」

    しかし、すぐに%CALLNAME:TARGET%は動きを再開した。

    「……でも、あなたを満足させたい……だから、頑張るわ……」

    愛する人のために、%CALLNAME:TARGET%は虚弱な体に鞭打っていた。
