- id: fallback
  content: >-
    「……私が上に乗れと？　図々しいわね」

    %CALLNAME:人物_レミリア%は不快そうに%CALLNAME:MASTER%を見下ろした。

    渋々と上に跨り、後孔に%CALLNAME:MASTER%を受け入れる。

    「っ……痛い……もっと丁寧にしなさいよ」

    %CALLNAME:人物_レミリア%は苛立ちを隠さなかった。

    「……早く終わらせなさい」

    紅魔館の主は、不機嫌そうに最低限の動きだけをした。

    「……こんな屈辱的な体勢……」

    %CALLNAME:人物_レミリア%は憤然と%CALLNAME:MASTER%の上に座った。

    後孔が%CALLNAME:MASTER%を飲み込み、小さな身体が緊張で強張る。

    「……っ、痛いじゃない。下手ね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を睨みつけた。

    「……感謝しなさい。私が自ら動いてやっているのよ」

    500年の吸血鬼は、屈辱を怒りに変えて動いた。

    「……私を見世物にするつもり？」

    %CALLNAME:人物_レミリア%は不満げに%CALLNAME:MASTER%の上に乗った。

    後孔にゆっくりと沈み込み、苦痛に顔をしかめる。

    「あ……っ、こんなところを……見るな……」

    %CALLNAME:人物_レミリア%は羞恥と怒りで頬を紅潮させた。

    「……私の姿を見られるだけ光栄に思いなさい」

    紅魔館の主は、高慢な態度を崩さずに動いた。

    「……気まぐれで従ってあげているのよ」

    %CALLNAME:人物_レミリア%は傲慢に言い放ち、%CALLNAME:MASTER%の上に跨った。

    後孔に%CALLNAME:MASTER%を受け入れ、苦痛に眉をひそめる。

    「……っ、乱暴ね……もう少し気を遣いなさい」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を冷たく見下ろした。

    「……次はもう少しましな頼み方をしなさい」

    紅魔館の主は、最後まで支配者然とした態度を保った。
