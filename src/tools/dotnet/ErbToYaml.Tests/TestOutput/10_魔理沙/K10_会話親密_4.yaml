- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%に抱きついた。

    「えっ……！？　お、おい%CALLNAME:MASTER%……！」

    %CALLNAME:TARGET%は顔を真っ赤にして固まった。

    「だ、抱きつくなんて……いきなりすぎるだろ……」

    戸惑いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%を押し退けはしなかった。

    「……あったかいな……悪くないかも」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らしながら、小声でそう言った。

    「わわっ！？」

    突然の抱擁に、%CALLNAME:TARGET%は動揺した声を上げた。

    「%CALLNAME:MASTER%、急にどうしたんだよ……」

    %CALLNAME:TARGET%は困惑しながらも、抵抗はしなかった。

    「……べ、別に嫌じゃないけどさ……こういうのって……」

    「……その、もうちょっとだけなら、いいぜ」

    戸惑いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の温もりを感じていた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の肩に手を置いた。

    「ん……？　どうしたんだ、%CALLNAME:MASTER%」

    そのまま%CALLNAME:MASTER%は%CALLNAME:TARGET%を引き寄せ、抱きしめた。

    「なっ……！？　お、おい……！」

    %CALLNAME:TARGET%は顔を真っ赤にして硬直している。

    「……%CALLNAME:MASTER%って、結構大胆なんだな……」

    %CALLNAME:TARGET%は戸惑いながらも、どこか嬉しそうにしていた。

    「……え、ちょっと……」

    %CALLNAME:MASTER%が近づいてきて、%CALLNAME:TARGET%は身構えた。

    だが、%CALLNAME:MASTER%はそのまま%CALLNAME:TARGET%を優しく抱きしめた。

    「……なんだよ、急に……」

    %CALLNAME:TARGET%は困ったような顔をしながらも、押し退けなかった。

    「……まあ、たまにはこういうのも……悪くないかもな」

    普通の魔法使いは、照れくさそうに視線を逸らした。
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%に抱きつこうとした。

    「はぁ！？　ちょ、ちょっと何するんだよ！」

    %CALLNAME:TARGET%は慌てて身を引いた。

    金色の瞳が警戒するようにこちらを見ている。

    「い、いきなり抱きつくなんて……どういうつもりだよ！」

    「もっと仲良くなってからにしてくれよな……」

    %CALLNAME:TARGET%は帽子を押さえながら、困惑した表情で呟いた。

    「えっ……ちょっと……」

    %CALLNAME:MASTER%が近づいてきて、%CALLNAME:TARGET%は後ずさった。

    「抱きつくのは……その……私とお前の関係でアリなのか？」

    %CALLNAME:TARGET%は困ったように眉を下げた。

    「……もうちょっと距離を縮めてからにしてくれよな」

    「別にお前が嫌いってわけじゃないんだけどさ……」

    %CALLNAME:TARGET%は帽子のつばを押さえながら、そっぽを向いた。

    「……ちょっと、%CALLNAME:MASTER%？」

    %CALLNAME:TARGET%は抱きついている%CALLNAME:MASTER%に声をかける。

    「……私に抱きついたまま、寝るなよ？」

    %CALLNAME:MASTER%が無言で頷くと、

    「……本当に、寝るなよな……」

    %CALLNAME:TARGET%はため息を吐きながらも、されるがままになっている。

    「……まあ、たまには付き合ってやるぜ」

    「……そろそろ離してくれないか？」

    %CALLNAME:TARGET%が遠慮がちに声を上げる。

    %CALLNAME:MASTER%は渋々、%CALLNAME:TARGET%から離れた。

    「……はぁ……」

    %CALLNAME:TARGET%は斜め上を向いてぼーっとしている。

    「……次はもうちょっと仲良くなってからな」

    そう言いながらも、%CALLNAME:TARGET%の頬はほんのり赤かった。
  priority: 1
