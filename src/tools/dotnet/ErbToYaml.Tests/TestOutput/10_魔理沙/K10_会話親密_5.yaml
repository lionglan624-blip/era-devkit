- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%にキスをした。

    「んっ！？　ちゅ……ぷはっ」

    %CALLNAME:TARGET%は驚いて唇を離した。

    「な、なっ……キスっ……！？」

    %CALLNAME:TARGET%は顔を真っ赤にして固まっている。

    「お、おい……そういうのはもっと順序ってもんがあるだろ……」

    「……心臓が爆発しそうなんだぜ……」

    %CALLNAME:TARGET%は帽子を深く被って顔を隠した。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の唇に軽く触れた。

    「んっ……む……」

    %CALLNAME:TARGET%は目を見開いたが、逃げはしなかった。

    「……ぷ、は……」

    %CALLNAME:TARGET%は顔を少し紅くして%CALLNAME:MASTER%の顔を見つめている。

    「……い、いきなりすぎるだろ……もうちょっと考えてくれよな……」

    「……べ、別に嫌じゃなかったけどさ……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%にそっとキスをした。

    「んっ……む……」

    %CALLNAME:TARGET%は一瞬身を強張らせたが、すぐに力を抜いた。

    「……ぷは……」

    「……な、なんだよ……急にさ……」

    %CALLNAME:TARGET%は顔を赤くしながらも、どこか嬉しそうだ。

    「……ま、まあ……%CALLNAME:MASTER%なら……許してやらなくもないぜ……」

    普通の魔法使いは、帽子のつばを引っ張りながらそっぽを向いた。

    「……%CALLNAME:MASTER%？」

    %CALLNAME:MASTER%が顔を近づけてくると、%CALLNAME:TARGET%は動けなくなった。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の唇にそっと口付けた。

    「……んっ……ぷ、は……」

    %CALLNAME:TARGET%は真っ赤な顔で%CALLNAME:MASTER%を見つめている。

    「……き、キスなんてさ……私、あんまり慣れてないんだぜ……」

    「……でも、%CALLNAME:MASTER%となら……悪くないかもな」

    小さくそう言って、%CALLNAME:TARGET%は照れ隠しに笑った。
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%にキスをしようとした。

    「んっ！？　ちょ、ちょっと待て！」

    %CALLNAME:TARGET%は慌てて唇を離してしまった。

    「いきなりキスなんてどういうつもりだ！？」

    %CALLNAME:TARGET%は顔を赤くしながらも、警戒するような目でこちらを見ている。

    「私とお前はそういう関係じゃないだろ……」

    「……もっと親しくなってから出直してきなよ」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%に近づくと、

    「……なんだ、近いぞ」

    %CALLNAME:TARGET%は一歩後ずさった。

    %CALLNAME:MASTER%が唇に軽く触れようとすると、

    「おい！　何する気だ！」

    %CALLNAME:TARGET%の唇は固く閉ざされ、それ以上近づけなかった……

    「……キスするような仲じゃないだろ。まずは仲良くなってからだぜ」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%にキスをしようとした。

    「なっ……！？」

    %CALLNAME:TARGET%は反射的に身を引いた。

    「お、お前な……いきなり何してくるんだよ！」

    %CALLNAME:TARGET%は顔を真っ赤にして、怒ったような表情をしている。

    「……勘違いするなよな。私は誰にでもそういうことさせるわけじゃないんだぜ」

    %CALLNAME:TARGET%は帽子を押さえながら、少し離れた場所に移動した。

    %CALLNAME:MASTER%が顔を近づけると、

    「……おい、何のつもりだ？」

    %CALLNAME:TARGET%は怪訝な顔で%CALLNAME:MASTER%を見ている。

    %CALLNAME:MASTER%がキスをしようとすると、

    「やめろって！」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を押し返した。

    「……ったく、順序ってもんがあるだろ。まずは友達からだぜ」

    %CALLNAME:TARGET%は不機嫌そうに、しかしどこか動揺した様子で腕を組んだ。
  priority: 1
