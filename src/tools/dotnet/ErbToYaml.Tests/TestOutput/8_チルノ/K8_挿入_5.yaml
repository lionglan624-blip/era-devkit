character: チルノ
situation: K8_挿入
entries:
- id: fallback
  content: >-
    「えへへ、あたいが上に乗っちゃうね、%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は嬉しそうに%CALLNAME:MASTER%の上に跨った。

    ゆっくりと腰を落とし、%CALLNAME:MASTER%を中に迎え入れる。

    「んっ……全部入った……こうしてると、%CALLNAME:MASTER%を支配してる気分」

    %CALLNAME:人物_チルノ%は得意げに腰を揺らし始めた。

    「ほら見て、あたいの動き……最強でしょ？」

    「今日はあたいがリードするからね、%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の胸に手を置いて、腰を上下させている。

    小さな体が動くたびに、二人の繋がりがより深くなっていく。

    「はぁっ……ん……こうやって動くの、楽しいね……」

    氷の妖精の体は熱を帯び、%CALLNAME:MASTER%を締め付けてくる。

    「あたいだけのもの……%CALLNAME:MASTER%は……えへへ」

    「ねえ%CALLNAME:MASTER%、気持ちいい？　あたいが頑張ってるんだよ」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%を見下ろしながら問いかけた。

    騎乗位で自らペースを調整しながら、快感に身を震わせている。

    「んあっ……あ……奥に当たって……すごい……っ」

    %CALLNAME:人物_チルノ%は甘い声を漏らしながら、さらに腰を振った。

    「あたいが一番上手いでしょ……認めなさいよね」

    「……%CALLNAME:MASTER%、こうしてると顔がよく見えるね」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上に跨ったまま、少し照れた顔をした。

    ゆっくりと腰を揺らしながら、%CALLNAME:人物_チルノ%は微笑んだ。

    「んっ……はぁ……%CALLNAME:MASTER%と繋がってる……幸せ」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の胸に倒れ込み、甘えるように動き続けた。

    「好き……あたい、%CALLNAME:MASTER%のこと大好きだよ……」
  priority: 4
- id: talent_3_1
  content: >-
    「べ、別にあたいが上になりたかったわけじゃないし……」

    %CALLNAME:人物_チルノ%は真っ赤な顔で%CALLNAME:MASTER%の上に跨った。

    ゆっくりと腰を落とすと、思わず甘い声が漏れてしまう。

    「んっ……こ、こうすれば自分のペースでできるから……それだけよ……」

    %CALLNAME:人物_チルノ%はぎこちなく腰を動かし始めた。

    「……見ないでよ、上からだと全部見えちゃうじゃん……」

    「ちょ……この体勢、恥ずかしいんだけど……！」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上に跨り、顔を真っ赤にしていた。

    しかし腰は止まらず、ゆっくりと上下している。

    「んあっ……っ、自分で動くと……変な感じ……っ」

    %CALLNAME:人物_チルノ%は恥ずかしさを隠すように目を閉じた。

    「……っ、笑ったら凍らせるからね……絶対に……」

    「はぁっ……あ……こうやって動くと、どこに当たるかわかって……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上で腰を揺らしながら声を漏らした。

    上に乗っているのに、顔は%CALLNAME:MASTER%より赤い。

    「んっ……や……こんな声、出したくないのに……っ」

    %CALLNAME:人物_チルノ%は必死に声を堪えようとしていた。

    「……っ、%CALLNAME:MASTER%のせいだからね、こんなの……」

    「……%CALLNAME:MASTER%、あんまり下から見ないで……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに%CALLNAME:MASTER%を睨んだ。

    しかし腰の動きは止めず、ゆっくりと繋がりを感じている。

    「んっ……はぁ……こうしてると……あたいが決められるから……」

    %CALLNAME:人物_チルノ%は少しだけ安心した表情を見せた。

    「……べ、別に嫌いじゃないけど……恥ずかしいのは恥ずかしいから……」
