entries:
- id: fallback
  content: >-
    「お前の乳首、やわらかくて吸いやすいぜ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の胸に顔を埋め、舌を這わせる。

    乳首が口内で硬くなっていく感触を、%CALLNAME:人物_魔理沙%は存分に味わっている。

    「……んっ、この感触、癖になりそうだな」

    %CALLNAME:人物_魔理沙%は恋人の乳首を吸いながら、満足げに目を細めた。

    「……恋人の特権だぜ、こういうの」

    %CALLNAME:人物_魔理沙%は甘えるように、さらに深く乳首を吸い上げた。

    「はぁ……%CALLNAME:MASTER%の胸、いい匂いがするぜ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の胸に頬を寄せながら、うっとりと呟いた。

    舌先で乳首をつつき、反応を楽しんでいる。

    「……お前がこうして許してくれるの、嬉しいんだぜ」

    %CALLNAME:人物_魔理沙%は珍しく素直な言葉を漏らしながら、乳首を唇で包んだ。

    「……ずっとこうしてたいな……」

    %CALLNAME:人物_魔理沙%は恋人の温もりに浸りながら、静かに乳首を吸い続けた。

    「ん……こうやって吸うと、お前の心臓の音が聞こえるぜ」

    %CALLNAME:人物_魔理沙%は耳を胸に当てながら、乳首を口に含んでいる。

    ドクドクという脈動が、%CALLNAME:人物_魔理沙%を安心させた。

    「……お前、今、ドキドキしてるな？」

    %CALLNAME:人物_魔理沙%はいたずらっぽく笑いながら、乳首を軽く噛んだ。

    「……ふふ、こうやってお前を感じるの、悪くないぜ」

    %CALLNAME:人物_魔理沙%は恋人との一体感を噛み締めていた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の胸に甘えるように顔を埋めた。

    研究疲れの時、こうして恋人の胸に触れると心が安らぐ。

    「……魔法の本より、お前の体の方が温かいな……」

    %CALLNAME:人物_魔理沙%は乳首をゆっくりと舐めながら、目を閉じた。

    「……もうちょっと、このままでいいか……？」

    %CALLNAME:人物_魔理沙%は恋人に甘えるように、乳首を吸い続けた。
  priority: 4
- id: talent_3_1
  content: >-
    「な、なんか……こうやって吸ってるの、恥ずかしいな」

    %CALLNAME:人物_魔理沙%は顔を赤らめながらも、%CALLNAME:MASTER%の乳首を口に含んでいる。

    舌先で転がしながら、%CALLNAME:人物_魔理沙%は相手の反応を窺った。

    「……でも、嫌じゃないぜ。むしろ……」

    %CALLNAME:人物_魔理沙%は言葉を途中で飲み込み、乳首を吸い上げた。

    「……っ、うまく言えないけど……好きなんだよな、こういうの」

    %CALLNAME:人物_魔理沙%は照れ隠しに、さらに強く吸い付いた。

    「……お前の乳首、固くなってきたぜ……」

    %CALLNAME:人物_魔理沙%は舌で乳首をつつきながら、上目遣いで%CALLNAME:MASTER%を見た。

    その瞳には、期待と恥じらいが混ざっている。

    「……私のせいか？　嬉しいぜ」

    %CALLNAME:人物_魔理沙%は満足げに微笑みながら、乳首を舐め続けた。

    「……こうやってお前を感じてると、心臓がうるさいんだよな……」

    %CALLNAME:人物_魔理沙%は自分の鼓動を意識しながら、恋慕の情を噛み締めていた。

    「ん……吸ってると、なんか落ち着くぜ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の胸に顔を寄せ、乳首を含んでいる。

    甘い匂いが鼻をくすぐり、%CALLNAME:人物_魔理沙%を安心させた。

    「……お前といると、素の自分でいられる気がするんだ」

    %CALLNAME:人物_魔理沙%は珍しく弱みを見せながら、乳首を優しく吸った。

    「……もうちょっと、こうしてていいか……？」

    %CALLNAME:人物_魔理沙%は甘える子供のように、%CALLNAME:MASTER%にしがみついた。

    「……%CALLNAME:MASTER%、こういうこと……恋人同士がすることだよな……」

    %CALLNAME:人物_魔理沙%は乳首を舐めながら、ぽつりと呟いた。

    その言葉には、関係の進展への期待が込められていた。

    「……私たち、どういう関係なんだろうな……」

    %CALLNAME:人物_魔理沙%は答えを求めるように、%CALLNAME:MASTER%を見上げた。

    「……まあ、今はこうしてるのが、気持ちいいからな」

    %CALLNAME:人物_魔理沙%は考えるのをやめ、再び乳首に吸い付いた。
