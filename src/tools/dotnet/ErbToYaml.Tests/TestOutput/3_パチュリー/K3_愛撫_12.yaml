- id: fallback
  content: >-
    「……それは何かしら」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が持つローターを、観察するような目で見た。

    「外の世界の道具ね……興味深いわ」

    %CALLNAME:TARGET%は淡々と言うが、%CALLNAME:MASTER%が近づくと僅かに身を引いた。

    「……まあ、いいわ。観察対象として、試してみましょう」

    知識欲を隠れ蓑に、%CALLNAME:TARGET%は%CALLNAME:MASTER%を受け入れた。

    「……っ」

    ローターの振動が体に触れた瞬間、%CALLNAME:TARGET%は小さく息を呑んだ。

    「……なるほど……こういう刺激なのね……調べる必要があるわね」

    %CALLNAME:TARGET%は分析しようとするが、声が微かに震えている。

    「……興味深いデータね……もう少し……続けて……」

    観察者を装いながらも、%CALLNAME:TARGET%の頬は微かに紅潮していた。

    「……ふぅん」

    %CALLNAME:TARGET%はローターの振動を受けながら、冷静を装っている。

    「……魔術的な効果はないはずなのに……体が反応するのはなぜかしら……」

    しかし%CALLNAME:TARGET%の体は正直に反応し、時折びくりと震えていた。

    「……あなた、私で実験しているつもりかしら」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を睨んだが、その視線には拒絶の色がない。

    「……むきゅ……」

    %CALLNAME:TARGET%は無言でローターの刺激を受けている。

    本を読む手はいつの間にか止まり、視線が虚空を彷徨っている。

    「……悪くないわ……これは……」

    %CALLNAME:TARGET%はぼそりと呟いた。

    「……でも、調子に乗らないで。私はデータを収集しているだけよ」

    そう言いながらも、%CALLNAME:TARGET%の吐息は熱を帯びていた。
  priority: 2
- id: fallback
  content: >-
    「……何の真似かしら」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が持つローターを見て、冷ややかな目を向けた。

    「そんな得体の知れない物を私に使おうなんて」

    %CALLNAME:TARGET%は呆れたように溜息をついた。

    「……不愉快ね。本を読む邪魔をしないで」

    そう言って%CALLNAME:TARGET%は、読書に戻ろうとした。

    「……」

    %CALLNAME:TARGET%は冷めた目で%CALLNAME:MASTER%を見た。

    「お断りよ。そんな下品な道具に興味はないわ」

    %CALLNAME:TARGET%は淡々と拒絶した。

    「……知識の殿堂を汚さないで。帰りなさい」

    %CALLNAME:TARGET%は本を盾のように構えた。

    「……むきゅ」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「大図書館にふさわしくないわ、そんな物は」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を睨みつけた。

    「……精霊魔法で追い出されたくなければ、それをしまいなさい」

    冷たい声が大図書館に響いた。

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついた。

    「あなたは私に何を求めているの。不愉快だわ」

    %CALLNAME:TARGET%は呆れたような表情を浮かべている。

    「……本を汚したら許さないわよ」

    %CALLNAME:TARGET%は冷めた目で%CALLNAME:MASTER%を一瞥し、読書に戻った。
  priority: 1
