- id: fallback
  content: >-
    「えっ……そ、そんなこと……できないよ……」

    チルノは戸惑いながら、%CALLNAME:MASTER%の提案を拒もうとした。

    「……%CALLNAME:MASTER%の前で自分を触るなんて……」

    しかし%CALLNAME:MASTER%の視線に押され、おずおずと手を伸ばした。

    「……こ、これでいいの……？」

    チルノは恥ずかしさに震えながら、弱々しく秘部に触れた。

    「%CALLNAME:MASTER%……なんでこんなこと……」

    チルノは困惑しながらも、逆らえずに自らに触れ始めた。

    「……恥ずかしいよ……見ないでほしい……」

    しかし%CALLNAME:MASTER%は見つめたまま。

    「……もう……%CALLNAME:MASTER%のバカ……」

    チルノは赤い顔で呟きながら、仕方なく続けた。

    「こ、こういうのって……もっと親しくなってからじゃ……」

    チルノは戸惑いを隠せないまま、%CALLNAME:MASTER%の指示に従っている。

    「……あたいこんなの初めてだよ……人に見られながらなんて……」

    チルノの指は震えながらも、秘部を弄り始めた。

    「……%CALLNAME:MASTER%は……あたいのことどう思ってるの……」

    不安げに、チルノは問いかけた。

    「……本当にやらなきゃダメ……？」

    チルノは上目遣いで%CALLNAME:MASTER%を見つめた。

    「……わかった……でも、あんまり見ないで……」

    観念したように、チルノは自らの秘部に触れた。

    「……んっ……%CALLNAME:MASTER%……」

    チルノは恥ずかしさに耐えながら、弱々しく自慰を続けた。
