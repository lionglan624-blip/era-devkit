- id: fallback
  content: >-
    「あっ……%CALLNAME:MASTER%、それって……つぶつぶがいっぱい付いてる……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したアナルビーズを興味深そうに見つめている。

    「えへへ……お尻に入れるんですよね……あたし、%CALLNAME:MASTER%のためなら頑張るの……」

    妖精が自ら四つん這いになると、%CALLNAME:MASTER%はアナルビーズの最初の珠を菊座に押し当てた。

    「んっ……！　入って……ひとつ、ふたつ……数えられないの……」

    珠が一つ一つ肛門を押し広げていく度に、%CALLNAME:TARGET%の体がぴくんと跳ねる。

    「……%CALLNAME:MASTER%……全部入ったの……？　お尻の中が、いっぱいなの……」

    「んぅ……%CALLNAME:MASTER%、あのつぶつぶの……また使ってくれるの……？」

    %CALLNAME:TARGET%は期待に満ちた表情で、アナルビーズを見つめていた。

    「あれ、入る時ぽこぽこって……変な感じだけど……%CALLNAME:MASTER%と一緒だから好き……」

    アナルビーズが菊座にゆっくりと挿入されていく。

    「あっ……んっ……ひとつ……また、ひとつ……お尻が、珠を飲み込んで……」

    全ての珠が挿入されると、%CALLNAME:TARGET%は満足そうに息を吐いた。

    「……お尻の中で、ころころしてる……不思議な感じ……」

    「えへへ……あたし、お尻にいっぱい入れられるの、上手になったかな……」

    %CALLNAME:TARGET%は恥ずかしそうに呟きながら、自分からお尻を突き出した。

    アナルビーズが妖精の小さな菊座に押し当てられ、珠が一つずつ飲み込まれていく。

    「んっ……あぁっ……ぽこ、ぽこって……入ってくる……」

    最後の珠が肛門に消えると、%CALLNAME:TARGET%の体が小さく震えた。

    「……%CALLNAME:MASTER%……全部入ったの……あたし、頑張ったの……」

    達成感に満ちた妖精の笑顔が、%CALLNAME:MASTER%を見上げていた。

    「あっ……また、してくれるんですか……嬉しいの……」

    %CALLNAME:TARGET%は無邪気に笑いながら、アナルビーズを受け入れる体勢になった。

    「……んっ、入れて……%CALLNAME:MASTER%の手で……ゆっくり……」

    アナルビーズが一珠ずつ肛門に挿入され、妖精の体を内側から満たしていく。

    「ひぁっ……！　んぅ……お尻の中で、珠が並んでる……ころころ、するの……」

    %CALLNAME:TARGET%は腰を小刻みに揺らしながら、独特の感覚を味わっている。

    「……%CALLNAME:MASTER%のもので、お尻がいっぱい……幸せなの……」
