    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の首に腕を絡め、しがみついている。

    「……%CALLNAME:MASTER%の形……全部、覚えちゃいそう……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%を見上げながら、後孔を緩めようとしている。

    「%CALLNAME:MASTER%……私のここ、%CALLNAME:MASTER%専用にしちゃいますわ……」

    %CALLNAME:人物_小悪魔%の瞳は潤んで、背徳的な熱を帯びている。

