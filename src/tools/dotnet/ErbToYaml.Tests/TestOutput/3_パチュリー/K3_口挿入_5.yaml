  content: >-
    「……%CALLNAME:MASTER%……こ、こんなところを……触るの……？」

    %CALLNAME:TARGET%は顔を赤くしながら、おずおずと指を伸ばした。

    細い指が%CALLNAME:MASTER%の後ろの窄まりに触れる。

    「……恥ずかしいわ……でも、あなたのためなら……」

    %CALLNAME:TARGET%はゆっくりと指を動かし始めた。

    「……んっ……こ、こうすれば……気持ちいいの……？」

    「……そこ……敏感なのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を見ながら、円を描くように撫でている。

    「……本で読んだことはあるけれど……実際にするのは……」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らした。

    「……むきゅ……でも……あなたが喜んでくれるなら……」

    知識の魔女は、愛する人のために指を動かし続けた。

    「……ひっ……指が……入って……」

    %CALLNAME:TARGET%の指先が%CALLNAME:MASTER%の中にゆっくりと侵入していく。

    「……こ、こんなこと……恥ずかしいわ……」

    %CALLNAME:TARGET%は息を詰めながらも、丁寧に動いた。

    「……で、でも……愛しているから……してあげたいの……」

    真っ赤な顔で、%CALLNAME:TARGET%は奉仕を続けた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は愛する人の顔を見つめながら、指を動かしていた。

    「……こうして触れていると……あなたとの繋がりを感じるわ……」

    %CALLNAME:TARGET%は穏やかな表情で呟いた。

    「……恥ずかしい奉仕だけれど……あなたのためなら……嫌じゃないの……」

    知識の魔女は、愛する人に全てを捧げていた。
