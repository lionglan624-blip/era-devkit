    %CALLNAME:人物_魔理沙%はおそるおそる足で一物を挟んだ。

    「うわっ……熱い……足で触るとこういう感触なのか……」

    %CALLNAME:人物_魔理沙%は興味深そうに、ゆっくりと足を動かし始めた。

    「……不思議な感じだな、これ」

    「こうか……？　合ってるのか……？」

    %CALLNAME:人物_魔理沙%は不安そうに%CALLNAME:MASTER%の顔を窺った。

    「足の動かし方がよくわからないんだ……教えてくれよ」

