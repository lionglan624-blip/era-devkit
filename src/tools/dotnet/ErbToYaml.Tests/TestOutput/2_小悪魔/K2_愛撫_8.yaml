    %CALLNAME:人物_小悪魔%は溜息をつきながらも、渋々と従った。

    「……まあ、悪魔ですから……これくらいで動じたりしませんけど……」

    %CALLNAME:人物_小悪魔%は気だるそうに自らの秘所に手を伸ばした。

    「……早く終わらせますわよ……」

    「……何が楽しいんですの、こんなこと……」

