- id: fallback
  content: >-
    %CALLNAME:MASTER%がローターを取り出すと、%CALLNAME:TARGET%は警戒した。

    「……それ、何……？」

    %CALLNAME:TARGET%は不安そうに後ずさった。

    スイッチが入ると、%CALLNAME:TARGET%は驚いて身構えた。

    「ひゃっ……！　な、何これ……！」

    それが体に押し当てられると、%CALLNAME:TARGET%は悲鳴を上げた。

    「やっ……！　やめて……！」

    %CALLNAME:TARGET%は振動に驚きながら、逃げようともがいた。

    ローターの振動が%CALLNAME:TARGET%の体を襲う。

    「あっ……んっ……何これ……」

    %CALLNAME:TARGET%は困惑しながら、体を震わせた。

    翅がばたばたと暴れるように動いている。

    「……やめて……変な感じになる……」

    %CALLNAME:TARGET%は必死に訴えた。

    「……お願い……これ、怖いの……」

    %CALLNAME:MASTER%がローターを押し当てると、%CALLNAME:TARGET%は身をよじった。

    「やっ……！　そこ、駄目……！」

    %CALLNAME:TARGET%は必死に逃げようとするが、逃げられない。

    「んっ……あっ……」

    意図せず声が漏れて、%CALLNAME:TARGET%は顔を真っ赤にした。

    「……嫌……こんなの……知らない……」

    %CALLNAME:TARGET%は涙目になりながら、抵抗を続けた。

    ローターの振動に、%CALLNAME:TARGET%は混乱していた。

    「ひゃっ……やっ……何……」

    %CALLNAME:TARGET%は何が起きているのかわからず、怯えている。

    翅がぐったりと力なく垂れ下がった。

    「……やめて……わたし、妖精だから……こういうの、わからない……」

    %CALLNAME:TARGET%は弱々しく呟いた。

    「……お願い……手加減して……」
