    「っ……！ な、何を……」

    %CALLNAME:人物_美鈴%は後ろを触られて、体を硬直させた。

    「……%CALLNAME:MASTER%、さすがにそれは……」

    %CALLNAME:人物_美鈴%は戸惑いと不快感が混じった表情を浮かべている。

    「私たち、まだそういう関係じゃないでしょ……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%から一歩引いて、後ろを守るようにした。

    「えっ……や、やめて……！」

    %CALLNAME:人物_美鈴%は慌てて%CALLNAME:MASTER%の手を止めようとした。

    「いきなりそんなこと……びっくりするわ……」

    %CALLNAME:人物_美鈴%は困惑しながらも、どこか傷ついた様子を見せている。

