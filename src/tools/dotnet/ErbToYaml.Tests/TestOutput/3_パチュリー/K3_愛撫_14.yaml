  content: >-
    「……それは……何かしら」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が持つクリキャップを、興味深そうに観察した。

    「陰核に装着する振動器具……なるほど、興味深いわね」

    しかしいざ装着されると、%CALLNAME:TARGET%の表情が一変した。

    「……っ!? こ、これは……直接すぎる……」

    %CALLNAME:TARGET%は冷静を装おうとするが、声が震えている。

    「……ん……」

    クリキャップの振動が陰核を刺激し、%CALLNAME:TARGET%は小さく息を漏らした。

    「……振動の周波数と刺激の相関……データとして……」

    %CALLNAME:TARGET%は分析しようとするが、快感が思考を邪魔している。

    「……むきゅ……集中できない……」

    %CALLNAME:TARGET%は困惑した表情で、%CALLNAME:MASTER%を睨んだ。

    「……ふぅん……」

    %CALLNAME:TARGET%はクリキャップの振動を受けながら、冷静を装っている。

    「……直接的な刺激による反応……研究価値があるわね」

    しかし%CALLNAME:TARGET%の体は正直に反応し、時折びくりと震えていた。

    「……あなた……私で実験しているつもりかしら……」

    そう言いながらも、%CALLNAME:TARGET%はキャップを外そうとはしなかった。

    「……」

    %CALLNAME:TARGET%は無言でクリキャップの刺激を受けている。

    陰核への直接的な振動は、%CALLNAME:TARGET%の知識欲すら麻痺させていた。

    「……悪くない……わね……これは……」

    %CALLNAME:TARGET%はぼそりと呟いた。

    「……でも……調子に乗らないで……私は……データを……」

    言い訳が途切れ、%CALLNAME:TARGET%の吐息だけが大図書館に響いていた。
