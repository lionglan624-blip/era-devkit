- id: fallback
  content: >-
    「……後ろを使って、上に乗れと」

    %CALLNAME:人物_美鈴%は淡々とした口調で言った。

    アナルで%CALLNAME:MASTER%を受け入れる体勢に、顔を歪める。

    「……門番の務めとして……お受けします」

    %CALLNAME:人物_美鈴%は感情を殺した声で言った。

    「……ただ、自分から後ろを使うのは……本来なら許されることではありません」

    武術家として、この行為への抵抗感が滲み出ていた。

    「……っ……」

    %CALLNAME:人物_美鈴%は声を押し殺しながら、%CALLNAME:MASTER%の上で動いていた。

    「……こんな体勢で後ろを……自分から使わされるのですね」

    %CALLNAME:人物_美鈴%は機械的に言った。

    「……お望みなら、続けます……」

    その声には、苦痛と屈辱が滲んでいた。

    「……これも、務めですから……」

    「……」

    %CALLNAME:人物_美鈴%は無言で%CALLNAME:MASTER%の上に跨っていた。

    「……自分から後ろを使って動けと……」

    %CALLNAME:人物_美鈴%は静かに言った。

    「……随分と、屈辱的な命令ですね」

    「……ですが、お好きにどうぞ。門番は道具ですから」

    鍛え抜かれた体が、硬く強張っていた。

    「……わかりました」

    %CALLNAME:人物_美鈴%は小さく頷いた。

    「……後ろを使って、上からお使いになるのですね」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の上に跨った。

    「……ただ、勘違いしないでください」

    「……命令されたから従っているだけです」

    「……それ以上の意味は、ありません」
