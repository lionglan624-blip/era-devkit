character: チルノ
situation: K8_愛撫
entries:
- id: fallback
  content: >-
    「なにそれ?　変な形してるわね」

    %CALLNAME:TARGET%はオナホールをじっと見つめて首を傾げた。

    「へぇ、%CALLNAME:MASTER%のをここに入れるの?　面白そう!」

    興味津々な様子で、%CALLNAME:TARGET%は器具を手に取った。

    「あたいがやってあげる!　任せなさい!」

    恋人の前では、氷の妖精は無邪気に張り切っている。

    「最強のあたいにかかれば、%CALLNAME:MASTER%なんてイチコロよ!」

    「%CALLNAME:MASTER%、これ気持ちいいの?」

    %CALLNAME:TARGET%は器具を動かしながら、不思議そうに尋ねた。

    「なんか、ぬるぬるしてて変な感じ……」

    小さな手で一生懸命動かしている様子が微笑ましい。

    「えへへ、%CALLNAME:MASTER%の反応、面白い!」

    恋人の快感を見て、%CALLNAME:TARGET%は嬉しそうに笑った。

    「あたいって、こういうの上手いのかも!」

    「ねぇねぇ、今日もあれやる?　あたいが%CALLNAME:MASTER%を気持ちよくするやつ!」

    %CALLNAME:TARGET%は期待に目を輝かせて言った。

    「%CALLNAME:MASTER%が気持ちよさそうな顔するの、好きなの」

    オナホールを手に取り、恋人に向かって得意げに微笑む。

    「あたいにかかれば、%CALLNAME:MASTER%も敵わないでしょ?」

    恋人を喜ばせることに夢中な、無邪気な氷精の姿だった。

    「最強は、こういうのも最強なの!」

    「もう、%CALLNAME:MASTER%ったら、すぐにあたいを頼るんだから」

    %CALLNAME:TARGET%は呆れたふりをしながらも、嬉しそうだ。

    「しょうがないわね、あたいが気持ちよくしてあげる!」

    器具を手に取り、慣れた手つきで動かし始める。

    「%CALLNAME:MASTER%がこんな顔するの、あたいだけが知ってるのよね」

    恋人だけの特別な時間に、%CALLNAME:TARGET%は幸せそうに微笑んだ。

    「……あたいも、なんか嬉しいの」
  priority: 4
- id: talent_3_1
  content: >-
    「な、なによこれ!?　変な形してるわね!」

    %CALLNAME:TARGET%は怪訝そうにオナホールを見つめた。

    「え、%CALLNAME:MASTER%のを……入れるの?」

    頬を赤くしながら、興味深げに器具を眺めている。

    「……あたいがやるの?　し、しょうがないわね!」

    照れ隠しに強がりながらも、%CALLNAME:TARGET%は器具を手に取った。

    「最強のあたいに任せなさいよね!」

    「こ、こうすればいいの……?」

    %CALLNAME:TARGET%は恥ずかしそうにオナホールを動かした。

    「%CALLNAME:MASTER%の……こんな近くで見るの、恥ずかしい……」

    頬を真っ赤に染めながらも、手は止めない。

    「……%CALLNAME:MASTER%、気持ちいいの……?」

    好きな人の反応を窺いながら、%CALLNAME:TARGET%は懸命に奉仕した。

    「……あたいのおかげ、なんだからね」

    「ま、またこれやるの……?」

    %CALLNAME:TARGET%は恥ずかしそうに俯いた。

    「%CALLNAME:MASTER%のこと……こうやって気持ちよくするの……」

    覚えている手つきで器具を動かす。

    「……やだ、%CALLNAME:MASTER%の声、聞こえちゃう……」

    好きな人の快感の声に、%CALLNAME:TARGET%の胸がドキドキした。

    「あたいのせいで……こんな声出してるの……」

    「%CALLNAME:MASTER%……あたい、ちゃんとできてる……?」

    %CALLNAME:TARGET%は不安げに見上げながら、器具を動かした。

    「もっと気持ちよくなってほしいの……」

    一生懸命奉仕する姿に、恋心が滲み出ている。

    「%CALLNAME:MASTER%が喜んでくれるなら……あたい、頑張れる」

    照れくさそうに笑いながら、%CALLNAME:TARGET%は手を動かし続けた。

    「……あたいだけ見ててよね」
