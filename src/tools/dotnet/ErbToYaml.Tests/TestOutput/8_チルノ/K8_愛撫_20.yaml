entries:
- id: fallback
  content: >-
    「なにそれ?　小さいキャップみたいなの」

    %CALLNAME:TARGET%はニプルキャップを興味深そうに見つめた。

    「乳首につけるの?　%CALLNAME:MASTER%って変なもの好きよね」

    呆れながらも、氷の妖精は胸を差し出した。

    「最強のあたいの乳首に、そんなの付けたいんだ」

    恋人を信頼しているから、%CALLNAME:TARGET%は大人しくしている。

    「……%CALLNAME:MASTER%がしたいなら、いいわよ」

    「んっ……冷たい……あ、あたいより冷たい……」

    ニプルキャップが乳首に装着され、%CALLNAME:TARGET%は小さく声を上げた。

    「はぅ……きゅって……挟まれてる感じ……」

    氷の妖精でも、この刺激には慣れないようだ。

    「%CALLNAME:MASTER%、これ……結構、すごい……」

    恋人の前だから正直に感想を言っている。

    「……あたいの乳首、変になっちゃうかも……」

    「またこれ?　%CALLNAME:MASTER%ったら本当に好きね」

    %CALLNAME:TARGET%は覚えているらしく、少し恥ずかしそうだ。

    「前も付けたでしょ……乳首がきゅってなるやつ」

    それでも拒否せず、%CALLNAME:TARGET%は胸を突き出した。

    「んっ……やっぱり、挟まれると……ひゃぅ……」

    装着されると、氷の妖精は小さく震えた。

    「……%CALLNAME:MASTER%に見られると、恥ずかしい……」

    「もう、%CALLNAME:MASTER%はあたいの乳首が好きすぎでしょ」

    %CALLNAME:TARGET%は呆れたふりをしながらも嬉しそうだ。

    「こうやって挟まれるの、結構クセになりそう……」

    恋人に甘えるように、%CALLNAME:TARGET%は身を寄せた。

    「んっ……あっ……%CALLNAME:MASTER%のせいよ……」

    乳首への刺激に、%CALLNAME:TARGET%は息を荒くした。

    「……あたいの乳首、%CALLNAME:MASTER%専用よ」
  priority: 4
- id: talent_3_1
  content: >-
    「え!?　な、なにそれ……乳首につけるの!?」

    %CALLNAME:TARGET%はニプルキャップを見て顔を赤くした。

    「そんな変なの……%CALLNAME:MASTER%って変態じゃないの!」

    文句を言いつつも、好きな人には逆らえない。

    「……しょ、しょうがないわね!　最強のあたいが付き合ってあげる!」

    恥ずかしそうに胸を差し出しながら、%CALLNAME:TARGET%は震えていた。

    「……や、優しくしなさいよね……」

    「ひゃぅっ!?　つ、冷たっ……挟まれ……てる……」

    ニプルキャップが装着され、%CALLNAME:TARGET%は悲鳴を上げた。

    「な、なによこれ……乳首がきゅって……」

    恥ずかしさと未知の感覚に、頬が真っ赤になっている。

    「%CALLNAME:MASTER%……こんなの、恥ずかしいってば……」

    好きな人の前でこんな姿を見せるのが堪らないようだ。

    「……でも、あたいは逃げない……最強だから……!」

    「ま、また乳首に付けるの……あれ……」

    %CALLNAME:TARGET%は恥ずかしそうに俯いた。

    「……%CALLNAME:MASTER%がしたいなら……あたいは……」

    好きな人のためなら、という想いが伝わってくる。

    「んっ……挟まれると……やっぱり……ひゃぅ……」

    ニプルキャップの刺激に、%CALLNAME:TARGET%は声を堪えた。

    「%CALLNAME:MASTER%に……こんな顔、見せたくないのに……」

    「%CALLNAME:MASTER%……あたいの乳首、変になってない……?」

    %CALLNAME:TARGET%は不安げに見上げてきた。

    「こんなの挟まれて……平気でいられる方がおかしいわよ……」

    恥ずかしさを隠しきれず、目を逸らしている。

    「……んっ……%CALLNAME:MASTER%のせいで……敏感に……」

    好きな人に翻弄される自分に、%CALLNAME:TARGET%は戸惑っていた。

    「……あたいのこと……嫌いに、ならないでよね……」
