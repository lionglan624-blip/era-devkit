- id: fallback
  content: >-
    「え、えっと……%CALLNAME:MASTER%？　それ、何ですか……？」

    %CALLNAME:人物_美鈴%は電動マッサージャーを見て、困惑している。

    「こ、こういうのは……ちょっと……まだ早いんじゃ……」

    振動が体に伝わり、%CALLNAME:人物_美鈴%は思わず身を引いた。

    「……まだ、そういう関係じゃないと思うんですけど……」

    %CALLNAME:人物_美鈴%は困ったように眉を下げながらも、完全には拒絶しなかった。

    「あの……%CALLNAME:MASTER%……」

    %CALLNAME:人物_美鈴%は控えめに声をあげた。

