  content: >-
    「%CALLNAME:MASTER%……後ろから、そこに……ですの……？」

    %CALLNAME:人物_小悪魔%は四つんばいになりながら、恥ずかしそうに振り返った。

    %CALLNAME:MASTER%が後孔に亀頭をあてがうと、%CALLNAME:人物_小悪魔%の尻尾がぴくりと跳ねる。

    「んっ……あぁ……きつい……でも、%CALLNAME:MASTER%になら……後ろからでも、全部捧げますわ……」

    %CALLNAME:人物_小悪魔%の菊穴は%CALLNAME:MASTER%を締め付けながら飲み込んでいく。

    「……獣みたいな姿勢で……お尻を犯されて……こんなに幸せなんて……」

    %CALLNAME:人物_小悪魔%は自ら尻を高く突き上げ、後孔を%CALLNAME:MASTER%に差し出した。

    「ふふ……私のお尻の穴、後ろから見てくださいな……全部、%CALLNAME:MASTER%のものですから……」

    %CALLNAME:MASTER%が一気に奥まで貫くと、%CALLNAME:人物_小悪魔%は身を震わせる。

    「ひゃあっ……奥まで……っ！　お腹の中、押し広げられて……」

    %CALLNAME:人物_小悪魔%の小さな尻尾が快楽にぴくぴくと痙攣している。

    「もっと激しく……獣みたいに、私のお尻を犯してくださいな……」

    「んぅ……%CALLNAME:MASTER%の腰が、私のお尻にぶつかって……」

    %CALLNAME:人物_小悪魔%は四つんばいの姿勢で、後孔を犯されながら蕩けた声を漏らしている。

    %CALLNAME:MASTER%が腰を打ち付けるたびに、%CALLNAME:人物_小悪魔%の体が前に揺れる。

    「あぁっ……そう……そこ、きつくて……擦れて……変な気持ち……っ」

    %CALLNAME:人物_小悪魔%はシーツを握りしめながら、腰を%CALLNAME:MASTER%に押し付けている。

    「……顔が見えないのに……%CALLNAME:MASTER%の存在、お尻で全部感じてますわ……」

    %CALLNAME:人物_小悪魔%は尻を高く上げて、後孔を緩めようと力を抜いている。

    「%CALLNAME:MASTER%……私のお尻、%CALLNAME:MASTER%専用に調教しちゃってください……」

    %CALLNAME:人物_小悪魔%の瞳は潤んで、悪魔らしい妖艶な光を帯びている。

    「あっ……ん……奥まで、届いて……っ！　お腹が、熱い……」

    %CALLNAME:人物_小悪魔%は快楽に酔いながら、四つんばいの姿勢で喘いでいる。

    「……こんな背徳的な姿勢で……%CALLNAME:MASTER%の精を……全部、お尻で受け止めますわ……」
