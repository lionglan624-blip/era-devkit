    「とにかく乳首に付けるんだろ？　……わかったよ」

    %CALLNAME:MASTER%がキャップを取り付け、振動を開始させる。

    「んあっ……！　うわ、振動が……直接……あっ、あっ……」

    %CALLNAME:人物_魔理沙%は予想以上の快感に目を白黒させた。
