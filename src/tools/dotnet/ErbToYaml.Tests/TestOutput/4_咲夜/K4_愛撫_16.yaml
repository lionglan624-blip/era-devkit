entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%がアナルバイブを手に取ると、%CALLNAME:TARGET%は僅かに頬を染めた。

    「……また、そちらを責められるのですね」

    %CALLNAME:TARGET%は恥じらいながらも、自ら体勢を整えた。

    アナルバイブがゆっくりと挿入されると、%CALLNAME:TARGET%の体が小さく震える。

    「あっ……入って……振動が……直接……」

    完璧なメイドは、恋人の前でだけ後孔の快感に身を委ねていた。

    「んっ……あ……そこ……動いてますわ……」

    アナルバイブの振動が%CALLNAME:TARGET%の腸壁を刺激し続けている。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕にしがみつき、甘い息を漏らした。

    「こんな……場所で……感じてしまうなんて……はしたないですわ……」

    恥ずかしさを噛み締めながらも、%CALLNAME:TARGET%は逃げようとしなかった。

    「%CALLNAME:MASTER%……もう……奥まで響いて……」

    アナルバイブの振動に、%CALLNAME:TARGET%は声を押し殺していた。

    「……っ……んんっ……強くしないで……」

    瀟洒なメイドの仮面が、後孔からの快感に蝕まれて崩れていく。

    「道具なのに……こんな場所で……こんなに感じてしまうなんて……」

    %CALLNAME:TARGET%は恋人に甘えるように、その胸に顔を埋めた。

    「……責任、取ってくださいまし……」

    「ふぁ……やぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%はアナルバイブの振動に翻弄され、恍惚とした表情を浮かべている。

    振動が腸壁を擦る感覚に、メイドの理性が溶けていた。

    「こんな場所で……イかされるなんて……瀟洒ではありませんわ……」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らしながらも、腰は正直に震えている。

    「……もっと……奥まで……お願いいたしますわ……」
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%がアナルバイブを見せると、%CALLNAME:TARGET%は戸惑いの表情を浮かべた。

    「……それは……後ろに使うものですわよね」

    %CALLNAME:TARGET%は顔を真っ赤にして俯いた。

    「そ、そのような破廉恥な……私の……そこに……」

    アナルバイブが挿入されると、%CALLNAME:TARGET%の体が強張る。

    「っ……振動が……困りますわ……」

    「あっ……やめ……いえ……」

    アナルバイブの振動に、%CALLNAME:TARGET%は言葉を失いかけた。

    「……こんな場所の刺激に……負けるわけには……」

    %CALLNAME:TARGET%は抗いながらも、快感に抗えずにいた。

    「%CALLNAME:MASTER%は……本当に意地悪ですわね……」

    そう言いながらも、%CALLNAME:TARGET%の声には隠しきれない甘さが滲んでいた。

    挿入されたアナルバイブが%CALLNAME:TARGET%の体をじわりと刺激していく。

    「んっ……そんな……動かさないでくださいまし……」

    %CALLNAME:TARGET%は目を細め、小さく息を漏らした。

    「……感じてなんか……いませんわ……」

    そう言う%CALLNAME:TARGET%の腰は、振動に合わせて僅かに揺れている。

    「……少しだけ……少しだけですわよ……」

    「……っ……」

    アナルバイブに貫かれたまま、%CALLNAME:TARGET%は声を押し殺していた。

    「……%CALLNAME:MASTER%……どうして、こんな場所を……」

    %CALLNAME:TARGET%の問いかけは、快感に遮られて消えた。

    「メイドとして……こんな姿……お嬢様には見せられませんわ……」

    %CALLNAME:TARGET%は顔を背けながらも、%CALLNAME:MASTER%から離れようとはしなかった。
