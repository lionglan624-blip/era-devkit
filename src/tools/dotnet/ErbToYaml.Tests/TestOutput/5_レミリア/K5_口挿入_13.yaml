- id: fallback
  content: >-
    「……私が%CALLNAME:MASTER%を抱く、ですか……承知しました」

    %CALLNAME:人物_レミリア%は複雑な表情で%CALLNAME:MASTER%の上に覆いかぶさった。

    小さな身体がゆっくりと腰を下ろしていく。

    「んっ……入って……いきます……」

    %CALLNAME:人物_レミリア%は眉を寄せながらも、腰を動かし始めた。

    「……%CALLNAME:MASTER%、痛くはありませんか……？」

    紅魔館の主は、主を気遣いながら行為を続けた。

    「……この体勢は、私の立場上……複雑な気持ちですが」

    %CALLNAME:人物_レミリア%は戸惑いながらも、%CALLNAME:MASTER%を抱いた。

    ゆっくりと腰を動かし、%CALLNAME:MASTER%の中に入っていく。

    「あっ……%CALLNAME:MASTER%の中……温かい……」

    %CALLNAME:人物_レミリア%は思わず声を漏らした。

    「……す、すみません、はしたない声を……」

    500年の吸血鬼は、威厳を保とうとしながらも快楽に負けていた。

    「……%CALLNAME:MASTER%に仕える身として……ご奉仕いたします」

    %CALLNAME:人物_レミリア%は覚悟を決めたように%CALLNAME:MASTER%の上に乗った。

    小さな身体が%CALLNAME:MASTER%を抱き、腰を揺らす。

    「んぁ……っ、%CALLNAME:MASTER%……締め付けて……」

    %CALLNAME:人物_レミリア%は紅い瞳を潤ませた。

    「……%CALLNAME:MASTER%の身体が、私を受け入れてくれる……」

    紅魔館の主は、複雑な感情を抱えながら主を抱いた。

    「……私から%CALLNAME:MASTER%を抱く、ですか……わかりました」

    %CALLNAME:人物_レミリア%は淡々と言い、%CALLNAME:MASTER%の上に覆いかぶさった。

    しかしその表情には、隠しきれない緊張が浮かんでいる。

    「あ……っ、%CALLNAME:MASTER%……もう少し、力を抜いて……」

    %CALLNAME:人物_レミリア%は思わず懇願するような声を出した。

    「……い、今のは忘れてください……」

    500年の吸血鬼は、素の自分が出てしまったことに動揺していた。
