character: レミリア
situation: K5_愛撫
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、胸を触りたいの？」

    %CALLNAME:人物_レミリア%は艶やかな微笑みを浮かべながら、%CALLNAME:MASTER%を見上げた。

    %CALLNAME:MASTER%が小さな膨らみに手を伸ばすと、%CALLNAME:人物_レミリア%は身を預けてきた。

    「んっ……そう、優しく……」

    %CALLNAME:MASTER%の手が乳房を包み込むと、冷たいはずの肌がほんのりと熱を帯びていく。

    「ふふ……%CALLNAME:MASTER%の手、温かいわね……」

    %CALLNAME:人物_レミリア%は恋人の愛撫に、蕩けるような表情を見せた。

    「……もっと、触っていいのよ。私は%CALLNAME:MASTER%のものなんだから」

    「あっ……んん……」

    %CALLNAME:MASTER%が%CALLNAME:人物_レミリア%の胸を揉みしだくと、甘い吐息が漏れた。

    小さな乳房は柔らかく、%CALLNAME:MASTER%の手の中で形を変えていく。

    「そこ……そう、気持ちいい……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胸に背中を預けながら、身を委ねていた。

    %CALLNAME:MASTER%が乳首を指先で転がすと、

    「ひゃっ……や、いきなりは……んんっ……」

    %CALLNAME:人物_レミリア%は小さく身を震わせた。

    「……%CALLNAME:MASTER%、私の身体、知り尽くしてるのね……」

    「今夜は……%CALLNAME:MASTER%に甘えたい気分なの」

    %CALLNAME:人物_レミリア%はそう言って、%CALLNAME:MASTER%の前に胸を晒した。

    %CALLNAME:MASTER%が両手で包み込むと、%CALLNAME:人物_レミリア%は目を閉じた。

    「んっ……ふぅ……そう、そのまま……」

    %CALLNAME:MASTER%の手が優しく乳房を揉み込んでいく。

    「やっ……乳首、摘ままないで……あぁっ……」

    %CALLNAME:人物_レミリア%は甘い声を漏らしながら、%CALLNAME:MASTER%に寄り添った。

    「……500年生きてきて、こんなに幸せなのは初めてよ……」

    「……来なさい、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を手招きし、自らの胸を指し示した。

    %CALLNAME:MASTER%がその小さな膨らみに手を置くと、%CALLNAME:人物_レミリア%は満足そうに微笑んだ。

    「ふふ……そう、丁寧に……愛撫して」

    %CALLNAME:MASTER%が乳房を揉みながら乳首を弄ると、

    「あっ……んあっ……そこ、敏感なのよ……」

    %CALLNAME:人物_レミリア%の身体がびくびくと震え、紅い瞳が潤んでいく。

    「……私の全部、%CALLNAME:MASTER%だけのものよ……」
  priority: 4
- id: talent_3_1
  content: >-
    「っ……胸を触るの？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の意図を察し、頬を赤らめた。

    %CALLNAME:MASTER%が小さな乳房に手を伸ばすと、

    「んっ……ち、小さいとか言ったら許さないわよ」

    %CALLNAME:人物_レミリア%は照れ隠しに強がりを言った。

    %CALLNAME:MASTER%が優しく揉み込むと、その表情が緩んでいく。

    「あ……そう……悪くない、かも……」

    %CALLNAME:人物_レミリア%は視線を逸らしながら、%CALLNAME:MASTER%の愛撫を受け入れていた。

    「……な、何よ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に胸を触られ、声を上げた。

    「べ、別に気持ちいいわけじゃ……」

    だが%CALLNAME:MASTER%が乳首を指で撫でると、

    「ひゃっ……やっ……そこはだめ……」

    %CALLNAME:人物_レミリア%の言葉とは裏腹に、身体は正直に反応している。

    「……も、もう少しだけ……触ってもいいわよ……」

    高貴な吸血鬼は、素直に気持ちを認められないでいた。

    「あっ……んん……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に胸を揉まれ、思わず声を漏らした。

    「ち、ちょっと……そんなに揉まないで……」

    抗議しながらも、%CALLNAME:人物_レミリア%の身体は%CALLNAME:MASTER%の手に擦り寄っている。

    「……%CALLNAME:MASTER%、手付きがいやらしいわよ……」

    %CALLNAME:MASTER%が乳首を摘まむと、%CALLNAME:人物_レミリア%の声が甘く震えた。

    「やぁ……そこ……んんっ……」

    威厳を保とうとしながらも、快感には抗えないようだった。

    「……ふん、私の胸が触りたいの？」

    %CALLNAME:人物_レミリア%は高飛車な態度で%CALLNAME:MASTER%を見た。

    だが%CALLNAME:MASTER%が遠慮なく揉み始めると、

    「っ……あ……そんなに力入れないで……」

    %CALLNAME:人物_レミリア%の声が上擦った。

    %CALLNAME:MASTER%が両乳首を同時に弄ると、

    「ひゃあっ……！　ば、馬鹿……っ」

    %CALLNAME:人物_レミリア%は顔を真っ赤にして、%CALLNAME:MASTER%を睨みつけた。

    「……次はもっと優しくしなさいよ……」
