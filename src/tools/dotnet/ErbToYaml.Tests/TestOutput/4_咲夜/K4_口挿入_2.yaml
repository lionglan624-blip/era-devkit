- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、これは……」

    %CALLNAME:TARGET%は困惑した表情で、%CALLNAME:MASTER%を見つめている。

    「……お客様への対応も仕事の内……ですが……」

    「……このような奉仕は……少々……」

    %CALLNAME:TARGET%は渋々といった様子で、胸を押し当てた。

    「……早く済ませてくださいまし……」

    「……はあ……」

    %CALLNAME:TARGET%は小さくため息をつきながら、胸を動かしている。

    「……お嬢様のご客人でなければ……」

    %CALLNAME:TARGET%の動きは義務的で、感情がこもっていない。

    「……これで、ご満足いただけますでしょうか……」

    早く終わらせたいという気持ちが透けて見えていた。

    「……%CALLNAME:MASTER%、お急ぎくださいまし……」

    %CALLNAME:TARGET%は淡々とした態度で胸を動かしている。

    「……私にも他の仕事がありますので……」

    「……これはあくまでサービスの一環……」

    %CALLNAME:TARGET%は感情を見せないまま、機械的に奉仕を続けた。

    「……終わりましたら、お声がけくださいまし……」

    「……」

    %CALLNAME:TARGET%は無言のまま、胸で%CALLNAME:MASTER%を挟んでいる。

    「……このような行為……本来のメイドの仕事ではありませんが……」

    「……お嬢様のご命令とあらば……」

    %CALLNAME:TARGET%は義務感だけで動いているようだった。

    「……どうぞ、お好きになさってくださいまし……」
