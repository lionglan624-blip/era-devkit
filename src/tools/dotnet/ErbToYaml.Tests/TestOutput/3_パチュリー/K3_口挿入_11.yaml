- id: fallback
  content: >-
    「……私が、愛撫を……？」

    %CALLNAME:TARGET%は困惑しながらも、%CALLNAME:MASTER%の指示に従った。

    「……本で読んだ知識では、愛撫は精神的効果も大きい行為……」

    %CALLNAME:TARGET%は理論を確認しながら、ゆっくりと触れた。

    「……んっ……思ったより、温かいのね……」

    %CALLNAME:TARGET%は意外そうな表情を浮かべた。

    「……こう……すれば良いのかしら……」

    %CALLNAME:TARGET%は義務的に%CALLNAME:MASTER%の体を撫でている。

    「……%CALLNAME:MASTER%、こういうことを命じるなんて……」

    %CALLNAME:TARGET%は複雑な表情を浮かべた。

    「……でも、指示に従うのが私の役目……」

    %CALLNAME:TARGET%は淡々と続けた。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%に触れている。

    頭の中では、次に読む本のことを考えているようだ。

    「……触れているうちに、少し分かってきたわ……」

    %CALLNAME:TARGET%は呟いた。

    「……体温というものは、興味深いわね……むきゅ」

    「……早く終わらせたいのだけれど……」

    %CALLNAME:TARGET%は本音を漏らしながらも、愛撫は続けている。

    「……でも、雑に触れるのは、私の性分に合わないわ」

    %CALLNAME:TARGET%は丁寧に指を動かした。

    「……知識として、正しい方法で行いたいの」

    知識の魔女らしい拘りを見せた。
  priority: 2
- id: fallback
  content: >-
    「……何故、私がこんなことを……」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「……人に触れるなんて、本を読む時間の無駄だわ」

    %CALLNAME:TARGET%は溜息をついた。

    「……さっさと終わらせるから、静かにして」

    %CALLNAME:TARGET%は冷たい口調で言い放った。

    「……むきゅ……面倒くさいわ……」

    %CALLNAME:TARGET%は最低限の動きで%CALLNAME:MASTER%に触れている。

    「……こんなことより、本を読みたいの」

    %CALLNAME:TARGET%は露骨に不満を示した。

    「……早く終わらせて。私は大図書館に戻るから」

    %CALLNAME:TARGET%は冷淡に言った。

    「……」

    %CALLNAME:TARGET%は無表情のまま、%CALLNAME:MASTER%に触れている。

    頭の中では、次に読む本のことを考えている。

    「……終わったら、すぐに大図書館から出て行って」

    %CALLNAME:TARGET%は冷淡に言った。

    「……むきゅ……時間の無駄だわ」

    「……触れなければならないの？」

    %CALLNAME:TARGET%は不満げに呟いた。

    「……本で読んだ知識によれば、愛撫は信頼関係が前提の行為……」

    %CALLNAME:TARGET%は理論武装しながら、最低限の動きだけを続けた。

    「……あなたとの間に、そんなものはないわ」

    %CALLNAME:TARGET%は事務的に言い放った。
  priority: 1
