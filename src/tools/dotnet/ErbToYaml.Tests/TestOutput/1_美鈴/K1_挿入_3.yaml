    %CALLNAME:人物_美鈴%は恍惚とした表情で、%CALLNAME:MASTER%の動きに身を任せた。

    「お尻で繋がってるのに……こんなに気持ちいいなんて……」

    %CALLNAME:人物_美鈴%は快感に身を震わせた。

    「……%CALLNAME:MASTER%に、ここも開発されちゃった……」

    %CALLNAME:人物_美鈴%は照れくさそうに笑いながら、自ら腰を押し付けた。

    「……もっと、奥まで……来て……」

    「……っ……%CALLNAME:MASTER%の手、腰に……あったかい……」

    %CALLNAME:人物_美鈴%は腰を掴む%CALLNAME:MASTER%の手に、自分の手を重ねた。

    「後ろ向きだから、顔は見えないけど……」

    %CALLNAME:人物_美鈴%は振り返り、潤んだ瞳で%CALLNAME:MASTER%を見つめた。

    「……体全部で、%CALLNAME:MASTER%を感じてる……」

    武術家らしい柔軟な体が、恋人の動きに合わせてしなやかに動いた。

    「……このまま、ずっと……繋がっていたい……」
