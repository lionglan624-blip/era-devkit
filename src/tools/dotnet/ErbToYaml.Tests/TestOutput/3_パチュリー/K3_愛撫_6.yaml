- id: fallback
  content: >-
    「……何を、しているの」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の行為に、冷静を装って問いかけた。

    「そんな場所を開いて……何を見るつもり」

    しかし%CALLNAME:MASTER%が構わず秘所を開くと、%CALLNAME:TARGET%は僅かに息を乱した。

    「……まあ、いいわ。観察対象として……」

    そう言いながらも、%CALLNAME:TARGET%の頬は微かに紅潮している。

    「……っ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に秘所を開かれた瞬間、小さく息を呑んだ。

    「……膣内の構造については、本で読んだことがあるわ……」

    %CALLNAME:TARGET%は淡々と言うが、声が僅かに震えている。

    「……ふぅん……見られると、こういう感覚なのね……」

    知識欲のふりをして、%CALLNAME:TARGET%は%CALLNAME:MASTER%の行為を受け入れた。

    「……止めなさい」

    %CALLNAME:TARGET%は冷静に言い放つが、%CALLNAME:MASTER%は止めない。

    「……聞こえなかったの？」

    しかし%CALLNAME:TARGET%自身も、強く拒否する気配がない。

    「……まあ、いいわ。勝手に、しなさい」

    %CALLNAME:TARGET%は本に視線を戻したが、ページを読む集中力は失われていた。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の行為を受けている。

    「……何がしたいの、あなたは」

    %CALLNAME:MASTER%が秘所を広げ続けると、%CALLNAME:TARGET%は僅かに身じろぎした。

    「……変な感覚ね。見られているだけなのに……」

    %CALLNAME:TARGET%はぼそりと呟き、観察者を装いながら%CALLNAME:MASTER%に身を任せた。
  priority: 2
- id: fallback
  content: >-
    「……何をしているの」

    %CALLNAME:TARGET%は冷ややかな目で%CALLNAME:MASTER%を見た。

    「私の体を、許可なく開こうなんて」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%から距離を取ろうとした。

    「……下品極まりない行為ね。今すぐ出て行きなさい」

    「……むきゅ」

    %CALLNAME:TARGET%は不快そうに眉を顰めた。

    「そんな場所を見て、何が楽しいの」

    %CALLNAME:TARGET%は嫌悪感を隠さずに%CALLNAME:MASTER%を睨んだ。

    「……読書の邪魔をしないで。精霊魔法で追い出すわよ」

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついた。

    「あなたは何を考えているの。理解に苦しむわ」

    %CALLNAME:TARGET%は呆れた表情で%CALLNAME:MASTER%を見ている。

    「……獣以下ね。本を読んで教養を身につけなさい」

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%を睨みつけた。

    「私を何だと思っているの」

    %CALLNAME:TARGET%の声には怒りと軽蔑が滲んでいる。

    「……好きにしなさい。ただし、二度とこの図書館には入れないわよ」

    %CALLNAME:TARGET%は冷たく言い放ち、本に視線を戻した。
  priority: 1
