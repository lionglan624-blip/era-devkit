    %CALLNAME:人物_パチュリー%は顔を真っ赤にしながら、未知の感覚に戸惑っている。

    「……本には、こういうことは書いてなかったわ……」

    %CALLNAME:人物_パチュリー%は恥ずかしそうに俯いた。

    「むきゅっ……！　ちょ、ちょっと……」

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%の後ろの穴を愛撫すると、

