- id: fallback
  content: >-
    「えへへ、あたいの口で気持ちよくしてあげる！」

    %CALLNAME:人物_チルノ%は得意げに%CALLNAME:MASTER%の前に跪いた。

    冷たいはずの唇が、熱を帯びて%CALLNAME:MASTER%に触れる。

    「……んっ、れろ……美味しい……」

    %CALLNAME:人物_チルノ%は嬉しそうに舌を這わせている。

    「%CALLNAME:MASTER%のここ、あたいのものだからね！」

    独占欲を隠そうともせず、%CALLNAME:人物_チルノ%は夢中で奉仕を続けた。

    「ふふん、あたいったら最強の舌使いだからね！」

    %CALLNAME:人物_チルノ%は自信満々に宣言すると、%CALLNAME:MASTER%を咥え込んだ。

    「……ん、ちゅる……こうすると気持ちいいでしょ？」

    冷たい舌先が敏感な部分をなぞり、背筋が震える。

    %CALLNAME:人物_チルノ%は上目遣いで%CALLNAME:MASTER%の反応を確かめている。

    「もっと声出してよ……あたいの力、見せてあげる！」

    威勢よく言いながらも、その目は愛しさで潤んでいた。

    「……%CALLNAME:MASTER%、あたいのこと見ててね？」

    %CALLNAME:人物_チルノ%は少し照れながら、%CALLNAME:MASTER%を口に含んだ。

    「んぅ……はむ……」

    丁寧に、愛おしそうに舌を動かす%CALLNAME:人物_チルノ%。

    時折、確認するように%CALLNAME:MASTER%の顔を見上げる。

    「……気持ちいい？　あたい、上手になったでしょ？」

    褒めてほしそうに、%CALLNAME:人物_チルノ%は期待の眼差しを向けた。

    「今日はね、特別に丁寧にしてあげるから……」

    %CALLNAME:人物_チルノ%は珍しくおとなしく%CALLNAME:MASTER%の前に座った。

    「……んっ、ちゅ……こうするの、好きになっちゃった」

    冷たい口腔が%CALLNAME:MASTER%を包み込む。

    %CALLNAME:人物_チルノ%は目を閉じて、幸せそうに奉仕を続けている。

    「……大好きだよ、%CALLNAME:MASTER%……」

    口を離した瞬間、%CALLNAME:人物_チルノ%は小さく呟いた。
