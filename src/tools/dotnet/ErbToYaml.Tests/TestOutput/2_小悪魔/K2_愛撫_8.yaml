    「……んっ……これでいいですの……？」

    %CALLNAME:人物_小悪魔%は面倒くさそうに指を動かしている。

    「……%CALLNAME:MASTER%さん、変態ですわね……」

    %CALLNAME:人物_小悪魔%はジト目で%CALLNAME:MASTER%を見ながら、言われた通りにし始めた。

    「パチュリー様に言いつけてやりたいですわ……」

    %CALLNAME:人物_小悪魔%は渋々と自らの秘部を弄っている。

    「……んっ……は……こんなので興奮するんですの……？」

    %CALLNAME:人物_小悪魔%は呆れた様子で%CALLNAME:MASTER%を見つめていた。
