entries:
- id: fallback
  content: >-
    「んぁっ……%CALLNAME:MASTER%、そこ……くすぐったいの……」

    %CALLNAME:TARGET%は脚を開いて、%CALLNAME:MASTER%に秘所を晒している。

    妖精の小さな体が、舌が触れるたびにぴくんと跳ねた。

    「あっ……ふぁ……%CALLNAME:MASTER%の舌、気持ちいい……」

    %CALLNAME:TARGET%は頬を染めながら、%CALLNAME:MASTER%の頭をそっと撫でた。

    「……えへへ、こうしてるの、幸せ……もっと、なめて……？」

    妖精は恥じらいながらも、甘える声で%CALLNAME:MASTER%にねだった。

    「やぁ……そんなとこ、見ないでぇ……」

    %CALLNAME:TARGET%は恥ずかしそうに顔を覆うが、脚は閉じようとしない。

    %CALLNAME:MASTER%の舌が秘所を這うと、妖精の体がとろんと力を失った。

    「んっ……あっ……%CALLNAME:MASTER%、上手だよぅ……」

    %CALLNAME:TARGET%は目を潤ませながら、%CALLNAME:MASTER%を見つめている。

    「……あたしの体、%CALLNAME:MASTER%のものだから……好きにして……」

    妖精は幸せそうな顔で身を委ねている。

    「ひゃっ……んぅ……」

    %CALLNAME:TARGET%は小さく声を漏らしながら、%CALLNAME:MASTER%の愛撫を受けている。

    妖精の秘所からはじんわりと蜜が溢れ、%CALLNAME:MASTER%の舌を濡らしていった。

    「%CALLNAME:MASTER%……あたし、なんか変なの……体がぽかぽかする……」

    %CALLNAME:TARGET%は切なそうな声を上げながら、腰を小さく揺らした。

    「……もっと、もっとして……あたし、%CALLNAME:MASTER%にいっぱいしてほしいの……」

    無邪気な願いを込めて、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめた。

    「あっ……そこ、そこがいいの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の舌の動きに合わせて、小さく腰を動かしている。

    妖精の体は熱を帯び、敏感になった秘所は%CALLNAME:MASTER%の愛撫に甘く震えていた。

    「%CALLNAME:MASTER%……大好き……あたし、%CALLNAME:MASTER%のことが大好き……」

    %CALLNAME:TARGET%は快楽と幸福で蕩けた表情を浮かべている。

    「……んぅ……ふぁ……このままずっと、こうしてたいな……」

    妖精は甘い声を漏らしながら、%CALLNAME:MASTER%に全てを預けていた。
