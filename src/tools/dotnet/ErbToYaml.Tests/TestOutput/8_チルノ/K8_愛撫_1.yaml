    「ちょ、ちょっと……そんなに見ないでよ……」

    %CALLNAME:人物_チルノ%は片手で顔を覆いながら、%CALLNAME:MASTER%の愛撫を受けている。

    「あたいの……そこ……じろじろ見るなんて……」

    %CALLNAME:MASTER%の舌が這うと、%CALLNAME:人物_チルノ%の抗議は喘ぎ声に変わった。

    「んっ……あ……っ、もう……%CALLNAME:MASTER%のばか……」

    恨めしそうに言いながらも、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%から離れようとはしなかった。
