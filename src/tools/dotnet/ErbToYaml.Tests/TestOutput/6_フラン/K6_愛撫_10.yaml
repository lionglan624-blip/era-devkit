    戸惑いながらも、%CALLNAME:人物_フラン%は自分の服を少しずらした。

    「ひゃっ……あ……」

    %CALLNAME:MASTER%の唇が触れると、小さく声を上げた。

    「……%CALLNAME:MASTER%がしたいなら、しょうがないのさ」

    「あっ……」

