- id: fallback
  content: >-
    「……お尻の穴？　そんなところに入るの……？」

    %CALLNAME:人物_フラン%は首を傾げながら、疑問の眼差しを向けた。

    495年の孤独の中、そんな知識は得ていなかった。

    「……まあ、%CALLNAME:MASTER%がしたいなら……試してみてもいいけど」

    %CALLNAME:MASTER%が菊穴に亀頭を当てると、%CALLNAME:人物_フラン%は眉をひそめた。

    「っ……痛いのさ……これ、本当に入る……？」

    未知の感覚に、悪魔の妹は戸惑いを隠せなかった。

    「……変な感じ。前とは全然違うのさ」

    %CALLNAME:人物_フラン%は腸内の異物感に顔を歪めた。

    身体が異物を押し出そうとして、きゅう、と締め付けている。

    「痛い……けど、怖いわけじゃないのさ。変わった遊びだね」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_フラン%は不思議そうな顔をした。

    「んっ……お腹の中……かき回されてる……これが気持ちいいの……？」

    痛みと違和感の中に、微かな快感を見出し始めていた。

    「%CALLNAME:MASTER%って、変わった趣味してるのさ」

    %CALLNAME:人物_フラン%は呆れたように言った。

    しかし、完全に拒絶するわけでもない。

    「……でも、嫌いじゃないよ。%CALLNAME:MASTER%といると、退屈しないから」

    %CALLNAME:MASTER%が奥まで突き入れると、%CALLNAME:人物_フラン%は声を漏らした。

    「あっ……！　奥まで……きつい……けど、悪くないかも……」

    その言葉は、%CALLNAME:人物_フラン%なりの精一杯の肯定だった。

    「……495年間、ずっとひとりだったから」

    %CALLNAME:人物_フラン%はぽつりと呟いた。

    「こういうこと、知らなかったのさ。でも……%CALLNAME:MASTER%が教えてくれるなら」

    紅い瞳が、どこか期待を込めて%CALLNAME:MASTER%を見つめた。

    %CALLNAME:MASTER%が激しく腰を動かすと、%CALLNAME:人物_フラン%は目を見開いた。

    「んぅっ……！　ちょ、ちょっと……待って……頭がぐちゃぐちゃに……」

    痛みが快感に変わる感覚に、悪魔の妹は戸惑っていた。
  priority: 2
- id: fallback
  content: >-
    「……ふぅん、そこにも入れられるんだ」

    %CALLNAME:人物_フラン%は興味深そうに、%CALLNAME:MASTER%を見た。

    その紅い瞳には、好奇心と危険な光が混在している。

    「面白い遊びなのさ。でも%CALLNAME:MASTER%、壊れないでね？」

    %CALLNAME:MASTER%が菊穴に亀頭を押し込むと、%CALLNAME:人物_フラン%は眉をひそめた。

    「っ……痛い。これ、本当に楽しいの……？」

    新しい玩具を試すように、悪魔の妹は感覚を確かめていた。

    「きゅっとしてドカーンって、知ってる？」

    %CALLNAME:人物_フラン%は無邪気に笑いながら、不穏なことを口にした。

    「今ね、%CALLNAME:MASTER%のこと一瞬で壊せるのさ。お尻の中から」

    しかし、%CALLNAME:MASTER%が腰を動かすと、その表情が揺らいだ。

    「んっ……あれ……痛いのに、なんか変な感じ……」

    %CALLNAME:人物_フラン%は困惑しながら、その感覚を受け入れていた。

    「……壊したいのに、壊したくないって……変なの」

    「……」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%を見つめていた。

    腸内を犯される感覚に、どこか虚ろな瞳をしている。

    「痛いのさ。でも……%CALLNAME:MASTER%って、本当に変わってるよね」

    %CALLNAME:MASTER%が奥まで突き入れると、%CALLNAME:人物_フラン%は小さく声を漏らした。

    「っ……ん……こんな穴まで使って……コンティニューできないんだよ？」

    警告するような言葉とは裏腹に、その体は快感を感じ始めていた。

    「あなた、こんな穴でするなんて……変態なのさ」

    %CALLNAME:人物_フラン%は呆れたように言った。

    しかし、完全に拒絶するわけでもない。

    「でも、退屈しのぎにはなるかな。痛いけど」

    %CALLNAME:MASTER%が激しく腰を動かすと、%CALLNAME:人物_フラン%は目を見開いた。

    「んぅ……っ！　ちょ、ちょっと……頭、変になる……壊すつもりないのに……」

    破壊の衝動を快感が塗り替えていく。悪魔の妹は、その変化に戸惑っていた。
  priority: 1
