character: レミリア
situation: K5_会話親密
entries:
- id: fallback
  content: >-
    「……ふふ、お前は甘えん坊ね」

    %CALLNAME:MASTER%は%CALLNAME:人物_レミリア%の髪を優しく撫でている。

    %CALLNAME:人物_レミリア%は目を細め、猫のようにその手に頭を預けた。

    「……500年生きてきて、こんなことを許すのはお前だけよ」

    %CALLNAME:人物_レミリア%の紅い瞳が、いつもより柔らかく%CALLNAME:MASTER%を見つめている。

    「……もっと撫でてもいいわ。私が許すのだから」

    威厳ある吸血鬼の仮面の下から、甘えるような表情が覗いていた。

    %CALLNAME:MASTER%は%CALLNAME:人物_レミリア%の小さな手を取った。

    「……手を握るなんて、子供の遊びみたいね」

    %CALLNAME:人物_レミリア%はそう言いながらも、しっかりと握り返してきた。

    「でも……悪くないわ。お前の手、温かいのね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%との繋がりを確かめるように、指を絡めてきた。

    「……この温もり、私だけのものよ。いいわね？」

    吸血鬼の誇りと独占欲が混じった声で、%CALLNAME:人物_レミリア%は囁いた。

    「……っ」

    %CALLNAME:MASTER%は%CALLNAME:人物_レミリア%を後ろから抱きしめた。

    %CALLNAME:人物_レミリア%は一瞬身を強張らせたが、すぐに力を抜いた。

    「……こうしていると、お前の心臓の音が聞こえるわ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の腕に自分の手を重ねている。

    「お前だけよ……私にこんなことを許されているのは……」

    紅魔館の主は、珍しく甘えるような声でそう呟いた。

    「あら……羽に興味があるの？」

    %CALLNAME:MASTER%は%CALLNAME:人物_レミリア%の蝙蝠の翼にそっと触れた。

    %CALLNAME:人物_レミリア%はわずかに身を震わせたが、拒まなかった。

    「……ふふ、誰にも触れさせたことなんてないのよ？」

    %CALLNAME:MASTER%が翼を優しく撫でると、%CALLNAME:人物_レミリア%は気持ちよさそうに目を閉じた。

    「……お前だけよ。私の翼に触れることを許すのは……」

    吸血鬼としての誇りも忘れ、%CALLNAME:人物_レミリア%はその感触に身を委ねていた。
  priority: 4
- id: talent_3_1
  content: >-
    「……なに？」

    %CALLNAME:MASTER%は%CALLNAME:人物_レミリア%の髪に触れた。

    %CALLNAME:人物_レミリア%は抵抗する素振りを見せなかった。

    「……髪を触りたいの？ 仕方ないわね、許してあげる」

    %CALLNAME:人物_レミリア%の声はどこか照れくさそうだった。

    「……でも、誰にでも許すわけじゃないんだからね」

    %CALLNAME:人物_レミリア%は頬をほんのりと赤らめていた。

    %CALLNAME:MASTER%は%CALLNAME:人物_レミリア%の手に触れた。

    「……っ！ な、何よ急に」

    %CALLNAME:人物_レミリア%は驚いたように目を見開いたが、手を引っ込めなかった。

    「……べ、別に嫌じゃないわよ。触りたいなら触ればいいでしょ」

    %CALLNAME:人物_レミリア%は顔をわずかに赤くしながらも、威厳を保とうとしている。

    「……ふん、光栄に思いなさいよね」

    「……肩を触るの？」

    %CALLNAME:MASTER%は%CALLNAME:人物_レミリア%の肩に手を置いた。

    %CALLNAME:人物_レミリア%は一瞬肩を震わせたが、されるがままになっている。

    「……咲夜にもこんなことさせないのに」

    %CALLNAME:MASTER%がそっと肩を揉むと、%CALLNAME:人物_レミリア%は気持ちよさそうに息を吐いた。

    「……悪くないわね。もう少し続けてもいいわよ」

    「……んっ」

    %CALLNAME:MASTER%は%CALLNAME:人物_レミリア%の頬に手を添えた。

    %CALLNAME:人物_レミリア%は目を逸らしながらも、その手を払おうとはしない。

    「……こんなこと、されたことないわ」

    %CALLNAME:人物_レミリア%は小さく呟いた。紅い瞳が%CALLNAME:MASTER%を横目で見ている。

    「……特別よ。お前だけに許してあげる」

    高飛車な言葉とは裏腹に、その表情はどこか嬉しそうだった。
  priority: 3
  condition:
    type: Talent
    talentType: 3
    threshold: 1
- id: fallback
  content: >-
    「……何をするつもり？」

    %CALLNAME:MASTER%は%CALLNAME:人物_レミリア%の髪に触れようとしている。

    %CALLNAME:人物_レミリア%は怪訝そうな表情を浮かべたが、拒絶はしなかった。

    「……私の髪に興味があるの？ まあ、綺麗でしょうけど」

    されるがままに髪を撫でられながら、%CALLNAME:人物_レミリア%は呟いた。

    「……特別に許してあげるわ。光栄に思いなさい」

    「……私の手に触れるなんて」

    %CALLNAME:MASTER%は%CALLNAME:人物_レミリア%の手に触れた。

    %CALLNAME:人物_レミリア%は眉をひそめたが、手を引っ込めなかった。

    「……使用人のくせに大胆ね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を見据えながら、ため息をついた。

    「……まあ、気が利く働きには褒美も必要かしらね」

    「……ふぅん」

    %CALLNAME:MASTER%は%CALLNAME:人物_レミリア%の肩に軽く触れた。

    %CALLNAME:人物_レミリア%は一瞬身を引いたが、すぐに元の姿勢に戻った。

    「……馴れ馴れしいわね。でも、まあ……」

    %CALLNAME:人物_レミリア%はわずかに目を細めた。

    「……お前には何か感じるものがあるわ。だから許してあげる」

    「……何かしら？」

    %CALLNAME:MASTER%が近づくと、%CALLNAME:人物_レミリア%は鋭い視線を向けた。

    しかし、その視線にはどこか興味深げな色が混じっている。

    「……私に触れたいの？ 大胆な使用人ね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%をじっと見つめた。

    「……面白いわ。今日は特別に許してあげましょう」
  priority: 2
- id: fallback
  content: >-
    「……何のつもり？」

    %CALLNAME:MASTER%が%CALLNAME:人物_レミリア%に触れようとすると、

    %CALLNAME:人物_レミリア%は冷たい目でこちらを見据えた。

    「紅魔館の主に馴れ馴れしくするなんて、身の程知らずね」

    「私に触れる許可を与えた覚えはないわ」

    %CALLNAME:人物_レミリア%は傲然とそう告げ、距離を取った。

    「……ふぅん？」

    %CALLNAME:MASTER%が近づくと、%CALLNAME:人物_レミリア%は鼻で笑った。

    「使用人が主人に馴れ馴れしくするなんて、礼儀がなっていないわね」

    「咲夜なら、こんな無礼は許さないでしょうに」

    %CALLNAME:人物_レミリア%は退屈そうに視線を逸らした。

    「……もっと気の利いた奉仕を期待しているわ」

    「……触れるな」

    %CALLNAME:MASTER%の手が伸びる前に、%CALLNAME:人物_レミリア%は冷たく言い放った。

    「お前は何を勘違いしているのかしら？」

    %CALLNAME:人物_レミリア%の紅い瞳が、冷酷に%CALLNAME:MASTER%を見下ろしている。

    「私は紅魔館の主よ。使用人風情が気安く触れていい存在ではないわ」

    その言葉には、500年を生きる吸血鬼の威厳が滲んでいた。

    「……」

    %CALLNAME:MASTER%が%CALLNAME:人物_レミリア%に近づこうとすると、

    %CALLNAME:人物_レミリア%は無言で一歩後退した。

    「そこまでよ。私に触れる資格があると思っているの？」

    %CALLNAME:人物_レミリア%は小さく笑った。それは嘲りの笑みだった。

    「まずは私に認められることね。話はそれからよ」
  priority: 1
