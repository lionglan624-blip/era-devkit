    「……後背位？　いいわよ、この体勢なら私が完全に支配できるもの」

    %CALLNAME:人物_レミリア%は不敵に笑った。

    %CALLNAME:MASTER%の背後に立ち、ゆっくりと中に入っていく。

    「……どう？　私に後ろから犯される気分は」

    %CALLNAME:人物_レミリア%は嘲笑いながら腰を動かした。

    「……覚えておきなさい。%CALLNAME:MASTER%は私の所有物よ」

