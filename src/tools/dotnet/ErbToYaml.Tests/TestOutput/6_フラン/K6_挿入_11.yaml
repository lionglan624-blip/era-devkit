- id: talent_3_1
  content: >-
    「えっ……り、両方に……？　そんなの……っ」

    %CALLNAME:人物_フラン%は戸惑いの声を上げた。

    だが、好きな人の前で拒否することはできなかった。

    「%CALLNAME:MASTER%が見てる前で……こんなの……恥ずかしい……」

    前と後ろを同時に責められると、%CALLNAME:人物_フラン%は声を漏らした。

    「あっ……んっ……両方……きてる……%CALLNAME:MASTER%……見ないで……っ」

    好きな人に乱れる姿を見られる羞恥に、悪魔の妹は顔を真っ赤に染めた。

    「ふぁっ……前も後ろも……埋まって……っ」

    %CALLNAME:人物_フラン%は困惑した表情で%CALLNAME:MASTER%を見た。

    初めての感覚に、何をすればいいかわからない。

    「%CALLNAME:MASTER%……こういうの、普通なの……？　私、知らないから……」

    二人が動くと、%CALLNAME:人物_フラン%は甘い声を抑えられなかった。

    「んっ……あぁ……二人に……される……恥ずかしいのに……気持ちいい……」

    好きな人の前で感じてしまう自分が、たまらなく恥ずかしかった。

    「%CALLNAME:MASTER%……私、壊れちゃわないかな……」

    %CALLNAME:人物_フラン%は不安げに恋慕の相手を見つめた。

    二人に同時に責められる感覚は、少女には強すぎる刺激だった。

    「でも……%CALLNAME:MASTER%がいるから……頑張れる……かも」

    激しい動きに、%CALLNAME:人物_フラン%は悲鳴を上げた。

    「ひゃっ……あぁっ……両方……すごい……%CALLNAME:MASTER%……助けて……っ」

    好きな人に縋りながら、悪魔の妹は二人の責めに耐えていた。

    「んっ……あ……二人の熱が……私の中で……ぶつかる……」

    %CALLNAME:人物_フラン%は恥ずかしそうに目を伏せた。

    前と後ろから押し寄せる快感に、思考が蕩けていく。

    「こんな……こんなの……地下室では想像もしなかった……」

    二人が同時に奥を突くと、%CALLNAME:人物_フラン%は声を上げた。

    「あぁっ……んんっ……いっぱい……されて……%CALLNAME:MASTER%……好き……っ」

    快楽に流されるまま、悪魔の妹は本音を漏らしてしまった。
