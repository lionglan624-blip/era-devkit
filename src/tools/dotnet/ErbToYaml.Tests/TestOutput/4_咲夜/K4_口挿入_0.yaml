character: 咲夜
situation: K4_口挿入
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……こうして差し上げましょうか……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の前に跪き、細い指を絡めた。

    「私の手で……貴方を……」

    メイドの指先が、熟練の動きで上下する。

    「ふふ……貴方の反応が……とても可愛いですわ……」

    %CALLNAME:TARGET%は愛おしそうに%CALLNAME:MASTER%を見上げた。

    「もっと……気持ちよくして差し上げますわね……」

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の一物を優しく包み込んだ。

    「貴方のここ……熱くて……脈打っていますわ……」

    完璧なメイドの手が、丁寧にしごいていく。

    「私の手で……全てを受け止めますから……」

    %CALLNAME:TARGET%は頬を染めながら、手の動きを速めた。

    「遠慮なく……出してくださいまし……」

    「……ほら……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は両手で包み込み、交互に動かしている。

    「瀟洒なメイドの手、いかがですか……？」

    「ふふ……こんな風に奉仕するのも……悪くありませんわね……」

    %CALLNAME:TARGET%は指先で鈴口を撫で、先走りを塗り広げた。

    「んっ……滑らかになりましたわ……」

    「このまま……最後まで……お世話いたしますわ……」

    「……%CALLNAME:MASTER%……私を見ていてください……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と視線を合わせながら手を動かしている。

    「貴方のために……この手を使えることが……幸せですわ……」

    %CALLNAME:TARGET%の指先が、亀頭を優しく包み込んだ。

    「あ……震えていますわね……もうすぐ……？」

    「いいのですよ……全部、私に……」

    完璧なメイドは、恋人のために一心不乱に奉仕していた。
  priority: 4
- id: talent_3_1
  content: >-
    「……%CALLNAME:MASTER%……これで……よろしいでしょうか……」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%の一物を握った。

    「こうして……動かせば……」

    「……っ……熱い……ですわ……」

    %CALLNAME:TARGET%は顔を赤らめながら、ぎこちなく手を上下させた。

    「……気持ちよくなっていただけていますか……」

    心配そうに%CALLNAME:MASTER%を見上げる。

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は次第に手つきが滑らかになっていく。

    「こうすると……反応がありますわね……」

    「ふふ……貴方の気持ちいいところ……覚えましたわ……」

    %CALLNAME:TARGET%は少し得意げに微笑んだ。

    「もっと……上手になりますから……」

    恥ずかしさと嬉しさが入り混じった表情で奉仕を続ける。

    「……こんな……ことをしているなんて……」

    %CALLNAME:TARGET%は自分の行動に戸惑いながらも、手を止めなかった。

    「メイドとして……お世話するのは当然……ですけれど……」

    「で、でも……%CALLNAME:MASTER%だから……」

    %CALLNAME:TARGET%は言葉を途中で飲み込み、手の動きに集中した。

    「……もう少し……このまま……」

    複雑な心境を隠しながら、%CALLNAME:TARGET%は奉仕を続けた。

    「……%CALLNAME:MASTER%……見ないでくださいまし……」

    %CALLNAME:TARGET%は俯きながら、手を動かしている。

    「こんな……はしたないこと……」

    「でも……貴方のために……」

    %CALLNAME:TARGET%は意を決したように顔を上げた。

    「……最後まで……お世話させてくださいまし……」

    恥ずかしさを堪えながら、%CALLNAME:TARGET%は懸命に手を動かした。
