character: パチュリー
situation: K3_口挿入
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、入れるわね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に覆いかぶさりながら、静かに囁いた。

    細い体が震えているが、瞳には決意が宿っている。

    「……んっ……%CALLNAME:MASTER%の中……温かいわ……」

    %CALLNAME:TARGET%は腰を進め、%CALLNAME:MASTER%の奥へと入っていった。

    「……あなたを満たせるのは……幸せよ……」

    %CALLNAME:TARGET%は頬を染めながら、小さく微笑んだ。

    「……はぁ……ん……っ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の中で小さく喘いでいる。

    大図書館の静寂の中、%CALLNAME:TARGET%が主導権を握っている。

    「……%CALLNAME:MASTER%、力を抜いて……私のペースで動くから……」

    %CALLNAME:TARGET%は囁きながら、腰をゆっくりと動かした。

    「……あなたの中、私を締め付けてくるわ……」

    %CALLNAME:TARGET%は体が弱いながらも、懸命に腰を動かしている。

    「……ぁ……やぁ……この体勢だと、奥まで届く……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に手を置きながら、深く繋がっている。

    細い腕で体を支えながら、%CALLNAME:TARGET%は息を整えた。

    「……むきゅ……体力が……でも、あなたの表情を見ていると……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応に満足げな表情を浮かべた。

    「……もう少しだけ、奥まで……」

    %CALLNAME:TARGET%は愛する人のために、力を振り絞った。

    「……あなたの中にいると……落ち着くわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめながら囁いた。

    本の山に囲まれた空間で、知識の魔女が愛を紡いでいる。

    「……んっ……私の全部が、あなたに包まれている感覚……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%との一体感を味わっている。

    「……このまま、もっと深く……あなたの中に……」

    %CALLNAME:TARGET%は珍しく甘えた声を出した。
  priority: 4
- id: talent_3_1
  content: >-
    「……こ、こうすればいいのかしら……」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%の上に覆いかぶさった。

    本で読んだ知識を思い出しながら、ゆっくりと腰を進めていく。

    「……んっ……%CALLNAME:MASTER%の中、熱いわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に入りながら、顔を赤らめた。

    「……本には書いてなかったわ……この感覚は……」

    %CALLNAME:TARGET%は知識と実体験の差異に戸惑っていた。

    「……あ……動くわよ……？」

    %CALLNAME:TARGET%は不安そうに%CALLNAME:MASTER%を見つめながら、腰を揺らし始めた。

    ぎこちない動きだが、%CALLNAME:TARGET%なりに努力している。

    「……むきゅ……体力が持つかしら……」

    %CALLNAME:TARGET%は早くも息を切らし始めている。

    「……でも……あなたの中、気持ちいいから……」

    %CALLNAME:TARGET%は好意を滲ませながら、動きを続けた。

    「……はぁ……はぁ……こんなに激しい運動……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の中で息を乱していた。

    普段は本を読むだけで、体を動かすことは少ない。

    「……でも……あなたが気持ちよさそうだから……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の表情を確認しながら、腰を動かした。

    「……もう少し……奥まで届かせたいわ……」

    %CALLNAME:TARGET%は体が弱いながらも、懸命だった。

    「……ん……こうして繋がっていると……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に手を置きながら呟いた。

    「……あなたの体温が、私を包んでいるわ……」

    %CALLNAME:TARGET%は頬を染めながら、ゆっくりと腰を動かしている。

    「……恥ずかしいけれど……あなたの中、好きよ……」

    %CALLNAME:TARGET%は素直に認めた。
