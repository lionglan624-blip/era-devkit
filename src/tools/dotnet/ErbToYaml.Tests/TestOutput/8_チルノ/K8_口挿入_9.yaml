- id: fallback
  content: >-
    「へぇ……あたいが後ろから入れるの？　面白そうね！」

    %CALLNAME:人物_チルノ%は興味深そうに%CALLNAME:MASTER%の背後に立った。

    後孔に自分のものを押し当て、ゆっくりと挿入した。

    「おぉ……%CALLNAME:MASTER%の中……なんか不思議な感じ」

    %CALLNAME:人物_チルノ%は好奇心旺盛に腰を動かした。

    「後ろからだと……いつもと違う感じがするね」

    氷の妖精は新しい体験を楽しんでいた。

    「%CALLNAME:MASTER%のお尻に……入れるの？」

    %CALLNAME:人物_チルノ%は首を傾げながら、後孔に自分のものを当てた。

    ゆっくりと押し込むと、%CALLNAME:MASTER%の体が震えた。

    「あ、入った……こうやって動けばいいの？」

    %CALLNAME:人物_チルノ%は試しに腰を揺らしてみた。

    「後ろから抱きつくと……あったかくていいね」

    氷の妖精は%CALLNAME:MASTER%の背中に頬を寄せた。

    「ふふん、今日はあたいがやる番ね！」

    %CALLNAME:人物_チルノ%は自信満々に%CALLNAME:MASTER%の背後に回った。

    後孔に挿入すると、得意げな表情を浮かべた。

    「どう？　あたい、上手でしょ？」

    %CALLNAME:人物_チルノ%は腰を動かしながら%CALLNAME:MASTER%の反応を見た。

    「大ちゃんに自慢できるかな……いや、やっぱ秘密ね」

    氷の妖精は楽しそうに腰を揺らし続けた。

    「後背位って言うんでしょ？　知ってるよ！」

    %CALLNAME:人物_チルノ%は得意げに%CALLNAME:MASTER%の後孔に自分のものを当てた。

    ゆっくりと腰を沈めると、%CALLNAME:MASTER%の体温を感じた。

    「んー……こうして動くと……なんか変な感じ」

    %CALLNAME:人物_チルノ%は不思議そうに腰を揺らした。

    「でも……後ろから抱きつけるのは……悪くないかも」

    氷の妖精は%CALLNAME:MASTER%の背中に身を預けた。
  priority: 2
- id: fallback
  content: >-
    「はぁ!?　なんであたいがやらなきゃいけないの！」

    %CALLNAME:人物_チルノ%は不満そうに叫んだ。

    しかし逆らえず、渋々%CALLNAME:MASTER%の後孔に自分のものを当てた。

    「……っ！　入った……なんでこんなこと……」

    %CALLNAME:人物_チルノ%は顔を顰めながら腰を動かした。

    「絶対に……いつか仕返しするからね……！」

    氷の妖精は屈辱に歯を食いしばった。

    「やだ……こんなの……最強のあたいが……」

    %CALLNAME:人物_チルノ%は嫌そうに%CALLNAME:MASTER%の背後に立たされた。

    後孔に挿入させられると、複雑な表情を浮かべた。

    「……動けばいいんでしょ……」

    %CALLNAME:人物_チルノ%は仕方なく腰を動かし始めた。

    「こんなの……あたいの本意じゃないからね……」

    氷の妖精は不満げに呟いた。

    「……」

    %CALLNAME:人物_チルノ%は黙って%CALLNAME:MASTER%の後孔に挿入した。

    言われるがまま腰を動かしているが、目に光がない。

    「……これで満足？」

    %CALLNAME:人物_チルノ%は投げやりに腰を揺らした。

    「早く終わらせて……」

    氷の妖精は虚ろな目で%CALLNAME:MASTER%の背中を見つめていた。

    「ちっ……あたいにこんなことさせて……」

    %CALLNAME:人物_チルノ%は舌打ちしながら%CALLNAME:MASTER%の背後に立った。

    後孔に自分のものを押し込むと、憮然とした表情を浮かべた。

    「……どうせやるなら……さっさと終わらせる」

    %CALLNAME:人物_チルノ%は素っ気なく腰を動かした。

    「覚えてなさいよ……」

    氷の妖精は恨めしそうに%CALLNAME:MASTER%を睨んだ。
  priority: 1
