    「……やったことないですけど……こう……ですか？」

    %CALLNAME:人物_小悪魔%はそっと胸で一物を挟んだ。

    「……んっ……熱い……ですわ……」

    %CALLNAME:人物_小悪魔%は好奇心に負けたように、一物を観察している。

    「ふむ……こうやって挟むんですのね……」

    まるで研究するかのように、胸で一物を擦った。

    「んっ……%CALLNAME:MASTER%、変な顔してますわ」

    %CALLNAME:人物_小悪魔%は小さく笑いながら、胸を動かし続けた。

    「……こういうのも、勉強になりますわね……」

    「し、しょうがないですわね……」

    %CALLNAME:人物_小悪魔%は渋々という態度で、胸を一物に押し当てた。

    しかしその動きは丁寧で、少しずつ擦っている。

    「……んっ……こう？　違う？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の反応を窺いながら、試行錯誤している。

    「……早く終わらせてくださいね……」

