- id: fallback
  content: >-
    「……何を見ているの」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の視線に気づき、眉をひそめた。

    %CALLNAME:MASTER%がその胸に手を伸ばすと、

    「っ……大胆ね、下僕の分際で」

    %CALLNAME:人物_レミリア%は小さく息を呑んだが、払いのけはしなかった。

    「……ふん、今日は機嫌がいいから許してあげるわ」

    そう言いながら、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手の動きを見つめていた。

    「……でも、丁寧に扱いなさい」

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を紅い瞳で見つめた。

    「使用人が主の身体に触れるなんて、本来は不敬よ」

    だが%CALLNAME:MASTER%が乳房に触れると、

    「っ……」

    %CALLNAME:人物_レミリア%は小さく声を漏らし、慌てて口を閉じた。

    「……今のは聞かなかったことにしなさい」

    館の主は、動揺を隠そうと必死だった。

    「……ふぅん」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を見た。

    「度胸だけはあるわね」

    %CALLNAME:MASTER%が乳房を揉み始めると、%CALLNAME:人物_レミリア%の表情が少し緩んだ。

    「……まあ、悪くはないわね」

    %CALLNAME:人物_レミリア%はそう呟くと、%CALLNAME:MASTER%の手を受け入れた。

    「……もう少しだけ、続けてもいいわよ」

    高飛車な態度の裏で、何かが芽生え始めていた。

    「……何かしら」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    %CALLNAME:MASTER%がその胸に触れると、

    「……ふん、使用人への褒美として許してあげるわ」

    %CALLNAME:人物_レミリア%はそう言い訳をした。

    %CALLNAME:MASTER%が乳首を撫でると、小さく身を震わせた。

    「っ……あまり調子に乗らないことね」

    500年を生きた吸血鬼は、複雑な表情を浮かべていた。
