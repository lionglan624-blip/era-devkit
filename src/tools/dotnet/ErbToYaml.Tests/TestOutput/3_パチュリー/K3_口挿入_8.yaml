    「……んっ……熱いのね……足にも伝わってくるわ……」

    %CALLNAME:TARGET%は頬を染めながら、ゆっくりと足を上下させ始めた。

    「……あなたを気持ち良くできるなら……この研究も悪くないわ……」

    「……ふ……足の使い方……難しいわね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を観察しながら足を動かしている。

    「……こう……挟むようにすると……反応が良いのね……」

    %CALLNAME:TARGET%は学者らしく分析しながら、足の動きを工夫した。

    「……あなたの喜ぶ顔が見たいから……もう少し頑張るわ……」

    体が弱いながらも、愛する人のために%CALLNAME:TARGET%は足を動かし続けた。

    「……足で……こうして触れていると……」

    %CALLNAME:TARGET%は足指で一物をなぞるように動かしている。

    「……あなたの反応が……直接伝わってくるのね……」

    %CALLNAME:TARGET%は穏やかに微笑みながら言った。

    「……ぴくぴくしているのが分かるわ……嬉しい……」

    足裏で感じる脈動に、%CALLNAME:TARGET%は静かな喜びを覚えていた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は両足で一物を挟み、丁寧に擦り上げている。

    「……私の足で……あなたを満たせるなら……光栄よ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめながら言った。

    「……ふぅ……足を動かすのは疲れるけれど……愛しているから……」

    知識の魔女は、愛する人への奉仕に静かな喜びを感じていた。
