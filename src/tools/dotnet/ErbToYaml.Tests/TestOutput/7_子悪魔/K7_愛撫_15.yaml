character: 子悪魔
situation: K7_愛撫
entries:
- id: fallback
  content: >-
    「あっ……%CALLNAME:MASTER%、それ……あたしの中に入れるやつ……ですよね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したオナホールを見て、頬を染めながらも嬉しそうに微笑んだ。

    「えへへ……あたしの体で、%CALLNAME:MASTER%を気持ちよくできるなら……嬉しいの……」

    妖精が自ら腰を浮かせると、%CALLNAME:MASTER%はオナホールを秘所に宛てがった。

    オナホールが膣内に挿入された瞬間、%CALLNAME:TARGET%の体がびくんと跳ねる。

    「んあっ……！　入って……%CALLNAME:MASTER%のが……来るの、待ってる……！」

    %CALLNAME:TARGET%は期待に頬を染めながら、オナホールの感触に身を震わせていた。

    「んぅ……%CALLNAME:MASTER%、今日もあたしの体……使ってくれるの……？」

    %CALLNAME:TARGET%は期待に満ちた瞳で、オナホールを見つめている。

    「あたしの中で、%CALLNAME:MASTER%が気持ちよくなってくれるの……大好き……」

    オナホールが膣内にゆっくりと挿入されていく。

    道具越しに%CALLNAME:MASTER%の熱が伝わり、%CALLNAME:TARGET%は甘い声を漏らした。

    「ふぁっ……あっ……！　あたしの中……%CALLNAME:MASTER%のためだけに……」

    %CALLNAME:TARGET%は蕩けた表情で、奉仕の喜びに酔いしれていた。

    「えへへ……あたし、こうやって%CALLNAME:MASTER%のお役に立てるの……嬉しいの……」

    %CALLNAME:TARGET%は恥ずかしそうに呟きながら、自分から体を開いた。

    オナホールが妖精の小さな膣口に押し当てられ、ゆっくりと挿入されていく。

    「んっ……あぁっ……入ってくる……あたしの中が……道具になるの……」

    %CALLNAME:TARGET%の体が小刻みに震え、オナホール越しに快楽が伝わってくる。

    「……%CALLNAME:MASTER%……あたしの全部……使って……」

    途切れ途切れの言葉が、妖精の唇から漏れた。

    「あっ……また、あたしを使ってくれるんですか……嬉しいの……」

    %CALLNAME:TARGET%は無邪気に笑いながら、オナホールを受け入れる体勢になった。

    「……んっ、入れて……あたしの中で、気持ちよくなって……」

    オナホールが膣内に挿入され、妖精の体が%CALLNAME:MASTER%のために準備される。

    「ひぁっ……！　やっ……あぁっ……あたしの中……%CALLNAME:MASTER%専用なの……！」

    %CALLNAME:TARGET%は腰を小刻みに揺らしながら、奉仕の喜びを感じている。

    「……%CALLNAME:MASTER%のものだから……いっぱい、使って……」
  priority: 4
- id: talent_3_1
  content: >-
    「え……そ、それ……あたしの中に入れて……使うんですか……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したオナホールを見て、頬を赤く染めた。

    「……あたしの体が……道具みたいになるの……恥ずかしい……」

    オナホールが秘所に押し当てられ、ゆっくりと膣内に沈んでいく。

    「んっ……！　あっ、入ってきて……ひぁっ、これで%CALLNAME:MASTER%が……！」

    %CALLNAME:TARGET%は涙目になりながらも、%CALLNAME:MASTER%のために体を提供している。

    「……こ、こんなの……でも……%CALLNAME:MASTER%が喜ぶなら……」

    「あ、あの……その、道具……また使うんですか……」

    %CALLNAME:TARGET%は緊張した面持ちで、オナホールを見つめている。

    「……あたしの体で……%CALLNAME:MASTER%が気持ちよくなるなら……我慢します……」

    オナホールが膣内に挿入され、妖精の体が道具として準備された。

    「ひゃあっ……！　んっ、やぁっ……あたしの中が……使われて……！」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕を掴み、必死に耐えている。

    「……%CALLNAME:MASTER%の前で……こんな姿……恥ずかしいの……」

    「ま、また……あれ、ですか……」

    %CALLNAME:TARGET%は恥ずかしそうに視線を逸らしながら、スカートを捲り上げた。

    オナホールが秘所に宛てがわれると、妖精は小さく身震いした。

    「んぅ……っ……あぁっ……入ってきて……あたしの中が……道具に……」

    %CALLNAME:MASTER%のために体が使われ、%CALLNAME:TARGET%の体がぴくぴくと反応する。

    「やっ……声、出ちゃう……こうやって使われるの……恥ずかしい……」

    妖精は片手で口を覆いながら、甘い喘ぎを堪えていた。

    「……こういうの、慣れないです……でも……」

    %CALLNAME:TARGET%は覚悟を決めたように目を閉じて、体を%CALLNAME:MASTER%に預けた。

    オナホールが膣内に挿入され、妖精の体が奉仕のために準備される。

    「ふぁっ……んっ……！　あたしの中……%CALLNAME:MASTER%のために……」

    %CALLNAME:TARGET%は涙を浮かべながら、道具として使われる羞恥に耐えている。

    「……%CALLNAME:MASTER%が……こうしたいなら……あたし、受け止めます……」

    健気な言葉とともに、妖精は自分の体を%CALLNAME:MASTER%に捧げた。
