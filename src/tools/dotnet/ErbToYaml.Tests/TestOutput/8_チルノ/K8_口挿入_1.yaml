  content: >-
    「え……これを口で……？」

    %CALLNAME:人物_チルノ%は困惑した表情で%CALLNAME:MASTER%の一物を見つめた。

    「う、うーん……まあ、いいけど……」

    渋々といった様子で、%CALLNAME:人物_チルノ%は一物に舌を伸ばした。

    「……ちろ……うわ、なにこの味……」

    一物を舐めた瞬間、%CALLNAME:人物_チルノ%は顔をしかめた。

    「……ま、まあ……やってあげるけどさ」

    戸惑いながらも、%CALLNAME:人物_チルノ%はゆっくりと舌を動かし始めた。

    「ちょ、ちょっと%CALLNAME:MASTER%……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに%CALLNAME:MASTER%を見た。

    「いきなりこんなこと頼むなんて……信じらんない」

    文句を言いながらも、%CALLNAME:人物_チルノ%は一物を咥えた。

    「んっ……ちゅ……れろ……」

    強がりを言いつつ、ぎこちなく舌を動かし始めた。

    「……これで満足なんでしょ？」

    「んー……よくわかんないけど……」

    %CALLNAME:人物_チルノ%は首を傾げながら%CALLNAME:MASTER%の一物を見つめた。

    「こうやって舐めればいいの？」

    好奇心半分、戸惑い半分といった様子で舌を伸ばした。

    「ちろ……ん……へえ、こういう味なんだ……」

    %CALLNAME:人物_チルノ%は興味深そうに舐め続けている。

    「……まあ、悪くないかも」

    「……はあ」

    %CALLNAME:人物_チルノ%はため息をつきながら、%CALLNAME:MASTER%の前にしゃがんだ。

    「あたいにこんなこと頼むなんて……%CALLNAME:MASTER%って変なの」

    そう言いながらも、%CALLNAME:人物_チルノ%は一物を舐め始めた。

    「ちろ……ちゅ……んっ……」

    仕方なさそうに、%CALLNAME:人物_チルノ%はゆっくりと舌を動かし続けた。

    「……早く終わらせてよね」
