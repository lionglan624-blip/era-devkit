character: レミリア
situation: K5_挿入
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、そっちもするの？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の顔を見つめながら、静かに腰を持ち上げた。

    「いいわ……あなたなら、全部受け入れてあげる」

    %CALLNAME:MASTER%がゆっくりと後ろに挿入すると、%CALLNAME:人物_レミリア%は息を詰めた。

    「っ……あ、ぁ……痛い、けど……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の首に腕を回した。

    「……大丈夫。%CALLNAME:MASTER%となら……っ、我慢できるわ」

    500年の吸血鬼は、恋人の腕の中で痛みに耐えた。

    「んっ……後ろも欲しいの？ 欲張りね……」

    %CALLNAME:人物_レミリア%は艶やかに微笑みながら、%CALLNAME:MASTER%の膝に乗った。

    向かい合う形で、二人の視線が絡み合う。

    「あっ……ぁあ……奥まで……っ」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は声を漏らした。

    「痛……でも、こうして顔を見ながら……繋がれるのは、嬉しいわ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%にしがみつき、快楽と痛みに身を委ねた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の顔を両手で包んだ。

    「あなたの望みなら……私の全部をあげるわ」

    %CALLNAME:MASTER%が後ろからゆっくりと挿入すると、%CALLNAME:人物_レミリア%は眉を寄せた。

    「っ……くぅ……まだ、慣れない、けど……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を強く抱きしめた。

    「……あなたが気持ちいいなら……それでいいの」

    紅魔館の主は、恋人のために痛みを受け入れた。

    「ふふ……今日はそういう気分なのね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の膝に座り、顔を近づけた。

    「いいわよ……あなたの好きにして」

    %CALLNAME:MASTER%が腰を持ち上げ、後ろに挿入した。

    「あぁっ……んっ……深、い……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の肩に顔を埋めた。

    「痛いけど……%CALLNAME:MASTER%と繋がってると……安心する……」

    吸血鬼の誇りも、恋人の前では溶けていった。
  priority: 4
- id: talent_3_1
  content: >-
    「な……っ、後ろって……正気なの……？」

    %CALLNAME:人物_レミリア%は頬を染めながら、%CALLNAME:MASTER%を睨んだ。

    「……わ、分かったわよ。今日だけよ？」

    %CALLNAME:MASTER%が後ろに挿入すると、%CALLNAME:人物_レミリア%は悲鳴を上げた。

    「っ！ 痛……っ、ば、馬鹿……もっとゆっくり……っ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%にしがみついた。

    「……こ、こんなの……あなただから我慢してあげてるのよ……っ」

    強がりながらも、その瞳は潤んでいた。

    「そ、そっちは……っ、まだ慣れてないって言ってるでしょ……」

    %CALLNAME:人物_レミリア%は抗議しながらも、%CALLNAME:MASTER%の膝に座った。

    「……べ、別にあなたのためじゃないんだから」

    %CALLNAME:MASTER%がゆっくりと挿入すると、%CALLNAME:人物_レミリア%は顔を歪めた。

    「っ……あ、あぁ……痛い……っ、やぁ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胸に顔を押し付けた。

    「……顔、見ないで……こんな情けない顔……見せたくないの……」

    高貴な吸血鬼は、想い人の前で弱さを見せていた。

    「……ふん、そこまで欲しいなら、仕方ないわね」

    %CALLNAME:人物_レミリア%は虚勢を張りながら、%CALLNAME:MASTER%の上に跨った。

    向かい合う形で、二人の視線が交わる。

    「っ……くぅ……あ、痛……」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は声を詰まらせた。

    「や……やぁ……奥まで……挿入って……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手を握りしめた。

    「……あ、あなたのせいよ……こんな……っ」

    責めるような言葉の裏で、心は揺れていた。

    「こ、こんな体勢で……恥ずかしいじゃない……」

    %CALLNAME:人物_レミリア%は顔を真っ赤にしながら、%CALLNAME:MASTER%と向き合った。

    「……顔が見えるって……余計に恥ずかしいのよ……」

    %CALLNAME:MASTER%が後ろに挿入すると、%CALLNAME:人物_レミリア%は目を見開いた。

    「っ！ あ、あぁ……っ、痛……い……」

    %CALLNAME:人物_レミリア%は涙目で%CALLNAME:MASTER%を見上げた。

    「……も、もう少し優しく……できないの……？」

    紅魔館の主は、素直になれない想いを抱えていた。
