- id: fallback
  content: >-
    「えっと……これを、握ればいいんですか……？」

    %CALLNAME:人物_小悪魔%は戸惑いながらも、%CALLNAME:MASTER%の一物に手を伸ばした。

    恐る恐る握ると、その熱さと硬さに目を丸くした。

    「わ……熱い……こんなに硬いんですのね……」

    %CALLNAME:人物_小悪魔%はゆっくりと手を動かし、%CALLNAME:MASTER%の反応を観察している。

    「……これで、合ってます……？」

    %CALLNAME:人物_小悪魔%は好奇心に目を輝かせながら、一物を握っている。

    「へぇ……こうすると、%CALLNAME:MASTER%はこういう顔になるんですのね」

    まるで実験でもしているかのように、力加減を変えてみたりしている。

    「あ、こっちの方が気持ちいいですか？　ふむふむ……」

    %CALLNAME:人物_小悪魔%は悪魔らしい探究心で、色々と試している。

    「……勉強になりますわ」

    「し、しょうがないですわね……%CALLNAME:MASTER%がそうしてほしいなら……」

    %CALLNAME:人物_小悪魔%は渋々という体で、一物を握った。

    しかしその手つきは思ったより丁寧で、ゆっくりと上下に動いている。

    「……こ、こうですか？　痛くないですか？」

    %CALLNAME:人物_小悪魔%は心配そうに%CALLNAME:MASTER%の顔を覗き込んだ。

    「……あの、あまりじっと見ないでくださいませ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の一物を見つめ、首を傾げた。

    「不思議ですわね……こんなものがこんなに大きくなるなんて」

    おそるおそる手を伸ばし、表面をなぞるように触れた。

    「ひくっ……動きましたわ……生きてるみたい」

    %CALLNAME:人物_小悪魔%は驚きながらも、興味を持って手を動かし始めた。

    「……悪魔の本で読んだことはありますけど……実物は初めてですわ」
  priority: 2
- id: fallback
  content: >-
    「……これをしろと？　まったく……」

    %CALLNAME:人物_小悪魔%は呆れたような表情で、%CALLNAME:MASTER%の一物を見ている。

    仕方なさそうに手を伸ばし、適当に握った。

    「……早く終わらせてくださいね。私、忙しいんですから」

    %CALLNAME:人物_小悪魔%は事務的に手を動かしている。

    「パチュリー様のお手伝いがありますの」

    %CALLNAME:人物_小悪魔%は無表情で%CALLNAME:MASTER%の一物を握った。

    「……こうすればいいんでしょう」

    手の動きは淡々としており、感情がこもっていない。

    「悪魔に奉仕させるなんて……いい度胸ですわね」

    %CALLNAME:人物_小悪魔%はじとりとした目で%CALLNAME:MASTER%を見上げた。

    「……早く終わらせてくださいませ」

    「はあ……」

    %CALLNAME:人物_小悪魔%はため息をつきながら、%CALLNAME:MASTER%の一物に手を伸ばした。

    握る力は弱く、動きもぎこちない。

    「……こんなことさせて、楽しいんですか？」

    %CALLNAME:人物_小悪魔%は冷めた目で%CALLNAME:MASTER%を見ている。

    「悪魔を舐めないでくださいまし」

    %CALLNAME:人物_小悪魔%は嫌そうな顔をしながらも、言われた通りに手を動かした。

    「……ふん、人間のこういうところは単純ですわね」

    手つきは雑で、明らかにやる気がない。

    「早く満足して、帰ってくださいませんか」

    %CALLNAME:人物_小悪魔%は目を逸らしながら、義務的に奉仕を続けている。

    「……図書館の仕事が溜まってるんですから」
  priority: 1
