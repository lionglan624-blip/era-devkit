character: 大妖精
situation: K9_会話親密
entries:
- id: fallback
  content: >-
    「んっ……%CALLNAME:MASTER%の手、あったかい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に身を預けながら、胸を優しく触れられている。

    小さな胸が%CALLNAME:MASTER%の掌の中で柔らかく形を変える。

    「あ……そこ、敏感なの……知ってるでしょ……？」

    %CALLNAME:TARGET%の羽が幸せそうにぴくぴくと震えている。

    「……%CALLNAME:MASTER%に触られると……安心するんだよ……」

    「ひゃっ……あぁ……%CALLNAME:MASTER%……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の胸の膨らみを優しく包み込んでいる。

    %CALLNAME:TARGET%は甘い吐息を漏らしながら、%CALLNAME:MASTER%の腕にしがみついた。

    「……わたしの胸、小さいけど……%CALLNAME:MASTER%は好き……？」

    不安そうに見上げる瞳は、答えを求めて揺れていた。

    「……嬉しいな……そう言ってくれると……」

    「あっ……んぅ……そんなに優しくされたら……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の胸を丁寧に愛撫している。

    %CALLNAME:TARGET%は恥ずかしそうに頬を染めながら、身を捩った。

    「チルノちゃんには……絶対、見せられないね……こんな顔……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋めた。

    「……でも、%CALLNAME:MASTER%だけには……全部見せてあげるね……」

    「んっ……ふぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%の小さな胸が%CALLNAME:MASTER%の手に包まれている。

    指先が敏感な突起に触れる度に、%CALLNAME:TARGET%の体がびくりと震える。

    「……%CALLNAME:MASTER%の指……わたしの体、覚えちゃったみたい……」

    %CALLNAME:TARGET%は恥ずかしそうに、でも嬉しそうに呟いた。

    「……もっと……触っていいよ……」
