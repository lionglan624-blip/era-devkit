    「や……っ、そこ……だめ……」

    %CALLNAME:人物_美鈴%は弱々しく抗議したが、%CALLNAME:MASTER%の舌は止まらない。

    菊穴を丹念に舐められ、%CALLNAME:人物_美鈴%の腰が無意識に揺れる。

    「あっ……なんで……こんなところで……声が……」

    %CALLNAME:人物_美鈴%は自分の反応に戸惑いを隠せなかった。

    「……%CALLNAME:MASTER%のせいで……変になっちゃう……」

