- id: fallback
  content: >-
    「――ひゃっ!?　な、なによこれ!　あたいのそこに何か被せた!?」

    %CALLNAME:TARGET%は突然の感触に驚いた。

    クリキャップが振動を始めると、%CALLNAME:TARGET%の体がビクンと跳ねる。

    「んんっ!?　ちょ、ちょっと待って……っ、そ、そこだけ震えてるの!?」

    直接的な刺激に目を丸くしながらも、恋人の手を払いのけはしない。

    「……%CALLNAME:MASTER%、これ……やばい……あたい、すぐ変になっちゃう……」

    「――あ、またあのやつ?　あそこに付けるやつでしょ?」

    %CALLNAME:TARGET%は記憶があるようで、恥ずかしそうに脚を閉じた。

    「ちょ、ちょっと待ってよ……心の準備が……ひゃぁっ!?」

    待たずに装着されたクリキャップが震え始める。

    「もうっ……%CALLNAME:MASTER%のいじわる……っ、で、でも……」

    %CALLNAME:TARGET%は恋人の腕にしがみつき、快感に身を委ねた。

    「――ねぇ%CALLNAME:MASTER%、今日もあれ使う?　あたい……」

    %CALLNAME:TARGET%は期待と恥じらいの入り混じった表情を浮かべた。

    クリキャップが敏感な場所を包み込み、振動が始まる。

    「っ……!　やっぱり……これ、すごい……っ」

    「%CALLNAME:MASTER%に弱いところ責められると……最強のあたいも……っ」

    %CALLNAME:TARGET%は照れながらも幸せそうに震えていた。

    「――ひぁっ!?　い、いきなり強いって!」

    振動の強さに%CALLNAME:TARGET%は声を上げた。

    「そ、そこ……一番敏感なんだから……っ、んっ……っ!」

    直接的な刺激に抗う術もなく、体が震える。

    「でも……%CALLNAME:MASTER%となら……こういうのも……いい、かも……」

    恋人の前でだけ見せる、%CALLNAME:TARGET%の甘えた表情だった。
  priority: 4
- id: talent_3_1
  content: >-
    「――えっ!?　な、なにそれ!?　あたいのそこに……っ!?」

    %CALLNAME:TARGET%はクリキャップを見て目を見開いた。

    振動が始まると、最も敏感な場所を直接刺激される。

    「ひぁっ!?　や、やだ……っ、そこ、そこはダメ……っ!」

    「%CALLNAME:MASTER%に……こんなところ……見られてる……」

    普段の威勢はどこへやら、%CALLNAME:TARGET%は顔を真っ赤にして震えた。

    「――ちょ、ちょっと待って!　なんであたいの……そこに……!」

    %CALLNAME:TARGET%は慌てて脚を閉じようとしたが、間に合わない。

    「んんっ……!?　う、うそ……こんな小さいのに……すごい……っ」

    直接的な振動が容赦なく快感を与える。

    「%CALLNAME:MASTER%……見ないでよ……あたい、変な顔してる……」

    好きな人に弱い姿を見られて、%CALLNAME:TARGET%は目を潤ませた。

    「――や、やめ……そこはダメだって……っ!」

    %CALLNAME:TARGET%の抗議は、しかし振動に遮られる。

    「ひゃんっ……!　んっ……そこだけ……ズルいよ……っ」

    クリキャップが執拗に敏感な場所を攻め続ける。

    「あたいは最強なのに……こんなので……%CALLNAME:MASTER%のせい……っ」

    そう言いながらも、%CALLNAME:TARGET%は完全には拒絶しなかった。

    「――また、あれ使うの……?　あたいの……そこに……」

    %CALLNAME:TARGET%は覚えているらしく、恥ずかしそうに俯いた。

    装着された瞬間、甘い声が漏れる。

    「っ……やっぱり……これ、直接すぎて……っ」

    「%CALLNAME:MASTER%に……こんな姿……恥ずかしい……っ」

    好きな人の前で乱れてしまう自分が、%CALLNAME:TARGET%には耐え難かった。
