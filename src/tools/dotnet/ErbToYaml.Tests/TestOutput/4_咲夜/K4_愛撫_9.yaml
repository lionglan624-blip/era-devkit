- id: fallback
  content: >-
    「……何をなさっているのですか」

    %CALLNAME:TARGET%は冷ややかな目で%CALLNAME:MASTER%を見つめた。

    %CALLNAME:MASTER%の行為に、%CALLNAME:TARGET%は眉を顰めている。

    「……そのような行為は、看過できませんわ」

    「紅魔館のメイドに対する侮辱と受け取りますわよ」

    %CALLNAME:TARGET%は静かに、しかし明確に拒絶の意思を示した。

    「……次はありませんわ。覚えておいてくださいまし」

    瀟洒なメイドの視線は、氷のように冷たかった。

    「……%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を払いのけた。

    「お嬢様のお客様であっても、限度がありますわ」

    %CALLNAME:TARGET%は一歩後退し、距離を取った。

    「……私に触れることは、許可しておりませんわ」

    「お嬢様に報告されたくなければ……今すぐお止めになって」

    %CALLNAME:TARGET%は毅然とした態度で告げた。

    瀟洒なメイドの顔に、感情の欠片も見えなかった。

    「……失礼いたします」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%から身を引いた。

    「そのような行為に応じる義務は、私にはございませんわ」

    %CALLNAME:TARGET%は無表情に%CALLNAME:MASTER%を見つめている。

    「……私は紅魔館のメイド。お嬢様にお仕えする身ですの」

    「%CALLNAME:MASTER%のおもちゃではありませんわ」

    %CALLNAME:TARGET%は冷たく言い放った。

    その瞳には、一切の妥協が見られなかった。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%を見据えた。

    「……メイドの仕事に戻らせていただきますわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の行為を無視し、立ち上がろうとした。

    「お嬢様がお呼びですの。失礼いたしますわ」

    %CALLNAME:TARGET%は慇懃無礼に一礼した。

    「……今の行為は、忘れて差し上げますわ」

    瀟洒なメイドは、感情を見せることなくその場を去ろうとした。
  priority: 1
