entries:
- id: fallback
  content: >-
    「え、パイズリ……？　あたいの胸で……？」

    %CALLNAME:人物_チルノ%は驚いた表情を浮かべたが、すぐに自信を取り戻した。

    「ふ、ふふん！　最強のあたいにできないことなんてないわ！」

    %CALLNAME:人物_チルノ%は威勢よく言うと、小さな胸を%CALLNAME:MASTER%の一物に押し当てた。

    ひんやりとした肌が熱い肉棒に触れ、独特の感覚が伝わってくる。

    「んっ……こ、こうすればいいんでしょ？」

    %CALLNAME:人物_チルノ%は必死に胸を押し付けて挟もうとするが、なかなか上手くいかない。

    「う、うー……あたいの胸、ちょっと小さいかも……でも頑張るから！」

    「えへへ……%CALLNAME:MASTER%、あたいの胸がいいの？」

    %CALLNAME:人物_チルノ%は嬉しそうに笑いながら、%CALLNAME:MASTER%の一物に胸を寄せた。

    「まあ、大きくはないけどさ……%CALLNAME:MASTER%が喜ぶなら頑張るわ」

    %CALLNAME:人物_チルノ%は一生懸命に胸を動かそうとしている。

    冷たい肌が熱い肉棒に触れ、その温度差が心地よい刺激となる。

    「ん……こうやって動かすの……？　ねえ、気持ちいい……？」

    %CALLNAME:人物_チルノ%は不安げに%CALLNAME:MASTER%の顔を覗き込んだ。

    「ほら、あたいに任せなさい！」

    %CALLNAME:人物_チルノ%は張り切って%CALLNAME:MASTER%の前に座った。

    「……って、あれ？　挟めない……」

    %CALLNAME:人物_チルノ%は自分の胸を見て困った顔をした。

    「う、うるさいわね！　こうすれば……」

    %CALLNAME:人物_チルノ%は両手で胸を寄せながら一物を挟もうとしている。

    冷たい手のひらと胸が一物を包み込み、ゆっくりと上下に動く。

    「ど、どう？　これなら気持ちいいでしょ？」

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は珍しくおとなしく、%CALLNAME:MASTER%の一物に胸を押し当てた。

    「……あたいの胸、小さいけど……それでもいいの……？」

    %CALLNAME:人物_チルノ%は不安そうに聞きながら、ゆっくりと体を動かした。

    冷たい胸が熱い肉棒をそっと包み込む。

    「……%CALLNAME:MASTER%のためなら、なんでも頑張るからね……」

    いつもの威勢のいい態度はなりを潜め、愛情を込めて奉仕している。
