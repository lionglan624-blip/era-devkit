    「……もっと触ってあげる……全部、私のものだから……」

    武術で鍛えた指先が、絶妙な力加減で愛撫を続けた。

    「……%CALLNAME:MASTER%……私に触らせてくれるの、嬉しい……」

    %CALLNAME:人物_美鈴%は頬を染めながら、%CALLNAME:MASTER%の秘部に指を這わせた。

    「……こんなところまで……私だけに見せてくれるのね……」

    円を描くように、ゆっくりと愛撫を続ける。

    「……%CALLNAME:MASTER%の体、全部知りたいわ……」

    %CALLNAME:人物_美鈴%は指の動きを速め、反応を引き出そうとした。

    「……愛してる……だから、もっと気持ちよくしてあげる……」

    「……ね、こうすると……どう？」

    %CALLNAME:人物_美鈴%は恋人の体を丁寧に愛撫していた。

    武術家の手は力強いはずなのに、今は驚くほど優しい。

    「……%CALLNAME:MASTER%がくれた信頼……無駄にしないわ……」

    %CALLNAME:人物_美鈴%は窄まりの周りを撫でながら、表情を確認する。

    「……ん……もっと奥まで……？　いいわよ……」

    愛する人のために、%CALLNAME:人物_美鈴%は指先に神経を集中させた。
