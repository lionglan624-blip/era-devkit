- id: fallback
  content: >-
    「……っ！ 何をしているの、お前……」

    %CALLNAME:TARGET%は驚いた表情を見せたが、手を払いのけはしなかった。

    %CALLNAME:MASTER%の手が、%CALLNAME:TARGET%の尻を撫でている。

    「私のお尻を撫でるなんて、身の程知らずね……」

    %CALLNAME:TARGET%は紅い瞳で睨みながらも、どこか拒絶しきれない様子だった。

    「……特別に許してあげるわ。感謝しなさい」

    「やめなさい……何のつもり？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を睨んだが、身体は逃げていない。

    %CALLNAME:MASTER%は構わず、その小さな臀部を撫で続けている。

    「……使用人のくせに、主に触れるなんて」

    %CALLNAME:TARGET%は威厳を保とうとしているが、頬がわずかに赤い。

    「……今回だけよ。二度目はないと思いなさい」

    「……っ、お前……」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の尻に触れている。

    %CALLNAME:TARGET%は眉をひそめたが、特に抵抗はしなかった。

    「……紅魔館の主に、そんな大胆なことを」

    %CALLNAME:TARGET%は腕を組み、傲然と%CALLNAME:MASTER%を見下ろした。

    「……まあ、悪くないわ。続けても構わなくてよ」

    「んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に尻を撫でられ、かすかに身を震わせた。

    だが、吸血鬼の矜持が彼女を逃げさせなかった。

    「……触り心地はどうかしら？」

    %CALLNAME:TARGET%は強がるように、紅い瞳で%CALLNAME:MASTER%を見つめた。

    「……ふん、光栄に思いなさい」
