    %CALLNAME:TARGET%は顔を真っ赤にしながら抗議した。

    しかし、震える指は%CALLNAME:MASTER%の窄まりを撫でている。

    「……本では……こういうこともあると読んだけれど……」

    %CALLNAME:TARGET%は恥ずかしさに俯いた。

    「……実際にするなんて……こんなに恥ずかしいなんて……」

    「……やっ……へ、変な感じ……」

