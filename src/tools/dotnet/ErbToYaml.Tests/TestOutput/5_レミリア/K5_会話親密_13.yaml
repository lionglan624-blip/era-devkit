character: レミリア
situation: K5_会話親密
entries:
- id: fallback
  content: >-
    「んっ……あ、ぁ……そこ、いいわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手に身を委ねている。

    500年を生きた吸血鬼の肌は、月光のように白く艶めいていた。

    「……ふふ、永遠を感じなさい。私の体は貴方だけのものよ。」

    %CALLNAME:TARGET%は蕩けた瞳で%CALLNAME:MASTER%を見つめた。

    「……もっと触って。貴方には全てを許しているのだから。」

    「はぁ……ん、あぁ……貴方の手、温かいわね……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の胸を優しく揉みしだいている。

    紅い瞳が潤み、500年の威厳などどこかへ消えていた。

    「……ククク、私をここまで乱すのは貴方だけよ。」

    %CALLNAME:TARGET%は甘い吐息を漏らしながら、%CALLNAME:MASTER%の手を自らの胸に押し当てた。

    「……永遠に私のものでいなさい。逃がさないわよ？」

    「あっ……んむ、ぅ……そこ、弱いの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸への愛撫に身悶えしている。

    紅魔館の主としてのカリスマは、悦びに溶けて消えていた。

    「……はぁ、ぁ……私をこんなにしてしまうなんて……」

    %CALLNAME:TARGET%は恥じらいながらも、%CALLNAME:MASTER%に体を預けた。

    「貴方は……私の運命そのものね……」

    「んぁ……あ、ああっ……貴方、上手くなったわね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の愛撫に蕩けた声を上げている。

    500年の孤独が、%CALLNAME:MASTER%の手によって溶かされていく。

    「……ふふ、私がこんな声を出すなんて……」

    %CALLNAME:TARGET%は頬を紅く染め、妖艶に微笑んだ。

    「……もっと私を知りなさい。永遠の時間があるのだから。」

    紅魔館の主は、独占欲をにじませて%CALLNAME:MASTER%を抱き寄せた。
  priority: 4
- id: talent_3_1
  content: >-
    「んっ……そ、そこは……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に胸を触れられて身を竦めた。

    威厳を保とうとしているが、頬がほのかに紅く染まっている。

    「……悪くないわ。認めてあげる。」

    %CALLNAME:TARGET%は強がりながらも、%CALLNAME:MASTER%の手を払いのけなかった。

    「あ……んっ……ちょっと、そんなに触らないで……」

    %CALLNAME:TARGET%は顔を背けながらも、体は%CALLNAME:MASTER%に預けている。

    「……人間のくせに、私を惑わせようというの？」

    %CALLNAME:TARGET%は不満げに言いながらも、声が少し甘くなっていた。

    「……まあ、今日だけは許してあげるわ。」

    「ひゃっ……んっ……そこ、敏感なの……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の胸を優しく揉んでいる。

    紅い瞳がわずかに潤み、500年の吸血鬼の威厳が揺らいでいた。

    「……ふん、少しは私を悦ばせる術を心得ているようね。」

    %CALLNAME:TARGET%は高飛車な言葉とは裏腹に、熱い吐息を漏らしている。

    「あっ……や、やめ……いえ、続けなさい……」

    %CALLNAME:TARGET%は自分でも驚いたように口を押さえた。

    「……私としたことが、取り乱してしまったわね。」

    %CALLNAME:TARGET%は頬を染めながら、視線を逸らした。

    「……貴方、なかなか私を惑わせるのが上手いわ。」

    紅魔館の主は、認めるように小さく呟いた。
  priority: 3
  condition:
    type: Talent
