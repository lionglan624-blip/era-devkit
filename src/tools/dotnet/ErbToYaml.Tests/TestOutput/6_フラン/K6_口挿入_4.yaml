character: フラン
situation: K6_口挿入
entries:
- id: fallback
  content: >-
    「ねえ、%CALLNAME:MASTER%……足で、してあげてもいい……？」

    %CALLNAME:人物_フラン%は恋人の前に座り、おずおずと足を伸ばした。

    白い足裏が一物に触れた瞬間、その熱さに紅い瞳が丸くなる。

    「わ……すっごく熱い……私の足、冷たくない……？」

    %CALLNAME:人物_フラン%は両足でそっと挟み込み、ゆっくりと上下に動かし始めた。

    「壊さないように……でも、気持ちよくなってほしいの……」

    495年間何も壊さずにいられなかった少女は、繊細な足の動きで恋人を悦ばせようとしていた。

    「%CALLNAME:MASTER%のここ……私の足で包んであげる……」

    %CALLNAME:人物_フラン%は嬉しそうに微笑みながら、柔らかな足裏で一物を挟んだ。

    小さな足指が器用に動き、茎を優しく撫でる。

    「ふふ……こうして見下ろしてると、変な気分になるのさ……」

    %CALLNAME:人物_フラン%は照れくさそうに視線を逸らしながら、足を動かし続けた。

    「ねえ……気持ちいい……？　……よかった……もっとするね……」

    恋人の快感が、そのまま自分の幸せになっていた。

    「こうして%CALLNAME:MASTER%を足で触ってると……繋がってる気がするの……」

    %CALLNAME:人物_フラン%は恋人の傍らに座り、足裏で一物を愛撫していた。

    地下室の孤独を知る少女にとって、触れ合いは何よりの証。

    「んふふ……%CALLNAME:MASTER%、ぴくぴくしてる……足でもわかるのさ」

    %CALLNAME:人物_フラン%は嬉しそうに足指で先端をつつき、反応を楽しんだ。

    「もっと……もっと気持ちよくしてあげたいな……」

    その言葉には、純粋な愛情が込められていた。

    「%CALLNAME:MASTER%……大好き……足でも、伝わるかな……」

    %CALLNAME:人物_フラン%は恋人を見つめながら、両足で一物を挟み込んでいた。

    紅い瞳は%CALLNAME:MASTER%だけを映し、足裏は優しく動き続ける。

    「私の足……%CALLNAME:MASTER%のために使って……」

    %CALLNAME:人物_フラン%は時折足指で鈴口を撫で、恋人の反応を確かめる。

    「ねえ……出そうになったら教えて？　ちゃんと受け止めてあげるから……」

    悪魔の妹は、恋人への奉仕に心から満たされていた。
  priority: 4
- id: talent_3_1
  content: >-
    「えっ……あ、足で触るの……？」

    %CALLNAME:人物_フラン%は興味と戸惑いの混じった表情で、足を伸ばした。

    おそるおそる足裏で触れると、その硬さと熱さに驚く。

    「わ……生き物みたい……ぴくぴくしてる……」

    %CALLNAME:人物_フラン%はそっと両足で挟み、上下に動かし始めた。

    「こ、こうすればいいの？　……変な遊びなのさ……」

    初めての経験に、%CALLNAME:人物_フラン%の頬は真っ赤に染まっていた。

    「ふぅん……%CALLNAME:MASTER%、私が足で踏むと、こんな顔するんだ……」

    %CALLNAME:人物_フラン%は面白そうに、足の動きを変えてみる。

    足裏で擦ったり、足指で先端をつついたり、その反応を楽しんでいる。

    「ふふ……なんだか、%CALLNAME:MASTER%を支配してる気分なのさ」

    %CALLNAME:人物_フラン%はいたずらっぽく笑いながら、足で軽く踏みつけた。

    「ねえ……もっと気持ちいい顔、見せてよ……」

    その言葉には、芽生え始めた嗜虐心が滲んでいた。

    「%CALLNAME:MASTER%のここ……私だけが踏んでいいんだよね……？」

    %CALLNAME:人物_フラン%は確認するように問いかけながら、足を動かしていた。

    他の誰かに踏ませることを想像し、表情が少しだけ曇る。

    「……私以外の誰かにさせたら、許さないからね……」

    %CALLNAME:人物_フラン%は少し強めに踏みつけ、独占を主張した。

    「ふふ……冗談だよ……半分だけ……」

    その冗談は、冗談になりきれていなかった。

    「あ……%CALLNAME:MASTER%、ぴくって動いた……」

    %CALLNAME:人物_フラン%は足の下の反応に興味津々の様子だった。

    まるで新しい玩具を見つけた子供のように、目を輝かせている。

    「もっと踏んであげようか？　私、上手になりたいのさ」

    %CALLNAME:人物_フラン%は真剣な表情で、%CALLNAME:MASTER%を喜ばせようと努力していた。

    「ね……気持ちいい？　……うん、もっと頑張るね……」

    恋慕の少女は、愛しい人への奉仕に夢中だった。
