- id: fallback
  content: >-
    %CALLNAME:人物_フラン%は明後日の方向を向きながら、%CALLNAME:MASTER%と話をしている。

    「――へえ、それで？」

    %CALLNAME:人物_フラン%は表情を変えずにそう言った。

    「……もうちょっと面白い話はないのかな」

    つまらなさそうに、%CALLNAME:人物_フラン%はそう呟いた。

    「退屈だと、壊したくなっちゃうんだよね。気をつけて？」

    「――ふぅん、それだけ？」

    %CALLNAME:人物_フラン%はぶっきらぼうにそう言った。

    しかし紅い瞳は、どこか寂しげに揺れている。

    「……私、495年もずっと地下にいたんだよ？」

    「話し相手なんていなかったのさ。だから、話し方がよくわからないの」

    「――あの、聞いてるの？」

    ぼーっとしていた%CALLNAME:MASTER%に%CALLNAME:人物_フラン%が聞いてくる。

    「……聞いてなかったんだ。まぁ、いいけど」

    %CALLNAME:人物_フラン%はあきれたように言ったが、

    その瞳には、どこか傷ついたような色が浮かんでいた。

    「……やっぱり、私の話なんてつまらないのかな」

    「――ねぇ、%CALLNAME:MASTER%」

    %CALLNAME:人物_フラン%が声をかけてくる。

    なんだ、と応じると、

    「……いや、なんでもない」

    と、%CALLNAME:人物_フラン%は話すのをやめてしまった。

    何か言いたそうだったが、紅い瞳はすぐに伏せられた。
