character: 魔理沙
situation: K10_会話親密
entries:
- id: fallback
  content: >-
    「……なあ、%CALLNAME:MASTER%。手、繋いでもいいか？」

    %CALLNAME:TARGET%がそう言って、少し恥ずかしそうに手を差し出してきた。

    %CALLNAME:MASTER%がその手をしっかりと握ると、%CALLNAME:TARGET%は嬉しそうに指を絡めてきた。

    「へへ……%CALLNAME:MASTER%の手、やっぱりあったかいな」

    金髪の魔法使いは、照れくさそうに笑いながら、%CALLNAME:MASTER%の手を両手で包んだ。

    「こうしてると、なんか安心するんだ。……私の特等席だぜ」

    %CALLNAME:TARGET%は幸せそうに%CALLNAME:MASTER%の肩にもたれかかった。

    「……なあ、髪、撫でてくれないか？」

    %CALLNAME:TARGET%が珍しく甘えた声でお願いしてきた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の金髪を優しく梳くように撫でた。

    「ん……へへ、気持ちいいぜ。%CALLNAME:MASTER%、上手いな」

    %CALLNAME:TARGET%は猫のように目を細めて、%CALLNAME:MASTER%の手に頭を預けている。

    「……こんなの、霊夢には絶対見せられないな。内緒だぞ？」

    普通の魔法使いは、満足げに微笑みながら%CALLNAME:MASTER%に身を寄せた。

    「……なあ、ぎゅってしてくれよ」

    %CALLNAME:TARGET%がそう言って、%CALLNAME:MASTER%の服の裾をつまんだ。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%を後ろから優しく抱きしめた。

    「……ん、あったかい。落ち着くぜ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕に自分の手を重ね、そっと握りしめた。

    「私さ、魔法使いになるって決めた時、こんな幸せがあるなんて思わなかったんだ」

    「でも今は%CALLNAME:MASTER%がいて……へへ、最高だぜ」

    普通の魔法使いは、%CALLNAME:MASTER%の腕の中で静かに目を閉じた。

    「……%CALLNAME:MASTER%、ちょっとじっとしててくれ」

    %CALLNAME:TARGET%がそう言って、%CALLNAME:MASTER%の頬に手を添えた。

    金色の瞳がじっと%CALLNAME:MASTER%を見つめ、そして――

    %CALLNAME:TARGET%は自分から%CALLNAME:MASTER%の額にそっとキスをした。

    「……へへ、たまには私からもこういうのしたくなるんだ」

    %CALLNAME:TARGET%は顔を真っ赤にしながらも、嬉しそうに笑っている。

    「%CALLNAME:MASTER%のこと、大好きだからな。……ずっと一緒にいてくれよな」

    普通の魔法使いは、照れ隠しのように帽子を深く被った。
  priority: 4
- id: talent_3_1
  content: >-
    「……手？　ま、まあいいけどな」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の手をそっと取った。

    %CALLNAME:TARGET%は一瞬戸惑った表情を浮かべたが、手を振り払わなかった。

    「……あったかいな、%CALLNAME:MASTER%の手」

    %CALLNAME:TARGET%の頬がほんのりと赤く染まっている。

    「……べ、別に嫌じゃないんだぜ？　勘違いするなよ」

    そう言いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の手を握り返してきた。

    「おい、何するんだよ……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の金髪に触れた。

    %CALLNAME:TARGET%は驚いた表情を見せたが、されるがままになっている。

    「……ん、まあ、悪くはないな」

    目を閉じて%CALLNAME:MASTER%に身を任せる%CALLNAME:TARGET%。

    その表情は、どこか気持ちよさそうだった。

    「……もうちょっとだけ、いいぜ」

    「……近いぞ、%CALLNAME:MASTER%」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の肩に手を置いた。

    %CALLNAME:TARGET%は一瞬身を強張らせたが、すぐに力を抜いた。

    「……触りたいのか？　しょうがないな、許可してやるよ」

    %CALLNAME:TARGET%は照れくさそうにそっぽを向いた。

    「……%CALLNAME:MASTER%といると、なんか……落ち着くんだよな」

    その耳は、ほんのり赤く染まっていた。

    「……なあ、%CALLNAME:MASTER%」

    %CALLNAME:TARGET%が珍しく自分から近づいてきた。

    「その……ちょっとだけ、触ってもいいか？」

    %CALLNAME:MASTER%が頷くと、%CALLNAME:TARGET%はおずおずと%CALLNAME:MASTER%の腕に触れた。

    「……へへ、なんか恥ずかしいな」

    %CALLNAME:TARGET%は顔を赤くしながらも、%CALLNAME:MASTER%の腕をそっと撫でている。

    「……今日だけだからな。勘違いするなよ？」
  priority: 3
