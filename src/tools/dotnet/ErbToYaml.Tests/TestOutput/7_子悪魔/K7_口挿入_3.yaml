    %CALLNAME:TARGET%は困惑と戸惑いの表情を浮かべている。

    「あたし、お掃除とかお茶汲みの方が得意なんですけど……」

    渋々と%CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨った。

    「……えっと……むにゅ……こう……？」

    不慣れな動きで、%CALLNAME:TARGET%は太ももで%CALLNAME:MASTER%のものを挟み始めた。

    「……咲夜さんに見つかったら、怒られちゃいます……」
