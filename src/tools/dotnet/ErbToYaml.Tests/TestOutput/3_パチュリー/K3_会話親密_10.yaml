    %CALLNAME:人物_パチュリー%は目を見開き、本で胸を隠した。

    「な、何をするの……いきなり……」

    %CALLNAME:人物_パチュリー%は顔を赤くしながら、%CALLNAME:MASTER%を睨んだ。

    「……そういうことは……もっと段階を踏んでからにしなさい……」

    %CALLNAME:人物_パチュリー%は小声で言った。

    %CALLNAME:MASTER%の手が%CALLNAME:人物_パチュリー%の胸に触れた。

    「ひゃっ……！」

    %CALLNAME:人物_パチュリー%は驚いて身を引いた。

    「い、いきなり何をするの……」

    %CALLNAME:人物_パチュリー%は本で顔を隠しながら言った。

    「……私の体を触るなんて……心の準備というものが……」

    %CALLNAME:人物_パチュリー%の耳が真っ赤に染まっている。

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の胸に手を伸ばした。

    「ちょっ……」

    %CALLNAME:人物_パチュリー%は慌てて腕で胸を庇った。

    「胸に触るなんて……何を考えているの……」

    %CALLNAME:人物_パチュリー%は警戒しながらも、完全には拒絶しなかった。

    「……まず、私と親しくなってからにしなさい」

    %CALLNAME:人物_パチュリー%は顔を背けながら言った。

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%に手を伸ばした。

    「……何をするつもり？」

    %CALLNAME:人物_パチュリー%は怪訝そうな顔で%CALLNAME:MASTER%を見た。

    %CALLNAME:MASTER%の手が胸に触れると、%CALLNAME:人物_パチュリー%は小さく声を上げた。

    「っ……！　そういうことなの……」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%から距離を取った。

    「……驚かせないで。私は、そういうのに慣れていないのよ……」
