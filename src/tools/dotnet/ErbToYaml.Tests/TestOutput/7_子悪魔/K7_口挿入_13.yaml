- id: fallback
  content: >-
    「……後ろから……ですか……」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%の背後に立った。

    「……分かりました……」

    機械的に腰を動かしながら、%CALLNAME:TARGET%は視線を逸らしている。

    「……んっ……こう……ですか……」

    言われた通りに動いているだけで、感情は見えない。

    「……早く終わってほしいな……」

    「ひっ……後ろから……あたしが……するの……？」

    %CALLNAME:TARGET%は怯えた表情で%CALLNAME:MASTER%を見つめた。

    「あの……他のことの方が……」

    %CALLNAME:TARGET%は逃げ出したそうな顔をしているが、従わざるを得ない。

    「……う……やります……」

    嫌々ながら%CALLNAME:TARGET%は%CALLNAME:MASTER%の後ろで腰を動かし始めた。

    「……こういうの、苦手なんです……ごめんなさい……」

    「……%CALLNAME:MASTER%……なんでこんなこと……」

    %CALLNAME:TARGET%は困惑と戸惑いの表情を浮かべている。

    「あたし、お掃除とかお茶汲みの方が得意なんですけど……」

    渋々と%CALLNAME:TARGET%は%CALLNAME:MASTER%の後ろに立った。

    「……んっ……はぁ……こう……？」

    不慣れな動きで、%CALLNAME:TARGET%は%CALLNAME:MASTER%の後ろで腰を振り始めた。

    「……咲夜さんに見つかったら、怒られちゃいます……」

    「……後ろからなんて……あたしには……」

    %CALLNAME:TARGET%は俯いたまま%CALLNAME:MASTER%の背後に立った。

    「……でも、言われたことはやらないと……」

    %CALLNAME:TARGET%は諦めたように腰を動かし始めた。

    「……んっ……あっ……」

    声を殺しながら、%CALLNAME:TARGET%は機械的に腰を振っている。

    「……早く終わりますように……」
