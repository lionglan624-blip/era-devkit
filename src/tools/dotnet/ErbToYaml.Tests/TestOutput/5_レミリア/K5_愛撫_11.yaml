character: レミリア
situation: K5_愛撫
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%の胸、いただくわ」

    %CALLNAME:人物_レミリア%は優雅に微笑むと、%CALLNAME:MASTER%の胸元に顔を寄せた。

    吸血鬼の冷たい唇が乳首に触れ、そっと吸い上げる。

    「んっ……ちゅっ……%CALLNAME:MASTER%の味、好きよ……」

    紅い瞳を細めながら、%CALLNAME:人物_レミリア%は愛おしそうに乳首を舐めた。

    「……血じゃなくても、%CALLNAME:MASTER%のものなら……」

    紅魔館の主は、恋人の体を味わうことに夢中だった。

    「%CALLNAME:MASTER%……少し、甘えさせて」

    %CALLNAME:人物_レミリア%は珍しく素直な声で言うと、%CALLNAME:MASTER%の胸に顔を埋めた。

    小さな唇が乳首を含み、ちゅぷちゅぷと甘い音を立てる。

    「んむ……ちゅっ……あなたの匂い、落ち着くわ……」

    %CALLNAME:人物_レミリア%は目を閉じて、%CALLNAME:MASTER%の温もりを感じていた。

    「……こうしていると、私もただの女の子みたい……」

    500年を生きた吸血鬼が、恋人の前でだけ見せる甘い姿だった。

    「……%CALLNAME:MASTER%、じっとしていなさい」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を押し倒すと、胸元に口づけた。

    「今夜は私が……あなたを味わいたい気分なの」

    鋭い犬歯が乳首をくすぐり、舌先で転がすように舐める。

    「んっ……ちゅるっ……%CALLNAME:MASTER%、感じてる？」

    %CALLNAME:人物_レミリア%は上目遣いで%CALLNAME:MASTER%を見つめた。

    「……もっと声を聞かせて。私だけの特権よ」

    「ふぅ……%CALLNAME:MASTER%の胸、柔らかいわね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胸をそっと揉みながら、乳首に舌を這わせた。

    「……血を吸うより、こっちの方が好きかも」

    吸血鬼の冷たい舌が乳首を転がし、甘く吸い上げる。

    「んっ……ちゅぅ……%CALLNAME:MASTER%、おいしい……」

    %CALLNAME:人物_レミリア%は恍惚とした表情で乳首を舐め続けた。

    「……%CALLNAME:MASTER%がいると、私は幸せよ……」
