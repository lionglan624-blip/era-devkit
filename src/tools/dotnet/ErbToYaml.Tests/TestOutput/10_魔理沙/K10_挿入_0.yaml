    「はぁ……っ、顔、近いぜ……」

    %CALLNAME:人物_魔理沙%は照れくさそうに目を逸らした。

    「そんなに見つめるなよ……変な顔してるだろ、私……」

    %CALLNAME:MASTER%が優しく腰を動かすと、%CALLNAME:人物_魔理沙%は小さく喘いだ。

    「あっ……んっ……お前といると、素直になっちまうな……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに、恋人の胸に顔を埋めた。

    「……%CALLNAME:MASTER%、私のこと、ちゃんと見てるか？」

    %CALLNAME:人物_魔理沙%は真剣な目で恋人を見つめた。

    「こうして繋がってる時くらい……私だけを見てろよな」

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_魔理沙%は嬉しそうに笑った。

    「んっ……あっ……そうだ、そのままでいいぜ……」

    「私も……お前のこと、ずっと見てるから……」

    %CALLNAME:人物_魔理沙%は恋人と視線を合わせながら、快感に身を委ねた。
