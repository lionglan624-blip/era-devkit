- id: fallback
  content: >-
    「――あれ？　お茶……淹れてくれたんですか？」

    %CALLNAME:TARGET%は少し戸惑いながらも、湯飲みを受け取った。

    「いただきます……」

    そう言って、おずおずとお茶を口に含む。

    「……うん、美味しいです。ありがとうございます」

    %CALLNAME:TARGET%はぺこりと頭を下げた。

    「え、あたしに？　……ありがとうございます」

    %CALLNAME:TARGET%は少し遠慮がちに湯飲みを手に取った。

    ずず、とお茶を啜る音が響く。

    「……あったかい。お仕事中だと、こういうの嬉しいです」

    %CALLNAME:TARGET%は控えめに微笑んだ。

    「あっ……お茶、ですか……？」

    %CALLNAME:TARGET%はきょとんとした表情で湯飲みを見つめている。

    「わざわざ淹れてくれたんですか……？　あたしなんかに……」

    不思議そうにしながらも、%CALLNAME:TARGET%はお茶を受け取った。

    こくり、と一口飲む。

    「……あ、おいしい……あったかいです」

    %CALLNAME:TARGET%は少しだけ表情を緩めた。

    「――ん？　お茶……？」

    %CALLNAME:TARGET%は差し出された湯飲みを、不思議そうに見つめている。

    「えっと……いただきます」

    両手で湯飲みを持ち、おずおずとお茶を啜る。

    「……ふぅ。美味しいです……」

    %CALLNAME:TARGET%はほっと息を吐いた。

    「%CALLNAME:MASTER%って……優しいんですね」

    小さな声で呟きながら、%CALLNAME:TARGET%はお茶を飲み続けた。
  priority: 2
- id: fallback
  content: >-
    「――ん？　……お茶ですか」

    %CALLNAME:TARGET%はきょとんとした顔で湯飲みを受け取った。

    「……いただきます」

    そう言って、様子を窺うようにお茶を啜る。

    「……普通においしいです。ありがとうございます」

    %CALLNAME:TARGET%はぺこりと頭を下げたが、どこかよそよそしい。

    「あ、どうも……」

    %CALLNAME:TARGET%は湯飲みを受け取り、ゆっくりとお茶を飲んだ。

    「……あの、お仕事中なので、これは助かります」

    %CALLNAME:TARGET%は丁寧だが、どこか距離のある口調でそう言った。

    「……え？　お茶、ですか……？」

    %CALLNAME:TARGET%は怪訝そうな表情で湯飲みを見つめている。

    「あたしに……？　なにかあったんですか……？」

    警戒するように%CALLNAME:MASTER%の顔を窺いながら、湯飲みを受け取った。

    「……いただきます」

    そっとお茶を口に含む%CALLNAME:TARGET%。

    「……普通のお茶、ですね。ありがとうございます」

    %CALLNAME:TARGET%は一応お礼を言ったが、どこか落ち着かない様子だ。

    「――あの……お茶……？」

    %CALLNAME:TARGET%は戸惑った様子で湯飲みを受け取った。

    「……なんで、あたしに……？」

    不思議そうにしながらも、お茶を啜る。

    「……ん、おいしいです」

    %CALLNAME:TARGET%は小さく呟いた。

    「あの……ありがとうございます。でも、咲夜さんに見つかったら怒られちゃうかも……」

    %CALLNAME:TARGET%はそわそわと辺りを見回しながら、お茶を飲み続けた。
  priority: 1
