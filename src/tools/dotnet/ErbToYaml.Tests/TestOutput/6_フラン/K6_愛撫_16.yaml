- id: fallback
  content: >-
    「それ、何なのさ？　細長くて震えてる」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つバイブを無表情で見つめた。

    「私のそこに入れるの？　……壊れちゃうかもしれないのさ」

    その言葉が何を意味するのか、判断がつかなかった。

    挿入されると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……ふぅん。中で震えてるんだ。変な感じ」

    「きゅっとしてドカーンって知ってる？」

    %CALLNAME:人物_フラン%はバイブを見ながら、無邪気に言った。

    「私、なんでも壊せるのさ。そのにょろにょろしたのだって」

    しかし、%CALLNAME:MASTER%が挿入して振動を始めると、%CALLNAME:人物_フラン%は目を丸くした。

    「……っ！　なにこれ……中で動いてる……変なのさ……」

    悪魔の妹は、予想外の感覚に戸惑っているようだった。

    「……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を無表情で見つめた。

    「私のそこに何か入れるの？　つまらないことしたら、遊んであげないのさ」

    バイブが挿入され振動が始まると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……っ……何、これ。中でぶるぶるしてる……」

    495年の孤独が育てた警戒心が、一瞬揺らいだように見えた。

    「あなた、コンティニューできないのさ」

    %CALLNAME:人物_フラン%は不穏なことを口にしながら、バイブを見つめた。

    「でも、それ、ちょっと気になるの。私のそこに入れてみてよ」

    %CALLNAME:MASTER%が振動を伝えると、%CALLNAME:人物_フラン%は小さく身を震わせた。

    「……ふぅん。外の世界って、変なものがあるね。中で震えるなんて」

    %CALLNAME:人物_フラン%は興味を持ったようだった。
