    珠がひとつずつ腸内に入り、吸血鬼は思わず声を上げた。

    「なっ……中に、珠が……これは……っ……！」

    %CALLNAME:人物_レミリア%は動揺を隠せず、顔を紅く染めた。

    「……ふぅん、外の世界の道具かしら」

    %CALLNAME:人物_レミリア%は興味深そうにアナルビーズを見た。

    「使用人が主にそんな珠を……大胆ね」

    挿入された瞬間、%CALLNAME:人物_レミリア%の余裕は消え去った。

    「っ……！　中に、ひとつずつ……やっ……！」

    珠が連なって腸壁を押し広げ、吸血鬼は予想外の快感に震えた。

    「……こ、これは……認めてあげてもいいわ……」

    %CALLNAME:MASTER%がアナルビーズを見せると、%CALLNAME:人物_レミリア%は鼻を鳴らした。

    「そんな珠で私を……」

    傲慢な態度だったが、珠が挿入された瞬間、表情が変わった。

    「っ……！　な、何これ……奥に、ひとつずつ……ひゃぁ……！」

    500年を生きた吸血鬼にも、この連珠の刺激は未知のものだった。

    「……っ、くっ……%CALLNAME:MASTER%……これは、ずるいわ……」

    威厳を保とうとしながらも、%CALLNAME:人物_レミリア%の声は珠の感触に甘く震えていた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を紅い瞳で見つめた。

    「私にそんな珠を使おうなんて、いい度胸ね」

    アナルビーズが挿入され、珠がひとつずつ収まっていく。

    「っ……あ……中に、連なって……んっ……」

    珠の快感から逃れられず、%CALLNAME:人物_レミリア%は小さく喘いだ。

    「……特別よ……こんな姿を見せるのは、あなただけ……」
