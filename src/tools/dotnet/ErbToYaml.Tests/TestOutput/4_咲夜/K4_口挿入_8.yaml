- id: fallback
  content: >-
    「……これも……おもてなしの一環ですわ……」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「メイドとして……お客様のご要望にお応えするのは……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の中に腰を進めた。

    「っ……あ……入りましたわ……」

    「……意外と……気持ちいいですわね……」

    %CALLNAME:TARGET%は自分の反応に驚きながらも、動きを続けた。

    「……ん……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は複雑な表情を浮かべている。

    「向かい合うと……貴方の反応が見えて……困りますわ……」

    「私の動きで……そんな顔をされると……」

    %CALLNAME:TARGET%は深く突くと、%CALLNAME:MASTER%の反応を確認した。

    「あっ……ここがいいの……？」

    言いながら、%CALLNAME:TARGET%は同じ場所を攻め続けた。

    「……これは……仕事……ですから……」

    %CALLNAME:TARGET%は何度も自分に言い聞かせている。

    しかし、%CALLNAME:MASTER%の中の感触は予想以上だった。

    「……ぅ……変な気分になってきましたわ……」

    「貴方のせいですからね……」

    %CALLNAME:TARGET%は責任を押し付けながらも、腰の動きを止めなかった。

    「……もう少し……続けても構いませんわ……」

    「……っ……」

    %CALLNAME:TARGET%は息を荒くしながら、腰を動かしていた。

    「……プロとして……こんなに乱れるべきではないのに……」

    「%CALLNAME:MASTER%、貴方の中……気持ちよすぎますわ……」

    恨めしそうに言いながらも、%CALLNAME:TARGET%の動きは止まらない。

    「……でも……嫌ではありませんの……」

    小さな声で、%CALLNAME:TARGET%はそう認めた。
