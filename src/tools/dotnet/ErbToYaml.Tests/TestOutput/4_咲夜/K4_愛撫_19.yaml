- id: fallback
  content: >-
    %CALLNAME:MASTER%が搾乳機を取り出すと、%CALLNAME:TARGET%は氷のような視線を向けた。

    「……それで何をなさるおつもりですの」

    %CALLNAME:TARGET%の声には、一切の温かみがない。

    「紅魔館のメイド長を、そのような機械で搾るおつもり？」

    %CALLNAME:TARGET%の手には、いつの間にかナイフが握られていた。

    「……身の程を弁えなさいまし」

    「……は？」

    %CALLNAME:TARGET%は信じられないものを見るような目で搾乳機を見つめた。

    「それを私に使おうと？　正気ですの」

    %CALLNAME:TARGET%は嘲るように笑った。

    「時を止めれば、その機械ごと貴方を刻むことも造作もありませんわ」

    「……今回は見逃して差し上げますけれど、次はありませんわよ」

    搾乳機を見た%CALLNAME:TARGET%は、露骨に眉をひそめた。

    「……趣味が悪いですわね」

    %CALLNAME:TARGET%は一歩後ろに下がり、距離を取った。

    「お客様であっても、無礼な振る舞いは許しませんわ」

    「お嬢様のお怒りを買いたくなければ、それを仕舞いなさいまし」

    瀟洒なメイドの目は、冷ややかに光っている。

    「……」

    %CALLNAME:TARGET%は無言で搾乳機を見つめ、深いため息をついた。

    「お客様。紅魔館のメイドに、そのようなものを使うおつもりですか」

    %CALLNAME:TARGET%の声は静かだが、有無を言わせぬ威圧感がある。

    「……お引き取りを。次はありませんわ」

    完璧なメイドは、完璧な作り笑いを浮かべていた。
