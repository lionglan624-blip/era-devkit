- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%……この体勢は……」

    %CALLNAME:TARGET%は四つんばいの姿勢を恥じるように、顔を伏せた。

    「獣のようで……恥ずかしいですわ……」

    しかし、%CALLNAME:MASTER%が後ろから貫くと、声が漏れてしまう。

    「……っ……あ……」

    「見ないで……ください……こんな姿……」

    %CALLNAME:TARGET%は羞恥に顔を赤くしながらも、腰を引かなかった。

    「あ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに合わせて、声を漏らしている。

    「メイドとして……四つんばいなんて……」

    「こんな格好……お嬢様に見られたら……」

    %CALLNAME:MASTER%の腰が深く沈むと、%CALLNAME:TARGET%の体が震えた。

    「あっ……奥……当たって……」

    「……でも……止めないで……%CALLNAME:MASTER%……」

    「……ふぁ……こんなに……感じてしまうなんて……」

    %CALLNAME:TARGET%は自分の反応に戸惑いながらも、%CALLNAME:MASTER%を受け入れている。

    「背後から……こんな風に……」

    「まるで……獣の交尾のよう……」

    %CALLNAME:MASTER%が激しく動くと、%CALLNAME:TARGET%の声が甘くなる。

    「あ……んっ……やぁ……」

    恥じらいながらも、%CALLNAME:TARGET%は快感に身を委ねていた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は後ろを振り返り、潤んだ瞳で%CALLNAME:MASTER%を見た。

    「こうして……後ろから抱かれていると……」

    「貴方のものになっている気がしますわ……」

    「あ……近い……深い……」

    「……ん……っ……%CALLNAME:MASTER%……」

    恥ずかしさと快楽の狭間で、%CALLNAME:TARGET%は甘い声を漏らし続けた。
