character: レミリア
situation: K5_口挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、私に抱かれたいの？」

    %CALLNAME:人物_レミリア%は艶やかに微笑み、%CALLNAME:MASTER%の上に覆いかぶさった。

    小さな身体が%CALLNAME:MASTER%を見下ろし、ゆっくりと腰を下ろしていく。

    「んっ……あぁ、%CALLNAME:MASTER%……入っていくわ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手を握りしめた。

    「……%CALLNAME:MASTER%の中、温かい……私を受け入れてくれるのね」

    紅魔館の主は、愛しい人を抱きながら幸せそうに微笑んだ。

    「今夜は……私から、%CALLNAME:MASTER%を抱きたいの」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%をベッドに押し倒し、その上に乗った。

    紅い瞳が愛おしげに%CALLNAME:MASTER%を見下ろす。

    「あ……っ、%CALLNAME:MASTER%の中……私が奥まで……」

    %CALLNAME:人物_レミリア%は甘い声を漏らし、ゆっくりと腰を動かした。

    「……こうして%CALLNAME:MASTER%を抱いていると……幸せよ」

    500年の吸血鬼は、恋人の体温を感じながら腰を揺らした。

    「んっ……%CALLNAME:MASTER%、私の重さ……大丈夫？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の上で小さく笑った。

    冷たい手が%CALLNAME:MASTER%の頬を撫でる。

    「あぁ……っ、%CALLNAME:MASTER%の中……締め付けてくれるのね……」

    %CALLNAME:人物_レミリア%は恍惚とした表情を浮かべた。

    「……こんな風に%CALLNAME:MASTER%を独り占めできるなんて……」

    紅魔館の主は、恋人だけに許した甘えた姿を見せていた。

    「ククク……%CALLNAME:MASTER%を正面から貫くなんて、征服している気分ね」

    %CALLNAME:人物_レミリア%は妖艶に笑い、腰を下ろしていった。

    %CALLNAME:MASTER%の身体が、小さな吸血鬼の動きに合わせて揺れる。

    「はぁ……っ、%CALLNAME:MASTER%の中……気持ちいいわ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胸に手を置いた。

    「……%CALLNAME:MASTER%だけよ、私にこんな姿を見せてくれるのは」

    500年の吸血鬼は、愛しい人を抱く幸福に酔いしれていた。
