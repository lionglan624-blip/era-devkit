character: フラン
situation: K6_愛撫
entries:
- id: fallback
  content: >-
    「ねぇ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手に頬を寄せた。

    まるで宝物を確かめるように、その温もりを感じている。

    「こうして触ってもらえるの……すっごく嬉しいのさ」

    495年の孤独を知る少女は、恋人の愛撫に目を細めた。

    「私、壊さないでいられるよ……%CALLNAME:MASTER%のことだけは」

    %CALLNAME:人物_フラン%は、この幸せを決して壊すまいと心に誓っていた。

    「えへへ……%CALLNAME:MASTER%の手、あったかいね」

    %CALLNAME:人物_フラン%は子供のように無邪気に笑った。

    %CALLNAME:MASTER%の手が肌を撫でるたび、くすぐったそうに身を捩る。

    「もっと……もっと触って？」

    %CALLNAME:人物_フラン%は甘えるように%CALLNAME:MASTER%に身を寄せた。

    「私、%CALLNAME:MASTER%に触られるの、大好きなのさ」

    紅い瞳が、愛おしそうに恋人を見上げていた。

    「んっ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の愛撫に、蕩けるような表情を浮かべた。

    地下に閉じ込められていた頃には、想像もできなかった温かさ。

    「……%CALLNAME:MASTER%といると、私、普通の女の子になれる気がするの」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の胸に顔を埋めた。

    「壊すことしか知らなかった私が、こんなに幸せでいいのかな……」

    その声は、喜びと少しの不安が入り混じっていた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手をそっと握った。

    その手を壊してしまわないように、細心の注意を払って。

    「私のこと、怖くないの？　本当に？」

    %CALLNAME:MASTER%の答えを待たず、%CALLNAME:人物_フラン%は小さく笑った。

    「……うん、知ってる。%CALLNAME:MASTER%は私を怖がらないよね」

    悪魔の妹は、恋人の腕の中でようやく安らぎを見つけていた。
  priority: 4
- id: talent_3_1
  content: >-
    「ひゃっ……！　%CALLNAME:MASTER%、何するの……」

    %CALLNAME:人物_フラン%は驚いたように身を引いた。

    しかし、その紅い瞳には怒りはない。

    「……急に触るの、ずるいのさ」

    %CALLNAME:人物_フラン%は頬を赤らめながら、%CALLNAME:MASTER%を睨んだ。

    「……でも、もうちょっとだけ……してもいいよ」

    素直になれない悪魔の妹は、そっぽを向きながらそう言った。

    「あ……そこ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手に反応して、小さく声を漏らした。

    「変な感じがする……でも、嫌じゃないの」

    %CALLNAME:人物_フラン%は首を傾げながら、自分の身体の反応を不思議そうに見つめた。

    「……%CALLNAME:MASTER%に触られると、胸がどきどきするのさ」

    その言葉に、%CALLNAME:人物_フラン%自身が照れくさそうに目を逸らした。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%をじっと見つめた。

    その紅い瞳には、どこか不安げな色が混じっている。

    「私に触って、怖くないの？　私、力の加減がよくわからないのさ」

    %CALLNAME:MASTER%が優しく触れ続けると、%CALLNAME:人物_フラン%は安堵したように息を吐いた。

    「……うん、%CALLNAME:MASTER%なら、大丈夫かも」

    少しずつ、%CALLNAME:人物_フラン%は%CALLNAME:MASTER%に心を開いていた。

    「んっ……やぁ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の愛撫に、身を捩った。

    「こそばゆいのに、気持ちいいのさ……変な感じ」

    %CALLNAME:人物_フラン%は不思議そうに自分の身体を見下ろした。

    「……ねぇ、%CALLNAME:MASTER%はどうして私に触りたいの？」

    純粋な疑問を口にしながら、%CALLNAME:人物_フラン%は答えを待っていた。

    その顔は、期待と不安が入り混じった複雑な表情だった。
  priority: 3
  condition:
    type: Talent
    talentType: 3
    threshold: 1
- id: fallback
  content: >-
    「……なに？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手を見つめた。

    「私に触るの？　壊れちゃうかもしれないのさ」

    それが自分のことなのか%CALLNAME:MASTER%のことなのか、曖昧な言い方だった。

    「……でも、%CALLNAME:MASTER%は面白いね」

    %CALLNAME:人物_フラン%は小さく笑った。

    「地下に来る人なんて、あんまりいないのさ」

    「ふぅん……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の行動を興味深そうに見ていた。

    「%CALLNAME:MASTER%って変わってるね。私のこと、怖くないの？」

    %CALLNAME:人物_フラン%は首を傾げた。

    「みんな私を怖がるのに……%CALLNAME:MASTER%は違うのさ」

    その紅い瞳には、好奇心と警戒が混じっていた。

    「……っ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%に触れられ、びくりと身体を震わせた。

    「びっくりしたのさ……誰かに触られるの、久しぶりだから」

    %CALLNAME:人物_フラン%は戸惑いながらも、逃げることはしなかった。

    「……お姉様以外で、こんなに近くに来る人、いなかったの」

    その声には、どこか寂しさが滲んでいた。

    「あ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手に、ぎこちなく反応した。

    「……なんだか、不思議な感じ」

    %CALLNAME:人物_フラン%は自分の身体の反応を確かめるように、じっとしていた。

    「%CALLNAME:MASTER%って、怖いもの知らずなのさ」

    皮肉ではなく、純粋な感想として%CALLNAME:人物_フラン%はそう呟いた。
  priority: 2
- id: fallback
  content: >-
    「……誰？」

    %CALLNAME:人物_フラン%は紅い瞳で%CALLNAME:MASTER%を見つめた。

    その視線には、好奇心と危険な光が宿っている。

    「私に触りたいの？　ふぅん……」

    %CALLNAME:人物_フラン%は小首を傾げた。

    「壊れちゃっても知らないのさ」

    その言葉が冗談なのか本気なのか、判別がつかなかった。

    「きゅっとしてドカーンって知ってる？」

    %CALLNAME:人物_フラン%は無邪気に笑いながら、%CALLNAME:MASTER%の手を見た。

    「私、なんでも壊せるのさ。%CALLNAME:MASTER%の手だって」

    その言葉に悪意はない。ただ事実を述べているだけだった。

    「……でも、今日は壊さないであげる」

    %CALLNAME:人物_フラン%は気まぐれに、そう言い放った。

    「……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を無表情で見つめた。

    495年の孤独が生んだ、どこか虚ろな瞳。

    「私に触って、何がしたいの？」

    %CALLNAME:人物_フラン%の声は、興味があるような、ないような。

    「つまんないことしたら、遊んであげないのさ」

    悪魔の妹は、退屈そうに%CALLNAME:MASTER%を眺めていた。

    「あなた、コンティニューできないのさ」

    %CALLNAME:人物_フラン%は不穏なことを口にした。

    「私と遊ぶってことは、そういうことなのさ」

    しかし、その紅い瞳には純粋な好奇心も見える。

    「……面白い人。地下まで来るなんて」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%に興味を持ったようだった。

    「また来てもいいのさ。壊さないでいられたらね」
  priority: 1
