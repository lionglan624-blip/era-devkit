  content: >-
    「……っ！ 何するの？」

    %CALLNAME:人物_フラン%は驚いて振り返った。

    「フランのお尻……触ろうとしたでしょ？」

    紅い瞳がじっと%CALLNAME:MASTER%を見つめている。

    「……変なことしたら、壊しちゃうかもしれないよ？」

    その声には警告と、どこか興味が入り混じっていた。

    「んっ……そこ、触るの？」

    %CALLNAME:人物_フラン%は不思議そうに%CALLNAME:MASTER%を見つめた。

    「変なの……どうしてそんなところ触りたいの？」

    「……ふーん、外の世界では普通なの？」

    %CALLNAME:人物_フラン%は首を傾げ、戸惑いながらもされるがままになっている。

    「……まあ、いいけど。壊さないでね」

    「……え、そこ？」

    %CALLNAME:人物_フラン%は少し身を引いた。

    「フランに興味あるの？ それとも……」

    紅い瞳が探るように%CALLNAME:MASTER%を見つめた。

    「……%CALLNAME:MASTER%のこと、よく分からないのさ」

    「でも……嫌いじゃない……かも」

    「っ……そこ、やめてよ」

    %CALLNAME:人物_フラン%は少し不機嫌そうに眉をひそめた。

    「いきなりそんなところ触ったら……びっくりするでしょ」

    「……まあ、%CALLNAME:MASTER%なら……許してあげなくもないけど」

    %CALLNAME:人物_フラン%は複雑な表情で%CALLNAME:MASTER%を見つめた。

    「……次からは、ちゃんと言ってからにしてね」
