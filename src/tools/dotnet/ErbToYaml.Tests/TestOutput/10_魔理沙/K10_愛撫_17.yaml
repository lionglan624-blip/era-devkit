entries:
- id: fallback
  content: >-
    「んっ……また道具を使いたがるな、お前は」

    %CALLNAME:MASTER%がバイブを取り出すと、%CALLNAME:人物_魔理沙%は呆れたような笑みを浮かべた。

    「まあ、いいけどさ……お前の好きにしろよ」

    バイブがゆっくりと挿入され、%CALLNAME:人物_魔理沙%は息を詰めた。

    「あっ……振動、始まったな……んぅ……中で響いてる……」

    %CALLNAME:人物_魔理沙%は恋人にしがみつき、甘い吐息を漏らした。

    「ふぁっ……！　いきなり入れるなって……準備くらい……」

    %CALLNAME:MASTER%がバイブを挿入すると、%CALLNAME:人物_魔理沙%は身を捩った。

    「んあっ……振動……中で……直接当たって……っ」

    バイブの振動が膣壁を刺激し、逃げ場のない快感が走る。

    「あぁっ……や、やめ……もうダメだって……お前のせいだぜ……」

    抗議しながらも、%CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%に身を預けた。

    「ん……今日はそれでいくのか」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の手にあるバイブを見て苦笑した。

    「……お前の指の方が好きなんだけどな、正直」

    バイブが挿入された瞬間、%CALLNAME:人物_魔理沙%は小さく声を上げた。

    「あっ……でも、これ……奥まで届いて……んんっ……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに顔を逸らしながら、快感に身を任せた。

    「……バイブか。お前、本当に道具好きだな」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の手元を見て言った。

    「まあ……お前がしたいなら、いいけどさ」

    バイブの振動が始まると、%CALLNAME:人物_魔理沙%は眉をひそめた。

    「ひゃっ……あぁ……中で暴れてる……敏感なとこに当たって……」

    %CALLNAME:人物_魔理沙%は恋人の腕に縋りながら、快楽に溺れていった。
  priority: 4
- id: talent_3_1
  content: >-
    「な、何だそれ……長いけど……」

    %CALLNAME:人物_魔理沙%はバイブを見て目を丸くした。

    「そ、それを私に……？　ま、まさか……」

    しかし%CALLNAME:MASTER%は構わず%CALLNAME:人物_魔理沙%の秘所にバイブを押し当てた。

    「ひゃあっ！　ちょ、中に……！　んあぁっ……振動してる……！」

    %CALLNAME:人物_魔理沙%は予想以上の刺激に、悲鳴のような声を上げた。

    「えっ……バイブ……？　こっちに向けるなって！」

    %CALLNAME:MASTER%がバイブを近づけると、%CALLNAME:人物_魔理沙%は後ずさった。

    「ま、待てって！　心の準備が……！」

    だが逃げ場はなく、バイブは%CALLNAME:人物_魔理沙%の中に挿入された。

    「あぁっ！　んんっ……振動が……中で……っ」

    %CALLNAME:人物_魔理沙%は声を抑えきれず、顔を真っ赤にした。

    「お、おい……それ、まさか……」

    %CALLNAME:人物_魔理沙%の予感は的中した。

    「あっ……や、やめ……中は直接はダメだって……」

    バイブの振動が、%CALLNAME:人物_魔理沙%の膣壁を責め立てる。

    「んあっ……あぁっ……止まらない……頭、真っ白に……」

    %CALLNAME:人物_魔理沙%は快感に翻弄されながら、助けを求めるように%CALLNAME:MASTER%を見た。

    「そ、それって……」

    %CALLNAME:人物_魔理沙%はバイブを凝視した。

    「……見るからにやばそうなんだが……」

    案の定、それは%CALLNAME:人物_魔理沙%の予想を超える刺激をもたらした。

    「ひぁっ……！　や、やめ……中で暴れて……っ！」

    %CALLNAME:人物_魔理沙%は必死に耐えようとしたが、体は正直に反応していた。
