character: 子悪魔
situation: K7_愛撫
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、見たいの……？」

    %CALLNAME:TARGET%は頬を染めながら、自分から足を開いた。

    妖精の小さな秘裂が、%CALLNAME:MASTER%の前に晒される。

    「えへへ……恥ずかしいけど……%CALLNAME:MASTER%になら、見せてあげる」

    %CALLNAME:TARGET%は震える手で、自分の秘唇をそっと開いてみせた。

    薄桃色の内壁が、恥じらいながら%CALLNAME:MASTER%の視線を受け入れている。

    「……ね？　あたしの全部……%CALLNAME:MASTER%のものだよ……」

    「んっ……そんなに、じっくり見られると……」

    %CALLNAME:MASTER%に秘裂を押し開かれ、%CALLNAME:TARGET%は甘い声を漏らした。

    妖精の膣内は、愛液で潤い、淡い桃色に染まっている。

    「……恥ずかしいよぉ……でも、嬉しい……」

    %CALLNAME:TARGET%は目を潤ませながら、%CALLNAME:MASTER%を見上げた。

    「%CALLNAME:MASTER%が見てくれてるって思うと……ドキドキしちゃう……」

    妖精は幸せそうに微笑みながら、体を開いたままでいた。

    「あっ……やぁっ……中まで、見ないで……」

    %CALLNAME:TARGET%は顔を真っ赤にしながらも、逃げようとはしなかった。

    「……うそ……やっぱり見て……全部、見てほしいの……」

    %CALLNAME:TARGET%は恥ずかしそうに俯きながら、さらに足を広げた。

    妖精の秘部が大きく開かれ、奥まで%CALLNAME:MASTER%の視線に晒されている。

    「あたしの一番恥ずかしいとこ……%CALLNAME:MASTER%だけに見せるね……」

    %CALLNAME:TARGET%は震えながら、精一杯の愛情を込めてそう言った。

    「%CALLNAME:MASTER%……あたしの、きれい……？」

    %CALLNAME:TARGET%は不安そうに問いかけながら、秘裂を晒し続けている。

    妖精の小さな蜜壺が、%CALLNAME:MASTER%の視線を浴びて熱くなっていく。

    「……えへへ、きれいって言ってくれると思った……」

    %CALLNAME:TARGET%は嬉しそうに微笑んで、自分から秘唇を広げた。

    「見てて……もっともっと、%CALLNAME:MASTER%に見てほしいの……」

    妖精は恥じらいながらも、愛しい人に全てを見せることに喜びを感じていた。
  priority: 4
- id: talent_3_1
  content: >-
    「ひゃっ……そ、そこ、開いちゃ……」

    %CALLNAME:TARGET%は驚きながら、%CALLNAME:MASTER%に秘裂を晒されていた。

    妖精の可愛らしい蜜壺が、羞恥に震えている。

    「……はずかしいよぅ……こんなとこ、見ないで……」

    %CALLNAME:TARGET%は目を潤ませながらも、逃げようとはしない。

    「……でも、%CALLNAME:MASTER%なら……ちょっとだけ、いいよ……」

    小さな声でそう言って、%CALLNAME:TARGET%は恥ずかしそうに足を開いた。

    「あ……あぁっ……中、見ちゃやだぁ……」

    %CALLNAME:MASTER%に秘裂を押し開かれ、%CALLNAME:TARGET%は悲鳴を上げた。

    「こんなの……恥ずかしすぎるよぉ……」

    %CALLNAME:TARGET%は顔を手で覆いながら、されるがままになっている。

    妖精の膣内は淡い桃色で、緊張に震えていた。

    「……%CALLNAME:MASTER%にだけ……見せてるんだからね……」

    指の隙間から%CALLNAME:MASTER%を見つめながら、%CALLNAME:TARGET%はそう呟いた。

    「……ん……や……そんなに、見つめないで……」

    %CALLNAME:TARGET%は真っ赤な顔で、%CALLNAME:MASTER%の視線を避けようとしている。

    「あたしの……見てて、楽しいの……？」

    恥ずかしそうに問いかけながら、%CALLNAME:TARGET%は足を閉じようとしない。

    妖精の秘裂は、%CALLNAME:MASTER%の視線を受けて微かに震えていた。

    「……%CALLNAME:MASTER%が喜んでくれるなら……もっと見ていいよ……」

    %CALLNAME:TARGET%は恥ずかしさを押し殺して、そう言った。

    「ふぇ……そ、そこは……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に秘唇を開かれ、思わず声を漏らした。

    「……んっ、や……見られてると、なんか変な感じ……」

    %CALLNAME:TARGET%は初めての感覚に戸惑いながら、体を震わせている。

    妖精の蜜壺は、緊張と羞恥で微かに潤い始めていた。

    「……こういうの……恋人同士がすることなの……？」

    %CALLNAME:TARGET%は不安そうに、でもどこか期待を込めて%CALLNAME:MASTER%を見上げた。
  priority: 3
