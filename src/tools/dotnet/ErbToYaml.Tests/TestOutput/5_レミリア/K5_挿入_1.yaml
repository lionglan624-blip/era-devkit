character: レミリア
situation: K5_挿入
entries:
- id: fallback
  content: >-
    「ふふ……後ろからするの？　獣みたいね」

    %CALLNAME:人物_レミリア%は艶やかに笑い、自ら四つん這いになった。

    小さな身体が%CALLNAME:MASTER%に尻を向ける。

    「さあ、好きにしなさい。%CALLNAME:MASTER%」

    %CALLNAME:MASTER%がその白い臀部を掴んで挿入すると、

    「あぁっ……深いわ……この体勢、思った以上に……」

    紅魔館の主は、恋人の前で獣のように喘いだ。

    「んっ……%CALLNAME:MASTER%、後ろから……」

    %CALLNAME:人物_レミリア%は期待に頬を染めながら四つん這いになった。

    %CALLNAME:MASTER%の手が腰を掴み、一気に貫かれる。

    「はぁっ……っ、奥まで……届いてる……」

    %CALLNAME:人物_レミリア%は背を反らせて快感を受け入れた。

    「もっと……もっと激しくしていいのよ……」

    500年の吸血鬼が、獣のように交わることを望んでいた。

    「こう？」

    %CALLNAME:人物_レミリア%は悪戯っぽく笑い、腰を高く上げた。

    %CALLNAME:MASTER%の視線を感じて、その白い肌がほんのり紅く染まる。

    「ふふ……恥ずかしいけど、%CALLNAME:MASTER%になら見せてあげる」

    %CALLNAME:MASTER%が腰を進めると、甘い声が漏れた。

    「あっ……やぁ……この体勢、いいわね……」

    %CALLNAME:人物_レミリア%は恋人だけに許した姿を晒していた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は無言で四つん這いになり、尻を突き出した。

    その姿に%CALLNAME:MASTER%は興奮を隠せなかった。

    「早く……待てないわ」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は声を上げた。

    「はぁ……っ、これよ……この感覚……」

    永遠を生きる吸血鬼が、この一瞬の快楽に身を委ねていた。
  priority: 4
- id: talent_3_1
  content: >-
    「な……っ、後ろからなんて……獣みたいじゃない」

    %CALLNAME:人物_レミリア%は顔を真っ赤にしながら抗議した。

    しかし体勢を変えようとはせず、尻を%CALLNAME:MASTER%に向けたまま。

    「……しょうがないから、今日だけよ」

    %CALLNAME:MASTER%が挿入すると、その小さな身体が震えた。

    「あ……っ、深……くっ、入って……」

    恥ずかしさと快感で、%CALLNAME:人物_レミリア%の声は上ずっていた。

    「こんな体勢で……馬鹿じゃないの」

    %CALLNAME:人物_レミリア%はぶつぶつと文句を言いながら四つん這いになった。

    だが、その尻は自然と高く上がっている。

    「……早くしなさいよ、待たせないで」

    %CALLNAME:MASTER%が腰を打ちつけると、甲高い声が漏れた。

    「ひゃっ……あ、あぁ……っ、ばか……」

    罵りながらも、%CALLNAME:人物_レミリア%は腰を押し返していた。

    「……見ないでよ、後ろから」

    %CALLNAME:人物_レミリア%は恥ずかしそうに顔を伏せた。

    四つん這いの体勢は、全てを%CALLNAME:MASTER%に晒している。

    「もう……恥ずかしいったら……」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は声を殺した。

    「んっ……くぅ……こ、この体勢……悪くないかも……」

    恥ずかしさを隠しながらも、快感を認め始めていた。

    「……あんたって、こういうの好きなのね」

    %CALLNAME:人物_レミリア%は呆れたように言いながら、体勢を整えた。

    尻を突き出す姿は、カリスマとは程遠い。

    「……勘違いしないで。付き合ってあげてるだけよ」

    %CALLNAME:MASTER%の律動に合わせ、%CALLNAME:人物_レミリア%も腰を揺らす。

    「やぁっ……あ……っ、も、もう……」

    強がりも、快感の前には無力だった。
  priority: 3
  condition:
    type: Talent
    talentType: 3
    threshold: 1
- id: fallback
  content: >-
    「……後ろから？　獣のように、ということ？」

    %CALLNAME:人物_レミリア%は眉をひそめながらも、指示に従った。

    四つん這いになり、%CALLNAME:MASTER%に尻を向ける。

    「……恥ずかしい体勢ね」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は息を呑んだ。

    「っ……深い……こんなに奥まで……」

    初めての感覚に、吸血鬼は戸惑いを隠せなかった。

    「……ふぅん、こういうのが好みなのね」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を見た。

    ゆっくりと四つん這いになり、腰を上げる。

    「まあいいわ。試してみましょう」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_レミリア%は目を見開いた。

    「……っ、なるほど……この体勢は……」

    予想外の快感に、その表情が揺らいでいた。

    「……主を獣のように扱うなんて」

    %CALLNAME:人物_レミリア%は不満そうに言いながら、体勢を取った。

    しかし、その瞳にはかすかな期待が見える。

    「……好きにしなさい」

    %CALLNAME:MASTER%の動きに、%CALLNAME:人物_レミリア%は小さく声を漏らした。

    「ん……っ、悪くない……かもしれない……」

    認めたくない快感が、全身を巡っていた。

    「……これが後背位というものね」

    %CALLNAME:人物_レミリア%は冷静を装いながら四つん這いになった。

    %CALLNAME:MASTER%の視線を背中に感じ、心臓が高鳴る。

    「……さあ、始めなさい」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は息を乱した。

    「あ……っ、これは……思った以上に……」

    500年の吸血鬼は、新しい快感に身を震わせた。
  priority: 2
- id: fallback
  content: >-
    「……後ろから？　獣のような真似を私にさせると？」

    %CALLNAME:人物_レミリア%は冷たい視線で%CALLNAME:MASTER%を見た。

    しかし命令通り、四つん這いの体勢を取る。

    「……まあいいわ。下僕の奉仕として受け入れてあげる」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は表情を変えなかった。

    「……ふん、その程度では私は満足しないわよ」

    威厳を保ちながら、紅魔館の主は%CALLNAME:MASTER%を見下ろした。

    「……使用人が主を獣のように扱うとはね」

    %CALLNAME:人物_レミリア%は溜息をつきながら体勢を取った。

    その姿には、不満と退屈さが漂っている。

    「精々頑張りなさい。私を楽しませてみせて」

    %CALLNAME:MASTER%の動きに、%CALLNAME:人物_レミリア%はわずかに反応した。

    「……まあ、悪くはないわね」

    高飛車な態度は、最後まで崩れなかった。

    「……ほう、後ろから来るの」

    %CALLNAME:人物_レミリア%は興味なさそうに%CALLNAME:MASTER%を見た。

    言われた通りに四つん這いになるが、威厳は失わない。

    「退屈しのぎには、なるかしらね」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_レミリア%は小さく息を吐いた。

    「……ふん、まあまあね」

    500年の吸血鬼は、感情を表に出さずに評価した。

    「……こんな体勢で私を犯すつもり？」

    %CALLNAME:人物_レミリア%は冷笑を浮かべた。

    だが命令には従い、%CALLNAME:MASTER%に尻を向けた。

    「面白いわ。やってみなさい」

    %CALLNAME:MASTER%の律動に、%CALLNAME:人物_レミリア%はわずかに目を細めた。

    「……その程度で私が乱れると思わないことね」

    紅魔館の主は、最後まで余裕を崩さなかった。
  priority: 1
