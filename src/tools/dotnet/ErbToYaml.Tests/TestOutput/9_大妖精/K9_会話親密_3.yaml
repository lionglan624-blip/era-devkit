- id: fallback
  content: >-
    「ひゃっ…！？ な、何するんですか！？」

    %CALLNAME:TARGET%は突然お尻を撫でられて、飛び退いた。

    羽がばさばさと激しく動き、明らかに動揺している。

    「い、いきなりそんなところ触るなんて…」

    %CALLNAME:TARGET%は両手でお尻を庇いながら、%CALLNAME:MASTER%を見つめた。

    「…もっと仲良くなってからにしてください…」

    %CALLNAME:TARGET%は困った顔で、でも怒りを抑えるように言った。

    「えっ…！ %CALLNAME:MASTER%さん…？」

    %CALLNAME:TARGET%は驚いて身を引いた。

    「そういうことは…その…まだ親しくないのに…」

    %CALLNAME:TARGET%は困惑した表情を浮かべている。

    「わたし、%CALLNAME:MASTER%さんのこと、よく知らないですから…」

    「…ごめんなさい、そういうのは…ちょっと…」

    %CALLNAME:TARGET%は申し訳なさそうに、でもしっかり距離を取った。

    「きゃあっ…！」

    %CALLNAME:TARGET%は悲鳴を上げて、お尻を両手で押さえた。

    「%CALLNAME:MASTER%さん、何を…！」

    %CALLNAME:TARGET%の羽がばさばさと警戒するように動いている。

    「い、いきなりそんなことしないでください…」

    「わたし、そこまで親しくないですよ…？」

    %CALLNAME:TARGET%は困惑と戸惑いを隠せない様子だった。

    「…え、えっと…」

    %CALLNAME:MASTER%がお尻に触れようとしているのを察して、%CALLNAME:TARGET%は後ずさった。

    「%CALLNAME:MASTER%さん、そういうのは…その…」

    %CALLNAME:TARGET%は困った顔をしている。

    「わたし、チルノちゃんにも触らせないのに…」

    「もう少し、仲良くなってからにしてもらえると…」

    %CALLNAME:TARGET%は遠慮がちに、でもはっきりと断った。
