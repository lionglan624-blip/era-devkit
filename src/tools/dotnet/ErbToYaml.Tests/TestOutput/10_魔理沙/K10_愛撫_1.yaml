- id: fallback
  content: >-
    「はぁ！？　何するんだ%CALLNAME:MASTER%！」

    %CALLNAME:人物_魔理沙%は反射的に%CALLNAME:MASTER%を蹴り飛ばそうとした。

    「いきなりそんなことするな！　頭おかしいのかお前！」

    %CALLNAME:人物_魔理沙%は怒りと困惑を露わにしている。

    「……私をなんだと思ってるんだぜ」

    %CALLNAME:人物_魔理沙%は警戒しながら、距離を取った。

    「ちょ……っ！　何考えてるんだ！」

    %CALLNAME:人物_魔理沙%は驚いて飛び退いた。

    「そういうの、仲良くなってからにしろよ！」

    %CALLNAME:人物_魔理沙%は顔を赤くしながらも、怒りを隠さない。

    「……まずは、まともに話すところからだろ」

    %CALLNAME:人物_魔理沙%は呆れたように言い放った。

    「おいおい、勘弁してくれよ……」

    %CALLNAME:人物_魔理沙%は困惑した表情で%CALLNAME:MASTER%を見た。

    「私とお前、そこまで親しくないだろ？」

    %CALLNAME:人物_魔理沙%は冷静に状況を分析しようとしている。

    「……悪いけど、そういうのはお断りだぜ」

    %CALLNAME:人物_魔理沙%は毅然とした態度で拒絶した。

    「……」

    %CALLNAME:人物_魔理沙%は無言で%CALLNAME:MASTER%を睨みつけた。

    「%CALLNAME:MASTER%……お前、私のこと舐めてるのか？」

    %CALLNAME:人物_魔理沙%の声は冷たかった。

    「魔法使いを怒らせると怖いんだぜ」

    「……次そんなことしたら、マスタースパークでも食らわせてやるからな」

    %CALLNAME:人物_魔理沙%は脅すように言い放った。
