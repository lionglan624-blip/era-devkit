- id: fallback
  content: >-
    「んっ……お前の指、奥まで入ってきてるぜ……」

    %CALLNAME:人物_魔理沙%は熱い吐息を漏らしながら、%CALLNAME:MASTER%の指を受け入れている。

    普段の勝気な態度はどこへやら、恋人の前では素直に身体を開いていた。

