- id: fallback
  content: >-
    「それ、何なのさ？　小さいキャップみたいな」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つクリキャップを無表情で見つめた。

    「私のそこに付けるの？　……壊れちゃうかもしれないのさ」

    その言葉が何を意味するのか、判断がつかなかった。

    振動が伝わると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……ふぅん。直接震えてるんだ。変な感じ」

    「きゅっとしてドカーンって知ってる？」

    %CALLNAME:人物_フラン%はクリキャップを見ながら、無邪気に言った。

    「私、なんでも壊せるのさ。そのちっちゃいのだって」

    しかし、%CALLNAME:MASTER%が装着して電源を入れると、%CALLNAME:人物_フラン%は目を丸くした。

    「……っ！　なにこれ……そこ、直接は……変なのさ……」

    悪魔の妹は、予想外の感覚に戸惑っているようだった。

    「……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を無表情で見つめた。

    「私のそこに何か付けるの？　つまらないことしたら、遊んであげないのさ」

    クリキャップが装着され振動が始まると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……っ……何、これ。直接ぶるぶるしてる……」

    495年の孤独が育てた警戒心が、一瞬揺らいだように見えた。

    「あなた、コンティニューできないのさ」

    %CALLNAME:人物_フラン%は不穏なことを口にしながら、クリキャップを見つめた。

    「でも、それ、ちょっと気になるの。私のそこに付けてみてよ」

    %CALLNAME:MASTER%が振動を伝えると、%CALLNAME:人物_フラン%は小さく身を震わせた。

    「……ふぅん。外の世界って、変なものがあるね。ここに直接震えるなんて」

    %CALLNAME:人物_フラン%は興味を持ったようだった。
