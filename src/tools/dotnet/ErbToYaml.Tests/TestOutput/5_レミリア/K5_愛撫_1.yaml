character: レミリア
situation: K5_愛撫
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、私の下僕になったつもり？」

    %CALLNAME:人物_レミリア%は玉座に腰掛けたまま、脚を開いて見せた。

    %CALLNAME:MASTER%がそこに顔を埋めると、%CALLNAME:人物_レミリア%は小さく息を漏らした。

    「んっ……そこ、いいわ……もっと奉仕なさい」

    威厳のある言葉とは裏腹に、%CALLNAME:人物_レミリア%の声は甘く蕩けている。

    「……%CALLNAME:MASTER%だけよ、私にこんなことさせるの……」

    500年を生きた吸血鬼が、恋人の前でだけ見せる無防備な姿だった。

    「……来なさい、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を手招きした。

    %CALLNAME:MASTER%がその秘所に舌を這わせると、

    「あっ……んん……」

    %CALLNAME:人物_レミリア%は目を閉じ、快楽に身を委ねた。

    「……上手になったわね、%CALLNAME:MASTER%……私を悦ばせる方法を……」

    吸血鬼の誇りも、恋人の舌の前では意味をなさなかった。

    「今夜は……私が奉仕される番ね」

    %CALLNAME:人物_レミリア%は期待に満ちた眼差しで%CALLNAME:MASTER%を見下ろした。

    %CALLNAME:MASTER%がゆっくりと舌を動かし始めると、

    「やっ……そこ、敏感なのよ……」

    %CALLNAME:人物_レミリア%の小さな身体が、快感にびくりと震えた。

    「%CALLNAME:MASTER%……もっと、もっとちょうだい……」

    威厳など投げ捨てて、%CALLNAME:人物_レミリア%は甘く懇願した。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は珍しく素直な声で恋人の名を呼んだ。

    %CALLNAME:MASTER%がその呼び声に応えて舌を這わせると、

    「ひゃっ……あ、ああ……」

    %CALLNAME:人物_レミリア%は玉座の肘掛けを握りしめた。

    「……嬉しいわ。%CALLNAME:MASTER%が、私を……」

    その言葉の先は、甘い吐息に消えていった。

    500年の孤独を埋めてくれる恋人に、%CALLNAME:人物_レミリア%は全てを委ねていた。
  priority: 4
- id: talent_3_1
  content: >-
    「……何をする気かしら、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は表向き平静を装っている。

    だが%CALLNAME:MASTER%がその秘所に口づけると、

    「っ……！　ちょ、ちょっと……」

    %CALLNAME:人物_レミリア%の声が上擦った。

    「な、何を……んっ……勝手なことを……」

    威厳のある態度とは裏腹に、その体は正直に反応していた。

    「……ふん、私を悦ばせたいの？」

    %CALLNAME:人物_レミリア%は高飛車な態度を崩さない。

    しかし%CALLNAME:MASTER%が舌を動かし始めると、

    「あ……やっ……そこはっ……」

    その声には隠しきれない甘さが混じっていた。

    「……まあ、悪くはないわね……続けても、いいわよ……」

    頬を染めながら、%CALLNAME:人物_レミリア%は視線を逸らした。

    「……何よ、その目は」

    %CALLNAME:人物_レミリア%は気恥ずかしそうに%CALLNAME:MASTER%を睨んだ。

    %CALLNAME:MASTER%がゆっくりとその花園に舌を這わせると、

    「んあっ……ば、馬鹿……っ」

    %CALLNAME:人物_レミリア%の体が小さく跳ねた。

    「そ、そんなところ……舐めるなんて……」

    恥ずかしそうに目を閉じながらも、%CALLNAME:人物_レミリア%は拒絶しなかった。

    「……%CALLNAME:MASTER%、あなたって本当に……」

    %CALLNAME:人物_レミリア%は呆れたような声を出した。

    だが%CALLNAME:MASTER%がその蕾を優しく舐め上げると、

    「ひっ……あ、ああ……待ちなさい……」

    %CALLNAME:人物_レミリア%は思わず%CALLNAME:MASTER%の頭を掴んだ。

    「……押し付けてなんか、ないわよ……勘違い、しないで……」

    口ではそう言いながら、その手は%CALLNAME:MASTER%を離そうとしなかった。
