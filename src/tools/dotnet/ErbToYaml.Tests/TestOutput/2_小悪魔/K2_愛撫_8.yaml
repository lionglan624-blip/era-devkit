- id: fallback
  content: >-
    「え……自慰……ですの……？」

    %CALLNAME:人物_小悪魔%は困惑した表情で%CALLNAME:MASTER%を見た。

    「%CALLNAME:MASTER%さん……変わった趣味をお持ちですわね……」

    %CALLNAME:人物_小悪魔%は溜息をつきながらも、おずおずと足を開いた。

    「……まあ、悪魔ですし……これくらいは……」

    %CALLNAME:人物_小悪魔%は渋々といった様子で、自らの秘所に触れた。

    「……んっ……見てるんですの……？」

    「%CALLNAME:MASTER%さん……何を仰っているんですの……」

    %CALLNAME:人物_小悪魔%は呆れた顔をしながらも、言われた通りにし始めた。

    「はぁ……悪魔の体に興味があるのは分かりますけど……」

    %CALLNAME:人物_小悪魔%はゆっくりと自らの秘部を撫で始めた。

    「……んっ……こうすれば……満足ですの……？」

    %CALLNAME:人物_小悪魔%は戸惑いながらも、%CALLNAME:MASTER%の期待に応えようとしていた。

    「……本当にするんですの……？」

    %CALLNAME:人物_小悪魔%は半信半疑といった様子で%CALLNAME:MASTER%を見ている。

    「……仕方ありませんわね……パチュリー様には内緒ですわよ……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに目を逸らしながら、秘所に手を伸ばした。

    「あ……んっ……こういうの……慣れてませんのよ……」

    %CALLNAME:人物_小悪魔%はぎこちない手つきで自らを慰め始めた。

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の言葉に目を丸くした。

    「自慰を見せろ……ですの……？　変わった方ですわね……」

    %CALLNAME:人物_小悪魔%は困ったように眉を寄せながらも、言われた通りにし始めた。

    「……んっ……こ、こうですの……？」

    %CALLNAME:人物_小悪魔%の指がおずおずと秘所を撫でる。

    「……%CALLNAME:MASTER%さんって……本当に不思議な方ですわ……」
