- id: fallback
  content: >-
    「……二人で私を責めるつもり？ 随分と大胆ね」

    %CALLNAME:人物_レミリア%は警戒しながらも興味深げに二人を見た。

    「まあいいわ。試させてあげましょう」

    二つの熱が同時に%CALLNAME:人物_レミリア%に入っていく。

    「っ……あ……っ！ 思ったより……きつい……っ」

    %CALLNAME:人物_レミリア%は予想外の刺激に目を見開いた。

    「……これは……なかなか……侮れないわね……っ」

    500年の吸血鬼は、冷静を装いながらも快感に戸惑っていた。

    「……ほう、二人がかりで二穴挿しというわけね」

    %CALLNAME:人物_レミリア%は値踏みするように二人を見た。

    「どれ、付き合ってあげましょう」

    前後から同時に貫かれ、%CALLNAME:人物_レミリア%は息を詰めた。

    「っ……くぅ……これは……っ、思ったより……」

    %CALLNAME:人物_レミリア%は眉をひそめた。

    「……ふぅん……悪くはないかもしれないわね……っ」

    その声には、認めたくない快感が滲んでいた。

    「……使用人二人がかりで主を犯すとはね」

    %CALLNAME:人物_レミリア%は溜息をついた。

    「今日は気まぐれで受けてあげるわ」

    二つの熱が同時に%CALLNAME:人物_レミリア%を貫いた。

    「っ……あぁ……っ！ 両方同時は……っ、きつい……」

    %CALLNAME:人物_レミリア%は二人の肩を掴んだ。

    「……次はもっと上手くやりなさい……っ」

    紅魔館の主は、快感を隠そうとしていた。

    「……ふぅん、そういう趣向なのね」

    %CALLNAME:人物_レミリア%は腕を組みながら二人を見た。

    「まあ、退屈しのぎに受けてあげるわ」

    前後から挟まれ、二つの熱が同時に入ってきた。

    「っ……んっ……これは……なかなか……っ」

    %CALLNAME:人物_レミリア%は表情を押し殺した。

    「……まあ、及第点ね……精進しなさい……っ」

    吸血鬼の心に、認めたくない快感が芽生えていた。
