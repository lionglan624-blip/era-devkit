character: 咲夜
situation: K4_会話親密
entries:
- id: fallback
  content: >-
    「あっ……%CALLNAME:MASTER%、胸は……んっ……」

    %CALLNAME:人物_咲夜%は小さく息を漏らし、%CALLNAME:MASTER%の手に身を委ねた。

    「そんなに優しく触られると……感じてしまうわ……」

    瀟洒なメイドの表情が、甘く蕩けていく。

    「……もう、%CALLNAME:MASTER%ったら……上手になったわね」

    %CALLNAME:人物_咲夜%は恥ずかしそうに目を伏せながらも、胸を押し付けてきた。

    「ん……ふぁ……そこ、いいわ……」

    %CALLNAME:人物_咲夜%は甘い吐息を漏らしながら、%CALLNAME:MASTER%にしがみついた。

    「乳首……つままないで……あっ、ダメ……」

    %CALLNAME:人物_咲夜%の指先が%CALLNAME:MASTER%の服を掴み、離そうとしない。

    「……%CALLNAME:MASTER%にだけよ、こんな姿を見せるのは……」

    完璧なメイドの仮面を脱ぎ捨て、%CALLNAME:人物_咲夜%は紅潮した顔で喘いでいた。

    「ひぁ……っ、ん、ああ……胸が……」

    %CALLNAME:人物_咲夜%の嬌声が部屋に響く。

    「%CALLNAME:MASTER%……もっと、揉んで……」

    %CALLNAME:人物_咲夜%は自ら胸を差し出し、快楽を求めている。

    「……お嬢様には、内緒にしてね……？」

    そう囁きながら、%CALLNAME:人物_咲夜%は蕩けた表情で%CALLNAME:MASTER%を見つめた。

    %CALLNAME:MASTER%の手が%CALLNAME:人物_咲夜%の胸に触れた瞬間、時が止まった。

    「んっ……ちゅ……%CALLNAME:MASTER%……」

    二人だけの静寂の中で、%CALLNAME:人物_咲夜%は甘く身を捩っている。

    「このまま……ずっと、触っていて……」

    「……時を止めて、二人きりでいたいの」

    %CALLNAME:人物_咲夜%は熱っぽい瞳で、恋人だけに見せる表情を浮かべていた。
  priority: 4
- id: talent_3_1
  content: >-
    「あっ……%CALLNAME:MASTER%……胸は、恥ずかしいわ……」

    %CALLNAME:人物_咲夜%は頬を染めながら、それでも抵抗しなかった。

    「んっ……そんなに揉まないで……」

    その声は拒絶ではなく、羞恥と期待が入り混じっている。

    「……メイドとしては、失格ね……こんなにも、感じてしまうなんて」

    %CALLNAME:人物_咲夜%は恥ずかしそうに目を伏せながらも、身体を預けてきた。

    「ん……%CALLNAME:MASTER%、そこは……」

    %CALLNAME:人物_咲夜%は控えめに抵抗しながらも、胸を隠そうとはしなかった。

    「あっ……乳首は、ダメ……っ」

    その仕草に、彼女の秘めた想いが滲み出ている。

    「……もう、仕方ないわね……少しだけよ？」

    %CALLNAME:人物_咲夜%は上気した顔で、そう呟いた。

    %CALLNAME:MASTER%が胸に手を伸ばすと、%CALLNAME:人物_咲夜%は身構えた。

    しかし、触れられると抵抗なく目を閉じた。

    「んっ……ああ……そう、そこ……」

    %CALLNAME:人物_咲夜%は静かに%CALLNAME:MASTER%の愛撫を受け止めている。

    「……いつから、こんな気持ちになったのかしら……」

    %CALLNAME:人物_咲夜%は自分自身に戸惑いながらも、どこか嬉しそうだった。

    「%CALLNAME:MASTER%、また胸を……」

    %CALLNAME:人物_咲夜%は少し呆れたような、しかし期待を隠せない顔をした。

    「んっ……ふぁ……そこ、弱いの……」

    %CALLNAME:人物_咲夜%の吐息が熱を帯びてくる。

    「……仕方ないわね。お嬢様には、内緒にしておいて……」

    そう言いながらも、%CALLNAME:人物_咲夜%は%CALLNAME:MASTER%の手を胸に導いた。
