    「あっ……や……恥ずかしいよ……」

    %CALLNAME:人物_大妖精%は秘貝を広げられ、羞恥に身をよじった。

    しかしその体は、%CALLNAME:MASTER%から逃げようとはしない。

    「……わたしの中、ちゃんと見て……くれてる……？」

    %CALLNAME:人物_大妖精%は上気した顔で、おずおずと問いかけた。

    「……%CALLNAME:MASTER%に見られてると思うと、ドキドキするの……」

    %CALLNAME:人物_大妖精%の秘貝は、期待でかすかに濡れ始めていた。

    「……ん……」

    %CALLNAME:人物_大妖精%は目を閉じて、%CALLNAME:MASTER%に秘貝を開かれるのを待った。

    恋人に全てを曝け出すことへの覚悟ができている。

    「……こうしてると、%CALLNAME:MASTER%のものになったって……感じるの」

    %CALLNAME:人物_大妖精%の膣内は薄桃色に染まり、愛液で潤んでいた。

