- id: fallback
  content: >-
    「ふぅん……こうやって向かい合うんだ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の胡坐の上に座りながら言った。

    新しい遊び方を見つけた子供のような好奇心が、紅い瞳に宿っている。

    「壊れないでね、%CALLNAME:MASTER%……私、加減が苦手なのさ」

    %CALLNAME:人物_フラン%がゆっくりと腰を落とすと、熱いものが入ってきた。

    「んっ……入った……こうすると、%CALLNAME:MASTER%の顔がよく見えるね」

    悪魔の妹は、新しい玩具で遊ぶように%CALLNAME:MASTER%を観察していた。

    「%CALLNAME:MASTER%……こうすると、どんな顔になるの？」

    %CALLNAME:人物_フラン%は興味深そうに%CALLNAME:MASTER%の顔を覗き込んだ。

    対面の体勢は、相手の反応を観察するのに都合がいい。

    「見せて……私が動いたときの、%CALLNAME:MASTER%の顔」

    %CALLNAME:人物_フラン%が腰を揺らすと、%CALLNAME:MASTER%の表情が変化した。

    「あはっ……面白い顔……こうすると、もっと変わる……？　んっ……」

    悪魔の妹は、相手の反応を引き出すことに無邪気な楽しみを見出していた。

    「……」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%を見下ろした。

    495年の孤独が生んだ、どこか虚ろな紅い瞳。

    「人間って、こうやって繋がるんだ……壊れやすいのに、不思議な作り」

    %CALLNAME:人物_フラン%が腰を落とすと、表情がわずかに揺れた。

    「……んっ……繋がってると、壊したくなくなる……なんでだろ……」

    破壊衝動を鈍らせる何かに、悪魔の妹は戸惑いを隠せなかった。

    「きゅっとしてドカーン、したら……%CALLNAME:MASTER%、どうなるのかな」

    %CALLNAME:人物_フラン%は危険なことを無邪気に呟いた。

    上から押さえつける体勢で、相手は完全に無防備だ。

    「でも、まだ壊さないでおくのさ……遊び終わってないから」

    %CALLNAME:人物_フラン%がゆっくりと腰を動かすと、声が漏れた。

    「んっ……ぁ……こうやって繋がってるの……悪くないかも……」

    破壊よりも、今は繋がることに興味を持ち始めている様子だった。
  priority: 1
