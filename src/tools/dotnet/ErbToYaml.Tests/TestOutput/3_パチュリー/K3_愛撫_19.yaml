- id: fallback
  content: >-
    「……何の真似かしら」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が持つクリップを見て、冷ややかな目を向けた。

    「そんなものを乳首に付けて……何が楽しいの……」

    しかし振動が始まった瞬間、%CALLNAME:TARGET%の表情が強張った。

    「……っ……振動……してる……」

    冷淡を装おうとするが、%CALLNAME:TARGET%の体は小さく震えていた。

    「……」

    %CALLNAME:TARGET%は無表情でクリップの装着を受けている。

    振動が続く度に、その表情が微かに歪む。

    「……これで満足……かしら……」

    %CALLNAME:TARGET%は冷めた声で問いかけたが、呼吸が乱れていた。

    「……早く終わらせて……」

    「……むきゅ」

    %CALLNAME:TARGET%は不快そうに眉を寄せたが、その反応は本物だった。

    「……振動が……乳首から……全身に……」

    クリップの刺激が%CALLNAME:TARGET%の冷淡な態度を揺さぶっている。

    「……下品な道具ね……でも……悪くは……ない……かも……」

    %CALLNAME:TARGET%は認めたくないように、視線を逸らした。

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついたが、それは快感を逃がすためだった。

    「……こんなもので……読書の邪魔を……」

    %CALLNAME:TARGET%は呆れた表情を浮かべているが、その体は振動に反応している。

    「……好きにしなさい……ただし……本を汚さないで……」

    言い終える前に、%CALLNAME:TARGET%は小さく声を漏らした。
