- id: fallback
  content: >-
    「それ、何なのさ？　うにょうにょ動いてる」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つアナルバイブを無表情で見つめた。

    「私のお尻に入れるの？　……壊れちゃうかもしれないのさ」

    その言葉が何を意味するのか、判断がつかなかった。

    挿入されると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……ふぅん。中で動いてるんだ。蛇みたいなのさ」

    「きゅっとしてドカーンって知ってる？」

    %CALLNAME:人物_フラン%はアナルバイブを見ながら、無邪気に言った。

    「私、なんでも壊せるのさ。そのにょろにょろしたのだって」

    しかし、%CALLNAME:MASTER%が挿入してうねりを始めると、%CALLNAME:人物_フラン%は目を丸くした。

    「……っ！　なにこれ……お尻の中で這ってる……変なのさ……」

    悪魔の妹は、予想外の感覚に戸惑っているようだった。

    「……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を無表情で見つめた。

    「私のお尻に何か入れるの？　つまらないことしたら、遊んであげないのさ」

    アナルバイブが挿入され蠢き始めると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……っ……何、これ。中でくねくねしてる……」

    495年の孤独が育てた警戒心が、一瞬揺らいだように見えた。

    「あなた、コンティニューできないのさ」

    %CALLNAME:人物_フラン%は不穏なことを口にしながら、アナルバイブを見つめた。

    「でも、それ、ちょっと気になるの。私のお尻に入れてみてよ」

    %CALLNAME:MASTER%がうねりを伝えると、%CALLNAME:人物_フラン%は小さく身を震わせた。

    「……ふぅん。外の世界って、変なものがあるね。お尻の中で動くなんて」

    %CALLNAME:人物_フラン%は興味を持ったようだった。
