    %CALLNAME:人物_チルノ%は後ろを触られて、小さく跳ねた。

    普段の威勢のいい態度はどこへやら、今は恥じらいに満ちている。

    「……あたいのおしり……いじらないでよぉ……」

    抗議しながらも、その声には甘さが滲んでいた。

    「……でも、%CALLNAME:MASTER%にだけは……見せてもいい……かな……」

    %CALLNAME:人物_チルノ%は観念したように、%CALLNAME:MASTER%に身を任せた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は珍しくおとなしく、%CALLNAME:MASTER%に抱かれている。

    後ろの穴を優しくいじられると、甘い吐息が漏れた。

    「……こんなところまで……触っちゃうんだね……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに、でも幸せそうに微笑んだ。

    「……あたいの全部……%CALLNAME:MASTER%のものだから……」

    そっと囁いて、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に寄り添った。
