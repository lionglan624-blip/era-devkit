    「……%CALLNAME:MASTER%がそうしたいなら、構いませんが」

    機械的に、%CALLNAME:人物_美鈴%は腰を動かし始めた。

    「……っ……」

    %CALLNAME:人物_美鈴%は声を抑えながら、淡々と腰を動かしていた。

    「……門番の務めとして……お相手します」

    %CALLNAME:人物_美鈴%は感情を殺した声で言った。

    「……このペースでよろしいですか」

    その瞳には、諦めにも似た色が浮かんでいた。

    「……」

    %CALLNAME:人物_美鈴%は無言で腰を動かし続けた。

    「……私に動けと言うなら、動きますが」

    %CALLNAME:人物_美鈴%は静かに呟いた。

    「……%CALLNAME:MASTER%は、楽をしたいのですか」

    武術家の鋭い眼差しが、%CALLNAME:MASTER%を見据えた。

    「……わかりました」

    %CALLNAME:人物_美鈴%は小さく頷いた。

    「……お嬢様の客人として、もてなすのも門番の務めです」

    %CALLNAME:人物_美鈴%は自分に言い聞かせるように呟いた。

    「……ただ、勘違いしないでください」

    「……これは、ただの義務です」

    毅然とした態度で、%CALLNAME:人物_美鈴%は作業的に腰を動かした。
