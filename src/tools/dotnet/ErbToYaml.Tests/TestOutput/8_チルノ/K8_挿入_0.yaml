    「なんか、変な感じ……お腹の奥がじんじんする……」

    %CALLNAME:人物_チルノ%は自分の体の変化に困惑しているようだ。

    「これって……気持ちいい、のかな……？」

    首を傾げながら、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に問いかけた。

    「へぇ……こうやって正面からするんだ」

    %CALLNAME:人物_チルノ%は興味深そうに%CALLNAME:MASTER%を見ている。

    「んっ……あ……思ったより、入ってくるね……」

