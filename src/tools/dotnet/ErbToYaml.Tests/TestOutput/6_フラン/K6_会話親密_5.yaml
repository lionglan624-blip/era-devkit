- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の胸に手を伸ばした。

    「……何してるの？」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%を見つめた。

    「フランに触ろうとした人、みんな壊れちゃったんだよ？」

    紅い瞳がすっと細まる。

    「……%CALLNAME:MASTER%も、壊れたいの？」

    %CALLNAME:人物_フラン%の声に、ぞっとするような響きがあった。

    「あれ……フランに何かするつもり？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の動きを見て、小首を傾げた。

    「ねぇ、知ってる？ フランね、495年も一人だったのさ」

    %CALLNAME:人物_フラン%の瞳に、危険な光が宿る。

    「誰も……触らせてもらえなかったの……」

    「だから……触り方、分からないのさ。優しくするの」

    その言葉には、どこか脅しのような響きがあった。

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%に近づこうとした。

    「……止まって」

    %CALLNAME:人物_フラン%は静かにそう言った。

    「フランの胸、触りたいの？ ふーん……」

    %CALLNAME:人物_フラン%は何かを考えるように首を傾げた。

    「……まだダメ。%CALLNAME:MASTER%のこと、よく分からないもの」

    警戒心を隠さない瞳で、%CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見つめ続けた。

    「%CALLNAME:MASTER%……何のつもり？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の意図を察し、じっと見つめてきた。

    「フランに触ろうとする人、久しぶりなのさ」

    「……前に触ろうとした人はね、きゅっとして……ドカーンって」

    %CALLNAME:人物_フラン%は無邪気に笑った。

    「%CALLNAME:MASTER%は大丈夫？ 壊れない？」

    その笑顔が、逆に恐ろしく感じられた。
