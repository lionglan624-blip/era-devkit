    %CALLNAME:人物_小悪魔%は困ったような顔をしているが、声は怒っていない。

    「……私、そういうの慣れてないんですから……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに俯いて、小さな声で呟いた。
