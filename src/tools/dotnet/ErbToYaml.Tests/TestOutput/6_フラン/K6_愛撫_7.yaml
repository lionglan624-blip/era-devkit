- id: fallback
  content: >-
    「……乳首？　そこを触りたいの？」

    %CALLNAME:人物_フラン%は首を傾げながら、%CALLNAME:MASTER%を見た。

    「私、そういうの……よくわからないのさ」

    %CALLNAME:MASTER%の指が乳首に触れると、%CALLNAME:人物_フラン%はびくりとした。

    「っ……なんだか、びりびりする……」

    戸惑いながらも、%CALLNAME:人物_フラン%は逃げようとはしなかった。

    「……%CALLNAME:MASTER%って、変わってるね」

    「ふぅん……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手を興味深そうに眺めた。

    「地下に来て、私の乳首を触るの？　変な人なのさ」

    %CALLNAME:MASTER%が乳首を摘むと、%CALLNAME:人物_フラン%は小さく声を漏らした。

    「あ……ん……なんだろう、この感じ……」

    %CALLNAME:人物_フラン%は自分の身体の反応に、少し驚いたようだった。

    「……もうちょっとだけ、続けてみて」

    「……っ」

    %CALLNAME:人物_フラン%は乳首を触られ、身体を強張らせた。

    「お姉様以外で、こんなとこ触る人……いなかったのさ」

    %CALLNAME:MASTER%の手の動きに、%CALLNAME:人物_フラン%は少しずつ緊張を解いた。

    「……あ……そこ……変な感じ……」

    %CALLNAME:人物_フラン%はどこか寂しそうに、そう呟いた。

    「……誰かに触られるの、久しぶりだから……」

    「私の乳首、触りたいの……？」

    %CALLNAME:人物_フラン%は紅い瞳で%CALLNAME:MASTER%を見つめた。

    「……いいよ。退屈だったから」

    %CALLNAME:MASTER%が乳首を弄ると、%CALLNAME:人物_フラン%は小さく声を上げた。

    「あ……そこ……くすぐったいのさ……」

    %CALLNAME:人物_フラン%は戸惑いながらも、%CALLNAME:MASTER%の愛撫を受け入れていた。

    「……%CALLNAME:MASTER%って、怖いもの知らずなんだね」
  priority: 2
- id: fallback
  content: >-
    「……乳首を触りたいの？　私の？」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%を見つめた。

    その紅い瞳には、好奇心と危険な光が宿っている。

    「いいよ、触っても。……壊れちゃっても知らないのさ」

    %CALLNAME:MASTER%が乳首に指を伸ばすと、%CALLNAME:人物_フラン%は小さく息を漏らした。

    「……ふぅん。あなたって、変な人なのさ」

    悪魔の妹は、感情の読めない声でそう呟いた。

    「きゅっとしてドカーンって知ってる？」

    %CALLNAME:人物_フラン%は無邪気に笑いながら、%CALLNAME:MASTER%を見た。

    「私、なんでも壊せるのさ。あなたの指だって、私の乳首だって」

    %CALLNAME:MASTER%が怯まずに乳首を摘むと、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……あ……度胸あるね。今日は特別に、壊さないであげる」

    %CALLNAME:人物_フラン%は気まぐれにそう言い放った。

    「……つまんないことしたら、わからないけど」

    「……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手を無言で見つめた。

    495年の孤独が生んだ、どこか虚ろな瞳。

    「地下に来て、私の乳首を触るなんて……変わってるのさ」

    %CALLNAME:MASTER%が乳首を弄っても、%CALLNAME:人物_フラン%はほとんど反応しなかった。

    「……ふぅん。これが、そういうこと、なのかな」

    悪魔の妹は、退屈そうに%CALLNAME:MASTER%を眺めていた。

    「あなた、私と遊びたいの？」

    %CALLNAME:人物_フラン%は紅い瞳を%CALLNAME:MASTER%に向けた。

    「私と遊ぶのは危ないのさ。コンティニューできないんだから」

    それでも%CALLNAME:MASTER%が乳首に触れると、%CALLNAME:人物_フラン%は小首を傾げた。

    「……ん……面白いね、あなた。壊してほしいの？」

    %CALLNAME:人物_フラン%の言葉に悪意はない。ただ、純粋な疑問だった。

    「……まあ、いいのさ。しばらくは壊さないで遊んであげる」
  priority: 1
