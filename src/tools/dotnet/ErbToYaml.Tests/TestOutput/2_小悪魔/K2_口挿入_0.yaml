  content: >-
    「……口で？　正気ですか？」

    %CALLNAME:人物_小悪魔%は冷めた目で%CALLNAME:MASTER%を見ている。

    仕方なさそうにため息をつき、膝をついた。

    「……さっさと終わらせましょう……」

    %CALLNAME:人物_小悪魔%は無表情で舌を出し、適当に舐め始めた。

    「……パチュリー様のお仕事があるんですけど……」

    %CALLNAME:人物_小悪魔%は嫌そうな顔で一物を見ている。

    「……悪魔にこんなことさせるなんて……」

