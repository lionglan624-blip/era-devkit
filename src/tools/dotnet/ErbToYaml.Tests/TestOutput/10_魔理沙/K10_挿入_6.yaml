  content: >-
    「お尻で……私が上になるのか。ちょっと、緊張するな」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の上に跨ると、ゆっくりと腰を下ろし始めた。

    菊座に亀頭が押し当てられ、%CALLNAME:人物_魔理沙%は息を呑んだ。

    「くっ……やっぱり、きついな……自分のペースで入れるから、待ってろよ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の手を握りながら、ゆっくりと沈んでいく。

    「んっ……あ……全部、入った……お前の顔、見ながらできるの……嬉しいぜ」

    %CALLNAME:人物_魔理沙%は照れながらも、恋人と目を合わせて微笑んだ。

    「ふふっ……お前、私がこうするの好きだよな」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の上に乗ると、菊座をゆっくりと押し広げた。

    「んっ……後ろの穴だと、違う感じがする……」

    %CALLNAME:人物_魔理沙%は腰を沈めながら、%CALLNAME:MASTER%の反応を見つめた。

    「お前、気持ちいい顔してるぜ……もっと見せてくれよ」

    %CALLNAME:人物_魔理沙%は照れくさそうに笑いながら、自ら腰を揺らし始めた。

    「あっ……んっ……こういうの、悪くないな……」

    「……%CALLNAME:MASTER%、今日はこっちでしたいのか？」

    %CALLNAME:人物_魔理沙%は恋人を見上げながら、%CALLNAME:MASTER%に跨った。

    「まあ、私も慣れてきたしな……付き合ってやるぜ」

    %CALLNAME:人物_魔理沙%は覚悟を決めて、菊座にゆっくりと受け入れた。

    「くぅっ……きつい……でも、お前と繋がってる感じ……するな」

    「あっ……んっ……自分で動くと、奥まで入る……っ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の胸に手を置きながら、腰を揺らした。

    「こうして上から見下ろすと……お前の顔、よく見えるな」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の腰の上で、ゆっくりと菊座を沈めた。

    「んっ……あ……後ろだと、また違う感覚だ……」

    %CALLNAME:人物_魔理沙%は腸壁が押し広げられる感覚に、小さく喘いだ。

    「はぁ……お前、気持ちいいか？　私も……悪くないぜ」

    %CALLNAME:人物_魔理沙%は恋人の手を取って、自らの胸に当てた。

    「心臓、ドキドキしてるだろ……お前のせいだからな」
