entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……こうして向かい合っていると……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の顔を見つめながら、頬を染めた。

    「貴方の顔が……全部見えてしまいますわ……」

    %CALLNAME:MASTER%が腰を動かすたび、%CALLNAME:TARGET%の体が小さく揺れる。

    「んっ……あ……奥まで……届いて……」

    瀟洒なメイドは、恋人の腕の中で甘い吐息を漏らした。

    「……もっと……貴方を感じさせてくださいまし……」

    「ふぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の首に腕を回し、しがみついた。

    「こんな風に抱かれていると……時を止めたくなりますわ……」

    「ずっと……このまま……貴方と……」

    %CALLNAME:MASTER%の動きに合わせて、%CALLNAME:TARGET%も腰を動かし始める。

    「あ……んっ……深い……気持ちいい……」

    「お嬢様より……今は、貴方のことだけ……考えていますわ……」

    「……んぅ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げ、潤んだ瞳で微笑んだ。

    「メイドとしてではなく……女として、貴方に抱かれていますの……」

    %CALLNAME:MASTER%の腰が深く沈むたび、%CALLNAME:TARGET%の喘ぎが甘くなる。

    「あっ……そこ……すごく……」

    「完璧でなくても……構いませんわ、今だけは……」

    %CALLNAME:TARGET%は恋人だけに見せる、蕩けた表情を浮かべていた。

    「……あ……%CALLNAME:MASTER%、キス……して……」

    %CALLNAME:TARGET%は繋がったまま、%CALLNAME:MASTER%に唇を求めた。

    「んちゅ……ん……」

    唇を重ねながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を深く受け入れていく。

    「……好き……ですわ……%CALLNAME:MASTER%……」

    「こうしていると……私、本当に幸せですの……」

    完璧なメイドの仮面の下、恋する乙女の素顔が輝いていた。
