- id: talent_3_1
  content: >-
    「こ、この体勢……顔見られないから、ちょっとマシ……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に背を向けて座らされている。

    「べ、別に安心してるわけじゃないからね……」

    しかし声は明らかにほっとしているように聞こえる。

    「んっ……後ろから来た……あ……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の腕に身を委ねた。

    「ちょ……胸、触んないでよ……っ」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の手を払おうとするが、力が入らない。

    「後ろからなんて……卑怯じゃない……」

    %CALLNAME:人物_チルノ%の体が%CALLNAME:MASTER%の動きに合わせて揺れている。

    「んあっ……で、でも……嫌いじゃ……ない……」

    小さな声で、%CALLNAME:人物_チルノ%は本音を漏らした。

    「はぁっ……あ……この体勢……奥まで……」

    %CALLNAME:人物_チルノ%は甘い声を漏らし、慌てて口を押さえた。

    「っ……顔見えないと思って、変な声出しちゃった……」

    %CALLNAME:人物_チルノ%の耳が真っ赤になっている。

    「んっ……もう……%CALLNAME:MASTER%のせいだからね……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに%CALLNAME:MASTER%に体を預けた。

    「……%CALLNAME:MASTER%、あんまり強く抱きしめないでよ」

    %CALLNAME:人物_チルノ%は恥ずかしそうに俯いている。

    「こうしてると……なんか……安心するから……」

    %CALLNAME:人物_チルノ%は小さく揺れながら、%CALLNAME:MASTER%の腕に触れた。

    「……っ、離れるのは……やだ……」

    後ろを向いているから言える、素直な言葉だった。
