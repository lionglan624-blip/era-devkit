- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%の、お口でしてあげるね？」

    %CALLNAME:TARGET%は嬉しそうに%CALLNAME:MASTER%の前に跪いた。

    小さな口を開けて、%CALLNAME:MASTER%の一物を頬張る。

    「んっ……んむ……おっきい……」

    %CALLNAME:TARGET%は一生懸命に舌を動かしながら、%CALLNAME:MASTER%を見上げた。

    「れろ……ちゅる……気持ちいい……？」

    妖精の小さな口が、懸命に%CALLNAME:MASTER%を咥え込んでいる……

    「今日もあたしのお口、使っていいよ？」

    %CALLNAME:TARGET%は満面の笑みで%CALLNAME:MASTER%の股間に顔を近づけた。

    「あむっ……ん、ちゅ……おいしい……」

    %CALLNAME:TARGET%は慣れた様子で%CALLNAME:MASTER%の一物を舐め始めた。

    「じゅる……れろれろ……%CALLNAME:MASTER%の、好き……」

    嬉しそうに%CALLNAME:TARGET%は舌を這わせている。

    「んふふ……あたしのお口で、いっぱい気持ちよくなってね……」

    「%CALLNAME:MASTER%……あたし、もっと上手にしたいの……」

    %CALLNAME:TARGET%は真剣な表情で%CALLNAME:MASTER%の一物に口づけた。

    「だから……いっぱい練習させてね？」

    小さな口が%CALLNAME:MASTER%のものを包み込み、ゆっくりと吸い上げる。

    「ちゅぅ……んむ……ここ、舐めると気持ちいいって……」

    %CALLNAME:TARGET%は裏筋を舌先でなぞりながら、期待に満ちた目で見上げた。

    「……ね、あたし、ちゃんとできてる……？」

    「あ……%CALLNAME:MASTER%の、元気いっぱいだね……えへへ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の一物を愛おしそうに見つめた。

    「あたしがペロペロすると、もっと元気になるかな……？」

    %CALLNAME:TARGET%は嬉しそうに%CALLNAME:MASTER%の一物を口に含んだ。

    「んっ……ちゅる……ぴくってした……かわいい」

    %CALLNAME:TARGET%はくすくす笑いながら、優しく舐め上げている。

    「%CALLNAME:MASTER%……大好き。いっぱい出していいよ……？」
