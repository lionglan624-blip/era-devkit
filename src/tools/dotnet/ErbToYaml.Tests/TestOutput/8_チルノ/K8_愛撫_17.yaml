- id: fallback
  content: >-
    「――は!?　なにそれ!?　あたいの中に何入れる気!?」

    %CALLNAME:TARGET%は警戒しながら後ずさった。

    「あたいに変なことしたら凍らせ……ひゃっ!?」

    振動が始まり、体の奥を刺激される。

    「な、なによこれ!?　中で震えてる!?　やだ、やめて!」

    %CALLNAME:TARGET%は慌てて逃げようとした。

    「――ちょっと、なに持ってんのよ!　怪しいわね!」

    %CALLNAME:TARGET%は睨みつけながらも、動きが遅れた。

    「あたいに何するつもり……っ!?　中に……っ!」

    バイブの振動が体の奥を襲う。

    「やっ、やだ!　そこはダメ!　変なの入れないでよ!」

    最強の氷精は、未知の刺激に抵抗を示した。

    「――あたいは最強なんだから、そんなのに負けないわよ!」

    %CALLNAME:TARGET%は強気に言い放った。

    しかしバイブが挿入されると、

    「っ!?　ちょ、待っ……中で震え……っ、うそ……っ」

    「こ、こんなのずるいわよ!　あんた卑怯!」

    予想外の刺激に、%CALLNAME:TARGET%は悔しそうに叫んだ。

    「――なによ、また変なことするつもり?」

    %CALLNAME:TARGET%は不信感を隠さずに言った。

    バイブの振動が体の奥で始まると、

    「ひぁっ!?　ちょ、中……っ、なんで中で……っ!」

    「あ、あんたなんか……っ、最強のあたいが……こんなので……っ」

    抵抗しながらも、%CALLNAME:TARGET%の体は正直に反応していた。
