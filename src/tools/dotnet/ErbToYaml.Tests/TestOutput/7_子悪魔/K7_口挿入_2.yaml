- id: talent_3_1
  content: >-
    「え、えっと……お、おっぱいで……するの……？」

    %CALLNAME:TARGET%は真っ赤になりながら、おずおずと%CALLNAME:MASTER%のものに胸を近づけた。

    「あたしのおっぱい、小さいけど……大丈夫かな……」

    %CALLNAME:TARGET%は困惑しながらも、胸で挟もうとした。

    「んっ……熱い……こんなに硬いんだ……」

    小さな胸で精一杯挟もうとしている。

    「……%CALLNAME:MASTER%、気持ちいい……ですか……？」

