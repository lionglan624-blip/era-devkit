    %CALLNAME:TARGET%は興味深そうに%CALLNAME:MASTER%の一物を見つめた。

    「……文献にはあったわ……研究として、試してみるわ……」

    %CALLNAME:TARGET%は言い訳をしながら、おそるおそる足を伸ばした。

    「……ん……足裏で触れると、熱いのね……」

    学者として観察しながら、%CALLNAME:TARGET%は足を動かし始めた。

    「……ふむ……足で挟むと反応が変わるのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を観察しながら足を動かしている。

    「……圧力と速度……足の使い方……変数が多いわ……」

    %CALLNAME:TARGET%は学者らしく分析していた。

    「……でも、なぜか胸が騒ぐの……これは何かしら……」

