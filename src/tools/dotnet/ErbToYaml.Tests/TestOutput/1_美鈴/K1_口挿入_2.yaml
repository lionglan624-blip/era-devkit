- id: talent_3_1
  content: >-
    「……む、胸で……するの……？」

    %CALLNAME:人物_美鈴%は顔を真っ赤にして、胸元に手をやった。

    「……そ、そういうの……したことないけど……」

    おずおずと胸を寄せ、%CALLNAME:人物_美鈴%は一物を挟み込んだ。

    「……わ、熱い……こ、こうすればいいの……？」

    ぎこちない動きで胸を上下させながら、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の反応を窺った。

    「……変じゃ、ない……？　私の胸、そんなに大きくないけど……」

    「……%CALLNAME:MASTER%が、してほしいって言うから……」

    %CALLNAME:人物_美鈴%は照れ隠しに言い訳をしながら服を開いた。

    「……嫌じゃ、ないから……やってあげる……」

    胸で一物を挟み、%CALLNAME:人物_美鈴%は懸命に動かし始めた。

    「……ん……滑りが……先端から、なんか出てる……」

    先走りでぬるりと滑る感触に、%CALLNAME:人物_美鈴%は顔を赤くした。

    「……こう……？　教えて、もっと上手にしたいから……」

    「……ほ、ほら……私だって、これくらい……」

    %CALLNAME:人物_美鈴%は強がるように言いながら、胸を露わにした。

    しかしその動きはまだぎこちなく、頑張りが伝わってくる。

    「……ふ、ん……乳首が擦れて……変な感じ……」

    %CALLNAME:人物_美鈴%は自分の快感に驚いた顔をした。

    「……で、でも……%CALLNAME:MASTER%が喜んでくれるなら……」

    「……もう少し、続けてあげても……いい、かな……」

    「……%CALLNAME:MASTER%……私の胸で、いいの……？」

    %CALLNAME:人物_美鈴%は不安そうに見上げた。

    「……門番なんかの私が……こんなこと……」

    躊躇いながらも、%CALLNAME:人物_美鈴%は胸で一物を包んだ。

    「……ん……%CALLNAME:MASTER%がそれでいいなら……頑張る……」

    %CALLNAME:人物_美鈴%は覚悟を決めたように胸を動かし始めた。

    「……私……一生懸命、するから……」
