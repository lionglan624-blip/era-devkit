character: 魔理沙
situation: K10_会話親密
entries:
- id: fallback
  content: >-
    「――%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は甘えるように%CALLNAME:MASTER%を見上げた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の唇にそっと口付けた。

    「ん……ちゅ、れろ……んむ……」

    %CALLNAME:TARGET%は目を閉じて、%CALLNAME:MASTER%の唇を受け入れている。

    しばらく互いの舌を絡め合ってから、二人は唇を離した。

    「はぁっ……はぁ……%CALLNAME:MASTER%のキス、星が見えるぜ……」

    普通の魔法使いは蕩けた表情で、自分から%CALLNAME:MASTER%の首に腕を回した。

    「――%CALLNAME:MASTER%、キス……してくれよ」

    %CALLNAME:TARGET%が珍しく素直にお願いしてきた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の顎を持ち上げ、深く口付けた。

    「んっ……ちゅる……れろ、ん……」

    %CALLNAME:TARGET%と%CALLNAME:MASTER%は熱く深く口付け合っている。

    「ぷはっ……はぁ、はぁっ……%CALLNAME:MASTER%……最高だぜ……」

    %CALLNAME:TARGET%は頬を紅潮させ、蕩けた顔で%CALLNAME:MASTER%を見つめている。

    「……こういうの、%CALLNAME:MASTER%とじゃなきゃ嫌だからな」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%を抱き寄せ、唇を重ねた。

    「んむ……ちゅ、ちゅる……れろ……」

    二人は長い時間、互いの唾液を味わうように口付けを交わした。

    「……ん、ぷはっ……はぁっ、はぁっ……」

    %CALLNAME:TARGET%は唇を離すと、熱に浮かされたような表情をしている。

    「%CALLNAME:MASTER%……私、%CALLNAME:MASTER%のこと、大好きだぜ……」

    「……死ぬまで一緒にいてくれよな。約束だ」

    普通の魔法使いは、照れ隠しのように%CALLNAME:MASTER%の胸に顔を埋めた。

    「――なぁ、%CALLNAME:MASTER%……もっと、近くに来てくれよ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の服を引っ張った。

    %CALLNAME:MASTER%が近づくと、%CALLNAME:TARGET%から唇を重ねてきた。

    「ちゅ……れろ……んむ、ぢゅる……」

    %CALLNAME:TARGET%は自分から舌を絡め、貪るようにキスを続けた。

    「……ぷはっ……はぁ、はぁっ……」

    「私からするキス、%CALLNAME:MASTER%に効いてるか？」

    金髪の魔法使いは、いたずらっぽく笑いながらも頬を染めていた。
