- id: fallback
  content: >-
    「……それ、何？　小さいキャップみたいなのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にあるクリキャップを見つめた。

    「私のそこに……付けるの？　ふぅん……変なの」

    %CALLNAME:人物_フラン%は興味を示しながらも、身構えていた。

    振動が伝わると、%CALLNAME:人物_フラン%は目を丸くした。

    「っ……！　なにこれ……直接震えてる……変な感じなのさ」

    「あっ……これ……そこに付けるの……？」

    %CALLNAME:人物_フラン%はクリキャップを見て、少し顔を赤くした。

    「恥ずかしいんだけど……まあ、%CALLNAME:MASTER%がそうしたいなら……」

    キャップが装着され、振動が始まると、%CALLNAME:人物_フラン%は声を詰まらせた。

    「んっ……！　そ、そこ、敏感……なのさ……」

    495年の孤独を知る少女は、困惑しながらも逃げようとはしなかった。

    「ひゃっ……！」

    %CALLNAME:人物_フラン%はクリキャップの振動に、小さく声を上げた。

    「び、びっくりした……そんなところに直接……変態なのさ」

    %CALLNAME:人物_フラン%は非難するように言ったが、その声には力がなかった。

    「……%CALLNAME:MASTER%は、私をどうしたいの？」

    その問いには、警戒よりも純粋な好奇心が滲んでいた。

    「……ふぅん」

    %CALLNAME:人物_フラン%はクリキャップを興味深そうに見つめた。

    「これで何するの？　……ああ、そこにかぶせるんだ」

    %CALLNAME:MASTER%が装着して電源を入れると、%CALLNAME:人物_フラン%は身を震わせた。

    「……んっ……直接当たってる……変なのさ。でも、嫌いじゃないかも」

    %CALLNAME:人物_フラン%は首を傾げながら、自分の反応を確かめていた。
