- id: fallback
  content: >-
    「――その、%CALLNAME:MASTER%？」

    「その……手……手を……」

    珍しく%CALLNAME:TARGET%は顔を紅くしている。

    その手は空を掴んでいて。

    %CALLNAME:MASTER%はその手を取った。

    「……まあ、いいけどさ。凍っても知らないわよ？」

    おずおずと手を差し出す%CALLNAME:TARGET%は、どこか嬉しそうだった。

    「……何するのよ？」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の髪に触れた。

    %CALLNAME:TARGET%は困惑した表情で%CALLNAME:MASTER%を見つめている。

    「……髪に興味があるの？ 変なやつね」

    されるがままに髪を撫でられながら、%CALLNAME:TARGET%は小首を傾げた。

    「……まあ、嫌じゃないけどさ」

    「あっ……%CALLNAME:MASTER%……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の肩に手を置いた。

    「ん……あっ、そこは……」

    %CALLNAME:TARGET%は体を触る%CALLNAME:MASTER%の手に抵抗の色を見せている。

    といっても、その抵抗も微々たる物。

    「……変な感じ。あったかいわね」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の青い髪に顔を近づけ、ふわりと匂いを嗅いだ。

    「ひゃっ……な、何してるのよ！」

    %CALLNAME:TARGET%は目を丸くして%CALLNAME:MASTER%を見上げている。

    「あたいの髪なんて……冷たいだけでしょ？」

    だが、嫌そうな素振りはなく、されるがままになっている。

    「……まあ、嗅ぐだけなら、許してあげてもいいけど」

    %CALLNAME:TARGET%は小さな声でそう呟いた。
  priority: 2
- id: fallback
  content: >-
    「――あの、あまりぺたぺた体を触らないでくれる？」

    %CALLNAME:TARGET%は拒絶の声を上げた。

    「触りたいの？ あたいを？」

    「……凍らせちゃうかもしれないけど、いいの？」

    %CALLNAME:TARGET%の周囲に、冷たい空気が漂い始めた。

    「……もっと仲良くなってからにしなさいよね！」

    「……ふぅん」

    %CALLNAME:MASTER%が近づくと、%CALLNAME:TARGET%は警戒するようにこちらを見た。

    「あたいに触りたいなんて、変わってるわね」

    「最強のあたいに馴れ馴れしくするなんて、いい度胸じゃない」

    %CALLNAME:TARGET%は威嚇するように冷気を纏った。

    「……まあ、悪い奴じゃなさそうだけどね」

    「ひゃっ！？ 何すんのよ！」

    %CALLNAME:MASTER%が手を伸ばすと、%CALLNAME:TARGET%は飛び退いた。

    小さな体から冷気が放たれる。

    「あたいに触っていいのは、認めた奴だけなんだからね！」

    %CALLNAME:TARGET%は腕を組んで、威嚇するように%CALLNAME:MASTER%を睨んでいる。

    「……まあ、いつか認めてあげてもいいけど。今じゃないわよ！」

    「……なによ、じっと見て」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の視線に気づいて、眉をひそめた。

    「あたいの顔に何かついてる？」

    %CALLNAME:MASTER%が手を伸ばすと、%CALLNAME:TARGET%はさっと身を引いた。

    「……触りたいなら、もっと強くなってから来なさいよね」

    氷の妖精は尊大な態度を崩さなかったが、その頬はほんのり赤かった。
  priority: 1
