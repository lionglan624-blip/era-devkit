- id: fallback
  content: >-
    「な……っ！　後ろから何すんのよ！」

    %CALLNAME:人物_チルノ%は無理やり%CALLNAME:MASTER%の膝に座らされ、もがいていた。

    「見えないし……離しなさいってば！」

    しかし後ろから抱きすくめられ、逃げられない。

    「やっ……入って……くる……っ」

    %CALLNAME:人物_チルノ%は強がりながらも、声が震えていた。

    「ちょっ……！　胸触るんじゃないわよ……！」

    %CALLNAME:人物_チルノ%は後ろから胸を掴まれ、顔を歪めている。

    「あたいを誰だと思ってんの……凍らせる……わよ……」

    しかし冷気を放つ余裕もないようだ。

    「んっ……や……後ろからなんて……卑怯……っ」

    %CALLNAME:人物_チルノ%の目には不安の色が浮かんでいた。

    「やめ……っ！　後ろ……見えない……怖い……！」

    %CALLNAME:人物_チルノ%は後ろから犯されながら、必死に振り向こうとしている。

    「こんなの……ずるい……っ」

    %CALLNAME:人物_チルノ%の目には涙が滲んでいる。

    「……っ、最強なのに……こんな……」

    いつもの自信は完全に失われていた。

    「……」

    %CALLNAME:人物_チルノ%は無言で%CALLNAME:MASTER%から離れようとしている。

    「あんた……覚えてなさいよ……」

    後ろから抱きすくめられ、%CALLNAME:人物_チルノ%は歯を食いしばっていた。

    「……絶対に……仕返しする……」

    震える声だったが、瞳には強い意志が宿っていた。
