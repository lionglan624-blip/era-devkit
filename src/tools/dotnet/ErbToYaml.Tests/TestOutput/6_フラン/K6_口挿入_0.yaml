character: フラン
situation: K6_口挿入
entries:
- id: fallback
  content: >-
    「ねえ、%CALLNAME:MASTER%……触っても、いい……？」

    %CALLNAME:人物_フラン%はおずおずと恋人のそれに手を伸ばした。

    繊細な指が触れた瞬間、その熱さに目を丸くする。

    「わぁ……こんなに熱いんだ……私の手、冷たくない？」

    %CALLNAME:人物_フラン%は力加減を確かめながら、ゆっくりと上下に動かし始めた。

    「壊さないように……でも、気持ちよくなってほしいの……」

    495年間何も壊さずにいられなかった少女は、今度こそと祈るように奉仕していた。

    「%CALLNAME:MASTER%のここ……私のために、こんなになったの？」

    %CALLNAME:人物_フラン%は嬉しそうに微笑みながら、両手で包み込んだ。

    その表情には、かつての狂気は欠片もない。

    「ふふ……なんだか、すっごく愛おしいのさ」

    %CALLNAME:人物_フラン%は愛しむように手を動かした。時折、親指で先端を撫でる。

    「ねぇ……気持ちいい？　……そう、よかった……」

    恋人の快感が、そのまま自分の幸せになっていた。

    「こうして%CALLNAME:MASTER%に触れてると……繋がってるって、感じるの」

    %CALLNAME:人物_フラン%は恋人の隣に寄り添いながら、手を動かしていた。

    地下室の孤独を知る少女にとって、触れ合いは何よりの証。

    「んふふ……%CALLNAME:MASTER%の反応、わかるようになってきたのさ」

    %CALLNAME:人物_フラン%は得意げに、緩急をつけて奉仕する。

    「もっと……もっと気持ちよくしてあげたいな……」

    その言葉には、純粋な愛情が込められていた。

    「%CALLNAME:MASTER%……大好き……」

    %CALLNAME:人物_フラン%は恋人に身を寄せながら、手淫を続けていた。

    紅い瞳は%CALLNAME:MASTER%だけを映し、細い指は優しく動き続ける。

    「こうしてると……私が私でいられる気がするの……」

    %CALLNAME:人物_フラン%は時折顔を上げて、恋人の表情を確認する。

    「ねぇ……出そうになったら、教えて？　ちゃんと受け止めてあげるから……」

    悪魔の妹は、恋人への奉仕に心から満たされていた。
  priority: 4
- id: talent_3_1
  content: >-
    「えっ……こ、これを触るの……？」

    %CALLNAME:人物_フラン%は興味と戸惑いの混じった表情で、%CALLNAME:MASTER%のそれを見つめた。

    おそるおそる指先で触れると、その硬さと熱さに驚く。

    「わ……すっごく硬い……生き物みたい……」

    %CALLNAME:人物_フラン%はそっと手を添えて、上下に動かし始めた。

    「こ、こうすればいいの？　……変な遊びなのさ……」

    初めての経験に、%CALLNAME:人物_フラン%の頬は真っ赤に染まっていた。

    「ふぅん……%CALLNAME:MASTER%、私が触ると、こんな顔するんだ……」

    %CALLNAME:人物_フラン%は面白そうに、手の動きを変えてみる。

    強く握ったり、弱くしたり、その反応を楽しんでいる。

    「ふふ……なんだか、%CALLNAME:MASTER%を支配してる気分なのさ」

    %CALLNAME:人物_フラン%はいたずらっぽく笑いながら、動きを速めた。

    「ねぇ……もっと気持ちいい顔、見せてよ……」

    その言葉には、独占欲と好奇心が滲んでいた。

    「%CALLNAME:MASTER%のここ……私だけのもの、だよね……？」

    %CALLNAME:人物_フラン%は確認するように問いかけながら、手を動かしていた。

    他の誰かに触られることを想像し、表情が少しだけ曇る。

    「……私以外の誰かにさせたら、許さないからね……」

    %CALLNAME:人物_フラン%は少し強めに握り、独占を主張した。

    「ふふ……冗談だよ……半分だけ……」

    その冗談は、冗談になりきれていなかった。

    「あ……%CALLNAME:MASTER%、ぴくって動いた……」

    %CALLNAME:人物_フラン%は手の中の反応に興味津々の様子だった。

    まるで新しい玩具を見つけた子供のように、目を輝かせている。

    「もっと触ってあげようか？　私、上手になりたいのさ」

    %CALLNAME:人物_フラン%は真剣な表情で、%CALLNAME:MASTER%を喜ばせようと努力していた。

    「ね……気持ちいい？　……うん、もっと頑張るね……」

    恋慕の少女は、愛しい人への奉仕に夢中だった。
