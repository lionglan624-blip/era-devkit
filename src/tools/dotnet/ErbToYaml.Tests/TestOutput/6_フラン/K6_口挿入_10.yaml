- id: fallback
  content: >-
    「ふふ……上からだと、%CALLNAME:MASTER%の顔がよく見えるのさ」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%に跨った。

    後ろを当てると、紅い瞳を輝かせる。

    「入れてあげる……私の後ろ、どんな感じ？」

    %CALLNAME:人物_フラン%は容赦なく腰を落とした。

    「ん……入った……後ろで繋がってるの、面白いのさ」

    悪魔の妹は、獲物を上から見下ろす狩人のような笑みを浮かべていた。

    「上から見てると……%CALLNAME:MASTER%が逃げられないのがよく分かるね」

    %CALLNAME:人物_フラン%は楽しそうに腰を動かした。

    後ろで%CALLNAME:MASTER%を受け入れたまま、手首を押さえつける。

    「こうしてると……%CALLNAME:MASTER%の顔、見逃さないのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の顔を観察しながら腰を揺らした。

    「きゅっとしてドカーン……でも、まだもうちょっと遊ぼうね」

    495年の孤独を知る少女は、危険な好奇心で獲物を弄んでいた。

    「へえ……上からだと、こうして深く入るんだ」

    %CALLNAME:人物_フラン%は発見したように呟いた。

    後ろで%CALLNAME:MASTER%を受け入れながら、反応を観察する。

    「%CALLNAME:MASTER%……顔が歪んでる。気持ちいいの？」

    %CALLNAME:人物_フラン%は興味深そうに腰を動かした。

    「まだ壊れないでね……後ろで繋がってると面白いから」

    悪魔の妹は、玩具を上から弄ぶ子供のような目をしていた。

    「ふふ……私が上にいると、%CALLNAME:MASTER%は何もできないね」

    %CALLNAME:人物_フラン%は満足げに%CALLNAME:MASTER%を見下ろした。

    後ろで受け入れたまま、ゆっくりと腰を上下させる。

    「地下室では……こうして誰かの上に乗ることなんてなかったのさ」

    %CALLNAME:人物_フラン%は紅い瞳を輝かせながら動いた。

    「後ろでもいいよ……%CALLNAME:MASTER%の顔がよく見えるもんね」

    495年の孤独を知る少女は、支配する快感に酔いしれていた。
