- id: fallback
  content: >-
    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%の胸に手を伸ばした。

    「……何をしているの」

    %CALLNAME:人物_パチュリー%は冷たい目で%CALLNAME:MASTER%を見据えた。

    「私の体に触れる権利があるとでも思っているの？」

    %CALLNAME:人物_パチュリー%は魔法で%CALLNAME:MASTER%の手を払いのけた。

    「身の程を弁えなさい。出ていって」

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%に近づいた。

    %CALLNAME:人物_パチュリー%は本から顔を上げ、冷ややかな視線を向けた。

    「……その手は何のつもりかしら」

    %CALLNAME:人物_パチュリー%は淡々と言った。

    「私の体に触れようなんて……無礼にも程があるわ」

    「今すぐこの場から去りなさい」

    %CALLNAME:MASTER%の手が%CALLNAME:人物_パチュリー%に近づいた。

    「やめなさい」

    %CALLNAME:人物_パチュリー%は魔法で%CALLNAME:MASTER%の動きを止めた。

    「私と親しくもないのに、胸に触ろうだなんて」

    「その図々しさには呆れるわ」

    %CALLNAME:人物_パチュリー%は冷淡に言い放った。

    「……」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の動きに気づき、本を閉じた。

    「私の体に触れようとしているの？」

    %CALLNAME:人物_パチュリー%は淡々とした声で言った。

    「そういう関係ではないでしょう」

    「出直してきなさい。百年後くらいに」
