- id: talent_3_1
  content: >-
    「ちょ、ちょっと……こんなに顔近いと、恥ずかしいんだけど……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上に座らされ、真っ赤な顔をしている。

    「べ、別に嫌じゃないけど……そんなに見つめないでよ……」

    %CALLNAME:人物_チルノ%は目を逸らしながらも、%CALLNAME:MASTER%から離れようとしない。

    「んっ……入って……くる……」

    %CALLNAME:人物_チルノ%は恥ずかしさを隠すように%CALLNAME:MASTER%の肩に顔を埋めた。

    「な、なんでこんな体勢……顔見られるじゃない……！」

    %CALLNAME:人物_チルノ%は対面座位の姿勢に文句を言いながらも、動かない。

    「んあっ……こ、こんなに密着して……恥ずかしい……」

    %CALLNAME:人物_チルノ%の頬は真っ赤に染まっている。

    「……っ、笑ったら凍らせるからね……」

    しかしその声は震えており、威嚇には程遠い。

    「はぁっ……あ……こ、この体勢……奥まで……」

    %CALLNAME:人物_チルノ%は甘い声を漏らしてしまい、慌てて口を押さえた。

    「い、今の聞かなかったことにしなさいよ！」

    正面から繋がっているせいで、表情が隠せない。

    「んっ……もう……こんな声出ちゃうのは%CALLNAME:MASTER%のせいだから……」

    %CALLNAME:人物_チルノ%は観念したように%CALLNAME:MASTER%にしがみついた。

    「……%CALLNAME:MASTER%、あんまり見ないで」

    %CALLNAME:人物_チルノ%は恥ずかしそうに目を伏せた。

    「こんな顔してるの……見られたくないんだから……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上で小さく揺れている。

    「……っ、でも……離れるのは……やだ……」

    小さな声で、%CALLNAME:人物_チルノ%は本音を漏らした。
