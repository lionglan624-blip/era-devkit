    「入ってくる……後ろ、ちゃんと……できてるかな……」

    %CALLNAME:人物_フラン%は慎重に腰を落としながら、息を詰めた。

    「壊さないように……ゆっくり動くから……%CALLNAME:MASTER%……」

    495年の孤独を知る少女は、好きな人の顔を見つめながら恥じらっていた。

    「%CALLNAME:MASTER%……こうして上から見てると、ドキドキするのさ……」

