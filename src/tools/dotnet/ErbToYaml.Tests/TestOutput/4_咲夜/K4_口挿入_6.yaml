- id: talent_3_1
  content: >-
    「……こ、こんなところを触れと……？」

    %CALLNAME:TARGET%は驚きと羞恥で顔を赤く染めた。

    「%CALLNAME:MASTER%……その……」

    しかし、拒絶の言葉は出てこなかった。

    %CALLNAME:TARGET%はおずおずと指を伸ばし、%CALLNAME:MASTER%の秘所に触れた。

    「……こ、こうで……よろしいでしょうか……」

    想い人のために、%CALLNAME:TARGET%は恥ずかしさを堪えた。

    「こんな……恥ずかしいこと……」

    %CALLNAME:TARGET%は俯きながらも、%CALLNAME:MASTER%のために指を動かしている。

    「メイドとして……こんなご奉仕は……」

    %CALLNAME:TARGET%の指が、ぎこちなく愛撫を続ける。

    「あっ……動きましたわね……」

    「……気持ちいい……ですか……？」

    戸惑いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を窺った。

    「……んっ……こんなところを触るなんて……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を恨めしそうに見上げた。

    「%CALLNAME:MASTER%は……本当に……意地悪……」

    しかし、その手は止まらなかった。

    %CALLNAME:TARGET%の指が、%CALLNAME:MASTER%の秘所を優しく撫で続ける。

    「……でも……貴方のためなら……」

    %CALLNAME:TARGET%は小声で呟きながら奉仕を続けた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は緊張しながらも、懸命に指を動かしている。

    「こうして……触っていると……」

    %CALLNAME:TARGET%の指が、%CALLNAME:MASTER%の反応を確かめるように動く。

    「……貴方のこと……もっと知れる気がしますわ……」

    問いかける声には、期待と緊張が入り混じっていた。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の顔を見つめながら奉仕を続けた。
