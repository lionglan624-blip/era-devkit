- id: fallback
  content: >-
    「……何をするの」

    %CALLNAME:TARGET%は淡々と問いかけたが、%CALLNAME:MASTER%の指が触れると息を呑んだ。

    「……まあいいわ。観察対象として、興味がないわけじゃないし」

    %CALLNAME:TARGET%は実験でも行うかのように、自分の反応を分析しようとしている。

    「……ふぅん……こういう感覚なのね……」

    しかしその声は、僅かに震えていた。

    「……っ」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の中に入った瞬間、%CALLNAME:TARGET%は小さく息を漏らした。

    「……人間の指の温度は……体温と同じはずなのに……熱く感じるわ」

    %CALLNAME:TARGET%は知識人らしい分析を試みるが、声が上擦っている。

    「……興味深いわね……もう少し……データを……」

    言葉の途中で、%CALLNAME:TARGET%は唇を噛んで黙った。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の行為を受けている。

    本を読む手は止まり、視線は虚空を彷徨っている。

    「……悪くないわ……これは……」

    %CALLNAME:TARGET%はぼそりと呟いた。

    「……でも、調子に乗らないで。私はあなたの観察対象になっているだけよ」

    そう言いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の指を拒まなかった。

    「……ん……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指に、微かに反応している。

    「……そういう行為の理論は……本で学んだけど……」

    %CALLNAME:MASTER%が指を動かすと、%CALLNAME:TARGET%の言葉が途切れた。

    「……実践と理論は……違うのね……」

    %CALLNAME:TARGET%は認めたくなさそうに、そう呟いた。
  priority: 2
- id: fallback
  content: >-
    「……何の真似かしら」

    %CALLNAME:TARGET%は冷ややかな目で%CALLNAME:MASTER%を見た。

    「私の許可なく、そんなことをするなんて」

    %CALLNAME:TARGET%は素っ気なく言い放った。

    「……まあいいわ。好きにしなさい。ただし、読書の邪魔はしないで」

    そう言って%CALLNAME:TARGET%は、本に視線を戻した。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の行為を受けている。

    その表情は読み取れないが、どこか退屈そうでもある。

    「……それで？　何が楽しいの」

    %CALLNAME:TARGET%は冷たく問いかけた。

    「……下らない行為ね。本の方がよほど面白いわ」

    「……むきゅ」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「距離感というものを学びなさい」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を睨んだが、振り払いはしなかった。

    「……勝手にしなさい。私は本を読むから」

    %CALLNAME:TARGET%は興味を失ったかのように、ページをめくり始めた。

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついた。

    「あなたは私に何を求めているの。理解に苦しむわ」

    %CALLNAME:TARGET%は呆れたような表情を浮かべている。

    「……まあいいわ。精霊魔法で追い出すのも面倒だし」

    そう言って%CALLNAME:TARGET%は、%CALLNAME:MASTER%の好きにさせた。
  priority: 1
