entries:
- id: fallback
  content: >-
    電動マッサージャの振動が%CALLNAME:TARGET%の肌に触れると、瀟洒なメイドの体が震えた。

    「あ……っ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は恥じらいながらも、%CALLNAME:MASTER%の手に身を委ねている。

    「こんな……道具を使われるなんて……」

    振動が敏感な場所に当たるたび、%CALLNAME:TARGET%は小さく喘いだ。

    「……お嬢様には……絶対に見せられない姿ですわ……」

    完璧なメイドは、恋人の前でだけ崩れた表情を晒していた。

    「んっ……ふぁ……そこ……」

    マッサージャが%CALLNAME:TARGET%の敏感な部分を刺激している。

    %CALLNAME:TARGET%は時を止めることも忘れ、ただ快感に酔いしれていた。

    「……%CALLNAME:MASTER%……いじわるですわ……」

    そう言いながらも、%CALLNAME:TARGET%は逃げようとしない。

    「……もっと……お願い……」

    普段の冷静さはどこへやら、%CALLNAME:TARGET%は甘い声で囁いた。

    電動マッサージャの振動音が部屋に響いている。

    「あっ……やぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみつきながら、振動を受け止めていた。

    「こんな……機械なんかで……」

    %CALLNAME:TARGET%の言葉は、快感に遮られて途切れる。

    「……でも……貴方がしてくれるなら……」

    恋人への信頼が、%CALLNAME:TARGET%の羞恥を溶かしていた。

    「……っ……んんっ……」

    %CALLNAME:MASTER%が操るマッサージャに、%CALLNAME:TARGET%は声を堪えきれなかった。

    「こんな……はしたない声を……」

    %CALLNAME:TARGET%は顔を赤らめながらも、体は正直に反応している。

    「%CALLNAME:MASTER%……私、おかしくなってしまいそう……」

    %CALLNAME:TARGET%は恋人に甘えるように、その腕を掴んでいた。

    「……責任、取ってくださいまし……」
  priority: 4
- id: talent_3_1
  content: >-
    電動マッサージャの振動が%CALLNAME:TARGET%に触れた瞬間、その体がびくりと跳ねた。

    「っ……%CALLNAME:MASTER%、何を……」

    %CALLNAME:TARGET%は抗議しようとしながらも、振動に体が反応してしまう。

    「……こんな道具で……私を……」

    完璧を誇るメイドの仮面が、少しずつ崩れていく。

    「……困りますわ……本当に……」

    そう言いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の手を振り払わなかった。

    「あっ……やめ……いえ……」

    マッサージャの振動に、%CALLNAME:TARGET%は言葉を失いかけた。

    「……%CALLNAME:MASTER%は、本当に意地悪ですわね……」

    %CALLNAME:TARGET%は恨めしそうな視線を向けながらも、逃げようとはしない。

    「……こんな機械に負けるなんて……メイドとして……」

    %CALLNAME:TARGET%の声には、隠しきれない甘さが滲んでいた。

    振動がじわりと%CALLNAME:TARGET%の体に染み込んでいく。

    「んっ……そんな……」

    %CALLNAME:TARGET%は目を細め、小さく息を漏らした。

    「……感じてなんか……いませんわ……」

    そう言う%CALLNAME:TARGET%の体は、明らかに振動に酔いしれている。

    「……少しだけ……少しだけですわよ……」

    %CALLNAME:TARGET%は諦めたように、マッサージャを受け入れた。

    「……っ……」

    電動マッサージャの振動に、%CALLNAME:TARGET%は声を押し殺していた。

    「……%CALLNAME:MASTER%……どうして、こんなことを……」

    %CALLNAME:TARGET%の問いかけは、振動に遮られて消える。

    「お嬢様のお世話が……あるのに……」

    %CALLNAME:TARGET%は顔を背けながらも、%CALLNAME:MASTER%から離れようとはしなかった。
