- id: talent_3_1
  content: >-
    「……あ、足で……するの……？」

    %CALLNAME:人物_美鈴%は顔を真っ赤にして、一物を見つめた。

    「……そ、そういうの……したことないけど……」

    おずおずと足を伸ばし、%CALLNAME:人物_美鈴%は恐る恐る一物に触れた。

    「……わ、熱い……こ、こうすればいいの……？」

    ぎこちない動きで足を動かしながら、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の反応を窺った。

    「……変じゃ、ない……？　ちゃんとできてる……？」

    「……%CALLNAME:MASTER%が、してほしいって言うから……」

    %CALLNAME:人物_美鈴%は照れ隠しに言い訳をしながら、足を一物に添えた。

    「……嫌じゃ、ないから……やってあげる……」

    %CALLNAME:人物_美鈴%の足が、ぎこちなく一物を挟み込んだ。

    「……ん……こうやって動かすと、気持ちいいの……？」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の反応を窺いながら足を動かした。

    「……教えてよ……もっと上手にしたいから……」

    「……ほ、ほら……私だって、これくらい……」

    %CALLNAME:人物_美鈴%は強がるように言った。

    しかしその足つきはまだぎこちなく、頑張りが伝わってくる。

    「……ぴくってした……気持ちいいの……？」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の反応に顔を赤くした。

    「……で、でも……嬉しそうな顔してくれると……」

    「……もう少し、続けてあげてもいい、かな……」

    「……%CALLNAME:MASTER%……私の足で、いいの……？」

    %CALLNAME:人物_美鈴%は不安そうに問いかけた。

    「……門番なんかの私が……こんなこと……」

    %CALLNAME:人物_美鈴%の足は震えながらも止まらなかった。

    「……でも……%CALLNAME:MASTER%がそれでいいなら……」

    %CALLNAME:人物_美鈴%は覚悟を決めたように足を動かし続けた。

    「……私……一生懸命、するから……」
