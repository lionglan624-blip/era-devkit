    「そんな……急に……心の準備が……」

    戸惑いながらも、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%から離れようとはしない。

    「……もう、しょうがないですわね……」

    諦めたように、%CALLNAME:人物_小悪魔%は小さくため息をついた。

    「んっ……そ、そこは……」

    %CALLNAME:人物_小悪魔%は控えめに身をよじった。

    「%CALLNAME:MASTER%……本当にいたずらっ子ですのね……」

    %CALLNAME:人物_小悪魔%は困ったような、しかしどこか嬉しそうな表情を見せた。

