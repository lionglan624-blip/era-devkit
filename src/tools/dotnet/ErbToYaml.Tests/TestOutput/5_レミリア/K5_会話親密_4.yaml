- id: fallback
  content: >-
    「――ん？　……お茶を淹れてくれたの？」

    %CALLNAME:人物_レミリア%は少し意外そうに湯飲みを受け取った。

    「いただくわ」

    そう言って、静かにお茶を口に含む。

    「……まあまあね。気遣いは認めてあげるわ」

    %CALLNAME:人物_レミリア%は淡々と言いながらも、湯飲みを手放さなかった。

    「私に？　……ふぅん、いいわ、もらっておくわ」

    %CALLNAME:人物_レミリア%は少し遠慮がちに湯飲みを手に取った。

    ずず、とお茶を啜る音が静かに響く。

    「……悪くはないわね。精進しなさい」

    %CALLNAME:人物_レミリア%は素っ気なく言ったが、湯飲みは空になっていた。

    「――お茶？　……そう、いただくわ」

    %CALLNAME:人物_レミリア%は湯飲みを受け取り、香りを確かめた。

    静かに口をつけ、ゆっくりと味わう。

    「……ふむ、及第点ね」

    %CALLNAME:人物_レミリア%は小さく頷いた。

    「次はもう少し温度に気を配りなさい」

    厳しい評価だが、湯飲みは最後まで飲み干されていた。

    「――あら、お茶を淹れてくれたの」

    %CALLNAME:人物_レミリア%は淡々と湯飲みを受け取った。

    紅い瞳が%CALLNAME:MASTER%を一瞥し、すぐに茶へと戻る。

    「……普通ね。でも、悪くはないわ」

    そう言って、%CALLNAME:人物_レミリア%は静かにお茶を啜った。

    「……使用人としての心得は持っているようね」

    「精進しなさい。私を満足させられるようになれば、認めてあげるわ」
