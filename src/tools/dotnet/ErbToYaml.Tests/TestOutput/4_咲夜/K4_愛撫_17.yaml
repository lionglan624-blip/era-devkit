entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%がアナルビーズを取り出すと、%CALLNAME:TARGET%は僅かに目を見開いた。

    「……また、そのような道具を……」

    %CALLNAME:TARGET%は恥じらいながらも、自ら四つんばいの体勢を取った。

    珠が一つずつ後孔に飲み込まれるたび、%CALLNAME:TARGET%は小さく声を漏らす。

    「んっ……入って……一つずつ……」

    完璧なメイドは、恋人の前でだけ後孔を晒す恥ずかしさに頬を染めていた。

    「あっ……また一つ……入りましたわ……」

    アナルビーズの珠が、%CALLNAME:TARGET%の後孔を一つずつ押し広げていく。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕にしがみつき、甘い吐息を漏らした。

    「こんな……珠が連なった道具で……はしたないですわ……」

    異物感に身を震わせながらも、%CALLNAME:TARGET%は逃げようとしなかった。

    「%CALLNAME:MASTER%……もう……全部入ってしまいますわ……」

    アナルビーズが全て挿入され、%CALLNAME:TARGET%は息を整えていた。

    「……っ……んんっ……お腹の中に……珠が……」

    瀟洒なメイドの表情が、異物感と羞恥に蝕まれていく。

    「道具に……後ろを弄ばれるなんて……瀟洒ではありませんわ……」

    %CALLNAME:TARGET%は恋人に甘えるように、その胸に顔を埋めた。

    「……抜く時も……ゆっくりお願いいたしますわ……」

    「ふぁ……やぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は腸内の珠の存在感に、恍惚とした表情を浮かべている。

    珠が腸壁を押す感覚に、メイドの理性が揺らいでいた。

    「こんな道具で……後ろをイかされるなんて……」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らしながらも、腰は正直に震えている。

    「……もっと……奥まで……お願いいたしますわ……」
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%がアナルビーズを見せると、%CALLNAME:TARGET%は戸惑いの表情を浮かべた。

    「……それは……珠が連なった……後ろに使うものですわよね」

    %CALLNAME:TARGET%は顔を真っ赤にして俯いた。

    「そ、そのような破廉恥な道具を……私の……そこに……」

    珠が一つ挿入されると、%CALLNAME:TARGET%の体が強張る。

    「っ……異物感が……困りますわ……」

    「あっ……やめ……いえ……」

    アナルビーズの珠が次々と挿入され、%CALLNAME:TARGET%は言葉を失いかけた。

    「……こんな道具の刺激に……負けるわけには……」

    %CALLNAME:TARGET%は抗いながらも、珠の感触に抗えずにいた。

    「%CALLNAME:MASTER%は……本当に意地悪ですわね……」

    そう言いながらも、%CALLNAME:TARGET%の声には隠しきれない甘さが滲んでいた。

    挿入されたアナルビーズが%CALLNAME:TARGET%の腸内でその存在を主張している。

    「んっ……そんな……動かさないでくださいまし……」

    %CALLNAME:TARGET%は目を細め、小さく息を漏らした。

    「……感じてなんか……いませんわ……」

    そう言う%CALLNAME:TARGET%は、珠の異物感に身を震わせている。

    「……少しだけ……少しだけですわよ……」

    「……っ……」

    アナルビーズに後孔を占拠されたまま、%CALLNAME:TARGET%は声を押し殺していた。

    「……%CALLNAME:MASTER%……どうして、こんな場所を……」

    %CALLNAME:TARGET%の問いかけは、珠の存在感に遮られて消えた。

    「メイドとして……こんな姿……お嬢様には見せられませんわ……」

    %CALLNAME:TARGET%は顔を背けながらも、%CALLNAME:MASTER%から離れようとはしなかった。
