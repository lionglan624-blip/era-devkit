- id: fallback
  content: >-
    「前と後ろ、両方に入れるの……？　面白い遊びなのさ」

    %CALLNAME:人物_フラン%は首を傾げながら、二人を受け入れた。

    495年の孤独には、こんな遊びは存在しなかった。

    「%CALLNAME:MASTER%……こういうのって、普通にするものなの？」

    二人が動き始めると、%CALLNAME:人物_フラン%は目を見開いた。

    「んっ……あ……両方から……来ると……すごい……感じる……のさ」

    悪魔の妹は、未知の感覚に純粋な驚きを感じていた。

    「ふぅん……二人分の熱が、私の中にあるのさ」

    %CALLNAME:人物_フラン%は不思議そうに自分の身体を見下ろした。

    前も後ろも埋まっている感覚は、奇妙に充実している。

    「%CALLNAME:MASTER%……これ、壊れない？　私、大丈夫なの？」

    二人が交互に動くと、%CALLNAME:人物_フラン%は声を漏らした。

    「あっ……ん……交互に……くると……頭……ぼんやりする……」

    押し寄せる感覚に、悪魔の妹の思考は霞んでいった。

    「%CALLNAME:MASTER%……二人に挟まれると、逃げられないね」

    %CALLNAME:人物_フラン%は淡々と現状を確認した。

    前にも後ろにも誰かがいる。それは不思議な安心感をもたらす。

    「地下室では……一人だったから。こういうの、新鮮なのさ」

    二人が同時に腰を動かすと、%CALLNAME:人物_フラン%は吐息を漏らした。

    「んっ……ぁ……同時に……きた……すごい……頭、真っ白……」

    悪魔の妹は、二人に挟まれる感覚に戸惑いながらも身を委ねた。

    「二人の動きが……違うのさ。面白いね」

    %CALLNAME:人物_フラン%は観察するように呟いた。

    前と後ろでリズムが異なる感覚は、複雑で興味深い。

    「%CALLNAME:MASTER%……これ、慣れたら気持ちよくなるの？」

    二人が激しく動くと、%CALLNAME:人物_フラン%は声を抑えられなかった。

    「ひゃっ……あ……もう……気持ち……いいかも……両方……っ」

    快楽に正直な悪魔の妹は、素直に感想を漏らした。
