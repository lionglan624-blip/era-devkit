entries:
- id: fallback
  content: >-
    「えへへ、%CALLNAME:MASTER%♪　あたいが気持ちよくしてあげるね！」

    %CALLNAME:人物_チルノ%は嬉しそうに%CALLNAME:MASTER%の上に覆いかぶさった。

    小さな体は氷の妖精らしくひんやりと冷たいが、その冷たさが心地よい。

    「最強のあたいが%CALLNAME:MASTER%を虜にしてあげる！」

    %CALLNAME:人物_チルノ%は自信満々に腰を押し付けていく。

    「んっ……♪　%CALLNAME:MASTER%の中、あったかい……」

    氷の妖精は幸せそうに%CALLNAME:MASTER%の中へ入っていった。

    「%CALLNAME:MASTER%、あたいのこと見てて？」

    %CALLNAME:人物_チルノ%は少し恥ずかしそうに言いながら%CALLNAME:MASTER%に覆いかぶさった。

    「あたいが動いてあげるから……」

    ゆっくりと腰を進めると、%CALLNAME:人物_チルノ%は甘い声を漏らした。

    「んぅっ……はぁ……%CALLNAME:MASTER%の中、気持ちいい……」

    %CALLNAME:人物_チルノ%は頬を赤らめながら腰を動かし始めた。

    「%CALLNAME:MASTER%が気持ちよくなると……あたいも嬉しいの」

    恋人への愛情を込めて、氷の妖精は一生懸命腰を振った。

    「ねえ%CALLNAME:MASTER%、繋がってると幸せだね……」

    %CALLNAME:人物_チルノ%は甘えた声で言いながら%CALLNAME:MASTER%の上で体を揺らした。

    「%CALLNAME:MASTER%の中、あたいでいっぱいにしてあげる……」

    %CALLNAME:人物_チルノ%は恍惚とした表情で腰を動かし続けた。

    「んっ……あっ……こうすると気持ちいい？」

    氷の妖精は%CALLNAME:MASTER%の反応を確かめながら腰を振った。

    「%CALLNAME:MASTER%、大好き……ずっと一緒にいようね……」

    %CALLNAME:人物_チルノ%は愛おしそうに%CALLNAME:MASTER%を見つめた。

    「あたいが%CALLNAME:MASTER%を独り占めしてあげる！」

    %CALLNAME:人物_チルノ%は元気よく宣言して%CALLNAME:MASTER%に覆いかぶさった。

    「ふふん、最強のあたいに抱かれる幸せを味わいなさい！」

    威勢よく言いながらも、%CALLNAME:人物_チルノ%の頬は赤い。

    「んっ……はぁっ……%CALLNAME:MASTER%の中にいると……幸せ……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに俯きながら腰を動かした。

    「……%CALLNAME:MASTER%のこと、本当に愛してるからね……」

    氷の妖精は小さな声で囁いた。
  priority: 4
- id: talent_3_1
  content: >-
    「え、えっと……あたいが入れればいいの……？」

    %CALLNAME:人物_チルノ%は緊張した面持ちで%CALLNAME:MASTER%を見下ろした。

    「こ、こうすればいいんだよね……」

    恐る恐る腰を進めると、%CALLNAME:人物_チルノ%は小さく声を上げた。

    「んっ……！　あっ……入った……」

    %CALLNAME:人物_チルノ%は顔を真っ赤にしながら繋がった感覚に震えた。

    「……%CALLNAME:MASTER%のせいで、あたいこんなことに……」

    照れ隠しに文句を言いながらも、氷の妖精は嬉しそうだった。

    「……%CALLNAME:MASTER%、見ないでよ」

    %CALLNAME:人物_チルノ%は恥ずかしそうに目を逸らした。

    「こうやって……動けばいいんでしょ……」

    %CALLNAME:人物_チルノ%はぎこちなく腰を動かし始めた。

    「んぅ……あっ……%CALLNAME:MASTER%の中、あったかい……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の熱さに顔を緩めた。

    「……でも、%CALLNAME:MASTER%とこうしてるのは……嫌じゃない……」

    小さな声で呟きながら、氷の妖精は腰を振り続けた。

    「あたいだって……こういうの、できるんだから……」

    %CALLNAME:人物_チルノ%は強がりを言いながら%CALLNAME:MASTER%に覆いかぶさった。

    「んっ……はぁ……」

    繋がった瞬間、%CALLNAME:人物_チルノ%は甘い声を漏らした。

    「……%CALLNAME:MASTER%のこと……好きだから……やってあげてるんだからね」

    %CALLNAME:人物_チルノ%は顔を赤くしながら腰を揺らした。

    「ちゃんと気持ちよくなって……あたいの気持ち、わかってよ……」

    氷の妖精は照れくさそうに言った。

    「%CALLNAME:MASTER%がそうしろって言うから……」

    %CALLNAME:人物_チルノ%は困ったような顔で言いながら%CALLNAME:MASTER%に覆いかぶさった。

    「こうすると……気持ちいいの……？」

    ゆっくりと腰を進めると、%CALLNAME:人物_チルノ%は息を詰めた。

    「あっ……んっ……%CALLNAME:MASTER%の中、熱い……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%との繋がりに戸惑っていた。

    「……でも……嫌じゃないから……」

    氷の妖精は恥ずかしそうに目を伏せた。
