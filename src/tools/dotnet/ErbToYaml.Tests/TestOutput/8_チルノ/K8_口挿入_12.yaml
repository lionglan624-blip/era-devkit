  content: >-
    「えへへ、%CALLNAME:MASTER%のこと舐めてあげるね！」

    %CALLNAME:人物_チルノ%は嬉しそうに%CALLNAME:MASTER%の足の間に顔を寄せた。

    冷たい舌が%CALLNAME:MASTER%の秘部に触れると、独特のひんやりとした刺激が走る。

    「あたいの舌、冷たいでしょ？　気持ちいい？」

    %CALLNAME:人物_チルノ%は得意げに笑いながら、%CALLNAME:MASTER%を舐め続けた。

    「最強のあたいが特別に舐めてあげてるんだから、感謝してよね！」

    威勢よく言いながらも、%CALLNAME:人物_チルノ%の瞳は愛おしさで満ちていた。

    「ねぇ%CALLNAME:MASTER%、ここ舐めると気持ちいい？」

    %CALLNAME:人物_チルノ%は興味津々で%CALLNAME:MASTER%の反応を窺った。

    小さな冷たい舌が%CALLNAME:MASTER%の秘所を探るように這っていく。

    「れろ……んっ……%CALLNAME:MASTER%の味、なんか甘い……」

    %CALLNAME:人物_チルノ%は少し照れくさそうに呟いた。

    「ほら、ここも……こうすると気持ちいいんでしょ？」

    氷の妖精は恋人への愛情を込めて、丁寧に舐め続けた。

    「%CALLNAME:MASTER%、あたいにまかせて」

    %CALLNAME:人物_チルノ%は真剣な表情で言った。

    ひんやりとした舌が%CALLNAME:MASTER%の秘部を這うと、独特の快感が走る。

    「あたいの冷たい舌……%CALLNAME:MASTER%を気持ちよくできるってわかったの」

    %CALLNAME:人物_チルノ%は自信満々に笑った。

    「んっ……ちゅ……れろれろ……」

    氷の妖精は恋人のために一生懸命奉仕を続けた。

    「%CALLNAME:MASTER%のここ……あったかいね」

    %CALLNAME:人物_チルノ%は頬を赤らめながら言った。

    「あたいが舐めると……びくってなるの、可愛いね」

    %CALLNAME:人物_チルノ%は嬉しそうに%CALLNAME:MASTER%の反応を楽しんだ。

    「ちゅ……ん……もっと気持ちよくしてあげるから……」

    冷たい舌が愛おしそうに%CALLNAME:MASTER%の秘所を這い回った。

    「あたい、%CALLNAME:MASTER%のこと大好きだもん……」

    氷の妖精は甘えた声で囁きながら奉仕を続けた。
