character: レミリア
situation: K5_口挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、こんなところまで私に触らせたいの？」

    %CALLNAME:人物_レミリア%は艶やかに微笑みながら、%CALLNAME:MASTER%の後ろに回った。

    細い指が恥ずかしい場所に触れると、%CALLNAME:人物_レミリア%は嬉しそうに瞳を細めた。

    「……こんな背徳的なこと、%CALLNAME:MASTER%にしかしてあげないわよ」

    %CALLNAME:人物_レミリア%は優雅な手つきで、ゆっくりと撫で始めた。

    「……私の冷たい指、気持ちいいでしょう？」

    500年を生きた吸血鬼が、恋人のためだけに禁忌に触れていた。

    「んっ……%CALLNAME:MASTER%、ここもこんなに敏感なのね」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%の反応を観察していた。

    吸血鬼のひんやりとした指が、秘められた場所を撫でていく。

    「ククク……こうして刺激すると、声が漏れちゃうのね」

    %CALLNAME:人物_レミリア%は愛おしそうに指を動かしながら、%CALLNAME:MASTER%の表情を見つめていた。

    「……%CALLNAME:MASTER%の全部を、私のものにしてあげるわ」

    館の主は、恋人の隅々まで支配することに喜びを感じていた。

    「……ねぇ、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は指を動かしながら、甘えるような声で呼びかけた。

    「こうして恥ずかしいところを触っていると……私、興奮しちゃうのよ」

    紅魔館の主とは思えない、素直な告白だった。

    「……%CALLNAME:MASTER%の全部を知りたいの」

    %CALLNAME:人物_レミリア%は頬を染めながら、奉仕を続けた。

    500年の孤独を知る吸血鬼は、愛する者のすべてを手に入れたかった。

    「ふふ……%CALLNAME:MASTER%、可愛い声ね」

    %CALLNAME:人物_レミリア%は意地悪そうに微笑みながら、指の動きを速めた。

    「こんなところを触られて、こんなになっちゃって……」

    %CALLNAME:人物_レミリア%は時折、入り口をくすぐってみせる。

    「もっと乱れていいのよ？　今夜は私が、%CALLNAME:MASTER%を堕としてあげるわ」

    そう言いながらも、その瞳には深い愛情が宿っていた。

    「……%CALLNAME:MASTER%の恥ずかしい姿、全部見せてちょうだい」
  priority: 4
- id: talent_3_1
  content: >-
    「……こ、ここを触ればいいのね？」

    %CALLNAME:人物_レミリア%は顔を紅くしながら、%CALLNAME:MASTER%の後ろに回った。

    おそるおそる指を伸ばし、触れた瞬間、小さく息を呑む。

    「っ……こんな恥ずかしいところ……」

    %CALLNAME:人物_レミリア%はぎこちなく指を動かし始めた。

    「べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただの好奇心よ、好奇心」

    素直になれない吸血鬼は、必死に照れを隠していた。

    「ふん……こんなことで声を出すなんて、恥ずかしくないの？」

    %CALLNAME:人物_レミリア%は強がりながらも、指は止めなかった。

    「……で、でも、%CALLNAME:MASTER%が喜ぶなら……仕方ないわ」

    そう呟きながら、%CALLNAME:人物_レミリア%は指の動きを少しだけ丁寧にした。

    「……感謝しなさいよ。紅魔館の主が直々にこんなことしてあげてるんだから」

    高飛車な言葉とは裏腹に、%CALLNAME:人物_レミリア%の頬は真っ赤だった。

    「……私も恥ずかしいんだからね」

    「……%CALLNAME:MASTER%、そんな顔しないで」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の反応に、どきりとしていた。

    「……ここを触ると、そんなに気持ちいいの？」

    少し嬉しそうに、%CALLNAME:人物_レミリア%は指を動かし続けた。

    「……ふん、当然よね。私は紅魔館の主なんだから」

    そう言いながらも、%CALLNAME:人物_レミリア%はこっそり%CALLNAME:MASTER%の表情を確認していた。

    「……もう少しだけ、してあげてもいいわよ」

    「あっ……ここ、反応した……」

    %CALLNAME:人物_レミリア%は指先の反応に、興味津々の様子だった。

    「ふぅん……こうすると、もっと声が出るのね……」

    %CALLNAME:人物_レミリア%は観察するように、指の動きを変えてみる。

    「……べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただ、その……」

    言い訳が思いつかず、%CALLNAME:人物_レミリア%は口をつぐんだ。

    「……うるさいわね。黙って感じていなさい」
