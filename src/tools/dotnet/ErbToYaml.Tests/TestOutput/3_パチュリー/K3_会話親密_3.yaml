- id: fallback
  content: >-
    「……何をしているの」

    %CALLNAME:TARGET%は淡々とした声で問いかけた。

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の尻に触れている。

    「……読書の邪魔をされるのは好きじゃないわ」

    しかし、%CALLNAME:TARGET%は手を払いのけようとはしなかった。

    「……まあ、少しくらいなら、許してあげる」

    「……むきゅ」

    小さく声を漏らし、%CALLNAME:TARGET%は本から顔を上げた。

    「……そういう行為は、研究の妨げになるのだけど」

    %CALLNAME:TARGET%は冷静を装いながらも、頬がわずかに染まっている。

    「……まあ、興味深いデータではあるわね」

    知的好奇心を言い訳にしながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめた。

    「……あなた、何をしているのかしら」

    %CALLNAME:TARGET%は本を盾のように持ち上げた。

    「私に触るなんて、大胆ね」

    しかし、その声には怒りよりも困惑が滲んでいた。

    「……少しだけなら。あまり気を散らさないで」

    %CALLNAME:TARGET%は本に視線を戻しながらも、身体を固くしていた。

    「……」

    %CALLNAME:TARGET%は黙って%CALLNAME:MASTER%を見つめた。

    「……何か言いたいことがあるなら、口で言いなさい」

    %CALLNAME:MASTER%の手は%CALLNAME:TARGET%の尻に置かれたままだ。

    「……まったく。本を読む集中力が削がれるわ」

    それでも%CALLNAME:TARGET%は、その手を振り払わなかった。
  priority: 2
- id: fallback
  content: >-
    「……何かしら」

    %CALLNAME:TARGET%は本から目を離さずに言った。

    「そういう行為に興味はないのだけど」

    %CALLNAME:TARGET%は冷めた視線を向けてきた。

    「……読書の邪魔をしないでくれるかしら」

    淡々と、しかし明確な拒絶を示した。

    「……」

    %CALLNAME:TARGET%は迷惑そうに眉をひそめた。

    「魔法の実験中に気を散らさないで」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手をそっと払いのけた。

    「私には知識以外に興味がないの」

    そう言い切り、%CALLNAME:TARGET%は本に視線を戻した。

    「……無礼ね」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見つめた。

    「私の書斎で暴れないで」

    %CALLNAME:TARGET%は静かに、しかし威圧的に言い放った。

    「……この本はあなたの神社の5年分の賽銭程度の価値があるのよ」

    そう言って、%CALLNAME:TARGET%は本を抱えて離れた。

    「……何の用」

    %CALLNAME:TARGET%は本を読み続けながら問いかけた。

    「私は忙しいの。用がないなら、出て行って」

    %CALLNAME:MASTER%の手は無視されている。

    「……まあ、いいわ。勝手にしなさい」

    興味なさそうに、%CALLNAME:TARGET%は本のページをめくった。
  priority: 1
