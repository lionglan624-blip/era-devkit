    「んっ……あぁ……そんなに強く吸わないで……」

    %CALLNAME:人物_レミリア%の声は、抗議というより懇願に近かった。

    「……%CALLNAME:MASTER%のせいで、変になる……」

    「……ふん、そんなに私の胸が好きなの？」

    %CALLNAME:人物_レミリア%は強がりながら、胸を突き出した。

    「仕方ないわね……主として、お前の欲望を満たしてあげる」

    しかし%CALLNAME:MASTER%が吸い始めると、すぐに表情が崩れた。

    「あっ……んっ……ちょっと、待っ……」

    %CALLNAME:人物_レミリア%は予想以上の快楽に、声を抑えきれなかった。

    「……い、言っておくけど、これは……あぁ……」
