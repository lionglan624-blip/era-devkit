    %CALLNAME:TARGET%は困惑しながらも、足裏で挟もうとした。

    「んっ……熱い……こんなに硬いんだ……」

    小さな足で精一杯挟もうとしている。

    「……%CALLNAME:MASTER%、気持ちいい……ですか……？」

    「あの……%CALLNAME:MASTER%のために……足で、頑張ります……」

    %CALLNAME:TARGET%は緊張した面持ちで%CALLNAME:MASTER%の一物を足で挟んだ。

    「むにゅ……ぷにぷに……こういうの、初めてだから……」

    ぎこちない動きで、%CALLNAME:TARGET%は懸命に足を動かしている。

    「んしょ……こう……？」

    一生懸命な%CALLNAME:TARGET%の姿は、どこか健気だった。

    「……気持ちよくなって、くれたら……嬉しいな……」

    「は、恥ずかしいよぅ……でも……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、%CALLNAME:MASTER%の一物を足で挟んだ。

    「%CALLNAME:MASTER%が気持ちよくなるなら……あたし、頑張る……」

    小さな足裏が%CALLNAME:MASTER%のものを包み、ゆっくりと動き出す。

    「……んっ……ぬるっとしてきた……これ、気持ちいいってこと……？」

    %CALLNAME:TARGET%は先走りの感触に驚きながらも、足を止めなかった。

    「……%CALLNAME:MASTER%……あたしのこと、好き……？」

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は上目遣いに%CALLNAME:MASTER%を見つめた。

    「あたし……%CALLNAME:MASTER%のこと、好きだから……」

    恥ずかしそうに俯きながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%のものを足で挟んだ。

    「だから……足で、させて……ね……？」

    小さな足がたどたどしく動き、%CALLNAME:MASTER%に快感を与えようと頑張っている。

    %CALLNAME:TARGET%は真剣な表情で、%CALLNAME:MASTER%の反応を見守っていた。
