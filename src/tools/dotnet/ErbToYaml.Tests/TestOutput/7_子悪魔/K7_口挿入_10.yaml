- id: talent_3_1
  content: >-
    「え、えっと……こ、こうすればいいの……？」

    %CALLNAME:TARGET%は真っ赤になりながら、おずおずと%CALLNAME:MASTER%に手を伸ばした。

    初めて触れる肌の感触に緊張しながらも、そっと撫で始める。

    「わぁ……%CALLNAME:MASTER%の体、あったかい……」

    %CALLNAME:TARGET%は困惑しながらも、見よう見まねで手を動かし始めた。

    「……%CALLNAME:MASTER%、くすぐったくないですか……？」

    心配そうに%CALLNAME:TARGET%は%CALLNAME:MASTER%の顔を窺っている。

    「あの……%CALLNAME:MASTER%のために……頑張ります……」

    %CALLNAME:TARGET%は緊張した面持ちで%CALLNAME:MASTER%に触れた。

    「こういうの、あたし初めてだから……下手でごめんね……」

    ぎこちない手つきで、%CALLNAME:TARGET%は懸命に撫で始めた。

    「んしょ……こう……？」

    一生懸命な%CALLNAME:TARGET%の姿は、どこか健気だった。

    「……気持ちよくなって、くれたら……嬉しいな……」

    「は、恥ずかしいよぅ……でも……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、%CALLNAME:MASTER%の体に手を添えた。

    「%CALLNAME:MASTER%が気持ちよくなるなら……あたし、頑張る……」

    小さな手が%CALLNAME:MASTER%の肌の上をゆっくりと滑っていく。

    「……んっ……%CALLNAME:MASTER%の体……すべすべ……」

    %CALLNAME:TARGET%は触れる感触に驚きながらも、手を止めなかった。

    「……%CALLNAME:MASTER%……あたしのこと、好き……？」

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は上目遣いに%CALLNAME:MASTER%を見つめた。

    「あたし……%CALLNAME:MASTER%のこと、好きだから……」

    恥ずかしそうに俯きながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を撫で始めた。

    「だから……こうやって触らせて……ね……？」

    小さな手がたどたどしく動き、%CALLNAME:MASTER%に快感を与えようと頑張っている。

    %CALLNAME:TARGET%は真剣な表情で、%CALLNAME:MASTER%の反応を見守っていた。
