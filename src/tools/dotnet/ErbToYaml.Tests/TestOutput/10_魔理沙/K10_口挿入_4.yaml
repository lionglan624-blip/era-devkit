character: 魔理沙
situation: K10_口挿入
entries:
- id: fallback
  content: >-
    「ん……こうやって擦り付けると、気持ちいいのか？」

    %CALLNAME:人物_魔理沙%は石鹸の泡を全身に塗りたくり、%CALLNAME:MASTER%の体に擦り付けた。

    「私の体全部使って……お前を洗ってやるぜ」

    %CALLNAME:人物_魔理沙%は恋人の反応を見ながら、ぬるぬると体を密着させた。

    「んっ……泡のせいで滑りやすいな……こう、全身で擦ると……」

    %CALLNAME:人物_魔理沙%は頬を染めながら、胸や腹を%CALLNAME:MASTER%に押し付けた。

    「……お前と繋がってる気がして、なんか……嬉しいぜ」

    「ふふ……泡だらけでぬるぬるだな」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の体に全身を絡めるように擦り付けた。

    「こうして洗ってると……私も気持ちよくなってくるぜ」

    「んっ……ここも、洗ってやるからな……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の一物に太腿を擦り付けた。

    「もっと気持ちよくしてやるから……任せとけ」

    %CALLNAME:人物_魔理沙%は恋人を喜ばせることに夢中になっていた。

    「……だんだんコツが分かってきたかもな」

    %CALLNAME:人物_魔理沙%は自信を持って全身を%CALLNAME:MASTER%に擦り付けた。

    「んっ……こうやって強く押し付けると……反応するんだよな」

    %CALLNAME:MASTER%が気持ちよさそうにすると、%CALLNAME:人物_魔理沙%は得意げになった。

    「ふふん、私だって努力してるんだぜ……お前のためにな」

    %CALLNAME:人物_魔理沙%は胸を%CALLNAME:MASTER%の胸板に押し付け、上下に動いた。

    「もっと……気持ちよくなれよ……」

    「なあ……ちゃんとこっち見てろよ」

    %CALLNAME:人物_魔理沙%は全身を擦り付けながら、%CALLNAME:MASTER%の目を見つめた。

    「私がお前を洗ってるとこ……ちゃんと見ててくれ」

    「んっ……ふぅ……泡で滑るから、気持ちいいだろ……？」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに頬を染めながらも、体を密着させ続けた。

    「……見られてると、なんか……頑張れるんだぜ」

    %CALLNAME:人物_魔理沙%は恋人の視線を感じながら、愛情を込めて奉仕した。
  priority: 4
- id: talent_3_1
  content: >-
    「ち、違うからな！　べ、別にやりたくてやってるわけじゃ……」

    %CALLNAME:人物_魔理沙%は顔を真っ赤にしながら、泡だらけの体を%CALLNAME:MASTER%に擦り付けた。

    「た、頼まれたから仕方なくやってるだけだぜ……」

    %CALLNAME:人物_魔理沙%は照れ隠しに強がりながらも、丁寧に体を動かしている。

    「んっ……こ、こうやって擦り付ければいいんだろ……？」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに顔を背けながらも、体は止めなかった。

    「……笑うなよ、一生懸命やってるんだから……」

    「こ、こんなことして……変態なんだからな、お前は」

    %CALLNAME:人物_魔理沙%は文句を言いながらも、泡だらけの体を擦り付け続けている。

    「私の体で洗われて嬉しいのかよ……物好きだぜ」

    「んっ……ぬるぬるして、なんか変な感じだ……」

    %CALLNAME:人物_魔理沙%の動きは慣れないながらも、一生懸命だった。

    「……でも、気持ちいいなら……まあ、仕方ないか」

    %CALLNAME:人物_魔理沙%は照れながらも、懸命に体を動かした。

    「んっ……なんか、お前の……反応してる……？」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、体を擦り付け続けた。

    「こ、これって……私の体で気持ちいいってこと……？」

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_魔理沙%は複雑な表情になった。

    「……別に嬉しくなんかないぜ……ただ、悪い気はしないってだけだ」

    %CALLNAME:人物_魔理沙%は照れながらも、少し得意げだった。

    「……もうちょっとだけ、やってやるよ……」

    「……お前、もうちょっと反応してくれてもいいんだぜ」

    %CALLNAME:人物_魔理沙%は少し不満そうに呟いた。

    「こっちは全身使って一生懸命やってるんだから……」

    「んっ……ふぅ……こう擦り付けると……」

    %CALLNAME:MASTER%が気持ちよさそうな顔をすると、%CALLNAME:人物_魔理沙%は照れた。

    「なっ……そ、そんな顔されると困る……」

    「……もう、勝手にしろよ……」
