- id: fallback
  content: >-
    「……は？　何言ってんだお前」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%を睨みつけた。

    「自慰しろって……頭おかしいんじゃないか？」

    %CALLNAME:人物_魔理沙%は明らかに不機嫌そうだ。

    「……ったく、変なこと言うなよな」

    %CALLNAME:人物_魔理沙%はそっぽを向いて、%CALLNAME:MASTER%を無視しようとした。

    「……お前、そういうの見て楽しいのか？」

    %CALLNAME:人物_魔理沙%は呆れたような、困ったような顔をした。

    「私だって女なんだぜ、そんなの見せたくないって」

    %CALLNAME:人物_魔理沙%は腕を組んで、%CALLNAME:MASTER%を睨む。

    「……もうちょっと、空気読めよな」

    %CALLNAME:人物_魔理沙%は付き合いきれないといった様子だ。

    「……なあ、そういうの普通に言うか？」

    %CALLNAME:人物_魔理沙%はため息をついた。

    「知り合い程度の相手に自慰見せろって、どういう神経だぜ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の常識を疑っている。

    「……まあ、冗談なんだろうけどな」

    %CALLNAME:人物_魔理沙%は苦笑いを浮かべて、話を流そうとした。

    「……」

    %CALLNAME:人物_魔理沙%は無言で%CALLNAME:MASTER%を見つめた。

    その目は冷たく、明らかに不快感を示している。

    「……お前、私のこと何だと思ってるんだ？」

    %CALLNAME:人物_魔理沙%は低い声で問いかけた。

    「……もう少し、人として見てくれよな」

    %CALLNAME:人物_魔理沙%は失望したように、視線を逸らした。
