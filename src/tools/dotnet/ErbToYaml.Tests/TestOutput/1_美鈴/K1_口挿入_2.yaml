    %CALLNAME:人物_美鈴%はそう言いながら、胸元を開いた。

    「……誰かに見られたら困りますし……」

    周囲を気にしながら、%CALLNAME:人物_美鈴%は一物を胸で挟んだ。

    「……ん……思ったより、熱い……」

    %CALLNAME:人物_美鈴%は顔を赤らめながら、胸を動かした。

