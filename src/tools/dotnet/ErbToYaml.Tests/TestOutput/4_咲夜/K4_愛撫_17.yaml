- id: fallback
  content: >-
    %CALLNAME:MASTER%がアナルビーズを取り出すと、%CALLNAME:TARGET%は怪訝な表情を浮かべた。

    「……それは何ですの。珠が連なった……見たことのない道具ですわね」

    用途を察した%CALLNAME:TARGET%は、冷ややかな視線を向けた。

    「……お客様、それを私の……後ろに使おうというおつもり？」

    %CALLNAME:TARGET%の声は冷静だが、僅かに動揺が見え隠れしていた。

    「……まあ、メイドとしてのおもてなしの範囲内なら……」

    「っ……これは……」

    アナルビーズの最初の珠が挿入された瞬間、%CALLNAME:TARGET%は小さく驚いた。

    「……一つずつ入っていく……しかも後ろに……」

    %CALLNAME:TARGET%は戸惑いながらも、すぐには振り払わなかった。

    「変な使い方をしないでくださいまし……もう手遅れですけれど」

    %CALLNAME:TARGET%は皮肉めいた口調で言いながら、異物感を耐えている。

    「……ん……」

    アナルビーズの珠に、%CALLNAME:TARGET%は僅かに眉をひそめた。

    「……悪くはありませんわね……いえ、そういう意味ではなく……」

    %CALLNAME:TARGET%は慌てて言い訳しながらも、声が僅かに上ずっている。

    「……お客様の相手も、メイドの務めですから」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    アナルビーズが%CALLNAME:TARGET%の後孔で全ての珠を飲み込んでいた。

    「……」

    %CALLNAME:TARGET%は無言で挿入された道具を受け止め、表情を変えまいと努めていた。

    「……%CALLNAME:MASTER%、それで満足ですの」

    %CALLNAME:TARGET%は淡々と問いかけながらも、声には僅かな震えがあった。

    「……早く抜いてくださいまし」
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:MASTER%がアナルビーズを取り出すと、%CALLNAME:TARGET%は氷のような視線を向けた。

    「……それで何をなさるおつもりですの」

    %CALLNAME:TARGET%の声には、一切の温かみがない。

    「紅魔館のメイド長を、そのような道具で……後ろから弄ぶおつもり？」

    %CALLNAME:TARGET%の手には、いつの間にかナイフが握られていた。

    「……身の程を弁えなさいまし」

    「……は？」

    %CALLNAME:TARGET%は信じられないものを見るような目でアナルビーズを見つめた。

    「珠が連なったそれを私の後ろに使おうと？　正気ですの」

    %CALLNAME:TARGET%は嘲るように笑った。

    「時を止めれば、その道具ごと貴方を刻むことも造作もありませんわ」

    「……今回は見逃して差し上げますけれど、次はありませんわよ」

    アナルビーズを見た%CALLNAME:TARGET%は、露骨に眉をひそめた。

    「……趣味が悪いですわね。珠が連なった道具など」

    %CALLNAME:TARGET%は一歩後ろに下がり、距離を取った。

    「お客様であっても、後ろを弄ぶような無礼は許しませんわ」

    「お嬢様のお怒りを買いたくなければ、それを仕舞いなさいまし」

    瀟洒なメイドの目は、冷ややかに光っている。

    「……」

    %CALLNAME:TARGET%は無言でアナルビーズを見つめ、深いため息をついた。

    「お客様。紅魔館のメイドに、そのようなものを使うおつもりですか」

    %CALLNAME:TARGET%の声は静かだが、有無を言わせぬ威圧感がある。

    「……お引き取りを。次はありませんわ」

    完璧なメイドは、完璧な作り笑いを浮かべていた。
