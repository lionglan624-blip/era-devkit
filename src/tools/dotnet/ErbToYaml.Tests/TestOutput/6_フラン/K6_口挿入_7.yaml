entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……ここも、舐めてあげるね……」

    %CALLNAME:人物_フラン%は恋人の後ろに顔を寄せ、そっと舌を伸ばした。

    紅い瞳には愛情と、全てを受け入れる覚悟が宿っている。

    「んっ……%CALLNAME:MASTER%の匂い……私だけの、特別な匂い……」

    %CALLNAME:人物_フラン%は恍惚とした表情で、丁寧に舌を這わせた。

    「こうしてると……壊したくないって、強く思うのさ……」

    495年の孤独を知る少女は、恋人の全てを愛おしく思った。

    「ふふ……%CALLNAME:MASTER%、ここも私のものなのさ……」

    %CALLNAME:人物_フラン%は舌を這わせながら、嬉しそうに囁いた。

    恋人の秘密の場所を味わえる特権に、心から満たされている。

    「んぅ……もっと奥まで……舐めてあげる……」

    %CALLNAME:人物_フラン%は舌先を押し当て、丁寧に奉仕した。

    「%CALLNAME:MASTER%が気持ちよくなるなら……何でもするの……」

    その言葉には、純粋な愛情だけがあった。

    「%CALLNAME:MASTER%……大好き……全部、受け入れるから……」

    %CALLNAME:人物_フラン%は恋人に身を寄せ、舌を動かし続けた。

    この行為で繋がっていることが、何よりも幸せだった。

    「んふぅ……ここ、少し窄まってる……かわいいのさ……」

    %CALLNAME:人物_フラン%は愛しむように、繊細な舌遣いを続ける。

    「ねぇ……%CALLNAME:MASTER%、気持ちいい……？」

    恋人の反応を確かめながら、悪魔の妹は至福の時を過ごしていた。

    「%CALLNAME:MASTER%のここ……舐めると、どんな声出すの……？」

    %CALLNAME:人物_フラン%は好奇心を隠さず、舌を這わせた。

    恋人の全てを知りたい、という欲求が彼女を突き動かしている。

    「あ……力が入った……気持ちいいんだね……」

    %CALLNAME:人物_フラン%は得意げに微笑み、さらに深く舌を沈めた。

    「もっと……もっと%CALLNAME:MASTER%のこと、知りたいの……」

    紅い瞳は恋人だけを映し、ひたむきに奉仕を続けた。
