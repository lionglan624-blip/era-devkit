    %CALLNAME:TARGET%はぎこちなく腰を前後させている。

    「……文献には、擦り合わせると気持ち良いと……」

    %CALLNAME:TARGET%は知識を頼りに、腰の動きを工夫していた。

    「……どう……？　変じゃない……？」

