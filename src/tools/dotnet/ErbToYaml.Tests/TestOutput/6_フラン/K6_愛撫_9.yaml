- id: fallback
  content: >-
    「……自慰？　それって何？」

    %CALLNAME:人物_フラン%は首を傾げて、%CALLNAME:MASTER%を見つめた。

    「ふぅん……こうするの……」

    %CALLNAME:人物_フラン%は言われるがままに、秘所に手を伸ばした。

    「……別に、どうでもいいのさ」

    %CALLNAME:人物_フラン%は興味なさそうに呟きながら、指を動かした。

    「……つまんないことしたら、遊び終わりだからね」

    「……こういうこと、させたいの？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を値踏みするように見つめた。

    紅い瞳には、興味と退屈が混在している。

    「私、こういうの、あんまり知らないのさ」

    %CALLNAME:人物_フラン%は無造作に秘所を弄り始めた。

    「……地下にいると、誰も教えてくれないから」

    その声には、どこか寂しさが滲んでいた。

    「……」

    %CALLNAME:人物_フラン%は無表情で、言われた通りに自らを弄っていた。

    「……面白いの、これ？」

    %CALLNAME:人物_フラン%は淡々と指を動かしながら、%CALLNAME:MASTER%に聞いた。

    「私には、よくわからないのさ」

    495年の孤独が生んだ、どこか虚ろな瞳。

    「……でも、%CALLNAME:MASTER%が見たいなら、見せてあげる」

    「きゅっとしてドカーン、って知ってる？」

    %CALLNAME:人物_フラン%は無邪気に笑いながら、自らの秘所を弄っていた。

    「私の能力……でも、自分は壊せないのさ」

    %CALLNAME:人物_フラン%は興味なさそうに指を動かした。

    「……ねぇ、これ、いつまでやるの？」

    %CALLNAME:人物_フラン%は退屈そうに%CALLNAME:MASTER%を見上げた。

    「面白くなかったら、やめちゃうからね」
