    「……ん……」

    %CALLNAME:人物_美鈴%は静かに%CALLNAME:MASTER%を受け入れていた。

    「……顔が見えないと……少し、怖いです……」

    %CALLNAME:人物_美鈴%は正直に打ち明けた。

    「……でも……こうしてると、なんだか……」

    「……%CALLNAME:MASTER%のこと、感じられる気がして……」

