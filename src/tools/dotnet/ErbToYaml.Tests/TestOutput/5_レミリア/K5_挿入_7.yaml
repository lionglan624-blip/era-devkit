character: レミリア
situation: K5_挿入
entries:
- id: fallback
  content: >-
    「ん……%CALLNAME:MASTER%、こっちに来なさい」

    %CALLNAME:人物_レミリア%は床に座り、%CALLNAME:MASTER%を手招きした。

    %CALLNAME:MASTER%が傍に座ると、%CALLNAME:人物_レミリア%は自ら%CALLNAME:MASTER%の上に跨った。

    「こうして……向かい合っていると、%CALLNAME:MASTER%の顔がよく見えるわ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の陰茎に手を添え、膣口にあてがった。

    ゆっくりと腰を落とすと、二人は深く繋がった。

    「あっ……んん……奥まで、来てるわ……」

    紅魔館の主は恋人の顔を見つめながら、幸せそうに微笑んだ。

    「ふふ……今日は私が上よ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胡坐の上に座り、首に腕を回した。

    「こうして抱き合うのも……悪くないわね」

    %CALLNAME:人物_レミリア%が腰を沈めると、%CALLNAME:MASTER%の一物が奥まで達した。

    「やぁっ……深い……%CALLNAME:MASTER%を、全部感じるわ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に口付けながら、ゆっくりと腰を揺らし始めた。

    「んっ、ちゅ……んむ……ずっと、こうしていたい……」

    永遠を生きる吸血鬼が、この一瞬の温もりに溺れていた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の目を見つめ、静かに跨った。

    向かい合う体勢で、二人の視線が絡み合う。

    「顔が近いわね……こうしていると、%CALLNAME:MASTER%の全てが見える」

    %CALLNAME:人物_レミリア%がゆっくりと腰を落とすと、甘い吐息が漏れた。

    「あぁっ……んっ……気持ちいい……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を抱きしめながら、自ら腰を動かし始めた。

    「私のこと……ちゃんと見ていてね……」

    「座って……そう、そのまま」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を座らせ、その上に乗った。

    「この体勢だと……%CALLNAME:MASTER%を独り占めできるわ」

    %CALLNAME:人物_レミリア%は自ら陰茎を導き、ずぷりと飲み込んだ。

    「っ……あっ、奥まで……挿入ったわね……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の首にしがみつき、幸せそうに目を細めた。

    「ふふ……%CALLNAME:MASTER%は私だけのもの……」

    500年の吸血鬼が、恋人だけに見せる無防備な姿を晒していた。
  priority: 4
- id: talent_3_1
  content: >-
    「な……っ、何よこの体勢……」

    %CALLNAME:人物_レミリア%は頬を染めながら、%CALLNAME:MASTER%の上に跨った。

    「顔が近いじゃない……恥ずかしいったら……」

    %CALLNAME:人物_レミリア%が腰を落とすと、二人は深く繋がった。

    「あっ……っ、奥まで……」

    %CALLNAME:人物_レミリア%は顔を背けようとしたが、%CALLNAME:MASTER%に抱きしめられた。

    「ばっ……顔、見ないでよ……」

    高貴な吸血鬼の頬は、真っ赤に染まっていた。

    「こ、こんな体勢……誰が好き好んで……」

    %CALLNAME:人物_レミリア%は文句を言いながらも、%CALLNAME:MASTER%の胡坐の上に座った。

    「別に、%CALLNAME:MASTER%と顔を合わせたいわけじゃ……っ」

    腰を落とすと、%CALLNAME:人物_レミリア%は小さく声を上げた。

    「やぁっ……あ、深い……っ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の肩にしがみついた。

    「……ば、馬鹿%CALLNAME:MASTER%……」

    罵りの言葉とは裏腹に、その体は離れようとしなかった。

    「……向かい合ってするなんて、趣味が悪いわね」

    %CALLNAME:人物_レミリア%は強がりながら、%CALLNAME:MASTER%に跨った。

    しかし繋がる瞬間、その表情は蕩けた。

    「んっ……あぁ……っ、こ、こんなの……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の顔を見ないように顔を逸らした。

    だが、自ら腰を動かすのを止められない。

    「……今日だけよ……こんなの許すの……」

    その声は甘く震えていた。

    「……ふん、私の上に乗せてあげてるのよ？ 感謝なさい」

    %CALLNAME:人物_レミリア%は照れ隠しに偉そうに言った。

    「べ、別にこうしたかったわけじゃ……っ」

    腰を落とした瞬間、言葉が途切れた。

    「あっ……んん……%CALLNAME:MASTER%の、奥まで……」

    %CALLNAME:人物_レミリア%は必死に声を堪えながら、%CALLNAME:MASTER%を抱きしめた。

    「……ずるいわよ、こんな体勢……」

    紅魔館の主は、素直になれない想いを胸に秘めていた。
  priority: 3
