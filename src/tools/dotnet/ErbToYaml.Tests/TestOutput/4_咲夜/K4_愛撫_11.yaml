character: 咲夜
situation: K4_愛撫
entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%がローターを取り出すと、%CALLNAME:TARGET%は穏やかな微笑みを浮かべた。

    「……今日はそちらをお使いになるのですね」

    %CALLNAME:TARGET%は恥じらいながらも、自ら体の力を抜いている。

    「……お嬢様には秘密ですわよ」

    小さな振動が始まると、%CALLNAME:TARGET%の睫毛が微かに震えた。

    「んっ……この感覚……慣れないですわ……」

    完璧なメイドは、恋人の前でだけ素直な表情を晒していた。

    ローターの振動が%CALLNAME:TARGET%の肌に伝わっている。

    「あ……っ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕を掴み、小さく身を捩った。

    「……もう少し、強くしてくださいまし……」

    その言葉は、恋人だけに許される甘えだった。

    「……私、貴方の前だと我慢できなくなりますの……」

    %CALLNAME:TARGET%は頬を染めながら、快感に身を委ねていた。

    「んんっ……ふぁ……」

    ローターが敏感な場所を刺激するたび、%CALLNAME:TARGET%の息が乱れていく。

    「こんな道具で感じてしまうなんて……瀟洒ではありませんわね……」

    そう言いながらも、%CALLNAME:TARGET%は逃げようとしなかった。

    「……%CALLNAME:MASTER%が見ていると……余計に……」

    %CALLNAME:TARGET%は恥ずかしそうに目を閉じ、快楽に溺れていた。

    「……もっと……お願い……」

    ローターの振動音が部屋に響いている。

    「あぁ……っ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみつき、甘い声を漏らしていた。

    「こうして弄ばれるのは……嫌いではありませんわ……」

    普段の冷静さはどこへやら、%CALLNAME:TARGET%は快感に蕩けている。

    「……貴方だけですわ……こんな私を見せるのは……」

    完璧なメイドの仮面の下、恋する乙女の素顔が覗いていた。
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%が取り出した小さな器具を、%CALLNAME:TARGET%は怪訝そうに見つめた。

    「それは……何ですの」

    %CALLNAME:TARGET%は警戒しながらも、好奇心が隠しきれない様子だった。

    「……%CALLNAME:MASTER%、まさか私にそれを……」

    振動が始まると、%CALLNAME:TARGET%の体がびくりと跳ねた。

    「っ……なんですの、これは……」

    %CALLNAME:TARGET%は戸惑いながらも、振動を拒まなかった。

    ローターの振動が%CALLNAME:TARGET%の体に伝わっていく。

    「あっ……やめ……」

    %CALLNAME:TARGET%は抗議しようとしながらも、言葉が途切れた。

    「困りますわ、このようなもので……私を……」

    完璧なメイドの仮面が、少しずつ崩れていく。

    「……%CALLNAME:MASTER%は、本当に意地悪ですわね……」

    そう言いながらも、%CALLNAME:TARGET%の体は正直に反応していた。

    「んっ……ふぁ……」

    ローターの振動に、%CALLNAME:TARGET%は声を堪えきれなかった。

    「冷たいですのに……体が、熱くなってきますわ……」

    %CALLNAME:TARGET%は自分の体の反応に戸惑っている様子だった。

    「……こんな道具に……負けてしまうなんて……」

    「……メイドとして、恥ずかしいですわ……」

    %CALLNAME:TARGET%の声には、隠しきれない甘さが滲んでいた。

    振動がじわりと%CALLNAME:TARGET%の体に染み込んでいく。

    「……っ……そこは……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手首を掴んだ。

    「手なら……まだ良いのですけれど……」

    「……こんな道具を使わなくても……」

    %CALLNAME:TARGET%の視線は、どこか物欲しげだった。

    「……%CALLNAME:MASTER%が直接、触れてくださいまし……」
