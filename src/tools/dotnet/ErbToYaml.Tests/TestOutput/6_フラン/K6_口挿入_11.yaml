- id: fallback
  content: >-
    「……こ、ここを触れって言うの……？」

    %CALLNAME:人物_フラン%は戸惑いながらも、%CALLNAME:MASTER%の秘所に手を伸ばした。

    言われた通りにするべきか迷いつつも、指先で触れる。

    「わっ……柔らかい……こ、こうすればいいの……？」

    %CALLNAME:人物_フラン%はおずおずと指を動かし始めた。

    「……変な感じ……でも、嫌じゃないのさ……」

    何百年も人に触れてこなかった少女は、困惑しながらも従っていた。

    「……触るのは初めてなのさ。上手くできるか分からないよ」

    %CALLNAME:人物_フラン%は不安そうに呟きながら、指を動かしていた。

    慣れない動作にぎこちなさが滲むが、真剣に取り組んでいる。

    「こ、こう……？　……%CALLNAME:MASTER%、痛くない……？」

    %CALLNAME:人物_フラン%は相手の顔色を窺いながら、そっと撫でた。

    「……壊しちゃったらどうしよう……」

    495年の孤独を知る少女は、力加減に慎重になっていた。

    「……こうして触ってると、%CALLNAME:MASTER%の体温が伝わってくるのさ」

    %CALLNAME:人物_フラン%は少し驚いたように呟いた。

    指先から伝わる温もりに、表情が僅かに和らぐ。

    「……温かい。地下室は、いつも冷たかったから……」

    %CALLNAME:人物_フラン%は無意識に、もう少し触れていたいと思った。

    「……もう少しだけ、触っててもいい……？」

    孤独を知る少女の声には、小さな期待が混じっていた。

    「……言われたから触るけど……これ、何のためにするの……？」

    %CALLNAME:人物_フラン%は首を傾げながら、指を動かしていた。

    命令には従うが、意味はよく分かっていない様子。

    「……%CALLNAME:MASTER%の顔、変わってる。気持ちいいの……？」

    %CALLNAME:人物_フラン%は不思議そうに観察しながら、触り続けた。

    「……ふぅん。こうすると喜ぶんだ。覚えておくのさ」

    悪魔の妹は、新しい知識を得たように頷いた。
  priority: 2
- id: fallback
  content: >-
    「……なんで私がこんなこと……」

    %CALLNAME:人物_フラン%は不満そうに呟きながらも、言われた通りに手を伸ばした。

    指先で触れた瞬間、その温かさに少しだけ驚く。

    「……っ。温かいんだ……」

    %CALLNAME:人物_フラン%は戸惑いを隠せないまま、ぎこちなく触れた。

    「……壊れたら%CALLNAME:MASTER%のせいだからね」

    495年の孤独を知る少女は、自分を守るように棘のある言葉を吐いた。

    「……こうすればいいの？　分からないんだけど」

    %CALLNAME:人物_フラン%は投げやりに言いながら、適当に指を動かした。

    しかし相手の反応が気になるのか、時折視線を向ける。

    「……ふぅん。こうすると声が出るんだ」

    %CALLNAME:人物_フラン%は少しだけ興味を持ったように、動きを変えてみた。

    「……別に、%CALLNAME:MASTER%のためじゃないからね。暇だから付き合ってるだけなのさ」

    孤独を知る少女は、素直になれない自分にも気づかない。

    「……触ってって言われたから触るけど」

    %CALLNAME:人物_フラン%は無表情のまま、%CALLNAME:MASTER%の秘所に触れた。

    しかし壊さないよう力加減を意識しているのは、優しさの表れか。

    「……壊したくないから、優しくするのさ」

    %CALLNAME:人物_フラン%はぶっきらぼうに言いながら、丁寧に撫でた。

    「……勘違いしないでよ。これは……その……」

    言葉を濁しながらも、その手は止まらなかった。

    「……私に触れさせるなんて、%CALLNAME:MASTER%は変わってるのさ」

    %CALLNAME:人物_フラン%は皮肉っぽく笑いながら、指を動かした。

    危険な自分に触れさせることへの疑問と、選ばれた喜びが混在している。

    「……壊してもいいの？　……冗談だよ。そんな顔しないで」

    %CALLNAME:人物_フラン%は相手の反応を見て、少しだけ寂しそうに笑った。

    「……ごめん。壊さないから……ちゃんとするから……」

    495年の孤独が作った壁は、少しずつ綻びを見せていた。
  priority: 1
