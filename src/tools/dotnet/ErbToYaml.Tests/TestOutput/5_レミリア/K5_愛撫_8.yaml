- id: fallback
  content: >-
    「……何をするつもりかしら」

    %CALLNAME:人物_レミリア%は冷ややかな目で%CALLNAME:MASTER%を見た。

    だが%CALLNAME:MASTER%がその秘部を押し開くと、

    「っ……！」

    %CALLNAME:人物_レミリア%は小さく息を呑んだ。

    「……ふん、下僕の分際で」

    そう言いながらも、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を止めようとはしなかった。

    「今日だけ……特別に許してあげるわ」

    「……%CALLNAME:MASTER%、あなた……」

    %CALLNAME:人物_レミリア%は言葉を詰まらせた。

    %CALLNAME:MASTER%がゆっくりとその秘貝を開いていく。

    「そ、そこを見るなんて……身の程を……っ」

    %CALLNAME:人物_レミリア%の声は威厳を保とうとして、微かに震えていた。

    「……聞かなかったことにしなさい」

    頬を染めた%CALLNAME:人物_レミリア%は、視線を逸らした。

    「……見たいなら、見ればいいわ」

    「……随分と大胆ね」

    %CALLNAME:人物_レミリア%は挑発的な笑みを浮かべた。

    だが%CALLNAME:MASTER%がその秘所を押し開くと、

    「……っ」

    笑みが一瞬、歪んだ。

    「……紅魔館の主を辱めるなんて、命知らずね」

    そう言いながらも、%CALLNAME:人物_レミリア%の身体は微かに震えていた。

    「……まあいいわ。好きにしなさい」

    「……ふぅん」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を値踏みするように見ていた。

    %CALLNAME:MASTER%がその場所を指で押し開くと、

    「……面白いことをするのね」

    %CALLNAME:人物_レミリア%は興味なさそうに装っているが、頬はほんのり紅い。

    「……使用人の分際で、随分と図々しいわ」

    そう言いながら、%CALLNAME:人物_レミリア%は脚を閉じようとはしなかった。

    「……今日のところは見逃してあげる」
  priority: 2
- id: fallback
  content: >-
    「……何のつもり？」

    %CALLNAME:人物_レミリア%は冷たい視線を%CALLNAME:MASTER%に向けた。

    「私のそこに触れることが許されると思っているの？」

    %CALLNAME:人物_レミリア%の紅い瞳が危険に光る。

    「身の程を知りなさい、下僕」

    吸血鬼としての威圧感が、部屋全体を支配していた。

    「次はないと思いなさい」

    「……ふぅん」

    %CALLNAME:人物_レミリア%は退屈そうに%CALLNAME:MASTER%を見下ろした。

    「あなた、命が惜しくないのかしら」

    %CALLNAME:人物_レミリア%の声には、氷のような冷たさがあった。

    「私に触れる資格があるのは、限られた者だけよ」

    その言葉には、500年を生きた吸血鬼の矜持が込められていた。

    「咲夜を呼ぶ前に、下がりなさい」

    「……図々しいわね」

    %CALLNAME:人物_レミリア%は嘲笑を浮かべた。

    「使用人風情が、私の秘所に触れようというの？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を見下すように言い放った。

    「……まあいいわ、今日は機嫌がいいから見逃してあげる」

    そう言いながら、%CALLNAME:人物_レミリア%は脚を組み直した。

    「でも、触る前に許可を取りなさいよ」

    「……何かしら」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    「私はこう見えても忙しいのよ」

    紅魔館の主は、高飛車な態度を崩さなかった。

    「そんなところに興味があるなら、他を当たりなさい」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を追い払うような仕草をした。

    「私の時間を無駄にしないで」
  priority: 1
