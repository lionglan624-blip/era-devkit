  content: >-
    「ひゃっ……！　%CALLNAME:MASTER%、む、胸に何かつけるの……？」

    %CALLNAME:人物_大妖精%はクリップローターを見て瞳を丸くした。

    乳首に装着されると、小さな体がびくりと跳ねた。

    「……あっ、挟まれてる……胸がきゅうってなる……」

    電源が入ると、振動が乳首を通じて全身に広がっていく。

    「……んっ、ふぁ……振動してる……%CALLNAME:MASTER%、これすごい……」

    翅がぴくぴくと震え、%CALLNAME:人物_大妖精%は%CALLNAME:MASTER%の腕にしがみついた。

    「あっ……クリップローター、また使うの……？」

    %CALLNAME:人物_大妖精%は見慣れた器具を見て頬を染めた。

    乳首に装着されると、前回の快感の記憶が蘇り体が反応し始める。

    「……んっ、やぁ……挟まれると、胸がじんじんする……」

    振動が始まると、%CALLNAME:人物_大妖精%は甘い吐息を漏らした。

    「……%CALLNAME:MASTER%に教えてもらった感じ……体が覚えてるの……」

    恋人への信頼を込めて、%CALLNAME:人物_大妖精%は%CALLNAME:MASTER%に身を寄せた。

    「……ふぁっ……胸に振動が……止まらない……」

    %CALLNAME:人物_大妖精%はクリップローターの刺激に体を震わせた。

    乳首から伝わる振動が、小さな体を支配していく。

    「……んっ、あっ……%CALLNAME:MASTER%……強くなってる……」

    %CALLNAME:人物_大妖精%は%CALLNAME:MASTER%にすがりつき、翅がきらきらと発光した。

    「……大好き……だから……こんな恥ずかしい姿も見せてあげる……」

    快感に染まりながら、%CALLNAME:人物_大妖精%は愛を囁いた。

    「……ひっ……！　胸がびりびりする……すごいの……」

    %CALLNAME:人物_大妖精%はクリップローターの振動に息を乱した。

    敏感な乳首への刺激が、断続的に快感を与え続けている。

    「……あっ、やぁ……止められない……気持ちいいの……」

    翅がばたばたと動き、%CALLNAME:人物_大妖精%は甘い声を漏らし続けた。

    「……%CALLNAME:MASTER%の前だから……全部、見せていいよね……」

    恋人に全てを許すように、%CALLNAME:人物_大妖精%は体の力を抜いた。
