  content: >-
    「っ……%CALLNAME:MASTER%……そのような……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に胸を吸われ、声を殺しきれなかった。

    「……はぁ……困りますわ……」

    瀟洒なメイドの体が、%CALLNAME:MASTER%の愛撫に震えている。

    「……メイドとして、このような姿は……」

    %CALLNAME:TARGET%は抗議しようとしながらも、%CALLNAME:MASTER%を押しのけられなかった。

    「……少しだけですわよ……少しだけ……」

    %CALLNAME:TARGET%は諦めたように、%CALLNAME:MASTER%の頭に手を添えた。

    「んっ……あっ……」

    %CALLNAME:MASTER%の舌が%CALLNAME:TARGET%の乳首を舐め上げている。

    %CALLNAME:TARGET%は唇を噛み、声を堪えようとしていた。

    「……%CALLNAME:MASTER%は……本当に、意地悪ですわね……」

    %CALLNAME:TARGET%は恨めしそうに%CALLNAME:MASTER%を見つめた。

    「……こんなところを、感じてしまうなんて……」

    「……お嬢様には、絶対に内緒ですわよ……」

    %CALLNAME:TARGET%は顔を赤らめながら、小さく呟いた。

    「やっ……そこ……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の敏感な突起を口に含んでいる。

    %CALLNAME:TARGET%の体がぴくりと跳ねた。

    「……感じて、しまいますわ……」

    %CALLNAME:TARGET%は認めたくないとばかりに、顔を背けた。

    「……%CALLNAME:MASTER%のせいですからね……」

    「……責任、取っていただきますわよ……」

    小さな声で、%CALLNAME:TARGET%はそう呟いた。

    「はぁっ……んっ……」

    %CALLNAME:MASTER%の唇が%CALLNAME:TARGET%の乳首を吸い上げる。

    %CALLNAME:TARGET%は甘い声を抑えきれずにいた。

    「……%CALLNAME:MASTER%……もう……」

    「……こんなに、されたら……メイドの矜持が……」

    %CALLNAME:TARGET%は両手で顔を覆った。

    「……でも……嫌とは、言えませんわ……」

    %CALLNAME:TARGET%の耳が、赤く染まっている。
