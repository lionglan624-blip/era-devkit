- id: fallback
  content: >-
    「え……あたしが……%CALLNAME:MASTER%のおしりを……？」

    %CALLNAME:TARGET%は困惑した表情で%CALLNAME:MASTER%を見つめた。

    「……わ、分かりました……」

    おずおずと手を伸ばし、%CALLNAME:MASTER%の秘部に触れる。

    「こ、こうですか……？　んっ……」

    %CALLNAME:TARGET%は戸惑いながらも、言われた通りに指を動かした。

    「……これ……普通のことなんですか……？」

    「あ、あの……本当にこんなこと……？」

    %CALLNAME:TARGET%は不安そうな顔で%CALLNAME:MASTER%の後ろに回った。

    「……言われたから……やりますけど……」

    小さな指がぎこちなく%CALLNAME:MASTER%の窄まりを撫でる。

    「……んっ……こうやって……触ればいいんですか……」

    %CALLNAME:TARGET%は困惑しながらも、手を止めなかった。

    「……咲夜さんに知られたら、怒られそう……」

    「%CALLNAME:MASTER%……これって……」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%の秘部に指を伸ばした。

    「……こんなこと、お仕事じゃないと思うんですけど……」

    それでも言われたからには従うしかない。

    「……んっ……ふぅ……こう……でいいですか……」

    %CALLNAME:TARGET%は恐る恐る指を動かした。

    「……あんまりいじめないでくださいね……」

    %CALLNAME:TARGET%は渋々と%CALLNAME:MASTER%の後ろに立った。

    「……本当にやるんですか……？」

    ため息をつきながらも、小さな手を伸ばす。

    「……こうやって……撫でれば……」

    %CALLNAME:TARGET%の指が%CALLNAME:MASTER%の秘部をぎこちなく撫でた。

    「……んっ……変な感じです……」

    「……%CALLNAME:MASTER%……こういうの……好きなんですか……」
