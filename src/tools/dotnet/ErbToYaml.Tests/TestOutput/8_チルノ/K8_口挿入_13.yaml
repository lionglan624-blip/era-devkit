- id: fallback
  content: >-
    「はあ？　なんであたいがこんなことしなきゃいけないのよ！」

    %CALLNAME:人物_チルノ%は不機嫌な顔で%CALLNAME:MASTER%を睨んだ。

    「最強のあたいをなんだと思ってるの！」

    %CALLNAME:人物_チルノ%は怒りを露わにした。

    「……っ！　仕方ないわね……」

    渋々と%CALLNAME:MASTER%に覆いかぶさると、%CALLNAME:人物_チルノ%は顔をしかめた。

    「さっさと終わらせるわよ……覚えてなさい！」

    氷の妖精は怒りを込めて言い放った。

    「ちょっと……なに考えてんのよ」

    %CALLNAME:人物_チルノ%は嫌そうな顔で%CALLNAME:MASTER%を見た。

    「あたいにこんなこと強制するなんて……許さないからね」

    %CALLNAME:人物_チルノ%は文句を言いながらも命令に従った。

    「んっ……」

    繋がった瞬間、%CALLNAME:人物_チルノ%は不快そうに顔を歪めた。

    「……早く終わらせて。いつか絶対に仕返しするから」

    氷の妖精は冷たい目で%CALLNAME:MASTER%を睨んだ。

    「……」

    %CALLNAME:人物_チルノ%は無言で%CALLNAME:MASTER%を見下ろした。

    その目には怒りと屈辱が宿っている。

    「あたいを侮辱するなんて……許さない」

    命令には従うが、%CALLNAME:人物_チルノ%の動きには全く情がない。

    「……凍らせてやりたいわ」

    氷の妖精は低い声で呟いた。

    「%CALLNAME:MASTER%って、本当に最低」

    %CALLNAME:人物_チルノ%は軽蔑を込めて言った。

    「あたいをこんなことに使うなんて……」

    %CALLNAME:人物_チルノ%は仕方なく%CALLNAME:MASTER%に覆いかぶさった。

    「……これで満足なんでしょ」

    冷たい声で言いながら、機械的に腰を動かし始めた。

    「いつかこの借りは必ず返すからね……」

    氷の妖精は復讐を誓った。
  priority: 1
