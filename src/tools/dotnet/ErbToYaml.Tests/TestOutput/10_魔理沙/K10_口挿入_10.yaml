- id: fallback
  content: >-
    「お、おい……後ろからなんて、させるなよ……」

    %CALLNAME:人物_魔理沙%は動揺しながらも、%CALLNAME:MASTER%の後ろに回らされた。

    「わ、私にこんなこと……何考えてるんだ……」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、ぎこちなく腰を動かした。

    「……くそ、顔見えないのがせめてもの救いだな……」

    %CALLNAME:人物_魔理沙%は落ち着かない様子で、なんとか状況を受け入れようとしていた。

    「……何でこんな体勢になってるんだ」

    %CALLNAME:人物_魔理沙%は理不尽そうに呟きながら、腰を動かしている。

    「後ろからなんて……もっと親しくなってからだろ……」

    %CALLNAME:人物_魔理沙%の抗議とは裏腹に、身体は動き続けていた。

    「はぁ……仕方ない、早く終わらせるぞ……」

