    %CALLNAME:MASTER%が胸を優しく揉むと、%CALLNAME:人物_大妖精%は甘い吐息を漏らした。

    「んぁ……そこ、気持ちいい……」

    %CALLNAME:人物_大妖精%の頬が桜色に染まっていく。

    「……%CALLNAME:MASTER%に触られると、どきどきするの……」

    %CALLNAME:人物_大妖精%は恋人の手の感触を、心から楽しんでいた。

    「あっ……んっ……」

    %CALLNAME:MASTER%の手が胸を這うたび、%CALLNAME:人物_大妖精%は小さく声を上げた。

    妖精の小さな胸は、%CALLNAME:MASTER%の手の中で愛おしそうに揉まれている。

    「……%CALLNAME:MASTER%、上手……わたしの胸、よく知ってるね……」

    %CALLNAME:人物_大妖精%は照れくさそうに、でも嬉しそうに微笑んだ。

    「……ずっと、こうしていたいな……」

    %CALLNAME:人物_大妖精%は%CALLNAME:MASTER%の胸に顔を埋めた。

    「……ん……」

    %CALLNAME:人物_大妖精%は目を閉じて、%CALLNAME:MASTER%の愛撫に身を委ねている。

    「……%CALLNAME:MASTER%に胸を触られると……なんだか、安心するの……」

    %CALLNAME:人物_大妖精%は%CALLNAME:MASTER%の手に自分の手を重ねた。

    「……大好きだよ、%CALLNAME:MASTER%……」

    小さな告白とともに、%CALLNAME:人物_大妖精%の翅がきらきらと輝いた。

    「……もっと、いっぱい触って……」

    %CALLNAME:人物_大妖精%は恋人に甘えるように、そうねだった。
