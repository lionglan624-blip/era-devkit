- id: fallback
  content: >-
    「……何、この体勢」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    正面から組み敷かれ、逃げ場がない。

    「っ……そう、正面からするつもり……」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は息を呑んだ。

    「……ふん、まあいいわ。好きにしなさい」

    威厳を保とうとしながらも、その頬はほんのり紅かった。

    「……使用人の分際で、主を正面から抱くなんて」

    %CALLNAME:人物_レミリア%は不満そうに言った。

    しかし%CALLNAME:MASTER%が動き始めると、

    「っ……あ……」

    小さな声が漏れた。

    「……今日は機嫌がいいから、特別に許してあげているのよ」

    %CALLNAME:人物_レミリア%は必死に威厳を保とうとしていた。

    「……顔を見ながらとは、度胸があるわね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を値踏みするように見た。

    正面から繋がった体勢で、%CALLNAME:MASTER%が腰を進める。

    「んっ……そう、そうやって動くのね……」

    %CALLNAME:人物_レミリア%は興味深げに、しかし息を乱しながら言った。

    「……まあ、悪くないわね」

    吸血鬼の心に、何かが芽生え始めていた。

    「……ふぅん」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の行動を観察していた。

    正面から抱かれる体勢は、互いの表情がよく見える。

    「っ……ほう、なかなか……やるじゃない……」

    %CALLNAME:MASTER%の動きに、%CALLNAME:人物_レミリア%の呼吸が乱れていく。

    「……今日のところは、褒めてあげるわ」

    500年の吸血鬼は、認めたくない快感を噛み締めていた。
  priority: 2
- id: fallback
  content: >-
    「……何のつもりかしら」

    %CALLNAME:人物_レミリア%は冷たい視線で%CALLNAME:MASTER%を見た。

    正面から組み敷かれた体勢で、紅魔館の主は眉をひそめた。

    「使用人が主をこんな体勢で抱くなど、身の程知らずね」

    %CALLNAME:MASTER%が動き始めると、%CALLNAME:人物_レミリア%は小さく息を吐いた。

    「……まあいいわ。下僕の奉仕として受け取っておく」

    威厳を保ちながら、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を見下ろした。

    「……随分と大胆ね」

    %CALLNAME:人物_レミリア%は不敵に微笑んだ。

    正面から抱かれる体勢でも、その瞳には威厳が宿っている。

    「私を満足させられると思っているの？」

    %CALLNAME:MASTER%の動きに、%CALLNAME:人物_レミリア%はわずかに反応した。

    「……ふん、まあ悪くはないわね」

    500年の吸血鬼は、感情を表に出さずに評価を下した。

    「……ほう」

    %CALLNAME:人物_レミリア%は興味なさそうに%CALLNAME:MASTER%を見た。

    正面から繋がった体勢で、%CALLNAME:MASTER%が腰を動かし始めた。

    「……その程度で私を悦ばせられると思うな」

    だが、%CALLNAME:人物_レミリア%の呼吸はわずかに乱れていた。

    「……退屈しのぎには、なるかしらね」

    紅魔館の主は、高飛車な態度を崩さなかった。

    「……使用人がこんな大それたことを」

    %CALLNAME:人物_レミリア%は溜息をついた。

    正面から組み敷かれた体勢でも、吸血鬼の威厳は揺るがない。

    「まあいいわ。今日は特別に許してあげる」

    %CALLNAME:MASTER%が動き始めると、%CALLNAME:人物_レミリア%はわずかに目を細めた。

    「……精々、私を楽しませなさい」

    命令するように言い放ち、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を見下ろした。
  priority: 1
