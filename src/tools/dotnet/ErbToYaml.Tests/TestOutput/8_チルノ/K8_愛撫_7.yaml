- id: talent_3_1
  content: >-
    「ひゃっ！　ちょ、ちょっと%CALLNAME:MASTER%……！」

    %CALLNAME:人物_チルノ%は突然胸を触られ、驚いて身を縮めた。

    しかし、逃げようとはせず、顔を赤らめながらその場に留まっている。

    「い、いきなり乳首なんて……恥ずかしいでしょ……」

    %CALLNAME:人物_チルノ%は小さな声で抗議しながらも、体は逆に%CALLNAME:MASTER%に近づいていた。

    「……%CALLNAME:MASTER%のせいだからね、こんな気持ちになるの……」

    強がりつつも、%CALLNAME:人物_チルノ%の声は甘く震えていた。

    「んっ……あ……そこ、感じる……」

    %CALLNAME:MASTER%に乳首を弄られ、%CALLNAME:人物_チルノ%は思わず声を漏らした。

    普段の威勢のいい態度はどこへやら、今は恥じらいに染まっている。

    「……こんなところ触られたの、初めて……」

    %CALLNAME:人物_チルノ%は俯きながら、小さく告白した。

    「……%CALLNAME:MASTER%だから、いいけど……他の奴には絶対させないからね」

    独占欲を覗かせながら、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%を見つめた。

    「やっ……ぎゅって、しないでよ……」

    %CALLNAME:MASTER%が乳首を摘むと、%CALLNAME:人物_チルノ%は切ない声を上げた。

    小さな体がびくりと跳ねて、冷気が辺りに漂う。

    「……なんか、変な感じ……頭がぼんやりしてくる……」

    %CALLNAME:人物_チルノ%は困惑した表情で、自分の体の反応に戸惑っている。

    「……%CALLNAME:MASTER%、責任取りなさいよね……こんな気持ちにさせて……」

    強がりながらも、その瞳は期待に揺れていた。

    「あっ……んっ……乳首だけで、こんなに……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の愛撫に、甘い声を堪えきれない。

    氷の妖精の肌は上気し、普段の冷たさはどこにもなかった。

    「……%CALLNAME:MASTER%のこと、好きなのかも……」

    %CALLNAME:人物_チルノ%はぽつりと呟いた後、自分の言葉に顔を真っ赤にした。

    「い、今のは聞かなかったことにして！」

    慌てて取り消そうとするが、その表情は幸せそうだった。
