  content: >-
    「……%CALLNAME:MASTER%、こうして……擦ればいいのかしら……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨り、陰部を一物に押し当てた。

    本で読んだ知識を思い出しながら、ゆっくりと腰を動かし始める。

    「……熱い……あなたのが、私の中に……入っていないのに……」

    %CALLNAME:TARGET%は頬を染めながら、腰の動きを続けた。

    「……あなたを気持ち良くできるなら……これも研究の一環よ……」

    照れ隠しの言い訳をしながらも、腰は止まらなかった。

    「んっ……ふ……こう動くと……気持ち良い……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を観察しながら腰を動かしている。

    「……私の……濡れてきているわ……」

    %CALLNAME:TARGET%は恥ずかしそうに呟いた。

    「……あなたを感じられて……嬉しいの……」

    そう小さく呟いて、%CALLNAME:TARGET%は腰の動きを少し速くした。

    「……ふぅ……腰を動かすの……思ったより疲れるわ……」

    %CALLNAME:TARGET%は体が弱いながらも、%CALLNAME:MASTER%への奉仕を続けていた。

    「……でも、あなたの喜ぶ顔が見たいから……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見下ろして、微笑んだ。

    「……もう少し、頑張るわ……」

    脆弱な体に鞭打ちながら、愛する人のために腰を動かし続けた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は穏やかな表情で%CALLNAME:MASTER%の名前を呼んだ。

    「……こうして触れ合っていると、あなたの体温が伝わってくるの……」

    %CALLNAME:TARGET%は腰をゆっくりと前後に動かしている。

    「……私の体で、あなたを満たせるなら……光栄よ」

    知識の魔女は、愛する人への奉仕に静かな喜びを感じていた。
