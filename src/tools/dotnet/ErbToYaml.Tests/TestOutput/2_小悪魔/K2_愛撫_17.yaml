    %CALLNAME:人物_小悪魔%は冷静を装いながらも、僅かに頬を染めていた。

    「ちょっ……いきなり後ろに珠を……！」

    %CALLNAME:MASTER%がアナルビーズを%CALLNAME:人物_小悪魔%の後孔に挿入した。

