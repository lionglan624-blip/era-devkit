- id: talent_3_1
  content: >-
    「……%CALLNAME:MASTER%……お口で……よろしいのですか……」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%の一物を見つめた。

    「……こ、こんなこと……初めてですけれど……」

    %CALLNAME:TARGET%は意を決して口を開き、一物を含んだ。

    「んっ……おおきい……ですわ……」

    「れろ……ちゅ……こうすれば……いいのでしょうか……」

    不慣れながらも、%CALLNAME:TARGET%は懸命に舌を動かした。

    「……は、はしたないですわ……こんな……」

    %CALLNAME:TARGET%は顔を真っ赤にしながらも、口を離さなかった。

    「でも……%CALLNAME:MASTER%のためなら……」

    「んむ……ちゅる……気持ちよく……なっていますか……？」

    %CALLNAME:TARGET%は上目遣いで確認しながら、頭を動かした。

    「……っ……もう少し……上手にできるよう……努力しますわ……」

    恥ずかしさと嬉しさが入り混じった表情で奉仕を続ける。

    「……こうして差し上げるなんて……」

    %CALLNAME:TARGET%は自分の行動に戸惑いを感じながらも、舌を動かし続けた。

    「メイドとして……ではなく……私が……したくて……」

    「んっ……ぢゅる……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は言葉を途中で飲み込み、奉仕に集中した。

    「……っ……見ないでくださいまし……恥ずかしい……」

    複雑な心境を隠しながら、%CALLNAME:TARGET%は口奉仕を続けた。

    「……%CALLNAME:MASTER%……こんな私……嫌いになりませんか……」

    %CALLNAME:TARGET%は不安げに%CALLNAME:MASTER%を見上げながら咥えている。

    「れろ……ん……こんなはしたないこと……」

    「でも……貴方のためなら……何でも……」

    %CALLNAME:TARGET%は決意を固めたように、より深く咥え込んだ。

    「んむっ……ぷはっ……最後まで……お世話させてくださいまし……」

    恥ずかしさを堪えながらも、%CALLNAME:TARGET%は懸命に奉仕した。
