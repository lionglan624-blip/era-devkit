character: 小悪魔
situation: K2_会話親密
entries:
- id: fallback
  content: >-
    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の言葉にいたずらっぽい笑みを浮かべた。

    「――ふふっ、それでそれで？」

    %CALLNAME:人物_小悪魔%は身を乗り出して%CALLNAME:MASTER%の話を聞いている。

    「%CALLNAME:MASTER%のお話、面白いですわ。もっと聞かせてくださいな」

    %CALLNAME:人物_小悪魔%は悪魔の尻尾を揺らしながら、嬉しそうに相槌をうっている。

    「……ねえ、この後も一緒にいてくださいます？」

    甘えるような声で、%CALLNAME:人物_小悪魔%はそうねだった。

    「――あのね、%CALLNAME:MASTER%、聞いてくださいます？」

    %CALLNAME:人物_小悪魔%は楽しそうに話を始めた。

    パチュリー様の話、本の話、図書館で起きたちょっとした出来事……

    「……聞いてます？　もう、ぼーっとしないでくださいな」

    %CALLNAME:人物_小悪魔%は頬を膨らませながらも、目は笑っている。

    「ふふっ、まあいいですわ。それでね――」

    「――幸せですわぁ」

    唐突に%CALLNAME:人物_小悪魔%がそう呟いた。

    どうしたの、と%CALLNAME:MASTER%が問うと、

    「いえ……こうやって%CALLNAME:MASTER%とお話できるの、私すごく好きなんです」

    「悪魔なのに、こんな幸せ感じちゃっていいのかしら……ふふっ」

    %CALLNAME:人物_小悪魔%は照れたように笑いながら、%CALLNAME:MASTER%の手を握った。

    「――%CALLNAME:MASTER%？　ちゃんと聞いてくださってます？」

    聞いてるよ、と%CALLNAME:MASTER%が答えると、

    「本当ですか？　悪魔は嘘つきを見抜くのが得意なんですのよ？」

    %CALLNAME:人物_小悪魔%はいたずらっぽく目を細めた。

    「……でも%CALLNAME:MASTER%の嘘は、ちょっとだけ許してあげますわ」

    そう言って、%CALLNAME:人物_小悪魔%は嬉しそうに笑った。
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%と話しながら、ちらちらと%CALLNAME:MASTER%の様子をうかがっていた。

    「――へぇ、そうなんですか」

    %CALLNAME:人物_小悪魔%は興味深そうに相槌をうった。

    「%CALLNAME:MASTER%って、いろんなことご存知なんですね」

    %CALLNAME:人物_小悪魔%はまじまじと%CALLNAME:MASTER%を見つめている。

    「……もっと、%CALLNAME:MASTER%のこと教えてほしいですわ」

    少し頬を赤らめながら、%CALLNAME:人物_小悪魔%はそう言った。

    「――それでね、%CALLNAME:MASTER%」

    %CALLNAME:人物_小悪魔%は笑みを浮かべながら、嬉々として話をしている。

    まるで子供のように楽しそうだ。

    「%CALLNAME:MASTER%は最近何かありました？」

    「ふふ、聞かせてくださいな。%CALLNAME:MASTER%のこと、もっと知りたいですの」

    「……ねえ、%CALLNAME:MASTER%」

    %CALLNAME:人物_小悪魔%は少し恥ずかしそうにこちらを見た。

    「こうやってお話してる時間、私……好きなんです」

    %CALLNAME:人物_小悪魔%は尻尾をぱたぱたと揺らしながら、照れを隠している。

    「……また、お話しに来てくださると嬉しいですわ」

    「――ねえねえ、%CALLNAME:MASTER%」

    %CALLNAME:人物_小悪魔%は悪戯っぽく%CALLNAME:MASTER%の袖を引いた。

    「私のこと、どう思ってます？　ちゃんと悪魔だって意識してくださってます？」

    %CALLNAME:MASTER%が戸惑っていると、

    「ふふっ、冗談ですわ。……半分くらいは」

    %CALLNAME:人物_小悪魔%は羽根をひらひらと揺らしながら、意味ありげに微笑んだ。
