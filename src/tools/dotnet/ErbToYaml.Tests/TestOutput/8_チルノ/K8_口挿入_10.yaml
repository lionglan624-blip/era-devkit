    「%CALLNAME:MASTER%……あたいのこと……ちゃんと見てて」

    %CALLNAME:人物_チルノ%は恥ずかしそうに、でも嬉しそうに言った。

    「んっ……あ……%CALLNAME:MASTER%の……後ろ、深くまで……」

    %CALLNAME:人物_チルノ%が腰を揺らすと、アナルで繋がった場所から音が響いた。

    「あたいのおしりで……%CALLNAME:MASTER%のが……びくびくしてる……嬉しい」

    氷の妖精は愛おしそうに%CALLNAME:MASTER%の胸に手を置いた。

    「えへへ……%CALLNAME:MASTER%、気持ちいい？」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の反応を確かめるように覗き込んだ。

    「あたいのおしりも……%CALLNAME:MASTER%のが動くと……きゅってなる……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに腰を揺らし続けた。

    「こうやって後ろで繋がってると……%CALLNAME:MASTER%とひとつになってる感じがする」

    氷の妖精は幸せそうに微笑んだ。

    「%CALLNAME:MASTER%のこと……好きだから……頑張るね」

    %CALLNAME:人物_チルノ%は真剣な表情で言った。

    「んっ……あぁ……%CALLNAME:MASTER%の……おしりの奥まで……」

    %CALLNAME:人物_チルノ%はしっかりと後ろで%CALLNAME:MASTER%を受け止めながら腰を振った。

    「あたいがいっぱい気持ちよくしてあげるからね……」

    最強の妖精は恋人のために必死に腰を動かした。
