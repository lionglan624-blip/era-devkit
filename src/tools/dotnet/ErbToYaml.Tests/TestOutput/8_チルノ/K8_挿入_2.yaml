- id: fallback
  content: >-
    「え……こっちの穴でするの……？　そんなこともできるんだ……」

    %CALLNAME:人物_チルノ%は不思議そうに%CALLNAME:MASTER%を見上げた。

    %CALLNAME:MASTER%が菊穴に挿入すると、%CALLNAME:人物_チルノ%は目を見開いた。

    「わっ……な、なにこれ……すごい変な感じ……」

    %CALLNAME:人物_チルノ%の菊穴は異物を押し出そうとぎゅっと締め付ける。

    「こんなとこに入るんだ……体って不思議だね……」

    「へぇ……後ろの穴かぁ……どんな感じなんだろ」

    %CALLNAME:人物_チルノ%は興味津々で%CALLNAME:MASTER%を見ていた。

    しかし挿入されると、その表情は驚きに変わった。

    「んっ……いたっ……こ、こっちは痛いね……」

    %CALLNAME:人物_チルノ%は涙目になりながら、感覚を確かめていた。

    「でも……慣れたら違うのかな……？」

    「あ……%CALLNAME:MASTER%、お尻に当たってる……」

    %CALLNAME:人物_チルノ%は下を見下ろしながら、体の変化を観察していた。

    %CALLNAME:MASTER%が菊穴を押し広げると、きゅうっと締め付けてくる。

    「んっ……きつい……お腹が押されてる感じ……」

    %CALLNAME:人物_チルノ%は困惑しながらも、好奇心を隠せなかった。

    「正面の穴とは……全然違う感じなんだね……」

    「……%CALLNAME:MASTER%、ここでするって……変なことなの？」

    %CALLNAME:人物_チルノ%は不安そうに%CALLNAME:MASTER%を見上げた。

    よくわからないまま、菊穴で%CALLNAME:MASTER%を受け入れている。

    「んっ……きつくて……でも、なんか……変な気持ち……」

    %CALLNAME:人物_チルノ%の体が少しずつ慣れてきているようだった。

    「……よくわかんないけど……嫌じゃない、かも……」
