  content: >-
    「ひゃっ……！　二人、同時に……!?」

    %CALLNAME:人物_美鈴%は驚きの声を上げた。

    前と後ろを同時に貫かれる感覚に、体が硬直する。

    「こ、こんな体勢……恥ずかしすぎます……」

    %CALLNAME:人物_美鈴%は顔を真っ赤にしながらも、拒むことはできなかった。

    「……でも……%CALLNAME:MASTER%がいるから……頑張れます……」

    好きな人の前で晒す痴態に、羞恥と喜びが入り混じった。

    「あ……ん……っ……両方、動かれると……」

    %CALLNAME:人物_美鈴%は甘い声を抑えきれずに漏らした。

    「……こんな声……出したくないのに……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに顔を背けた。

    「……%CALLNAME:MASTER%に聞かれてる……」

    「……恥ずかしい……でも……嫌じゃ、ないです……」

    照れ隠しの言葉に、本心が滲み出ていた。

    「……んっ……前も、後ろも……いっぱい……」

    %CALLNAME:人物_美鈴%は困惑した表情で呟いた。

    「……こんなの、初めてで……どうしたらいいか……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に縋るような目を向けた。

    「……%CALLNAME:MASTER%……手、握っていてください……」

    「……そうしてくれたら……怖くないから……」

    恥ずかしそうに、でも必死に%CALLNAME:人物_美鈴%は願った。

    「はぁ……はぁ……二穴を……同時に……」

    %CALLNAME:人物_美鈴%は息を荒げながら、快感に耐えていた。

    「……武術の鍛錬より……これは……辛い……」

    %CALLNAME:人物_美鈴%は冗談めかして言った。

    「……でも……%CALLNAME:MASTER%のためなら……」

    「……頑張れます……きっと……」

    照れながらも、%CALLNAME:人物_美鈴%は健気に応えようとしていた。
