entries:
- id: fallback
  content: >-
    「んっ……%CALLNAME:MASTER%……そこ、お尻の穴だよ……？」

    %CALLNAME:人物_フラン%は振り返りながら、恥ずかしそうに%CALLNAME:MASTER%を見つめた。

    %CALLNAME:MASTER%の指がそっと菊穴に触れると、小さな身体がびくりと震える。

    「あぅ……変な感じ……でも、%CALLNAME:MASTER%がしたいなら……いいのさ」

    %CALLNAME:人物_フラン%は恋人への信頼を込めて、身体の力を抜いた。

    「私の全部……%CALLNAME:MASTER%のものだもん……」

    悪魔の妹は、恋人の手に未知の場所を委ねていた。

    「ひゃっ……！　%CALLNAME:MASTER%、そこ……くすぐったい……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%にお尻を弄られ、甘い声を漏らした。

    495年の孤独を知る少女も、こんな場所を触られるのは初めてだった。

    「んぅ……あっ……なんか、変になっちゃいそう……」

    %CALLNAME:人物_フラン%は顔を赤らめながらも、逃げようとはしなかった。

    「……%CALLNAME:MASTER%なら、どこを触られても平気なのさ……」

    紅い瞳が、愛おしそうに恋人を見つめていた。

    「あ……そこ、弄られると……不思議な気分になるの……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の指にお尻の穴を弄られながら、とろんとした表情を浮かべた。

    「こんなところで気持ちよくなるなんて……知らなかったのさ」

    %CALLNAME:人物_フラン%は恥ずかしそうに目を伏せた。

    「……%CALLNAME:MASTER%、もっと教えて……私の知らないこと……」

    悪魔の妹は、恋人の愛撫に身を任せていた。

    「壊れちゃってもいいから……%CALLNAME:MASTER%といたいの」

    「えへへ……%CALLNAME:MASTER%、そんなところまで触りたいの……？」

    %CALLNAME:人物_フラン%は無邪気に笑いながら、お尻を%CALLNAME:MASTER%に向けた。

    「いいよ……私の恥ずかしいところ、いっぱい見て……」

    %CALLNAME:MASTER%の指が菊穴を撫でると、%CALLNAME:人物_フラン%は甘い吐息を漏らした。

    「やぁ……ん……%CALLNAME:MASTER%の指、あったかいね……」

    地下室でひとりだった少女は、今、恋人の温もりに包まれている。

    「私……%CALLNAME:MASTER%といると、幸せなのさ……」
