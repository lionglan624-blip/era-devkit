character: 小悪魔
situation: K2_口挿入
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……ふふっ、私の胸がほしいんですの？」

    %CALLNAME:人物_小悪魔%は悪戯っぽく笑いながら、胸の谷間を見せつけた。

    そっと%CALLNAME:MASTER%の一物を胸で挟み込む。

    「悪魔の胸……存分に味わってくださいませ……んっ……」

    %CALLNAME:人物_小悪魔%は愛おしそうに胸を揺らし、一物を柔らかく包み込んだ。

    「ふふ……%CALLNAME:MASTER%の……どんどん熱くなってきますわ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の一物を胸の谷間に収めた。

    「んっ……こうやって……挟んであげると……」

    柔らかな乳房が一物を包み込み、上下にゆっくりと動く。

    「ふふ……気持ちいいでしょう？　私の胸……」

    %CALLNAME:人物_小悪魔%は上目遣いで%CALLNAME:MASTER%を見つめながら、胸を寄せた。

    「もっと……もっと気持ちよくしてあげますわ……」

    「ねえ、%CALLNAME:MASTER%……私の胸、好きですか？」

    %CALLNAME:人物_小悪魔%は胸で一物を挟みながら、嬉しそうに目を細めている。

    乳房を手で押さえ、一物をきゅっと締め付ける。

    「んっ……ふふ、こうすると……気持ちいいんですよね……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の反応を楽しみながら、緩急をつけて動く。

    「悪魔に奉仕されるって……特別な気分でしょう……？」

    %CALLNAME:人物_小悪魔%は蕩けるような笑みを浮かべ、胸を押し当てた。

    「%CALLNAME:MASTER%……私……あなたのこと……大好き……」

    ねっとりと胸を擦りつけながら、%CALLNAME:人物_小悪魔%は愛を囁く。

    「だから……こうやって奉仕できるのが……幸せですわ……」

    %CALLNAME:人物_小悪魔%は一物を深く胸に埋め、ゆっくりと揺らした。

    「んっ……全部……私の胸で受け止めますわ……」
  priority: 4
- id: talent_3_1
  content: >-
    「え、えっと……む、胸で……ですか……？」

    %CALLNAME:人物_小悪魔%は顔を赤くしながらも、胸元をはだけた。

    おずおずと一物に胸を近づけている。

    「こ、こうすれば……いいんですよね……んっ……」

    %CALLNAME:人物_小悪魔%は恐る恐る胸で一物を挟み込んだ。

    「……あ……熱い……こんなに熱いんですのね……」

    %CALLNAME:人物_小悪魔%は一物を胸で包み、ゆっくりと動かしている。

    「んっ……こ、こうですか……？　気持ちいいですか……？」

    慣れない動きながらも、一生懸命に奉仕しようとしている。

    「あっ……胸が擦れて……私も変な感じ……」

    %CALLNAME:人物_小悪魔%は困った顔をしながらも、やめようとはしない。

    「……もう少し……頑張りますから……」

    「%CALLNAME:MASTER%……こんなこと、させるなんて……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに俯きながら、胸を動かした。

    「でも……%CALLNAME:MASTER%になら……いいかも……って……」

    胸で一物をゆっくり擦り、乳首が硬くなってきている。

    「……んっ……変な感じですわ……でも嫌じゃない……」

    %CALLNAME:人物_小悪魔%の尻尾がそわそわと揺れている。

    %CALLNAME:人物_小悪魔%は意を決したように、胸で一物を挟んだ。

    「んっ……は、はむ……ん……こうですか……」

    頬が赤く染まり、目が潤んでいる。

    「……%CALLNAME:MASTER%……見ないでください……」

    恥ずかしそうにしながらも、%CALLNAME:人物_小悪魔%は胸を動かし続けた。

    「……こういうの……悪魔として、どうなんでしょう……」
