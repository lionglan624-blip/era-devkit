- id: fallback
  content: >-
    「え、えっと……こういうの、初めてなんだが……」

    %CALLNAME:人物_魔理沙%は戸惑いながら、%CALLNAME:MASTER%のVに手を伸ばした。

    「……本で読んだことはあるけど、実際にやるのは……」

    %CALLNAME:人物_魔理沙%はおそるおそる触れると、その感触に驚いた。

    「うわっ……こういう感じなのか……」

    %CALLNAME:人物_魔理沙%は興味深そうに、ゆっくりと指を動かし始めた。

    「こうか……？　合ってるのか……？」

    %CALLNAME:人物_魔理沙%は不安そうに%CALLNAME:MASTER%の顔を窺った。

    「痛かったら言えよな……加減がよくわからないんだ」

    %CALLNAME:人物_魔理沙%の手つきはぎこちないが、真剣だった。

    「……なるほど、こうすると反応するのか……」

    %CALLNAME:人物_魔理沙%は魔法の実験のように、興味津々で愛撫した。

    「ふーん……こういう感触なのか」

    %CALLNAME:人物_魔理沙%は知的好奇心から、指の動かし方を工夫した。

    「触ってると、なんか濡れてくるんだな……体って不思議だぜ」

    %CALLNAME:人物_魔理沙%は愛撫しながら、%CALLNAME:MASTER%の反応を見ていた。

    「……なんか、こうしてると私も変な気分になってくるな……」

    %CALLNAME:人物_魔理沙%は自分の体の反応に戸惑っていた。

    「……%CALLNAME:MASTER%、これで合ってるのか？」

    %CALLNAME:人物_魔理沙%は真剣な表情で訊ねた。

    「私、こういうの初めてだから……ちゃんと教えてくれよ」

    %CALLNAME:MASTER%が手を添えて教えると、%CALLNAME:人物_魔理沙%は素直に従った。

    「なるほど……こうやって動かすのか……」

    %CALLNAME:人物_魔理沙%は教わった通りに愛撫し、真剣に練習していた。
