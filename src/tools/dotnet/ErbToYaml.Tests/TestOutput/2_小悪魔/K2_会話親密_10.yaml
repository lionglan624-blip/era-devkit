- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%に抱きついた。

    「えっ…！？ ちょ、%CALLNAME:MASTER%…！？」

    %CALLNAME:人物_小悪魔%は顔を真っ赤にして固まった。

    「だ、抱きつくなんて…急すぎますの…」

    戸惑いながらも、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%を押し退けはしなかった。

    「…嫌じゃない、ですけど…」

    恥ずかしそうに目を逸らしながら、%CALLNAME:人物_小悪魔%は小さくそう呟いた。

    「わわっ！？」

    突然の抱擁に、%CALLNAME:人物_小悪魔%は動揺した声を上げた。

    「%CALLNAME:MASTER%、いきなりどうしたんですの…」

    %CALLNAME:人物_小悪魔%は困惑しながらも、抵抗はしなかった。

    「…疲れてますの？ パチュリー様のお仕事、大変でしたか…？」

    戸惑いながらも、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の背中を優しく叩いた。

    「ちょ、ちょっと%CALLNAME:MASTER%…」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に抱きしめられている。

    「あ、あの……いつまで……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに視線を泳がせた。

    「……嫌、ではないですけど……心臓に悪いですの……」

    悪魔の頬は、耳まで真っ赤に染まっていた。

    「ひゃっ……！」

    %CALLNAME:MASTER%に抱きしめられて、%CALLNAME:人物_小悪魔%は驚いた声を上げた。

    「な、なんですの、急に……」

    困ったように%CALLNAME:人物_小悪魔%はこちらを見上げる。

    「……あの、離してくれとは言いませんけど……」

    「……もうちょっと、心の準備させてほしいですの……」

    %CALLNAME:人物_小悪魔%は照れくさそうに俯いた。
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%に抱きつこうとした。

    「ちょ、ちょっと！ 何するんですの！」

    %CALLNAME:人物_小悪魔%は慌てて身を引いた。

    「い、いきなり抱きつくなんて…」

    困惑した表情で、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%を見つめた。

    「悪魔だからって、誰にでもいいってわけじゃないですの」

    %CALLNAME:人物_小悪魔%は頬を膨らませながら、距離を置いた。

    「えっ…ちょっと…」

    %CALLNAME:MASTER%が近づいてきて、%CALLNAME:人物_小悪魔%は後ずさった。

    「あの、抱きつくのは…その…」

    %CALLNAME:人物_小悪魔%は居心地悪そうに視線を泳がせた。

    「まだそこまで親しくないと思うんですけど…」

    丁重に、しかし明確に、%CALLNAME:人物_小悪魔%は距離を置いた。

    「あら……」

    %CALLNAME:MASTER%が抱きつこうとすると、%CALLNAME:人物_小悪魔%はひらりと身をかわした。

    「悪魔を捕まえたかったら、もっと上手にやってくださいな」

    いたずらっぽく笑いながらも、その目は警戒している。

    「……冗談ですの。今日のところは、お引き取りくださいな」

    %CALLNAME:人物_小悪魔%はそう言って、静かに距離を取った。

    「わっ……！」

    %CALLNAME:MASTER%が抱きついてきて、%CALLNAME:人物_小悪魔%は驚いた。

    「な、何をするんですの……」

    %CALLNAME:人物_小悪魔%は困惑した様子でこちらを見つめる。

    「……あの、まだそこまでの仲ではないと思うんですけど」

    やんわりと、しかし毅然として%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%から離れた。

    「順番というものがありますの」
  priority: 1
