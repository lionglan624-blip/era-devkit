entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……こうして向かい合って座ると……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の膝の上に座り、顔を見つめた。

    「貴方の表情が……全部見えてしまいますわ……」

    %CALLNAME:TARGET%は自ら腰を沈め、%CALLNAME:MASTER%を深く受け入れていく。

    「あ……んっ……奥まで……届いて……」

    「こんなに近くで……貴方を感じられるなんて……」

    恋人の首に腕を回し、%CALLNAME:TARGET%は幸せそうに微笑んだ。

    「ふぁ……%CALLNAME:MASTER%……キスしながら……いいですか……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に唇を近づけ、口づけを交わした。

    「んちゅ……んっ……ふ……」

    唇を重ねながら、%CALLNAME:TARGET%は自ら腰を動かし始める。

    「……好き……ですわ……%CALLNAME:MASTER%……」

    「こうしていると……時を止めたくなってしまいますの……」

    瀟洒なメイドは、恋人の腕の中で甘く蕩けていった。

    「……%CALLNAME:MASTER%……もっと……抱きしめてください……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみつき、身を預けた。

    「向かい合っていると……心まで繋がっている気がしますの……」

    %CALLNAME:MASTER%の動きに合わせて、%CALLNAME:TARGET%も腰を揺らす。

    「あ……ん……深い……すごく気持ちいい……」

    「お嬢様より……今は貴方だけを見ていますわ……」

    %CALLNAME:TARGET%は恋人だけに見せる、蕩けた表情を浮かべていた。

    「……私の全部……見せてしまいますわね……この体勢……」

    %CALLNAME:TARGET%は恥じらいながらも、%CALLNAME:MASTER%を真っ直ぐ見つめた。

    「でも……隠したくないの……貴方には……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に頬を寄せ、甘えるように擦り付けた。

    「あ……んぅ……動いて……%CALLNAME:MASTER%……」

    「二人でひとつになっている……この瞬間が……大好きですの……」

    完璧なメイドの仮面の下、恋する乙女が微笑んでいた。
