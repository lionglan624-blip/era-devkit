    「……%CALLNAME:MASTER%、そういうのは……恥ずかしいです……」

    %CALLNAME:人物_美鈴%は訴えるように%CALLNAME:MASTER%を見上げた。

    「……せめて、もう少し仲良くなってから……」

    %CALLNAME:人物_美鈴%は羞恥に耐えながら、お願いした。

    「あっ……な、なんで……そこ……」

    %CALLNAME:人物_美鈴%は困惑した声を上げた。

    %CALLNAME:MASTER%の意図が理解できず、ただ戸惑うばかりだ。

    「……こういうのって、普通なんですか……？」

    %CALLNAME:人物_美鈴%は不安そうに問いかけた。

    「……%CALLNAME:MASTER%……優しくしてくださいね……」

