    「……%CALLNAME:MASTER%、私の動き……どうですか……？」

    紅魔館の主は、不安げに%CALLNAME:MASTER%の反応を伺った。

    「……後ろから、ですか……わかりましたわ……」

    %CALLNAME:人物_レミリア%は淡々と言いながら%CALLNAME:MASTER%の背後に回った。

    「……では、始めますわね……」

    小さな腰が%CALLNAME:MASTER%の中で動き始める。

    「あ……っ……こ、この体勢だと……深くまで……」

    %CALLNAME:人物_レミリア%は困惑したように呟いた。

    「……%CALLNAME:MASTER%……もう少しだけ、待ってください……」

    500年の吸血鬼は、慣れない快楽に戸惑いを隠せなかった。
