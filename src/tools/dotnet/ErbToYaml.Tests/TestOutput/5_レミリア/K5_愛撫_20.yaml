    搾乳機の吸引に%CALLNAME:人物_レミリア%の身体が震え始めた。

    「あぁっ……%CALLNAME:MASTER%……もっと、強くして」

    紅魔館の主は、恋人の前で甘く喘いでいた。

    「……%CALLNAME:MASTER%、その器具は何かしら」

    %CALLNAME:人物_レミリア%は搾乳機を見て、好奇心を覗かせた。

    「乳を絞る機械……ふぅん、面白そうね」

    カップが胸に吸い付き、吸引が始まった。

    「っ……乳房が、吸い込まれて……ひゃっ！　気持ちいい……！」

    律動的な刺激に、%CALLNAME:人物_レミリア%は目を細めた。

    「あぁ……胸が、とろけそう……こんなの初めて……」

    500年を生きた吸血鬼は、恋人の前で蕩けるように喘いでいた。

    「さあ、%CALLNAME:MASTER%……私の胸を好きにしてちょうだい」

    %CALLNAME:人物_レミリア%は自ら胸を突き出し、恋人を誘った。

    搾乳機が装着され、吸引が始まる。

    「あっ……んっ……胸が、吸われてる……っ」

    カップの吸引に%CALLNAME:人物_レミリア%の威厳が溶けていく。

    「%CALLNAME:MASTER%っ……もう止められない……気持ちよすぎる……」

    紅魔館の主は、恋人の前で理性を失いかけていた。

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手にある搾乳機を見つめた。

    「……ねえ、今日は強めに吸い上げて、私を狂わせてくれる？」

    珍しく甘えた声に、%CALLNAME:MASTER%がゆっくりとカップを装着する。

    「ふぁっ……んっ……胸が、引っ張られて……」

    吸引が強まり、%CALLNAME:人物_レミリア%は恋人にしがみついた。

    「あぁっ……%CALLNAME:MASTER%……好きよ……このまま、絞って……」

    永遠を生きる吸血鬼は、搾乳の快感に溺れていた。
