    「……でも、こうしてると……ちょっと落ち着くかも……」

    %CALLNAME:MASTER%が後ろから挿入すると、%CALLNAME:人物_魔理沙%の体が跳ねた。

    「んっ……あ……胸、揉むなよ……感じちゃう……だろ……」

    %CALLNAME:人物_魔理沙%の声は抗議というより、甘えた響きになっていた。

    「……今だけ、許してやるからな……」

    「……%CALLNAME:MASTER%、この体勢、好きなのか？」

    %CALLNAME:人物_魔理沙%は探るように%CALLNAME:MASTER%の様子を窺った。

    「まあ……私は別に……嫌じゃないけど……」

    %CALLNAME:MASTER%の腕に包まれ、%CALLNAME:人物_魔理沙%は小さく息を吐いた。

    「んっ……あ……後ろからだと、逃げられないな……」

    「……別に、逃げたいわけじゃないけどさ……」

    %CALLNAME:人物_魔理沙%は素直になれないまま、%CALLNAME:MASTER%に身を委ねた。
