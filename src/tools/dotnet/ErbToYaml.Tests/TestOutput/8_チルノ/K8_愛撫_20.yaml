- id: fallback
  content: >-
    「は?　なにこれ、小さいキャップみたいなの」

    %CALLNAME:TARGET%はニプルキャップを怪訝そうに見つめた。

    「乳首につけるって……%CALLNAME:MASTER%って変なもの持ってるわね」

    好奇心はあるようだが、警戒心も見え隠れしている。

    「……最強のあたいの乳首にそれ使う気?　ふーん……」

    偉そうに言いながらも、拒絶はしていない。

    「……まあ、ちょっとだけなら付き合ってあげるわよ」

    「ひゃっ!?　冷たっ……挟まってる!」

    ニプルキャップの感触に、%CALLNAME:TARGET%は驚いた。

    「なによこれ……乳首がきゅって締められてる……」

    初めての体験に、困惑が隠せない。

    「……%CALLNAME:MASTER%、やっぱり変態なんじゃないの……」

    文句を言いながらも、%CALLNAME:TARGET%は耐えていた。

    「最強のあたいがこんなので負けるわけないでしょ……」

    「またこれ?　あんた本当にこういうの好きね」

    %CALLNAME:TARGET%は呆れた顔でニプルキャップを見た。

    「……しょうがないわね、付き合ってあげる」

    渋々ながらも、前回よりは抵抗が少ない。

    「……んっ……やっぱり挟まれると……変な感じ……」

    少しは慣れたのか、%CALLNAME:TARGET%は落ち着いていた。

    「……あんたって、ホント変わってるわよね」

    「ねぇ、これ面白いの?　%CALLNAME:MASTER%的には」

    %CALLNAME:TARGET%は素朴な疑問を投げかけた。

    「あたいの乳首にこんなの挟んで、何が楽しいのよ」

    理解できないといった表情だが、拒絶はしていない。

    「……まあ、%CALLNAME:MASTER%が楽しいなら……いいけどさ」

    どこか呆れながらも、%CALLNAME:TARGET%は受け入れた。

    「最強のあたいに付き合わせてるんだから、感謝しなさいよね」
