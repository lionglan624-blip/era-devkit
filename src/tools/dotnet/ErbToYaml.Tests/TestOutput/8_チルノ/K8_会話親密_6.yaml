- id: fallback
  content: >-
    「ん……ふふ、%CALLNAME:MASTER%の手、あったかいわね……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の胸に寄りかかっている。

    「あたいの胸、小さいけど……気持ちいいって思ってくれてる……？」

    %CALLNAME:人物_チルノ%の冷たいはずの体が、少しずつ熱を帯びていく。

    「……最強のあたいが、%CALLNAME:MASTER%だけに見せる特別な姿よ」

    誇らしげに笑いながら、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の愛撫を受け入れた。

    「あっ……そこ、いいの……もっと触って……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の手の動きに身を委ねている。

    「……あたいの体、%CALLNAME:MASTER%のものだからね……」

    氷の妖精の柔らかな膨らみが、%CALLNAME:MASTER%の掌に収まった。

    「えへへ……恋人同士なんだもん、こういうの普通でしょ？」

    %CALLNAME:人物_チルノ%は嬉しそうに%CALLNAME:MASTER%を見上げた。

    「んぁ……%CALLNAME:MASTER%、上手になったわね……」

    %CALLNAME:人物_チルノ%は甘い声を漏らしながら体を震わせた。

    「あたいの弱いところ……全部知ってるんだから……」

    %CALLNAME:人物_チルノ%の小さな胸の先端が、%CALLNAME:MASTER%の指に反応して硬くなる。

    「……もう、離れないでよ……ずっとこうしてたいの……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に抱きついた。

    「ひゃん……！　そこ、敏感なんだってば……」

    %CALLNAME:人物_チルノ%の体がビクンと跳ねた。

    「もう……%CALLNAME:MASTER%は、あたいをこうするの好きよね……」

    照れくさそうにしながらも、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の胸に顔を埋めた。

    「……いいわよ、好きなだけ触って。あたいは%CALLNAME:MASTER%のなんだから……」

    氷精の体温が、触れ合う場所から伝わってきた。
