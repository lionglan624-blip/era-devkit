    サキュバスの本能が目覚め、悪魔の少女の奥から蜜が溢れ始めていた。

    「あたし……%CALLNAME:MASTER%のこと、すき……なのかな……」

    %CALLNAME:TARGET%は首を傾け、%CALLNAME:MASTER%の顔を見ようとした。

    「……わかんないけど……このまま、いたい……」

    恥じらいと芽生えた感情の間で、%CALLNAME:TARGET%は揺れていた。

    「はぁ……ふぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の温もりを感じながら、とろけるような声を漏らしている。

    後ろから包まれる感覚が、悪魔の少女の心を揺さぶっていた。

    「うしろから、だきしめられると……むねが、きゅってなる……」

    %CALLNAME:TARGET%は自分の胸に手を当てた。

    「……%CALLNAME:MASTER%のこと……もっと、しりたい……」

    照れながら呟き、%CALLNAME:TARGET%は%CALLNAME:MASTER%に身を委ねていった。
