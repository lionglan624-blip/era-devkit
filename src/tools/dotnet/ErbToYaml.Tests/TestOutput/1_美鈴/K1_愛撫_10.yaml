- id: fallback
  content: >-
    「ちょっと！　何を言ってるんですか！？」

    %CALLNAME:人物_美鈴%は驚いて%CALLNAME:MASTER%から距離を取った。

    「私に胸を吸えって……正気ですか？」

    %CALLNAME:人物_美鈴%は信じられないという顔で%CALLNAME:MASTER%を見ている。

    「……お引き取りください。門番として警告します」

    %CALLNAME:人物_美鈴%は冷たい目で%CALLNAME:MASTER%を睨んだ。

    「……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の要求に絶句した。

    「%CALLNAME:MASTER%……あなた、何を考えてるんですか」

    %CALLNAME:人物_美鈴%は呆れたように首を振った。

    「私、門番なんですけど。そういうことする相手じゃないんですよ」

    %CALLNAME:人物_美鈴%は毅然とした態度で、%CALLNAME:MASTER%から距離を取った。

    「な……何を言って……！」

    %CALLNAME:人物_美鈴%は反射的に身を引いた。

    「いきなり胸を吸えだなんて……非常識にもほどがあります」

    %CALLNAME:人物_美鈴%は怒りを滲ませながら、%CALLNAME:MASTER%を見据えた。

    「これ以上おかしなことをするなら……力づくで排除しますよ」

    %CALLNAME:人物_美鈴%は門番としての構えを取った。

    「……は？」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の要求に、一瞬理解が追いつかなかった。

    「%CALLNAME:MASTER%……今、何を言いました？」

    %CALLNAME:人物_美鈴%は低い声で問い詰めた。

    「あなたの胸を吸えと……？　冗談ですよね？」

    「……冗談じゃないなら、お嬢様に報告させていただきます」

    %CALLNAME:人物_美鈴%は警告するように告げた。
