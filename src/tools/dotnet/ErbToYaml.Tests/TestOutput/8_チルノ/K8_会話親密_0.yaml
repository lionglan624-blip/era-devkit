character: チルノ
situation: K8_会話親密
entries:
- id: fallback
  content: >-
    %CALLNAME:TARGET%は%CALLNAME:MASTER%の言葉に、最強の笑顔を見せた。

    「――へへん、%CALLNAME:MASTER%の話、面白いじゃない！」

    %CALLNAME:TARGET%は得意げに笑いながら、%CALLNAME:MASTER%の腕に手を回してきた。

    「あたいと一緒にいると楽しいでしょ？　だってあたいったら最強だもんね！」

    「……えへへ、%CALLNAME:MASTER%といると、なんだかあったかいのよね」

    %CALLNAME:TARGET%は照れ隠しなのか、冷たい頬を%CALLNAME:MASTER%の肩に押しつけた。

    氷の妖精の体温は低いはずなのに、その仕草はどこか温かかった。

    「――ねぇねぇ、それでそれで？」

    %CALLNAME:TARGET%は目をキラキラさせながら%CALLNAME:MASTER%の話に聞き入っている。

    「%CALLNAME:MASTER%の話って、なんか聞いてて飽きないのよね」

    「あ、でもあたいの話の方がもっと面白いんだからね！」

    そう言いながらも、%CALLNAME:TARGET%は幸せそうに%CALLNAME:MASTER%に寄り添っている。

    「……でも、今日は%CALLNAME:MASTER%の話聞いてあげる。特別よ？」

    「――%CALLNAME:MASTER%ってさ、あたいのこと好き？」

    唐突に%CALLNAME:TARGET%がそう尋ねてきた。

    好きだよ、と答えると、

    「ふふん、当然よね！　あたいったら最強で最高なんだから！」

    「……あたいも、%CALLNAME:MASTER%のこと、大好きだよ」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、小さな声でそう言った。

    「――あのさ、%CALLNAME:MASTER%」

    %CALLNAME:TARGET%が珍しくもじもじしている。

    「こうやって二人で話してる時間って……最強に幸せなのよ」

    「%CALLNAME:MASTER%がいてくれるから、毎日楽しいの」

    %CALLNAME:TARGET%は照れくさそうに笑って、%CALLNAME:MASTER%の手を握った。

    ひんやりとした小さな手が、%CALLNAME:MASTER%の温もりを求めているようだった。
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:TARGET%は%CALLNAME:MASTER%と話をしながら、いつもより少し大人しくしている。

    「――へぇ、そうなんだ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の話に相槌を打ちながら聞いている。

    「%CALLNAME:MASTER%っていろんなこと知ってるのね」

    「あ、でもあたいだって負けないんだからね！」

    %CALLNAME:TARGET%は張り合うように胸を張ったが、その表情は嬉しそうだ。

    「……今度、あたいの知ってること教えてあげるわ」

    「――ねぇ、%CALLNAME:MASTER%はあたいと話してて楽しい？」

    %CALLNAME:TARGET%が不安そうにそう尋ねてきた。

    楽しいよ、と答えると、

    「そ、そう！　当然よね、あたいったら話し上手だもん！」

    %CALLNAME:TARGET%は安心したように、嬉しそうな笑みを浮かべた。

    「……%CALLNAME:MASTER%と話すの、あたいも好きよ」

    「――あのさ、%CALLNAME:MASTER%」

    %CALLNAME:TARGET%が何か言いたげにこちらを見ている。

    「……なんでもない！　べ、別に何も言おうとしてないし！」

    「……また、こうやって話してくれる？」

    %CALLNAME:TARGET%は顔を赤くしながら、小さな声でそう言った。

    氷の妖精の頬が、ほんのりと熱を帯びている。

    「――ふふん、%CALLNAME:MASTER%の話、まあまあ面白いじゃない」

    %CALLNAME:TARGET%は上から目線で言いながらも、離れようとしない。

    「あたいが聞いてあげてるんだから、感謝しなさいよね」

    「……でも、つまんなくないから、もっと話してもいいわよ」

    %CALLNAME:TARGET%はそっぽを向きながらも、耳だけは%CALLNAME:MASTER%に向けていた。

    「……べ、別に楽しみにしてるわけじゃないんだから！」
  priority: 3
  condition:
    type: Talent
    talentType: 3
    threshold: 1
- id: fallback
  content: >-
    %CALLNAME:TARGET%は興味深そうに%CALLNAME:MASTER%の話を聞いている。

    「――ふーん、そうなんだ」

    %CALLNAME:TARGET%は相槌を打ちながら話を聞いている。

    「%CALLNAME:MASTER%って、変わってるわね」

    「でも……嫌いじゃないわよ、そういうの」

    %CALLNAME:TARGET%はそっぽを向きながらも、どこか嬉しそうだ。

    「……また話しかけてきてもいいわよ。暇だったらね」

    「――へぇ、%CALLNAME:MASTER%ってそんなこと考えてるんだ」

    %CALLNAME:TARGET%は少し驚いた様子でそう言った。

    「あたいにはよくわかんないけど……」

    「でも、%CALLNAME:MASTER%の話、つまんなくはないわね」

    %CALLNAME:TARGET%は照れ隠しのように、ふんと鼻を鳴らした。

    「あたいは最強だから、難しい話も聞いてあげられるのよ」

    「――あんたってさ、面白い奴よね」

    %CALLNAME:TARGET%は興味深そうにこちらを見ている。

    「普通の人間とはちょっと違う感じがするわ」

    「まあ、最強のあたいと話せるなんて光栄に思いなさいよね！」

    %CALLNAME:TARGET%は胸を張って言ったが、その目はどこか期待に満ちている。

    「……また、面白い話聞かせてよね」

    「――へぇ、それって本当なの？」

    %CALLNAME:TARGET%が身を乗り出して聞いてきた。

    「あたいそういうの知らなかったわ」

    「でも、あたいだって知ってることいっぱいあるんだからね！」

    %CALLNAME:TARGET%は負けじと言い返しながらも、話の続きが気になる様子だ。

    「……ま、まあ、続き聞いてあげてもいいわよ」
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:TARGET%は少し退屈そうに%CALLNAME:MASTER%の話を聞いている。

    「――ふぅん、それで？」

    %CALLNAME:TARGET%は興味なさそうに相槌を打っている。

    「もっと面白い話はないの？　あたいの時間は貴重なんだからね」

    %CALLNAME:TARGET%は偉そうに言いながらも、話を聞く姿勢は崩さない。

    「……まあ、暇つぶしにはなるわね」

    「――あんたってさ、変な奴よね」

    %CALLNAME:TARGET%がじろじろとこちらを見ている。

    「まあいいわ、あたいは寛大だから話くらい聞いてあげる」

    「……つまんなかったら凍らせるからね！」

    %CALLNAME:TARGET%は威嚇するように言ったが、本気ではなさそうだ。

    「……で、続きは？」

    「――ねぇ、あんた誰？　見かけない顔ね」

    %CALLNAME:TARGET%は警戒するようにこちらを見ている。

    「まあいいわ、最強のあたいに話しかけるなんていい度胸じゃない」

    「面白い話だったら聞いてあげてもいいわよ」

    %CALLNAME:TARGET%は腕を組んで、偉そうに言い放った。

    「……つまんなかったら承知しないからね」

    「――へぇ、そんな話があるんだ」

    %CALLNAME:TARGET%は少しだけ興味を示した様子で聞いている。

    「まあ、あたいには関係ない話だけどね」

    「でも、暇だから聞いてあげるわ。感謝しなさいよ」

    %CALLNAME:TARGET%は偉そうに言いながらも、話の続きを待っている。

    「……で、それからどうなったの？」
  priority: 1
