- id: fallback
  content: >-
    「後ろから……するの？　変なのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の胡坐の上で首を傾げた。

    495年の孤独の中では、こんな体勢のことは知らなかった。

    「まあ……%CALLNAME:MASTER%がそうしたいなら、やってみる」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の体を持ち上げて下ろすと、声が漏れた。

    「んっ……ぁ……入ってきた……後ろに誰かがいるって……変な感じ」

    悪魔の妹は、新しい体験に戸惑いながらも受け入れていた。

    「%CALLNAME:MASTER%……後ろにいると、顔が見えないね」

    %CALLNAME:人物_フラン%は素朴な感想を口にした。

    振り返れば見えるけれど、そうすると体勢が崩れてしまう。

    「……でも、%CALLNAME:MASTER%の体温は感じるのさ。背中で」

    %CALLNAME:MASTER%が腰を突き上げると、%CALLNAME:人物_フラン%は声を上げた。

    「あっ……んっ……動くと……奥まで……きてる……」

    見えなくても感じられる温もりに、悪魔の妹は少しずつ慣れていった。

    「こうしてると……%CALLNAME:MASTER%を壊さないでいられるかも」

    %CALLNAME:人物_フラン%は自分の手を見つめながら呟いた。

    直接触れなければ、壊してしまう危険が減る気がする。

    「地下室では……触るもの全部、壊しちゃってたから」

    %CALLNAME:MASTER%が胸を弄りながら腰を動かすと、吐息が漏れた。

    「ん……あ……触られてる……壊さないで、触ってくれるのさ……」

    悪魔の妹は、自分でも気づかないうちに%CALLNAME:MASTER%の存在を受け入れ始めていた。

    「%CALLNAME:MASTER%って、こうやって後ろから抱くの好きなの……？」

    %CALLNAME:人物_フラン%は素朴な疑問を口にした。

    世界を知らない少女にとって、全てが未知の体験だ。

    「……495年、ずっとひとりだったから。こういうの、わからない」

    %CALLNAME:MASTER%が深く突き入れると、%CALLNAME:人物_フラン%は声を漏らした。

    「んっ……あ……でも……%CALLNAME:MASTER%に抱きしめられてると……悪くない」

    その言葉は、悪魔の妹なりの精一杯の肯定だった。
  priority: 2
- id: fallback
  content: >-
    「ふぅん……後ろから、するんだ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の胡坐の上に座りながら呟いた。

    新しい遊び方を見つけた子供のような好奇心が、紅い瞳に宿っている。

    「顔が見えないって……ちょっとつまらないのさ」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の体を持ち上げて下ろすと、声が漏れた。

    「んっ……ぁ……入った……でも、%CALLNAME:MASTER%の反応が見えないね」

    悪魔の妹は、相手の表情を観察できないことに不満げだった。

    「%CALLNAME:MASTER%……後ろにいると、何してるかわからないよ」

    %CALLNAME:人物_フラン%は首を傾げながら言った。

    見えない相手の動きは、予測が難しい。

    「壊れちゃう前に、教えてね……私、加減が苦手なのさ」

    %CALLNAME:MASTER%が腰を突き上げると、%CALLNAME:人物_フラン%は小さく声を上げた。

    「あっ……んっ……こうやって動くんだ……なるほどね」

    悪魔の妹は、新しい遊びの仕組みを理解しようとしていた。

    「……」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%の胡坐の上に座った。

    495年の孤独が生んだ、どこか虚ろな紅い瞳。

    「後ろからだと……きゅっとしてドカーン、しにくいね」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の体を持ち上げて下ろすと、表情がわずかに揺れた。

    「……んっ……繋がってると……壊したくなくなる……なんでだろ」

    破壊衝動を鈍らせる何かに、悪魔の妹は戸惑いを隠せなかった。

    「%CALLNAME:MASTER%の腕……私の周りにあるね」

    %CALLNAME:人物_フラン%は自分を包む腕を見下ろしながら言った。

    壊れやすいものに囲まれている感覚が、奇妙に新鮮だ。

    「こうしてると……逃げられないでしょ、%CALLNAME:MASTER%」

    %CALLNAME:MASTER%が胸を弄りながら腰を動かすと、%CALLNAME:人物_フラン%は声を漏らした。

    「んっ……あ……でも、まだ壊さないのさ……遊び、終わってないから」

    悪魔の妹は、無邪気な残酷さと共に快楽を味わっていた。
  priority: 1
