    「……興味はありませんが……言われたから従っているだけよ」

    無感動な態度で、%CALLNAME:TARGET%は奉仕を続けた。

    「……はぁ……」

    %CALLNAME:TARGET%は溜息をつきながら舌を動かしている。

    「……こんなことに時間を費やすなんて……ん……」

    %CALLNAME:TARGET%は不満そうに呟いた。

    「……本を読んでいた方がよほど有意義なのに……」

    明らかに嫌々ながら、%CALLNAME:TARGET%は奉仕を続けた。

    「……終わったら出て行ってくださいね」

