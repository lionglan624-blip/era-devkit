- id: talent_3_1
  content: >-
    「え、えっと……こ、こうすればいいの……？」

    %CALLNAME:TARGET%は真っ赤な顔で%CALLNAME:MASTER%の前に跪いた。

    小さな手が震えながら、%CALLNAME:MASTER%のものに触れる。

    「……あの、恥ずかしいけど……」

    %CALLNAME:TARGET%はおずおずと舌を伸ばし、先端を舐めた。

    「んっ……へ、変な味……でも……」

    恥ずかしさに耐えながら、%CALLNAME:TARGET%は口に含もうとしている。

    「%CALLNAME:MASTER%のためだから……がんばる……」

    「……ちゅっ……れろ……」

    %CALLNAME:TARGET%は恥ずかしそうに、%CALLNAME:MASTER%に奉仕している。

    頬が真っ赤で、耳まで染まっている。

    「……%CALLNAME:MASTER%……これで、気持ちいい……？」

    不安そうに見上げる瞳には、認めて欲しいという想いが見える。

    「あたし、下手かもしれないけど……」

    %CALLNAME:TARGET%はぎこちなく舌を動かしている。

    「……がんばるから……見ててね……」

    「こ、こんなこと……恥ずかしいよぉ……」

    %CALLNAME:TARGET%は俯きながらも、%CALLNAME:MASTER%から離れようとしない。

    「でも……%CALLNAME:MASTER%のためなら……」

    小さく呟いて、%CALLNAME:TARGET%は口を開けた。

    「んっ……ふぁ……」

    先端から丁寧に舐め始め、少しずつ口に入れていく。

    「……んぅ……」

    一生懸命な姿に、%CALLNAME:TARGET%の想いが伝わってくる。

    「あの……%CALLNAME:MASTER%のこと、好きだから……」

    %CALLNAME:TARGET%は恥ずかしそうに告白しながら、顔を近づけた。

    「こういうの、あたしもしてみたかったの……」

    ぺろ、と先端を舐め、%CALLNAME:TARGET%は上目遣いに%CALLNAME:MASTER%を見た。

    「……変、かな……？」

    不安と期待の入り混じった表情で問いかける。

    そしてゆっくりと口を開け、%CALLNAME:MASTER%を迎え入れた。

    「んっ……ふぅ……」
