  content: >-
    「ひゃっ……そ、そんなとこ……」

    %CALLNAME:TARGET%は驚いて肩を竦めたが、逃げることはしなかった。

    %CALLNAME:MASTER%の唇が乳首に触れると、妖精の体が小さく震える。

