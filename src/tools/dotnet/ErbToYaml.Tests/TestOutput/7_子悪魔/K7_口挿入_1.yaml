    小さな舌が%CALLNAME:MASTER%のものを舐め上げ、やがて口に含んだ。

    「んっ……ちゅる……しょっぱい……でも……」

    %CALLNAME:TARGET%は先走りの味に驚きながらも、舐めるのを止めなかった。

    「……%CALLNAME:MASTER%……あたしのこと、好き……？」

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は上目遣いに%CALLNAME:MASTER%を見つめながら、一物に口づけた。

    「あたし……%CALLNAME:MASTER%のこと、好きだから……」

    恥ずかしそうに俯きながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%のものを舐め始めた。

    「ちゅ……れろ……んむ……こうすると……いいの……？」

    小さな舌がたどたどしく動き、%CALLNAME:MASTER%に快感を与えようと頑張っている。

    %CALLNAME:TARGET%は真剣な表情で、%CALLNAME:MASTER%の反応を見守っていた。
