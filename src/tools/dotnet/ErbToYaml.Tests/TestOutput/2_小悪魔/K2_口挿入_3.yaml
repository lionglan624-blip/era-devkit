- id: talent_3_1
  content: >-
    「え、えっと……泡踊り……ですか……？」

    %CALLNAME:人物_小悪魔%は顔を赤くしながらも、石鹸を泡立てた。

    おずおずと体に塗り、%CALLNAME:MASTER%に近づいていく。

    「こ、こうすれば……いいんですよね……んっ……」

    %CALLNAME:人物_小悪魔%は恐る恐る体を擦り付けた。

    「……ぬる……あ、滑る……こんなに密着するんですのね……」

    頬を赤らめながら、懸命に奉仕している。

    %CALLNAME:人物_小悪魔%は体を密着させ、ゆっくりと動いている。

    「んっ……こ、こうですか……？　気持ちいいですか……？」

    慣れない動きながらも、一生懸命に奉仕しようとしている。

    「すべ……ぬる……ん……恥ずかしいですわ……」

    %CALLNAME:人物_小悪魔%は困った顔をしながらも、やめようとはしない。

    「……もう少し……頑張りますから……見ないでください……」

    %CALLNAME:人物_小悪魔%の尻尾がそわそわと揺れている。

    「%CALLNAME:MASTER%……こんなこと、させるなんて……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに俯きながら、体を擦り付けた。

    「でも……%CALLNAME:MASTER%になら……いいかも……って……」

    胸を押し付け、太腿で一物を挟み込む。

    「……んっ……ぬるぬるして……変な感じ……でも嫌じゃない……」

    %CALLNAME:人物_小悪魔%はどこか期待するような目で%CALLNAME:MASTER%を見上げた。

    「……も、もっと……してほしい……ですか？」

    %CALLNAME:人物_小悪魔%は意を決したように、全身を押し付けた。

    「んっ……は、はぁ……ん……」

    頬が赤く染まり、目が潤んでいる。

    「ぬる……すべ……%CALLNAME:MASTER%……気持ちいい……ですか？」

    恥ずかしそうにしながらも、%CALLNAME:人物_小悪魔%は腰を動かし続けた。

    「……こういうの……悪魔として、どうなんでしょう……」

    戸惑いながらも、その動きは次第に熱を帯びていく。
