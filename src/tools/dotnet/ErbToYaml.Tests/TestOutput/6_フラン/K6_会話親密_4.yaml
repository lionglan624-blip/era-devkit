- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%にキスをしようとした。

    「……何するの？」

    %CALLNAME:TARGET%は冷たい瞳で%CALLNAME:MASTER%を見つめた。

    「私、495年もずっと一人だったんだよ？ 急に近づかないで」

    %CALLNAME:TARGET%の紅い瞳に、危険な光が宿る。

    「……壊しちゃうかもしれないのさ。きゅっとしてドカーン、ってね」

    %CALLNAME:TARGET%は不穏な笑みを浮かべ、一歩後ろに下がった。

    「んっ……！」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%と唇を重ねようとした。

    「……やめて」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を押し退けた。翼が威嚇するように広がる。

    「唇なんて触らせたら、壊しちゃうかもしれないのさ」

    %CALLNAME:TARGET%は寂しそうな、でも警戒した目で%CALLNAME:MASTER%を見ていた。

    「……もっと、仲良くなってからじゃないとダメなのさ」

    「……ねえ、何？」

    %CALLNAME:MASTER%が近づくと、%CALLNAME:TARGET%は首を傾げた。

    %CALLNAME:MASTER%はキスをしようとしたが、%CALLNAME:TARGET%はひらりと身をかわした。

    「あはは、捕まえてみせてよ。私、逃げるの上手いんだから」

    %CALLNAME:TARGET%は子供のように笑っている。その瞳に、どこか危うい光が宿っていた。

    「……でも、本当に捕まえたら……壊しちゃうかもね？」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%に顔を近づけた。

    「……なに？ キス？」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%を見つめている。

    「お姉様とはするけど、%CALLNAME:MASTER%とはまだダメなのさ」

    %CALLNAME:TARGET%はつまらなそうに視線を逸らした。

    「……もっと遊んでくれたら、考えてあげてもいいよ？」

    495年の孤独が、その言葉の裏に潜んでいる。
  priority: 1
