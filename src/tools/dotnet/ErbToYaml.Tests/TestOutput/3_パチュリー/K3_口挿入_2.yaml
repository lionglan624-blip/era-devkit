  content: >-
    「……胸で……するの……」

    %CALLNAME:TARGET%は興味深そうに%CALLNAME:MASTER%の一物を見つめた。

    「……研究として……試してみるわ……」

    %CALLNAME:TARGET%は言い訳をしながら、胸を開いた。

    「……ん……挟むとこんな感触なのね……」

    学者として観察しながら、%CALLNAME:TARGET%は胸を動かし始めた。

    「……ふむ……圧力と摩擦の関係ね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を観察しながら奉仕している。

    「……胸の柔らかさが刺激になるらしいわ……」

    %CALLNAME:TARGET%は学者らしく分析していた。

    「……でも、胸が擦れる感触……不思議ね……」

    自分の感覚にも注意を払っていた。

    「……こうすれば満足するの……？」

    %CALLNAME:TARGET%は疑問を口にしながら、胸を動かし続けている。

    「……私の胸は小さいから……効果が薄いかもしれないわ……」

    %CALLNAME:TARGET%は首を傾げた。

    「……まあ、あなたがそう望むなら……続けるわ」

    淡々と、しかし確実に奉仕は続いていた。

    「……」

    %CALLNAME:TARGET%は黙々と胸を動かしていた。

    「……腕が疲れてきたわ……体が弱いのだから、仕方ないでしょう」

    %CALLNAME:TARGET%は少し休みながら言った。

    「……でも、約束したから……最後まで続けるわ」

    そう言って、%CALLNAME:TARGET%は再び胸を動かし始めた。
