entries:
- id: fallback
  content: >-
    「ふふん、%CALLNAME:MASTER%！　あたいの足で気持ちよくしてあげるわ！」

    %CALLNAME:人物_チルノ%は自信満々に%CALLNAME:MASTER%の前に座った。

    小さな足を%CALLNAME:MASTER%の一物に押し当てると、ひんやりとした冷たさが伝わってくる。

    「んしょ……こうやって挟めばいいのよね？」

    %CALLNAME:人物_チルノ%は得意げに両足で一物を挟み込んだ。

    氷の妖精らしい冷たい足裏が、熱い肉棒を包み込む。

    「ほら、気持ちいいでしょ？　最強のあたいがしてあげてるんだから！」

    威勢よく言いながら、%CALLNAME:人物_チルノ%は足を上下に動かし始めた。

    「えへへ……%CALLNAME:MASTER%、あたいの足がいいの？」

    %CALLNAME:人物_チルノ%は嬉しそうに笑いながら、%CALLNAME:MASTER%の一物に足を添えた。

    「あたいの足、冷たいでしょ？　でもね、%CALLNAME:MASTER%のここ、すっごく熱いの」

    冷たい足裏がそっと肌に触れると、その温度差が心地よい刺激となる。

    %CALLNAME:人物_チルノ%は不思議そうに見つめながら、優しく足で挟んだ。

    「……こうすると、もっと熱くなるね……」

    ゆっくりと足を動かしながら、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の反応を窺っている。

    「%CALLNAME:MASTER%の気持ちいい顔、見てるの好きなんだ……えへへ」

    「ほら、あたいに任せなさい！」

    %CALLNAME:人物_チルノ%は張り切って%CALLNAME:MASTER%の一物を両足で包んだ。

    氷の妖精らしいひんやりとした足裏が、熱を帯びた肉棒を挟み込む。

    「んー……上手くできてるかな？　ねえ、気持ちいい？」

    %CALLNAME:人物_チルノ%は確認するように%CALLNAME:MASTER%を見つめた。

    小さな足指が器用に一物を弄り、鈴口をつついたりしている。

    「あたいにかかれば、こんなの楽勝だからね！」

    そう言いながら、%CALLNAME:人物_チルノ%は一生懸命に足を動かし続けた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は珍しくおとなしく、%CALLNAME:MASTER%の前に座っている。

    小さな足が%CALLNAME:MASTER%の一物をそっと挟むと、その冷たさが心地よい。

    「……こうやって触ってると、なんか落ち着くの」

    %CALLNAME:人物_チルノ%は恥ずかしそうに呟きながら、ゆっくりと足を動かした。

    冷たい足裏が熱い肉棒を優しく撫で、%CALLNAME:MASTER%に快感を与えていく。

    「あたいも……%CALLNAME:MASTER%のこと、大好きだからね……」

    いつもの威勢のいい態度はなりを潜め、甘えたような声で囁いた。
  priority: 4
- id: talent_3_1
  content: >-
    「え……あ、足で……？」

    %CALLNAME:人物_チルノ%は戸惑いながらも、%CALLNAME:MASTER%の一物を見つめた。

    「……わ、わかったわよ。やってあげる！」

    意を決したように、%CALLNAME:人物_チルノ%は小さな足を伸ばした。

    ひんやりとした足裏が一物に触れると、%CALLNAME:人物_チルノ%の顔が赤くなる。

    「ひゃっ……熱い……。こ、こうすればいいの？」

    恐る恐る足を動かしながら、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の顔色を窺った。

    「んっ……足で触るって、なんか変な感じ……」

    「あっ……そ、その……」

    %CALLNAME:人物_チルノ%は真っ赤な顔で%CALLNAME:MASTER%の一物に足を添えている。

    「べ、別にやりたくてやってるわけじゃないんだからね！」

    そう言いながらも、%CALLNAME:人物_チルノ%の足は止まらない。

    冷たい足裏が熱い肉棒を優しく挟み込んでいる。

    「……%CALLNAME:MASTER%が喜ぶなら……まあ、やってあげてもいいけど」

    照れ隠しにそっぽを向きながら、%CALLNAME:人物_チルノ%は足を動かし続けた。

    「……ちゃんと気持ちよくなってよね」

    「んっ……こ、こうかな……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに%CALLNAME:MASTER%の一物を足で扱いている。

    冷たい足裏が熱い肉棒を包み込み、ゆっくりと上下に動く。

    「あたいだって……こういうの、できないわけじゃないんだから」

    強がりを言いながらも、その動きはぎこちない。

    小さな足指が一物に絡みつき、懸命に刺激を与えようとしている。

    「……ど、どう？　気持ちいい……よね？」

    %CALLNAME:人物_チルノ%は不安げに%CALLNAME:MASTER%を見上げた。

    「……%CALLNAME:MASTER%のせいだからね」

    %CALLNAME:人物_チルノ%は困ったような顔で呟いた。

    「あたいがこんなことしてるのは……全部%CALLNAME:MASTER%のせいなんだから」

    文句を言いながらも、%CALLNAME:人物_チルノ%の足は優しく一物を撫でている。

    氷の妖精らしい冷たい足裏が、熱い肉棒を挟み込んでいく。

    「……でも、%CALLNAME:MASTER%のためなら……やってあげる」

    %CALLNAME:人物_チルノ%は恥ずかしそうに俯きながら、足を動かし続けた。

    「……あたいの足、冷たくて気持ちいい……でしょ？」
