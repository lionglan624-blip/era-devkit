- id: fallback
  content: >-
    「ひゃぁっ！？　%CALLNAME:MASTER%さん、む、胸は……！」

    %CALLNAME:TARGET%は驚いて身を竦めた。

    「あ、あの……こういうことは……その……」

    %CALLNAME:TARGET%は何と言っていいか分からず、口ごもっている。

    「……チルノちゃんに知られたら……困ります……」

    %CALLNAME:TARGET%は困惑しながらも、強く拒絶はしなかった。

    「きゃっ……！　あの、%CALLNAME:MASTER%さん……？」

    %CALLNAME:TARGET%は突然の愛撫に動揺している。

    「わ、わたし……こういうの、よく分からなくて……」

    %CALLNAME:TARGET%の顔が真っ赤に染まっていく。

    「……でも……痛くは……ないです……」

    %CALLNAME:TARGET%は小さな声でそう呟いた。

    「あっ……んっ……そんな……」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の胸を撫でている。

    %CALLNAME:TARGET%は戸惑いながらも、されるがままになっている。

    「……%CALLNAME:MASTER%さんは……こういうことが……したいんですか……？」

    %CALLNAME:TARGET%は理解しようとするように、%CALLNAME:MASTER%を見上げた。

    「ひぅっ……あ……胸……触らないで……」

    %CALLNAME:TARGET%は弱々しく抵抗するが、本気ではない。

    「……妖精は……こういうこと……あまりしないの……」

    %CALLNAME:TARGET%は困ったように眉を寄せている。

    「……でも……%CALLNAME:MASTER%さんが、そうしたいなら……」

    %CALLNAME:TARGET%の羽が落ち着きなく揺れている。
