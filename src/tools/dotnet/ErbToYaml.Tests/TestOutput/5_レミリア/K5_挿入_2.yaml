- id: fallback
  content: >-
    「……後ろ？　そんなところでするの？」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    正面から押し倒され、%CALLNAME:MASTER%が菊穴に亀頭をあてがう。

    「……まあいいわ。興味はあるから」

    %CALLNAME:MASTER%がゆっくりと挿入すると、%CALLNAME:人物_レミリア%は息を詰めた。

    「っ……きつい……こんな感覚、初めて……」

    500年の吸血鬼は、未知の刺激に戸惑いを隠せなかった。

    「……ふぅん、そういう趣味なのね」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を見た。

    正面から繋がる体勢で、%CALLNAME:MASTER%が後孔へと侵入を試みる。

    「……っ、痛い……わね」

    %CALLNAME:人物_レミリア%は眉をひそめながらも、動きを止めようとはしなかった。

    「……まあ、悪くはないかもしれない」

    認めたくない快感が、吸血鬼の身体を巡っていた。

    「……主を正面からこんな風に抱くなんて」

    %CALLNAME:人物_レミリア%は威厳を保とうとしながら言った。

    %CALLNAME:MASTER%が菊穴に挿入すると、その身体が強張った。

    「っ……そこは……違う穴よ……」

    %CALLNAME:人物_レミリア%は慣れない感覚に声を漏らした。

    「……ふん、なかなかやるじゃない」

    威厳を装いながらも、その頬はほんのり紅かった。

    「……後ろから責めるつもり？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の行動を観察していた。

    正面から組み敷かれ、菊穴に亀頭が押し付けられる。

    「……っ、ほう……これは……」

    %CALLNAME:MASTER%の挿入に、%CALLNAME:人物_レミリア%は目を見開いた。

    「きつい……けど、悪くない……かもしれないわね」

    初めての感覚に、吸血鬼は戸惑いながらも快感を覚え始めていた。
