- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%の前に跪いた。

    「お客様のご要望ですから……致しましょう」

    瀟洒なメイドは、感情を押し殺して一物を口に含んだ。

    「……ちゅる……」

    「……早く済ませていただけますか」

    「私には、お嬢様のお世話という仕事がありますので」

    「……ん……」

    %CALLNAME:TARGET%は機械的に頭を動かしている。

    「れろ……ちゅる……これでよろしいですか……」

    事務的な動きだが、メイドとしての手際は完璧だ。

    「……私はただ、お客様の要望に応えているだけですわ」

    「それ以上でも以下でもありません」

    %CALLNAME:TARGET%は淡々と舌を動かし続けた。

    「……お急ぎくださいまし……」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見上げた。

    「ちゅる……ん……これも仕事ですから……」

    「個人的な感情は……ありませんわ」

    %CALLNAME:TARGET%は義務的に舌を動かしている。

    「……終わりましたら、すぐにお嬢様のところへ……」

    完璧なメイドは、心を閉ざしたまま奉仕を続けた。

    「……」

    %CALLNAME:TARGET%は無言で口奉仕を行っている。

    「ん……ちゅる……」

    視線は虚ろで、どこか遠くを見ているようだ。

    「……終わりましたか……？」

    「では、これで失礼いたしますわ」

    %CALLNAME:TARGET%は早々に立ち上がろうとした。
