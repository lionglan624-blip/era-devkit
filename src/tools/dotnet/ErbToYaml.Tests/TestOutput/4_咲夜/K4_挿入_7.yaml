- id: fallback
  content: >-
    「……これも……おもてなしの一環ですわ……」

    %CALLNAME:TARGET%は自分に言い聞かせながら、%CALLNAME:MASTER%の膝の上に座った。

    「メイドとして……お客様のご要望にお応えするのは……当然のこと……」

    しかし、%CALLNAME:MASTER%の顔が近くにあることに戸惑いを隠せない。

    「っ……あ……見ないでくださいまし……」

    「……少し……恥ずかしいだけですわ……」

    %CALLNAME:TARGET%は自分の動揺を言い訳するように付け加えた。

    「……向かい合うと……困りますわね……」

    %CALLNAME:TARGET%は複雑な表情を浮かべている。

    「貴方の顔が……全部見えてしまいますから……」

    「何を考えているのか……分かってしまいそうで……」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:TARGET%の体が揺れた。

    「あ……そこは……」

    言葉を途中で飲み込み、%CALLNAME:TARGET%は唇を噛んだ。

    「……これは……仕事ですから……」

    %CALLNAME:TARGET%は何度も自分に言い聞かせている。

    しかし、体は快感を覚え始めていた。

    「……ぅ……変な気分になってきましたわ……」

    「%CALLNAME:MASTER%のせいですからね……責任を取ってくださいまし……」

    %CALLNAME:TARGET%は責任を押し付けながらも、抵抗する様子はなかった。

    「……ご満足いただけますでしょうか……」

    %CALLNAME:TARGET%は事務的な口調で尋ねながら、腰を動かしている。

    「この体勢は……その……少し親密すぎる気がしますけれど……」

    それでも、メイドとしての務めを果たそうとする。

    「っ……ぁ……奥が……」

    「……何でもありませんわ……続けますから……」

    %CALLNAME:TARGET%は複雑な表情で、奉仕を続けた。
