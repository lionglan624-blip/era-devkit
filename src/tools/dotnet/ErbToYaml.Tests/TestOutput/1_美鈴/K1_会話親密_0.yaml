- id: fallback
  content: >-
    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の話を興味深そうに聞いていた。

    「へぇ、そうなんですか」

    %CALLNAME:人物_美鈴%は丁寧に相槌をうった。

    「%CALLNAME:MASTER%って、面白い方ですね」

    %CALLNAME:人物_美鈴%は少し笑みを浮かべた。

    「……また、お話聞かせてくださいね」

    「あ、そういえば私もこの前……」

    %CALLNAME:人物_美鈴%は自分の話を始めかけて、少し躊躇した。

    「……いえ、つまらない話だから、いいですよね」

    %CALLNAME:人物_美鈴%は控えめに笑った。

    「それより、%CALLNAME:MASTER%の話の続きを聞かせてください」

    「――ふぅん、そうなんですか」

    %CALLNAME:人物_美鈴%は真面目な顔で話を聞いている。

    門番の仕事の手は止めないまま、器用に相槌を打っている。

    「%CALLNAME:MASTER%って、話すのがお上手ですね」

    %CALLNAME:人物_美鈴%は感心したように頷いた。

    「……門番って退屈だから、こういう話、ありがたいんです」

    「……%CALLNAME:MASTER%は、よくこちらにいらっしゃいますね」

    %CALLNAME:人物_美鈴%は不思議そうに首を傾げた。

    「私なんかと話しても、つまらなくないですか？」

    %CALLNAME:MASTER%が首を振ると、%CALLNAME:人物_美鈴%は少し驚いたようだ。

    「……そうですか。なら、また来てくださいね」

    %CALLNAME:人物_美鈴%はほんの少しだけ、嬉しそうに微笑んだ。
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の話を聞いていた。

    「はい、そうなんですか」

    %CALLNAME:人物_美鈴%は無難に相槌をうった。

    「……あ、すみません。門番の仕事があるので」

    %CALLNAME:人物_美鈴%は申し訳なさそうに話を切り上げた。

    「ふむふむ、なるほど」

    %CALLNAME:人物_美鈴%は適度な距離を保ちながら話を聞いている。

    「お話、ありがとうございました」

    %CALLNAME:人物_美鈴%は丁寧に、しかし事務的に会話を終えた。

    「――ええ、そうですか」

    %CALLNAME:人物_美鈴%は相槌を打ちながらも、どこか上の空だ。

    門番としての視線は、正門の向こう側を向いている。

    「すみません、仕事中なので……」

    %CALLNAME:人物_美鈴%は申し訳なさそうに、それでも毅然と言い放った。

    「また今度、お時間があれば」

    「……はい」

    %CALLNAME:人物_美鈴%は必要最低限の返事をしている。

    あまり親しくない相手との会話は、どうにも苦手なようだ。

    「……あの、私、あまり話すのが得意じゃなくて」

    %CALLNAME:人物_美鈴%は困ったように笑った。

    「もう少し仲良くなれたら、いろいろお話しできると思うんですけど」
  priority: 1
