- id: fallback
  content: >-
    「……こうするんだ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見上げながら、小さく呟いた。

    正面から組み敷かれる姿勢に、どこか戸惑いを見せている。

    「……%CALLNAME:MASTER%って、本当に怖くないの？　私が壊しちゃうかもしれないのに」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_フラン%は息を呑んだ。

    「あっ……変な感じ……でも、嫌じゃない……のさ」

    紅い瞳が、好奇心と不安の間で揺れていた。

    「んっ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%に貫かれながら、目を瞑った。

    誰かにこんなに近づかれるのは、久しぶりのことだった。

    「……お姉様以外で、こんなに近くにいる人……初めてなのさ」

    %CALLNAME:MASTER%の動きに合わせて、%CALLNAME:人物_フラン%の呼吸が乱れていく。

    「ふぁ……あっ……なんだか、頭がぼうっとしてきた……」

    悪魔の妹は、未知の感覚に戸惑いながらも身を任せていた。

    「%CALLNAME:MASTER%……重いのさ」

    %CALLNAME:人物_フラン%は不満そうに言ったが、その声には棘がない。

    むしろ、誰かの重みを感じられることを楽しんでいるようにも見えた。

    「……495年、ずっとひとりだったの。こういうの、知らなかった」

    %CALLNAME:MASTER%が奥まで突き入れると、%CALLNAME:人物_フラン%は小さく喘いだ。

    「あ……ん……悪くない、かも……」

    その言葉は、%CALLNAME:人物_フラン%なりの精一杯の肯定だった。

    「……ねぇ、%CALLNAME:MASTER%」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見つめながら、静かに問いかけた。

    「どうして私と、こういうことするの？　私、怖い妖怪なのに」

    %CALLNAME:MASTER%の返事を待たず、%CALLNAME:人物_フラン%は小さく笑った。

    「……変な人。でも、嫌いじゃないのさ」

    %CALLNAME:MASTER%が動くと、その笑みが甘い吐息に変わった。

    「んっ……あっ……もうちょっとだけ、こうしててもいいよ……」
  priority: 2
- id: fallback
  content: >-
    「……ふぅん、こうやって遊ぶんだ」

    %CALLNAME:人物_フラン%は興味深そうに%CALLNAME:MASTER%を見つめた。

    その紅い瞳には、好奇心と危険な光が混在している。

    「でも%CALLNAME:MASTER%、壊れないでね？　私、力の加減がよくわからないから」

    %CALLNAME:MASTER%が腰を動かし始めると、%CALLNAME:人物_フラン%は不思議そうに首を傾げた。

    「あ……変な感じ……これが気持ちいいってこと？」

    悪魔の妹は、新しい玩具を試すように%CALLNAME:MASTER%を観察していた。

    「きゅっとしてドカーンって、知ってる？」

    %CALLNAME:人物_フラン%は無邪気に笑いながら、不穏なことを口にした。

    「今の私なら、%CALLNAME:MASTER%のこと一瞬で壊せるのさ」

    しかし、%CALLNAME:MASTER%が動くと、その表情が揺らいだ。

    「んっ……あ、れ……なんだか、力が入らない……」

    %CALLNAME:人物_フラン%は戸惑いながら、快感に身を委ね始めていた。

    「……変なの。壊したいのに、壊したくないって思ってる……」

    「……」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%を見つめていた。

    495年の孤独が生んだ、どこか虚ろな瞳。

    「私のこと、怖くないの？　こんな近くにいたら、壊れちゃうよ？」

    %CALLNAME:MASTER%が構わず動くと、%CALLNAME:人物_フラン%の表情にわずかな変化が生まれた。

    「っ……ん……もう、%CALLNAME:MASTER%って本当に変わってるのさ」

    その声には、呆れと、どこか嬉しそうな響きがあった。

    「あなた、コンティニューできないんだよ？」

    %CALLNAME:人物_フラン%は警告するように言った。

    「私と遊ぶってことは、そういうこと。壊れたら終わりなのさ」

    しかし、%CALLNAME:MASTER%が奥まで突き入れると、その言葉が途切れた。

    「あっ……んっ……ちょ、ちょっと待って……頭が変になる……」

    %CALLNAME:人物_フラン%は快感に困惑しながら、%CALLNAME:MASTER%にしがみついていた。

    「……今日は、壊さないであげる。面白いから」
  priority: 1
