- id: fallback
  content: >-
    「……何をしているの」

    %CALLNAME:MASTER%が何もせずこちらを見ていることに、%CALLNAME:TARGET%は眉をひそめた。

    「用があるなら言いなさい。ないなら、本でも読んでいて」

    %CALLNAME:TARGET%は淡々と言ったが、視線を意識してか、本を持つ手が僅かに震えている。

    「……じろじろ見られると、気が散るのよ」

    「……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の視線を感じ、本から顔を上げた。

    「……観察しているの？ 私を？」

    %CALLNAME:TARGET%は興味深そうに%CALLNAME:MASTER%を見返した。

    「……ふぅん。人間の行動パターンとして、記録しておくわ」

    %CALLNAME:TARGET%は自分を落ち着かせるように、淡々と呟いた。

    「……むきゅ」

    %CALLNAME:MASTER%の視線が%CALLNAME:TARGET%に注がれ続けている。

    「……何もしないで見てるだけって、どういう意味があるの？」

    %CALLNAME:TARGET%は純粋に疑問を呈した。

    「……視覚的刺激だけで何かを得ようとしているの？」

    %CALLNAME:TARGET%は首を傾げながら、分析するように%CALLNAME:MASTER%を観察した。

    「……」

    %CALLNAME:MASTER%は何もせず、ただ%CALLNAME:TARGET%を見つめている。

    %CALLNAME:TARGET%は居心地の悪さを感じ、本に集中しようとした。

    「……あなた、変わった趣味ね」

    %CALLNAME:TARGET%はぼそりと呟いた。

    「……まあ、好きにしなさい。私は読書を続けるから」
  priority: 2
- id: fallback
  content: >-
    「……何の真似？」

    %CALLNAME:MASTER%がこちらを見つめているだけで何もしないことに、%CALLNAME:TARGET%は冷ややかな目を向けた。

    「用がないなら、出て行って。読書の邪魔よ」

    %CALLNAME:TARGET%は素っ気なく言い放ち、本に視線を戻した。

    「……変な人ね」

    「……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の視線に気づき、不快そうに眉を寄せた。

    「じろじろ見ないで。私は展示物じゃないわ」

    %CALLNAME:TARGET%は冷たく言い放った。

    「……精霊魔法で追い出すわよ。失礼な人ね」

    「……むきゅ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の視線を不快に感じ、困惑した声を漏らした。

    「何もしないなら、ここにいる意味がないでしょう」

    %CALLNAME:TARGET%は本で顔を隠すようにした。

    「……本を読みなさい。それか、帰って」

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついた。

    「あなた、図書館に何しに来たの。見るだけ？」

    %CALLNAME:TARGET%は呆れたような表情を浮かべている。

    「……観察するなら、本でも読んで。私を見ても何も得られないわ」

    %CALLNAME:TARGET%は冷めた目で%CALLNAME:MASTER%を一瞥し、読書に戻った。
  priority: 1
