  content: >-
    「おい……何だそれ。私のお尻に使う気か？」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の手にあるアナルバイブを睨みつけた。

    「……ふざけるなよ。誰がそんなの受け入れるか」

    %CALLNAME:人物_魔理沙%は後ずさり、距離を取った。

    「近づくな……マスタースパークで焼くぞ」

    %CALLNAME:人物_魔理沙%は警告するように八卦炉を取り出した。

    「おい、その変な道具をこっちに向けるな」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%を睨みつけた。

    「私のお尻はお前のおもちゃじゃないんだぜ」

    %CALLNAME:人物_魔理沙%の声には怒りが込められていた。

    「……次に変なことしたら、本気で怒るからな」

    %CALLNAME:人物_魔理沙%は距離を取りながら、%CALLNAME:MASTER%を警戒した。

    「はぁ？　何それ、趣味悪いぜ」

    %CALLNAME:人物_魔理沙%はアナルバイブを一瞥して言った。

    「そういうの、どこで買ってくるんだよ……理解できないぜ」

    %CALLNAME:人物_魔理沙%は呆れたように首を振った。

    「私に使おうなんて思うなよ？　絶対にな」

    %CALLNAME:人物_魔理沙%は念を押すように言った。

    「……」

    %CALLNAME:人物_魔理沙%は無言で%CALLNAME:MASTER%を見つめた。

    「%CALLNAME:MASTER%……お前、頭おかしいのか？」

    %CALLNAME:人物_魔理沙%の声は冷たかった。

    「そんなもの持って私に近づくな」

    「魔法使いを怒らせると怖いんだぜ……覚えておけよ」

    %CALLNAME:人物_魔理沙%は脅すように言い放った。
