  content: >-
    「へぇ……二人で、私を使うんだ……」

    %CALLNAME:人物_フラン%は興味深そうに呟いた。

    前と後ろ、同時に満たされる感覚は初めての経験だ。

    「面白いね……こういう遊び方もあるんだ……」

    二人が動くと、%CALLNAME:人物_フラン%は予想外の快感に目を見張った。

    「あっ……ん……思ったより……気持ちいいのさ……」

    悪魔の妹は、新しい快楽に純粋な驚きを見せていた。

    「前からも後ろからも……きてる……」

