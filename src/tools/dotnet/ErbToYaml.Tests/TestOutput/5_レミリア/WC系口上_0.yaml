- id: fallback
  content: >-
    「ちょ……！　……ちょっと、しっかりしなさい？

    「あっ……！　……危ないわねぇ、頼むわよ？

    敏感な方が%CALLNAME:TARGET%も楽しいけど、今のは大袈裟よ？」

    この程度で物を壊されちゃ、楽しめないじゃない」

    「%CALLNAME:MASTER%だって、弄られるのは嬉しいでしょう？

    「もっと躾けてあげなくてはいけないかしら？

    「快感を表に出しすぎなのよ、もっと耐えなさい。

    ……もっとお尻を上げて……そうよ。

    ほら、もっと良くしてあげるから……

    まったく……敏感で、いやらしい体……

    今度は、上手くやりなさい」

    落としたら、お仕置きよ？」

    喘いでばかりじゃ、ダメよ？」
  priority: 2
