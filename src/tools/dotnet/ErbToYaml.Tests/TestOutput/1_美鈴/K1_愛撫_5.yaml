    「……まだ、そういうのは……心の準備が……」

    %CALLNAME:人物_美鈴%は戸惑いながらも、強く拒否はしなかった。

    「ひゃっ……！　そ、そこ……」

    %CALLNAME:人物_美鈴%は予想外の場所に触れられ、声を上げた。

