entries:
- id: fallback
  content: >-
    「んっ……やぁ……そこ……」

    %CALLNAME:TARGET%はされるがままに、%CALLNAME:MASTER%に尻をなでられている。

    「……%CALLNAME:MASTER%、手つき……いやらしいぜ……」

    %CALLNAME:TARGET%は熱い息を漏らしながらも、抵抗はしなかった。

    むしろ身を寄せて、%CALLNAME:MASTER%の愛撫を受け入れている。

    「……もっと触ってもいいんだぜ？　私の全部、お前のものだからな……」

    %CALLNAME:MASTER%の手が、%CALLNAME:TARGET%の尻をゆっくりと撫でる。

    「ん……ふふ、そこ好きだろ……？　分かってるぜ」

    %CALLNAME:TARGET%は悪戯っぽく微笑みながら、腰を少し揺らした。

    「……私も、%CALLNAME:MASTER%に触られるの、嫌いじゃないんだ」

    そう言って、%CALLNAME:TARGET%は%CALLNAME:MASTER%の肩に頭を預けた。

    普通の魔法使いの威厳などどこへやら、すっかり甘えた様子だ。

    「あっ……もう……そんなところ……」

    %CALLNAME:TARGET%は頬を染めて、%CALLNAME:MASTER%の手を受け入れている。

    「……魔法の研究中なのに……こういうことするんだから……」

    そう言いながらも、%CALLNAME:TARGET%は身を寄せてきた。

    小ぶりだが形の良い尻が%CALLNAME:MASTER%の手に押し付けられる。

    「……へへ、もう少しだけなら、いいぜ……」

    「んぅ……くぅ……」

    %CALLNAME:TARGET%は甘い声を漏らしながら、尻をなでる手に身を委ねている。

    「……%CALLNAME:MASTER%の手、あったかいな……」

    %CALLNAME:TARGET%は恥ずかしそうに、でも嬉しそうに微笑んだ。

    「……こういうの、嫌いじゃないんだぜ。%CALLNAME:MASTER%にだけ、な」

    %CALLNAME:TARGET%は甘えるように%CALLNAME:MASTER%にもたれかかった。
  priority: 4
- id: talent_3_1
  content: >-
    「も、もう……そんなところ触って……」

    %CALLNAME:TARGET%は顔を赤くして、でも逃げようとはしない。

    「%CALLNAME:MASTER%ったら、えっちなんだぜ……」

    %CALLNAME:TARGET%は恥じらいながらも、その場に留まっている。

    「……嫌じゃないけど、恥ずかしいんだよ……」

    頬を染めたまま、%CALLNAME:TARGET%は小さく呟いた。

    「やっ……そこは……」

    %CALLNAME:TARGET%はビクッと体を震わせた。

    %CALLNAME:MASTER%の手が、尻の曲線をゆっくりとなぞる。

    「……%CALLNAME:MASTER%だから、いいけどさ……」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らした。

    その耳まで赤く染まっていた。

    「んっ……あ……」

    %CALLNAME:TARGET%は小さく声を漏らした。

    「……急にそういうことするの、ずるいぜ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を上目遣いで見ている。

    「……心の準備くらい、させてくれよな」

    そう言いながらも、%CALLNAME:TARGET%は逃げようとはしなかった。

    %CALLNAME:MASTER%の手が、%CALLNAME:TARGET%の尻に触れる。

    「ひゃっ……も、もう……」

    %CALLNAME:TARGET%は顔を真っ赤にして、体を硬くした。

    「……服越しなのに、手の熱さが伝わってくるぜ……」

    %CALLNAME:TARGET%はそう呟きながらも、%CALLNAME:MASTER%から離れようとはしない。

    その金色の瞳は潤んで、期待と恥じらいが混じっていた。
  priority: 3
