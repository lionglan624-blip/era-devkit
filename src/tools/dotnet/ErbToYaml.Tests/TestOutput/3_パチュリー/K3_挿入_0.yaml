character: パチュリー
situation: K3_挿入
entries:
- id: fallback
  content: >-
    「……んっ、あ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を受け入れながら、静かに息を吐いた。

    本で読んだ知識と、実際に感じる熱は全く違う。

    「……%CALLNAME:MASTER%、重い……でも、離れないで」

    %CALLNAME:TARGET%は細い腕を%CALLNAME:MASTER%の背に回した。

    「……あなたの体温が、私の魔力を満たしていくの」

    「はぁ……ん……深い……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の目を見つめながら、小さく喘いだ。

    大図書館の静寂の中、二人の息遣いだけが響いている。

    「……この体勢、顔がよく見えるわね」

    %CALLNAME:TARGET%は頬を染めながら、%CALLNAME:MASTER%の頬に手を添えた。

    「……私の顔も、そんな風に見えているの？ 恥ずかしいわ……」

    「ぁ……んん……っ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに合わせて、体を揺らしている。

    普段は動かない大図書館が、今は二人のために揺れているよう。

    「……%CALLNAME:MASTER%……もっと、奥まで……」

    %CALLNAME:TARGET%は珍しく積極的な言葉を口にした。

    「……私の全てを、あなたに知ってほしいの」

    「……ふぅ……あ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に抱かれながら、満ち足りた表情を浮かべている。

    「……体が弱いから、この体勢は楽でいいわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げ、微笑んだ。

    「……あなたに委ねていれば、私は安心できる」

    そう言って、%CALLNAME:TARGET%は%CALLNAME:MASTER%の唇に口づけを求めた。
  priority: 4
- id: talent_3_1
  content: >-
    「っ……あ……入って……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を受け入れながら、顔を背けた。

    「……正面から見ないで。恥ずかしいから」

    %CALLNAME:TARGET%は論理的に説明しようとして、言葉に詰まった。

    「……この感情は、何なのかしら。胸が苦しいの」

    頬を紅潮させながら、%CALLNAME:TARGET%は小さく呟いた。

    「んっ……ふ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに、体を強張らせている。

    「……本では、こういう行為について色々と読んだわ」

    %CALLNAME:TARGET%は平静を装おうとしているが、声が震えている。

    「……でも、実際は全然違う。頭が、考えることを拒否するの」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみついた。

    「あ……やぁ……そんなに見ないで……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と目が合い、慌てて目を閉じた。

    「……正常位というのは、相手の表情が見えるのね」

    %CALLNAME:TARGET%は知識として理解していたが、こんなに恥ずかしいとは。

    「……%CALLNAME:MASTER%、キスして。そうすれば、視線を感じなくて済むから」

    照れ隠しのように、%CALLNAME:TARGET%は唇を求めた。

    「……ん……ぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に組み敷かれながら、静かに喘いでいる。

    「……私の心拍数が上がっているわ。これは運動によるものか、それとも……」

    %CALLNAME:TARGET%は自分の感情を分析しようとしている。

    「……いえ、分析は後にしましょう。今は……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の首に腕を回し、身を委ねた。
  priority: 3
