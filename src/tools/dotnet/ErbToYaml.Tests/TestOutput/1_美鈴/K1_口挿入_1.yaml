entries:
- id: fallback
  content: >-
    「――%CALLNAME:MASTER%……口で、してあげる……」

    %CALLNAME:人物_美鈴%は甘い声でそう言って、膝をついた。

    目の前にそそり立つ一物に、%CALLNAME:人物_美鈴%は愛おしげに頬を寄せた。

    「……ふふ、私のこと、待っててくれたのね……」

    %CALLNAME:人物_美鈴%は舌を伸ばして、ゆっくりと先端を舐め始めた。

    「……ん、ちゅ……%CALLNAME:MASTER%の味……好き……」

    そのまま口を開けて、一物を深く咥え込んだ。

    「……ねえ、%CALLNAME:MASTER%……気持ちよくしてあげるから……」

    %CALLNAME:人物_美鈴%は妖艶に微笑んで、一物に顔を近づけた。

    武術家の器用な舌が、亀頭から根元までねっとりと這う。

    「……れろ、ちゅる……んっ……美味しい……」

    %CALLNAME:人物_美鈴%は全体を舌で愛撫してから、大きく口を開けた。

    「……はむっ……ん、じゅる……」

    温かい口腔が一物を包み込み、%CALLNAME:人物_美鈴%はゆっくりと頭を前後に動かし始めた。

    「……%CALLNAME:MASTER%のここ、大好き……」

    %CALLNAME:人物_美鈴%はそそり立つ一物に頬ずりしながら呟いた。

    「……いつも私を満たしてくれるもの……ご褒美、あげなきゃね……」

    %CALLNAME:人物_美鈴%は唇を開いて、先端に優しくキスをした。

    「……ちゅ、れろ……ん……こうすると、気持ちいいでしょ……？」

    舌先で鈴口を刺激しながら、%CALLNAME:人物_美鈴%は上目遣いで微笑んだ。

    そのまま一気に根元まで咥え込み、喉奥で肉棒を締め付けた。

    「――私の口、%CALLNAME:MASTER%専用よ……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに、でも嬉しそうに言った。

    「……他の誰にも、こんなことしないから……」

    %CALLNAME:人物_美鈴%は一物を両手で支えて、先端に舌を這わせた。

    「……んっ、ちゅぷ……%CALLNAME:MASTER%、見てて……」

    ゆっくりと一物を咥え、%CALLNAME:人物_美鈴%は恍惚とした表情で奉仕を始めた。

    「……じゅる、ん……私が、全部受け止めてあげるから……」
