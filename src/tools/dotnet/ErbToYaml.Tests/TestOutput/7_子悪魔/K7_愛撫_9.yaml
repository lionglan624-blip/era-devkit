- id: fallback
  content: >-
    「え……じ、自分で……ですか……？」

    %CALLNAME:TARGET%は困惑した表情で%CALLNAME:MASTER%を見上げた。

    「そ、そんなこと……したこと、ないです……」

    しかし、%CALLNAME:MASTER%に促されて、おずおずと手を伸ばす。

    「……こ、こうですか……？　あぅ……恥ずかしいです……」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%の言う通りにしようとしていた。

    「……%CALLNAME:MASTER%……あんまり見ないでくださいね……」

    「ひぅ……こ、こんなこと……」

    %CALLNAME:TARGET%は涙目になりながら、自分の秘部に触れていた。

    「……んっ……変な感じ……です……」

    妖精の細い指が、ぎこちなく動いている。

    %CALLNAME:TARGET%は顔を真っ赤にして、俯いてしまった。

    「……%CALLNAME:MASTER%がそうしろって言うから……」

    責めるような、でもどこか頼りにするような声で、%CALLNAME:TARGET%は呟いた。

    「あの……これ、何のためにするんですか……？」

    %CALLNAME:TARGET%は困惑しながら、言われた通りにしていた。

    「んっ……あっ……な、なんか……体、熱くなってきました……」

    妖精は自分の体の変化に驚きながら、手を止められないでいた。

    「……これって……普通のことなんですか……？」

    %CALLNAME:TARGET%は不安そうに%CALLNAME:MASTER%を見つめた。

    「……%CALLNAME:MASTER%が見てるから……余計に、変な感じ……」

    「うぅ……恥ずかしいです……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、震える手で自分に触れていた。

    「……んっ……こういうの、咲夜さんに怒られそう……」

    妖精は罪悪感を感じながらも、%CALLNAME:MASTER%の指示に従っている。

    「でも……%CALLNAME:MASTER%が言うなら……」

    %CALLNAME:TARGET%はおずおずと指を動かし続けた。

    「……だめ、ですよ……誰にも、言わないでくださいね……」
  priority: 2
- id: fallback
  content: >-
    「……えっ？　じ、自慰……ですか……？」

    %CALLNAME:TARGET%は目を丸くして、固まってしまった。

    「そ、そんなこと……できません……」

    妖精は顔を真っ赤にして、必死に首を振っている。

    「あたしたち、そんな仲じゃないです……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%から距離を取ろうとした。

    「……咲夜さんに言いつけますからね……！」

    「い、いやです……そんなこと……」

    %CALLNAME:TARGET%は涙目で%CALLNAME:MASTER%を見上げた。

    「なんでそんなこと、させようとするんですか……」

    妖精は困惑と恐怖で体を強張らせている。

    「……あたし、悪いことしましたか……？」

    %CALLNAME:TARGET%は怯えた声で問いかけた。

    「……お願いです……やめてください……」

    「……っ」

    %CALLNAME:TARGET%は何も言えずに固まっている。

    恥ずかしさと戸惑いで、妖精の目には涙が浮かんでいた。

    「……わ、わかりません……何をすればいいのか……」

    %CALLNAME:TARGET%は震える声で訴えた。

    「……こういうの……よくわからないんです……」

    妖精は途方に暮れて、%CALLNAME:MASTER%を見つめるしかなかった。

    「やだ……見ないでください……」

    %CALLNAME:TARGET%は顔を手で覆って、その場にうずくまった。

    「……こんなこと、できません……」

    妖精は震えながら、首を横に振り続けている。

    「%CALLNAME:MASTER%が怖い人じゃないと思いたいけど……」

    %CALLNAME:TARGET%は消え入りそうな声で呟いた。

    「……お願い……優しくして……」
  priority: 1
