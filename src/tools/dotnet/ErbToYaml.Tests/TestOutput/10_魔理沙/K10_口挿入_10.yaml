    「……なんか、後ろからだと変な感じだ」

    %CALLNAME:人物_魔理沙%は無表情を装いながら、%CALLNAME:MASTER%の後ろで腰を動かしている。

    「こういうのは経験ないんだから……期待するなよ」

    %CALLNAME:人物_魔理沙%の動きはぎこちなく、慣れていないのが明らかだった。

    「……文句あるなら、他の奴に頼めばいいだろ」

    %CALLNAME:人物_魔理沙%は強がりながらも、動きを止めようとはしなかった。

    「……」

    %CALLNAME:人物_魔理沙%は無言で%CALLNAME:MASTER%の後ろから腰を動かしている。

    「……これで満足なのか、お前は」

    %CALLNAME:MASTER%が反応すると、%CALLNAME:人物_魔理沙%は少し驚いた。

    「……ふーん、後ろからだとこうなるのか」

    %CALLNAME:人物_魔理沙%は興味なさそうな振りをしながら、腰を動かし続けた。
