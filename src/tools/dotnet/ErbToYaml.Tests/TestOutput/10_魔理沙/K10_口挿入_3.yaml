character: 魔理沙
situation: K10_口挿入
entries:
- id: fallback
  content: >-
    「ん……こうやって腰を動かすと、気持ちいいのか？」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の上に跨り、陰部を擦り付けた。

    「私のここ……お前のに当たってると、なんか……繋がってる気がするぜ」

    %CALLNAME:人物_魔理沙%は恋人の顔を見ながら、ゆっくりと腰を前後に動かし始めた。

    「んっ……あ……私も気持ちよくなってきた……」

    %CALLNAME:人物_魔理沙%は頬を染めながら、奉仕を続けた。

    「ふふ……お前のここ、すごく熱いな」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の一物に陰部を密着させた。

    「こうして擦り合わせてると……お互いに気持ちいいだろ？」

    「んっ……ふぅ……こう、腰を振ると……」

    %CALLNAME:人物_魔理沙%は恋人の反応を確かめながら、腰を動かした。

    「もっと気持ちよくしてやるから……任せとけ」

    「……だんだんコツが分かってきたかもな」

    %CALLNAME:人物_魔理沙%は自信を持って腰を動かした。

    「んっ……こうやって擦り付けると……反応するんだよな」

    %CALLNAME:MASTER%が気持ちよさそうにすると、%CALLNAME:人物_魔理沙%は得意げになった。

    「ふふん、私だって努力してるんだぜ……お前のためにな」

    %CALLNAME:人物_魔理沙%は恋人を喜ばせることに夢中になっていた。

    「なあ……ちゃんとこっち見てろよ」

    %CALLNAME:人物_魔理沙%は腰を動かしながら、%CALLNAME:MASTER%の目を見つめた。

    「私がお前を気持ちよくしてるとこ……ちゃんと見ててくれ」

    「んっ……あっ……私の方も、濡れてきた……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに頬を染めながらも、腰を止めなかった。

    「……見られてると、なんか……興奮するんだぜ」
  priority: 4
- id: talent_3_1
  content: >-
    「ち、違うからな！　べ、別にやりたくてやってるわけじゃ……」

    %CALLNAME:人物_魔理沙%は顔を真っ赤にしながら、%CALLNAME:MASTER%の上に跨った。

    「こ、こうやって擦り付ければいいんだろ……？」

    %CALLNAME:人物_魔理沙%は照れ隠しに強がりながらも、腰を動かし始めた。

    「んっ……あっ……な、なんだよ、見るなよ……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに顔を背けながらも、腰は止めなかった。

    「こ、こんなことして……変態なんだからな、お前は」

    %CALLNAME:人物_魔理沙%は文句を言いながらも、腰を動かし続けている。

    「私のここを……こうやって使うなんて……」

    「んっ……ふぅ……でも、気持ちいいなら……仕方ないか」

    %CALLNAME:人物_魔理沙%の動きは慣れないながらも、一生懸命だった。

    「……勝手に変な声出すなよ、恥ずかしいだろ……」

    「んっ……なんか、お前の……大きくなってきた……？」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、腰を動かし続けた。

    「こ、これって……私の腰使いで気持ちいいってことか……？」

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_魔理沙%は複雑な表情になった。

    「……別に嬉しくなんかないぜ……ただ、悪い気はしないってだけだ」

    %CALLNAME:人物_魔理沙%は照れながらも、少し得意げだった。

    「……お前、もうちょっと反応してくれてもいいんだぜ」

    %CALLNAME:人物_魔理沙%は少し不満そうに呟いた。

    「こっちは一生懸命やってるんだから……」

    「んっ……あっ……こう擦り付けると……」

    %CALLNAME:MASTER%が気持ちよさそうな顔をすると、%CALLNAME:人物_魔理沙%は照れた。

    「なっ……そ、そんな顔されると困る……もう、勝手にしろよ……」
