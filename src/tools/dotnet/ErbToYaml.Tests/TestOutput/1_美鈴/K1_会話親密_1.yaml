character: 美鈴
situation: K1_会話親密
entries:
- id: fallback
  content: >-
    「――あら、%CALLNAME:MASTER%がお茶を？」

    %CALLNAME:人物_美鈴%は嬉しそうに湯飲みを受け取った。

    ふう、と息を吹きかけてから、静かに口をつける。

    「……うん、美味しい。%CALLNAME:MASTER%、上手になったわね」

    %CALLNAME:人物_美鈴%は目を細めて微笑んだ。

    「……ねえ、これからも、こうやってお茶淹れてくれる？」

    恋人にお茶を淹れてもらえる幸せを噛みしめるように、%CALLNAME:人物_美鈴%はそう言った。

    「わぁ、ありがとう。ちょうど喉が渇いてたの」

    %CALLNAME:人物_美鈴%は両手で湯飲みを包み込むように持ち、ふぅふぅと冷ました。

    ずず、と音を立ててお茶を啜る。

    「……はぁ、生き返るわ」

    %CALLNAME:人物_美鈴%は満足そうに息を吐いた。

    「門番の仕事も、%CALLNAME:MASTER%のお茶があると頑張れるのよ」

    そう言って、%CALLNAME:人物_美鈴%は照れくさそうに笑った。

    「ん……」

    %CALLNAME:人物_美鈴%は差し出された湯飲みを見て、ふわりと微笑んだ。

    「%CALLNAME:MASTER%、今日はなんだか優しいわね」

    そう言いながら、ゆっくりとお茶を受け取る。

    「……うん、いい香り」

    湯気の立つ湯飲みに顔を近づけ、%CALLNAME:人物_美鈴%は幸せそうに目を閉じた。

    「こうしてると、門番の疲れなんて忘れちゃうわ」

    %CALLNAME:人物_美鈴%は恋人の心遣いに、じんわりと胸が温かくなるのを感じていた。

    「あっ、ありがとう」

    %CALLNAME:人物_美鈴%は嬉しそうに湯飲みを受け取った。

    そっと口をつけ、ゆっくりとお茶を味わう。

    「……%CALLNAME:MASTER%って、本当に気が利くわよね」

    %CALLNAME:人物_美鈴%は照れくさそうに笑う。

    「……ふふ、なんだか、恋人に世話焼いてもらってるみたいで嬉しいわ」

    その言葉に自分で気づいて、%CALLNAME:人物_美鈴%は少し頬を染めた。
  priority: 4
- id: talent_3_1
  content: >-
    「――え、お茶？　%CALLNAME:MASTER%が淹れてくれたの？」

    %CALLNAME:人物_美鈴%は少し驚いた顔で湯飲みを受け取った。

    そっと口をつけて、ゆっくりとお茶を味わう。

    「……うん、美味しいわ。ありがと」

    %CALLNAME:人物_美鈴%は頬を少し染めながら、微笑んだ。

    「……なんか、こういうの……嬉しいな」

    照れくさそうに目を逸らしながら、%CALLNAME:人物_美鈴%は呟いた。

    「あ、ありがとう」

    %CALLNAME:人物_美鈴%は慌てて湯飲みを受け取った。

    ずず、と音を立ててお茶を啜る。

    「……あつっ」

    %CALLNAME:人物_美鈴%は熱さに少し舌を出した。

    「……ふふ、でも美味しいわ。%CALLNAME:MASTER%って、意外と気が利くのね」

    %CALLNAME:人物_美鈴%は嬉しそうに、お茶をゆっくり飲み続けた。

    「わ、私に……？」

    %CALLNAME:人物_美鈴%は少し戸惑いながらも、湯飲みを受け取る。

    両手で湯飲みを包み込み、じっと見つめる。

    「……%CALLNAME:MASTER%、いつもこうやって……」

    何か言いかけて、%CALLNAME:人物_美鈴%は言葉を飲み込んだ。

    「……ありがとう。美味しいわ」

    心の中の想いを隠すように、%CALLNAME:人物_美鈴%はゆっくりとお茶を啜った。

    「あら……」

    %CALLNAME:人物_美鈴%は差し出された湯飲みに、思わず顔がほころんだ。

    「……ふふ、門番にお茶を差し入れてくれるなんて」

    そう言いながら、ありがたそうにお茶を受け取る。

    「……うん、あったかい」

    %CALLNAME:人物_美鈴%はお茶を飲みながら、%CALLNAME:MASTER%の横顔をちらりと見た。

    その視線には、言葉にできない想いが込められていた。
  priority: 3
