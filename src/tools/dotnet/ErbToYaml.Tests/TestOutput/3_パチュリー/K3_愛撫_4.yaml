character: パチュリー
situation: K3_愛撫
entries:
- id: fallback
  content: >-
    「……っ……そ、そこは……」

    %CALLNAME:TARGET%は魔導書を取り落とし、%CALLNAME:MASTER%の行為に身を震わせた。

    %CALLNAME:MASTER%の舌が%CALLNAME:TARGET%の菊穴に触れ、淫靡な音が大図書館に響く。

    「……後ろを舐めるなんて……本にも載っていない背徳行為だわ……」

    %CALLNAME:TARGET%は羞恥に顔を真っ赤にしながらも、%CALLNAME:MASTER%を拒まない。

    「……でも、あなたになら……全部、委ねてもいいの」

    そう呟いて、%CALLNAME:TARGET%は%CALLNAME:MASTER%に尻を向けた。

    「あ……ぁ……そこ……熱い……」

    %CALLNAME:MASTER%の舌が%CALLNAME:TARGET%の菊穴を丹念に舐めている。

    %CALLNAME:TARGET%は机に両手をついて、震える体を支えていた。

    「……%CALLNAME:MASTER%、あなたの舌が……中に……入ってくる……」

    %CALLNAME:TARGET%は淡々とした口調を保とうとするが、声が甘く上擦っている。

    「……動かない大図書館が……こんな姿を晒すなんて……」

    %CALLNAME:TARGET%は恥ずかしそうに顔を伏せながらも、腰を僅かに押し付けた。

    「……ん……ふぅ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の舌に身を委ね、静かに喘いでいる。

    大図書館の静寂の中、%CALLNAME:TARGET%の吐息と淫靡な水音だけが響いている。

    「……%CALLNAME:MASTER%、そこ……気持ちいいわ……認めるのは癪だけど……」

    %CALLNAME:TARGET%は珍しく素直に快感を認めた。

    「……あなただけよ……私をこんな風にできるのは……」

    %CALLNAME:TARGET%は潤んだ瞳で肩越しに%CALLNAME:MASTER%を見つめた。

    「……ひゃ……っ……やぁ……」

    %CALLNAME:MASTER%が舌を深く差し入れると、%CALLNAME:TARGET%は思わず甘い声を上げた。

    %CALLNAME:TARGET%の菊穴が%CALLNAME:MASTER%の舌を締め付け、解そうともがいている。

    「……そんなに……奥まで……頭が……真っ白に……」

    %CALLNAME:TARGET%は普段の知的さを失い、快感に溺れていた。

    「%CALLNAME:MASTER%……私の全てを……あなたに……捧げるわ……」

    甘い囁きが、古い本の匂いが漂う空気に溶けていった。
  priority: 4
- id: talent_3_1
  content: >-
    「……っ!? %CALLNAME:MASTER%、そ、そこは……違う穴よ……!?」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の行為に驚き、身を強張らせた。

    しかし逃げ出すことはなく、恥ずかしそうに顔を伏せている。

    「……後ろなんて……そんな場所……舐めるなんて……」

    %CALLNAME:TARGET%の声が途切れ、頬が真っ赤に染まった。

    「……%CALLNAME:MASTER%、変態……」

    弱々しい抗議だけが、大図書館に響いた。

    「……やぁ……そこ、だめ……」

    %CALLNAME:TARGET%は弱々しく抗議しながらも、%CALLNAME:MASTER%にされるがまま。

    %CALLNAME:MASTER%の舌が菊穴を這うと、%CALLNAME:TARGET%の体がびくりと反応した。

    「……むきゅ……変な、声、出ちゃう……」

    %CALLNAME:TARGET%は羞恥に耐えながら、%CALLNAME:MASTER%の行為を受け入れている。

    「……本には……こんな行為……載ってなかったのに……」

    %CALLNAME:TARGET%は必死に知識で状況を理解しようとしていた。

    「……ん……っ……ひぅ……」

    %CALLNAME:TARGET%は声を殺しながら、%CALLNAME:MASTER%の舌に耐えている。

    「……どうして、そんなところを……舐めるの……」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%を睨むが、その視線には力がない。

    「……あなたは、私を……どこまで辱めれば、気が済むの……」

    そう言いながらも、%CALLNAME:TARGET%の腰は微かに%CALLNAME:MASTER%に押し付けられていた。

    「……ぁ……あ……」

    %CALLNAME:TARGET%は思わず甘い声を漏らし、慌てて口を押さえた。

    %CALLNAME:MASTER%の舌が菊穴の中に入り込むと、%CALLNAME:TARGET%の体が大きく震えた。

    「……聞かないで。今の声は、聞かなかったことに、して……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%から顔を背けたが、耳まで赤い。

    「……%CALLNAME:MASTER%……あなたって、本当に……」

    言葉を飲み込み、%CALLNAME:TARGET%はただ%CALLNAME:MASTER%に身を任せた。
  priority: 3
