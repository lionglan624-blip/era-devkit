    %CALLNAME:人物_美鈴%は顔を真っ赤にしながら、手で顔を覆った。

    「……恥ずかしい……でも……嫌じゃないのが……もっと恥ずかしい……」

    %CALLNAME:人物_美鈴%はされるがままに、%CALLNAME:MASTER%に秘部を見られ続けていた。

    「あ……そこは……見ちゃダメ……」

    %CALLNAME:人物_美鈴%は弱々しく抗議したが、脚を閉じることはできなかった。

    %CALLNAME:MASTER%が花弁を開いて覗き込むと、桃色の内壁が露わになる。

