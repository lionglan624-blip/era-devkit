  content: >-
    「お、おい……こんなこと、させるなよ……」

    %CALLNAME:人物_魔理沙%は動揺しながらも、胸で%CALLNAME:MASTER%の一物を挟まされた。

    「わ、私にこんなこと……何考えてるんだ……」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、ぎこちなく胸を動かした。

    「……私の胸なんかで……満足なのかよ……」

    %CALLNAME:人物_魔理沙%は落ち着かない様子で、なんとか状況を受け入れようとしていた。

    「……何でこんなことになってるんだ」

    %CALLNAME:人物_魔理沙%は理不尽そうに呟きながら、胸を動かしている。

    「こういうのは……もっと親しくなってからだろ……」

    %CALLNAME:人物_魔理沙%の抗議とは裏腹に、胸は止まらなかった。

    「はぁ……仕方ない、早く終わらせるぞ……」

    %CALLNAME:人物_魔理沙%は諦めたように、胸の動きを速めた。

    「……熱いな、これ」

    %CALLNAME:人物_魔理沙%は無表情を装いながら、%CALLNAME:MASTER%の一物を胸で挟んでいる。

    「こういうのは経験ないんだから……期待するなよ」

    %CALLNAME:人物_魔理沙%の動きはぎこちなく、慣れていないのが明らかだった。

    「……文句あるなら、他の奴に頼めばいいだろ」

    %CALLNAME:人物_魔理沙%は強がりながらも、胸を止めようとはしなかった。

    「……」

    %CALLNAME:人物_魔理沙%は無言で%CALLNAME:MASTER%の一物を胸で挟んでいる。

    「……これで満足なのか、お前は」

    %CALLNAME:MASTER%が反応すると、%CALLNAME:人物_魔理沙%は少し驚いた。

    「……ふーん、こうすると感じるのか」

    %CALLNAME:人物_魔理沙%は興味なさそうな振りをしながら、胸を動かし続けた。
