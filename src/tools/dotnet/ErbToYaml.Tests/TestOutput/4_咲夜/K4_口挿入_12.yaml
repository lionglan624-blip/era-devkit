entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……貴方の味……堪能させていただきますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の秘所に顔を埋めた。

    「んっ……んむっ……」

    瀟洒なメイドの舌が、丁寧に襞を這っていく。

    「ふふ……貴方のここ……全部私のものですわ……」

    %CALLNAME:TARGET%は愛おしそうに舌を動かし続けた。

    「……もっと……味わわせてくださいまし……」

    「……んっ……%CALLNAME:MASTER%……ここ、敏感ですわね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を見ながら舌を動かしている。

    「こう……舐めると……震えますわ……」

    メイドの舌が、%CALLNAME:MASTER%の弱点を攻め続ける。

    「貴方の気持ちいい場所……全部覚えましたわ……」

    %CALLNAME:TARGET%は頬を染めながら、奉仕を続けた。

    「……私だけが知っている……貴方の秘密……」

    「……ほら……%CALLNAME:MASTER%……力を抜いてくださいまし……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の太腿を優しく押さえながら顔を埋めている。

    「瀟洒なメイドの舌、いかがですか……？」

    「んむ……ちゅっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の蜜を舌で掬い取った。

    「甘い……ですわ……」

    「貴方の全て……私に捧げてくださいまし……」

    「……%CALLNAME:MASTER%……今日は私が……お世話いたしますわ……」

    %CALLNAME:TARGET%は恭しく%CALLNAME:MASTER%の秘所に口づけた。

    「貴方を……気持ちよくして差し上げますから……」

    %CALLNAME:TARGET%の舌使いは丁寧で、愛情に満ちていた。

    「んっ……れろっ……」

    「……そのまま……私に身を任せてくださいまし……」

    完璧なメイドは、恋人の秘所を隅々まで愛撫した。
