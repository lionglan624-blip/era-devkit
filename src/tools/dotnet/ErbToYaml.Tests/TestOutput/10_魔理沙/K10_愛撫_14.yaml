- id: fallback
  content: >-
    「な……何だそれ、変な道具……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の手にあるマッサージャを怪訝そうに見た。

    「マッサージ器具……？　肩こりでもあるのか？」

    しかし%CALLNAME:MASTER%の意図を悟った瞬間、%CALLNAME:人物_魔理沙%の顔が赤くなった。

    「ちょ、ちょっと待て！　そういうのに使うのか！？」

    %CALLNAME:人物_魔理沙%は慌てて距離を取ろうとしたが、間に合わなかった。

    「おい、その変なの……こっちに向けるなって」

    %CALLNAME:人物_魔理沙%はマッサージャを警戒した。

    「私はそういうの苦手なんだぜ……」

    だが%CALLNAME:MASTER%は容赦なくスイッチを入れた。

    「うわっ！　振動……って、あっ！　当てるな！」

    %CALLNAME:人物_魔理沙%の抗議は、甘い声に変わっていった。

    「それ、何だ……？　見たことないぜ」

    %CALLNAME:人物_魔理沙%は興味と警戒が混じった目でマッサージャを見た。

    「魔法道具か何かか……？」

    %CALLNAME:MASTER%が無言で電源を入れると、低い唸りが響いた。

    「うわっ……動いた……って、ちょっ！」

    %CALLNAME:人物_魔理沙%は何が起こるか悟る前に、その振動を体に受けた。

    「……なんか嫌な予感がするぜ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の手にあるものを見て呟いた。

    「そ、それを私に使う気じゃないだろうな……」

    %CALLNAME:MASTER%の沈黙が答えだった。

    「ま、待てって！　話し合おうぜ！」

    %CALLNAME:人物_魔理沙%の懇願は聞き入れられなかった。
