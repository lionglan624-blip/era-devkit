character: フラン
situation: K6_口挿入
entries:
- id: fallback
  content: >-
    「ねえ、%CALLNAME:MASTER%……後ろからだと、こうして抱きつけるのさ……」

    %CALLNAME:人物_フラン%は恋人の背中に覆いかぶさりながら、紅い瞳を細めた。

    後孔に自分のものを押し当てると、耳元で甘く囁いた。

    「顔は見えないけど……繋がってるのは分かるよ……」

    ゆっくりと腰を沈めると、%CALLNAME:人物_フラン%は満足げに息を漏らした。

    「壊さないように……でも、奥まで届きたいの……」

    495年の孤独を知る少女は、恋人の背中を抱きしめながら愛を伝えていた。

    「%CALLNAME:MASTER%の背中、温かいのさ……」

    %CALLNAME:人物_フラン%は恋人に覆いかぶさりながら、幸せそうに呟いた。

    後背位で挿入しながら、背中に頬を擦り付ける。

    「んっ……こうして動くと、%CALLNAME:MASTER%の全部が分かるの……」

    %CALLNAME:人物_フラン%は恋人の腰を掴んで、ゆっくりと突き入れた。

    「顔が見えないのは寂しいけど……この体勢だと、深く入れるからね……」

    悪魔の妹は、恋人との結合に紅い瞳を潤ませていた。

    「えへへ……%CALLNAME:MASTER%、後ろから抱きついちゃうのさ」

    %CALLNAME:人物_フラン%は恋人の背中に張り付きながら、無邪気に微笑んだ。

    後背位の体勢で挿入しながら、両腕を恋人の身体に回す。

    「こうしてると……私が%CALLNAME:MASTER%を守ってるみたい……」

    %CALLNAME:人物_フラン%は恋人の耳に吐息を吹きかけながら腰を動かした。

    「ずっとこうしていたいの……壊さないで、ずっと繋がっていたい……」

    495年の孤独を経た少女は、恋人を後ろから包み込む幸福に酔いしれていた。

    「%CALLNAME:MASTER%……私だけのものって、こうして抱きしめると分かるのさ」

    %CALLNAME:人物_フラン%は後背位で恋人を貫きながら、甘く囁いた。

    背中に体重を預けながら、奥まで突き入れていく。

    「顔が見えないから……声で教えてね。気持ちいいって……」

    %CALLNAME:人物_フラン%は恋人の反応を確かめながら、腰を揺らし続けた。

    「壊さないよ……大事な%CALLNAME:MASTER%だもん……後ろから守ってあげる……」

    悪魔の妹は、恋人を独占する喜びに満たされていた。
  priority: 4
- id: talent_3_1
  content: >-
    「……%CALLNAME:MASTER%、後ろからだと……顔が見えなくて、ちょっと寂しい……」

    %CALLNAME:人物_フラン%は恥ずかしそうに呟きながら、%CALLNAME:MASTER%の背中に身を寄せた。

    後孔に自分のものを当てると、緊張で手が震えている。

    「でも……こうして抱きつけるのは、嬉しいの……」

    %CALLNAME:人物_フラン%はゆっくりと挿入しながら、安堵の息を漏らした。

    「壊さないように……%CALLNAME:MASTER%のこと、大切にしたいから……」

    495年の孤独を知る少女は、好きな人の背中に縋りついていた。

    「私が後ろにいると……%CALLNAME:MASTER%、安心できる……？」

    %CALLNAME:人物_フラン%は不安そうに問いかけながら、腰を動かし始めた。

    後背位の体勢で%CALLNAME:MASTER%の背中に抱きつき、温もりを確かめる。

    「んっ……奥まで……入っていくの……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の反応を確かめながら動いた。

    「顔が見えないの、ドキドキするのさ……」

    想い人との繋がりを、少女は背中越しに感じていた。

    「%CALLNAME:MASTER%の背中……こうして触ると、温かいの……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の背に頬を寄せながら呟いた。

    後背位で挿入しながら、愛おしそうに背中を撫でる。

    「私のこと……感じてくれてる……？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の耳元で囁いた。

    「壊さないように……ゆっくり動くから……」

    少女は想い人の背中に包まれる安心感に、紅い瞳を潤ませていた。

    「こうして後ろから抱きしめると……%CALLNAME:MASTER%が私だけのもの、って思えるの……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を後ろから抱きしめながら告白した。

    後背位の体勢で腰を動かしながら、耳に吐息を吹きかける。

    「んっ……締め付けてくれるの……嬉しい……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の身体に密着した。

    「%CALLNAME:MASTER%……もっと、繋がっていたいのさ……」

    495年の孤独を経た少女は、好きな人との絆を背中越しに深めていた。
