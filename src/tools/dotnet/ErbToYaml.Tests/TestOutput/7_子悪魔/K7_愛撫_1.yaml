- id: fallback
  content: >-
    「ひゃっ……！？　な、何を……！」

    %CALLNAME:TARGET%は驚いて脚を閉じ、後ずさりしようとした。

    「そ、そんなことされても……困ります……！」

    %CALLNAME:TARGET%は真っ赤な顔で%CALLNAME:MASTER%を見ている。

    「あたし、まだそういうの……わからないですし……」

    困惑と恥ずかしさで、%CALLNAME:TARGET%は立ち尽くしていた。

    「……咲夜さんに怒られちゃいますってば……」

    「え、えっと……%CALLNAME:MASTER%……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の行動の意図が分からず、困惑している。

    「あの……そこは……見せられないです……」

    %CALLNAME:TARGET%は必死にスカートを押さえようとしている。

    「……あたし、なにか悪いことしちゃいました……？」

    不安そうな表情で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げた。

    「……もっと仲良くなってからにしてください……」

    「ちょ、ちょっと……！」

    %CALLNAME:TARGET%は慌てて%CALLNAME:MASTER%を止めようとしている。

    「いきなりそういうことは……心の準備が……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、%CALLNAME:MASTER%から距離を取ろうとしていた。

    「あたし、お仕事中なので……」

    言い訳をしながら、%CALLNAME:TARGET%は逃げ出す機会を窺っている。

    「……また今度にしてください……」

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は困惑した表情で%CALLNAME:MASTER%を見つめている。

    「あたし、そういうの……よくわからないです……」

    どう反応していいか分からず、%CALLNAME:TARGET%は固まっていた。

    「……こういうのって、好きな人同士がすることですよね……？」

    %CALLNAME:TARGET%は首を傾げながら問いかけた。

    「……あたしたち、そこまで仲良くない……ですよね……」
