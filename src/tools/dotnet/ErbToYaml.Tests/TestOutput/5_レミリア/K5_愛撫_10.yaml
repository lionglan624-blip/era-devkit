    「ふぁ……っ、んん……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の舌が乳首を舐め上げるたびに声を漏らしている。

    「……%CALLNAME:MASTER%、上手ね……気持ちいいわ」

    %CALLNAME:人物_レミリア%は珍しく素直に快楽を認めた。

    「私の胸、好き？　もっと味わっていいのよ」

    吸血鬼の冷たい肌が、恋人の口づけで熱を帯びていく。

    「んっ……あぁ……%CALLNAME:MASTER%の舌、たまらない……」

    「……ふふ、赤ちゃんみたい」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の頭を撫でながら、微笑んだ。

    「いいわよ、好きなだけ吸いなさい……私の恋人なんだから」

    %CALLNAME:人物_レミリア%は優しく%CALLNAME:MASTER%を抱きしめた。

    「んっ……あ……そう、そこ……いいわ」

    母性的な優しさと、快楽に溺れる表情が混じり合っている。

    「……%CALLNAME:MASTER%、私から離れないでね……」

    「あ……んっ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に乳首を吸われながら、紅い瞳を潤ませた。

    「%CALLNAME:MASTER%……あなたって、本当に……」

    %CALLNAME:人物_レミリア%は恥ずかしそうに顔を背けた。

    「……私の身体、気に入ってくれた？」

    500年の吸血鬼が、恋人の反応を窺うように見つめている。

    「んっ……もっと吸って……私を感じて……」
