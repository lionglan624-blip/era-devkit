character: パチュリー
situation: K3_愛撫
entries:
- id: fallback
  content: >-
    「……」

    %CALLNAME:MASTER%は何もせず、ただじっと%CALLNAME:TARGET%を見つめている。

    %CALLNAME:TARGET%は本を読もうとしたが、視線を感じて顔を上げた。

    「……何もしないの？ 私を見ているだけ？」

    %CALLNAME:TARGET%は静かに問いかけたが、頬が微かに上気している。

    「……あなたの視線だけで、こんなに意識してしまうなんて」

    %CALLNAME:TARGET%は本を閉じ、%CALLNAME:MASTER%をまっすぐ見つめ返した。

    「……ふぅ」

    %CALLNAME:MASTER%の視線が%CALLNAME:TARGET%の体を舐めるように這っている。

    %CALLNAME:TARGET%は本のページを捲る手が止まっていることに気づいた。

    「……あなたの目、熱いわ。触れられてもいないのに」

    %CALLNAME:TARGET%は淡々と言いながらも、息が僅かに乱れている。

    「……早く触って。こんな焦らしプレイ、本には書いてなかったわ」

    %CALLNAME:TARGET%は珍しく甘えるような声で囁いた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%を見つめたまま、何も動こうとしない。

    大図書館の静寂の中、%CALLNAME:TARGET%の鼓動だけが響いているような気がした。

    「……視線だけで私を追い詰めるつもり？」

    %CALLNAME:TARGET%は本を脇に置き、%CALLNAME:MASTER%に身を寄せた。

    「……意地悪ね。でも、嫌いじゃないわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕に自ら手を伸ばした。

    「……ん……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%を見つめ続けている。何もしないまま。

    %CALLNAME:TARGET%は普段通りを装おうとしたが、視線を意識して落ち着かない。

    「……触れて。お願い……」

    %CALLNAME:TARGET%は珍しく懇願するような声を漏らした。

    「……私を見るだけで満足だなんて、許さないわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を取り、自分の体に導いた。
  priority: 4
- id: talent_3_1
  content: >-
    「……っ」

    %CALLNAME:MASTER%が何もせずこちらを見ていることに、%CALLNAME:TARGET%は気づいた。

    「……何？ そんなに見られると、読書に集中できないわ」

    %CALLNAME:TARGET%は本で顔を隠すようにしながら、チラリと%CALLNAME:MASTER%を窺った。

    「……あなた、何を考えているの」

    %CALLNAME:TARGET%の頬は、微かに紅潮している。

    「……」

    %CALLNAME:MASTER%の視線が%CALLNAME:TARGET%に注がれ続けている。

    %CALLNAME:TARGET%は本を読んでいるふりをしていたが、一行も頭に入ってこない。

    「……何もしないなら、帰ってくれない？」

    %CALLNAME:TARGET%はそう言ったが、声には拒絶の色がない。

    「……いえ、帰らなくてもいいけど。ただ、その……」

    %CALLNAME:TARGET%は言葉を濁して、視線を逸らした。

    「……ふぅ」

    %CALLNAME:MASTER%はただ%CALLNAME:TARGET%を見つめている。じっと。

    「……視姦という言葉、知ってる？ まさにそれね」

    %CALLNAME:TARGET%は淡々と言ったが、耳まで赤くなっている。

    「……本で読んだことがあるだけよ。経験ではなく」

    %CALLNAME:TARGET%は慌てて付け加えた。

    「……あの」

    %CALLNAME:MASTER%の視線を受け続けて、%CALLNAME:TARGET%は落ち着かなくなってきた。

    「……何かするなら、早くして。焦らされるのは、得意じゃないの」

    %CALLNAME:TARGET%は本を閉じ、%CALLNAME:MASTER%を見つめ返した。

    「……見てるだけなんて、意地悪よ」

    %CALLNAME:TARGET%の声は、少し拗ねたような響きがあった。
  priority: 3
