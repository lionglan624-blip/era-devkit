character: チルノ
situation: K8_愛撫
entries:
- id: fallback
  content: >-
    「なにこれ?　丸いのがいっぱいついてる!」

    %CALLNAME:TARGET%はアナルビーズを物珍しそうに見つめた。

    「へぇ、お尻に入れるの?　%CALLNAME:MASTER%ってこういうの好きよね」

    氷の妖精は恋人の趣味に呆れながらも、お尻を突き出した。

    「最強のあたいにかかれば、こんなの余裕なんだから!」

    自信満々に宣言しながら、%CALLNAME:TARGET%は恋人を信じている。

    「……%CALLNAME:MASTER%が喜ぶなら、いいわよ」

    「んっ……丸いのが、入ってくる……」

    アナルビーズが一つずつ入っていく感触に、%CALLNAME:TARGET%は声を漏らした。

    「……ひゃっ、また一つ……変な感じ……」

    珠が一つ入るたびに、小さな驚きの声が上がる。

    「さ、最強のあたいがこれくらいで負けないわよ!」

    恋人の前で弱みを見せたくないと、%CALLNAME:TARGET%は強がっていた。

    「……でも、%CALLNAME:MASTER%……もうちょっとゆっくり……」

    「あ、また丸いの?　%CALLNAME:MASTER%って本当に好きね」

    %CALLNAME:TARGET%は覚えているらしく、少しだけ緊張した顔だ。

    「前も入れたでしょ……今度は最強のあたいが完璧にやってみせるわ!」

    宣言通り、%CALLNAME:TARGET%はお尻を突き出して待っている。

    「……んっ、一個ずつ入ってくる……やっぱり変な感じ……」

    それでも恋人のためなら頑張れる、そんな健気さが見えた。

    「%CALLNAME:MASTER%が嬉しそうだから……あたいも悪くないわ」

    「もう、%CALLNAME:MASTER%ったらこれ好きすぎでしょ」

    %CALLNAME:TARGET%は呆れたふりをしながらも、嫌がっていない。

    「あたいのお尻、そんなに気に入った?　しょうがないわね」

    一つずつ珠を受け入れながら、小さな喘ぎを漏らす。

    「んっ……あっ……%CALLNAME:MASTER%のばか……」

    恋人だけに見せる、少し甘えた表情が浮かんでいた。

    「……あたいがこれ許すの、%CALLNAME:MASTER%だけよ」
  priority: 4
- id: talent_3_1
  content: >-
    「えっ!?　な、なにこれ……丸いのがいっぱい……」

    %CALLNAME:TARGET%はアナルビーズを見て顔を真っ赤にした。

    「お、お尻に入れるの!?　変態じゃないの!」

    文句を言いつつも、好きな人の頼みは断れない。

    「……しょ、しょうがないわね!　最強のあたいが付き合ってあげる!」

    恥ずかしそうにお尻を向けながら、%CALLNAME:TARGET%は震えていた。

    「……や、優しく入れなさいよね……」

    「ひぅっ!?　入って、きた……丸いのが……」

    珠が一つ入るたびに、%CALLNAME:TARGET%は悲鳴を上げた。

    「な、なによこれ……一個ずつ入ってくる……」

    恥ずかしさと未知の感覚に、頬が紅潮している。

    「%CALLNAME:MASTER%……こんなの、恥ずかしいってば……」

    好きな人の前でこんな姿を晒すのが耐えられないようだ。

    「……でも、あたいは逃げない……最強だから……!」

    「ま、また入れるの……丸いの……」

    %CALLNAME:TARGET%は恥ずかしそうに俯いた。

    「……%CALLNAME:MASTER%がしたいなら……あたいは……」

    好きな人のためなら、という想いが伝わってくる。

    「んっ……あっ……一個ずつ入ってく……」

    アナルビーズの刺激に、%CALLNAME:TARGET%は声を堪えた。

    「%CALLNAME:MASTER%に……こんな顔、見せたくないのに……」

    「%CALLNAME:MASTER%……あたいのこと、変に思ってない……?」

    %CALLNAME:TARGET%は不安げに見上げてきた。

    「こんなの入れられて……平気でいられる方がおかしいわよ……」

    恥ずかしさを隠しきれず、目を逸らしている。

    「……んっ……%CALLNAME:MASTER%のせいで……変になりそう……」

    好きな人に翻弄される自分に、%CALLNAME:TARGET%は戸惑っていた。

    「……あたいのこと……嫌いに、ならないでよね……」
