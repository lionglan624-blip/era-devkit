    %CALLNAME:MASTER%の指が%CALLNAME:人物_小悪魔%の柔らかな膣内をゆっくりと探る。

    %CALLNAME:人物_小悪魔%は悪魔の尻尾をぴくぴくと震わせながら、身を任せている。

    「あ……そこ、そこ……いいですわ……」

    熱い粘膜が%CALLNAME:MASTER%の指を絡め取るように締め付けてくる。

    「%CALLNAME:MASTER%……もっと、いじめてください……ねっ……？」

    %CALLNAME:人物_小悪魔%は潤んだ瞳で%CALLNAME:MASTER%を見上げ、甘えるように囁いた。

    「んっ……あっ……指が……」

    %CALLNAME:人物_小悪魔%の膣内は蜜でいっぱいに濡れ、%CALLNAME:MASTER%の指を受け入れている。

    「悪魔なのに……こんなに感じちゃうなんて……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに顔を伏せながらも、腰を%CALLNAME:MASTER%の指に押し付けてくる。

    「%CALLNAME:MASTER%の指……すごく、上手……はぁっ……」

    膣壁がひくひくと脈動し、%CALLNAME:MASTER%の指を包み込んでいる。

    %CALLNAME:人物_小悪魔%は幸せそうに溜息を漏らした。

    「あぁっ……%CALLNAME:MASTER%……」

    %CALLNAME:MASTER%が指を膣内でくいっと曲げると、%CALLNAME:人物_小悪魔%は可愛らしい悲鳴を上げた。

    「そ、そこ……だめですわ……感じちゃう……」

    %CALLNAME:人物_小悪魔%の膣内はとろとろに蕩けて、愛液が%CALLNAME:MASTER%の指を濡らしている。

    「んっ……はぁっ……%CALLNAME:MASTER%の指、私の中でわかるんです……」

    尻尾が%CALLNAME:MASTER%の腕に巻きつき、離さないと訴えているようだった。

    「……もっと、いっぱい、触ってくださいな……？」
