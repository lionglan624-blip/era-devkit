- id: fallback
  content: >-
    %CALLNAME:MASTER%が%CALLNAME:TARGET%に抱きつこうとした。

    「ひっ……！ な、なに……！？」

    %CALLNAME:TARGET%は驚いて身を縮こまらせた。

    「い、いきなり抱きつくなんて……怖いよ……」

    %CALLNAME:TARGET%は怯えた表情でこちらを見上げている。

    「あの……もうちょっと仲良くなってから……に、してください……」

    妖精の小さな体が、不安そうに震えている。

    「……え、えっ……！？」

    %CALLNAME:MASTER%が近づくと、%CALLNAME:TARGET%は警戒した様子で後ずさった。

    「あの……抱きつくのは、ちょっと……」

    %CALLNAME:TARGET%は困った顔で首を振っている。

    「咲夜さんに怒られちゃうから……だ、だめです……」

    「……ごめんなさい。でも、まだ心の準備が……」

    %CALLNAME:TARGET%は申し訳なさそうに、でも拒否の意思は変えなかった。

    %CALLNAME:MASTER%が%CALLNAME:TARGET%に近づいた。

    「あ、あの……な、なにするの……？」

    %CALLNAME:TARGET%は身を縮こまらせて、怯えた目でこちらを見ている。

    「抱きつく……の……？　あたしに……？」

    %CALLNAME:TARGET%は戸惑いながらも、その場から動けないでいる。

    「……いきなりは、やだよ……怖いもん……」

    妖精の瞳が潤んでいた。

    「もっとお話してから……にしてほしいの……」

    「わっ……！？」

    %CALLNAME:MASTER%が手を伸ばすと、%CALLNAME:TARGET%は慌てて後ずさった。

    「な、なんで抱きつくの……？　あたし、なにかしちゃった……？」

    %CALLNAME:TARGET%は不安そうに首を傾げている。

    「あの……まだ、そういうの……できないよ……」

    %CALLNAME:TARGET%は小さな声で、でもはっきりと拒否の意思を示した。

    「……ごめんなさい。でも、怖いの……」

    妖精は申し訳なさそうに俯いていた。
  priority: 1
