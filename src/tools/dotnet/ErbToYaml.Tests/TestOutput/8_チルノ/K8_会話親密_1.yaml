character: チルノ
situation: K8_会話親密
entries:
- id: fallback
  content: >-
    「――わぁ、%CALLNAME:MASTER%がお茶淹れてくれたの？」

    %CALLNAME:TARGET%は嬉しそうに湯飲みを両手で受け取った。

    ふーふー、と一生懸命息を吹きかけてから、そっと口をつける。

    「……んっ、あったかい。おいしいのよ！」

    %CALLNAME:TARGET%は幸せそうに目を細めた。

    「あたいったら最強だけどさ、%CALLNAME:MASTER%のお茶飲むと、なんかほっとするのよね」

    照れくさそうに頬を染めながら、%CALLNAME:TARGET%は恋人に寄り添った。

    「――へへん、%CALLNAME:MASTER%、またお茶淹れてくれたの？」

    %CALLNAME:TARGET%は得意げに笑いながら湯飲みを受け取った。

    ちびちびとお茶を啜りながら、冷たい頬を%CALLNAME:MASTER%の肩に押しつけてきた。

    「……えへへ、%CALLNAME:MASTER%といると、なんだかあったかいのよ」

    「あたいは氷の妖精だけど、こういうあったかいの……嫌いじゃないわ」

    %CALLNAME:TARGET%は照れ隠しのように言いながらも、離れようとしなかった。

    「――ねぇねぇ、%CALLNAME:MASTER%！」

    %CALLNAME:TARGET%は目を輝かせながら湯飲みを受け取った。

    「あたいね、%CALLNAME:MASTER%のお茶、一番好きなの！」

    熱いお茶を小さくすすりながら、幸せそうに笑う。

    「……だってさ、%CALLNAME:MASTER%があたいのために淹れてくれたんでしょ？」

    「それって、最強に幸せじゃない？」

    %CALLNAME:TARGET%は恋人の顔を見上げて、無邪気に笑った。

    「――あ、お茶！　ありがとね、%CALLNAME:MASTER%！」

    %CALLNAME:TARGET%は両手で湯飲みを包み込むように受け取った。

    湯気の向こうで、%CALLNAME:TARGET%の頬がほんのり赤く染まっている。

    「……あったかい。%CALLNAME:MASTER%の手みたい」

    ぽつりとそう呟いて、恥ずかしそうに視線を逸らした。

    「な、なんでもないわよ！　あたいったら最強なんだから、こんなことで照れたりしないし！」

    威勢よく言いながらも、%CALLNAME:TARGET%は湯飲みを大切そうに抱えていた。
  priority: 4
- id: talent_3_1
  content: >-
    「――え、お茶？　%CALLNAME:MASTER%が淹れてくれたの？」

    %CALLNAME:TARGET%は少し驚いた顔で湯飲みを受け取った。

    ふーふー、と息を吹きかけてから、ゆっくりとお茶を味わう。

    「……うん、おいしいわね。ありがと」

    %CALLNAME:TARGET%は頬を少し染めながら、照れくさそうに笑った。

    「……また淹れてくれる？　あたい、%CALLNAME:MASTER%のお茶、好きだから」

    小さな声でそう言うと、%CALLNAME:TARGET%は恥ずかしそうに目を逸らした。

    「――あ、ありがと！　ちょうど喉乾いてたのよ！」

    %CALLNAME:TARGET%は元気よく湯飲みを受け取った。

    ずず、と音を立ててお茶を啜る。

    「……んっ、あっつ！　……でも、おいしい」

    %CALLNAME:TARGET%は熱さに少し舌を出しながらも、嬉しそうにしている。

    「%CALLNAME:MASTER%って、意外と気が利くのね。あたいのこと、よく見てるの？」

    そう言いながらちらちらと%CALLNAME:MASTER%を見る%CALLNAME:TARGET%の目は、どこか期待に満ちていた。

    「――へぇ、%CALLNAME:MASTER%がお茶淹れられるなんてね」

    %CALLNAME:TARGET%は興味深そうに湯飲みを覗き込んだ。

    「……ふぅん、いい匂い」

    静かにお茶を味わう%CALLNAME:TARGET%の表情が、少しずつ柔らかくなっていく。

    「……悪くないわね。あたいも今度、お茶淹れてあげよっか？」

    「あ、でもあたいのは冷茶になっちゃうかもしれないけど……」

    そう言って%CALLNAME:TARGET%は照れくさそうに笑った。

    「――わ、お茶？　あたいに？」

    %CALLNAME:TARGET%は少し戸惑いながらも、湯飲みを受け取った。

    そっとお茶に口をつけて、ほっと息をつく。

    「……あったかい。おいしいわ」

    %CALLNAME:TARGET%は素直にそう言って、それからはっとした顔をした。

    「べ、別にあたいが喜んでるとか思わないでよね！」

    でも湯飲みを持つ手は、しっかりとその温もりを握りしめていた。
