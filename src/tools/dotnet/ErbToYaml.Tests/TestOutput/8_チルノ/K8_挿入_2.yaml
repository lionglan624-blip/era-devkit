- id: fallback
  content: >-
    「な……っ！　そっちの穴は違うでしょ！？」

    %CALLNAME:人物_チルノ%は抵抗しようとするが、体勢を崩されてしまった。

    %CALLNAME:MASTER%が菊穴を貫くと、%CALLNAME:人物_チルノ%は悲鳴を上げた。

    「いたっ……痛い痛い……！　やめてよ……！」

    %CALLNAME:人物_チルノ%の菊穴は異物を拒むようにぎゅうと締め付けている。

    「こんなの……最強のあたいが……こんな屈辱……っ」

    「やめ……お尻は……っ！　離しなさいよ！」

    %CALLNAME:人物_チルノ%は必死に逃れようとするが、動けない。

    菊穴を無理やり広げられ、%CALLNAME:人物_チルノ%は涙を流した。

    「いたい……お腹痛い……やめてってば……っ」

    %CALLNAME:人物_チルノ%の小さな体は、%CALLNAME:MASTER%の下で震えていた。

    「凍らせてやる……絶対に……覚えてなさいよ……っ」

    「ひっ……そこ、違う……っ！」

    %CALLNAME:人物_チルノ%は後ろの穴を貫かれ、声を上げた。

    菊穴は異物を押し出そうとぎゅうぎゅうと締め付けている。

    「あたいは……最強なのに……こんな、みじめな……っ」

    %CALLNAME:人物_チルノ%の目には涙が溢れていた。

    「……絶対許さない……絶対に……」

    「……っ」

    %CALLNAME:人物_チルノ%は声も出せず、正面から菊穴を貫かれていた。

    後ろの穴で犯される屈辱に、表情は歪んでいる。

    「……痛い……やめて……」

    %CALLNAME:人物_チルノ%の菊穴は抵抗するように%CALLNAME:MASTER%を締め付けた。

    「あたいを……こんな風にした罪……忘れないから……」
  priority: 1
