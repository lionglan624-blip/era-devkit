- id: fallback
  content: >-
    「……何をするつもりかしら」

    %CALLNAME:人物_レミリア%は警戒するように%CALLNAME:MASTER%を見た。

    %CALLNAME:MASTER%がその場所に顔を近づけると、

    「っ……！　そ、そこは……待ちなさい……」

    %CALLNAME:人物_レミリア%は慌てた声を出した。

    「……ふん、変わった趣味ね。まあ、今日は許してあげるわ」

    高飛車な態度を取りながらも、その頬は紅く染まっていた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は複雑な表情で%CALLNAME:MASTER%を見下ろした。

    「そのようなことをして、何が楽しいのかしら」

    だが%CALLNAME:MASTER%が舌で触れると、

    「っ……」

    %CALLNAME:人物_レミリア%は小さく息を呑んだ。

    「……まあいいわ。好きにしなさい」

    館の主は、複雑な心境を隠しきれていなかった。

    「……随分と大胆ね」

    %CALLNAME:人物_レミリア%は挑発的な笑みを浮かべた。

    「使用人が主のそんなところを舐めようというの？」

    %CALLNAME:MASTER%の舌がそこに触れると、

    「……っ」

    笑みが一瞬、歪んだ。

    「……悪くはないわね。続けなさい」

    その声には、微かな期待が混じっていた。

    「……ふぅん」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を見ていた。

    「度胸だけはあるわね」

    %CALLNAME:MASTER%が後ろに舌を這わせると、

    「っ……んん……」

    %CALLNAME:人物_レミリア%は小さく息を吐いた。

    「……今日のところは見逃してあげる」

    500年を生きた吸血鬼の心に、何かが芽生え始めていた。
