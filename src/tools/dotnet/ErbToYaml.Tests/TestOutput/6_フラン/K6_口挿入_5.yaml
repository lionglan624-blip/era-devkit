character: フラン
situation: K6_口挿入
entries:
- id: fallback
  content: >-
    「ねえ、%CALLNAME:MASTER%……体全部で、洗ってあげたいの……」

    %CALLNAME:人物_フラン%は泡立てた石鹸を全身に纏い、恋人に寄り添った。

    紅い瞳に愛おしさが滲み、そっと体を擦りつける。

    「んっ……ぬるぬるして、気持ちいいのさ……」

    %CALLNAME:人物_フラン%は小さな体を%CALLNAME:MASTER%に絡めるように動き始めた。

    「壊したくないから……優しく、するね……ふふ……」

    495年の孤独を知る少女は、壊すことなく全身で愛せる喜びに満たされていた。

    「%CALLNAME:MASTER%のここも……泡で綺麗にしてあげる……」

    %CALLNAME:人物_フラン%は嬉しそうに微笑みながら、泡まみれの体を押し当てた。

    小さな胸が%CALLNAME:MASTER%の胸板に密着し、ぬるりと滑る。

    「ん……私の体、気持ちいい……？　……ふふ、よかった……」

    %CALLNAME:人物_フラン%は太腿で一物も挟み込み、上下に擦り始めた。

    「もっともっと……全部、洗ってあげるね……」

    恋人への奉仕に、%CALLNAME:人物_フラン%の頬も紅く染まっていた。

    「こうして%CALLNAME:MASTER%を洗ってると……繋がってる気がするの……」

    %CALLNAME:人物_フラン%は恋人に全身を密着させながら、体を滑らせていた。

    地下室の孤独を知る少女にとって、この肌の触れ合いは何よりの証。

    「んふふ……%CALLNAME:MASTER%、ぬるぬるで気持ちいいのさ……」

    %CALLNAME:人物_フラン%は嬉しそうに体を動かし、一物を泡で包み込んだ。

    「ずっとこうして……繋がっていたいな……」

    その言葉には、純粋な愛と繋がりへの渇望が込められていた。

    「%CALLNAME:MASTER%……大好き……全部、綺麗にするね……」

    %CALLNAME:人物_フラン%は恋人に体を絡めながら、上目遣いで見つめていた。

    紅い瞳には%CALLNAME:MASTER%だけが映り、体は優しく滑り続ける。

    「私の体……%CALLNAME:MASTER%のために使って……ぬるぬる……」

    %CALLNAME:人物_フラン%は愛おしそうに体を擦りつけ、全身で奉仕した。

    「出そうになったら……私の体に出していいよ……？」

    悪魔の妹は、恋人への奉仕に心から満たされていた。
  priority: 4
- id: talent_3_1
  content: >-
    「えっ……た、体全部で洗うの……？」

    %CALLNAME:人物_フラン%は戸惑いと興味の混じった表情で、泡を体に塗りたくった。

    おそるおそる体を押し当てると、ぬるりとした感触に驚く。

    「わ……すっごくぬるぬる……変な感じ……」

    %CALLNAME:人物_フラン%は顔を紅らめながら、ゆっくりと体を動かし始めた。

    「こ、こうすればいいの？　……変な遊びなのさ……」

    初めての経験に、少女の心臓は高鳴っていた。

    「ふぅん……%CALLNAME:MASTER%、私の体だと気持ちいいんだ……」

    %CALLNAME:人物_フラン%は面白そうに、体の動かし方を変えてみる。

    胸を押し当てたり、太腿で挟んだり、その反応を楽しんでいる。

    「ふふ……私もなんか変な気持ち……ぬるぬるって、いいのさ……」

    %CALLNAME:人物_フラン%はいたずらっぽく笑いながら、動きを速めた。

    「ねえ……もっと気持ちいい顔、見せてよ……」

    その言葉には、独占欲と好奇心が滲んでいた。

    「%CALLNAME:MASTER%の体……私だけが洗っていいんだよね……？」

    %CALLNAME:人物_フラン%は確認するように問いかけながら、体を擦りつけていた。

    他の誰かにさせることを想像し、表情が少しだけ曇る。

    「……他の子にはさせないでね……私だけだよ……」

    %CALLNAME:人物_フラン%は少し強めに体を押し当て、独占を主張した。

    「私だけの……私だけの%CALLNAME:MASTER%……ふふ……」

    その執着は、冗談になりきれていなかった。

    「あ……%CALLNAME:MASTER%、ぴくってなった……」

    %CALLNAME:人物_フラン%は体の反応に興味津々の様子だった。

    まるで新しい玩具を見つけた子供のように、目を輝かせている。

    「もっと擦ってあげようか？　私、上手になりたいのさ」

    %CALLNAME:人物_フラン%は真剣な表情で、%CALLNAME:MASTER%を喜ばせようと努力していた。

    「ね……気持ちいい？　……うん、もっと頑張るね……」

    恋慕の少女は、愛しい人への奉仕に夢中だった。
