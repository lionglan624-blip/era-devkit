- id: fallback
  content: >-
    「……何をしているの」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の行為に、眉をひそめた。

    しかし、拒絶するほどの強さはない。

    「……まあ、使用人への褒美として許してあげるわ」

    %CALLNAME:人物_レミリア%はそう言い訳をした。

    「ただし、あまり調子に乗らないことね」

    館の主は威厳を保とうとしながらも、どこか満更でもなさそうだった。

    「っ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に触れられ、小さく息を吐いた。

    「……ふん、身の程を弁えなさい」

    そう言いながらも、%CALLNAME:人物_レミリア%は強く拒否はしなかった。

    「……今日は機嫌がいいから、特別に許してあげているのよ」

    %CALLNAME:人物_レミリア%は高飛車に言い放ったが、その頬はほんのり紅い。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を紅い瞳で見つめた。

    「使用人が主に触れるなんて、本来は不敬よ」

    しかし、その声には怒りがない。

    「……でも、あなたは特別よ。少しだけ、ね」

    %CALLNAME:人物_レミリア%は複雑な表情を浮かべていた。

    500年を生きた吸血鬼の心に、何かが芽生え始めていた。

    「……ふぅん」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の行動を観察するように見ていた。

    「度胸だけはあるわね、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は感心したように言った。

    「紅魔館の主に触れようなんて……」

    小さく溜息をつくと、%CALLNAME:人物_レミリア%は続けた。

    「……まあいいわ。今日のところは見逃してあげる」
  priority: 2
- id: fallback
  content: >-
    「……何のつもりかしら」

    %CALLNAME:人物_レミリア%は冷たい視線で%CALLNAME:MASTER%を見た。

    「使用人が主に触れるなど、身の程を知りなさい」

    %CALLNAME:人物_レミリア%は威厳を込めてそう言い放った。

    「……今回だけは見逃してあげるわ」

    紅魔館の主は、不機嫌そうに腕を組んだ。

    「……っ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の行為に眉をひそめた。

    「大胆ね。私が誰か分かっているの？」

    500年を生きた吸血鬼は、不敵に微笑んだ。

    「次はないと思いなさい」

    %CALLNAME:人物_レミリア%は静かに、しかし確実に警告した。

    「……ふん」

    %CALLNAME:人物_レミリア%は興味なさそうに%CALLNAME:MASTER%を見た。

    「使用人の分際で、随分と図々しいわね」

    %CALLNAME:人物_レミリア%は溜息をついた。

    「……退屈だから付き合ってあげているだけよ」

    そう言いながら、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を値踏みするように見ていた。

    「……何かしら」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    「私はこう見えても忙しいのよ」

    紅魔館の主は、高飛車な態度を崩さなかった。

    「……用があるなら早く済ませなさい」

    %CALLNAME:人物_レミリア%は威厳を保ちながら、そう促した。
  priority: 1
