  content: >-
    「ひゃっ……！　二人に、同時に……!?」

    %CALLNAME:人物_美鈴%は驚きの声を上げた。

    前と後ろを同時に貫かれる感覚に、体が硬直する。

    「こ、こんな体勢……%CALLNAME:MASTER%に見られてる……」

    %CALLNAME:人物_美鈴%は顔を真っ赤にして俯いた。

    「……恥ずかしい……でも……嫌じゃ、ないです……」

    好きな人の前で晒す姿に、羞恥と喜びが入り混じった。

    「あ……ん……っ……両方、動かれると……」

    %CALLNAME:人物_美鈴%は抑えきれない声を漏らした。

    「……こんな声……出したくないのに……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに%CALLNAME:MASTER%を見た。

    「……%CALLNAME:MASTER%……聞こえてますか……」

    「……恥ずかしい姿……見ないでください……」

    そう言いながらも、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%から目を逸らさなかった。

    「……んっ……前も、後ろも……いっぱい……」

    %CALLNAME:人物_美鈴%は困惑した表情で呟いた。

    「……こんな体勢……初めてで……どうしたらいいか……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に助けを求めるような目を向けた。

    「……%CALLNAME:MASTER%……手、握ってくれませんか……」

    「……そうしてくれたら……怖くないから……」

    恥ずかしそうに、でも必死に%CALLNAME:人物_美鈴%は願った。

    「はぁ……はぁ……二人に……貫かれてる……」

    %CALLNAME:人物_美鈴%は息を荒げながら、快感に耐えていた。

    「……%CALLNAME:MASTER%……私のこと……どう思いますか……」

    %CALLNAME:人物_美鈴%は不安げに問いかけた。

    「……こんな姿……見せたくなかったのに……」

    「……でも……%CALLNAME:MASTER%になら……見られてもいい……かも……」

    照れ隠しの言葉に、本心が滲み出ていた。
