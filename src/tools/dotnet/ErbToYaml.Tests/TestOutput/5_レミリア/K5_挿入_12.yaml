- id: fallback
  content: >-
    「……二人がかりで私を犯そうと？ 身の程知らずね」

    %CALLNAME:人物_レミリア%は冷たい視線で二人を睨んだ。

    「ふん……後悔するのはあなたたちよ」

    二つの熱が同時に%CALLNAME:人物_レミリア%を貫いた。

    「っ……痛……っ、下手くそ共め……」

    %CALLNAME:人物_レミリア%は苛立たしげに二人を睨んだ。

    「……その程度で私を堕とせると思うな」

    紅魔館の主は、痛みを怒りに変えて高慢な態度を保った。

    「……使用人二人がかりとは、随分な舐め方ね」

    %CALLNAME:人物_レミリア%は不敵に微笑んだ。

    「いいわ、受けてあげる。感謝しなさい」

    前後から同時に挿入され、%CALLNAME:人物_レミリア%は眉をひそめた。

    「……っ、痛い……もっと上手くできないの……」

    %CALLNAME:人物_レミリア%は二人を鋭く睨んだ。

    「……こんな程度で私を悦ばせられると思うな」

    500年の吸血鬼は、屈辱を怒りに変えていた。

    「……ほう、二穴挿し？ 変わった趣味ね」

    %CALLNAME:人物_レミリア%は興味なさそうに二人を見た。

    「私の体を使えるだけ光栄に思いなさい」

    二つの熱が同時に%CALLNAME:人物_レミリア%を貫いた。

    「……っ、くぅ……痛いじゃない……」

    %CALLNAME:人物_レミリア%は苛立ちを隠さなかった。

    「……もっと丁寧にしなさい。私を誰だと思っているの」

    威厳を保ちながら、吸血鬼は屈辱感を押し殺した。

    「……今日は気まぐれで受けてあげているのよ？」

    %CALLNAME:人物_レミリア%は高飛車に言い放った。

    「……感謝しなさい」

    前後から同時に貫かれ、%CALLNAME:人物_レミリア%は声を漏らした。

    「っ……あぁ……痛……っ、下手ね二人とも……」

    %CALLNAME:人物_レミリア%は二人を睨みつけた。

    「……次はもっとましな技を見せなさい」

    紅魔館の主は、最後まで支配者の態度を崩さなかった。
