- id: fallback
  content: >-
    「……ご要望でしたら、後ろからお相手いたしますわ」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%の背後に立った。

    「これもメイドの務めですから……」

    %CALLNAME:TARGET%は機械的に腰を進めていく。

    「……入りましたわ……動きますので、お覚悟を」

    瀟洒なメイドは感情を完全に押し殺していた。

    「……早く済ませたいのでしたら、力を抜いてくださいまし」

    「……後ろからの体勢ですか……」

    %CALLNAME:TARGET%は事務的に%CALLNAME:MASTER%を抱く姿勢を取った。

    「お顔を合わせなくて済むのは……少しだけ気が楽ですわね」

    %CALLNAME:TARGET%は無感情に腰を動かしている。

    「……終わりましたらお知らせいたしますので……」

    「それまでお待ちくださいまし」

    完璧なメイドは、あくまでプロフェッショナルを貫いていた。

    「……これは仕事です」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「お客様のお相手をするのも、メイドの務め……」

    %CALLNAME:TARGET%は淡々と腰を動かし続ける。

    「……感情移入などいたしませんわよ」

    「終わりましたらすぐに仕事に戻らせていただきます」

    冷静さを保ちながら、%CALLNAME:TARGET%は義務を果たしていた。

    「……後ろから動いておりますので、反応は見えませんわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中を見つめながら淡々と言った。

    「感情を見せたくありませんので……この体勢は都合が良いですわね」

    瀟洒なメイドは無感情に腰を動かしている。

    「……そろそろ終わりにいたしましょうか」

    「私には、お嬢様のお世話という仕事がありますので」

    完璧なメイドは、あくまで義務として相手をしていた。
