- id: fallback
  content: >-
    「まったく……この程度で手元が狂うようでは、まだまだね」

    「……やっぱり、メイドの仕事は%CALLNAME:MASTER%には無理なのかしら」

    「肉便器に専念したくなったら、言いなさい。いつでも、そうしてあげるから。ふふふ」

    「まぁ、%CALLNAME:MASTER%は便器なのだから、当然かもしれないけれど……くすくす」

    「メイドなら、クビにしてるところよ。よかったわね？　便器で……くくく……」
