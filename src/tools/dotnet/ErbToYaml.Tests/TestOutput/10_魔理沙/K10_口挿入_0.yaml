entries:
- id: fallback
  content: >-
    「ん……こうすると、気持ちいいのか？」

    %CALLNAME:人物_魔理沙%は真剣な表情で%CALLNAME:MASTER%の一物を握った。

    「……お前を喜ばせたいんだぜ。だから……ちゃんと教えてくれよな」

    %CALLNAME:人物_魔理沙%は恋人の反応を見ながら、ゆっくりと手を動かし始めた。

    「あっ……なんか、ぴくってした……気持ちいいってことか？」

    %CALLNAME:人物_魔理沙%は嬉しそうに微笑みながら、手の動きを続けた。

    「ふふ……熱いな、お前のここ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の一物を両手で包み込んだ。

    「こうして触ってると……なんか、繋がってる気がするぜ」

    「私の手で……お前が感じてくれてるって思うと、嬉しいな」

    %CALLNAME:人物_魔理沙%は恋人の顔を見上げながら、優しく手を動かした。

    「もっと気持ちよくしてやるから……任せとけ」

    「……こういうの、だんだん慣れてきたかもな」

    %CALLNAME:人物_魔理沙%は照れくさそうに笑いながら、器用に手を動かした。

    「前よりも上手くなったって……思わないか？」

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_魔理沙%は得意げな表情になった。

    「ふふん、私だって努力してるんだぜ……お前のためにな」

    %CALLNAME:人物_魔理沙%は恋人を喜ばせることに夢中になっていた。

    「なあ……こっち見ろよ」

    %CALLNAME:人物_魔理沙%は手を動かしながら、%CALLNAME:MASTER%の目を見つめた。

    「私がお前のこと、気持ちよくしてるとこ……ちゃんと見てろ」

    %CALLNAME:人物_魔理沙%の手が動くたび、%CALLNAME:MASTER%の体が反応する。

    「……恥ずかしいけど、お前が見てくれてると……頑張れるんだぜ」

    %CALLNAME:人物_魔理沙%は恋人と視線を合わせながら、愛情を込めて奉仕を続けた。
  priority: 4
- id: talent_3_1
  content: >-
    「ち、違うからな！　べ、別にやりたくてやってるわけじゃ……」

    %CALLNAME:人物_魔理沙%は顔を真っ赤にしながら、%CALLNAME:MASTER%の一物を握った。

    「た、頼まれたから仕方なくやってるだけだぜ……」

    %CALLNAME:人物_魔理沙%は照れ隠しに強がりながらも、手は丁寧に動いている。

    「あっ……な、なんだよその顔……笑うなよ……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに顔を背けながらも、手は止めなかった。

    「こ、こんなことして……変態なんだからな、お前は」

    %CALLNAME:人物_魔理沙%は文句を言いながらも、手を動かし続けている。

    「……でも、気持ちいいなら……まあ、仕方ないか」

    %CALLNAME:人物_魔理沙%の手つきは慣れないながらも、一生懸命だった。

    「はぁ……熱いな、これ……」

    「……勝手に変な声出すなよ、恥ずかしいだろ……」

    「んっ……なんか、大きくなってきた……？」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、手を止めなかった。

    「こ、これって……気持ちいいってことなんだよな……？」

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_魔理沙%は複雑な表情になった。

    「……別に嬉しくなんかないぜ……ただ、悪い気はしないってだけだ」

    %CALLNAME:人物_魔理沙%は照れながらも、少し得意げだった。

    「……お前、もうちょっと反応してくれてもいいんだぜ」

    %CALLNAME:人物_魔理沙%は少し不満そうに呟いた。

    「こっちは一生懸命やってるんだから……」

    %CALLNAME:MASTER%が気持ちよさそうな顔をすると、%CALLNAME:人物_魔理沙%は照れた。

    「なっ……そ、そんな顔されると困る……」

    「……もう、勝手にしろよ……」

    %CALLNAME:人物_魔理沙%は照れ隠しに目を逸らしながら、手を動かし続けた。
