- id: fallback
  content: >-
    「……これを……口で……」

    %CALLNAME:TARGET%は興味深そうに%CALLNAME:MASTER%の一物を見つめた。

    「……研究として……試してみるわ……」

    %CALLNAME:TARGET%は言い訳をしながら、おそるおそる口を近づけた。

    「……ん……熱いのね……ちゅ……」

    学者として観察しながら、%CALLNAME:TARGET%は舌を動かし始めた。

    「……ふむ……舌を使うと反応が変わるのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を観察しながら奉仕している。

    「……れろ、ちゅる……圧力と速度……変数が多いわ……」

    %CALLNAME:TARGET%は学者らしく分析していた。

    「……でも、なぜか胸が騒ぐの……これは何かしら……」

    自分の感情に戸惑いを覚えていた。

    「……こうすれば満足するの……？」

    %CALLNAME:TARGET%は疑問を口にしながら、舌を動かし続けている。

    「……ん、む……こんな単純な刺激で……不思議ね……」

    %CALLNAME:TARGET%は首を傾げた。

    「……まあ、あなたがそう望むなら……続けるわ」

    淡々と、しかし確実に奉仕は続いていた。

    「……」

    %CALLNAME:TARGET%は黙々と舌を動かしていた。

    「……顎が疲れてきたわ……体が弱いのだから、仕方ないでしょう」

    %CALLNAME:TARGET%は少し休みながら言った。

    「……ちゅ……でも、約束したから……最後まで続けるわ」

    そう言って、%CALLNAME:TARGET%は再び舌を動かし始めた。
