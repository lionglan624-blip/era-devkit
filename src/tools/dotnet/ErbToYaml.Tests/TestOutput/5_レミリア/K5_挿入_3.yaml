character: レミリア
situation: K5_挿入
entries:
- id: fallback
  content: >-
    「ふふ……後ろから、そこに？　贅沢ね、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は艶やかに微笑み、自ら四つん這いになった。

    小さな白い尻を%CALLNAME:MASTER%に向け、菊穴を晒す。

    「さあ……好きにしなさい。全部、あなたに見せてあげる」

    %CALLNAME:MASTER%が菊穴にゆっくりと挿入すると、%CALLNAME:人物_レミリア%は甘い声を漏らした。

    「あぁっ……奥まで……っ、この体勢だと、余計に深く……」

    500年の吸血鬼が、恋人の前で獣のように四つん這いで喘いでいた。

    「んっ……%CALLNAME:MASTER%、後ろから見てるのね……」

    %CALLNAME:人物_レミリア%は恥ずかしそうに腰を揺らした。

    四つん這いの姿勢で、全てを%CALLNAME:MASTER%に晒している。

    「顔が見えないのに……なぜか、余計に恥ずかしいわ……」

    %CALLNAME:MASTER%が菊穴に押し入ると、その小さな身体が震えた。

    「はぁっ……あ、あぁ……っ、そこ、きゅうって締まっちゃう……」

    %CALLNAME:人物_レミリア%は顔を伏せ、背徳の快感に身を委ねた。

    「こう……？」

    %CALLNAME:人物_レミリア%は腰を高く上げ、%CALLNAME:MASTER%を誘うように尻を揺らした。

    菊穴がひくひくと蠢き、%CALLNAME:MASTER%を待ち望んでいる。

    「ふふ……恥ずかしい姿ね。でも、%CALLNAME:MASTER%だから……」

    %CALLNAME:MASTER%が後孔に侵入すると、%CALLNAME:人物_レミリア%は背を反らせた。

    「やぁっ……んん……この体勢、いいわ……もっと激しくして……」

    永遠を生きる吸血鬼が、獣のような交わりに溺れていった。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は無言で四つん這いになり、白い尻を突き出した。

    その菊穴は、すでに期待に濡れている。

    「早く……私を、そこから満たして……」

    %CALLNAME:MASTER%が菊穴に挿入すると、%CALLNAME:人物_レミリア%は声を上げた。

    「あっ……深い……後ろからだと、違うわ……っ」

    紅魔館の主は、恋人だけに許す淫らな姿を晒していた。
  priority: 4
- id: talent_3_1
  content: >-
    「な……っ、後ろからそこに……っ！？」

    %CALLNAME:人物_レミリア%は顔を真っ赤にして振り返った。

    四つん這いの体勢で、尻を%CALLNAME:MASTER%に晒したまま。

    「……しょうがないわね。見ないでよ、恥ずかしいから……」

    %CALLNAME:MASTER%が菊穴に亀頭を押し当てると、%CALLNAME:人物_レミリア%は息を呑んだ。

    「いっ……た……っ、きつい……ば、馬鹿……もっとゆっくり……」

    恥ずかしさと痛みで涙目になりながらも、%CALLNAME:人物_レミリア%は逃げようとしなかった。

    「後ろからそこって……あんた、本当に変態ね」

    %CALLNAME:人物_レミリア%は呆れたように言いながらも、四つん這いになった。

    顔が見えない体勢が、かえって恥ずかしい。

    「……早くしなさいよ、こんな格好、長くは耐えられないわ」

    %CALLNAME:MASTER%が菊穴にゆっくりと挿入すると、甲高い声が漏れた。

    「ひゃっ……あ、あぁ……っ、きつい……けど……」

    後ろを向いたまま、%CALLNAME:人物_レミリア%は素直になれない言葉を呑み込んだ。

    「……見ないでって言ってるでしょ」

    %CALLNAME:人物_レミリア%は恥ずかしそうに顔を伏せた。

    四つん這いで尻を突き出す姿は、カリスマの欠片もない。

    「もう……こんな格好で、後ろから……」

    %CALLNAME:MASTER%が菊穴に押し入ると、%CALLNAME:人物_レミリア%は声を殺した。

    「んっ……くぅ……こ、この感覚……嫌いじゃない、かも……」

    背を向けたまま、%CALLNAME:人物_レミリア%は快感を認め始めていた。

    「……あんた、こういうの好きなのね。変態」

    %CALLNAME:人物_レミリア%は文句を言いながら体勢を整えた。

    尻を高く上げ、菊穴を%CALLNAME:MASTER%に向ける。

    「……勘違いしないで。付き合ってあげてるだけだから」

    %CALLNAME:MASTER%の挿入に、%CALLNAME:人物_レミリア%の身体が震えた。

    「やぁっ……あ……っ、後ろからだと……深い……っ」

    強がりの言葉も、背徳の快感に飲み込まれていった。
