- id: fallback
  content: >-
    「……胸で、してほしいの？」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    「使用人にこんなことをさせるなんて……まあいいわ」

    %CALLNAME:人物_レミリア%は溜息をつきながら、胸を押し当てた。

    「……特別よ。んっ……こうすればいいのかしら……」

    館の主は威厳を保ちながらも、言われた通りに奉仕を始めた。

    「……私の胸、小さいでしょうけど……文句は言わせないわよ」

    「……ふぅん」

    %CALLNAME:人物_レミリア%は興味なさそうに装いながらも、%CALLNAME:MASTER%のそれを胸で挟んでいた。

    「500年生きてきたけど……こういう経験は、あまりないわね」

    %CALLNAME:人物_レミリア%はぎこちなく身体を動かした。

    「んっ……%CALLNAME:MASTER%、気持ちいいの？　もっと強くしていいの？」

    戸惑いながらも、%CALLNAME:人物_レミリア%は奉仕を続けていた。

    「……調子に乗らないでよね。今日だけの特別よ」

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は複雑な表情で%CALLNAME:MASTER%を見つめた。

    「私がこんな奉仕をするなんて……誰にも言わないでよね」

    %CALLNAME:人物_レミリア%は恥ずかしそうに、身体を動かし続けた。

    「んっ……ふぅ……%CALLNAME:MASTER%だから、許してあげてるのよ」

    その言葉には、自分でも気づいていない特別な感情が滲んでいた。

    「……もう少しだけ、付き合ってあげるわ」

    「……こうすると、気持ちいいの？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の反応を確認しながら、胸を動かしていた。

    「んっ……ふん、単純ね。でも、悪くない反応だわ」

    少しだけ満足げに、%CALLNAME:人物_レミリア%は微笑んだ。

    「……私に胸で奉仕させてもらえることを、光栄に思いなさい」

    高飛車な態度だが、その声にはどこか暖かさがあった。

    500年を生きた吸血鬼の心に、何かが芽生え始めていた。
