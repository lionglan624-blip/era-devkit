- id: talent_3_1
  content: >-
    「……む、胸で、すればいいのね？」

    %CALLNAME:人物_レミリア%は顔を紅くしながら、%CALLNAME:MASTER%の前に跪いた。

    「……わ、私の胸、そんなに大きくないわよ？」

    おずおずと胸で挟み込み、%CALLNAME:人物_レミリア%は小さく息を吐いた。

    「んっ……こ、こうすればいいのかしら……」

    ぎこちない動きだが、一生懸命に身体を動かしている。

    「……べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただの興味よ」

    「ふん……こんな小さい胸で喜ぶなんて、変態ね」

    %CALLNAME:人物_レミリア%は強がりながらも、奉仕は止めなかった。

    「んっ……で、でも、%CALLNAME:MASTER%が喜ぶなら……仕方ないわ」

    そう呟きながら、%CALLNAME:人物_レミリア%は胸の動きを少しだけ丁寧にした。

    「……感謝しなさいよ。紅魔館の主が直々に胸で奉仕してあげてるんだから」

    高飛車な言葉とは裏腹に、%CALLNAME:人物_レミリア%の頬は真っ赤だった。

    「んっ……ふぅ……早く、出しなさいよ……」

    「……%CALLNAME:MASTER%、そんな顔しないで」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の反応に、どきりとしていた。

    「私の……こんな小さい胸で、そんなに気持ちいいの……？」

    少し嬉しそうに、%CALLNAME:人物_レミリア%は身体を動かし続けた。

    「んっ……ふぅ……ふん、当然よね。私は紅魔館の主なんだから」

    そう言いながらも、%CALLNAME:人物_レミリア%はこっそり%CALLNAME:MASTER%の表情を確認していた。

    「……もう少しだけ、してあげてもいいわよ」

    「あっ……動いた……」

    %CALLNAME:人物_レミリア%は胸の間の反応に、興味津々の様子だった。

    「ふぅん……こうすると、もっと反応するのね……んっ」

    %CALLNAME:人物_レミリア%は観察するように、胸の動きを変えてみる。

    「……べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただ、その……」

    言い訳が思いつかず、%CALLNAME:人物_レミリア%は口をつぐんだ。

    「……うるさいわね。黙って受けていなさい」
