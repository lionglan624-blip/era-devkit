    「こんなこと頼むなんて……%CALLNAME:MASTER%も悪い人ね……」

    %CALLNAME:人物_美鈴%はそう言いながらも、脚を大きく開いて秘部を晒した。

    「あっ……ん……自分で触るの、久しぶり……」

    %CALLNAME:人物_美鈴%は指で花弁をなぞりながら、声を漏らした。

    「はぁ……%CALLNAME:MASTER%が見てると……すぐ濡れちゃう……」

    %CALLNAME:人物_美鈴%は恥ずかしげに目を伏せながらも、指の動きを止めなかった。

    「%CALLNAME:MASTER%が見ててくれるなら……頑張れるわ」

    %CALLNAME:人物_美鈴%はそう言って、ゆっくりと自らの秘部を弄り始めた。

    「あぁっ……んっ……気持ちいい……」

    指が蜜を絡め取りながら、%CALLNAME:人物_美鈴%は快感に身を震わせた。

    「ねぇ……%CALLNAME:MASTER%……私、ちゃんとえっちに見える……？」

    不安げに問いかけながらも、%CALLNAME:人物_美鈴%の指は止まることなく動き続けた。
