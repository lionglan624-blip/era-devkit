- id: fallback
  content: >-
    「あ……あたしが後ろから……するんですか……？」

    %CALLNAME:TARGET%は戸惑いながら、%CALLNAME:MASTER%の背後に立った。

    「わ、分かりました……やってみます……」

    %CALLNAME:TARGET%は言われた通りに腰を動かし始めた。

    「んっ……こ、こうですか……？」

    不慣れな動きで、%CALLNAME:TARGET%は懸命に腰を振っている。

    「……ちゃんと気持ちよく、できてますか……？」

    「は、はい……後ろから……ですね……」

    %CALLNAME:TARGET%は緊張しながらも、%CALLNAME:MASTER%の後ろに回った。

    「あの……こういうの、よく分からないけど……」

    言われるがまま、%CALLNAME:TARGET%は腰を前後に動かしている。

    「んっ……あっ……なんだか……変な感じ……」

    %CALLNAME:TARGET%は戸惑いながらも、命じられた通りに動き続けた。

    「……%CALLNAME:MASTER%が満足してくれたら……いいな……」

    「え、えっと……後ろから入れるんですか……」

    %CALLNAME:TARGET%はおずおずと%CALLNAME:MASTER%の背後に立った。

    「こういうお仕事も……するんですね……」

    %CALLNAME:TARGET%は慣れない手つきで%CALLNAME:MASTER%の腰を支えた。

    「んっ……あっ……こうですか……」

    %CALLNAME:TARGET%は一生懸命に腰を動かしている。

    「……%CALLNAME:MASTER%のお役に立てているなら……嬉しいです……」

    「%CALLNAME:MASTER%……後ろからするの……初めてです……」

    %CALLNAME:TARGET%は不安げな表情で%CALLNAME:MASTER%の背中を見つめた。

    「あの……上手くできなかったら……ごめんなさい……」

    %CALLNAME:TARGET%は恐る恐る腰を動かし始めた。

    「んっ……はぅ……こう……でいいんですか……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を伺いながら動いている。

    「……もっと頑張りますから……見捨てないでくださいね……」
