- id: fallback
  content: >-
    「それ、何なのさ？　ちっちゃくて黒いの」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つニプルキャップを無表情で見つめた。

    「私の乳首につけるの？　……きゅっとしたら壊れちゃうのさ」

    その言葉が何を意味するのか、判断がつかなかった。

    電源が入ると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……ふぅん。震えるんだ。乳首がびりびりするの」

    「きゅっとしてドカーンって知ってる？」

    %CALLNAME:人物_フラン%はニプルキャップを見ながら、無邪気に言った。

    「私、なんでも壊せるのさ。その黒いのだって」

    しかし、%CALLNAME:MASTER%が装着して電源を入れると、%CALLNAME:人物_フラン%は目を丸くした。

    「……っ！　なにこれ……乳首が震えてる……変なのさ……」

    悪魔の妹は、予想外の感覚に戸惑っているようだった。

    「……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を無表情で見つめた。

    「私の乳首に何かつけるの？　つまらないことしたら、遊んであげないのさ」

    ニプルキャップが装着され振動し始めると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……っ……何、これ。乳首がびりびりする……」

    495年の孤独が育てた警戒心が、一瞬揺らいだように見えた。

    「あなた、コンティニューできないのさ」

    %CALLNAME:人物_フラン%は不穏なことを口にしながら、ニプルキャップを見つめた。

    「でも、それ、ちょっと気になるの。私の乳首につけてみてよ」

    %CALLNAME:MASTER%が装着して電源を入れると、%CALLNAME:人物_フラン%は小さく身を震わせた。

    「……ふぅん。外の世界って、変なものがあるね。乳首を震わせるなんて」

    %CALLNAME:人物_フラン%は興味を持ったようだった。
  priority: 1
