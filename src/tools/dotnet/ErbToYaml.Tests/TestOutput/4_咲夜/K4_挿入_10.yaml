- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は背を向けたまま、黙って耐えている。

    「背中を向けていれば……顔を見られずに済みますわ」

    瀟洒なメイドは、屈辱に耐えながらも感情を押し殺していた。

    「……っ……」

    「……早く済ませてくださいまし」

    せめてもの抵抗として、%CALLNAME:TARGET%は一言も声を漏らすまいと唇を噛んでいた。

    「……この体勢は……屈辱的ですわね……」

    %CALLNAME:TARGET%は冷たい声で呟いた。

    「ですが……背中を向けていれば……貴方の顔を見ずに済みますわ」

    %CALLNAME:MASTER%が動いても、%CALLNAME:TARGET%は表情を変えない。

    「……っ……」

    「……何をなさっても……私の心は動きませんわ」

    しかし、その体は僅かに震えていた。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%を受け入れている。

    「声を出せば……貴方の思う壺ですわ」

    「瀟洒なメイドは……このような状況でも……取り乱しませんの」

    %CALLNAME:MASTER%が強く動くと、%CALLNAME:TARGET%の体が跳ねる。

    「っ……」

    堪えきれない反応を見せながらも、%CALLNAME:TARGET%は声を押し殺し続けた。

    「……背を向けていれば……」

    %CALLNAME:TARGET%は小さく呟いた。

    「この屈辱的な表情を……見られずに済みますわ……」

    しかし、%CALLNAME:MASTER%の動きに体は反応してしまう。

    「……くっ……」

    「……これで……満足ですか……」

    %CALLNAME:TARGET%は感情を押し殺しながら、ただ時が過ぎるのを待っていた。
