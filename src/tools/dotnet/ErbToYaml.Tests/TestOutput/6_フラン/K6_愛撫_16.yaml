entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……それ、震えてるね」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にあるバイブを興味深そうに見つめた。

    「私の中に入れてくれるの？　嬉しいのさ」

    %CALLNAME:MASTER%がゆっくりとバイブを挿入すると、%CALLNAME:人物_フラン%は甘い声を上げた。

    「ひゃあっ……！　んっ、中で震えてる……すごい……」

    %CALLNAME:人物_フラン%は恋人にしがみつき、振動の快感に身を任せた。

    「%CALLNAME:MASTER%……もっと奥まで……いいよ」

    「あっ……んんっ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_フラン%はバイブの振動に、とろけた表情を浮かべた。

    中を激しく震わせる感覚は、何度経験しても圧倒される。

    「やばいよ……すごく気持ちいいのさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見上げて、恥ずかしそうに微笑んだ。

    「%CALLNAME:MASTER%と一緒だから……こんなに良いんだよね」

    紅い瞳には、愛と快楽が溶け合っていた。

    「えへへ……また使うんだね、それ」

    %CALLNAME:人物_フラン%はバイブを見て、嬉しそうに笑った。

    「私、%CALLNAME:MASTER%にいじめられるの好きなのさ」

    バイブが挿入されると、%CALLNAME:人物_フラン%は声を詰まらせた。

    「ふぁっ……！　んっ、そこ……いいところなの……」

    %CALLNAME:人物_フラン%は恋人の腕に爪を立てた。

    「%CALLNAME:MASTER%……私、壊れちゃいそう……いい意味で」

    「%CALLNAME:MASTER%……今日もしてくれるの？」

    %CALLNAME:人物_フラン%はバイブを見て、頬を染めた。

    期待に胸を高鳴らせながら、自然と脚を開いた。

    「んっ……あっ……入ってきた……」

    振動が始まると、%CALLNAME:人物_フラン%は甲高い声を上げた。

    「あっ……やっ……奥まで震えてる……！」

    495年の孤独を知る少女は、恋人に与えられる快楽を純粋に受け入れていた。
  priority: 4
- id: talent_3_1
  content: >-
    「な、なに……？　それ、変な形なのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つバイブを警戒しながら見た。

    「そ、そこに入れるの……？　恥ずかしいんだけど……」

    しかし拒否はせず、%CALLNAME:人物_フラン%は顔を赤くして待っていた。

    挿入されると、%CALLNAME:人物_フラン%は驚いて目を見開いた。

    「ひゃあっ！？　中で、震えてっ……！　やっ、そんなの……！」

    その声は悲鳴に近かったが、嫌がっているようには見えなかった。

    「あっ……やっ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_フラン%はバイブの刺激に、切ない声を漏らした。

    「そんなに奥まで……震えさせて……意地悪なのさ……」

    %CALLNAME:人物_フラン%は恨めしそうに、でもどこか嬉しそうに%CALLNAME:MASTER%を見た。

    「……私、%CALLNAME:MASTER%に弱いところ見せてばっかり」

    紅い瞳には、羞恥と期待が入り混じっていた。

    「ちょ、ちょっと待って……心の準備が……」

    %CALLNAME:人物_フラン%はバイブを見て、身構えた。

    しかし%CALLNAME:MASTER%は待たず、ゆっくりと挿入を始めた。

    「んあっ！？　やっ、いきなり……！　あっ、あっ……！」

    振動が始まると、%CALLNAME:人物_フラン%は甘い悲鳴を上げた。

    「中……すごい……変になっちゃう……のさ……」

    %CALLNAME:人物_フラン%は混乱しながらも、%CALLNAME:MASTER%の手を握りしめていた。

    「んっ……はぁっ……これ、ずっとぶるぶるしてる……」

    %CALLNAME:人物_フラン%はバイブに翻弄され、息を荒くしていた。

    「%CALLNAME:MASTER%……私、こんな気持ち……初めてなのさ……」

    495年の孤独を知る少女は、新しい感覚に戸惑っていた。

    「……でも、%CALLNAME:MASTER%とだから……怖くないよ」

    %CALLNAME:人物_フラン%は照れながら、小さく微笑んだ。
