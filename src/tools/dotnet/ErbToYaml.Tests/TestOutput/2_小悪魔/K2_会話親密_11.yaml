    %CALLNAME:人物_小悪魔%は頬を薔薇色に染めながら、目を閉じた。

    「ちゅる……ん……ぷはっ……」

    唇を離すと、%CALLNAME:人物_小悪魔%は恍惚とした表情を浮かべていた。

    「……%CALLNAME:MASTER%のキス、あったかい……」

    「悪魔なのに、こんなにドキドキしちゃうなんて……おかしいですわ」

