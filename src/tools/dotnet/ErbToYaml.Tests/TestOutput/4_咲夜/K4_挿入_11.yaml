    %CALLNAME:TARGET%の声は、事務的な冷たさを帯びていた。

    「……この屈辱……必ず覚えておきますわ……」

    %CALLNAME:TARGET%は冷たい目で睨んでいる。

    「二人がかりで……メイドを……」

