entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%の指が%CALLNAME:人物_パチュリー%の秘所に触れた。

    「あ……そこ、は……」

    %CALLNAME:人物_パチュリー%は読みかけの本を静かに閉じ、%CALLNAME:MASTER%に身を預けた。

    「……ん、ふ……指、器用ね……」

    %CALLNAME:人物_パチュリー%は熱い息を吐きながら、小さく腰を揺らしている。

    「はぁ……あ……こういうのも、悪くない……わ……」

    知識人らしからぬ表情で、%CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%を見つめた。

    「……本には載っていない知識ね。あなたから、学ばせてもらうわ」

    「あっ……ん……%CALLNAME:MASTER%……」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の愛撫に、微かに声を漏らしている。

    %CALLNAME:MASTER%の指が敏感な突起を捉えると、%CALLNAME:人物_パチュリー%の体がぴくりと震えた。

    「はぁ……んっ……そこ、感じる……わ……」

    %CALLNAME:人物_パチュリー%は目を潤ませ、%CALLNAME:MASTER%の腕にしがみついた。

    「……体の反応を制御できないなんて……不覚だわ……」

    そう言いながらも、%CALLNAME:人物_パチュリー%は離れようとはしなかった。

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の手を自らの秘所へと導いた。

    「……ここ。触って」

    %CALLNAME:MASTER%が優しく愛撫すると、%CALLNAME:人物_パチュリー%は甘い吐息を漏らした。

    「んっ……あ……上手、ね……」

    %CALLNAME:人物_パチュリー%の頬は上気し、普段の冷静さはどこかへ消えていた。

    「はぁ……あなたの指……魔法みたい……」

    %CALLNAME:人物_パチュリー%は恍惚とした表情で呟いた。

    「あ……ん……もっと……」

    %CALLNAME:人物_パチュリー%は珍しく甘えた声で%CALLNAME:MASTER%をねだっている。

    %CALLNAME:MASTER%の指が敏感な場所を刺激するたび、%CALLNAME:人物_パチュリー%の体が小さく跳ねた。

    「んんっ……あっ……いい……」

    図書館の静寂に、%CALLNAME:人物_パチュリー%の艶やかな声が響く。

    「……あなたにだけよ……こんな姿、見せるのは……」

    %CALLNAME:人物_パチュリー%は照れたように%CALLNAME:MASTER%の胸に顔を埋めた。
