    「……こんなところを触るなんて……普通じゃないでしょう……」

    %CALLNAME:TARGET%は羞恥に顔を染めた。

    「……で、でも……あなたがそうしてほしいなら……」

    小さな声で本音を漏らしながら、指を動かし続けた。

    「……%CALLNAME:MASTER%……顔、見ないで……」

    %CALLNAME:TARGET%は恥ずかしさに顔を背けた。

    「……こんな場所を触りながら……顔を見られるなんて……」

    %CALLNAME:TARGET%は耳まで赤くなっていた。

    「……本当に……恥ずかしいのよ……」

