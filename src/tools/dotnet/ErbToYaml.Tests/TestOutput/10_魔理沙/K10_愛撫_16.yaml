    「え……これを私が使うのか？」

    %CALLNAME:人物_魔理沙%はオナホールを困惑した目で見た。

    「こんなの、どうやって使えばいいんだよ……」

    手探りで%CALLNAME:MASTER%に押し当て、ぎこちなく動かす。

    「こ、こうか……？　合ってるのか……？」

    %CALLNAME:人物_魔理沙%は不安そうに首を傾げた。

    「お、おい……これ、結構変な形してるな……」

    %CALLNAME:人物_魔理沙%は戸惑いながらオナホールを眺めた。

    「本当に私がやるのか……？　ちょっと恥ずかしいんだけど」

    だが言われるままに、%CALLNAME:MASTER%に押し当てた。

    「ん……こう動かせばいいのか……？」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、言われた通りに手を動かした。

    「こういう道具……使ったことないんだけど……」

    %CALLNAME:人物_魔理沙%はオナホールを恐る恐る手に取った。

    「もうちょっと説明してくれよな……どうすればいいんだ？」

