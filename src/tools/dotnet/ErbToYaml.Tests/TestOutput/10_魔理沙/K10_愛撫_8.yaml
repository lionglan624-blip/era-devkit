    「やぁ……開かないで……」

    %CALLNAME:人物_魔理沙%は悲鳴に近い声を上げた。

    しかしその体は%CALLNAME:MASTER%に全てを晒したままだ。

    「……こんなの、初めてだぜ……誰かに見られるの……」

    %CALLNAME:人物_魔理沙%は涙目になりながらも、%CALLNAME:MASTER%を拒まなかった。

    「……お前だから……見せてやるんだからな……」

    %CALLNAME:人物_魔理沙%は恥ずかしさの中に、どこか期待を滲ませていた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%に秘部を見られながら、じっと見つめた。

    その瞳には、戸惑いと期待が入り混じっている。

    「……こういうこと、私にだけしてるんだよな？」

    不安そうに問いかける%CALLNAME:人物_魔理沙%。

    「……お前のこと、もっと知りたいかもな……」

    %CALLNAME:人物_魔理沙%は赤い顔のまま、%CALLNAME:MASTER%に身を委ねていた。
