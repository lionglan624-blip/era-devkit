- id: fallback
  content: >-
    「……泡踊り……文献で読んだことがあるわ……」

    %CALLNAME:TARGET%は興味深そうに石鹸を泡立てた。

    「……実際に試してみるのも、悪くないかしら……」

    そう言って、%CALLNAME:TARGET%は体に泡を塗り広げた。

    「……では、始めるわね……研究として……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の体に触れ始めた。

    「……ふむ……こうして擦りつけると……」

    %CALLNAME:TARGET%は学者らしく観察しながら体を動かしている。

    「……泡の潤滑作用で、摩擦が軽減されるのね……」

    %CALLNAME:TARGET%は分析しながら続けた。

    「……しかし、この密着感は……少し落ち着かないわ……」

    知識と感覚のギャップに、%CALLNAME:TARGET%は戸惑いを覚えていた。

    「……んっ……胸が……当たるのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の体に胸を押し付けていた。

    「……なぜか心臓が速くなるわ……不思議ね……」

    %CALLNAME:TARGET%は自分の反応を分析していた。

    「……これも、研究の一環……そう、研究よ……」

    言い聞かせながら、%CALLNAME:TARGET%は体を動かし続けた。

    「……はぁ……体力的に厳しいわ……」

    %CALLNAME:TARGET%は虚弱な体で懸命に動いていた。

    「……全身を使う運動なんて……普段しないものだから……」

    %CALLNAME:TARGET%は息を切らしながら言った。

    「……でも、途中で止めるのは……データが不完全になるわ……」

    そう自分に言い聞かせて、%CALLNAME:TARGET%は奉仕を続けた。
  priority: 2
- id: fallback
  content: >-
    「……泡踊り……やればいいのでしょう……」

    %CALLNAME:TARGET%は無表情で石鹸を泡立てた。

    「……早く終わらせたいのだけれど……」

    そう言いながら、%CALLNAME:TARGET%は体に泡を塗り広げた。

    「……こんなことをする時間があれば、本を読めるのに……」

    不満そうに呟きながら、%CALLNAME:TARGET%は体を押し付けてきた。

    「……」

    %CALLNAME:TARGET%は黙って体を擦りつけている。

    「……こうすれば良いのでしょう……」

    %CALLNAME:TARGET%は事務的に言った。

    「……早く済ませて……私は本に戻りたいの……」

    明らかに嫌々ながら、%CALLNAME:TARGET%は体を動かし続けた。

    「……はぁ……体力を使うのは嫌なのに……」

    %CALLNAME:TARGET%は溜息をつきながら体を動かしている。

    「……こんな疲れることを……なぜ私が……」

    %CALLNAME:TARGET%は不満を隠さなかった。

    「……最低限は、やるわ……義務だから……」

    投げやりな態度で、%CALLNAME:TARGET%は体を擦りつけていた。

    「……終わったら出て行ってくださいね……」

    %CALLNAME:TARGET%は冷たく言い放った。

    「……私はあなたの相手をする暇はないの……」

    %CALLNAME:TARGET%は最低限の動きで体を擦りつけている。

    「……さっさと終わらせて……それだけよ……」

    冷淡な態度で、%CALLNAME:TARGET%は義務を果たしていた。
