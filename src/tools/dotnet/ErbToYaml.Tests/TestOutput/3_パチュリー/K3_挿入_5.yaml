- id: talent_3_1
  content: >-
    「……っ……私が上で、しかも肛門で……なんて……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨りながら、顔を真っ赤にしている。

    「……本で読んだ知識を、試してみたかったの……」

    %CALLNAME:TARGET%は照れ隠しのように言い訳をした。

    「……んっ……自分で沈めると、肛門が……狭い……」

    慣れない体位と行為に、%CALLNAME:TARGET%は戸惑いを見せている。

    「んっ……ふ……こうすれば、いいのかしら……」

    %CALLNAME:TARGET%はぎこちなく腰を動かしている。

    「……あまり見ないで。肛門で動いているのが、恥ずかしいから……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と目が合い、慌てて視線を逸らした。

    「……本には載っていなかった……こんなに、複雑な感覚……むきゅ……」

    羞恥と異物感が入り混じった表情で、%CALLNAME:TARGET%は呟いた。

    「あ……やぁ……この角度だと、肛門が……深い……」

    %CALLNAME:TARGET%は自分で角度を調整しながら、思わず声を漏らした。

    「……自分で動くと、好きなように……んっ……できるけれど……」

    %CALLNAME:TARGET%は発見したように呟いた。

    「……%CALLNAME:MASTER%、私の動き……痛そうに見えないかしら……」

    照れながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を気にしている。

    「……ん……ぁ……体力も、肛門も……限界……」

    %CALLNAME:TARGET%は動きを続けながらも、二重の負担を感じている。

    「……こんな難しい体位、私には向いていないのだけれど……」

    %CALLNAME:TARGET%は息を整えながら、%CALLNAME:MASTER%を見下ろした。

    「……あなたのために、もう少しだけ頑張るわ……むきゅ……」

    そう言って、%CALLNAME:TARGET%は再び腰を動かし始めた。
