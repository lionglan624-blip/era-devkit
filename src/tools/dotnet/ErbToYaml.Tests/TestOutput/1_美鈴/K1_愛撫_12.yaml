- id: talent_3_1
  content: >-
    「ひゃっ……！　ちょ、ちょっと%CALLNAME:MASTER%、それ何……！？」

    電動マッサージャーの振動に、%CALLNAME:人物_美鈴%は驚いた顔をした。

    「こ、こういうの使うなんて……もう、急にそんな……」

    頬を赤く染めながら、%CALLNAME:人物_美鈴%は体を震わせた。

    「……嫌じゃ、ないけど……恥ずかしいの……」

    電マの振動が敏感な部分に伝わり、%CALLNAME:人物_美鈴%は目を潤ませた。

    「あっ……んっ……もう、%CALLNAME:MASTER%の……」

    「あ……そこは……やぁ……」

    %CALLNAME:人物_美鈴%は振動に耐えながら、思わず声を漏らした。

    「……%CALLNAME:MASTER%、なんでそういう道具……」

    困ったような、でもどこか期待を隠せない表情で、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%を見つめた。

    「……もう、門番の仕事中なのに……こんなの……」

    抗議の言葉とは裏腹に、その体は振動に反応し続けていた。

    「んんっ……ダメ、これ……気持ちい……」

    「んっ……や、やめて……そこは……」

    %CALLNAME:人物_美鈴%は弱々しく抵抗した。

    しかし電マの振動は容赦なく、%CALLNAME:人物_美鈴%の体を蝕んでいく。

    「……%CALLNAME:MASTER%のこと……こういうことされても嫌いになれないのが悔しいわ」

    %CALLNAME:人物_美鈴%は顔を赤くしながら、視線を逸らした。

    「……もう、好きにしなさいよ……」

    観念したように、%CALLNAME:人物_美鈴%は電マの振動に身を任せた。

    「……%CALLNAME:MASTER%……」

    電マの振動を受けながら、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の顔をじっと見つめた。

    その瞳には、戸惑いと快感が入り混じっている。

    「……こういうこと、私にだけしてる？」

    不安そうに問いかける%CALLNAME:人物_美鈴%。振動が強まり、言葉が途切れる。

    「あっ……んっ……%CALLNAME:MASTER%のこと……信じて、いいの……？」

    %CALLNAME:人物_美鈴%は快感に耐えながら、答えを待つように%CALLNAME:MASTER%を見上げた。
