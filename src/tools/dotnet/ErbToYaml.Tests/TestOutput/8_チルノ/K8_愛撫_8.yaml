- id: fallback
  content: >-
    「えっ……！？　ちょ、ちょっと何すんのよ！？」

    チルノは突然秘部を広げられ、慌てた声を上げた。

    「そ、そういうのは……まだ早いんじゃないの……」

    チルノは戸惑いながらも、%CALLNAME:MASTER%の手を払えずにいる。

    「……お、お願いだから……じっくり見ないでよ……」

    チルノは顔を真っ赤にして、視線を逸らした。

    「ひゃっ……な、何して……」

    チルノは驚いて体を強張らせた。

    「%CALLNAME:MASTER%……こういうのは、もっと……その……」

    チルノは言葉を詰まらせながら、恥ずかしそうに俯いた。

    「……もっと仲良くなってからじゃ……ダメなの……？」

    チルノは困惑しながらも、提案するように言った。

    「あっ……だ、ダメだってば……」

    チルノは秘部を開かれ、弱々しく抵抗した。

    「そ、そこは……見せたことない場所で……」

    チルノは恥ずかしさに震えている。

    「……もう少し、仲良くなってからじゃ……ダメ……？」

    チルノは控えめに、でも切実に訴えた。

    「……あの、%CALLNAME:MASTER%……」

    チルノは%CALLNAME:MASTER%に秘部を見られながら、おずおずと声をかけた。

    「こういうことって……その……特別な人としかしないものじゃないの……」

    チルノは戸惑いながらも、%CALLNAME:MASTER%の意図を探ろうとしている。

    「……%CALLNAME:MASTER%は、あたいのこと……どう思ってるの……」

    不安と期待の入り混じった目で、チルノは問いかけた。
  priority: 2
- id: fallback
  content: >-
    「な……っ！？　何すんのよ！！」

    チルノは驚愕して%CALLNAME:MASTER%の手を払いのけた。

    「いきなりそんな……頭おかしいんじゃないの！？」

    チルノは怒りを露わにしながら、%CALLNAME:MASTER%を睨みつけた。

    「……あたいを何だと思ってるわけ」

    チルノは脚を閉じて、警戒の姿勢をとった。

    「ちょっ……やめてよ！」

    チルノは反射的に体を引いた。

    「%CALLNAME:MASTER%……今、何しようとしたの」

    チルノは冷たい目で%CALLNAME:MASTER%を見据えている。

    「……そういうのは勝手にやっていいことじゃないでしょ」

    チルノは警戒しながら距離を取った。

    「っ！　触んないでよ！」

    チルノは%CALLNAME:MASTER%の手を振り払い、睨みつけた。

    「何考えてんの……気持ち悪い……」

    チルノは嫌悪感を隠そうともせず、%CALLNAME:MASTER%を拒絶した。

    「あたいに近づかないで」

    チルノは%CALLNAME:MASTER%から離れていった。

    「は？　何してんの」

    チルノは冷めた目で%CALLNAME:MASTER%を見た。

    「そういうことしていいと思ってるの？」

    チルノは%CALLNAME:MASTER%の手を払い、距離を取った。

    「……最低」

    チルノは軽蔑の視線を向けながら、身を守る姿勢をとった。
