- id: fallback
  content: >-
    「%CALLNAME:MASTER%……入れるね……」

    %CALLNAME:人物_フラン%は恋人を見下ろしながら、そっと腰を近づけた。

    495年の孤独を経て、ようやく得た愛しい存在との繋がり。

    「んっ……入っていく……%CALLNAME:MASTER%の中、温かい……」

    %CALLNAME:人物_フラン%はゆっくりと腰を進めながら、恋人の顔を覗き込んだ。

    「こうしてると……繋がってるって、わかるの……壊したりしない、から……」

    悪魔の妹は、愛する人との一体感に幸せそうに微笑んでいた。

    「ねぇ……もっと奥まで、いいかな……？」

    %CALLNAME:人物_フラン%は恋人の表情を確認しながら、腰を動かした。

    紅い瞳は潤み、繋がりへの喜びに満ちている。

    「あっ……%CALLNAME:MASTER%が私を締め付けてる……気持ちいい……」

    %CALLNAME:人物_フラン%は恋人の反応に合わせ、リズムを刻み始めた。

    「ふふ……壊さないで愛せるの……嬉しいのさ……」

    その言葉には、495年の孤独を超えた喜びが込められていた。

    「%CALLNAME:MASTER%の顔……近くで見たいの……」

    %CALLNAME:人物_フラン%は恋人に覆いかぶさりながら、幸せそうに呟いた。

    こうして誰かの温もりを感じられることが、存在の証明のように思える。

    「んっ……離れないで……ずっと、こうしてたいの……」

    %CALLNAME:人物_フラン%は恋人の体に自分の体を密着させた。

    「私……%CALLNAME:MASTER%のこと、絶対に壊さないから……」

    悪魔の妹は、恋人との永遠を願っていた。

    「こうして%CALLNAME:MASTER%と一つになれるなんて……夢みたいなのさ」

    %CALLNAME:人物_フラン%は恋人の中で動きながら、恍惚の表情を浮かべた。

    地下室での長い年月、こんな幸せは想像すらできなかった。

    「あっ……%CALLNAME:MASTER%の中、すごい……私を包んでる……」

    %CALLNAME:人物_フラン%は愛おしそうに恋人を見つめた。

    「大好き……%CALLNAME:MASTER%、大好きなのさ……」

    その告白は、純粋な愛情そのものだった。
