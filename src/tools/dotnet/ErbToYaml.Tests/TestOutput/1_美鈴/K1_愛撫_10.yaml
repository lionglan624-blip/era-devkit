  content: >-
    「え、えっと……こうすればいいの……？」

    %CALLNAME:人物_美鈴%は恥ずかしそうに%CALLNAME:MASTER%の胸に顔を近づけた。

    「……んっ……ちゅ……」

    恐る恐る乳首に唇を当て、そっと吸い始める。

    「……%CALLNAME:MASTER%の匂い……なんだか落ち着く……」

    %CALLNAME:人物_美鈴%は照れながらも、%CALLNAME:MASTER%に甘えている自分を感じていた。

    「こ、こういうの……したかったわけじゃないんだけど……」

    %CALLNAME:人物_美鈴%は言い訳しながらも、%CALLNAME:MASTER%の乳首を舐めている。

    「……れろ……んっ……」

    %CALLNAME:人物_美鈴%の舌が乳首の周りを丁寧に舐め上げていく。

    「……%CALLNAME:MASTER%、変な声出さないでよね……恥ずかしいから……」

    %CALLNAME:人物_美鈴%は自分の方がよっぽど恥ずかしそうにしていた。

    「……%CALLNAME:MASTER%……私、おかしくなっちゃったのかな……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の胸に顔を埋めながら呟いた。

    「こうして吸ってると……なんだか安心するの……」

    %CALLNAME:人物_美鈴%の唇が乳首を優しく包み込み、ちゅぷちゅぷと音を立てている。

    「……%CALLNAME:MASTER%……私のこと……変だと思う……？」

    %CALLNAME:人物_美鈴%は不安げに%CALLNAME:MASTER%を見上げた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の胸に抱きつきながら、乳首を甘噛みした。

    「……んっ……ちゅ……」

    %CALLNAME:人物_美鈴%の唇が乳首を吸い、舌が転がす。

    「……こんなこと……恋人同士がすることよね……？」

    %CALLNAME:人物_美鈴%は確かめるように呟きながら、%CALLNAME:MASTER%を優しく抱きしめた。
