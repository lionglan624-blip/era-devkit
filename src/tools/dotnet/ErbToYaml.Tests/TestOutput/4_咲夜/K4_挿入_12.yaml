  content: >-
    「……」

    %CALLNAME:TARGET%は二人に犯されながらも、無表情を保とうとしている。

    「奥を責めれば……私が乱れるとでも……」

    瀟洒なメイドは、膣の天井を刺激されても感情を押し殺している。

    「……っ……」

    「……無駄ですわ……瀟洒なメイドは……取り乱しませんの」

    しかし、%CALLNAME:TARGET%の体は微かに震えていた。

    「……お腹の裏を……責めるとは……」

    %CALLNAME:TARGET%は冷たい目で睨んでいる。

    「下品な技をご存じですこと……」

    「しかし……私には通用しませんわ……」

    %CALLNAME:MASTER%が強く擦り上げると、%CALLNAME:TARGET%の体が一瞬跳ねた。

    「……っ……」

    「……声など……出しませんわ……」

    「……」

    %CALLNAME:TARGET%は無言で膣の天井への刺激を受け入れている。

    「奥を擦られたくらいで……取り乱すとでも……」

    「瀟洒なメイドは……このような状況でも……冷静ですの」

    強い刺激が続いても、%CALLNAME:TARGET%は表情を変えない。

    「っ……」

    堪えきれない反応を見せながらも、%CALLNAME:TARGET%は声を押し殺し続けた。

    「……奥を責めて……私を堕とそうと……」

    %CALLNAME:TARGET%は小さく呟いた。

    「浅はかですわね……」

    しかし、膣の天井への強い刺激に体は正直に反応してしまう。

    「……くっ……」

    「……これで……満足ですか……」

    %CALLNAME:TARGET%は感情を押し殺しながら、ただ時が過ぎるのを待っていた。
