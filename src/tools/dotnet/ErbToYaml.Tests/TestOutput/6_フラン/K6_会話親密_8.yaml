- id: fallback
  content: >-
    「……指を、入れるの？」

    %CALLNAME:人物_フラン%は不思議そうに%CALLNAME:MASTER%を見つめた。

    「そういうこと、したいんだ……変な%CALLNAME:MASTER%」

    %CALLNAME:MASTER%の指がゆっくりと入っていく感覚に、%CALLNAME:人物_フラン%は眉を寄せた。

    「……んっ……変な感じ……」

    「でも……壊さないでいてくれるなら……いいよ」

    %CALLNAME:人物_フラン%は警戒しながらも、されるがままになっている。

    「ふーん……こういうことするんだ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の指が中にある感覚を淡々と受け止めている。

    「495年間、誰もこんなことしなかったのに……」

    紅い瞳がじっと%CALLNAME:MASTER%を見つめた。

    「……%CALLNAME:MASTER%は変わってるね」

    「でも……悪くない……かも」

    %CALLNAME:人物_フラン%の声に、微かな興味が滲んでいた。

    「……っ、そこ……」

    %CALLNAME:MASTER%の指が動くと、%CALLNAME:人物_フラン%は小さく声を漏らした。

    「変な感覚……知らなかった、こんなの……」

    %CALLNAME:人物_フラン%は首を傾げ、自分の体の反応を不思議そうに見つめた。

    「……%CALLNAME:MASTER%は、フランのこと知りたいの？」

    「……まあ、いいけど。壊さないでね」

    無邪気な警告の中に、微かな期待が混じっていた。

    「あ……んっ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の指に反応して、体を小さく震わせた。

    「こういうの……普通の人はするの？」

    地下室に長く閉じ込められていた少女は、外の世界を知らない。

    「……フランには分からないことばかりなのさ」

    %CALLNAME:人物_フラン%は複雑な表情で%CALLNAME:MASTER%を見つめた。

    「……でも、%CALLNAME:MASTER%が教えてくれる？」
