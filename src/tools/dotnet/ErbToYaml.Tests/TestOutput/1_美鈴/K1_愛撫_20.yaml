    くりくりと乳首を転がされ、%CALLNAME:人物_美鈴%は甘い声を漏らした。

    「んっ……あ……そうやって責められると……ぞくぞくする……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに目を伏せながらも、幸せそうだった。

    「あっ……ひゃ……引っ張っちゃ……だめ……」

    %CALLNAME:人物_美鈴%は小さく抗議したが、その声は喜びに震えていた。

    %CALLNAME:MASTER%が乳首を引っ張り、軽くねじってみると、

    「やぁっ……！　そんなことされたら……声、止まらなくなっちゃう……」

    %CALLNAME:人物_美鈴%は熱い息を吐きながら、%CALLNAME:MASTER%にしがみついた。

    「……%CALLNAME:MASTER%の意地悪……でも、嫌いじゃないわ」

    照れくさそうに、%CALLNAME:人物_美鈴%は囁いた。

    「……ん……%CALLNAME:MASTER%……」

    %CALLNAME:人物_美鈴%は目を閉じて、%CALLNAME:MASTER%の指に身を任せている。

    乳首を軽くつままれるたび、体が小さく震える。

    「……%CALLNAME:MASTER%といると、体が正直になっちゃう……」

    %CALLNAME:人物_美鈴%は紅潮した顔で、恋人を見上げた。

    「……ずっと、こうして触っていてね……」

    門番としての凛々しさは影を潜め、今は恋する女の顔になっていた。
