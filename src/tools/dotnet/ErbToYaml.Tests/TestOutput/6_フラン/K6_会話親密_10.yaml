- id: fallback
  content: >-
    %CALLNAME:人物_フラン%は紅い瞳を細めて%CALLNAME:MASTER%を見つめている。

    「ふぅん、そうなんだ」

    %CALLNAME:人物_フラン%は特に興味なさそうにそう言った。

    ……と思いきや、紅い瞳はしっかりと%CALLNAME:MASTER%を見ている。

    「……べ、別に興味があるわけじゃないのさ」

    つい本音が出たのか、%CALLNAME:人物_フラン%は慌てて視線を逸らした。

    「――ええと、それからね」

    %CALLNAME:人物_フラン%はぽつりぽつりと話をしている。

    「……なんだか私だけしゃべってるみたい」

    つまり%CALLNAME:MASTER%も何か話せ、ということかな？

    「う、うん……聞いてあげるから。つまらなくても壊さないから、安心して？」

    「――%CALLNAME:MASTER%？ 聞いてる？」

    ちゃんと聞いてるよ、と%CALLNAME:MASTER%が答える。

    「……ふぅん。まぁ、聞いてなくても別にいいけど」

    そう言いながらも、%CALLNAME:人物_フラン%の表情はどこか嬉しそうだ。

    「……次は%CALLNAME:MASTER%の番だからね。何か話してよ」

    翼がぴくぴくと期待するように揺れている。

    「――ねぇ」

    突然、%CALLNAME:人物_フラン%が声をかけてくる。

    何だ、と答えると、

    「%CALLNAME:MASTER%って、どうして私のところに来るの？」

    と、%CALLNAME:人物_フラン%が疑問を投げかけてきた。

    「……怖くないの？ 私、壊しちゃうかもしれないのに」

    不思議そうに首を傾げながら、%CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見つめている。
