- id: fallback
  content: >-
    「……後ろ？　随分と大胆なことを考えるわね」

    %CALLNAME:人物_レミリア%は冷たい視線で%CALLNAME:MASTER%を見た。

    正面から押し倒された体勢で、%CALLNAME:MASTER%が菊穴にあてがう。

    「使用人が主にそんなことをするなど、身の程知らずね」

    %CALLNAME:MASTER%が挿入を始めると、%CALLNAME:人物_レミリア%は表情を変えなかった。

    「……ふん、その程度では私は揺らがないわよ」

    威厳を保ちながら、紅魔館の主は%CALLNAME:MASTER%を見下ろした。

    「……後ろでするつもり？　変態ね」

    %CALLNAME:人物_レミリア%は溜息をついた。

    正面から組み敷かれ、菊穴に亀頭が押し付けられる。

    「まあいいわ。下僕の奉仕として受け取っておく」

    %CALLNAME:MASTER%が挿入すると、締め付けるような圧迫感がある。

    「……ふん、まあまあね」

    500年の吸血鬼は、感情を表に出さずに評価を下した。

    「……ほう、後ろから責めると」

    %CALLNAME:人物_レミリア%は興味なさそうに%CALLNAME:MASTER%を見た。

    正面から繋がった体勢で、%CALLNAME:MASTER%が菊穴へと侵入していく。

    「……その程度で私を悦ばせられると思って？」

    だが、%CALLNAME:人物_レミリア%の菊穴は%CALLNAME:MASTER%を締め付けている。

    「……退屈しのぎには、なるかしらね」

    紅魔館の主は、高飛車な態度を崩さなかった。

    「……使用人がこんな大それたことを」

    %CALLNAME:人物_レミリア%は冷笑を浮かべた。

    正面から押し倒され、菊穴に%CALLNAME:MASTER%の先端があてがわれる。

    「後ろでするなど、普通ではないわね」

    %CALLNAME:MASTER%が挿入すると、その狭さが伝わってくる。

    「……まあ、今日は特別に許してあげるわ」

    命令するように言い放ち、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を見下ろした。
