- id: fallback
  content: >-
    「……これもメイドの務めですわ……」

    %CALLNAME:TARGET%は事務的に石鹸を泡立て、身体に塗った。

    「お客様のご要望にお応えするのは当然のこと……」

    しかし、実際に身体を擦り付けると、%CALLNAME:TARGET%の表情が揺らいだ。

    「……っ……思ったより……密着しますわね……」

    ぬるりと肌が触れ合い、%CALLNAME:TARGET%は小さく息を吐いた。

    「と、とにかく……お世話いたしますわ……」

    %CALLNAME:TARGET%はぎこちなく身体を動かし始めた。

    「……ん……こうすれば……よろしいでしょうか……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を窺いながら身体を動かしている。

    「……っ……反応がありますわね……」

    「プロとして……最適な方法を……」

    %CALLNAME:TARGET%は集中しているが、頬が僅かに染まっている。

    「……少し……変な気分ですわ……」

    自分の動揺を隠そうと、%CALLNAME:TARGET%は淡々と続けた。

    「……これは仕事ですわ……」

    %CALLNAME:TARGET%は自分に言い聞かせながら身体を擦り付けている。

    「お客様の相手をするのもメイドの務め……」

    「……でも……こんなに密着して……」

    %CALLNAME:TARGET%は言葉を詰まらせ、唇を噛んだ。

    「……何でもありませんわ……続けますわよ……」

    動揺を隠しながら、%CALLNAME:TARGET%は全身奉仕を続けた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は複雑な表情で%CALLNAME:MASTER%を見上げた。

    「こうして差し上げるのは……嫌ではありませんわ……」

    「い、いえ……何でもありませんの……」

    %CALLNAME:TARGET%は慌てて視線を逸らし、身体の動きに集中した。

    石鹸の泡がぬるぬると二人を包んでいく。

    「……早く済ませてくださいまし……」

    本心を隠しながら、%CALLNAME:TARGET%は黙々と奉仕を続けた。
