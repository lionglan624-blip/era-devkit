- id: fallback
  content: >-
    「……え？　それを舐めろって……？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%のものを見て、首を傾げた。

    「変なお願いするのさ……でも、面白そうだから試してあげる」

    おずおずと唇を近づけ、ぺろりと一舐めした。

    「……ふぅん、こんな味がするのさ」

    %CALLNAME:人物_フラン%は興味深そうに%CALLNAME:MASTER%を見上げた。

    「もっとしたら、%CALLNAME:MASTER%は喜ぶの？」

    「……私にこんなことさせるなんて、%CALLNAME:MASTER%って変わってるね」

    %CALLNAME:人物_フラン%は呆れたように言いながらも、%CALLNAME:MASTER%の前に跪いた。

    「お姉様に言ったら怒られそうなのさ……」

    そっと唇を押し当て、恐る恐る舌を伸ばした。

    「ん……ぺろ……」

    %CALLNAME:人物_フラン%は戸惑いながらも、%CALLNAME:MASTER%の反応を窺っていた。

    「……こんなので気持ちいいの？　人間って不思議なのさ」

    「これ……咥えればいいの？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%のものを見つめ、躊躇った。

    「……わかったのさ。やってみる」

    小さな口がそっと%CALLNAME:MASTER%を包み込む。

    「んっ……むぐ……ふぅ……」

    何をどうすればいいかわからず、とりあえず舌を動かしてみる。

    %CALLNAME:人物_フラン%は困惑しながらも、%CALLNAME:MASTER%のために試行錯誤していた。

    「ふぅん……%CALLNAME:MASTER%、こういうのが好きなのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%のものを眺めながら、小さく笑った。

    「まあ、やってあげてもいいけど……」

    そう言いながら、ぎこちなく舌を這わせた。

    「れろ……ちゅ……こんな感じ……？」

    %CALLNAME:人物_フラン%は自分がしていることが正しいのかわからず、%CALLNAME:MASTER%を見上げた。

    「……変な顔しないでよ。恥ずかしいのさ」
