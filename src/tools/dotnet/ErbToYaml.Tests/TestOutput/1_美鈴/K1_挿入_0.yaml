    「……本当に、繋がってるんだって……実感します……」

    恥ずかしそうに、でも嬉しそうに%CALLNAME:人物_美鈴%は微笑んだ。

    「は、はぅ……っ……」

    %CALLNAME:人物_美鈴%は快感に顔を歪めながらも、%CALLNAME:MASTER%を見つめ続けた。

    「……%CALLNAME:MASTER%……私……」

    言いかけて、%CALLNAME:人物_美鈴%は口ごもった。

    「……あなたのこと……大切に、思ってます……」

    恥ずかしさに耐えながら、%CALLNAME:人物_美鈴%は想いを伝えた。
