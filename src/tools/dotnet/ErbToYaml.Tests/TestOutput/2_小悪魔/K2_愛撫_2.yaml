    %CALLNAME:人物_小悪魔%は夢中になって%CALLNAME:MASTER%のものを舐め上げている。

    「……だって、%CALLNAME:MASTER%が気持ちよさそうにしてくれると……私も嬉しいんですもの……」

    %CALLNAME:人物_小悪魔%は幸せそうに目を細めた。

    「あーん……んっ、ちゅっ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%のものを口いっぱいに頬張っている。

    「んんっ……じゅるっ……%CALLNAME:MASTER%の味……覚えちゃいましたわ……」

    %CALLNAME:人物_小悪魔%は頬を紅潮させながら、一心不乱に奉仕している。

    「もっと……もっと出してくださいな……全部飲んであげますから……」

