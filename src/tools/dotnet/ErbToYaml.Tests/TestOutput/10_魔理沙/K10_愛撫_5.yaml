    「……後ろも、お前のものだからな……好きにしろよ」

    照れ隠しに強がりながら、%CALLNAME:人物_魔理沙%は甘えるように身を寄せた。

    「ふぁっ……そこ、敏感になってきたぜ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の指使いに、思わず腰を浮かせた。

    最初は恥ずかしがっていた場所も、今では気持ちよさを覚えている。

    「お前のせいだぜ……こんなところまで開発されちゃって……」

    %CALLNAME:人物_魔理沙%は恨めしそうに、でも嬉しそうに%CALLNAME:MASTER%を見上げた。

    「……ったく、責任取れよな……」

    とろけた表情で、%CALLNAME:人物_魔理沙%は呟いた。

    「やぁ……っ、ちょ、そこくすぐったいって……」

    %CALLNAME:人物_魔理沙%は照れ笑いを浮かべながらも、逃げようとはしなかった。

    むしろ自分から腰を突き出すようにして、%CALLNAME:MASTER%の指を求めている。

    「……私ったら、こんな場所まで気持ちいいなんて……」

    %CALLNAME:人物_魔理沙%は自分の反応に驚きながらも、快感を拒まなかった。

    「……%CALLNAME:MASTER%に、全部知られちゃったな」

    %CALLNAME:人物_魔理沙%は幸せそうに微笑んだ。

    「あっ……ん……」

    %CALLNAME:人物_魔理沙%は四つん這いの姿勢で、%CALLNAME:MASTER%の愛撫を受けている。

    努力家の魔法使いも、恋人の前では素直に甘えていた。

    「……お前の指……熱いぜ……」

    %CALLNAME:人物_魔理沙%は枕に顔を埋めながら、甘い声を漏らした。

    「……後ろでも、お前を感じられるの……悪くないぜ」

    恥ずかしさと幸福感に、%CALLNAME:人物_魔理沙%の耳まで真っ赤だった。
