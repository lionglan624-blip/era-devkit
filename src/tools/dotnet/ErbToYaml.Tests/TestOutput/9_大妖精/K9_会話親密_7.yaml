- id: fallback
  content: >-
    「あっ……んぅ……%CALLNAME:MASTER%……そこ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に身を預けながら、後ろの穴を弄られている。

    「……恥ずかしいところなのに……%CALLNAME:MASTER%に触られると……気持ちいいの……」

    %CALLNAME:TARGET%の透き通った羽が、快感に震えている。

    「……%CALLNAME:MASTER%になら……全部、見せてあげるね……」

    %CALLNAME:TARGET%は恥じらいながらも、幸せそうに目を細めた。

    「ひゃぁ……あぁっ……おしり……弱いのに……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の菊穴をゆっくりと解している。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみつきながら、甘い声を漏らした。

    「……こんなところで感じちゃうなんて……妖精としておかしいのかな……」

    「でも……%CALLNAME:MASTER%とだから……いいの……」

    %CALLNAME:TARGET%は潤んだ瞳で%CALLNAME:MASTER%を見上げた。

    「んっ……あ……そんなに優しく……」

    %CALLNAME:TARGET%の後ろの穴を、%CALLNAME:MASTER%が丁寧に愛撫している。

    「チルノちゃんには……絶対に知られたくないよ……こんな姿……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、%CALLNAME:MASTER%の胸に顔を埋めた。

    「……でも……%CALLNAME:MASTER%にだけは……見ていてほしいの……」

    小さな体が、快感に震えている。

    「あっ……やぁ……そこ……指が入って……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の後ろの穴をゆっくりと犯している。

    %CALLNAME:TARGET%は背中の羽をぴくぴくと震わせながら、身を捩った。

    「……%CALLNAME:MASTER%の指……わたしのおしり……覚えちゃったみたい……」

    %CALLNAME:TARGET%は恥ずかしそうに、でも嬉しそうに呟いた。

    「……もっと……してほしいな……」
