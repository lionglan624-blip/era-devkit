  content: >-
    「ん……%CALLNAME:MASTER%……後ろ、なんだね……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の首に腕を回し、しがみついた。

    対面座位でアナルを貫かれる体勢に、少し苦しそうな息を吐く。

    「……痛いけど……%CALLNAME:MASTER%となら、大丈夫」

    %CALLNAME:人物_美鈴%は額を%CALLNAME:MASTER%の肩に預けた。

    「……こうして向かい合ってると……繋がってる感じがして……好き」

    武術家の鍛えられた体が、恋人の腕の中で甘えるように力を抜いていた。

    「はぁ……ん……っ……奥まで、来てる……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%を見上げながら、切ない声を漏らした。

    向かい合う体勢で、恥ずかしい場所を貫かれている。

    「……%CALLNAME:MASTER%の顔、見えるから……安心する……」

    %CALLNAME:人物_美鈴%は照れたように微笑んだ。

    「……こんな場所まで、%CALLNAME:MASTER%に開発されちゃってるんだね……」

    恥ずかしそうに、でも嬉しそうに、%CALLNAME:人物_美鈴%は呟いた。

    「あっ……そこ、気持ちよくなってきた……」

    %CALLNAME:人物_美鈴%は驚いたような声を上げた。

    アナルでの快感に、体が自然と反応してしまう。

    「……恥ずかしいな……こんなところで感じるなんて……」

    %CALLNAME:人物_美鈴%は顔を赤らめながらも、腰を動かし始めた。

    「……%CALLNAME:MASTER%が教えてくれたんだよ……責任、取ってね……？」

    甘えるような声で、%CALLNAME:人物_美鈴%はおねだりした。

    「……ふぅ……%CALLNAME:MASTER%の体、温かい……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に密着しながら、穏やかな息を吐いた。

    「……後ろを使われるのは恥ずかしいけど……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の胸に顔を埋めた。

    「……%CALLNAME:MASTER%の腕の中だと……何をされても、幸せ……」

    「……私の全部、%CALLNAME:MASTER%のものだから……」

    恋人への絶対的な信頼が、その言葉に込められていた。
