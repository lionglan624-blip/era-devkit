- id: fallback
  content: >-
    「これ……私にくれるの？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にあるローターを見つめた。

    「ふぅん……振動してるね……」

    %CALLNAME:人物_フラン%は興味を示しながらも、警戒は解いていない。

    「私に使ってみるの？　……まあ、いいのさ」

    振動が伝わると、%CALLNAME:人物_フラン%は目を丸くした。

    「っ……！　なに、これ……変な感じなの」

    「お姉様のところにあるやつと似てる……」

    %CALLNAME:人物_フラン%はローターを見て、首を傾げた。

    「使い方は……なんとなく知ってるのさ」

    %CALLNAME:人物_フラン%は自分の体の反応を確かめるように、じっとしていた。

    「……%CALLNAME:MASTER%って、変わってるね」

    その言葉には、非難ではなく純粋な興味が込められていた。

    「地下に来て、こんなことする人、初めてなのさ」

    「ピンク色で可愛いね……」

    %CALLNAME:人物_フラン%はローターを手に取り、興味深そうに眺めた。

    「お姉様の宝石みたいに綺麗……でも、これは違うものなんでしょ？」

    %CALLNAME:人物_フラン%は警戒しながらも、逃げようとはしなかった。

    「……%CALLNAME:MASTER%は、私をどうしたいの？」

    その問いには、敵意はなかった。ただ純粋な疑問だった。

    「まあ……嫌じゃないから、いいのさ」

    「前に見たことあるのさ……咲夜が使ってた」

    %CALLNAME:人物_フラン%はローターを興味深そうに見つめた。

    「これで何するの？　……ああ、なんとなくわかった」

    %CALLNAME:MASTER%が押し当てると、%CALLNAME:人物_フラン%は少し身を震わせた。

    「……んっ……変なの。でも、嫌いじゃないかも」

    %CALLNAME:人物_フラン%は首を傾げながら、自分の反応を確かめていた。

    「%CALLNAME:MASTER%って、面白いことするね」
  priority: 2
- id: fallback
  content: >-
    「それ、何なのさ？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つローターを無表情で見つめた。

    「私に使うの？　……壊れても知らないのさ」

    その言葉が何を意味するのか、判断がつかなかった。

    振動が伝わると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……ふぅん。変な感じ」

    495年の孤独を知る少女は、感情を読ませない表情でそう呟いた。

    「別に……どうでもいいよ」

    %CALLNAME:人物_フラン%はローターを見ながら、無関心に言った。

    「私、なんでも壊せるのさ。その変な玩具だって」

    しかし、%CALLNAME:MASTER%がローターを押し当てると、%CALLNAME:人物_フラン%は目を丸くした。

    「……っ！　なにこれ……変なのさ……」

    悪魔の妹は、予想外の感覚に戸惑っているようだった。

    「……まあ、壊さないでいてあげる。今日だけね」

    「……すぐ飽きるのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を無表情で見つめた。

    「私に何かするの？　つまらないことしたら、遊んであげないのさ」

    ローターが押し当てられると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……っ……何、これ」

    495年の孤独が育てた警戒心が、一瞬揺らいだように見えた。

    「……面白いかも。もう少しやってみて」

    「コンティニューできないのに、変なことするんだ」

    %CALLNAME:人物_フラン%は不穏なことを口にしながら、ローターを見つめた。

    「でも、それ、ちょっと気になるの」

    %CALLNAME:MASTER%が振動を伝えると、%CALLNAME:人物_フラン%は小さく身を震わせた。

    「……ふぅん。外の世界って、変なものがあるね」

    %CALLNAME:人物_フラン%は興味を持ったようだった。

    「また持ってきてもいいのさ。壊さないでいられたらね」
  priority: 1
