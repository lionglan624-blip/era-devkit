    %CALLNAME:TARGET%は真っ赤な顔で脚を閉じようとするが、%CALLNAME:MASTER%に優しく開かれた。

    妖精の秘所が露わになり、%CALLNAME:TARGET%は恥ずかしさで目を閉じた。

    「あっ……%CALLNAME:MASTER%の舌……」

    舌先が触れた瞬間、%CALLNAME:TARGET%の体がびくんと跳ねた。

    「……ん……やぁ……でも、嫌じゃない……の……」

    %CALLNAME:TARGET%は恥ずかしさに耐えながらも、%CALLNAME:MASTER%を受け入れていた。

    「こ、こんなこと……恥ずかしくて、死んじゃうよぅ……」

    %CALLNAME:TARGET%は両手で顔を覆いながら、されるがままになっている。

    %CALLNAME:MASTER%の舌が秘所を這うたび、妖精の体が小さく震えた。

    「んっ……あっ……%CALLNAME:MASTER%、そこ……」

    %CALLNAME:TARGET%は思わず声を漏らし、恥ずかしそうに口を押さえた。

    「……%CALLNAME:MASTER%のせいだから……変な声出ちゃうの……」

    上気した顔で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめている。

    「あの……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は不安げに%CALLNAME:MASTER%を見下ろしている。

    「こういうの、あたしにだけ……してる……？」

    %CALLNAME:MASTER%の舌が答えるように動くと、%CALLNAME:TARGET%は小さく声を上げた。

    「ひゃっ……ん……そ、それはちょっと……」

    %CALLNAME:TARGET%は快楽に身を任せながらも、不安そうな表情を見せている。

    「……あたしのこと、好き……でいてくれる……？」

    「そこ……見られてると思うと……」

    %CALLNAME:TARGET%は恥ずかしそうに視線を逸らしながら、脚を開いている。

    %CALLNAME:MASTER%の舌が秘所に触れると、妖精は甘い声を漏らした。

    「やぁ……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%の体が徐々に熱を帯び、秘所からは蜜が溢れ始めた。

    「……あたし、%CALLNAME:MASTER%のこと好きだから……こういうの、許しちゃうの……」

    %CALLNAME:TARGET%は切なそうな顔で、%CALLNAME:MASTER%を見つめていた。
