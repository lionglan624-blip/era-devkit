character: 美鈴
situation: K1_愛撫
entries:
- id: fallback
  content: >-
    「んっ……あ……後ろ、触られてる……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に背中を向けたまま、身を委ねている。

    %CALLNAME:MASTER%の指が菊座をなぞるたび、%CALLNAME:人物_美鈴%の腰が小さく揺れる。

    「……恥ずかしいけど……%CALLNAME:MASTER%になら、いいわ……」

    %CALLNAME:人物_美鈴%は熱い吐息を漏らしながら、恋人の愛撫を受け入れていた。

    「……もっと、してもいいの……後ろ、慣らしてくれる？」

    甘えるような声で、%CALLNAME:人物_美鈴%はそうお願いした。

    「ふぁ……っ、そこ……敏感になってきちゃった……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の指使いに、腰をくねらせた。

    最初は恥ずかしがっていた後ろの愛撫も、今では気持ちよさを感じるようになっている。

    「%CALLNAME:MASTER%のせいよ……こんな場所まで、感じるようになっちゃって……」

    %CALLNAME:人物_美鈴%は恨めしそうに、でも嬉しそうに%CALLNAME:MASTER%を見つめた。

    「……責任、取ってね……？」

    とろけた表情で、%CALLNAME:人物_美鈴%は囁いた。

    「やぁ……っ、%CALLNAME:MASTER%……そこ、くすぐったい……」

    %CALLNAME:人物_美鈴%は照れ笑いを浮かべながらも、逃げようとはしなかった。

    むしろ自分から腰を突き出すようにして、%CALLNAME:MASTER%の指を求めている。

    「……私ったら、こんなところまで……」

    %CALLNAME:人物_美鈴%は自分の反応に驚きながらも、快感を拒まなかった。

    「……%CALLNAME:MASTER%に、全部開発されちゃったね」

    %CALLNAME:人物_美鈴%は幸せそうに微笑んだ。

    「あっ……ん……っ」

    %CALLNAME:人物_美鈴%は四つん這いのまま、%CALLNAME:MASTER%の愛撫を受けている。

    門番として鍛え上げられた身体が、恋人の前では素直に震えている。

    「……%CALLNAME:MASTER%の指……気持ちいい……」

    %CALLNAME:人物_美鈴%は枕に顔を埋めながら、甘い声を漏らした。

    「……後ろでも、%CALLNAME:MASTER%を感じられるの……嬉しい……」

    恥ずかしさと幸福感に、%CALLNAME:人物_美鈴%の耳まで真っ赤だった。
