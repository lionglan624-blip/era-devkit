- id: talent_3_1
  content: >-
    「っ……！　ゆ、指を……挿れるの……？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の意図を察し、顔を赤らめた。

    %CALLNAME:MASTER%がゆっくりと指を入れると、

    「んっ……あ……や……」

    %CALLNAME:人物_レミリア%は小さく声を漏らし、%CALLNAME:MASTER%の腕を掴んだ。

    「……べ、別に、気持ちいいわけじゃ……ああっ……」

    言葉とは裏腹に、その身体は正直に反応していた。

    「な、何よ……そんなところに……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の指が入ってきて、慌てた声を出した。

    指が膣壁を撫でるたびに、甘い痺れが身体を駆け巡る。

    「ふっ……んん……そこ……触らないで……」

    そう言いながらも、%CALLNAME:人物_レミリア%の身体は逃げようとしない。

    「……まあ、悪くは……んっ……ない、かも……」

    高貴な吸血鬼は、素直になれないまま快感に震えていた。

    「ちょ、ちょっと……」

    %CALLNAME:人物_レミリア%は抗議の声を上げたが、すでに指は中に入っている。

    「あっ……やぁ……指、動かさないで……」

    %CALLNAME:人物_レミリア%の紅い瞳が潤み、息が荒くなっていく。

    「んんっ……%CALLNAME:MASTER%……こんなの……」

    %CALLNAME:人物_レミリア%は恥ずかしそうに顔を背けた。

    「……や、やめろとは……言ってないわよ……」

    「……%CALLNAME:MASTER%、あなたって……」

    %CALLNAME:人物_レミリア%は呆れたような声を出した。

    だが%CALLNAME:MASTER%が指を奥へと進めると、

    「ひゃっ……あ、ああ……そ、そこは……」

    %CALLNAME:人物_レミリア%の声が完全に上擦った。

    「……もう、知らないわよ……こんなにされたら……」

    威厳を保とうとしながらも、その身体は%CALLNAME:MASTER%の指に蕩けていた。
