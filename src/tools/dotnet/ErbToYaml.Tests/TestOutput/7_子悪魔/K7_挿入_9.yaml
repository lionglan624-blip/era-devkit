    愛情を確かめるように、%CALLNAME:TARGET%は%CALLNAME:MASTER%に唇を求めた。

    「あっ……んっ……%CALLNAME:MASTER%……だいすき……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに合わせ、小さく腰を揺らしている。

    正面から見つめ合いながらの行為に、悪魔の少女の心は満たされていた。

    「おしりでも……%CALLNAME:MASTER%のこと、かんじる……あたし、しあわせ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋めた。

    「えへへ……このまま、ずっと……いっしょにいたい……」

    背徳の快楽と愛情が溶け合い、%CALLNAME:TARGET%は至福の中に溺れていった。

    「んぅ……%CALLNAME:MASTER%のめ……やさしい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の瞳に自分が映っているのを見つめている。

    後ろを貫かれる背徳感と、愛される喜びが少女の中で一つになっていた。

    「こんなところ、つかわれて……はずかしいけど……%CALLNAME:MASTER%のかおがみえるから……あんしん……」

    %CALLNAME:TARGET%は微笑んだ。

    「いっぱい……だして……？　あたしのおしり……%CALLNAME:MASTER%のものだよ……」

    サキュバスの本能と恋心が一致し、%CALLNAME:TARGET%は%CALLNAME:MASTER%を深く受け入れていった。
