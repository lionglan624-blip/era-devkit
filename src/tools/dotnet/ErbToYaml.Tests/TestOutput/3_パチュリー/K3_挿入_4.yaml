character: パチュリー
situation: K3_挿入
entries:
- id: fallback
  content: >-
    「……今日は、私があなたの上に乗るわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨りながら、静かに宣言した。

    大図書館の床に仰向けになった%CALLNAME:MASTER%を、%CALLNAME:TARGET%は見下ろしている。

    「……んっ……自分で腰を沈めると、深さが調整できるのね……」

    %CALLNAME:TARGET%は理論と実践を照らし合わせるように呟いた。

    「……あなたの顔を見ながら動くのは、悪くないわ」

    「はぁ……ん……っ……」

    %CALLNAME:TARGET%は自分のペースで腰を動かしながら、小さく喘いでいる。

    本の山に囲まれた空間で、魔女が主導権を握っている。

    「……%CALLNAME:MASTER%、私に任せて……本で読んだ知識は十分よ……」

    %CALLNAME:TARGET%は知識を実践しながら、満足げに微笑んだ。

    「……あなたが気持ちよくなる場所、全部わかっているから……」

    「ぁ……やぁ……この角度だと、奥まで……」

    %CALLNAME:TARGET%は珍しく乱れた声を上げながら、腰を揺らしている。

    体力がないはずなのに、今日の%CALLNAME:TARGET%は止まらない。

    「……%CALLNAME:MASTER%……私が、あなたを満たしてあげる……」

    %CALLNAME:TARGET%は愛情を込めて、%CALLNAME:MASTER%の胸に手を置いた。

    「……あなたのためなら、少しくらい疲れても構わないの」

    「……ふぅ……体力が……むきゅ……」

    %CALLNAME:TARGET%は動きながらも、息が上がってきている。

    「……でも、まだ止まらないわ。もう少しだけ……」

    %CALLNAME:TARGET%は意地を見せるように、腰の動きを続ける。

    「……私の中に、あなたを感じていたいの……」

    そう呟いて、%CALLNAME:TARGET%は%CALLNAME:MASTER%に身を預けるように倒れ込んだ。
  priority: 4
- id: talent_3_1
  content: >-
    「……っ……私が、上になるなんて……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨りながら、顔を真っ赤にしている。

    「……本で読んだ知識を、実践してみたかったの……」

    %CALLNAME:TARGET%は照れ隠しのように言い訳をした。

    「……んっ……自分で沈めると、深さが違う……」

    慣れない体位に、%CALLNAME:TARGET%は戸惑いを見せている。

    「んっ……ふ……こうすれば、いいのかしら……」

    %CALLNAME:TARGET%はぎこちなく腰を動かしている。

    「……あまり見ないで。上から見下ろしているのが、恥ずかしいから……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と目が合い、慌てて視線を逸らした。

    「……でも、私が動いている姿……そんなに変かしら……」

    羞恥と好奇心が入り混じった表情で、%CALLNAME:TARGET%は呟いた。

    「あ……やぁ……この体位だと、顔がよく見える……」

    %CALLNAME:TARGET%は自分で角度を調整しながら、思わず声を漏らした。

    「……あなたの表情を見ながら動くのは……んっ……複雑な気分ね……」

    %CALLNAME:TARGET%は発見したように呟いた。

    「……%CALLNAME:MASTER%、私の動き……どう……？」

    照れながらも、%CALLNAME:TARGET%は評価を求めている。

    「……ん……ぁ……疲れてきた……」

    %CALLNAME:TARGET%は動きを続けながらも、体力の限界を感じている。

    「……体が弱いから、こういう体位は向いていないのだけれど……」

    %CALLNAME:TARGET%は息を整えながら、%CALLNAME:MASTER%を見下ろした。

    「……あなたのために、もう少しだけ頑張るわ……むきゅ……」

    そう言って、%CALLNAME:TARGET%は再び腰を動かし始めた。
