entries:
- id: fallback
  content: >-
    「んっ……そこ、お前の舌、熱いぜ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%に脚を開かされ、秘所を舐められている。

    「あっ……やぁ……そんなに丁寧にされると……」

    %CALLNAME:人物_魔理沙%は快感に顔を歪めながらも、恋人の頭を撫でた。

    「……お前に舐められるの、好きだぜ……」

    恥ずかしそうに、でも幸せそうに、%CALLNAME:人物_魔理沙%は呟いた。

    「ふぁ……っ！　ちょ、そこ敏感なんだって……」

    %CALLNAME:MASTER%の舌が%CALLNAME:人物_魔理沙%の陰核を転がす。

    「んんっ……お前、上手くなったな……私で練習しすぎだぜ」

    %CALLNAME:人物_魔理沙%は照れ隠しに軽口を叩くが、腰は自然と浮いてしまう。

    「……もっと……してくれよ……」

    甘えるような声で、%CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%にねだった。

    「あぁっ……そこ、舐めるなって……んっ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の肩に手を置き、身を委ねている。

    「……私の弱いところ、全部知ってるくせに……」

    %CALLNAME:MASTER%が執拗に敏感な場所を舐め上げると、

    「やぁっ……！　ばか、意地悪……っ！」

    %CALLNAME:人物_魔理沙%は甘い声を上げながら、恋人を責めた。

    「……ん……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の舌の動きに身を任せている。

    「……こういう時、魔法使いの威厳も何もないな」

    %CALLNAME:人物_魔理沙%は自嘲気味に笑ったが、その表情は幸福に満ちていた。

    「でも……%CALLNAME:MASTER%の前なら、いいか……」

    恋人にだけ見せる、無防備な姿だった。
