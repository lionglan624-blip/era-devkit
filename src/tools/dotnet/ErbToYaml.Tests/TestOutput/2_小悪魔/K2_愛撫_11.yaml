entries:
- id: fallback
  content: >-
    「ふふ、ローターですわね……%CALLNAME:MASTER%ったら」

    %CALLNAME:人物_小悪魔%は期待を滲ませた目で%CALLNAME:MASTER%を見つめた。

    %CALLNAME:MASTER%がスイッチを入れると、振動音と共に%CALLNAME:人物_小悪魔%の体が震えた。

    「んっ……あ……当てられると……じんじん……してきますわ……」

    %CALLNAME:人物_小悪魔%は甘い吐息を漏らしながら、%CALLNAME:MASTER%にもたれかかった。

    「……悪魔なのに……こういうの……大好きですの……」

    「あっ……そこ……気持ちいい……」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の敏感な場所にローターを当てた。

    振動が伝わるたび、%CALLNAME:人物_小悪魔%は艶やかな声を上げる。

    「これ……癖になりそうですわ……%CALLNAME:MASTER%のせいですからね……」

    %CALLNAME:人物_小悪魔%は頬を染めながらも、その表情には悦びが滲んでいた。

    「……もっと……お願いしますわ……」

    「んぁ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_小悪魔%は潤んだ瞳で%CALLNAME:MASTER%を見上げた。

    「そこ……クリに当ててくださるの……？」

    %CALLNAME:MASTER%がローターを押し当てると、%CALLNAME:人物_小悪魔%は声を詰まらせた。

    「やぁっ……直接は……強すぎますわ……！」

    体をくねらせながらも、%CALLNAME:人物_小悪魔%は逃げようとはしなかった。

    「ひゃっ……！」

    %CALLNAME:MASTER%がローターを動かすと、%CALLNAME:人物_小悪魔%は小さく悲鳴を上げた。

    「……%CALLNAME:MASTER%……尻尾を触りながらは……ずるいですわ……」

    %CALLNAME:人物_小悪魔%の小さな尻尾がぴくぴくと震えている。

    「悪魔の……急所なんですから……んっ……」

    振動と愛撫の二重の刺激に、%CALLNAME:人物_小悪魔%は蕩けた表情を見せた。
