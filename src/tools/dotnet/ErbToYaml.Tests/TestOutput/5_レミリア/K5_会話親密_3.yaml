character: レミリア
situation: K5_会話親密
entries:
- id: fallback
  content: >-
    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の言葉に優雅に微笑み、紅い瞳を細めた。

    「――ふふ、永遠を誓った仲でしょう？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手を取り、その指先に唇を寄せた。

    「貴方の話、もっと聞かせて」

    紅い瞳が妖しく、そして愛おしげに輝いている。

    「500年生きてきたけれど……こんな気持ちは初めてよ」

    %CALLNAME:人物_レミリア%は照れたように視線を逸らしながらも、手を離さなかった。

    「――それでね、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は上機嫌で話をしている。

    紅魔館の主とは思えないほど無邪気な様子だ。

    「……聞いてるかしら？ 私の話を聞かないなんて許されないわよ？」

    %CALLNAME:人物_レミリア%は頬を膨らませながらも、瞳は嬉しそうだった。

    「まあいいわ。貴方といると、つい饒舌になってしまうの」

    「――%CALLNAME:MASTER%？ 聞いてる？」

    聞いてるよ、と%CALLNAME:MASTER%が答えると、

    「そう。ならいいわ」

    %CALLNAME:人物_レミリア%は満足げに頷いた。

    「……貴方が私のそばにいてくれる時間、悪くないわね」

    普段の威厳はどこへやら、%CALLNAME:人物_レミリア%は照れくさそうにそう言った。

    「……ずっと、こうしていたいわ」

    「――ねえ、%CALLNAME:MASTER%」

    唐突に%CALLNAME:人物_レミリア%が%CALLNAME:MASTER%に寄り添った。

    どうしたの、と%CALLNAME:MASTER%が問うと、

    「こうして貴方と話す時間……私は好きよ」

    「500年生きてきて、退屈しない相手なんてそうはいないのだから」

    「……光栄に思いなさい。私の、たった一人の特別なんだから」

    %CALLNAME:人物_レミリア%は少しだけ頬を染めて、%CALLNAME:MASTER%の肩に頭を預けた。
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%と話しながら、紅い瞳で%CALLNAME:MASTER%を見つめていた。

    「――ふぅん、そうなの」

    %CALLNAME:人物_レミリア%は興味ありげにそう言った。

    「貴方って、意外と面白いことをしているのね」

    %CALLNAME:人物_レミリア%はまじまじと%CALLNAME:MASTER%を見つめている。

    「……もっと、教えなさい。貴方のことを」

    命令口調だが、その声にはどこか熱がこもっていた。

    「――それでね、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は笑みを浮かべながら話をしている。

    紅魔館の主も、こうしていると普通の少女のようだ。

    「貴方は最近何かあったの？」

    「ええ、聞かせなさい。貴方のこと、知りたいの」

    %CALLNAME:人物_レミリア%は僅かに身を乗り出していた。

    「……ねえ」

    %CALLNAME:人物_レミリア%は少し考え込むように黙った後、

    「貴方と話している時間、私……嫌いじゃないわ」

    「だから、また話しに来なさい。命令よ」

    %CALLNAME:人物_レミリア%は誇らしげに胸を張ったが、頬がほんのり紅かった。

    「……来なかったら、許さないわよ？」

    「――ククク、面白いわね」

    %CALLNAME:人物_レミリア%は楽しげに笑った。

    「貴方の話、嫌いじゃないわ」

    そう言いながら、%CALLNAME:人物_レミリア%は紅茶のカップを傾けた。

    「……また聞かせて。退屈な夜には、貴方の話が一番よ」

    その言葉には、威厳よりも親しみが滲んでいた。
