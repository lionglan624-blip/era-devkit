character: フラン
situation: K6_愛撫
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……それ、うねうねしてるね」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にあるアナルバイブを興味深そうに見つめた。

    まるで生き物のように蠢くそれに、紅い瞳が輝いている。

    「お尻に入れてくれるの？　楽しみなのさ」

    %CALLNAME:MASTER%がゆっくりとアナルバイブを挿入すると、%CALLNAME:人物_フラン%は甘い声を上げた。

    「んあっ……！　中で動いてる……蛇みたいなのさ」

    %CALLNAME:人物_フラン%は恋人にしがみつき、未知の感覚に身を委ねた。

    「あっ……んっ……%CALLNAME:MASTER%……すごい……」

    %CALLNAME:人物_フラン%はアナルバイブの蠢きに、蕩けた表情を浮かべた。

    腸壁を這い回る感触は、普通のバイブとは全く違った。

    「やばいよ……お尻の奥がぐにゅぐにゅされてる……のさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見上げて、恍惚とした笑みを浮かべた。

    「%CALLNAME:MASTER%と一緒だから……こんな変な感じも、怖くないの」

    495年の孤独を知る少女は、恋人の腕の中で新しい快楽を受け入れていた。

    「えへへ……またそれ使うんだね」

    %CALLNAME:人物_フラン%はアナルバイブを見て、嬉しそうに笑った。

    「私のお尻、%CALLNAME:MASTER%専用なのさ」

    アナルバイブが挿入されると、%CALLNAME:人物_フラン%は声を詰まらせた。

    「ひゃあっ……！　んんっ、中でぐりぐりしてる……！」

    %CALLNAME:人物_フラン%は恋人の腕に爪を立て、快感に耐えた。

    「%CALLNAME:MASTER%……私、お尻からも壊れちゃいそう……」

    「%CALLNAME:MASTER%……今日もお尻、可愛がってくれるの？」

    %CALLNAME:人物_フラン%はアナルバイブを見て、期待に頬を染めた。

    自ら臀部を突き出し、恋人を待っていた。

    「んっ……あっ……入ってきた……うねってる……」

    アナルバイブが蠢き始めると、%CALLNAME:人物_フラン%は甲高い声を上げた。

    「あっ……やっ……奥まで這い回ってる……！」

    悪魔の妹は、恋人に与えられる背徳的な快楽に酔いしれていた。
