- id: fallback
  content: >-
    「ふぇっ……な、何するんですか……」

    %CALLNAME:TARGET%は驚いて肩を竦めた。

    しかし、逃げ出すほどではなく、困惑した表情で%CALLNAME:MASTER%を見ている。

    「あの……あたし、まだそういうの、よくわからなくて……」

    %CALLNAME:TARGET%はぎこちなく立ち尽くしている。

    「……でも、%CALLNAME:MASTER%だから……ちょっとだけ、いいです……」

    小さな声でそう言って、%CALLNAME:TARGET%はおとなしくなった。

    「え、えっと……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%の手を払いのけはしなかった。

    「こういうのって……仲良しさんがすることですよね……？」

    不思議そうに首を傾げながら、%CALLNAME:TARGET%は問いかけた。

    「……あたしたち、そういう仲になっちゃったの……？」

    %CALLNAME:TARGET%は困った顔をしながらも、どこか嬉しそうだった。

    「ひっ……そ、そこは……」

    %CALLNAME:TARGET%は驚いて小さく跳ねた。

    「あの……急にそういうの、心臓に悪いです……」

    %CALLNAME:TARGET%は胸を押さえながら、上目遣いに%CALLNAME:MASTER%を見上げた。

    「……優しくしてくれますか……？　あたし、臆病だから……」

    おずおずとそう言って、%CALLNAME:TARGET%はされるがままになった。

    「……あの、%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の顔をじっと見つめた。

    その瞳には、戸惑いと小さな期待が見え隠れしている。

    「……怖くは、ないですけど……緊張するの……」

    %CALLNAME:TARGET%はそっと%CALLNAME:MASTER%の服を掴んだ。

    「……%CALLNAME:MASTER%は、妖精なんかでいいの……？」

    不安そうに問いかけながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を待っていた。
  priority: 2
- id: fallback
  content: >-
    「ふぇっ……な、何……！？」

    %CALLNAME:TARGET%は驚いて身を引いた。

    「いきなり触らないでください……びっくりするから……」

    %CALLNAME:TARGET%は警戒するような目で%CALLNAME:MASTER%を見ている。

    「……咲夜さんに怒られちゃいます……」

    %CALLNAME:TARGET%は困った顔で、ちらちらと周囲を見回した。

    「え……えっと……」

    %CALLNAME:TARGET%は突然の愛撫に固まっている。

    「あの……%CALLNAME:MASTER%、何かあったんですか……？」

    %CALLNAME:TARGET%は戸惑いながら、%CALLNAME:MASTER%の真意を測りかねている。

    「……あたし、何か悪いことしちゃいました……？」

    不安そうな表情で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げた。

    「ひゃっ……！　ちょ、ちょっと……」

    %CALLNAME:TARGET%は反射的に身を縮こまらせた。

    「あの……あたし、お仕事中なので……」

    %CALLNAME:TARGET%は困った顔で言い訳をしようとしている。

    「……そういうのは、もっと仲良くなってからにしてください……」

    %CALLNAME:TARGET%は怯えながらも、必死に距離を保とうとしていた。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の手を見つめている。

    どう反応していいかわからないようだ。

    「あの……あたし、こういうの、よくわからないです……」

    %CALLNAME:TARGET%は困惑した表情で首を傾げた。

    「……%CALLNAME:MASTER%は、何がしたいの……？」

    妖精は理解できないという顔で、%CALLNAME:MASTER%を見上げていた。
  priority: 1
