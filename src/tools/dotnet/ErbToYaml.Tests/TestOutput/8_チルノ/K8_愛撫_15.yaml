- id: fallback
  content: >-
    「――は!?　なにそれ!?　あたいのそこに何する気!?」

    %CALLNAME:TARGET%は警戒しながら後ずさった。

    「あたいに変なことしたら凍らせ……ひゃっ!?」

    振動が始まり、最も敏感な場所を攻撃される。

    「な、なによこれ!?　そ、そこ震えてる!?　やだ、やめて!」

    %CALLNAME:TARGET%は慌てて逃げようとした。

    「――ちょっと、なに持ってんのよ!　怪しいわね!」

    %CALLNAME:TARGET%は睨みつけながらも、動きが遅れた。

    「あたいに何するつもり……っ!?　そこは……っ!」

    クリキャップの振動が敏感な場所を襲う。

    「やっ、やだ!　そこはダメ!　へ、変なのあてないでよ!」

    最強の氷精は、未知の刺激に抵抗を示した。

    「――あたいは最強なんだから、そんなのに負けないわよ!」

    %CALLNAME:TARGET%は強気に言い放った。

    しかしクリキャップが装着されると、

    「っ!?　ちょ、待っ……そこ直接……っ、うそ……っ」

    「こ、こんなのずるいわよ!　あんた卑怯!」

    予想外の刺激に、%CALLNAME:TARGET%は悔しそうに叫んだ。

    「――なによ、また変なことするつもり?」

    %CALLNAME:TARGET%は不信感を隠さずに言った。

    クリキャップの振動が始まると、

    「ひぁっ!?　ちょ、そこ……っ、なんでそこだけ……っ!」

    「あ、あんたなんか……っ、最強のあたいが……こんなので……っ」

    抵抗しながらも、%CALLNAME:TARGET%の体は正直に反応していた。
