- id: fallback
  content: >-
    「ちょっ……何すんの！？」

    %CALLNAME:人物_チルノ%は驚いて%CALLNAME:MASTER%を突き飛ばした。

    「いきなり胸舐めるなんて、頭おかしいんじゃないの！？」

    %CALLNAME:人物_チルノ%は怒った表情で%CALLNAME:MASTER%を睨んでいる。

    「あたいをなめてんの？　凍らせるわよ！」

    冷気が辺りに漂い始め、%CALLNAME:人物_チルノ%の怒りが伝わってくる。

    「はぁ？　何してんの%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は呆れたような顔をした。

    「あたいにそんなことしていいと思ってんの？」

    %CALLNAME:人物_チルノ%は腰に手を当てて、偉そうに言い放った。

    「あたいは最強の妖精よ。変なことしたら許さないからね！」

    %CALLNAME:人物_チルノ%は警戒の姿勢を崩さなかった。

    「な、何……！」

    %CALLNAME:人物_チルノ%は反射的に身を引いた。

    「%CALLNAME:MASTER%、変態なの？　気持ち悪い……」

    %CALLNAME:人物_チルノ%は嫌悪感を隠そうともしない。

    「そういうのは……もっと仲良くなってからでしょ、普通」

    怒りながらも、%CALLNAME:人物_チルノ%は常識的なことを言った。

    「……」

    %CALLNAME:人物_チルノ%は無言で%CALLNAME:MASTER%を押しのけた。

    「あのさ%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は冷めた目で%CALLNAME:MASTER%を見た。

    「あたい、まだアンタのことよく知らないんだけど」

    「そういうことは、もっと親しくなってからにしてくれる？」

    %CALLNAME:人物_チルノ%は冷静に、しかしきっぱりと拒絶した。
