entries:
- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%の胸、あったかいのさ……」

    %CALLNAME:人物_フラン%は幸せそうに目を細めて、%CALLNAME:MASTER%の胸に顔を埋めた。

    小さな唇が乳首に吸い付き、ちゅぷちゅぷと甘い音を立てている。

    「んっ……ちゅ……%CALLNAME:MASTER%の匂い、大好き……」

    %CALLNAME:人物_フラン%は両手で%CALLNAME:MASTER%の胸を包み込むように抱きついた。

    「……495年、ずっと一人だったけど……今は%CALLNAME:MASTER%がいる……」

    悪魔の妹は、恋人の温もりに満たされていた。

    「%CALLNAME:MASTER%……私、赤ちゃんみたいになっちゃってる……」

    %CALLNAME:人物_フラン%は照れくさそうに笑いながら、乳首を舌先でくすぐった。

    「でもね……こうしてると、すごく安心するのさ……」

    悪魔の妹の小さな舌が乳首を転がし、%CALLNAME:MASTER%の体に甘い痺れを走らせる。

    「……ちゅっ……れろ……%CALLNAME:MASTER%、気持ちいい……？」

    %CALLNAME:人物_フラン%は上目遣いで%CALLNAME:MASTER%を見つめた。

    「私も……%CALLNAME:MASTER%を気持ちよくできて……嬉しいのさ……」

    「……んむ……ちゅぅ……」

    %CALLNAME:人物_フラン%は夢中で%CALLNAME:MASTER%の乳首を吸っている。

    時折甘噛みするように歯を立て、%CALLNAME:MASTER%をくすぐった。

    「えへへ……%CALLNAME:MASTER%の胸、柔らかくて気持ちいい……」

    %CALLNAME:人物_フラン%の小さな手が、もう片方の胸をそっと揉みしだいている。

    「……ねぇ、%CALLNAME:MASTER%……もっと甘えていい……？」

    紅い瞳が、恋人への愛おしさで潤んでいた。

    「%CALLNAME:MASTER%が好きだから……いっぱい甘えちゃうのさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の腕の中で、幸せそうに体を預けた。

    「んっ……ちゅぷ……おっぱい、おいしい……」

    悪魔の妹は無邪気な表情で、夢中になって乳首を吸い続けている。

    %CALLNAME:人物_フラン%の体が%CALLNAME:MASTER%の温もりに包まれて、とろけるように緩んでいた。

    「……%CALLNAME:MASTER%……大好き……ずっと一緒にいてね……」

    495年の孤独を忘れさせてくれる存在に、%CALLNAME:人物_フラン%は心から感謝していた。
