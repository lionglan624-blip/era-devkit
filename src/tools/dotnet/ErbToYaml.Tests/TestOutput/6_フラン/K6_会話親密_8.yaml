- id: fallback
  content: >-
    「……何するの？」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%を見つめた。

    「指を……入れようとしてる？」

    紅い瞳がぞっとするような光を帯びた。

    「そういうことする人……前にもいたのさ」

    「でもね……きゅっとしたら、ドカーンって……」

    %CALLNAME:人物_フラン%は無邪気に笑った。それが逆に恐ろしかった。

    「%CALLNAME:MASTER%も、壊れたいの？」

    「……止まって」

    %CALLNAME:人物_フラン%の声は静かだが、有無を言わせぬ響きがあった。

    「フランのこと、何も知らないのに……」

    「495年間……誰も近づけなかったのに……」

    %CALLNAME:人物_フラン%の声に、どこか寂しさが滲んでいた。

    「……まだ、ダメ。壊しちゃうから」

    七色の翼がざわりと揺れ、危険な気配が漂った。

    「……ふぅん」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を冷ややかに見つめた。

    「フランで遊びたいんだ」

    %CALLNAME:人物_フラン%の声には感情がない。

    「おもちゃは……壊れるまで遊ぶものなのさ」

    %CALLNAME:人物_フラン%は不気味に微笑んだ。

    「でもね……壊れるのは、どっちかな？」

    無邪気な問いかけが、背筋を凍らせた。

    「……あれ、何のつもり？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の意図を察し、首を傾げた。

    「フランに触ろうとする人、久しぶりなのさ」

    「……みんな、壊れちゃったけどね」

    %CALLNAME:人物_フラン%はころころと笑った。

    「%CALLNAME:MASTER%は大丈夫？ フランに壊されない自信、ある？」

    紅い瞳が%CALLNAME:MASTER%を値踏みするように見つめていた。
