- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%に抱きついた。

    「ひゃっ…！？ %CALLNAME:MASTER%さん…！？」

    %CALLNAME:TARGET%は顔を真っ赤にして固まった。

    「だ、抱きつくなんて…いきなりすぎます…」

    戸惑いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%を押し退けはしなかった。

    「…あったかい…ですね…」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らしながら、小声でそう呟いた。

    「わわっ…！？」

    突然の抱擁に、%CALLNAME:TARGET%は小さな声を上げた。

    「%CALLNAME:MASTER%さん、急にどうしたの…」

    %CALLNAME:TARGET%は困惑しながらも、抵抗はしなかった。

    「…べ、別に嫌じゃないですけど…こういうのって…」

    %CALLNAME:TARGET%の背中の羽がそわそわと動いている。

    戸惑いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の温もりを感じていた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%に近づき、そっと抱きしめた。

    「えっ…あ、あの…%CALLNAME:MASTER%さん…？」

    %CALLNAME:TARGET%は体を硬くしたまま、どうしていいかわからない様子だ。

    「こ、こういうの…慣れてなくて…」

    %CALLNAME:TARGET%は恥ずかしそうに俯いた。

    「…でも、%CALLNAME:MASTER%さんだから…いい、です…」

    %CALLNAME:TARGET%は遠慮がちに、%CALLNAME:MASTER%の服の裾をぎゅっと掴んだ。

    「あの、%CALLNAME:MASTER%さん…」

    %CALLNAME:TARGET%が話しかけてきた時、%CALLNAME:MASTER%は%CALLNAME:TARGET%を抱きしめた。

    「ひゃあっ…！？」

    %CALLNAME:TARGET%は驚きのあまり声を上げてしまった。

    「き、急に…どうしたんですか…？」

    %CALLNAME:TARGET%の心臓が早鐘のように鳴っている。

    「…%CALLNAME:MASTER%さんの体温…あったかい…」

    戸惑いながらも、%CALLNAME:TARGET%はその温もりを嫌がってはいなかった。
