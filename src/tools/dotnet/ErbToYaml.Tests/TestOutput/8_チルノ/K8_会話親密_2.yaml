character: チルノ
situation: K8_会話親密
entries:
- id: fallback
  content: >-
    「うふふ、%CALLNAME:MASTER%～」

    %CALLNAME:TARGET%は猫なで声を上げて%CALLNAME:MASTER%に抱きついてきた。

    ひんやりとした小さな体が、%CALLNAME:MASTER%の温もりを求めている。

    「えへへ、あたいったら最強だから、こうやってくっつくのも最高なのよ！」

    %CALLNAME:TARGET%は幸せそうに目を細めている。

    「……%CALLNAME:MASTER%、あったかいね。あたい……こういうの、大好き」

    氷の妖精は照れ隠しのように威勢よく言いながらも、%CALLNAME:MASTER%から離れようとしなかった。

    「……んっ……やぁ……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の青い髪を優しく撫でている。

    %CALLNAME:TARGET%は目を閉じて、気持ちよさそうに身を任せた。

    「あっ……そこ、気持ちいいのよ……」

    「ふふん、あたいの髪、最高でしょ？ もっと撫でていいんだからね！」

    得意げに笑いながらも、%CALLNAME:TARGET%は甘えるように%CALLNAME:MASTER%にもたれかかった。

    その頬は、ほんのりと赤く染まっている。

    「……ぎゅってして？ あたい、%CALLNAME:MASTER%に抱きしめてほしいの」

    %CALLNAME:TARGET%が珍しく素直にお願いしてきた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の小さな体を後ろから抱きしめた。

    「……うん、これが最高なのよ。あったかくて、安心するの」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕に自分の手を重ねている。

    「%CALLNAME:MASTER%だけだよ……こんな風に甘えるの。最強の秘密なんだから！」

    氷の妖精は照れくさそうに、でも幸せそうに%CALLNAME:MASTER%の胸に頭を預けた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の耳元に顔を寄せ、熱い息を吹きかけた。

    「ひゃっ……！？ ちょ、耳は……らめぇ……」

    %CALLNAME:TARGET%はとろんとした顔になって、体から力が抜けていく。

    「もう……%CALLNAME:MASTER%のいじわる……」

    だが、その声には怒りはなく、むしろ嬉しそうだった。

    「……えへへ、%CALLNAME:MASTER%のスキンシップ、最高なのよ！」

    %CALLNAME:TARGET%は照れくさそうに微笑んで、%CALLNAME:MASTER%の腕の中でくつろいでいる。
  priority: 4
- id: talent_3_1
  content: >-
    「――%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の名前を呼んで、手を繋いできた。

    ひんやりとした小さな手が、%CALLNAME:MASTER%の手を握り返してくる。

    「……べ、別にいいでしょ？ あたいは寛大だからね」

    %CALLNAME:TARGET%の頬がほんのりと赤く染まっている。

    「あったかいね……%CALLNAME:MASTER%の手」

    言葉少なに、だが%CALLNAME:TARGET%は心底幸せそうだった。

    「……んっ……あっ……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の青い髪に触れた。

    「やっ……そこは……」

    %CALLNAME:TARGET%は体を触る%CALLNAME:MASTER%の手に、艶やかな声を上げている。

    「……変なの。でも、嫌じゃないわね」

    目を閉じて%CALLNAME:MASTER%に身を任せる%CALLNAME:TARGET%。

    「……もう少しだけ、いいわよ」

    「……あ、ちょっと」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の肩に手を置いた。

    %CALLNAME:TARGET%は一瞬身を強張らせたが、すぐに力を抜いた。

    「……触っても凍らせないであげるわよ。特別にね」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げながら、小さく微笑んだ。

    「あんたのこと……嫌いじゃないから」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%を後ろから抱き、その肩にあごを乗せた。

    「わっ……え、%CALLNAME:MASTER%……？」

    %CALLNAME:TARGET%は驚きながらも、冷たい腕を%CALLNAME:MASTER%に回した。

    「……もう、急に甘えん坊なんだから」

    頬を紅潮させながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%の背中を軽く叩いた。

    「……あったかいわね。なんか、安心するの」
  priority: 3
