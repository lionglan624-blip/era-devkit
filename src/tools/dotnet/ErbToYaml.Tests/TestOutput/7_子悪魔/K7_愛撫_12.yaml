- id: fallback
  content: >-
    「え……えっと……なんですかそれ……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出した見慣れない道具を不思議そうに見つめた。

    「……こ、こわくないですか……？　動いてる……」

    おずおずと脚を開くと、ローターが秘所に押し当てられる。

    「ひっ……！　ふぇ……！？　な、なんですかこれ……振動してる……！」

    %CALLNAME:TARGET%は驚いて体を強張らせたが、逃げることはしなかった。

    「あ、あの……%CALLNAME:MASTER%……こういうの、初めてで……」

    「そ、それを……あたしに、使うんですか……」

    %CALLNAME:TARGET%は不安そうに%CALLNAME:MASTER%を見上げた。

    「……%CALLNAME:MASTER%が言うなら……」

    覚悟を決めたように目を閉じると、ローターの振動が伝わってくる。

    「んっ……！　ひぁっ……こ、これ……体が、おかしくなっちゃう……」

    初めての感覚に戸惑いながら、%CALLNAME:TARGET%は小さく震えていた。

    「……優しく……してくださいね……」

    「あの……あたし、そういう道具……苦手なんです……」

    %CALLNAME:TARGET%は怯えた目でローターを見つめている。

    しかし%CALLNAME:MASTER%に促され、渋々ながら体を預けた。

    「んぅ……っ……やっ……ぶ、ぶるぶるって……変な感じ……」

    ローターの振動に翻弄され、%CALLNAME:TARGET%の体が小刻みに震える。

    「あぅ……止まらない……体が勝手に……反応しちゃう……」

    妖精は困惑しながらも、%CALLNAME:MASTER%を信じて耐えていた。

    「……%CALLNAME:MASTER%には……あたしは逆らいません……」

    %CALLNAME:TARGET%は観念したように呟いて、ローターを受け入れる体勢を取った。

    振動が秘所に届くと、妖精の顔が一気に紅潮する。

    「ふぁっ……んっ……こ、こんな……初めて……体験します……」

    %CALLNAME:TARGET%は目を閉じて、未知の感覚に身を委ねている。

    「……%CALLNAME:MASTER%が……喜んでくれるなら……」

    小さな声でそう言って、妖精は健気にローターの快楽に耐えた。
  priority: 2
- id: fallback
  content: >-
    「いやです、そんなの……こわい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したローターを見て、後ずさりした。

    「動いてるし……音も出てるし……何するんですか……」

    しかし逃げ場がなく、ローターが秘所に押し当てられてしまう。

    「ひゃあっ……！？　や、やめて……体が、変になっちゃう……！」

    %CALLNAME:TARGET%は涙目になりながら、%CALLNAME:MASTER%に懇願した。

    「……誰か……助けて……」

    「な、何ですかそれ……近づけないでください……！」

    %CALLNAME:TARGET%は恐怖で体を強張らせている。

    「そういうの、初めて見ます……怖い……」

    しかし%CALLNAME:MASTER%に押さえつけられ、ローターが秘所に触れてしまう。

    「やっ……んっ……！？　な、何これ……体が震える……！」

    %CALLNAME:TARGET%は初めての感覚にパニックになりながら、涙を溢れさせた。

    「咲夜さん、助けて……お願い……」

    「……っ」

    %CALLNAME:TARGET%はローターを見て、言葉も出ないほど怯えていた。

    声を上げる間もなく、振動が秘所に押し当てられる。

    「ひぁっ……！　んっ……やっ……知らない……こんな感覚……！」

    妖精の小さな体が、ローターの振動に翻弄されている。

    「……お願いです……許してください……」

    %CALLNAME:TARGET%は理解できないまま、快楽と恐怖に震えていた。

    「あたし……何か悪いことしましたか……」

    %CALLNAME:TARGET%は泣きそうな顔で%CALLNAME:MASTER%を見上げた。

    「こんな道具で……あたしを……」

    ローターが押し当てられ、妖精の体が大きく跳ねる。

    「んっ……あぁっ……！　体が……勝手に……！」

    %CALLNAME:TARGET%は抵抗する力も失い、ローターの快楽に蹂躙されている。

    「……もう……どうにでも、してください……」
  priority: 1
