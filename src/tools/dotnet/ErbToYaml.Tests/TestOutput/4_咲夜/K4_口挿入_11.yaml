entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……貴方の体……撫でさせてくださいまし……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の体に指先を這わせた。

    「ふふ……温かいですわ……」

    繊細なメイドの指が、%CALLNAME:MASTER%の肌の上を滑っていく。

    「貴方の体……隅々まで……知りたいの……」

    %CALLNAME:TARGET%は愛おしそうに%CALLNAME:MASTER%を見つめた。

    「……もっと……触らせてくださいまし……」

    「……んっ……%CALLNAME:MASTER%……ここは敏感なのですね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を楽しむように指を動かした。

    「こうすると……震えますわ……」

    メイドの指先が、%CALLNAME:MASTER%の弱点を見つけていく。

    「貴方の気持ちいいところ……全部覚えたいですわ……」

    %CALLNAME:TARGET%は頬を染めながら、愛撫を続けた。

    「……私だけが知っている……貴方の秘密……」

    「……ほら……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は両手で%CALLNAME:MASTER%の体を包み込むように撫でている。

    「瀟洒なメイドの手、いかがですか……？」

    「ふふ……こうして貴方に触れられるのは……幸せですわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の鼓動を感じながら指を動かした。

    「心臓の音……聞こえますわ……」

    「貴方の全て……私のものにしたいですわ……」

    「……%CALLNAME:MASTER%……力を抜いてくださいまし……」

    %CALLNAME:TARGET%は優しく%CALLNAME:MASTER%の体をマッサージするように撫でている。

    「私が……癒して差し上げますわ……」

    %CALLNAME:TARGET%の手つきは丁寧で、愛情に満ちていた。

    「貴方の疲れ……全部取り除きますから……」

    「……そのまま……私に身を任せてくださいまし……」

    完璧なメイドは、恋人の体を隅々まで愛撫した。
