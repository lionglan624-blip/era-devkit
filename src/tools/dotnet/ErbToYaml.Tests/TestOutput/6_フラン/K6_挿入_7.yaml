- id: fallback
  content: >-
    「こうやって向かい合って……するの？　変なの」

    %CALLNAME:人物_フラン%は不思議そうに%CALLNAME:MASTER%を見下ろした。

    495年の孤独の中では、こんな体勢のことは知らなかった。

    「……まあ、%CALLNAME:MASTER%がそうしたいなら、やってみるのさ」

    %CALLNAME:人物_フラン%がゆっくりと腰を落とすと、熱いものが入ってきた。

    「んっ……ぁ……入ってきた……顔が近くて、なんか変な感じ……」

    悪魔の妹は、新しい体験に戸惑いながらも拒絶はしなかった。

    「%CALLNAME:MASTER%……顔、赤くなってない……？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の顔を覗き込みながら問いかけた。

    向かい合っているから、相手の表情がよく見える。

    「……私の中にいるから、そんな顔になるのさ？　ふぅん……」

    %CALLNAME:人物_フラン%が腰を揺らすと、%CALLNAME:MASTER%の表情が変わった。

    「あ……動くともっと変わる……面白いのさ……んっ、私も……変な感じ……」

    相手の反応を観察することに、悪魔の妹は純粋な興味を覚えていた。

    「こうしてると……%CALLNAME:MASTER%のこと、壊さないでいられるかも」

    %CALLNAME:人物_フラン%はぼんやりと呟いた。

    自分が上にいれば、力の加減がしやすい。

    「地下室にいたときは……触るもの全部壊してたから……」

    %CALLNAME:人物_フラン%がそっと腰を動かすと、感覚に表情が揺れた。

    「んっ……あ……これなら、優しくできる……かも……」

    悪魔の妹は、自分でも気づかないうちに%CALLNAME:MASTER%を大切にし始めていた。

    「%CALLNAME:MASTER%って、こうやって繋がるの好きなの……？」

    %CALLNAME:人物_フラン%は素朴な疑問を口にした。

    世界を知らない少女にとって、全てが新鮮な体験だ。

    「……495年、ずっとひとりだったから。こういうの、わからないのさ」

    %CALLNAME:人物_フラン%が腰を落とすと、快感に声が漏れた。

    「あっ……んっ……でも……繋がってると、なんか……悪くない……」

    その言葉は、悪魔の妹なりの精一杯の肯定だった。
