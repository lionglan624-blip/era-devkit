character: 咲夜
situation: K4_愛撫
entries:
- id: fallback
  content: >-
    「……あ……そこは……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の秘所を両指でそっと開いた。

    %CALLNAME:TARGET%は顔を紅く染めながらも、抵抗しなかった。

    「こ、こんなところを……見られるなんて……」

    瀟洒なメイドの仮面の下、羞恥に震える乙女の素顔が覗いている。

    「……%CALLNAME:MASTER%にだけですわよ……こんな姿、見せるのは……」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らしながらも、%CALLNAME:MASTER%の視線を受け入れていた。

    「や……開かないで……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の秘貝を指で押し開くと、鮮やかな桃色が露わになる。

    %CALLNAME:TARGET%は恥ずかしさに顔を手で覆った。

    「……%CALLNAME:MASTER%ったら……そんなに見つめないでくださいまし……」

    %CALLNAME:TARGET%の秘所は蜜を湛え、僅かにひくついている。

    「ああ……恥ずかしい……でも……貴方になら……」

    指の隙間から覗く瞳は、信頼と羞恥に潤んでいた。

    「……っ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に秘所を開かれ、甘い吐息を漏らした。

    「メイドがこんな姿を……お嬢様に知られたら……」

    そう言いながらも、%CALLNAME:TARGET%は自ら脚を開いていく。

    「……もっと、見てくださいまし……」

    普段の完璧なメイドからは想像できない、淫らな姿だった。

    %CALLNAME:TARGET%は羞恥に耐えながら、%CALLNAME:MASTER%に全てを晒していた。

    「あっ……そんなに開いたら……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の秘所を大きく開き、じっくりと鑑賞した。

    膣内は美しい桃色に染まり、時折収縮している。

    「……もう……%CALLNAME:MASTER%は本当に意地悪ですわね……」

    %CALLNAME:TARGET%は恨めしそうに言いながらも、どこか嬉しそうだった。

    「……貴方に見られていると思うと……変な気持ちになりますわ……」

    瀟洒な従者は、恋人の前でだけ見せる姿を晒していた。
  priority: 4
- id: talent_3_1
  content: >-
    「っ……な、何をなさるの……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の秘所を開こうとすると、%CALLNAME:TARGET%は声を上げた。

    「そ、そんなところ……見ないでくださいまし……」

    しかし%CALLNAME:TARGET%の抵抗は弱く、やがて秘所は%CALLNAME:MASTER%の目に晒された。

    「……ああ……恥ずかしい……」

    %CALLNAME:TARGET%は顔を真っ赤にして、目を固く閉じた。

    メイドとしての矜持が、羞恥に崩されていく。

    「や、やめて……そこは……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の秘貝を両指で開いていく。

    %CALLNAME:TARGET%は脚を閉じようとしたが、%CALLNAME:MASTER%に阻まれた。

    「……こんな……こんなことをされて……」

    %CALLNAME:TARGET%の秘所は既に濡れ始めている。

    「……%CALLNAME:MASTER%に……見られてしまいましたわね……」

    諦めたような、どこか安堵したような声だった。

    「あ……だめ……」

    %CALLNAME:MASTER%が秘所を開いて覗き込むと、%CALLNAME:TARGET%は体を震わせた。

    「そんなに見つめられたら……」

    %CALLNAME:TARGET%は恥ずかしさに耐えかねて、顔を背けた。

    「……%CALLNAME:MASTER%は……私のこんな姿が、見たいの……？」

    問いかける声は、かすかに期待を含んでいた。

    「……っ……」

    %CALLNAME:TARGET%は無言で、%CALLNAME:MASTER%に秘所を開かれている。

    その表情は羞恥に歪み、頬は紅く染まっていた。

    「……何も言わないでくださいまし……」

    「見るだけ……見るだけなら……許して差し上げますわ……」

    %CALLNAME:TARGET%は諦めたように脚の力を抜いた。

    メイドの仮面の下で、乙女心が揺れている。
