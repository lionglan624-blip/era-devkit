character: レミリア
situation: K5_口挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、私の胸が欲しいの？」

    %CALLNAME:人物_レミリア%は艶やかに微笑みながら、%CALLNAME:MASTER%の前に跪いた。

    紅魔館の主が膝をつき、その控えめな胸を差し出す。

    「……大きくはないけれど……%CALLNAME:MASTER%のためなら」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%のそれを胸で挟み込んだ。

    「んっ……こうすれば、気持ちいいのよね……？」

    吸血鬼のひんやりとした柔肌が、%CALLNAME:MASTER%の熱を包み込んでいた。

    「んっ……%CALLNAME:MASTER%のここ、すごく熱いわね……」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%のそれを胸で挟んでいた。

    吸血鬼の冷たい肌が、%CALLNAME:MASTER%の熱を吸い上げていく。

    「ククク……私の胸で、こんなになるなんて……嬉しいわ」

    %CALLNAME:人物_レミリア%は愛おしそうに身体を上下させながら、%CALLNAME:MASTER%の表情を見つめていた。

    「……もっと気持ちよくしてあげる……んっ、ふぅ……」

    館の主は、恋人の快感のために精一杯奉仕していた。

    「……ねぇ、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は胸を動かしながら、甘えるような声で呼びかけた。

    「私の胸、小さいでしょう……？　でも、%CALLNAME:MASTER%が喜んでくれるなら」

    紅魔館の主とは思えない、素直な告白だった。

    「……私、幸せなの。こうして%CALLNAME:MASTER%に奉仕できることが」

    %CALLNAME:人物_レミリア%は頬を染めながら、一生懸命に身体を動かした。

    500年の孤独を知る吸血鬼は、愛する者との繋がりを噛みしめていた。

    「ふふ……%CALLNAME:MASTER%、可愛い顔してるわね」

    %CALLNAME:人物_レミリア%は意地悪そうに微笑みながら、胸の動きを速めた。

    「私の胸で、こんなになっちゃって……んっ」

    %CALLNAME:人物_レミリア%は時折、先端を谷間で強く挟んでみせる。

    「もっと乱れていいのよ？　今夜は私が、%CALLNAME:MASTER%を支配してあげるわ」

    そう言いながらも、その瞳には深い愛情が宿っていた。

    「……出そうになったら、教えてね。全部、受け止めてあげるから」
