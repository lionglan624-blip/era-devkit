    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%にもたれかかった。

    「って、背中じゃないな……抱きしめられてるぜ」

    %CALLNAME:MASTER%が後ろから%CALLNAME:人物_魔理沙%を貫くと、甘い声が漏れた。

    「あっ……んん……奥まで……っ」

    「後ろからだと……お前の息、耳に当たって……くすぐったいな……」

    %CALLNAME:人物_魔理沙%は恋人の腕の中で、幸せそうに身を委ねた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_魔理沙%は恋人の胡坐に座り、後ろに体を預けた。

    「こうしてると……お前に包まれてる感じがして……好きだぜ」

    %CALLNAME:MASTER%が腰を突き上げると、%CALLNAME:人物_魔理沙%は小さく喘いだ。

    「んっ……あ……胸も触るのか……欲張りだな……」

    %CALLNAME:人物_魔理沙%は嬉しそうに笑いながら、%CALLNAME:MASTER%に身を任せた。

    「……もっと強く、抱きしめてくれよ……」

    「ねえ、%CALLNAME:MASTER%……もっと密着していいぜ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の上に座り、体を後ろに倒した。

    「こうやって抱かれてると……安心するんだ」

    %CALLNAME:MASTER%が後ろから挿入すると、%CALLNAME:人物_魔理沙%は甘い吐息を漏らした。

    「あっ……奥まで……来てる……っ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の手を取り、自分の胸に導いた。

    「ここも……触ってくれよ……お前の手、温かいから……」
