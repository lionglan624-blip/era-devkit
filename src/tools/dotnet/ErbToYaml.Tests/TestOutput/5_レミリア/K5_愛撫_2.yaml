character: レミリア
situation: K5_愛撫
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、私に奉仕させるなんて光栄に思いなさい」

    %CALLNAME:人物_レミリア%は優雅に跪き、%CALLNAME:MASTER%のものに唇を近づけた。

    小さな唇が熱を含み、ゆっくりと先端を含んでいく。

    「んむ……ふふ、こんな味がするのね……」

    %CALLNAME:人物_レミリア%は紅い瞳で%CALLNAME:MASTER%を見上げながら、舌を這わせた。

    「……%CALLNAME:MASTER%だけよ、私にこんなことさせるのは」

    500年を生きた吸血鬼が、恋人のためだけに見せる姿だった。

    「……今夜は私が悦ばせてあげる」

    %CALLNAME:人物_レミリア%はそう囁くと、%CALLNAME:MASTER%の前に跪いた。

    冷たいはずの唇が、不思議な熱を帯びて%CALLNAME:MASTER%を包み込む。

    「んっ……ちゅ……れろ……」

    %CALLNAME:人物_レミリア%は丁寧に舌を絡ませながら、愛おしそうに奉仕を続けた。

    「……%CALLNAME:MASTER%の味、覚えてしまったわ」

    紅魔館の主は、恋人の前でだけ見せる甘い表情を浮かべていた。

    「……ん、来なさい」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を手招きすると、その場に膝をついた。

    「私の口は、%CALLNAME:MASTER%のものよ……好きに使って」

    小さな口が%CALLNAME:MASTER%を受け入れ、熱心に奉仕を始める。

    「んむぅ……ふぅ……」

    %CALLNAME:人物_レミリア%は目を閉じ、恋人の反応を感じながら舌を動かした。

    吸血鬼の誇りを捨てた、甘い奉仕だった。

    「%CALLNAME:MASTER%……気持ちいい？」

    %CALLNAME:人物_レミリア%は珍しく甘えた声で確認した。

    紅い舌が%CALLNAME:MASTER%のものを舐め上げ、丁寧に奉仕していく。

    「ちゅっ……れろ……ん……」

    %CALLNAME:人物_レミリア%の小さな頭が、%CALLNAME:MASTER%の手の中で揺れている。

    「……もっと、ちょうだい……」

    恋人への想いを込めて、%CALLNAME:人物_レミリア%は奉仕を続けた。
  priority: 4
- id: talent_3_1
  content: >-
    「……ふん、私にこんなことをさせるなんてね」

    %CALLNAME:人物_レミリア%は不満そうに言いながらも、%CALLNAME:MASTER%の前に跪いた。

    「……べ、別にあなたのためじゃないわよ」

    そう言いながら、小さな唇が%CALLNAME:MASTER%を包み込んでいく。

    「んっ……ふ……」

    %CALLNAME:人物_レミリア%は頬を染めながら、ぎこちなく舌を動かした。

    威厳のある吸血鬼の主とは思えない、照れた奉仕だった。

    「……こ、こうすればいいのかしら」

    %CALLNAME:人物_レミリア%は戸惑いながらも、%CALLNAME:MASTER%に口づけた。

    「……私が、こんなこと……」

    恥ずかしそうに目を逸らしながら、それでも奉仕は止めなかった。

    「んむ……ちゅ……」

    %CALLNAME:人物_レミリア%の紅い瞳が潤み、息が荒くなっていく。

    「……%CALLNAME:MASTER%、悦んでいるの？」

    「……な、何よその目は」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の視線から逃げるように顔を背けた。

    だが、その手は%CALLNAME:MASTER%から離れようとしない。

    「……特別に、してあげるわ」

    小さな唇が%CALLNAME:MASTER%を受け入れ、ぎこちなく奉仕を始めた。

    「んっ……れ、れろ……」

    %CALLNAME:人物_レミリア%は恥ずかしそうに、それでも懸命に舌を動かした。

    「……ま、まあいいわ」

    %CALLNAME:人物_レミリア%は諦めたようにため息をついた。

    「今日だけよ……今日だけ、特別に……」

    そう言って、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の前に跪いた。

    「ん……ふぅ……」

    小さな舌が、遠慮がちに%CALLNAME:MASTER%を舐めていく。

    「……笑ったら、許さないわよ」
