character: 小悪魔
situation: K2_愛撫
entries:
- id: fallback
  content: >-
    「んぅっ……%CALLNAME:MASTER%、乳首ばかり……いじわるですわ……」

    %CALLNAME:人物_小悪魔%は甘い吐息を漏らしながら、%CALLNAME:MASTER%に身を任せている。

    %CALLNAME:MASTER%の指先が小悪魔の乳首をくりくりと転がす。

    「あっ……ん……そんなに弄ばれると……悪魔でも……堪らないですわ……」

    %CALLNAME:人物_小悪魔%は潤んだ瞳で%CALLNAME:MASTER%を見上げた。

    「……もっと……してくださいな……私、%CALLNAME:MASTER%のおもちゃですもの……」

    そう囁いて、%CALLNAME:人物_小悪魔%は妖艶に微笑んだ。

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の胸に手を伸ばし、乳首をつまんだ。

    「ひゃぁっ……！ んっ、あ……」

    %CALLNAME:人物_小悪魔%は声を上げながらも、逃げようとはしない。

    「ふふ……%CALLNAME:MASTER%ったら、私の胸がそんなに好きですの？」

    %CALLNAME:人物_小悪魔%は悪戯っぽく笑いながら、胸を突き出すように体を反らせた。

    「……いいですわよ、好きなだけ触って……私の全部、%CALLNAME:MASTER%のものですから……」

    「やぁ……そこ、敏感……なんですの……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_小悪魔%の乳首を引っ張る。

    %CALLNAME:人物_小悪魔%は甘い声を漏らしながら、体をびくびくと震わせている。

    「んっ……あっ……引っ張らないで……でも、止めないで……」

    矛盾した言葉を口にしながら、%CALLNAME:人物_小悪魔%は陶酔した表情を浮かべている。

    「……悪魔の弱点、覚えてしまったんですから……責任、取ってくださいね……？」

    「あっ……んぅ……%CALLNAME:MASTER%の指、上手……」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の乳首を指先でくるくると撫で回している。

    %CALLNAME:人物_小悪魔%は熱い息を吐きながら、%CALLNAME:MASTER%にもたれかかった。

    「こんなに気持ちよくされちゃうと……悪魔の矜持が保てませんわ……」

    %CALLNAME:人物_小悪魔%はそう言いながらも、幸せそうに目を細めている。

    「……いいですわ……今日は%CALLNAME:MASTER%に堕とされてあげますの……」
