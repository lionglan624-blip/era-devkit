    %CALLNAME:人物_美鈴%は戸惑いながらも、%CALLNAME:MASTER%の上で腰を揺らし続けた。

    「……%CALLNAME:MASTER%は……これで、満足されますか……」

    「……この体勢だと、%CALLNAME:MASTER%の顔がよく見えますね……」

    %CALLNAME:人物_美鈴%は複雑な表情を浮かべた。

    「……後ろを自分から使いながら……見つめられるのは……」

    %CALLNAME:人物_美鈴%は小さく息を吐いた。

