character: 咲夜
situation: K4_会話親密
entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%をそっと後ろから抱きしめた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_咲夜%は自然と身を預けてきた。

    「……あなたの腕の中、温かいわ……落ち着くの」

    完璧なメイドの仮面を外し、%CALLNAME:人物_咲夜%は穏やかな表情を浮かべた。

    「お嬢様の前では見せられない顔ね……これは%CALLNAME:MASTER%だけの特権よ」

    そう言って、%CALLNAME:人物_咲夜%は%CALLNAME:MASTER%の腕にそっと手を添えた。

    「――%CALLNAME:MASTER%」

    %CALLNAME:人物_咲夜%は%CALLNAME:MASTER%を迎え入れるように両腕を広げた。

    ぎゅっと抱きしめ合う。二人の心音が重なった。

    「……ふふ、時を止めても、この温もりだけは消えないの」

    %CALLNAME:人物_咲夜%は幸せそうに目を細めた。

    「……もう少しだけ。お仕事は後でいいわ」

    瀟洒なメイドらしからぬ甘えた声が、%CALLNAME:MASTER%の耳に届いた。

    %CALLNAME:MASTER%が前から抱きつくと、%CALLNAME:人物_咲夜%は微笑んだ。

    「……ん、甘えん坊さんね」

    %CALLNAME:人物_咲夜%は%CALLNAME:MASTER%の頭を優しく撫でた。

    「こうしていると、私がお仕えしているのか、甘やかしているのか分からなくなるわ」

    くすくすと上品な笑い声を漏らしながら、%CALLNAME:人物_咲夜%は%CALLNAME:MASTER%を抱き返した。

    「……でも、悪くないわね。%CALLNAME:MASTER%だから、許すの」

    二人は暫く、そのまま静かに抱き合っていた。

    「……ん」

    %CALLNAME:MASTER%が抱きつくと、%CALLNAME:人物_咲夜%は小さく声を漏らした。

    「……%CALLNAME:MASTER%の体温、好きよ。私を安心させてくれるの」

    %CALLNAME:人物_咲夜%は%CALLNAME:MASTER%の背中に腕を回し、ぎゅっと抱きしめ返した。

    「瀟洒なメイドは弱みを見せないものだけれど……」

    「……あなたの前では、素直でいたいの」

    %CALLNAME:人物_咲夜%は%CALLNAME:MASTER%の胸に顔を埋めた。
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%に後ろから抱きついた。

    「……っ、%CALLNAME:MASTER%……？」

    %CALLNAME:人物_咲夜%は驚きながらも、身を預けてきた。

    「……ふふ、急に甘えん坊ね」

    頬を僅かに染めながら、%CALLNAME:人物_咲夜%は%CALLNAME:MASTER%の手に自分の手を重ねた。

    「……温かいわ。悪くない気分ね」

    そう言いながら、%CALLNAME:人物_咲夜%は照れくさそうに視線を逸らした。

    「あら……%CALLNAME:MASTER%」

    %CALLNAME:MASTER%に前から抱きしめられて、%CALLNAME:人物_咲夜%は一瞬固まった。

    「……もう、いきなりなんだから」

    だが、その声は怒っているようには聞こえなかった。

    %CALLNAME:人物_咲夜%は戸惑いながらも、%CALLNAME:MASTER%の体に腕を回した。

    「……温かいわね、あなたって」

    頬を染めながら、%CALLNAME:人物_咲夜%は小さく呟いた。

    %CALLNAME:MASTER%が抱きつくと、%CALLNAME:人物_咲夜%は息を呑んだ。

    「……こ、困るわ……お仕事中なのに……」

    そう言いながらも、%CALLNAME:人物_咲夜%は%CALLNAME:MASTER%を押し退けなかった。

    「……本当に、仕方のない人ね」

    %CALLNAME:人物_咲夜%は諦めたように溜息を吐いた。

    「……少しだけよ。少しだけ、このままでいさせて」

    照れ隠しのような声で、%CALLNAME:人物_咲夜%はそう呟いた。

    「%CALLNAME:MASTER%……急に、どうしたの？」

    抱きつかれた%CALLNAME:人物_咲夜%は、戸惑いながらも笑みを浮かべた。

    「……疲れたの？ それとも、甘えたいの？」

    %CALLNAME:人物_咲夜%はそっと%CALLNAME:MASTER%の髪を撫でた。

    「……ふふ、珍しいわね。こういう%CALLNAME:MASTER%も」

    %CALLNAME:人物_咲夜%は嬉しそうに目を細めながら、%CALLNAME:MASTER%を優しく抱き返した。
  priority: 3
