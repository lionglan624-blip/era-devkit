character: 子悪魔
situation: K7_会話親密
entries:
- id: fallback
  content: >-
    「あっ……%CALLNAME:MASTER%、胸……触るの……？」

    %CALLNAME:TARGET%は恥ずかしそうに、でも嬉しそうに胸を差し出した。

    「えへへ……あたしの胸、小さいけど……%CALLNAME:MASTER%になら、いっぱい触ってほしいの」

    %CALLNAME:MASTER%の手が妖精の小さな胸を包み込む。

    「んっ……あったかい……%CALLNAME:MASTER%の手、大好き……」

    %CALLNAME:TARGET%は蕩けた表情で、%CALLNAME:MASTER%に身を預けた。

    「ひゃんっ……！ んん……そこ、気持ちいいの……」

    %CALLNAME:TARGET%は小さく跳ねて、%CALLNAME:MASTER%の服をぎゅっと握りしめた。

    「あたしね……%CALLNAME:MASTER%に胸触られると……へんな気持ちになるの……」

    妖精の頬がほんのりと紅潮している。

    「でもね……嫌じゃないの。だって……好きな人だから……」

    %CALLNAME:TARGET%は甘えるように%CALLNAME:MASTER%を見上げた。

    「もっと……触って……？」

    「んふふ……%CALLNAME:MASTER%、胸好きなの……？」

    %CALLNAME:TARGET%はいたずらっぽく微笑んで、自分から胸を押し付けてきた。

    「あたしの胸、小さいけど……感じるんだよ……？」

    %CALLNAME:MASTER%が優しく揉むと、%CALLNAME:TARGET%は甘い声を漏らした。

    「あっ……ん……そこ、いいの……」

    %CALLNAME:TARGET%は恍惚とした表情で、身を捩らせている。

    「%CALLNAME:MASTER%の手……魔法みたい……えへへ」

    「ねえ、%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%がもじもじしながら近づいてきた。

    「あのね……胸、触って……？　お願い……」

    おねだりするような上目遣い。%CALLNAME:MASTER%は%CALLNAME:TARGET%の胸に手を伸ばした。

    「んっ……ふぁ……あ……」

    %CALLNAME:TARGET%は幸せそうに目を細めている。

    「大好き……%CALLNAME:MASTER%のこと、だいすき……」

    妖精の小さな体が、愛しそうに%CALLNAME:MASTER%に寄り添った。
  priority: 4
- id: talent_3_1
  content: >-
    「ひゃっ……！ む、胸……？」

    %CALLNAME:TARGET%は驚いて目を丸くしたが、逃げようとはしなかった。

    「あの……こういうの、していいんですか……？」

    %CALLNAME:TARGET%は恥ずかしそうに俯きながらも、%CALLNAME:MASTER%の手を受け入れている。

    「んっ……あったかい……」

    %CALLNAME:TARGET%の頬がほんのりと赤く染まっていた。

    「……咲夜さんには、ナイショにしてね……？」

    「あっ……%CALLNAME:MASTER%……そこは……」

    %CALLNAME:TARGET%は小さく抵抗しながらも、胸を隠そうとはしなかった。

    「んん……恥ずかしいよ……」

    でも、その表情はどこか嬉しそうにも見える。

    「あたしの胸、小さいから……触っても面白くないかも……」

    %CALLNAME:TARGET%は自信なさそうに呟いた。

    「……でも、%CALLNAME:MASTER%が触りたいなら……いいよ……」

    「え、えっと……胸……？」

    %CALLNAME:MASTER%が手を伸ばすと、%CALLNAME:TARGET%は身構えた。

    しかし、触れられると力を抜いて、そっと目を閉じた。

    「……ん……」

    %CALLNAME:TARGET%は緊張しながらも、%CALLNAME:MASTER%の愛撫を受け止めている。

    「あの……もうちょっとだけ……優しくしてね……？」

    妖精の声は、恥ずかしさと期待が入り混じっていた。

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の胸に手を伸ばした。

    「ふぇっ……！？」

    %CALLNAME:TARGET%は驚いたが、不思議と逃げ出す気にはなれなかった。

    「あの……%CALLNAME:MASTER%って……えっちなんですね……」

    %CALLNAME:TARGET%は真っ赤になりながら、そう呟いた。

    「……でも、嫌じゃないです。なんでだろ……」

    %CALLNAME:TARGET%は照れくさそうに、でも嬉しそうに微笑んだ。
