  content: >-
    「……な、なんで……あたしがこんなこと……」

    %CALLNAME:TARGET%は涙目で%CALLNAME:MASTER%を見上げた。

    「こういうの……したくないです……」

    しかし逃げることもできず、言われるがままに腰を動かし始める。

    「……んっ……入れ……ます……」

    %CALLNAME:TARGET%は嫌々ながら%CALLNAME:MASTER%のアナルに挿入していった。

    「……こんなの……ひどい……です……」

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の上に跨った。

    「……はぅ……入って……いきます……」

