- id: fallback
  content: >-
    「ひっ……！？ な、なにするの……っ」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の敏感な場所に触れた。

    %CALLNAME:TARGET%は驚いて身を強張らせたが、強くは拒まなかった。

    「そ、そこは……だめ……だめだよぉ……」

    %CALLNAME:TARGET%は困惑した表情で、どうしていいかわからない様子だ。

    「……えっと……こういうの、していいんですか……？」

    「あっ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の愛撫に、思わず声を漏らしてしまった。

    「へ、へんな声……出ちゃった……」

    %CALLNAME:TARGET%は顔を真っ赤にして、恥ずかしそうに俯いている。

    「……咲夜さんには、ナイショにしてくださいね……？」

    %CALLNAME:TARGET%は不安そうに%CALLNAME:MASTER%を見上げた。

    「ふぇっ……！ そこ……っ」

    %CALLNAME:MASTER%の指が秘所に触れると、%CALLNAME:TARGET%はびくりと震えた。

    「な、なんか……変な感じ、する……」

    %CALLNAME:TARGET%は戸惑いながらも、じっと%CALLNAME:MASTER%の様子を窺っている。

    「……嫌じゃ、ないですけど……わからないの……」

    妖精の小さな体が、緊張と戸惑いで強張っていた。

    「んっ……やぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にされるがままになっている。

    「あたし……こういうこと、よくわからないけど……」

    %CALLNAME:TARGET%は困った顔で、でも逃げようとはしなかった。

    「%CALLNAME:MASTER%が……悪い人じゃないって……思うから……」

    %CALLNAME:TARGET%は不安げに、でもどこか信頼するように呟いた。
