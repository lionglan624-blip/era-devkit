    495年の孤独が生んだ、どこか虚ろな瞳。

    「私に指を入れて、何がしたいの？」

    %CALLNAME:MASTER%の指が動き始めると、%CALLNAME:人物_フラン%は小さく声を漏らした。

    「あ……なんか、変な感じがする……」

