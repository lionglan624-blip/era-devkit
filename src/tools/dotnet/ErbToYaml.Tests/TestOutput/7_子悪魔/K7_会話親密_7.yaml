character: 子悪魔
situation: K7_会話親密
entries:
- id: fallback
  content: >-
    「あっ……%CALLNAME:MASTER%、後ろ……触るの……？」

    %CALLNAME:TARGET%は恥ずかしそうに、でも拒まずにお尻を向けた。

    「えへへ……恥ずかしいところだけど……%CALLNAME:MASTER%になら、いいよ……」

    %CALLNAME:MASTER%の指が妖精の小さな菊穴に触れる。

    「ひゃんっ……！ あっ……そこ……へんな感じ……」

    %CALLNAME:TARGET%は蕩けた表情で、%CALLNAME:MASTER%に身を任せた。

    「んん……後ろの穴……いじられると、くすぐったいの……」

    %CALLNAME:TARGET%は小さく身を震わせながら、%CALLNAME:MASTER%の服をぎゅっと握りしめた。

    「あたしね……こんなところ触られるなんて、思ってなかったの……」

    妖精の頬がほんのりと紅潮している。

    「でもね……%CALLNAME:MASTER%がしたいなら……えへへ、いいよ」

    %CALLNAME:TARGET%は甘えるように%CALLNAME:MASTER%を見上げた。

    「もっと……いじめてもいいの……」

    「ふぁ……%CALLNAME:MASTER%、そこ……恥ずかしい……」

    %CALLNAME:TARGET%はくすぐったそうに身を捩りながらも、逃げようとはしなかった。

    「あたしの……後ろの穴……気持ちいい？」

    %CALLNAME:MASTER%が優しく刺激すると、%CALLNAME:TARGET%は甘い声を漏らした。

    「あっ……んっ……そこ……へんになる……」

    %CALLNAME:TARGET%は恍惚とした表情で、小さなお尻を揺らしている。

    「%CALLNAME:MASTER%の指……魔法みたい……ふにゃぁ……」

    「ねえ、%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%がもじもじしながら近づいてきた。

    「あのね……後ろも、触って……？　お願い……」

    おねだりするような上目遣い。%CALLNAME:MASTER%は%CALLNAME:TARGET%の後ろに手を伸ばした。

    「ひゃんっ……あっ……そこ……んんっ……」

    %CALLNAME:TARGET%は幸せそうに目を細めている。

    「大好き……%CALLNAME:MASTER%のこと、だいすき……えへへ」

    妖精の小さな体が、愛しそうに%CALLNAME:MASTER%に寄り添った。
  priority: 4
- id: talent_3_1
  content: >-
    「ひゃっ……！ う、後ろ……？」

    %CALLNAME:TARGET%は驚いて目を丸くしたが、逃げようとはしなかった。

    「あの……こういうの、していいんですか……？」

    %CALLNAME:TARGET%は恥ずかしそうに俯きながらも、%CALLNAME:MASTER%の手を受け入れている。

    「んっ……へんな感じ……」

    %CALLNAME:TARGET%の頬がほんのりと赤く染まっていた。

    「……咲夜さんには、ナイショにしてね……？」

    「あっ……%CALLNAME:MASTER%……そこは……」

    %CALLNAME:TARGET%は小さく抵抗しながらも、後ろを隠そうとはしなかった。

    「んん……恥ずかしいよ……後ろなんて……」

    でも、その表情はどこか嬉しそうにも見える。

    「あたしの後ろの穴……いじって面白い……？」

    %CALLNAME:TARGET%は自信なさそうに呟いた。

    「……でも、%CALLNAME:MASTER%が触りたいなら……いいよ……」

    「え、えっと……後ろ……？」

    %CALLNAME:MASTER%が手を伸ばすと、%CALLNAME:TARGET%は身構えた。

    しかし、触れられると力を抜いて、そっと目を閉じた。

    「……んっ……くすぐったい……」

    %CALLNAME:TARGET%は緊張しながらも、%CALLNAME:MASTER%の愛撫を受け止めている。

    「あの……もうちょっとだけ……優しくしてね……？」

    妖精の声は、恥ずかしさと戸惑いが入り混じっていた。

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の後ろに手を伸ばした。

    「ふぇっ……！？」

    %CALLNAME:TARGET%は驚いたが、不思議と逃げ出す気にはなれなかった。

    「あの……%CALLNAME:MASTER%って……えっちなんですね……」

    %CALLNAME:TARGET%は真っ赤になりながら、そう呟いた。

    「……でも、嫌じゃないです。なんでだろ……」

    %CALLNAME:TARGET%は照れくさそうに、でも嬉しそうに微笑んだ。
