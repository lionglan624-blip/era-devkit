- id: talent_3_1
  content: >-
    「あっ……%CALLNAME:MASTER%……」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の手を取り、指を絡めた。

    「……え、えっと……その……」

    %CALLNAME:人物_小悪魔%は顔を赤くしながら、繋いだ手を見つめている。

    「……嬉しい……ですわ……」

    照れくさそうに俯きながらも、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の手を握り返してきた。

    「んっ……%CALLNAME:MASTER%、髪、触ってます……？」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の髪を指で梳いている。

    「……えへへ、くすぐったいけど……気持ちいいですわ……」

    %CALLNAME:人物_小悪魔%は目を閉じて、その感触を楽しんでいる。

    「……もうちょっと、続けてくれます……？」

    甘えるような声で、%CALLNAME:人物_小悪魔%はそう言った。

    「わっ……急に抱きつかないでくださいよぉ……」

    %CALLNAME:MASTER%は後ろから%CALLNAME:人物_小悪魔%を抱きしめた。

    「……でも……嫌じゃないから……」

    %CALLNAME:人物_小悪魔%は小さく呟きながら、%CALLNAME:MASTER%の腕に自分の手を添えた。

    「……%CALLNAME:MASTER%の腕、あったかい……悪魔なのに、こんなにドキドキしちゃうなんて……」

    %CALLNAME:人物_小悪魔%は幸せそうに目を閉じて、その温もりを感じていた。

    「ふぇっ……肩、揉んでくれるんです……？」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の後ろに回り、肩に手を置いた。

    「あ……ん、そこ、いいです……」

    %CALLNAME:人物_小悪魔%は気持ちよさそうに目を細めている。

    「……本の整理で、結構肩凝っちゃうんですのよ……」

    %CALLNAME:MASTER%の手に身を委ねながら、%CALLNAME:人物_小悪魔%は小さく息を漏らした。
