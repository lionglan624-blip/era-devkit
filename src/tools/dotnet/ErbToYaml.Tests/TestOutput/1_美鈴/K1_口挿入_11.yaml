    %CALLNAME:人物_美鈴%は不安そうに顔を上げた。

    「……門番なんかの私が……こんなこと……」

    %CALLNAME:人物_美鈴%の舌は震えながらも止まらなかった。

    「……でも……%CALLNAME:MASTER%がそれでいいなら……」

    %CALLNAME:人物_美鈴%は覚悟を決めたように舌を動かし続けた。

    「……私……一生懸命、するから……」
