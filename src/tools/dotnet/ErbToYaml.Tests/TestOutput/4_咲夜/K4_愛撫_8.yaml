- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、本気ですか」

    %CALLNAME:TARGET%は信じられないという表情で%CALLNAME:MASTER%を見つめている。

    「メイドに自慰を命じるなど……正気の沙汰ではありませんわ」

    %CALLNAME:TARGET%は抗議しながらも、%CALLNAME:MASTER%の視線を受けて俯いた。

    「……仕方ありませんわね……」

    %CALLNAME:TARGET%は渋々といった様子で、自らの秘所に手を伸ばした。

    「……見ないでくださいまし」

    %CALLNAME:TARGET%は顔を背けながら、小さく身じろぎした。

    「っ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の前で、しぶしぶ自らの体に触れていた。

    「……このようなことをさせて……何が愉しいのですか」

    %CALLNAME:TARGET%は不満げに言いながらも、指の動きを止めない。

    「……んっ」

    思わず声が漏れ、%CALLNAME:TARGET%は慌てて口を押さえた。

    「……聞かなかったことに、してくださいまし……」

    %CALLNAME:TARGET%は羞恥で顔を赤らめている。

    「……は」

    %CALLNAME:TARGET%は諦めたように息を吐き、%CALLNAME:MASTER%の命に従った。

    「お客様のおもてなしも……メイドの務め……ですわね……」

    %CALLNAME:TARGET%は自分に言い聞かせながら、自らの秘所をなぞっている。

    「……あまり見ないでくださいまし」

    %CALLNAME:TARGET%は恥じらいながら、顔を伏せた。

    「……今回だけですわよ……」

    そう言いながらも、%CALLNAME:TARGET%の頬は紅く染まっていた。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%を睨みながら、自らの体に手を伸ばした。

    「お嬢様に報告いたしますからね……」

    %CALLNAME:TARGET%は脅しめいた言葉を口にしながらも、指は秘所を撫でている。

    「っ……」

    声を押し殺しながら、%CALLNAME:TARGET%は自慰を続けた。

    「……満足ですか……これで……」

    %CALLNAME:TARGET%の声には、僅かな動揺が滲んでいた。
  priority: 2
- id: fallback
  content: >-
    「……何をおっしゃっているのですか」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見据えた。

    「自慰を見せろ、と？　正気ですか」

    %CALLNAME:TARGET%の声には、隠しきれない嫌悪が滲んでいる。

    「紅魔館のメイド長に、そのような下品な命令を下すとは……」

    %CALLNAME:TARGET%は冷ややかに笑った。

    「時を止めて、貴方の記憶を消し去ることもできるのですよ」

    「……お引き取りくださいまし」

    「……は？」

    %CALLNAME:TARGET%は信じられないものを見るような目で%CALLNAME:MASTER%を見た。

    「お客様であっても、限度がありますわ」

    %CALLNAME:TARGET%の声は静かだが、有無を言わせぬ威圧感がある。

    「私をどのような女だとお思いですの」

    %CALLNAME:TARGET%は冷たく言い放った。

    「このようなご要望には、お応えいたしかねますわ」

    瀟洒なメイドは、完璧な作り笑いを浮かべている。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%を見つめていた。

    その瞳は氷のように冷たく、感情を窺い知ることができない。

    「お嬢様のお客様でなければ、今すぐ首を刎ねているところですわ」

    %CALLNAME:TARGET%は静かに言い放った。

    「……二度と、そのような言葉を口にしないことですわね」

    %CALLNAME:TARGET%はそう言い残し、背を向けた。

    瀟洒なメイドの怒りは、静かで、そして冷たかった。

    「失礼ですわね」

    %CALLNAME:TARGET%は眉一つ動かさず、%CALLNAME:MASTER%の言葉を切り捨てた。

    「紅魔館に仕えるメイドとして、そのような要求は受けられませんわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を一瞥した。

    「お嬢様への報告は……今回は控えて差し上げますわ」

    %CALLNAME:TARGET%は冷たく告げた。

    「ですが、次はありませんわよ」

    瀟洒なメイドは、無表情のまま%CALLNAME:MASTER%を見据えている。
  priority: 1
