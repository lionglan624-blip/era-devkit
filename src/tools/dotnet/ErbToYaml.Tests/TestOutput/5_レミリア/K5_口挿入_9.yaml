character: レミリア
situation: K5_口挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、私に背中を預けるのね」

    %CALLNAME:人物_レミリア%は四つん這いになった恋人の背後に立った。

    小さな手で%CALLNAME:MASTER%の腰を掴み、ゆっくりと後孔へ押し入れていく。

    「んっ……あなたの中、熱いわ……」

    %CALLNAME:人物_レミリア%は恋人の背中に身を預けながら腰を進めた。

    「こうして後ろから抱くのも……悪くないわね」

    紅魔館の主は、恋人を独占する喜びに紅い瞳を輝かせていた。

    「今日は私が攻める番よ……覚悟しなさい」

    %CALLNAME:人物_レミリア%は妖艶に微笑みながら、恋人の後ろに回り込んだ。

    後背位で深く挿入すると、%CALLNAME:MASTER%の反応を楽しむように見つめた。

    「あら……そんな声を出すのね、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は腰を揺らしながら、恋人の耳元に唇を寄せた。

    「もっと聞かせてちょうだい……あなたの声」

    500年の吸血鬼は、恋人を後ろから支配する悦びに酔いしれていた。

    「%CALLNAME:MASTER%……私だけを感じていなさい」

    %CALLNAME:人物_レミリア%は恋人の背中に覆いかぶさりながら、深く繋がった。

    後ろから抱きしめるこの体勢が、独占欲を満たしてくれる。

    「んっ……あなたの中、私を締め付けてる……」

    %CALLNAME:人物_レミリア%は恋人の肩に顎を乗せた。

    「こうして後ろから抱くと……あなたが私だけのものって実感できるわ」

    紅魔館の主は、恋人を独り占めにする幸福に浸っていた。

    「背中から抱きつくわね……逃がさないわよ」

    %CALLNAME:人物_レミリア%は恋人の腰を引き寄せ、後ろから貫いた。

    小柄な身体からは想像できない力強さで、%CALLNAME:MASTER%を支配する。

    「ふふ……この体勢だと、私が完全に主導権を握れるのよ」

    %CALLNAME:人物_レミリア%は満足げに腰を動かした。

    「%CALLNAME:MASTER%の全部を、私のものにしてあげるわ」

    高貴な吸血鬼は、恋人の背中に甘く噛み付いた。
  priority: 4
- id: talent_3_1
  content: >-
    「こ、こっちから攻めるなんて……恥ずかしいじゃない」

    %CALLNAME:人物_レミリア%は顔を赤らめながらも、%CALLNAME:MASTER%の後ろに立った。

    恋い慕う相手を後ろから貫くことに、複雑な感情が湧き上がる。

    「%CALLNAME:MASTER%……っ、私、こうするのは初めてだから……」

    %CALLNAME:人物_レミリア%はぎこちなく腰を動かし始めた。

    「痛くない……？……痛かったら言いなさいよね」

    紅魔館の主は、恋心と羞恥の狭間で揺れていた。

    「べ、別にあなたを攻めたかったわけじゃないわよ……」

    %CALLNAME:人物_レミリア%はツンとした態度を装いながら、恋人の後ろに回り込んだ。

    後孔にゆっくりと挿入すると、思わず息を呑んだ。

    「……っ、なに、この感覚……%CALLNAME:MASTER%の中、すごい……」

    %CALLNAME:人物_レミリア%は快感に紅い瞳を揺らした。

    「……こ、これは調教の一環なんだから、変な意味じゃないわよ」

    強がりを言いながらも、その頬は紅く染まっていた。

    「後ろから……こうするの、なんか変な感じ……」

    %CALLNAME:人物_レミリア%は恥ずかしそうに視線を逸らしながら、%CALLNAME:MASTER%を貫いた。

    好きな相手を自分から攻めることに、胸が高鳴る。

    「%CALLNAME:MASTER%……私の動き、どう？」

    %CALLNAME:人物_レミリア%はおずおずと尋ねた。

    「……っ、べ、別に感想なんて聞きたくないけど」

    500年の吸血鬼は、恋する乙女のような仕草を見せていた。

    「顔が見えないの……ちょっと寂しいわね」

    %CALLNAME:人物_レミリア%は恋人の背中を見つめながら、後ろから繋がった。

    この体勢だと表情が見えなくて、少し不安になる。

    「%CALLNAME:MASTER%、声を聞かせて……ちゃんと気持ちいい？」

    %CALLNAME:人物_レミリア%は腰を動かしながら、恋人の反応を伺った。

    「……っ、変な意味じゃなくて、その……確認よ、確認」

    紅魔館の主は、素直になれない自分にもどかしさを感じていた。
  priority: 3
  condition:
    type: Talent
    talentType: 3
    threshold: 1
- id: fallback
  content: >-
    「……ふぅん、使用人を後ろから抱くのも悪くないわね」

    %CALLNAME:人物_レミリア%は興味深げに%CALLNAME:MASTER%の背後に立った。

    高慢な態度を崩さぬまま、後孔へとゆっくり挿入していく。

    「ほら……私に抱かれなさい。光栄に思うことね」

    %CALLNAME:人物_レミリア%は威厳を保ちながら腰を動かした。

    「……あなたの反応、なかなか面白いわ」

    紅魔館の主は、使用人を支配する愉悦に浸っていた。

    「この体勢だと、私が完全に主導権を握れるわね」

    %CALLNAME:人物_レミリア%は満足げに微笑み、%CALLNAME:MASTER%の腰を掴んだ。

    後背位で挿入すると、支配者としての快感が湧き上がる。

    「どう？ 私に抱かれる気分は」

    %CALLNAME:人物_レミリア%は傲慢に問いかけた。

    「……ふふ、もっと私を求めなさい」

    500年の吸血鬼は、相手を翻弄することを楽しんでいた。

    「私が攻める側になるのも、たまには良いわね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の背中を見下ろした。

    後ろから貫きながら、相手の反応を観察する。

    「……ほう、そんな声を出すのね」

    %CALLNAME:人物_レミリア%は紅い瞳を細めた。

    「使用人の分際で、なかなかいい反応をするじゃない」

    紅魔館の主は、新しい刺激に心惹かれていた。

    「……背を見せるのは信頼の証よ。感謝しなさい」

    %CALLNAME:人物_レミリア%は高飛車に言いながら、%CALLNAME:MASTER%の後ろに立った。

    後孔に挿入すると、締め付けに小さく息を漏らした。

    「……っ、悪くない感触ね」

    %CALLNAME:人物_レミリア%は腰を動かしながら呟いた。

    「特別に私が相手をしてあげているのよ。光栄に思いなさい」

    吸血鬼は、使用人への興味を隠しながら快感を味わっていた。
  priority: 2
- id: fallback
  content: >-
    「……使用人を後ろから抱くなんて、私の気まぐれよ」

    %CALLNAME:人物_レミリア%は傲慢に言い放ち、%CALLNAME:MASTER%の背後に立った。

    冷たい態度のまま、後孔へと挿入する。

    「ほら、私を受け入れなさい。これは主の命令よ」

    %CALLNAME:人物_レミリア%は感情を込めずに腰を動かした。

    「……早く終わらせるわ。無駄な時間は嫌いなの」

    紅魔館の主は、淡々と義務を果たすように振る舞った。

    「この体勢なら、あなたの顔を見なくて済むわね」

    %CALLNAME:人物_レミリア%は冷淡に呟き、%CALLNAME:MASTER%を後ろから貫いた。

    使用人を支配する快感より、義務感が先に立つ。

    「……ふん、反応が鈍いわね」

    %CALLNAME:人物_レミリア%は退屈そうに腰を動かした。

    「もう少しまともな反応をしなさい」

    500年の吸血鬼は、興味なさげに使用人を抱いていた。

    「後ろから抱くのは……まあ、効率的ではあるわね」

    %CALLNAME:人物_レミリア%は無感動に%CALLNAME:MASTER%の背後に立った。

    淡々と挿入し、機械的に腰を動かし始める。

    「……特に感想はないわ。普通ね」

    %CALLNAME:人物_レミリア%は無表情のまま続けた。

    「早く終わらせて、他の用事に戻りたいの」

    紅魔館の主は、面倒事を片付けるような態度だった。

    「……使用人の調教も、主の仕事のひとつよ」

    %CALLNAME:人物_レミリア%は義務的に%CALLNAME:MASTER%を後ろから抱いた。

    後孔に挿入しても、特に興奮する様子はない。

    「これで十分でしょう。感謝しなさい」

    %CALLNAME:人物_レミリア%は淡々と腰を動かした。

    「次からはもう少しまともな態度で迎えなさいね」

    紅魔館の主は、最後まで高慢な態度を崩さなかった。
  priority: 1
