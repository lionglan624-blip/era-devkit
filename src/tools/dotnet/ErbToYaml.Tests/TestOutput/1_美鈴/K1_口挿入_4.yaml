    「……と、とりあえず……こうやって体を擦り付ければいいんですよね……」

    おそるおそる%CALLNAME:MASTER%に近づき、%CALLNAME:人物_美鈴%は体を押し当てた。

    「……これで合ってます……？」

    「……%CALLNAME:MASTER%のお願いだから……やりますけど……」

