- id: fallback
  content: >-
    「こ、こういうの……するのか？」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、%CALLNAME:MASTER%の胸に顔を近づけた。

    おずおずと乳首に唇を寄せ、軽く触れる。

    「……っ、なんか変な気分だぜ……」

    %CALLNAME:人物_魔理沙%は顔を真っ赤にしながら、乳首を舐めた。

    「……お前がしろって言うなら、やるけどさ……」

    %CALLNAME:人物_魔理沙%は恥ずかしさを隠しながら、ぎこちなく乳首を吸い始めた。

    「……ったく、なんでこんなことしてるんだろうな、私……」

    %CALLNAME:人物_魔理沙%は自問しながらも、乳首を舐める手は止まらない。

    %CALLNAME:MASTER%の反応を見て、%CALLNAME:人物_魔理沙%の頬がさらに赤くなった。

    「……嫌じゃないのが、なんか悔しいぜ……」

    %CALLNAME:人物_魔理沙%は複雑な表情で、乳首を吸い続けた。

    「……一回だけだからな、これ……」

    %CALLNAME:人物_魔理沙%は自分に言い聞かせるように呟いた。

    「……こうすればいいのか？」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の乳首を口に含み、探るように舌を動かした。

    初めての行為に緊張しながらも、%CALLNAME:人物_魔理沙%は真剣だった。

    「……お前、気持ちいいか……？」

    %CALLNAME:人物_魔理沙%は上目遣いで%CALLNAME:MASTER%の反応を確認した。

    「……まあ、喜んでくれるなら……悪くないぜ」

    %CALLNAME:人物_魔理沙%は少し嬉しそうに、乳首を吸い続けた。

    「……なあ、こういうの……普通の友達はしないよな」

    %CALLNAME:人物_魔理沙%は乳首を舐めながら、ふと疑問を口にした。

    二人の関係が変わりつつあることを、%CALLNAME:人物_魔理沙%は感じていた。

    「……まあ、お前となら……別にいいけどさ」

    %CALLNAME:人物_魔理沙%は照れを隠すように、乳首に集中した。

    「……深く考えるのは、やめとくぜ……」

    %CALLNAME:人物_魔理沙%は自分の気持ちに蓋をして、行為に没頭した。
