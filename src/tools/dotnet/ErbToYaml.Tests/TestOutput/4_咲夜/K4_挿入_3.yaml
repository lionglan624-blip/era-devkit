character: 咲夜
situation: K4_挿入
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……後ろから……そちらで……」

    %CALLNAME:TARGET%は四つんばいの姿勢で、恥じらいながら腰を高く上げた。

    「顔が見えないと思うと……少し安心しますわ……」

    %CALLNAME:MASTER%が菊穴に先端を宛てがうと、%CALLNAME:TARGET%は小さく息を呑んだ。

    「んっ……入って……きましたわ……きつい……でも、貴方を感じます……」

    顔を見られない安心感から、%CALLNAME:TARGET%はいつもより甘い声を漏らした。

    「……もっと……奥まで……来てくださいまし……」

    「ふぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は腰を高く上げ、%CALLNAME:MASTER%に後ろを晒していた。

    「後ろから……そこで……なんて……獣みたいですわ……」

    「でも……貴方になら……こんな姿も見せられますの……」

    %CALLNAME:MASTER%が腸内へ深く進入すると、%CALLNAME:TARGET%の体が震えた。

    「あ……んっ……奥が……とろけそう……」

    「瀟洒なんて……今は……忘れてしまいますわ……」

    「……んぅ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%はシーツを握りしめながら、腰を揺らしていた。

    「この体勢……恥ずかしいけれど……すごく感じてしまいますの……」

    %CALLNAME:MASTER%が激しく腰を打ち付けると、%CALLNAME:TARGET%の喘ぎが大きくなる。

    「あっ……そこ……後ろなのに……気持ちいい……」

    「メイドとして……こんな姿……でも、貴方にだけは……」

    %CALLNAME:TARGET%は恋人だけに見せる、淫らな声を上げ続けた。

    「……あ……%CALLNAME:MASTER%、もっと強く……」

    %CALLNAME:TARGET%は自ら腰を後ろに押し付けていた。

    「こんな……はしたない姿……貴方にしか見せられませんわ……」

    「ん……あぁ……後ろなのに……こんなに……」

    %CALLNAME:MASTER%が深く突くと、%CALLNAME:TARGET%は声を抑えられなくなる。

    「全部……貴方のものですわ……この場所も……私も……」

    完璧なメイドは、恋人の後ろから背徳的に乱れていた。
  priority: 4
- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%……後ろから、そちらは……」

    %CALLNAME:TARGET%は四つんばいの姿勢で、恥ずかしそうに顔を伏せた。

    「メイドとして……そのような場所は……」

    しかし、%CALLNAME:MASTER%が菊穴に進入すると、声が漏れてしまう。

    「……っ……きつい……でも……」

    「顔を見られないから……少しだけ……楽ですわ……」

    %CALLNAME:TARGET%は羞恥に顔を赤くしながらも、腰を引かなかった。

    「あ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が腸内を進む感覚に、声を漏らしている。

    「後ろから……そこで……こんな獣のような体勢で……」

    「顔を……見なくていいのが……救いですわ……」

    %CALLNAME:MASTER%の腰が深く沈むと、%CALLNAME:TARGET%の体が震えた。

    「あっ……奥……当たって……変な感じ……」

    「%CALLNAME:MASTER%……もっと……ゆっくり……」

    「……ふぁ……こんな場所で……後ろからなんて……」

    %CALLNAME:TARGET%は自分の反応に戸惑いながらも、%CALLNAME:MASTER%を受け入れている。

    「お嬢様に知られたら……なんて思われるか……」

    言いかけて、%CALLNAME:TARGET%は唇を噛んだ。

    「……いけませんわね、こんなこと考えては……」

    「でも……顔が見えないから……素直に声が出せますわ……」

    葛藤しながらも、%CALLNAME:TARGET%は甘い声を漏らし続けた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は後ろを振り返ろうとして、やめた。

    「このまま……顔を見ないでください……」

    「今……きっと、酷い顔をしていますから……」

    「あ……深い……後ろなのに……」

    「……ん……っ……%CALLNAME:MASTER%……」

    羞恥と背徳感の狭間で、%CALLNAME:TARGET%は甘い声を漏らし続けた。
