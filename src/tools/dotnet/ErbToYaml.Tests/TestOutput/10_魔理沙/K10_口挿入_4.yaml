- id: fallback
  content: >-
    「お、おい……こんなこと、させるなよ……」

    %CALLNAME:人物_魔理沙%は動揺しながらも、泡だらけの体を%CALLNAME:MASTER%に擦り付けさせられた。

    「わ、私にこんなこと……何考えてるんだ……」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、ぎこちなく体を動かした。

    「……ぬるぬるして、変な感じだ……」

    %CALLNAME:人物_魔理沙%は落ち着かない様子で、なんとか状況を受け入れようとしていた。

    「……早く終わらせるぞ……」

    「……何でこんなことになってるんだ」

    %CALLNAME:人物_魔理沙%は理不尽そうに呟きながら、体を擦り付けている。

    「こういうのは……もっと親しくなってからだろ……」

    %CALLNAME:人物_魔理沙%の抗議とは裏腹に、体は止まらなかった。

    「はぁ……仕方ない、やるしかないか……」

    %CALLNAME:人物_魔理沙%は諦めたように、体の動きを続けた。

    「……文句あるなら、後で聞いてやるよ……」

    「……ぬるぬるして、気持ち悪いな」

    %CALLNAME:人物_魔理沙%は無表情を装いながら、%CALLNAME:MASTER%の体に体を擦り付けている。

    「こういうのは経験ないんだから……期待するなよ」

    %CALLNAME:人物_魔理沙%の動きはぎこちなく、慣れていないのが明らかだった。

    「……文句あるなら、他の奴に頼めばいいだろ」

    %CALLNAME:人物_魔理沙%は強がりながらも、体を止めようとはしなかった。

    「……さっさと終わらせるぞ」

