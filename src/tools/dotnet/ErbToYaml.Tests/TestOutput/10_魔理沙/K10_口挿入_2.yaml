- id: fallback
  content: >-
    「え、えっと……こういうの、初めてなんだが……」

    %CALLNAME:人物_魔理沙%は戸惑いながら、%CALLNAME:MASTER%の一物を胸で挟もうとした。

    「本で読んだことはあるけど……私の胸で出来るのか……？」

    %CALLNAME:人物_魔理沙%はおそるおそる胸を寄せ、一物を挟んだ。

    「うわっ……熱い……こういう感触なのか……」

    %CALLNAME:人物_魔理沙%は興味深そうに、ゆっくりと胸を動かし始めた。

    「こうか……？　合ってるのか……？」

    %CALLNAME:人物_魔理沙%は不安そうに%CALLNAME:MASTER%の顔を窺った。

    「私の胸、大きくないから……ちゃんと挟めてるか心配だぜ」

    %CALLNAME:人物_魔理沙%の動きはぎこちないが、真剣だった。

    「んっ……なるほど、こうすると反応するのか……」

    %CALLNAME:人物_魔理沙%は魔法の実験のように、興味津々で胸を動かした。

    「ふーん……こういう感触なのか」

    %CALLNAME:人物_魔理沙%は知的好奇心から、胸の動かし方を工夫した。

    「挟むと硬くなるんだな……不思議なもんだぜ」

    %CALLNAME:人物_魔理沙%は胸を動かしながら、%CALLNAME:MASTER%の反応を見ていた。

    「……なんか、こうしてると私も変な気分になってくるな……」

    %CALLNAME:人物_魔理沙%は自分の体の反応に戸惑っていた。

    「……%CALLNAME:MASTER%、これで合ってるのか？」

    %CALLNAME:人物_魔理沙%は真剣な表情で訊ねた。

    「私、こういうの初めてだから……ちゃんと教えてくれよ」

    %CALLNAME:MASTER%が手を添えて教えると、%CALLNAME:人物_魔理沙%は素直に従った。

    「なるほど……こうやって動かすのか……」

    %CALLNAME:人物_魔理沙%は教わった通りに胸を動かし、真剣に練習していた。
