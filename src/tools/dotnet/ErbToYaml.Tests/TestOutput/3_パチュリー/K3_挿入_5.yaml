- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情のまま、%CALLNAME:MASTER%の上に跨っている。

    「……上で、しかも肛門で？ 変わった趣味ね」

    %CALLNAME:TARGET%は淡々と言い放った。

    「……体力がないし、肛門は痛いから、あまり期待しないで」

    それだけを告げ、%CALLNAME:TARGET%はゆっくりと腰を沈め始めた。

    「……ふぅ……むきゅ……」

    %CALLNAME:TARGET%は溜息をつきながら、形式的に動いている。

    「……疲れるし、痛いわ。二重に辛い体位ね」

    %CALLNAME:TARGET%は事実を述べるように言った。

    「……早く終わらせて。読みかけの本があるの」

    投げやりな態度で、%CALLNAME:TARGET%は最低限の動きを続けた。

    「……むきゅ……体力も、肛門も……」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「……もう動けないわ。後は自分でして」

    %CALLNAME:TARGET%は体の弱さと痛みを訴えた。

    「……こんな難しい体位は、私には無理なのよ」

    冷たい口調で、%CALLNAME:TARGET%は動きを止めた。

    「……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に座ったまま、動こうとしない。

    頭の中では、次に読む本のことを考えているようだ。

    「……終わったら、すぐに大図書館から出て行って」

    %CALLNAME:TARGET%は冷淡に言った。

    「……私は本に戻るから」
  priority: 1
