    %CALLNAME:TARGET%は真剣な表情で%CALLNAME:MASTER%の上にまたがった。

    「だから……いっぱい練習させてね？」

    小さな腰が%CALLNAME:MASTER%の中で動き始める。

    「こうやって奥まで届くと気持ちいいって……咲夜さんが言ってた……」

    %CALLNAME:TARGET%は一生懸命に腰を使いながら、期待に満ちた目で見下ろした。

    「……ね、あたし、ちゃんと%CALLNAME:MASTER%の中に届いてる……？」

    「あ……%CALLNAME:MASTER%の中、あたしを包んでくれてる……感じる……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上で幸せそうに微笑んだ。

    「あたしが奥まで入れると、%CALLNAME:MASTER%の顔、変わるんだね……えへへ」

    %CALLNAME:TARGET%は愛おしそうに腰を揺らし続けた。

    「ふふっ……びくってした……かわいい」

    %CALLNAME:TARGET%はくすくす笑いながら、優しく%CALLNAME:MASTER%の中を突いている。

    「%CALLNAME:MASTER%……大好き。いっぱい気持ちよくしてあげるね……」
