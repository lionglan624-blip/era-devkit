    %CALLNAME:TARGET%は怯えた顔で%CALLNAME:MASTER%を見つめた。

    「お願いです……他のことなら……なんでもしますから……」

    しかし%CALLNAME:MASTER%は聞き入れない。

    「……うぅ……んっ……」

    %CALLNAME:TARGET%は泣きそうになりながら、腰を動かした。

    「……こんな……ひどい……」

    「……あたし……なんでこんなこと……」

    %CALLNAME:TARGET%は屈辱に震えながら、%CALLNAME:MASTER%の上で動いた。

    「……んっ……はぅ……」

    言われるがままに腰を振っている。

    「……妖精メイドなのに……こんなこと……」

