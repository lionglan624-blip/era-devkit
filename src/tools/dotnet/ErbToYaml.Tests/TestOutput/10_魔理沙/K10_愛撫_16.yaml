- id: fallback
  content: >-
    「はぁ？　何でこんなこと私がしなきゃいけないんだ？」

    %CALLNAME:人物_魔理沙%はオナホールを見て顔をしかめた。

    「自分でやれよ……私はお前の道具じゃないぜ」

    %CALLNAME:人物_魔理沙%は明らかに不機嫌な様子だ。

    「……まあ、やれって言うなら、さっさと終わらせるけどな」

    %CALLNAME:人物_魔理沙%は渋々といった様子でオナホールを手に取った。

    「こんな変な道具……どこで手に入れたんだよ」

    %CALLNAME:人物_魔理沙%は呆れた目でオナホールを眺めた。

    「趣味悪いぜ……まあ、やれって言うならやるけどさ」

    嫌々ながらも%CALLNAME:MASTER%に押し当て、雑に動かす。

    「さっさと終われよ……付き合ってらんないぜ」

    %CALLNAME:人物_魔理沙%は溜息をついた。

    「……何で私がこんなことしなきゃいけないんだ」

    %CALLNAME:人物_魔理沙%は不満そうにオナホールを握った。

    「お前、自分でできるだろ……人を巻き込むなよ」

    だが言われるままに、仕方なく手を動かす。

    「チッ……早く終わらせろよな」

    %CALLNAME:人物_魔理沙%は苛立ちを隠さなかった。

    「おい、何でこれを私に渡すんだ」

    %CALLNAME:人物_魔理沙%はオナホールを見て眉を寄せた。

    「そういうのは一人でやるもんだろ……巻き込むなよ」

    渋々と受け取り、ぞんざいに動かし始める。

    「……これでいいんだろ。文句言うなよ」

    %CALLNAME:人物_魔理沙%は冷たい視線を向けた。
