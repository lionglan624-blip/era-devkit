- id: fallback
  content: >-
    「ん……%CALLNAME:MASTER%……上に乗っても、いい？」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の上に跨り、愛おしそうに見下ろした。

    門番として鍛えた太ももが、しっかりと%CALLNAME:MASTER%の腰を挟む。

    「こうしてると……%CALLNAME:MASTER%のこと、守ってるみたいで……好き」

    %CALLNAME:人物_美鈴%はゆっくりと腰を沈め、深く繋がった。

    「……ふふ、私のペースで、気持ちよくしてあげるね」

    武術家らしい柔軟な腰が、優しく動き始めた。

    「あ……ん……この体勢、奥まで入るね……」

    %CALLNAME:人物_美鈴%は甘い吐息を漏らしながら、腰をくねらせた。

    上から見下ろす体勢で、%CALLNAME:MASTER%の表情がよく見える。

    「%CALLNAME:MASTER%の顔……気持ちよさそう……嬉しい」

    %CALLNAME:人物_美鈴%は幸せそうに微笑みながら、腰を揺らし続けた。

    「……もっと、私で幸せになって」

    恋人を喜ばせたい一心で、%CALLNAME:人物_美鈴%は懸命に動いた。

    「はぁ……自分で動くと……角度、変えられるのね……」

    %CALLNAME:人物_美鈴%は腰の角度を調整しながら、最も気持ちいい場所を探った。

    「ここ……すごい……%CALLNAME:MASTER%も、感じてる……？」

    %CALLNAME:人物_美鈴%は潤んだ瞳で%CALLNAME:MASTER%を見下ろした。

    「……私のこと、全部受け止めてくれてる……」

    %CALLNAME:人物_美鈴%は腰を落とし、深く繋がったまま動きを止めた。

    「……このまま、ずっと繋がっていたいな」

    「……ん……%CALLNAME:MASTER%の上、落ち着くわ……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の胸に手をつき、ゆっくりと腰を動かした。

    「いつもは門番として警戒してるけど……こうしてると……」

    %CALLNAME:人物_美鈴%は身を屈め、%CALLNAME:MASTER%の耳元に囁いた。

    「……%CALLNAME:MASTER%のこと、独り占めしてる気分になるの」

    繋がったまま、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%を優しく抱きしめた。

    「……大好きよ、%CALLNAME:MASTER%」
