    搾乳機が装着され、吸引が始まると、%CALLNAME:人物_美鈴%は甘い吐息を漏らす。

    「んっ……吸われてる……乳首が引っ張られて……気持ちいい……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に寄り添い、快感に身を任せた。

    「あら、今日は搾乳機？　ふふっ、%CALLNAME:MASTER%ったら変わった趣味ね」

    %CALLNAME:人物_美鈴%は朗らかに笑いながら、自ら胸元を開いた。

    「……私の胸、そんなに気に入ってるの？　嬉しいわ」

    搾乳機が乳房を包み込み、吸引を始める。

    「あっ……やぁ……吸われるの、恥ずかしい……でも……」

    %CALLNAME:人物_美鈴%は武人としての矜持を忘れ、恋人に甘えていた。

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に身を預け、穏やかに微笑んだ。

    「……%CALLNAME:MASTER%がそれを使いたいなら、好きにして」

    搾乳機が装着され、規則的な吸引が乳首を責め始める。

    「ひぁっ……！　こ、これ……乳首だけじゃなくて、胸全体が……っ」

    %CALLNAME:人物_美鈴%は声を押し殺しながら、恋人の胸に顔を埋めた。

    「……%CALLNAME:MASTER%の前だと、何されても受け入れちゃうわ……」

    「……また新しい道具？　ふふっ、%CALLNAME:MASTER%は本当に私の体が好きなのね」

    %CALLNAME:人物_美鈴%は嬉しそうに頬を染め、恋人を見上げた。

    「いいわよ、思う存分使って。私は%CALLNAME:MASTER%のものだから」

    搾乳機の吸引が始まり、%CALLNAME:人物_美鈴%は息を詰めた。

    「あぁっ……んっ……胸が、吸い上げられて……変な感じ……」

    門番としての威厳はどこへやら、%CALLNAME:人物_美鈴%は恋人に蕩けていた。
