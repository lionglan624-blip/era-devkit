    「んっ……%CALLNAME:MASTER%の声……もっと聞かせてくださいな……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の反応を楽しむように、緩急をつけて愛撫する。

    「私の指……気持ちいい……？　ふふ……正直に言ってくださいませ……」

    「ねえ、%CALLNAME:MASTER%……私、こういうの……好きですわ……」

    %CALLNAME:人物_小悪魔%は蕩けるような目で%CALLNAME:MASTER%を見つめながら、指先を動かした。

    悪魔特有の器用な指が、%CALLNAME:MASTER%の体を丁寧に愛撫していく。

    「%CALLNAME:MASTER%が感じてる顔……たまらなく好きですわ……」

    %CALLNAME:人物_小悪魔%の尻尾がゆらゆらと揺れている。

    「もっと……もっと気持ちよくしてあげますわ……」

    「ふふ……%CALLNAME:MASTER%ったら、こんなに反応して……」

    %CALLNAME:人物_小悪魔%は嬉しそうに笑いながら、%CALLNAME:MASTER%の秘所を撫で続けている。

    時折、意地悪そうに手の動きを止めては、%CALLNAME:MASTER%を焦らす。

    「……ん、もっとしてほしい？　おねだりしてくださいな……」

    %CALLNAME:人物_小悪魔%は悪魔らしい妖艶な笑みを浮かべた。

    「私の手で……%CALLNAME:MASTER%を満足させてあげますわ……」
