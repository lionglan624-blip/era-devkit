  content: >-
    「ひゃっ……！　%CALLNAME:MASTER%……そ、そこは……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を止めようとするが、力が入らない。

    「あっ……んっ……恥ずかしいよぅ……」

    %CALLNAME:TARGET%の頬が赤く染まり、瞳が潤んでいく。

    「……で、でも……嫌じゃ……ないの……」

    それでも、%CALLNAME:TARGET%は%CALLNAME:MASTER%から離れようとはしなかった。

    「んぅっ……あ……胸……触らないで……」

    %CALLNAME:MASTER%の掌が%CALLNAME:TARGET%の胸を優しく揉んでいる。

    「……わたし、変な声……出ちゃうよ……？」

    %CALLNAME:TARGET%は必死に声を堪えながら、%CALLNAME:MASTER%を見つめた。

    「……%CALLNAME:MASTER%が……触りたいなら……我慢、する……」

    %CALLNAME:TARGET%の羽がそわそわと落ち着かなく揺れている。

    「きゃっ……あっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%の体が%CALLNAME:MASTER%の愛撫に小さく震えている。

    「……こんなこと、されたこと……ないの……」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%から目を逸らさない。

    「……でも、%CALLNAME:MASTER%となら……怖くない、かも……」

    小さな羽が期待に震えていた。

    「あぅっ……んっ……そこ……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の胸の先端を指で転がしている。

    %CALLNAME:TARGET%は恥ずかしそうに俯きながら、小さく喘いだ。

    「……%CALLNAME:MASTER%……わたしのこと……どう思ってるの……？」

    %CALLNAME:TARGET%は不安と期待を込めた目で見上げてきた。
