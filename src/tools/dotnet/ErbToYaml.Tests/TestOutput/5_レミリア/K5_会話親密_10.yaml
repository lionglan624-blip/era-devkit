- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%に抱きついた。

    「なっ……！？ い、いきなり何をするの……！？」

    %CALLNAME:TARGET%は驚いて目を見開いたが、振りほどきはしなかった。

    「……抱きつくなんて、身の程知らずね……温かいわね、でも」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%を押し退けようとはしなかった。

    「……今回だけよ。次は作法を弁えなさい」

    そう言いながらも、%CALLNAME:TARGET%の声はどこか嬉しそうだった。

    「……っ！」

    突然の抱擁に、%CALLNAME:TARGET%は一瞬固まった。

    「お、お前……この私に抱きつくなんて……温かい、わね……」

    %CALLNAME:TARGET%は困惑した表情を浮かべながらも、抵抗しなかった。

    「……まあ、紅魔館の主として、部下の甘えを許すのも務めかしら」

    %CALLNAME:TARGET%は威厳を保とうとしながら、そう呟いた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%に近づき、抱きしめた。

    「……っ！ な、何を……」

    %CALLNAME:TARGET%は顔を赤くして、%CALLNAME:MASTER%を睨んだ。

    「使用人のくせに、主人に抱きつくなんて……不敬よ」

    だが、その声には怒りよりも戸惑いが滲んでいた。

    「……はぁ。今回だけ、見逃してあげるわ」

    %CALLNAME:TARGET%は呆れた顔をしながらも、%CALLNAME:MASTER%を押し退けなかった。

    「あら……」

    %CALLNAME:MASTER%が腕を回すと、%CALLNAME:TARGET%は目を瞬かせた。

    「……抱きつきたいの？ 仕方のない子ね」

    %CALLNAME:TARGET%は溜息をつきながらも、抵抗はしなかった。

    「紅魔館の主に触れられるなんて、光栄に思いなさい」

    そう言いながら、%CALLNAME:TARGET%の頬はわずかに染まっていた。

    「……少しだけよ。長いと、咲夜に見られるわ」
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%に抱きつこうとした。

    「……何のつもり？」

    %CALLNAME:TARGET%は冷たい瞳で%CALLNAME:MASTER%を見据えた。

    「この私に抱きつく許可を与えた覚えはないのだけれど」

    「紅魔館の主に馴れ馴れしくするなんて、身の程知らずね」

    %CALLNAME:TARGET%は傲然とそう告げ、距離を取った。

    「……ふぅん？」

    %CALLNAME:MASTER%が近づくと、%CALLNAME:TARGET%は鼻で笑った。

    「使用人が主に抱きつくなんて、礼儀がなっていないわね」

    「500年生きてきて、こんな無礼は久しぶりだわ」

    %CALLNAME:TARGET%は退屈そうに視線を逸らした。

    「……もっと気の利いた奉仕を期待しているわ」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%に腕を伸ばした。

    「やめなさい」

    %CALLNAME:TARGET%は冷ややかな視線で%CALLNAME:MASTER%を制した。

    「紅魔館の主の体に、許可なく触れるなんて……」

    「お前には礼儀というものを教える必要があるようね」

    %CALLNAME:TARGET%は高飛車な態度で%CALLNAME:MASTER%を見下ろした。

    「……何？」

    %CALLNAME:MASTER%が近づくと、%CALLNAME:TARGET%は眉を顰めた。

    「抱きつきたい？ ……図々しいにも程があるわ」

    「私に触れていいのは、咲夜くらいなものよ」

    %CALLNAME:TARGET%は傲然と腕を組み、%CALLNAME:MASTER%を睨んだ。

    「……まず、その無礼な態度を改めなさい」
  priority: 1
