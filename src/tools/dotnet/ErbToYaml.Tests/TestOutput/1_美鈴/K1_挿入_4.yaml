    %CALLNAME:人物_美鈴%は嬉しそうに微笑みながら、自ら腰を動かし続けた。

    「……もっと、私で感じて……」

    恋人を喜ばせたい一心で、%CALLNAME:人物_美鈴%は懸命に腰を振った。

    「はぁ……自分で動くと……角度が、変えられて……」

    %CALLNAME:人物_美鈴%は腰の角度を調整し、最も気持ちいい場所を探った。

    「ここ……すごい……」

    %CALLNAME:人物_美鈴%は声を上げながら、同じ場所を何度も刺激した。

    「……%CALLNAME:MASTER%も、気持ちいい……？」

    潤んだ瞳で%CALLNAME:MASTER%を見つめながら、%CALLNAME:人物_美鈴%は愛の確認を求めた。

    「……私、%CALLNAME:MASTER%のこと、幸せにしたいの……」

    「……ん……%CALLNAME:MASTER%の上、落ち着く……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の上で腰を揺らしながら、幸せそうに微笑んだ。

    「いつもは門番として見張ってるけど……こうしてると……」

    %CALLNAME:人物_美鈴%は身を屈め、%CALLNAME:MASTER%の耳元に囁いた。

    「……%CALLNAME:MASTER%を、守りたくなるの」

    繋がったまま、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%を抱きしめた。

    「……ずっと、このまま……私のものにしてもいい……？」
