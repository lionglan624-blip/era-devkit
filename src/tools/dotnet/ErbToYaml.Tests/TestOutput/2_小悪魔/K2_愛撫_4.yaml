character: 小悪魔
situation: K2_愛撫
entries:
- id: fallback
  content: >-
    「んぅ……%CALLNAME:MASTER%、そこ……舐めてくれるの……？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の前で四つん這いになり、お尻を差し出している。

    %CALLNAME:MASTER%が舌を伸ばすと、小悪魔の淡い桃色の菊穴がひくりと反応した。

    「ひゃうぅ……っ！ 舌……あったかい……」

    %CALLNAME:人物_小悪魔%は甘い吐息を漏らしながら、%CALLNAME:MASTER%の舌を受け入れている。

    「悪魔なのに……こんなところで蕩かされちゃうなんて……」

    %CALLNAME:人物_小悪魔%は恍惚とした表情で、%CALLNAME:MASTER%を振り返った。

    「%CALLNAME:MASTER%……今日は、ここ……いじめてほしいの……」

    %CALLNAME:人物_小悪魔%は自分から臀部を開いて、%CALLNAME:MASTER%を誘っている。

    %CALLNAME:MASTER%が舌でその秘所を舐め上げると、小悪魔は体を震わせた。

    「あっ……んぅ……やぁ……そこ、すごい……っ」

    %CALLNAME:人物_小悪魔%は腰を揺らしながら、%CALLNAME:MASTER%の舌の動きに合わせている。

    「……もっと奥まで……舐めてくださいな……私、%CALLNAME:MASTER%の舌……大好き……」

    %CALLNAME:人物_小悪魔%は悪魔らしい妖艶な笑みを浮かべて、甘えるように言った。

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の後ろに回り込み、菊穴に顔を近づけた。

    「んふふ……%CALLNAME:MASTER%、そんなところを舐めたいんですの……？」

    %CALLNAME:人物_小悪魔%はいたずらっぽく笑いながら、お尻を突き出している。

    %CALLNAME:MASTER%の舌が菊穴を這うと、小悪魔は甘い声を漏らした。

    「あぁっ……んっ……%CALLNAME:MASTER%の舌、いやらしい……」

    「……でも、いいですわ……もっと……私を蕩けさせて……」

    %CALLNAME:人物_小悪魔%は潤んだ瞳で%CALLNAME:MASTER%を見つめ、幸せそうに微笑んだ。

    「あっ……やぁ……そこ、舐められると……頭がぼうっと……」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の菊穴を丁寧に舌で愛撫している。

    %CALLNAME:人物_小悪魔%は腕に顔を埋めながら、甘い喘ぎ声を漏らしている。

    「悪魔だって……こういうの、気持ちいいんですのよ……？」

    「%CALLNAME:MASTER%……もう、止められないですわ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の舌使いに身を任せ、とろけた表情を浮かべた。
  priority: 4
- id: talent_3_1
  content: >-
    「えっ……！ %CALLNAME:MASTER%、そこを……舐めるの……？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の顔がお尻に近づくのを見て、顔を真っ赤に染めた。

    %CALLNAME:MASTER%の舌が菊穴に触れると、小悪魔は小さく悲鳴を上げた。

    「ひゃぅっ……！ や、やぁ……そこは……っ」

    %CALLNAME:人物_小悪魔%は恥ずかしさに顔を伏せながらも、逃げ出そうとはしない。

    「……%CALLNAME:MASTER%……恥ずかしいですわ……でも……止めないで……」

    %CALLNAME:人物_小悪魔%は涙目で振り返り、小さな声でお願いした。

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の菊穴を舌で舐め始めた。

    「あっ……んっ……！ そ、そんなところ……！」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の舌の感触に、体をびくびくと震わせている。

    「%CALLNAME:MASTER%の舌……あったかくて……変な感じ……」

    %CALLNAME:人物_小悪魔%は両手で顔を覆いながらも、お尻を引くことはしなかった。

    「……悪魔なのに……こんなに恥ずかしいなんて……」

    「ひゃっ……！ %CALLNAME:MASTER%……そこは恥ずかしい……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に菊穴を舐められて、甘い声を漏らしている。

    「んぅ……あ……そ、そんなに舐められたら……」

    %CALLNAME:人物_小悪魔%の体が小刻みに震え、お尻が%CALLNAME:MASTER%の顔に押し付けられた。

    「……%CALLNAME:MASTER%……もう、私……おかしくなっちゃいそう……」

    %CALLNAME:人物_小悪魔%は恥じらいながらも、%CALLNAME:MASTER%の舌に身を委ねている。

    「あ……！ そ、そこ、舐めないで……っ」

    %CALLNAME:人物_小悪魔%の言葉とは裏腹に、体は%CALLNAME:MASTER%から逃げようとしない。

    %CALLNAME:MASTER%は構わず舌を這わせ、小悪魔の反応を楽しんでいる。

    「やぁ……んっ……%CALLNAME:MASTER%、いじわる……」

    %CALLNAME:人物_小悪魔%は潤んだ目で%CALLNAME:MASTER%を見つめながら、小さく訴えた。

    「……で、でも……嫌じゃ……ないですわ……」
