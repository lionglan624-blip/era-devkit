- id: fallback
  content: >-
    「……これが、背面座位……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の膝の上に座りながら、興味深そうな目をしている。

    「……本で読んだ通り、後ろから胸を弄れる体位ね……」

    %CALLNAME:TARGET%は冷静を保とうとしているが、頬が上気している。

    「……んっ……結合部が見える……これは、観察しにくいわ……」

    観察者でいるつもりが、羞恥に動揺している。

    「んっ……ふぅ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きを、なんとか分析しようとしている。

    「……興味深いわ。この体位だと、体重を預けられるから楽……」

    %CALLNAME:TARGET%は淡々と言おうとしたが、声が震えた。

    「……なぜ、胸を触られると……むきゅ……集中できない……」

    自分の反応に、%CALLNAME:TARGET%自身が戸惑っている。

    「あ……そこ……っ」

    %CALLNAME:TARGET%は思わず声を漏らし、慌てて口を押さえた。

    「……不覚だわ。後ろから抱かれていると、油断してしまう……」

    %CALLNAME:TARGET%は恥ずかしそうに俯いた。

    「……%CALLNAME:MASTER%、今の声は聞かなかったことにして……」

    そう言いながらも、体は%CALLNAME:MASTER%に預けたままだ。

    「……」

    %CALLNAME:TARGET%は黙って%CALLNAME:MASTER%に背中を預けている。

    研究者として、この体位の特性を記録しておくべきだろう。

    「……%CALLNAME:MASTER%、質問があるわ」

    %CALLNAME:TARGET%は息を整えながら、振り返った。

    「……背面座位を選んだ理由は？　私の胸に興味があるから？」
  priority: 2
- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情のまま、%CALLNAME:MASTER%の膝の上に座っている。

    「……この体位なら、体力は温存できるわね」

    %CALLNAME:TARGET%は淡々と言い放った。

    「……好きにしなさい。支えてもらえるなら楽だから」

    それだけを告げ、%CALLNAME:TARGET%は%CALLNAME:MASTER%に背中を預けた。

    「……ふぅ……」

    %CALLNAME:TARGET%は溜息をつきながら、%CALLNAME:MASTER%の行為を受けている。

    「……後ろからなら顔を見られなくて済むわ」

    %CALLNAME:TARGET%は事実を述べるように言った。

    「……早く終わらせて。読みかけの本があるの」

    投げやりな態度で、%CALLNAME:TARGET%は目を閉じた。

    「……むきゅ……」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「……胸を触らないで。集中できないわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を払おうとした。

    「……こういうことをするなら、もっと配慮が必要よ」

    冷たい口調で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を窘めた。

    「……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に背中を預けながら、興味なさそうにしている。

    頭の中では、次に読む本のことを考えているようだ。

    「……終わったら、すぐに出て行って」

    %CALLNAME:TARGET%は冷淡に言った。

    「……大図書館は、私の聖域なのだから」
  priority: 1
