- id: fallback
  content: >-
    「……何をしているの」

    %CALLNAME:TARGET%は淡々と言うが、声には動揺が混じっている。

    %CALLNAME:MASTER%が秘所に舌を這わせると、%CALLNAME:TARGET%は僅かに身を強張らせた。

    「……そういう行為は、本で十分知っているわ」

    しかしその声は普段より少し高い。

    「……む、むきゅ……」

    思わず漏れた声に、%CALLNAME:TARGET%自身が驚いた顔をした。

    「……止めなさい」

    %CALLNAME:TARGET%は冷静を装って言った。

    だが%CALLNAME:MASTER%が舌を動かし続けると、%CALLNAME:TARGET%の体は正直に反応した。

    「っ……な、何も感じないわ」

    %CALLNAME:TARGET%は虚勢を張るが、頬は紅潮している。

    「……ほ、本当よ……」

    %CALLNAME:TARGET%は自分自身を説得するように呟いた。

    「……理解できないわ」

    %CALLNAME:TARGET%は本を読むふりをしながら言った。

    %CALLNAME:MASTER%の行為を無視しようとしているが、ページをめくる手は震えている。

    「……あなたは何が、したいの……」

    %CALLNAME:MASTER%が敏感な場所を舐めると、%CALLNAME:TARGET%の声が途切れた。

    「っ……」

    %CALLNAME:TARGET%は唇を引き結び、必死に声を堪えている。

    「……%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を睨みつけた。

    「私を何だと思っているの」

    しかし%CALLNAME:MASTER%が舌を這わせると、その視線は揺らいだ。

    「……ん……」

    %CALLNAME:TARGET%は視線を逸らし、小さく息を吐いた。

    「……勝手に、しなさい……」
  priority: 2
- id: fallback
  content: >-
    「……何をするつもり」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見下ろしている。

    「私の許可なく、そんなことをするなんて」

    %CALLNAME:TARGET%の声は硬く、警戒の色が滲んでいる。

    「……まあいいわ。好きにしなさい」

    %CALLNAME:TARGET%は興味を失ったかのように、本に視線を戻した。

    「……下らないわね」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の行為を見て、溜息をついた。

    「獣のような行為に、何の意味があるの」

    %CALLNAME:MASTER%が舌を動かしても、%CALLNAME:TARGET%は無表情を保っている。

    「……ふぅん」

    だがその頬が僅かに紅いのは、気のせいではないだろう。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%を見ている。

    「私には理解できないわ。あなたの行動原理が」

    %CALLNAME:MASTER%が続けると、%CALLNAME:TARGET%は僅かに眉を顰めた。

    「……まあ、観察対象としては、興味深いかもしれないわね」

    %CALLNAME:TARGET%は淡々と呟いた。

    「……止めないわよ」

    %CALLNAME:TARGET%は本から目を離さずに言った。

    「ただし、私の読書を邪魔しないこと」

    %CALLNAME:MASTER%が行為を続けても、%CALLNAME:TARGET%は平静を装っている。

    「……」

    だがページをめくる間隔は、普段より明らかに長かった。
  priority: 1
