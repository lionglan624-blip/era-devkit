    「……っ……吸われて……る……」

    冷淡を装おうとするが、%CALLNAME:TARGET%の体は小さく震えていた。

    「……」

    %CALLNAME:TARGET%は無表情で搾乳機の装着を受けている。

    吸引が続く度に、その表情が微かに歪む。

    「……これで満足……かしら……」

    %CALLNAME:TARGET%は冷めた声で問いかけたが、呼吸が乱れていた。

    「……早く終わらせて……」

    「……むきゅ」

    %CALLNAME:TARGET%は不快そうに眉を寄せたが、その反応は本物だった。

    「……吸引が……乳首から……全身に……」

    搾乳機の刺激が%CALLNAME:TARGET%の冷淡な態度を揺さぶっている。

    「……下品な道具ね……でも……悪くは……ない……かも……」

    %CALLNAME:TARGET%は認めたくないように、視線を逸らした。

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついたが、それは快感を逃がすためだった。

    「……こんなもので……読書の邪魔を……」

    %CALLNAME:TARGET%は呆れた表情を浮かべているが、その体は吸引に反応している。

    「……好きにしなさい……ただし……本を汚さないで……」

