character: 咲夜
situation: K4_会話親密
entries:
- id: fallback
  content: >-
    「……ん……」

    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%の髪を優しく撫でている。

    %CALLNAME:人物_咲夜%は目を閉じて、その感触を味わっていた。

    「……%CALLNAME:MASTER%の手、温かいですわね……」

    %CALLNAME:人物_咲夜%は普段の瀟洒な仮面を外し、甘えるような表情を見せている。

    「お嬢様には内緒ですわよ？ こんな顔、貴方にしか見せませんから……」

    淡く微笑む%CALLNAME:人物_咲夜%の頬は、ほんのりと染まっていた。

    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%の手を取り、指を絡めた。

    「あっ……手を……」

    %CALLNAME:人物_咲夜%は一瞬驚いたように目を見開いたが、すぐに微笑んだ。

    「……ふふ、%CALLNAME:MASTER%は甘えん坊さんですわね」

    %CALLNAME:人物_咲夜%は繋いだ手を見つめながら、%CALLNAME:MASTER%の手を握り返してきた。

    「……このまま、時を止めてしまいたいくらいですわ……」

    %CALLNAME:人物_咲夜%は幸せそうに目を細めている。

    「ひゃっ……耳は、だめですわ……」

    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%の耳元に息を吹きかけた。

    %CALLNAME:人物_咲夜%は体をびくりと震わせ、%CALLNAME:MASTER%にしがみついてきた。

    「……%CALLNAME:MASTER%、そこは……弱いと知っているくせに……」

    %CALLNAME:人物_咲夜%は上気した顔で%CALLNAME:MASTER%を見つめている。その瞳は潤んでいた。

    「……もう。意地悪な方……」

    そう言いながらも、%CALLNAME:人物_咲夜%は%CALLNAME:MASTER%から離れようとしなかった。

    %CALLNAME:MASTER%は後ろから%CALLNAME:人物_咲夜%を抱きしめた。

    「……っ」

    %CALLNAME:人物_咲夜%は一瞬身を強張らせたが、すぐに力を抜いた。

    「……こうしていると、貴方の体温が伝わってきますわ……」

    %CALLNAME:人物_咲夜%は%CALLNAME:MASTER%の腕に手を添え、目を閉じている。

    「……紅魔館は少し冷えますから……貴方がいると、温かいの……」

    珍しく甘えるような声で、%CALLNAME:人物_咲夜%はそう囁いた。
  priority: 4
- id: talent_3_1
  content: >-
    「……ん、髪を……」

    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%の銀髪を指で梳いている。

    %CALLNAME:人物_咲夜%は仕事の手を止めて、その感触を受け入れていた。

    「……別に、嫌ではありませんけど……気が散りますわ」

    %CALLNAME:人物_咲夜%の声は、いつもより少し柔らかくなっている。

    「……続けてもよろしくてよ。お仕事は後で片付けますから……」

    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%の手を取った。

    「えっ……手を……？」

    %CALLNAME:人物_咲夜%は戸惑いながらも、その手を振りほどかなかった。

    「……こういうことをされると、困りますわ」

    %CALLNAME:人物_咲夜%は俯いて、繋いだ手を見つめている。

    「……困るのですけど……離したくないと思ってしまうの……」

    「あっ……肩を……」

    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%の肩に手を置いた。

    %CALLNAME:人物_咲夜%は仕事の手を止め、小さく息を吐いた。

    「……ずっと同じ姿勢でしたから、凝っているのですわ」

    %CALLNAME:MASTER%がそっと肩を揉むと、%CALLNAME:人物_咲夜%は目を閉じた。

    「……んっ……そこ、気持ちいいですわ……」

    %CALLNAME:人物_咲夜%は仕事の最中だった。

    %CALLNAME:MASTER%がそっとその頬に触れると、銀髪のメイドは手を止めた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:人物_咲夜%は戸惑いながらも、その手を払いのけようとはしなかった。

    「……お仕事中なのですけど……」

    そう言いながらも、%CALLNAME:人物_咲夜%は頬を%CALLNAME:MASTER%の手に預けている。

    「……少しだけ、このままでいさせてくださいまし」
