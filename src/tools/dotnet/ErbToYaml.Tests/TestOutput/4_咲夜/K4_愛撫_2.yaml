- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、これは……」

    %CALLNAME:TARGET%は戸惑った様子で%CALLNAME:MASTER%を見上げた。

    「メイドとして、こんなことは……いけないですわ……」

    しかし、完全には拒絶しない。

    「……ただ、お客様のおもてなしも……」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「……今回だけ、ですわよ……」

    「……お嬢様に報告しなければ……」

    そう言いながらも、%CALLNAME:TARGET%は動かない。

    「……でも、まあ……」

    %CALLNAME:TARGET%は小さくため息をついた。

    「……メイドの務めと思えば……」

    おずおずと手を伸ばし、%CALLNAME:TARGET%は%CALLNAME:MASTER%のものに触れた。

    「……これで、満足してくださいまし……」

    「……どうしてこんな……」

    %CALLNAME:TARGET%は困惑した表情を浮かべている。

    「私は紅魔館のメイド長ですのに……」

    それでも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の求めに応じようとしていた。

    「……貴方には、何か……断れないものがありますわね……」

    %CALLNAME:TARGET%は自嘲するように呟いた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は複雑な表情で%CALLNAME:MASTER%を見つめた。

    「このようなことをお望みなら……一度だけですわよ」

    %CALLNAME:TARGET%は静かに膝をついた。

    「……お嬢様には、絶対に秘密にしてくださいまし」

    メイドとしての矜持と、%CALLNAME:MASTER%への好意が葛藤していた。
  priority: 2
- id: fallback
  content: >-
    「……何を考えていらっしゃるの」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見た。

    「紅魔館のメイド長に、このような要求をなさるとは」

    %CALLNAME:TARGET%の手には、いつの間にかナイフが握られている。

    「……お嬢様のお客様でなければ、既に首が落ちていますわ」

    瀟洒なメイドの声は、氷のように冷たかった。

    「……失礼ですわね」

    %CALLNAME:TARGET%は嫌悪感を隠さない。

    「私をどなたとお思いですか」

    「レミリアお嬢様にお仕えする身として、このような侮辱は許せませんわ」

    %CALLNAME:TARGET%は冷ややかに%CALLNAME:MASTER%を睨みつけた。

    「……二度とこのような真似はなさらないことですわね」

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%を見据えた。

    その視線には、軽蔑の色が滲んでいる。

    「時を止めれば、貴方の存在など一瞬で消せますわ」

    静かに、しかし有無を言わせぬ威圧感。

    「……お引き取りを。次はありませんわよ」

    「……正気ですか」

    %CALLNAME:TARGET%は呆れたように首を振った。

    「私に何をお望みか存じませんが、答えはノーですわ」

    完璧なメイドは、完璧な拒絶を示す。

    「お嬢様のお怒りを買う前に、お帰りになることをお勧めしますわ」

    %CALLNAME:TARGET%は踵を返し、%CALLNAME:MASTER%に背を向けた。
  priority: 1
