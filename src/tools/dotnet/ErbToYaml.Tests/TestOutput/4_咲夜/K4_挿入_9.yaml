- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……こんな恥ずかしいこと……」

    %CALLNAME:TARGET%は頬を真っ赤に染めながら、%CALLNAME:MASTER%を見上げた。

    「向かい合ったまま……お尻に……なんて……」

    %CALLNAME:MASTER%がゆっくりと腰を動かすと、%CALLNAME:TARGET%の体が震えた。

    「あっ……ん……奥まで……入って……」

    「……貴方だから……許すんですからね……」

    瀟洒なメイドは、恋人にだけ見せる恥じらいの表情を浮かべていた。

    「ふぁ……%CALLNAME:MASTER%……顔……見ないで……」

    %CALLNAME:TARGET%は両手で顔を覆おうとしたが、%CALLNAME:MASTER%に手を取られた。

    「……こんな顔……恥ずかしいですわ……」

    「お尻で……感じているなんて……知られたく……ないの……」

    %CALLNAME:MASTER%の動きに合わせて、%CALLNAME:TARGET%の喘ぎが甘くなっていく。

    「あっ……んっ……でも……気持ちいい……ですわ……」

    「貴方となら……こんな背徳的なことも……」

    「……んぅ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の首にしがみついた。

    「お嬢様には……絶対に……見せられない姿ですわ……」

    「瀟洒なメイドが……こんなところで……」

    %CALLNAME:MASTER%が深く突き上げると、%CALLNAME:TARGET%は小さく悲鳴を上げた。

    「あああっ……そこ……当たって……」

    「……もっと……貴方のこと……感じさせて……」

    「……あ……%CALLNAME:MASTER%……キス……しながら……」

    %CALLNAME:TARGET%は繋がったまま、%CALLNAME:MASTER%に唇を求めた。

    「んちゅ……ん……こうしていると……恥ずかしさが……紛れますわ……」

    唇を重ねながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を深く受け入れていく。

    「……好き……ですわ……%CALLNAME:MASTER%……」

    「こんな……淫らなこと……貴方とだから……嬉しいの……」

    完璧なメイドは、恋人の腕の中で蕩けた表情を見せていた。
