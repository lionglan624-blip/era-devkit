  content: >-
    「%CALLNAME:MASTER%……ふふっ、ここを舐めてほしいんですの？」

    %CALLNAME:人物_小悪魔%は妖艶な笑みを浮かべながら、%CALLNAME:MASTER%の脚の間に顔を埋めた。

