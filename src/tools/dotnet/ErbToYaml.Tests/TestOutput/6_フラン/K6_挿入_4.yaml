character: フラン
situation: K6_挿入
entries:
- id: fallback
  content: >-
    「ふふ……今日は私が上なのさ」

    %CALLNAME:人物_フラン%は恋人の上に跨ると、嬉しそうに微笑んだ。

    495年の孤独を経て得た、大切な恋人。その身体を見下ろしながら。

    「%CALLNAME:MASTER%のこと、全部見えるのさ……こうしてると」

    ゆっくりと腰を下ろすと、%CALLNAME:人物_フラン%は甘い吐息を漏らした。

    「んっ……あぁ……私が動くと、%CALLNAME:MASTER%の顔が歪むの……すごく嬉しい……」

    悪魔の妹は、恋人を独り占めする幸せを噛みしめていた。

    「%CALLNAME:MASTER%……こうして私が上にいると……」

    %CALLNAME:人物_フラン%は恋人の胸に手を当てながら、感慨深げに呟いた。

    力を抑えて、壊さないように。それでいて離さないように。

    「私のペースで動けるから……壊しちゃう心配がないのさ」

    %CALLNAME:人物_フラン%がゆっくりと腰を揺らすと、二人の身体が深く繋がる。

    「あっ……ん……%CALLNAME:MASTER%が私の中にいる……私が包み込んでる……」

    その言葉には、壊すのではなく守りたいという願いが込められていた。

    「ねぇ、%CALLNAME:MASTER%……動いちゃダメなのさ」

    %CALLNAME:人物_フラン%は恋人を押さえつけながら、真剣な目で見つめた。

    しかしその力加減は、壊さないよう細心の注意が払われている。

    「私が全部、してあげるから……%CALLNAME:MASTER%は感じてるだけでいいの」

    %CALLNAME:人物_フラン%が激しく腰を打ちつけると、恋人の喘ぎ声が響いた。

    「ふぁ……っ！　%CALLNAME:MASTER%の顔……すごく気持ちよさそう……私、嬉しいのさ……」

    恋人に快感を与えられることが、悪魔の妹には何よりの喜びだった。

    「%CALLNAME:MASTER%……私のこと、見て……？」

    %CALLNAME:人物_フラン%は上から恋人を見下ろしながら、甘えるように言った。

    紅い瞳が、愛情と独占欲で潤んでいる。

    「こうしてると……%CALLNAME:MASTER%の全部が私のものって感じがするの」

    %CALLNAME:人物_フラン%が腰を回すように動くと、二人の呼吸が乱れていく。

    「あぁ……ん……私が上だと……%CALLNAME:MASTER%のこと、壊さないで愛せるのさ……」

    495年の孤独を知る少女は、恋人を抱きしめながら涙を浮かべた。
  priority: 4
- id: talent_3_1
  content: >-
    「え……私が上になるの……？」

    %CALLNAME:人物_フラン%は戸惑いながらも、%CALLNAME:MASTER%の上に跨った。

    見下ろす位置から、好きな人の顔がよく見える。

    「……こうすると、%CALLNAME:MASTER%のこと独り占めできるのさ」

    ゆっくりと腰を下ろすと、%CALLNAME:人物_フラン%は声を詰まらせた。

    「んっ……あ……入ってくる……私が動くと、%CALLNAME:MASTER%が……」

    恋心と快感に翻弄されながら、悪魔の妹は腰を揺らし始めた。

    「ふふ……%CALLNAME:MASTER%、今は私の下なのさ」

    %CALLNAME:人物_フラン%は得意げに微笑みながら、腰を動かした。

    普段とは違う立場に、どこか興奮している様子だ。

    「こうしてると……%CALLNAME:MASTER%が他の人のところに行けないって、わかるの」

    %CALLNAME:人物_フラン%が激しく腰を落とすと、%CALLNAME:MASTER%が喘いだ。

    「あっ……ん……%CALLNAME:MASTER%の声……私が出させてるのさ……」

    独占欲と快楽が混じり合い、悪魔の妹を酔わせていた。

    「%CALLNAME:MASTER%……私のこと、下から見てる……？」

    %CALLNAME:人物_フラン%は恥ずかしそうに、それでも嬉しそうに問いかけた。

    好きな人に見つめられながら上で動く、その背徳感に頬を染めて。

    「……ちゃんと私だけを見ててよ。じゃないと……」

    %CALLNAME:人物_フラン%が腰を回すように動くと、二人の身体が密着する。

    「んぅ……あぁ……この体勢、%CALLNAME:MASTER%のこと全部感じられる……」

    恋する気持ちが、快感をさらに増幅させていた。

    「こういう遊び……本で読んだことあるのさ」

    %CALLNAME:人物_フラン%は知識を披露するように言った。

    しかし実際に上に跨ると、顔が羞恥で真っ赤に染まった。

    「でも、実際にするのは……こんなに気持ちいいなんて知らなかった……」

    %CALLNAME:人物_フラン%が自分のペースで腰を動かすと、快感が押し寄せてくる。

    「んっ……！　やだ……頭、ぼうっとする……%CALLNAME:MASTER%のせいなのさ……」

    想像を超える感覚に、悪魔の妹は翻弄されていた。
  priority: 3
  condition:
