    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%の秘所に顔を近づけた。

    「……んっ……舌で……舐めれば……いいのね……」

    %CALLNAME:TARGET%はぎこちなく舌を伸ばした。

    「……本で読んだことはあるけれど……実際にするのは……」

    %CALLNAME:TARGET%は恥ずかしそうに目を伏せながら、舌を動かし始めた。

    「……あ……こうするの……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を窺いながら舌を這わせた。

    「……私が……こんなことをするなんて……」

    %CALLNAME:TARGET%は恥ずかしそうに顔を赤らめた。

    「……でも……嫌じゃないの……むきゅ……」

    %CALLNAME:TARGET%は小さく呟きながら奉仕を続けた。

    「……んっ……もっとこう……した方がいい……？」

    %CALLNAME:TARGET%は恥ずかしげに確認した。

    「……あなたに奉仕していると思うと……」

    %CALLNAME:TARGET%は複雑な表情を浮かべた。

    「……嬉しいような……恥ずかしいような……」

    %CALLNAME:TARGET%は正直な気持ちを漏らしながら舌を動かした。

    「……ぁ……こんなに見られながら……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の視線を感じて身をよじった。

    「……私の舌……上手……？」

    %CALLNAME:TARGET%は恐る恐る聞いた。

    「……むきゅ……聞かなければよかった……」

    %CALLNAME:TARGET%は自分の発言に赤面しながらも、奉仕を止めなかった。
