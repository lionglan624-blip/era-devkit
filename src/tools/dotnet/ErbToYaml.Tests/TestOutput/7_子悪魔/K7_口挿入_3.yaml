    「……気持ちよくなって、くれたら……嬉しいな……」

    「は、恥ずかしいよぅ……でも……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、%CALLNAME:MASTER%の上に跨った。

    「%CALLNAME:MASTER%が気持ちよくなるなら……あたし、頑張る……」

    小さな太ももが%CALLNAME:MASTER%のものを挟み、ゆっくりと動き出す。

    「……んっ……ぬるっとしてきた……これ、気持ちいいってこと……？」

    %CALLNAME:TARGET%は先走りの感触に驚きながらも、腰を止めなかった。

    「……%CALLNAME:MASTER%……あたしのこと、好き……？」

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は上目遣いに%CALLNAME:MASTER%を見つめた。

    「あたし……%CALLNAME:MASTER%のこと、好きだから……」

    恥ずかしそうに俯きながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨った。

    「だから……足で、させて……ね……？」

    小さな太ももがたどたどしく動き、%CALLNAME:MASTER%に快感を与えようと頑張っている。

    %CALLNAME:TARGET%は真剣な表情で、%CALLNAME:MASTER%の反応を見守っていた。
