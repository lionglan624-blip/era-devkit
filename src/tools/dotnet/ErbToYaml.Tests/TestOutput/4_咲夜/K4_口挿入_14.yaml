- id: talent_3_1
  content: >-
    「……%CALLNAME:MASTER%……後ろから……いいですか……？」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%の背後に立った。

    「こんな大胆なこと……私がするなんて……」

    しかし、%CALLNAME:TARGET%はゆっくりと%CALLNAME:MASTER%の中に入っていく。

    「……っ……あ……入って……」

    「%CALLNAME:MASTER%……熱い……」

    %CALLNAME:TARGET%は顔を赤らめながら、%CALLNAME:MASTER%を抱きしめた。

    「……ん……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腰を掴み、ゆっくりと動いた。

    「こうして抱いていると……貴方のことが……もっと好きになりますわ……」

    「あ……気持ちいい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中に顔を埋めた。

    「……恥ずかしいけれど……もっと感じて欲しい……」

    羞恥と喜びが入り混じった表情で、%CALLNAME:TARGET%は腰を揺らし続けた。

    「……ふぁ……%CALLNAME:MASTER%の中……」

    %CALLNAME:TARGET%は快感に声を漏らしながら、%CALLNAME:MASTER%を抱いている。

    「私が……こんなに積極的になるなんて……」

    「で、でも……止められないの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腰を引き寄せ、深く繋がった。

    「……ん……っ……%CALLNAME:MASTER%……」

    戸惑いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%を求めていた。

    「……%CALLNAME:MASTER%……見ないで……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が振り向こうとするのを止めた。

    「今……きっとすごい顔してますから……」

    「あ……んっ……でも……気持ちいい……」

    %CALLNAME:TARGET%は恥ずかしさを隠しながら、腰を動かし続けた。

    「……%CALLNAME:MASTER%……好き……」

    小さな声で告白しながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を抱きしめた。
