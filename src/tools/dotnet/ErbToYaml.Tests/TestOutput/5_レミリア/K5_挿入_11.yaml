- id: fallback
  content: >-
    「……二人同時？ 随分と大胆な提案ね」

    %CALLNAME:人物_レミリア%は興味深げに二人を見た。

    「まあいいわ。試してみましょう」

    二つの熱が同時に%CALLNAME:人物_レミリア%に入っていく。

    「っ……あ……っ！ 思ったより……きつい……っ」

    %CALLNAME:人物_レミリア%は予想外の快感に目を見開いた。

    「……これは……なかなか……興味深い経験ね……っ」

    500年の吸血鬼は、冷静を装いながらも動揺していた。

    「……ほう、二穴挿しというやつね」

    %CALLNAME:人物_レミリア%は値踏みするように二人を見た。

    「どれ、付き合ってあげましょう」

    前後から同時に貫かれ、%CALLNAME:人物_レミリア%は息を詰めた。

    「っ……くぅ……これは……っ、思ったより……」

    %CALLNAME:人物_レミリア%は眉をひそめた。

    「……ふぅん……悪くはないかもしれないわね……っ」

    その声には、認めたくない快感が滲んでいた。

    「……使用人二人がかりで主を攻めるとはね」

    %CALLNAME:人物_レミリア%は溜息をついた。

    「今日は気まぐれで付き合ってあげるわ」

    二つの熱が同時に%CALLNAME:人物_レミリア%を貫いた。

    「っ……あぁ……っ！ 両方同時は……っ、きつい……」

    %CALLNAME:人物_レミリア%は二人の肩を掴んだ。

    「……次はもっと上手くやりなさい……っ」

    紅魔館の主は、動揺を隠そうとしていた。

    「……ふぅん、そういう趣向なのね」

    %CALLNAME:人物_レミリア%は腕を組みながら二人を見た。

    「まあ、退屈しのぎに付き合ってあげるわ」

    前後から挟まれ、二つの熱が同時に入ってきた。

    「っ……んっ……これは……なかなか……っ」

    %CALLNAME:人物_レミリア%は表情を押し殺した。

    「……まあ、及第点ね……精進しなさい……っ」

    吸血鬼の心に、何かが芽生え始めていた。
  priority: 2
- id: fallback
  content: >-
    「……二人がかりで私を攻めようと？ 身の程知らずね」

    %CALLNAME:人物_レミリア%は冷たい視線で二人を睨んだ。

    「ふん……まあいいわ。後悔するのはあなたたちよ」

    二つの熱が同時に%CALLNAME:人物_レミリア%を貫いた。

    「っ……痛……っ、下手くそ共め……」

    %CALLNAME:人物_レミリア%は苛立たしげに二人を睨んだ。

    「……その程度で私を堕とせると思うな」

    紅魔館の主は、高慢な態度を崩さなかった。

    「……使用人二人がかりとは、随分な舐め方ね」

    %CALLNAME:人物_レミリア%は不敵に微笑んだ。

    「いいわ、付き合ってあげる。感謝しなさい」

    前後から同時に挿入され、%CALLNAME:人物_レミリア%は眉をひそめた。

    「……っ、痛い……もっと上手くできないの……」

    %CALLNAME:人物_レミリア%は二人を鋭く睨んだ。

    「……こんな程度で私を悦ばせられると思うな」

    500年の吸血鬼は、痛みを怒りに変えていた。

    「……ほう、二穴挿し？ 変わった趣味ね」

    %CALLNAME:人物_レミリア%は興味なさそうに二人を見た。

    「私の体を使えるだけ光栄に思いなさい」

    二つの熱が同時に%CALLNAME:人物_レミリア%を貫いた。

    「……っ、くぅ……痛いじゃない……」

    %CALLNAME:人物_レミリア%は苛立ちを隠さなかった。

    「……もっと丁寧にしなさい。私を誰だと思っているの」

    威厳を保ちながら、吸血鬼は不快感を露わにした。

    「……今日は気まぐれで付き合ってあげているのよ？」

    %CALLNAME:人物_レミリア%は高飛車に言い放った。

    「……感謝しなさい」

    前後から同時に貫かれ、%CALLNAME:人物_レミリア%は声を漏らした。

    「っ……あぁ……痛……っ、下手ね二人とも……」

    %CALLNAME:人物_レミリア%は二人を睨みつけた。

    「……次はもっとましな技を見せなさい」

    紅魔館の主は、最後まで支配者の態度を崩さなかった。
  priority: 1
