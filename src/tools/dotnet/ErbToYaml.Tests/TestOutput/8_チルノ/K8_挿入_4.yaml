character: チルノ
situation: K8_挿入
entries:
- id: fallback
  content: >-
    「えへへ、今日はあたいが上だよ、%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は得意げに%CALLNAME:MASTER%の上に跨っている。

    ゆっくりと腰を落とすと、%CALLNAME:人物_チルノ%は甘い声を漏らした。

    「んっ……全部入った……こうしてると、%CALLNAME:MASTER%があたいのものって感じ」

    %CALLNAME:人物_チルノ%は嬉しそうに腰を揺らし始めた。

    「ほら、動かないでね……あたいが全部してあげるから」

    「見てて%CALLNAME:MASTER%、あたいの動き、すごいでしょ？」

    %CALLNAME:人物_チルノ%は上に跨り、自信満々に腰を振っている。

    小さな体が上下するたびに、二人の繋がりが深くなる。

    「はぁっ……ん……こうやって%CALLNAME:MASTER%を独り占め……最高……」

    %CALLNAME:人物_チルノ%は熱っぽい息を吐きながら、%CALLNAME:MASTER%を見下ろした。

    「あたいが一番……%CALLNAME:MASTER%をこんなにできるの、あたいだけだよね」

    「%CALLNAME:MASTER%、気持ちいい？　あたいが頑張ってるんだから、褒めてよね」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上で腰を動かしながら問いかけた。

    氷の妖精とは思えないほど、その体は熱を帯びている。

    「んあっ……あ……奥に当たって……すごい……」

    %CALLNAME:人物_チルノ%は自分でペースを調整しながら、快感に身を震わせた。

    「あたいのもの……%CALLNAME:MASTER%は……えへへ」

    「……ね、%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上に跨ったまま、少し照れた顔をした。

    「こうしてると……あたいが%CALLNAME:MASTER%を守ってる気分になるの」

    ゆっくりと腰を揺らしながら、%CALLNAME:人物_チルノ%は微笑んだ。

    「んっ……はぁ……好き……あたい、本当に%CALLNAME:MASTER%のこと好き」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の胸に手を置いて、幸せそうに動き続けた。
  priority: 4
- id: talent_3_1
  content: >-
    「べ、別にあたいが上になりたかったわけじゃないし……」

    %CALLNAME:人物_チルノ%は真っ赤な顔で%CALLNAME:MASTER%の上に跨った。

    ゆっくりと腰を落とすと、甘い声が漏れてしまう。

    「んっ……こ、こうすれば自分のペースでできるから……それだけ……」

    %CALLNAME:人物_チルノ%はぎこちなく腰を動かし始めた。

    「……見ないでよ、上からだと全部見えちゃうじゃん……」

    「ちょ……こ、この体勢恥ずかしいんだけど……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上に跨り、顔を赤くしていた。

    しかし腰は止まらず、ゆっくりと上下している。

    「んあっ……っ、自分で動くと……すごい……変な感じ……」

    %CALLNAME:人物_チルノ%は恥ずかしさを隠すように目を閉じた。

    「……っ、笑ったら凍らせるからね……」

    「はぁっ……あ……自分で動くと、どこに当たるかわかって……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上で腰を揺らしながら声を漏らした。

    上に乗っているのに、顔は%CALLNAME:MASTER%より赤い。

    「んっ……や……こんな声、出したくないのに……」

    %CALLNAME:人物_チルノ%は必死に声を堪えようとしていた。

    「……っ、あんたのせいだからね、こんなの……」

    「……%CALLNAME:MASTER%、あんまり下から見上げないで」

    %CALLNAME:人物_チルノ%は恥ずかしそうに%CALLNAME:MASTER%を睨んだ。

    しかし腰の動きは止めず、ゆっくりと繋がりを感じている。

    「んっ……はぁ……こうしてると……あたいが全部決められるから……」

    %CALLNAME:人物_チルノ%は少しだけ安心した表情を見せた。

    「……べ、別に嫌いじゃないけど……恥ずかしいのは恥ずかしいから……」
