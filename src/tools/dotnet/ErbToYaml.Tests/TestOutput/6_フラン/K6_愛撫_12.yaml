character: フラン
situation: K6_愛撫
entries:
- id: fallback
  content: >-
    「なんかブルブルしてるのさ……これ、何？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にある小さな玩具を興味深そうに見つめた。

    ローターの振動音が、静かな部屋に響いている。

    「私にも使ってみて！」

    %CALLNAME:MASTER%がローターを押し当てると、%CALLNAME:人物_フラン%は小さく身を震わせた。

    「ひゃっ……！　ふふ、くすぐったいのさ……でも、気持ちいい」

    %CALLNAME:人物_フラン%は恋人に身を預け、その心地よい振動に酔いしれていた。

    「震えるやつ好きかもしれないのさ……」

    %CALLNAME:人物_フラン%はローターの振動を感じながら、蕩けるような声を漏らした。

    495年の孤独を知る少女は、今は恋人の腕の中で快楽に浸っている。

    「もっと……もっと強くしてもいいよ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見上げて甘えるように言った。

    「私、%CALLNAME:MASTER%となら壊れたりしないから」

    その言葉には、深い信頼と愛情が込められていた。

    「お姉様の宝石みたいに綺麗だね……」

    %CALLNAME:人物_フラン%はローターを手に取り、キラキラした目で眺めた。

    ピンク色の小さな玩具が、振動しながら光を反射している。

    「ねぇ、%CALLNAME:MASTER%……ここに当てて？」

    %CALLNAME:MASTER%がローターを動かすと、%CALLNAME:人物_フラン%は甘い声を漏らした。

    「んっ……あっ……綺麗で気持ちいいなんて、最高なのさ」

    %CALLNAME:人物_フラン%は無邪気に笑いながら、恋人に身を寄せた。

    「きゅっとすると壊れちゃうかな……？」

    %CALLNAME:人物_フラン%はローターを指先で突きながら、不思議そうに呟いた。

    「でも壊したくないな……%CALLNAME:MASTER%がくれたものだから」

    %CALLNAME:MASTER%がローターを押し当てると、%CALLNAME:人物_フラン%は頬を染めた。

    「あっ……ふぁっ……これ、すごいのさ……」

    %CALLNAME:人物_フラン%は快感に翻弄されながらも、幸せそうに笑っていた。

    「壊さないように大事にするから……もっとしてほしいの」
  priority: 4
- id: talent_3_1
  content: >-
    「お、おもちゃ……？　何それ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つローターを警戒するように見た。

    しかし、その紅い瞳には好奇心も宿っている。

    「……まあ、%CALLNAME:MASTER%がするなら……いいけど」

    振動が伝わると、%CALLNAME:人物_フラン%は驚いて目を見開いた。

    「ひゃぁっ！？　な、なにこれっ……！　すごく……変な感じなのさ……」

    初めての感覚に戸惑いながらも、%CALLNAME:人物_フラン%は逃げようとはしなかった。

    「ば、馬鹿なのさ……変なもの持ってきて……」

    %CALLNAME:人物_フラン%は顔を背けながら、ローターの振動を感じていた。

    「やっ……%CALLNAME:MASTER%……急にそんな……」

    %CALLNAME:人物_フラン%は頬を赤らめながら、%CALLNAME:MASTER%をちらりと見つめた。

    「……でも、嫌じゃないのさ」

    素直になれない悪魔の妹は、そっぽを向きながらそう呟いた。

    その声は、期待を隠しきれていなかった。

    「また変なもの持ってきて……」

    %CALLNAME:人物_フラン%は呆れたように言いながらも、目はローターに釘付けだった。

    「こんなの……知らないのさ……体が、変になっちゃう……」

    %CALLNAME:人物_フラン%は困惑しながらも、%CALLNAME:MASTER%の手を払いのけようとはしなかった。

    「……%CALLNAME:MASTER%は、私をからかってるの？」

    その問いかけには、不安と期待が入り混じっていた。

    「……もう少しだけ……してもいいのさ」

    「気持ちよくなるやつ……なんでしょ……」

    %CALLNAME:人物_フラン%はローターを見て、恥ずかしそうに呟いた。

    「%CALLNAME:MASTER%……私、こんな気持ち……よくわからない」

    %CALLNAME:人物_フラン%は自分の体の反応を不思議そうに見つめた。

    「……でも、%CALLNAME:MASTER%がしてくれるなら……」

    %CALLNAME:人物_フラン%は小さく頷いた。

    その紅い瞳は、%CALLNAME:MASTER%への密かな想いを映していた。
  priority: 3
