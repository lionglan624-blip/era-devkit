- id: fallback
  content: >-
    「なにそれ?　変な機械ね」

    %CALLNAME:TARGET%は見慣れない器具を不思議そうに見つめた。

    「あたいの胸に?　……何がしたいのよ」

    好奇心と警戒心が入り混じった表情を浮かべる。

    「……まあいいわ、最強のあたいには何やっても無駄よ!」

    %CALLNAME:TARGET%は偉そうに言いながら、胸を差し出した。

    「さっさと終わらせなさいよね」

    「ひゃっ!?　吸い付いてきた!」

    %CALLNAME:TARGET%は予想外の感覚に驚いた。

    「な、なによこれ……ぞわぞわする……」

    初めての刺激に、表情がくるくると変わる。

    「……%CALLNAME:MASTER%、何が面白いのよ」

    不思議そうに首を傾げながらも、振り払おうとはしない。

    「あたいの胸で遊ぶなんて……変なの」

    「ねぇ、これって何のためにあるの?」

    %CALLNAME:TARGET%は怪訝そうに搾乳機を眺めた。

    「あたいの胸を吸って……何がしたいのよ」

    説明されても、いまいちピンときていない様子だ。

    「……んっ、なんか変な感じ……」

    %CALLNAME:TARGET%は困惑しながらも、刺激を受け入れていた。

    「あたいは最強だから、こんなの平気なんだからね」

    「また?　この前もやったじゃない」

    %CALLNAME:TARGET%は覚えているらしく、呆れ顔だ。

    「%CALLNAME:MASTER%、あたいの胸好きなの?」

    少し慣れた様子で、大人しく装着を受け入れる。

    「んぅ……やっぱり、変な気持ちになるわね……」

    %CALLNAME:TARGET%は不思議そうに自分の反応を見つめた。

    「……なんでだろ、%CALLNAME:MASTER%にされると……嫌じゃない」
  priority: 2
- id: fallback
  content: >-
    「はぁ!?　何よそれ、気持ち悪いわね!」

    %CALLNAME:TARGET%は嫌悪感を隠さずに搾乳機を見つめた。

    「あたいの胸にそんなの付ける気!?　冗談じゃないわよ!」

    威勢よく言い放ちながら、%CALLNAME:TARGET%は腕で胸を隠した。

    「最強のあたいがそんな変態行為に付き合うわけないでしょ!」

    明らかに不機嫌そうに、%CALLNAME:TARGET%は睨みつけた。

    「どっか他所でやりなさいよね、変態!」

    「ちょっと!　何するのよ!」

    %CALLNAME:TARGET%は抗議の声を上げた。

    「あたいの胸を吸うとか、変態じゃないの!?」

    不満げに翅をぱたつかせている。

    「最強のあたいに、こんな変なことするなんて……」

    %CALLNAME:TARGET%は文句を言いながらも、抵抗できずにいた。

    「……さっさと外しなさいよね!」

    「これって何なのよ……見るからに気持ち悪い……」

    %CALLNAME:TARGET%は搾乳機を胡散臭げに見つめた。

    「あたいの胸にこんなの……何考えてるのよ」

    説明を聞いて、さらに顔をしかめる。

    「……はぁ、しょうがないわね、最強のあたいが我慢してあげるわよ」

    渋々受け入れながらも、%CALLNAME:TARGET%は明らかに不本意だった。

    「あんたって本当に変な趣味してるわね」

    「また!?　またこれやるの!?」

    %CALLNAME:TARGET%は呆れた顔で言った。

    「あんた、本当にあたいの胸好きなのね、変態」

    文句を言いながらも、諦めた様子で胸を差し出す。

    「……さっさと終わらせなさいよ」

    乱暴にため息をつきながら、%CALLNAME:TARGET%は耐えていた。

    「最強のあたいを、こんなことに使うなんて……許さないんだから」
  priority: 1
