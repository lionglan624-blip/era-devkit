- id: fallback
  content: >-
    「えっ……む、胸ですか？」

    %CALLNAME:人物_美鈴%は突然の愛撫に、目を丸くしている。

    「あの、%CALLNAME:MASTER%……こういうのは、ちょっと……」

    %CALLNAME:人物_美鈴%は困惑した表情で、%CALLNAME:MASTER%の手を見つめた。

    しかし、強く払いのけることはできないでいる。

    「……まだ、そういう関係じゃないと思うんですけど……」

    %CALLNAME:人物_美鈴%は困ったように眉を下げた。

    「ひゃっ……！」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の手が胸に触れた瞬間、小さく飛び上がった。

    「%CALLNAME:MASTER%、い、いきなりは……」

    %CALLNAME:人物_美鈴%は顔を赤くしながら、%CALLNAME:MASTER%を見た。

    「……嫌ってわけじゃ、ないんですけど……」

    %CALLNAME:人物_美鈴%は言葉を濁しながら、視線を逸らした。

    「もう少し、心の準備が……」

    「あ、あの……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に胸を触られ、どうしていいかわからない様子だ。

    「……%CALLNAME:MASTER%って、意外と大胆なんですね」

    %CALLNAME:人物_美鈴%は照れ隠しのように笑った。

    「でも、こういうのは……もう少し仲良くなってからの方が……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の手を、そっと押し返そうとした。

    「……だめ、ですか？」

    「む……胸……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の行動に、硬直している。

    「%CALLNAME:MASTER%……これは、どういうつもりで……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の真意を測りかねている様子だ。

    「……私のこと、からかってるんですか？」

    少し傷ついたような表情で、%CALLNAME:人物_美鈴%は問いかけた。

    「……本気なら、言葉で言ってほしいんですけど」
  priority: 2
- id: fallback
  content: >-
    「ちょっ……何するんですか！？」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の手を強く払いのけた。

    「いきなり胸に触るなんて……非常識にも程があります！」

    %CALLNAME:人物_美鈴%は怒りを露わにしながら、%CALLNAME:MASTER%を睨みつけた。

    「……私をなんだと思ってるんですか」

    %CALLNAME:人物_美鈴%は警戒の姿勢をとった。

    「次やったら、本気で怒りますよ」

    「……！」

    %CALLNAME:人物_美鈴%は咄嗟に後ろに飛び退いた。

    「%CALLNAME:MASTER%……今、何をしようとしましたか」

    %CALLNAME:人物_美鈴%は冷たい目で%CALLNAME:MASTER%を見据えている。

    「私は門番です。お客様を通すかどうかを判断するのが仕事であって……」

    %CALLNAME:人物_美鈴%は一息ついてから、続けた。

    「……そういうことをされる筋合いは、ありません」

    「やめてください」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の手首を掴んで止めた。

    門番として鍛えた握力に、%CALLNAME:MASTER%は動きを止めざるを得なかった。

    「……%CALLNAME:MASTER%、私たちはまだ、そういう関係ではありません」

    %CALLNAME:人物_美鈴%は真剣な表情で%CALLNAME:MASTER%を見つめた。

    「順序というものを、守っていただけませんか」

    %CALLNAME:人物_美鈴%は静かに、しかし毅然と言った。

    「……」

    %CALLNAME:人物_美鈴%は無言で%CALLNAME:MASTER%の手を払った。

    その目には、失望の色が浮かんでいる。

    「%CALLNAME:MASTER%……私、あなたのことを少し見直していたんですけど」

    %CALLNAME:人物_美鈴%は悲しそうに首を振った。

    「……こういうことをする人だったんですね」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%から距離を取り、背を向けた。
  priority: 1
