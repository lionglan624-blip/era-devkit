- id: fallback
  content: >-
    「……っ！ %CALLNAME:MASTER%……こんなことを……」

    %CALLNAME:TARGET%は驚いて手を止めかけた。

    「そのような場所を……触れと……？」

    しかし、完全に拒絶することはできなかった。

    「……お、お客様のご要望であれば……」

    %CALLNAME:TARGET%はおずおずと指を伸ばした。

    その頬は僅かに赤く染まっていた。

    「……これは……メイドの仕事では……」

    %CALLNAME:TARGET%は困惑しながらも、%CALLNAME:MASTER%のために手を動かした。

    %CALLNAME:TARGET%の指が、ぎこちなく%CALLNAME:MASTER%の秘所を撫でる。

    「こ、こうで……よろしいのでしょうか……」

    「……何とも言えない……気分ですわ……」

    「でも……続けろと仰るなら……」

    動揺を隠しながら、%CALLNAME:TARGET%は奉仕を続けた。

    「……こんなこと……初めてですわ……」

    %CALLNAME:TARGET%は複雑な表情を浮かべている。

    「紅魔館のメイドとして……想定外の……」

    %CALLNAME:TARGET%の指が、恐る恐る%CALLNAME:MASTER%の秘所を探る。

    「……っ……不思議な感触ですわ……」

    「嫌というわけでは……ありませんけれど……」

    %CALLNAME:TARGET%は言葉を濁しながら、指を動かし続けた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%を見つめた。

    「どうして……こんなことを……」

    問いかけながらも、%CALLNAME:TARGET%の手は止まらなかった。

    「……分かっていますわ……」

    「私は……ただ……ご奉仕すれば良いのでしょう……」

    %CALLNAME:TARGET%は諦めとも覚悟ともつかない表情で指を動かした。
