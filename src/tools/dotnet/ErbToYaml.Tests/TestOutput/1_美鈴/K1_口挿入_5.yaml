  content: >-
    「――%CALLNAME:MASTER%……足で、してあげる……」

    %CALLNAME:人物_美鈴%は妖艶に微笑んで、%CALLNAME:MASTER%の前に腰を下ろした。

    しなやかな脚を伸ばし、%CALLNAME:人物_美鈴%は一物に足裏を押し当てた。

    「……ふふ、硬い……私のせいかしら……」

    %CALLNAME:人物_美鈴%は足の指を器用に動かして、亀頭を弄り始めた。

    「……気持ちいい？　もっと踏んであげようか……変態さん……」

    武術家の鍛えられた足が、一物を丹念に愛撫し続けた。

    「……ねえ、%CALLNAME:MASTER%……こういうの、好きなんでしょ……？」

    %CALLNAME:人物_美鈴%は悪戯っぽく笑いながら、両足で一物を挟み込んだ。

    「……ふふ、脈打ってる……私の足で、こんなになるなんて……」

    足裏でぐりぐりと擦り上げ、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の反応を楽しんだ。

    「……もっと気持ちよくしてあげる……ほら、こうすると……」

    %CALLNAME:人物_美鈴%は足の指で鈴口をつついて、笑みを深めた。

    「……可愛い……%CALLNAME:MASTER%のこんな顔、私だけのものね……」

    「……%CALLNAME:MASTER%の、こんなに熱くなって……」

    %CALLNAME:人物_美鈴%は足裏に伝わる熱に、うっとりと目を細めた。

    「……私の足、そんなに好き……？　嬉しい……」

    %CALLNAME:人物_美鈴%は足を上下に動かして、一物を扱き始めた。

    「……ん……力加減、どう……？　強い方がいい……？」

    武術家らしく力強く、しかし愛情を込めて%CALLNAME:人物_美鈴%は足を動かした。

    「……たくさん出していいからね……全部、私の足で受け止めるから……」

    「――私の足、%CALLNAME:MASTER%専用よ……」

    %CALLNAME:人物_美鈴%は愛を込めて囁きながら、足裏で一物を包み込んだ。

    「……他の誰にも、こんなことしないから……」

    %CALLNAME:人物_美鈴%は足の指を絡めて、亀頭から根元まで丁寧に擦り上げた。

    「……ふふ、%CALLNAME:MASTER%の顔、とろけそう……」

    %CALLNAME:人物_美鈴%は嬉しそうに笑いながら、動きを速めた。

    「……このまま……いっぱい出して……私の足に、全部ちょうだい……」
