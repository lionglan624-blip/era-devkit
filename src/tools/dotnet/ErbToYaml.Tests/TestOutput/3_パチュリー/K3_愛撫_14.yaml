    %CALLNAME:MASTER%がキャップを陰核に被せると、%CALLNAME:TARGET%は小さく悲鳴を上げた。

    「……ひゃっ……振動が……直に……くる……」

    %CALLNAME:TARGET%は恥ずかしさに顔を覆いながらも、%CALLNAME:MASTER%を拒まなかった。

    「……やぁ……そこ……直接は……恥ずかしい……」

    クリキャップが陰核を包み込み、振動が%CALLNAME:TARGET%の体を揺さぶっている。

    「……む、むきゅ……こんなの……集中できないわ……」

    %CALLNAME:TARGET%は手元の本を閉じ、快感に耐えている。

    「……%CALLNAME:MASTER%……見ないで……今の私……変よ……」

    %CALLNAME:TARGET%は羞恥に震えながらも、キャップを外そうとはしなかった。

    「……っ……あ……」

    %CALLNAME:TARGET%はクリキャップの刺激に、言葉を失っていた。

    陰核への直接的な振動は、知識では説明できない快感を与えてくる。

    「……こんな……刺激……本には……載ってなかったわ……」

    %CALLNAME:TARGET%の体がびくりと跳ね、大図書館に甘い喘ぎが響いた。

    「……%CALLNAME:MASTER%……もう少し……弱くして……」

    そう懇願しながらも、%CALLNAME:TARGET%の瞳は潤んでいた。

    「……ん……ぁ……だめ……」

    クリキャップの振動が強まり、%CALLNAME:TARGET%の体が大きく震えた。

    「……圧迫されて……逃げられない……直接……くる……」

    %CALLNAME:TARGET%は分析しようとするが、頭が真っ白になっていく。

    「……こんなところで……小悪魔に見られたら……」

    %CALLNAME:TARGET%は羞恥と快感の狭間で、%CALLNAME:MASTER%にしがみついた。
