- id: fallback
  content: >-
    「……私に乳首を吸わせたいの？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を冷静に観察している。

    「……人間の性行動に関する実地調査、ということにしておくわ」

    %CALLNAME:TARGET%は自分を納得させるように言いながら、%CALLNAME:MASTER%の胸に唇を寄せた。

    「……ちゅ……ふむ、これが乳首の味……」

    %CALLNAME:TARGET%は実験するように、乳首を舌で転がした。

    「……はむ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の乳首を吸いながら、興味深そうに見つめている。

    「……興味深いわね。吸う側にも快感があるなんて」

    %CALLNAME:TARGET%は自分の体の反応を分析するような目で考えている。

    「……もう少し、調べさせてもらうわ」

    そう言って、%CALLNAME:TARGET%は実験を続けるように吸い続けた。

    「……れろ……ちゅぷ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の乳首を舐めながら、まるで実験を行うように観察している。

    「……乳首への刺激が快感神経に作用する……文献通りね」

    %CALLNAME:TARGET%は淡々と呟いたが、その唇は乳首から離れようとしない。

    「……理論と実践は違うわね。データ収集は継続するわ」

    「……ん……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の乳首を吸いながら、怪訝そうな顔をした。

    「……なぜか、やめたくならないわね」

    %CALLNAME:TARGET%は観察するような目で%CALLNAME:MASTER%を見つめた。

    「……まあ、私も嫌いじゃないわ。研究対象としては最適ね」

    %CALLNAME:TARGET%はぼそりと呟きながら、吸い続けた。
