  content: >-
    「……何をするつもりかしら」

    %CALLNAME:人物_レミリア%は警戒するように%CALLNAME:MASTER%を見た。

    %CALLNAME:MASTER%の指がそこに触れると、

    「っ……そ、そこは……」

    %CALLNAME:人物_レミリア%は小さく身を震わせた。

    「……ふん、使用人の分際で……」

    そう言いながらも、%CALLNAME:人物_レミリア%は強く拒否しなかった。

    「……今日は機嫌がいいから、許してあげるわ」

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は複雑な表情で%CALLNAME:MASTER%を見つめた。

    %CALLNAME:MASTER%の指がゆっくりと入っていくと、

    「んっ……」

    %CALLNAME:人物_レミリア%は小さく声を漏らし、慌てて口を押さえた。

    「……聞かなかったことにしなさい」

    頬を染めた%CALLNAME:人物_レミリア%は、威厳を保とうと必死だった。

    「……随分と大胆ね」

    %CALLNAME:人物_レミリア%は挑発的な笑みを浮かべた。

    だが%CALLNAME:MASTER%の指が中を動き始めると、

    「……っ」

    その笑みが一瞬、歪んだ。

    「……悪くはないわね」

    命令口調だが、その声には微かな期待が混じっていた。

