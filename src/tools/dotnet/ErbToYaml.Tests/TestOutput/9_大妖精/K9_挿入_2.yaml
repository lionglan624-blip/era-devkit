    「痛いけど……%CALLNAME:MASTER%と一緒だと……幸せ、なの……」

    「えへへ……後ろでするの、まだ慣れないけど……」

    %CALLNAME:人物_大妖精%は照れくさそうに笑いながら、%CALLNAME:MASTER%を受け入れる体勢になった。

    「あっ……入って……きつくて、苦しい……」

