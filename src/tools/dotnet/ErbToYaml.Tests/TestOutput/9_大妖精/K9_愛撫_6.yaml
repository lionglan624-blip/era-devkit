  content: >-
    「んっ……%CALLNAME:MASTER%……胸、触りたいの……？」

    %CALLNAME:人物_大妖精%は恥ずかしそうに微笑みながら、%CALLNAME:MASTER%の手を自分の胸へと導いた。

