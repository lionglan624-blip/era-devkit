- id: fallback
  content: >-
    「……%CALLNAME:MASTER%？」

    %CALLNAME:TARGET%は冷静な表情のまま振り返った。

    「お嬢様のメイドに、何をなさっているのかしら？」

    その言葉に棘はないが、どこか困惑したような色が滲んでいる。

    「……あまり、困らせないでくださいまし」

    「……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を静かに見下ろした。

    「大胆ですわね、%CALLNAME:MASTER%。瀟洒とは言い難い行為ですわ」

    そう言いながらも、%CALLNAME:TARGET%はすぐには離れなかった。

    「……今回だけ、見逃して差し上げますわ」

    「……何のつもりですか？」

    %CALLNAME:TARGET%は僅かに眉を顰めた。

    「私は紅魔館のメイド長。こうした行為は……」

    言葉が途切れる。%CALLNAME:TARGET%の頬が僅かに赤らんでいた。

    「……とにかく、お控えくださいまし」

    「……っ」

    %CALLNAME:TARGET%は小さく息を呑んだ。

    「%CALLNAME:MASTER%、そのような行為はメイドに対する礼儀を欠いておりますわ」

    注意しながらも、%CALLNAME:TARGET%の声には厳しさが薄かった。

    「……今は仕事中ですの。後にしてくださいまし」
  priority: 2
- id: fallback
  content: >-
    「……何をなさっているのですか？」

    %CALLNAME:TARGET%は時を止めるまでもなく、優雅に距離を取った。

    「私はお嬢様のメイドですわ。軽率な行動は控えていただけますか？」

    %CALLNAME:TARGET%は冷たい視線を向けながら、再び仕事に戻った。

    「……失礼ですわね」

    %CALLNAME:TARGET%は眉一つ動かさず、%CALLNAME:MASTER%の手を払った。

    「そのような無作法、お嬢様がお知りになれば……」

    言外に脅しを含ませながら、%CALLNAME:TARGET%は静かに背を向けた。

    「……」

    無言で時が止まる。次の瞬間、%CALLNAME:TARGET%は数歩離れた場所にいた。

    「瀟洒なメイドは、野蛮な行為には応じませんの」

    冷ややかな視線が%CALLNAME:MASTER%を射抜いた。

    「お手をお引きくださいまし」

    %CALLNAME:TARGET%は事務的な口調で告げた。

    「このようなことをされる謂れは、私にはございませんわ」

    そう言って、%CALLNAME:TARGET%は何事もなかったかのように仕事を続けた。
  priority: 1
