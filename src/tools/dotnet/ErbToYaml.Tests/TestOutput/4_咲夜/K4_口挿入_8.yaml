entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……私が……こうするのですね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に身を乗せ、腰を進めた。

    「んっ……入りましたわ……貴方の中……熱い……」

    正常位という体勢で、%CALLNAME:TARGET%は%CALLNAME:MASTER%の奥を感じ取っていた。

    「……貴方を……喜ばせたいの……」

    %CALLNAME:TARGET%は瞳を潤ませながら、ゆっくりと腰を動かし始めた。

    「……こんな形で繋がれるなんて……幸せですわ……」

    「ふぁ……%CALLNAME:MASTER%……締め付けないで……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応に頬を染めている。

    「貴方の中……気持ちいい……ですわ……」

    愛する人を見つめながら、%CALLNAME:TARGET%は腰を揺らし続けた。

    「あっ……んっ……もっと……奥まで……」

    「貴方を……全部……感じたいの……」

    瀟洒なメイドは、恋人のために主導権を握っていた。

    「……んぅ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は恍惚とした表情で%CALLNAME:MASTER%を見つめている。

    「こんなこと……メイドとして失格ですわね……」

    しかし、その声には後悔の色はなかった。

    「でも……貴方のためなら……何でもしますわ……」

    %CALLNAME:TARGET%は腰の動きを強め、%CALLNAME:MASTER%の奥を突いた。

    「あ……貴方の中……素敵……」

    「……%CALLNAME:MASTER%……キス……させてくださいまし……」

    %CALLNAME:TARGET%は繋がったまま、唇を重ねた。

    「んちゅ……ん……」

    唇を離すと、%CALLNAME:TARGET%は腰を深く押し込んだ。

    「……こうしていると……時を止めたくなりますわ……」

    「貴方と……ずっと繋がっていたい……」

    完璧なメイドは、恋人のために全てを捧げていた。
