- id: fallback
  content: >-
    「いやです……そんなの、何に使うんですか……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したアナルバイブを見て、後ずさりした。

    「……えっ、お、お尻に入れる……？　いやっ……！」

    しかし逃げ場がなく、アナルバイブが菊座に押し当てられてしまう。

    「ひゃあっ……！？　やっ、やめて……入ってきて……抜けない……！」

    アナルバイブが肛門に挿入され振動が始まり、%CALLNAME:TARGET%は涙目になって%CALLNAME:MASTER%に懇願した。

    「……咲夜さん、助けて……お尻の中から……体、変になっちゃう……」

    「な、何ですかそれ……近づけないでください……！」

    %CALLNAME:TARGET%は恐怖で体を強張らせている。

    「……そんなの……お尻に入れる……？　いやです……！」

    しかし%CALLNAME:MASTER%に押さえつけられ、アナルバイブが肛門に挿入されてしまう。

    「やっ……んっ……！？　な、何これ……お尻の中で……振動して……！」

    %CALLNAME:TARGET%は初めての感覚にパニックになりながら、涙を溢れさせた。

    「お願いです……抜いて……お尻の中から……ずっと刺激されて……」

    「……っ」

    %CALLNAME:TARGET%はアナルバイブを見て、言葉も出ないほど怯えていた。

    声を上げる間もなく、アナルバイブが肛門に挿入される。

    「ひぁっ……！　んっ……やっ……お尻の中に、何か……入ってる……！」

    妖精の小さな体が、腸壁を蹂躙する振動に翻弄されている。

    「……どうして……こんなところに……こんなもの……」

    %CALLNAME:TARGET%は理解できないまま、逃げられない快楽に震えていた。

    「あたし……何か悪いことしましたか……」

    %CALLNAME:TARGET%は泣きそうな顔で%CALLNAME:MASTER%を見上げた。

    「こんな……お尻に……」

    アナルバイブが肛門に挿入され、妖精の体が大きく跳ねる。

    「んっ……あぁっ……！　お尻の中で……振動して……逃げられない……！」

    %CALLNAME:TARGET%は抵抗する力も失い、腸壁を揺さぶる快楽に蹂躙されている。

    「……もう……どうにでも、してください……」
