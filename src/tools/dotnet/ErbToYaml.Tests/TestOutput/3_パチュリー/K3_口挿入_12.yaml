- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……ここを、舐めればいいのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の秘所に顔を近づけた。

    本で読んだ知識はあるが、実践するのは初めてだ。

    「……こう……すれば……いいのかしら……」

    %CALLNAME:TARGET%の舌が恐る恐る%CALLNAME:MASTER%の敏感な場所を舐めた。

    「……むきゅ……本とは、違う感触ね……」

    %CALLNAME:TARGET%は学者らしく感想を呟きながら、舌を動かし続けた。

    「……あなたのために……こうするのは、嫌じゃないわ……」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%の股間に口づけた。

    大図書館の静寂の中で、小さな水音が響く。

    「……ここが、敏感なの……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を観察しながら舌を這わせた。

    「……あなたの体を知れて……嬉しいわ……」

    %CALLNAME:TARGET%は頬を染めながら、奉仕を続けた。

    「……もっと……舌を深く入れて欲しい……？」

    %CALLNAME:TARGET%は珍しく積極的に問いかけた。

    普段は本に埋もれている知識の魔女が、愛する人のために舌を動かしている。

    「……んっ……私の舌で……気持ちいい……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の表情を見上げた。

    「……愛しているから……こんなこと、してあげるのよ……」

    %CALLNAME:TARGET%は恥ずかしそうに告白した。

    「……ふふ……反応が、よくわかるわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の体の変化を感じ取っていた。

    「……ここを……こうすると……」

    %CALLNAME:TARGET%の舌が丁寧に秘所を愛撫する。

    「……むきゅ……あなたの味……覚えたわ……」

    %CALLNAME:TARGET%は恥ずかしさを隠すように呟いた。

    「……これからも……させてくれる……？」
