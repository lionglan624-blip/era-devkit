character: パチュリー
situation: K3_挿入
entries:
- id: fallback
  content: >-
    「……んっ……そこは、後ろから……」

    %CALLNAME:TARGET%は四つんばいになりながら、肛門への挿入を受け入れた。

    大図書館の床に手をつき、獣のような姿勢で背徳的な行為に身を委ねる。

    「……あ……狭い……顔が見えないのは、少し寂しいけれど……」

    %CALLNAME:TARGET%は異物感に息を詰まらせながらも、%CALLNAME:MASTER%を拒まない。

    「……あなたなら、どんな姿勢でも、信じられるから……」

    「はぁ……ん……っ……深い……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに合わせて、小さく喘いでいる。

    本の山に囲まれた空間で、後ろから肛門を犯される背徳感。

    「……%CALLNAME:MASTER%、腰を支えて……体力がないから……むきゅ……」

    %CALLNAME:TARGET%は甘えるように頼んだ。

    「……後ろからでも、あなたの温もりは感じられるわ……」

    「ぁ……やぁ……そこ、奥まで……」

    %CALLNAME:TARGET%は珍しく乱れた声を上げた。

    後背位での肛門挿入は、普段とは違う角度で刺激を与える。

    「……本で読んだ知識では、この体位は……んっ……」

    %CALLNAME:TARGET%は理論的に説明しようとして、感覚に負けた。

    「……もう、考えるのは後……あなたに全部、任せるわ……」

    「……ふぅ……あ……」

    %CALLNAME:TARGET%は床に伏せるようにしながら、%CALLNAME:MASTER%を受け入れている。

    「……この姿勢、体力的には楽なのよ。支えてもらえるから」

    %CALLNAME:TARGET%は照れ隠しのように言った。

    「……肛門は、まだ慣れないけれど……悪くないわ……」

    そう呟いて、%CALLNAME:TARGET%は%CALLNAME:MASTER%に身を預けた。
  priority: 4
- id: talent_3_1
  content: >-
    「……っ……そこは、違う場所……しかも、後ろから……」

    %CALLNAME:TARGET%は四つんばいになりながら、顔を真っ赤にしている。

    「……顔が見えないのは、こんな恥ずかしい行為では……助かるわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に背を向けたまま、息を整えている。

    「……あっ……入って……きた……狭い……むきゅ……」

    %CALLNAME:TARGET%は異物感と羞恥に、シーツを握りしめた。

    「んっ……ふ……痛い……でも……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに、体を震わせている。

    「……まるで、獣みたい……肛門で、こんな姿勢で……」

    %CALLNAME:TARGET%は恥ずかしさに頬を染めながらも、身を委ねている。

    「……本では、この体位は深く入ると書いてあったけれど……」

    知識と実感の差に、%CALLNAME:TARGET%は言葉を失った。

    「あ……やぁ……そこ……奥……っ」

    %CALLNAME:TARGET%は思わず声を漏らし、慌てて顔を伏せた。

    「……こんな恥ずかしい行為で、声を上げるなんて……」

    %CALLNAME:TARGET%は知識として理解していたが、羞恥は想像以上だった。

    「……せめて、顔が見えなくて……よかった……」

    安堵と羞恥が混じった声で、%CALLNAME:TARGET%は呟いた。

    「……ん……ぁ……」

    %CALLNAME:TARGET%は黙って%CALLNAME:MASTER%を受け入れている。

    四つんばいで肛門を犯される姿勢は、二重の羞恥を与える。

    「……%CALLNAME:MASTER%、激しくしないで……体が弱いから……」

    %CALLNAME:TARGET%は小さな声で頼んだ。

    「……でも……もう少しだけ……続けてもいいわ……」
