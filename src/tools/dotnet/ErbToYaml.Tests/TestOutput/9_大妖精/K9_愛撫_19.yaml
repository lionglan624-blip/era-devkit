    %CALLNAME:人物_大妖精%は%CALLNAME:MASTER%にすがりつき、翅がばたばたと動いた。

    「……大好き……だから……全部、見せてあげるね……」

    快感に溺れながら、%CALLNAME:人物_大妖精%は愛を囁いた。

    「……ひっ……！　胸が……すごくびりびりする……」

    %CALLNAME:人物_大妖精%は搾乳機の吸引に体を震わせた。

    乳房全体が器具に包まれ、快感がさらに増幅される。

