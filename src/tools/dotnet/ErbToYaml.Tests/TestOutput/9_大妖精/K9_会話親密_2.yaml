- id: fallback
  content: >-
    「……手？ 握りたいの…？」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の手に触れようとした。

    %CALLNAME:TARGET%は少し戸惑った表情を浮かべている。

    「……えっと、いいですけど…恥ずかしいの…」

    おずおずと手を差し出す%CALLNAME:TARGET%。

    「……あったかいですね、%CALLNAME:MASTER%さんの手…」

    %CALLNAME:TARGET%は緊張しながらも、その温もりを感じていた。

    「……何するんですか…？」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の髪に触れた。

    %CALLNAME:TARGET%は困惑した表情で%CALLNAME:MASTER%を見つめている。

    「……髪に興味があるんですか？ 変なの…」

    されるがままに髪を撫でられながら、%CALLNAME:TARGET%は小首を傾げた。

    「……でも、嫌じゃないです…」

    %CALLNAME:TARGET%は少しずつ緊張を解いていく。

    「……あの、%CALLNAME:MASTER%さん…？」

    %CALLNAME:MASTER%が肩に手を置くと、%CALLNAME:TARGET%は身を強張らせた。

    背中の羽がピクリと動いている。

    「……こういうの、あんまり慣れてなくて…」

    「……でも、%CALLNAME:MASTER%さんだから…いい、です…」

    %CALLNAME:TARGET%は恥ずかしそうに俯きながら、小さく頷いた。

    「……ありがとうございます…触ってくれて…」

    「……え、頬を…？」

    %CALLNAME:MASTER%が手を伸ばすと、%CALLNAME:TARGET%は一瞬たじろいだ。

    「……あの、くすぐったいですよ…？」

    それでも%CALLNAME:TARGET%は逃げなかった。

    %CALLNAME:MASTER%の手のひらが、%CALLNAME:TARGET%の柔らかな頬に触れる。

    「……あったかい…です…」

    %CALLNAME:TARGET%は照れながらも、その温もりを受け入れた。
  priority: 2
- id: fallback
  content: >-
    「……あの、何をするんですか…？」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%に触れようとすると、

    %CALLNAME:TARGET%は緑色の瞳を不安そうに揺らしてこちらを見つめた。

    「触りたいの…？ わたしを…？」

    「……わたし、こういうの、慣れてなくて…」

    %CALLNAME:TARGET%は困惑した様子で、そわそわと羽を動かしている。

    「……えっと…」

    %CALLNAME:MASTER%が近づくと、%CALLNAME:TARGET%は遠慮がちにこちらを見た。

    「あの、もう少し仲良くなってから…じゃダメですか…？」

    「急にこういうの…恥ずかしいの…」

    %CALLNAME:TARGET%は困ったように眉を下げた。

    「……ごめんなさい、わたし、臆病で…」

    「……あ、あの…」

    %CALLNAME:MASTER%が手を伸ばすと、%CALLNAME:TARGET%は小さく身を引いた。

    背中の羽が緊張でピンと張っている。

    「……わたし、人間の人とあまり接したことがなくて…」

    「チルノちゃんなら平気だと思うけど…わたしは…」

    %CALLNAME:TARGET%は申し訳なさそうに俯いた。

    「……ごめんなさい、緊張しちゃって…」

    「……え、触るの…？」

    %CALLNAME:MASTER%が近づくと、%CALLNAME:TARGET%は戸惑った顔になった。

    「あの…わたし、普通の妖精だから…特別なことなんて…」

    %CALLNAME:TARGET%は困った様子で%CALLNAME:MASTER%を見つめている。

    「……どうして、わたしなんかに…？」

    「……変なの…でも、嫌…ではないです…」

    %CALLNAME:TARGET%は複雑な表情で、そっと視線を逸らした。
  priority: 1
