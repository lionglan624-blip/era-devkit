character: チルノ
situation: K8_愛撫
entries:
- id: fallback
  content: >-
    「――ひゃっ!?　な、なにこれ、すっごいブルブルする!」

    %CALLNAME:TARGET%は電動マッサージャの振動に目を丸くした。

    「こ、こんなの初めて……っ、で、でもあたいったら最強だから、余裕よ!」

    強がりながらも、頬が赤く染まっていく。

    「……んっ、%CALLNAME:MASTER%、もうちょっと……ゆっくり……」

    恋人に甘えるように、%CALLNAME:TARGET%は小さな声でお願いした。

    「――へへん、こんなのくらい、あたいには効かないわよ!」

    %CALLNAME:TARGET%は得意げに胸を張ってみせた。

    しかし電動マッサージャの振動が強まると、

    「ひゃあっ!?　ちょ、ちょっと待って……っ!」

    「……う、うそ、なんでこんなに気持ちいいの……っ」

    最強の氷精は、恋人の前で無防備に蕩けていく。

    「――ねぇねぇ、%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は期待に目を輝かせている。

    「あの震えるやつ、また使ってくれるの?　あたい、あれ好きなのよ!」

    電動マッサージャのスイッチが入ると、

    「んんっ……っ、やっぱりすごい……これ最強ね……」

    恋人の腕の中で、%CALLNAME:TARGET%は幸せそうに身を委ねた。

    「――ひゃんっ!?　いきなり強くしないでよ!」

    %CALLNAME:TARGET%は抗議するも、その声は上擦っている。

    「で、でも……%CALLNAME:MASTER%がやってくれるなら……許してあげるわ」

    電動マッサージャの振動に身を震わせながら、

    「……あたいね、%CALLNAME:MASTER%と一緒だと、最強に気持ちいいの」

    照れくさそうに呟いて、%CALLNAME:TARGET%は恋人にしがみついた。
  priority: 4
- id: talent_3_1
  content: >-
    「――っ!?　な、なによこれ、震えてる!」

    %CALLNAME:TARGET%は電動マッサージャの振動に驚いた。

    「こ、こんなのであたいが……っ、ふぁっ!?」

    予想以上の刺激に、思わず声が漏れる。

    「……%CALLNAME:MASTER%、見ないでよ……恥ずかしいじゃない……」

    普段の威勢のよさはどこへやら、%CALLNAME:TARGET%は顔を赤らめた。

    「――へ、へぇ、これがマッサージャってやつね!」

    %CALLNAME:TARGET%は強がって笑ってみせたが、

    振動が身体に伝わると、表情が蕩けていく。

    「あっ……ちょっと……これ、すごい……っ」

    「%CALLNAME:MASTER%の前でこんな……やだ、恥ずかしい……」

    %CALLNAME:TARGET%は両手で顔を覆ってしまった。

    「――わ、わかってるわよ!　あたいだって最強なんだから!」

    電動マッサージャを怖がるなんてない、と%CALLNAME:TARGET%は胸を張った。

    しかしスイッチが入った途端、

    「ひぁっ!?　う、うそ……っ、こんなの……っ」

    「%CALLNAME:MASTER%……あたい、なんか変になっちゃう……」

    好きな人の前で乱れてしまう自分が、恥ずかしくてたまらない。

    「――え、ええっ!?　また使うの!?」

    %CALLNAME:TARGET%は期待と不安が入り混じった表情を浮かべた。

    電動マッサージャが肌に触れると、甘い声が漏れる。

    「んっ……っ、だ、だめ……声、出ちゃう……」

    「%CALLNAME:MASTER%に……こんな声、聞かれたくないのに……」

    そう言いながらも、%CALLNAME:TARGET%は逃げようとしなかった。
  priority: 3
  condition:
