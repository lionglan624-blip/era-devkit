- id: fallback
  content: >-
    「……これも……特別なサービスですわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見下ろしながら、その上に跨った。

    「お客様を……おもてなしするのは……メイドの務め……」

    自ら腰を下ろし、%CALLNAME:TARGET%は%CALLNAME:MASTER%を受け入れた。

    「……っ……ん……入りましたわ……」

    「私がリードした方が……効率的でしょう……」

    %CALLNAME:TARGET%は事務的に言いながらも、頬を染めていた。

    「……%CALLNAME:MASTER%、じっとしていてくださいまし……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上でゆっくりと腰を動かした。

    「こうすれば……私のペースで進められますわ……」

    「仕事の効率化……そう、これは仕事……」

    しかし、%CALLNAME:TARGET%の声は次第に甘くなっていく。

    「あ……んっ……少し……感じてしまいますわね……」

    「%CALLNAME:MASTER%のせいですからね……」

    「……ふぅ……これは……業務の一環ですわ……」

    %CALLNAME:TARGET%は何度も自分に言い聞かせている。

    「上から……貴方を見下ろしていると……」

    「なぜか……優越感を感じてしまいますわね……」

    %CALLNAME:TARGET%は自ら腰を打ち付けながら、%CALLNAME:MASTER%を見つめた。

    「あ……深い……変な気分……」

    「……もう少し……サービスを続けますわ……」

    「……っ……」

    %CALLNAME:TARGET%は声を堪えようとしたが、漏れてしまう。

    「……自分から動いていると……止まらなくなりますわ……」

    「%CALLNAME:MASTER%、貴方が私を困らせるから……」

    恨めしそうに言いながらも、%CALLNAME:TARGET%の腰は激しくなる。

    「あ……んっ……仕事なのに……こんなに……」

    瀟洒なメイドは、言い訳しながらも快楽に身を委ねていた。
