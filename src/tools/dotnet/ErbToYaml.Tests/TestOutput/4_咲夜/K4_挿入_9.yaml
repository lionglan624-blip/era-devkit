- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は険しい表情で%CALLNAME:MASTER%を睨んでいる。

    「向かい合ったまま……後ろを犯すなど……最悪の趣味ですわね」

    瀟洒なメイドは、屈辱に耐えながらも感情を押し殺していた。

    「……っ……」

    「……早く済ませてくださいまし」

    %CALLNAME:TARGET%の声には、抑えきれない怒りが滲んでいた。

    「……ふぅ……」

    %CALLNAME:TARGET%は小さく息を吐いた。

    「お尻でお相手するなど……これ以上の屈辱はありませんわ」

    「しかも……顔を見られながら……」

    %CALLNAME:MASTER%が動いても、%CALLNAME:TARGET%は表情を崩さないよう努めている。

    「……っ……感じてなど……いませんわ」

    完璧なメイドは、あくまでプロフェッショナルを貫こうとしていた。

    「……これは屈辱です」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見た。

    「メイドとして……後ろを犯されるなど……」

    「……っ」

    一瞬、%CALLNAME:TARGET%の表情が歪んだが、すぐに戻る。

    「……何でもありませんわ」

    冷静さを取り繕いながら、%CALLNAME:TARGET%は耐え続けた。

    「……貴方には何も感じませんわ」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見た。

    「私はメイド。貴方はお客様。それ以上でも以下でもありません」

    「たとえ……後ろを……犯されようとも……」

    「……んっ……」

    僅かに声が漏れ、%CALLNAME:TARGET%は唇を噛んだ。

    「……何も……感じていませんから……」
