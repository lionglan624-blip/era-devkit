- id: fallback
  content: >-
    「ひゃっ…！？ %CALLNAME:MASTER%さん…！？」

    %CALLNAME:TARGET%は突然お尻を撫でられて、飛び上がるように驚いた。

    羽がばさばさと慌ただしく動いている。

    「お、お尻なんて…急に触らないでくださいぃ…」

    %CALLNAME:TARGET%は顔を真っ赤にして、両手でお尻を庇った。

    「…べ、別に嫌じゃないですけど…心の準備が…」

    %CALLNAME:TARGET%は戸惑いながらも、完全には拒絶しなかった。

    「わわっ…そ、そんなところ…！」

    %CALLNAME:MASTER%に尻を撫でられて、%CALLNAME:TARGET%は慌てた。

    「%CALLNAME:MASTER%さん、いきなりすぎます…」

    %CALLNAME:TARGET%は恥ずかしそうに身をよじった。

    「…も、もうちょっと、段階を踏んでほしいの…」

    困った顔をしながらも、%CALLNAME:TARGET%は怒ってはいない様子だった。

    背中の羽がそわそわと揺れている。

    「きゃっ…！ %CALLNAME:MASTER%さん…？」

    %CALLNAME:TARGET%はお尻に触れた手に驚いて、体を強張らせた。

    「そ、そこは…その…恥ずかしいです…」

    %CALLNAME:TARGET%の羽がぴくぴくと震えている。

    「わたし、こういうの慣れてなくて…」

    %CALLNAME:TARGET%は困惑しながら、%CALLNAME:MASTER%を見上げた。

    「…%CALLNAME:MASTER%さんだから、許しますけど…」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%のお尻に手を伸ばした。

    「あっ…！ えっ、ちょ、ちょっと…！」

    %CALLNAME:TARGET%は顔を真っ赤にして、体を硬くした。

    「%CALLNAME:MASTER%さん、そういうのは…まだ早いです…」

    %CALLNAME:TARGET%は恥ずかしそうに後ずさった。

    「…もっと、仲良くなってから…ね…？」

    控えめな妖精は、戸惑いながらもやんわりと断った。
