- id: fallback
  content: >-
    「っ……!?」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の乳首に触れた瞬間、%CALLNAME:TARGET%は息を呑んだ。

    「……何を、なさっているのですか」

    %CALLNAME:TARGET%は動揺を隠しきれない様子で、%CALLNAME:MASTER%を見つめている。

    「……お客様に触れられる筋合いは……」

    そう言いながらも、%CALLNAME:TARGET%はすぐには振り払わなかった。

    「……っ」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の乳首をつまむと、%CALLNAME:TARGET%は小さく声を漏らした。

    「%CALLNAME:MASTER%……そのような行為は……」

    %CALLNAME:TARGET%は困惑した表情で%CALLNAME:MASTER%を見つめている。

    「……メイドとして、看過できませんわ」

    そう言いながらも、%CALLNAME:TARGET%の声は厳しさを欠いていた。

    「あ……」

    %CALLNAME:MASTER%の指先が%CALLNAME:TARGET%の敏感な部分を刺激している。

    %CALLNAME:TARGET%は僅かに体を強張らせた。

    「……驚かさないでくださいまし」

    %CALLNAME:TARGET%は落ち着いた声で言いながらも、頬を染めている。

    「……まあ、今回だけですわよ」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に乳首を触れられ、少し困った表情を見せた。

    「このようなことをなさると……お嬢様に報告しなければなりませんわ」

    警告めいた言葉を口にしながらも、%CALLNAME:TARGET%の声には本気の怒りがこもっていない。

    「……今回だけ、見逃して差し上げますわ」

    %CALLNAME:TARGET%は小さくため息をつきながらも、%CALLNAME:MASTER%を見つめている。
