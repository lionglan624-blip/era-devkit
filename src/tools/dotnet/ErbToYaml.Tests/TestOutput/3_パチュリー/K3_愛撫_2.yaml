- id: fallback
  content: >-
    「……何を、するの」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の行為に、冷静を装って問いかけた。

    「そんな場所……衛生的にどうなの」

    しかし%CALLNAME:MASTER%が構わず続けると、%CALLNAME:TARGET%は僅かに息を乱した。

    「……まあ、いいわ。観察対象として……」

    そう言いながらも、%CALLNAME:TARGET%の頬は微かに紅潮している。

    「……っ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に触れられ、小さく息を呑んだ。

    「……後ろの穴の研究なんて、私の専門外なのだけど」

    %CALLNAME:TARGET%は淡々と言うが、声が僅かに震えている。

    「……ふぅん……こういう感覚なのね」

    知識欲のふりをして、%CALLNAME:TARGET%は%CALLNAME:MASTER%の行為を受け入れた。

    「……止めなさい」

    %CALLNAME:TARGET%は冷静に言い放つが、%CALLNAME:MASTER%は止めない。

    「……聞こえなかったの？」

    しかし%CALLNAME:TARGET%自身も、強く拒否する気配がない。

    「……まあ、いいわ。勝手に、しなさい」

    %CALLNAME:TARGET%は本に視線を戻したが、ページをめくる手が止まっている。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の行為を受けている。

    「……何がしたいの、あなたは」

    %CALLNAME:MASTER%が後ろを撫で続けると、%CALLNAME:TARGET%は僅かに身じろぎした。

    「……変な感覚ね。嫌ではない、けど……」

    %CALLNAME:TARGET%はぼそりと呟き、%CALLNAME:MASTER%に身を任せた。
  priority: 2
- id: fallback
  content: >-
    「……何をしているの」

    %CALLNAME:TARGET%は冷ややかな目で%CALLNAME:MASTER%を見た。

    「私の体に、許可なく触らないで」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を払いのけようとした。

    「……下品な行為ね。出て行きなさい」

    「……むきゅ」

    %CALLNAME:TARGET%は不快そうに眉を顰めた。

    「そんな場所に触れるなんて、正気の沙汰じゃないわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%から距離を取った。

    「……読書の邪魔をしないで。次はないわよ」

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついた。

    「あなたは何を考えているの。理解に苦しむわ」

    %CALLNAME:TARGET%は呆れた表情で%CALLNAME:MASTER%を見ている。

    「……精霊魔法で追い出すわよ。冗談じゃないの」

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%を睨みつけた。

    「私を何だと思っているの」

    %CALLNAME:TARGET%の声には怒りが滲んでいる。

    「……好きにしなさい。ただし、二度とこの図書館には入れないわよ」

    %CALLNAME:TARGET%は冷たく言い放ち、本に視線を戻した。
  priority: 1
