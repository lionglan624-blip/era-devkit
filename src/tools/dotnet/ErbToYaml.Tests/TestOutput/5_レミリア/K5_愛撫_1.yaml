- id: fallback
  content: >-
    「……何のつもりかしら」

    %CALLNAME:人物_レミリア%は冷ややかな目で%CALLNAME:MASTER%を見た。

    だが%CALLNAME:MASTER%がその秘所に触れると、

    「っ……」

    %CALLNAME:人物_レミリア%は小さく息を呑んだ。

    「……ふん、下僕の分際で……」

    そう言いながらも、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を止めようとはしなかった。

    「……%CALLNAME:MASTER%、あなた……」

    %CALLNAME:人物_レミリア%は言葉を詰まらせた。

    %CALLNAME:MASTER%がその場所に舌を這わせると、

    「んっ……」

    %CALLNAME:人物_レミリア%は小さく声を漏らし、慌てて口を押さえた。

    「……聞かなかったことにしなさい」

    頬を染めた%CALLNAME:人物_レミリア%は、威厳を保とうと必死だった。

    「……随分と大胆ね」

    %CALLNAME:人物_レミリア%は挑発的な笑みを浮かべた。

    だが%CALLNAME:MASTER%がその柔らかな場所を舐めると、

    「……っ」

    笑みが一瞬、歪んだ。

    「……悪くはないわ。続けなさい」

    命令口調だが、その声には微かな期待が混じっていた。

    「……下僕風情が、私にそんなことを……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を睨みつけた。

    しかし%CALLNAME:MASTER%が舌先で優しく愛撫すると、

    「ふっ……」

    %CALLNAME:人物_レミリア%は思わず吐息を漏らした。

    「……気に入らないわね。あなたに乱されるなんて」

    そう言いながらも、%CALLNAME:人物_レミリア%の目には戸惑いと期待が混在していた。
  priority: 2
- id: fallback
  content: >-
    「……何のつもり？」

    %CALLNAME:人物_レミリア%は冷たい視線を%CALLNAME:MASTER%に向けた。

    「私に触れることが許されると思っているの？」

    %CALLNAME:人物_レミリア%の紅い瞳が危険に光る。

    「身の程を知りなさい、下僕」

    吸血鬼としての威圧感が、部屋全体を支配していた。

    「……ふぅん」

    %CALLNAME:人物_レミリア%は退屈そうに%CALLNAME:MASTER%を見下ろした。

    「あなた、命が惜しくないのかしら」

    %CALLNAME:人物_レミリア%の声には、氷のような冷たさがあった。

    「私に触れる資格があるのは、限られた者だけよ」

    その言葉には、500年を生きた吸血鬼の矜持が込められていた。

    「……図々しいわね」

    %CALLNAME:人物_レミリア%は嘲笑を浮かべた。

    「使用人風情が主人に色目を使うの？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を見下すように言い放った。

    「せいぜい咲夜に怒られないようにすることね」

    吸血鬼の館の主として、%CALLNAME:人物_レミリア%は毅然とした態度を崩さなかった。

    「……まあ、いいわ」

    %CALLNAME:人物_レミリア%は気だるげに溜息をついた。

    「退屈しのぎにはなるかもしれないわね」

    だが%CALLNAME:MASTER%が近づこうとすると、

    「……でも、今はその気分じゃないわ。下がりなさい」

    %CALLNAME:人物_レミリア%は手を振って%CALLNAME:MASTER%を追い払った。

    紅魔館の主は、気まぐれに振る舞うのだった。
  priority: 1
