entries:
- id: fallback
  content: >-
    「ふわぁ……%CALLNAME:MASTER%、そこ、敏感なとこなの……」

    %CALLNAME:TARGET%は甘い声を漏らしながら、されるがままになっていた。

    %CALLNAME:MASTER%の唇が乳首に触れるたび、妖精の小さな体がぴくんと跳ねる。

    「んっ……あっ……吸われると、体がぽかぽかしてきちゃう……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の頭を抱えるように両手を伸ばした。

    妖精の小さな胸から、甘い匂いが漂っている。

    「……えへへ……%CALLNAME:MASTER%に甘やかされてる……幸せ……」

    「あっ……やぁん……%CALLNAME:MASTER%、上手……」

    %CALLNAME:TARGET%は目を潤ませて、%CALLNAME:MASTER%を見下ろしている。

    舌先で転がされる感覚に、妖精の体が蕩けていく。

    「ひゃ……ちゅっ……て、されると……頭、真っ白になっちゃう……」

    %CALLNAME:TARGET%の指が%CALLNAME:MASTER%の髪を優しく撫でた。

    「……%CALLNAME:MASTER%……もっと、して……？　あたし、全部%CALLNAME:MASTER%のものだから……」

    妖精は恋人に全てを委ねる喜びに、体を震わせていた。

    「んぅ……ふぁ……そこ、弱いってば……」

    %CALLNAME:TARGET%は甘えるように身をよじりながら、逃げようとはしなかった。

    %CALLNAME:MASTER%の舌が乳首を舐め上げるたび、妖精から可愛らしい声が漏れる。

    「あっ……あっ……%CALLNAME:MASTER%……おっぱい、小さいけど……気持ちいい……？」

    %CALLNAME:TARGET%は少し不安そうに問いかけた。

    「……えへへ……%CALLNAME:MASTER%が喜んでくれるなら、あたしも嬉しいの」

    妖精は幸せそうに微笑んで、%CALLNAME:MASTER%に身を預けた。

    「%CALLNAME:MASTER%……赤ちゃんみたいに吸うの、可愛い……」

    %CALLNAME:TARGET%はくすくす笑いながら、%CALLNAME:MASTER%の頭を撫でている。

    「んっ……でも、そうされると……あたしもおかしくなっちゃう……」

    妖精の乳首は%CALLNAME:MASTER%の愛撫でぷっくりと膨らんでいた。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の顔を両手で包み込んだ。

    「……大好き……世界で一番、%CALLNAME:MASTER%が好き……」

    妖精は愛しさを込めて、そっと%CALLNAME:MASTER%の額にキスをした。
