name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore devkit.sln

      - name: Build
        run: dotnet build devkit.sln --no-restore --configuration Release

      - name: Check formatting
        run: dotnet format devkit.sln --verify-no-changes --no-restore

      - name: Run dotnet tests
        run: dotnet test devkit.sln --no-build --configuration Release --verbosity normal --blame-hang-timeout 10s --results-directory _out/test-results

      # Dashboard tests: moved to C:\Era\dashboard repo

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pytest pyyaml

      - name: Run Python tests
        run: pytest src/tools/python/tests/ -v

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: src/tools/go/com-validator/go.sum

      - name: Run Go tests
        run: go test ./...
        working-directory: src/tools/go/com-validator
