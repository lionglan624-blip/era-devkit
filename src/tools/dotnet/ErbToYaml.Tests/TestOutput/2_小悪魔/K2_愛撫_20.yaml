    「……まあ、%CALLNAME:MASTER%さんなら……少しくらいは……」

    %CALLNAME:人物_小悪魔%は戸惑いながらも、%CALLNAME:MASTER%を受け入れた。

    「んっ……そこ、くすぐったい……ですわ……」

