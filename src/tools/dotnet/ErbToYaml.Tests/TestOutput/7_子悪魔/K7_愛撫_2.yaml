- id: fallback
  content: >-
    「ふぇっ……！？　な、何するんですか……！」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を押しのけようとしている。

    「い、いきなりそんなこと……」

    %CALLNAME:TARGET%は真っ赤な顔で%CALLNAME:MASTER%を見ている。

    「……あたし、そういうの、わからないです……」

    困惑した表情で、%CALLNAME:TARGET%は後ずさりしようとしていた。

    「……咲夜さんに怒られちゃいます……」

    「ひゃっ……！　ち、ちょっと……」

    %CALLNAME:TARGET%は驚いて体を硬直させた。

    「そ、そこは触っちゃダメなところです……」

    %CALLNAME:TARGET%は必死に%CALLNAME:MASTER%を止めようとしている。

    「……あたし、お仕事中なので……」

    言い訳をしながら、%CALLNAME:TARGET%は逃げ出す機会を窺っている。

    「……こういうのは、もっと仲良くなってからにしてください……」

    「え、えっと……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は困惑した表情で立ち尽くしている。

    何が起きているのか、理解しようとしている。

    「……あの、これって……何してるんですか……？」

    %CALLNAME:TARGET%は不安そうに%CALLNAME:MASTER%を見上げた。

    「……あたし、こういうの、よくわからないです……」

    妖精は戸惑いながら、%CALLNAME:MASTER%の反応を待っていた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の手を見つめている。

    どう反応していいかわからないようだ。

    「……あたし、何かしちゃいました……？」

    %CALLNAME:TARGET%は困った顔で問いかけた。

    「……こういうのって、仲良しさんがすることですよね……」

    %CALLNAME:TARGET%は警戒するように、%CALLNAME:MASTER%から距離を取ろうとしていた。
