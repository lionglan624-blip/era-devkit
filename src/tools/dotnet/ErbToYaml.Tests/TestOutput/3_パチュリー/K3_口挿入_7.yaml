- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、こうすれば良いのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に体を預けている。

    本で読んだ知識を思い出しながら、腰を前に押し出した。

    「……ん……入った……あなたの中、熱いわ……」

    %CALLNAME:TARGET%は息を整えながら、ゆっくりと動き始めた。

    「……あなたを感じられて……嬉しいの……」

    「……ふぅ……体が弱いから……激しくは無理よ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめながら、穏やかに腰を揺らしていた。

    「……でも、あなたのためなら……頑張るわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の頬に手を添えた。

    「……こうして繋がっていると……魔力が流れ込むみたい……」

    知識の魔女は愛する人との一体感に静かな喜びを感じていた。

    「……んっ……あなたの反応……面白いわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の表情を観察しながら動いていた。

    「……本には書いてなかった……この感触は……」

    %CALLNAME:TARGET%は学者らしく分析しながらも、表情は蕩けていた。

    「……もっと……あなたを知りたいの……」

    そう呟いて、%CALLNAME:TARGET%は腰の動きを続けた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の目を見つめながら、体を重ねていた。

    「……この体勢……あなたの全てが見えるわ……」

    %CALLNAME:TARGET%は頬を染めながら微笑んだ。

    「……恥ずかしいけど……あなたと繋がれて……幸せよ」

    脆弱な体を動かしながら、%CALLNAME:TARGET%は愛を伝えていた。
