- id: talent_3_1
  content: >-
    「ひゃっ……！　な、何見てるのよ！」

    チルノは秘部を開かれ、驚きの声を上げた。

    「そ、そんなとこ……じっくり見られたら……恥ずかしいじゃん……」

    しかし抵抗する力は弱く、%CALLNAME:MASTER%に秘部を晒したままだ。

    「……%CALLNAME:MASTER%って……こういうの好きなの……？」

    チルノは顔を赤くしながらも、どこか期待するように%CALLNAME:MASTER%を見つめた。

    「……嫌じゃないけど……恥ずかしいんだからね……」

    「あっ……やめ……見ないでよ……」

    チルノは弱々しく抗議したが、脚を閉じることはできなかった。

    %CALLNAME:MASTER%が花弁を開いて覗き込むと、桃色の内壁がひくりと蠢いた。

    「……%CALLNAME:MASTER%……なんでそんなに見たがるの……」

    チルノは羞恥に震えながらも、%CALLNAME:MASTER%の視線から逃げられない。

    「……もう……どうにでもしてよ……」

    観念したように、チルノは体の力を抜いた。

    「やぁ……開いちゃ……ダメだってば……」

    チルノは秘部を広げられ、悲鳴に近い声を上げた。

    しかしその体は抵抗を忘れ、%CALLNAME:MASTER%に全てを晒している。

    「……こんなの、初めて……誰かに見られるの……」

    チルノは涙目になりながらも、%CALLNAME:MASTER%を拒絶しなかった。

    「……%CALLNAME:MASTER%だから……見せてるんだからね……」

    チルノは恥ずかしさの中に、期待を滲ませていた。

    「……%CALLNAME:MASTER%……」

    チルノは%CALLNAME:MASTER%に秘部を開かれながら、じっと見つめた。

    その瞳には、戸惑いと期待と恥ずかしさが入り混じっている。

    「……こういうの、好きなの……？　あたいの……見るの……」

    恥ずかしそうに問いかけるチルノ。

    「……%CALLNAME:MASTER%のこと、もっと知りたいな……」

    チルノは赤い顔のまま、%CALLNAME:MASTER%に身を委ねていた。
