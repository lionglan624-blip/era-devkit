    悪魔の舌が%CALLNAME:MASTER%の敏感な場所を的確に刺激していく。

    「んっ……れろ……ちゅ……%CALLNAME:MASTER%の声……もっと聞かせてくださいな……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の反応を楽しむように、緩急をつけて舌を動かす。

    「私の舌……気持ちいい……？　ふふ……正直に言ってくださいませ……」

    「ねえ、%CALLNAME:MASTER%……私、こういうの……好きですわ……」

    %CALLNAME:人物_小悪魔%は蕩けるような目で%CALLNAME:MASTER%を見上げながら、舌を這わせた。

    悪魔特有の器用な舌が、%CALLNAME:MASTER%の秘所を丁寧に愛撫していく。

    「%CALLNAME:MASTER%が感じてる顔……たまらなく好きですわ……んっ……」

    %CALLNAME:人物_小悪魔%の尻尾がゆらゆらと揺れている。

    「もっと……もっと気持ちよくしてあげますわ……れろ……ちゅぷ……」

    「ふふ……%CALLNAME:MASTER%ったら、こんなに濡れて……」

    %CALLNAME:人物_小悪魔%は嬉しそうに笑いながら、%CALLNAME:MASTER%の秘所を舐め続けている。

    時折、意地悪そうに舌の動きを止めては、%CALLNAME:MASTER%を焦らす。

    「……ん、もっとしてほしい？　おねだりしてくださいな……」

    %CALLNAME:人物_小悪魔%は悪魔らしい妖艶な笑みを浮かべた。

    「私の舌で……%CALLNAME:MASTER%を満足させてあげますわ……んむ……」
