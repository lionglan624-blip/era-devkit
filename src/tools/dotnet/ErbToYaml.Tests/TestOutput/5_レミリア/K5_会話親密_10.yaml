character: レミリア
situation: K5_会話親密
entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%をそっと抱きしめた。

    「……ん」

    %CALLNAME:TARGET%は抵抗もせず、その腕の中に収まった。

    「ククク……お前の体温、温かいわね」

    %CALLNAME:TARGET%は紅い瞳を細め、%CALLNAME:MASTER%の胸に頬を寄せた。

    「500年生きてきて、こうして抱きしめられるのを心地よいと思ったのは初めてよ」

    「……もう少しだけ、このままでいさせて。紅魔館の主としてではなく、ただの私として……」

    「――%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を迎え入れるように両腕を広げた。

    ぎゅっと抱きしめ合う二人。

    「……ふふ、お前の心臓の音が聞こえるわ。温かいわね」

    %CALLNAME:TARGET%は吸血鬼らしからぬ穏やかな笑みを浮かべている。

    「この温もりは、私だけのものよ。誰にも渡さないわ」

    %CALLNAME:TARGET%の小さな体が、%CALLNAME:MASTER%にぴったりと寄り添っていた。

    %CALLNAME:MASTER%が腕を広げると、%CALLNAME:TARGET%は小さく微笑んだ。

    「ふふ……いいわ、おいで」

    %CALLNAME:TARGET%は自分から%CALLNAME:MASTER%の胸に飛び込んだ。

    「……こうしていると、運命なんてどうでもよくなるわね」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の首に腕を回し、頬をすり寄せた。

    「お前の傍にいると、500年という歳月が嘘みたいに温かいの」

    紅い瞳が潤んでいるように見えた。

    「あら……」

    %CALLNAME:MASTER%に抱きしめられ、%CALLNAME:TARGET%は嬉しそうに目を細めた。

    「ククク、甘えん坊ね。私がいないと寂しいの？」

    そう言いながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%の背中にそっと爪を立てた。

    「……冗談よ。私だって、お前がいないと寂しいもの」

    %CALLNAME:TARGET%は恥ずかしそうに顔を埋め、小さく笑った。

    「……これ、誰にも言っちゃ駄目よ？ 紅魔館の主としての威厳が……」
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%に抱きついた。

    「……っ！ な、何よ急に……」

    %CALLNAME:TARGET%は驚いたように身を強張らせたが、振りほどこうとはしなかった。

    「……ふん、使用人のくせに大胆ね。でも……温かいわね」

    %CALLNAME:TARGET%は頬をわずかに染めながら、威厳を保とうとしている。

    「……まあ、特別に許してあげるわ。感謝しなさい」

    そう言いながらも、%CALLNAME:TARGET%の手は%CALLNAME:MASTER%の背に回されていた。

    「あっ……」

    %CALLNAME:MASTER%に抱きしめられ、%CALLNAME:TARGET%は小さく声を漏らした。

    「……何のつもり？ 私は紅魔館の主なのよ……温かいわね、お前って」

    %CALLNAME:TARGET%は抵抗する素振りを見せながらも、体は逃げていない。

    「……ククク、甘えん坊ね。でも、悪くないわ」

    %CALLNAME:TARGET%は照れ隠しのように笑いながら、%CALLNAME:MASTER%の温もりを受け入れていた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の小さな体を包み込むように抱きしめた。

    「んっ……！ ちょ、ちょっと……」

    %CALLNAME:TARGET%は戸惑いながらも、その場に留まった。

    「……ふぅん、私を抱きしめたいの？ 光栄に思いなさい」

    そう言いながらも、%CALLNAME:TARGET%の耳が赤く染まっている。

    「……もう少しだけ、このままでいてもいいわ」

    %CALLNAME:TARGET%は俯きながら、小さく呟いた。

    「……来たわね」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の接近を予期していたかのように微笑んだ。

    %CALLNAME:MASTER%に抱きしめられると、%CALLNAME:TARGET%は小さく息を吐いた。

    「……500年生きてきて、人間に抱きしめられて嬉しいなんて……おかしな話ね」

    %CALLNAME:TARGET%は自嘲気味に笑いながらも、%CALLNAME:MASTER%から離れようとしない。

    「……今だけは、カリスマとか忘れていいかしら」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋めた。
