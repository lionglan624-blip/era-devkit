entries:
- id: fallback
  content: >-
    「……ん……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は魔導書を閉じ、%CALLNAME:MASTER%の頭を胸元に抱き寄せた。

    「……あなたが私の乳首を吸うの、好きね」

    %CALLNAME:MASTER%の唇が%CALLNAME:TARGET%の乳首に触れると、%CALLNAME:TARGET%は微かに身を震わせた。

    「……本には書いていない感覚……でも、あなたとだから心地いいわ」

    %CALLNAME:TARGET%は静かに目を閉じ、%CALLNAME:MASTER%に身を委ねた。

    「……ふぅ……そう、そこ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に乳首を吸われながら、甘い吐息を漏らしている。

    大図書館の静寂の中、%CALLNAME:TARGET%の熱い息遣いだけが響く。

    「……%CALLNAME:MASTER%……あなたの舌、魔法みたい」

    %CALLNAME:TARGET%は珍しく甘えるような声を出した。

    「……もっと、吸って……」

    「あっ……やぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の舌が乳首を転がすたびに、身を捩った。

    「……こうしていると、魔力が溢れそうになるわ……」

    %CALLNAME:TARGET%は自分の体の反応を不思議そうに見つめている。

    「……あなたが吸うと、私の体が勝手に反応するの」

    そう言って、%CALLNAME:TARGET%は%CALLNAME:MASTER%の髪を優しく撫でた。

    「……くぅ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に吸われるまま、甘い声を漏らしている。

    「……%CALLNAME:MASTER%……赤ん坊のように吸わないで……恥ずかしいわ」

    しかし、%CALLNAME:TARGET%の手は%CALLNAME:MASTER%の頭を離さない。

    「……でも……やめないで。今日は、あなたの好きにさせてあげる」

    %CALLNAME:TARGET%は微かに微笑みながら、%CALLNAME:MASTER%を見つめた。
