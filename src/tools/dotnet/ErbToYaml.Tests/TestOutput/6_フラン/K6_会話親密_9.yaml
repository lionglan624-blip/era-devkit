- id: fallback
  content: >-
    「……手？ 握りたいの？」

    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の手に触れようとした。

    %CALLNAME:人物_フラン%は怪訝そうな表情を浮かべている。

    「……いいけど、壊さないでね？」

    おずおずと手を差し出す%CALLNAME:人物_フラン%。

    「……変な感じ。あったかいね」

    「……何するの？」

    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の髪に触れた。

    %CALLNAME:人物_フラン%は困惑した表情で%CALLNAME:MASTER%を見つめている。

    「……髪に興味があるの？ 変なの」

    されるがままに髪を撫でられながら、%CALLNAME:人物_フラン%は小首を傾げた。

    「……まあ、嫌じゃないけどさ」

    「……肩？」

    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の肩にそっと手を置いた。

    %CALLNAME:人物_フラン%はじっとその手を見つめている。

    「……不思議。壊したくならないよ」

    「%CALLNAME:MASTER%の手、あったかいからかな」

    %CALLNAME:人物_フラン%は首を傾げながら、そう呟いた。

    「……腕、掴んでるね」

    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の腕をそっと握った。

    %CALLNAME:人物_フラン%は不思議そうに%CALLNAME:MASTER%を見上げている。

    「……こういうの、あんまりされたことないの」

    「でも……悪くないかも」

    小さく呟いて、%CALLNAME:人物_フラン%は%CALLNAME:MASTER%に少しだけ近づいた。
