- id: fallback
  content: >-
    「ねえ……後ろからだと、逃げられないでしょ？」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%の背後に回り込んだ。

    自分のものを後孔に当てると、紅い瞳を輝かせる。

    「入れるよ……壊れても、私には見えないからね」

    %CALLNAME:人物_フラン%は容赦なく挿入した。

    「ふふ……後ろからだと、壊れる瞬間が見えなくてつまらないかも……」

    悪魔の妹は、獲物を追い詰める狩人のような笑みを浮かべていた。

    「後ろからだと……こうして、抱きついて離さないことができるのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の背中に張り付きながら呟いた。

    後背位で挿入しながら、両腕で%CALLNAME:MASTER%を拘束する。

    「動くと……どうなるの？ 壊れちゃう？」

    %CALLNAME:人物_フラン%は無邪気に腰を動かした。

    「きゅっとしてドカーン……でも、顔が見えないと分からないね」

    495年の孤独を知る少女は、危険な好奇心で獲物を弄んでいた。

    「へえ……後ろからだと、こうして深く入るんだ」

    %CALLNAME:人物_フラン%は発見したように呟いた。

    後背位で挿入したまま、%CALLNAME:MASTER%の背中を観察する。

    「面白い……声だけで、壊れてるかどうか判断しないといけないのさ」

    %CALLNAME:人物_フラン%は興味深そうに腰を動かした。

    「壊れる前に……もうちょっと遊ばせてね」

    悪魔の妹は、玩具を後ろから弄ぶ子供のような目をしていた。

    「ふふ……後ろから襲うの、楽しいのさ」

    %CALLNAME:人物_フラン%は楽しそうに%CALLNAME:MASTER%の背中に覆いかぶさった。

    後背位で貫きながら、耳元で囁く。

    「逃げようとしても無駄だよ……私の方が速いもん」

    %CALLNAME:人物_フラン%は容赦なく腰を動かした。

    「壊れるまで離さないからね……でも、後ろからだと壊れても気づかないかも」

    495年の孤独を知る少女は、狂気と好奇心の狭間で獲物を追い詰めていた。
  priority: 1
