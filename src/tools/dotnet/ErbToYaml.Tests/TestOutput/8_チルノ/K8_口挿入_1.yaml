character: チルノ
situation: K8_口挿入
entries:
- id: fallback
  content: >-
    「ふふーん、%CALLNAME:MASTER%のここ、あたいが舐めてあげる！」

    %CALLNAME:人物_チルノ%は自信満々に%CALLNAME:MASTER%の前にしゃがみ込んだ。

    そそり立つ一物に顔を近づけると、%CALLNAME:人物_チルノ%は大きく口を開けた。

    「あーん……んむっ！」

    %CALLNAME:人物_チルノ%の冷たい口腔が一物を包み込む。

    熱い肉棒と冷たい舌の温度差が、独特の快感を生み出していく。

    「んっ……じゅるる……どう？　気持ちいいでしょ？」

    得意げに見上げながら、%CALLNAME:人物_チルノ%は舌を這わせ続けた。

    「えへへ……%CALLNAME:MASTER%、これ好きでしょ？」

    %CALLNAME:人物_チルノ%は嬉しそうに笑いながら、%CALLNAME:MASTER%の一物に頬ずりした。

    「あたいの口、冷たいって言うけど……気持ちいいって言ってくれるもんね」

    %CALLNAME:人物_チルノ%は一物を舐め始め、その冷たい舌が茎を這う。

    「ちゅ、れろ……ん、はむ……じゅるる……」

    愛おしそうに一物を咥えながら、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%を見上げた。

    「……あたいだけのなんだからね、これ」

    独占欲をにじませながら、舌を動かし続けている。

    「ほら、最強のあたいが奉仕してあげるわ！」

    %CALLNAME:人物_チルノ%は張り切って%CALLNAME:MASTER%の一物を咥えた。

    氷の妖精らしいひんやりとした口腔が、熱を帯びた肉棒を包み込む。

    「んむ……ちゅっ、ちゅる……れろ……」

    %CALLNAME:人物_チルノ%は一生懸命に舌を動かし、%CALLNAME:MASTER%を快楽へ導こうとしている。

    「ふふ、%CALLNAME:MASTER%……気持ちよさそうな顔してる……」

    %CALLNAME:人物_チルノ%は満足げに微笑み、さらに奉仕を続けた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は珍しくおとなしく、%CALLNAME:MASTER%の一物に口づけた。

    「……こうしてると、%CALLNAME:MASTER%のこと、もっと好きになっちゃう」

    %CALLNAME:人物_チルノ%は恥ずかしそうに呟きながら、一物を口に含んだ。

    「んっ……じゅる、れろ……ちゅ……」

    甘えるように舌を這わせながら、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%を見上げた。

    「……大好きだよ、%CALLNAME:MASTER%……」

    いつもの威勢のいい態度はなりを潜め、愛情を込めて奉仕している。
  priority: 4
- id: talent_3_1
  content: >-
    「え……く、口で……？」

    %CALLNAME:人物_チルノ%は戸惑いながらも、%CALLNAME:MASTER%の一物を見つめた。

    「……わ、わかったわよ。やってあげる！」

    意を決したように、%CALLNAME:人物_チルノ%は一物に顔を近づけた。

    「んっ……はむ……うわ、でかい……」

    %CALLNAME:人物_チルノ%は口を大きく開けて一物を咥えた。

    冷たい舌が茎に触れ、恐る恐る動き始める。

    「ん……じゅる……こ、こうすればいいの……？」

    「べ、別に%CALLNAME:MASTER%のためにするわけじゃないんだからね！」

    %CALLNAME:人物_チルノ%は真っ赤な顔で言い訳しながら、一物を咥えた。

    「んむ……ちゅ、れろ……」

    照れ隠しに目を逸らしながらも、%CALLNAME:人物_チルノ%は舌を動かし続けている。

    「……%CALLNAME:MASTER%が喜ぶから……やってあげてるだけなんだから」

    %CALLNAME:人物_チルノ%はそっぽを向きながらも、丁寧に舌を這わせた。

    「……ちゃんと気持ちよくなってよね」

    「んっ……こ、こうかな……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに%CALLNAME:MASTER%の一物を舐めている。

    冷たい舌が熱い肉棒を撫で、ゆっくりと這い回る。

    「あたいだって……こういうの、できないわけじゃないんだから」

    強がりを言いながらも、その動きはぎこちない。

    「ちゅ、じゅる……はむ……ん……」

    %CALLNAME:人物_チルノ%は必死に舌を動かし、%CALLNAME:MASTER%を気持ちよくさせようとしている。

    「……%CALLNAME:MASTER%のせいだからね」

    %CALLNAME:人物_チルノ%は困ったような顔で呟いた。

    「あたいがこんなことしてるのは……全部%CALLNAME:MASTER%のせいなんだから」

    文句を言いながらも、%CALLNAME:人物_チルノ%は一物を口に含んだ。

    「んっ……じゅる……れろ……」

    恥ずかしそうに俯きながら、%CALLNAME:人物_チルノ%は舌を動かし続けた。

    「……でも、%CALLNAME:MASTER%のためなら……やってあげる」
