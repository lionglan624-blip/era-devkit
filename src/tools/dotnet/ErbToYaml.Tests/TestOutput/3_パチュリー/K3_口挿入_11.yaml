character: パチュリー
situation: K3_口挿入
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、触れても……いい？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の体に細い指を添えた。

    本で読んだ知識を思い出しながら、ゆっくりと指を這わせ始める。

    「……あなたの肌、温かいわ……本には書いてなかった感覚ね」

    %CALLNAME:TARGET%は頬を染めながら、愛撫を続けた。

    「……こうして触れていると、あなたを感じられて……嬉しいわ」

    「んっ……ここを触ると、反応するのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を観察しながら指を動かしている。

    「……興味深いわ。文献とは違う、生きた知識……」

    %CALLNAME:TARGET%は学者らしく分析しながらも、表情は優しく蕩けていた。

    「……あなたの体を知ることができて……光栄よ」

    そう小さく呟いて、%CALLNAME:TARGET%は丁寧に愛撫を続けた。

    「……ふぅ……あなたの体、不思議ね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の肌を撫でながら、うっとりとした表情を浮かべていた。

    「……触れるだけで、私の方まで温かくなってくるわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げて、微笑んだ。

    「……もう少し、触れていても……いいかしら」

    知識の魔女は、愛する人の肌に静かに指を滑らせ続けた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の体を両手で包み込むように触れている。

    「……こうして触れていると、あなたの鼓動が伝わってくるわ」

    %CALLNAME:TARGET%は穏やかな表情で言った。

    「……私の指で、あなたを癒せるなら……それが何より嬉しいの」

    知識の魔女は、愛する人への愛撫に静かな幸福を感じていた。
  priority: 4
- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%の体に……触れるの……？」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%に手を伸ばした。

    「……本では読んだことがあるけれど……実際に触れるのは……」

    %CALLNAME:TARGET%は顔を赤くしながら、おずおずと指を動かし始めた。

    「……む、むきゅ……温かい……」

    知識と実体験の差異に、%CALLNAME:TARGET%は戸惑っていた。

    「……こう……触れば良いのかしら……」

    %CALLNAME:TARGET%はぎこちなく%CALLNAME:MASTER%の体を撫でている。

    「……文献には、こうすると気持ち良いと……」

    %CALLNAME:TARGET%は知識を頼りに、指の動きを工夫していた。

    「……どう……？　変じゃない……？」

    不安そうに%CALLNAME:MASTER%の顔を覗き込んだ。

    「……んっ……こんな風に触れるなんて……」

    %CALLNAME:TARGET%は羞恥に顔を染めながら、愛撫を続けている。

    「……あなたに触れられて……嬉しい……わけじゃないわ」

    %CALLNAME:TARGET%は素直になれないでいた。

    「……で、でも……続けるわ……研究のために」

    照れ隠しの言い訳と共に、指は止まらなかった。

    「……」

    %CALLNAME:TARGET%は黙々と%CALLNAME:MASTER%の体に触れている。

    頬を染めながら、慎重に指を動かしていた。

    「……あなたの体温……本では学べないわね……」

    %CALLNAME:TARGET%は小さく呟いた。

    「……もう少しだけ……触れていたい……むきゅ」
  priority: 3
  condition:
