- id: fallback
  content: >-
    「……この体勢で、お尻の穴？」

    %CALLNAME:人物_フラン%は首を傾げながら、疑問の眼差しを向けた。

    四つんばいで後ろの穴を晒すなど、495年間知らなかった。

    「変な遊びなのさ……でも、%CALLNAME:MASTER%がしたいなら」

    %CALLNAME:MASTER%が菊穴に亀頭を当てると、%CALLNAME:人物_フラン%は眉をひそめた。

    「っ……痛いのさ。後ろからだと余計に……」

    未知の感覚に、悪魔の妹は戸惑いを隠せなかった。

    「……獣みたいな体勢で、こんな穴まで使うんだ」

    %CALLNAME:人物_フラン%は尻を突き出しながら、ぽつりと呟いた。

    495年の孤独の中、こんなことは想像もしなかった。

    「……まあ、嫌じゃないのさ。痛いけど」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_フラン%は小さく喘いだ。

    「んっ……あっ……後ろからだと、もっと奥まで来てる感じがする……」

    痛みの中に、微かな快感を見出し始めていた。

    「%CALLNAME:MASTER%……私の後ろ姿、どう見える……？」

    %CALLNAME:人物_フラン%は興味半分、不安半分で問いかけた。

    お尻の穴を後ろから犯される姿を、自分では見えない。

    「……変じゃないなら、いいんだけど」

    %CALLNAME:MASTER%が奥まで突き入れると、%CALLNAME:人物_フラン%は声を漏らした。

    「はぁ……んっ……この角度……お腹の中、変な感じ……でも悪くない……」

    その言葉は、%CALLNAME:人物_フラン%なりの精一杯の肯定だった。

    「……後ろを向いてると、%CALLNAME:MASTER%が見えないのさ」

    %CALLNAME:人物_フラン%は不満そうに言った。

    しかし、お尻の穴から伝わる感覚で、恋人の存在を感じている。

    「……触ってるから、いるってわかるけど。変な繋がり方」

    %CALLNAME:MASTER%が激しく腰を打ちつけると、%CALLNAME:人物_フラン%は思わず声を上げた。

    「あっ……んっ……ちょ、ちょっと……頭がぼうっとする……」

    痛みが快感に変わる感覚に、悪魔の妹は戸惑っていた。
  priority: 2
- id: fallback
  content: >-
    「……へぇ、後ろからお尻の穴も使えるんだ」

    %CALLNAME:人物_フラン%は興味深そうに四つんばいになった。

    しかしその紅い瞳は、背後の%CALLNAME:MASTER%を警戒している。

    「面白い遊びなのさ。でも、後ろを取られるの、好きじゃないんだよね」

    %CALLNAME:MASTER%が菊穴に亀頭を押し込むと、%CALLNAME:人物_フラン%は眉をひそめた。

    「っ……痛い。これ、本当に楽しいの……？」

    新しい玩具を試すように、悪魔の妹は感覚を確かめていた。

    「きゅっとしてドカーンって、知ってる？」

    %CALLNAME:人物_フラン%は無邪気に笑いながら、不穏なことを口にした。

    「後ろからお尻の穴なんて……%CALLNAME:MASTER%のこと、簡単に壊せるのさ」

    しかし、%CALLNAME:MASTER%が腰を動かすと、その表情が揺らいだ。

    「んっ……あれ……痛いのに、なんか……変な感じ……」

    %CALLNAME:人物_フラン%は困惑しながら、その感覚を受け入れていた。

    「……壊したいのに、壊したくないって……本当に変なの」

    「……」

    %CALLNAME:人物_フラン%は無表情で四つんばいの姿勢を取った。

    後ろからお尻の穴を犯される感覚に、どこか虚ろな瞳をしている。

    「獣みたいな体勢で、こんな穴まで……%CALLNAME:MASTER%って本当に変態なのさ」

    %CALLNAME:MASTER%が奥まで突き入れると、%CALLNAME:人物_フラン%は小さく声を漏らした。

    「っ……ん……でも今は、そんな気分じゃないのさ……壊すの」

    危険な言葉とは裏腹に、その体は快感を受け入れていた。

    「コンティニューできないの、わかってる？」

    %CALLNAME:人物_フラン%は警告するように言った。

    尻を突き出してお尻の穴を晒しながら、その瞳は鋭い。

    「後ろからこんな穴でするなんて……無防備すぎるのさ」

    %CALLNAME:MASTER%が激しく腰を動かすと、%CALLNAME:人物_フラン%は言葉を失った。

    「あっ……んぅ……や……頭が……ぼんやりしてくる……」

    破壊の衝動を快感が塗り替えていく。悪魔の妹は、その変化に戸惑っていた。
  priority: 1
