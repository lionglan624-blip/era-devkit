- id: fallback
  content: >-
    %CALLNAME:MASTER%がローターを取り出すと、%CALLNAME:TARGET%は眉をひそめた。

    「……%CALLNAME:MASTER%、そのような行為は控えていただきたいですわ」

    %CALLNAME:TARGET%は冷静を装いながらも、好奇心が隠しきれない様子だった。

    「……お客様であっても、度が過ぎればお嬢様にお伝えしなければなりません」

    そう言いながらも、%CALLNAME:TARGET%はすぐには立ち去らなかった。

    「……一体、それで何をするおつもりですの」

    ローターの振動が%CALLNAME:TARGET%の肌に触れた。

    「っ……何を……」

    %CALLNAME:TARGET%は戸惑いながらも、強く拒絶はしなかった。

    「メイドにこのようなことを……非常識ですわ」

    %CALLNAME:TARGET%の声には抗議があるが、力がこもっていない。

    「……早く終わらせてくださいまし」

    %CALLNAME:TARGET%は諦めたように息を吐いた。

    「ん……っ……」

    ローターの振動に、%CALLNAME:TARGET%は小さく声を漏らした。

    「……これは……予想外の感覚ですわ……」

    %CALLNAME:TARGET%は自分の体の反応に困惑している。

    「お願いですから……弱めていただけませんこと……」

    その言葉は、止めてほしいという懇願ではなかった。

    「……このままでは……平静を保てませんわ……」

    振動が%CALLNAME:TARGET%の体を揺さぶっている。

    「……あ……」

    %CALLNAME:TARGET%は思わず声を漏らし、慌てて口を押さえた。

    「お客様の……意地悪……」

    %CALLNAME:TARGET%は恨めしそうな視線を%CALLNAME:MASTER%に向けた。

    「……こんな道具で、私を弄んで楽しいですの」

    しかし、その声には本気の怒りがこもっていなかった。
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:MASTER%がローターを取り出すと、%CALLNAME:TARGET%は冷ややかな視線を向けた。

    「……何のおつもりでしょうか」

    %CALLNAME:TARGET%の声は氷のように冷たい。

    「お客様であっても、このような無礼は見過ごせませんわ」

    %CALLNAME:TARGET%の手には、いつの間にかナイフが握られていた。

    「……時を止める前に、お引き取りくださいませ」

    「……」

    %CALLNAME:TARGET%は無言でローターを見つめた。

    「紅魔館のメイド長に、そのような真似を……御遠慮くださいませ」

    %CALLNAME:TARGET%は毅然とした態度で%CALLNAME:MASTER%を見据えている。

    「お嬢様のお怒りを買いたくなければ、今すぐそれを仕舞いなさい」

    完璧なメイドの威圧感が、部屋を支配していた。

    %CALLNAME:MASTER%がローターを近づけると、%CALLNAME:TARGET%は一歩退いた。

    「……お考え違いですわ」

    %CALLNAME:TARGET%は冷たい笑みを浮かべた。

    「私をそのような道具で弄べるとでも思いましたの」

    「時を止めれば、その指を切り落とすことなど造作もありませんわ」

    %CALLNAME:TARGET%は有無を言わせぬ威圧感で%CALLNAME:MASTER%を睨みつけた。

    「……は？」

    %CALLNAME:TARGET%は信じられないものを見るような目で%CALLNAME:MASTER%を見た。

    「正気ですか？　紅魔館のメイド長に、そのような真似を」

    %CALLNAME:TARGET%は冷ややかに笑った。

    「次はありませんわ。相応の対処をさせていただきますから」

    「……今すぐお引き取りくださいまし」

    瀟洒なメイドの目は、冷ややかに光っていた。
  priority: 1
