- id: fallback
  content: >-
    「……ふん、私に抱かれる光栄を噛み締めなさい」

    %CALLNAME:人物_レミリア%は傲慢に言い放ち、%CALLNAME:MASTER%の上に乗った。

    小さな身体が容赦なく腰を下ろしていく。

    「……っ、入って……いくわよ……」

    %CALLNAME:人物_レミリア%は冷たい瞳で%CALLNAME:MASTER%を見下ろした。

    「……身の程を知りなさい。%CALLNAME:MASTER%は私の所有物よ」

    紅魔館の主は、支配者として%CALLNAME:MASTER%を組み敷いていた。

    「……%CALLNAME:MASTER%の身体を使ってあげるわ。感謝しなさい」

    %CALLNAME:人物_レミリア%は冷たく言い放ち、%CALLNAME:MASTER%を抱いた。

    小さな吸血鬼の腰が、容赦なく動き始める。

    「……ふん、%CALLNAME:MASTER%の中……悪くないわね」

    %CALLNAME:人物_レミリア%は視線を逸らした。

    「……黙って私を受け入れていなさい」

    500年の吸血鬼は、感情を殺して%CALLNAME:MASTER%を抱いていた。

    「……好きにさせてもらうわ」

    %CALLNAME:人物_レミリア%は傲慢に言い、%CALLNAME:MASTER%の上に覆いかぶさった。

    容赦なく腰を動かし、%CALLNAME:MASTER%の身体を貫く。

    「……%CALLNAME:MASTER%の身体は私のものよ。わかっているわね？」

    %CALLNAME:人物_レミリア%は嘲笑った。

    「……この程度で私を満足させられると思っているなら、大間違いよ」

    紅魔館の主は、最後まで支配者としての威厳を崩さなかった。

    「……%CALLNAME:MASTER%を見下ろすのは、当然のことね」

    %CALLNAME:人物_レミリア%は挑発的に笑い、%CALLNAME:MASTER%を抱いた。

    %CALLNAME:MASTER%の上に乗る姿には、支配者の威光が宿っている。

    「……私に抱かれている自覚はあるかしら？」

    %CALLNAME:人物_レミリア%は余裕の笑みを浮かべた。

    「……さあ、私を気持ちよくさせなさい」

    500年の吸血鬼は、どんな体勢でもカリスマを失わなかった。
