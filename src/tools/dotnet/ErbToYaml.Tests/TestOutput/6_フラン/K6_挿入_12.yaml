- id: fallback
  content: >-
    「んっ……%CALLNAME:MASTER%……こうして二人に抱かれてると……」

    %CALLNAME:人物_フラン%は前と後ろから同時に貫かれながら、恋人を見上げた。

    二つの熱が交互に押し寄せる感覚に、悪魔の妹は甘い吐息を漏らす。

    「私……すっごく愛されてるって、感じるのさ……」

    身体の奥深くまで満たされる快感に、%CALLNAME:人物_フラン%の瞳が潤んでいく。

    「壊れそうなくらい気持ちいいのに……壊れないよ……%CALLNAME:MASTER%がいるから……」

    495年の孤独を知る少女は、二人に愛される幸福に涙を浮かべていた。

    「あっ……ん……前と後ろ、同時に……きてる……」

    %CALLNAME:人物_フラン%は両方から突き上げられるたびに、声を上げた。

    かつて地下室でひとりだった少女が、今は二人に包まれている。

    「ねぇ、%CALLNAME:MASTER%……私、幸せすぎて……壊れちゃいそう……」

    二人のリズムが重なると、%CALLNAME:人物_フラン%は背中を反らせた。

    「ふぁ……あぁ……っ！　でも、いいの……%CALLNAME:MASTER%と一緒に壊れるなら……」

    悪魔の妹は、恋人への絶対的な信頼を胸に、快楽に身を委ねた。

    「%CALLNAME:MASTER%……二人分の体温……すっごく熱いよ……」

    %CALLNAME:人物_フラン%は恋人に手を伸ばし、その頬に触れた。

    前からも後ろからも押し寄せる快感が、少女の全身を駆け巡る。

    「こんなに誰かに求められるなんて……夢みたいなのさ……」

    %CALLNAME:MASTER%が腰を動かすたび、%CALLNAME:人物_フラン%は甘く喘いだ。

    「んぅ……もっと……もっと奥まで……私のこと、いっぱい使って……」

    愛に飢えていた悪魔の妹は、二人に求められる喜びに酔いしれていた。

    「ひゃぁ……っ！　両方から……すごい……っ」

    %CALLNAME:人物_フラン%は二人に挟まれ、身動きが取れなくなっていた。

    前と後ろ、交互に突かれるたびに、理性が溶けていく。

    「私……%CALLNAME:MASTER%のこと……壊さないで……いられてる……よね……？」

    快楽に翻弄されながらも、%CALLNAME:人物_フラン%は恋人への配慮を忘れない。

    「あぁ……大丈夫……今の私……きっと、壊さないでいられる……っ」

    恋人への誓いを胸に、悪魔の妹は二人を受け入れ続けた。
