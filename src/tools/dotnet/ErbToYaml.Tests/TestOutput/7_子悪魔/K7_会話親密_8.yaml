- id: fallback
  content: >-
    「ひっ……！ な、なにするの……！？」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の秘部に触れた。

    %CALLNAME:TARGET%は驚いて体を縮こまらせた。

    「そ、そんなところ……さわらないでよぉ……」

    %CALLNAME:TARGET%は怯えた表情で、必死に身を守ろうとしている。

    「……怖いよ……やめてください……」

    「やっ……だめ……だめぇ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の愛撫に、思わず声を漏らしてしまった。

    「い、いきなりこんなこと……わたし、わからないよ……」

    %CALLNAME:TARGET%は目に涙を浮かべながら、困惑している。

    「咲夜さん……助けて……」

    妖精の小さな体が、恐怖と戸惑いで震えていた。

    「ふぇっ……！ やめて……っ」

    %CALLNAME:MASTER%の指が秘所に触れると、%CALLNAME:TARGET%は身を捩った。

    「まだ……お話もあんまりしてないのに……こんなこと……」

    %CALLNAME:TARGET%は困った顔で首を振っている。

    「……もうちょっと仲良くなってから……に、してほしいの……」

    「んっ……やぁ……いやぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手から逃れようとしている。

    「な、なんでこんなことするの……？」

    %CALLNAME:TARGET%は怯えた目でこちらを見上げた。

    「あたし、なにか悪いことした……？」

    妖精の瞳には、不安と恐怖が滲んでいた。

    「……ごめんなさい……だから、やめて……」
