character: レミリア
situation: K5_挿入
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……今日は、後ろで感じたいの」

    %CALLNAME:人物_レミリア%は頬を染めながら、%CALLNAME:MASTER%の上に跨った。

    小さな身体が位置を調整し、未経験の場所を宛てがう。

    「あなたになら……全部、許せるから……」

    そう囁いて%CALLNAME:人物_レミリア%は腰を沈めた。後ろに異物感が広がる。

    「っ……ぁ……入って、きてる……っ」

    500年の吸血鬼が、恋人にすべてを委ねて禁断の悦びに身を震わせた。

    「ふふ……こっちも、あなたに捧げたいの……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を見つめ、ゆっくりと腰を落とした。

    後ろに異物が侵入する感覚に、思わず息を呑む。

    「はぁ……っ、痛い……けど、あなただから……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胸に手を置き、さらに深く飲み込んだ。

    「んぅ……っ、奥まで……感じる……」

    紅魔館の主は、愛する者に最も恥ずかしい場所を明け渡していた。

    「……%CALLNAME:MASTER%、私の全部を知ってほしいの」

    %CALLNAME:人物_レミリア%は紅い瞳を潤ませ、%CALLNAME:MASTER%の上に跨った。

    後ろを使う恥ずかしさよりも、愛する人との一体感を求めた。

    「後ろも……あなたのものよ……」

    %CALLNAME:人物_レミリア%が腰を沈めると、締め付けるような圧迫感が走る。

    「あっ……ぁぁ……こっちは、全然違う……っ」

    永遠を生きる吸血鬼が、この瞬間だけは恋人に全てを捧げていた。

    「今夜は……特別なことがしたいの……」

    %CALLNAME:人物_レミリア%は恥ずかしそうに目を伏せ、%CALLNAME:MASTER%の上に座った。

    普段は見せない弱々しさで、後ろに%CALLNAME:MASTER%を迎え入れる。

    「んっ……あ……っ、ここは、初めて……だから……」

    %CALLNAME:人物_レミリア%は小さく喘ぎながらゆっくりと腰を落とした。

    「ぁ……っ、奥まで……あなたで、埋まってる……」

    高貴な吸血鬼の顔は快楽と羞恥に染まり、恋人の上で蕩けていた。
  priority: 4
- id: talent_3_1
  content: >-
    「な、なによ……こっちだって、できるに決まってるでしょ……」

    %CALLNAME:人物_レミリア%は顔を真っ赤にしながら%CALLNAME:MASTER%の上に跨った。

    後ろを使うなんて恥ずかしいが、負けたくないプライドが勝った。

    「べ、別に感じてなんかないんだから……っ」

    %CALLNAME:人物_レミリア%が腰を沈めると、異物感に思わず声が漏れた。

    「ひっ……あ……っ、こ、これくらい……なんてこと……」

    強がりながらも、その表情は快感と痛みに歪んでいた。

    「……ふん、こういうのも試してみないとわからないでしょ」

    %CALLNAME:人物_レミリア%は照れ隠しに尊大な態度を取り、%CALLNAME:MASTER%の上に座った。

    しかし後ろに異物を迎え入れると、すぐに余裕がなくなった。

    「ちょ……っ、待って……入る……っ」

    %CALLNAME:人物_レミリア%は必死に声を抑えようとした。

    「や……っ、ここ、変な感じ……っ、笑わないでよ……！」

    威厳を保とうとしても、禁断の快感に身体は正直だった。

    「こ、後ろがどうとか……興味があるから試すだけよ……」

    %CALLNAME:人物_レミリア%は顔を背けながら%CALLNAME:MASTER%の上に跨った。

    本当は怖いが、好奇心と意地が後押しする。

    「動かないでよ……自分のペースでやるんだから……」

    %CALLNAME:人物_レミリア%がゆっくり腰を下ろすと、切なげな声が漏れた。

    「あ……ぁぁ……っ、入って……きてる……」

    恥ずかしさと快感が混ざり、%CALLNAME:人物_レミリア%は素直になれないまま腰を動かした。

    「あ、あんたのために試すんじゃないからね……っ！」

    %CALLNAME:人物_レミリア%は耳まで真っ赤にして%CALLNAME:MASTER%の上に座った。

    後ろを差し出す恥ずかしさに、吸血鬼のプライドは崩壊寸前。

    「私が、知りたいだけ……なんだから……」

    %CALLNAME:人物_レミリア%が腰を沈めると、思わず目を潤ませた。

    「ぅ……っ、痛……でも……変な感じ……っ」

    素直になれない吸血鬼が、禁断の快感に翻弄されていた。
