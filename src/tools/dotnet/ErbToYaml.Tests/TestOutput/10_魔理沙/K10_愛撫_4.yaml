entries:
- id: fallback
  content: >-
    「んあっ……！　そこ、舐めるのかよ……！」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%に後ろから舌で愛撫されている。

    普段の威勢のいい魔法使いも、この恥ずかしい行為には顔を真っ赤にしていた。

    「は、恥ずかしいって……でも、お前だから……いいぜ……」

    %CALLNAME:人物_魔理沙%は震える声で、恋人だけに許す行為だと告げた。

    「……後ろも、舐められて感じるなんて……お前のせいだからな……」

    照れ隠しに強がりながらも、%CALLNAME:人物_魔理沙%は快感に身を委ねていた。

    「ひゃあっ……！　舌、熱いぜ……」

    %CALLNAME:MASTER%の舌が菊座を這うたび、%CALLNAME:人物_魔理沙%の身体がびくりと跳ねる。

    この場所を舐められる恥ずかしさは何度経験しても慣れない。

    「……っ、お前の舌……奥まで……んっ」

    %CALLNAME:人物_魔理沙%は快感と羞恥に悶えながら、シーツを握りしめた。

    「……%CALLNAME:MASTER%……好きだぜ……だからこそ、恥ずかしいんだよ……」

    絞り出すような声で、%CALLNAME:人物_魔理沙%は正直な気持ちを伝えた。

    「やぁ……っ、そこ舐めるの……変態だぜ%CALLNAME:MASTER%……」

    %CALLNAME:人物_魔理沙%は恋人を詰りながらも、腰を引こうとはしなかった。

    むしろ自分からお尻を突き出すようにして、%CALLNAME:MASTER%の舌を求めている。

    「……私も変態になっちゃったな……お前のせいで」

    %CALLNAME:人物_魔理沙%は自嘲気味に笑いながら、甘い声を漏らした。

    「……でも、嫌いじゃないぜ……お前とするなら、全部……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに、でも幸せそうに呟いた。

    「あっ……ん……そこ、くすぐったいって……」

    %CALLNAME:人物_魔理沙%は四つん這いの姿勢で、%CALLNAME:MASTER%にお尻を舐められている。

    魔法使いとしての誇りも、恋人の前では役に立たない。

    「……舌が中に入って……変な感じだぜ……」

    %CALLNAME:人物_魔理沙%は枕に顔を埋めて、恥ずかしさを紛らわせようとした。

    「……お前だけだからな……こんなの許すの……」

    くぐもった声で、%CALLNAME:人物_魔理沙%は愛の言葉を伝えた。
