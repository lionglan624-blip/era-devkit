character: 小悪魔
situation: K2_口挿入
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……ふふっ、泡踊り、してほしいんですの？」

    %CALLNAME:人物_小悪魔%は悪戯っぽく笑いながら、石鹸を手に取った。

    泡を全身に塗りたくり、その白い肌がぬるぬると光る。

    「悪魔の肌……味わってくださいませ……んっ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の体に全身を擦り付けた。

    「ぬる……すべ……ふふ、%CALLNAME:MASTER%の体、あったかい……」

    柔らかい胸が%CALLNAME:MASTER%の胸板に押し付けられる。

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の体に抱きついた。

    「んっ……すべすべ……気持ちいいですわ……」

    泡で覆われた肌がぬるりと滑り、密着していく。

    「は……ん……%CALLNAME:MASTER%……もっと……」

    %CALLNAME:人物_小悪魔%は腰を使って下半身を擦り付けた。

    「……私も……気持ちよくなってきちゃいました……」

    %CALLNAME:人物_小悪魔%の尾がぴくぴくと震えている。

    「ねえ、%CALLNAME:MASTER%……私の体、気持ちいいですか？」

    %CALLNAME:人物_小悪魔%は体を擦り付けながら、甘い声で囁いた。

    乳首が%CALLNAME:MASTER%の肌に当たるたび、小さく喘ぐ。

    「んっ……ふぁ……こうやって……洗ってあげますわね……」

    %CALLNAME:人物_小悪魔%は一物にも太腿を絡めていく。

    「ここも……綺麗にしてあげますから……ぬる……」

    ぬめりを帯びた肌が一物を包み込む。

    %CALLNAME:人物_小悪魔%は蕩けるような笑みで体を預けた。

    「%CALLNAME:MASTER%……私……あなたのこと……」

    ねっとりと全身を絡ませながら、愛を囁く。

    「こうして……触れ合えるだけで……幸せですわ……」

    %CALLNAME:人物_小悪魔%は脚を絡め、陰部を%CALLNAME:MASTER%の太腿に押し付けた。

    「んぁっ……は……私の全部……%CALLNAME:MASTER%のものですから……」

    %CALLNAME:人物_小悪魔%の体から甘い香りが漂う。
