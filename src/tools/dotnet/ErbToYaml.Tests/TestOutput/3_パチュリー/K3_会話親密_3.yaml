character: パチュリー
situation: K3_会話親密
entries:
- id: fallback
  content: >-
    「んっ……やぁ……」

    %CALLNAME:TARGET%はされるがままに、%CALLNAME:MASTER%に尻をなでられている。

    「……%CALLNAME:MASTER%、その手付き……いやらしいわ……」

    %CALLNAME:TARGET%は熱い息を吐きながらも、抵抗をしなかった。

    「……本を読んでいるのに、集中できないじゃない」

    そう言いながらも、%CALLNAME:TARGET%は身を寄せてきた。

    「あ……そこ……」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の尻の丸みをゆっくりとなぞっている。

    %CALLNAME:TARGET%は紅い顔で恥情に耐えている。

    「……ね、%CALLNAME:MASTER%……こういうのは、部屋を閉めてから……」

    上気した顔で、%CALLNAME:TARGET%はそう訴えてきた。

    それを意に介さず、%CALLNAME:MASTER%は%CALLNAME:TARGET%の尻を撫で続けた。

    「……ん……くぅ……」

    %CALLNAME:TARGET%は手元の魔導書を閉じ、%CALLNAME:MASTER%の手に身を委ねた。

    「……あなたの手は、魔力を乱すわ……でも」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げ、頬を染めた。

    「……嫌じゃない。むしろ、もっと触って」

    珍しく素直な言葉が、静かな図書館に響いた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は読書を中断し、%CALLNAME:MASTER%の方を向いた。

    「……今日は本より、あなたの方がいいわ」

    そう言って、%CALLNAME:TARGET%は%CALLNAME:MASTER%の手を自分の腰に導いた。

    「……もっと触って。私を感じて」

    %CALLNAME:TARGET%は恥ずかしそうに、でも確かに%CALLNAME:MASTER%を求めていた。
  priority: 4
- id: talent_3_1
  content: >-
    「んっ……やっ……」

    %CALLNAME:TARGET%はされるがままでいる。

    「やぁ……ちょっと……そろそろ、やめ……」

    そう言いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の手を止めには来なかった。

    「……本に集中できないじゃない」

    %CALLNAME:TARGET%は本で顔を隠しながら、小さく息を吐いた。

    「んぅ……やぁ……」

    %CALLNAME:TARGET%は紅い顔で%CALLNAME:MASTER%に尻を撫でられている。

    「んっ……服が、しわになるわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手をそっと止めた。

    「……別に、嫌とは言ってないけど。少し、心の準備が」

    照れくさそうに、%CALLNAME:TARGET%は視線を逸らした。

    「あっ……」

    %CALLNAME:TARGET%は手元の本から視線を上げ、%CALLNAME:MASTER%を見た。

    「……そこを触られると、文字を追う目が泳いでしまうわ」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の尻の丸みをなぞっている。

    「……まあ、この本は何度も読んだものだから」

    %CALLNAME:TARGET%は小さく息を吐き、目を閉じた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は困惑したように%CALLNAME:MASTER%を見上げた。

    「……こういうこと、急にされると……困るの」

    でも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の手を払いのけようとはしなかった。

    「……少しだけよ。長いと、私……おかしくなるから」

    頬を染めて、%CALLNAME:TARGET%は本に顔を埋めた。
  priority: 3
