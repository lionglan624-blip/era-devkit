name: Test

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore erakoumakanNTR.sln

      - name: Build
        run: dotnet build erakoumakanNTR.sln --no-restore --configuration Release

      - name: Run tests
        run: dotnet test erakoumakanNTR.sln --no-build --configuration Release --verbosity normal
