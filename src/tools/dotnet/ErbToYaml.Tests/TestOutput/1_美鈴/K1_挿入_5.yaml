    「……でも……%CALLNAME:MASTER%の顔、よく見えて……嬉しい、です……」

    照れながらも、%CALLNAME:人物_美鈴%は嬉しそうに%CALLNAME:MASTER%を見つめた。

    「あ……ん……じ、自分で動くと……すごく、感じて……」

    %CALLNAME:人物_美鈴%は快感に声を漏らしながら、腰を揺らした。

    「こんな姿……恥ずかしいですけど……」

