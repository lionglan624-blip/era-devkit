character: フラン
situation: K6_挿入
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……こうして向かい合うと、ドキドキするのさ」

    %CALLNAME:人物_フラン%は恋人の胡坐の上に座りながら、顔を赤らめた。

    互いの顔がすぐ近くにある体勢に、心臓が高鳴っている。

    「でも……%CALLNAME:MASTER%の顔が近くで見れるから、嬉しいの」

    %CALLNAME:人物_フラン%がゆっくりと腰を落とすと、熱いものが中に入ってきた。

    「んっ……ぁ……入ってくる……%CALLNAME:MASTER%が、私の中に……」

    悪魔の妹は、恋人と繋がる幸福感に酔いしれていた。

    「私が上にいると……%CALLNAME:MASTER%を壊さないでいられるの」

    %CALLNAME:人物_フラン%は恋人を見下ろしながら、穏やかに微笑んだ。

    自分の力加減が怖いからこそ、この体勢が安心できる。

    「%CALLNAME:MASTER%のこと、絶対壊したくないから……こうして繋がりたいのさ」

    %CALLNAME:人物_フラン%が腰を揺らすと、甘い吐息が漏れた。

    「あぁ……んっ……%CALLNAME:MASTER%の顔……気持ちよさそう……嬉しい……」

    495年の孤独を知る少女は、恋人を壊さずに愛せる喜びを噛み締めていた。

    「ね、%CALLNAME:MASTER%……抱きしめて……？」

    %CALLNAME:人物_フラン%は恋人の首に腕を回しながら、甘えた声で囁いた。

    向かい合う体勢なら、いつでも抱きしめられる。

    「こうしてると……本当に繋がってるんだって、実感できるのさ」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%を抱きしめると、彼女は幸せそうに笑った。

    「んっ……ふふ……あったかい……%CALLNAME:MASTER%の体温、感じる……」

    悪魔の妹は、抱擁と結合の二重の温もりに包まれていた。

    「%CALLNAME:MASTER%……キス、していい……？」

    %CALLNAME:人物_フラン%は近くにある恋人の唇を見つめながら問いかけた。

    向かい合う体勢が、自然と接吻への衝動を呼び起こす。

    「繋がりながら、キスもできるなんて……贅沢なのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の唇に自分の唇を重ねた。

    「ん……ちゅ……んふぅ……下も上も、%CALLNAME:MASTER%と繋がってる……」

    恋人への愛情を全身で表現しながら、悪魔の妹は腰を揺らし続けた。
  priority: 4
- id: talent_3_1
  content: >-
    「こ、こうやって向かい合うの……恥ずかしいのさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の胡坐の上で、視線を泳がせた。

    好きな人の顔が目の前にあると、どこを見ていいかわからない。

    「でも……%CALLNAME:MASTER%の顔、ちゃんと見たいから……」

    %CALLNAME:人物_フラン%がゆっくりと腰を落とすと、熱いものが入ってきた。

    「んっ……ぁ……入ってる……%CALLNAME:MASTER%の、私の中に……」

    悪魔の妹は、羞恥と喜びが混じり合った表情を浮かべていた。

    「%CALLNAME:MASTER%……私、ちゃんとできてる……？」

    %CALLNAME:人物_フラン%は不安そうに%CALLNAME:MASTER%を見つめた。

    好きな人を喜ばせたいという気持ちが、緊張を生んでいる。

    「こうやって動けば……%CALLNAME:MASTER%、気持ちいい……？」

    %CALLNAME:人物_フラン%がぎこちなく腰を揺らすと、甘い声が漏れた。

    「あっ……ん……私も、気持ちいいかも……%CALLNAME:MASTER%と繋がってるから……」

    好きな人のために頑張る姿は、どこか健気だった。

    「%CALLNAME:MASTER%の顔……こんなに近くで見ると……ドキドキするのさ」

    %CALLNAME:人物_フラン%は顔を赤くしながら呟いた。

    向かい合う体勢が、恋心をより強く意識させる。

    「……%CALLNAME:MASTER%は、私の顔見て……どう思う……？」

    %CALLNAME:人物_フラン%が腰を動かすと、快感に表情が揺れた。

    「んっ……あ……変な顔、してないよね……？　恥ずかしいの……」

    好きな人にどう見られているか気になる乙女心が、悪魔の妹にもあった。

    「私が上にいると……%CALLNAME:MASTER%のこと、守れる気がするのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見下ろしながら言った。

    壊してしまいそうで怖い力を、この体勢なら加減できる。

    「……好きな人を壊しちゃうなんて、絶対嫌だから」

    %CALLNAME:人物_フラン%がそっと腰を揺らすと、吐息が混じった声を上げた。

    「んぅ……あ……%CALLNAME:MASTER%……気持ちいい……？　よかった……」

    好きな人を傷つけたくない優しさが、その動きに込められていた。
  priority: 3
