    「……ここ、好きでしょ……？　ぴくって反応した」

    %CALLNAME:人物_美鈴%は楽しそうに敏感な場所を弄った。

    「……たくさん気持ちよくなって……私のこと、もっと好きになって」

    「……ねえ、%CALLNAME:MASTER%……こっち向いて」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の顔を覗き込んだ。

    「……その顔、可愛い……私にそんな表情させられるの、嬉しいな」

    %CALLNAME:人物_美鈴%は愛撫しながら%CALLNAME:MASTER%の唇に軽く触れた。

    「……もっと……もっと乱れていいのよ……？」

    武術家らしい力強い手が、今は優しく%CALLNAME:MASTER%を愛でている。

    「……全部、私が受け止めてあげるから」

    「……ふふ、%CALLNAME:MASTER%の体、熱くなってきた……」

    %CALLNAME:人物_美鈴%は体温の変化を敏感に察知していた。

    「……門番として鍛えた手、こういう使い方もあるのよ」

    %CALLNAME:人物_美鈴%は少し照れながら冗談めかして言った。

    「……嘘よ……%CALLNAME:MASTER%だから、こうしてあげたいの」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%を抱き寄せ、耳元に囁いた。

    「……大好き……私の手で、気持ちよくなって……」
