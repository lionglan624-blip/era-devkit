- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%の背後に立った。

    「お客様のご要望ですから……このように抱けばよろしいのでしょう」

    瀟洒なメイドは、感情を完全に押し殺して%CALLNAME:MASTER%の中に入った。

    「……早く済ませていただけますか」

    「私には、お嬢様のお世話という仕事がありますので」

    %CALLNAME:TARGET%の態度は事務的で、冷たさを帯びていた。

    「……ふぅ……」

    %CALLNAME:TARGET%は小さく息を吐きながら、淡々と%CALLNAME:MASTER%を抱いていた。

    「後ろから抱いていると、貴方の背中しか見えませんわね」

    「私に何を期待しているのか……無駄ですけれど」

    %CALLNAME:TARGET%は表情を変えることなく、腰を動かし続ける。

    「……感情移入などしませんわよ」

    完璧なメイドは、あくまでプロフェッショナルを貫いていた。

    「……これは仕事です」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「お客様の相手をするのも、メイドの務め……」

    %CALLNAME:TARGET%は淡々と%CALLNAME:MASTER%を抱き続けている。

    「……っ」

    一瞬、表情が揺らいだが、すぐに戻る。

    「……何でもありませんわ」

    冷静さを取り繕いながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%に身を委ねさせた。

    「……貴方に感情を見せる必要はありませんわ」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%の背中を見下ろした。

    「私はメイド。貴方はお客様。それ以上でも以下でもありません」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腰を掴み、無感情に動き続ける。

    「……ん……」

    僅かに声が漏れ、%CALLNAME:TARGET%は唇を噛んだ。

    「……早く終わらせてください」

    瀟洒な従者は、最後まで感情を見せずに%CALLNAME:MASTER%を抱き続けた。
