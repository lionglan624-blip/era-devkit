character: 子悪魔
situation: K7_愛撫
entries:
- id: fallback
  content: >-
    「んっ……あ、乳首……いじられてる……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕の中で、胸の先を弄ばれている。

    敏感な突起が指に摘ままれるたび、妖精の小さな体がぴくりと震えた。

    「……やぁ……そこ、くすぐったいの……でも、気持ちいい……」

    %CALLNAME:TARGET%は目を潤ませながら、%CALLNAME:MASTER%にしがみついている。

    「……えへへ……%CALLNAME:MASTER%、あたしの乳首、好き……？」

    妖精は甘えた声で問いかけながら、体を%CALLNAME:MASTER%に預けた。

    「ひゃぁ……そこ、摘ままないでぇ……」

    %CALLNAME:TARGET%は抗議の声を上げながらも、逃げようとはしない。

    %CALLNAME:MASTER%の指が乳首を転がすと、甘い痺れが背筋を駆け上がった。

    「んっ……あっ……乳首だけで、こんなに……」

    %CALLNAME:TARGET%は頬を染めて、とろんとした目で%CALLNAME:MASTER%を見上げている。

    「……%CALLNAME:MASTER%って、あたしの弱いとこ、全部知ってるね……」

    妖精は恥ずかしそうに、でも嬉しそうに微笑んだ。

    「あっ……%CALLNAME:MASTER%、そこ……敏感なの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手の中で身をくねらせている。

    乳首を引っ張られたり、ねじられたり、指で弾かれたり。

    「んぅ……やっ……変な声、出ちゃう……」

    %CALLNAME:TARGET%は口を押さえようとするが、甘い吐息が漏れてしまう。

    「……%CALLNAME:MASTER%のせいで……あたし、おかしくなっちゃうの……」

    妖精は幸せそうに、%CALLNAME:MASTER%の愛撫に身を委ねていた。

    「ふぁ……乳首、こりこりされてる……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋めながら、快楽に耐えている。

    小さな乳首がすっかり硬くなり、%CALLNAME:MASTER%の指に敏感に反応していた。

    「……%CALLNAME:MASTER%……あたしね、幸せ……」

    %CALLNAME:TARGET%は蕩けるような笑顔を浮かべた。

    「……ずっとこうして……%CALLNAME:MASTER%に触られていたいの……」

    妖精は甘い吐息とともに、%CALLNAME:MASTER%への愛を囁いた。
