character: 子悪魔
situation: K7_愛撫
entries:
- id: fallback
  content: >-
    「ふぇっ……%CALLNAME:MASTER%、そこ……舐めてるの……？」

    %CALLNAME:TARGET%は四つん這いになって、後ろを%CALLNAME:MASTER%に晒している。

    %CALLNAME:MASTER%の舌が菊穴を這うと、妖精の小さな体がびくりと震えた。

    「んっ……やぁ……くすぐったいの……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、シーツを握りしめている。

    「……でも……%CALLNAME:MASTER%にされると、嫌じゃないの……」

    妖精は恥じらいながらも、お尻を突き出して%CALLNAME:MASTER%を受け入れていた。

    「あっ……そこ、舌で……んぅ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の舌を感じて、甘い声を漏らしている。

    後ろの窄みを舐められる初めての感覚に、体が熱くなっていく。

    「%CALLNAME:MASTER%……あたしの、そんなとこ……」

    %CALLNAME:TARGET%は恥ずかしさに耐えながらも、腰を小さく揺らした。

    「……なんか、お腹の奥がきゅってなるの……」

    妖精は困惑しながらも、%CALLNAME:MASTER%の愛撫に蕩けていく。

    「ひゃぁっ……！　%CALLNAME:MASTER%、舌、入ってきそう……」

    %CALLNAME:TARGET%は驚いて声を上げたが、逃げようとはしなかった。

    %CALLNAME:MASTER%の舌先が窄みを押し広げる感覚に、妖精の体が震える。

    「んっ……ふぁ……変な感じ……」

    %CALLNAME:TARGET%は枕に顔を埋めながら、されるがままになっている。

    「……恥ずかしいけど……%CALLNAME:MASTER%になら、いいの……」

    妖精の小さなお尻が、%CALLNAME:MASTER%の舌の動きに合わせてぴくぴくと反応した。

    「やぁん……そこ、敏感なの……」

    %CALLNAME:TARGET%は目を潤ませながら、%CALLNAME:MASTER%に後ろを舐められている。

    舌が這うたびに、甘い痺れが背筋を駆け上がっていく。

    「……あたしね、こんなとこで気持ちよくなるなんて、知らなかったの……」

    %CALLNAME:TARGET%は恥ずかしそうに顔を隠しながら、腰を揺らしている。

    「……%CALLNAME:MASTER%に教えてもらっちゃった……えへへ……」

    妖精は照れながらも、幸せそうに%CALLNAME:MASTER%の愛撫を受けていた。
