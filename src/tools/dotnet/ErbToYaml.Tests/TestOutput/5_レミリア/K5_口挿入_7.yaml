- id: fallback
  content: >-
    「……ここを、舐めてほしいの？」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    「使用人にこんなところを舐めさせるなんて……相当な変態ね」

    %CALLNAME:人物_レミリア%は溜息をつきながら、顔を近づけた。

    「……特別よ。日頃の働きへの褒美だと思いなさい」

    館の主は威厳を保ちながらも、言われた通りに舌を這わせ始めた。

    「……こうすればいいのかしら」

    「……ふぅん」

    %CALLNAME:人物_レミリア%は興味なさそうに装いながらも、舌を動かしていた。

    「500年生きてきたけど……こういうことは、初めてね」

    %CALLNAME:人物_レミリア%はぎこちなく舌を這わせた。

    「……%CALLNAME:MASTER%、気持ちいいの？　もっと強く舐めていいの？」

    戸惑いながらも、%CALLNAME:人物_レミリア%は舌での奉仕を続けていた。

    「……調子に乗らないでよね。今日だけの特別よ」

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は複雑な表情で%CALLNAME:MASTER%を見つめた。

    「私がこんなところを舐めるなんて……誰にも言わないでよね」

    %CALLNAME:人物_レミリア%は恥ずかしそうに、舌を動かし続けた。

    「……%CALLNAME:MASTER%だから、許してあげてるのよ」

    その言葉には、自分でも気づいていない特別な感情が滲んでいた。

    「……もう少しだけ、付き合ってあげるわ」

    「……こうすると、気持ちいいの？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の反応を確認しながら、舌を動かしていた。

    「……ふん、変態的な趣味ね。でも、悪くない反応だわ」

    少しだけ満足げに、%CALLNAME:人物_レミリア%は微笑んだ。

    「……私に舐めさせてもらえることを、光栄に思いなさい」

    高飛車な態度だが、その声にはどこか暖かさがあった。

    500年を生きた吸血鬼の心に、何かが芽生え始めていた。
  priority: 2
- id: fallback
  content: >-
    「……何のつもりかしら」

    %CALLNAME:人物_レミリア%は冷たい視線で%CALLNAME:MASTER%を見た。

    「使用人に主がこんな場所を舐めるなんて、本来あり得ないことよ」

    %CALLNAME:人物_レミリア%は溜息をついた。

    「……まあいいわ。暇つぶしに付き合ってあげる」

    吸血鬼は気怠そうに顔を近づけ、%CALLNAME:MASTER%の恥ずかしい場所に舌を這わせた。

    「……早く終わらせなさいよ」

    「……」

    %CALLNAME:人物_レミリア%は無言で舌を動かしていた。

    その表情には、退屈さと僅かな嫌悪が滲んでいる。

    「……使用人の分際で、随分と変態的な趣味ね」

    %CALLNAME:人物_レミリア%は投げやりな動きで舌を這わせ続けた。

    「……次はないと思いなさい」

    紅魔館の主は、義務的に舌を動かすだけだった。

    「……ふん」

    %CALLNAME:人物_レミリア%は興味なさそうに%CALLNAME:MASTER%を見ていた。

    「こんなことで喜ぶなんて……人間って変態ね」

    %CALLNAME:人物_レミリア%は適当に舌を動かしながら、窓の外を眺めた。

    「……早く済ませてちょうだい。私は忙しいの」

    そこに愛情は欠片もなかった。

    500年を生きた吸血鬼にとって、これは単なる時間の浪費だった。

    「……これで満足？」

    %CALLNAME:人物_レミリア%は退屈そうに問いかけた。

    吸血鬼の冷たい舌は、事務的に動くだけ。

    「……私がこんなことをしてあげてるんだから、感謝しなさいよね」

    %CALLNAME:人物_レミリア%は不機嫌そうに言い放った。

    「……もう二度と頼まないで」

    紅魔館の主は、心をどこかに置き去りにしたまま奉仕していた。
  priority: 1
