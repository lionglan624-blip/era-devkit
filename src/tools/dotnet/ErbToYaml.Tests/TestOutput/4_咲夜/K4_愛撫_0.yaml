- id: fallback
  content: >-
    「っ……%CALLNAME:MASTER%？」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%に触れると、%CALLNAME:TARGET%は少し驚いた様子を見せた。

    「……何をなさっているのですか」

    %CALLNAME:TARGET%は困惑しながらも、すぐには振り払わなかった。

    「……お客様に触れられるのは、少々困りますわ」

    そう言いながらも、%CALLNAME:TARGET%の声は厳しさを欠いていた。

    「あ……その……」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%に触れている。

    %CALLNAME:TARGET%は戸惑った様子で、%CALLNAME:MASTER%を見つめた。

    「……%CALLNAME:MASTER%、そのような行為は……」

    「……いえ、何でもありませんわ」

    %CALLNAME:TARGET%は小さく息を吐いて、%CALLNAME:MASTER%の手を見つめている。

    「……っ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の愛撫に、僅かに体を強張らせた。

    「……驚かさないでくださいまし」

    %CALLNAME:TARGET%は落ち着いた声で言いながらも、少し動揺している。

    「……まあ、お客様のおもてなしも、メイドの務めですわね」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に触れられ、少し困った表情を見せた。

    「このようなことをなさると……お嬢様に報告しなければなりませんわ」

    そう言いながらも、%CALLNAME:TARGET%の声には本気の警告がこもっていない。

    「……今回だけですわよ。見逃して差し上げるのは」

    %CALLNAME:TARGET%は小さくため息をついた。
