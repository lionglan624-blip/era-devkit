- id: fallback
  content: >-
    「……これが……あなたの……」

    %CALLNAME:TARGET%は興味深そうに%CALLNAME:MASTER%の一物を見つめた。

    「……触れてみるわ……研究として……」

    %CALLNAME:TARGET%は言い訳をしながら、おそるおそる手を伸ばした。

    「……熱いのね……生きているのだから、当然だけれど……」

    学者として観察しながら、%CALLNAME:TARGET%は手を動かし始めた。

    「……ふむ……こうすると反応が変わるのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を観察しながら手を動かしている。

    「……握る強さ……速さ……変数が多いわ……」

    %CALLNAME:TARGET%は学者らしく分析していた。

    「……でも、なぜか胸が騒ぐの……これは何かしら……」

    自分の感情に戸惑いを覚えていた。

    「……あなたはこれで満足するの……？」

    %CALLNAME:TARGET%は疑問を口にしながら、手を動かし続けている。

    「……こんな単純な刺激で……不思議ね……」

    %CALLNAME:TARGET%は首を傾げた。

    「……まあ、あなたがそう望むなら……続けるわ」

    淡々と、しかし確実に手は動き続けていた。

    「……」

    %CALLNAME:TARGET%は黙々と手を動かしていた。

    「……腕が疲れてきたわ……体が弱いのだから、仕方ないでしょう」

    %CALLNAME:TARGET%は少し休みながら言った。

    「……でも、約束したから……最後まで続けるわ」

    そう言って、%CALLNAME:TARGET%は再び手を動かし始めた。
