- id: fallback
  content: >-
    「……これも……お客様へのサービスですわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上にまたがり、事務的に呟いた。

    「メイドとして……ご要望にお応えするのは当然のこと……」

    しかし、腰を沈めた瞬間、表情が揺らいだ。

    「っ……あ……」

    「……少し……感じているだけですわ……」

    %CALLNAME:TARGET%はぎこちなく腰を動かし始めた。

    「……ん……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は複雑な表情で腰を揺らしている。

    「自分から動くなど……メイドとしては本来……」

    「でも……お客様のご要望ですから……」

    %CALLNAME:TARGET%が腰を落とすと、声が漏れてしまう。

    「あっ……そこ……」

    言葉を途中で飲み込み、%CALLNAME:TARGET%は唇を噛んだ。

    「……これは……仕事……ですから……」

    %CALLNAME:TARGET%は何度も自分に言い聞かせながら腰を動かしている。

    しかし、体は快感を覚え始めていた。

    「……ぅ……変な気分になってきましたわ……」

    「%CALLNAME:MASTER%のせいですからね……」

    %CALLNAME:TARGET%は責任を押し付けながらも、ペースを上げていく。

    「……もう少し……続けても構いませんわ……」

    「……っ……」

    %CALLNAME:TARGET%は声を堪えようとしたが、腰を動かすたびに漏れてしまう。

    「……プロとして……こんな声を出すべきではないのに……」

    「%CALLNAME:MASTER%、貴方は……私を困らせてばかりですわね……」

    恨めしそうに言いながらも、%CALLNAME:TARGET%の動きは止まらない。

    「……でも……嫌ではありませんの……」

    小さな声で認めながら、%CALLNAME:TARGET%は腰を振り続けた。
  priority: 2
- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%の上にまたがった。

    「お客様のご要望ですから……このように動けばよろしいのでしょう」

    瀟洒なメイドは、感情を完全に押し殺して腰を動かし始めた。

    「……早く済ませていただけますか」

    「私には、お嬢様のお世話という仕事がありますので」

    %CALLNAME:TARGET%の動きは機械的で、事務的な冷たさを帯びていた。

    「……ふぅ……」

    %CALLNAME:TARGET%は小さく息を吐きながら、淡々と腰を動かしていた。

    「上から見ていると、貴方の考えが読めるような気がしますわね」

    「私に何を期待しているのか……無駄ですけれど」

    %CALLNAME:TARGET%はペースを変えることなく、機械的に動き続ける。

    「……感情移入などしませんわよ」

    完璧なメイドは、あくまでプロフェッショナルを貫いていた。

    「……これは仕事です」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「お客様の相手をするのも、メイドの務め……」

    %CALLNAME:TARGET%は淡々と腰を上下させている。

    「……っ」

    一瞬、表情が揺らいだが、すぐに戻る。

    「……何でもありませんわ」

    「……貴方に感情を見せる必要はありませんわ」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見下ろした。

    「私はメイド。貴方はお客様。それ以上でも以下でもありません」

    %CALLNAME:TARGET%は規則正しく腰を動かし続ける。

    「……ん……」

    僅かに声が漏れ、%CALLNAME:TARGET%は唇を噛んだ。

    「……早く終わらせてください」
  priority: 1
