- id: fallback
  content: >-
    「……えっ？　お、おっぱいを吸う……？」

    %CALLNAME:TARGET%は目を丸くして、固まってしまった。

    「そ、そんな……あたしたち、そんな仲じゃ……」

    妖精は顔を真っ赤にして、後ずさりしようとする。

    「……赤ちゃんじゃないんですから……」

    %CALLNAME:TARGET%は困惑した声で訴えた。

    「……咲夜さんに怒られちゃいます……」

    「い、いやです……そんな恥ずかしいこと……」

    %CALLNAME:TARGET%は涙目で首を横に振った。

    「なんで……そんなことさせるんですか……」

    妖精は体を強張らせて、%CALLNAME:MASTER%から距離を取ろうとしている。

    「……あたし、何か悪いことしましたか……？」

    %CALLNAME:TARGET%は怯えた声で問いかけた。

    「……お願いです……普通にお話ししましょう……？」

    「……っ」

    %CALLNAME:TARGET%は何も言えずに、%CALLNAME:MASTER%を見つめている。

    恥ずかしさと戸惑いで、妖精の目には涙が浮かんでいた。

    「……わ、わからないです……なんで、そんなこと……」

    %CALLNAME:TARGET%は震える声で呟いた。

    「……メイドのお仕事じゃ、ないですよね……これ……」

    妖精は困惑して、どうしていいかわからない様子だった。

    「う……うぅ……」

    %CALLNAME:TARGET%は顔を手で覆って、その場にうずくまりそうになった。

    「……こんなこと……できません……」

    妖精は震えながら、小さく首を横に振り続けている。

    「%CALLNAME:MASTER%が怖い人じゃないと思いたいけど……」

    %CALLNAME:TARGET%は消え入りそうな声で呟いた。

    「……もう少し……仲良くなってからじゃ、だめですか……？」
