- id: fallback
  content: >-
    「――ん？　お茶……淹れてくれたのか？」

    %CALLNAME:TARGET%は少し戸惑った様子で湯飲みを受け取った。

    ふぅ、と息を吹きかけてから、ゆっくりとお茶を口に含む。

    「……悪くないな。人前に出してもいいんじゃないか？」

    %CALLNAME:TARGET%は素直に感想を言った。

    「まあ、私も紅茶なら淹れられるけどな。和食派だけど」

    そう言いながら、%CALLNAME:TARGET%は少し距離を保ったままお茶を飲み続けた。

    「へぇ、私に？　……悪いな、貰っとくぜ」

    %CALLNAME:TARGET%は遠慮がちに湯飲みを手に取った。

    ずず、と静かにお茶を啜る。

    「……うん、結構美味いじゃないか」

    %CALLNAME:TARGET%は意外そうな顔でそう言った。

    「まあ、たまにはこういうのも悪くないな」

    %CALLNAME:TARGET%は少しだけ打ち解けた様子でお茶を楽しんでいた。

    「あ、これ……私にか？」

    %CALLNAME:TARGET%は少し驚いた様子で湯飲みを見つめた。

    「……すまないな、手間かけさせて」

    そう言いながらも、嬉しそうにお茶を受け取る。

    「……うん、いい香りだな」

    %CALLNAME:TARGET%はゆっくりとお茶を楽しんだ。

    「……%CALLNAME:MASTER%、なかなか気が利くじゃないか」

    「わぁ……お茶か」

    %CALLNAME:TARGET%は少し照れくさそうに湯飲みを受け取った。

    「魔法の研究してると、こういう差し入れって嬉しいんだよな」

    そう言いながら、ふぅふぅと息を吹きかける。

    「……%CALLNAME:MASTER%、気遣いありがとうな」

    %CALLNAME:TARGET%は少しぎこちなく礼を言った。

    「……また、持ってきてくれてもいいぜ」
