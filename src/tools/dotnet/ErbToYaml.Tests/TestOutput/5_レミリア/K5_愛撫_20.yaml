    「使用人が主の胸にそんなものを付けようなど、身の程を知りなさい」

    %CALLNAME:人物_レミリア%は威厳を込めてそう言い放った。

    「……今回だけは見逃してあげるわ」

    紅魔館の主は、不機嫌そうに腕を組んだ。

    「……ふん」

    %CALLNAME:人物_レミリア%は搾乳機を見て、嘲笑を浮かべた。

    「そんな妙な器具で、私を喜ばせようというの？」

    500年を生きた吸血鬼は、高飛車な態度を崩さなかった。

    「使用人の分際で、随分と図々しいわね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を値踏みするように見ていた。

    「……咲夜を呼ぶ前に、下がりなさい」

    %CALLNAME:MASTER%が搾乳機を見せると、%CALLNAME:人物_レミリア%は眉をひそめた。

    「……何かしら、それは。透明なカップが二つ……」

    興味なさそうな態度だが、その紅い瞳は%CALLNAME:MASTER%を観察していた。

    「紅魔館の主の胸に、そんな器具を使おうというの？」

