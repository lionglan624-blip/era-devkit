entries:
- id: fallback
  content: >-
    「あっ……%CALLNAME:MASTER%、それ……お尻に入れるやつ……ですよね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したアナルバイブを見て、頬を染めながらも嬉しそうに微笑んだ。

    「えへへ……%CALLNAME:MASTER%がしたいなら、あたし……頑張るの……」

    妖精が自ら四つん這いになると、%CALLNAME:MASTER%は指で菊座をほぐしてからアナルバイブを宛てがった。

    アナルバイブが肛門に挿入された瞬間、%CALLNAME:TARGET%の体がびくんと跳ねる。

    「んあっ……！　入って……お尻の中で……うねうね動いてる……！」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみつきながら、未知の快楽に甘く身を震わせていた。

    「んぅ……%CALLNAME:MASTER%、今日もあれ……使ってくれるの……？」

    %CALLNAME:TARGET%は期待に満ちた瞳で、アナルバイブを見つめている。

    「あのぶるぶる……最初は怖かったけど……%CALLNAME:MASTER%と一緒だから、好きになっちゃった……」

    アナルバイブが菊座にゆっくりと沈み込んでいく。

    振動が始まると、%CALLNAME:TARGET%は甘い声を漏らした。

    「ふぁっ……あっ……！　お尻の中……ぶるぶるして……頭、ぼんやりしちゃうの……」

    %CALLNAME:TARGET%は蕩けた表情で、腸壁を揺さぶる振動に酔いしれていた。

    「えへへ……あたし、お尻でも%CALLNAME:MASTER%のお役に立てるの……嬉しいな……」

    %CALLNAME:TARGET%は恥ずかしそうに呟きながら、自分からお尻を突き出した。

    アナルバイブが妖精の小さな菊座に押し当てられ、ゆっくりと挿入されていく。

    「んっ……あぁっ……入ってくる……奥まで……届いて……」

    振動が腸壁を刺激し、%CALLNAME:TARGET%の体が小刻みに震え始める。

    「……%CALLNAME:MASTER%……あたし……こういうのも……好き……」

    途切れ途切れの告白が、快楽に蕩けた妖精の唇から漏れた。

    「あっ……また、してくれるんですか……嬉しいの……」

    %CALLNAME:TARGET%は無邪気に笑いながら、アナルバイブを受け入れる体勢になった。

    「……んっ、入れて……%CALLNAME:MASTER%の手で……」

    アナルバイブが肛門に挿入され、振動が妖精の体を内側から責め始める。

    「ひぁっ……！　やっ……あぁっ……お尻の中から、気持ちいいの……！」

    %CALLNAME:TARGET%は腰を小刻みに揺らしながら、逃げられない快楽を受け止めている。

    「……%CALLNAME:MASTER%のものだから……全部……感じちゃうの……」
  priority: 4
- id: talent_3_1
  content: >-
    「え……そ、それ……お尻に入れるやつ……ですよね……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したアナルバイブを見て、頬を赤く染めた。

    「……%CALLNAME:MASTER%がしたいなら……あたし、頑張ります……」

    アナルバイブが菊座に押し当てられ、ゆっくりと肛門に沈んでいく。

    「んっ……！　あっ、入ってきて……ひぁっ、振動してる……！」

    %CALLNAME:TARGET%は涙目になりながら、腸壁を揺さぶる快楽に耐えていた。

    「……こ、こんなところ……体が、変になっちゃいそうです……」

    「あ、あの……その、振動するやつ……また使うんですか……」

    %CALLNAME:TARGET%は緊張した面持ちで、アナルバイブを見つめている。

    「……お尻に……恥ずかしいけど……%CALLNAME:MASTER%のためなら……我慢します……」

    アナルバイブが肛門に挿入され、振動が始まった。

    「ひゃあっ……！　んっ、やぁっ……お尻の中で……ぶるぶるして……！」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕を掴み、必死に耐えている。

    「……%CALLNAME:MASTER%の前で……こんな声……恥ずかしいの……」

    「ま、また……あれ、ですか……」

    %CALLNAME:TARGET%は恥ずかしそうに視線を逸らしながら、スカートを捲り上げた。

    アナルバイブが菊座に宛てがわれると、妖精は小さく身震いした。

    「んぅ……っ……あぁっ……入ってきて……お尻の中が……いっぱいに……」

    振動が始まり、%CALLNAME:TARGET%の体がぴくぴくと反応する。

    「やっ……声、出ちゃう……お尻の中から……ずっと刺激されて……」

    妖精は片手で口を覆いながら、甘い喘ぎを堪えていた。

    「……こういうの、慣れないです……でも……」

    %CALLNAME:TARGET%は覚悟を決めたように目を閉じて、体を%CALLNAME:MASTER%に預けた。

    アナルバイブが肛門に挿入され、振動が妖精の体を内側から刺激する。

    「ふぁっ……んっ……！　お尻の奥まで……響いて……」

    %CALLNAME:TARGET%は涙を浮かべながら、アナルバイブの快楽に翻弄されている。

    「……%CALLNAME:MASTER%が……こうしたいなら……あたし、受け止めます……」

    健気な言葉とともに、妖精は腸壁を蹂躙する振動を受け入れた。
