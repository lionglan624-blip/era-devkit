  content: >-
    「……%CALLNAME:MASTER%……こんなところまで……」

    %CALLNAME:TARGET%は顔を赤らめながらも、恋人のために舌を伸ばした。

    「ん……っ……%CALLNAME:MASTER%の……」

    屈辱的なはずの行為に、%CALLNAME:TARGET%は不思議と充足感を覚えていた。

    「貴方のためなら……どんなことでも……」

    「……私……もっと……尽くしたいですわ……」

    メイドの矜持を捨て、%CALLNAME:TARGET%は恋人への愛を示した。

    「こんな……はしたないこと……」

    %CALLNAME:TARGET%は恥じらいながらも、%CALLNAME:MASTER%のために舌を動かしている。

    「ん……ふ……少し……不思議な味がしますわ……」

    「でも……%CALLNAME:MASTER%のものだから……」

    %CALLNAME:TARGET%は瞳を潤ませながら、献身的に奉仕を続けた。

    「……嫌じゃ……ありませんわ……」

    愛する人への奉仕に、%CALLNAME:TARGET%は喜びを見出していた。

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げながら、その秘所に舌を這わせる。

    「こんなことをする日が来るなんて……」

    「瀟洒なメイドとしては……失格ですわね……」

    しかし、その表情には後悔の色はなかった。

    「でも……貴方の前でなら……いいの……」

    %CALLNAME:TARGET%は恋人にだけ見せる顔で微笑んだ。

    「……はぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は熱い息を吐きながら、奉仕を続けている。

    「こうして……貴方に尽くせることが……」

    「私の幸せですわ……」

    %CALLNAME:MASTER%の反応を確かめながら、%CALLNAME:TARGET%は舌を動かした。

    「もっと……気持ちよくなって……くださいませ……」

    完璧なメイドは、恋人のためだけに身を捧げていた。
