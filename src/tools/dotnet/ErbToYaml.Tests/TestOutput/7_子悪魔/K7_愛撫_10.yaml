    「んぅ……吸われると……なんか、ふわふわする……」

    妖精の乳首が%CALLNAME:MASTER%の舌先で弄ばれ、少しずつ硬くなっていく。

    %CALLNAME:TARGET%は上目遣いで%CALLNAME:MASTER%を見つめた。

    「……%CALLNAME:MASTER%……あたしのこと、好きで……こういうこと、してるの……？」

    期待と不安が入り混じった瞳で、妖精は問いかけた。

    「あっ……やぁ……そこ、くすぐったい……」

    %CALLNAME:TARGET%は身をよじりながら、%CALLNAME:MASTER%の愛撫を受けていた。

    「んっ……ふぁ……おっぱい、舐められると……変な気持ち……」

    妖精の小さな胸が、%CALLNAME:MASTER%の唾液で濡れて光っている。

    %CALLNAME:TARGET%は照れくさそうに視線を逸らした。

    「……あたし、小さいから……つまんないかも……」

    そう言いながらも、妖精は%CALLNAME:MASTER%の頭を離そうとはしなかった。

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は恥ずかしそうに目を閉じて、%CALLNAME:MASTER%に身を任せていた。

    「吸われてると……なんか、安心する……不思議……」

    妖精の体から力が抜けて、とろんとした表情になっていく。

    %CALLNAME:TARGET%の指が%CALLNAME:MASTER%の髪を梳いた。

    「……もうちょっとだけ……このままで、いい……？」

    小さな声でお願いしながら、妖精は甘い時間に浸っていた。
