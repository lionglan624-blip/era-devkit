  content: >-
    「あっ……ちょ、ちょっと……」

    %CALLNAME:人物_美鈴%は驚いて体を固くした。

    「……お尻は、ちょっと……」

    %CALLNAME:人物_美鈴%は困惑しながらも、強くは拒まなかった。

    「……%CALLNAME:MASTER%、そういうことは、もう少し……」

    %CALLNAME:人物_美鈴%は顔を赤くして、言葉を濁した。

    「ひゃっ……な、何を……」

    %CALLNAME:人物_美鈴%は驚いて%CALLNAME:MASTER%を見た。

    「お、お尻を触るなんて……その、えっちです……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに俯いている。

    「……%CALLNAME:MASTER%って、意外と大胆なんですね……」

    困惑しつつも、どこか嬉しそうな様子だった。

    「えっ……あ、あの……」

    %CALLNAME:人物_美鈴%は戸惑った表情で%CALLNAME:MASTER%を見上げた。

    %CALLNAME:MASTER%の手が、柔らかな尻の曲線をなぞっている。

    「……門番の仕事中に、こういうことされると困るんですけど……」

