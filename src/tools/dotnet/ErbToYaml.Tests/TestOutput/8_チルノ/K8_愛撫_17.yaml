- id: fallback
  content: >-
    「――ひゃっ!?　な、なにそれ!?　あたいの中に入れる気!?」

    %CALLNAME:TARGET%は目を丸くして驚いた。

    バイブが挿入され、振動が始まると体の奥から震えが伝わる。

    「んんっ!?　ちょ、ちょっと……っ、中で……震えてる……っ!?」

    「%CALLNAME:MASTER%……これ……やばい……っ、奥まで響く……っ」

    恋人の腕に縋りつきながら、%CALLNAME:TARGET%は甘い声を漏らした。

    「――あ、またあれ?　あたいの中に入れるやつでしょ……」

    %CALLNAME:TARGET%は恥ずかしそうに脚を閉じた。

    「覚悟はできてるから……っ、ひぁっ!?　動いてる……っ!」

    バイブの振動が体の芯を揺らす。

    「んっ……%CALLNAME:MASTER%……これ……あたいの弱いとこ……わかってる……」

    恋人に身体を預けながら、%CALLNAME:TARGET%は快感に身を委ねた。

    「――ねぇ%CALLNAME:MASTER%、今日もあれ使う?　あたい……準備できてる……」

    %CALLNAME:TARGET%は期待を隠せずに言った。

    バイブが挿入され、振動が始まる。

    「っ……やっぱり……すごい……っ、中で……全部……震えて……っ」

    「最強のあたいでも……%CALLNAME:MASTER%には……敵わない……っ」

    幸せそうに微笑みながら、%CALLNAME:TARGET%は恋人に抱きついた。

    「――ひゃんっ!?　い、いきなり入れないでよ……っ!」

    %CALLNAME:TARGET%は不意打ちに声を上げた。

    「もう……%CALLNAME:MASTER%のいじわる……っ、でも……」

    振動が体の奥で響き渡る。

    「……こういうの……嫌いじゃない……っ、%CALLNAME:MASTER%だから……」

    恋人の前でだけ見せる、%CALLNAME:TARGET%の素直な姿だった。
