- id: fallback
  content: >-
    「……それでは、後ろからお相手いたしますわ」

    %CALLNAME:TARGET%は事務的に%CALLNAME:MASTER%の背後に立った。

    「これもメイドのサービスの一環ですから……」

    %CALLNAME:TARGET%は慎重に腰を進めていく。

    「……んっ……入りましたわ……」

    「力を抜いてくださいまし……すぐに終わらせますから……」

    %CALLNAME:TARGET%はプロとしての態度を崩さなかった。

    「……ふぅ……%CALLNAME:MASTER%の中……思ったより……」

    %CALLNAME:TARGET%は動きながら、わずかに表情を変えた。

    「……いえ、何でもありませんわ……」

    「これは仕事ですから……感じるわけが……」

    %CALLNAME:TARGET%は自分に言い聞かせながら腰を動かし続ける。

    「……%CALLNAME:MASTER%の反応……悪くありませんわね……」

    言い訳するように、%CALLNAME:TARGET%は淡々と任務を遂行していた。

    「……後ろからですと、お顔を見なくて済みますわね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腰を掴みながら呟いた。

    「……少しだけ、やりやすいですわ……」

    %CALLNAME:TARGET%は機械的に腰を動かしている。

    「……っ……変な気分になってきましたわ……」

    「%CALLNAME:MASTER%のせいですからね……」

    %CALLNAME:TARGET%は責任を押し付けながらも、動きを止めなかった。

    「……これがお望みでしたら、お相手いたしますわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を後ろから抱く体勢を取った。

    「プロとして……どのような体勢でもこなしてみせますの」

    %CALLNAME:TARGET%は淡々と腰を動かしている。

    「……んっ……少し、熱くなってきましたわね……」

    「……気のせいですわ……仕事ですから……」

    小さく言い訳しながら、%CALLNAME:TARGET%は任務を続行した。
