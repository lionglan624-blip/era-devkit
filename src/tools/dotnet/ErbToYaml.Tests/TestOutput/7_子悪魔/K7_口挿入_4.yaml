- id: fallback
  content: >-
    「え……えっ……あ、あたしの体で……洗う……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめて顔を青くした。

    「あの……こういうの、あたしにはわからないです……」

    困惑した表情で、%CALLNAME:TARGET%は後ずさりしようとした。

    「……で、でも……やらないとダメ……ですか……」

    観念したように、%CALLNAME:TARGET%は恐る恐る泡を体に塗り始めた。

    「……う……こうですか……」

    「……」

    %CALLNAME:TARGET%は無言で石鹸を見つめている。

    「……あたし、こういうの、どうすればいいかわからないです……」

    仕方なさそうに泡を体に塗り、ぎこちなく%CALLNAME:MASTER%に密着した。

    「……こう……ですか……」

    機械的に体を動かしながら、%CALLNAME:TARGET%は視線を逸らしている。

    「……早く終わってほしいな……」

    「ひっ……こ、これを……あたしの体で……？」

    %CALLNAME:TARGET%は怯えた表情で石鹸を見つめた。

    「あの……お仕事なら他のことの方が……」

    %CALLNAME:TARGET%は逃げ出したそうな顔をしているが、従わざるを得ない。

    「……う……やります……」

    嫌々ながら%CALLNAME:TARGET%は泡まみれの体で%CALLNAME:MASTER%に密着した。

    「……こういうの、苦手なんです……ごめんなさい……」

    「……%CALLNAME:MASTER%……なんでこんなこと……」

    %CALLNAME:TARGET%は困惑と戸惑いの表情を浮かべている。

    「あたし、お掃除とかお茶汲みの方が得意なんですけど……」

    渋々と%CALLNAME:TARGET%は石鹸を泡立て始めた。

    「……えっと……むにゅ……こう……？」

    不慣れな動きで、%CALLNAME:TARGET%は泡まみれの体を%CALLNAME:MASTER%に擦り付け始めた。

    「……咲夜さんに見つかったら、怒られちゃいます……」
