    「でも……%CALLNAME:MASTER%になら……いい……かも……」

    恥ずかしそうにしながらも、丁寧に円を描くように撫でている。

    「ん……ふ……変な感じ……でも嫌じゃないですわ……」

    %CALLNAME:人物_小悪魔%の尻尾がそわそわと揺れ、彼女の動揺を表している。

    %CALLNAME:人物_小悪魔%は意を決したように、%CALLNAME:MASTER%の秘部に指を這わせた。

    「んっ……は、はぁ……こ、こうですよね……？」

    頬が紅潮し、目がうるんでいる。

    「ふ……ん……%CALLNAME:MASTER%……あまり見ないでください……」

    恥ずかしそうにしながらも、%CALLNAME:人物_小悪魔%は愛撫を続けた。

    「……こんなことして……悪魔として、どうなんでしょう……」
