character: 子悪魔
situation: K7_愛撫
entries:
- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%に見られながらするの、恥ずかしいけど……」

    %CALLNAME:TARGET%は頬を染めながら、自分から足を開いて見せた。

    おずおずと、妖精の小さな指が自らの秘裂へと伸びていく。

    「んっ……あっ……%CALLNAME:MASTER%が見てると思うと……ドキドキしちゃう……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げながら、ゆっくりと指を動かし始めた。

    指先が敏感な場所に触れるたび、妖精の小さな体がぴくりと震える。

    「……ね……%CALLNAME:MASTER%……あたしの、見てて……ずっと見ててね……」

    「%CALLNAME:MASTER%……あたし、上手にできてる……？」

    %CALLNAME:TARGET%は不安そうに問いかけながら、自らの秘部をまさぐっていた。

    「んぁっ……やぁ……ここ、気持ちいいの……」

    妖精の細い指が蜜を纏い、くちゅくちゅと淫らな音を立てている。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の視線を浴びて、頬を上気させていた。

    「あっ……%CALLNAME:MASTER%に見せるの……嬉しい……もっと、見て……」

    愛しい人のために自らを晒す喜びに、妖精は酔いしれていた。

    「……んっ……ふぁ……%CALLNAME:MASTER%のこと、考えながらしてるの……」

    %CALLNAME:TARGET%は夢見心地で指を動かしている。

    妖精の秘裂は既に潤んで、愛液が太ももを伝っていた。

    「あっ……%CALLNAME:MASTER%に……触ってもらってるみたい……」

    %CALLNAME:TARGET%は目を閉じて、想いを込めて自らを愛撫した。

    「……んぅ……%CALLNAME:MASTER%……好き……大好き……」

    妖精は恍惚とした表情で、愛の言葉を紡ぎ続けた。

    「あたしね……%CALLNAME:MASTER%といるときだけ、こんなことできるの……」

    %CALLNAME:TARGET%は恥ずかしそうに笑いながら、秘部に指を沈めた。

    「ふぁっ……んっ……中、あったかい……」

    妖精の指が膣内をかき回し、甘い声が漏れ続ける。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめながら、幸せそうに微笑んだ。

    「……%CALLNAME:MASTER%が好きだから……全部、見せたいの……」

    妖精は愛する人のために、恥じらいながらも自らをさらけ出していた。
  priority: 4
- id: talent_3_1
  content: >-
    「……え、えっと……こうですか……？」

    %CALLNAME:TARGET%は顔を真っ赤にして、おそるおそる手を下に伸ばした。

    「ひゃっ……自分で触ると、なんか変な感じ……」

    妖精の細い指が、震えながら秘裂をなぞっていく。

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%から目をそらした。

    「……%CALLNAME:MASTER%……あんまり見ないで……恥ずかしいから……」

    しかしその声は、どこか嬉しそうでもあった。

    「んっ……あ……こういうこと、したことなくて……」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%の言う通りに自分を触っていた。

    「……やぁっ……なんか、熱くなってきた……」

    妖精の頬が上気し、息が少し荒くなってくる。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を上目遣いで見つめた。

    「……これ、%CALLNAME:MASTER%のせいだからね……」

    照れ隠しのように言いながら、妖精は指を動かし続けた。

    「……見てるの……？　ずっと……？」

    %CALLNAME:TARGET%は顔を手で隠しながら、もう片方の手で秘部を弄っていた。

    「はぅ……んっ……恥ずかしいよぉ……」

    指の隙間から覗く瞳は、恥じらいと期待に揺れている。

    「……でも……%CALLNAME:MASTER%が見てると思うと……」

    %CALLNAME:TARGET%の指の動きが、少しだけ速くなった。

    「……なんか……止まらなくなっちゃう……」

    「こ、こんなことさせるなんて……%CALLNAME:MASTER%って……」

    %CALLNAME:TARGET%は文句を言いながらも、言われた通りにしていた。

    「んぅ……あっ……やぁ……」

    自分で触る感覚に少しずつ慣れてきたのか、声が甘くなってきている。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の視線を感じて、体を震わせた。

    「……%CALLNAME:MASTER%のために……してるんだからね……」

    妖精は恥ずかしそうに、でも懸命に自らを慰め続けた。
