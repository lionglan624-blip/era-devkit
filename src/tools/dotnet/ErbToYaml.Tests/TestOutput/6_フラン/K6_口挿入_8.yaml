- id: fallback
  content: >-
    「ねえ……こうするの、面白いかも」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%の上に跨った。

    自分のものを後孔に当てると、紅い瞳を輝かせる。

    「入れるよ……壊れても知らないからね」

    %CALLNAME:人物_フラン%は容赦なく挿入した。

    「ふふ……中、ぎゅうってなってる……」

    悪魔の妹は、無邪気な笑みを浮かべていた。

    「こうすると……どうなるのかな？」

    %CALLNAME:人物_フラン%は好奇心に満ちた目で%CALLNAME:MASTER%を見下ろした。

    正常位の体勢で挿入しながら、反応を観察している。

    「動くと……壊れちゃう？ 壊れないの？」

    %CALLNAME:人物_フラン%は無邪気に腰を動かした。

    「きゅっとしてドカーン……しちゃうかもね」

    495年の孤独を知る少女は、危険な笑みを浮かべていた。

    「へえ……%CALLNAME:MASTER%も、こうされると声が出るんだ」

    %CALLNAME:人物_フラン%は発見したように呟いた。

    正常位で挿入したまま、%CALLNAME:MASTER%の表情を観察する。

    「面白い……もっと見せてよ」

    %CALLNAME:人物_フラン%は興味深そうに腰を動かした。

    「壊れる前に……もうちょっと遊ばせてね」

    悪魔の妹は、玩具を見つけた子供のような目をしていた。

    「ふふ……私が上だと、%CALLNAME:MASTER%を好きにできるのさ」

    %CALLNAME:人物_フラン%は楽しそうに%CALLNAME:MASTER%を見下ろした。

    正常位で貫きながら、無邪気な笑みを浮かべる。

    「逃げられないでしょ？ 壊れるまで離さないからね」

    %CALLNAME:人物_フラン%は容赦なく腰を動かした。

    「でも……本当に壊れたら、つまらないかも」

    495年の孤独を知る少女は、危険と好奇心の狭間で揺れていた。
