    「あたし……こんなになっちゃって……」

    %CALLNAME:TARGET%は困ったような、でも嬉しいような表情を浮かべている。

    「……%CALLNAME:MASTER%のこと、好きだから……こうなっちゃうの……」

    小さな声で告白しながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%に身を寄せた。
