- id: fallback
  content: >-
    %CALLNAME:MASTER%がローターを取り出すと、%CALLNAME:TARGET%は困惑した。

    「え……？　あの、%CALLNAME:MASTER%さん、それは……」

    %CALLNAME:TARGET%は何なのかわからず、首を傾げている。

    スイッチが入ると、%CALLNAME:TARGET%は驚いて身を引いた。

    「ひゃっ……！　動いてる……怖い……」

    それでも%CALLNAME:MASTER%が近づくと、%CALLNAME:TARGET%は逃げられなかった。

    「あっ……やっ……何これ……」

    %CALLNAME:TARGET%は初めての感覚に戸惑いながら、体を震わせた。

    ローターの振動が%CALLNAME:TARGET%の体に伝わる。

    「あっ……んっ……変な感じ……」

    %CALLNAME:TARGET%は困惑しながら、%CALLNAME:MASTER%を見上げた。

    翅がそわそわと不安げに動いている。

    「……あの……これ、何するものなの……？」

    %CALLNAME:TARGET%は純粋に疑問を口にした。

    「……なんか……体がおかしくなる……」

    %CALLNAME:MASTER%がローターを押し当てると、%CALLNAME:TARGET%は声を上げた。

    「やっ……！　そこ、駄目……」

    %CALLNAME:TARGET%は体を逃がそうとしたが、%CALLNAME:MASTER%に押さえられた。

    「んっ……あっ……」

    %CALLNAME:TARGET%は抵抗しながらも、声が漏れてしまう。

    「……%CALLNAME:MASTER%さん……恥ずかしい……」

    %CALLNAME:TARGET%は真っ赤になりながら、弱々しく訴えた。

    ローターの振動に、%CALLNAME:TARGET%は体を硬くした。

    「ひゃっ……やっ……」

    %CALLNAME:TARGET%は怯えたように%CALLNAME:MASTER%を見つめている。

    翅がぱたぱたと忙しなく動いて、動揺を隠せない。

    「……%CALLNAME:MASTER%さん……これ、怖い……」

    %CALLNAME:TARGET%は不安そうに呟いた。

    「……でも……止めろって言えないの……」
