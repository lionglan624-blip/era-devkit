character: レミリア
situation: K5_会話親密
entries:
- id: fallback
  content: >-
    「ん……ちゅ、る……れろ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と深く唇を重ねている。

    500年を生きた吸血鬼の唇は、驚くほど柔らかかった。

    「……ふふ、永遠を感じなさい。これが紅魔館の主のキスよ。」

    %CALLNAME:TARGET%は蕩けた表情で、%CALLNAME:MASTER%を見つめている。

    「……もっとしてもいいのよ？貴方には、私の全てを許しているのだから。」

    「ちゅ……んむ、ぢゅる……ぷはっ」

    %CALLNAME:TARGET%と%CALLNAME:MASTER%は熱く口付けを交わしている。

    鋭い牙が唇に触れる感触が、吸血鬼との逢瀬を実感させた。

    「……ククク、良い味ね。永遠を感じなさい。」

    %CALLNAME:TARGET%は妖艶な笑みを浮かべ、唇を舐めている。

    「紅い月の夜は特別なの……貴方と過ごす夜もね。」

    「ん……ちゅる……んむ……」

    %CALLNAME:TARGET%は自ら%CALLNAME:MASTER%の首に手を回し、深いキスをねだっている。

    「……私を悦ばせなさい。もっと深く……」

    500年の孤独を埋めるように、%CALLNAME:TARGET%は%CALLNAME:MASTER%を求めた。

    「……ふふ、永遠を感じなさい。貴方は私の特別な存在よ。」

    %CALLNAME:TARGET%は上気した頬で、甘えるように微笑んだ。

    「ちゅ……んむっ……れろ、ぢゅる……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の唇を貪るように吸い上げている。

    紅い瞳は陶然と細められ、500年の威厳などどこかへ消えていた。

    「……ん、ぷはっ……ふふ、貴方の味、覚えてしまったわ。」

    %CALLNAME:TARGET%は艶めかしく舌で唇を舐めた。

    「……永遠に私のものでいなさい。逃がさないわよ？」

    紅魔館の主は、独占欲をにじませて妖しく微笑んだ。
  priority: 4
- id: talent_3_1
  content: >-
    「んっ……ちゅ、る……ん……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と口付けを交わしている。

    威厳を保とうとしているが、頬がほのかに紅く染まっていた。

    「……悪くないわ。このキスは認めてあげる。」

    %CALLNAME:TARGET%は息を整えながら、満更でもない表情を見せた。

    「ちゅ……んむ……ふ、ぁ……」

    %CALLNAME:TARGET%は目を閉じて、%CALLNAME:MASTER%のキスを受け入れた。

    「……貴方、なかなか大胆ね。」

    %CALLNAME:TARGET%は頬を染めながらも、どこか嬉しそうだ。

    「次はもっと良いものを期待しているわよ？私を悦ばせなさい。」

    「ん……ちゅ、ぷ……んっ」

    %CALLNAME:MASTER%と%CALLNAME:TARGET%は控えめに舌を絡ませた。

    「……あ、あまり調子に乗らないことね。」

    %CALLNAME:TARGET%は威厳を取り繕いながらも、熱い吐息を漏らしている。

    「……次も、期待しているわ。」

    「ちゅる……ん、むっ……はぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と深く口付けを交わしている。

    紅い瞳が潤み、500年の孤独がにじみ出ていた。

    「……貴方、なかなか私を惑わせるのが上手いわね。」

    %CALLNAME:TARGET%は頬を染めながら、視線を逸らした。

    「……ふん、認めてあげるわ。このキスは及第点よ。」

    そう言いながらも、%CALLNAME:TARGET%の表情は満更でもなさそうだった。
  priority: 3
  condition:
    type: Talent
    talentType: 3
    threshold: 1
- id: fallback
  content: >-
    「んっ……！」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%と軽く唇を触れ合わせた。

    「……いきなり何をするの。」

    %CALLNAME:TARGET%は驚いたように一歩退いたが、怒りはないようだ。

    「……まあ、今回だけは許してあげるわ。次は作法を弁えなさい。」

    「ちゅ……ん……」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%のキスを受け入れた。

    「……予告なしのキスなんて、まるで子供のようね。」

    %CALLNAME:TARGET%は頬をわずかに赤らめながら、視線を逸らした。

    「……でも、まあ……悪くはなかったわ。」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の唇にそっと口づけた。

    「……っ！」

    %CALLNAME:TARGET%は一瞬身を固くしたが、すぐに力を抜いた。

    「……ふん、度胸だけは認めてあげるわ。」

    紅魔館の主は高飛車に言いながらも、拒絶はしなかった。

    「……もう少し練習してから出直しなさい。」

    「ん……」

    %CALLNAME:TARGET%と%CALLNAME:MASTER%は軽く唇を触れ合わせた。

    「……随分と大胆ね。私を誰だと思っているの？」

    %CALLNAME:TARGET%は腕を組み、尊大な態度を崩さない。

    しかし、その頬はほのかに紅く染まっていた。

    「……まあ、少しは見込みがあるかもしれないわね。」
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%にキスをしようとした。

    「……何のつもり？」

    %CALLNAME:TARGET%は冷たい瞳で%CALLNAME:MASTER%を見据えた。

    「私は紅魔館の主よ。キスを許す相手は自分で選ぶわ。」

    「……身の程を弁えなさい。貴方はまだその域に達していないのよ。」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の唇に近づいた。

    「……無礼者ね。」

    %CALLNAME:TARGET%は指一本で%CALLNAME:MASTER%を押し留めた。

    「紅魔館の主にキスを許されるのは、選ばれた者だけよ。」

    「……運命の糸が見えるようになったら、また来なさい。」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%にキスをしようとした瞬間——

    「……止まりなさい。」

    %CALLNAME:TARGET%の紅い瞳が鋭く光った。

    「500年を生きる吸血鬼にキスを求める？身の程知らずにも程があるわ。」

    「……まずは私を楽しませてごらんなさい。話はそれからよ。」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%に顔を近づけた。

    「……ふふ、面白い人間ね。」

    %CALLNAME:TARGET%は扇子で%CALLNAME:MASTER%の口元を押さえた。

    「私にキスを許されたいなら、もっと私を知りなさい。」

    紅魔館の主は優雅に微笑みながらも、明確に距離を取った。

    「……運命は、まだ貴方に微笑んでいないわ。」
  priority: 1
