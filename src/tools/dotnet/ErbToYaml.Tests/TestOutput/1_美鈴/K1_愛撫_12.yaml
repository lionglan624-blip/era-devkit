entries:
- id: fallback
  content: >-
    電動マッサージャーのスイッチが入ると、低い振動音が部屋に響いた。

    「んっ……あ、それ、結構強いね……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に身を預け、体を小さく震わせている。

    振動が敏感な場所に当たるたび、%CALLNAME:人物_美鈴%の吐息が熱を帯びていく。

    「……%CALLNAME:MASTER%、もうちょっと……そこ……」

    甘えるような声で、%CALLNAME:人物_美鈴%は恋人にねだった。

    「……なんか、変な気持ちになってきた……」

    「ふふっ……%CALLNAME:MASTER%ったら、こういうの好きなの？」

    %CALLNAME:人物_美鈴%は微笑みながら、電マの振動を受け入れている。

    「私のこと、そんな道具で責めたかったんだ……」

    からかうように言いながらも、%CALLNAME:人物_美鈴%の体は小刻みに震えている。

    「あっ……やっ……そこは、やぁ……」

    不意に強い振動を受けて、%CALLNAME:人物_美鈴%は思わず声を上げた。

    「……もう、%CALLNAME:MASTER%のいじわる……」

    電マが肌に押し当てられ、%CALLNAME:人物_美鈴%は息を呑んだ。

    「あっ……んんっ……」

    振動が体の奥に響き渡り、%CALLNAME:人物_美鈴%は足に力が入らなくなる。

    「……%CALLNAME:MASTER%、上手になったよね……私の弱いところ……」

    %CALLNAME:人物_美鈴%は熱っぽい目で恋人を見上げた。

    「……もっと、強くしてもいいわよ？」

    照れくさそうに、でも期待を込めて%CALLNAME:人物_美鈴%は囁いた。

    「……んっ……」

    振動を受けながら、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に寄り添った。

    門番としての凛々しさはどこへやら、今は恋人に甘える姿だけがそこにある。

    「……%CALLNAME:MASTER%といると、こんなことも許しちゃうんだね、私……」

    電マの振動に身を任せながら、%CALLNAME:人物_美鈴%は幸せそうに微笑んだ。

    「……ずっと、このままでいたいな……」

    %CALLNAME:人物_美鈴%は恋人の温もりと振動に包まれていた。
