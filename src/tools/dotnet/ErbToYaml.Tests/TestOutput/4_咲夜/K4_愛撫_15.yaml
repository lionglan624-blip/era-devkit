entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%がバイブを手に取ると、%CALLNAME:TARGET%は僅かに頬を染めた。

    「……また、それを使われるのですね」

    %CALLNAME:TARGET%は恥じらいながらも、自ら脚を開いて受け入れる姿勢を見せた。

    バイブがゆっくりと挿入されると、%CALLNAME:TARGET%の体がびくりと震える。

    「あっ……中で……振動が……」

    瀟洒なメイドは、恋人の前でだけ素直に快感を受け入れていた。

    「んっ……あ……奥まで……」

    バイブの振動が%CALLNAME:TARGET%の膣内を刺激している。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみつき、荒い息を漏らした。

    「こんな……はしたない姿……お嬢様には見せられませんわ……」

    振動が強まるたび、%CALLNAME:TARGET%の声は甘く崩れていく。

    「%CALLNAME:MASTER%……もう……中が熱くて……」

    バイブの執拗な振動に、%CALLNAME:TARGET%は声を押し殺していた。

    「……っ……んんっ……そこ……」

    完璧を誇るメイドの仮面が、快感に蝕まれて崩れていく。

    「中で動かされると……考えることも……」

    %CALLNAME:TARGET%は恋人に甘えるように、その腕を掴んだ。

    「……責任、取ってくださいまし……」

    「ふぁ……やぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は振動に身を任せ、恍惚とした表情を浮かべている。

    バイブが膣内を這いまわる感覚に、メイドの理性が溶けていた。

    「こんな道具で……イかされるなんて……」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らしながらも、腰は正直に動いている。

    「……もっと……奥まで……お願いいたしますわ……」
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%がバイブを見せると、%CALLNAME:TARGET%は戸惑いの表情を浮かべた。

    「……それは、何ですの」

    説明を聞いた%CALLNAME:TARGET%は、顔を真っ赤にして俯いた。

    「そ、そのような破廉恥な道具を……私の中に……」

    バイブが挿入されると、%CALLNAME:TARGET%の体が強張る。

    「っ……振動が……中に……困りますわ……」

    「あっ……やめ……いえ……」

    バイブの振動に、%CALLNAME:TARGET%は言葉を失いかけた。

    「……こんな機械に……負けるわけには……」

    %CALLNAME:TARGET%は抗いながらも、快感に抗えずにいた。

    「%CALLNAME:MASTER%は……本当に意地悪ですわね……」

    そう言いながらも、%CALLNAME:TARGET%の声には隠しきれない甘さが滲んでいた。

    振動がじわりと%CALLNAME:TARGET%の体に染み込んでいく。

    「んっ……そんな……中で動かさないで……」

    %CALLNAME:TARGET%は目を細め、小さく息を漏らした。

    「……感じてなんか……いませんわ……」

    そう言う%CALLNAME:TARGET%の腰は、僅かに揺れている。

    「……少しだけ……少しだけですわよ……」

    「……っ……」

    バイブの振動に、%CALLNAME:TARGET%は声を押し殺していた。

    「……%CALLNAME:MASTER%……どうして、こんなものを……」

    %CALLNAME:TARGET%の問いかけは、振動に遮られて消えた。

    「メイドとして……こんな姿……」

    %CALLNAME:TARGET%は顔を背けながらも、%CALLNAME:MASTER%から離れようとはしなかった。
