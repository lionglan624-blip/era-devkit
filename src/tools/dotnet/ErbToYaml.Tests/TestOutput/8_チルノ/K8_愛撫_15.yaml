- id: fallback
  content: >-
    「――へ?　なにそれ、あたいのそこに付けるの?」

    %CALLNAME:TARGET%は不思議そうに首を傾げた。

    振動が始まった途端、体がビクンと跳ねる。

    「ひゃあっ!?　な、なにこれ!?　すごいブルブルする!」

    「あたいの……そこだけ……変な感じ……っ!」

    妖精には未知の感覚に、%CALLNAME:TARGET%は目を白黒させた。

    「――ふーん、小さい震えるやつ?　あたいには効かないわよ!」

    %CALLNAME:TARGET%は自信満々に胸を張った。

    しかしクリキャップが敏感な場所を捉えると、

    「っ!?　ちょ、待っ……そこは……っ、ひぁっ!?」

    「う、うそ……こんなの……あたい知らない……っ」

    最強を自称する氷精は、あっさりと表情を崩した。

    「――ね、ねぇ、それ何するやつ?　あそこに……?」

    %CALLNAME:TARGET%は怪訝そうにクリキャップを見つめた。

    装着されて振動が始まると、

    「わっ!?　な、なんで震えてるの!?　しかもそこ!?」

    「……変な感じ……でも、嫌いじゃない……かも?」

    純粋な感想を漏らして、%CALLNAME:TARGET%は首を傾げた。

    「――あ、またあの小さいやつ?　あたいのそこに付けるの?」

    %CALLNAME:TARGET%は記憶にあるらしく、少し身構えた。

    振動が始まると、予想以上の刺激に声が漏れる。

    「っ……やっぱり、これ……そこだけすごいのよね……」

    「あたいったら最強だけど……これはちょっと……ずるい……」

    そう言いながら、%CALLNAME:TARGET%は不思議そうな表情を浮かべていた。
