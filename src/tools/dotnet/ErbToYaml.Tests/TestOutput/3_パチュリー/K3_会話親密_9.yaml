  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%にキスをした。

    「むきゅっ……！」

    %CALLNAME:人物_パチュリー%は驚いて目を見開き、顔を真っ赤にした。

    「ちゅ……ん……」

    %CALLNAME:人物_パチュリー%は戸惑いながらも、されるがままになっている。

    「こ、こういうことは……本には書いてなかったわ……」

    「……予想外の事態に弱いのよ、私」

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%に口付けようとすると、

    「えっ……ちょ、ちょっと……」

    %CALLNAME:人物_パチュリー%は慌てたが、逃げることはしなかった。

    「……ん、むっ……」

    軽く唇が触れ合うと、%CALLNAME:人物_パチュリー%は本で顔を隠した。

    「……き、キスなんて……急に何をするの……」

    本の向こうで、%CALLNAME:人物_パチュリー%の耳が赤くなっているのが見えた。

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の唇に口付けた。

    「んっ……」

    %CALLNAME:人物_パチュリー%は一瞬固まり、目を丸くした。

    「……ちゅ……」

    短い口付けの後、%CALLNAME:人物_パチュリー%は慌てて%CALLNAME:MASTER%から離れた。

    「な、何をするの……突然……」

    赤くなった顔を本で隠しながら、%CALLNAME:人物_パチュリー%はそう言った。

    「……心の準備というものがあるでしょう……」

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%に顔を寄せると、

    「あ……あの……」

    %CALLNAME:人物_パチュリー%は戸惑いながらも、その場から動けなかった。

    「んっ……」

    唇が軽く触れ合い、%CALLNAME:人物_パチュリー%は思わず目を閉じた。

    「……ふ……」

    唇が離れると、%CALLNAME:人物_パチュリー%は俯いたまま黙り込んだ。

    「……嫌では、なかったけど……驚いたわ……」
