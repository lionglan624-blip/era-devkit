- id: fallback
  content: >-
    「いやです、そんなの……こわい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出した電マを見て、後ずさりした。

    「動いてるし……音も出てるし……何するんですか……」

    しかし逃げ場がなく、電マが秘所に押し当てられてしまう。

    「ひゃあっ……！？　や、やめて……体が、変になっちゃう……！」

    %CALLNAME:TARGET%は涙目になりながら、%CALLNAME:MASTER%に懇願した。

    「……咲夜さん、助けて……」

    「な、何ですかそれ……近づけないでください……！」

    %CALLNAME:TARGET%は恐怖で体を強張らせている。

    「そういうの、初めて見ます……怖い……」

    しかし%CALLNAME:MASTER%に押さえつけられ、電マが秘所に触れてしまう。

    「やっ……んっ……！？　な、何これ……体が震える……！」

    %CALLNAME:TARGET%は初めての感覚にパニックになりながら、涙を溢れさせた。

    「お願い……許してください……」

    「……っ」

    %CALLNAME:TARGET%は電マを見て、言葉も出ないほど怯えていた。

    声を上げる間もなく、振動が秘所に押し当てられる。

    「ひぁっ……！　んっ……やっ……知らない……こんな感覚……！」

    妖精の小さな体が、電マの振動に翻弄されている。

    「……どうして……こんなこと……」

    %CALLNAME:TARGET%は理解できないまま、快楽と恐怖に震えていた。

    「あたし……何か悪いことしましたか……」

    %CALLNAME:TARGET%は泣きそうな顔で%CALLNAME:MASTER%を見上げた。

    「こんな道具で……あたしを……」

    電マが押し当てられ、妖精の体が大きく跳ねる。

    「んっ……あぁっ……！　体が……勝手に……！」

    %CALLNAME:TARGET%は抵抗する力も失い、電マの快楽に蹂躙されている。

    「……もう……どうにでも、してください……」
  priority: 1
