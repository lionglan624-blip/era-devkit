character: レミリア
situation: K5_愛撫
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……そ、そこを舌で……っ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%が後ろの穴に口づけようとするのに気付き、顔を真っ赤にした。

    %CALLNAME:MASTER%がゆっくりと舌を這わせると、%CALLNAME:人物_レミリア%の身体がびくりと震えた。

    「ひゃっ……やぁ……そんなところ、舐めないで……」

    %CALLNAME:人物_レミリア%は恥じらいに震えながらも、%CALLNAME:MASTER%から逃げようとはしなかった。

    「……んん……%CALLNAME:MASTER%だけよ、こんな恥ずかしいこと……許すのは……」

    500年を生きた吸血鬼が、恋人の舌に蕩けていた。

    「あっ……そこ、だめ……っ」

    %CALLNAME:MASTER%の舌が%CALLNAME:人物_レミリア%の菊門を舐めあげる。

    %CALLNAME:人物_レミリア%は羞恥に顔を歪めながらも、甘い声を漏らした。

    「んあっ……やぁ……舌が、入って……」

    %CALLNAME:MASTER%が舌先を押し込むと、%CALLNAME:人物_レミリア%の身体がぴくぴくと震え始めた。

    「%CALLNAME:MASTER%……私、こんなところでも……感じちゃう……」

    館の主は恥ずかしそうに呟きながら、快楽に身を委ねていた。

    「……%CALLNAME:MASTER%、変態……」

    %CALLNAME:人物_レミリア%は恨めしそうに%CALLNAME:MASTER%を見下ろした。

    だが%CALLNAME:MASTER%が舌を動かし続けると、その表情は崩れていった。

    「あっ……んん……そこ、敏感なの……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の頭を両手で抱え込んだ。

    「……もっと……もっと舐めて……」

    威厳など忘れて、%CALLNAME:人物_レミリア%は恋人に甘えていた。

    「や……そんなところ……っ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に後ろを舐められ、恥じらいの声を上げた。

    %CALLNAME:MASTER%の温かい舌が、そこを丹念に愛撫していく。

    「ふぁ……んん……気持ちいい……でも、恥ずかしい……」

    %CALLNAME:人物_レミリア%は顔を枕に押し付けて、声を殺そうとしていた。

    「……%CALLNAME:MASTER%のせいで、私、おかしくなっちゃいそう……」

    吸血鬼の主は、恋人の舌使いに完全に蕩けていた。
