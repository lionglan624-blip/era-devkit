entries:
- id: fallback
  content: >-
    「えへへ、%CALLNAME:MASTER%のこと触ってあげるね！」

    %CALLNAME:人物_チルノ%は嬉しそうに%CALLNAME:MASTER%に近づいた。

    冷たい手が%CALLNAME:MASTER%の肌に触れると、心地よいひんやりとした感触が広がる。

    「%CALLNAME:MASTER%ってあったかいね……あたいの手、気持ちいいでしょ？」

    %CALLNAME:人物_チルノ%は得意げに笑いながら、%CALLNAME:MASTER%の体を撫でていく。

    「最強のあたいが特別に触ってあげてるんだから、感謝してよね！」

    威勢よく言いながらも、%CALLNAME:人物_チルノ%の瞳は愛おしさで満ちていた。

    「ねぇ%CALLNAME:MASTER%、ここ触ると気持ちいい？」

    %CALLNAME:人物_チルノ%は興味津々で%CALLNAME:MASTER%の反応を窺った。

    小さな手が%CALLNAME:MASTER%の体を探るように撫でていく。

    「あたいの手、冷たいけど……%CALLNAME:MASTER%のこと温めてあげたいの」

    %CALLNAME:人物_チルノ%は少し照れくさそうに呟いた。

    「ほら、ここも……こうすると気持ちいいんでしょ？」

    氷の妖精は恋人への愛情を込めて、丁寧に愛撫を続けた。

    「%CALLNAME:MASTER%、あたいにまかせて」

    %CALLNAME:人物_チルノ%は真剣な表情で言った。

    ひんやりとした指先が%CALLNAME:MASTER%の体を這うと、独特の快感が走る。

    「あたいの冷たい手……%CALLNAME:MASTER%を気持ちよくできるってわかったの」

    %CALLNAME:人物_チルノ%は得意げに胸を張った。

    「えへへ……%CALLNAME:MASTER%のこと、もっと触りたい……」

    氷の妖精は恋人への想いを込めて、優しく愛撫を続けた。

    「ふふん、%CALLNAME:MASTER%はあたいに触られると嬉しそうだね」

    %CALLNAME:人物_チルノ%は自信満々に笑った。

    冷たい手のひらが%CALLNAME:MASTER%の胸に当てられると、心臓の鼓動が伝わってくる。

    「%CALLNAME:MASTER%の心臓、どきどきしてる……あたいのせい？」

    %CALLNAME:人物_チルノ%は嬉しそうに目を輝かせた。

    「あたいも%CALLNAME:MASTER%のこと触ってると、どきどきするの」

    氷の妖精は照れながらも、愛撫の手を止めなかった。
