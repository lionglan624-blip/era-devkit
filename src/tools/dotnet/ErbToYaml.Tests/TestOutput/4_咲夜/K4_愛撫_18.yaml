character: 咲夜
situation: K4_愛撫
entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%がニプルキャップを取り出すと、%CALLNAME:TARGET%は僅かに頬を染めた。

    「……また、そのような道具を……乳首に……」

    %CALLNAME:TARGET%は恥じらいながらも、自ら制服の胸元を緩めた。

    クリップが乳首を挟み込む感覚に、%CALLNAME:TARGET%は小さく息を漏らす。

    「んっ……挟まれて……振動まで……」

    完璧なメイドは、恋人の前でだけ乳首を弄ばれる恥ずかしさに身を震わせていた。

    「あっ……また……つけるのですね……」

    ニプルキャップが%CALLNAME:TARGET%の乳首にしっかりと装着される。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕にしがみつき、甘い吐息を漏らした。

    「こんな……乳首を挟んで震える道具で……はしたないですわ……」

    振動が伝わるたび、%CALLNAME:TARGET%の体が小刻みに震える。

    「%CALLNAME:MASTER%……もう……胸が熱くなってしまいますわ……」

    ニプルキャップの振動が続き、%CALLNAME:TARGET%は甘い声を抑えきれずにいた。

    「……っ……んんっ……乳首が……とろけそう……」

    瀟洒なメイドの表情が、乳首への刺激に蕩けていく。

    「道具に……胸を弄ばれるなんて……瀟洒ではありませんわ……」

    %CALLNAME:TARGET%は恋人に甘えるように、その胸に顔を埋めた。

    「……もう少しだけ……このままでいさせてくださいまし……」

    「ふぁ……やぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は乳首を震わせるクリップの振動に、恍惚とした表情を浮かべている。

    振動が乳首から全身に伝わり、メイドの理性が揺らいでいた。

    「こんな道具で……胸をイかされるなんて……」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らしながらも、胸は正直に反応している。

    「……もっと強く……お願いいたしますわ……」
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%がニプルキャップを見せると、%CALLNAME:TARGET%は戸惑いの表情を浮かべた。

    「……それは……乳首に……つけるものですわよね」

    %CALLNAME:TARGET%は顔を真っ赤にして俯いた。

    「そ、そのような破廉恥な道具を……私の……胸に……」

    クリップが乳首を挟み込むと、%CALLNAME:TARGET%の体が強張る。

    「っ……振動が……困りますわ……」

    「あっ……やめ……いえ……」

    ニプルキャップの振動が強まり、%CALLNAME:TARGET%は言葉を失いかけた。

    「……こんな道具の刺激に……負けるわけには……」

    %CALLNAME:TARGET%は抗いながらも、乳首への振動に抗えずにいた。

    「%CALLNAME:MASTER%は……本当に意地悪ですわね……」

    そう言いながらも、%CALLNAME:TARGET%の声には隠しきれない甘さが滲んでいた。

    装着されたニプルキャップが%CALLNAME:TARGET%の乳首を絶え間なく刺激している。

    「んっ……そんな……強くしないでくださいまし……」

    %CALLNAME:TARGET%は目を細め、小さく息を漏らした。

    「……感じてなんか……いませんわ……」

    そう言う%CALLNAME:TARGET%は、振動の刺激に身を震わせている。

    「……少しだけ……少しだけですわよ……」

    「……っ……」

    ニプルキャップに乳首を占拠されたまま、%CALLNAME:TARGET%は声を押し殺していた。

    「……%CALLNAME:MASTER%……どうして、こんな場所を……」

    %CALLNAME:TARGET%の問いかけは、振動の快感に遮られて消えた。

    「メイドとして……こんな姿……お嬢様には見せられませんわ……」

    %CALLNAME:TARGET%は顔を背けながらも、%CALLNAME:MASTER%から離れようとはしなかった。
