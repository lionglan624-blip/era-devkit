entries:
- id: fallback
  content: >-
    「ねえ%CALLNAME:MASTER%、あたいが上になるね……」

    %CALLNAME:人物_チルノ%は恋人の上に跨りながら、紅潮した頬で微笑んだ。

    自分のものを%CALLNAME:MASTER%の後孔に押し当てると、嬉しそうに腰を沈めた。

    「んっ……入った……%CALLNAME:MASTER%の中……あったかい……」

    %CALLNAME:人物_チルノ%はゆっくりと腰を動かし始めた。

    「えへへ……こうやって繋がってると……幸せなの」

    氷の妖精は恋人との一体感に、とろけそうな笑顔を見せた。

    「%CALLNAME:MASTER%のお尻……あたいのものなんだからね」

    %CALLNAME:人物_チルノ%は正常位の体勢で恋人を見下ろしながら呟いた。

    恋人の後孔に挿入しながら、愛おしそうに頬を撫でる。

    「んっ……締め付けてくる……気持ちいいね……」

    %CALLNAME:人物_チルノ%は腰をゆっくりと動かし続けた。

    「%CALLNAME:MASTER%のこと……もっと感じさせてあげる……」

    最強を自負する妖精は、恋人を悦ばせることに夢中だった。

    「えへへ……%CALLNAME:MASTER%が受け入れてくれるの、嬉しいのよ」

    %CALLNAME:人物_チルノ%は恋人の両脚を抱えながら、無邪気に微笑んだ。

    正常位の体勢で挿入しながら、愛しそうに顔を見つめている。

    「あたいのが……%CALLNAME:MASTER%の奥に入ってる……すごい……」

    %CALLNAME:人物_チルノ%は感動したように腰を揺らした。

    「最強のあたいと繋がってるんだよ……特別でしょ？」

    氷の妖精は誇らしげに胸を張りながら、恋人を抱いた。

    「……%CALLNAME:MASTER%、大好き」

    %CALLNAME:人物_チルノ%は恋人に覆いかぶさりながら、そっと囁いた。

    %CALLNAME:MASTER%の後孔を貫きながら、キスを求めるように顔を近づけた。

    「こうして繋がってると……あたい、落ち着くの……」

    %CALLNAME:人物_チルノ%はゆっくりと腰を揺らし続けた。

    「ずっと……こうしてたい……」

    氷の妖精は恋人との結合に、至福の表情を浮かべていた。
