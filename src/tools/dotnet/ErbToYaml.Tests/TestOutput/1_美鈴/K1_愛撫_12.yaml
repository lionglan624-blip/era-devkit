    「……もう、急にそういうことしないでくださいよ」

    %CALLNAME:人物_美鈴%は顔を赤くしながらも、どこか嬉しそうだった。

    「あ……」

    %CALLNAME:人物_美鈴%は電マの振動に、ぎこちなく身を任せた。

    「……%CALLNAME:MASTER%って、意外と大胆なんですね……こういうの……」

