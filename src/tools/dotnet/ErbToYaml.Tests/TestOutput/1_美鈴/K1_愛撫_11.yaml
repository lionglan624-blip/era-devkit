    %CALLNAME:人物_美鈴%はローターの振動音に首を傾げた。

    %CALLNAME:MASTER%が肌に押し当てると、%CALLNAME:人物_美鈴%は体を強張らせた。

    「ひゃっ……！　なに、これ……振動してる……」

    戸惑いながらも、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%から逃げようとはしない。

    「……%CALLNAME:MASTER%って、こういうの好きなの……？」

    照れくさそうに頬を染めながら、%CALLNAME:人物_美鈴%は問いかけた。

    ローターが敏感な場所に当たり、%CALLNAME:人物_美鈴%は小さく声を上げた。

    「あっ……そこ、だめっ……変な感じがする……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の腕を掴み、訴えるように見上げた。

    しかし拒絶の言葉は出てこない。

    「……%CALLNAME:MASTER%にされると……嫌って言えないの……」

    %CALLNAME:人物_美鈴%は困ったように眉を下げながらも、振動を受け入れていた。

    「んっ……やぁ……」

    ローターの振動が続き、%CALLNAME:人物_美鈴%は息を乱した。

    「変な感じっ……体が……熱くなってきた……」

    %CALLNAME:人物_美鈴%は顔を赤く染め、視線を彷徨わせている。

    「門番なのに……こんなところ見られたら……」

    恥ずかしそうに呟きながらも、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%から離れようとしなかった。

    「……%CALLNAME:MASTER%だけには、見せてもいいかな……」

    「……%CALLNAME:MASTER%、もしかして私のこと……からかってるでしょ」

    ローターの振動に翻弄されながら、%CALLNAME:人物_美鈴%は不満げに呟いた。

    「こんな道具で……私を困らせて楽しいの……？」

    しかしその声には怒りよりも甘えが混じっている。

    「……もう、%CALLNAME:MASTER%のいじわる……」

    %CALLNAME:人物_美鈴%は観念したように、振動に身を任せた。

    「……でも、嫌いになれないのが悔しい……」
