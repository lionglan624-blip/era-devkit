character: パチュリー
situation: K3_口挿入
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、今日は……後ろから、いくわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中に身を寄せながら、静かに宣言した。

    細い腕で%CALLNAME:MASTER%の腰を抱き、ゆっくりと体を押し当てる。

    「……んっ……この体勢だと、あなたに覆いかぶさるみたいね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中に頬を押し当てながら、腰を進めた。

    「……あなたの体温が……直接伝わってきて……嬉しいわ……」

    %CALLNAME:TARGET%は愛しそうに囁いた。

    「……はぁ……ん……っ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背後で小さく喘いでいる。

    大図書館の静寂の中、%CALLNAME:TARGET%が主導権を握っている。

    「……%CALLNAME:MASTER%、力を抜いて……私のペースで動くから……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の耳元で優しく囁いた。

    「……あなたを満たせるなら……体力の消耗も厭わないわ……」

    %CALLNAME:TARGET%は愛する人のために懸命に腰を動かしている。

    「……ぁ……やぁ……後ろからだと、また違う感覚ね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中に体を預けながら、深く繋がっている。

    細い腕で%CALLNAME:MASTER%を抱きながら、%CALLNAME:TARGET%は息を整えた。

    「……むきゅ……体力が……でも、あなたの反応を見ていると……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の首筋にキスをした。

    「……もう少しだけ、続けさせて……」

    %CALLNAME:TARGET%は愛する人のために、力を振り絞った。

    「……後ろから抱きしめられるの……悪くないわね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中に頬を寄せながら囁いた。

    本の山に囲まれた空間で、知識の魔女が愛を紡いでいる。

    「……んっ……あなたの中、熱いわ……本には載っていない感触よ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%との一体感を味わっている。

    「……このまま、もっと深く……繋がっていたいわ……」

    %CALLNAME:TARGET%は珍しく甘えた声を出した。
  priority: 4
- id: talent_3_1
  content: >-
    「……こう、後ろから……抱きしめればいいのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中に手を添えながら、おずおずと体を寄せた。

    「……んっ……入った……あなたの中、熱いわ……」

    %CALLNAME:TARGET%は頬を染めながら、ゆっくりと腰を動かし始めた。

    「……恥ずかしいけれど……あなたを感じられて……嬉しいわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の肩に額を押し当てた。

    「……あ……動くわよ……？」

    %CALLNAME:TARGET%は不安そうに%CALLNAME:MASTER%の背中を見つめながら、腰を揺らし始めた。

    ぎこちない動きだが、%CALLNAME:TARGET%なりに努力している。

    「……むきゅ……体力が持つかしら……」

    %CALLNAME:TARGET%は早くも息を切らし始めている。

    「……でも……あなたのためなら……」

    %CALLNAME:TARGET%は好意を滲ませながら、動きを続けた。

    「……はぁ……はぁ……後ろからだと……力が入りにくいわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中に体を預けながら息を乱していた。

    普段は本を読むだけで、体を動かすことは少ない。

    「……でも……あなたが気持ちよさそうだから……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を確認しながら、腰を動かした。

    「……もう少し……頑張るわ……」

    %CALLNAME:TARGET%は体が弱いながらも、懸命だった。

    「……ん……後ろから繋がっていると……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腰に手を添えながら呟いた。

    「……あなたの背中が見える……なんだか、守っているみたい……」

    %CALLNAME:TARGET%は頬を染めながら、ゆっくりと腰を動かしている。

    「……恥ずかしいけれど……嫌じゃないわ……」

    %CALLNAME:TARGET%は素直に認めた。
