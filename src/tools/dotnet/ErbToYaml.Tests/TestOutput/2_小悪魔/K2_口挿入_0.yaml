  content: >-
    「え……口で……？　それは……」

    %CALLNAME:人物_小悪魔%は戸惑いながら、%CALLNAME:MASTER%の一物を見つめた。

    仕方なさそうに跪くと、恐る恐る顔を近づける。

    「……やったことないですけど……こう……ですか？」

    %CALLNAME:人物_小悪魔%は舌先でそっと亀頭に触れた。

    「……ちゅ……変な味……ですわ……」

    %CALLNAME:人物_小悪魔%は好奇心に負けたように、一物を観察している。

    「ふむ……こうなってるんですのね……」

    まるで研究するかのように、舌先で表面をなぞった。

    「れろ……ん……%CALLNAME:MASTER%、変な顔してますわ」

    %CALLNAME:人物_小悪魔%は小さく笑いながら、舌を動かし続けた。

    「……こういうのも、勉強になりますわね……」

    「し、しょうがないですわね……」

    %CALLNAME:人物_小悪魔%は渋々という態度で、一物に唇を寄せた。

    しかしその動きは丁寧で、少しずつ舐めている。

    「……ちゅ……れろ……こう？　違う？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の反応を窺いながら、試行錯誤している。

    「……早く終わらせてくださいね……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の一物をじっと見つめている。

    「本で読んだことはありますけど……実践は初めてですわ」

    おそるおそる口を開け、亀頭を唇で包み込んだ。

    「んっ……熱い……こんなに熱いんですのね……」

    %CALLNAME:人物_小悪魔%は驚きながらも、ゆっくりと舌を動かし始めた。

    「……ふむ……これは……なかなか……」
