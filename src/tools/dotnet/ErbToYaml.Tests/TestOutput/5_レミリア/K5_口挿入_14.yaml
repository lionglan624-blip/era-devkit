    「……す、すみません……声が……」

    500年の吸血鬼は、恥ずかしそうに顔を伏せながらも動きを続けた。

    「……%CALLNAME:MASTER%に仕える身として、これも務めですわ……」

    %CALLNAME:人物_レミリア%は覚悟を決めて%CALLNAME:MASTER%の背後についた。

    「……では、参りますわ……」

