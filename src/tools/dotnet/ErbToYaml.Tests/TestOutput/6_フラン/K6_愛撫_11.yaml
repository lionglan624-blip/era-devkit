    「……%CALLNAME:MASTER%の体、あったかい……」

    %CALLNAME:人物_フラン%は緊張しながらも、吸い付くことをやめなかった。

    「……恥ずかしいけど……なんか、落ち着くのさ……」

    「こ、こんなこと……赤ちゃんみたいで恥ずかしいのさ……」

    %CALLNAME:人物_フラン%は文句を言いながらも、言われた通りに乳首を口に含んだ。

    「……んむっ……ちゅ……れろ……」

    悪魔の妹の舌が乳首をくすぐり、%CALLNAME:MASTER%の肌を舐め上げる。

    「……%CALLNAME:MASTER%のせいだからね……こんな気持ちになるの……」

    %CALLNAME:人物_フラン%は照れ隠しのように呟きながら、甘える手を止めなかった。

    「……でも……嫌じゃ、ないのさ……」

    「%CALLNAME:MASTER%……見ないでよ……」

    %CALLNAME:人物_フラン%は目を閉じて、%CALLNAME:MASTER%の胸に吸い付いた。

    「んっ……ちゅぅ……はぁ……」

    悪魔の妹は無心になって乳首を吸い、時折甘い息を漏らしている。

    %CALLNAME:人物_フラン%の頬が上気し、恥じらいながらも夢中になっていた。

    「……%CALLNAME:MASTER%のおっぱい……なんか、癖になりそう……」

    %CALLNAME:人物_フラン%は自分の言葉に気づいて、さらに顔を赤くした。

    「……%CALLNAME:MASTER%の匂いがする……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の胸に顔を埋めながら、小さく呟いた。

    「……ちゅ……んっ……」

    495年間誰にも甘えられなかった悪魔の妹が、今は夢中で乳首を吸っている。

    「……お姉様には内緒だからね……」

    %CALLNAME:人物_フラン%は恥ずかしそうに言いながらも、%CALLNAME:MASTER%から離れようとしなかった。

    「……もう少しだけ……こうしてていい……？」
