character: レミリア
situation: K5_口挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、私の口が欲しいの？」

    %CALLNAME:人物_レミリア%は艶やかな微笑みを浮かべ、%CALLNAME:MASTER%の前に跪いた。

    紅魔館の主が膝をつく――それだけで、この行為がどれほど特別かが分かる。

    「……こんな姿、%CALLNAME:MASTER%にしか見せないわ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%のそれを口に含んだ。

    「んっ……ふふ、熱いわね……ちゅ、れろ……」

    吸血鬼の冷たい口腔が、%CALLNAME:MASTER%の熱を優しく包み込んでいた。

    「んっ……%CALLNAME:MASTER%の、美味しいわ……」

    %CALLNAME:人物_レミリア%は恍惚とした表情で%CALLNAME:MASTER%のそれを舐めていた。

    「ちゅる、ん……こうして舐めていると……幸せなの」

    500年を生きた吸血鬼が、愛する者のために奉仕している。

    「%CALLNAME:MASTER%……もっと、させて……れろ、ちゅ……」

    %CALLNAME:人物_レミリア%は愛おしそうに亀頭を舌で転がした。

    「んふ……出そうになったら、全部飲んであげるわ」

    「……ねぇ、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は上目遣いで見上げながら、口を動かしていた。

    「こうして私が奉仕しているの……気持ちいい？」

    %CALLNAME:人物_レミリア%の舌が茎を丁寧に這っていく。

    「ちゅる、んっ……%CALLNAME:MASTER%が喜んでくれると、私も嬉しいの……」

    高飛車な館の主とは思えない、甘えるような告白だった。

    「はむ……もっと、奉仕させてね……ちゅ、れろ……」

    「ククク……%CALLNAME:MASTER%、随分と感じてるのね」

    %CALLNAME:人物_レミリア%は意地悪そうに笑いながら、舌を這わせた。

    「私の口で、こんなになっちゃって……可愛いわ」

    %CALLNAME:人物_レミリア%は先端を唇で包み、ゆっくりと吸い上げる。

    「ちゅう……ふふ、もっと声を聞かせて……んっ」

    500年の経験が、的確に%CALLNAME:MASTER%の快感を高めていく。

    「……出していいわよ。全部、受け止めてあげるから」
  priority: 4
- id: talent_3_1
  content: >-
    「……こ、口で、すればいいのね？」

    %CALLNAME:人物_レミリア%は顔を紅くしながら、%CALLNAME:MASTER%の前に跪いた。

    「べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただの……興味よ」

    %CALLNAME:人物_レミリア%はおずおずと口を開け、%CALLNAME:MASTER%のそれを含んだ。

    「んっ……お、大きい……ん、むっ……」

    ぎこちない動きだが、一生懸命に舌を動かしている。

    「……ど、どう？　気持ちいいの……？」

    「ふん……こんなことで喜ぶなんて、単純ね」

    %CALLNAME:人物_レミリア%は強がりながらも、口の動きは止めなかった。

    「ちゅ、れろ……で、でも……%CALLNAME:MASTER%が喜ぶなら……」

    そう呟きながら、%CALLNAME:人物_レミリア%は舌の動きを丁寧にした。

    「……感謝しなさいよ。紅魔館の主が直々に奉仕してあげてるんだから」

    高飛車な言葉とは裏腹に、%CALLNAME:人物_レミリア%の頬は真っ赤だった。

    「んむ……ちゅる……早く、出しなさいよ……」

    「……%CALLNAME:MASTER%、そんな顔しないで」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の反応に、どきりとしていた。

    「私が口でしてあげると……そんなに気持ちいいの？」

    少し嬉しそうに、%CALLNAME:人物_レミリア%は舌を動かし続けた。

    「ちゅ、んっ……れろ……ふん、当然よね」

    そう言いながらも、%CALLNAME:人物_レミリア%はこっそり%CALLNAME:MASTER%の表情を確認していた。

    「……もう少しだけ、してあげてもいいわよ」

    「あっ……動いた……」

    %CALLNAME:人物_レミリア%は口の中の反応に、興味津々の様子だった。

    「ふぅん……こうすると、もっと反応するのね……ちゅる」

    %CALLNAME:人物_レミリア%は観察するように、舌の動きを変えてみる。

    「……べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただ、その……」

    言い訳が思いつかず、%CALLNAME:人物_レミリア%は黙って奉仕を続けた。

    「……うるさいわね。黙って受けていなさい」
