character: パチュリー
situation: K3_会話親密
entries:
- id: fallback
  content: >-
    「……ん……あなたの手、あたたかい……」

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の髪を優しく撫でている。

    %CALLNAME:人物_パチュリー%は本を閉じて、その手に身を任せていた。

    「……こうしていると、本を読むより心地いいわ」

    %CALLNAME:人物_パチュリー%は普段の冷静さを忘れたように、目を細めている。

    「研究の合間には、こういう息抜きもいいものね……」

    淡々とした口調だが、頬がわずかに染まっていた。

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の手を取り、指を絡めた。

    「……そう、手を繋ぎたいの……」

    %CALLNAME:人物_パチュリー%は本を脇に置き、繋いだ手を見つめている。

    「……本には書いてなかったわ。こういう時、胸が高鳴るものなのね」

    %CALLNAME:人物_パチュリー%は呟きながら、%CALLNAME:MASTER%の手を握り返してきた。

    「……離さないで。もう少しだけ、このまま……」

    「ひゃっ……耳は、だめ……」

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の耳元に息を吹きかけた。

    %CALLNAME:人物_パチュリー%は体をびくりと震わせ、本を落としてしまった。

    「……%CALLNAME:MASTER%、そこは……弱いって知ってるくせに……」

    %CALLNAME:人物_パチュリー%は上気した顔で%CALLNAME:MASTER%を睨んでいるが、その瞳は潤んでいる。

    「……もう。意地悪なんだから……」

    %CALLNAME:MASTER%は後ろから%CALLNAME:人物_パチュリー%を抱きしめた。

    「……っ」

    %CALLNAME:人物_パチュリー%は驚いたように身を強張らせたが、すぐに力を抜いた。

    「……こうしてると、あなたの体温が伝わってくるわ」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の腕に手を添え、目を閉じている。

    「……図書館は冷えるから。あなたがいると、あたたかいの……」

    珍しく甘えるような声で、%CALLNAME:人物_パチュリー%はそう囁いた。
  priority: 4
- id: talent_3_1
  content: >-
    「……ん、髪を……」

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の髪を指で梳いている。

    %CALLNAME:人物_パチュリー%は本を読むふりをしながら、その感触を受け入れていた。

    「……別に、嫌じゃないわ。ただ……気が散るの」

    %CALLNAME:人物_パチュリー%の声は、いつもより少し高くなっている。

    「……続けていいわよ。本は後で読むから……」

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の手を取った。

    「えっ……手を……？」

    %CALLNAME:人物_パチュリー%は戸惑いながらも、その手を振りほどかなかった。

    「……こういうことをされると、困るわ」

    %CALLNAME:人物_パチュリー%は俯いて、繋いだ手を見つめている。

    「……困るけど……離したくない、と思ってしまうの……」

    「あっ……肩を……」

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の肩に触れている。

    %CALLNAME:人物_パチュリー%は本のページを止め、小さく息を吐いた。

    「……ずっと同じ姿勢だから、凝っているのよ」

    %CALLNAME:MASTER%がそっと肩を揉むと、%CALLNAME:人物_パチュリー%は目を閉じた。

    「……んっ……そこ、気持ちいいわ……」

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の頬に手を伸ばした。

    「……っ、な、何……」

    %CALLNAME:人物_パチュリー%は本を持つ手を止め、頬に触れる%CALLNAME:MASTER%の手を見つめている。

    「……急に触られると、心拍数が上がるの。知ってる？」

    %CALLNAME:人物_パチュリー%は顔を赤らめながらも、%CALLNAME:MASTER%の手を払いのけなかった。

    「……ふん、あなたのせいで、今日の研究は進まないわね」
