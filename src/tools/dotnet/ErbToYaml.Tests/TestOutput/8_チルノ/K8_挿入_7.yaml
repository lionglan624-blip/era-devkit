- id: fallback
  content: >-
    「な……っ！　何すんのよ！　離しなさい！」

    %CALLNAME:人物_チルノ%は無理やり%CALLNAME:MASTER%の上に座らされ、もがいていた。

    「こ、こんな格好……あたいが許可してないんだけど！」

    しかし正面から繋がれ、逃げられない。

    「やっ……入って……くる……っ」

    %CALLNAME:人物_チルノ%は強がりながらも、声が震えていた。

    「ちょっ……！　顔、見るんじゃないわよ……！」

    %CALLNAME:人物_チルノ%は正面から組み伏せられ、目を逸らそうとしている。

    「あたいを誰だと思ってんの……凍らせる……わよ……」

    しかし冷気を放つ余裕もないようだ。

    「んっ……や……こんなの……っ」

    %CALLNAME:人物_チルノ%の目には不安の色が浮かんでいた。

    「やめ……っ！　こんな体勢……恥ずかしい……！」

    %CALLNAME:人物_チルノ%は対面座位で犯されながら、必死に目を閉じていた。

    「顔見られたくない……っ、あたいのこんな顔……」

    %CALLNAME:人物_チルノ%の目には涙が滲んでいる。

    「……っ、最強なのに……こんな……」

    いつもの自信は完全に失われていた。

    「……」

    %CALLNAME:人物_チルノ%は無言で%CALLNAME:MASTER%を睨みつけている。

    「あんた……覚えてなさいよ……」

    正面から繋がれ、%CALLNAME:人物_チルノ%は歯を食いしばっていた。

    「……絶対に……仕返しする……」

    震える声だったが、瞳には強い意志が宿っていた。
