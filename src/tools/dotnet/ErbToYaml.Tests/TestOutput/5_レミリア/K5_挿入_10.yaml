- id: fallback
  content: >-
    「……後ろ向き？ 随分と変わった趣味ね」

    %CALLNAME:人物_レミリア%は興味深げに言いながら、%CALLNAME:MASTER%に背を向けた。

    「まあいいわ。試してあげましょう」

    %CALLNAME:MASTER%が後ろに挿入すると、%CALLNAME:人物_レミリア%は眉をひそめた。

    「っ……痛……思ったより、きついわね……」

    %CALLNAME:人物_レミリア%は不快そうに顔を歪めた。

    「……背中を向けていると、何をされるか分からないわね……まあ、続けてみなさい」

    500年の吸血鬼は、冷静を装いながら警戒していた。

    「……背面座位でアナル、ね。面白い趣向だわ」

    %CALLNAME:人物_レミリア%は値踏みするように言い、%CALLNAME:MASTER%に背中を向けて座った。

    「どれ、付き合ってあげましょう」

    %CALLNAME:MASTER%がゆっくりと挿入すると、%CALLNAME:人物_レミリア%は息を詰めた。

    「っ……くぅ……これは……なかなか……」

    %CALLNAME:人物_レミリア%は背後を警戒するように首を回した。

    「……ふぅん、痛いけど……顔を見せなくていいのは楽かもしれないわね」

    その声には、認めたくない好奇心が滲んでいた。

    「……使用人に背中を見せろ、と？ 随分な要求ね」

    %CALLNAME:人物_レミリア%は溜息をつきながら、%CALLNAME:MASTER%に背を向けた。

    「今日は気まぐれで付き合ってあげるわ」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は顔を歪めた。

    「っ……あぁ……痛い……もう少しゆっくりできないの……？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の腕を掴んだ。

    「……背中を向けていると……何をされるか気になるわね」

    紅魔館の主は、動揺を隠そうとしていた。

    「……ふぅん、後ろ向きがいいのね」

    %CALLNAME:人物_レミリア%は腕を組みながら、%CALLNAME:MASTER%に背を向けた。

    「まあ、退屈しのぎに付き合ってあげるわ」

    %CALLNAME:MASTER%が後ろに挿入すると、%CALLNAME:人物_レミリア%は小さく声を漏らした。

    「っ……んっ……思ったより……きつい……」

    %CALLNAME:人物_レミリア%は表情を押し殺した。

    「……まあ、及第点ね。背中越しでも分かるわよ」

    吸血鬼の心に、何かが芽生え始めていた。
  priority: 2
- id: fallback
  content: >-
    「……背中を見せろだと？ 随分と図々しい要求ね」

    %CALLNAME:人物_レミリア%は冷たい視線で%CALLNAME:MASTER%を睨んだ。

    「ふん……まあいいわ。後悔するのはあなたよ」

    %CALLNAME:MASTER%が後ろに挿入すると、%CALLNAME:人物_レミリア%は表情を歪めた。

    「っ……痛……っ、下手くそね……」

    %CALLNAME:人物_レミリア%は振り向いて苛立たしげに%CALLNAME:MASTER%を睨んだ。

    「……背中を向けたのが間違いだったわ。何をしているか見えないじゃない」

    紅魔館の主は、高慢な態度を崩さなかった。

    「……使用人に背中を見せろとは、身の程知らずね」

    %CALLNAME:人物_レミリア%は不敵に微笑みながら、%CALLNAME:MASTER%に背を向けた。

    「いいわ、付き合ってあげる。感謝しなさい」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は眉をひそめた。

    「……っ、痛い……もっと上手くできないの……？」

    %CALLNAME:人物_レミリア%は振り向きもせずに鋭く言い放った。

    「……こんな程度で私を悦ばせられると思うな」

    500年の吸血鬼は、痛みを怒りに変えていた。

    「……ほう、背面座位でアナル？ 変わった趣味ね」

    %CALLNAME:人物_レミリア%は興味なさそうに言い、%CALLNAME:MASTER%に背を向けて座った。

    「私の体を使えるだけ光栄に思いなさい」

    %CALLNAME:MASTER%がゆっくりと挿入すると、%CALLNAME:人物_レミリア%は息を詰めた。

    「……っ、くぅ……痛いじゃない……」

    %CALLNAME:人物_レミリア%は苛立たしげに振り返った。

    「……もっと丁寧にしなさい。背中を向けているのだから、なおさらよ」

    威厳を保ちながら、吸血鬼は不快感を露わにした。

    「……今日は気まぐれで背中を預けてあげているのよ？」

    %CALLNAME:人物_レミリア%は高飛車に言い放ち、%CALLNAME:MASTER%に背を向けた。

    「……感謝しなさい」

    %CALLNAME:MASTER%が後ろに挿入すると、%CALLNAME:人物_レミリア%は声を漏らした。

    「っ……あぁ……痛……っ、下手ね……」

    %CALLNAME:人物_レミリア%は振り向きもせずに吐き捨てた。

    「……次はもっとましな技を見せなさい。背中越しでも分かるのよ」

    紅魔館の主は、最後まで支配者の態度を崩さなかった。
  priority: 1
