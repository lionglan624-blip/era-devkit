character: レミリア
situation: K5_口挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、私の足が欲しいの？」

    %CALLNAME:人物_レミリア%は艶やかに微笑みながら、%CALLNAME:MASTER%の前に座った。

    小さな足が、%CALLNAME:MASTER%のそれに触れる。

    「……こんなに熱いのね。私の冷たい足で、鎮めてあげるわ」

    %CALLNAME:人物_レミリア%は優雅な足捌きで、ゆっくりと挟み込んだ。

    「……%CALLNAME:MASTER%だけよ、私にこんなことをさせるのは」

    500年を生きた吸血鬼が、恋人のためだけに誇りを捨てていた。

    「んっ……%CALLNAME:MASTER%の、熱い……」

    %CALLNAME:人物_レミリア%は足指で%CALLNAME:MASTER%のそれを器用に挟んでいた。

    吸血鬼の足は白磁のように滑らかで、ひんやりと心地よい。

    「ククク……こうして擦ると、もっと硬くなるのね」

    %CALLNAME:人物_レミリア%は愛おしそうに足を動かしながら、%CALLNAME:MASTER%の表情を見つめていた。

    「……気持ちいい？　そう……私も、幸せよ」

    館の主は、恋人への奉仕に没頭していた。

    「……ねぇ、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は足を動かしながら、甘えるような声で呼びかけた。

    「こうして私の足で触れていると……なんだか、特別な気分なのよ」

    紅魔館の主とは思えない、素直な告白だった。

    「……%CALLNAME:MASTER%のためなら、何でもしてあげる」

    %CALLNAME:人物_レミリア%は頬を染めながら、奉仕を続けた。

    500年の孤独を知る吸血鬼は、愛する者との繋がりを噛みしめていた。

    「ふふ……%CALLNAME:MASTER%、可愛い顔してるわね」

    %CALLNAME:人物_レミリア%は意地悪そうに微笑みながら、動きを激しくした。

    「私の足で、こんなになっちゃって……んっ」

    %CALLNAME:人物_レミリア%は時折、足指で先端をつついてみせる。

    「もっと乱れていいのよ？　今夜は私が、%CALLNAME:MASTER%を溶かしてあげるわ」

    そう言いながらも、その瞳には深い愛情が宿っていた。

    「……気持ちよくなったら、全部、私の足で受け止めてあげるから」
  priority: 4
- id: talent_3_1
  content: >-
    「……あ、足で、すればいいのね？」

    %CALLNAME:人物_レミリア%は顔を紅くしながら、%CALLNAME:MASTER%の前に座った。

    「……こ、こんな恥ずかしいこと……」

    おずおずと足を伸ばし、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%のそれに触れた。

    「んっ……あ、熱い……こんなに硬くなって……」

    ぎこちない動きだが、一生懸命に足を動かしている。

    「……べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただの興味よ」

    「ふん……こんなことで喜ぶなんて、単純ね」

    %CALLNAME:人物_レミリア%は強がりながらも、足を動かし続けた。

    「んっ……で、でも、%CALLNAME:MASTER%が喜ぶなら……仕方ないわ」

    そう呟きながら、%CALLNAME:人物_レミリア%は動きを少しだけ丁寧にした。

    「……感謝しなさいよ。紅魔館の主が直々に足で奉仕してあげてるんだから」

    高飛車な言葉とは裏腹に、%CALLNAME:人物_レミリア%の頬は真っ赤だった。

    「んっ……ふぅ……早く、満足しなさいよ……」

    「……%CALLNAME:MASTER%、そんな顔しないで」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の反応に、どきりとしていた。

    「私の足で……そんなに気持ちいいの……？」

    少し嬉しそうに、%CALLNAME:人物_レミリア%は足を動かし続けた。

    「んっ……ふぅ……ふん、当然よね。私は紅魔館の主なんだから」

    そう言いながらも、%CALLNAME:人物_レミリア%はこっそり%CALLNAME:MASTER%の表情を確認していた。

    「……もう少しだけ、してあげてもいいわよ」

    「あっ……ここ、反応してる……」

    %CALLNAME:人物_レミリア%は足指で先端に触れた瞬間、興味津々の様子だった。

    「ふぅん……こうすると、もっとぴくぴくするのね……んっ」

    %CALLNAME:人物_レミリア%は観察するように、動きを変えてみる。

    「……べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただ、その……」

    言い訳が思いつかず、%CALLNAME:人物_レミリア%は口をつぐんだ。

    「……うるさいわね。黙って奉仕されていなさい」
