- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%……そちらは……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の要求に戸惑いを見せた。

    「メイドとして……そのような場所は……」

    しかし、%CALLNAME:MASTER%の眼差しを受けて、%CALLNAME:TARGET%は観念した。

    「……わかりました……貴方がお望みなら……」

    「んっ……きつい……違和感が……でも、嫌じゃ……ないの……」

    %CALLNAME:TARGET%は羞恥に顔を染めながら、%CALLNAME:MASTER%を受け入れた。

    「あ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が腸内を進む感覚に、声を漏らしている。

    「向かい合ったまま……後ろで……こんなの……」

    「顔を……見ないでください……恥ずかしい……ですわ……」

    %CALLNAME:MASTER%の腰が深く沈むと、%CALLNAME:TARGET%の体が震えた。

    「あっ……奥……当たって……変な感じ……」

    「%CALLNAME:MASTER%……もっと……ゆっくり……」

    「……ふぁ……こんな場所で……感じてしまうなんて……」

    %CALLNAME:TARGET%は自分の反応に戸惑いながらも、%CALLNAME:MASTER%を受け入れている。

    「お嬢様に知られたら……なんて思われるか……」

    言いかけて、%CALLNAME:TARGET%は唇を噛んだ。

    「……いけませんわね、こんなこと考えては……」

    「でも……貴方になら……この場所も……」

    葛藤しながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%から目を逸らせなかった。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は躊躇いがちに%CALLNAME:MASTER%の背中に手を回した。

    「こうして……抱きしめさせて……ください……」

    許可を求めながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を引き寄せた。

    「あ……近い……後ろなのに……繋がっていて……」

    「……ん……っ……%CALLNAME:MASTER%……」

    羞恥と背徳感の狭間で、%CALLNAME:TARGET%は甘い声を漏らし続けた。
