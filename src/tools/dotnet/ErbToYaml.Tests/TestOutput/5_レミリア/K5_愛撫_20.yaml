- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%が搾乳機を見せると、%CALLNAME:人物_レミリア%は頬を染めた。

    「……そ、その妙な器具を、胸に付けるの……？」

    カップが装着されると、吸血鬼は息を呑んで身を強張らせた。

    「っ……吸引、されてる……ひゃぁっ！」

    律動的な刺激が胸を攻め、%CALLNAME:人物_レミリア%は思わず声を上げた。

    「やっ……気持ちいい……聞かないでよ、こんな声……！」

    必死に声を殺しながらも、%CALLNAME:人物_レミリア%の身体は吸引に震えていた。

    「……何よ、その透明なカップは」

    %CALLNAME:人物_レミリア%は搾乳機を睨んだが、逃げようとはしなかった。

    装着を許すと、吸血鬼は小さく身悶えした。

    「んっ……胸が、吸い込まれて……っ……」

    搾乳機が敏感な胸を刺激し続け、%CALLNAME:人物_レミリア%は唇を噛んだ。

    「っ……こんなの、ずるいわ……%CALLNAME:MASTER%のばか……」

    恨めしそうに言いながらも、その瞳は快感に潤んでいた。

    %CALLNAME:MASTER%が搾乳機を取り出すと、%CALLNAME:人物_レミリア%は目を逸らした。

    「……べ、別に怖くなんかないわよ、そんな器具くらい」

    しかし装着された瞬間、その強がりは崩れ去った。

    「ひっ……！　胸が、吸われて……やぁっ！」

    吸引が止まらず、%CALLNAME:人物_レミリア%は声を堪えきれなかった。

    「やっ……止めて……強くしないで……わ、分からなくなるぅ……！」

    高貴な吸血鬼は、搾乳機の刺激に翻弄されていた。

    「……いいわよ、好きにしなさい」

    %CALLNAME:人物_レミリア%は不機嫌そうに言いながらも、胸を突き出した。

    搾乳機がゆっくりと装着され、吸血鬼は小さく震えた。

    「っ……吸い付かれて、また、吸引が……」

    カップが胸を刺激し続け、%CALLNAME:人物_レミリア%は声を漏らした。

    「あっ……んんっ……%CALLNAME:MASTER%……もう、嫌いよ……」

    その言葉とは裏腹に、%CALLNAME:人物_レミリア%は吸引から逃れようとしなかった。
