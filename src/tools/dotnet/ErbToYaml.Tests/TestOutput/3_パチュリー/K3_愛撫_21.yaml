entries:
- id: fallback
  content: >-
    「……ん……%CALLNAME:MASTER%、乳首を……」

    %CALLNAME:TARGET%は魔導書を閉じ、%CALLNAME:MASTER%の指に身を委ねた。

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の乳首を摘まむと、%CALLNAME:TARGET%は小さく息を漏らした。

    「……あなたは私の弱点を……よく知っているのね……」

    %CALLNAME:TARGET%は淡々とした口調を保とうとするが、吐息が熱を帯びている。

    「……そこ、敏感なの……知ってるでしょう……もっと、して……」

    動かない大図書館が、%CALLNAME:MASTER%の指先で甘く乱れていた。

    「あ……っ……や……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の乳首を転がしている。

    %CALLNAME:TARGET%は机に手をついて、快感に耐えていた。

    「……%CALLNAME:MASTER%……乳首だけで、こんなに……頭が、ぼうっとする……」

    %CALLNAME:TARGET%の吐息が熱く、大図書館の静寂に響いている。

    「……本には……この感覚は……書いていなかったわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に寄りかかり、蕩けた表情を浮かべた。

    「……ひゃ……っ……」

    %CALLNAME:MASTER%が乳首を強く摘まむと、%CALLNAME:TARGET%は思わず声を上げた。

    %CALLNAME:TARGET%の体が%CALLNAME:MASTER%の指に反応して、びくびくと震えている。

    「……そ、そんなに……弄ったら……壊れてしまうわ……」

    %CALLNAME:TARGET%は抗議するように%CALLNAME:MASTER%を見上げるが、その瞳は潤んでいる。

    「……体が弱いんだから……優しく……でも、止めないで……」

    矛盾した懇願が、%CALLNAME:TARGET%の口から零れた。

    「……んぁ……あ……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の乳首を引っ張ったり、ねじったりしている。

    %CALLNAME:TARGET%は本を手放し、%CALLNAME:MASTER%の腕にしがみついていた。

    「%CALLNAME:MASTER%……乳首だけで……私を……こんなに……」

    %CALLNAME:TARGET%は普段の冷静さを失い、甘い声を漏らしている。

    「……あなただけよ……私を壊せるのは……全部、あなたのもの……」

    大図書館の埃っぽい空気の中、%CALLNAME:TARGET%の甘い囁きが溶けていった。
