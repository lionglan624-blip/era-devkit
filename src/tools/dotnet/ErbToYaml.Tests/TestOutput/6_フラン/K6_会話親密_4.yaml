- id: fallback
  content: >-
    「んっ……！？」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%にキスをした。

    %CALLNAME:TARGET%は目を丸くして固まってしまった。

    「き、キス……したの……？」

    %CALLNAME:TARGET%は顔を真っ赤にして、%CALLNAME:MASTER%を見つめている。

    「これって……好きな人にするって、本に書いてあったのさ……」

    「……わ、私のこと、好きなの？ よくわかんないよ……」

    %CALLNAME:TARGET%は困惑しながらも、唇に触れた指を見つめていた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の唇に触れた。

    「ぴちゅ……ん……」

    %CALLNAME:TARGET%は一瞬身を硬くしたが、すぐに力を抜いた。

    「……っ。な、何……これ……」

    %CALLNAME:TARGET%は戸惑いながらも、逃げようとはしなかった。

    「……あったかい……のさ……」

    「でも、急にこんなことされると……壊しちゃいそうになる……」

    %CALLNAME:TARGET%の翼が落ち着かなげにぱたぱたと動いている。

    「えっ……？」

    %CALLNAME:MASTER%が顔を近づけると、%CALLNAME:TARGET%はきょとんとした。

    %CALLNAME:MASTER%はそのまま%CALLNAME:TARGET%の唇にキスをした。

    「んっ……ん……」

    %CALLNAME:TARGET%は目を閉じ、されるがままになっている。

    「……ぷは。……なんか、変な気持ちになるのさ……」

    %CALLNAME:TARGET%は頬を染めて、落ち着かなげに視線を彷徨わせた。

    「あっ……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の頬に手を添え、唇を重ねた。

    「ん……」

    %CALLNAME:TARGET%は驚きながらも、%CALLNAME:MASTER%のキスを受け入れた。

    「……唇、柔らかいのさ……」

    %CALLNAME:TARGET%は不思議そうに自分の唇に触れている。

    「これが、キス……地下にいた頃は、想像もできなかったの……」

    495年の孤独を知る紅い瞳が、少しだけ和らいだ。
