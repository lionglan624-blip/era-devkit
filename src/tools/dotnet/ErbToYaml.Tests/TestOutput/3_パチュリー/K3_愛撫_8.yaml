character: パチュリー
situation: K3_愛撫
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、あなたに見せるのは……特別よ」

    %CALLNAME:TARGET%は魔導書を閉じ、ゆっくりとローブの裾に手を伸ばした。

    「……ん……こうして、自分で……」

    %CALLNAME:TARGET%は淡々と、しかし頬を微かに紅潮させながら、秘所に指を這わせた。

    「……あ……見ないで、と言いたいところだけど……」

    %CALLNAME:TARGET%は潤んだ瞳で%CALLNAME:MASTER%を見つめた。

    「……あなたになら、見られても……いいわ」

    「……知識として、こういう行為は理解しているわ」

    %CALLNAME:TARGET%は指を動かしながら、学術的に解説するような口調で言った。

    「……ん……でも、実践は……はぁ……別物ね」

    大図書館の静寂の中、%CALLNAME:TARGET%の熱い吐息だけが響く。

    「……あ……%CALLNAME:MASTER%……見ているなら……」

    %CALLNAME:TARGET%は指の動きを速めながら、恥ずかしそうに目を細めた。

    「……最後まで、見届けなさい」

    「……ふぅ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の前で、静かに自らを慰めている。

    普段は動かない大図書館と呼ばれる彼女が、今は微かに体を揺らしている。

    「……んっ……本の中では、味わえない……快楽……」

    %CALLNAME:TARGET%は目を閉じ、知識では得られない感覚に身を委ねた。

    「……あなたがいると、余計に……感じてしまうわ」

    「……こんな姿、レミィにも小悪魔にも見せられないわ」

    %CALLNAME:TARGET%は羞恥に頬を染めながら、秘所を愛撫し続けている。

    「……あ……やぁ……%CALLNAME:MASTER%だけ……」

    %CALLNAME:TARGET%の口から、らしくない甘い声が漏れた。

    「……こんな声、出すつもりじゃ……んっ……」

    知的な魔法使いの仮面が、快楽に溶けていく。

    「……あなたのせいよ、%CALLNAME:MASTER%……」
  priority: 4
- id: talent_3_1
  content: >-
    「……自慰を見せろ、ですって？」

    %CALLNAME:TARGET%は眉を顰め、%CALLNAME:MASTER%を睨んだ。

    「……まったく、変な趣味ね」

    しかし、%CALLNAME:TARGET%はゆっくりと秘所に手を伸ばした。

    「……んっ……こ、こうすればいいのかしら……」

    羞恥に顔を赤らめながら、%CALLNAME:TARGET%は指を動かし始めた。

    「……あまり、じろじろ見ないで……」

    「……はぁ……こんなこと、本には書いてなかったわ」

    %CALLNAME:TARGET%は指を動かしながら、息を乱している。

    「……ん……あ……」

    普段の冷静さが崩れ、%CALLNAME:TARGET%の表情に甘さが滲む。

    「……%CALLNAME:MASTER%、笑わないでよ……」

    恥ずかしそうに目を逸らしながらも、手は止まらない。

    「……こんな姿、見せたくなかったのに」

    「……見世物じゃないのよ、私は」

    %CALLNAME:TARGET%は不満げに言いながらも、言われた通りに自らを慰めている。

    「……ふっ……あ……」

    指が動く度に、%CALLNAME:TARGET%の体が微かに震える。

    「……こんなの、研究の対象外よ……」

    そう呟きながらも、%CALLNAME:TARGET%は快楽から逃れられないようだった。

    「……むきゅ……恥ずかしいわ……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、秘所を弄っている。

    「……あ……こんなの、初めてで……」

    %CALLNAME:TARGET%は目を潤ませながら、%CALLNAME:MASTER%を見上げた。

    「……%CALLNAME:MASTER%が責任取りなさいよ……」

    羞恥と快楽に挟まれ、%CALLNAME:TARGET%の声は震えていた。
