- id: fallback
  content: >-
    「お、おい……こんなこと、させるなよ……」

    %CALLNAME:人物_魔理沙%は動揺しながらも、%CALLNAME:MASTER%の股間に顔を近づけさせられた。

    「わ、私にこんなこと……何考えてるんだ……」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、ぎこちなく舌を這わせた。

    「……勝手に変な声出すなよ、気が散るだろ……」

    %CALLNAME:人物_魔理沙%は落ち着かない様子で、なんとか状況を受け入れようとしていた。

    「……何でこんなことになってるんだ」

    %CALLNAME:人物_魔理沙%は理不尽そうに呟きながら、舌を動かしている。

    「こういうのは……もっと親しくなってからだろ……」

    %CALLNAME:人物_魔理沙%の抗議とは裏腹に、舌は止まらなかった。

    「はぁ……仕方ない、早く終わらせるぞ……」

    %CALLNAME:人物_魔理沙%は諦めたように、奉仕の動きを続けた。

    「……濡れてきてるな」

    %CALLNAME:人物_魔理沙%は無表情を装いながら、%CALLNAME:MASTER%のVを舐めている。

    「こういうのは経験ないんだから……期待するなよ」

    %CALLNAME:人物_魔理沙%の舌使いはぎこちなく、慣れていないのが明らかだった。

    「……文句あるなら、他の奴に頼めばいいだろ」

    %CALLNAME:人物_魔理沙%は強がりながらも、舌を止めようとはしなかった。

    「……」

    %CALLNAME:人物_魔理沙%は無言で%CALLNAME:MASTER%のVを舐めている。

    「……これで満足なのか、お前は」

    %CALLNAME:MASTER%が反応すると、%CALLNAME:人物_魔理沙%は少し驚いた。

    「……ふーん、こうすると感じるのか」

    %CALLNAME:人物_魔理沙%は興味なさそうな振りをしながら、奉仕を続けた。
