- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%に抱きつこうとした。

    「え…っ、あの、%CALLNAME:MASTER%さん…？」

    %CALLNAME:TARGET%は慌てて身を引いた。

    背中の羽がそわそわと揺れている。

    「い、いきなり抱きつくのは…その…」

    「もう少し、仲良くなってからにしてもらえると…」

    %CALLNAME:TARGET%は困った顔で、でも怒ってはいない様子で言った。

    「あの…%CALLNAME:MASTER%さん…？」

    %CALLNAME:MASTER%が近づいてきて、%CALLNAME:TARGET%は戸惑った。

    「抱きつきたいの…？ でも、わたしたちまだそこまで…」

    %CALLNAME:TARGET%は困ったように眉を下げた。

    「…ごめんなさい、もうちょっと待ってくれると嬉しいの…」

    「わたし、こういうの…慣れてなくて…」

    %CALLNAME:TARGET%は申し訳なさそうに、でもやんわりと断った。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%に近づいた。

    「わっ…あの、%CALLNAME:MASTER%さん…？」

    %CALLNAME:TARGET%は一歩後ずさった。

    「そんなに近づかれると…その…」

    %CALLNAME:TARGET%の背中の羽が落ち着きなく動いている。

    「…まだ、そこまで親しくないですから…」

    %CALLNAME:TARGET%は困惑しながらも、丁寧に距離を取った。

    「えっ…と…」

    %CALLNAME:MASTER%が抱きつこうとしているのを察して、%CALLNAME:TARGET%は困った顔をした。

    「あの、%CALLNAME:MASTER%さん…わたし、あんまり人と触れ合うの得意じゃなくて…」

    %CALLNAME:TARGET%は申し訳なさそうに視線を落とした。

    「チルノちゃんくらい仲良くなれたら…いいんですけど…」

    「…ごめんなさい、今はちょっと…」

    %CALLNAME:TARGET%は遠慮がちに、でも優しく微笑んだ。
