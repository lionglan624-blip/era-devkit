character: 魔理沙
situation: K10_愛撫
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%に見せろって言われたら、断れないぜ」

    %CALLNAME:人物_魔理沙%は頬を染めながら、脚を開いた。

    恋人の視線を受けながら、%CALLNAME:人物_魔理沙%はゆっくりと秘部に指を這わせる。

    「んっ……見られてると思うと、なんか変な気分になるな……」

    %CALLNAME:人物_魔理沙%は指先で花弁をなぞりながら、熱い息を吐いた。

    「……お前の前だと、正直になっちまうな」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに、でも嬉しそうに%CALLNAME:MASTER%を見つめた。

    「……ん、こうすればいいのか？」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の目の前で、自らの秘部を弄り始めた。

    指が花弁を掻き分け、小さな突起を円を描くように刺激する。

    「あっ……や、結構気持ちいいな、これ……」

    %CALLNAME:人物_魔理沙%の呼吸が次第に荒くなっていく。

    「……%CALLNAME:MASTER%が見てると、余計に感じるぜ……」

    %CALLNAME:人物_魔理沙%は上気した顔で、恋人に甘えるような視線を向けた。

    「はぁ……んっ……どうだ、お前……興奮するか？」

    %CALLNAME:人物_魔理沙%は挑発的な笑みを浮かべながら、自慰を続けている。

    指が濡れた音を立て、%CALLNAME:人物_魔理沙%の体が小刻みに震える。

    「……ふっ……私がこうしてるの見て……満足か？」

    強気な言葉とは裏腹に、%CALLNAME:人物_魔理沙%の声は甘く震えている。

    「……恋人だから、こういうのも見せてやるんだぜ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%だけに見せる姿を晒していた。

    「……%CALLNAME:MASTER%……見ててくれよ……」

    %CALLNAME:人物_魔理沙%は恋人の視線を感じながら、自らを慰めている。

    指が秘所を這い、愛液でぬめる音が部屋に響く。

    「あ……んっ……一人でするより、ずっといいな……」

    %CALLNAME:人物_魔理沙%は快感に身を震わせながら、%CALLNAME:MASTER%を見上げた。

    「……お前がいると、安心するんだ……変だよな」

    %CALLNAME:人物_魔理沙%は珍しく素直な言葉を漏らした。
  priority: 4
- id: talent_3_1
  content: >-
    「え……じ、自慰しろって……本気か？」

    %CALLNAME:人物_魔理沙%は顔を真っ赤にして、%CALLNAME:MASTER%を見た。

    しかし拒絶はせず、おずおずと脚を開いていく。

    「……%CALLNAME:MASTER%の前で、こんなこと……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに指を秘部に伸ばした。

    「……見るなよ、絶対見るなよ……見てるだろ、ばか」

    %CALLNAME:人物_魔理沙%は矛盾したことを言いながら、ゆっくりと指を動かし始めた。

    「……っ、な、なんでこんなこと……」

    %CALLNAME:人物_魔理沙%は恥じらいながらも、自慰を始めてしまっている。

    指先が秘部を撫で、小さな声が漏れる。

    「あ……んっ……%CALLNAME:MASTER%、そんなに見るなって……」

    %CALLNAME:人物_魔理沙%は涙目になりながらも、指の動きを止められない。

    「……お前の前だと、なんか……止まらなくなるんだよ……」

    %CALLNAME:人物_魔理沙%は自分でも困惑しながら、快感に身を任せていた。

    「や……やるからな、見てろよ……」

    %CALLNAME:人物_魔理沙%は覚悟を決めたように、脚を大きく開いた。

    震える指が秘部に触れ、%CALLNAME:人物_魔理沙%は小さく声を漏らす。

    「ん……あっ……こんなの、初めてだぜ……」

    %CALLNAME:人物_魔理沙%は誰かの前で自慰をする経験に戸惑っている。

    「……%CALLNAME:MASTER%だから、見せてやってるんだからな……」

    その言葉には、特別な感情が込められていた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%を見つめながら、自らを慰めている。

    指が秘部を弄り、愛液が指を濡らしていく。

    「……こういうの、お前にだけ見せるんだからな……」

    %CALLNAME:人物_魔理沙%は赤い顔のまま、必死に快感を堪えている。

    「……もう、どうにでもなれ……」

    %CALLNAME:人物_魔理沙%は観念したように、%CALLNAME:MASTER%の前で自慰に没頭し始めた。
