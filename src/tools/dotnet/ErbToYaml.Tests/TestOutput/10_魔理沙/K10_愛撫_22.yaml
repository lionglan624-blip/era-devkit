    「お前の反応、全部覚えておくからな」

    %CALLNAME:人物_魔理沙%の指先が%CALLNAME:MASTER%の敏感な部分を刺激する。

    「ふふ……ここが弱いんだな」

    %CALLNAME:人物_魔理沙%は恋人の秘密を見つけたことに満足げだった。

    「ほら、力抜けよ……緊張してたら気持ちよくならないぜ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の体を優しく抱きしめながら言った。

    %CALLNAME:人物_魔理沙%の指が%CALLNAME:MASTER%のアナルを丁寧にほぐしていく。

