- id: fallback
  content: >-
    「……これは……何かしら」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が差し出したオナホールを、興味深そうに観察した。

    「外の世界の道具ね……構造を調べたいわ」

    しかし%CALLNAME:MASTER%がその使い方を示すと、%CALLNAME:TARGET%の表情が変わった。

    「……これを……私が……使えと……？」

    %CALLNAME:TARGET%は困惑しながらも、知識欲には抗えないようだった。

    「……ふぅん……なるほどね……」

    %CALLNAME:TARGET%は冷静を装いながら、オナホールを動かしている。

    「……反応の変化を観察させてもらうわ……これは研究よ……」

    しかし%CALLNAME:TARGET%の頬は微かに紅潮している。

    「……むきゅ……見ないで……集中できないわ……」

    観察者を装いながらも、%CALLNAME:TARGET%は恥ずかしさを隠しきれなかった。

    「……興味深いデータね……」

    %CALLNAME:TARGET%はオナホールを動かしながら、%CALLNAME:MASTER%の反応を分析している。

    「……この刺激で……こんなに反応が変わるなんて……」

    しかし%CALLNAME:TARGET%自身も、何か感じているようだった。

    「……あなた……私で実験しているつもりかしら……」

    そう言いながらも、%CALLNAME:TARGET%は手を止めなかった。

    「……」

    %CALLNAME:TARGET%は無言でオナホールを動かしている。

    その瞳は%CALLNAME:MASTER%の反応を追い、真剣な光を宿していた。

    「……悪くないわ……こういう研究も……」

    %CALLNAME:TARGET%はぼそりと呟いた。

    「……でも……調子に乗らないで。これはあくまで実験よ」

    そう言いながらも、%CALLNAME:TARGET%の吐息は熱を帯びていた。
