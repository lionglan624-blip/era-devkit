- id: fallback
  content: >-
    「え……これを……？」

    %CALLNAME:人物_チルノ%は困惑した表情で%CALLNAME:MASTER%の一物を見つめた。

    「う、うーん……まあ、いいけど……」

    渋々といった様子で、%CALLNAME:人物_チルノ%は手を伸ばした。

    「ひゃっ！　なにこれ、すっごく熱い……」

    一物に触れた瞬間、%CALLNAME:人物_チルノ%は驚いて声を上げた。

    「……こ、こうすればいいの……？」

    戸惑いながらも、%CALLNAME:人物_チルノ%はゆっくりと手を動かし始めた。

    「ちょ、ちょっと%CALLNAME:MASTER%……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに%CALLNAME:MASTER%を見た。

    「いきなりこんなこと頼むなんて……信じらんない」

    文句を言いながらも、%CALLNAME:人物_チルノ%は一物を握った。

    「……まあ、あたいは最強だから、できないわけないけどさ」

    強がりを言いつつ、ぎこちなく手を動かし始めた。

    「……これで満足なんでしょ？」

    「んー……よくわかんないけど……」

    %CALLNAME:人物_チルノ%は首を傾げながら%CALLNAME:MASTER%の一物を見つめた。

    「こうやって触ればいいの？」

    好奇心半分、戸惑い半分といった様子で手を伸ばした。

    「わっ、なんか……ぴくってした……」

    %CALLNAME:人物_チルノ%は一物の反応に驚きながらも、興味深そうに触り続けている。

    「……へえ、こうすると気持ちいいんだ」

    「……はあ」

    %CALLNAME:人物_チルノ%はため息をつきながら、%CALLNAME:MASTER%の前にしゃがんだ。

    「あたいにこんなこと頼むなんて……%CALLNAME:MASTER%って変なの」

    そう言いながらも、%CALLNAME:人物_チルノ%は一物に手を伸ばした。

    「……まあ、やってあげないこともないけど」

    仕方なさそうに、%CALLNAME:人物_チルノ%はゆっくりと手を動かし始めた。
