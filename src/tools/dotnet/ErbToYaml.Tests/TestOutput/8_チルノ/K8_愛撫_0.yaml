    「……べ、別に嫌じゃないけどさ……恥ずかしいんだからね」

    %CALLNAME:人物_チルノ%はそっぽを向きながらも、%CALLNAME:MASTER%の手を払いのけなかった。

    「あっ……そこ、触ったら……」

    %CALLNAME:人物_チルノ%は小さく声を漏らした。

    いつもの威勢のいい態度はどこへやら、今は恥じらいに満ちている。

    「……%CALLNAME:MASTER%のばか……あたいをこんな気持ちにさせて……」

    文句を言いながらも、その声には嬉しさが滲んでいた。

    「……もう、好きにしなさいよね」

    観念したように、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に身を委ねた。

    「んっ……や、やめ……」

    %CALLNAME:人物_チルノ%は弱々しく抵抗した。

    だが、その手は%CALLNAME:MASTER%を押し返すほどの力はない。

    「こんなの……あたいらしくないのに……」

    %CALLNAME:人物_チルノ%は困惑した表情で%CALLNAME:MASTER%を見上げた。

    「……%CALLNAME:MASTER%のせいだからね、責任取りなさいよね」

    強がりながらも、%CALLNAME:人物_チルノ%の瞳は期待に揺れていた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%はじっと%CALLNAME:MASTER%を見つめた。

    「あたいのこと……どう思ってるの？」

    いつもの自信に満ちた態度はなく、不安げな表情が浮かんでいる。

    「……こういうことするってことは、好きってこと……だよね？」

    %CALLNAME:人物_チルノ%は確認するように、%CALLNAME:MASTER%の顔を覗き込んだ。
