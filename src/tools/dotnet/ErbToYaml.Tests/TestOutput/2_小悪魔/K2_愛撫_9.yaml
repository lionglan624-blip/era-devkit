character: 小悪魔
situation: K2_愛撫
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、私の乳首が気になりますの？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の視線に気付き、妖艶に微笑んだ。

    「悪魔の乳首……特別に味わわせてあげますわ……」

    %CALLNAME:人物_小悪魔%は胸元を晒し、%CALLNAME:MASTER%を誘うように体を寄せてくる。

    「んっ……あっ……そう……そこですわ……」

    %CALLNAME:MASTER%が乳首に吸い付くと、%CALLNAME:人物_小悪魔%は甘い吐息を漏らした。

    「……%CALLNAME:MASTER%の舌……いやらしくて……気持ちいい……ですわ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の前に立ち、ゆっくりと胸元を開いた。

    「いやらしい%CALLNAME:MASTER%……私の乳首……好きなんでしょう？」

    %CALLNAME:人物_小悪魔%は悪戯っぽく笑いながら、ぷっくりとした乳首を見せつけている。

    「あっ……んぅ……そんなに吸われると……」

    %CALLNAME:MASTER%が乳首を舐め上げると、%CALLNAME:人物_小悪魔%の体がぴくりと震えた。

    「やぁ……気持ちいい……もっと吸って……くださいな……」

    %CALLNAME:人物_小悪魔%は恍惚とした表情で%CALLNAME:MASTER%の頭を抱きしめた。

    「%CALLNAME:MASTER%……ここ、舐めてほしいんですの？」

    %CALLNAME:人物_小悪魔%は自らの乳首を指で弄びながら、%CALLNAME:MASTER%を見つめている。

    「悪魔の乳首……堪能してくださいな……」

    %CALLNAME:人物_小悪魔%は胸を差し出し、%CALLNAME:MASTER%の口元へ導いた。

    「んっ……あ……%CALLNAME:MASTER%の舌……あったかい……」

    %CALLNAME:MASTER%が乳首を吸い上げると、%CALLNAME:人物_小悪魔%は蕩けた声で啼いた。

    「……もっと……もっと強く……吸っていいですわよ……」

    「ふふ……%CALLNAME:MASTER%ったら、赤ちゃんみたいですわね」

    %CALLNAME:人物_小悪魔%はくすくすと笑いながら、%CALLNAME:MASTER%を胸に抱き寄せた。

    「いいですわよ……たっぷり甘えてくださいな」

    %CALLNAME:MASTER%が乳首に唇をつけると、%CALLNAME:人物_小悪魔%は目を細めた。

    「あ……んっ……そこ……敏感なの……」

    %CALLNAME:人物_小悪魔%は甘い吐息を漏らしながら、%CALLNAME:MASTER%の髪を撫でている。

    「悪魔の乳首……%CALLNAME:MASTER%に吸われて……幸せですわ……」
