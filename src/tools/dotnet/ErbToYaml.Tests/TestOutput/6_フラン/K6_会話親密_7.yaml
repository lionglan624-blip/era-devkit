    %CALLNAME:人物_フラン%は恥ずかしそうに、でも嬉しそうに呟いた。

    「んっ……あぁっ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の指の動きに翻弄されている。

    「そこ……そこ触られると……頭、真っ白になっちゃうのさ……」

