- id: fallback
  content: >-
    「――あら？　お茶……淹れてくれたんですか？」

    %CALLNAME:人物_美鈴%は少し戸惑いながらも、湯飲みを受け取った。

    「いただきます」

    そう言って、静かにお茶を口に含む。

    「……うん、美味しいです。ありがとうございます」

    %CALLNAME:人物_美鈴%は丁寧に礼を言った。

    「え、私に？　……ありがとうございます」

    %CALLNAME:人物_美鈴%は少し遠慮がちに湯飲みを手に取った。

    ずず、とお茶を啜る音が静かに響く。

    「……あったかい。門番の仕事中だと、こういうの嬉しいですね」

    %CALLNAME:人物_美鈴%は控えめに微笑んだ。

    「あ、これ……私にですか？」

    %CALLNAME:人物_美鈴%は少し驚いた様子で湯飲みを見つめた。

    「……すみません、お手間をおかけして」

    そう言いながらも、嬉しそうにお茶を受け取る。

    「……うん、いい香りですね」

    %CALLNAME:人物_美鈴%はゆっくりとお茶を楽しんだ。

    「わぁ……お茶ですか」

    %CALLNAME:人物_美鈴%は少し照れくさそうに湯飲みを受け取った。

    「門番やってると、こういう差し入れって嬉しいんですよね」

    そう言いながら、ふぅふぅと息を吹きかける。

    「……%CALLNAME:MASTER%さん、お気遣いありがとうございます」

    %CALLNAME:人物_美鈴%は丁寧にお辞儀をした。
  priority: 2
- id: fallback
  content: >-
    「――ん？　……お茶ですか」

    %CALLNAME:人物_美鈴%は少し警戒しながらも、湯飲みを受け取った。

    「……いただきます」

    そう言って、様子を窺うようにお茶を啜る。

    「……普通に美味しいですね。ありがとうございます」

    %CALLNAME:人物_美鈴%は事務的に礼を言った。

    「あ、どうも……」

    %CALLNAME:人物_美鈴%は湯飲みを受け取り、ゆっくりとお茶を飲んだ。

    「……門番の仕事中なので、これは助かります」

    %CALLNAME:人物_美鈴%は丁寧だが距離を感じる言葉でそう言った。

    「……私にですか？」

    %CALLNAME:人物_美鈴%は怪訝そうな顔で湯飲みを見つめた。

    「……まあ、いただきます」

    少し警戒しながらも、お茶を口に運ぶ。

    「……普通のお茶ですね。ありがとうございます」

    %CALLNAME:人物_美鈴%は事務的な口調で言った。

    「え……お茶？」

    %CALLNAME:人物_美鈴%は不思議そうに首を傾げた。

    「……何か用があるんですか？」

    そう言いながらも、差し出された湯飲みを受け取る。

    「……まあ、ありがとうございます」

    %CALLNAME:人物_美鈴%は距離を保ったまま、お茶を飲み始めた。
