- id: fallback
  content: >-
    「ふぇっ……！？　な、何するんですか……！」

    %CALLNAME:TARGET%は驚いて後ずさりした。

    「え、えっと……こ、これって……」

    %CALLNAME:MASTER%のものを見て、%CALLNAME:TARGET%は顔を真っ赤にしている。

    「……あたし、こんなの知らないです……」

    %CALLNAME:TARGET%は困惑した表情で%CALLNAME:MASTER%を見上げた。

    「……咲夜さんに怒られちゃいます……」

    助けを求めるように周囲を見回している。

    「あ、あの……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は戸惑った様子で立ち尽くしている。

    「こういうのは……その……」

    %CALLNAME:TARGET%は言葉を探しながら、困った顔をしている。

    「……あたし、どうすればいいか、わからないです……」

    妖精は混乱した様子で、%CALLNAME:MASTER%を見つめていた。

    「……もっと仲良くなってから、じゃダメですか……」

    おずおずと、%CALLNAME:TARGET%は提案した。

    「ひゃっ……！　ち、ちょっと……」

    %CALLNAME:TARGET%は慌てて目を逸らした。

    「いきなりそんなの見せられても……」

    %CALLNAME:TARGET%は顔を手で覆いながら、指の隙間からちらちらと見ている。

    「……えっと、あの……」

    どうしていいか分からず、%CALLNAME:TARGET%は固まっている。

    「……お仕事、しなきゃいけないので……」

    言い訳をしながら、%CALLNAME:TARGET%は逃げ出す機会を窺っていた。

    「……%CALLNAME:MASTER%……何がしたいの……？」

    %CALLNAME:TARGET%は困惑した表情で%CALLNAME:MASTER%を見ている。

    「あたし、そういうのよくわからないです……」

    妖精は首を傾げながら、%CALLNAME:MASTER%の真意を測りかねている。

    「……こういうのって、仲良しさんがすることじゃないんですか……？」

    %CALLNAME:TARGET%は不安そうに問いかけた。

    「……あたしたち、そこまで仲良くないです……よね……」

    警戒するように、%CALLNAME:TARGET%は距離を取ろうとしていた。
