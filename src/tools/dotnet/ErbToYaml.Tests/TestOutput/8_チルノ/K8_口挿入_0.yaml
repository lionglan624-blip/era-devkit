character: チルノ
situation: K8_口挿入
entries:
- id: fallback
  content: >-
    「ふふん、%CALLNAME:MASTER%のここ、あたいに任せなさい！」

    %CALLNAME:人物_チルノ%は自信満々に%CALLNAME:MASTER%の前にしゃがみ込んだ。

    小さな手で%CALLNAME:MASTER%の一物を握ると、ひんやりとした冷たさが伝わってくる。

    「んしょ……こうやって動かすんでしょ？　知ってるわよ！」

    %CALLNAME:人物_チルノ%は得意げに手を上下に動かし始めた。

    その動きはぎこちないが、一生懸命さが伝わってくる。

    「ほら、気持ちいいでしょ？　最強のあたいがしてあげてるんだから！」

    威勢よく言いながらも、%CALLNAME:人物_チルノ%の頬は少し赤い。

    「えへへ……%CALLNAME:MASTER%、あたいのこと好き？」

    %CALLNAME:人物_チルノ%は嬉しそうに聞きながら、%CALLNAME:MASTER%の一物に手を添えた。

    冷たい指先がそっと肌に触れると、その温度差が心地よい刺激となる。

    「あたいの手、冷たいでしょ？　でもね、%CALLNAME:MASTER%のここ、すっごく熱いの」

    %CALLNAME:人物_チルノ%は不思議そうに見つめながら、優しく握った。

    「……こうすると、もっと熱くなるね……」

    ゆっくりと手を動かしながら、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の反応を窺っている。

    「ほら、あたいが気持ちよくしてあげる！」

    %CALLNAME:人物_チルノ%は張り切って%CALLNAME:MASTER%の一物を両手で包んだ。

    氷の妖精らしいひんやりとした手のひらが、熱を帯びた肉棒を包み込む。

    「んー……上手くできてるかな？　ねえ、気持ちいい？」

    %CALLNAME:人物_チルノ%は確認するように%CALLNAME:MASTER%を見上げた。

    「あたいにかかれば、こんなの楽勝だからね！」

    そう言いながら、%CALLNAME:人物_チルノ%は一生懸命に手を動かし続けた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は珍しくおとなしく、%CALLNAME:MASTER%の前に座っている。

    小さな手が%CALLNAME:MASTER%の一物をそっと握ると、その冷たさが心地よい。

    「……こうやって触ってると、なんか落ち着くの」

    %CALLNAME:人物_チルノ%は恥ずかしそうに呟きながら、ゆっくりと手を動かした。

    「あたいも……%CALLNAME:MASTER%のこと、大好きだからね……」

    いつもの威勢のいい態度はなりを潜め、甘えたような声で囁いた。
  priority: 4
- id: talent_3_1
  content: >-
    「え……こ、これをしろって言うの？」

    %CALLNAME:人物_チルノ%は戸惑いながらも、%CALLNAME:MASTER%の一物を見つめた。

    「……わ、わかったわよ。やってあげる！」

    意を決したように、%CALLNAME:人物_チルノ%は小さな手を伸ばした。

    ひんやりとした指先が一物に触れると、%CALLNAME:人物_チルノ%の顔が赤くなる。

    「ひゃっ……熱い……。こ、こうすればいいの？」

    恐る恐る手を動かしながら、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の顔色を窺った。

    「あっ……そ、その……」

    %CALLNAME:人物_チルノ%は真っ赤な顔で%CALLNAME:MASTER%の一物を握っている。

    「べ、別にやりたくてやってるわけじゃないんだからね！」

    そう言いながらも、%CALLNAME:人物_チルノ%の手は止まらない。

    「……%CALLNAME:MASTER%が喜ぶなら……まあ、やってあげてもいいけど」

    照れ隠しにそっぽを向きながら、%CALLNAME:人物_チルノ%は手を動かし続けた。

    「……ちゃんと気持ちよくなってよね」

    「んっ……こ、こうかな……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに%CALLNAME:MASTER%の一物を扱いている。

    冷たい手が熱い肉棒を包み込み、ゆっくりと上下に動く。

    「あたいだって……こういうの、できないわけじゃないんだから」

    強がりを言いながらも、その動きはぎこちない。

    「……ど、どう？　気持ちいい……よね？」

    %CALLNAME:人物_チルノ%は不安げに%CALLNAME:MASTER%を見上げた。

    「……%CALLNAME:MASTER%のせいだからね」

    %CALLNAME:人物_チルノ%は困ったような顔で呟いた。

    「あたいがこんなことしてるのは……全部%CALLNAME:MASTER%のせいなんだから」

    文句を言いながらも、%CALLNAME:人物_チルノ%の手は優しく一物を撫でている。

    「……でも、%CALLNAME:MASTER%のためなら……やってあげる」

    %CALLNAME:人物_チルノ%は恥ずかしそうに俯きながら、手を動かし続けた。
