  content: >-
    「……こうするの？　私が%CALLNAME:MASTER%に入れる……？」

    %CALLNAME:人物_フラン%は首を傾げながら、言われた通りに体勢を整えた。

    こんなに密着する行為は、495年の人生で初めてのこと。

    「わっ……入った……%CALLNAME:MASTER%の中、変な感じ……」

    %CALLNAME:人物_フラン%は繋がった感覚に目を丸くした。

    「……でも……嫌じゃないのさ……不思議……」

    芽生えた感情に、%CALLNAME:人物_フラン%は戸惑いを隠せなかった。

    「%CALLNAME:MASTER%の中……温かいのさ……」

    %CALLNAME:人物_フラン%は不思議そうに相手の体温を感じていた。

    地下室では誰もこんな風に受け入れてくれなかった。

    「んっ……動くと……変な感じが……」

    %CALLNAME:人物_フラン%は初めての感覚に戸惑いながらも、腰を動かした。

    「……%CALLNAME:MASTER%といると……壊したくならないの……」

    その言葉は、%CALLNAME:人物_フラン%自身にとっても驚きだった。

    「……ねぇ、%CALLNAME:MASTER%……これって、どういう意味があるの……？」

    %CALLNAME:人物_フラン%は繋がりながら、純粋な疑問を投げかけた。

    行為の意味より、この近さの理由が知りたかった。

    「……こうしてると……胸がざわざわするのさ……」

    %CALLNAME:人物_フラン%は自分の感情を持て余していた。

    「……もう少し……このままでいい……？」

    離れたくないという気持ちが、どこからか湧いてきていた。

    「……%CALLNAME:MASTER%、私のこと……怖くないの……？」

    %CALLNAME:人物_フラン%は繋がりながら、不安げに問いかけた。

    自分の力で誰かを壊してしまうことへの恐怖は、常に付きまとう。

    「……そう……ありがとう……」

    %CALLNAME:人物_フラン%は小さく微笑んだ。

    「……%CALLNAME:MASTER%のこと、もっと知りたくなったのさ……」

    思慕の芽は、確かに育ち始めていた。
