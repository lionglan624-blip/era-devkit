entries:
- id: fallback
  content: >-
    「んっ……これでいいのか？」

    %CALLNAME:人物_魔理沙%はオナホールを%CALLNAME:MASTER%に押し当てながら、顔を赤くした。

    「恋人にこういうことさせるなんて……お前も変態だぜ」

    だがその手は止まらず、ゆっくりと動き続ける。

    「……気持ちいいなら、もっとしてやるからさ」

    %CALLNAME:人物_魔理沙%は照れながらも、%CALLNAME:MASTER%の反応を窺った。

    「ふぅん……こういうので気持ちよくなるんだな」

    %CALLNAME:人物_魔理沙%は興味深そうにオナホールを眺めた。

    「私がしてやるから、大人しくしてろよ」

    そう言いながら、%CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%を包み込むように動かした。

    「どうだ……？　中、気持ちいいか？」

    %CALLNAME:人物_魔理沙%は少し誇らしげに微笑んだ。

    「またこれか……お前、好きだよな、こういうの」

    %CALLNAME:人物_魔理沙%は苦笑しながらオナホールを手に取った。

    「まあ、恋人がやってほしいって言うなら、やってやるぜ」

    慣れた手つきで動かしながら、%CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の顔を覗き込む。

    「いい顔してるな……私に奉仕されて嬉しいか？」

    %CALLNAME:人物_魔理沙%はからかうように囁いた。

    「……ほら、力抜けよ」

    %CALLNAME:人物_魔理沙%は優しく%CALLNAME:MASTER%の体に寄り添った。

    「こうして二人でいる時間、私は好きだぜ……変な道具使ってても」

    オナホールが%CALLNAME:MASTER%を包み込み、ゆっくりと上下する。

    「お前の気持ちいい顔……見られるからな」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに、だが嬉しそうに笑った。
