character: チルノ
situation: K8_愛撫
entries:
- id: fallback
  content: >-
    「ほ、ほら……%CALLNAME:MASTER%の前でするんだからね……見ててよ……」

    チルノは%CALLNAME:MASTER%の目の前で、自らの秘部に指を這わせた。

    「あたいったら最強だから……こんなの恥ずかしくないんだから……」

    顔を真っ赤にしながらも、チルノは強がって見せている。

    「……%CALLNAME:MASTER%が見てると……なんか変な感じする……」

    チルノは指を動かしながら、甘い息を吐き始めた。

    「……あたいの恋人なんだから……全部見せてあげる……」

    「んっ……%CALLNAME:MASTER%……こういうの好きなの……？」

    チルノは指で秘部を弄りながら、%CALLNAME:MASTER%に問いかけた。

    恥ずかしそうに頬を染めながらも、その動きは止まらない。

    「あっ……%CALLNAME:MASTER%に見られながらだと……気持ちいい……」

    チルノの秘部から、淫靡な水音が響き始める。

    「……%CALLNAME:MASTER%のこと考えると……すぐこうなっちゃう……」

    チルノは照れくさそうに笑いながら、指の動きを速めた。

    「えへへ……%CALLNAME:MASTER%だけに見せてあげるね……」

    チルノは嬉しそうに微笑みながら、自らの花弁を指で開いた。

    「あたいのここ……%CALLNAME:MASTER%のものだから……」

    チルノは指を秘部に沈め、くちゅくちゅと弄り始めた。

    「んっ……やぁ……%CALLNAME:MASTER%……見てる……？」

    熱い息を吐きながら、チルノは%CALLNAME:MASTER%の反応を窺っている。

    「……もっと見てて……あたいが気持ちよくなるとこ……」

    「……%CALLNAME:MASTER%……あたい、恥ずかしいよ……」

    チルノは赤い顔で呟きながらも、%CALLNAME:MASTER%の前で自慰を続けている。

    指が秘部を掻き回す度に、甘い声が漏れる。

    「でも……%CALLNAME:MASTER%に見てもらえるの……嬉しい……」

    チルノは恥じらいながらも、嬉しそうに%CALLNAME:MASTER%を見つめた。

    「あたいのこと……好きって言って……そしたらもっと頑張れるから……」

    恋人に甘えるように、チルノは囁いた。
  priority: 4
- id: talent_3_1
  content: >-
    「え……じ、自分でするの……？　%CALLNAME:MASTER%の前で……？」

    チルノは戸惑いながらも、おずおずと自らの秘部に手を伸ばした。

    「こ、こんなの……恥ずかしいんだけど……」

    チルノは顔を赤くしながら、指を秘部に触れさせた。

    「……んっ……%CALLNAME:MASTER%が見てると思うと……変な感じ……」

    チルノは恥ずかしさと期待の入り混じった表情で、自慰を始めた。

    「%CALLNAME:MASTER%……こんなの見て楽しいの……？」

    チルノは弱々しく抗議しながらも、自らを弄り続けている。

    「あっ……んっ……やぁ……」

    声を押し殺そうとしても、甘い吐息が漏れてしまう。

    「……%CALLNAME:MASTER%の前だと……なんか落ち着かない……」

    チルノは恥ずかしさに耐えながら、%CALLNAME:MASTER%の視線を意識していた。

    「……本当にするの……？　%CALLNAME:MASTER%の目の前で……」

    チルノは躊躇いがちに、自らの秘部に触れた。

    「あたいこういうの……人前でしたことない……」

    しかし%CALLNAME:MASTER%の視線を感じると、体が熱くなってくる。

    「……んっ……%CALLNAME:MASTER%が見てるから……余計に感じる……」

    チルノは戸惑いながらも、指を動かし続けた。

    「やぁ……見ないでよ……恥ずかしい……」

    チルノは弱々しく言いながらも、自慰の手は止められない。

    「%CALLNAME:MASTER%……あんまりじっくり見ないで……」

    懇願するような目で、チルノは%CALLNAME:MASTER%を見上げた。

    「……でも……嫌じゃない……%CALLNAME:MASTER%なら……」

    チルノは本音を漏らしながら、快楽に身を委ねていった。
