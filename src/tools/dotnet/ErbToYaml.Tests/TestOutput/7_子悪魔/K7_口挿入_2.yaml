- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%、あたしのおっぱいで気持ちよくなってね？」

    %CALLNAME:TARGET%は嬉しそうに%CALLNAME:MASTER%の前に跪いた。

    小さな胸で%CALLNAME:MASTER%のものを挟み込み、上下に動かし始める。

    「んっ……こう？　あたしのおっぱい、柔らかい……？」

    %CALLNAME:TARGET%は一生懸命な顔で%CALLNAME:MASTER%を見上げている。

    「あたし、%CALLNAME:MASTER%のこと大好きだから……いっぱいしてあげるの」

    妖精の小さな胸が、懸命に%CALLNAME:MASTER%を包み込んでいく……

    「今日もあたしのおっぱいで、していい？」

    %CALLNAME:TARGET%は満面の笑みで%CALLNAME:MASTER%の股間に胸を近づけた。

    「むにゅ……んっ……挟まってる……」

    %CALLNAME:TARGET%は慣れた様子で%CALLNAME:MASTER%の一物を胸で擦り始めた。

    「ふふっ……%CALLNAME:MASTER%の、あたしのおっぱいの中で元気になってる……」

    嬉しそうに%CALLNAME:TARGET%は胸を揺らしている。

    「えへへ、いっぱい気持ちよくなってね……？」

    「%CALLNAME:MASTER%……あたし、もっと上手にしたいの……」

    %CALLNAME:TARGET%は真剣な表情で%CALLNAME:MASTER%の一物を胸で挟んだ。

    「だから……いっぱい練習させてね？」

    小さな胸が%CALLNAME:MASTER%のものを包み込み、ゆっくりと上下する。

    「んしょ……こう動かすと、気持ちいいって……」

    %CALLNAME:TARGET%は胸を押し付けながら、期待に満ちた目で見上げた。

    「……ね、あたし、ちゃんとできてる……？」

    「あ……%CALLNAME:MASTER%の、元気いっぱいだね……えへへ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の一物を愛おしそうに見つめた。

    「あたしのおっぱいで挟むと、もっと元気になるかな……？」

    %CALLNAME:TARGET%は嬉しそうに%CALLNAME:MASTER%の一物を胸で包んだ。

    「ふふっ……ぴくってした……かわいい」

    %CALLNAME:TARGET%はくすくす笑いながら、優しく胸を動かしている。

    「%CALLNAME:MASTER%……大好き。あたしのおっぱいでいっぱい出していいよ……？」
