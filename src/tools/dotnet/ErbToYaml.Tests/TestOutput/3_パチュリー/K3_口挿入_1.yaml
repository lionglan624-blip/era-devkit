- id: talent_3_1
  content: >-
    「っ……こ、口で……するの……？」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%の一物を見た。

    「……本では読んだことがあるけれど……実際にするのは……」

    %CALLNAME:TARGET%は顔を赤くしながら、おずおずと口を近づけた。

    「……む、むきゅ……あ、あーん……」

    知識と実体験の差異に戸惑いながらも、%CALLNAME:TARGET%は一物を咥えた。

    「……ん……こ、こうすればいいの……？」

    %CALLNAME:TARGET%はぎこちなく舌を動かしている。

    「……ちゅ、れろ……文献には、こうすると気持ち良いと……」

    %CALLNAME:TARGET%は知識を頼りに、舌の動きを工夫していた。

    「……ど、どう……？　変じゃない……？」

    不安そうに%CALLNAME:MASTER%の顔を覗き込んだ。

    「……んっ……こんなこと……恥ずかしいわ……」

    %CALLNAME:TARGET%は羞恥に顔を染めながら、奉仕を続けている。

    「……ちゅる、む……あなたのためなら……」

    %CALLNAME:TARGET%は正直に認めた。

    「……で、でも……見ないでほしいの……」

    恥ずかしさを堪えながらも、%CALLNAME:TARGET%は舌を動かし続けた。

    「……%CALLNAME:MASTER%……顔、見ないで……」

    %CALLNAME:TARGET%は視線を避けながら、一物を舐めていた。

    「……こんな姿……恥ずかしいのよ……」

    しかし、舌は止めようとしない。

    「……れろ、ん……あなたを……気持ち良くしたいから……」

    小さな声で本音を漏らしながら、%CALLNAME:TARGET%は奉仕を続けた。
