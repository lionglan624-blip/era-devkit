character: 大妖精
situation: K9_会話親密
entries:
- id: fallback
  content: >-
    「――わぁ、%CALLNAME:MASTER%がお茶を淹れてくれたの？」

    %CALLNAME:TARGET%は嬉しそうに両手で湯飲みを受け取った。

    ふう、と小さく息を吹きかけてから、そっと口をつける。

    「……ん、あったかい……おいしいの」

    %CALLNAME:TARGET%は幸せそうに目を細めた。

    「ねえ、%CALLNAME:MASTER%……また淹れてくれる？」

    チルノちゃんにも教えてあげたいな、と%CALLNAME:TARGET%は恋人に寄り添いながら呟いた。

    「――あ、お茶？　%CALLNAME:MASTER%、ありがとう」

    %CALLNAME:TARGET%は控えめに微笑みながら湯飲みを受け取った。

    ふーふー、と一生懸命冷ましてから、小さく口をつける。

    「……ふふ、%CALLNAME:MASTER%のお茶、あったかくて落ち着くの」

    %CALLNAME:TARGET%は穏やかな表情でお茶を楽しんでいる。

    「……こうしていると、とっても幸せだなって思うの」

    そう言って、%CALLNAME:TARGET%は恋人の隣でそっと肩を寄せた。

    「――えへへ……%CALLNAME:MASTER%のお茶、大好きなの」

    %CALLNAME:TARGET%は湯飲みを両手で包み込むようにして持っている。

    湯気がふわりと立ち上り、%CALLNAME:TARGET%の頬をほんのり染める。

    「……ね、今度わたしも淹れてあげるね」

    「%CALLNAME:MASTER%の分、ちゃんと練習しておくから……」

    %CALLNAME:TARGET%は恥ずかしそうに、でも嬉しそうに笑った。

    「――%CALLNAME:MASTER%、お茶……」

    %CALLNAME:TARGET%は湯飲みを受け取ると、そっと香りを楽しんでいる。

    「……いい香り。%CALLNAME:MASTER%、上手になったね」

    ずず、と静かにお茶を啜る%CALLNAME:TARGET%。

    「……ふふ、あったかいの。心まであったかくなるね」

    %CALLNAME:TARGET%は穏やかに微笑みながら、恋人と過ごす時間を噛み締めていた。
  priority: 4
- id: talent_3_1
  content: >-
    「――え、お茶を……わたしに？」

    %CALLNAME:TARGET%は少し驚いたように湯飲みを受け取った。

    ふう、と息を吹きかけてから、おずおずと口をつける。

    「……あ、おいしい……%CALLNAME:MASTER%、上手なんだね」

    %CALLNAME:TARGET%は頬を少し染めながら微笑んだ。

    「……また、淹れてくれると嬉しいな……」

    照れくさそうに俯きながら、%CALLNAME:TARGET%はそう言った。

    「――あ、%CALLNAME:MASTER%……お茶、ありがとう」

    %CALLNAME:TARGET%は嬉しそうに湯飲みを両手で包んだ。

    ちょっとだけ冷ましてから、静かにお茶を啜る。

    「……ん、あったかい……なんだか、ほっとするの」

    「チルノちゃんは熱いの苦手だけど、わたしは好きなんだ」

    %CALLNAME:TARGET%は嬉しそうに笑いながら、お茶を楽しんでいる。

    「――わ、わたしにお茶……？」

    %CALLNAME:TARGET%は驚いたように目を丸くしている。

    「あ、ありがとう……%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は湯飲みをそっと受け取り、小さく口をつけた。

    「……おいしい……」

    %CALLNAME:TARGET%は照れくさそうに俯きながら、嬉しそうにお茶を飲んでいる。

    「――あ……お茶、淹れてくれたの……？」

    %CALLNAME:TARGET%は少し戸惑いながらも、湯飲みを両手で受け取った。

    ふーふー、と息を吹きかけてから、ゆっくりと啜る。

    「……ん……あったかい……」

    %CALLNAME:TARGET%の表情が、ほんのりと緩んでいく。

    「……%CALLNAME:MASTER%、ありがとね……」

    小さな声でそう呟いて、%CALLNAME:TARGET%は幸せそうに微笑んだ。
