    「えっ……手を……？」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の手を取った。

    %CALLNAME:人物_小悪魔%は戸惑いながらも、その手を握り返している。

    「あの……こういうの、ちょっと恥ずかしいんですけど……」

    %CALLNAME:人物_小悪魔%は顔を赤くしながら、俯いてしまった。

    「……でも、嫌じゃない……です……パチュリー様には内緒ですわよ？」

    「あっ……髪、触ってます……？」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の髪に触れている。

    「……えっと、急にされると、ちょっとびっくりして……」

    %CALLNAME:人物_小悪魔%は困惑しながらも、されるがままになっている。

    「……まあ、%CALLNAME:MASTER%だから……いい、ですけど……」

    控えめに、%CALLNAME:人物_小悪魔%はそう言った。

    「……え、頭、撫でるんです……？」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の頭をそっと撫でた。

    「……子供じゃないんですけど……」

    そう言いながらも、%CALLNAME:人物_小悪魔%は逃げようとしない。

    「……まあ、悪くは……ないですわね……」

    照れくさそうに視線を逸らしながら、%CALLNAME:人物_小悪魔%は小さく呟いた。

    「わ……%CALLNAME:MASTER%、近いですわ……」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の顔を覗き込むように近づいた。

    「あの……そんなに見つめられると……」

    %CALLNAME:人物_小悪魔%は頬を染めて、僅かに身を引いている。

    「……べ、別に意識してるわけじゃないですけど……」

    視線を泳がせながら、%CALLNAME:人物_小悪魔%はぎこちなく笑った。
