- id: fallback
  content: >-
    「んっ……そこ、弱いって知ってるくせに……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%に乳首を弄られ、甘い声を漏らしている。

    「あっ……つまんだり、引っ張ったり……意地悪だぜ、お前……」

    %CALLNAME:MASTER%の指が乳首をくりくりと転がすたびに、%CALLNAME:人物_魔理沙%の体が震える。

    「……でも、嫌いじゃないんだよな……お前にされるの」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに、でも嬉しそうに恋人に身を任せた。

    「ひゃっ……！　ちょ、いきなりそこは……」

    %CALLNAME:MASTER%は%CALLNAME:人物_魔理沙%の乳首を指先で弾いた。

    「あぁっ……も、もうちょっと優しくしろよ……」

    抗議しながらも、%CALLNAME:人物_魔理沙%の乳首はすでに硬く尖っている。

    「……ったく、私の体、お前に全部知られてるな」

    %CALLNAME:人物_魔理沙%は照れ隠しに文句を言いながら、恋人の愛撫を受け入れた。

    「んぅ……そこ、敏感になってきたぜ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%に胸を弄られながら、熱い息を吐いている。

    %CALLNAME:MASTER%が乳首を指の腹で押し潰すと、

    「やぁっ……そんな強くされると……っ」

    %CALLNAME:人物_魔理沙%は快感に耐えかねて、%CALLNAME:MASTER%の肩にしがみついた。

    「……%CALLNAME:MASTER%の手、熱いぜ……」

    「……ん……」

    %CALLNAME:人物_魔理沙%は静かに%CALLNAME:MASTER%の愛撫を受けている。

    乳首を優しく撫でられるたびに、甘い痺れが全身に広がっていく。

    「……こういうの、落ち着くぜ……」

    %CALLNAME:人物_魔理沙%は目を細めて、恋人の温もりを感じていた。

    「……もっと、していいんだぜ？」

    珍しく素直に、%CALLNAME:人物_魔理沙%は続きをねだった。
