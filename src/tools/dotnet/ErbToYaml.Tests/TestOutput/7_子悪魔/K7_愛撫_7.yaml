- id: talent_3_1
  content: >-
    「ひゃっ……む、乳首……触ってる……」

    %CALLNAME:TARGET%は驚いて肩を跳ねさせたが、逃げようとはしなかった。

    頬を真っ赤に染めながら、%CALLNAME:MASTER%の指を感じている。

    「……そこ、敏感で……んっ……」

    %CALLNAME:TARGET%は小さく声を漏らし、恥ずかしそうに俯いた。

    「……恥ずかしいけど……%CALLNAME:MASTER%になら、いいよ……」

    妖精は上目遣いに%CALLNAME:MASTER%を見つめながら、身を任せた。

    「あっ……や、やぁ……そこ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に乳首を責められて、体を震わせている。

    指で摘ままれるたびに、甘い痺れが走る。

    「……乳首ばっかり……いじわるなの……」

    %CALLNAME:TARGET%は困った顔をしながらも、%CALLNAME:MASTER%から目を離せない。

    「……でも、嫌じゃない……%CALLNAME:MASTER%だから……」

    妖精は照れながらも、正直に気持ちを伝えた。

    「んっ……あ……そこ、弱いの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指が乳首を弾くたびに、びくりと反応している。

    慌てて口を押さえるが、声が漏れてしまう。

    「……は、恥ずかしい……変な声、出ちゃった……」

    %CALLNAME:TARGET%は真っ赤な顔で%CALLNAME:MASTER%を見上げた。

    「……笑わないでね……？　あたし、こういうの慣れてないから……」

    妖精は不安げに、でもどこか期待を込めて%CALLNAME:MASTER%を見つめていた。

    「……%CALLNAME:MASTER%……乳首、いじめるの好きなの……？」

    %CALLNAME:TARGET%は恥ずかしそうに問いかけながら、されるがままになっている。

    小さな乳首が%CALLNAME:MASTER%の指に弄ばれて、硬く尖っていく。

    「……あたしの胸、小さいのに……」

    %CALLNAME:TARGET%は複雑な表情を浮かべている。

    「……でも、%CALLNAME:MASTER%が気に入ってくれるなら……嬉しいの……」

    妖精は照れくさそうに、小さく微笑んだ。
