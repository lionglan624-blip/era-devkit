- id: fallback
  content: >-
    「……これが、騎乗位……女性上位の体位……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨りながら、興味深そうな目をしている。

    「……本で読んだ通り、自分でペースを調整できるのね……」

    %CALLNAME:TARGET%は冷静を保とうとしているが、頬が上気している。

    「……んっ……沈めると、この深さ……むきゅ……」

    分析しようとする言葉が、途切れ途切れになっている。

    「んっ……ふぅ……」

    %CALLNAME:TARGET%は自分のペースで動きながら、%CALLNAME:MASTER%を観察している。

    「……興味深いわ。この体位だと、相手の反応がよく見えるのね……」

    %CALLNAME:TARGET%は淡々と言おうとしたが、息が上がっている。

    「……なぜ、こんなに体力を消耗するのかしら……」

    自分の体力の限界に、%CALLNAME:TARGET%自身が戸惑っている。

    「あ……そこ……っ」

    %CALLNAME:TARGET%は自分で角度を変えた瞬間、思わず声を漏らした。

    「……不覚だわ。自分で動いているのに声が出るなんて……」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らした。

    「……%CALLNAME:MASTER%、今のは研究のための反応よ……」

    そう言いながらも、同じ角度で動きを続けている。

    「……」

    %CALLNAME:TARGET%は黙って%CALLNAME:MASTER%の上で動いている。

    研究者として、自分が主導権を握る体験も記録しておくべきだ。

    「……%CALLNAME:MASTER%、質問があるわ」

    %CALLNAME:TARGET%は息を整えながら、%CALLNAME:MASTER%を見下ろした。

    「……騎乗位について、どう思う？ 私の動きは適切かしら」
  priority: 2
- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情のまま、%CALLNAME:MASTER%の上に跨っている。

    「……この体位なら、押し潰されなくて済むわ」

    %CALLNAME:TARGET%は淡々と言い放った。

    「……ただし、体力がないから、あまり期待しないで」

    それだけを告げ、%CALLNAME:TARGET%はゆっくりと腰を動かし始めた。

    「……ふぅ……むきゅ……」

    %CALLNAME:TARGET%は溜息をつきながら、形式的に動いている。

    「……疲れるわね。やはり、私には向いていない体位だわ」

    %CALLNAME:TARGET%は事実を述べるように言った。

    「……早く終わらせて。読みかけの本があるの」

    投げやりな態度で、%CALLNAME:TARGET%は最低限の動きを続けた。

    「……むきゅ……体力が……」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「……もう動けないわ。後は自分でして」

    %CALLNAME:TARGET%は体の弱さを訴えた。

    「……こういう主導的な体位は、私には無理なのよ」

    冷たい口調で、%CALLNAME:TARGET%は動きを止めた。

    「……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に座ったまま、動こうとしない。

    頭の中では、次に読む本のことを考えているようだ。

    「……終わったら、すぐに大図書館から出て行って」

    %CALLNAME:TARGET%は冷淡に言った。

    「……私は本に戻るから」
  priority: 1
