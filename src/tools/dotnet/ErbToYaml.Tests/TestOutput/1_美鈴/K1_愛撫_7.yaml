    「やぁ……開いちゃ……ダメ……」

    %CALLNAME:人物_美鈴%は秘部を広げられ、悲鳴に近い声を上げた。

    しかしその体は抵抗を忘れ、%CALLNAME:MASTER%に全てを晒している。

    「……こんなの、初めて……誰かに見られるの……」

    %CALLNAME:人物_美鈴%は涙目になりながらも、%CALLNAME:MASTER%を拒絶しなかった。

    「……%CALLNAME:MASTER%だから……見せてるんだからね……」

    %CALLNAME:人物_美鈴%は恥ずかしさの中に、期待を滲ませていた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に秘部を開かれながら、じっと見つめた。

    その瞳には、戸惑いと期待と恥ずかしさが入り混じっている。

    「……こういうの、好きなの……？　私の……見るの……」

    恥ずかしそうに問いかける%CALLNAME:人物_美鈴%。

    「……%CALLNAME:MASTER%のこと、もっと知りたいな……」

    %CALLNAME:人物_美鈴%は赤い顔のまま、%CALLNAME:MASTER%に身を委ねていた。
