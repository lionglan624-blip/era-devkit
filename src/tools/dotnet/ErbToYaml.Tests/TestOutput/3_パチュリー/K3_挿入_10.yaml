- id: fallback
  content: >-
    「……二人同時に……ですか……」

    %CALLNAME:TARGET%は困惑した表情で二人を見た。

    前と後ろを同時に貫かれる体勢に、体が強張る。

    「……興味深いとは思うけれど……」

    %CALLNAME:TARGET%は戸惑いながら呟いた。

    「……体が弱い私には、少し荷が重いわ……」

    複雑な感情を抱えながらも、身を委ねた。

    「あ……っ……むきゅ……」

    %CALLNAME:TARGET%は思わず声を漏らし、口を押さえた。

    「……すみません……変な声……」

    二穴を同時に責められる刺激に、体が反応してしまう。

    「……本には、こういう反応が出ると……書いてあった……」

    知識で理解していても、体験は別物だった。

    「……二人に……挟まれて……」

    %CALLNAME:TARGET%は複雑な表情を浮かべた。

    「……こんな体勢……研究資料では見たことがあるけれど……」

    %CALLNAME:TARGET%は小さく息を吐いた。

    「……実際に体験すると……理性が……保てない……」

    学者としての冷静さが、徐々に崩れていった。

    「……」

    %CALLNAME:TARGET%は黙って二人に体を預けていた。

    「……前と後ろ……同時に……」

    %CALLNAME:TARGET%は小さく呟いた。

    「……これが……%CALLNAME:MASTER%のお望みなのね……」

    「……研究のため……と思えば……耐えられる……かも……」

    自分を納得させるように、%CALLNAME:TARGET%は呟いた。
  priority: 2
- id: fallback
  content: >-
    「……二穴同時に、お使いになるのですか」

    %CALLNAME:TARGET%は淡々とした口調で言った。

    前と後ろを同時に貫かれる体勢に、眉を顰める。

    「……体が弱い私に、そんなことを……」

    %CALLNAME:TARGET%は不満そうに呟いた。

    「……まあ、好きにしなさい。早く終わらせて」

    冷淡な態度で、%CALLNAME:TARGET%は身を任せた。

    「……むきゅ……」

    %CALLNAME:TARGET%は声を押し殺しながら、二人の動きに応じていた。

    「……前と後ろ……同時に……ですか」

    %CALLNAME:TARGET%は機械的に言った。

    「……体力が持たないわ……」

    その声には、疲労と不快感が滲んでいた。

    「……」

    %CALLNAME:TARGET%は無言で二人に体を委ねていた。

    「……二人に同時に使われるとは……」

    %CALLNAME:TARGET%は静かに言った。

    「……随分と、お楽しみのようね」

    「……私は道具か何かのつもりかしら」

    冷たい口調の奥に、怒りが透けて見えた。

    「……わかりました」

    %CALLNAME:TARGET%は小さく頷いた。

    「……二穴を同時に……お使いください」

    %CALLNAME:TARGET%は事務的に告げた。

    「……終わったら、すぐに出て行って」

    「……私は本を読みたいの」

    投げやりな態度で、%CALLNAME:TARGET%は目を閉じた。
  priority: 1
