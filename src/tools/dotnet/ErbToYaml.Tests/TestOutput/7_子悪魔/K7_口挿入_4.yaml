entries:
- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%、あたしの体で洗ってあげるね？」

    %CALLNAME:TARGET%は嬉しそうに石鹸を泡立て始めた。

    小さな体に泡を塗りたくり、%CALLNAME:MASTER%に密着してくる。

    「んっ……ぬるぬる……気持ちいいでしょ？」

    %CALLNAME:TARGET%は一生懸命に体を擦り付けながら、%CALLNAME:MASTER%を見上げた。

    「あたし、%CALLNAME:MASTER%のこと大好きだから……いっぱいきれいにしてあげるの」

    妖精の小さな体が、懸命に%CALLNAME:MASTER%を洗い上げていく……

    「今日もあたしの体で、洗っていい？」

    %CALLNAME:TARGET%は満面の笑みで%CALLNAME:MASTER%の体に抱きついた。

    「むにゅ……んっ……ぬるぬるして、あたしも気持ちいい……」

    %CALLNAME:TARGET%は慣れた様子で体を擦り付け始めた。

    「ふふっ……%CALLNAME:MASTER%の、ここも元気になってる……」

    嬉しそうに%CALLNAME:TARGET%は下半身も丁寧に洗っている。

    「えへへ、いっぱいきれいにしてあげるね……？」

    「%CALLNAME:MASTER%……あたし、もっと上手に洗いたいの……」

    %CALLNAME:TARGET%は真剣な表情で泡を体中に広げた。

    「だから……いっぱい練習させてね？」

    小さな体が%CALLNAME:MASTER%に密着し、ゆっくりと擦り付けられる。

    「んしょ……こう動かすと、気持ちいいって……」

    %CALLNAME:TARGET%は胸や陰部を押し付けながら、期待に満ちた目で見上げた。

    「……ね、あたし、ちゃんとできてる……？」

    「あ……%CALLNAME:MASTER%、汚れちゃったんだ……えへへ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の体を愛おしそうに見つめた。

    「あたしの体できれいにすると、%CALLNAME:MASTER%喜ぶかな……？」

    %CALLNAME:TARGET%は嬉しそうに泡まみれの体で%CALLNAME:MASTER%に抱きついた。

    「ふふっ……ぬるぬるして、気持ちいいね……」

    %CALLNAME:TARGET%はくすくす笑いながら、優しく体を擦り付けている。

    「%CALLNAME:MASTER%……大好き。ずっとあたしで洗わせてね……」
  priority: 4
- id: talent_3_1
  content: >-
    「え、えっと……あ、あたしの体で……洗うの……？」

    %CALLNAME:TARGET%は真っ赤になりながら、おずおずと泡を体に塗り始めた。

    「こ、こうすればいいの……？」

    %CALLNAME:TARGET%は困惑しながらも、%CALLNAME:MASTER%の体に密着した。

    「んっ……ぬるぬるして……恥ずかしい……」

    小さな体で精一杯%CALLNAME:MASTER%を洗おうとしている。

    「……%CALLNAME:MASTER%、気持ちいい……ですか……？」

    「あの……%CALLNAME:MASTER%のために……体で、洗います……」

    %CALLNAME:TARGET%は緊張した面持ちで石鹸を泡立てた。

    「むにゅ……こういうの、初めてだから……」

    ぎこちない動きで、%CALLNAME:TARGET%は懸命に体を擦り付けている。

    「んしょ……こう……？」

    一生懸命な%CALLNAME:TARGET%の姿は、どこか健気だった。

    「……きれいになって、くれたら……嬉しいな……」

    「は、恥ずかしいよぅ……でも……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、泡まみれの体で%CALLNAME:MASTER%に密着した。

    「%CALLNAME:MASTER%が気持ちよくなるなら……あたし、頑張る……」

    小さな体が%CALLNAME:MASTER%に擦り付けられ、ゆっくりと動く。

    「……んっ……あたしもぬるぬるして……変な感じ……」

    %CALLNAME:TARGET%は自分の体の感触に驚きながらも、動きを止めなかった。

    「……%CALLNAME:MASTER%……あたしのこと、好き……？」

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は上目遣いに%CALLNAME:MASTER%を見つめた。

    「あたし……%CALLNAME:MASTER%のこと、好きだから……」

    恥ずかしそうに俯きながら、%CALLNAME:TARGET%は泡まみれの体を押し付けた。

    「だから……あたしの体で、洗わせて……ね……？」

    小さな体がたどたどしく動き、%CALLNAME:MASTER%を洗おうと頑張っている。

    %CALLNAME:TARGET%は真剣な表情で、%CALLNAME:MASTER%の反応を見守っていた。
