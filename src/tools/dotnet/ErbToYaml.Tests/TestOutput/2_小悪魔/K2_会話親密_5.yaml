    少し頬を染めながらも、%CALLNAME:人物_小悪魔%は距離を取っている。

    「もう少し……親しくなってからにしていただけます？」

    困惑と警戒を混ぜた表情で、%CALLNAME:人物_小悪魔%はそう言った。

    「……は？」

    %CALLNAME:人物_小悪魔%は突然の行為に目を丸くした。

    「あの……何を……考えていらっしゃるんですの？」

    戸惑いを隠せない様子で、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%を見ている。

    「いくら私が悪魔でも……いきなりは困りますわ」

    %CALLNAME:人物_小悪魔%は複雑な表情を浮かべた。

    「んっ……！　ちょ、ちょっと……」

    %CALLNAME:人物_小悪魔%は不意打ちに声を上げた。

    「何をなさっているんですか……」

