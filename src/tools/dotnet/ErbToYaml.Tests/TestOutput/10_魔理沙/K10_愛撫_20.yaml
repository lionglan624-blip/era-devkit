    %CALLNAME:MASTER%がキャップを装着し電源を入れると、%CALLNAME:人物_魔理沙%は声を上げた。

    「ひゃあっ！？　震えてっ……こんなの……んんっ……知らないぜ……」

    %CALLNAME:人物_魔理沙%は予想外の刺激に体を震わせた。

    「それ、外来の道具か？　見たことないぜ……」

    %CALLNAME:人物_魔理沙%は好奇心と不安が入り混じった目でローターを見た。

    「……乳首に挟む？　痛くないのか、それ……」

