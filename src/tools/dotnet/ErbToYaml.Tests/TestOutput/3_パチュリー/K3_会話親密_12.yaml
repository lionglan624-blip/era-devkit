- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%の指が%CALLNAME:人物_パチュリー%の敏感な場所に触れた。

    「ひゃっ……な、何を……」

    %CALLNAME:人物_パチュリー%は驚きながらも、%CALLNAME:MASTER%の手を払いのけようとはしなかった。

    「んっ……そ、そこは……あ……」

    %CALLNAME:人物_パチュリー%は顔を赤くして、抵抗を諦めたように目を伏せた。

    「……本で読んだのとは……違うわ……」

    戸惑いながらも、%CALLNAME:人物_パチュリー%の体は正直に反応していた。

    「あっ……やっ……%CALLNAME:MASTER%……」

    %CALLNAME:MASTER%の愛撫に、%CALLNAME:人物_パチュリー%は切なげな声を上げた。

    「そんなところ……触らないで……」

    しかし%CALLNAME:人物_パチュリー%の言葉とは裏腹に、その体は快感に震えている。

    「んっ……はぁ……ど、どうして、こんな……」

    %CALLNAME:人物_パチュリー%は自分の体の反応に戸惑いながらも、%CALLNAME:MASTER%から離れようとはしなかった。

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%の秘所を愛撫し始めると、

    「むきゅっ……あ、あなた、いきなり……」

    %CALLNAME:人物_パチュリー%は本を取り落とし、%CALLNAME:MASTER%にしがみついた。

    「んっ……はぁ……こういうの、本では……調べてなかったわ……」

    %CALLNAME:人物_パチュリー%は紅潮した顔で、%CALLNAME:MASTER%を見上げた。

    「……もう少しだけ……研究させて……」

    「んっ……あっ……%CALLNAME:MASTER%、そこ……」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の愛撫に、声を殺しながら耐えている。

    「はぁ……あ……体が、熱い……」

    %CALLNAME:人物_パチュリー%は目を潤ませ、%CALLNAME:MASTER%の服をぎゅっと握りしめた。

    「こんな感覚……知らなかった……」

    %CALLNAME:人物_パチュリー%は照れ隠しのように視線を逸らしながらも、その体は%CALLNAME:MASTER%に寄り添っていた。
