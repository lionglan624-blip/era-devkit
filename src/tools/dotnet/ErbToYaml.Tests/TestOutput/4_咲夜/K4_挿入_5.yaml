character: 咲夜
situation: K4_挿入
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……今日は私が……動きますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上にまたがり、ゆっくりと腰を沈めた。

    「んっ……あ……奥まで……入って……」

    瀟洒なメイドは、恋人の上で甘い吐息を漏らした。

    「こうして……貴方を感じながら動くのは……特別な気分ですわ……」

    %CALLNAME:TARGET%は腰をゆっくりと上下させ始めた。

    「……私の全てで……貴方をお慰めいたしますわ……」

    「ふぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に手を置き、腰を揺らしている。

    「上から見る貴方のお顔……とても素敵ですわ……」

    「あ……んっ……こうすると……深い……」

    %CALLNAME:TARGET%は自分のペースで%CALLNAME:MASTER%を深く受け入れていく。

    「時を止めて……ずっとこうしていたいですわ……」

    「貴方と繋がったまま……永遠に……」

    「……んぅ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は髪を揺らしながら、リズミカルに腰を動かしていた。

    「メイドとして奉仕するのは当然……ですけれど……」

    「こうして……愛する人のために動くのは……格別ですわ……」

    %CALLNAME:TARGET%が腰を落とすたび、甘い声が漏れる。

    「あっ……そこ……気持ちいい……」

    「もっと……貴方を満たしたいですわ……」

    「……あ……%CALLNAME:MASTER%……見ていてくださいまし……」

    %CALLNAME:TARGET%は恋人に見つめられながら、自ら腰を振っていた。

    「こんな……はしたない姿……貴方にしか見せられませんわ……」

    「ん……あぁ……奥に……当たって……」

    %CALLNAME:TARGET%は快感に蕩けながらも、動きを止めない。

    「%CALLNAME:MASTER%……好き……ですわ……」

    完璧なメイドは、恋人の上で女として乱れていた。
