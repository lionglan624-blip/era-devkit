    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に抱かれながら、蕩けた表情を浮かべている。

    %CALLNAME:MASTER%が腰を動かすたびに、%CALLNAME:人物_小悪魔%は嬌声を上げた。

