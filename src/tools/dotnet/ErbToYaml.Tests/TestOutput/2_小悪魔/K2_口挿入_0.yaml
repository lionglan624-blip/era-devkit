character: 小悪魔
situation: K2_口挿入
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……ふふっ、口でしてほしいんですの？」

    %CALLNAME:人物_小悪魔%は悪戯っぽく笑いながら、%CALLNAME:MASTER%の前に跪いた。

    そっと一物に顔を寄せると、熱い吐息を吹きかける。

    「悪魔の舌……味わってくださいませ……んっ……」

    %CALLNAME:人物_小悪魔%は愛おしそうに亀頭に唇を寄せ、舌先でゆっくりと舐め上げた。

    「ちゅ……れろ……ふふ、%CALLNAME:MASTER%の味……大好きですわ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の一物を口に含んだ。

    「んむ……ちゅる……じゅる……」

    温かい口腔と悪魔の舌が、一物に絡みつく。

    「はむ……ん……%CALLNAME:MASTER%の、どんどん硬くなってきますわ……」

    %CALLNAME:人物_小悪魔%は上目遣いで%CALLNAME:MASTER%を見つめながら、頭を前後に動かした。

    「んっ……れろ……もっと……気持ちよくしてあげますわね……」

    「ねえ、%CALLNAME:MASTER%……私の舌、上手になりました？」

    %CALLNAME:人物_小悪魔%は一物を頬張りながら、嬉しそうに目を細めている。

    亀頭を唇で包み込み、舌先で鈴口を刺激する。

    「んちゅ……ぴちゃ……ふふ、ここ弱いんですよね……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の弱点を熟知しているかのように、的確に責めていく。

    「悪魔に奉仕されるって……どんな気分ですの……？　んむ……」

    %CALLNAME:人物_小悪魔%は蕩けるような笑みを浮かべ、一物に舌を這わせた。

    「%CALLNAME:MASTER%……私、あなたのこと……本当に好き……」

    ねっとりと舌を絡ませながら、%CALLNAME:人物_小悪魔%は愛を囁く。

    「だから……こうやって奉仕できるのが……幸せですわ……」

    %CALLNAME:人物_小悪魔%は一物を深く咥え込み、喉奥まで受け入れた。

    「んぐ……じゅる……ちゅぷ……全部……頂きますわ……」
  priority: 4
- id: talent_3_1
  content: >-
    「え、えっと……く、口で……ですか……？」

    %CALLNAME:人物_小悪魔%は顔を赤くしながらも、%CALLNAME:MASTER%の前に跪いた。

    おずおずと顔を近づけ、一物を見つめている。

    「こ、こうすれば……いいんですよね……んっ……」

    %CALLNAME:人物_小悪魔%は恐る恐る舌を伸ばし、亀頭を舐めた。

    「……ちゅ……れろ……あ、味が……独特ですわ……」

    %CALLNAME:人物_小悪魔%は一物を口に含み、ゆっくりと舌を動かしている。

    「んむ……こ、こうですか……？　気持ちいいですか……？」

    慣れない動きながらも、一生懸命に奉仕しようとしている。

    「ちゅ……じゅる……ん……難しいですわ……」

    %CALLNAME:人物_小悪魔%は困った顔をしながらも、やめようとはしない。

    「……もう少し……頑張りますから……」

    「%CALLNAME:MASTER%……こんなこと、させるなんて……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに俯きながら、舌を這わせた。

    「でも……%CALLNAME:MASTER%になら……いいかも……って……」

    茎をぺろぺろと舐め、亀頭にちゅっとキスをする。

    「……れろ……ちゅ……変な感じですわ……でも嫌じゃない……」

    %CALLNAME:人物_小悪魔%の尻尾がそわそわと揺れている。

    %CALLNAME:人物_小悪魔%は意を決したように、一物を口に含んだ。

    「んっ……は、はむ……ん……」

    頬が赤く染まり、目が潤んでいる。

    「ちゅ……じゅる……%CALLNAME:MASTER%……見ないでください……」

    恥ずかしそうにしながらも、%CALLNAME:人物_小悪魔%は舌を動かし続けた。

    「……こういうの……悪魔として、どうなんでしょう……」
