    「……私の動いてるところ……見ないでください……」

    %CALLNAME:人物_美鈴%は羞恥に頬を染めた。

    「……でも……こうして繋がってると……」

    %CALLNAME:人物_美鈴%は途切れ途切れに言葉を紡いだ。

    「……%CALLNAME:MASTER%のこと、もっと好きになっちゃいます……」

    「は、はぅ……っ……この体勢、疲れますね……」

    %CALLNAME:人物_美鈴%は息を切らしながらも、腰を動かし続けた。

    「……でも……%CALLNAME:MASTER%のためなら……頑張れます」

    %CALLNAME:人物_美鈴%は武術家らしい体力で、リズムを保った。

    「……私……%CALLNAME:MASTER%のこと……」

    言いかけて、%CALLNAME:人物_美鈴%は口ごもった。

    「……大好き、です……」
