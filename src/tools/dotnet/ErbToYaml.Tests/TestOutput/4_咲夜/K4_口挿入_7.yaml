    %CALLNAME:TARGET%は戸惑いながらも、舌を動かしている。

    「こんなことをするなんて……自分でも信じられませんわ……」

    「ん……んっ……」

    %CALLNAME:MASTER%の反応を見て、%CALLNAME:TARGET%は少し嬉しそうに微笑んだ。

    「……喜んでいただけているようで……」

    「少し……嬉しいですわ……」

    「……はぁ……」

    %CALLNAME:TARGET%は恥ずかしそうに息を吐きながら、奉仕を続けている。

