    %CALLNAME:人物_美鈴%は眉を寄せて、不満げな表情を見せた。

    「私、一応紅魔館の門番なんですから、もう少し敬意を払ってくださいね？」

    そう言って、%CALLNAME:人物_美鈴%は姿勢を正した。

    「きゃっ……！ 何をするんですか！」

    %CALLNAME:人物_美鈴%は驚いて一歩後ずさった。

    「い、いきなりお尻を触るなんて、非常識です！」

    %CALLNAME:人物_美鈴%は警戒心を露わにして%CALLNAME:MASTER%を見つめている。

    「くそ、背水の陣だ……と言いたいところですけど」

