- id: talent_3_1
  content: >-
    「……私が%CALLNAME:MASTER%を……？　少し、緊張するわね」

    %CALLNAME:人物_レミリア%は頬を染めながら、%CALLNAME:MASTER%の上に覆いかぶさった。

    小さな身体がゆっくりと腰を下ろしていく。

    「んっ……あぁ……入って、いく……」

    %CALLNAME:人物_レミリア%は声を殺そうとしたが、甘い吐息が漏れた。

    「……%CALLNAME:MASTER%の顔、見ないで……恥ずかしいから……」

    紅魔館の主は、主導権を握りながらも素直になれないでいた。

    「……この体勢だと、%CALLNAME:MASTER%の表情が全部見えてしまうわ」

    %CALLNAME:人物_レミリア%は恥ずかしそうに呟きながら腰を動かした。

    %CALLNAME:MASTER%の身体が、小さな吸血鬼の動きに反応する。

    「あ……っ、%CALLNAME:MASTER%……締め付けないで……っ」

    %CALLNAME:人物_レミリア%は思わず声を上げてしまい、顔を赤くした。

    「……変な声、聞かないでよ……」

    500年の吸血鬼は、恥じらいを隠しきれずにいた。

    「ふ……ん……私から%CALLNAME:MASTER%を抱くなんて、初めてではないけれど……」

    %CALLNAME:人物_レミリア%は照れを隠すように呟きながら腰を揺らした。

    紅い瞳が潤み、%CALLNAME:MASTER%を見つめる。

    「んぁ……っ、%CALLNAME:MASTER%の中……動いて……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の肩を掴んだ。

    「……もっと……奥まで……」

    紅魔館の主は、気がつけば夢中で腰を動かしていた。

    「……%CALLNAME:MASTER%の顔が近いわね……」

    %CALLNAME:人物_レミリア%は複雑な表情で%CALLNAME:MASTER%を見下ろした。

    この距離では、紅い瞳の奥の感情が隠しきれない。

    「あ……っ、動かないで……私が動くから……」

    %CALLNAME:人物_レミリア%は慌てたように言った。

    「……ば、馬鹿……勝手に腰を動かさないでよ……」

    500年の吸血鬼は、主導権を握りたいのに素直になれない自分に苛立っていた。
