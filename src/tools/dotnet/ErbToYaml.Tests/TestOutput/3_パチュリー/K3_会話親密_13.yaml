entries:
- id: fallback
  content: >-
    「んっ……%CALLNAME:MASTER%の指が、中に……」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の手を受け入れ、静かに息を吐いた。

    %CALLNAME:MASTER%の指が秘所を分け入ると、温かな蜜が指を包み込む。

    「あ……ふぅ……そこ、いいわ……」

    %CALLNAME:人物_パチュリー%は目を伏せ、%CALLNAME:MASTER%に身を委ねている。

    「……あなたにだけよ。こんな姿を見せるのは……」

    %CALLNAME:人物_パチュリー%は頬を染め、%CALLNAME:MASTER%の腕にしがみついた。

    「……ん、来たのね」

    %CALLNAME:人物_パチュリー%は本を閉じ、%CALLNAME:MASTER%を静かに迎え入れた。

    指が中に入ると、%CALLNAME:人物_パチュリー%は小さく身じろぎする。

    「はぁ……あなたの指、温かいわ……」

    膣壁が%CALLNAME:MASTER%の指を締め付け、蠢くように絡みついてくる。

    「……もっと、奥まで……いいのよ……」

    %CALLNAME:人物_パチュリー%は珍しく甘えた声で囁いた。

    「あっ……んんっ……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_パチュリー%の秘所に滑り込んだ。

    %CALLNAME:人物_パチュリー%は熱い吐息を漏らしながら、%CALLNAME:MASTER%を見つめている。

    「……ふぅ、あなたの指……好きよ……」

    %CALLNAME:人物_パチュリー%の内壁は熱く、蜜でしっとりと濡れている。

    「本を読むのと同じくらい……ううん、それ以上に……」

    %CALLNAME:人物_パチュリー%は恥ずかしそうに視線を逸らした。

    「……待ってたの」

    %CALLNAME:人物_パチュリー%はそっと脚を開き、%CALLNAME:MASTER%を受け入れる準備をした。

    指が挿入されると、%CALLNAME:人物_パチュリー%は静かに息を詰めた。

    「はぁ……ん……今日のあなたは、少し焦らすのね……」

    %CALLNAME:人物_パチュリー%の秘所は既に潤んでおり、%CALLNAME:MASTER%の指を貪欲に飲み込んでいる。

    「……もっと深く、ね……」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の首に腕を回し、身を寄せた。
