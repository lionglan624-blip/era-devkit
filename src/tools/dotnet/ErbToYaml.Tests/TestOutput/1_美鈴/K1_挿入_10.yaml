    「……頑張って、受け入れます……」

    「……後ろから抱きしめててくれると……怖くない、です……」

    恥ずかしそうに、でも嬉しそうに、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に身を委ねた。
