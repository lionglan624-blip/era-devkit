- id: fallback
  content: >-
    「え、えっと……後ろからって、こうするのか……？」

    %CALLNAME:人物_魔理沙%は戸惑いながら、%CALLNAME:MASTER%の後ろに回った。

    「本で読んだことはあるけど……実際にやると、緊張するな……」

    %CALLNAME:人物_魔理沙%はおそるおそる腰を進め、その感触に息を呑んだ。

    「うわっ……入った……後ろからだと、また違う感じなんだな……」

    %CALLNAME:人物_魔理沙%は興味深そうに、ゆっくりと腰を動かし始めた。

    「こうか……？　後ろからだと……角度がよくわからないな……」

    %CALLNAME:人物_魔理沙%は不安そうに%CALLNAME:MASTER%の背中を見た。

    「痛かったら言えよな……見えないから加減がわからないんだ」

    %CALLNAME:人物_魔理沙%の腰の動きはぎこちないが、真剣だった。

    「んっ……なるほど、こうすると深くまで……」

    %CALLNAME:人物_魔理沙%は魔法の実験のように、興味津々で動きを試した。

    「ふーん……後ろからだとこういう感じなのか」

    %CALLNAME:人物_魔理沙%は知的好奇心から、%CALLNAME:MASTER%との繋がりを確かめた。

    「私が動くと……こう反応するんだな……」

    %CALLNAME:人物_魔理沙%は腰を動かしながら、%CALLNAME:MASTER%の反応を観察した。

    「んっ……あっ……後ろからだと、なんか支配してる気分になるな……」

    %CALLNAME:人物_魔理沙%は自分の体の反応に少し驚いていた。

    「……%CALLNAME:MASTER%、これで合ってるのか？」

    %CALLNAME:人物_魔理沙%は真剣な表情で訊ねた。

    「後ろからって、こういう風に動くんだよな……？」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_魔理沙%は素直に合わせた。

    「なるほど……こうやって動くのか……」

    %CALLNAME:人物_魔理沙%は教わった通りに腰を動かし、真剣に練習していた。
