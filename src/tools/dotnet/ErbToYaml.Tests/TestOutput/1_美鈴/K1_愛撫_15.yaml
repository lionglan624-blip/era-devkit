entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%が取り出したバイブを見て、%CALLNAME:人物_美鈴%はそっと頬を染めた。

    「……今日は、それを使うの？」

    %CALLNAME:人物_美鈴%は恥ずかしそうに脚を開き、%CALLNAME:MASTER%を受け入れる姿勢を見せた。

    バイブがゆっくりと挿入されると、%CALLNAME:人物_美鈴%は甘い吐息を漏らした。

    「んっ……振動、奥まで届く……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の肩に手を置き、身を寄せた。

    「ふふっ……%CALLNAME:MASTER%、そういうの好きなのね」

    %CALLNAME:人物_美鈴%は微笑みながら、バイブを見つめた。

    「……私の中で、震えさせたいんでしょ？」

    振動が始まると、%CALLNAME:人物_美鈴%の表情が蕩けていく。

    「あっ……んんっ……これ、すごい……奥に響く……」

    %CALLNAME:人物_美鈴%は恋人の腕の中で、快楽に溺れていった。

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に身を預け、そっと腰を浮かせた。

    「……%CALLNAME:MASTER%がしたいなら、いいわよ……入れて」

    バイブが膣内に収まり、振動が伝わる。

    「ひぁっ……！　中で、震えて……っ」

    %CALLNAME:人物_美鈴%は声を押し殺しながら、恋人の胸に顔を埋めた。

    「……%CALLNAME:MASTER%といると、どんどん乱れちゃう……」

    「……また、バイブ？　%CALLNAME:MASTER%ったら」

    %CALLNAME:人物_美鈴%は少し照れながらも、嬉しそうに微笑んだ。

    「……私のこと、もっと感じさせたいんでしょ？　わかってるわよ」

    バイブの振動が膣壁を刺激し、%CALLNAME:人物_美鈴%は声を漏らす。

    「あぁっ……やっ……中、熱い……」

    門番としての威厳はどこへやら、%CALLNAME:人物_美鈴%は恋人に甘えていた。
  priority: 4
- id: talent_3_1
  content: >-
