    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に抱きつきながら、頬をすり寄せている。

    %CALLNAME:MASTER%が腰を動かすたびに、%CALLNAME:人物_小悪魔%は甘い声を上げた。

    「あぁっ……そう……そこ、気持ちいい……」

