- id: fallback
  content: >-
    「……何を見ているの」

    %CALLNAME:人物_レミリア%は冷たく言い放ったが、手は止めなかった。

    「使用人が主の自慰を見るなんて……身の程知らずね」

    そう言いながらも、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を追い払おうとはしなかった。

    「……っ、んっ……今日だけ特別に許してあげているのよ」

    %CALLNAME:人物_レミリア%の頬は、わずかに紅く染まっていた。

    「……感謝しなさい」

    「……ふぅん、見たいの？　私がこうするところを」

    %CALLNAME:人物_レミリア%は挑発的に脚を開いた。

    「いいわ、見せてあげる。これも主の慈悲よ」

    %CALLNAME:人物_レミリア%は高飛車に言いながら、指を動かし始めた。

    「んっ……あ……」

    思わず漏れた声に、%CALLNAME:人物_レミリア%自身が驚いていた。

    「……気のせいよ、今のは」

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を紅い瞳で見つめた。

    「あなた、私のこういう姿が見たいのね」

    %CALLNAME:人物_レミリア%はゆっくりと自らの秘所に触れた。

    「んっ……使用人の分際で……大胆ね」

    %CALLNAME:人物_レミリア%は呆れたように、しかしどこか満更でもなさそうに言った。

    「……今日のところは、見逃してあげるわ」

    「……退屈だから、付き合ってあげているだけよ」

    %CALLNAME:人物_レミリア%はそう言い訳しながら、脚の間に手を伸ばした。

    500年を生きた吸血鬼が、使用人の前で自慰をするなど。

    「んっ……あ……」

    %CALLNAME:人物_レミリア%は快楽に眉を寄せた。

    「……勘違いしないで、%CALLNAME:MASTER%」

    「これは私の気まぐれ……あなたのためじゃないわ」
  priority: 2
- id: fallback
  content: >-
    「……何のつもり？」

    %CALLNAME:人物_レミリア%は冷たい視線を%CALLNAME:MASTER%に向けた。

    「私がこんなことをするところを見たいですって？」

    %CALLNAME:人物_レミリア%は嘲笑を浮かべた。

    「身の程を知りなさい、使用人が」

    500年を生きた吸血鬼は、傲慢に言い放った。

    「……まあ、暇つぶしに付き合ってあげてもいいけど」

    「……ふぅん」

    %CALLNAME:人物_レミリア%は退屈そうに%CALLNAME:MASTER%を見下ろした。

    「紅魔館の主が自慰をするところを見たい？」

    %CALLNAME:人物_レミリア%は鼻で笑った。

    「図々しいにも程があるわね」

    そう言いながら、%CALLNAME:人物_レミリア%は面倒くさそうに脚を組み直した。

    「……咲夜を呼ぶ前に、下がりなさい」

    「……あなた、命が惜しくないのかしら」

    %CALLNAME:人物_レミリア%は紅い瞳を危険に光らせた。

    「私にそんなことをさせようというの？」

    500年を生きた吸血鬼の威圧感が、部屋を満たしていく。

    「……まあいいわ、今日は機嫌がいいから」

    %CALLNAME:人物_レミリア%は溜息をついた。

    「次はないと思いなさい」

    「……何を期待しているの？」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    「私はこう見えても忙しいのよ」

    紅魔館の主は、高飛車な態度を崩さなかった。

    「使用人の相手をしている暇はないわ」

    %CALLNAME:人物_レミリア%は追い払うような仕草をした。

    「用があるなら、咲夜を通して言いなさい」
  priority: 1
