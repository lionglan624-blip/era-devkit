- id: fallback
  content: >-
    「え……こ、こうやってするの……？」

    %CALLNAME:人物_チルノ%は四つんばいの体勢に戸惑っていた。

    「なんか、動物みたい……」

    %CALLNAME:MASTER%が後ろから挿入すると、%CALLNAME:人物_チルノ%は目を丸くした。

    「わっ……こ、この体勢だと、なんか違う……深い……」

    よくわからないまま、%CALLNAME:人物_チルノ%は体を震わせた。

    「へぇ……後ろからもできるんだ……」

    %CALLNAME:人物_チルノ%は興味深そうに振り返った。

    「んっ……あ、なんか、お腹の奥に当たる感じ……」

    %CALLNAME:人物_チルノ%は不思議そうに自分の下腹部を見下ろした。

    「正面よりも……深いところまで来てる気がする……」

    首を傾げながら、%CALLNAME:人物_チルノ%は感覚を確かめていた。

    「あ……%CALLNAME:MASTER%、ちょっと待って……」

    %CALLNAME:人物_チルノ%は四つんばいのまま、体勢を整えようとした。

    「この格好、不安定……んっ、あっ……」

    %CALLNAME:MASTER%が動くと、%CALLNAME:人物_チルノ%はバランスを崩しそうになった。

    「うぅ……なんか変な感じ……でも、嫌じゃない……かも」

    %CALLNAME:人物_チルノ%は困惑しながらも、%CALLNAME:MASTER%を受け入れていた。

    「……%CALLNAME:MASTER%、これって普通のこと？」

    %CALLNAME:人物_チルノ%は四つんばいで不安そうに尋ねた。

    「後ろ向いてるから……%CALLNAME:MASTER%の顔見えないね……」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_チルノ%は小さく声を漏らした。

    「んっ……でも、なんか……体が勝手に反応する……」

    よくわからないまま、%CALLNAME:人物_チルノ%は感じ始めていた。
  priority: 2
- id: fallback
  content: >-
    「な……っ！　こんな格好させて何のつもり！？」

    %CALLNAME:人物_チルノ%は四つんばいにされて抵抗していた。

    「こんな獣みたいな……あたいを馬鹿にしてんの！？」

    しかし%CALLNAME:MASTER%に体勢を固定され、動けない。

    「や、やめ……っ、後ろからなんて……屈辱……っ」

    %CALLNAME:人物_チルノ%は歯を食いしばって耐えていた。

    「は、離しなさいよ……！　あたいは最強なんだから……！」

    %CALLNAME:人物_チルノ%は四つんばいの体勢から逃れようとした。

    しかし%CALLNAME:MASTER%の力には勝てず、尻を突き出す格好になっている。

    「こんな……動物みたいな体勢……っ、やめてよ……！」

    %CALLNAME:人物_チルノ%の目には涙が滲んでいた。

    「……覚えてなさいよ……絶対に……凍らせてやるんだから……っ」

    「や……やめ……っ！」

    %CALLNAME:人物_チルノ%は四つんばいにされ、後ろから貫かれていた。

    「こんなの……こんなの認めないから……っ」

    %CALLNAME:人物_チルノ%は屈辱に震えながら、%CALLNAME:MASTER%を受け入れさせられていた。

    「あたいは……最強なのに……なんで……っ」

    いつもの自信は消え、%CALLNAME:人物_チルノ%は怯えていた。

    「……」

    %CALLNAME:人物_チルノ%は黙って四つんばいにされていた。

    獣のような体勢で犯されることへの屈辱に、顔を伏せている。

    「……後で、絶対許さないから」

    %CALLNAME:人物_チルノ%は震える声でそれだけ言った。

    「あたいを……こんな風にしたこと……忘れないから……っ」
  priority: 1
