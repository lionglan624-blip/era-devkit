- id: fallback
  content: >-
    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の言葉ににっこりと笑った。紅い瞳に、ほんのりと温かな光が宿っている。

    「――へえ、そんなことがあったんだ」

    %CALLNAME:人物_フラン%は興味深そうに%CALLNAME:MASTER%の話を聞いている。

    「えへへ、%CALLNAME:MASTER%の話、面白いのさ」

    翼をぱたぱたと動かしながら、%CALLNAME:人物_フラン%は幸せそうだ。

    「ねぇ、もっと聞かせて？ ずっとここにいてもいいんだよ？」

    495年の孤独を埋めるように、%CALLNAME:人物_フラン%は%CALLNAME:MASTER%に寄り添った。

    「――それでね、%CALLNAME:MASTER%」

    %CALLNAME:人物_フラン%は嬉しそうに話をしている。

    地下室に閉じ込められていた少女とは思えない、明るい笑顔だ。

    「……聞いてる？ ちゃんと聞いてないと壊しちゃうよ？」

    冗談のように言いながら、%CALLNAME:人物_フラン%は%CALLNAME:MASTER%の反応を伺っている。

    「うそうそ。%CALLNAME:MASTER%のことは壊さないから、安心して？」

    「――%CALLNAME:MASTER%？ 聞いてる？」

    聞いてるよ、と%CALLNAME:MASTER%が答えると、

    「そっか、よかった。無視されると、寂しくなっちゃうから」

    %CALLNAME:人物_フラン%は安心したように微笑んだ。

    「……私ね、%CALLNAME:MASTER%といると壊したくならないの。不思議だよね」

    無邪気な瞳で、%CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見つめている。

    「――ねえ、%CALLNAME:MASTER%」

    唐突に%CALLNAME:人物_フラン%が話しかけてきた。

    どうしたの、と%CALLNAME:MASTER%が問うと、

    「こうしてお話ししてる時間……私、大好きだよ」

    「495年、ずっと一人だったの。でも今は%CALLNAME:MASTER%がいてくれるから……」

    %CALLNAME:人物_フラン%は照れたように視線を逸らした。翼が恥ずかしそうにぴくぴくと動いている。
