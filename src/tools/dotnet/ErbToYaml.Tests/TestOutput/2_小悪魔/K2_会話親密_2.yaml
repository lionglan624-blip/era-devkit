character: 小悪魔
situation: K2_会話親密
entries:
- id: fallback
  content: >-
    「んふふ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_小悪魔%は甘えるように%CALLNAME:MASTER%に身を寄せてきた。

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の髪を優しく撫でている。

    「……悪魔のキスって知ってます？ もっと深くしたくなっちゃうんですの……」

    %CALLNAME:人物_小悪魔%はいたずらっぽく微笑みながら唇を近づけてきた。

    「……ふふ、冗談ですわ。でも、%CALLNAME:MASTER%となら……本当にしてもいいかも」

    「ひゃっ……耳はだめですってば……」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の耳元に息を吹きかけた。

    「んっ……%CALLNAME:MASTER%ったら、いじわる……」

    %CALLNAME:人物_小悪魔%は体をぴくりと震わせ、頬を赤く染めている。

    「……でも、%CALLNAME:MASTER%のいじわるなら……嫌いじゃないですわ……」

    とろんとした瞳で、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%を見つめてきた。

    「……ねえ、%CALLNAME:MASTER%」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の背中に腕を回し、ぎゅっと抱きついてきた。

    「こうしてると、図書館の仕事なんて忘れちゃいますの」

    柔らかな体が密着し、甘い香りが漂ってくる。

    「……%CALLNAME:MASTER%の匂い、好きですわ……悪魔でも、こういうの幸せって言うのかしら」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の胸に顔を埋めて、幸せそうに息を吐いた。

    「あっ……そこ、くすぐったいです……」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の脇腹をさすっている。

    「んふふ、やめてください……あはは、だめ、だめですってば！」

    %CALLNAME:人物_小悪魔%は笑い声を上げながら、体をくねらせている。

    「もう……%CALLNAME:MASTER%ったら……」

    涙目になりながらも、%CALLNAME:人物_小悪魔%は嬉しそうに%CALLNAME:MASTER%を見つめていた。
