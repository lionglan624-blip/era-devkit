- id: talent_3_1
  content: >-
    「……っ……こんな、体勢……」

    %CALLNAME:TARGET%は四つんばいになりながら、顔を真っ赤にしている。

    「……顔が見えないのは、少し楽かもしれない……恥ずかしくて」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に背を向けたまま、息を整えている。

    「……あっ……入って……きた……んっ……」

    %CALLNAME:TARGET%は声を押し殺すように、シーツを握りしめた。

    「んっ……ふ……あ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに、体を震わせている。

    「……まるで、獣みたい……こんな姿勢で……」

    %CALLNAME:TARGET%は恥ずかしさに頬を染めながらも、身を委ねている。

    「……%CALLNAME:MASTER%には、私の背中しか見えないのよね……」

    安堵と寂しさが混じった声で、%CALLNAME:TARGET%は呟いた。

    「あ……やぁ……そこ……深い……」

    %CALLNAME:TARGET%は思わず声を漏らし、慌てて口を押さえた。

    「……本では、この体位は深く入ると書いてあったけれど……」

    %CALLNAME:TARGET%は知識と実感の差に戸惑っている。

    「……こんなに、違うなんて……ん……っ」

    理性的な分析が、感覚に押し流されていく。

    「……」

    %CALLNAME:TARGET%は黙って%CALLNAME:MASTER%を受け入れている。

    四つんばいの姿勢は恥ずかしいが、体力的には楽だった。

    「……%CALLNAME:MASTER%、激しくしないで……体が弱いから……」

    %CALLNAME:TARGET%は小さな声で頼んだ。

    「……でも、もう少しだけ……続けてもいいわ……」
