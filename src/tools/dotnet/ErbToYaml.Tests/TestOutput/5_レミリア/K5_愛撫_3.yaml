entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……挿れて、いいわよ」

    %CALLNAME:人物_レミリア%は紅い瞳を潤ませながら、恋人を見上げた。

    %CALLNAME:MASTER%がゆっくりと指を挿入すると、%CALLNAME:人物_レミリア%の身体がびくりと震えた。

    「んっ……あぁ……%CALLNAME:MASTER%の指、熱い……」

    %CALLNAME:人物_レミリア%の冷たいはずの膣内が、指を優しく締め付けてくる。

    「もっと……奥まで、来て……」

    500年を生きた吸血鬼が、恋人の前でだけ見せる甘い姿だった。

    「あっ……んんっ……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_レミリア%の奥へと入っていく。

    膣壁は柔らかく、指に吸い付くような感触を返してきた。

    「ふぅ……%CALLNAME:MASTER%、上手になったわね……私の身体を……」

    %CALLNAME:人物_レミリア%は頬を染めながら、恋人の手の動きに身を委ねていた。

    「……そう、そこ……気持ちいいの……」

    館の主は、恋人の指に蕩けるような表情を浮かべていた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は愛おしそうに恋人の名を呼んだ。

    %CALLNAME:MASTER%が指を動かすたびに、小さな身体が快感に震える。

    「やぁ……んっ……指、奥まで届いてる……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の肩にしがみつき、甘い声を漏らし続けた。

    「……私、%CALLNAME:MASTER%のもの……全部、あなたのものよ……」

    永遠を生きる吸血鬼が、一人の恋人だけを求めていた。

    「ふふ……私の中、気持ちいいでしょう？」

    %CALLNAME:人物_レミリア%は挑発的に微笑みながら、%CALLNAME:MASTER%を見つめた。

    だが指が奥を刺激すると、その表情は一変した。

    「あっ……やぁ……そこ、だめ……」

    %CALLNAME:人物_レミリア%は快感に耐えきれず、小さく喘いだ。

    「%CALLNAME:MASTER%……もっと、もっとちょうだい……」

    威厳など忘れて、%CALLNAME:人物_レミリア%は恋人に甘えていた。
