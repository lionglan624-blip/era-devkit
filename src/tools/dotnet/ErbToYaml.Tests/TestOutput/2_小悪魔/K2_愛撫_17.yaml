    %CALLNAME:人物_小悪魔%は体を震わせながらも、%CALLNAME:MASTER%から目を逸らせなかった。

    「……これ……珠が連なっていますわね……」

    %CALLNAME:人物_小悪魔%は好奇心と羞恥が入り混じった表情を浮かべた。

    %CALLNAME:MASTER%が最初の珠を挿入すると、%CALLNAME:人物_小悪魔%は息を呑んだ。

    「ひゃっ……んっ……不思議な感触……」

    「……%CALLNAME:MASTER%になら……こんな姿……見せても……」

    恥ずかしそうに、でも嬉しそうに%CALLNAME:人物_小悪魔%は呟いた。

    「……んっ……あの……%CALLNAME:MASTER%……」

    %CALLNAME:人物_小悪魔%はアナルビーズが引き抜かれる感覚に身を捩った。

    「珠が……一つずつ……抜けて……変な気持ち……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに自分の反応を隠そうとした。

    「……悪魔なのに……こんな場所で声を上げちゃうなんて……」

    そう言いながらも、%CALLNAME:人物_小悪魔%の目は%CALLNAME:MASTER%への想いで潤んでいた。
