- id: fallback
  content: >-
    「……足で？　正気ですか？」

    %CALLNAME:人物_小悪魔%は冷めた目で%CALLNAME:MASTER%を見ている。

    仕方なさそうにため息をつき、足を差し出した。

    「……さっさと終わらせましょう……」

    %CALLNAME:人物_小悪魔%は無表情で足を動かし、適当に擦り始めた。

    「……パチュリー様のお仕事があるんですけど……」

    %CALLNAME:人物_小悪魔%は嫌そうな顔で一物を見ている。

    「……悪魔にこんなことさせるなんて……」

    最低限の動きで足を動かしている。

    「ん……これでいいでしょう？」

    %CALLNAME:人物_小悪魔%はさっさと終わらせたい様子だ。

    「……早く満足してくださいませ」

    「はあ……」

    %CALLNAME:人物_小悪魔%はため息をつきながら、言われた通りに足を使った。

    動きは事務的で、感情がこもっていない。

    「……こんなことして、何が楽しいんですか……」

    %CALLNAME:人物_小悪魔%はじっとりとした目で%CALLNAME:MASTER%を見上げた。

    「……図書館の仕事が溜まってるんですから……」

    %CALLNAME:人物_小悪魔%は無言で足を差し出し、一物に押し当てた。

    「……ふん」

    最低限の動きで足を擦り当てている。

    「ん……人間って単純ですわね……」

    %CALLNAME:人物_小悪魔%は興味なさそうに奉仕を続けている。

    「……終わったら帰ってくださいね」
