- id: fallback
  content: >-
    「えっ……お、お尻……？」

    %CALLNAME:TARGET%は戸惑いながら、%CALLNAME:MASTER%を振り返った。

    「……急にそういうことされると、困っちゃいますの……」

    %CALLNAME:TARGET%は困惑しながらも、強くは拒まなかった。

    「……パチュリー様に見られたら、何て言われるか……」

    「ひゃっ……な、何を……」

    %CALLNAME:TARGET%は驚いて肩を震わせた。

    「お尻を触るなんて……%CALLNAME:MASTER%、大胆ですわね……」

    戸惑いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめている。

    「……まあ、悪魔ですから……少しくらいなら……」

    「あっ……そ、そこは……」

    %CALLNAME:TARGET%は困惑した表情で%CALLNAME:MASTER%を見た。

    「いきなりお尻を触るなんて……驚きますわよ」

    けれど%CALLNAME:TARGET%は強く拒むこともなく、戸惑いながらそこに立っている。

    「……%CALLNAME:MASTER%は、悪魔に何をさせたいんですの？」

    「えっ……ちょ、ちょっと……」

    %CALLNAME:MASTER%がお尻に手を置くと、%CALLNAME:TARGET%は身をすくめた。

    「こういうの、急すぎますわ……心の準備が……」

    %CALLNAME:TARGET%は頬を染めながら、%CALLNAME:MASTER%をちらりと見た。

    「……嫌ではないですけど……もう少しゆっくり……」
  priority: 2
- id: fallback
  content: >-
    「ちょっ……何を……！」

    %CALLNAME:TARGET%は驚いて振り返り、%CALLNAME:MASTER%の手を払おうとした。

    「いきなりお尻を触るなんて、失礼ですわよ」

    %CALLNAME:TARGET%は頬を膨らませながら、距離を取った。

    「悪魔だからって何をしてもいいわけじゃないんですの」

    「なっ……何するんですの！」

    %CALLNAME:TARGET%は飛び退くようにして%CALLNAME:MASTER%から離れた。

    「いきなりお尻なんて……どういうつもりですの？」

    悪魔の尻尾が警戒するようにピンと立っている。

    「……パチュリー様に言いつけますわよ」

    「ひゃっ！ち、ちょっと……！」

    %CALLNAME:TARGET%は驚きに目を見開き、%CALLNAME:MASTER%を睨んだ。

    「お尻を触るなんて……失礼にもほどがありますわ」

    %CALLNAME:TARGET%は一歩後ずさり、腕を組んで%CALLNAME:MASTER%を見据えた。

    「悪魔でも、無礼な方は嫌いですの」

    「えっ……ちょ、やめてくださいまし！」

    %CALLNAME:TARGET%は慌てて%CALLNAME:MASTER%の手を振り払った。

    「いきなりそんなところを……非常識ですわよ」

    不機嫌そうに眉を寄せ、%CALLNAME:TARGET%は%CALLNAME:MASTER%から距離を取った。

    「もう少し礼儀というものを学んでくださいまし」
  priority: 1
