- id: talent_3_1
  content: >-
    「……%CALLNAME:MASTER%……私から、入れていい……？」

    %CALLNAME:人物_フラン%は頬を染めながら、恋する相手に問いかけた。

    自分から求めることへの恥じらいと興奮が入り混じる。

    「んっ……入った……%CALLNAME:MASTER%の中……」

    %CALLNAME:人物_フラン%は繋がった感覚に身を震わせた。

    「こ、こうしてると……%CALLNAME:MASTER%が私だけのものって、感じるのさ……」

    恋慕の少女は、独占欲と喜びに揺れていた。

    「ねぇ……もっとこっち見て……私だけを見てよ……」

    %CALLNAME:人物_フラン%は恋する相手の顔を両手で挟み込んだ。

    繋がりながら見つめ合いたいという欲求が抑えられない。

    「あっ……動くと……%CALLNAME:MASTER%の中がすごい……」

    %CALLNAME:人物_フラン%は感覚に翻弄されながらも、視線を逸らさなかった。

    「%CALLNAME:MASTER%の顔……こういう時の表情……覚えたいのさ……」

    その言葉には、愛しい人の全てを知りたい渇望があった。

    「ふふ……%CALLNAME:MASTER%、私を受け入れてくれるんだ……」

    %CALLNAME:人物_フラン%は嬉しそうに微笑みながら、腰を動かした。

    受け入れてもらえることへの喜びが、胸の中で膨らんでいく。

    「んっ……あっ……こうしてると、%CALLNAME:MASTER%のことしか考えられなくなるの……」

    %CALLNAME:人物_フラン%は恋する相手の中で快感に身を任せた。

    「もっと……もっと好きにさせてよ……」

    恋慕の炎は、ますます燃え上がっていた。

    「%CALLNAME:MASTER%……私のこと、好き……？」

    %CALLNAME:人物_フラン%は繋がりながら、不安げに問いかけた。

    愛しい人からの言葉が欲しくて、紅い瞳が潤む。

    「……うん……そう言ってくれると……嬉しい……」

    %CALLNAME:人物_フラン%は答えを聞いて、安堵の表情を浮かべた。

    「私も……%CALLNAME:MASTER%のこと……す、好きなのさ……」

    告白は恥ずかしげに、しかし確かな想いを込めて。
