- id: fallback
  content: >-
    %CALLNAME:MASTER%がマッサージャーを取り出すと、%CALLNAME:人物_レミリア%は冷たい視線を向けた。

    「……何のつもりかしら」

    吸血鬼の威圧感が、%CALLNAME:MASTER%を押し返す。

    「使用人が主にそんなものを使おうなど、身の程を知りなさい」

    %CALLNAME:人物_レミリア%は威厳を込めてそう言い放った。

    「……今回だけは見逃してあげるわ」

    紅魔館の主は、不機嫌そうに腕を組んだ。

    「……ふん」

    %CALLNAME:人物_レミリア%はマッサージャーを見て、嘲笑を浮かべた。

    「そんな安っぽい道具で、私を喜ばせようというの？」

    500年を生きた吸血鬼は、高飛車な態度を崩さなかった。

    「使用人の分際で、随分と図々しいわね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を値踏みするように見ていた。

    「……咲夜を呼ぶ前に、下がりなさい」

    %CALLNAME:MASTER%がマッサージャーを見せると、%CALLNAME:人物_レミリア%は眉をひそめた。

    「……何かしら、それは」

    興味なさそうな態度だが、その紅い瞳は%CALLNAME:MASTER%を観察していた。

    「紅魔館の主に、そんなものを使おうというの？」

    %CALLNAME:人物_レミリア%の声は氷のように冷たかった。

    「大胆ね……命が惜しくないのかしら」

    吸血鬼としての威圧感が、部屋を満たしていく。

    「……何よ」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    「私はこう見えても忙しいのよ」

    マッサージャーに視線をやり、%CALLNAME:人物_レミリア%は溜息をついた。

    「使用人の相手をしている暇はないわ」

    「用があるなら、咲夜を通しなさい」

    紅魔館の主は、%CALLNAME:MASTER%を追い払うような仕草をした。
  priority: 1
