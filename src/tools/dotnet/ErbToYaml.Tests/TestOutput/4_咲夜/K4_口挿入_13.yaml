entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……入れますわね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に覆いかぶさり、静かに腰を下ろしていった。

    「んっ……あ……%CALLNAME:MASTER%の中……温かい……」

    瀟洒なメイドは、恋人の中に入りながら甘い吐息を漏らした。

    「こうして……貴方を抱けることが……幸せですわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の頬を優しく撫でた。

    「もっと……奥まで……届かせますわね……」

    「ふふ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見下ろしながら腰を動かし始めた。

    「貴方の顔が……こんなに近くに見えますわ……」

    「あ……んっ……私も気持ちいい……」

    %CALLNAME:TARGET%は恋人の反応を確かめながら腰を揺らした。

    「……貴方の中……全部私のものにしたいですわ……」

    「好きなだけ……感じてくださいまし……」

    「……んぅ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は恋人の上で、ゆっくりと腰を動かしている。

    「こうして貴方を抱いていると……時を止めたくなりますわ……」

    「あっ……そこ……締まって……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の耳元で甘い声を漏らした。

    「もっと……感じさせてあげますわね……」

    完璧なメイドは、恋人を優しく愛撫しながら腰を振り続けた。

    「……あ……%CALLNAME:MASTER%……そんな顔をされると……」

    %CALLNAME:TARGET%は顔を赤らめながらも、%CALLNAME:MASTER%から目を逸らさなかった。

    「貴方を気持ちよくさせているのが……嬉しいですわ……」

    「で、でも……こんな積極的な私……恥ずかしいですわね……」

    %CALLNAME:TARGET%は深く腰を沈めながら、髪を乱した。

    「んっ……あぁ……%CALLNAME:MASTER%……好き……」

    瀟洒なメイドは、恋人の中で愛を紡いでいた。
