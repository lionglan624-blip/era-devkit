character: 小悪魔
situation: K2_会話親密
entries:
- id: fallback
  content: >-
    「んっ……そ、そこは……恥ずかしいところですわ……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_小悪魔%の後ろの窄まりに触れた。

    %CALLNAME:人物_小悪魔%は甘い悲鳴を漏らしながらも、逃げようとはしなかった。

    「悪魔なのに……こんなところで感じるなんて……」

    %CALLNAME:人物_小悪魔%の小さな翼がぴくぴくと震えている。

    「でも……%CALLNAME:MASTER%になら……もっと、いじめてほしいですわ……」

    そう囁きながら、%CALLNAME:人物_小悪魔%は蕩けた瞳で%CALLNAME:MASTER%を見上げた。

    「ひゃんっ……！　あっ、そこ……だめですの……」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の菊座を優しく撫でている。

    %CALLNAME:人物_小悪魔%は顔を赤らめ、堪えきれずに身をくねらせた。

    「んんっ……%CALLNAME:MASTER%ったら……そんなところ触って……」

    %CALLNAME:人物_小悪魔%の尻尾が興奮したように大きく揺れている。

    「……ふふ、でも悪魔ですもの。こういうの……嫌いじゃないですわ」

    いたずらっぽく微笑みながらも、その頬は紅潮していた。

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%のスカートをめくり上げた。

    「あ……そんな、じっくり見ないでくださいな……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに身を捩ったが、%CALLNAME:MASTER%の手を止めることはなかった。

    %CALLNAME:MASTER%の指が後ろの窄まりをくすぐると、甘い声が漏れる。

    「やぁっ……あっ……そこ、変な感じがしますの……」

    %CALLNAME:人物_小悪魔%は快感に震えながら、%CALLNAME:MASTER%にしがみついた。

    「もっと……深くまで触ってくださいませ……」

    「んっ……あぁっ……お尻、感じちゃう……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_小悪魔%の最も恥ずかしい場所を執拗に責め立てる。

    %CALLNAME:人物_小悪魔%は抵抗を忘れ、快楽に身を委ねていた。

    「悪魔の私が……こんなに乱れるなんて……」

    %CALLNAME:人物_小悪魔%の息は荒く、その瞳は潤んでいる。

    「%CALLNAME:MASTER%……私を、もっと堕としてくださいな……」

    妖しい笑みを浮かべながら、%CALLNAME:人物_小悪魔%は禁断の快楽を求めた。
  priority: 4
- id: talent_3_1
  content: >-
    「ひゃっ……！　な、何を……っ」

    %CALLNAME:MASTER%の手が%CALLNAME:人物_小悪魔%の後ろに触れた。

    %CALLNAME:人物_小悪魔%は驚きで目を見開いたが、抵抗はしなかった。

    「そ、そこは……恥ずかしいですわ……」

    顔を真っ赤に染めながら、%CALLNAME:人物_小悪魔%はもじもじと身動ぎしている。

    「……%CALLNAME:MASTER%がしたいなら……我慢しますけど……」

    小さな声で、消え入りそうにそう呟いた。

    「えっ……お、お尻を……？」

    %CALLNAME:人物_小悪魔%は戸惑いながらも、%CALLNAME:MASTER%を拒まなかった。

    %CALLNAME:MASTER%の指が優しく後ろの窄まりを撫でる。

    「んっ……あっ……変な感じ……ですわ……」

    %CALLNAME:人物_小悪魔%は恥ずかしさで顔を背けたが、その体は震えていた。

    「……これも、%CALLNAME:MASTER%への恋の代償……なのかしら……」

    照れ隠しにそんなことを呟いた。

    「やっ……そ、そんなところ……」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の秘められた場所を愛撫し始めた。

    %CALLNAME:人物_小悪魔%は羞恥に震えながらも、されるがままになっている。

    「こんなの……パチュリー様に知られたら……」

    %CALLNAME:人物_小悪魔%の尻尾が恥ずかしそうにぴくぴくと動いている。

    「……でも、嫌じゃ……ないですわ……」

    上目遣いで%CALLNAME:MASTER%を見つめながら、小さく告白した。

    「あっ……そこ、くすぐったい……ですの……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_小悪魔%の後ろをそっと刺激している。

    %CALLNAME:人物_小悪魔%は甘い声を抑えきれずに身を捩った。

    「悪魔なのに……こんなに恥ずかしいなんて……」

    %CALLNAME:人物_小悪魔%は顔を覆いながらも、逃げようとはしなかった。

    「%CALLNAME:MASTER%……優しくしてくださいね……？」

    不安と期待を滲ませた声で、そうお願いした。
