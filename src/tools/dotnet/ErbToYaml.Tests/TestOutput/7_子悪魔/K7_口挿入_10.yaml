- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%のこと、いっぱい触っていい？」

    %CALLNAME:TARGET%は嬉しそうに%CALLNAME:MASTER%に寄り添った。

    小さな手が%CALLNAME:MASTER%の体を愛おしそうに撫でていく。

    「ん……%CALLNAME:MASTER%の体、あったかい……」

    %CALLNAME:TARGET%は幸せそうな表情で%CALLNAME:MASTER%を見上げている。

    「あたし、%CALLNAME:MASTER%に触ってるの……大好き」

    妖精の小さな手が、懸命に%CALLNAME:MASTER%の肌を撫でていく……

    「今日もあたしにさせてくれるの？　やったぁ！」

    %CALLNAME:TARGET%は満面の笑みで%CALLNAME:MASTER%の側に座った。

    「%CALLNAME:MASTER%のこと、いっぱい気持ちよくしてあげるね」

    %CALLNAME:TARGET%は慣れた手つきで%CALLNAME:MASTER%の体を撫で始めた。

    「ふふっ……ここ触ると、%CALLNAME:MASTER%、くすぐったそう……」

    嬉しそうに%CALLNAME:TARGET%は指を這わせている。

    「えへへ、あたしの手で気持ちよくなってね……？」

    「%CALLNAME:MASTER%……あたし、もっと上手に触れるようになりたいの」

    %CALLNAME:TARGET%は真剣な表情で%CALLNAME:MASTER%に手を伸ばした。

    「だから……いっぱい触らせてね？」

    小さな手が%CALLNAME:MASTER%の肌の上を滑っていく。

    「ここ、触ると気持ちいいって……咲夜さんが言ってた……」

    %CALLNAME:TARGET%は敏感な場所を探りながら、期待に満ちた目で見上げた。

    「……ね、あたし、ちゃんとできてる……？」

    「あ……%CALLNAME:MASTER%、あたしに触られると……嬉しい？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を見つめて、嬉しそうに微笑んだ。

    「あたしがいると、こんな顔するんだね……えへへ」

    %CALLNAME:TARGET%は愛おしそうに%CALLNAME:MASTER%の体を撫で続けた。

    「ふふっ……ぴくってした……可愛い」

    %CALLNAME:TARGET%はくすくす笑いながら、優しく愛撫している。

    「%CALLNAME:MASTER%……大好き。ずっとあたしのそばにいてね……」
