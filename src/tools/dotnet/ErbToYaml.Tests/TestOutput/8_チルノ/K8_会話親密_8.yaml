    「……もっと触っていいわよ。あたいは%CALLNAME:MASTER%のなんだから……」

    冷たいはずの体が、少しずつ熱を帯びていった。

    「あっ……んん……%CALLNAME:MASTER%……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の指に敏感な場所を愛撫されている。

    「あたいの体、%CALLNAME:MASTER%が一番よく知ってるわよね……」

    自信満々の言葉とは裏腹に、%CALLNAME:人物_チルノ%の頬は赤く染まっていた。

    「……えへへ、恋人同士ならこういうの、普通なんでしょ？」

    %CALLNAME:人物_チルノ%は嬉しそうに%CALLNAME:MASTER%を見上げた。

    「ひゃっ……！　そ、そこ……気持ちいい……」

    %CALLNAME:人物_チルノ%の体がビクンと跳ねた。

    「あたいったら最強だけど……こういうのには弱いのよね……」

    %CALLNAME:人物_チルノ%は照れ隠しに強がりを言いながら、%CALLNAME:MASTER%の腕に縋りついた。

    「……ねぇ、もっとして……？　あたいのこと、もっと気持ちよくして……」

    甘えるような声で、%CALLNAME:人物_チルノ%はそう囁いた。

    「ん……ぁ……%CALLNAME:MASTER%の指、上手ね……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の胸に顔を埋めながら、甘い声を漏らしている。

    「……あたいがこんなに可愛い声出すの、%CALLNAME:MASTER%だけよ……？」

    氷の妖精の体温は低いはずなのに、触れ合う部分だけが熱く感じられた。

    「……今日はずっとこうしてていい……？」

    %CALLNAME:人物_チルノ%は幸せそうな笑顔で%CALLNAME:MASTER%を見つめた。
