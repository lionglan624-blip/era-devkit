entries:
- id: fallback
  content: >-
    「……ん、あったかい」

    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の手を優しく握った。

    小さな手が、%CALLNAME:MASTER%の手を握り返してくる。

    「%CALLNAME:MASTER%の手、好きだよ……壊さずにいられるから」

    %CALLNAME:人物_フラン%は幸せそうに目を細めている。

    「このぬくもり、知っちゃったら……もう離せないのさ」

    495年の孤独を埋めるように、%CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手を握りしめた。

    「……髪、触ってくれるの？」

    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の金色の髪を優しく撫でている。

    %CALLNAME:人物_フラン%は目を閉じ、その感触を楽しんでいるようだ。

    「えへへ……気持ちいいよ、%CALLNAME:MASTER%」

    「ね、もう一回してよ？ もっとして？」

    無邪気な笑顔で、%CALLNAME:人物_フラン%は%CALLNAME:MASTER%にもたれかかった。

    翼がぱたぱたと嬉しそうに揺れている。

    「……ぎゅって、して？」

    %CALLNAME:人物_フラン%は甘えるように%CALLNAME:MASTER%に抱きついてきた。

    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の小さな体を後ろから抱きしめた。

    「……うん、これがいいの。あったかいのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の腕に自分の手を重ねている。

    「%CALLNAME:MASTER%だけだよ……こんなことさせてあげるの」

    地下室に閉じ込められていた少女の瞳に、温かな光が宿っていた。

    「……翼？ 触りたいの？」

    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の七色の翼にそっと触れた。

    %CALLNAME:人物_フラン%はびくりと肩を震わせたが、拒まなかった。

    「……ふふ、お姉様にも触らせたことないのに」

    %CALLNAME:MASTER%が翼を優しく撫でると、%CALLNAME:人物_フラン%は気持ちよさそうに声を漏らした。

    「んっ……%CALLNAME:MASTER%だけだよ、特別なのさ」

    悪魔の翼は、意外なほど繊細な感触だった。
  priority: 4
- id: talent_3_1
  content: >-
    「……手？ 繋ぎたいの？」

    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の手を取った。

    %CALLNAME:人物_フラン%は戸惑った表情を浮かべたが、手を引っ込めなかった。

    「……べ、別にいいけどさ」

    %CALLNAME:人物_フラン%の頬がほんのりと赤く染まっている。

    「あったかいね……%CALLNAME:MASTER%の手」

    「……髪、触るの？」

    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の金色の髪に触れた。

    %CALLNAME:人物_フラン%は驚いた表情を見せたが、されるがままになっている。

    「……変なの。こういうの、よくわかんないよ」

    でも嫌じゃないのか、%CALLNAME:人物_フラン%は目を閉じて%CALLNAME:MASTER%に身を任せている。

    「……もう少しだけ、いいよ」

    「……あ、ちょっと」

    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の肩に手を置いた。

    %CALLNAME:人物_フラン%は一瞬身を強張らせたが、すぐに力を抜いた。

    「……触っても、大丈夫だよ。たぶん」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見上げながら、小さく微笑んだ。

    「壊さないように、気をつけるから」

    「……んっ……」

    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の頬をそっと撫でた。

    %CALLNAME:人物_フラン%は目を伏せ、その手に自分の手を重ねている。

    「……%CALLNAME:MASTER%って、優しいね」

    「私、こういうの……嫌いじゃないかも」

    紅い瞳が潤んで、%CALLNAME:人物_フラン%は恥ずかしそうに視線を逸らした。
