- id: fallback
  content: >-
    %CALLNAME:人物_咲夜%は瀟洒な佇まいのまま、%CALLNAME:MASTER%の話を聞いていた。

    「ええ、そうなの」

    %CALLNAME:人物_咲夜%は無難に相槌をうった。

    「……申し訳ないのだけれど、お嬢様のお世話がございますので」

    %CALLNAME:人物_咲夜%は丁寧に、しかし明確に話を切り上げた。

    「なるほど。そういうこともあるのね」

    %CALLNAME:人物_咲夜%は適切な距離を保ちながら話を聞いている。

    「お話、ありがとうございました」

    %CALLNAME:人物_咲夜%は優雅に一礼し、会話を終えた。

    「……ふむ」

    %CALLNAME:人物_咲夜%は静かに頷きながら話を聞いている。

    「お客様のお話も、たまには面白いものですわね」

    そう言いつつも、%CALLNAME:人物_咲夜%の目は冷静で、どこか距離がある。

    「では、私はこれで失礼いたしますわ」

    「……そうですか」

    %CALLNAME:人物_咲夜%は無表情に近い顔で相槌をうった。

    「申し訳ありませんが、私には仕事がございますので」

    %CALLNAME:人物_咲夜%は完璧な一礼をして、その場を立ち去ろうとした。

    「……お暇でしたら、お嬢様にでもお話しになってはいかがかしら」
