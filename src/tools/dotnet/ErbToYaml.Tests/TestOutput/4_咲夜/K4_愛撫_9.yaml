entries:
- id: fallback
  content: >-
    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に抱かれながら、胸を差し出していた。

    %CALLNAME:MASTER%の唇が%CALLNAME:TARGET%の乳首に触れ、優しく吸い上げる。

    「はぁっ……そう……そこ……」

    %CALLNAME:TARGET%は瀟洒な仮面を脱ぎ捨て、甘い声を漏らしている。

    「……メイドとして恥ずかしい姿ですけれど……」

    「貴方になら……全てを見せられますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の頭を優しく抱きしめた。

    「あっ……やぁ……」

    %CALLNAME:MASTER%の舌が%CALLNAME:TARGET%の乳首を転がしている。

    %CALLNAME:TARGET%は体を震わせながら、恋人の愛撫を受け入れていた。

    「……そんなに、吸われると……時間が、止まったみたいに……」

    %CALLNAME:TARGET%は熱い息を吐きながら、%CALLNAME:MASTER%を見つめている。

    「……%CALLNAME:MASTER%、お上手ですわ……」

    「私の体のこと……全部、覚えてくださって……嬉しいですの……」

    完璧なメイドが見せる、恋人への甘えた表情だった。

    「んっ……ふぁ……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の乳首を口に含み、舌で弄んでいる。

    %CALLNAME:TARGET%の背が反り、小さな嬌声が漏れた。

    「……お嬢様には、決して見せられない姿ですわね……」

    %CALLNAME:TARGET%は頬を染めながらも、%CALLNAME:MASTER%から離れようとしない。

    「……もっと……吸ってくださいまし……」

    %CALLNAME:TARGET%は恥じらいながら囁いた。

    恋人の前でだけ見せる、瀟洒なメイドの甘い素顔だった。

    「はぁっ……あ……」

    %CALLNAME:MASTER%の唇が%CALLNAME:TARGET%の胸を愛撫している。

    %CALLNAME:TARGET%は目を閉じ、ただ快感に身を委ねていた。

    「……貴方に触れられていると……時を止める能力も、忘れてしまいますわ……」

    %CALLNAME:TARGET%は恍惚とした表情で%CALLNAME:MASTER%を見つめた。

    「……私の全て……貴方のものですから……」

    「……遠慮なく、楽しんでくださいまし……」

    %CALLNAME:TARGET%は恋人だけに見せる笑顔で、%CALLNAME:MASTER%に体を預けた。
