- id: fallback
  content: >-
    「それ、何なのさ？　丸いのがいっぱいくっついてる」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つアナルビーズを無表情で見つめた。

    「私のお尻に入れるの？　……きゅっとしたら壊れちゃうのさ」

    その言葉が何を意味するのか、判断がつかなかった。

    挿入されると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……ふぅん。一個ずつ入るんだ。数珠みたいなのさ」

    「きゅっとしてドカーンって知ってる？」

    %CALLNAME:人物_フラン%はアナルビーズを見ながら、無邪気に言った。

    「私、なんでも壊せるのさ。その丸いのだって」

    しかし、%CALLNAME:MASTER%が挿入を始めると、%CALLNAME:人物_フラン%は目を丸くした。

    「……っ！　なにこれ……お尻の中にどんどん……変なのさ……」

    悪魔の妹は、予想外の感覚に戸惑っているようだった。

    「……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を無表情で見つめた。

    「私のお尻に何か入れるの？　つまらないことしたら、遊んであげないのさ」

    アナルビーズが挿入され始めると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……っ……何、これ。中にぷちぷち入ってくる……」

    495年の孤独が育てた警戒心が、一瞬揺らいだように見えた。

    「あなた、コンティニューできないのさ」

    %CALLNAME:人物_フラン%は不穏なことを口にしながら、アナルビーズを見つめた。

    「でも、それ、ちょっと気になるの。私のお尻に入れてみてよ」

    %CALLNAME:MASTER%が一珠ずつ入れていくと、%CALLNAME:人物_フラン%は小さく身を震わせた。

    「……ふぅん。外の世界って、変なものがあるね。お尻に入れる数珠なんて」

    %CALLNAME:人物_フラン%は興味を持ったようだった。
  priority: 1
