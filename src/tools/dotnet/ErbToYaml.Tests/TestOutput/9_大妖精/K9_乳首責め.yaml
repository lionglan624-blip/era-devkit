    「……もっと、触っていいよ……わたし、%CALLNAME:MASTER%のものだから……」

    妖精は小さな声でそう囁き、%CALLNAME:MASTER%に身を寄せた。

    「ふふっ……%CALLNAME:MASTER%、乳首が好きなの……？」

    %CALLNAME:人物_大妖精%は微笑みながら、%CALLNAME:MASTER%の愛撫を受けている。

    指先で軽くつままれるたび、小さな声が漏れる。

    「あっ……くすぐったい……でも、気持ちいいの……」

    %CALLNAME:人物_大妖精%の翅がきらきらと輝き、幸せそうに揺れていた。

    「……%CALLNAME:MASTER%に触ってもらえると、体がぽかぽかするよ……」

    %CALLNAME:人物_大妖精%は照れくさそうに頬を赤くした。

    「やっ……引っ張っちゃ……だめなの……」

    %CALLNAME:人物_大妖精%は弱々しく抗議したが、その声は喜びに震えていた。

    %CALLNAME:MASTER%が乳首を軽く引っ張ると、妖精の体が小さく跳ねる。

    「んあっ……！　そんなことされたら……声、出ちゃうよ……」

    %CALLNAME:人物_大妖精%は熱い息を吐きながら、%CALLNAME:MASTER%にしがみついた。

    「……%CALLNAME:MASTER%のいじわる……でも、嫌いじゃないの……」

    涙目になりながらも、%CALLNAME:人物_大妖精%は幸せそうだった。

    「……ん……%CALLNAME:MASTER%……」

    %CALLNAME:人物_大妖精%は目を閉じて、%CALLNAME:MASTER%の指に身を任せている。

    乳首をくりくりと転がされ、妖精の体が小さく震えていた。

    「……%CALLNAME:MASTER%といると……体が素直になっちゃうの……」

    %CALLNAME:人物_大妖精%は紅潮した顔で、恋人を見上げた。

    「……ずっと……こうしてたいな……」

    小さな妖精は、%CALLNAME:MASTER%の胸に顔を埋めた。
