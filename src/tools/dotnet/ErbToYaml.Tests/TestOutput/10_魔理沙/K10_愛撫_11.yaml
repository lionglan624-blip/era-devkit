    「%CALLNAME:MASTER%……私はそんなに安い女じゃないぜ」

    %CALLNAME:TARGET%は冷たい視線を%CALLNAME:MASTER%に向けた。

    「……もう少し、人の気持ちを考えろよな」

    魔理沙は失望したように首を横に振った。

    「お、おい……何を言って……」

