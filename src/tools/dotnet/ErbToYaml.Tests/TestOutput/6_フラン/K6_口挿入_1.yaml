character: フラン
situation: K6_口挿入
entries:
- id: fallback
  content: >-
    「ねえ、%CALLNAME:MASTER%……口で、してあげたいの……」

    %CALLNAME:人物_フラン%は恋人の前にひざまずき、そそり立つものを見つめた。

    紅い瞳に愛しさが滲み、そっと唇を近づける。

    「んっ……%CALLNAME:MASTER%の匂い……好き……」

    %CALLNAME:人物_フラン%は一物にそっと口づけし、舌先で輪郭をなぞり始めた。

    「壊したくないから……優しく、するね……ちゅ、れろ……」

    495年の孤独を知る少女は、壊すことなく愛せる喜びに浸っていた。

    「%CALLNAME:MASTER%のここ……私の口で温めてあげる……」

    %CALLNAME:人物_フラン%は嬉しそうに微笑みながら、亀頭を口に含んだ。

    舌を這わせながら、恋人の反応を窺う。

    「ん、ちゅ……おいしいのさ……%CALLNAME:MASTER%の味……」

    %CALLNAME:人物_フラン%はゆっくりと深く咥え、唾液を絡ませていく。

    「もっと奥まで……んむ……ちゅる……気持ちいい……？」

    恋人への奉仕に、%CALLNAME:人物_フラン%の頬も紅く染まっていた。

    「こうして%CALLNAME:MASTER%を咥えてると……繋がってる気がするの……」

    %CALLNAME:人物_フラン%は恋人に寄り添いながら、一物を頬張っていた。

    地下室の孤独を知る少女にとって、この温もりは何よりの証。

    「んふふ……%CALLNAME:MASTER%、ぴくぴくしてる……じゅる……」

    %CALLNAME:人物_フラン%は嬉しそうに舌を動かし、鈴口を舐め上げた。

    「私が気持ちよくしてあげるから……ずっと一緒にいてね……」

    その言葉には、純粋な愛と繋がりへの渇望が込められていた。

    「%CALLNAME:MASTER%……大好き……んむ……」

    %CALLNAME:人物_フラン%は恋人の一物を咥えながら、上目遣いで見つめていた。

    紅い瞳には%CALLNAME:MASTER%だけが映り、口は奉仕を止めない。

    「私の口……%CALLNAME:MASTER%のために使って……ちゅる、れろ……」

    %CALLNAME:人物_フラン%は愛おしそうに茎を舐め、唾液を纏わりつかせた。

    「出そうになったら……口の中に出していいよ……？」

    悪魔の妹は、恋人への奉仕に心から満たされていた。
