- id: fallback
  content: >-
    「は……？　何言ってんの！？」

    チルノは%CALLNAME:MASTER%の要求に、目を見開いた。

    「自分を触れ……って、頭おかしいんじゃないの！？」

    チルノは怒りを露わにして、%CALLNAME:MASTER%を睨みつけた。

    「そんなの見せるわけないでしょ！　最低！」

    チルノは拒絶の姿勢を崩さなかった。

    「ちょっ……何言い出すのよ！」

    チルノは驚きと怒りで声を上げた。

    「あたいが%CALLNAME:MASTER%の前でそんなこと……」

    チルノは言葉を詰まらせながら、顔を真っ赤にした。

    「……するわけないでしょ！　馬鹿にしないで！」

    チルノは怒って%CALLNAME:MASTER%から離れた。

    「……は？　意味わかんないんだけど」

    チルノは冷めた目で%CALLNAME:MASTER%を見た。

    「%CALLNAME:MASTER%って変態なの？　気持ち悪い……」

    チルノは嫌悪感を隠そうともしない。

    「あたいに近づかないでくれる？」

    チルノは%CALLNAME:MASTER%を拒絶した。

    「なんでそんなこと言うのよ……」

    チルノは困惑と不快感を滲ませた表情で%CALLNAME:MASTER%を見た。

    「%CALLNAME:MASTER%ってあたいのこと何だと思ってるの」

    チルノは腕を組んで、警戒の姿勢を取った。

    「そういうのは……ありえないから」

    チルノはきっぱりと拒否した。
