character: レミリア
situation: K5_愛撫
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、見たいの？　ここを」

    %CALLNAME:人物_レミリア%はそう囁くと、自ら脚を開いて見せた。

    500年を生きた吸血鬼が、恋人だけに見せる秘められた場所。

    「ふふ……%CALLNAME:MASTER%だけよ、こんな姿を見せるのは」

    %CALLNAME:MASTER%が両指でその秘貝を押し開くと、鮮やかな紅い蕾が現れた。

    %CALLNAME:人物_レミリア%は頬を染めながらも、愛おしそうに%CALLNAME:MASTER%を見つめていた。

    「私の全て……%CALLNAME:MASTER%のものよ」

    「んっ……そんなにじっくり見られると、恥ずかしいわ……」

    %CALLNAME:MASTER%が%CALLNAME:人物_レミリア%の秘貝を指で押し開くと、甘い声が漏れた。

    吸血鬼の冷たいはずの肌が、そこだけほんのりと熱を帯びている。

    「あっ……中まで見ないで……」

    %CALLNAME:MASTER%は構わずじっくりとその膣内を覗き込んだ。

    鮮やかな桃色に染まり、愛液が滴っている。

    「……%CALLNAME:MASTER%のいじわる……でも、嫌いじゃないわよ」

    %CALLNAME:人物_レミリア%は恥ずかしそうに、でも嬉しそうに微笑んだ。

    「……開いて、見せてあげる」

    %CALLNAME:人物_レミリア%は自らの手で陰唇を左右に広げて見せた。

    紅魔館の主が、恋人のためだけに見せる姿。

    「ふふ……%CALLNAME:MASTER%、どう？　綺麗？」

    鮮やかな紅色の秘部が、%CALLNAME:MASTER%の目の前に晒されている。

    %CALLNAME:MASTER%がふっと息を吹きかけると、

    「ひゃっ……！　もう、意地悪しないで……」

    %CALLNAME:人物_レミリア%は身体を震わせながらも、嬉しそうに笑った。

    「%CALLNAME:MASTER%……もっと、見て」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手を取り、自らの秘部へと導いた。

    %CALLNAME:MASTER%がその秘貝を両指で押し開くと、蕾が収縮を繰り返した。

    「やぁ……そこ、見られると……」

    %CALLNAME:人物_レミリア%の膣内は鮮やかな紅に染まり、愛液で濡れている。

    %CALLNAME:MASTER%が陰核を指先で軽く触れると、

    「あっ……！　んん……」

    %CALLNAME:人物_レミリア%は甘い声を上げ、全てを恋人に委ねていた。
  priority: 4
- id: talent_3_1
  content: >-
    「なっ……何をする気！？」

    %CALLNAME:MASTER%が%CALLNAME:人物_レミリア%の秘部に手を伸ばすと、慌てた声が上がった。

    「そ、そこを……開くなんて……っ」

    %CALLNAME:MASTER%が両指で秘貝を押し開くと、

    「やっ……見ないで……！」

    %CALLNAME:人物_レミリア%は顔を真っ赤にして抵抗したが、力は入っていない。

    鮮やかな紅の蕾が%CALLNAME:MASTER%の目の前に晒されていた。

    「……恥ずかしいじゃない、馬鹿……」

    「ちょっ……そこ、開かないで……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手を押さえようとした。

    だが%CALLNAME:MASTER%は構わずその秘貝を左右に広げていく。

    「あ……やぁ……そんな、じろじろ見ないでよ……」

    %CALLNAME:人物_レミリア%は両手で顔を覆って恥ずかしがっている。

    その隙間から、潤んだ紅い瞳がこちらを覗いていた。

    「……%CALLNAME:MASTER%の、変態……」

    罵倒しながらも、%CALLNAME:人物_レミリア%の身体は拒絶していなかった。

    「……っ、何がしたいの」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を睨みつけた。

    だが%CALLNAME:MASTER%がその場所を押し開くと、

    「ひっ……！　あ、開いちゃ……だめ……」

    %CALLNAME:人物_レミリア%の抵抗は弱く、秘貝は容易く開かれていった。

    「見ないでったら……恥ずかしいから……」

    鮮やかな膣内が%CALLNAME:MASTER%の視線に晒されている。

    「……もう、%CALLNAME:MASTER%のこと、嫌いになるわよ……嘘だけど」

    「え……何、舐めるの……？」

    %CALLNAME:人物_レミリア%は期待と不安の混じった目で%CALLNAME:MASTER%を見た。

    だが%CALLNAME:MASTER%はそうせず、両指で秘貝を左右に開いただけ。

    「ぇ……え？　何を……」

    %CALLNAME:人物_レミリア%は何をされているかわからず困惑している。

    「――ぁ、だめっ！　開いたままにしないで！」

    %CALLNAME:人物_レミリア%は顔を真っ赤にして訴えた。

    「見るだけなんて……いじわるだわ……」
