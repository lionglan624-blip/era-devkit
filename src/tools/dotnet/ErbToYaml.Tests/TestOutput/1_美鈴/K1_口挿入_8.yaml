    「……ですが、お好きにどうぞ」

    鍛え抜かれた腰が、機械的に動いていた。

    「……わかりました」

    %CALLNAME:人物_美鈴%は小さく頷いた。

    「……私が%CALLNAME:MASTER%に……するのですね」

    %CALLNAME:人物_美鈴%は事務的に告げながら、腰を動かした。

