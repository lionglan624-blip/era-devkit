- id: fallback
  content: >-
    「えっ……%CALLNAME:MASTER%……？」

    %CALLNAME:TARGET%は突然の行為に目を見開いた。

    %CALLNAME:MASTER%の唇が%CALLNAME:TARGET%の乳首に触れている。

    「……っ……なにを……」

    %CALLNAME:TARGET%は抵抗しようとして、動きを止めた。

    「……困りますわ……そのようなことをされると……」

    %CALLNAME:TARGET%は複雑な表情で、%CALLNAME:MASTER%を見下ろしている。

    「……でも、強く拒むのも……何故か、できませんの……」

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に胸を吸われ、声を詰まらせた。

    「……そのような行為は……メイドに対して……」

    %CALLNAME:TARGET%の言葉は、次第に小さくなっていく。

    「……っ……感じて、しまいますわ……」

    %CALLNAME:TARGET%は自分の反応に戸惑いながらも、%CALLNAME:MASTER%を見つめていた。

    「……%CALLNAME:MASTER%は……私をどう思っていらっしゃるのかしら……」

    瀟洒なメイドの心に、淡い期待が芽生えていた。

    「あっ……」

    %CALLNAME:MASTER%の舌が%CALLNAME:TARGET%の乳首を転がしている。

    %CALLNAME:TARGET%は声を漏らし、慌てて口を押さえた。

    「……恥ずかしいですわ……」

    「……こんな姿を見られるなんて……」

    %CALLNAME:TARGET%は顔を赤くしながらも、%CALLNAME:MASTER%を押しのけようとしなかった。

    「……%CALLNAME:MASTER%には……特別な感情が、あるのかもしれませんわね……」

    %CALLNAME:TARGET%は小さく独り言のように呟いた。

    「んっ……や……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の胸を愛撫し続けている。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の肩に手を置き、力なく掴んでいた。

    「……なぜ……%CALLNAME:MASTER%にされると、抵抗できないのでしょう……」

    %CALLNAME:TARGET%は自分の心に問いかけるように呟いた。

    「……お嬢様への忠誠に変わりはありませんけれど……」

    「……%CALLNAME:MASTER%のことも……気になってしまいますの……」

    瀟洒なメイドの瞳が、複雑な色を帯びていた。
