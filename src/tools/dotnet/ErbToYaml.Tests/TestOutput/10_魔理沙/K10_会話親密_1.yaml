- id: fallback
  content: >-
    「――ん？　……お茶か」

    %CALLNAME:TARGET%は少し警戒した様子で湯飲みを見つめている。

    「変なもの入れてないだろうな？」

    半分冗談のように言いながら、%CALLNAME:TARGET%はお茶を受け取った。

    ずず、と様子を窺いながらお茶を啜る。

    「……まあ、普通に美味いな。ありがとう」

    %CALLNAME:TARGET%は素っ気なく礼を言った。

    「お茶？　……ふーん、気が利くじゃないか」

    %CALLNAME:TARGET%は腕を組んだまま、湯飲みを眺めている。

    「……まあ、貰っとくぜ」

    そう言って、%CALLNAME:TARGET%は湯飲みを手に取り、お茶を啜った。

    「……ん、悪くない。次はお菓子もつけてくれよな」

    %CALLNAME:TARGET%は生意気なことを言いながらも、お茶は飲み干した。

    「……私にか？」

    %CALLNAME:TARGET%は怪訝そうな顔で湯飲みを見つめた。

    「……まあ、いただくぜ」

    少し警戒しながらも、お茶を口に運ぶ。

    「……普通のお茶だな。ありがとう」

    %CALLNAME:TARGET%は事務的な口調で言った。

    「何か用があるなら、さっさと言えよな」

    「え……お茶？」

    %CALLNAME:TARGET%は不思議そうに首を傾げた。

    「……何か用があるのか？」

    そう言いながらも、差し出された湯飲みを受け取る。

    「……まあ、ありがとう」

    %CALLNAME:TARGET%は距離を保ったまま、お茶を飲み始めた。

    「……もうちょっと仲良くなったら、私も淹れてやるぜ」
  priority: 1
