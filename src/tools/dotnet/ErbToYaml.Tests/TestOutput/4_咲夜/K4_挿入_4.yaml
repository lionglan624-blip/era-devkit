- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%の上に跨った。

    「お客様のご要望ですから……私がリードいたしますわ」

    事務的に腰を下ろし、%CALLNAME:TARGET%は%CALLNAME:MASTER%を受け入れた。

    「……このペースで進めます」

    「ご不満でしたら……仰ってくださいまし」

    瀟洒なメイドは、あくまで業務として腰を動かした。

    「……ふぅ……」

    %CALLNAME:TARGET%は小さく息を吐きながら、%CALLNAME:MASTER%を見下ろした。

    「こうして上にいると……仕事がしやすいですわね」

    「私のペースで……効率よく終わらせましょう」

    %CALLNAME:TARGET%は機械的に腰を動かし続けた。

    「……感情移入などしませんわよ」

    完璧なメイドは、プロフェッショナルを貫いていた。

    「……これも仕事です」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「上からリードするのも……メイドの技術の一つ……」

    「……っ」

    一瞬、%CALLNAME:TARGET%の表情が揺らいだが、すぐに戻る。

    「……何でもありませんわ」

    冷静さを取り繕いながら、%CALLNAME:TARGET%は腰を動かし続けた。

    「……貴方に感情を見せる必要はありませんわ」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見下ろした。

    「私がリードしているだけ。それ以上の意味はありません」

    「……ん……」

    僅かに声が漏れ、%CALLNAME:TARGET%は唇を噛んだ。

    「……早く終わらせてください。お嬢様がお呼びですので」

    瀟洒な従者は、最後まで感情を見せなかった。
