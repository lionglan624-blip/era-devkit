entries:
- id: fallback
  content: >-
    「ん……こうやって舐めると……気持ちいいのか？」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の一物を口に含んだ。

    「んむ……ちょっと苦いな……でも、嫌いじゃないぜ」

    %CALLNAME:人物_魔理沙%は恋人の反応を見ながら、舌を動かし始めた。

    「れろ……ん、ちゅ……どうだ、気持ちいいか……？」

    %CALLNAME:人物_魔理沙%は上目遣いで%CALLNAME:MASTER%を見つめながら奉仕を続けた。

    「ふふ……お前のここ、すごく熱いな」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の一物に頬ずりした。

    「私にこんなことさせるなんて……特別だぞ、お前は」

    「んっ……はむ……ちゅる……」

    %CALLNAME:人物_魔理沙%は愛おしそうに一物を舐め上げた。

    「もっと気持ちよくしてやるから……楽しみにしてろよ」

    「……だんだん上手くなってきただろ？」

    %CALLNAME:人物_魔理沙%は自信ありげに笑いながら、舌を這わせた。

    「れろ……ん、じゅる……前より、反応してるぜ」

    %CALLNAME:MASTER%が気持ちよさそうにすると、%CALLNAME:人物_魔理沙%は得意げになった。

    「ふふん、私だって努力してるんだぜ……お前のためにな」

    %CALLNAME:人物_魔理沙%は恋人を喜ばせることに夢中になっていた。

    「なあ……ちゃんとこっち見てろよ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の目を見つめながら、一物を咥えた。

    「んむ……私が奉仕してるとこ……ちゃんと見ててくれ」

    「ちゅる……れろ……ん……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに頬を染めながらも、舌を動かし続けた。

    「……見られてると、なんか……頑張れるんだぜ」
  priority: 4
- id: talent_3_1
  content: >-
    「ち、違うからな！　べ、別にしたかったわけじゃ……」

    %CALLNAME:人物_魔理沙%は顔を真っ赤にしながら、%CALLNAME:MASTER%の一物に顔を近づけた。

    「頼まれたから……仕方なくやってるだけだぜ……」

    「ん……はむ……」

    %CALLNAME:人物_魔理沙%は照れ隠しに強がりながらも、懸命に舌を動かした。

    「ちゅ、れろ……あっ……な、なんだよ、見るなよ……」

    「こ、こんなの……変態なんだからな、お前は」

    %CALLNAME:人物_魔理沙%は文句を言いながらも、一物を口に含んだ。

    「んむ……ちゅる……苦い……」

    「……でも、気持ちいいなら……まあ、仕方ないか」

    %CALLNAME:人物_魔理沙%の舌使いは慣れないながらも、一生懸命だった。

    「れろ……勝手に変な声出すなよ……恥ずかしいだろ……」

    「んっ……なんか、大きくなってきた……？」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、舌を動かし続けた。

    「こ、これって……気持ちいいってことなんだよな……？」

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_魔理沙%は複雑な表情になった。

    「ちゅる、れろ……別に嬉しくなんかないぜ……」

    「……ただ、悪い気はしないってだけだ」

    「……もうちょっと反応してくれてもいいんだぜ」

    %CALLNAME:人物_魔理沙%は少し不満そうに一物を舐めた。

    「こっちは一生懸命やってるんだから……」

    「んむ……じゅる……ちゅ……」

    %CALLNAME:MASTER%が気持ちよさそうな顔をすると、%CALLNAME:人物_魔理沙%は照れた。

    「なっ……そ、そんな顔されると困る……もう、勝手にしろよ……」
