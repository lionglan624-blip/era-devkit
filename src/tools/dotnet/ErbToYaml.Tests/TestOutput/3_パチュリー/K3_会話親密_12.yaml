- id: fallback
  content: >-
    %CALLNAME:MASTER%の手が%CALLNAME:人物_パチュリー%の体に伸びた。

    「……何をしているの」

    %CALLNAME:人物_パチュリー%は冷たい目でこちらを見据え、魔法の気配を漂わせた。

    「そういう行為は、信頼関係があってこそのものよ」

    「私に触れたいなら、まず私の信頼を得なさい」

    「……触らないで」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の手を払いのけ、魔導書を構えた。

    「あなたには、そういうことをする権利はないわ」

    %CALLNAME:人物_パチュリー%は冷ややかな声で言い放った。

    「距離感というものを弁えなさい」

    「……何のつもりかしら」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%を無表情で見つめた。

    「私の体に興味があるなら、まずは知識を深めることをお勧めするわ」

    「今のあなたでは、話にならないの」

    %CALLNAME:人物_パチュリー%は冷淡に言い、再び本に視線を落とした。

    「やめなさい」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の行動を制止し、冷たい視線を向けた。

    「……どうしてそんなことをするの？ 理解できないわ」

    %CALLNAME:人物_パチュリー%は困惑と不快感を露わにした。

    「出て行きなさい。読書の邪魔よ」
  priority: 1
