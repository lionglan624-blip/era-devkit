  content: >-
    「んっ……あぁっ……そこ、変な感じなのさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%に後ろの穴をいじられ、甘い声を漏らしている。

    七色の翼がぴくぴくと震え、快楽に反応している。

    「%CALLNAME:MASTER%……フランのこと、全部知りたいの？」

    %CALLNAME:人物_フラン%は上気した顔で振り返り、無邪気に微笑んだ。

    「いいよ……全部、%CALLNAME:MASTER%にあげる……」

    「壊さないでいてくれるの、%CALLNAME:MASTER%だけだから……永遠にそばにいてね」

    「ひゃっ……やぁん……そこ、くすぐったいのさ……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_フラン%の秘められた場所を撫でている。

    「495年間……誰にも触らせなかった場所なのに……」

    %CALLNAME:人物_フラン%は体をもじもじさせながら、%CALLNAME:MASTER%を見上げた。

    「%CALLNAME:MASTER%だから……特別なのさ……」

    %CALLNAME:人物_フラン%は嬉しそうに尻を%CALLNAME:MASTER%に押し付けた。

    「もっと……もっとして……壊れそうだけど、違う意味で……」

    「あっ……ん……そこ、ビクってなっちゃう……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%に後孔を愛撫され、体を震わせている。

    無邪気な表情が、快楽に蕩けていく。

    「ふふ……お姉様には秘密だよ？」

    %CALLNAME:人物_フラン%は悪戯っぽく微笑んだ。

    「だって……こんなの見られたら、きっと嫉妬するもの……」

    「%CALLNAME:MASTER%は、フランだけのものなのさ」

    「んぁっ……あ、ああ……すごい……」

    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の後ろの穴を執拗に弄んでいる。

    七色の翼が快楽に震え、宝石のように輝いている。

    「%CALLNAME:MASTER%……フランね、こういうの初めてなのさ……」

    %CALLNAME:人物_フラン%は甘えるように%CALLNAME:MASTER%にもたれかかった。

    「でも……%CALLNAME:MASTER%とならなんでも楽しいの……」

    「永遠に……こうしていたいな……」
