entries:
- id: fallback
  content: >-
    「ねえ、%CALLNAME:MASTER%……私が上になって、こうするの……」

    %CALLNAME:人物_フラン%は恋人の上に跨りながら、紅い瞳を輝かせた。

    自分のものを恋人の後孔に押し当てると、嬉しそうに微笑んだ。

    「%CALLNAME:MASTER%の中……私が入っていくのさ……」

    ゆっくりと腰を沈めると、%CALLNAME:人物_フラン%は甘い吐息を漏らした。

    「壊さないように……でも、奥まで入れたいの……」

    495年の孤独を知る少女は、恋人を自分のものにする喜びに震えていた。

    「%CALLNAME:MASTER%のお尻、私だけのものなのさ……」

    %CALLNAME:人物_フラン%は正常位の体勢で恋人を見下ろしながら呟いた。

    恋人の後孔に挿入しながら、愛おしそうに頬を撫でる。

    「んっ……締め付けてくる……私のこと、受け入れてくれてるの……？」

    %CALLNAME:人物_フラン%は腰をゆっくりと動かし始めた。

    「壊さないでいられるよ……こうして繋がってると、私、落ち着くの……」

    悪魔の妹は、恋人との結合に紅い瞳を潤ませていた。

    「えへへ……%CALLNAME:MASTER%が私を受け入れてくれるの、嬉しいのさ」

    %CALLNAME:人物_フラン%は恋人の両脚を抱えながら、無邪気に微笑んだ。

    正常位の体勢で挿入しながら、愛しそうに顔を見つめている。

    「私のが……%CALLNAME:MASTER%の奥に入ってる……すごい……」

    %CALLNAME:人物_フラン%は恋人の反応を確かめながら腰を動かした。

    「もっと深くまで……%CALLNAME:MASTER%の全部が欲しいの……」

    495年の孤独を経た少女は、恋人を独占する幸福に酔いしれていた。

    「%CALLNAME:MASTER%……こうして上から見ると、全部見えるのさ」

    %CALLNAME:人物_フラン%は正常位で恋人を貫きながら、紅い瞳を細めた。

    恋人の表情が歪むのを見て、嬉しそうに翼をぱたぱたと揺らす。

    「私が動くと、%CALLNAME:MASTER%の顔が変わるの……かわいいのさ……」

    %CALLNAME:人物_フラン%は奥まで突き入れながら、恋人に覆いかぶさった。

    「壊さないよ……大事な%CALLNAME:MASTER%だもん……ずっと一緒にいたいから……」

    悪魔の妹は、恋人を愛する喜びに満たされていた。
