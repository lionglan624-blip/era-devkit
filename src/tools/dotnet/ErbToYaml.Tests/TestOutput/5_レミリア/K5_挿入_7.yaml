- id: fallback
  content: >-
    「……ほう、こういう体勢がいいの？」

    %CALLNAME:人物_レミリア%は興味深げに%CALLNAME:MASTER%を見下ろした。

    胡坐を掻く%CALLNAME:MASTER%の上に跨り、ゆっくりと腰を落とす。

    「んっ……なるほど、向かい合うと確かに……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の顔を観察しながら、深く受け入れた。

    「……ふぅん、こういう感覚も、悪くないわね」

    500年の吸血鬼は、新たな快楽を冷静に味わっていた。

    「……座位、ね。面白い趣向だわ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の上に乗り、陰茎に手を添えた。

    「どれ、試してあげましょう」

    %CALLNAME:人物_レミリア%がゆっくりと沈み込むと、息が漏れた。

    「っ……あぁ……奥まで、挿入ったわね……」

    %CALLNAME:人物_レミリア%は実験するように腰を動かした。

    「……まあ、及第点をあげてもいいわ」

    その声には、隠しきれない快感が滲んでいた。

    「……使用人が主を抱くにしては、大胆な体勢ね」

    %CALLNAME:人物_レミリア%は値踏みするように言い、%CALLNAME:MASTER%の上に座った。

    向かい合う体勢で、互いの表情がよく見える。

    「んっ……そう、こうするのね……」

    %CALLNAME:人物_レミリア%は腰を落とし、%CALLNAME:MASTER%を深く受け入れた。

    「……ふぅん、顔が見えると……また違うものね」

    吸血鬼の心に、認めたくない何かが芽生え始めていた。

    「……今日は機嫌がいいから、付き合ってあげるわ」

    %CALLNAME:人物_レミリア%は溜息混じりに%CALLNAME:MASTER%の胡坐の上に座った。

    「こうして向かい合うのが好きなのかしら……」

    %CALLNAME:人物_レミリア%が腰を沈めると、小さく声が漏れた。

    「あ……っ、深い……」

    %CALLNAME:人物_レミリア%は息を整えながら、%CALLNAME:MASTER%を見つめた。

    「……まあ、退屈しのぎには、なるわね」

    紅魔館の主は、湧き上がる感情を認めようとしなかった。
  priority: 2
- id: fallback
  content: >-
    「……何よ、その体勢は」

    %CALLNAME:人物_レミリア%は冷たい視線で胡坐を掻く%CALLNAME:MASTER%を見下ろした。

    「ふん……私に跨れとでも言うの？ 身の程知らずね」

    それでも%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の上に座り、腰を落とした。

    「っ……ほう、こういう感覚……」

    %CALLNAME:人物_レミリア%は表情を変えずに%CALLNAME:MASTER%を飲み込んだ。

    「……下僕の奉仕として、受け取っておいてあげるわ」

    紅魔館の主は、高慢な態度を崩さなかった。

    「……随分と図々しい体勢を要求するのね」

    %CALLNAME:人物_レミリア%は不敵に微笑み、%CALLNAME:MASTER%の上に乗った。

    「まあいいわ。私を楽しませなさい」

    %CALLNAME:人物_レミリア%がゆっくりと腰を沈めると、わずかに目を細めた。

    「……ふぅん、悪くはないわね」

    %CALLNAME:人物_レミリア%は余裕の表情で%CALLNAME:MASTER%を見下ろした。

    「精々、私を満足させることね」

    500年の吸血鬼は、感情を表に出さずに快楽を受け入れていた。

    「……ほう、向かい合ってするつもり？」

    %CALLNAME:人物_レミリア%は興味なさそうに言い、%CALLNAME:MASTER%の胡坐の上に座った。

    「顔が見えようと、私の心は揺るがないわよ」

    %CALLNAME:人物_レミリア%が腰を落とすと、小さく息を吐いた。

    「……その程度で私を悦ばせられると思うな」

    だが、%CALLNAME:人物_レミリア%の呼吸はわずかに乱れていた。

    「……退屈しのぎには、なるかしらね」

    威厳を保ちながら、吸血鬼は使用人を利用していた。

    「……使用人が主にこんな体勢を要求するとはね」

    %CALLNAME:人物_レミリア%は溜息をつき、%CALLNAME:MASTER%の上に跨った。

    「今日は気まぐれで付き合ってあげているのよ？ 感謝しなさい」

    %CALLNAME:人物_レミリア%が腰を沈めると、表情がわずかに揺らいだ。

    「……ふん、まあ、及第点ね」

    %CALLNAME:人物_レミリア%は感情を押し殺しながら%CALLNAME:MASTER%を見下ろした。

    「……それで、いつまで続けるつもり？」

    紅魔館の主は、高飛車な態度を最後まで崩さなかった。
  priority: 1
