    「んっ……あ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_大妖精%は恋人の名を呼びながら、自らの秘所を弄っていた。

    翅がぴくぴくと震え、快楽が高まっていることを示している。

    「……%CALLNAME:MASTER%のこと、考えながら……するの……」

    %CALLNAME:人物_大妖精%は潤んだ瞳で%CALLNAME:MASTER%を見上げた。

    「……こうしてると、%CALLNAME:MASTER%に触られてるみたいで……」

    %CALLNAME:人物_大妖精%は恋人への想いを胸に、自らを慰め続けた。

    「……%CALLNAME:MASTER%、見てて……わたし、頑張るから……」

    %CALLNAME:人物_大妖精%は恥ずかしさを堪えながら、自慰を始めた。

    指が秘所に触れるたび、小さな声が漏れていく。

    「あ……やっ……気持ちいい……よ……」

    %CALLNAME:人物_大妖精%は恋人に見守られる幸せを感じながら、自らを愛撫した。

    「……%CALLNAME:MASTER%がいると、安心して……できるの……」

