    %CALLNAME:人物_魔理沙%は自分から%CALLNAME:MASTER%の手を取って、胸に導いた。

    「……触って、ほしかったんだぜ……恥ずかしいけど……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに、でも嬉しそうに微笑んでいる。

    「んっ……ふぁ……%CALLNAME:MASTER%の手、好きだぜ……」

