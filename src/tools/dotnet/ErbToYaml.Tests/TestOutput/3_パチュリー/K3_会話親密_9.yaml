entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の唇にそっと口付けた。

    「ん……ちゅ、る……れろ……」

    %CALLNAME:人物_パチュリー%は本を静かに閉じ、%CALLNAME:MASTER%の口付けに応えている。

    しばらく互いの唇を重ね合った後、%CALLNAME:人物_パチュリー%は小さく息を吐いた。

    「はぁ……ふぅ……」

    %CALLNAME:人物_パチュリー%の頬はほんのりと上気し、瞳は潤んでいる。

    「……キスの魔法というものがあるのを知っているかしら」

    「相手を虜にする、とても危険な術よ。……私も、かかってしまったようね」

    %CALLNAME:人物_パチュリー%は読みかけの本を閉じ、%CALLNAME:MASTER%に視線を向けた。

    %CALLNAME:MASTER%がそっと唇を重ねると、%CALLNAME:人物_パチュリー%は静かに目を閉じた。

    「んむ……ちゅる……んっ……」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の首に腕を回し、深く口付けを交わしている。

    「……ぷ、はぁ……はぁ……」

    唇を離すと、%CALLNAME:人物_パチュリー%は恍惚とした表情を浮かべていた。

    「……不思議ね。あなたとのキスは、どんな魔導書より心を揺さぶるわ」

    %CALLNAME:人物_パチュリー%は照れたように視線を逸らした。

    大図書館の静寂の中、%CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%に口付けた。

    「ん……んちゅ……れろ、る……」

    %CALLNAME:人物_パチュリー%は目を閉じ、甘く%CALLNAME:MASTER%の口付けに応えている。

    二人の息遣いだけが、本棚の間に静かに響いた。

    「ちゅ、ぷ……ん……はぁっ……」

    唇を離すと、%CALLNAME:人物_パチュリー%は潤んだ瞳で%CALLNAME:MASTER%を見つめた。

    「……あなたの唇、とても暖かいわ」

    「この体温が……私には心地いいの」

    「……キス、してくれるの？」

    %CALLNAME:人物_パチュリー%は珍しく自分から%CALLNAME:MASTER%に顔を寄せた。

    「んっ……ちゅ、る……ん、む……」

    唇が触れ合うと、%CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の服をきゅっと掴んだ。

    しばらく深く口付けを交わした後、%CALLNAME:人物_パチュリー%は満足げに微笑んだ。

    「ふぅ……ぷはっ……」

    「……あなたとのキスは、いつも心が満たされるわ」

    %CALLNAME:人物_パチュリー%は珍しく穏やかな表情を浮かべていた。
