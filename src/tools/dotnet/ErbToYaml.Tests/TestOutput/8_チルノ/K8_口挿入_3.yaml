- id: fallback
  content: >-
    「え……素股……？　これを足で挟むの……？」

    %CALLNAME:人物_チルノ%は困惑した表情で%CALLNAME:MASTER%の一物を見つめた。

    「う、うーん……まあ、いいけど……」

    渋々といった様子で、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上に跨った。

    「ひゃっ！　なにこれ、すっごく熱い……」

    一物に太ももが触れた瞬間、%CALLNAME:人物_チルノ%は驚いて声を上げた。

    「……こ、こうすればいいの……？」

    戸惑いながらも、%CALLNAME:人物_チルノ%はゆっくりと腰を動かし始めた。

    「ちょ、ちょっと%CALLNAME:MASTER%……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに%CALLNAME:MASTER%を見た。

    「いきなりこんなこと頼むなんて……信じらんない」

    文句を言いながらも、%CALLNAME:人物_チルノ%は一物を太ももで挟んだ。

    「……まあ、あたいは最強だから、できないわけないけどさ」

    強がりを言いつつ、ぎこちなく腰を動かし始めた。

    ぬるり、と一物が太ももの間を滑る。

    「……これで満足なんでしょ？」

    「んー……よくわかんないけど……」

    %CALLNAME:人物_チルノ%は首を傾げながら%CALLNAME:MASTER%の一物を見つめた。

    「こうやって足で挟めばいいの？」

    好奇心半分、戸惑い半分といった様子で太ももを押し当てた。

    「わっ、なんか……ぬるぬるしてきた……」

    %CALLNAME:人物_チルノ%は一物の反応に驚きながらも、興味深そうに動き続けている。

    「……へえ、こうすると気持ちいいんだ」

    少しずつ動きに慣れてきたようだ。

    「……はあ」

    %CALLNAME:人物_チルノ%はため息をつきながら、%CALLNAME:MASTER%の上に座った。

    「あたいにこんなこと頼むなんて……%CALLNAME:MASTER%って変なの」

    そう言いながらも、%CALLNAME:人物_チルノ%は一物に太ももを押し当てた。

    「……まあ、やってあげないこともないけど」

    仕方なさそうに、%CALLNAME:人物_チルノ%はゆっくりと腰を動かし始めた。

    ひんやりとした肌が熱い肉棒を挟み込んでいく。

    「……早く終わらせてよね」
  priority: 2
- id: fallback
  content: >-
    「はあ？　素股？　何言ってんの%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は呆れたような顔をした。

    「なんであたいがそんなことしなきゃいけないのよ」

    %CALLNAME:人物_チルノ%は腕を組んで%CALLNAME:MASTER%を睨んでいる。

    「調子乗んないでよね！　凍らせるわよ！」

    辺りに冷気が漂い始め、%CALLNAME:人物_チルノ%の怒りが伝わってくる。

    ……だが、結局は渋々と%CALLNAME:MASTER%の上に跨った。

    「……ほら、やってやってるんだから感謝しなさいよね」

    「ちょっと……なにさ、これ」

    %CALLNAME:人物_チルノ%は嫌そうな顔で%CALLNAME:MASTER%の一物を見た。

    「こんなのあたいの足で挟めって言うの？　信じらんない」

    %CALLNAME:人物_チルノ%は文句を言いながらも、命令には従った。

    「……ほら、挟んでやってるんだから感謝しなさいよね」

    不機嫌そうに太ももを押し当てると、乱暴に腰を動かし始めた。

    「早く終わらせてよね！」

    冷たい肌が肉棒を挟み、ぎこちなく擦り上げる。

    「あのさ、%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%はじっと%CALLNAME:MASTER%を見つめた。

    「あたいをなんだと思ってんの？」

    %CALLNAME:人物_チルノ%は不満げな表情で腰に手を当てた。

    「最強の妖精であるこのあたいに……そんなこと頼む？」

    %CALLNAME:人物_チルノ%は怒りながらも、結局は%CALLNAME:MASTER%の上に跨った。

    ひんやりとした太ももが一物を挟み込む。

    「……覚えときなさいよね」

    「……」

    %CALLNAME:人物_チルノ%は無言で%CALLNAME:MASTER%を睨んでいる。

    「%CALLNAME:MASTER%って、ほんっと馬鹿じゃないの」

    %CALLNAME:人物_チルノ%は呆れたような声で言い放った。

    「まあいいわ。やってあげる」

    そう言いながら、%CALLNAME:人物_チルノ%は仕方なさそうに%CALLNAME:MASTER%の上に跨った。

    冷たい太ももが一物を挟み、ゆっくりと擦り始める。

    「……でも、あんまり調子に乗んないでよね」
  priority: 1
