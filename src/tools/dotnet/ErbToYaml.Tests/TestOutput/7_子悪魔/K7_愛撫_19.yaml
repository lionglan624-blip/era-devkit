- id: fallback
  content: >-
    「え……えっと……それ、何ですか……？　黒くて、小さい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したニプルキャップを不思議そうに見つめた。

    「……お、おっぱいに……付ける……？　ほ、本当ですか……？」

    おずおずと服を開けると、ニプルキャップが乳首に装着される。

    「ひっ……！　ふぇっ……！？　な、何か……震えて……おっぱいが……！」

    振動が始まり、%CALLNAME:TARGET%は驚きで体を強張らせた。

    「あ、あの……乳首が、びりびりして……怖いです……」

    「そ、それを……あたしの……おっぱいに……付けるんですか……？」

    %CALLNAME:TARGET%は不安そうに%CALLNAME:MASTER%を見上げた。

    「……%CALLNAME:MASTER%が言うなら……」

    覚悟を決めて目を閉じると、ニプルキャップが乳首に装着された。

    「んっ……！　ひぁっ……こ、これ……震えて……乳首が……！」

    初めての感覚に戸惑いながら、%CALLNAME:TARGET%は小さく震えていた。

    「……優しく……してくださいね……お願いします……」

    「あの……そういう道具……あたし、苦手で……」

    %CALLNAME:TARGET%は怯えた目でニプルキャップを見つめている。

    しかし%CALLNAME:MASTER%に促され、渋々ながら胸を晒した。

    「んぅ……っ……やっ……震えて……おっぱいが、じんじんする……変な感じ……」

    振動が続き、%CALLNAME:TARGET%の体が小刻みに震える。

    「あぅ……止まらない……乳首がずっと、びりびりって……」

    妖精は困惑しながらも、%CALLNAME:MASTER%を信じて耐えていた。

    「……%CALLNAME:MASTER%には……あたしは逆らいません……」

    %CALLNAME:TARGET%は観念したように呟いて、ニプルキャップを受け入れる体勢を取った。

    ニプルキャップが乳首に装着され、振動が妖精の体を甘く責めていく。

    「ふぁっ……んっ……！　こ、こんなの……初めてです……びりびりって……」

    %CALLNAME:TARGET%は目を閉じて、未知の感覚に身を委ねている。

    「……%CALLNAME:MASTER%が……喜んでくれるなら……」

    小さな声でそう言って、妖精は健気に刺激を受け入れた。
