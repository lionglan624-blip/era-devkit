    「ひゃっ！　や、やぁ……変な感じ……」

    %CALLNAME:人物_チルノ%は顔を真っ赤にして、目を固く閉じた。

    「……でも、%CALLNAME:MASTER%なら……いいよ……」

    小さな声で、%CALLNAME:人物_チルノ%はそう呟いた。

    「あっ……ん……%CALLNAME:MASTER%……恥ずかしいよ……」

    %CALLNAME:人物_チルノ%は羞恥に耐えながらも、脚を閉じようとはしなかった。

    %CALLNAME:MASTER%の舌が這うたびに、甘い声が漏れてしまう。

    「そんなに……舐めないでよ……声、出ちゃう……」

    %CALLNAME:人物_チルノ%は両手でシーツを握りしめている。

    「……気持ちいい……けど……あたい、変になっちゃいそう……」

    正直な感想を口にして、%CALLNAME:人物_チルノ%はますます頬を染めた。

    「ふぁ……！　そこ、だめっ……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%が敏感な場所を見つけて、体を跳ねさせた。

    しかし逃げようとはせず、ただ快感に耐えている。

    「あたい……こんなの初めて……頭、真っ白になる……」

    %CALLNAME:人物_チルノ%は息を荒くしながら、%CALLNAME:MASTER%を見つめた。

    「……%CALLNAME:MASTER%、責任取りなさいよね……」

