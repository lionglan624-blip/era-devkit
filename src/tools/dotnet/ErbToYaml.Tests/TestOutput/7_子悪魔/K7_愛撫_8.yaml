- id: fallback
  content: >-
    「ふぇっ……な、何するんですかぁ……！」

    %CALLNAME:TARGET%は驚いて足を閉じようとした。

    しかし、%CALLNAME:MASTER%に押し開かれ、秘裂を晒されてしまう。

    「こ、こんなとこ……見ちゃだめです……」

    %CALLNAME:TARGET%は顔を真っ赤にして、目に涙を浮かべている。

    「……%CALLNAME:MASTER%……優しくしてくれますか……？」

    不安そうに問いかけながら、%CALLNAME:TARGET%は観念したように力を抜いた。

    「いやぁ……見ないでください……」

    %CALLNAME:TARGET%は必死に足を閉じようとしていた。

    「あたしの、そんなとこ……恥ずかしいですぅ……」

    %CALLNAME:TARGET%は泣きそうな顔で%CALLNAME:MASTER%を見上げている。

    しかし、%CALLNAME:MASTER%に見つめられると、少しだけ足の力が抜けた。

    「……ちょっとだけなら……でも、誰にも言わないでくださいね……？」

    妖精は恥じらいながらも、%CALLNAME:MASTER%を信じようとしていた。

    「ひっ……そ、そこ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に秘裂を開かれ、体を強張らせた。

    「こ、こういうの……あたし、初めてで……」

    %CALLNAME:TARGET%は戸惑いながら、%CALLNAME:MASTER%の行動を見守っている。

    妖精の小さな秘部が、緊張に震えながら晒されていた。

    「……怖いけど……%CALLNAME:MASTER%だから……」

    %CALLNAME:TARGET%は恐る恐る足の力を抜いて、身を任せた。

    「……え、えっと……」

    %CALLNAME:TARGET%は何が起こっているのか理解できないようだ。

    「あの……これ、何してるんですか……？」

    自分の秘裂を見つめられて、%CALLNAME:TARGET%は困惑している。

    「……恥ずかしいです……でも、よくわからない……」

    %CALLNAME:TARGET%は戸惑いながらも、されるがままになっていた。

    「……%CALLNAME:MASTER%がそうしたいなら……いいですけど……」
  priority: 2
- id: fallback
  content: >-
    「ひゃあっ！？　な、なにっ……！」

    %CALLNAME:TARGET%は悲鳴を上げて、必死に足を閉じようとした。

    「そ、そんなとこ見ちゃだめです！　だめですっ！」

    %CALLNAME:TARGET%は真っ赤な顔で、%CALLNAME:MASTER%を押しのけようとしている。

    「咲夜さんに言いますからねっ……！」

    妖精は涙目で、精一杯の抵抗を試みていた。

    「いやっ……見ないでください……！」

    %CALLNAME:TARGET%は泣きそうな声で訴えた。

    「あたしたち、そんな仲じゃないです……」

    %CALLNAME:TARGET%は必死に体を守ろうとしている。

    「……お願いですから、やめてください……」

    妖精は怯えた目で%CALLNAME:MASTER%を見つめていた。

    「……っ！」

    %CALLNAME:TARGET%は声も出せずに固まっている。

    「な、何でそんなことするんですか……」

    %CALLNAME:TARGET%は理解できないという顔で%CALLNAME:MASTER%を見上げた。

    「……あたし、何か悪いことしましたか……？」

    妖精は困惑しながら、されるがままになるしかなかった。

    「やだっ……こんなの、やだぁ……」

    %CALLNAME:TARGET%は涙を浮かべて、首を振っている。

    「……恥ずかしいです……やめてください……」

    %CALLNAME:TARGET%は消え入りそうな声で訴えた。

    「……%CALLNAME:MASTER%は、こんな妖精で何がしたいの……？」

    妖精は悲しそうな目で、%CALLNAME:MASTER%を見つめていた。
  priority: 1
