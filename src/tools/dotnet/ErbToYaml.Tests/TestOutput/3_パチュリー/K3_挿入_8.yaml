character: パチュリー
situation: K3_挿入
entries:
- id: fallback
  content: >-
    「……っ……あ……そこ、は……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を受け入れながら、苦痛に眉を寄せた。

    アナルへの挿入は、本で読んだよりも遥かに強い刺激だった。

    「……%CALLNAME:MASTER%、痛い……でも、あなたなら……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の目を見つめ、小さく頷いた。

    「……信じているから。あなたに委ねるわ……」

    「はぁ……んっ……奥まで……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に抱かれながら、静かに喘いでいる。

    大図書館の静寂の中、二人だけの秘密の行為。

    「……この体位だと、顔がよく見えるわね……恥ずかしいけれど……」

    %CALLNAME:TARGET%は頬を染めながら、%CALLNAME:MASTER%の頬に手を添えた。

    「……痛みの中にも、あなたの温もりを感じる……不思議ね」

    「ぁ……やぁ……そんなに深く……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに合わせて、体を震わせている。

    「……アナルというのは、こんなに敏感だったのね……」

    %CALLNAME:TARGET%は自分の体の反応に驚いている。

    「……%CALLNAME:MASTER%……もう少し、ゆっくり……」

    そう言いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%を離そうとしない。

    「……ふぅ……あ……っ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に抱かれながら、切なげな表情を浮かべている。

    「……体が弱いから、この刺激は堪えるわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げ、微笑んだ。

    「……でも、あなたと向かい合えるなら……我慢できる」

    そう言って、%CALLNAME:TARGET%は%CALLNAME:MASTER%の唇にキスを求めた。
