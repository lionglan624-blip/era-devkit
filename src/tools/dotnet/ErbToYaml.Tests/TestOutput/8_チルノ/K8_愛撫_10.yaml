  content: >-
    「え……？　ちょ、何してんの%CALLNAME:MASTER%！」

    %CALLNAME:人物_チルノ%は驚いて声を上げた。

    「そ、そんなとこ舐めるなんて……！」

    %CALLNAME:人物_チルノ%は抗議しようとするが、体は固まっている。

    「……へ、変なことしないでよね……」

    困惑しながらも、%CALLNAME:人物_チルノ%は強く拒絶はしなかった。

    「ひゃあっ！　い、いきなりはダメだってば……」

    %CALLNAME:人物_チルノ%は弱々しく抵抗した。

    「こういうのって……まだ早いと思うんだけど……」

    %CALLNAME:人物_チルノ%は戸惑いながらも、完全に拒否することはできなかった。

    「……%CALLNAME:MASTER%、あたいのことからかってるわけじゃないよね……？」

    不安げな表情で%CALLNAME:MASTER%を見つめた。

    「あ……あの……%CALLNAME:MASTER%……」

    %CALLNAME:人物_チルノ%は困惑した様子で声を出した。

    「これって、どういうつもり……？」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の真意を測りかねているようだ。

    「……嫌じゃないけど、急すぎてわかんないよ……」

    戸惑いながらも、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%から離れようとはしなかった。

    「んっ……ちょ、待って……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の頭を押さえた。

    「%CALLNAME:MASTER%って……そういうの好きなの……？」

    %CALLNAME:人物_チルノ%の声は小さく震えている。

    「……もうちょっと仲良くなってからのほうが……」

