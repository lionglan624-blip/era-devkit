entries:
- id: fallback
  content: >-
    「ねぇ……%CALLNAME:MASTER%のここ、舐めてあげるね」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の前に跪くと、紅い瞳を輝かせた。

    小さな唇が%CALLNAME:MASTER%のものに触れ、そっと口に含んでいく。

    「んっ……ふふ、%CALLNAME:MASTER%の味……好きなのさ」

    %CALLNAME:人物_フラン%は慣れた様子で舌を這わせながら、恋人を見上げた。

    「私、これだけは絶対壊さないよ……大事な%CALLNAME:MASTER%のものだもん」

    悪魔の妹は、恋人のために無邪気に奉仕を続けた。

    「%CALLNAME:MASTER%……今日は私がたくさん気持ちよくしてあげる」

    %CALLNAME:人物_フラン%はそう言うと、%CALLNAME:MASTER%のものを口に含んだ。

    小さな頭が上下に揺れ、一生懸命な奉仕が続く。

    「んむっ……ちゅ……れろ……」

    %CALLNAME:人物_フラン%は時折顔を上げ、%CALLNAME:MASTER%の表情を確かめた。

    「……気持ちいい？　私、上手にできてる？」

    その問いかけには、恋人を喜ばせたい純粋な想いが込められていた。

    「えへへ……%CALLNAME:MASTER%のおちんちん、大好き……」

    %CALLNAME:人物_フラン%は甘えるように%CALLNAME:MASTER%のものに頬ずりした。

    「こうしてると、%CALLNAME:MASTER%のこと独り占めしてる気分になるのさ」

    %CALLNAME:人物_フラン%は嬉しそうに笑いながら、先端を舌先で転がした。

    「ん……ちゅっ……ぺろぺろ……」

    495年の孤独を知る少女は、恋人の温もりを確かめるように奉仕を続けた。

    「私のこと……見てて？　ずっと……」

    「……%CALLNAME:MASTER%、私の口、気持ちいいでしょ？」

    %CALLNAME:人物_フラン%は自信ありげに微笑みながら、%CALLNAME:MASTER%のものを咥えた。

    小さな口が懸命に動き、熱心に奉仕を続ける。

    「んぅ……ふぅ……じゅるっ……」

    %CALLNAME:人物_フラン%の紅い瞳が、愛おしそうに%CALLNAME:MASTER%を見上げていた。

    「もっと……もっとちょうだい……私、%CALLNAME:MASTER%のが欲しいの」

    悪魔の妹は、恋人への想いを込めて舌を絡ませた。
