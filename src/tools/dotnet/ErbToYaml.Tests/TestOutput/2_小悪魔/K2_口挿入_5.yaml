- id: fallback
  content: >-
    「%CALLNAME:MASTER%……ふふっ、こんなところまで触らせてくれるなんて……」

    %CALLNAME:人物_小悪魔%は悪戯っぽい笑みを浮かべながら、指先をMASTERの秘部に添えた。

    くすくすと笑いながら、ゆっくりと円を描くように撫でていく。

    「悪魔に触られるの……どんな気分ですの？　んっ……」

    %CALLNAME:人物_小悪魔%は愛おしそうに指を動かし、反応を確かめている。

    「ふふ……%CALLNAME:MASTER%の弱いところ……全部知ってますわ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の後ろに回り込み、そっと指を這わせた。

    「ここ……敏感ですわよね……ふふっ」

    細い指先が窄まりの周りをくすぐるように動く。

    「んっ……こうすると……びくってしますわよね……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の反応を楽しむように、緩急をつけて愛撫する。

    「私の指……気持ちいい……？　ふふ……正直に言ってくださいませ……」

    「ねえ、%CALLNAME:MASTER%……私、こういうの……好きですわ……」

    %CALLNAME:人物_小悪魔%は蕩けるような目で%CALLNAME:MASTER%を見上げながら、指先を動かした。

    悪魔特有の長い爪を器用に使い、繊細に刺激を与えている。

    「%CALLNAME:MASTER%が感じてる顔……見てると……こっちまでどきどきしますわ……」

    %CALLNAME:人物_小悪魔%の尻尾がゆらゆらと揺れ、彼女の高揚を表している。

    「もっと……もっと気持ちよくなってくださいませ……んっ……」

    %CALLNAME:人物_小悪魔%は甘えるように%CALLNAME:MASTER%に寄り添いながら、後ろを弄り始めた。

    「%CALLNAME:MASTER%……あなたのこと、全部……独り占めしたいですわ……」

    指先がねっとりと動き、丁寧に窄まりを解していく。

    「ふふ……悪魔の指に弄ばれて……どんな気持ち……？」

    %CALLNAME:人物_小悪魔%は囁くように言葉を紡ぎながら、愛撫を続けた。

    「……私だけのもの……ですわよね……？　んっ……」
