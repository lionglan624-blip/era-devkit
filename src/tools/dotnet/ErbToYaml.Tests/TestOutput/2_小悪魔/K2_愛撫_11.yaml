- id: fallback
  content: >-
    「……あの、それ、何ですか？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%が持つ小さな器具を胡乱げに見た。

    %CALLNAME:MASTER%がスイッチを入れると、振動音が響いた。

    「……振動する……？ 何に使うんですの……」

    %CALLNAME:人物_小悪魔%は一歩後ずさった。

    「……あまり近づけないでくださいな……」

    「……すみません、お仕事があるんですけど……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%から距離を取ろうとした。

    %CALLNAME:MASTER%がローターを見せると、%CALLNAME:人物_小悪魔%は眉をひそめた。

    「……パチュリー様の図書整理が溜まっているんですの……」

    「……そういうのは……他の方とどうぞ……」

    %CALLNAME:人物_小悪魔%は困ったような顔で言った。

    「あ……あの……%CALLNAME:MASTER%さん……」

    %CALLNAME:人物_小悪魔%は落ち着かない様子でそわそわしている。

    「……そろそろパチュリー様が呼んでるかもしれませんので……」

    %CALLNAME:MASTER%がローターを見せると、%CALLNAME:人物_小悪魔%は視線を逸らした。

    「……そういうのは……ちょっと……」

    曖昧な笑顔で、%CALLNAME:人物_小悪魔%はその場を離れようとした。

    「……%CALLNAME:MASTER%さん」

    %CALLNAME:人物_小悪魔%は冷静な目で%CALLNAME:MASTER%を見た。

    「私たち、そこまでの関係じゃないですよね？」

    %CALLNAME:MASTER%がローターを近づけると、%CALLNAME:人物_小悪魔%は身を引いた。

    「……そういうことは……もう少し親しくなってからにしてくださいな……」

    冷たくはないが、明確に距離を置く態度だった。
