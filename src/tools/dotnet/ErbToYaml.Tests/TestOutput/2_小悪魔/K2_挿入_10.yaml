    「……こうやって包まれてると……溶けちゃいそう……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に後ろから抱かれながら、甘えた声を出している。

    「%CALLNAME:MASTER%……耳に息がかかって……ぞくぞくする……」

    %CALLNAME:MASTER%が突き上げると、%CALLNAME:人物_小悪魔%は切なげに鳴いた。

    「あぁっ……ん……深い……っ、届いて……」

    %CALLNAME:人物_小悪魔%の尻尾が幸せそうに揺れている。

    「……%CALLNAME:MASTER%の全部……私の中に……欲しい……」
