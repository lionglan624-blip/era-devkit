    「キスは……その……もう少し仲良くなってからにしてくださいまし」

    %CALLNAME:人物_小悪魔%は困惑した様子で、でもどこか満更でもなさそうだった。

    「……悪魔は気まぐれですから、いつか気が向いたら……ね？」

    %CALLNAME:MASTER%が%CALLNAME:人物_小悪魔%にキスをしようと近づく。

    「ひゃっ！　な、何を……」

    %CALLNAME:人物_小悪魔%は驚いて本を落としてしまった。

    「いきなりそういうことをなさるのは……その……困りますわ」

    %CALLNAME:人物_小悪魔%は頬を赤くしながら、落ちた本を拾い上げた。

    「……もう少し、順序というものがあるでしょう？」

