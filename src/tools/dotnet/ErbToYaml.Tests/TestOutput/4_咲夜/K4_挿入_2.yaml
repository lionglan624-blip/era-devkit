entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……そちらでも、よろしいのですか……？」

    %CALLNAME:TARGET%は恥じらいながらも、%CALLNAME:MASTER%を見つめた。

    「貴方のためでしたら……どこでも、構いませんわ……」

    %CALLNAME:MASTER%が菊穴に先端を宛てがうと、%CALLNAME:TARGET%は小さく息を呑んだ。

    「んっ……きつい……ですわ……でも、貴方を受け入れたい……」

    窮屈な場所に押し入る感覚に、%CALLNAME:TARGET%は甘い吐息を漏らした。

    「……こんな場所でも……貴方と繋がれて……幸せですの……」

    「ふぁ……%CALLNAME:MASTER%……そこは……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の意図を察して、顔を赤らめた。

    「向かい合ったまま……後ろで……なんて……背徳的ですわ……」

    %CALLNAME:MASTER%がゆっくりと腸内へ進入すると、%CALLNAME:TARGET%は体を強張らせた。

    「あ……んっ……違和感が……でも、慣れてきましたわ……」

    「貴方の顔を見ながら……こんなこと……恥ずかしい……」

    %CALLNAME:TARGET%は恋人の腕の中で、背徳的な快感に身を委ねた。

    「……んぅ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げ、潤んだ瞳で微笑んだ。

    「この場所も……もう、貴方のものですわ……」

    %CALLNAME:MASTER%が深く腰を沈めると、%CALLNAME:TARGET%の体が震えた。

    「あっ……奥まで……入って……きゅう、と締まって……」

    「メイドとして……こんな姿……でも、貴方になら……」

    %CALLNAME:TARGET%は恋人だけに見せる、淫らな表情を浮かべていた。

    「……あ……%CALLNAME:MASTER%、顔を見て……」

    %CALLNAME:TARGET%は繋がったまま、%CALLNAME:MASTER%の顔を引き寄せた。

    「こうして向かい合っていると……恥ずかしいけど……嬉しいの……」

    「んちゅ……ん……後ろなのに……気持ちいい……」

    唇を重ねながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を深く受け入れていく。

    「……好き……ですわ……全部……貴方に捧げますの……」

    完璧なメイドは、恋人の前で全てを晒して甘く乱れていた。
