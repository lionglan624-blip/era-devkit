character: パチュリー
situation: K3_挿入
entries:
- id: fallback
  content: >-
    「……今日は、私が上で……しかも、そこで……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨りながら、覚悟を決めた表情を見せた。

    大図書館の床に仰向けになった%CALLNAME:MASTER%を見下ろし、腰を沈める。

    「……んっ……肛門に、自分で沈めると……狭い……深い……」

    %CALLNAME:TARGET%は異物感と深さに息を詰まらせながらも、動きを止めない。

    「……あなたのためなら、この程度の無理は……」

    「はぁ……ん……っ……」

    %CALLNAME:TARGET%は自分のペースで腰を動かしながら、小さく喘いでいる。

    本の山に囲まれた空間で、魔女が肛門で%CALLNAME:MASTER%を受け入れている。

    「……本で読んだ知識では、この角度だと……むきゅ……」

    %CALLNAME:TARGET%は理論で説明しようとして、感覚に負けた。

    「……体力も、肛門も、限界だけれど……あなたの顔を見ていたいの……」

    「ぁ……やぁ……自分で動くと、奥まで……」

    %CALLNAME:TARGET%は珍しく乱れた声を上げながら、腰を揺らしている。

    肛門での騎乗位は、普段とは違う刺激と疲労を与える。

    「……%CALLNAME:MASTER%……私が、あなたを満たしてあげる……」

    %CALLNAME:TARGET%は愛情を込めて、%CALLNAME:MASTER%の胸に手を置いた。

    「……この行為で、私たちの絆を深めたいの……」

    「……ふぅ……体力が……肛門も……むきゅ……」

    %CALLNAME:TARGET%は動きながらも、二重の負担に息が上がってきている。

    「……でも、まだ止まらないわ。もう少しだけ……」

    %CALLNAME:TARGET%は意地を見せるように、腰の動きを続ける。

    「……あなたが気持ちよくなってくれるなら、この痛みも……」

    そう呟いて、%CALLNAME:TARGET%は%CALLNAME:MASTER%に身を預けるように倒れ込んだ。
