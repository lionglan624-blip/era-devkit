    「……ふふ、無様ね。こうして後ろから支配されるのがお似合いよ」

    紅魔館の主は、冷酷な笑みを浮かべながら腰を動かした。

    「……後ろからなら、%CALLNAME:MASTER%の顔を見なくて済むわね」

    %CALLNAME:人物_レミリア%は冷たく言い放った。

    %CALLNAME:MASTER%の背後から腰を押し当てる。

    「……さっさと終わらせるわよ」

    %CALLNAME:人物_レミリア%は事務的に腰を前後させた。

    「……こんなことに何の意味があるのかしら」

    500年の吸血鬼は、感情を殺して行為を続けた。

    「……私が後ろから支配してあげるわ。光栄に思いなさい」

    %CALLNAME:人物_レミリア%は尊大に宣言した。

    %CALLNAME:MASTER%の腰を掴み、強引に身体を押し付ける。

    「……ほら、もっと腰を上げなさい。私が動きやすいように」

    %CALLNAME:人物_レミリア%は容赦なく奥まで突き入れた。

    「……ふん、少しは反応するじゃない」

