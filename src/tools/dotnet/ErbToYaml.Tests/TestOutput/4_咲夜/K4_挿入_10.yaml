- id: fallback
  content: >-
    「……これも……サービスの一環……ですわね……」

    %CALLNAME:TARGET%は背を向けたまま、自分に言い聞かせている。

    「背中を向けていれば……表情は見られませんわ……」

    しかし、%CALLNAME:MASTER%の動きに体は反応してしまう。

    「っ……あ……」

    「……声は……隠せませんわね……」

    %CALLNAME:TARGET%は恥ずかしさを堪えながら、プロとしての態度を保とうとしていた。

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は複雑な表情を浮かべている。

    「この体勢は……屈辱的ですわね……」

    「でも……お仕事ですから……」

    %CALLNAME:MASTER%が深く突くと、%CALLNAME:TARGET%の声が漏れる。

    「あっ……そこは……後ろなのに……」

    言葉を途中で飲み込み、%CALLNAME:TARGET%は唇を噛んだ。

    「……背中を向けていると……」

    %CALLNAME:TARGET%は少しだけ安堵した様子を見せる。

    「こんな……恥ずかしい顔を……見られずに済みますわ……」

    しかし、体は否応なく快感を覚え始めていた。

    「……ぅ……お尻で……こんなに……」

    「%CALLNAME:MASTER%……貴方は……本当に……困った方ですわ……」

    非難しながらも、%CALLNAME:TARGET%の声には熱がこもっている。

    「……っ……」

    %CALLNAME:TARGET%は声を堪えようとしたが、漏れてしまう。

    「……プロとして……こんな声を出すのは……」

    「……不覚ですわ……」

    「%CALLNAME:MASTER%、この体勢……わざとでしょう……」

    恨めしそうに言いながらも、%CALLNAME:TARGET%の体は%CALLNAME:MASTER%を受け入れていた。

    「……もう少し……続けても……構いませんわ……」
