- id: fallback
  content: >-
    「……これも……おもてなしの一環ですわ……」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「メイドとして……お客様のご要望にお応えするのは……当然のこと……」

    しかし、%CALLNAME:MASTER%の動きに体は正直に反応してしまう。

    「っ……あ……」

    「……少し……感じているだけですわ……」

    %CALLNAME:TARGET%は自分の反応を言い訳するように付け加えた。

    「……ん……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は複雑な表情を浮かべている。

    「向かい合うと……貴方の顔が見えて……困りますわ……」

    「何を考えているのか……分かってしまいそうで……」

    %CALLNAME:MASTER%が深く突くと、%CALLNAME:TARGET%の体が跳ねた。

    「あっ……そこは……」

    言葉を途中で飲み込み、%CALLNAME:TARGET%は唇を噛んだ。

    「……これは……仕事……ですから……」

    %CALLNAME:TARGET%は何度も自分に言い聞かせている。

    しかし、体は快感を覚え始めていた。

    「……ぅ……変な気分になってきましたわ……」

    「%CALLNAME:MASTER%のせいですからね……」

    %CALLNAME:TARGET%は責任を押し付けながらも、抵抗する様子はなかった。

    「……もう少し……続けても構いませんわ……」

    「……っ……」

    %CALLNAME:TARGET%は声を堪えようとしたが、漏れてしまう。

    「……プロとして……こんな声を出すべきではないのに……」

    「%CALLNAME:MASTER%、貴方は……私を困らせてばかりですわね……」

    恨めしそうに言いながらも、%CALLNAME:TARGET%の瞳には別の感情が宿っていた。

    「……でも……嫌ではありませんの……」

    小さな声で、%CALLNAME:TARGET%はそう認めた。
  priority: 2
- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%を見つめている。

    「お客様のご要望ですから……お相手いたしますわ」

    瀟洒なメイドは、感情を完全に押し殺していた。

    「……早く済ませてくださいまし」

    「私には、お嬢様のお世話という仕事がありますので」

    %CALLNAME:TARGET%の声は、事務的な冷たさを帯びていた。

    「……ふぅ……」

    %CALLNAME:TARGET%は小さく息を吐いた。

    「向かい合っていると、貴方の考えが読めるような気がしますわね」

    「私に何を期待しているのか……無駄ですけれど」

    %CALLNAME:MASTER%が動いても、%CALLNAME:TARGET%は表情を崩さない。

    「……感情移入などしませんわよ」

    完璧なメイドは、あくまでプロフェッショナルを貫いていた。

    「……これは仕事です」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「お客様の相手をするのも、メイドの務め……」

    「……っ」

    一瞬、%CALLNAME:TARGET%の表情が揺らいだが、すぐに戻る。

    「……何でもありませんわ」

    冷静さを取り繕いながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめた。

    「……貴方に感情を見せる必要はありませんわ」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見た。

    「私はメイド。貴方はお客様。それ以上でも以下でもありません」

    「……ん……」

    僅かに声が漏れ、%CALLNAME:TARGET%は唇を噛んだ。

    「……早く終わらせてください。お嬢様がお呼びですので」

    瀟洒な従者は、最後まで感情を見せなかった。
  priority: 1
