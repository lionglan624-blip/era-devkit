    後ろで%CALLNAME:MASTER%を受け入れたまま、胸に手を置いて支える。

    「顔……変じゃないかな……へんな表情してたら、言ってね……」

    %CALLNAME:人物_フラン%は不安そうに問いかけた。

    「んっ……後ろ、奥まで……%CALLNAME:MASTER%が入ってる……」

    少女は好きな人の反応を確かめながら、ぎこちなく腰を揺らした。

    「私が上にいると……%CALLNAME:MASTER%を壊さないでいられるかも……」

    %CALLNAME:人物_フラン%は自分に言い聞かせるように呟いた。

    後ろで受け入れながら、加減を探っている。

    「こうすれば……力の入れ具合、自分で分かるから……」

    %CALLNAME:人物_フラン%はゆっくりと腰を上下させた。

    「んっ……%CALLNAME:MASTER%の顔……気持ちよさそうで……嬉しいの……」

    495年の孤独を知る少女は、好きな人を傷つけないよう必死だった。

    「%CALLNAME:MASTER%……私のこと、ちゃんと見てる……？」

    %CALLNAME:人物_フラン%は不安そうに問いかけながら、腰を揺らした。

    後ろで繋がったまま、%CALLNAME:MASTER%の手を取って頬に当てる。

    「こうして触ってもらうと……安心するのさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手に頬を擦り付けた。

    「後ろでも……%CALLNAME:MASTER%と繋がってると、嬉しいの……」

    少女は好きな人との絆を確かめながら、腰を動かし続けた。
