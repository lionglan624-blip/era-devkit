    %CALLNAME:MASTER%が指を挿入すると、%CALLNAME:人物_小悪魔%は声にならない声を漏らした。

    「んんっ……あっ……そこ、奥……いいですわ……」

    %CALLNAME:人物_小悪魔%の膣壁が%CALLNAME:MASTER%の指を柔らかく締め付ける。

    「ふふっ……%CALLNAME:MASTER%の指、中で暴れてる……気持ちいい……」

    悪魔の尻尾がぴくぴくと震え、快楽に溺れていく様子が伝わってきた。

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の前で艶めかしく腰を揺らしている。

    「今日は……たっぷり可愛がってくださいな」

    %CALLNAME:MASTER%がそっと指を挿れると、%CALLNAME:人物_小悪魔%は甘い声を上げた。

    「あっ……んん……%CALLNAME:MASTER%の指、熱い……」

    指が内壁を撫でるたび、%CALLNAME:人物_小悪魔%の体がびくりと震える。

    「もっと奥……一番いいところ、探して……」

    %CALLNAME:人物_小悪魔%は恍惚とした瞳で、%CALLNAME:MASTER%の愛撫に身を任せていた。

    「あっ……やぁっ……指、動いて……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_小悪魔%の膣内をゆっくりとかき回している。

    「んっ……そこ……敏感なの……わかってて……いじわる……」

    %CALLNAME:人物_小悪魔%は快楽に耐えきれず、%CALLNAME:MASTER%にしがみついた。

    「もう……%CALLNAME:MASTER%のせいで……とろとろですわ……」

    %CALLNAME:人物_小悪魔%の秘所から愛液が溢れ、%CALLNAME:MASTER%の手を濡らしている。

    「このまま……%CALLNAME:MASTER%の指で……イかせてくださいな……」
