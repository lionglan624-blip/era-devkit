character: チルノ
situation: K8_挿入
entries:
- id: fallback
  content: >-
    「ねえ%CALLNAME:MASTER%、この体勢だと顔見えないじゃん」

    %CALLNAME:人物_チルノ%は四つんばいになりながら不満げに振り返った。

    %CALLNAME:MASTER%が腰を動かすと、小さな体がぴくんと跳ねる。

    「んっ……で、でも……奥まで届いて……すごい……」

    %CALLNAME:人物_チルノ%は驚いたように声を漏らした。

    「あたいの一番奥まで……%CALLNAME:MASTER%だけだよ、こんなの……」

    「えへへ……%CALLNAME:MASTER%、あたいのこと後ろから見てる？」

    %CALLNAME:人物_チルノ%は四つんばいの体勢で、尻を高く突き上げた。

    その姿は無防備で、%CALLNAME:MASTER%への信頼を表していた。

    「んっ……あぁっ……こ、こうしてると獣みたいだね……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに笑いながらも、腰を揺らした。

    「でも……%CALLNAME:MASTER%とならいいかな……あたい達だけの秘密ね」

    「はぁっ……%CALLNAME:MASTER%、もっと激しくしてもいいよ」

    %CALLNAME:人物_チルノ%は四つんばいで尻をこちらに突き出している。

    氷の妖精のはずなのに、その体は熱を帯びていた。

    「んっ、あっ……深い……お腹の奥まで……っ」

    %CALLNAME:人物_チルノ%は快感に震えながら、%CALLNAME:MASTER%を受け入れた。

    「あたいのこと……全部、%CALLNAME:MASTER%にあげる……」

    「……%CALLNAME:MASTER%、あたいのこと、ちゃんと見ててね」

    %CALLNAME:人物_チルノ%は振り返って%CALLNAME:MASTER%を見つめた。

    後ろからでも、二人の心は繋がっている。

    「んぅ……っ、はぁ……この体勢、恥ずかしいけど……」

    %CALLNAME:人物_チルノ%の頬は紅く染まっていた。

    「%CALLNAME:MASTER%だから……いいの……あたいを独り占めしてよね」
  priority: 4
- id: talent_3_1
  content: >-
    「ちょ……こ、この体勢……恥ずかしいんだけど……！」

    %CALLNAME:人物_チルノ%は真っ赤な顔で四つんばいになっている。

    しかし後ろを向いているので、表情は%CALLNAME:MASTER%に見えていない。

    「べ、別に気持ちいいとかじゃ……んっ！」

    %CALLNAME:人物_チルノ%の強がりは、甘い声に遮られた。

    「……っ、こ、この体勢だと顔見られないから……まだマシだけど……」

    「な、なんでこんな格好させんのよ……！」

    %CALLNAME:人物_チルノ%は四つんばいで尻を突き出す体勢に羞恥していた。

    「獣みたい……って、思ってるんでしょ……！」

    %CALLNAME:MASTER%が動くと、%CALLNAME:人物_チルノ%の体がびくんと震えた。

    「んあっ……っ、う、後ろからなんて……ばかぁ……」

    %CALLNAME:人物_チルノ%は枕に顔を埋めて声を抑えていた。

    「はぁっ……あっ……こ、こんな深くまで……！」

    %CALLNAME:人物_チルノ%は後背位の体勢で快感に震えていた。

    「や……っ、こんな声、出したくないのに……っ」

    後ろ向きなので、%CALLNAME:人物_チルノ%の表情は見えない。

    「%CALLNAME:MASTER%……ばか……後ろからなんて……んっ」

    しかし%CALLNAME:人物_チルノ%の腰は、%CALLNAME:MASTER%の動きに合わせて揺れていた。

    「……振り向かないからね、絶対」

    %CALLNAME:人物_チルノ%は顔を伏せたまま、尻だけを突き上げていた。

    「こんな顔……見られたくないし……」

    %CALLNAME:MASTER%が腰を進めると、%CALLNAME:人物_チルノ%は息を呑んだ。

    「んっ……は……っ、こ、この体勢だと……すごく、深い……」

    %CALLNAME:人物_チルノ%は枕を抱きしめながら、%CALLNAME:MASTER%を受け入れた。
