- id: fallback
  content: >-
    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の話を興味深そうに聞いていた。

    「へぇ、そうなんですか」

    %CALLNAME:人物_小悪魔%は丁寧に相槌をうった。

    「%CALLNAME:MASTER%って、面白い方ですね」

    %CALLNAME:人物_小悪魔%は少し笑みを浮かべた。

    「……また、お話聞かせてくださいませ」

    「あ、そういえば私もこの前……」

    %CALLNAME:人物_小悪魔%は自分の話を始めかけて、少し躊躇した。

    「……いえ、つまらないお話ですから、いいですよね」

    %CALLNAME:人物_小悪魔%は控えめに笑った。

    「それより、%CALLNAME:MASTER%のお話の続きを聞かせてくださいな」

    「――パチュリー様がね、この前こんなことを仰ってたんですよ」

    %CALLNAME:人物_小悪魔%は図書館での出来事を話し始めた。

    「……あ、すみません。私ばっかり喋っちゃって」

    少し恥ずかしそうに、%CALLNAME:人物_小悪魔%は口を閉じた。

    「でも……%CALLNAME:MASTER%が聞いてくださるから、つい嬉しくて」

    「%CALLNAME:MASTER%って、不思議な方ですよね」

    %CALLNAME:人物_小悪魔%は首を傾げながらそう言った。

    「私みたいな悪魔と、こうやって普通にお話してくださるんですもの」

    %CALLNAME:人物_小悪魔%の尻尾が、ゆっくりと揺れている。

    「……ありがとうございます。なんだか、嬉しいですわ」

    「――あら、もうこんな時間ですか」

    %CALLNAME:人物_小悪魔%は窓の外に目をやった。

    「%CALLNAME:MASTER%とお話していると、時間が経つのが早いですね」

    少し名残惜しそうに、%CALLNAME:人物_小悪魔%は立ち上がろうとした。

    「……また、お話してくださいますか？」

    遠慮がちに、しかし期待を込めた瞳で、%CALLNAME:人物_小悪魔%はそう尋ねた。
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の話を聞いていた。

    「はい、そうなんですか」

    %CALLNAME:人物_小悪魔%は無難に相槌をうった。

    「……あ、すみません。パチュリー様のお仕事がありますので」

    %CALLNAME:人物_小悪魔%は申し訳なさそうに話を切り上げた。

    「ふむふむ、なるほど」

    %CALLNAME:人物_小悪魔%は適度な距離を保ちながら話を聞いている。

    「お話、ありがとうございました」

    %CALLNAME:人物_小悪魔%は丁寧に、しかし事務的に会話を終えた。

    「そうですか……」

    %CALLNAME:人物_小悪魔%は曖昧に相槌をうった。

    「あの、失礼ですけど、図書館にご用事ですか？」

    %CALLNAME:人物_小悪魔%は探るような目で%CALLNAME:MASTER%を見ている。

    「用がないなら、あまり長居されても困りますの」

    「……」

    %CALLNAME:人物_小悪魔%は黙って本の整理を続けながら、時折%CALLNAME:MASTER%の方を見る。

    「あ、すみません。お話を聞いていなかったわけではないんです」

    「ただ……パチュリー様のお仕事がありまして」

    %CALLNAME:人物_小悪魔%は申し訳なさそうに、しかしどこか壁を感じさせる態度で答えた。

    「へぇ、そうなんですか」

    %CALLNAME:人物_小悪魔%は社交辞令的な笑みを浮かべた。

    「私、お客様の相手は苦手なんですよね」

    %CALLNAME:人物_小悪魔%は正直に、しかし悪びれもせずにそう言った。

    「悪魔ですから、つい意地悪したくなっちゃうんです。お気をつけくださいね」

    いたずらっぽい笑みの中に、どこか本気の警戒が見えた。
  priority: 1
