    二人に同時に使われるのは、妖精には珍しい体験なのかもしれない。

    「ふーん……みんなこういうことしてるんだ……」

    二人が腰を動かすと、%CALLNAME:人物_チルノ%は身体を震わせた。

    「んっ……あ……考えてる場合じゃ……なくなってきた……」

