- id: fallback
  content: >-
    「え、えっと……%CALLNAME:MASTER%？　それ、何ですか……小さくて黒い……」

    %CALLNAME:人物_美鈴%はクリップローターを見て、困惑した表情を浮かべた。

    「にゅ、乳首につけるって……まだそういう関係じゃ……」

    しかし装着が始まると、%CALLNAME:人物_美鈴%の言葉は途切れた。

    「ひぁっ……！　振動して……あ、あの……これ……っ」

    %CALLNAME:人物_美鈴%は戸惑いながらも、完全には拒めなかった。

    「あの……%CALLNAME:MASTER%……」

    %CALLNAME:人物_美鈴%は小さな声で呼びかけた。

    「そういうの……もうちょっと仲良くなってからの方が……」

    クリップローターが乳首を挟み、振動を始める。

    「んっ……あ……乳首が震えるの、初めてで……」

    %CALLNAME:人物_美鈴%は顔を赤くしながら、%CALLNAME:MASTER%から視線を逸らした。

    「ちょ、ちょっと……！」

    %CALLNAME:人物_美鈴%はクリップローターを見て慌てた。

    「そ、そんなの乳首につけるなんて……恥ずかしいです……」

    しかし装着されて振動が始まると、%CALLNAME:人物_美鈴%は抗議を忘れた。

    「あっ……やぁ……乳首が、ビリビリ……っ」

    %CALLNAME:人物_美鈴%は困惑しながらも、どこか嬉しそうだった。

    「……%CALLNAME:MASTER%、急にそんなの……」

    %CALLNAME:人物_美鈴%は戸惑いを隠せない様子だった。

    「まだ、私たちはそういう……」

    クリップローターの装着が始まり、%CALLNAME:人物_美鈴%の言葉は途切れた。

    「んっ……あぁ……振動が、止まらない……っ」

    %CALLNAME:人物_美鈴%は恥ずかしさに耐えながら、%CALLNAME:MASTER%の行為を受け入れた。
