entries:
- id: fallback
  content: >-
    「んっ……後ろから入れるぞ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の背中に胸を押し付けながら、ゆっくりと腰を進めた。

    「ふぅ……こうして後ろから抱きしめてると、お前のこと独り占めしてる気分だぜ……」

    %CALLNAME:人物_魔理沙%は幸せそうに目を細めながら、腰を動かし始めた。

    「んっ……はぁ……お前の中、すごく温かい……」

    %CALLNAME:人物_魔理沙%は恋人の背中に頬を寄せながら、愛情を込めて腰を振った。

    「ふふ……お前の背中、いい匂いがするな……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の首筋に顔を埋めた。

    「後ろからだと、お前のこと全部感じられる気がする……」

    %CALLNAME:人物_魔理沙%は深く繋がりながら、ゆっくりと腰を動かした。

    「んっ……あっ……こうしてると、心まで溶け合いそうだぜ……」

    %CALLNAME:人物_魔理沙%は恋人との一体感に酔いしれていた。

    「……後ろから抱きしめるの、好きなんだ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の腰をしっかりと掴んだ。

    「お前の全部を感じたい……だから、このまま動くぜ」

    %CALLNAME:人物_魔理沙%は懸命に腰を振りながら、恋人の反応を楽しんだ。

    「んっ……あっ……どうだ、気持ちいいか……？」

    %CALLNAME:人物_魔理沙%は恋人を喜ばせることに夢中だった。

    「なあ……後ろ向いてるから顔見えないけど……」

    %CALLNAME:人物_魔理沙%は腰を動かしながら、%CALLNAME:MASTER%の耳元で囁いた。

    「私がお前を気持ちよくしてるんだ……ちゃんと感じてくれよ」

    %CALLNAME:人物_魔理沙%の腰の動きに合わせて、二人の身体が揺れた。

    「んっ……はぁ……声出せよ……聞きたいんだから」

    %CALLNAME:人物_魔理沙%は恋人の反応を確かめながら、腰を振り続けた。
  priority: 4
- id: talent_3_1
  content: >-
    「べ、別に後ろからがいいわけじゃないんだからな……」

    %CALLNAME:人物_魔理沙%は顔を真っ赤にしながら、%CALLNAME:MASTER%の後ろに回った。

    「お前が望んだから……仕方なくやってるだけだぜ……」

    %CALLNAME:人物_魔理沙%はぎこちなく腰を進め、繋がりを確認した。

    「んっ……あっ……顔、見えなくてよかった……こんな顔、見られたくないし……」

    %CALLNAME:人物_魔理沙%は照れ隠しに強がりながらも、腰を動かし始めた。

    「こ、こんな体勢で……変態なんだからな、お前は」

    %CALLNAME:人物_魔理沙%は文句を言いながらも、腰を動かし続けている。

    「後ろからなんて……恥ずかしいだろ……」

    %CALLNAME:人物_魔理沙%の動きは慣れないながらも、真剣だった。

    「んっ……ふぅ……でも、まあ……顔見られないのは、悪くないかもな……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに呟きながら、腰を振った。

    「んっ……あっ……こうすると、いいのか……？」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の反応を見ながら、腰の動きを調節した。

    「後ろからだと……角度が違うんだな……」

    %CALLNAME:MASTER%が気持ちよさそうにすると、%CALLNAME:人物_魔理沙%は複雑な表情になった。

    「……別に嬉しくなんかないぜ……ただ、反応がわかりやすいってだけだ」

    %CALLNAME:人物_魔理沙%は照れながらも、少し得意げだった。

    「……もうちょっと声出してくれてもいいんだぜ」

    %CALLNAME:人物_魔理沙%は少し不満そうに腰を動かした。

    「後ろからだと、お前の顔見えないから……ちゃんと感じてるのかわかんないんだよ」

    %CALLNAME:MASTER%が腰を押し付けてくると、%CALLNAME:人物_魔理沙%は驚いた。

    「ちょ、ちょっと……急に動くなよ……」

    %CALLNAME:人物_魔理沙%は動揺しながらも、腰の動きは止めなかった。
