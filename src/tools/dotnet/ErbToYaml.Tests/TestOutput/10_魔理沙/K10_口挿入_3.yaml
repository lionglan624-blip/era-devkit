- id: fallback
  content: >-
    「え、えっと……こういうの、初めてなんだが……」

    %CALLNAME:人物_魔理沙%は戸惑いながら、%CALLNAME:MASTER%の上に跨った。

    「本で読んだことはあるけど……実際にやるのは……」

    %CALLNAME:人物_魔理沙%はおそるおそる陰部を擦り付けた。

    「うわっ……熱い……こうやって擦るのか……」

    %CALLNAME:人物_魔理沙%は興味深そうに、ゆっくりと腰を動かし始めた。

    「こうか……？　合ってるのか……？」

    %CALLNAME:人物_魔理沙%は不安そうに%CALLNAME:MASTER%の顔を窺った。

    「腰の動かし方がよくわからないんだ……教えてくれよ」

    %CALLNAME:人物_魔理沙%の動きはぎこちないが、真剣だった。

    「んっ……なるほど、こうすると反応するのか……」

    %CALLNAME:人物_魔理沙%は魔法の実験のように、興味津々で腰を動かした。

    「ふーん……こういう感触なのか」

    %CALLNAME:人物_魔理沙%は知的好奇心から、腰の動かし方を工夫した。

    「私のここに当たってると……不思議な気分だぜ」

    %CALLNAME:人物_魔理沙%は腰を動かしながら、%CALLNAME:MASTER%の反応を見ていた。

    「……なんか、こうしてると私も変な気分になってくるな……」

    %CALLNAME:人物_魔理沙%は自分の体の反応に戸惑っていた。

    「……%CALLNAME:MASTER%、これで合ってるのか？」

    %CALLNAME:人物_魔理沙%は真剣な表情で訊ねた。

    「私、こういうの初めてだから……ちゃんと教えてくれよ」

    %CALLNAME:MASTER%が腰に手を添えて教えると、%CALLNAME:人物_魔理沙%は素直に従った。

    「なるほど……こうやって動かすのか……」

    %CALLNAME:人物_魔理沙%は教わった通りに腰を動かし、真剣に練習していた。
  priority: 2
- id: fallback
  content: >-
    「お、おい……こんなこと、させるなよ……」

    %CALLNAME:人物_魔理沙%は動揺しながらも、%CALLNAME:MASTER%の上に跨らされた。

    「わ、私にこんなこと……何考えてるんだ……」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、ぎこちなく腰を動かした。

    「……勝手に変な声出すなよ、気が散るだろ……」

    %CALLNAME:人物_魔理沙%は落ち着かない様子で、なんとか状況を受け入れようとしていた。

    「……何でこんなことになってるんだ」

    %CALLNAME:人物_魔理沙%は理不尽そうに呟きながら、腰を動かしている。

    「こういうのは……もっと親しくなってからだろ……」

    %CALLNAME:人物_魔理沙%の抗議とは裏腹に、腰は止まらなかった。

    「はぁ……仕方ない、早く終わらせるぞ……」

    %CALLNAME:人物_魔理沙%は諦めたように、腰の動きを速めた。

    「……熱いな、これ」

    %CALLNAME:人物_魔理沙%は無表情を装いながら、%CALLNAME:MASTER%の一物に陰部を擦り付けている。

    「こういうのは経験ないんだから……期待するなよ」

    %CALLNAME:人物_魔理沙%の動きはぎこちなく、慣れていないのが明らかだった。

    「……文句あるなら、他の奴に頼めばいいだろ」

    %CALLNAME:人物_魔理沙%は強がりながらも、腰を止めようとはしなかった。

    「……」

    %CALLNAME:人物_魔理沙%は無言で%CALLNAME:MASTER%の一物に陰部を擦り付けている。

    「……これで満足なのか、お前は」

    %CALLNAME:MASTER%が反応すると、%CALLNAME:人物_魔理沙%は少し驚いた。

    「……ふーん、こうすると感じるのか」

    %CALLNAME:人物_魔理沙%は興味なさそうな振りをしながら、腰を動かし続けた。
