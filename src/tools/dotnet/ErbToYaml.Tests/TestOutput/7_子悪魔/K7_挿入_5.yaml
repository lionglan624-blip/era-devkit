    %CALLNAME:TARGET%は%CALLNAME:MASTER%を押さえつけるように跨り、淡々と腰を動かしている。

    感情のない瞳とは裏腹に、体は本能的に快楽を求めていた。

    「%CALLNAME:MASTER%……もっと、だして……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に命令するように言った。

    「あたし、まだ……たりない……おなか、すいてる……」

    サキュバスの血が騒ぎ、%CALLNAME:TARGET%は飢えたように%CALLNAME:MASTER%を求めていた。

    「あたしね……うえにのるの、はじめて……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に座り、不思議そうな顔をしている。

    しかし悪魔の本能は既に目覚め、%CALLNAME:MASTER%を搾り取ろうとしていた。

    「でも……体が、しってる……うえにのると、いっぱい、もらえる……」

    %CALLNAME:TARGET%は本能のままに腰を動かし始めた。

    「%CALLNAME:MASTER%……あたしに、ぜんぶ、ちょうだい……？」

    無邪気な声で恐ろしいことを言いながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を搾り取っていた。
