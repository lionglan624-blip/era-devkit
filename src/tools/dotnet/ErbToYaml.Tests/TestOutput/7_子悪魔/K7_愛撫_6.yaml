entries:
- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%のここ、おっきいね……」

    %CALLNAME:TARGET%は恋人の前に跪き、興味深そうにそれを見つめている。

    小さな舌がぺろりと先端を舐めた。

    「あたしの口で、気持ちよくしてあげるね」

    %CALLNAME:TARGET%は一生懸命に口を開け、ゆっくりと咥え込んでいった。

    「んっ……ふふ……%CALLNAME:MASTER%の味、する……」

    妖精の小さな口が、懸命に%CALLNAME:MASTER%を包んでいる。

    「%CALLNAME:MASTER%……あたしね、これ上手になったかな……？」

    %CALLNAME:TARGET%は不安げに見上げながら、舌を這わせている。

    ちゅぷ、ちゅぷと小さな水音が漏れる。

    「……もっとして欲しいところ、教えて？」

    %CALLNAME:TARGET%は頬を染めながら、一生懸命に動いている。

    「んっ……ちゅ……」

    妖精の小さな口では大変そうだが、%CALLNAME:TARGET%は嬉しそうだった。

    「%CALLNAME:MASTER%のためなら、頑張れるの……」

    「んぅ……%CALLNAME:MASTER%、大好き……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に奉仕しながら、甘えた声を出している。

    メイドの仕事のことはすっかり忘れてしまっている。

    「あたしね……こうしてる時が、一番幸せなの……」

    %CALLNAME:TARGET%は蕩けるような目で%CALLNAME:MASTER%を見上げた。

    「……んっ、ふぅ……おいしい……」

    妖精の舌が、愛おしそうに%CALLNAME:MASTER%を舐めている。

    「ずっと……こうしていたいな……」

    「今日はあたしが、%CALLNAME:MASTER%を気持ちよくしてあげるの！」

    %CALLNAME:TARGET%は張り切って宣言し、%CALLNAME:MASTER%の前に跪いた。

    小さな手が%CALLNAME:MASTER%のものを包み込む。

    「えっとね……こうして……ぺろって……」

    %CALLNAME:TARGET%は舌を出して、丁寧に舐め始めた。

    「んっ……あむ……」

    そしてゆっくりと口に含み、懸命に動き始める。

    「……%CALLNAME:MASTER%、気持ちいい……？　あたし、頑張ってるよ……？」
