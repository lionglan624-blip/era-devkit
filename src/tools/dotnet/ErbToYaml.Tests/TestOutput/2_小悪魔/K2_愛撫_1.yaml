    「……悪魔だからって、何されてもいいわけじゃありませんのよ……」

    %CALLNAME:人物_小悪魔%は怒りながらも、どこか傷ついた目をしていた。

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の脚を開こうとした。

    「ちょっ……！ 触らないでください！」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の手を払いのけようとしている。

    「何考えてるんですか……非常識にも程がありますわ！」

