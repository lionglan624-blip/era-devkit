- id: fallback
  content: >-
    「……舐めてみてもいいかしら」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を見つめた。

    紅い瞳が%CALLNAME:MASTER%の秘所を観察する。

    「……こんなことをするのは初めてだわ」

    %CALLNAME:人物_レミリア%はゆっくりと顔を近づけ、舌を伸ばした。

    「……不思議な味ね。悪くはないわ」

    紅魔館の主は、好奇心のままに%CALLNAME:MASTER%の体を味わっていた。

    「……気まぐれよ。深い意味はないわ」

    %CALLNAME:人物_レミリア%はそう言いながら%CALLNAME:MASTER%に顔を寄せた。

    吸血鬼の冷たい舌が、そっと触れる。

    「……%CALLNAME:MASTER%、変な声を出さないで。恥ずかしいわ」

    %CALLNAME:人物_レミリア%は眉をひそめた。

    「……もう少しだけ、舐めていてもいいかしら」

    紅魔館の主は、自分でも気づかぬうちに%CALLNAME:MASTER%への関心を深めていた。

    「……暇つぶしに付き合いなさい」

    %CALLNAME:人物_レミリア%は傲慢に言い放ち、%CALLNAME:MASTER%の足の間に顔を埋めた。

    しかし舌を這わせた瞬間、その表情が僅かに和らいだ。

    「……なるほど。こういうのも、悪くないわね」

    %CALLNAME:人物_レミリア%は意外そうに呟いた。

    「……%CALLNAME:MASTER%、動かないで。もう少し味わわせなさい」

    500年の吸血鬼は、新しい発見をしたように舌を動かし続けた。

    「……私が舐めてあげると言っているのよ。光栄に思いなさい」

    %CALLNAME:人物_レミリア%は高飛車に言い、%CALLNAME:MASTER%に唇を寄せた。

    吸血鬼の冷たい舌が、ゆっくりと這う。

    「……%CALLNAME:MASTER%の体、覚えておくわ」

    %CALLNAME:人物_レミリア%は真剣な表情で呟いた。

    「……これも、私の気まぐれよ。期待しないで」

    紅魔館の主は、素直になれないまま奉仕を続けた。
  priority: 2
- id: fallback
  content: >-
    「……私にこんなことをさせるの？　身の程を知りなさい」

    %CALLNAME:人物_レミリア%は不機嫌そうに%CALLNAME:MASTER%を見下ろした。

    仕方なく顔を近づけ、嫌々ながら舌を伸ばす。

    「……っ……屈辱だわ」

    %CALLNAME:人物_レミリア%は顔を歪めた。

    「……覚えておきなさい。この借りは必ず返すわよ」

    紅魔館の主は、怒りを押し殺しながら最低限の動きだけを続けた。

    「……命令されたから舐めているだけよ」

    %CALLNAME:人物_レミリア%は冷たく言い放ち、%CALLNAME:MASTER%に舌を這わせた。

    その動きはどこかぎこちなく、嫌悪感が滲んでいる。

    「……こんなことに意味があるのかしら」

    %CALLNAME:人物_レミリア%は興味なさそうに呟いた。

    「……早く終わらせて、私を解放しなさい」

    500年の吸血鬼は、屈辱を怒りに変えて耐えていた。

    「……私の冷たい舌で舐められて、何が嬉しいの？」

    %CALLNAME:人物_レミリア%は嘲笑うように言った。

    吸血鬼の冷たい舌が、わざと冷やすように動く。

    「……ほら、寒くなってきたでしょう？」

    %CALLNAME:人物_レミリア%は意地悪く笑った。

    「……こんな私の舌を望んだのは、あなたよ」

    紅魔館の主は、相手の反応を嘲りながら舌を動かし続けた。

    「……気まぐれでしてあげているのよ」

    %CALLNAME:人物_レミリア%は傲慢に告げ、%CALLNAME:MASTER%に顔を寄せた。

    その動きは雑で、愛情のかけらも感じられない。

    「……感謝しなさい。紅魔館の主に舐めてもらえるなんて、光栄でしょう」

    %CALLNAME:人物_レミリア%は高慢に言い放った。

    「……さあ、これで満足したら私を解放しなさい」

    紅魔館の主は、最後まで支配者然とした態度を崩さなかった。
  priority: 1
