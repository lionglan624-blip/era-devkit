    「……でも、やめないで……%CALLNAME:MASTER%にされるの、幸せなのさ……」

    地下室でひとりだった少女は、今、恋人の温もりに包まれていた。

    「%CALLNAME:MASTER%……私のこと、いっぱい見て……」

    %CALLNAME:人物_フラン%は恥ずかしげもなく脚を広げ、%CALLNAME:MASTER%を受け入れていた。

    「こんな姿、%CALLNAME:MASTER%にしか見せないのさ……」

    %CALLNAME:MASTER%の舌が秘所を舐め上げるたび、甘い声が漏れる。

    「んっ……あぁ……私、%CALLNAME:MASTER%のものだよ……」

    %CALLNAME:人物_フラン%は恋人への愛おしさを込めて、その名を呼んだ。

    「……ずっと一緒にいて……私を壊さないでくれる人……」
