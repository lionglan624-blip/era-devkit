    「……お望みなら、続けます……」

    その声には、かすかな屈辱が滲んでいた。

    「……これも、務めですから……」

    「……」

    %CALLNAME:人物_美鈴%は無言で%CALLNAME:MASTER%を見つめた。

    「……向かい合う体勢で後ろを使うとは……」

    %CALLNAME:人物_美鈴%は静かに言った。

    「……私の苦悶の表情を見たいのですか」

    「……お好きにどうぞ」

    武術家の鋭い眼差しが、%CALLNAME:MASTER%の心を探っていた。

    「……わかりました」

    %CALLNAME:人物_美鈴%は小さく頷いた。

    「……後ろも、お使いになるのですね」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に身を委ねた。

    「……ただ、勘違いしないでください」

    「……抱きついているのは、体勢の都合です」

    「……それ以上の意味は、ありません」
