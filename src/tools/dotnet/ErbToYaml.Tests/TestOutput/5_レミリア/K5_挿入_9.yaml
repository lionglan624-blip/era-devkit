- id: fallback
  content: >-
    「……後ろ？ 随分と変わった趣味ね」

    %CALLNAME:人物_レミリア%は興味深げに%CALLNAME:MASTER%を見た。

    「まあいいわ。試してあげましょう」

    %CALLNAME:MASTER%が後ろに挿入すると、%CALLNAME:人物_レミリア%は眉をひそめた。

    「っ……痛……思ったより、きついわね……」

    %CALLNAME:人物_レミリア%は不快そうに顔を歪めた。

    「……これの何がいいのかしら……まあ、続けてみなさい」

    500年の吸血鬼は、冷静を装いながら観察していた。

    「……対面座位でアナル、ね。面白い趣向だわ」

    %CALLNAME:人物_レミリア%は値踏みするように言い、%CALLNAME:MASTER%の膝に座った。

    「どれ、付き合ってあげましょう」

    %CALLNAME:MASTER%がゆっくりと挿入すると、%CALLNAME:人物_レミリア%は息を詰めた。

    「っ……くぅ……これは……なかなか……」

    %CALLNAME:人物_レミリア%は繋がった場所を見下ろした。

    「……ふぅん、痛いけど……悪くはないかもしれないわね」

    その声には、認めたくない好奇心が滲んでいた。

    「……使用人が主のそこを欲しがるとはね」

    %CALLNAME:人物_レミリア%は溜息をつきながら、%CALLNAME:MASTER%と向き合った。

    「今日は気まぐれで付き合ってあげるわ」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は顔を歪めた。

    「っ……あぁ……痛い……もう少しゆっくりできないの……？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の肩を掴んだ。

    「……次はもっと上手くやりなさい」

    紅魔館の主は、動揺を隠そうとしていた。

    「……ふぅん、そちらも興味があるのね」

    %CALLNAME:人物_レミリア%は腕を組みながら、%CALLNAME:MASTER%を見た。

    「まあ、退屈しのぎに付き合ってあげるわ」

    %CALLNAME:MASTER%が後ろに挿入すると、%CALLNAME:人物_レミリア%は小さく声を漏らした。

    「っ……んっ……思ったより……きつい……」

    %CALLNAME:人物_レミリア%は表情を押し殺した。

    「……まあ、及第点ね。精進しなさい」

    吸血鬼の心に、何かが芽生え始めていた。
