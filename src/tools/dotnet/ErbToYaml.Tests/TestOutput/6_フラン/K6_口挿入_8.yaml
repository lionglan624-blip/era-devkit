- id: fallback
  content: >-
    「あ、あの……こうするの……大丈夫かな……」

    %CALLNAME:人物_フラン%は緊張した様子で、%CALLNAME:MASTER%の上に跨った。

    自分のものを後孔に当てると、不安そうに見つめる。

    「入れるよ……？ 壊しちゃったらどうしよう……」

    %CALLNAME:人物_フラン%は慎重に挿入しながら、息を詰めた。

    「んっ……入った……私のが、%CALLNAME:MASTER%の中に……」

    憧れの人との繋がりに、少女は身を震わせていた。

    「私なんかが……%CALLNAME:MASTER%にこんなこと……」

    %CALLNAME:人物_フラン%は戸惑いながらも、腰を動かし始めた。

    正常位の体勢で挿入したまま、%CALLNAME:MASTER%の表情を窺う。

    「痛くない……？ 大丈夫……？」

    %CALLNAME:人物_フラン%は心配そうに問いかけた。

    「壊さないように……ゆっくりするから……」

    495年の孤独を知る少女は、慎重に憧れの人を愛そうとしていた。

    「%CALLNAME:MASTER%……こうして繋がってると、ドキドキするのさ……」

    %CALLNAME:人物_フラン%は恥ずかしそうに呟きながら、腰を揺らした。

    正常位で%CALLNAME:MASTER%を見下ろす体勢に、頬が熱くなっていく。

    「私のこと……嫌いにならないでね……」

    %CALLNAME:人物_フラン%は不安そうに問いかけた。

    「こうしてると……%CALLNAME:MASTER%と近づけてる気がするの……」

    少女は憧れの人との距離を縮めようと、必死に腰を動かした。

    「んっ……%CALLNAME:MASTER%の中……温かいのさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を貫きながら、驚いた声を上げた。

    正常位の体勢から、愛おしそうに顔を見つめる。

    「私も……%CALLNAME:MASTER%のこと、温めてあげたいの……」

    %CALLNAME:人物_フラン%はぎこちなく腰を動かした。

    「壊さないでいられるかな……壊したくないよ……」

    495年の孤独を知る少女は、不安と喜びの中で憧れの人と繋がっていた。
