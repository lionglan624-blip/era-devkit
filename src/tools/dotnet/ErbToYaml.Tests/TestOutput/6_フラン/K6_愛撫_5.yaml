    「……%CALLNAME:MASTER%、私のこと……変だと思わないで……」

    その紅い瞳には、恥じらいと期待が入り混じっていた。

    「お尻でも……%CALLNAME:MASTER%に触られると、嬉しいのさ……」

    「あ……そこ……弄られると……」

    %CALLNAME:人物_フラン%は息を荒くしながら、%CALLNAME:MASTER%を見つめた。

    「なんか……お腹の奥がぞわぞわする……」

    %CALLNAME:人物_フラン%は自分の身体の反応に戸惑いを隠せない。

    「こんなところで感じるなんて……おかしいのさ……」

    しかし、%CALLNAME:MASTER%の指を止めてほしいとは言わなかった。

    「……もうちょっとだけ……続けていいよ……」

    「%CALLNAME:MASTER%……そ、そこ触って……何がしたいの……？」

    %CALLNAME:人物_フラン%は照れくさそうに%CALLNAME:MASTER%を睨んだ。

    「お尻の穴なんか触って……%CALLNAME:MASTER%のえっち……」

    %CALLNAME:MASTER%が指を動かすと、%CALLNAME:人物_フラン%は小さく声を漏らした。

    「ひっ……やぁ……やだ、声出ちゃった……」

    %CALLNAME:人物_フラン%は両手で口を押さえた。

    「……%CALLNAME:MASTER%のせいなのさ……覚えておいてよね」
