- id: fallback
  content: >-
    「へぇ……こうやって上に乗るんだ」

    %CALLNAME:人物_チルノ%は興味深そうに%CALLNAME:MASTER%の上に跨った。

    ゆっくりと腰を落とすと、不思議そうな顔をした。

    「んっ……この体勢だと、あたいが動くの……？」

    %CALLNAME:人物_チルノ%はぎこちなく腰を揺らしてみた。

    「なんか……いつもと違う感じ……面白いね」

    「あたいが上ってことは……あたいが動かすってこと？」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%を見下ろしながら首を傾げた。

    試しに腰を動かすと、予想外の感覚に目を丸くした。

    「わっ……んっ……自分で動くと、なんかすごい……」

    %CALLNAME:人物_チルノ%は新しい発見に興奮した様子だ。

    「こうすると……ここに当たる……なるほど……」

    「ねえ%CALLNAME:MASTER%、あたいこれ上手にできてる？」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上で一生懸命腰を動かしていた。

    慣れない動きだが、少しずつコツを掴んでいるようだ。

    「んっ……はぁ……こうやって自分でするの、疲れるね……」

    %CALLNAME:人物_チルノ%は息を切らしながらも、動きを止めなかった。

    「でも……なんか楽しいかも……」

    「……%CALLNAME:MASTER%、これで合ってる？」

    %CALLNAME:人物_チルノ%は不安そうに%CALLNAME:MASTER%を見下ろした。

    自分から動くことに慣れておらず、戸惑っている様子だ。

    「んっ……こうすると……奥まで入る……」

    %CALLNAME:人物_チルノ%はゆっくりと感覚を確かめながら腰を動かした。

    「上に乗るの……思ったより難しいね……」
  priority: 2
- id: fallback
  content: >-
    「な……っ！　何これ、なんであたいが上に……！」

    %CALLNAME:人物_チルノ%は無理やり%CALLNAME:MASTER%の上に跨らされていた。

    抵抗しようとするが、腰を掴まれて動けない。

    「や、やめ……っ、こんな格好させて何のつもりよ……！」

    %CALLNAME:人物_チルノ%の目には怒りと困惑が浮かんでいた。

    「あたいは最強なんだから……こんなの、認めないから……！」

    「離しなさいよ！　なんでこんな……っ！」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上に乗せられ、もがいていた。

    しかし腰を掴まれ、無理やり動かされてしまう。

    「んっ……やめ……自分で動いてるみたいに……しないでよ……っ」

    %CALLNAME:人物_チルノ%の目には涙が滲んでいた。

    「こんなの……こんなの屈辱だから……！」

    「やめて……こんな格好……っ」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上に跨らされ、震えていた。

    腰を掴まれ、上下に動かされる。

    「んあっ……っ、あたいが動いてるんじゃ……ないのに……っ」

    %CALLNAME:人物_チルノ%は必死に否定しようとした。

    「最強なのに……こんな……みじめ……」

    「……っ」

    %CALLNAME:人物_チルノ%は黙って%CALLNAME:MASTER%の上に乗せられていた。

    抵抗する力も失せ、されるがままになっている。

    「……覚えてなさいよ……絶対に……」

    %CALLNAME:人物_チルノ%は震える声でそれだけ言った。

    「こんな屈辱……絶対に……忘れないんだから……」
  priority: 1
