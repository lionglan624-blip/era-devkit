- id: fallback
  content: >-
    %CALLNAME:MASTER%がオナホールを取り出すと、%CALLNAME:TARGET%は僅かに目を伏せた。

    「……また、それを使われるのですね」

    %CALLNAME:TARGET%は恥じらいながらも、自ら体の力を抜いた。

    オナホールがゆっくりと挿入されると、%CALLNAME:TARGET%の体がびくりと震える。

    「あっ……中に……冷たいですわ……」

    瀟洒なメイドは、恋人の前でだけ道具に身を委ねていた。

    「んっ……あ……そこ……」

    オナホールの内壁が%CALLNAME:TARGET%の膣内を締め付けている。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみつき、荒い息を漏らした。

    「こんな……道具に貫かれるなんて……はしたないですわ……」

    恥ずかしさを噛み締めながらも、%CALLNAME:TARGET%は逃げようとしなかった。

    「%CALLNAME:MASTER%……もう……中が熱くなってきて……」

    オナホールの感触に、%CALLNAME:TARGET%は声を押し殺していた。

    「……っ……んんっ……動かさないで……」

    完璧を誇るメイドの仮面が、快感に蝕まれて崩れていく。

    「道具なのに……こんなに感じてしまうなんて……」

    %CALLNAME:TARGET%は恋人に甘えるように、その腕を掴んだ。

    「……責任、取ってくださいまし……」

    「ふぁ……やぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は挿入された道具に翻弄され、恍惚とした表情を浮かべている。

    オナホールが膣内を擦る感覚に、メイドの理性が溶けていた。

    「こんな道具で……イかされるなんて……瀟洒ではありませんわ……」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らしながらも、腰は正直に動いている。

    「……もっと……奥まで……お願いいたしますわ……」
