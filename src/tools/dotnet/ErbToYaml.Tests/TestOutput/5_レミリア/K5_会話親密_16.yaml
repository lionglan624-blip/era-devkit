- id: fallback
  content: >-
    「っ……！ 何を……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指が秘所に触れた瞬間、身を硬くした。

    「……紅魔館の主に、そんな大胆な真似を……」

    しかし、その手を払いのけることはしなかった。

    「……まあいいわ。貴方には少し興味があるから……」

    %CALLNAME:TARGET%は警戒しながらも、%CALLNAME:MASTER%を観察している。

    「あ……そこは……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の膣口に触れた。

    「……随分と大胆なのね、人間のくせに……」

    %CALLNAME:TARGET%は戸惑いながらも、完全には拒まなかった。

    「……少しだけよ。調子に乗らないことね。」

    紅魔館の主は複雑な表情で、%CALLNAME:MASTER%を見つめた。

    「んっ……変な感じ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指に戸惑っている。

    「……500年生きても、こんな経験は初めてよ……」

    %CALLNAME:TARGET%は困惑しながらも、%CALLNAME:MASTER%の行動を許している。

    「……貴方、私を試しているの……？」

    紅い瞳に、警戒と興味が入り混じっていた。

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の秘所に触れている。

    「……何を考えているの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げた。

    「……ふふ、面白いわね。もう少し、見せてもらおうかしら……」

    紅魔館の主は、%CALLNAME:MASTER%への興味を隠せないでいた。

    「……でも、勘違いしないことね。」
  priority: 2
- id: fallback
  content: >-
    「……何のつもり？」

    %CALLNAME:TARGET%は冷たい視線で%CALLNAME:MASTER%を見据えた。

    「紅魔館の主に、そんな無礼が許されると思っているの？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を払いのけた。

    「……身の程を弁えなさい。」

    500年を生きた吸血鬼の威厳が、%CALLNAME:MASTER%を圧倒した。

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%に向かおうとした。

    「……愚かね。」

    %CALLNAME:TARGET%は冷ややかに笑った。

    「私の身体に触れる権利は、貴方にはないわ。」

    「……もう一度やったら、食べてしまうわよ？」

    紅魔館の主は、危険な笑みを浮かべた。

    「……ふふ、大胆なのね。」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の行動を見下ろした。

    「でも、私はそんな安い女ではないわ。」

    %CALLNAME:TARGET%は優雅に身を引いた。

    「……運命が貴方に微笑むまで、待つことね。」

    紅い悪魔は、高慢な笑みを浮かべて%CALLNAME:MASTER%を見据えた。

    %CALLNAME:MASTER%が%CALLNAME:TARGET%に触れようとした。

    「……止めなさい。」

    %CALLNAME:TARGET%の声が冷たく響いた。

    「私に触れたいなら、まず私を知りなさい。」

    「……貴方はまだ、その資格がないのよ。」

    紅魔館の主は、威厳を持って%CALLNAME:MASTER%を退けた。
  priority: 1
