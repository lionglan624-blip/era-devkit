- id: fallback
  content: >-
    「……何のつもりかしら」

    %CALLNAME:人物_レミリア%は冷たい視線で%CALLNAME:MASTER%を見た。

    「私にそんなことをさせると思っているの？」

    %CALLNAME:人物_レミリア%の紅い瞳が、危険に光った。

    「身の程を知りなさい、下僕」

    吸血鬼としての威圧感が、部屋全体を支配していた。

    「……ふん」

    %CALLNAME:人物_レミリア%は退屈そうに%CALLNAME:MASTER%を見下ろした。

    「あなた、命が惜しくないのかしら」

    その声には、氷のような冷たさがあった。

    「私に触れる資格があるのは、限られた者だけよ」

    紅魔館の主は、毅然とした態度を崩さなかった。

    「……図々しいわね」

    %CALLNAME:人物_レミリア%は嘲笑を浮かべた。

    「使用人風情が、私に何を期待しているの？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を見下すように言い放った。

    「咲夜に言いつけられたくなければ、引き下がりなさい」

    500年を生きた吸血鬼は、その威厳を見せつけた。

    「……まあ、いいわ」

    %CALLNAME:人物_レミリア%は気だるげにため息をついた。

    「退屈だから話くらいは聞いてあげる」

    だが%CALLNAME:MASTER%が近づこうとすると、

    「……でも、今はその気分じゃないわね」

    %CALLNAME:人物_レミリア%は手を振って%CALLNAME:MASTER%を追い払った。

    「次の機会に、ね」
