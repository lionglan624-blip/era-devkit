character: レミリア
situation: K5_口挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、私の舌で気持ちよくしてほしいの？」

    %CALLNAME:人物_レミリア%は艶やかに微笑みながら、%CALLNAME:MASTER%の下腹部に顔を近づけた。

    紅い瞳が愛おしげに%CALLNAME:MASTER%を見上げる。

    「……%CALLNAME:MASTER%だけよ、私にこんなことをさせるのは」

    %CALLNAME:人物_レミリア%は唇を寄せ、ゆっくりと舌を伸ばした。

    「んっ……%CALLNAME:MASTER%の味、覚えているわ……」

    500年を生きた吸血鬼が、恋人のためだけに誇りを捨てて奉仕していた。

    「今夜は……ゆっくり、舐めてあげるわね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の足の間に潜り込んだ。

    冷たい吐息が%CALLNAME:MASTER%の敏感な場所に当たる。

    「……%CALLNAME:MASTER%の反応、全部見せて」

    %CALLNAME:人物_レミリア%は舌先でそっと触れ、%CALLNAME:MASTER%の反応を楽しんだ。

    「ふふ……こうすると、可愛い声が出るのね」

    紅魔館の主は、恋人の快感を引き出すことに喜びを見出していた。

    「……%CALLNAME:MASTER%の全部が欲しいの」

    %CALLNAME:人物_レミリア%は独占欲を込めて囁いた。

    吸血鬼の冷たい舌が、%CALLNAME:MASTER%の秘所をゆっくりと這う。

    「ここも……ここも……全部私のものよ」

    %CALLNAME:人物_レミリア%は執拗に舌を動かしながら、%CALLNAME:MASTER%を見上げた。

    「もっと乱れて……私だけに、その姿を見せて」

    永遠を生きる吸血鬼が、恋人の体を隅々まで味わっていた。

    「……%CALLNAME:MASTER%、愛してるわ」

    %CALLNAME:人物_レミリア%は珍しく素直に告白し、%CALLNAME:MASTER%に口づけた。

    吸血鬼の冷たい唇と舌が、愛情を込めて動く。

    「こうして触れていると……私も幸せになれるの」

    %CALLNAME:人物_レミリア%は目を細め、奉仕を続けた。

    「……ずっとこうしていたい。%CALLNAME:MASTER%のそばで」

    500年の孤独を知る吸血鬼は、愛する者との繋がりを噛みしめていた。
  priority: 4
- id: talent_3_1
  content: >-
    「……こ、これをすればいいのね？」

    %CALLNAME:人物_レミリア%は顔を紅くしながら、%CALLNAME:MASTER%の下腹部を見つめていた。

    おそるおそる顔を近づけ、吐息が%CALLNAME:MASTER%に触れる。

    「っ……こんなの、初めてなんだから……」

    %CALLNAME:人物_レミリア%はぎこちなく舌を伸ばした。

    「べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただの、その……練習よ」

    素直になれない吸血鬼は、必死に照れを隠していた。

    「ふん……こんなことで喜ぶなんて、単純ね」

    %CALLNAME:人物_レミリア%は強がりながらも、舌は止めなかった。

    「……で、でも、%CALLNAME:MASTER%が喜ぶなら……仕方ないわ」

    そう呟きながら、%CALLNAME:人物_レミリア%は舌の動きを少しだけ丁寧にした。

    「……感謝しなさいよ。紅魔館の主が直々にしてあげてるんだから」

    高飛車な言葉とは裏腹に、%CALLNAME:人物_レミリア%の頬は真っ赤だった。

    「……%CALLNAME:MASTER%の味、悪くないわね……」

    「……%CALLNAME:MASTER%、そんな顔しないで」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の反応に、どきりとしていた。

    「……私がすると、そんなに気持ちいいの？」

    少し嬉しそうに、%CALLNAME:人物_レミリア%は舌を動かし続けた。

    「……ふん、当然よね。私は紅魔館の主なんだから」

    そう言いながらも、%CALLNAME:人物_レミリア%はこっそり%CALLNAME:MASTER%の表情を確認していた。

    「……もう少しだけ、してあげてもいいわよ」

    「あっ……こんな反応するのね……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の体の反応に、興味津々の様子だった。

    「ふぅん……ここを舐めると、もっと反応するのね……」

    %CALLNAME:人物_レミリア%は観察するように、舌の動きを変えてみる。

    「……べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただ、その……」

    言い訳が思いつかず、%CALLNAME:人物_レミリア%は口をつぐんだ。

    「……うるさいわね。黙って感じていなさい」
  priority: 3
