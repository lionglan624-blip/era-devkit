- id: fallback
  content: >-
    「な……何だそれ、変な形の道具……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の手にあるクリキャップを怪訝そうに見た。

    「キャップ？　何に被せるんだ……？」

    しかし%CALLNAME:MASTER%の意図を悟った瞬間、%CALLNAME:人物_魔理沙%の顔が赤くなった。

    「ちょ、ちょっと待て！　そこに被せるのか！？」

    %CALLNAME:人物_魔理沙%は慌てて距離を取ろうとしたが、間に合わなかった。

    「おい、その変なの……こっちに向けるなって」

    %CALLNAME:人物_魔理沙%はクリキャップを警戒した。

    「私はそういう直接的なの苦手なんだぜ……」

    だが%CALLNAME:MASTER%は容赦なくキャップを装着した。

    「うわっ！　吸い付いて……って、あっ！　振動！？」

    %CALLNAME:人物_魔理沙%の抗議は、甘い声に変わっていった。

    「それ、何だ……？　見たことないぜ」

    %CALLNAME:人物_魔理沙%は興味と警戒が混じった目でクリキャップを見た。

    「魔法道具か何かか……？」

    %CALLNAME:MASTER%が無言でキャップを陰核に被せると、%CALLNAME:人物_魔理沙%は息を呑んだ。

    「うわっ……密着して……って、ちょっ！　振動！」

    %CALLNAME:人物_魔理沙%は何が起こるか悟る前に、その刺激を受けた。

    「……なんか嫌な予感がするぜ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の手にあるものを見て呟いた。

    「そ、それを私に使う気じゃないだろうな……」

    %CALLNAME:MASTER%の沈黙が答えだった。

    「ま、待てって！　そこには被せるな！　話し合おうぜ！」

    %CALLNAME:人物_魔理沙%の懇願は聞き入れられなかった。
