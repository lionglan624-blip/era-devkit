- id: fallback
  content: >-
    「それ、何なのさ？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つ電気按摩を無表情で見つめた。

    「私に使うの？　……壊れちゃうかもしれないのさ」

    その言葉が何を意味するのか、判断がつかなかった。

    振動が伝わると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……ふぅん。変な感じ」

    495年の孤独を知る少女は、感情を読ませない表情でそう呟いた。

    「きゅっとしてドカーンって知ってる？」

    %CALLNAME:人物_フラン%は電気按摩を見ながら、無邪気に言った。

    「私、なんでも壊せるのさ。その変な道具だって」

    しかし、%CALLNAME:MASTER%が電源を入れて押し当てると、%CALLNAME:人物_フラン%は目を丸くした。

    「……っ！　なにこれ……変なのさ……」

    悪魔の妹は、予想外の感覚に戸惑っているようだった。

    「……まあ、壊さないでいてあげる。今日だけね」

    「……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を無表情で見つめた。

    「私に何かするの？　つまらないことしたら、遊んであげないのさ」

    電気按摩が押し当てられると、%CALLNAME:人物_フラン%は少し驚いた顔をした。

    「……っ……何、これ」

    495年の孤独が育てた警戒心が、一瞬揺らいだように見えた。

    「……面白いかも。もう少しやってみて」

    「あなた、コンティニューできないのさ」

    %CALLNAME:人物_フラン%は不穏なことを口にしながら、電気按摩を見つめた。

    「でも、それ、ちょっと気になるの」

    %CALLNAME:MASTER%が振動を伝えると、%CALLNAME:人物_フラン%は小さく身を震わせた。

    「……ふぅん。外の世界って、変なものがあるね」

    %CALLNAME:人物_フラン%は興味を持ったようだった。

    「また持ってきてもいいのさ。壊さないでいられたらね」
