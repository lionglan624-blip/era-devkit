    「そんな悪い子はもう少しお預けだな」

    そう言うと、%CALLNAME:奴隷%はキスを再開した。

    %CALLNAME:奴隷%も%CALLNAME:奴隷%で、サディスティックな笑みを浮かべながら秘裂を愛液でグズグズにしている

    「んっ…ちゅっ…れろっ、んちゅっ…」

    %CALLNAME:奴隷%は客にキスされている。膝ががくがく笑って崩れ落ちそうになるが、拘束がそれを許さない。

    この状況に、%CALLNAME:奴隷%の太ももには幾筋もの愛液が伝っている。

    「んっ…ちゅっ…んぅ…」

    %CALLNAME:奴隷%は客と舌を絡ませている。

    客は%CALLNAME:奴隷%の巧みな舌技に興奮し、すでに十分勃起したものを服越しにぐりぐりと擦り付けてくる。

    「待て待て…出すならここに…だぜ…」

    と客の怒張を撫でながら、自らの股座に導く。

    %CALLNAME:奴隷%はいつもの帽子にTシャツ、そしてジーンズというラフな格好で客と口づけを交わしている。

    「んっ…ちゅっ…んぅ…」

    直立で立っていれば、事情を知っているもの以外は気付くまい。

    それほど小さな裂け目なのだ。

    だが、%CALLNAME:奴隷%の興奮を煽るには十分だった。陰核は勃起し、陰唇は涎を垂らしている。

    それを客に指摘され、さらに頬を紅潮させた。

    「んっ…ちゅっ…んぅ…」
