character: チルノ
situation: K8_愛撫
entries:
- id: fallback
  content: >-
    「何それ？　変な形してるわね」

    %CALLNAME:TARGET%はローターをじっと見つめて首を傾げた。

    スイッチを入れると、小さな機械が震え始める。

    「ひゃっ!?　動いてる!　なにこれ面白い!」

    %CALLNAME:TARGET%は興味津々で目を輝かせた。

    「あたいにも触らせて!　これ最強の武器かもしれないわ!」

    恋人の前では、氷の妖精は無邪気に振動を楽しんでいる。

    「こ、これ、変な感じ……」

    %CALLNAME:TARGET%は体に押し当てられたローターの振動に声を漏らした。

    「……んっ、やだ、なんか体がぞわぞわする……」

    いつもの威勢のいい態度はどこへやら、%CALLNAME:TARGET%は少し上気した顔になっている。

    「%CALLNAME:MASTER%……これ、もっと強くできるの……？」

    恋人だけに見せる甘えた表情で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げた。

    「……あたいだけに、内緒で教えてよね」

    「強い、強いよぉ……！」

    %CALLNAME:TARGET%は腰を震わせながら、ローターの刺激に耐えている。

    小さな体がびくびくと跳ね、氷の翅がぱたぱたと慌ただしく動いた。

    「……っ、あたいは最強だから……こんなの平気……のはず……」

    強がる声は甘く蕩け、%CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみついた。

    「%CALLNAME:MASTER%、もう……やめ……いや、もうちょっとだけ……」

    矛盾した言葉が、恋人への信頼を物語っている。

    「気持ちいい、これ気持ちいいよ」

    %CALLNAME:TARGET%は素直に快感を認めて、%CALLNAME:MASTER%に抱きついた。

    ローターの振動が小さな体を震わせるたび、甘い声が漏れる。

    「……んぅ……あたいね、%CALLNAME:MASTER%とこうしてるの好き……」

    氷の妖精とは思えない熱を帯びた体が、恋人に寄り添っている。

    「……最強は、%CALLNAME:MASTER%かもしれないわね」

    珍しく素直に敗北を認めて、%CALLNAME:TARGET%は幸せそうに微笑んだ。
  priority: 4
- id: talent_3_1
  content: >-
    「何よそれ、人間の道具？」

    %CALLNAME:TARGET%は怪訝そうにローターを見つめた。

    「……あたいは最強だから、そんなの怖くないし」

    強がりながらも、%CALLNAME:TARGET%の視線は興味深げに器具を追っている。

    「……やってみたら？　あたいに効くわけないけどね」

    頬を赤くしながら、%CALLNAME:TARGET%は挑戦的に言い放った。

    しかし、その声はわずかに震えていた。

    「なにこれ、変……」

    %CALLNAME:TARGET%はローターの振動を受けて、戸惑った声を上げた。

    「……ぶるぶるしてて、なんか体がおかしくなる……」

    普段の威勢の良さは影を潜め、困惑した表情になっている。

    「%CALLNAME:MASTER%のせいだからね……こんな変な気持ち……」

    %CALLNAME:TARGET%は文句を言いながらも、逃げようとはしなかった。

    「……もう少しだけなら、やってもいいわよ」

    「変な声出ちゃうから……」

    %CALLNAME:TARGET%は口を押さえながら、快感に耐えていた。

    ローターの振動が敏感な場所を刺激するたび、体がびくりと跳ねる。

    「……やだ、あたいこんな声出すキャラじゃないのに……」

    頬を真っ赤に染めて、%CALLNAME:TARGET%は俯いた。

    「……%CALLNAME:MASTER%にだけ見せてあげるんだから……感謝しなさいよね」

    照れ隠しの強がりが、逆に彼女の気持ちを表していた。

    「もう、やめてよぉ……」

    %CALLNAME:TARGET%は弱々しく抗議したが、その声は甘く蕩けていた。

    ローターの振動に翻弄され、小さな体が震え続けている。

    「……こんなの、あたいらしくない……」

    困惑しながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%から離れなかった。

    「……%CALLNAME:MASTER%のばか……あたいをこんな風にして……」

    文句を言いながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%の服を握りしめた。
  priority: 3
  condition:
