character: レミリア
situation: K5_口挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、私の体で洗われたいの？」

    %CALLNAME:人物_レミリア%は艶やかに微笑みながら、石鹸を泡立て始めた。

    白い泡が吸血鬼の白磁のような肌を彩っていく。

    「……こんな姿、%CALLNAME:MASTER%にしか見せないわよ？」

    %CALLNAME:人物_レミリア%は全身を%CALLNAME:MASTER%に押し当て、ゆっくりと擦り付け始めた。

    「んっ……ふふ、気持ちいいでしょう？　私の冷たい肌で、熱を鎮めてあげるわ」

    紅魔館の主が全身で奉仕する――それは最上の愛の証だった。

    「んっ……%CALLNAME:MASTER%の体、温かいわね……」

    %CALLNAME:人物_レミリア%は泡まみれの体を%CALLNAME:MASTER%に絡めるように動かしていた。

    吸血鬼のひんやりとした肌が、ぬるぬると滑っていく。

    「ククク……こうして擦り付けると、もっと熱くなるのね」

    %CALLNAME:人物_レミリア%は愛おしそうに体を動かしながら、%CALLNAME:MASTER%の表情を見つめていた。

    「……気持ちいい？　そう……私も、幸せよ」

    館の主は、恋人への奉仕に没頭していた。

    「……ねぇ、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は体を擦り付けながら、甘えるような声で呼びかけた。

    「こうして全身で触れ合っていると……私、とても幸せなのよ」

    紅魔館の主とは思えない、素直な告白だった。

    「……%CALLNAME:MASTER%のためなら、何でもしてあげる」

    %CALLNAME:人物_レミリア%は頬を染めながら、奉仕を続けた。

    500年の孤独を知る吸血鬼は、愛する者との繋がりを噛みしめていた。

    「ふふ……%CALLNAME:MASTER%、可愛い顔してるわね」

    %CALLNAME:人物_レミリア%は意地悪そうに微笑みながら、動きを激しくした。

    「私の体で、こんなになっちゃって……んっ」

    %CALLNAME:人物_レミリア%は時折、%CALLNAME:MASTER%のそれに太腿を絡めてみせる。

    「もっと乱れていいのよ？　今夜は私が、%CALLNAME:MASTER%を溶かしてあげるわ」

    そう言いながらも、その瞳には深い愛情が宿っていた。

    「……気持ちよくなったら、全部、私の体で受け止めてあげるから」
  priority: 4
- id: talent_3_1
  content: >-
    「……ぜ、全身で洗えばいいのね？」

    %CALLNAME:人物_レミリア%は顔を紅くしながら、石鹸を泡立て始めた。

    「……こ、こんな恥ずかしいこと……」

    おずおずと泡まみれの体を%CALLNAME:MASTER%に押し当て、%CALLNAME:人物_レミリア%は小さく息を吐いた。

    「んっ……ぬ、ぬるぬるして……変な感じ……」

    ぎこちない動きだが、一生懸命に体を擦り付けている。

    「……べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただの興味よ」

    「ふん……こんなことで喜ぶなんて、単純ね」

    %CALLNAME:人物_レミリア%は強がりながらも、体を動かし続けた。

    「んっ……で、でも、%CALLNAME:MASTER%が喜ぶなら……仕方ないわ」

    そう呟きながら、%CALLNAME:人物_レミリア%は動きを少しだけ丁寧にした。

    「……感謝しなさいよ。紅魔館の主が直々に体で洗ってあげてるんだから」

    高飛車な言葉とは裏腹に、%CALLNAME:人物_レミリア%の頬は真っ赤だった。

    「んっ……ふぅ……早く、満足しなさいよ……」

    「……%CALLNAME:MASTER%、そんな顔しないで」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の反応に、どきりとしていた。

    「私が全身で洗ってあげると……そんなに気持ちいいの……？」

    少し嬉しそうに、%CALLNAME:人物_レミリア%は体を動かし続けた。

    「んっ……ふぅ……ふん、当然よね。私は紅魔館の主なんだから」

    そう言いながらも、%CALLNAME:人物_レミリア%はこっそり%CALLNAME:MASTER%の表情を確認していた。

    「……もう少しだけ、してあげてもいいわよ」

    「あっ……ここ、反応してる……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%のそれに触れた瞬間、興味津々の様子だった。

    「ふぅん……こうすると、もっと反応するのね……んっ」

    %CALLNAME:人物_レミリア%は観察するように、動きを変えてみる。

    「……べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただ、その……」

    言い訳が思いつかず、%CALLNAME:人物_レミリア%は口をつぐんだ。

    「……うるさいわね。黙って洗われていなさい」
