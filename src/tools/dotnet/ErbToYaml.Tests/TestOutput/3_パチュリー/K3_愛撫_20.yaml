entries:
- id: fallback
  content: >-
    「……搾乳機……ね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が手にした器具を、静かに観察した。

    「外の世界の医療器具……興味深い構造だわ……」

    %CALLNAME:MASTER%がカップを%CALLNAME:TARGET%の胸に宛がうと、%CALLNAME:TARGET%は静かに目を閉じた。

    吸引が始まり、リズミカルな刺激が%CALLNAME:TARGET%の乳房を包み込む。

    「……んっ……吸われてる……%CALLNAME:MASTER%……気持ちいいわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に寄り添い、甘い吐息を漏らした。

    「……ふぅ……この吸引力……なかなかね……」

    %CALLNAME:TARGET%は搾乳機のリズムに身を委ねている。

    読みかけの魔導書は既に閉じられ、%CALLNAME:TARGET%の意識は吸引の快感に集中していた。

    「……乳首が……引っ張られて……敏感になってきた……」

    %CALLNAME:TARGET%は頬を染めながらも、不快ではないようだった。

    「……%CALLNAME:MASTER%……もう少し……このままでいさせて……」

    大図書館に、%CALLNAME:TARGET%の甘い吐息が静かに響いた。

    「……んっ……吸引が……深くなった……」

    %CALLNAME:TARGET%は搾乳機の刺激に、声を漏らしていた。

    カップの中で乳首が引き伸ばされ、快感が全身に広がっていく。

    「……こんなに……気持ちいいなんて……予想外よ……」

    %CALLNAME:TARGET%は驚いたように呟いたが、その表情は蕩けていた。

    「……%CALLNAME:MASTER%……あなたに……見られながら……」

    %CALLNAME:TARGET%は恥ずかしそうに顔を背けたが、拒む様子はなかった。

    「……」

    %CALLNAME:TARGET%は黙って搾乳機の吸引を受け入れている。

    リズミカルな吸引音が、大図書館の静寂に響いていた。

    「……胸が……吸い尽くされるみたい……」

    %CALLNAME:TARGET%は穏やかに微笑み、%CALLNAME:MASTER%の手を取った。

    「……私の全部……あなたに捧げるわ……」

    その言葉は、深い愛情に満ちていた。
  priority: 4
- id: talent_3_1
  content: >-
    「……!? そ、それは何かしら……」

    %CALLNAME:TARGET%は搾乳機を見て、頬を真っ赤に染めた。

    「胸に……付けるの……？」

    %CALLNAME:MASTER%がカップを装着し、吸引を開始すると、%CALLNAME:TARGET%は声を漏らした。

    「……ひぁっ……吸われて……乳首が……」

    %CALLNAME:TARGET%は本で顔を隠しながら、吸引の刺激に耐えている。

    「……%CALLNAME:MASTER%……恥ずかしいわ……」

    「……むきゅ……こんなの……初めて……」

    %CALLNAME:TARGET%は搾乳機の吸引に、困惑した表情を浮かべていた。

    「……乳首が……引っ張られて……おかしくなりそう……」

    %CALLNAME:TARGET%の体が小刻みに震え、呼吸が乱れていく。

    「……こんな道具……大図書館の蔵書にも……載ってなかったわ……」

    %CALLNAME:TARGET%は困惑しながらも、不快ではないようだった。

    「……やっ……吸引が……強く……」

    %CALLNAME:MASTER%が出力を上げると、%CALLNAME:TARGET%は本を取り落とした。

    「……んっ……これでは……読書なんて……無理……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕にしがみついた。

    「……%CALLNAME:MASTER%……お願い……少し……優しくして……」

    しかし%CALLNAME:TARGET%の瞳は、快感に潤んでいた。

    「……はぁ……はぁ……」

    %CALLNAME:TARGET%は吸引の刺激に、荒い息を吐いていた。

    「……胸が……敏感になって……頭がぼんやりする……」

    搾乳機のリズムが止まらず、%CALLNAME:TARGET%の体は快感に翻弄されている。

    「……%CALLNAME:MASTER%……こんな気持ち……初めてよ……」

    %CALLNAME:TARGET%は羞恥と快感の狭間で、%CALLNAME:MASTER%に縋り付いた。
