- id: fallback
  content: >-
    「……私にあなたの乳首を吸わせたいの？」

    %CALLNAME:TARGET%は冷ややかな目で%CALLNAME:MASTER%を見つめた。

    「……赤ん坊でもあるまいし。馬鹿馬鹿しいわ」

    %CALLNAME:TARGET%は素っ気なく言い放った。

    「……本を読む時間が勿体ないの。他を当たりなさい」

    「……むきゅ」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「あなた、図書館に何しに来たの」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%から距離を取った。

    「……そんなことをする義理はないわ。出て行って」

    「……」

    %CALLNAME:TARGET%は黙って%CALLNAME:MASTER%を見つめた。

    「図書館の利用規約には、そんな行為は書いていないわ」

    %CALLNAME:TARGET%は冷たく言い放ち、魔導書を開いた。

    「……精霊魔法で追い出すわよ。しつこいと」

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついた。

    「あなたは私に甘えたいの？　それとも実験したいの？」

    %CALLNAME:TARGET%は呆れたような表情を浮かべている。

    「……どちらにせよ、今は忙しいわ。また今度にしなさい」

    そう言って、%CALLNAME:TARGET%は本に視線を戻した。
  priority: 1
