    「んあっ！　入っ……くっ……痛いけど……でも……」

    %CALLNAME:人物_魔理沙%は涙目になりながら、次々と珠を飲み込んでいった。

    「ま、またお尻か……お前、本当にそっちが好きだな……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに呟いた。

    「……わかったよ、好きにしろって……」

    %CALLNAME:MASTER%がビーズを挿入し始めると、%CALLNAME:人物_魔理沙%は体を強張らせた。

    「んっ……あっ……珠が……奥へ奥へ……押し込まれて……っ」

    %CALLNAME:人物_魔理沙%は顔を伏せ、快感と羞恥に耐えた。
