entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……今日は私に任せてくださいまし」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を押し倒し、その上に跨った。

    「貴方を……私のものにしますわ……」

    自ら腰を下ろし、%CALLNAME:TARGET%は%CALLNAME:MASTER%を深く受け入れた。

    「んっ……ふぁ……全部……入りましたわ……」

    瀟洒なメイドは恋人の上で、蕩けるような笑みを浮かべた。

    「今だけは……私が貴方を支配しますの……」

    「ふふ……%CALLNAME:MASTER%、逃がしませんわよ……」

    %CALLNAME:TARGET%は時を止め、%CALLNAME:MASTER%の服を脱がせてしまった。

    「時間を操るのは……こういう時にも便利ですわね……」

    %CALLNAME:MASTER%の上に跨り、%CALLNAME:TARGET%はゆっくりと腰を沈めた。

    「あ……んっ……貴方の形……全部わかりますわ……」

    「今宵は……私がお嬢様への奉仕を休んでも……許してくださいまし……」

    %CALLNAME:TARGET%は恋人だけに見せる、艶めかしい表情で腰を揺らし始めた。

    「……%CALLNAME:MASTER%……ずっと、こうしたかったの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に手を置き、見下ろすように微笑んだ。

    「いつも私が奉仕される側……でも今日は違いますわ……」

    自ら激しく腰を動かし、%CALLNAME:TARGET%は甘い声を漏らした。

    「あっ……奥に……当たって……気持ちいい……」

    「%CALLNAME:MASTER%……貴方も……感じていますわね……」

    完璧なメイドは、恋人を悦ばせながら自らも快楽に溺れていた。

    「……んぅ……%CALLNAME:MASTER%……好き……」

    %CALLNAME:TARGET%は腰を動かしながら、%CALLNAME:MASTER%に身を寄せた。

    「こうして……上から貴方を見ていると……」

    「貴方の全てが……私のものだって実感できますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の唇を奪いながら、腰を打ち付けた。

    「んちゅ……あ……深い……もっと……」

    「永遠に……時を止めて……このまま……」
  priority: 4
- id: talent_3_1
  content: >-
    「……っ……%CALLNAME:MASTER%……申し訳ありません……」

    %CALLNAME:TARGET%は戸惑いながらも%CALLNAME:MASTER%を押し倒した。

    「私……どうしても……我慢できなくなってしまって……」

    恥ずかしそうに腰を下ろし、%CALLNAME:TARGET%は%CALLNAME:MASTER%を受け入れた。

    「あ……んっ……入って……きましたわ……」

    「メイドとして……こんなはしたない真似……」

    しかし、%CALLNAME:TARGET%の腰は止まらなかった。

    「……%CALLNAME:MASTER%……お願い……動かないで……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上で、ゆっくりと腰を動かしていた。

    「私のペースで……させてください……」

    「こうして……自分で動いていると……」

    「好きな場所に……当てられますの……」

    %CALLNAME:TARGET%の頬が紅く染まり、甘い吐息が漏れた。

    「あ……そこ……すごく……気持ちいい……」

    「……ふぁ……こんなこと……してしまうなんて……」

    %CALLNAME:TARGET%は自分の行動に戸惑いながらも、腰を止められなかった。

    「%CALLNAME:MASTER%の顔……上から見ると……」

    「貴方が私のものになっているみたい……」

    %CALLNAME:MASTER%の反応を見ながら、%CALLNAME:TARGET%は腰を激しく動かした。

    「あ……んっ……やぁ……止まらない……」

    「お嬢様……許してください……今だけは……」

    「……%CALLNAME:MASTER%……私、おかしくなってしまいますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上で乱れながら、涙目で見下ろした。

    「こんな……自分から腰を振るなんて……」

    「でも……貴方を感じていたくて……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を取り、自らの胸に導いた。

    「触って……ください……もっと……」

    完璧なメイドは、想い人の前で本能のままに乱れていた。
