  content: >-
    「ひゃっ……！　な、何……！？」

    %CALLNAME:TARGET%は驚いて体を硬くした。

    %CALLNAME:MASTER%の舌が後ろに触れている。

    「え、えっと……そこは……お尻、なんですけど……」

    %CALLNAME:TARGET%は困惑した表情で振り返った。

    「……あの、もしかして、間違えてます……？」

    妖精は%CALLNAME:MASTER%の真意を測りかねている様子だった。

    「あ、あの……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は戸惑いながら、%CALLNAME:MASTER%の顔を見ている。

    「……そこ、舐められるの……恥ずかしいです……」

    %CALLNAME:TARGET%は小さく身を縮こまらせた。

    「……でも……%CALLNAME:MASTER%がそうしたいなら……」

    %CALLNAME:TARGET%はおずおずと、お尻を突き出した。

    「……優しくしてくださいね……？」

    「んっ……ふぇ……変な感じ……」

    %CALLNAME:TARGET%は後ろを舐められる感覚に、小さく声を漏らした。

    何が起きているのか、よく分かっていない様子。

    「……あの、%CALLNAME:MASTER%……これって……」

    %CALLNAME:TARGET%は不安げに振り返った。

    「……痛くしないですよね……？」

    妖精は臆病な瞳で、%CALLNAME:MASTER%の反応を窺っていた。

