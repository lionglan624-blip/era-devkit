- id: fallback
  content: >-
    「……私に入れろって？」

    %CALLNAME:人物_フラン%は冷めた目で%CALLNAME:MASTER%を見つめた。

    その視線には、警戒と無関心が入り混じっている。

    「……まぁ、言われたからね……」

    %CALLNAME:人物_フラン%は気怠そうに腰を動かした。

    「……さっさとやるから……別に、どうでもいいのさ……」

    義務的な従順さだけがそこにあった。

    「……ふぅん……こういうのが好きなんだ……」

    %CALLNAME:人物_フラン%は興味なさそうに相手の中で動いていた。

    繋がっていても、心はどこか遠くにある。

    「……これでいい……？　私は別に……」

    %CALLNAME:人物_フラン%はどこか遠くを眺めながら呟いた。

    「……早く終わらせようね……」

    そこに感情の欠片はなかった。

    「……」

    %CALLNAME:人物_フラン%は無言で腰を動かしていた。

    紅い瞳は虚ろに、どこか別の場所を見ている。

    「……お姉さまなら、こんなこと……させないのに……」

    %CALLNAME:人物_フラン%はぽつりと呟いた。

    「……でも、いいや……どうせ、私には関係ないのさ……」

    悪魔の妹は、心を閉ざしたままだった。

    「……壊してもいいなら、もっと楽しめるのに……」

    %CALLNAME:人物_フラン%は不穏な笑みを浮かべながら呟いた。

    その紅い瞳の奥に、狂気の光が垣間見える。

    「……冗談だよ……半分だけね……」

    %CALLNAME:人物_フラン%は気怠そうに腰を動かした。

    「……あんたのこと、壊す価値もないのさ……」

    その言葉は、興味のなさと危うさを同時に示していた。
