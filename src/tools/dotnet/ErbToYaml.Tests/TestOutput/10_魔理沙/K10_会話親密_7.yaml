    %CALLNAME:人物_魔理沙%は照れくさそうに笑って、%CALLNAME:MASTER%に身を委ねた。

    %CALLNAME:MASTER%は%CALLNAME:人物_魔理沙%の後ろの穴に指を這わせた。

    「ひゃっ……あ……そこ、敏感なんだって……」

    %CALLNAME:人物_魔理沙%はびくりと体を震わせながらも、逃げようとはしない。

    「んんっ……%CALLNAME:MASTER%……そんなに丁寧にされると……変な声出ちまう……」

    %CALLNAME:人物_魔理沙%はとろんとした表情で、%CALLNAME:MASTER%に体を預けていく。

    「……後ろでも気持ちよくなるなんて……%CALLNAME:MASTER%のせいだぜ……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに%CALLNAME:MASTER%の胸に顔を埋めた。

    「あっ……やぁ……そこ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%に後ろの穴を弄られて、甘い声を漏らしている。

    「ふぁ……ん……%CALLNAME:MASTER%の指、上手くなったよな……私のこと、わかってる……」

    %CALLNAME:人物_魔理沙%の体がぴくぴくと反応している。

    「……普通の魔法使いがこんなので感じちゃうなんて……内緒だぜ……？」

    %CALLNAME:人物_魔理沙%は照れながらも幸せそうに、%CALLNAME:MASTER%に微笑みかけた。

    %CALLNAME:人物_魔理沙%は自分からお尻を%CALLNAME:MASTER%の方に向けた。

    「……%CALLNAME:MASTER%……後ろも、触ってくれよ……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに顔を伏せながらも、自分からおねだりしている。

    「んっ……あ……やっぱり、%CALLNAME:MASTER%の指、気持ちいいぜ……」

    %CALLNAME:人物_魔理沙%は後ろの穴を愛撫されながら、蕩けた表情を浮かべている。

    「……こんな姿、パチュリーには見せられないな……ふふ……」

    %CALLNAME:人物_魔理沙%は幸せそうに笑って、%CALLNAME:MASTER%にしがみついた。
