entries:
- id: fallback
  content: >-
    「あっ……そ、そこを開くの……？」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に秘部を広げられ、恥ずかしそうに顔を赤らめている。

    %CALLNAME:MASTER%が両指で花弁を左右に開くと、桃色の内壁が露わになった。

    「……%CALLNAME:MASTER%ったら、じっくり見すぎよ……」

    %CALLNAME:人物_美鈴%は両手で顔を覆いながらも、脚を閉じることはしなかった。

    「……恋人だから、見せてあげるんだからね……？」

    甘えるような声で、%CALLNAME:人物_美鈴%は恥ずかしげに呟いた。

    「ふふっ……私のそこ、そんなに見たいの？」

    %CALLNAME:人物_美鈴%は頬を染めながらも、微笑んでいる。

    %CALLNAME:MASTER%が秘部を開いて覗き込むと、%CALLNAME:人物_美鈴%の内壁がひくひくと蠢いた。

    「や……そんなに見つめられると……変な気持ちになっちゃう……」

    %CALLNAME:人物_美鈴%は恥ずかしさに身をよじりながらも、%CALLNAME:MASTER%の行為を受け入れている。

    「……%CALLNAME:MASTER%の視線……感じるわ……」

    %CALLNAME:人物_美鈴%は熱っぽい息を吐きながら、そう囁いた。

    「んっ……あ……開いてる……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に秘部を広げられ、声を漏らした。

    鮮やかな桃色の膣内が露わになり、愛液で濡れ光っている。

    「……%CALLNAME:MASTER%に見られてると思うと……どんどん濡れちゃう……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに顔を背けた。

    「……もう、%CALLNAME:MASTER%のせいだからね……」

    %CALLNAME:人物_美鈴%は照れくさそうに、でも嬉しそうに呟いた。

    「あ……そこ、自分で見たことないから……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に秘部を開かれながら、小さく呟いた。

    %CALLNAME:MASTER%は%CALLNAME:人物_美鈴%の秘部をじっくりと鑑賞している。

    「……%CALLNAME:MASTER%は、どう思う……？　私の……その……」

    恥ずかしそうに問いかける%CALLNAME:人物_美鈴%。その目には期待の色が浮かんでいる。

    「……綺麗って言ってくれたら……嬉しいな……」

    %CALLNAME:人物_美鈴%は恋人の答えを待つように、%CALLNAME:MASTER%を見つめた。
