    「あ……んっ……そこ、敏感なんだって……」

    %CALLNAME:人物_魔理沙%は乳首を弄られながら、小さく身を捩った。

    「お前、わざとやってるだろ……っ」

    %CALLNAME:MASTER%の指が乳首を摘むたびに、%CALLNAME:人物_魔理沙%の体がびくりと跳ねる。

    「……こんな声、出させるなよ……恥ずかしいだろ……」

    %CALLNAME:人物_魔理沙%は羞恥に顔を歪めながらも、逃げようとはしなかった。

    「やっ……そんな、つまんだりしないでくれよ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%に乳首を弄られ、困惑している。

    「……私、こういうの……慣れてないんだぜ……」

    %CALLNAME:人物_魔理沙%の乳首は、触られるたびに敏感に反応していた。

    「……%CALLNAME:MASTER%のせいで、変な気分になってきた……」

    恨めしそうな、でもどこか期待するような目で、%CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%を見た。

    「んっ……あっ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の愛撫に翻弄されている。

    「乳首ばかり……いじめるなよ……」

    弱々しく抗議しながらも、%CALLNAME:人物_魔理沙%の体は正直に反応していた。

    「……%CALLNAME:MASTER%……もう、好きにしろよ……」

    観念したように、%CALLNAME:人物_魔理沙%は身を委ねた。
