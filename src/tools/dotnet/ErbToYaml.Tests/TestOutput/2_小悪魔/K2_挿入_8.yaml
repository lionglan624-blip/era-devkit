    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の腕に自分の手を重ね、指を絡めた。

    「……こうしてると……%CALLNAME:MASTER%に包まれてるみたい……幸せですわ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に後ろから抱かれながら、蕩けた表情で息を吐いている。

    「ふふ……顔が見えないから……声、いっぱい出しちゃいますわ……」

    %CALLNAME:MASTER%が突き上げると、%CALLNAME:人物_小悪魔%は体を震わせて嬌声を上げた。

    「あっ……ん……そこ、一番奥……っ！」

    %CALLNAME:人物_小悪魔%の尻尾が%CALLNAME:MASTER%の脚に絡みつき、離すまいとしている。

    「もっと……もっと強く抱きしめて……私、%CALLNAME:MASTER%のものですから……」

    「んぅ……%CALLNAME:MASTER%の心臓の音……背中から聞こえますわ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に身を預けながら、幸せそうに目を細めている。

    %CALLNAME:MASTER%が腰を動かすたびに、%CALLNAME:人物_小悪魔%は甘い声を上げた。

    「あぁっ……そう……そこ、気持ちいい……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の手を取り、自分の胸に導いた。

    「……こっちも……触って……全部、%CALLNAME:MASTER%に感じてほしいの……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の膝に座ったまま、後ろに頭を預けている。

    「%CALLNAME:MASTER%……私、悪魔なのに……こんなに安心できるなんて……」

    %CALLNAME:人物_小悪魔%は自ら腰を動かし、%CALLNAME:MASTER%を受け入れている。

    「あっ……ん……自分から動いちゃう……%CALLNAME:MASTER%が欲しくて……っ」

    %CALLNAME:人物_小悪魔%の羽がぴくぴくと震えている。

    「……ずっと、こうしていたいですわ……%CALLNAME:MASTER%の腕の中……」
