entries:
- id: fallback
  content: >-
    「なにそれ?　うにょうにょ動いてるわね!」

    %CALLNAME:TARGET%はアナルバイブを興味津々で見つめた。

    「へぇ、お尻に入れるの?　%CALLNAME:MASTER%って変なの好きね」

    氷の妖精は臆することなく、恋人の前でお尻を向けた。

    「あたいは最強だから、そんなの余裕よ!」

    強気な言葉とは裏腹に、少しだけ頬が赤い。

    「……%CALLNAME:MASTER%が入れたいなら、いいわよ」

    「ひゃっ!?　冷たい!　動いてるし!」

    アナルバイブの感触に、%CALLNAME:TARGET%は思わず声を上げた。

    「……んっ、変な感じ……うにょうにょしてる……」

    慣れない刺激に体を震わせながら、それでも耐えている。

    「さ、最強のあたいがこれくらいで負けるわけないでしょ!」

    恋人の前では弱みを見せたくないと、必死で強がっている。

    「……でも、%CALLNAME:MASTER%……もっとゆっくり……」

    「ねぇ%CALLNAME:MASTER%、また例の入れるの?」

    %CALLNAME:TARGET%は覚えているらしく、期待と緊張の入り混じった顔だ。

    「前は大変だったけど……今日は最強のあたいが完璧に受け止めるわ!」

    自信満々に宣言して、%CALLNAME:TARGET%はお尻を突き出した。

    「……んんっ、動いてる……やっぱり変な感じ……」

    それでも恋人のためなら頑張れる、そんな健気さが見えた。

    「%CALLNAME:MASTER%が嬉しそうなら……あたいも、悪くないかも」

    「もう、%CALLNAME:MASTER%ったらこういうの好きよね」

    %CALLNAME:TARGET%は呆れたふりをしながらも、拒絶はしなかった。

    「あたいのお尻、そんなに気になる?　しょうがないわね」

    アナルバイブを受け入れながら、小さな喘ぎを漏らす。

    「んっ……あっ……%CALLNAME:MASTER%のばか……」

    恋人だけに見せる、少し甘えた表情が浮かんでいた。

    「……あたいが許すの、%CALLNAME:MASTER%だけなんだからね」
  priority: 4
- id: talent_3_1
  content: >-
    「えっ!?　お、お尻に入れるの!?」

    %CALLNAME:TARGET%はアナルバイブを見て顔を真っ赤にした。

    「そ、そんなところに……変態じゃないの!」

    文句を言いつつも、好きな人の頼みは断れない。

    「……しょ、しょうがないわね!　最強のあたいが付き合ってあげる!」

    恥ずかしそうにお尻を向けながら、%CALLNAME:TARGET%は震えていた。

    「……や、優しくしなさいよね……」

    「ひぅっ!?　う、動いてる!?」

    アナルバイブの蠢きに、%CALLNAME:TARGET%は悲鳴を上げた。

    「な、なによこれ……変な感じ……」

    恥ずかしさと未知の感覚に、頬が紅潮している。

    「%CALLNAME:MASTER%……こんなの、恥ずかしい……」

    好きな人の前でこんな姿を晒すのが耐えられないようだ。

    「……でも、あたいは逃げない……最強だから……」

    「ま、また入れるの……?」

    %CALLNAME:TARGET%は恥ずかしそうに俯いた。

    「……%CALLNAME:MASTER%がしたいなら……あたいは……」

    好きな人のためなら、という想いが伝わってくる。

    「んっ……あっ……動いてる……」

    アナルバイブの刺激に、%CALLNAME:TARGET%は声を堪えた。

    「%CALLNAME:MASTER%に……こんな顔、見せたくない……」

    「%CALLNAME:MASTER%……あたいのこと、変に思ってない……?」

    %CALLNAME:TARGET%は不安げに見上げてきた。

    「こんなの入れられて……平気でいられる方がおかしいわよね……」

    恥ずかしさを隠しきれず、目を逸らしている。

    「……んっ……%CALLNAME:MASTER%のせいで……おかしくなりそう……」

    好きな人に翻弄される自分に、%CALLNAME:TARGET%は戸惑っていた。

    「……あたいのこと……嫌いに、ならないでよね……」
