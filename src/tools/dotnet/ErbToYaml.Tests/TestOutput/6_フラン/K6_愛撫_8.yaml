character: フラン
situation: K6_愛撫
entries:
- id: fallback
  content: >-
    「ねぇ、%CALLNAME:MASTER%……見たいの？　ここ」

    %CALLNAME:人物_フラン%はそう囁くと、自ら脚を開いて見せた。

    495年間、誰にも見せることのなかった場所。

    「えへへ……恥ずかしいけど、%CALLNAME:MASTER%なら見せてあげる」

    %CALLNAME:MASTER%が両指でその秘貝を押し開くと、鮮やかな桃色の蕾が現れた。

    %CALLNAME:人物_フラン%は頬を赤らめながらも、嬉しそうに微笑んでいた。

    「私の全部……%CALLNAME:MASTER%のものだよ。壊さないでね？」

    「あっ……そこ、開くの……？」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の秘貝を指で押し開くと、甘い声が漏れた。

    %CALLNAME:人物_フラン%の小さな身体が、かすかに震えている。

    「んっ……中まで見られるの、恥ずかしいのさ……」

    %CALLNAME:MASTER%は構わずじっくりとその膣内を覗き込んだ。

    鮮やかな桃色に染まり、愛液が滴っている。

    「……でもね、%CALLNAME:MASTER%に見られるの、嫌じゃないよ」

    %CALLNAME:人物_フラン%は恥ずかしそうに、でも幸せそうに目を細めた。

    「……%CALLNAME:MASTER%、私のこと、もっと見て？」

    %CALLNAME:人物_フラン%は自らの手で陰唇を左右に広げて見せた。

    地下に閉じ込められていた少女が、恋人のためだけに見せる姿。

    「ふふ……こんな格好、%CALLNAME:MASTER%にしか見せないのさ」

    鮮やかな秘部が、%CALLNAME:MASTER%の目の前に晒されている。

    %CALLNAME:MASTER%がふっと息を吹きかけると、

    「ひゃっ……！　もぅ、くすぐったいのさ……」

    %CALLNAME:人物_フラン%は身体を震わせながらも、嬉しそうに笑った。

    「%CALLNAME:MASTER%……いっぱい見ていいよ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手を取り、自らの秘部へと導いた。

    %CALLNAME:MASTER%がその秘貝を両指で押し開くと、蕾が収縮を繰り返した。

    「やぁ……そこ、見られると、変な感じ……」

    %CALLNAME:人物_フラン%の膣内は鮮やかな桃色に染まり、愛液で濡れている。

    %CALLNAME:MASTER%が陰核を指先で軽く触れると、

    「あっ……！　んん……%CALLNAME:MASTER%……好き……」

    %CALLNAME:人物_フラン%は甘い声を上げ、全てを恋人に委ねていた。
  priority: 4
- id: talent_3_1
  content: >-
    「えっ……そ、そこ……開くの……？」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の秘部に手を伸ばすと、驚いた声が上がった。

    「あ……やぁ……見ないで……」

    %CALLNAME:MASTER%が両指で秘貝を押し開くと、

    %CALLNAME:人物_フラン%は顔を真っ赤にして両手で顔を覆った。

    鮮やかな桃色の蕾が%CALLNAME:MASTER%の目の前に晒されている。

    「……恥ずかしいのさ……でも、%CALLNAME:MASTER%なら……」

    「ちょっ……何するの……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手を押さえようとした。

    だが%CALLNAME:MASTER%は構わずその秘貝を左右に広げていく。

    「あっ……やぁ……そんな、じっと見ないでよ……」

    %CALLNAME:人物_フラン%は恥ずかしそうに身を捩った。

    その紅い瞳には、羞恥と期待が入り混じっていた。

    「……%CALLNAME:MASTER%って、えっちなのさ……」

    罵倒しながらも、%CALLNAME:人物_フラン%は脚を閉じようとはしなかった。

    「……っ、何がしたいの」

    %CALLNAME:人物_フラン%は首を傾げて%CALLNAME:MASTER%を見た。

    だが%CALLNAME:MASTER%がその場所を押し開くと、

    「ひっ……！　開いちゃ……だめ……」

    %CALLNAME:人物_フラン%の抵抗は弱く、秘貝は容易く開かれていった。

    「見ないでったら……恥ずかしいから……」

    鮮やかな膣内が%CALLNAME:MASTER%の視線に晒されている。

    「……もう、%CALLNAME:MASTER%のこと、壊しちゃうのさ……嘘だけど」

    「え……何、舐めるの……？」

    %CALLNAME:人物_フラン%は期待と不安の混じった目で%CALLNAME:MASTER%を見た。

    だが%CALLNAME:MASTER%はそうせず、両指で秘貝を左右に開いただけ。

    「ぇ……え？　何を……」

    %CALLNAME:人物_フラン%は何をされているかわからず困惑している。

    「――あ、だめっ！　開いたままにしないで！」

    %CALLNAME:人物_フラン%は顔を真っ赤にして訴えた。

    「見るだけなんて……意地悪なのさ……」
  priority: 3
