character: レミリア
situation: K5_愛撫
entries:
- id: fallback
  content: >-
    「んっ……そう、そこよ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の愛撫に身を委ねている。

    小さな身体が、%CALLNAME:MASTER%の手の動きに合わせてぴくりと震えた。

    「ククク……%CALLNAME:MASTER%、上手になったわね」

    %CALLNAME:人物_レミリア%は艶やかに微笑みながら、紅い瞳で%CALLNAME:MASTER%を見上げた。

    「私の身体を知り尽くしているのは、%CALLNAME:MASTER%だけよ……」

    館の主は、恋人だけに見せる甘い表情を浮かべていた。

    「あっ……やぁ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に触れられ、小さく声を漏らした。

    500年を生きた吸血鬼も、恋人の前では無防備になる。

    「……もっと、触りなさい」

    命令するような口調だが、その声は甘く蕩けていた。

    「私は%CALLNAME:MASTER%のものなんだから……好きにしていいのよ？」

    %CALLNAME:人物_レミリア%は頬を染めながら、そう囁いた。

    「ふぅ……んっ……」

    %CALLNAME:MASTER%の手が%CALLNAME:人物_レミリア%の肌を撫でる。

    吸血鬼の冷たいはずの肌が、ほんのりと熱を帯びていく。

    「……ねぇ、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は甘えるように%CALLNAME:MASTER%に身を寄せた。

    「こうして触れ合う時間が、私は好きよ」

    紅魔館の主は、恋人の腕の中でくつろいでいた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は愛おしそうに%CALLNAME:MASTER%の名を呼んだ。

    %CALLNAME:MASTER%の手が肌を滑るたび、吸血鬼の身体がぴくりと反応する。

    「ククク……500年生きてきて、こんな気分になるなんてね」

    %CALLNAME:人物_レミリア%は照れを隠すように笑った。

    「……ずっと、こうしていたいわ」

    永遠を生きる吸血鬼が、一瞬の幸せを噛みしめていた。
  priority: 4
- id: talent_3_1
  content: >-
    「んっ……そ、そこは……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の愛撫に、思わず声を漏らした。

    「……っ、べ、別に気持ちいいわけじゃないわよ」

    そう言いながらも、身体は正直に%CALLNAME:MASTER%の手に擦り寄っている。

    「……ただ、%CALLNAME:MASTER%に触られるのは、嫌じゃないだけよ」

    %CALLNAME:人物_レミリア%は頬を赤らめながら、視線を逸らした。

    高貴な吸血鬼は、素直に気持ちを認められないでいた。

    「あ……っ」

    %CALLNAME:MASTER%の手が%CALLNAME:人物_レミリア%の身体を撫でる。

    %CALLNAME:人物_レミリア%は小さく身を震わせた。

    「……%CALLNAME:MASTER%、もう少し丁寧にしなさい」

    命令するような口調だが、声は微かに震えていた。

    「私は、紅魔館の主なのよ……雑に扱わないで」

    そう言いながら、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%から離れようとはしなかった。

    「ふ、ふん……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の愛撫を受けながら、強がっていた。

    「この程度で私が乱れると思わないことね」

    しかし、その紅い瞳は潤み、息は少し荒くなっている。

    「……まあ、でも……%CALLNAME:MASTER%のは、悪くないわ」

    %CALLNAME:人物_レミリア%は認めるように、そう呟いた。

    「……もう少しだけ、続けてもいいわよ」

    「……っ」

    %CALLNAME:MASTER%に触れられ、%CALLNAME:人物_レミリア%は息を呑んだ。

    「な、なに？　私の身体が珍しいの？」

    照れ隠しのように、%CALLNAME:人物_レミリア%は不機嫌そうに言った。

    「……べ、別に、触っていいとは言ってないわよ」

    だが、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手を払いのけようとはしなかった。

    「……ただ、やめろとも言ってないだけよ」
  priority: 3
  condition:
    type: Talent
    talentType: 3
