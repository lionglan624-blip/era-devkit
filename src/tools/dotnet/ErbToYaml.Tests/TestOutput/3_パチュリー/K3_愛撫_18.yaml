    「……っ……一つ……入った……」

    %CALLNAME:TARGET%は冷静を装おうとするが、声が震えている。

    「……ふぅん……」

    %CALLNAME:TARGET%はアナルビーズの感触を分析しようとしている。

    「……珠の直径と間隔……計算された設計ね……」

    しかし珠が増える度に、%CALLNAME:TARGET%の冷静さは揺らいでいく。

    「……むきゅ……これは……予想外の刺激……」

    %CALLNAME:TARGET%は困惑した表情で、%CALLNAME:MASTER%を見上げた。

    「……」

    %CALLNAME:TARGET%は無言でアナルビーズの挿入を受けている。

    珠が一つ入る度に、%CALLNAME:TARGET%の呼吸が微かに乱れる。

    「……腸内の圧迫感……悪くは……ないわね……」

    %CALLNAME:TARGET%はぼそりと呟いた。

    「……でも……調子に乗らないで……」

    「……ん……」

    %CALLNAME:TARGET%はアナルビーズの感触に、小さく声を漏らした。

    「……珠の数……数えて……分析を……」

    しかし快感が思考を邪魔し、%CALLNAME:TARGET%は言葉を途切れさせた。

    「……三つ……四つ……もう……分からないわ……」

