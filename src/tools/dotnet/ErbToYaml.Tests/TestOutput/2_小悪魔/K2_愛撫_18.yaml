    %CALLNAME:人物_小悪魔%は甘い吐息を漏らしながら、%CALLNAME:MASTER%に寄りかかった。

    「……悪魔の乳首でも……こんなに敏感なんですのよ……」

    「んふふ……またそれですの……？」

    %CALLNAME:人物_小悪魔%は悪戯っぽく微笑みながら、胸を差し出した。

    %CALLNAME:MASTER%がクリップローターを装着し、電源を入れた。

    「あっ……んっ……乳首が……小刻みに震えて……」

    「%CALLNAME:MASTER%……強くしても……いいですわよ……」

    悪魔らしい妖艶な笑みを浮かべながら、%CALLNAME:人物_小悪魔%は振動を楽しんだ。

    「ひゃっ……いきなり……乳首に……」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の乳首にクリップローターを押し付けた。

    電源が入ると、%CALLNAME:人物_小悪魔%は背筋を震わせた。

    「……んふふ……%CALLNAME:MASTER%ったら……私の弱いところ……」

    「……乳首で振動されると……頭が……蕩けちゃいますわ……」

    そう言いながら、%CALLNAME:人物_小悪魔%は恍惚とした表情を浮かべた。

    「あっ……やぁっ……乳首が……震えて……」

    %CALLNAME:MASTER%がクリップローターの振動を強めると、%CALLNAME:人物_小悪魔%は体を震わせた。

    「%CALLNAME:MASTER%……悪魔を……こんな道具で……蕩かすなんて……」

    %CALLNAME:人物_小悪魔%は潤んだ瞳で%CALLNAME:MASTER%を振り返った。

    「……もう……%CALLNAME:MASTER%の思い通りですわ……」

    甘えるように、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に身を預けた。
