    「ひゃっ……いきなり……中に……」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%にバイブを挿入し、振動を開始した。

    %CALLNAME:人物_小悪魔%は声を押し殺そうとしながらも、甘い吐息が漏れる。

    「……んふふ……%CALLNAME:MASTER%ったら……私の弱いところ……知ってますわね……」

    「……ここで振動されると……頭が……とろけちゃいますわ……」

    そう言って、%CALLNAME:人物_小悪魔%は恍惚とした表情を浮かべた。

    「あっ……やぁっ……動いてる……」

    %CALLNAME:MASTER%がバイブの振動を強めると、%CALLNAME:人物_小悪魔%は腰をくねらせた。

    「%CALLNAME:MASTER%……悪魔を……こんなに蕩けさせて……」

    %CALLNAME:人物_小悪魔%は潤んだ瞳で%CALLNAME:MASTER%を見つめた。

    「……もう……%CALLNAME:MASTER%なしでは……いられませんわ……」

    甘えるように、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の胸に顔を埋めた。
