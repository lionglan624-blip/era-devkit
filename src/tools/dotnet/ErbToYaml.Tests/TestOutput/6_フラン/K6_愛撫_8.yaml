- id: fallback
  content: >-
    「……何するの？」

    %CALLNAME:人物_フラン%は不思議そうに%CALLNAME:MASTER%を見た。

    だが%CALLNAME:MASTER%がその秘部を押し開くと、

    「っ……！」

    %CALLNAME:人物_フラン%は小さく息を呑んだ。

    「……なんか、変な感じ」

    そう言いながらも、%CALLNAME:人物_フラン%は%CALLNAME:MASTER%を止めようとはしなかった。

    「……%CALLNAME:MASTER%って、面白いことするのさ」

    「……ふぅん」

    %CALLNAME:人物_フラン%は興味深そうに%CALLNAME:MASTER%を見ていた。

    %CALLNAME:MASTER%がゆっくりとその秘貝を開いていく。

    「そ、そこを見るなんて……変なの……」

    %CALLNAME:人物_フラン%の声には戸惑いが滲んでいた。

    「……お姉様にも見せたことないのに」

    頬を染めた%CALLNAME:人物_フラン%は、視線を逸らした。

    「……見たいなら、見ればいいのさ」

    「……何がしたいの、%CALLNAME:MASTER%」

    %CALLNAME:人物_フラン%は小首を傾げた。

    だが%CALLNAME:MASTER%がその秘所を押し開くと、

    「……あ」

    %CALLNAME:人物_フラン%は小さな声を漏らした。

    「……地下にいた時は、誰もこんなことしなかったのさ」

    そう言いながらも、%CALLNAME:人物_フラン%の身体は微かに震えていた。

    「……まあいいのさ。好きにしたら」

    「……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見つめていた。

    %CALLNAME:MASTER%がその場所を指で押し開くと、

    「……不思議な感じ」

    %CALLNAME:人物_フラン%は自分の身体を見下ろした。

    「……こういうの、初めてだから、よくわかんないのさ」

    そう言いながら、%CALLNAME:人物_フラン%は脚を閉じようとはしなかった。

    「……でも、嫌じゃないかも」
  priority: 2
- id: fallback
  content: >-
    「……何するの？」

    %CALLNAME:人物_フラン%は紅い瞳で%CALLNAME:MASTER%を見つめた。

    「私のそこに触るの？」

    %CALLNAME:人物_フラン%の声には、純粋な疑問と危険な響きが混じっている。

    「……ふぅん、面白い人だね」

    495年の孤独を知る少女は、首を傾げた。

    「壊れちゃっても知らないのさ」

    「……」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%を見下ろした。

    「あなた、何がしたいの？」

    %CALLNAME:人物_フラン%の声には、興味があるような、ないような。

    「私に触っても、楽しくないと思うのさ」

    その言葉には、長い孤独の影が見え隠れしていた。

    「……でも、好きにしたら。つまんなかったら、壊しちゃうけど」

    「……ふぅん」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を値踏みするように見ていた。

    「そこを見たいの？　変なの」

    %CALLNAME:人物_フラン%は興味なさそうに呟いた。

    「……お姉様以外で、こんなことする人、初めてなのさ」

    その声には、どこか寂しさが滲んでいた。

    「……今日は特別に許してあげる」

    「きゅっとしてドカーン、って知ってる？」

    %CALLNAME:人物_フラン%は無邪気に笑いながら、%CALLNAME:MASTER%を見た。

    「私、なんでも壊せるのさ」

    その言葉に悪意はない。ただ事実を述べているだけだった。

    「……でも、今日は壊さないであげるね」

    %CALLNAME:人物_フラン%は気まぐれに、そう言い放った。

    「面白いことするなら、遊んであげてもいいのさ」
  priority: 1
