- id: fallback
  content: >-
    「っ……何をしているの」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に乳首を触られ、眉をひそめた。

    「使用人が主の乳首を弄るなんて、身の程を……っ」

    %CALLNAME:MASTER%が乳首を摘まむと、言葉が途切れた。

    「……ふん、今日は機嫌がいいから許してあげるわ」

    そう言いながら、%CALLNAME:人物_レミリア%の頬はほんのり紅く染まっていた。

    「……でも、丁寧に扱いなさいよ」

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は複雑な表情で%CALLNAME:MASTER%を見た。

    %CALLNAME:MASTER%が乳首を指で転がすと、

    「んっ……」

    %CALLNAME:人物_レミリア%は小さく声を漏らし、慌てて口を閉じた。

    「……聞かなかったことにしなさい」

    館の主は、威厳を保とうと必死だった。

    「……それと、次はもう少し優しくしなさい」

    「……ふぅん、度胸だけはあるわね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を睨んだ。

    だが%CALLNAME:MASTER%が乳首を弾くと、

    「ひっ……！」

    %CALLNAME:人物_レミリア%は小さく跳ねた。

    「……今のは、不意打ちだったからよ」

    そう言い訳をしながら、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を上目遣いに見た。

    「……まあ、続けてもいいわ」

    「……随分と大胆ね」

    %CALLNAME:人物_レミリア%は挑発的な笑みを浮かべた。

    %CALLNAME:MASTER%が乳首をくりくりと責めると、その笑みが少し歪んだ。

    「……っ、悪くはないわね」

    %CALLNAME:人物_レミリア%は強がりを言った。

    「使用人への褒美として、もう少し許してあげるわ」

    500年を生きた吸血鬼の心に、何かが芽生え始めていた。
  priority: 2
- id: fallback
  content: >-
    「……何のつもりかしら」

    %CALLNAME:人物_レミリア%は冷たい視線で%CALLNAME:MASTER%を見た。

    「私の乳首に触れるなんて、身の程を知りなさい」

    %CALLNAME:人物_レミリア%は威厳を込めてそう言い放った。

    「……今回だけは見逃してあげるわ」

    紅魔館の主は、不機嫌そうに%CALLNAME:MASTER%を睨んだ。

    「次はないと思いなさい」

    「……っ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の行為に眉をひそめた。

    「大胆ね。私が誰か分かっているの？」

    500年を生きた吸血鬼は、不敵に微笑んだ。

    「身の程を知りなさい、下僕」

    %CALLNAME:人物_レミリア%は静かに、しかし確実に警告した。

    「紅魔館の主を怒らせると、どうなるか……分かっているわよね？」

    「……ふん」

    %CALLNAME:人物_レミリア%は興味なさそうに%CALLNAME:MASTER%を見た。

    「使用人の分際で、随分と図々しいわね」

    %CALLNAME:人物_レミリア%は溜息をついた。

    「……退屈だから付き合ってあげているだけよ」

    そう言いながら、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を値踏みするように見ていた。

    「……あまり調子に乗らないことね」

    「……何かしら」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    「私はこう見えても忙しいのよ」

    紅魔館の主は、高飛車な態度を崩さなかった。

    「……その程度で私が乱れると思わないことね」

    %CALLNAME:人物_レミリア%は威厳を保ちながら、そう言い放った。

    「下がりなさい」
  priority: 1
