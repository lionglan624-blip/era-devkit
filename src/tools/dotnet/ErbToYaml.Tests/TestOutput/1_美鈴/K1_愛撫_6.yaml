character: 美鈴
situation: K1_愛撫
entries:
- id: fallback
  content: >-
    「んっ……%CALLNAME:MASTER%の手、あったかい……」

    %CALLNAME:人物_美鈴%は恋人の胸への愛撫に、とろけるような表情を浮かべている。

    %CALLNAME:MASTER%が胸を優しく揉みほぐすと、%CALLNAME:人物_美鈴%は甘い息を漏らした。

    「ふぅ……そこ、気持ちいいの……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に身を預け、されるがままになっている。

    「……もっと触っていいわよ？　%CALLNAME:MASTER%になら、全部見せてあげる」

    恋人への信頼を込めて、%CALLNAME:人物_美鈴%は甘くささやいた。

    「あぁっ……や、やぁ……」

    %CALLNAME:MASTER%が%CALLNAME:人物_美鈴%の胸を揉むと、彼女は身を捩った。

    「%CALLNAME:MASTER%ったら……そんなに、私の胸が好き？」

    からかうように言いながらも、%CALLNAME:人物_美鈴%の顔は紅潮している。

    %CALLNAME:MASTER%が乳首を指先でなぞると、%CALLNAME:人物_美鈴%はびくりと体を震わせた。

    「ひゃんっ……そこは、敏感なんだから……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに、でも嬉しそうに%CALLNAME:MASTER%を見上げた。

    「ん……ふぅ……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の胸への愛撫に、目を細めている。

    まるで猫が撫でられているような、心地よさそうな表情だ。

    「……%CALLNAME:MASTER%に触られてると、安心するの」

    %CALLNAME:MASTER%が胸を優しく包み込むと、%CALLNAME:人物_美鈴%は幸せそうに微笑んだ。

    「……私の体、%CALLNAME:MASTER%のものだから……好きにしていいわよ」

    %CALLNAME:人物_美鈴%は恋人に全てを委ねるように、体の力を抜いた。

    「ぁっ……んっ……」

    %CALLNAME:MASTER%の愛撫に、%CALLNAME:人物_美鈴%は甘い声を上げている。

    「……%CALLNAME:MASTER%、上手になったわね……私の弱いところ、よく知ってる」

    %CALLNAME:人物_美鈴%は熱っぽい眼差しで恋人を見つめた。

    %CALLNAME:MASTER%が胸を揉みしだく手を強めると、%CALLNAME:人物_美鈴%は息を乱した。

    「あぁっ……も、もう……こんなの、門番の仕事中なのに……」

    抗議の言葉とは裏腹に、%CALLNAME:人物_美鈴%の体は%CALLNAME:MASTER%の愛撫を求めていた。
  priority: 4
- id: talent_3_1
  content: >-
    「ひゃっ……！　む、胸は……」

    %CALLNAME:人物_美鈴%は驚いて%CALLNAME:MASTER%を見たが、その手を払いのけることはしなかった。

    「……もう、%CALLNAME:MASTER%ったら、急にそんな……」

    %CALLNAME:人物_美鈴%の顔は真っ赤に染まっている。

    %CALLNAME:MASTER%が構わず胸を揉み始めると、%CALLNAME:人物_美鈴%は小さく声を漏らした。

    「んっ……そ、そんなに揉まないで……恥ずかしいわ」

    言葉とは裏腹に、%CALLNAME:人物_美鈴%は抵抗する気配を見せなかった。

    「あっ……そこ……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に胸を触られ、思わず声を漏らした。

    「……%CALLNAME:MASTER%、そういうことするなら……ちゃんと責任取ってよね」

    %CALLNAME:人物_美鈴%は顔を赤くしながら、%CALLNAME:MASTER%を上目遣いで見た。

    %CALLNAME:MASTER%が胸の感触を楽しむと、%CALLNAME:人物_美鈴%は身を捩った。

    「やぁ……そんなに揉んだら、形、崩れちゃう……」

    %CALLNAME:人物_美鈴%は弱々しく抗議した。

    「ん……ぁ……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の愛撫に、熱い息を吐いている。

    「……%CALLNAME:MASTER%、私のこと……好き？」

    不安げな表情で、%CALLNAME:人物_美鈴%は問いかけた。

    %CALLNAME:MASTER%が答える代わりに胸を優しく撫でると、%CALLNAME:人物_美鈴%は顔を伏せた。

    「……言葉でも、言ってくれると……嬉しいんだけど」

    %CALLNAME:人物_美鈴%は消え入りそうな声でそう呟いた。

    「きゃっ……！　ちょ、ちょっと%CALLNAME:MASTER%……」

    %CALLNAME:人物_美鈴%は突然の胸への愛撫に、身を強張らせた。

    「……門の前で、こんなこと……誰かに見られたら……」

    %CALLNAME:人物_美鈴%は周囲を気にしながら、でも逃げ出すことはしなかった。

    %CALLNAME:MASTER%が胸を揉み続けると、%CALLNAME:人物_美鈴%は観念したように目を閉じた。

    「もう……%CALLNAME:MASTER%が強引なのが、悪いんだからね……」

    %CALLNAME:人物_美鈴%は言い訳するように呟いた。
