- id: fallback
  content: >-
    「は？　自慰って……何言ってるんだお前！？」

    %CALLNAME:人物_魔理沙%は驚愕の声を上げた。

    しかし%CALLNAME:MASTER%の真剣な表情に、%CALLNAME:人物_魔理沙%は言葉を詰まらせる。

    「……ったく、変なこと言うなよな……」

    %CALLNAME:人物_魔理沙%は文句を言いながらも、おずおずと脚を開いた。

    「……一回だけだからな、一回だけ……」

    震える手で、%CALLNAME:人物_魔理沙%は自分の秘部に触れた。

    「……こ、こんなことさせるなんて、%CALLNAME:MASTER%って最低だぜ」

    %CALLNAME:人物_魔理沙%は恨めしそうに%CALLNAME:MASTER%を睨んだ。

    しかし言われた通り、指は秘部を撫で始めている。

    「……っ、だ、誰にも言うなよ、絶対に……」

    %CALLNAME:人物_魔理沙%は顔を背けながら、小さく声を漏らした。

    「……うぅ、恥ずかしすぎるぜ……」

    %CALLNAME:人物_魔理沙%は屈辱と羞恥に震えながら、それでも指を止めなかった。

    「……本当にするのか？　マジで？」

    %CALLNAME:人物_魔理沙%は信じられないという顔で%CALLNAME:MASTER%を見た。

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_魔理沙%は深いため息をついた。

    「……わかったよ、やればいいんだろ……」

    %CALLNAME:人物_魔理沙%は渋々といった様子で、秘部に手を伸ばした。

    「……見るなよ、絶対見るなよ……」

    無理な要求をしながら、%CALLNAME:人物_魔理沙%は恥じらいの中で自慰を始めた。

    「……お前、いつからそんな趣味に目覚めたんだよ」

    %CALLNAME:人物_魔理沙%は呆れたように言った。

    しかしその頬は赤く染まっている。

    「……まあ、お前の頼みなら……しょうがないな」

    %CALLNAME:人物_魔理沙%は諦めたように脚を開き、自分の秘部を撫で始めた。

    「……っ、ほ、本当にしてるんだからな……満足か？」

    %CALLNAME:人物_魔理沙%は恥ずかしさを隠すように、強がって見せた。
