- id: fallback
  content: >-
    %CALLNAME:MASTER%の手が%CALLNAME:人物_パチュリー%の秘所に伸びた。

    「っ！？ ちょ、ちょっと……！」

    %CALLNAME:人物_パチュリー%は顔を真っ赤にして、本で体を隠そうとした。

    「そ、そんなところ……いきなり触るなんて……」

    %CALLNAME:人物_パチュリー%は戸惑いながらも、逃げ出すことはしなかった。

    「……は、恥ずかしいじゃない……」

    「むきゅっ……！」

    %CALLNAME:MASTER%の指が敏感な場所に触れ、%CALLNAME:人物_パチュリー%は思わず変な声を上げた。

    「な、何をするの……そんなところ……」

    %CALLNAME:人物_パチュリー%は困惑した表情で%CALLNAME:MASTER%を見つめた。

    「……本には、こういうことは書いてなかったわ……」

    抵抗するでもなく、%CALLNAME:人物_パチュリー%はされるがままになっている。

    「あ……やめ……」

    %CALLNAME:MASTER%の愛撫に、%CALLNAME:人物_パチュリー%は小さく声を漏らした。

    「そ、そこは……敏感なの……」

    %CALLNAME:人物_パチュリー%は顔を本で隠しながら、か細い声で訴えた。

    「……急に、こんなこと……心の準備が……」

    「んっ……ま、待って……」

    %CALLNAME:MASTER%の手が%CALLNAME:人物_パチュリー%の体を探ると、彼女は小さく震えた。

    「い、いきなりすぎるわ……」

    %CALLNAME:人物_パチュリー%は戸惑いながらも、%CALLNAME:MASTER%を拒絶しきれずにいる。

    「……もう少し、段階というものを踏みなさい……」

    本で顔を隠しながら、%CALLNAME:人物_パチュリー%は小声でそう言った。
