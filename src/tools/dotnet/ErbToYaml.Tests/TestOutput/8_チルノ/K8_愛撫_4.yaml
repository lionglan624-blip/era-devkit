    「あたいのおしり……舐めて気持ちいいの……？」

    恥ずかしそうに振り返りながらも、%CALLNAME:人物_チルノ%は逃げようとしなかった。

    「……%CALLNAME:MASTER%が気持ちいいなら……あたいも嬉しいよ……」

    そう言って、%CALLNAME:人物_チルノ%は腰を浮かせて%CALLNAME:MASTER%に差し出した。

    「んんっ……！　や……そこ……舌が……」

    %CALLNAME:人物_チルノ%は顔を真っ赤にして、シーツを握りしめている。

    %CALLNAME:MASTER%の舌が後ろの穴を丁寧に舐めると、甘い吐息が漏れた。

    「あたい……こんなところ舐められて……変な気持ち……」

    %CALLNAME:人物_チルノ%は恥ずかしさに耐えながらも、腰を揺らしている。

    「……もっと……舐めて……%CALLNAME:MASTER%……」

    消え入りそうな声で、%CALLNAME:人物_チルノ%は甘えた。

    「ふぁっ……！　%CALLNAME:MASTER%の舌……あったかい……」

    %CALLNAME:人物_チルノ%は後ろを舐められる感覚に、体を跳ねさせた。

    普段の威勢のいい態度はどこへやら、今は甘い声を漏らしている。

    「……あたいのここ……そんなに美味しいの……？」

    恥ずかしそうに問いかける%CALLNAME:人物_チルノ%の頬は真っ赤に染まっていた。

    「……%CALLNAME:MASTER%だけだからね……こんなとこ舐めさせるの……」

    %CALLNAME:人物_チルノ%は照れくさそうに、でも嬉しそうに微笑んだ。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は珍しくおとなしく、%CALLNAME:MASTER%に身を委ねている。

    後ろの穴を優しく舐められると、体がとろけるように脱力した。

    「……あたいのおしり……舐めるの好きなんでしょ……？」

    %CALLNAME:人物_チルノ%は恥ずかしそうに、でも幸せそうに囁いた。

    「……あたいも……%CALLNAME:MASTER%にされるの……嫌じゃないから……」

    そう言って、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%に体を預けた。
