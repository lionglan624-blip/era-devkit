- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、そこを……舐めればいいのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の後ろに顔を近づけた。

    本で読んだ知識を思い出しながら、おそるおそる舌を伸ばす。

    「……ん……ちゅ……こんな場所を舐めるなんて……」

    %CALLNAME:TARGET%は羞恥に頬を染めながらも、舌を這わせ始めた。

    「……あなたのためなら……これも研究の一環よ……」

    照れ隠しの言い訳をしながらも、舌は止まらなかった。

    「……れろ……ちゅ……あなたの……ここも……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の窄まりに舌を押し当てている。

    「……本には書いてなかったわ……この味は……」

    %CALLNAME:TARGET%は学者らしく観察しながらも、表情は蕩けていた。

    「……あなたを感じられて……嬉しいの……」

    そう小さく呟いて、%CALLNAME:TARGET%は舌の動きを続けた。

    「……ふぅ……こんな体勢……疲れるわ……」

    %CALLNAME:TARGET%は体が弱いながらも、%CALLNAME:MASTER%への奉仕を続けていた。

    「……でも、あなたの喜ぶ顔が見たいから……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げて、微笑んだ。

    「……ちゅる……もう少し、頑張るわ……」

    脆弱な体に鞭打ちながら、愛する人のために舌を動かし続けた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の後ろを丁寧に舐め上げている。

    「……こうして触れていると……あなたの全てを知りたくなるわ……」

    %CALLNAME:TARGET%は穏やかな表情で言った。

    「……恥ずかしい場所でも……私の舌で満たせるなら……光栄よ」

    知識の魔女は、愛する人への献身に静かな喜びを感じていた。
