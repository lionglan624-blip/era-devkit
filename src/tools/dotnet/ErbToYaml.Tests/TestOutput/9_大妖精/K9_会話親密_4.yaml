entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%をそっと抱きしめた。

    「んっ…%CALLNAME:MASTER%…♪」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋めた。

    温かな体温が二人の間を満たしていく。

    「…ふふ、あったかい…%CALLNAME:MASTER%の腕の中、落ち着くの…」

    「わたし、%CALLNAME:MASTER%のそばにいられて、本当に幸せだよ…」

    %CALLNAME:TARGET%は幸せそうに目を細めて、%CALLNAME:MASTER%に身を委ねた。

    「――ぎゅってして、%CALLNAME:MASTER%…♪」

    %CALLNAME:TARGET%がおずおずとお願いしてきた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の小さな体を優しく抱きしめた。

    「…えへへ、あったかいね…」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中に腕を回した。

    「チルノちゃんには内緒だけど…こうしてるの、一番幸せなの」

    控えめな妖精は、恋人の温もりに包まれて穏やかに微笑んだ。

    %CALLNAME:MASTER%は後ろから%CALLNAME:TARGET%を抱きしめた。

    「わっ…ふふ、%CALLNAME:MASTER%ったら…」

    %CALLNAME:TARGET%は驚きながらも、すぐに体の力を抜いた。

    「…こうしてると、%CALLNAME:MASTER%の心臓の音が聞こえるの」

    %CALLNAME:TARGET%は目を閉じて、%CALLNAME:MASTER%の腕に手を添えた。

    「…どくん、どくん…って。なんだか、安心するなぁ…」

    背中の羽が幸せそうにゆっくりと揺れている。

    「ねえ、%CALLNAME:MASTER%…」

    %CALLNAME:TARGET%は自分から%CALLNAME:MASTER%に抱きついてきた。

    「今日ね、チルノちゃんと遊んでて…ちょっと疲れちゃったの」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に頬を寄せる。

    「…でも、%CALLNAME:MASTER%に抱きしめてもらうと、元気が出るの」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の頭を優しく撫でた。

    「…えへへ、ありがとう…大好きだよ、%CALLNAME:MASTER%…」

    控えめな妖精は、恋人の胸の中で幸せそうに微笑んだ。
