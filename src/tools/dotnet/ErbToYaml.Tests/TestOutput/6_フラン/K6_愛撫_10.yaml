entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、そこ好きなのさ」

    %CALLNAME:人物_フラン%は愛しそうに%CALLNAME:MASTER%を見下ろした。

    敏感な先端を吸われて、小さな身体が微かに震える。

    「あっ……ん……気持ちいい……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の頭を抱き寄せた。

    495年の孤独を埋めるように、恋人の温もりを感じている。

    「……%CALLNAME:MASTER%がいると、壊したくならないのさ」

    「やぁ……そこ、くすぐったいのさ……」

    %CALLNAME:人物_フラン%は身悶えしながらも、幸せそうに微笑んだ。

    %CALLNAME:MASTER%の舌が小さな乳首を転がすたび、甘い声が漏れる。

    「んっ……あっ……もっと、してもいいのさ……」

    %CALLNAME:人物_フラン%は恋人の髪を優しく撫でた。

    「%CALLNAME:MASTER%に吸われてると……私、すごく安心するの……」

    地下室の孤独な少女は、今、恋人の腕の中で幸せを感じていた。

    「あ……んぅ……%CALLNAME:MASTER%、上手……」

    %CALLNAME:人物_フラン%は快感に目を細めた。

    小さな胸を丁寧に愛撫されて、身体が熱くなっていく。

    「……私ね、こうやって触られるの、好きなのさ」

    %CALLNAME:人物_フラン%は恥ずかしそうに打ち明けた。

    「だって……%CALLNAME:MASTER%が私を大事にしてくれてるって、わかるから……」

    その紅い瞳には、深い愛情が宿っていた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の唇を胸に受けながら、静かに呟いた。

    「私、今すっごく幸せなのさ……」

    敏感な乳首を吸われて、甘い痺れが全身を巡る。

    「ずっと一人だったけど……今は%CALLNAME:MASTER%がいる……」

    %CALLNAME:人物_フラン%の紅い瞳が、優しく潤んだ。

    「……だから、もっともっと吸っていいのさ」
  priority: 4
- id: talent_3_1
  content: >-
    「えっ……そこ、吸うの……？」

    %CALLNAME:人物_フラン%は驚いて目を丸くした。

    「やぁ……恥ずかしいのさ……」

    しかし、%CALLNAME:MASTER%を拒むことはしなかった。

    「ひゃっ……あ……」

    %CALLNAME:人物_フラン%は初めての感覚に身を震わせた。

    「……%CALLNAME:MASTER%なら、いい……のかも……」

    「あっ……そこ、敏感なのさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%に乳首を吸われ、甘い声を漏らした。

    「や、やだ……変な声、出ちゃう……」

    %CALLNAME:人物_フラン%は恥ずかしそうに顔を背けた。

    「でも……止めないで……」

    %CALLNAME:人物_フラン%は小さな声で付け加えた。

    「……気持ちいいの、本当なのさ……」

    「こんなの……初めてなのさ……」

    %CALLNAME:人物_フラン%は戸惑いながらも、%CALLNAME:MASTER%を受け入れていた。

    小さな胸に触れる唇と舌の感触に、身体が熱くなる。

    「んっ……あっ……」

    %CALLNAME:人物_フラン%は甘い吐息を漏らした。

    「%CALLNAME:MASTER%に、こんなことされるなんて……」

    その顔は、恥ずかしさと喜びで赤く染まっていた。

    「%CALLNAME:MASTER%……そんなに吸ったら……」

    %CALLNAME:人物_フラン%は切なげな声を上げた。

    敏感な乳首を執拗に吸われて、頭がぼうっとしてくる。

    「あっ……やぁ……なんか、変になっちゃいそう……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%にしがみついた。

    「……でもね、嫌じゃないのさ……」

    恋心を抱く相手に愛撫されて、少女は甘い痺れに溺れていく。
