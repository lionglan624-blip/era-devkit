- id: fallback
  content: >-
    「……そちらも……おもてなしの範囲ですわね……」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「お客様のご要望にお応えするのは……メイドの務め……」

    しかし、%CALLNAME:MASTER%が菊穴に進入すると、体は正直に反応してしまう。

    「っ……きつい……異物感が……」

    「……少し……変な気分になっているだけですわ……」

    %CALLNAME:TARGET%は自分の反応を言い訳するように付け加えた。

    「……ん……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は複雑な表情を浮かべている。

    「向かい合いながら……後ろで……これは困りますわ……」

    「貴方の顔が見えて……何を考えているのか……」

    %CALLNAME:MASTER%が深く突くと、%CALLNAME:TARGET%の体が跳ねた。

    「あっ……そこは……奥が……」

    言葉を途中で飲み込み、%CALLNAME:TARGET%は唇を噛んだ。

    「……これは……仕事……ですから……」

    %CALLNAME:TARGET%は何度も自分に言い聞かせている。

    しかし、腸内を貫かれる体は快感を覚え始めていた。

    「……ぅ……変な気分になってきましたわ……」

    「%CALLNAME:MASTER%のせいですからね……後ろなんて……」

    %CALLNAME:TARGET%は責任を押し付けながらも、抵抗する様子はなかった。

    「……もう少し……続けても構いませんわ……」

    「……っ……」

    %CALLNAME:TARGET%は声を堪えようとしたが、漏れてしまう。

    「……後ろで……こんな声を出すなんて……」

    「%CALLNAME:MASTER%、貴方は……私を困らせてばかりですわね……」

    恨めしそうに言いながらも、%CALLNAME:TARGET%の瞳には別の感情が宿っていた。

    「……でも……嫌ではありませんの……」

    小さな声で、%CALLNAME:TARGET%はそう認めた。
