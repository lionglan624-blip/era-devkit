    「……ん……こう……動かせばいいの……？」

    %CALLNAME:TARGET%はぎこちなく足を上下させている。

    「……文献には、足で挟んで擦ると……とあったけど……」

    %CALLNAME:TARGET%は知識を頼りに、足の動きを工夫していた。

    「……ど、どう……？　変じゃない……？」

    不安そうに%CALLNAME:MASTER%の顔を覗き込んだ。

    「……んっ……こんなこと……恥ずかしいわ……」

    %CALLNAME:TARGET%は羞恥に顔を染めながら、足を動かし続けている。

    「……足で……触れるなんて……変態みたいよ……」

    %CALLNAME:TARGET%は正直に認めた。

    「……で、でも……あなたがそう望むなら……続けるわ……」

    恥ずかしさを堪えながらも、%CALLNAME:TARGET%は足を動かし続けた。

    「……%CALLNAME:MASTER%……顔、見ないで……」

    %CALLNAME:TARGET%は視線を避けながら、足を動かしていた。

    「……こんな姿……恥ずかしいのよ……」

    しかし、足は止めようとしない。

    「……あなたを……気持ち良くしたいから……」

    小さな声で本音を漏らしながら、%CALLNAME:TARGET%は足を動かし続けた。
