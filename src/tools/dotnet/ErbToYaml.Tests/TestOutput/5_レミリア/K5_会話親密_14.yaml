- id: fallback
  content: >-
    「っ……！ 何をするの……」

    %CALLNAME:TARGET%は驚いて身を引いた。

    「……紅魔館の主に、そんな無礼を……」

    しかし、その声には怒りよりも困惑が混じっていた。

    「……まあいいわ。貴方には少し興味があるから……」

    %CALLNAME:TARGET%は複雑な表情で%CALLNAME:MASTER%を見つめた。

    「あ……そこは……」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の後ろに触れた。

    「……随分と大胆なのね、人間のくせに……」

    %CALLNAME:TARGET%は戸惑いながらも、完全には拒まなかった。

    「……少しだけよ。調子に乗らないことね。」

    紅魔館の主は警戒しながらも、%CALLNAME:MASTER%に興味を示した。

    「んっ……そこは、恥ずかしい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の愛撫に戸惑っている。

    「……500年生きても、こんな経験は初めてよ……」

    %CALLNAME:TARGET%は困惑しながらも、%CALLNAME:MASTER%を見つめた。

    「……貴方、私を試しているの……？」

    紅い瞳に、警戒と興味が入り混じっていた。

    「っ……変な感じ……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の後孔を撫でている。

    「……私に何を求めているの……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げた。

    「……ふふ、面白いわね。もう少し、見せてもらおうかしら……」

    紅魔館の主は、%CALLNAME:MASTER%への興味を隠せないでいた。
  priority: 2
- id: fallback
  content: >-
    「……何のつもり？」

    %CALLNAME:TARGET%は冷たい視線で%CALLNAME:MASTER%を見据えた。

    「紅魔館の主に、そんな無礼が許されると思っているの？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を払いのけた。

    「……身の程を弁えなさい。」

    500年を生きた吸血鬼の威厳が、%CALLNAME:MASTER%を圧倒した。

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の後ろに触れようとした。

    「……愚かね。」

    %CALLNAME:TARGET%は冷ややかに笑った。

    「私の体に触れる権利は、貴方にはないわ。」

    「……もう一度やったら、食べてしまうわよ？」

    紅魔館の主は、危険な笑みを浮かべた。

    「……ふふ、大胆なのね。」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の行動を見下ろした。

    「でも、私はそんな安い女ではないわ。」

    %CALLNAME:TARGET%は優雅に身を引いた。

    「……運命が貴方に微笑むまで、待つことね。」

    紅い悪魔は、高慢な笑みを浮かべて%CALLNAME:MASTER%を見据えた。

    %CALLNAME:MASTER%が%CALLNAME:TARGET%に触れようとした。

    「……止めなさい。」

    %CALLNAME:TARGET%の声が冷たく響いた。

    「私に触れたいなら、まず私を知りなさい。」

    「……貴方はまだ、その資格がないのよ。」

    紅魔館の主は、威厳を持って%CALLNAME:MASTER%を退けた。
  priority: 1
