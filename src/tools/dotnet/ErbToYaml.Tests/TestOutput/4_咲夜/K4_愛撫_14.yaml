- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%がオナホールを見せると、%CALLNAME:TARGET%は戸惑いの表情を浮かべた。

    「……それは、何ですの」

    説明を聞いた%CALLNAME:TARGET%は、顔を真っ赤にして俯いた。

    「そ、そのような破廉恥な道具を……私の中に……」

    オナホールが挿入されると、%CALLNAME:TARGET%の体が強張る。

    「っ……冷たい……困りますわ……」

    「あっ……やめ……いえ……」

    オナホールの感触に、%CALLNAME:TARGET%は言葉を失いかけた。

    「……こんな道具に……負けるわけには……」

    %CALLNAME:TARGET%は抗いながらも、快感に抗えずにいた。

    「%CALLNAME:MASTER%は……本当に意地悪ですわね……」

    そう言いながらも、%CALLNAME:TARGET%の声には隠しきれない甘さが滲んでいた。

    挿入された道具が%CALLNAME:TARGET%の体をじわりと刺激していく。

    「んっ……そんな……動かさないでくださいまし……」

    %CALLNAME:TARGET%は目を細め、小さく息を漏らした。

    「……感じてなんか……いませんわ……」

    そう言う%CALLNAME:TARGET%の腰は、僅かに揺れている。

    「……少しだけ……少しだけですわよ……」

    「……っ……」

    オナホールに貫かれたまま、%CALLNAME:TARGET%は声を押し殺していた。

    「……%CALLNAME:MASTER%……どうして、こんな道具を……」

    %CALLNAME:TARGET%の問いかけは、快感に遮られて消えた。

    「メイドとして……こんな姿……」

    %CALLNAME:TARGET%は顔を背けながらも、%CALLNAME:MASTER%から離れようとはしなかった。
