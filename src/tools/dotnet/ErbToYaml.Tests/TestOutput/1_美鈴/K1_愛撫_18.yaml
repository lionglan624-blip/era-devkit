character: 美鈴
situation: K1_愛撫
entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%が小さな黒いクリップローターを取り出すと、%CALLNAME:人物_美鈴%は微笑んだ。

    「ふふっ……それ、乳首につけるやつでしょ？」

    %CALLNAME:人物_美鈴%は自ら胸を差し出し、恋人の行為を待った。

    %CALLNAME:MASTER%がクリップローターを装着すると、%CALLNAME:人物_美鈴%は甘い吐息を漏らす。

    「んっ……電源、入れていいわよ。%CALLNAME:MASTER%の好きにして」

    振動が始まると、%CALLNAME:人物_美鈴%は恋人に寄り添い、身を任せた。

    「あら、今日はそれを使うの？　ふふっ、%CALLNAME:MASTER%ったら」

    %CALLNAME:人物_美鈴%は期待を込めた瞳で、クリップローターを見つめた。

    %CALLNAME:MASTER%が乳首にそれを装着すると、%CALLNAME:人物_美鈴%は小さく身震いした。

    「んっ……振動、始まった……あっ、気持ちいい……」

    %CALLNAME:人物_美鈴%は門番の威厳を忘れ、恋人の腕に身を預けた。

    「……%CALLNAME:MASTER%といると、どんどん乱れちゃう……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に身を寄せ、そっと胸元を差し出した。

    「……%CALLNAME:MASTER%がしたいなら、いいわよ。つけて」

    クリップローターが乳首を挟むと、%CALLNAME:人物_美鈴%は唇を噛んだ。

    「ひぁっ……！　振動が、直接乳首に……あっ、んんっ……」

    小刻みな振動が敏感な突起を刺激し続ける。

    %CALLNAME:人物_美鈴%は恋人の胸に顔を埋め、甘い声を漏らし続けた。

    「……%CALLNAME:MASTER%、またそれ？　ふふっ、好きなのね」

    %CALLNAME:人物_美鈴%は少し呆れながらも、嬉しそうに微笑んだ。

    「いいわよ、好きなだけ遊んで。私の体は%CALLNAME:MASTER%のものだから」

    クリップローターが装着され、振動が始まる。

    「あっ……んっ……乳首、ビリビリして……やぁ……」

    %CALLNAME:人物_美鈴%は恍惚とした表情で、恋人に甘えていた。
  priority: 4
- id: talent_3_1
  content: >-
    「ちょ、ちょっと%CALLNAME:MASTER%……！　それ、乳首に……？」

    %CALLNAME:人物_美鈴%はクリップローターを見て、顔を真っ赤にした。

    「そ、そんな道具を使うなんて……恥ずかしいって……」

    しかし装着されて振動が始まると、%CALLNAME:人物_美鈴%は抗えなくなる。

    「んっ……あっ……乳首が震えて……やぁ……」

    %CALLNAME:人物_美鈴%は恥ずかしさと快感の間で揺れていた。

    「え……それ、何ですか……？　乳首につけるの……？」

    %CALLNAME:人物_美鈴%は戸惑いながらも、%CALLNAME:MASTER%から目を逸らせない。

    「……もう、%CALLNAME:MASTER%ったら、変なもの持ってるのね……」

    クリップローターが装着され、振動が始まった。

    「ひゃっ……！　これ、振動して……あっ、止まらない……」

    %CALLNAME:人物_美鈴%は震える声で、%CALLNAME:MASTER%の名を呼んだ。

    「……%CALLNAME:MASTER%、そういうの持ってるんだ……」

    %CALLNAME:人物_美鈴%は困ったような、でも期待を隠せない表情を浮かべた。

    クリップローターが乳首を挟み、振動を始めた。

    「あっ……やっ……乳首が、ビリビリして……変な感じ……」

    %CALLNAME:人物_美鈴%は思わず胸を押さえようとするが、止められない。

    「んっ……%CALLNAME:MASTER%のこと……嫌いになれないの……」

    「……」

    %CALLNAME:人物_美鈴%は黙ってクリップローターを見つめ、覚悟を決めたように息を吐いた。

    「……%CALLNAME:MASTER%がしたいなら……乳首につけて、いいわ」

    装着された振動が乳首を責め、%CALLNAME:人物_美鈴%は声を上げた。

    「あぁっ……！　やっ、これ……乳首がジンジンして……っ」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%への想いを抑えきれず、身を任せた。
