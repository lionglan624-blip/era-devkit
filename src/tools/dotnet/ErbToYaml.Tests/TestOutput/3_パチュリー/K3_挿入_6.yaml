- id: fallback
  content: >-
    「……これが、対面座位……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と向かい合いながら、興味深そうな目をしている。

    「……本で読んだ通り、密着感が高い体位ね……」

    %CALLNAME:TARGET%は冷静を保とうとしているが、頬が上気している。

    「……んっ……顔が近い……これは、分析しにくいわ……」

    観察者でいるつもりが、距離の近さに動揺している。

    「んっ……ふぅ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きを、なんとか観察しようとしている。

    「……興味深いわ。この体位だと、相手の反応が直接見える……」

    %CALLNAME:TARGET%は淡々と言おうとしたが、声が震えた。

    「……なぜ、こんなに心拍数が上がるのかしら……」

    自分の反応に、%CALLNAME:TARGET%自身が戸惑っている。

    「あ……そこ……っ」

    %CALLNAME:TARGET%は思わず声を漏らし、慌てて口を押さえた。

    「……不覚だわ。向かい合っているから、表情が隠せない……」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らした。

    「……%CALLNAME:MASTER%、今の表情は見なかったことにして……」

    そう言いながらも、体は%CALLNAME:MASTER%から離れようとしない。

    「……」

    %CALLNAME:TARGET%は黙って%CALLNAME:MASTER%と向かい合っている。

    研究者として、この体位の特性を記録しておくべきだろう。

    「……%CALLNAME:MASTER%、質問があるわ」

    %CALLNAME:TARGET%は息を整えながら、%CALLNAME:MASTER%を見つめた。

    「……対面座位を選んだ理由は何？ 私の反応を観察したいから？」
  priority: 2
- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情のまま、%CALLNAME:MASTER%と向かい合って座っている。

    「……この体位なら、押し潰されなくて済むわ」

    %CALLNAME:TARGET%は淡々と言い放った。

    「……好きにしなさい。体力は温存できるから」

    それだけを告げ、%CALLNAME:TARGET%は%CALLNAME:MASTER%に身を任せた。

    「……ふぅ……」

    %CALLNAME:TARGET%は溜息をつきながら、%CALLNAME:MASTER%の行為を受けている。

    「……顔が近いのは気に入らないけれど、体力的には楽ね」

    %CALLNAME:TARGET%は事実を述べるように言った。

    「……早く終わらせて。読みかけの本があるの」

    投げやりな態度で、%CALLNAME:TARGET%は目を逸らした。

    「……むきゅ……」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「……顔が近すぎるわ。少し離れて」

    %CALLNAME:TARGET%は距離感への不満を訴えた。

    「……こういう親密な体位は、私には向いていないのよ」

    冷たい口調で、%CALLNAME:TARGET%は視線を逸らした。

    「……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と向かい合いながら、興味なさそうにしている。

    頭の中では、次に読む本のことを考えているようだ。

    「……終わったら、すぐに出て行って」

    %CALLNAME:TARGET%は冷淡に言った。

    「……大図書館は、私の聖域なのだから」
  priority: 1
