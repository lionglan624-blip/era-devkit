character: パチュリー
situation: K3_会話親密
entries:
- id: fallback
  content: >-
    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の言葉に小さな微笑みを浮かべた。

    「――ふぅん、そんなことがあったの」

    %CALLNAME:人物_パチュリー%は興味深そうに相槌を打っている。

    「%CALLNAME:MASTER%は色々なところに出掛けるのね。私には縁のない世界だわ」

    %CALLNAME:人物_パチュリー%は本のページをめくりながらも、%CALLNAME:MASTER%の話に耳を傾けている。

    「……でも、あなたの話を聞くのは、嫌いじゃないわ」

    そう言うと、%CALLNAME:人物_パチュリー%は少し照れたように視線を本に戻した。

    「――それで？　続きは？」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%に話の続きを促している。

    「聞いてないわけじゃないわ。ただ、本を読みながら聞くのが私のスタイルなの」

    %CALLNAME:MASTER%が話を続けると、%CALLNAME:人物_パチュリー%は時折頷きながら聞いている。

    「……ふふ、あなたと話していると、時間を忘れてしまうわね」

    %CALLNAME:人物_パチュリー%は珍しく本を閉じ、%CALLNAME:MASTER%の顔を見つめた。

    「――%CALLNAME:MASTER%？　もう終わり？」

    %CALLNAME:MASTER%が話を終えると、%CALLNAME:人物_パチュリー%は少し残念そうな表情を浮かべた。

    「……もっと聞いていたかったのに」

    自分でも驚いたかのように、%CALLNAME:人物_パチュリー%は目を逸らした。

    「な、何でもないわ。ただ、あなたの声を聞いていると落ち着くの」

    「……恥ずかしいことを言わせないで」

    「――そう。それは興味深い話ね」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の話に真剣に耳を傾けている。

    「あなたの体験談は、ある意味で貴重な資料になるわ」

    %CALLNAME:MASTER%が苦笑すると、

    「……冗談よ。あなたとの時間を、記録に残したいだけ」

    %CALLNAME:人物_パチュリー%は頬を微かに染め、本で顔を隠した。
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%と話しながら、時折%CALLNAME:MASTER%を見つめていた。

    「――へぇ、そうなの」

    %CALLNAME:人物_パチュリー%は淡々と答えているが、耳はしっかり傾けている。

    「%CALLNAME:MASTER%も色々と大変なのね」

    %CALLNAME:人物_パチュリー%は本を読むふりをしながら、%CALLNAME:MASTER%の話に耳を澄ませている。

    「……また、話を聞かせてくれる？」

    小さな声で、%CALLNAME:人物_パチュリー%はそう呟いた。

    「――それで、どうなったの？」

    %CALLNAME:人物_パチュリー%は珍しく話の続きを催促した。

    「別に興味があるわけじゃないわ。ただ、中途半端は気持ち悪いだけよ」

    %CALLNAME:MASTER%が話を続けると、%CALLNAME:人物_パチュリー%は黙って聞いている。

    「……ふぅん、面白かったわ。あなたの話」

    %CALLNAME:人物_パチュリー%は少し頬を染めながら、そう言った。

    「――ねぇ、%CALLNAME:MASTER%」

    %CALLNAME:人物_パチュリー%は唐突に声をかけてきた。

    「あなたは私と話していて、つまらなくないの？」

    %CALLNAME:MASTER%が否定すると、%CALLNAME:人物_パチュリー%は安心したように息を吐いた。

    「……そう。それなら、いいわ」

    %CALLNAME:人物_パチュリー%は再び本に視線を落としたが、どこか嬉しそうだった。

    「――あなた、今日は何しに来たの？」

    %CALLNAME:人物_パチュリー%は本を読む手を止め、%CALLNAME:MASTER%を見上げた。

    「……別に、追い返そうってわけじゃないわ」

    %CALLNAME:人物_パチュリー%はそう言って、隣の椅子を指し示した。

    「座りなさい。……話の続き、聞いてあげるから」

    素っ気ない言葉とは裏腹に、%CALLNAME:人物_パチュリー%の目は穏やかだった。
