  content: >-
    「っ……む、胸で……するの……？」

    %CALLNAME:TARGET%は恥ずかしそうに胸を隠した。

    「……私の胸……大きくないのに……意味があるの……？」

    %CALLNAME:TARGET%は顔を赤くしながら、おずおずと胸を開いた。

    「……む、むきゅ……こ、こうすればいいの……？」

    ぎこちなく一物を挟み、%CALLNAME:TARGET%は動き始めた。

    「……ん……こう……動けばいいのかしら……」

    %CALLNAME:TARGET%はぎこちなく胸を上下させている。

    「……文献には……胸で挟んで擦ると……とあったけど……」

    %CALLNAME:TARGET%は知識を頼りに動かしていた。

    「……ど、どう……？　変じゃない……？」

    不安そうに%CALLNAME:MASTER%の顔を覗き込んだ。

    「……んっ……こんなこと……恥ずかしいわ……」

    %CALLNAME:TARGET%は羞恥に顔を染めながら、奉仕を続けている。

    「……胸が……擦れて……変な感じ……」

    %CALLNAME:TARGET%は自分の感覚に戸惑っていた。

    「……で、でも……あなたがそう望むなら……続けるわ……」

    恥ずかしさを堪えながらも、%CALLNAME:TARGET%は胸を動かし続けた。

    「……%CALLNAME:MASTER%……顔、見ないで……」

    %CALLNAME:TARGET%は視線を避けながら、胸を動かしていた。

    「……こんな姿……恥ずかしいのよ……」

    しかし、手は止めようとしない。

    「……あなたを……気持ち良くしたいから……」

    小さな声で本音を漏らしながら、%CALLNAME:TARGET%は奉仕を続けた。
