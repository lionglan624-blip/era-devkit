- id: talent_3_1
  content: >-
    「……!? そ、そんなもの……後ろに……入れるの……？」

    %CALLNAME:TARGET%はアナルバイブを見て、頬を真っ赤に染めた。

    「肛門挿入用……本で読んだことは……あるけど……」

    %CALLNAME:MASTER%がアナルバイブを挿入すると、%CALLNAME:TARGET%は小さく悲鳴を上げた。

    「……ひゃっ……う、うねってる……中で……動いてる……」

    %CALLNAME:TARGET%は恥ずかしさに顔を覆いながらも、%CALLNAME:MASTER%を拒まなかった。

    「……やぁ……後ろ……止めて……」

    アナルバイブが腸内でうねり、%CALLNAME:TARGET%の体を揺さぶっている。

    「……む、むきゅ……こんなの……集中できないわ……」

    %CALLNAME:TARGET%は手元の本を閉じ、机にしがみついた。

    「……%CALLNAME:MASTER%……見ないで……変な声……出ちゃう……」

    %CALLNAME:TARGET%は羞恥に震えながら、甘い声を漏らしていた。

    「……っ……あ……後ろが……」

    %CALLNAME:TARGET%はアナルバイブのうねりに、言葉を失っていた。

    腸内を蹂躙する触手のような動きは、知識では説明できない快感を与えてくる。

    「……こんな……刺激……本には……載ってなかった……」

    %CALLNAME:TARGET%の体がびくりと跳ね、大図書館に甘い喘ぎが響いた。

    「……%CALLNAME:MASTER%……弱くして……壊れちゃう……」

    そう懇願しながらも、%CALLNAME:TARGET%の瞳は潤んでいた。

    「……ん……ぁ……だめ……後ろ……」

    アナルバイブのうねりが強まり、%CALLNAME:TARGET%の体が大きく震えた。

    「……腸壁が……刺激されて……頭が……真っ白……」

    %CALLNAME:TARGET%は分析しようとするが、快感に飲み込まれていく。

    「……こんなところで……小悪魔に見られたら……」

    %CALLNAME:TARGET%は羞恥と快感の狭間で、%CALLNAME:MASTER%にしがみついた。
