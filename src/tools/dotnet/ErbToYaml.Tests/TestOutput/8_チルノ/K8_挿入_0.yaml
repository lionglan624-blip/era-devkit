- id: fallback
  content: >-
    「ちょ、ちょっと！　何すんのよ！」

    %CALLNAME:人物_チルノ%は抵抗しようとするが、体勢を崩されてしまった。

    「こ、こんなの……あたいが許可してないんだけど！」

