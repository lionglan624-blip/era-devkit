character: 小悪魔
situation: K2_口挿入
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……ふふっ、お待たせしましたわ」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の前にしゃがみ込み、細い指を絡めた。

    悪魔の手は人間よりも少しひんやりとして、その冷たさが心地よい。

    「熱いですわ……%CALLNAME:MASTER%のここ、こんなに硬くなって……」

    %CALLNAME:人物_小悪魔%は愛おしそうに一物を握り、ゆっくりと上下に動かし始めた。

    「私の手で……気持ちよくしてあげますわね……ふふっ」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の一物を両手で包み込んだ。

    「ねえ、%CALLNAME:MASTER%……こうされるの、好き？」

    いたずらっぽい笑みを浮かべながら、%CALLNAME:人物_小悪魔%は手の動きを速くした。

    先走りが溢れ出すと、それを指先で丁寧に塗り広げていく。

    「ふふ……ぬるぬるになってきましたわ……気持ちいいでしょう？」

    %CALLNAME:人物_小悪魔%は尻尾を揺らしながら、嬉しそうに奉仕を続けている。

    「%CALLNAME:MASTER%のこと……もっと知りたいですわ」

    %CALLNAME:人物_小悪魔%はそう囁きながら、一物を優しく握った。

    指先で亀頭を撫で、裏筋をなぞり、鈴口を軽く刺激する。

    「ここが気持ちいいんですよね……ふふ、覚えてますわ」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の反応を楽しむように、丁寧に手を動かした。

    「悪魔の手……気に入ってくださいました？」

    %CALLNAME:人物_小悪魔%は蕩けるような笑みを浮かべ、%CALLNAME:MASTER%に寄り添った。

    「ふふっ……%CALLNAME:MASTER%の熱、手から伝わってきますわ」

    細い指が絡みつき、絶妙な力加減で上下に扱いている。

    「こうして%CALLNAME:MASTER%に触れていると……悪魔なのに幸せですわ」

    %CALLNAME:人物_小悪魔%は頬を染めながら、手の動きを続けた。

    「……もっと、気持ちよくなってくださいね……」
  priority: 4
- id: talent_3_1
  content: >-
    「え、えっと……こ、こうですか……？」

    %CALLNAME:人物_小悪魔%は顔を赤らめながら、%CALLNAME:MASTER%の一物に手を伸ばした。

    おずおずと握ると、その熱さに少し驚いた表情を見せた。

    「熱い……%CALLNAME:MASTER%の、すごく熱いですわ……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうにしながらも、ゆっくりと手を動かし始めた。

    「……気持ち、いいですか……？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の反応を窺いながら、手を動かしている。

    「ふ、ふふ……%CALLNAME:MASTER%、いい顔してますわ」

    少し調子に乗ったように、%CALLNAME:人物_小悪魔%は手の動きを速めた。

    「悪魔の手で気持ちよくなっちゃうんですか？　ふふっ」

    しかしその頬は赤く染まっており、余裕があるわけではなさそうだ。

    「……も、もっと……してほしいですか……？」

    「%CALLNAME:MASTER%……私に、こんなことさせるなんて……」

    %CALLNAME:人物_小悪魔%は困ったような、嬉しいような表情で一物を握っている。

    指先で丁寧に亀頭をなぞると、先走りがじわりと滲んできた。

    「あ……出てきましたわ……ぬるって……」

    %CALLNAME:人物_小悪魔%は興味深そうにそれを見つめながら、手を動かし続けた。

    「……%CALLNAME:MASTER%のこと、もっと知りたい……ですわ」

    %CALLNAME:人物_小悪魔%の尻尾がそわそわと揺れている。

    「ね、ねえ%CALLNAME:MASTER%……こういうの、好きなんですか……？」

    手の中で一物が脈打つのを感じ、%CALLNAME:人物_小悪魔%は少し息を呑んだ。

    「……硬くなってきてますわ……私が触ってるから……？」

    %CALLNAME:人物_小悪魔%は照れを隠すように俯きながら、手の動きを続けている。

    「……嫌じゃ、ないですからね……むしろ……」
  priority: 3
