entries:
- id: fallback
  content: >-
    「……っ……二人同時、なのね……」

    %CALLNAME:TARGET%は二人に挟まれながら、静かに息を吐いた。

    前と後ろから同時に貫かれる感覚に、体が震える。

    「……本で読んだことはあるけれど……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめた。

    「……実際に体験するのは、全く違うわ……むきゅ……」

    知識と現実の差に、%CALLNAME:TARGET%は戸惑っていた。

    「はぁ……ん……両方から……」

    %CALLNAME:TARGET%は二人の動きに翻弄されながら、小さく喘いだ。

    「……体が弱いのに……こんな激しいことを……」

    %CALLNAME:TARGET%は苦しそうに呟いた。

    「……でも……%CALLNAME:MASTER%がいるから……耐えられる……」

    愛する人への信頼が、脆弱な体を支えていた。

    「あ……んっ……頭が……回らない……」

    %CALLNAME:TARGET%は二人に挟まれて、思考が途切れていた。

    「……こんなの……本には書いてなかった……」

    %CALLNAME:TARGET%は恨めしそうに呟いた。

    「……%CALLNAME:MASTER%……離さないで……」

    知的な表情が崩れ、縋るような目で%CALLNAME:MASTER%を見つめた。

    「……ふぅ……二人に……満たされている……」

    %CALLNAME:TARGET%は二人の体温を感じながら、目を閉じた。

    「……こんなに体が限界なのに……心は、満たされている……」

    %CALLNAME:TARGET%は不思議そうに呟いた。

    「……愛というのは、論理では説明できないわね……」

    %CALLNAME:TARGET%は珍しく素直に、愛情を認めていた。
  priority: 4
- id: talent_3_1
  content: >-
    「ひっ……！　二人同時に……!?」

    %CALLNAME:TARGET%は驚きの声を上げた。

    前と後ろから同時に貫かれる感覚に、思考が停止する。

    「……こ、こんなこと……本でしか……」

    %CALLNAME:TARGET%は顔を真っ赤にしながら呟いた。

    「……むきゅ……知識と体験は、違うのね……」

    羞恥と興奮が入り混じった表情を浮かべていた。

    「あ……ん……っ……両方、動かれると……」

    %CALLNAME:TARGET%は声を抑えきれずに漏らした。

    「……データを取ろうと思ったけど……無理……」

    %CALLNAME:TARGET%は諦めたように首を振った。

    「……%CALLNAME:MASTER%……あまり、激しくしないで……」

    体の弱さを訴えながらも、拒む様子はなかった。

    「……んっ……前も……後ろも……」

    %CALLNAME:TARGET%は困惑した表情で呟いた。

    「……二穴同時というのは……体力的に……きつい……」

    %CALLNAME:TARGET%は息を荒げながら言った。

    「……でも……%CALLNAME:MASTER%がそうしたいなら……」

    「……頑張って、受け入れる……わ……」

    恥ずかしそうに、でも健気に%CALLNAME:TARGET%は応えた。

    「はぁ……はぁ……」

    %CALLNAME:TARGET%は息も絶え絶えに、二人に体を委ねていた。

    「……こんな体勢……文献で読んだときは……」

    %CALLNAME:TARGET%は遠い目で呟いた。

    「……まさか自分が経験するとは……思わなかった……」

    「……%CALLNAME:MASTER%……後で、感想を聞かせて……」

    学者としての好奇心が、羞恥を上回っていた。
