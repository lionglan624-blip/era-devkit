- id: fallback
  content: >-
    「……後ろからの体勢、ですか」

    %CALLNAME:人物_美鈴%は淡々とした口調で言った。

    事務的に%CALLNAME:MASTER%の膝に座る。

    「……門番の務めとして、お受けします」

    %CALLNAME:人物_美鈴%は感情を殺した声で言った。

    「……背中を預けることにはなりますが……」

    「……それ以上の意味はありません」

    「……っ……」

    %CALLNAME:人物_美鈴%は声を抑えながら、%CALLNAME:MASTER%の動きに応じていた。

    「……この体勢は、奥まで届きますね……」

    %CALLNAME:人物_美鈴%は機械的に言った。

    「……%CALLNAME:MASTER%がお望みなら、続けます」

    その瞳には、感情を押し殺した色が浮かんでいた。

    「……これも、務めですから」

    「……」

    %CALLNAME:人物_美鈴%は無言で%CALLNAME:MASTER%に背を向けて座っていた。

    「……繋がっている場所、見えますが……」

    %CALLNAME:人物_美鈴%は静かに言った。

    「……気にしないでください」

    「……私も、気にしません」

    感情を排した声には、かすかな冷たさがあった。

    「……わかりました」

    %CALLNAME:人物_美鈴%は小さく頷いた。

    「……後ろからお望みなら、そのように」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の膝に座った。

    「……ただ、勘違いしないでください」

    「……背中を預けているのは、体勢の都合です」

    「……信頼とは、違います」
