- id: fallback
  content: >-
    「……何を期待してるの」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を紅い瞳で見つめた。

    「私に胸を吸わせるなんて……大胆ね、使用人の分際で」

    しかし、%CALLNAME:人物_レミリア%は拒絶することなく、乳首に唇をつけた。

    「……まあ、今日は気まぐれよ。感謝しなさい」

    冷たい舌が乳首をなぞると、%CALLNAME:MASTER%の体が震えた。

    「……ふん、調子に乗らないことね」

    「……ふぅん」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胸を値踏みするように見た。

    「私に吸わせたいの？　物好きね」

    %CALLNAME:人物_レミリア%は高飛車に言いながらも、乳首に口づけた。

    「……いいわ、褒美として吸ってあげる」

    吸血鬼の唇がそっと吸い上げると、甘い痺れが走る。

    「……悪くない味ね」

    「……%CALLNAME:MASTER%、あなた……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を紅い瞳で見据えた。

    「度胸だけはあるわね。紅魔館の主にこんなことをさせるなんて」

    %CALLNAME:人物_レミリア%は溜息をつきながらも、乳首を舌でくすぐった。

    「……今日のところは付き合ってあげる」

    冷たい舌が乳首を転がすと、%CALLNAME:MASTER%は声を漏らした。

    「……次はないと思いなさい」

    「……何よ、その顔は」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の表情を見て眉を上げた。

    「私に吸ってほしいの？」

    %CALLNAME:人物_レミリア%は挑発的に笑うと、胸元に顔を寄せた。

    「……仕方ないわね、吸ってあげるわよ」

    冷たい唇が遠慮がちに乳首を含み、舌先でなぞった。

    「……ん……あなたは特別よ、少しだけね」
