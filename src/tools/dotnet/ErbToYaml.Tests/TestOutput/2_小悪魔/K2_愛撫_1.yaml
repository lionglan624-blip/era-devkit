entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%ったら、私のそこが好きなんですの？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に秘所を舐められながら、妖しい笑みを浮かべている。

    「んっ……あ……そこ、上手……ですわ……」

    %CALLNAME:人物_小悪魔%は甘い吐息を漏らしながら、%CALLNAME:MASTER%の頭を撫でている。

    「悪魔の弱点を知ってしまうなんて……もう離してあげませんわよ？」

    %CALLNAME:人物_小悪魔%は潤んだ瞳で%CALLNAME:MASTER%を見つめて、艶めかしく舌なめずりした。

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の脚を開き、秘所に顔を埋めた。

    「あっ……やぁ……そんなに舐めないで……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに身をよじりながらも、自分から腰を押し付けている。

    「んんっ……%CALLNAME:MASTER%の舌……奥まで届いて……」

    %CALLNAME:人物_小悪魔%は蕩けた表情を浮かべ、%CALLNAME:MASTER%の髪を掴んでいる。

    「……もっと、もっとしてくださいな……」

    %CALLNAME:人物_小悪魔%は甘えるように、%CALLNAME:MASTER%にお願いした。

    「んっ……あ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に秘所を舐められて、甘い声を上げている。

    「そこ……敏感なところ……わかってるんでしょう……？」

    %CALLNAME:人物_小悪魔%はいたずらっぽく笑いながら、%CALLNAME:MASTER%の頭を押さえつけている。

    「ふふ……悪魔に奉仕するなんて……%CALLNAME:MASTER%も物好きですわね……」

    %CALLNAME:人物_小悪魔%は幸せそうに笑って、%CALLNAME:MASTER%に身を委ねた。

    %CALLNAME:人物_小悪魔%は自分から脚を開いて、%CALLNAME:MASTER%を招いた。

    「……%CALLNAME:MASTER%、今日は私のこと……たっぷり可愛がってくださいな？」

    %CALLNAME:人物_小悪魔%は妖艶な微笑みを浮かべている。

    「あぁっ……ん……そう……そこが気持ちいいの……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の舌の動きに合わせて腰を揺らしている。

    「……%CALLNAME:MASTER%の虜に、なっちゃいましたわ……」

    %CALLNAME:人物_小悪魔%はうっとりと目を閉じて、%CALLNAME:MASTER%に身を預けた。
