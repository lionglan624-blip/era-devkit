- id: fallback
  content: >-
    「ふぇっ……！　む、乳首……？」

    %CALLNAME:TARGET%は驚いて肩を竦めた。

    %CALLNAME:MASTER%の指が胸の先に触れていることに、困惑している。

    「あの……そこは、敏感なところで……」

    %CALLNAME:TARGET%はぎこちなく立ち尽くしている。

    「……%CALLNAME:MASTER%……優しくしてくださいね……？」

    妖精は臆病な瞳で、%CALLNAME:MASTER%を見上げた。

    「ひっ……そ、そこ……」

    %CALLNAME:TARGET%は乳首を摘ままれて、小さく跳ねた。

    初めての感覚に、どう反応していいか分からない様子。

    「……んっ……変な感じがする……」

    %CALLNAME:TARGET%は戸惑いながら、%CALLNAME:MASTER%を見つめている。

    「……あたし、こういうの、よくわからないです……」

    妖精は困惑した表情で、それでも逃げ出さずにいた。

    「あの……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の顔をじっと見つめた。

    乳首を弄ばれる感覚に、体が小さく震えている。

    「……こういうのって……仲良しさんがすることですよね……」

    %CALLNAME:TARGET%は首を傾げながら問いかけた。

    「……んっ……あ、そこ……」

    妖精は戸惑いながらも、%CALLNAME:MASTER%の愛撫を受け入れつつあった。

    「……え、えっと……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指を感じて、体を硬くしている。

    乳首が指で転がされると、不思議な感覚が走った。

    「……そこ、触られると……なんか、ぞわぞわするの……」

    %CALLNAME:TARGET%は自分の反応に驚いているようだった。

    「……%CALLNAME:MASTER%になら……ちょっとだけ、いいです……」

    妖精は小さな声でそう言って、おとなしくなった。
