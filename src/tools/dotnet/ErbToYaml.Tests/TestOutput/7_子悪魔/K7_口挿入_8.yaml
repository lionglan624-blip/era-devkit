- id: fallback
  content: >-
    「えっ……あたしが……%CALLNAME:MASTER%の中に……入れるの……？」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%の上に跨った。

    「こ、こういうの……初めてで……緊張します……」

    小さな腰をぎこちなく動かして、%CALLNAME:MASTER%のアナルに先端を宛がう。

    「んっ……は、入って……いきます……ね……」

    %CALLNAME:TARGET%は真っ赤な顔で、ゆっくりと腰を沈めた。

    「あっ……%CALLNAME:MASTER%の中……すごく……あったかい……です……」

    「%CALLNAME:MASTER%……あたしでよかったの……？」

    %CALLNAME:TARGET%は照れくさそうに微笑みながら、腰を動かし始めた。

    「えへへ……なんか……%CALLNAME:MASTER%と繋がってる……気持ちいいです……」

    慣れない動きながらも、%CALLNAME:TARGET%は懸命に腰を振っている。

    「あっ……ん……こうすると……いいですか……？」

    %CALLNAME:TARGET%は不安げに%CALLNAME:MASTER%の顔を覗き込んだ。

    「……%CALLNAME:MASTER%が気持ちよくなってくれたら……あたし、嬉しいです……」

    「んふふ……%CALLNAME:MASTER%のこと……あたしが気持ちよくしてあげますね……」

    %CALLNAME:TARGET%は少し得意げな表情で腰を動かした。

    「あっ……%CALLNAME:MASTER%の中……ぎゅって締まって……」

    小さな体が懸命に動いて、%CALLNAME:MASTER%を悦ばせようとしている。

    「こうやって……%CALLNAME:MASTER%のお世話するの……好きなの……」

    %CALLNAME:TARGET%は甘えるような声で囁いた。

    「……もっと……深くまで……いっていいですか……？」

    「%CALLNAME:MASTER%……今日も頑張りますね……」

    %CALLNAME:TARGET%は恥ずかしそうにしながらも、腰を沈めていく。

    「あ……んっ……全部……入りました……」

    %CALLNAME:MASTER%の体の中で%CALLNAME:TARGET%の熱が脈打っている。

    「えへへ……%CALLNAME:MASTER%とこうしてると……幸せです……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に寄り添うように体を密着させた。

    「……あたしのこと……もっと使ってくださいね……？」
