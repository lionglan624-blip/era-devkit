character: パチュリー
situation: K3_挿入
entries:
- id: fallback
  content: >-
    「……んっ……そこは、違う場所……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げながら、静かに息を吐いた。

    本で読んだ知識はあるが、実際にそこで受け入れるのは初めて。

    「……あ……入って、きた……狭い、わね……」

    %CALLNAME:TARGET%は異物感に眉を寄せながらも、%CALLNAME:MASTER%を拒まない。

    「……あなたなら、信じて委ねられるから……」

    「はぁ……ん……っ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに合わせて、小さく喘いでいる。

    大図書館の静寂の中、二人の荒い息遣いだけが響く。

    「……本には載っていない感覚……むきゅ……」

    %CALLNAME:TARGET%は理論で説明できない快感に戸惑いを見せている。

    「……あなたの顔が見えるから、安心できるの……」

    「ぁ……やぁ……奥まで……」

    %CALLNAME:TARGET%は珍しく乱れた声を上げた。

    肛門での挿入は普段とは違う刺激を与えている。

    「……%CALLNAME:MASTER%……ゆっくり……体が弱いから……」

    %CALLNAME:TARGET%は甘えるように頼んだ。

    「……でも、止めないで……もっと、研究させて……」

    「……ふぅ……あ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に抱かれながら、複雑な表情を浮かべている。

    「……この体勢、顔が見えるから好きよ。でも、そこは……」

    %CALLNAME:TARGET%は肛門の異物感に言葉を詰まらせた。

    「……慣れてきた、かしら……不思議な感覚ね」

    そう呟いて、%CALLNAME:TARGET%は%CALLNAME:MASTER%の背に腕を回した。
