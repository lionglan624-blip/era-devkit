- id: fallback
  content: >-
    「……何をするの」

    %CALLNAME:TARGET%は怪訝そうな顔で%CALLNAME:MASTER%を見た。

    「……まあ、いいわ。読書の邪魔にならない程度なら」

    %CALLNAME:TARGET%は本に視線を戻しながらも、%CALLNAME:MASTER%を拒否しなかった。

    「……変な気を起こさないでよ」

    「っ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に触れられ、一瞬身を強張らせた。

    しかし、すぐに力を抜いた。

    「……そういうスキンシップが好きなの？」

    %CALLNAME:TARGET%は淡々と言いながらも、どこか満更でもない様子だった。

    「……まあ、あなたの好きにしなさい」

    「……ふぅん」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の行為を観察するような目で見ている。

    「……人間って、こういうことをするのね」

    %CALLNAME:TARGET%はまるで実験対象を見るかのように、冷静に分析している。

    「……興味深いわ。もう少し続けて」

    「……」

    %CALLNAME:TARGET%は黙って%CALLNAME:MASTER%の愛撫を受けている。

    本を読む手が、いつの間にか止まっている。

    「……悪くないわね。これは」

    %CALLNAME:TARGET%はぼそりと呟いた。

    「……でも、調子に乗らないで」
  priority: 2
- id: fallback
  content: >-
    「……何の真似？」

    %CALLNAME:TARGET%は本から視線を上げ、冷ややかな目で%CALLNAME:MASTER%を見た。

    「私に触れる許可は与えていないわよ」

    %CALLNAME:TARGET%は素っ気なく言い放った。

    「……用があるなら、口で言いなさい」

    「……」

    %CALLNAME:TARGET%は黙って%CALLNAME:MASTER%の手を払いのけた。

    「読書の邪魔よ。出て行って」

    %CALLNAME:TARGET%は冷たく言い放ち、再び本に視線を落とした。

    「……次やったら、精霊魔法で追い出すわ」

    「……むきゅ」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「距離感というものを学びなさい」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%から距離を取った。

    「……私の図書館で何をしているの」

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついた。

    「あなたは本を読みに来たんじゃないの？」

    %CALLNAME:TARGET%は呆れたような表情を浮かべている。

    「……まあいいわ。好きにしなさい。ただし、私の邪魔はしないで」

    そう言って、%CALLNAME:TARGET%は本に集中し始めた。
  priority: 1
