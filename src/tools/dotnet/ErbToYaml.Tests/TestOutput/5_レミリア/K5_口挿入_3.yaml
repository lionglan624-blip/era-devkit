character: レミリア
situation: K5_口挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、私のここが欲しいの？」

    %CALLNAME:人物_レミリア%は艶やかに微笑みながら、%CALLNAME:MASTER%の上に跨った。

    紅魔館の主が膝をつき、その秘所を差し出す姿は、この上なく背徳的だった。

    「……こんな姿、%CALLNAME:MASTER%にしか見せないわ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%のそれに陰唇を押し当てた。

    吸血鬼のひんやりとした肌が、熱を持った一物を包み込む。

    「んっ……熱いのね……私の冷たい身体で、鎮めてあげるわ」

    「んっ……%CALLNAME:MASTER%のここ、すごく硬いわね……」

    %CALLNAME:人物_レミリア%は興味深そうに腰を動かしていた。

    吸血鬼の秘所が%CALLNAME:MASTER%の一物を滑らかに擦り上げる。

    「ククク……こうして動くと、もっと熱くなるのね」

    %CALLNAME:人物_レミリア%は愛おしそうに腰を揺らしながら、%CALLNAME:MASTER%の表情を見つめていた。

    「……気持ちいい？　そう……私も、気持ちいいわ」

    館の主は、恋人の快感を自らの喜びとしていた。

    「……ねぇ、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は腰を動かしながら、甘えるような声で呼びかけた。

    「こうして繋がっているとね……私、幸せなのよ」

    紅魔館の主とは思えない、素直な告白だった。

    「……%CALLNAME:MASTER%のためなら、何でもしてあげる」

    %CALLNAME:人物_レミリア%は頬を染めながら、奉仕を続けた。

    500年の孤独を知る吸血鬼は、愛する者との繋がりを噛みしめていた。

    「ふふ……%CALLNAME:MASTER%、可愛い顔してるわね」

    %CALLNAME:人物_レミリア%は意地悪そうに微笑みながら、腰の動きを速めた。

    「私の身体で、こんなになっちゃって……」

    %CALLNAME:人物_レミリア%は時折、腰を強く押し付けてみせる。

    「もっと乱れていいのよ？　今夜は私が、%CALLNAME:MASTER%を支配してあげるわ」

    そう言いながらも、その瞳には深い愛情が宿っていた。

    「……出そうになったら、教えてね。ちゃんと受け止めてあげるから」
  priority: 4
- id: talent_3_1
  content: >-
    「……こ、これを擦りつければいいのね？」

    %CALLNAME:人物_レミリア%は顔を紅くしながら、%CALLNAME:MASTER%の上に跨った。

    おそるおそる秘所を押し当て、触れた瞬間、小さく息を呑む。

    「っ……熱い……すごく、熱いわね……」

    %CALLNAME:人物_レミリア%はぎこちなく腰を動かし始めた。

    「べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただの興味よ、興味」

    素直になれない吸血鬼は、必死に照れを隠していた。

    「ふん……こんなことで喜ぶなんて、単純ね」

    %CALLNAME:人物_レミリア%は強がりながらも、腰は止めなかった。

    「……で、でも、%CALLNAME:MASTER%が喜ぶなら……仕方ないわ」

    そう呟きながら、%CALLNAME:人物_レミリア%は腰の動きを少しだけ丁寧にした。

    「……感謝しなさいよ。紅魔館の主が直々にこんなことをしてあげてるんだから」

    高飛車な言葉とは裏腹に、%CALLNAME:人物_レミリア%の頬は真っ赤だった。

    「んっ……は、早く、出しなさいよ……」

    「……%CALLNAME:MASTER%、そんな顔しないで」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の反応に、どきりとしていた。

    「……私がこうすると、そんなに気持ちいいの？」

    少し嬉しそうに、%CALLNAME:人物_レミリア%は腰を動かし続けた。

    「んっ……ふぅ……ふん、当然よね。私は紅魔館の主なんだから」

    そう言いながらも、%CALLNAME:人物_レミリア%はこっそり%CALLNAME:MASTER%の表情を確認していた。

    「……もう少しだけ、してあげてもいいわよ」

    「あっ……動いた……」

    %CALLNAME:人物_レミリア%は腰の下の反応に、興味津々の様子だった。

    「ふぅん……こうすると、もっと反応するのね……」

    %CALLNAME:人物_レミリア%は観察するように、腰の動きを変えてみる。

    「……べ、別に%CALLNAME:MASTER%のためじゃないわよ。ただ、その……」

    言い訳が思いつかず、%CALLNAME:人物_レミリア%は口をつぐんだ。

    「……うるさいわね。黙って受けていなさい」
  priority: 3
