  content: >-
    「お、おい……こんなこと、させるなよ……」

    %CALLNAME:人物_魔理沙%は動揺しながらも、%CALLNAME:MASTER%のVに手を触れさせられた。

    「わ、私にこんなこと……何考えてるんだ……」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、ぎこちなく指を動かした。

    「……勝手に変な声出すなよ、気が散るだろ……」

    %CALLNAME:人物_魔理沙%は落ち着かない様子で、なんとか状況を受け入れようとしていた。

    「……何でこんなことになってるんだ」

    %CALLNAME:人物_魔理沙%は理不尽そうに呟きながら、指を動かしている。

    「こういうのは……もっと親しくなってからだろ……」

    %CALLNAME:人物_魔理沙%の抗議とは裏腹に、指は止まらなかった。

    「はぁ……仕方ない、早く終わらせるぞ……」

    %CALLNAME:人物_魔理沙%は諦めたように、愛撫の動きを続けた。

    「……濡れてきてるな」

    %CALLNAME:人物_魔理沙%は無表情を装いながら、%CALLNAME:MASTER%のVを触っている。

    「こういうのは経験ないんだから……期待するなよ」

    %CALLNAME:人物_魔理沙%の手つきはぎこちなく、慣れていないのが明らかだった。

    「……文句あるなら、他の奴に頼めばいいだろ」

