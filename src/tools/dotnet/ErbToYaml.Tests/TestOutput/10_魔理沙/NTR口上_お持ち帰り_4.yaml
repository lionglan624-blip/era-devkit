    自分の身体を買い上げた『客』に、彼女は土下座をしながら口上を述べた。。

    「本日はこの私をお買い上げいただきまして、まことにありがとうございました」

    %NTR_NAME(0)%に命じられた通りの言葉を紡ぎながら、魔理沙の唇は悔しさと悲しみに小さく震えていた。
  priority: 6
