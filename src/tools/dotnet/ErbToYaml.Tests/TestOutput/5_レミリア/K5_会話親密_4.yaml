character: レミリア
situation: K5_会話親密
entries:
- id: fallback
  content: >-
    「――ふふ、%CALLNAME:MASTER%が私にお茶を？　殊勝なことね」

    %CALLNAME:人物_レミリア%は嬉しそうに湯飲みを受け取り、そっと香りを確かめた。

    ふう、と息を吹きかけてから、優雅に口をつける。

    「……ん、美味しいわ。なかなかやるじゃない」

    %CALLNAME:人物_レミリア%は満足げに目を細めた。

    「……こうやってお茶を淹れてもらうのも悪くないわね」

    「これからも私を愉しませなさい」

    命令口調だが、その声には甘えた響きがあった。

    「まあ……%CALLNAME:MASTER%がお茶を？」

    %CALLNAME:人物_レミリア%は両手で湯飲みを包み込むように受け取った。

    ずず、と音を立てて紅茶を啜る。

    「……んん、悪くないわね。いい香り」

    %CALLNAME:人物_レミリア%は珍しく素直に褒めた。

    「咲夜には及ばないけれど……まあ、特別に許してあげるわ」

    「%CALLNAME:MASTER%の淹れたお茶だもの」

    そう言いながら、%CALLNAME:人物_レミリア%は照れくさそうに視線を逸らした。

    「――あら、待っていたのよ」

    %CALLNAME:人物_レミリア%は当然のように湯飲みを受け取った。

    紅い瞳が%CALLNAME:MASTER%を捉え、妖しく輝く。

    「ふぅ……美味しいわ。%CALLNAME:MASTER%の淹れるお茶、好きよ」

    そう言って、%CALLNAME:人物_レミリア%はゆったりと椅子に身を預けた。

    「……ねえ、こっちに来て。隣で飲みたいの」

    500年を生きた吸血鬼の瞳に、無邪気な甘えが浮かんでいた。

    「――ん、いい香りね」

    %CALLNAME:人物_レミリア%は湯飲みに顔を近づけ、幸せそうに目を細めた。

    ゆっくりと口をつけ、味わうように飲んでいく。

    「……%CALLNAME:MASTER%」

    「私ね、貴方がこうしてお茶を淹れてくれる時間が好きなの」

    %CALLNAME:人物_レミリア%は照れ隠しのように湯飲みを傾けた。

    「……永遠を生きる吸血鬼が、こんな些細なことに幸せを感じるだなんてね」

    紅い瞳が、愛おしげに%CALLNAME:MASTER%を見つめていた。
  priority: 4
- id: talent_3_1
  content: >-
    「――へえ、お茶を淹れてくれるの？　気が利くじゃない」

    %CALLNAME:人物_レミリア%は少し驚いた様子で湯飲みを受け取った。

    そっと口をつけ、ゆっくりと味わう。

    「……ん、なかなかいい香りね」

    %CALLNAME:人物_レミリア%は感心したように頷いた。

    「ふぅん、貴方って意外と器用なのね」

    「……悪くないわ、もう少し精進しなさい」

    厳しい言葉だが、%CALLNAME:人物_レミリア%の表情は柔らかかった。

    「あら、%CALLNAME:MASTER%がお茶を？　珍しいこともあるものね」

    %CALLNAME:人物_レミリア%は湯飲みを受け取り、香りを確かめた。

    ずず、と上品にお茶を啜る。

    「……ふむ、思ったより悪くないわね」

    %CALLNAME:人物_レミリア%は軽く目を見開いた。

    「咲夜に仕込まれたのかしら？　それとも才能？」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を見つめている。

    「――ん？　お茶……私に？」

    %CALLNAME:人物_レミリア%は一瞬戸惑ったように湯飲みを見つめた。

    だが、すぐに気を取り直して優雅に受け取る。

    「……ふぅん、悪くないわね。温度もちょうどいいし」

    %CALLNAME:人物_レミリア%は小さく微笑んだ。

    「……ありがとう、とでも言えばいいのかしら」

    「言わないわよ？　でも、また淹れてくれてもいいわ」

    素直になれない彼女なりの感謝の言葉だった。

    「――ククク、気が利くじゃない」

    %CALLNAME:人物_レミリア%は嬉しそうに湯飲みを受け取った。

    紅茶の香りを楽しむように、ゆっくりと鼻を近づける。

    「……いい香り。どこで覚えたの？」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を見つめた。

    「ふぅん……貴方のことを知りたくなってきたわ」

    そう言いながら、%CALLNAME:人物_レミリア%は紅茶を口に運んだ。

    その紅い瞳には、密かな熱が宿っていた。
