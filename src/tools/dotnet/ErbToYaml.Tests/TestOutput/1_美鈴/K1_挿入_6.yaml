    %CALLNAME:人物_美鈴%はゆっくりと腰を沈め、%CALLNAME:MASTER%を後ろの穴で受け入れた。

    「こうしてると……%CALLNAME:MASTER%のこと、全部預かってるみたい」

    武術家の引き締まった腸壁が、愛おしげに%CALLNAME:MASTER%を締め付けた。

    「あ……ん……お尻で自分から動くと……すごく、感じる……」

    %CALLNAME:人物_美鈴%は甘い吐息を漏らしながら、腰をくねらせた。

    上から見下ろす体勢で、%CALLNAME:MASTER%の表情がよく見える。

    「%CALLNAME:MASTER%の顔……気持ちよさそう……嬉しい」

    %CALLNAME:人物_美鈴%は幸せそうに微笑みながら、腰を揺らし続けた。

    「……後ろでも……%CALLNAME:MASTER%のこと、幸せにできるかな」

    恋人を喜ばせたい一心で、%CALLNAME:人物_美鈴%は懸命に動いた。

    「はぁ……お尻で騎乗すると……角度が、変えられて……」

    %CALLNAME:人物_美鈴%は腰の角度を調整しながら、快感の波を探った。

    「ここ……すごい……奥まで、響く……」

    %CALLNAME:人物_美鈴%は声を上げながら、同じ場所を何度も刺激した。

    「……%CALLNAME:MASTER%に、ここも開発されちゃった……」

    %CALLNAME:人物_美鈴%は照れくさそうに笑いながら、より深く腰を落とした。

    「……もっと、私のお尻で感じて……」

    「……ん……%CALLNAME:MASTER%の上で、お尻繋げてると……落ち着く……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の胸に手をつき、ゆっくりと腰を動かした。

    「いつもは門番として警戒してるけど……こうしてると……」

    %CALLNAME:人物_美鈴%は身を屈め、%CALLNAME:MASTER%の耳元に囁いた。

    「……%CALLNAME:MASTER%のこと、全部受け止めてあげたくなるの」

    繋がったまま、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%を優しく抱きしめた。

    「……後ろでも……大好きよ、%CALLNAME:MASTER%」
