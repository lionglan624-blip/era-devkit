    「んっ……あ……や、やめ……やめないで……」

    %CALLNAME:人物_レミリア%は矛盾したことを口走った。

    「……%CALLNAME:MASTER%の、ばか……」

    「ふぁっ……んん……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に胸を吸われて、甘い声を漏らしてしまった。

    「い、今の声は……聞かなかったことにしなさい」

