- id: talent_3_1
  content: >-
    「……後背位？　私が%CALLNAME:MASTER%を後ろから……ふん、面白いわね」

    %CALLNAME:人物_レミリア%は照れを隠すように尊大に言った。

    %CALLNAME:MASTER%の背後に回り、腰に手を添える。

    「……さあ、力を抜きなさい。私が気持ちよくしてあげるわ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の中に入っていった。

    「んっ……%CALLNAME:MASTER%の中……温かい……」

    紅魔館の主は、頬を染めながら腰を動かし始めた。

    「……%CALLNAME:MASTER%の背中に抱きつくなんて……少し、恥ずかしいわね」

    %CALLNAME:人物_レミリア%は呟きながら%CALLNAME:MASTER%の背後についた。

    小さな身体が%CALLNAME:MASTER%に密着する。

    「……で、でも……悪くないわ。この体勢……」

    %CALLNAME:人物_レミリア%はぎこちなく腰を前後に動かした。

    「あっ……%CALLNAME:MASTER%……動かないで……まだ慣れてないのよ……」

    500年の吸血鬼は、素直になれないまま%CALLNAME:MASTER%を抱いていた。

    「……後ろからなら、顔を見られないから……少しは楽かしら」

    %CALLNAME:人物_レミリア%は独り言のように呟いた。

    %CALLNAME:MASTER%の背中を見つめながら、ゆっくりと腰を押し当てる。

    「んっ……入って……いく……」

    %CALLNAME:人物_レミリア%は思わず甘い声を漏らした。

    「……い、今の声は聞かなかったことにしなさい」

    紅魔館の主は、恥ずかしそうに顔を赤くしながらも腰を止めなかった。

    「……%CALLNAME:MASTER%を後ろから支配するなんて……ふふ、悪くないわね」

    %CALLNAME:人物_レミリア%は虚勢を張りながら%CALLNAME:MASTER%の背後に立った。

    その紅い瞳には、隠しきれない期待が浮かんでいる。

    「さあ……私を受け入れなさい……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の中に身体を沈めた。

    「あ……気持ちいい……もっと……」

    500年の吸血鬼は、気がつけば夢中で腰を振っていた。
