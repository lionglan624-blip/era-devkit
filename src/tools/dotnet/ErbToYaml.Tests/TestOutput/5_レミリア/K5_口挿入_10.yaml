- id: fallback
  content: >-
    「……私が上に？　変な体勢ね……」

    %CALLNAME:人物_レミリア%は戸惑いながらも%CALLNAME:MASTER%の上に跨った。

    後孔にゆっくりと%CALLNAME:MASTER%を受け入れていく。

    「あ……っ、入って……こんなの、変よ……」

    %CALLNAME:人物_レミリア%は羞恥で頬を染めた。

    「……見ないで。恥ずかしいじゃない」

    紅魔館の主は、ぎこちなく腰を動かし始めた。

    「……こんな格好、あまり見ないでよね」

    %CALLNAME:人物_レミリア%は恥ずかしそうに%CALLNAME:MASTER%の上に座った。

    後孔が%CALLNAME:MASTER%を飲み込み、小さな身体が震える。

    「ひ……っ、深い……こんなところまで……」

    %CALLNAME:人物_レミリア%は目を伏せて耐えた。

    「……動けばいいの？　こう……？」

    紅魔館の主は、恥じらいながらもぎこちなく腰を揺らした。

    「……仕方ないわね。上になってあげるわ」

    %CALLNAME:人物_レミリア%は渋々といった様子で%CALLNAME:MASTER%の上に乗った。

    後孔に%CALLNAME:MASTER%を導き、ゆっくりと沈んでいく。

    「あ……あぁ……変な感じ……」

    %CALLNAME:人物_レミリア%は複雑な表情で動き始めた。

    「……笑ったら許さないわよ」

    500年の吸血鬼は、羞恥を隠しながら義務的に腰を動かした。

    「……こういうのは初めてなのだけど」

    %CALLNAME:人物_レミリア%は不安げに%CALLNAME:MASTER%を見下ろした。

    そっと腰を沈め、後孔に%CALLNAME:MASTER%が入っていく。

    「んっ……あ……きつい……」

    %CALLNAME:人物_レミリア%は痛みに眉をひそめた。

    「……もう少し、待って。慣れるまで……」

    紅魔館の主は、恥じらいながらも少しずつ身体を慣らしていった。
