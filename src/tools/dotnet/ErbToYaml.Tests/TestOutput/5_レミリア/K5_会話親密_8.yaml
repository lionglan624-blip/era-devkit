- id: fallback
  content: >-
    「……何をしているの、下僕が」

    %CALLNAME:TARGET%は紅い瞳を細め、%CALLNAME:MASTER%を睨みつけた。

    %CALLNAME:MASTER%の手が、%CALLNAME:TARGET%の尻に触れている。

    「私に触れることを許した覚えはないわ」

    %CALLNAME:TARGET%は傲然と腕を組み、威圧するように見下ろした。

    「……身の程を弁えなさい」

    「……何のつもりかしら？」

    %CALLNAME:TARGET%は冷ややかな視線で%CALLNAME:MASTER%を見た。

    %CALLNAME:MASTER%が尻に触れても、%CALLNAME:TARGET%は微動だにしない。

    「私はそんなに安い女じゃなくてよ」

    500年を生きた吸血鬼の威厳が、その紅い瞳に宿っている。

    「……用が済んだら、さっさと離れなさい」

    「使用人のくせに、主の身体に触れようとするの？」

    %CALLNAME:TARGET%は眉をひそめ、%CALLNAME:MASTER%を見据えた。

    %CALLNAME:MASTER%の手が臀部を撫でるのを、%CALLNAME:TARGET%は許容している。

    「……ふん、今回だけよ」

    %CALLNAME:TARGET%は不機嫌そうに顔を背けた。

    「次はないと思いなさい」

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%を見つめている。

    %CALLNAME:MASTER%が尻に触れても、その表情は変わらない。

    「……何が望みかしら」

    %CALLNAME:TARGET%の紅い瞳が、冷たく%CALLNAME:MASTER%を射抜いた。

    「……私を侮っているのなら、後悔させてあげるわ」
