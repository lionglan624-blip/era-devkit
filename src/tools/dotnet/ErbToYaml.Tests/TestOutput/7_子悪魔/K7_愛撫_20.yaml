    %CALLNAME:TARGET%は恥ずかしそうに顔を背けたが、逃げようとはしなかった。

    「……%CALLNAME:MASTER%の前で……こんな姿……見せてる……」

    「……搾乳……ですね……わかりました……」

    %CALLNAME:TARGET%は従順に頷いて、胸元を開いた。

    感情の薄い表情のまま、搾乳機が装着される。

    「あ……っ……吸われて……乳首が……伸びて……」

    規則的な吸引に体を震わせながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げた。

    「……あたし……ちゃんと……%CALLNAME:MASTER%の役に立ってますか……」

    妖精は不安そうに、しかし従順に搾乳を続けている。

    「……おっぱい……使うんですね……」

    %CALLNAME:TARGET%は静かに服を脱ぎ、小さな乳房を晒した。

    搾乳機が装着され、吸引音が響き始める。

    「んっ……ふぅ……引っ張られて……こそばゆい……」

    %CALLNAME:TARGET%は表情を変えないまま、体を%CALLNAME:MASTER%に預けている。

    「……%CALLNAME:MASTER%……終わるまで……そばにいて……ください……」

    小さな声でそう願いながら、妖精は搾乳に身を任せた。
