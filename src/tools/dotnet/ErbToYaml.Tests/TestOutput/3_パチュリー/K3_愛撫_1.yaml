- id: fallback
  content: >-
    「……何をさせるつもり？」

    %CALLNAME:TARGET%は淡々と言いながら、%CALLNAME:MASTER%のものを見つめた。

    「……まあいいわ。観察対象として、興味がないわけじゃないし」

    %CALLNAME:TARGET%は実験でも行うかのように、冷静に唇を寄せた。

    「……ふぅん……こういう味なのね」

    %CALLNAME:TARGET%は知識を得たとばかりに、小さく頷いた。

    「……続きを、させてもらうわ」

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%のものを口に含んだ。

    「……ん……これが、人間の反応」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の変化を観察しながら、舌を動かしている。

    「……興味深いわね。本で読むのとは違う」

    淡々とした口調だが、頬が僅かに赤いのは気のせいではない。

    「……もう少し、データを集めさせて」

    「……こういう行為に、どんな意味があるのかしら」

    %CALLNAME:TARGET%は独り言のように呟きながら、%CALLNAME:MASTER%に奉仕している。

    「……ん……まあ、悪くはないわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を見て、微かに表情を緩めた。

    「……あなたが、そういう顔をするのは……少し、面白いわね」

    冷静を装いながらも、%CALLNAME:TARGET%の声には微かな温かみがあった。

    「……これは、研究の一環よ」

    %CALLNAME:TARGET%は言い訳のように呟きながら、%CALLNAME:MASTER%のものを舐めた。

    「……ん……別に、あなただから……というわけじゃ」

    %CALLNAME:TARGET%は目を逸らしながら、ぎこちなく奉仕を続けている。

    「……ふぅ……こんなこと、誰にも言わないでね」

    普段の冷静さが少し揺らいでいる%CALLNAME:TARGET%がそこにいた。
  priority: 2
- id: fallback
  content: >-
    「……何の冗談かしら」

    %CALLNAME:TARGET%は冷ややかな目で%CALLNAME:MASTER%を見た。

    「私にそんなことをさせようなんて」

    %CALLNAME:TARGET%は呆れたように溜息をついた。

    「……まあいいわ。暇つぶしには丁度いいかもね」

    そう言って%CALLNAME:TARGET%は、無表情のまま%CALLNAME:MASTER%のものに唇を寄せた。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%のものを舐めている。

    その動きは淡々として、感情が読み取れない。

    「……これで満足？」

    %CALLNAME:TARGET%は退屈そうに問いかけた。

    「早く終わらせて、読書に戻りたいのだけど」

    「……下らない行為ね」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%のものを手に取りながら、冷めた声で言った。

    「本から得られる知識の方が、よほど価値があるわ」

    %CALLNAME:TARGET%は義務的に奉仕を続けている。

    「……ふぅ……まあ、悪くはないけど」

    口ではそう言いながら、%CALLNAME:TARGET%は奉仕を止めなかった。

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついて、%CALLNAME:MASTER%の前に跪いた。

    「仕方ないわね。言うことを聞いてあげるわ」

    %CALLNAME:TARGET%は面倒臭そうに%CALLNAME:MASTER%のものに口づけた。

    「……ん……」

    嫌々ながらも、%CALLNAME:TARGET%の動きには最低限の丁寧さがあった。

    「……これで、しばらくは大人しくしていなさい」
