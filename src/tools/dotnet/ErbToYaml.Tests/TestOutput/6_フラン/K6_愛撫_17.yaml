- id: talent_3_1
  content: >-
    「な、なに……？　それ、動いてるのさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つアナルバイブを警戒しながら見た。

    「お、お尻に入れるの……？　恥ずかしいんだけど……」

    しかし拒否はせず、%CALLNAME:人物_フラン%は顔を赤くして待っていた。

    挿入されると、%CALLNAME:人物_フラン%は目を見開いた。

    「ひゃあっ！？　中で、うねってる……！　やっ、そんなの初めて……！」

    その声は悲鳴に近かったが、逃げようとはしなかった。

    「あっ……やっ……%CALLNAME:MASTER%……お尻がおかしくなっちゃう……」

    %CALLNAME:人物_フラン%はアナルバイブの蠢きに、切ない声を漏らした。

    「そんなに奥まで……ぐりぐりして……意地悪なのさ……」

    %CALLNAME:人物_フラン%は恨めしそうに、でもどこか期待を込めて%CALLNAME:MASTER%を見た。

    「……こんな恥ずかしいところ、%CALLNAME:MASTER%にしか見せられないの……」

    紅い瞳には、羞恥と背徳的な快感が入り混じっていた。

    「ちょ、ちょっと……お尻は心の準備が……」

    %CALLNAME:人物_フラン%はアナルバイブを見て、身構えた。

    しかし%CALLNAME:MASTER%は待たず、ゆっくりと挿入を始めた。

    「んあっ！？　やっ、いきなり……！　あっ、あっ、動いてる……！」

    うねるアナルバイブに、%CALLNAME:人物_フラン%は甘い悲鳴を上げた。

    「お尻の中……すごい……変になっちゃう……のさ……」

    %CALLNAME:人物_フラン%は混乱しながらも、%CALLNAME:MASTER%の手を握りしめていた。

    「んっ……はぁっ……これ、お腹の中でうねうねしてる……」

    %CALLNAME:人物_フラン%はアナルバイブに翻弄され、息を荒くしていた。

    「%CALLNAME:MASTER%……こんな気持ち……知らなかった……のさ……」

    495年の孤独を知る少女は、新しい感覚に戸惑っていた。

    「……でも、%CALLNAME:MASTER%とだから……受け入れられるの」

    %CALLNAME:人物_フラン%は照れながら、快感に身を任せた。
