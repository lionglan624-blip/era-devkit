- id: fallback
  content: >-
    「ん……%CALLNAME:MASTER%、うごかないで……あたしが、のる……」

    %CALLNAME:TARGET%は無感情な瞳で、%CALLNAME:MASTER%の上に跨った。

    しかしその体は悪魔の本能に従い、%CALLNAME:MASTER%を絡め取ろうとしていた。

    「あたしが、うえ……こうすると、いっぱい、もらえる……」

    %CALLNAME:TARGET%はぼそりと呟いた。

