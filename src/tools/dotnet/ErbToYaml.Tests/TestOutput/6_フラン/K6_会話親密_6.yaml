  content: >-
    「ひゃっ……！ そ、そこは……」

    %CALLNAME:人物_フラン%は驚いて体をびくりとさせた。

    「お尻……いじるの？ 変な%CALLNAME:MASTER%……」

    でも、その声には嫌悪の色はなかった。

    「……でも、嫌じゃ……ないかも……」

    %CALLNAME:人物_フラン%は頬を赤らめ、恥ずかしそうに視線を逸らした。

    「あっ……ん……そこ、変な感じ……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_フラン%の後孔を撫でている。

    「……こういうこと、するものなの？」

    %CALLNAME:人物_フラン%は小首を傾げながらも、逃げようとはしなかった。

    「……ふーん、%CALLNAME:MASTER%が教えてくれるなら……いいよ」

    七色の翼が、緊張と期待で小さく震えている。

    「んっ……やっ……恥ずかしい……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%に後ろを弄られ、顔を赤らめている。

    「こんなところ……誰にも見せたことないのに……」

    「……%CALLNAME:MASTER%は特別だから……許してあげるのさ」

    %CALLNAME:人物_フラン%は照れくさそうに、でも嬉しそうに呟いた。

    紅い瞳が、複雑な感情を湛えて%CALLNAME:MASTER%を見つめた。

    「ふぁ……あ……そこ、触っちゃダメ……」

    %CALLNAME:人物_フラン%は弱々しく抗議しながらも、体は受け入れている。

    「……お姉様に怒られちゃう……」

    「でも……%CALLNAME:MASTER%と一緒なら……」

    %CALLNAME:人物_フラン%は戸惑いながらも、%CALLNAME:MASTER%を拒まなかった。

    「……少しだけ……いいよ……」
