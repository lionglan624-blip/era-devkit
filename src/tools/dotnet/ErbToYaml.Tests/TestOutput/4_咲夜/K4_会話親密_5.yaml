- id: fallback
  content: >-
    %CALLNAME:MASTER%が%CALLNAME:人物_咲夜%に近づいた瞬間――

    「何をなさるの？」

    %CALLNAME:人物_咲夜%は時を止め、優雅に距離を取った。

    「軽率な行動は控えなさい。私はお嬢様のメイドよ」

    %CALLNAME:人物_咲夜%は冷ややかな眼差しで%CALLNAME:MASTER%を見つめている。

    %CALLNAME:MASTER%は%CALLNAME:人物_咲夜%にキスをしようとした。

    「……。」

    %CALLNAME:人物_咲夜%は無言のまま、優雅に身を翻した。

    「キスは、もっと親しい間柄ですることだわ」

    %CALLNAME:人物_咲夜%は淡々とそう言い、その場を後にした。

    %CALLNAME:MASTER%が顔を近づけると、%CALLNAME:人物_咲夜%は目を細めた。

    「……勘違いなさらないで」

    %CALLNAME:人物_咲夜%はナイフを一本取り出し、優雅に弄んでいる。

    「私はお嬢様にお仕えする身。そのような振る舞いは看過できないわ」

    %CALLNAME:人物_咲夜%の瞳は、冷たく光っていた。

    「あら」

    %CALLNAME:人物_咲夜%は%CALLNAME:MASTER%の意図を察し、小首を傾げた。

    「随分と大胆ね。でも、お断りするわ」

    %CALLNAME:人物_咲夜%は優雅に一歩下がり、距離を取った。

    「まずは信頼を得てからにしなさい。……お茶をお持ちしましょうか？」

    %CALLNAME:人物_咲夜%は何事もなかったかのように、瀟洒に微笑んだ。
