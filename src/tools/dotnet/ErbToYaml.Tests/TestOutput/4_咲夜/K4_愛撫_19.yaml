- id: fallback
  content: >-
    %CALLNAME:MASTER%が搾乳機を取り出すと、%CALLNAME:TARGET%は恥ずかしそうに胸元を隠した。

    「……また、それを使われるのですね」

    %CALLNAME:TARGET%は観念したように手を下ろし、胸を差し出した。

    搾乳機のカップが乳首に吸い付くと、%CALLNAME:TARGET%の体がびくりと震える。

    「あっ……吸われて……恥ずかしいですわ……」

    瀟洒なメイドは、恋人の前でだけ乳を搾られることを許していた。

    「んっ……あ……引っ張られて……」

    搾乳機の吸引が%CALLNAME:TARGET%の乳首を容赦なく刺激している。

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の肩に顔を埋め、甘い声を漏らした。

    「こんな……乳を搾られるなんて……家畜のようですわ……」

    恥ずかしさを噛み締めながらも、%CALLNAME:TARGET%は逃げようとしなかった。

    「%CALLNAME:MASTER%……胸が……熱くなってきて……」

    搾乳機の律動的な吸引に、%CALLNAME:TARGET%は声を押し殺していた。

    「……っ……んんっ……強すぎますわ……」

    完璧を誇るメイドの仮面が、快感に蝕まれて崩れていく。

    「乳首だけで……こんなに感じてしまうなんて……」

    %CALLNAME:TARGET%は恋人に甘えるように、その手を握った。

    「……見ないでくださいまし……こんな姿……」

    「ふぁ……やぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は搾乳機の吸引に翻弄され、恍惚とした表情を浮かべている。

    吸い出される感覚に、メイドの理性が溶けていた。

    「こんな機械で……乳を搾られるなんて……瀟洒ではありませんわ……」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らしながらも、胸を突き出している。

    「……もう少しだけ……このままで……お願いいたしますわ……」
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%が搾乳機を見せると、%CALLNAME:TARGET%は戸惑いの表情を浮かべた。

    「……それは、何ですの」

    説明を聞いた%CALLNAME:TARGET%は、顔を真っ赤にして俯いた。

    「そ、そのような破廉恥な機械を……私の胸に……」

    搾乳機が装着されると、%CALLNAME:TARGET%の体が強張る。

    「っ……吸い付いて……困りますわ……」

    「あっ……やめ……いえ……」

    搾乳機の感触に、%CALLNAME:TARGET%は言葉を失いかけた。

    「……こんな機械に……負けるわけには……」

    %CALLNAME:TARGET%は抗いながらも、快感に抗えずにいた。

    「%CALLNAME:MASTER%は……本当に意地悪ですわね……」

    そう言いながらも、%CALLNAME:TARGET%の声には隠しきれない甘さが滲んでいた。

    装着された搾乳機が%CALLNAME:TARGET%の乳首をじわりと刺激していく。

    「んっ……そんな……吸わないでくださいまし……」

    %CALLNAME:TARGET%は目を細め、小さく息を漏らした。

    「……感じてなんか……いませんわ……」

    そう言う%CALLNAME:TARGET%の体は、僅かに震えている。

    「……少しだけ……少しだけですわよ……」

    「……っ……」

    搾乳機に吸われたまま、%CALLNAME:TARGET%は声を押し殺していた。

    「……%CALLNAME:MASTER%……どうして、こんな機械を……」

    %CALLNAME:TARGET%の問いかけは、快感に遮られて消えた。

    「メイドとして……こんな姿……」

    %CALLNAME:TARGET%は顔を背けながらも、%CALLNAME:MASTER%から離れようとはしなかった。
