character: チルノ
situation: K8_愛撫
entries:
- id: fallback
  content: >-
    「なにこれ、吸い付いてくるの!?」

    %CALLNAME:TARGET%は胸に装着された搾乳機を見下ろした。

    「きゃっ、なんか変な感じ……ぞわぞわする……」

    妖精の小さな胸を吸引する機械音が響く。

    「で、でも%CALLNAME:MASTER%がつけてくれたんだから……」

    恋人の前では、%CALLNAME:TARGET%は照れながらも受け入れた。

    「最強のあたいには、こんなの効かないんだからね!」

    「ひゃっ!?　%CALLNAME:MASTER%、これ吸ってる!」

    %CALLNAME:TARGET%は目を丸くして搾乳機を見つめた。

    「んぅ……なんか、胸のあたりがじんじんしてきた……」

    小さな体を震わせながら、刺激に耐えている。

    「%CALLNAME:MASTER%、これ……面白いの?」

    恋人の興味に応えようと、%CALLNAME:TARGET%は我慢していた。

    「あたいの胸で遊ぶなんて……変な%CALLNAME:MASTER%……」

    「もう、また搾乳機?　%CALLNAME:MASTER%って、本当にこれ好きよね」

    %CALLNAME:TARGET%は呆れたふりをしながら、胸を差し出した。

    「んっ……つけられると、やっぱりぞくぞくするわ……」

    慣れてきたとはいえ、刺激には敏感に反応してしまう。

    「あたいの体、%CALLNAME:MASTER%のおもちゃじゃないんだからね?」

    そう言いながらも、恋人の行為を拒みはしない。

    「……あたいだけでしょ、こうやってくれるの」

    「%CALLNAME:MASTER%……あたい、またあれやるの?」

    %CALLNAME:TARGET%は搾乳機を見て、頬を染めた。

    「……あたい、%CALLNAME:MASTER%とするの、嫌いじゃないの」

    装着されると、小さな胸が吸引されて形が変わる。

    「ひぅっ……んぅ、吸われてる……」

    恋人だけの特別な時間に、%CALLNAME:TARGET%は身を委ねた。

    「……あたいのこと、好き……だから、これするんでしょ……?」
  priority: 4
- id: talent_3_1
  content: >-
    「な、なによこれ!?　何するつもり!?」

    %CALLNAME:TARGET%は戸惑いながら搾乳機を見つめた。

    「あたいの胸に、こんなの……つけるの……?」

    頬を赤くしながら、好きな人の視線を意識している。

    「……し、しょうがないわね、最強のあたいには効かないんだから!」

    照れ隠しの強がりを言いながら、%CALLNAME:TARGET%は胸を差し出した。

    「%CALLNAME:MASTER%のお願いだから……特別なんだからね!」

    「ひゃうっ!?　吸、吸ってる……!」

    %CALLNAME:TARGET%は搾乳機の感覚に声を上げた。

    「んっ……%CALLNAME:MASTER%、あたいの胸……見てるの……?」

    好きな人に見られていると思うと、余計に恥ずかしい。

    「やっ……なんか、変な気持ちになってくる……」

    妖精の小さな体が、吸引の刺激にぴくりと震えた。

    「%CALLNAME:MASTER%の……ばか……」

    「ま、また……?　%CALLNAME:MASTER%、これ好きなの……?」

    %CALLNAME:TARGET%は恥ずかしそうに俯いた。

    「あたいの胸なんか……見ても面白くないでしょ……」

    そう言いながらも、拒否することはしない。

    「んぅっ……つけると、やっぱり……変な感じ……」

    好きな人の前で感じている自分が恥ずかしい。

    「……%CALLNAME:MASTER%にしか、見せないんだから……」

    「%CALLNAME:MASTER%……あたいので、嬉しい……?」

    %CALLNAME:TARGET%は不安げに尋ねた。

    「小さいって……思ってないよね……?」

    搾乳機の吸引を感じながら、恋心が不安を呼ぶ。

    「ひっ……んぅ、吸われるの……気持ち……変……」

    %CALLNAME:TARGET%は好きな人の前で、必死に声を抑えた。

    「……あたいのこと……もっと見て……」
