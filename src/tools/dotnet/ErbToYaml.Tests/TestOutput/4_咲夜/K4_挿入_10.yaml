entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……この体勢……恥ずかしいですわ……」

    %CALLNAME:TARGET%は背を向けたまま、小さく呟いた。

    「背中を向けていると……貴方の顔が見えなくて……」

    %CALLNAME:MASTER%が後ろから腰を動かすと、%CALLNAME:TARGET%の体が震える。

    「あっ……ん……でも……貴方の温もりは……感じますわ……」

    「……もっと……抱きしめて……ください……」

    瀟洒なメイドは、恋人に背中を預けながら甘い吐息を漏らしていた。

    「ふぁ……%CALLNAME:MASTER%……お尻に……」

    %CALLNAME:TARGET%は恥ずかしそうに俯いている。

    「こんな恥ずかしい体勢で……後ろを……」

    「……でも……貴方の腕が……私を支えてくれていますわね……」

    %CALLNAME:MASTER%が深く押し込むと、%CALLNAME:TARGET%の声が高くなる。

    「あああっ……奥まで……来て……」

    「貴方に……全部……委ねますわ……」

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕に身を任せている。

    「背中越しでも……貴方の鼓動が……聞こえますわ……」

    「……こんな淫らな体勢なのに……不思議と……安心しますの……」

    %CALLNAME:MASTER%の動きに合わせて、%CALLNAME:TARGET%の腰が揺れる。

    「あ……そこ……気持ちいい……ですわ……」

    「貴方となら……どんな体勢でも……幸せですわ……」

    「……あ……%CALLNAME:MASTER%……耳に……息が……」

    %CALLNAME:TARGET%は後ろから囁かれ、体を震わせた。

    「そんな……甘い言葉……聞かせないで……」

    「……もう……とろけてしまいそう……ですわ……」

    %CALLNAME:MASTER%が首筋にキスをすると、%CALLNAME:TARGET%の体が熱くなる。

    「んっ……後ろも……前も……貴方に……」

    完璧なメイドは、恋人の腕の中で蕩けるような表情を浮かべていた。
  priority: 4
- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%……この体勢は……」

    %CALLNAME:TARGET%は背を向けたまま、声を押し殺している。

    「せめて……顔を見られないのは……救いですわ……」

    「こんな……恥ずかしい表情……見られたくありませんもの……」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:TARGET%の体が跳ねた。

    「あっ……ん……でも……声は……隠せない……」

    背中越しに伝わる%CALLNAME:MASTER%の体温に、%CALLNAME:TARGET%の心が揺れる。

    「……ふぁ……お尻に……深く……」

    %CALLNAME:TARGET%は堪えきれず声を漏らしてしまう。

    「背中を向けていても……体は……正直ですわね……」

    「こんな……はしたない声……出したくないのに……」

    %CALLNAME:MASTER%が強く突くと、%CALLNAME:TARGET%の膝が崩れそうになる。

    「あああっ……そこ……当たって……」

    「%CALLNAME:MASTER%……貴方のせいですわ……」

    「……んっ……こんな体勢で……」

    %CALLNAME:TARGET%は恥ずかしさで俯いている。

    「メイドが……このような姿を……」

    「お嬢様に知られたら……顔向けできませんわ……」

    %CALLNAME:MASTER%の動きに、%CALLNAME:TARGET%の体が反応してしまう。

    「あ……でも……止められない……ですわ……」

    「……もう少し……続けても……構いませんわ……」

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は後ろを向いたまま、小さく名前を呼んだ。

    「背中越しでも……貴方だと……分かりますわ……」

    「……この体温……この動き……」

    %CALLNAME:MASTER%が耳元で囁くと、%CALLNAME:TARGET%の体が震える。

    「あっ……耳は……弱いのに……」

    恥じらいながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%から逃げようとはしなかった。
