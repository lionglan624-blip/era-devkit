entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……後ろから、失礼いたしますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背後に立ち、その腰を優しく掴んだ。

    「今日は……私がリードさせていただきますわね」

    %CALLNAME:TARGET%は慎重に腰を進め、%CALLNAME:MASTER%の中に入っていく。

    「んっ……%CALLNAME:MASTER%の中……とても熱いですわ……」

    「……お嬢様にはお見せできない姿ですけれど……」

    %CALLNAME:TARGET%は恋人のために主導権を握る覚悟を決めていた。

    「……ふぅ……%CALLNAME:MASTER%、力を抜いてくださいまし……」

    %CALLNAME:TARGET%は四つん這いの%CALLNAME:MASTER%を後ろから抱きながら囁いた。

    瀟洒なメイドの手つきは優しく、しかし確実に%CALLNAME:MASTER%を満たしていく。

    「……あなたの中、私を締め付けていますわ……」

    %CALLNAME:TARGET%はゆっくりと腰を動かし始めた。

    「……んっ……%CALLNAME:MASTER%の声……もっと聞かせてくださいまし……」

    完璧なメイドは、恋人を悦ばせることに専念していた。

    「……%CALLNAME:MASTER%……もう少し深く、入りますわよ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腰を支えながら、奥へと進んだ。

    「あっ……ここが……一番奥……ですわね……」

    %CALLNAME:MASTER%の反応を確かめながら、%CALLNAME:TARGET%はリズムを刻む。

    「……ふふ……そんなに声を出して……可愛らしいですわ……」

    「メイドとして……%CALLNAME:MASTER%のお世話、させていただきますわ……」

    %CALLNAME:TARGET%は愛情を込めて腰を動かし続けた。

    「……%CALLNAME:MASTER%の背中……綺麗ですわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背に身を寄せながら、腰を動かしている。

    「後ろから抱きしめると……鼓動が伝わってきますの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の耳元に唇を寄せた。

    「……んっ……このまま、もっと深く繋がりたいですわ……」

    「%CALLNAME:MASTER%……愛していますわ……」

    完璧なメイドは、恋人だけに見せる積極的な姿を惜しみなく披露した。
