- id: fallback
  content: >-
    「……何をしているの」

    %CALLNAME:TARGET%は淡々と問いかけたが、%CALLNAME:MASTER%の手が胸に触れると息を呑んだ。

    「……まあいいわ。観察対象として、興味がないわけじゃないし」

    %CALLNAME:TARGET%は実験でも行うかのように、自分の反応を分析しようとしている。

    「……ふぅん……こういう感覚なのね……」

    しかしその声は、僅かに震えていた。

    「……っ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に胸を揉まれ、小さく息を漏らした。

    「……胸への刺激と快感の相関……本で読んだことはあるわ」

    %CALLNAME:TARGET%は知識人らしい分析を試みるが、声が上擦っている。

    「……興味深いわね……もう少し……データを……」

    言葉の途中で、%CALLNAME:TARGET%は唇を噛んで黙った。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の愛撫を受けている。

    本を読む手は止まり、視線は虚空を彷徨っている。

    「……悪くないわね……これは……」

    %CALLNAME:TARGET%はぼそりと呟いた。

    「……でも、調子に乗らないで。私はあなたの観察対象になっているだけよ」

    そう言いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の手を拒まなかった。

    「……ん……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手に、微かに反応している。

    「……そういう行為の理論は……本で学んだけど……」

    %CALLNAME:MASTER%が乳房を揉むと、%CALLNAME:TARGET%の言葉が途切れた。

    「……実践と理論は……違うのね……」

    %CALLNAME:TARGET%は認めたくなさそうに、そう呟いた。
  priority: 2
- id: fallback
  content: >-
    「……何の真似かしら」

    %CALLNAME:TARGET%は冷ややかな目で%CALLNAME:MASTER%を見た。

    「私に触れる許可は与えていないわよ」

    %CALLNAME:TARGET%は素っ気なく言い放った。

    「……用があるなら、口で言いなさい」

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の手を払いのけた。

    「読書の邪魔よ。出て行って」

    %CALLNAME:TARGET%は冷たく言い放ち、再び本に視線を落とした。

    「……次やったら、精霊魔法で追い出すわ」

    「……むきゅ」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「距離感というものを学びなさい」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%から距離を取った。

    「……私の図書館で何をしているの」

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついた。

    「あなたは本を読みに来たんじゃないの？」

    %CALLNAME:TARGET%は呆れたような表情を浮かべている。

    「……まあいいわ。好きにしなさい。ただし、私の邪魔はしないで」

    そう言って、%CALLNAME:TARGET%は本に集中し始めた。
  priority: 1
