    「ちょ……ちょっと待って……」

    %CALLNAME:MASTER%が後ろに手を伸ばすと、%CALLNAME:人物_パチュリー%は慌てた。

    「そこは……その……恥ずかしいわ……」

    %CALLNAME:人物_パチュリー%は本で顔を隠しながら、か細い声で訴えた。

    「……い、いきなりはダメよ……心の準備というものが……」

