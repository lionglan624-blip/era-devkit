entries:
- id: fallback
  content: >-
    「……ったく、こんなことさせるなんてな」

    %CALLNAME:TARGET%は照れ隠しに文句を言いながら、%CALLNAME:MASTER%の胸に顔を埋めた。

    「……んっ……ちゅ……」

    魔理沙の唇が乳首に吸い付き、ちゅぷちゅぷと音を立てる。

    「……まあ、恋人なんだから……これくらいは、してやるぜ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸を両手で包みながら、夢中で吸い続けた。

    「……%CALLNAME:MASTER%の匂い……なんか、落ち着くな……」

    「ほら、じっとしてろよ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の乳首を舌先でくすぐりながら、からかうように笑った。

    「……んむ……れろ……お前、敏感だな……」

    魔理沙の舌が乳首を転がし、%CALLNAME:MASTER%の体に甘い痺れを走らせる。

    「……こうやって甘えるの、悪くないぜ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕の中で、幸せそうに目を細めた。

    「……もうちょっと、こうさせてくれよ……」

    「……ふぅ……%CALLNAME:MASTER%の胸、柔らかいな……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に頬をすり寄せながら、穏やかな表情を浮かべている。

    「……ちゅっ……んっ……」

    魔理沙は乳首を口に含み、赤ん坊のように吸い付いた。

    魔法の研究に明け暮れる日々とは違う、甘い時間だった。

    「……お前といると、なんか力が抜けるんだよな」

    %CALLNAME:TARGET%は珍しく素直に、自分の気持ちを口にした。

    「……んん……好きだぜ、%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の乳首を吸いながら、甘い声を漏らした。

    「……こうしてると、お前のことがもっと好きになる……」

    魔理沙の舌が乳首を舐め上げ、時折甘噛みするように歯を立てる。

    %CALLNAME:TARGET%の体が%CALLNAME:MASTER%の温もりに包まれて、とろけるように緩んでいた。

    「……ずっと、こうしてていいか……？」

    %CALLNAME:TARGET%は恋人に甘えられる幸せを、全身で感じていた。
