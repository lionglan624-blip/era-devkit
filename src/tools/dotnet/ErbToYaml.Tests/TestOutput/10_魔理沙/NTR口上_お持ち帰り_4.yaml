- id: fallback
  content: >-
    %CALLNAME:奴隷%は客に正座させている。

    ちょうど客の眼前には、オープンショーツから顔を出した秘裂が曝されている。

    「ったく、お客様も好きモノだな。私に虐められに来たんだろう」

    %CALLNAME:奴隷%は客の目と鼻の先に立ち、上から言葉を投げつける。

    「今日はしっかり搾り取ってやるから、覚悟しろよ」

    と客に囁くように告げると、%CALLNAME:奴隷%の秘裂から愛液が太ももを伝い落ちた。

    %CALLNAME:奴隷%はソファに腰掛けた客の足元に跪き、ご主人様の命令を待っている。

    客は%CALLNAME:奴隷%を彩る縄化粧を堪能しており、この状況がどのくらい続いているだろうか

    長らく肢体を視姦されている所為か、それとも柔肌に食い込む縄化粧の所為か、%CALLNAME:奴隷%の秘裂から愛液が滴り落ちた。

    「ッ… 早く始めてほしいんだぜ」

    遂に耐えられなくなった%CALLNAME:奴隷%が口を開く。

    そうすると、客が重い腰を上げ、プレイルームに歩いて行った。それに続いて%CALLNAME:奴隷%もプレイルームに向かった。

    %CALLNAME:奴隷%が立ち去った後には、白濁交じりの愛液溜りができていた。

    %CALLNAME:奴隷%は微笑みながら客を接待している。

    なぜ多額の金を出してまで公衆便所である私を孕ませたかったのか分からなかったが、それを聞くことはできなかった。

    彼はお客様であり、%CALLNAME:奴隷%は、私の「子宮」は商品なのだから。

    %CALLNAME:奴隷%は客に用意されたジーンズを身に着けていた。

    「まったく、お客様もなかなかいい趣味しているな」

    と呆れ果てたような口調で、客に告げた。

    「まあ、私のまんこもどんなプレイされるか楽しみでこんなになっているんだけどな」

    そう話しながら、濡れそばった秘貝を両手で開いて見せつける。

    「ぜひ気持ちよくしてくれよ？」
