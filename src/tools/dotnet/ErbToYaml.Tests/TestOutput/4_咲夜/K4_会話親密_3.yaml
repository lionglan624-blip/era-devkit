entries:
- id: fallback
  content: >-
    「んっ……やぁ……」

    %CALLNAME:TARGET%はされるがままに、%CALLNAME:MASTER%に尻を撫でられている。

    「……%CALLNAME:MASTER%、その手……いやらしいですわ……」

    瀟洒なメイドとは思えぬ、熱を帯びた吐息が漏れた。

    「……でも、嫌じゃないの。%CALLNAME:MASTER%の手だから……」

    %CALLNAME:TARGET%は頬を染めながら、そっと%CALLNAME:MASTER%に身を寄せた。

    「あっ……そこ……」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の尻を優しく包み込んでいる。

    「もう……メイドのお尻なんて、珍しくもないでしょうに……」

    そう言いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の腕に自分の手を添えた。

    「……ふふ、%CALLNAME:MASTER%ったら、本当に……」

    時を止める暇もなく、%CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋めた。

    「……んぅ……」

    %CALLNAME:TARGET%は目を伏せ、%CALLNAME:MASTER%に身を委ねている。

    「お嬢様の前では絶対に見せられない姿ね……」

    %CALLNAME:MASTER%の手が布越しにその柔らかさを確かめる。

    「……こんなに触られたら、私……瀟洒でいられなくなるわ」

    上気した頬で、%CALLNAME:TARGET%は恥じらいながらも受け入れていた。

    「や……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%の尻は%CALLNAME:MASTER%の手に優しく撫でられている。

    「……時間を止めて逃げることもできるのに……そうしないのは何故かしら」

    自嘲気味に微笑みながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げた。

    「……答えはきっと、私が誰よりも知っているわ」

    そう囁いて、%CALLNAME:TARGET%は%CALLNAME:MASTER%の首筋にそっと唇を寄せた。
  priority: 4
- id: talent_3_1
  content: >-
    「やっ……%CALLNAME:MASTER%、そこは……」

    %CALLNAME:TARGET%は顔を赤らめ、仕事の手を止めた。

    「もう……こんなところで、厭らしいですわ……」

    そう文句を言いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の手を払おうとはしなかった。

    「……少しだけですからね？」

    「んっ……や……」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の尻を撫でている。

    %CALLNAME:TARGET%は紅潮した顔で、じっとその手を見つめていた。

    「……%CALLNAME:MASTER%の手、温かい……」

    そう呟いて、%CALLNAME:TARGET%はそっと目を伏せた。

    「あ……」

    %CALLNAME:TARGET%の体が僅かに震える。

    「……服が、しわになってしまいますわ……」

    小さく抗議するも、%CALLNAME:TARGET%は逃げようとはしなかった。

    「……もう、%CALLNAME:MASTER%ったら……困るんですから」

    その声には、拒絶の色はなかった。

    「っ……」

    %CALLNAME:TARGET%は息を飲み、%CALLNAME:MASTER%の手を感じている。

    「……メイドとして、これは……いけないことですわ……」

    そう言いながらも、%CALLNAME:TARGET%の表情はどこか嬉しそうだった。

    「……でも、%CALLNAME:MASTER%だけには……」

    言いかけた言葉を飲み込み、%CALLNAME:TARGET%は俯いた。
  priority: 3
