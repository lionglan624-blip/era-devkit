character: 子悪魔
situation: K7_愛撫
entries:
- id: fallback
  content: >-
    「んっ……えへへ、胸、触られてる……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕の中に収まり、されるがままになっている。

    妖精の小さな胸が、%CALLNAME:MASTER%の手に包まれて柔らかく形を変えた。

    「……%CALLNAME:MASTER%の手、大きいね……あたしの胸、ぜんぶ包まれちゃう……」

    %CALLNAME:TARGET%は嬉しそうに目を細めて、%CALLNAME:MASTER%に体を預けている。

    「……もっと揉んで……？　気持ちいいの……」

    妖精は甘えた声で、%CALLNAME:MASTER%にねだった。

    「あっ……そこ、くすぐったいの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に背中を預け、胸を揉まれている。

    小さな乳房が%CALLNAME:MASTER%の指に弄ばれるたび、妖精は甘い吐息を漏らした。

    「……%CALLNAME:MASTER%って、あたしの胸、好き……？」

    %CALLNAME:TARGET%は首を傾けて、%CALLNAME:MASTER%を見上げた。

    「……小さいけど……%CALLNAME:MASTER%に触ってもらえて、嬉しいの……」

    妖精は幸せそうに微笑みながら、%CALLNAME:MASTER%の愛撫を受け入れている。

    「ふぁ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に抱きしめられながら、胸への愛撫に身を委ねている。

    乳首が指先で転がされると、妖精の体がぴくりと震えた。

    「……やぁ……そこ、敏感なの……」

    %CALLNAME:TARGET%は頬を染めながら、%CALLNAME:MASTER%にしがみついた。

    「……でも、%CALLNAME:MASTER%にされるの、大好き……ずっとこうしてたい……」

    妖精は%CALLNAME:MASTER%の温もりに包まれて、蕩けるような表情を浮かべている。

    「%CALLNAME:MASTER%……胸、揉んでくれてるの……嬉しいな……」

    %CALLNAME:TARGET%は目を閉じて、%CALLNAME:MASTER%の愛撫を味わっている。

    小さな胸が%CALLNAME:MASTER%の手に揉みしだかれ、妖精は甘い声を漏らした。

    「あっ……んっ……%CALLNAME:MASTER%の手、魔法みたい……」

    %CALLNAME:TARGET%は気持ちよさそうに身をくねらせた。

    「……世界で一番、%CALLNAME:MASTER%が好き……あたし、%CALLNAME:MASTER%のものだから……」

    妖精は幸せいっぱいの笑顔で、%CALLNAME:MASTER%に甘えていた。
  priority: 4
- id: talent_3_1
  content: >-
    「ひゃっ……む、胸……触るの……？」

    %CALLNAME:TARGET%は驚いた顔をしながらも、%CALLNAME:MASTER%を拒まなかった。

    頬を赤く染めながら、おずおずと体を預けている。

    「……あの、あたしの胸、小さいけど……」

    %CALLNAME:TARGET%は恥ずかしそうに俯いた。

    「……%CALLNAME:MASTER%がいいなら……触って、いいよ……」

    妖精は小さな声でそう言って、%CALLNAME:MASTER%に身を委ねた。

    「んっ……やぁ……そこ、触られると……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手が胸に触れるたび、小さく声を漏らしている。

    妖精の小さな乳房が、愛撫で少しずつ熱を帯びていく。

    「……なんか、胸がぽかぽかしてきた……」

    %CALLNAME:TARGET%は不思議そうに自分の体を見下ろした。

    「……恥ずかしいけど……嫌じゃないの……」

    妖精は照れながらも、%CALLNAME:MASTER%の愛撫を受け入れていた。

    「あっ……%CALLNAME:MASTER%……そこ……」

    %CALLNAME:TARGET%は乳首を指で弾かれて、体をびくりと震わせた。

    慌てて口を押さえるが、甘い声が漏れてしまう。

    「……は、恥ずかしい……変な声、出ちゃった……」

    %CALLNAME:TARGET%は真っ赤な顔で%CALLNAME:MASTER%を見上げた。

    「……笑わないでね……%CALLNAME:MASTER%のせいなんだから……」

    妖精は困った顔をしながらも、嬉しそうだった。

    「……%CALLNAME:MASTER%、胸、好き……？」

    %CALLNAME:TARGET%は不安げに%CALLNAME:MASTER%を見上げながら、愛撫を受けている。

    小さな胸が%CALLNAME:MASTER%の手に包まれて、妖精の息遣いが荒くなっていく。

    「……あたしの胸、触ってるの……%CALLNAME:MASTER%だけだよ……」

    %CALLNAME:TARGET%は頬を染めながら、告白した。

    「……もっと、していい……よ……」

    妖精は恥ずかしそうに、でもどこか期待を込めて%CALLNAME:MASTER%を見つめた。
