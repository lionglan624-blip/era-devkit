  content: >-
    「……は？　何するんだよお前」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%を押しのけようとした。

    「胸を吸えって……頭おかしいんじゃないか？」

    %CALLNAME:人物_魔理沙%は呆れたように言いながら、距離を取ろうとした。

    「……知り合い程度の相手にそんなこと、普通しないぜ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の常識を疑う目で見つめた。

    「……なんでそんなこと、私がしなきゃいけないんだ？」

    %CALLNAME:人物_魔理沙%は不機嫌そうに腕を組んだ。

    「お前と私、そんな関係じゃないだろ」

    %CALLNAME:人物_魔理沙%は明確に拒絶の意思を示した。

    「……もうちょっと、空気読めよな」

    %CALLNAME:人物_魔理沙%は呆れた様子で、そっぽを向いた。

    「……お前、そういうのはちゃんとした相手とやれよ」

    %CALLNAME:人物_魔理沙%はため息をついた。

    「私は魔法使いだぜ。そんな暇なことしてる場合じゃないんだよ」

    %CALLNAME:人物_魔理沙%は研究を言い訳に、%CALLNAME:MASTER%から距離を取った。

    「……まあ、冗談だったんだろうけどな」

    %CALLNAME:人物_魔理沙%は話を流そうとして、苦笑いを浮かべた。

    「……」

    %CALLNAME:人物_魔理沙%は無言で%CALLNAME:MASTER%を見た。

    その目は冷たく、明らかに不快感を示している。

    「……お前、私のこと何だと思ってるんだ？」

    %CALLNAME:人物_魔理沙%は低い声で問いかけた。

    「……私、道具じゃないんだぜ」

    %CALLNAME:人物_魔理沙%は失望したように、視線を逸らした。
