entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%が見慣れない道具を取り出すと、%CALLNAME:TARGET%は興味深そうに覗き込んだ。

    「あっ、それ……前に使った、ぶるぶるするやつですよね……？」

    %CALLNAME:TARGET%は嬉しそうに脚を開いて、受け入れる体勢になる。

    電マが秘所に押し当てられた瞬間、妖精の体がびくんと跳ねた。

    「ひゃっ……！　んっ、あぁっ……す、すごいの……振動、強いです……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみつきながら、快楽に身を任せている。

    「……えへへ……%CALLNAME:MASTER%と一緒だと……こういうのも、嬉しいの……」

    「んぅ……%CALLNAME:MASTER%、今日はそれを使ってくれるんですね……」

    %CALLNAME:TARGET%は電マを見て、頬を染めながらも期待を込めた眼差しを向けた。

    振動が秘所に伝わると、妖精の小さな体が甘く震え始める。

    「あっ……んっ……やぁっ……体の奥まで、響いてくるの……」

    %CALLNAME:TARGET%は目を潤ませながら、%CALLNAME:MASTER%の胸に顔を埋めた。

    「……気持ちいい……です……%CALLNAME:MASTER%の手で、もっと……」

    妖精は甘えた声で、電マを強く押し当てるようねだった。

    「あっ……また、あれ……嬉しいの……」

    %CALLNAME:TARGET%は自分から腰を浮かせ、電マを受け入れる体勢を取った。

    振動が始まった瞬間、妖精の息が荒くなり、体がぴくぴくと反応する。

    「んっ……ふぁっ……こ、これ……やっぱり、すごい……」

    %CALLNAME:TARGET%は快楽に翻弄されながらも、幸せそうな表情を浮かべている。

    「%CALLNAME:MASTER%……あたし、%CALLNAME:MASTER%のこと……んっ……大好き……」

    言葉の途中で声が途切れ、妖精は甘い喘ぎを漏らした。

    「今日も、いっぱい気持ちよくしてくれますか……？」

    %CALLNAME:TARGET%は期待に満ちた瞳で%CALLNAME:MASTER%を見上げた。

    電マが押し当てられると、妖精の体がとろんと力を失っていく。

    「ひゃっ……んあっ……そこ、そこがいいの……もっと……」

    %CALLNAME:TARGET%は自分から腰を動かし、振動をより深く感じようとしている。

    「あたし……%CALLNAME:MASTER%のものだから……全部、受け止めるの……」

    妖精は蕩けた表情で、%CALLNAME:MASTER%に全てを委ねていた。
  priority: 4
- id: talent_3_1
  content: >-
    「えっ……そ、それって……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出した電マを見て、顔を赤くした。

    「こ、こういうの……使うんですか……？　恥ずかしい……」

    しかし逃げることはせず、おずおずと脚を開く。

    振動が秘所に触れた瞬間、%CALLNAME:TARGET%は小さな悲鳴を上げた。

    「ひゃあっ……！　あっ、んっ……ぶ、ぶるぶるしてる……っ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕を掴みながら、快楽に耐えている。

    「あの……それ、前より強くなってませんか……？」

    %CALLNAME:TARGET%は不安げに電マを見つめたが、%CALLNAME:MASTER%を信じて身を任せた。

    「んっ……あぁっ……！　つ、強い……体が、変になっちゃう……」

    妖精の体が電マの振動に合わせてぴくぴくと震えている。

    %CALLNAME:TARGET%は涙目になりながら、でも%CALLNAME:MASTER%から離れようとしなかった。

    「……%CALLNAME:MASTER%が……こうしたいなら……あたし、我慢するから……」

    小さな声でそう呟いて、妖精は快楽に身を委ねた。

    「ま、また……それ、使うんですか……」

    %CALLNAME:TARGET%は恥ずかしそうに視線を逸らしながら、スカートを捲り上げた。

    電マが秘所に押し当てられると、妖精は声を押し殺して耐えようとした。

    「んぅ……っ……だ、ダメ……声、出ちゃう……」

    しかし堪えきれず、甘い声が漏れてしまう。

    「あっ……やっ……%CALLNAME:MASTER%、見ないで……こんな顔……」

    %CALLNAME:TARGET%は片手で顔を覆いながら、腰を小さく揺らしていた。

    「……こういうの、慣れないです……」

    %CALLNAME:TARGET%は緊張した面持ちで、電マが近づくのを待っている。

    振動が始まると、妖精の目がとろんと蕩けていった。

    「ふぁっ……んっ……あぁっ……体の奥が、きゅんってする……」

    %CALLNAME:TARGET%は自分でも驚くほど大きな声を上げてしまい、慌てて口を押さえた。

    「ご、ごめんなさい……変な声……でも、止められないの……」

    妖精は羞恥に染まりながらも、%CALLNAME:MASTER%の愛撫を受け入れていた。
