- id: fallback
  content: >-
    「……これを、舐めるの？」

    %CALLNAME:人物_フラン%は首を傾げながら、%CALLNAME:MASTER%のそれを見つめた。

    地下室で過ごした長い年月、こんなことは知らなかった。

    「ふぅん……変なことするのさ……」

    %CALLNAME:人物_フラン%は興味本位で舌を伸ばした。

    「……しょっぱい……？　変な味……」

    その声には、純粋な好奇心だけがあった。

    「%CALLNAME:MASTER%……私、こういうことよく知らないのさ……」

    %CALLNAME:人物_フラン%は正直に告白しながら、言われた通りに舌を動かしていた。

    495年の隔離生活で、世間のことは何も知らない。

    「でも……%CALLNAME:MASTER%が教えてくれるなら……」

    %CALLNAME:人物_フラン%はぎこちなく、それでも一生懸命に舐めた。

    「……こう？　……もっと深く？　……わかった……」

    素直に従う姿に、かつての凶暴さは見られなかった。

    「なんだか……口の中がいっぱいで、変な気分……」

    %CALLNAME:人物_フラン%は舌を動かしながら、自分の変化に戸惑っていた。

    %CALLNAME:MASTER%を咥えていると、胸の奥がざわざわする。

    「……これって、どういう気持ちなの……？」

    %CALLNAME:人物_フラン%は無自覚のまま、奉仕を続けていた。

    「……%CALLNAME:MASTER%のこと、もっと知りたくなってきたのさ……」

    その言葉は、芽生え始めた感情の表れだった。

    「……%CALLNAME:MASTER%といると、不思議な気持ちになるのさ」

    %CALLNAME:人物_フラン%はぼんやりと呟きながら、舌を動かし続けていた。

    壊してしまいたい衝動と、大切にしたい気持ちが入り混じる。

    「私……%CALLNAME:MASTER%のことは、壊したくないの……」

    %CALLNAME:人物_フラン%は真剣な表情で%CALLNAME:MASTER%を見上げた。

    「……だから、こうして優しくするのさ……ちゅ……」

    悪魔の妹は、初めての感情に戸惑いながらも向き合っていた。
