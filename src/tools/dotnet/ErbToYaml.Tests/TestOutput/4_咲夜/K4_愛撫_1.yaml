- id: fallback
  content: >-
    「……な、何を……」

    %CALLNAME:TARGET%は戸惑いながらも、強く拒絶はしなかった。

    「こんなこと……いけないですわ……」

    そう言いながらも、%CALLNAME:TARGET%の体は正直に反応している。

    「……っ……」

    %CALLNAME:TARGET%は唇を噛みしめ、声を堪えた。

    「お、お嬢様に知られたら……」

    %CALLNAME:TARGET%は不安げな声を出した。

    だが、%CALLNAME:MASTER%を押しのける力は弱い。

    「……んっ……そこは……」

    快感に反応してしまう自分の体に、%CALLNAME:TARGET%は戸惑っていた。

    「……どうして、止められないの……」

    「%CALLNAME:MASTER%……これは……」

    %CALLNAME:TARGET%は困惑した表情を浮かべている。

    「メイドとして、こんなことは……」

    しかし、%CALLNAME:MASTER%の舌の動きに、言葉が途切れた。

    「……あ……」

    小さな声が漏れ、%CALLNAME:TARGET%は慌てて口を押さえた。

    「……止めてください……」

    %CALLNAME:TARGET%の声には、力がこもっていなかった。

    言葉とは裏腹に、彼女の体は快感を求めているようだった。

    「こんなの……私……」

    %CALLNAME:TARGET%は自分の反応に戸惑いながらも、抵抗をやめた。

    「……%CALLNAME:MASTER%が悪いんですからね……」

    責任を押し付けるように、%CALLNAME:TARGET%は呟いた。
  priority: 2
- id: fallback
  content: >-
    「――何をするつもりですか」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見た。

    「メイドに対してこのような行為……」

    %CALLNAME:TARGET%は毅然とした態度を崩さない。

    「……っ」

    しかし、体の反応までは制御できなかった。

    「お嬢様のお客様とはいえ……」

    %CALLNAME:TARGET%は警戒の色を隠さない。

    「このような真似は許されませんわ」

    だが、%CALLNAME:MASTER%の行為を完全に止めることはできずにいる。

    「……早く……終わらせてください……」

    %CALLNAME:TARGET%は目を逸らしながら、そう言った。

    「……っ、やめてください」

    %CALLNAME:TARGET%は身を固くした。

    「私はメイドです。こんなことは……」

    しかし、体は正直に快感を感じ始めている。

    「……ぅ……」

    声を漏らしてしまい、%CALLNAME:TARGET%は唇を強く噛んだ。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%を睨みつけている。

    完璧なメイドとして、動揺を見せまいとしていた。

    「……終わったら、すぐに出て行ってください」

    冷たい声でそう言いながらも、%CALLNAME:TARGET%の体は小さく震えていた。

    屈辱と、認めたくない快感とが、彼女の心を揺さぶっていた。
  priority: 1
