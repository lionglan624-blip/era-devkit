    %CALLNAME:MASTER%が乳房を包むと、%CALLNAME:人物_フラン%は小さく声を上げた。

    「あ……そこ……くすぐったいのさ……」

    %CALLNAME:人物_フラン%は戸惑いながらも、%CALLNAME:MASTER%の愛撫を受け入れていた。

