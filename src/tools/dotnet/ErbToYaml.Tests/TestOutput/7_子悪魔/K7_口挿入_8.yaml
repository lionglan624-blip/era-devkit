    「あっ……入って……いく……です……」

    %CALLNAME:TARGET%は真っ赤な顔で%CALLNAME:MASTER%のアナルに挿入していった。

    「……は、恥ずかしいけど……%CALLNAME:MASTER%のためなら……頑張ります……」

    「あの……こういうお仕事……初めてで……」

    %CALLNAME:TARGET%は緊張した面持ちで腰を動かし始めた。

    「んっ……あ……こう……ですか……？」

    ぎこちない動きながらも、%CALLNAME:MASTER%を悦ばせようと懸命だ。

    「……%CALLNAME:MASTER%……気持ちいいですか……？」

    %CALLNAME:TARGET%は不安げに問いかけた。

    「……あたし……もっと上手になりたいです……」

    「%CALLNAME:MASTER%が望むなら……あたし、やります……」

    %CALLNAME:TARGET%は覚悟を決めたように腰を沈めていく。

    「あっ……%CALLNAME:MASTER%の中……すごく……きつい……」

    小さな体が%CALLNAME:MASTER%の体内の感触に震えている。

    「んっ……こうやって……動けばいいんですか……」

    %CALLNAME:TARGET%は慣れない動きで腰を振り始めた。

    「……%CALLNAME:MASTER%のこと……好きだから……頑張れます……」

    「あ、あたしがこういうの……するなんて……」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%に言われるまま動いた。

    「んっ……はぅ……なんか……変な感じ……」

    %CALLNAME:MASTER%の体の中の熱さに、%CALLNAME:TARGET%は顔を赤らめた。

    「……こんなこと……他の人には絶対できないです……」

    %CALLNAME:TARGET%は恥ずかしそうに俯いた。

    「……%CALLNAME:MASTER%だから……我慢できるんです……」
