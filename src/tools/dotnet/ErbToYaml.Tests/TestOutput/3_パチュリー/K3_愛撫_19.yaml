  content: >-
    「……それは……ニプルキャップというものね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が持つ器具を、興味深そうに観察した。

    「乳首を挟み、振動で刺激を与える道具……」

    しかし実際に装着されると、%CALLNAME:TARGET%の表情が強張った。

    「……っ……振動が……直接……」

    %CALLNAME:TARGET%は冷静を装おうとするが、声が震えている。

    「……ふぅん……」

    %CALLNAME:TARGET%はクリップの構造を分析しようとしている。

    「……挟む力と振動周波数……計算された設計ね……」

    しかし振動が強まる度に、%CALLNAME:TARGET%の冷静さは揺らいでいく。

    「……むきゅ……これは……予想外の刺激……」

    %CALLNAME:TARGET%は困惑した表情で、%CALLNAME:MASTER%を見上げた。

    「……」

    %CALLNAME:TARGET%は無言で振動の刺激を受けている。

    振動が続く度に、%CALLNAME:TARGET%の呼吸が微かに乱れる。

    「……乳首への刺激……悪くは……ないわね……」

    %CALLNAME:TARGET%はぼそりと呟いた。

    「……でも……調子に乗らないで……」

    「……ん……」

    %CALLNAME:TARGET%はクリップの振動に、小さく声を漏らした。

    「……この振動……体が……慣れてきた……かしら……」

    しかし快感が思考を邪魔し、%CALLNAME:TARGET%は言葉を途切れさせた。

    「……本を……読もうと思ったけど……無理ね……」

    %CALLNAME:TARGET%は諦めたように目を閉じた。
