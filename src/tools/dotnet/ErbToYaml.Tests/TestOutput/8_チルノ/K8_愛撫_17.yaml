- id: fallback
  content: >-
    「――へ?　なにそれ、あたいの中に入れるの?」

    %CALLNAME:TARGET%は不思議そうに首を傾げた。

    挿入されて振動が始まると、体がビクンと跳ねる。

    「ひゃあっ!?　な、なにこれ!?　中で震えてる!?」

    「あたいの……奥が……変な感じ……っ!」

    妖精には未知の感覚に、%CALLNAME:TARGET%は目を白黒させた。

    「――ふーん、中で震えるやつ?　あたいには効かないわよ!」

    %CALLNAME:TARGET%は自信満々に胸を張った。

    しかしバイブが体の奥を刺激すると、

    「っ!?　ちょ、待っ……中が……っ、ひぁっ!?」

    「う、うそ……こんなの……あたい知らない……っ」

    最強を自称する氷精は、あっさりと表情を崩した。

    「――ね、ねぇ、それ何するやつ?　中に……入れるの?」

    %CALLNAME:TARGET%は怪訝そうにバイブを見つめた。

    挿入されて振動が始まると、

    「わっ!?　な、なんで震えてるの!?　しかも中で!?」

    「……変な感じ……でも、嫌いじゃない……かも?」

    純粋な感想を漏らして、%CALLNAME:TARGET%は首を傾げた。

    「――あ、またあの震えるやつ?　あたいの中に入れるの?」

    %CALLNAME:TARGET%は記憶にあるらしく、少し身構えた。

    振動が始まると、予想以上の刺激に声が漏れる。

    「っ……やっぱり、これ……奥までくるのよね……」

    「あたいったら最強だけど……これはちょっと……ずるい……」

    そう言いながら、%CALLNAME:TARGET%は不思議そうな表情を浮かべていた。
