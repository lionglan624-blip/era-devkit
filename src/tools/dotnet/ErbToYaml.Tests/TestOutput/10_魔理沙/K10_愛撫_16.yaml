    「こ、こんな感じか……？　変な感触だぜ……」

    %CALLNAME:人物_魔理沙%は眉をひそめながら、手を動かし続けた。

    「え、ええと……持ち方、これでいいのか……？」

    %CALLNAME:人物_魔理沙%はオナホールを握りながら、どこか落ち着かない様子だ。

