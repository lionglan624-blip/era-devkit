- id: fallback
  content: >-
    %CALLNAME:MASTER%がオナホールを取り出すと、%CALLNAME:人物_レミリア%は首を傾げた。

    「……何かしら、その奇妙な道具は」

    吸血鬼は興味深そうにオナホールを眺めた。

    「人間の発明品は面白いわね……どう使うの？」

    %CALLNAME:人物_レミリア%は高飛車な態度を保ちながらも、好奇心を隠せなかった。

    「……ふぅん、なるほど。使用人が主に見せるにしては、大胆ね」

    紅魔館の主は、%CALLNAME:MASTER%を観察するように見つめた。

    「それは何かしら？」

    %CALLNAME:人物_レミリア%はオナホールを怪訝そうに見つめた。

    「私の代わりに使う物……なるほど、興味深いわね」

    吸血鬼は高慢な笑みを浮かべ、オナホールを手に取った。

    「私が使ってあげましょうか？　500年の経験を見せてあげるわ」

    %CALLNAME:人物_レミリア%は威厳を保ちながら、好奇心に負けていた。

    「……特別よ、あなただけ」

    %CALLNAME:MASTER%がオナホールを見せると、%CALLNAME:人物_レミリア%は鼻を鳴らした。

    「ふん……そんな物で満足するの？」

    しかし吸血鬼の紅い瞳は、オナホールから離れなかった。

    「……興味がないわけではないわね」

    %CALLNAME:人物_レミリア%はそっとオナホールに触れ、感触を確かめた。

    「……%CALLNAME:MASTER%、今回だけ特別に許してあげるわ」

    威厳と好奇心の狭間で、吸血鬼は揺れていた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を紅い瞳で見つめた。

    「私にそんな物を見せるなんて、大胆な使用人ね」

    吸血鬼は溜息をつきながらも、オナホールを観察した。

    「外の世界の道具は、興味深いものが多いわ」

    %CALLNAME:人物_レミリア%は好奇心を隠せず、オナホールを手に取った。

    「……まあ、今日のところは見せてもらうわ」
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:MASTER%がオナホールを取り出すと、%CALLNAME:人物_レミリア%は冷たい視線を向けた。

    「……何かしら、その下品な物は」

    吸血鬼の威圧感が%CALLNAME:MASTER%を押し返す。

    「使用人が主の前でそんなものを見せるなど、不敬よ」

    %CALLNAME:人物_レミリア%は威厳を込めてそう言い放った。

    「咲夜を呼ばれたくなければ、今すぐしまいなさい」

    紅魔館の主は、氷のような冷たさで%CALLNAME:MASTER%を見据えた。

    「……ふん」

    %CALLNAME:人物_レミリア%はオナホールを見て、嫌悪感を露わにした。

    「そんな卑猥な物を私に見せるなど、何を考えているの？」

    500年を生きた吸血鬼は、高飛車な態度を崩さなかった。

    「使用人の分際で、随分と図々しいわね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を値踏みするように見ていた。

    「……罰を与える前に下がりなさい」

    %CALLNAME:MASTER%がオナホールを見せると、%CALLNAME:人物_レミリア%は眉をひそめた。

    「……何よ、それ。妙な形ね」

    興味なさそうな態度だが、その紅い瞳には不快感が滲んでいた。

    「紅魔館の主の前で、そのような物を……」

    %CALLNAME:人物_レミリア%の声は氷のように冷たかった。

    「大胆ね……命が惜しくないのかしら」

    吸血鬼としての威圧感が、部屋を満たしていく。

    「……何よ」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    「私はこう見えても忙しいのよ」

    オナホールに視線をやり、%CALLNAME:人物_レミリア%は顔をしかめた。

    「下品な物を見せて、何がしたいのかしら」

    「用があるなら、咲夜を通しなさい」

    紅魔館の主は、%CALLNAME:MASTER%を追い払うような仕草をした。
  priority: 1
