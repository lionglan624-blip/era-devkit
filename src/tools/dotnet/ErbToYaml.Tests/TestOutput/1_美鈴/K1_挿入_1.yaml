entries:
- id: fallback
  content: >-
    「ん……%CALLNAME:MASTER%……この体勢、恥ずかしいけど……」

    %CALLNAME:人物_美鈴%は四つんばいになりながら、振り返って微笑んだ。

    後ろから繋がる体勢は、まるで獣のようで少し恥ずかしい。

    「……でも、%CALLNAME:MASTER%になら……全部見せても平気」

    %CALLNAME:人物_美鈴%は自ら腰を押し付け、より深い繋がりを求めた。

    「……私のこと……もっと感じて……」

    武術家の引き締まった背中が、恋人への信頼を示していた。

    「あっ……奥まで……届いてる……」

    %CALLNAME:人物_美鈴%は甘い声を漏らしながら、シーツを掴んだ。

    後背位ならではの深さに、体が自然と反応する。

    「%CALLNAME:MASTER%……もっと、強く……」

    %CALLNAME:人物_美鈴%は自ら腰を動かし、リズムを合わせた。

    「……二人でひとつになってるみたい……」

    恋人同士だけの特別な時間が流れていた。

    「はぁ……ん……こうしてると……」

    %CALLNAME:人物_美鈴%は肩越しに%CALLNAME:MASTER%を見つめた。

    「……%CALLNAME:MASTER%のこと、全身で感じられる……」

    後ろから抱かれる安心感に、%CALLNAME:人物_美鈴%は身を委ねた。

    「門番の仕事中は、こんな姿見せられないから……」

    %CALLNAME:人物_美鈴%は照れくさそうに笑った。

    「……今だけは、私の全部を受け止めて……」

    「……っ……%CALLNAME:MASTER%の手、あったかい……」

    %CALLNAME:人物_美鈴%は腰を掴む%CALLNAME:MASTER%の手に、自分の手を重ねた。

    「この体勢だと、顔が見えないのが少し寂しいけど……」

    %CALLNAME:人物_美鈴%は振り返り、愛おしげに%CALLNAME:MASTER%を見つめた。

    「……でも、体全体で繋がってる感じがして……好き」

    武術家らしい柔軟な体が、恋人の動きに合わせてしなやかに動いた。

    「……ずっと、このまま……」
