- id: fallback
  content: >-
    「……何のつもりかしら」

    %CALLNAME:人物_レミリア%は冷たい視線で%CALLNAME:MASTER%を見た。

    「私に触れることが許されると思っているの？」

    %CALLNAME:人物_レミリア%の紅い瞳が危険に光る。

    「身の程を知りなさい、下僕」

    吸血鬼としての威圧感が、部屋全体を支配していた。

    「……ふぅん」

    %CALLNAME:人物_レミリア%は退屈そうに%CALLNAME:MASTER%を見下ろした。

    「あなた、命が惜しくないのかしら」

    %CALLNAME:人物_レミリア%の声には、氷のような冷たさがあった。

    「私に触れる資格があるのは、限られた者だけよ」

    その言葉には、500年を生きた吸血鬼の矜持が込められていた。

    「……図々しいわね」

    %CALLNAME:人物_レミリア%は嘲笑を浮かべた。

    「使用人風情が主人に色目を使うの？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を見下すように言い放った。

    「せいぜい咲夜に怒られないようにすることね」

    吸血鬼の館の主として、%CALLNAME:人物_レミリア%は毅然とした態度を崩さなかった。

    「……まあ、いいわ」

    %CALLNAME:人物_レミリア%は気だるげに溜息をついた。

    「退屈しのぎにはなるかもしれないわね」

    だが%CALLNAME:MASTER%が近づこうとすると、

    「……でも、今はその気分じゃないわ。下がりなさい」

    %CALLNAME:人物_レミリア%は手を振って%CALLNAME:MASTER%を追い払った。

    紅魔館の主は、気まぐれに振る舞うのだった。
