    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の動きを警戒して見つめた。

    %CALLNAME:MASTER%の手が後ろの穴に触れると、%CALLNAME:人物_パチュリー%は小さく声を上げた。

