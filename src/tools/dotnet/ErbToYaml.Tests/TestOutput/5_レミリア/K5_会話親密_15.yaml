- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%の秘所に手を伸ばした。

    「……何のつもり？」

    %CALLNAME:TARGET%は冷たい瞳で%CALLNAME:MASTER%を見据え、その手を払いのけた。

    「私は紅魔館の主よ。そのような無礼は許されないわ。」

    「……身の程を弁えなさい。貴方はまだその域に達していないのよ。」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%に近づいた。

    「……触れないで。」

    %CALLNAME:TARGET%は指一本で%CALLNAME:MASTER%を押し留めた。

    「紅魔館の主に触れることが許されるのは、選ばれた者だけよ。」

    「……運命の糸が見えるようになったら、また来なさい。」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の身体に手を伸ばした。

    「……無礼者ね。」

    %CALLNAME:TARGET%は冷ややかな笑みを浮かべた。

    「500年を生きた吸血鬼を軽んじるとは……」

    「……貴方には何も許されていないのよ。覚えておきなさい。」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の秘所に向かった。

    「……愚かね。」

    %CALLNAME:TARGET%は冷たい視線で%CALLNAME:MASTER%を見下ろした。

    「私の身体に触れる権利は、まだ貴方にはないわ。」

    「……紅魔館の主を侮る者には、それなりの報いがあるわよ。」
