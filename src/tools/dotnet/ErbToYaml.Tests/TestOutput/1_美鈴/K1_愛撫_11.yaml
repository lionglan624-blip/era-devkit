    「あっ……んっ……面白い感触……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%に身を預け、振動の感覚を楽しんでいる。

    「……%CALLNAME:MASTER%と一緒だと、こういうのも悪くないわね」

    恋人に甘えるように、%CALLNAME:人物_美鈴%は微笑んだ。

    ローターの振動が%CALLNAME:人物_美鈴%の敏感な場所に当たった瞬間、小さく息を呑んだ。

    「ふふっ……%CALLNAME:MASTER%ったら、こういうの使うの好きね」

    からかうように言いながらも、体は素直に反応している。

    「振動が強くて……体の芯まで響く……」

    %CALLNAME:人物_美鈴%は頬を染め、%CALLNAME:MASTER%の手を握った。

    「もう少し……そこに当てて……」

    甘い声で、%CALLNAME:人物_美鈴%は恋人にねだった。

    「あっ……んんっ……」

    ローターが押し当てられ、%CALLNAME:人物_美鈴%は声を漏らした。

    「振動、止まらないっ……もう、変な気持ちになってきた……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%にしがみつき、荒い息を吐いている。

    門番としての凛々しさは影を潜め、恋人に翻弄される姿だけがそこにある。

    「……%CALLNAME:MASTER%、もっと……」

    切なげな声で、%CALLNAME:人物_美鈴%は続きをねだった。

    ローターの振動が強まり、%CALLNAME:人物_美鈴%は体を震わせた。

    「やっ……強すぎっ……！」

    %CALLNAME:人物_美鈴%は思わず声を上げたが、逃げようとはしない。

    むしろ%CALLNAME:MASTER%に寄り添い、振動を受け入れている。

    「……ダメ、こんなの……頭がぼんやりしてきちゃう……」

    %CALLNAME:人物_美鈴%は恍惚とした表情で%CALLNAME:MASTER%を見上げた。

    「……%CALLNAME:MASTER%のせいだからね……責任取ってよ……？」
