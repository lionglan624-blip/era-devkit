- id: fallback
  content: >-
    「……ほう、後ろからするの？」

    %CALLNAME:人物_レミリア%は興味深げに%CALLNAME:MASTER%に背を向けた。

    %CALLNAME:MASTER%が後ろから抱きしめ、挿入した。

    「んっ……なるほど、後ろからだと確かに……」

    %CALLNAME:人物_レミリア%は繋がった場所を冷静に観察した。

    「……ふぅん、こういう体勢も、悪くないわね」

    500年の吸血鬼は、新たな感覚を冷静に味わっていた。

    「……背面座位、ね。面白い趣向だわ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胡坐の上に座り、背中を預けた。

    「どれ、試してあげましょう」

    %CALLNAME:MASTER%がゆっくりと挿入すると、%CALLNAME:人物_レミリア%は息を吐いた。

    「っ……あぁ……奥まで、挿入ったわね……」

    %CALLNAME:人物_レミリア%は実験するように腰を動かした。

    「……まあ、及第点をあげてもいいわ」

    その声には、隠しきれない快感が滲んでいた。

    「……使用人が主を後ろから抱くとはね」

    %CALLNAME:人物_レミリア%は値踏みするように言い、%CALLNAME:MASTER%に背を向けて座った。

    後ろから抱きしめられ、二人の体が密着する。

    「んっ……そう、こうするのね……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を深く受け入れた。

    「……ふぅん、後ろからだと……また違う感覚ね」

    吸血鬼の心に、認めたくない何かが芽生え始めていた。

    「……今日は機嫌がいいから、付き合ってあげるわ」

    %CALLNAME:人物_レミリア%は溜息混じりに%CALLNAME:MASTER%の上に座った。

    「後ろから抱くのが好きなのかしら……変わった趣味ね」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は小さく声を漏らした。

    「あ……っ、深い……んっ……」

    %CALLNAME:人物_レミリア%は息を整えながら、繋がった場所を見下ろした。

    「……まあ、退屈しのぎには、なるわね」

    紅魔館の主は、湧き上がる感情を認めようとしなかった。
  priority: 2
- id: fallback
  content: >-
    「……後ろから抱くつもり？ 随分と大胆ね」

    %CALLNAME:人物_レミリア%は冷たい視線で%CALLNAME:MASTER%を見た。

    「ふん……まあいいわ。私に触れられるだけ光栄に思いなさい」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に背を向けて座り、身を任せた。

    「っ……ほう、こういう感覚……」

    %CALLNAME:人物_レミリア%は表情を変えずに%CALLNAME:MASTER%を受け入れた。

    「……下僕の奉仕として、受け取っておいてあげるわ」

    紅魔館の主は、高慢な態度を崩さなかった。

    「……随分と図々しい体勢を要求するのね」

    %CALLNAME:人物_レミリア%は不敵に微笑み、%CALLNAME:MASTER%の胡坐の上に座った。

    「まあいいわ。後ろから抱くのが好きなら、そうさせてあげる」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%はわずかに目を細めた。

    「……ふぅん、悪くはないわね」

    %CALLNAME:人物_レミリア%は余裕の表情で繋がった場所を見下ろした。

    「精々、私を満足させることね」

    500年の吸血鬼は、感情を表に出さずに快楽を受け入れていた。

    「……ほう、背面からするつもり？」

    %CALLNAME:人物_レミリア%は興味なさそうに言い、%CALLNAME:MASTER%に背を向けて座った。

    「顔が見えなければ私の心は揺るがないと思ったの？ 甘いわね」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は小さく息を吐いた。

    「……その程度で私を悦ばせられると思うな」

    だが、%CALLNAME:人物_レミリア%の呼吸はわずかに乱れていた。

    「……退屈しのぎには、なるかしらね」

    威厳を保ちながら、吸血鬼は使用人を利用していた。

    「……使用人が主をこんな体勢で抱くとはね」

    %CALLNAME:人物_レミリア%は溜息をつき、%CALLNAME:MASTER%の上に座った。

    「今日は気まぐれで付き合ってあげているのよ？ 感謝しなさい」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%の表情がわずかに揺らいだ。

    「……ふん、まあ、及第点ね」

    %CALLNAME:人物_レミリア%は感情を押し殺しながら%CALLNAME:MASTER%を受け入れた。

    「……それで、いつまで続けるつもり？」

    紅魔館の主は、高飛車な態度を最後まで崩さなかった。
  priority: 1
