- id: talent_3_1
  content: >-
    「……す、素股……？　それって……」

    %CALLNAME:人物_美鈴%は顔を真っ赤にして、%CALLNAME:MASTER%を見つめた。

    「……そ、そういうの……したことないけど……」

    おずおずと足を開き、%CALLNAME:人物_美鈴%は一物を太腿で挟んだ。

    「……わ、熱い……こ、こうすればいいの……？」

    ぎこちない動きで腰を動かしながら、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の反応を窺った。

    「……変じゃ、ない……？　ちゃんとできてる……？」

    「……%CALLNAME:MASTER%が、してほしいって言うから……」

    %CALLNAME:人物_美鈴%は照れ隠しに言い訳をしながら横になった。

    「……嫌じゃ、ないから……やってあげる……」

    太腿で一物を挟み、%CALLNAME:人物_美鈴%は懸命に腰を動かし始めた。

    「……ん……滑りが……私、濡れてきちゃってる……」

    自分の反応に、%CALLNAME:人物_美鈴%は更に顔を赤くした。

    「……こう……？　教えて、もっと上手にしたいから……」

    「……ほ、ほら……私だって、これくらい……」

    %CALLNAME:人物_美鈴%は強がるように言いながら、足を開いた。

    しかしその動きはまだぎこちなく、頑張りが伝わってくる。

    「……ふ、ん……当たって……変な感じ……」

    %CALLNAME:人物_美鈴%は秘所への刺激に驚いた顔をした。

    「……で、でも……%CALLNAME:MASTER%が喜んでくれるなら……」

    「……もう少し、続けてあげても……いい、かな……」

    「……%CALLNAME:MASTER%……私で、いいの……？」

    %CALLNAME:人物_美鈴%は不安そうに見上げた。

    「……門番なんかの私が……こんなこと……」

    躊躇いながらも、%CALLNAME:人物_美鈴%は太腿で一物を包んだ。

    「……ん……%CALLNAME:MASTER%がそれでいいなら……頑張る……」

    %CALLNAME:人物_美鈴%は覚悟を決めたように腰を動かし始めた。

    「……私……一生懸命、するから……」
