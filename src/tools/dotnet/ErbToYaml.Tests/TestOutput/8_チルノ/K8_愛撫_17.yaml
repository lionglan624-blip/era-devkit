    「ひぁっ!?　う、うそ……っ、中で……震えてる……っ!」

    「%CALLNAME:MASTER%に……こんなところまで……っ、見られてる……」

    好きな人の前で乱れてしまう自分が、%CALLNAME:TARGET%には恥ずかしかった。

    「――ちょ、ちょっと待って!　そんなの……あたいの中に……っ!」

    %CALLNAME:TARGET%は慌てて脚を閉じようとしたが、間に合わない。

    「んんっ……!?　な、なにこれ……っ、奥まで響く……っ」

    バイブの振動が容赦なく体を揺さぶる。

    「%CALLNAME:MASTER%……見ないで……あたい、変な顔してる……っ」

    好きな人に弱い姿を見られ、%CALLNAME:TARGET%は目を潤ませた。

    「――や、やめて……そんなの入れないで……っ!」

    %CALLNAME:TARGET%の抗議は、しかし挿入を止められなかった。

    「ひゃんっ……!　んっ……中で……すごい……っ」

    バイブが体の奥で震え続ける。

    「あたいは最強なのに……こんなので……%CALLNAME:MASTER%のせい……っ」

    そう言いながらも、%CALLNAME:TARGET%は完全には拒絶しなかった。

    「――また、あれ使うの……?　あたいの……中に……」

    %CALLNAME:TARGET%は覚えているらしく、恥ずかしそうに俯いた。

    挿入された瞬間、甘い声が漏れる。

    「っ……やっぱり……これ、奥まで……っ、直接……っ」

    「%CALLNAME:MASTER%に……こんな姿……恥ずかしい……っ」

    好きな人の前で乱れる自分が、%CALLNAME:TARGET%には耐え難かった。
