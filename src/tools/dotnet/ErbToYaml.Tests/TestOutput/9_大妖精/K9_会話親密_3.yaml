character: 大妖精
situation: K9_会話親密
entries:
- id: fallback
  content: >-
    「あっ…ん…%CALLNAME:MASTER%…♪」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にお尻を撫でられ、控えめな声を漏らした。

    羽がぴくりと震えて、頬が桜色に染まっていく。

    「…そこ、触られると…くすぐったいの…」

    %CALLNAME:TARGET%は恥ずかしそうに身をよじりながらも、離れようとはしなかった。

    「…でも、%CALLNAME:MASTER%になら…いいよ…♪」

    控えめな妖精は、恋人の手の温もりに身を委ねた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の小さなお尻をそっと撫でた。

    「ふぁ…っ、%CALLNAME:MASTER%…そこ…♪」

    %CALLNAME:TARGET%は頬を赤らめて、%CALLNAME:MASTER%の胸に顔を埋めた。

    「も、もう…恥ずかしいよぉ…」

    だが、%CALLNAME:TARGET%の背中の羽は嬉しそうにゆっくり揺れている。

    「…%CALLNAME:MASTER%の手、あったかいの…もうちょっとだけ…いい…？」

    %CALLNAME:TARGET%は小声でそうお願いしてきた。

    「んっ…やぁ…%CALLNAME:MASTER%ったら…」

    %CALLNAME:TARGET%はお尻を撫でられて、甘い吐息を漏らしている。

    羽がふわふわと揺れて、体が少しずつ熱くなっていく。

    「…チルノちゃんに見られたら、どうしよう…」

    %CALLNAME:TARGET%は恥ずかしそうに辺りを見回した。

    「…でも、%CALLNAME:MASTER%と二人きりだから…いいの…♪」

    %CALLNAME:TARGET%は安心したように%CALLNAME:MASTER%に身を寄せた。

    %CALLNAME:MASTER%は後ろから%CALLNAME:TARGET%を抱き寄せ、そのお尻を愛撫した。

    「ひゃぅ…っ、%CALLNAME:MASTER%…♪」

    %CALLNAME:TARGET%はびくりと体を震わせたが、すぐに力を抜いた。

    「…んっ、そこ…気持ちいい…の…」

    %CALLNAME:TARGET%は恋人の腕の中で、とろんとした目をしている。

    「わたし、%CALLNAME:MASTER%に触られるの…幸せだよ…」

    控えめな妖精は、蕩けた表情でそう囁いた。
  priority: 4
- id: talent_3_1
  content: >-
    「ひゃっ…！ %CALLNAME:MASTER%…そ、そこは…」

    %CALLNAME:TARGET%はお尻を撫でられて、顔を真っ赤にした。

    羽がぴくぴくと震えて、動揺を隠せない様子だ。

    「も、もう…いきなりそんなとこ触るなんて…」

    %CALLNAME:TARGET%は恥ずかしそうに俯いた。

    「…で、でも…嫌じゃない…かも…」

    %CALLNAME:TARGET%は小声でそう呟いて、%CALLNAME:MASTER%を見上げた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の小さなお尻を撫でた。

    「んっ…や、やぁ…%CALLNAME:MASTER%…」

    %CALLNAME:TARGET%は恥ずかしさに耐えるように目を閉じた。

    「そんなに…撫でられたら…変な気持ちに…」

    羽がそわそわと揺れている。

    「…%CALLNAME:MASTER%の手、あったかい…」

    %CALLNAME:TARGET%は照れくさそうに、でも離れようとはしなかった。

    「あっ…ん…」

    %CALLNAME:TARGET%はお尻を撫でる%CALLNAME:MASTER%の手を受け入れている。

    「%CALLNAME:MASTER%…こういうの、恥ずかしいよ…」

    %CALLNAME:TARGET%の耳まで真っ赤に染まっていく。

    「…でも、%CALLNAME:MASTER%だから…我慢するの…」

    そう言いながらも、%CALLNAME:TARGET%の表情は嬉しそうだった。

    控えめな妖精は、恋する人の手の温もりを感じていた。

    「ひゃぅ…っ、そ、そこ…！」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%のお尻を撫でている。

    %CALLNAME:TARGET%は体をびくつかせながら、耐えるように立っている。

    「…%CALLNAME:MASTER%、手つき…いやらしいの…」

    羽がぴくぴくと震えて、%CALLNAME:TARGET%の羞恥を表している。

    「…もう少しだけ…撫でてくれる…？」

    %CALLNAME:TARGET%は俯いたまま、消え入りそうな声でお願いした。
