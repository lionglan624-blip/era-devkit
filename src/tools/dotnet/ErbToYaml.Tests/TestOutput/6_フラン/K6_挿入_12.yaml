    495年の孤独の中では、想像もしなかった刺激だ。

    「地下室にいた頃には……こんなこと、知らなかったよ……」

    二人が激しく動くと、%CALLNAME:人物_フラン%は声を抑えられなくなった。

    「ひゃっ……あぁ……っ！　すごい……両方から……っ」

    悪魔の妹は、外の世界の刺激に驚きながらも快感に身を任せた。

    「%CALLNAME:MASTER%……これ、普通の遊びなの……？」

    %CALLNAME:人物_フラン%は無邪気に尋ねた。

    二人に同時に使われるのは、地下室では経験できなかったことだ。

    「みんな、こういうことしてるのかな……」

    疑問を口にする間にも、二人の動きは止まらない。

    「んっ……あ……考えてる場合じゃ……ないね……気持ち……いい……」

    悪魔の妹は、快感に思考を奪われていった。

    「二人の熱……身体の奥まで……届いてる……」

