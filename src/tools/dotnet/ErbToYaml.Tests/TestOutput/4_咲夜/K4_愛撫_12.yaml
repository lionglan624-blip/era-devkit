- id: fallback
  content: >-
    %CALLNAME:MASTER%が電動マッサージャを取り出すと、%CALLNAME:TARGET%は冷ややかな視線を向けた。

    「……それで何をなさるおつもりですの」

    %CALLNAME:TARGET%の声は氷のように冷たい。

    「紅魔館のメイド長を、そのような道具で弄ぶおつもり？」

    %CALLNAME:TARGET%の手には、いつの間にかナイフが握られていた。

    「……身の程を弁えなさいまし」

    「……は？」

    %CALLNAME:TARGET%は信じられないものを見るような目でマッサージャを見つめた。

    「それを私に使おうと？　正気ですの」

    %CALLNAME:TARGET%は嘲るように笑った。

    「時を止めれば、その機械ごと貴方を刻むことも造作もないのですけれど」

    「……今回は見逃して差し上げますわ」

    電動マッサージャを見た%CALLNAME:TARGET%は、露骨に眉をひそめた。

    「……趣味が悪いですわね」

    %CALLNAME:TARGET%は一歩後ろに下がり、距離を取った。

    「お客様であっても、無礼な振る舞いは許しませんわ」

    「お嬢様のお怒りを買いたくなければ、それを仕舞いなさいまし」

    瀟洒なメイドの目は、冷ややかに光っている。

    「……」

    %CALLNAME:TARGET%は無言で電動マッサージャを見つめ、ため息をついた。

    「お客様。紅魔館のメイドに、そのようなものを使うおつもりですか」

    %CALLNAME:TARGET%の声は静かだが、有無を言わせぬ威圧感がある。

    「……お引き取りを。次はありませんわ」

    完璧なメイドは、完璧な作り笑いを浮かべていた。
  priority: 1
