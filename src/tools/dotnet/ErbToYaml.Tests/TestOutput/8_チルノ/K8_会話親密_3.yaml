- id: fallback
  content: >-
    「うきゅっ！？ちょ、ちょっと……」

    %CALLNAME:TARGET%は驚いて体を固くした。

    「……お尻は、ちょっと……恥ずかしいわよ」

    %CALLNAME:TARGET%は困惑しながらも、強くは拒まなかった。

    「……%CALLNAME:MASTER%、そういうことは、もう少し……」

    氷の妖精は顔を赤くして、言葉を濁した。

    「ひゃっ……な、何を……」

    %CALLNAME:TARGET%は驚いて%CALLNAME:MASTER%を見た。

    「あたいのお尻、触るなんて……大胆ね」

    %CALLNAME:TARGET%は戸惑いながらも、されるがままになっている。

    「……べ、別に嫌じゃないけど……」

    小さな声でそう付け加えた。

    「わっ……急に触らないでよ」

    %CALLNAME:TARGET%は少し飛び上がって驚いた。

    「……あたいのお尻、そんなに触りたいの？」

    %CALLNAME:TARGET%は困惑した表情で%CALLNAME:MASTER%を見ている。

    「……まあ、%CALLNAME:MASTER%なら……少しくらいは、いいけど」

    頬を染めながら、氷の妖精は小さく呟いた。

    「んっ……そこは……」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の尻に触れた。

    %CALLNAME:TARGET%は戸惑いながらも、その場に留まっている。

    「……%CALLNAME:MASTER%、最強のあたいを相手に大胆ね」

    %CALLNAME:TARGET%は強がりながらも、顔は赤い。

    「……今回だけ、特別よ？」
  priority: 2
- id: fallback
  content: >-
    「うきゅ！？なにすんのさ！？」

    %CALLNAME:TARGET%は可愛らしい声を上げて飛びのいた。

    「いきなりあたいのお尻触るなんて、どういうつもり！？」

    氷の妖精は頬を膨らませて%CALLNAME:MASTER%を睨んでいる。

    「……最強のあたいに手を出すなんて、度胸あるわね」

    「……っ！ちょっと、何してんのよ！」

    %CALLNAME:TARGET%は驚いて距離を取った。

    「あたいのお尻を触るなんて、百年早いわ！」

    氷の妖精は威勢よく言い放った。

    「……まったく、何考えてんだか」

    %CALLNAME:TARGET%はぷいっとそっぽを向いた。

    「はぁ？何すんの？」

    %CALLNAME:TARGET%は冷たい視線で%CALLNAME:MASTER%を見た。

    「あたいのお尻触って楽しいの？」

    氷の妖精は呆れた様子で腕を組んでいる。

    「……変なやつ。近寄らないでよね」

    「……そんなとこ触って楽しいの？」

    %CALLNAME:TARGET%は戸惑いながらも、じっと%CALLNAME:MASTER%を見ている。

    %CALLNAME:MASTER%は思わず手を引いた。

    「……ふーん、変な人。でも、あたいの感触は印象的だったでしょ？」

    氷の妖精は少しだけ得意げに笑った。

    「最強のあたいのお尻なんだから、当然よね」
  priority: 1
