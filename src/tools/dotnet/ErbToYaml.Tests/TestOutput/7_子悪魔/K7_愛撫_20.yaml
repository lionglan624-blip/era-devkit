entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、それ……おっぱいに付けるやつ……ですか……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出した搾乳機を見つめ、静かに頷いた。

    「……あたしの体から……何か出るの……不思議……」

    搾乳機が小さな乳房に装着され、吸引が始まる。

    「んっ……あ……引っ張られて……」

    %CALLNAME:TARGET%は表情をあまり変えないまま、体を%CALLNAME:MASTER%に預けている。

    「……%CALLNAME:MASTER%のために……搾られるの……悪くない……です……」

    「……今日も……あたしを搾るんですね……」

    %CALLNAME:TARGET%は淡々と服を脱ぎ、搾乳機を受け入れる準備をした。

    「……慣れました……%CALLNAME:MASTER%にこうされるの……」

    カップが乳房を包み込み、規則的な吸引が始まる。

    「ん……ぅ……吸われて……おっぱいが……伸びる……」

    %CALLNAME:TARGET%は無表情のまま、時折小さく息を漏らしている。

    「……%CALLNAME:MASTER%が喜ぶなら……何度でも……」

    「……搾乳……ですか……」

    %CALLNAME:TARGET%は静かに頷いて、自ら胸元を晒した。

    「……あたし……こうやって使われるの……嫌じゃないです……」

    搾乳機が装着され、妖精の小さな乳房が吸引される。

    「あ……っ……んっ……引っ張られて……気持ち……いい……」

    %CALLNAME:TARGET%は目を閉じて、搾乳の感覚に身を任せている。

    「……%CALLNAME:MASTER%の……牛さん……みたい……えへ……」

    「……あたしのおっぱい……また使うんですね……」

    %CALLNAME:TARGET%は感情の薄い声で呟いたが、どこか嬉しそうだった。

    搾乳機が乳房にセットされ、ゆっくりと吸引を開始する。

    「んっ……ふ……吸われて……乳首が……中に引き込まれて……」

    規則的な吸引音とともに、%CALLNAME:TARGET%の体が小さく揺れる。

    「……%CALLNAME:MASTER%……あたし……ちゃんと出てますか……」

    妖精は淡々と、しかし従順に搾乳を受け入れていた。
