- id: fallback
  content: >-
    「んっ……%CALLNAME:MASTER%の指、入ってきてる……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕にしがみつきながら、指を受け入れている。

    妖精の小さな体が、指が動くたびに甘く震えた。

    「あっ……そこ、気持ちいいの……」

    %CALLNAME:TARGET%は頬を染めながら、%CALLNAME:MASTER%を見上げた。

    「……えへへ、%CALLNAME:MASTER%に触られてると、幸せ……」

    妖精は蕩けるような笑みを浮かべながら、腰を小さく揺らしている。

    「やぁ……%CALLNAME:MASTER%、そこ……奥まで……」

    %CALLNAME:TARGET%は目を潤ませながら、%CALLNAME:MASTER%の指の動きに身を委ねている。

    妖精の秘所は蜜で濡れ、指の動きに合わせて淫らな水音が漏れた。

    「んぅ……あたしの中、熱くなってきた……」

    %CALLNAME:TARGET%は切なそうな声を上げながら、%CALLNAME:MASTER%の指をきゅっと締め付けた。

    「……%CALLNAME:MASTER%の指、大好き……もっとして……」

    妖精は甘えた声で、%CALLNAME:MASTER%にねだった。

    「あっ……ふぁ……そこ、いいの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋めながら、快楽に身を任せている。

    小さな体がぴくぴくと反応し、妖精の息遣いが荒くなっていく。

    「%CALLNAME:MASTER%……あたしね、%CALLNAME:MASTER%のこと……んっ……」

    言葉が快楽で途切れ、%CALLNAME:TARGET%は甘い声を漏らした。

    「……世界で一番、好き……だから……」

    %CALLNAME:TARGET%は幸せそうに%CALLNAME:MASTER%にしがみついている。

    「んっ……%CALLNAME:MASTER%、指……気持ちいい……」

    %CALLNAME:TARGET%は脚を開いて、%CALLNAME:MASTER%の愛撫を受け入れている。

    妖精の体は熱を帯び、敏感になった秘所は指の動きに甘く震えた。

    「あたしね……こういうの、%CALLNAME:MASTER%とだけしたいの……」

    %CALLNAME:TARGET%は上気した顔で、%CALLNAME:MASTER%を見つめた。

    「……ずっとずっと、%CALLNAME:MASTER%のそばにいたいな……」

    妖精は幸せいっぱいの笑顔で、そう告げた。
