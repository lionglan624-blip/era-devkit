- id: fallback
  content: >-
    「あ、あの……後ろからだと、%CALLNAME:MASTER%の顔が見えなくて……」

    %CALLNAME:人物_フラン%は緊張した様子で、%CALLNAME:MASTER%の背中に身を寄せた。

    自分のものを後孔に当てると、不安そうに見つめる。

    「入れるよ……？ ちゃんとできるかな……」

    %CALLNAME:人物_フラン%は慎重に挿入しながら、息を詰めた。

    「壊さないように……壊しちゃったらどうしよう……」

    憧れの人の背中に縋りつきながら、少女は身を震わせていた。

    「私なんかが……%CALLNAME:MASTER%に後ろからこんなこと……」

    %CALLNAME:人物_フラン%は戸惑いながらも、腰を動かし始めた。

    後背位の体勢で挿入したまま、%CALLNAME:MASTER%の背中に抱きつく。

    「顔が見えないから……痛かったら、言ってね……」

    %CALLNAME:人物_フラン%は心配そうに問いかけた。

    「壊さないように……ゆっくりするから……」

    495年の孤独を知る少女は、慎重に憧れの人を愛そうとしていた。

    「%CALLNAME:MASTER%の背中……こうして触れてると、ドキドキするのさ……」

    %CALLNAME:人物_フラン%は恥ずかしそうに呟きながら、腰を揺らした。

    後背位で挿入しながら、%CALLNAME:MASTER%の背に手を当てる。

    「私のこと……嫌いにならないでね……」

    %CALLNAME:人物_フラン%は不安そうに問いかけた。

    「こうしてると……%CALLNAME:MASTER%と近づけてる気がするの……」

    少女は憧れの人の背中越しに、距離を縮めようとしていた。

    「んっ……後ろからだと、深く入るのさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を後ろから抱きしめながら、驚いた声を上げた。

    後背位の体勢から、%CALLNAME:MASTER%の肩に顎を乗せる。

    「%CALLNAME:MASTER%の背中、温かい……私も温めてあげたいの……」

    %CALLNAME:人物_フラン%はぎこちなく腰を動かした。

    「壊さないでいられるかな……壊したくないよ……」

    495年の孤独を知る少女は、不安と喜びの中で憧れの人を後ろから抱きしめていた。
