- id: fallback
  content: >-
    「……それは何かしら」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が持つマッサージャーを、観察するような目で見た。

    「振動を利用した器具ね……興味深いわ」

    %CALLNAME:TARGET%は淡々と言うが、%CALLNAME:MASTER%が近づくと僅かに身を引いた。

    「……まあ、いいわ。観察対象として、試してみましょう」

    知識欲を隠れ蓑に、%CALLNAME:TARGET%は%CALLNAME:MASTER%を受け入れた。

    「……っ」

    マッサージャーの振動が体に触れた瞬間、%CALLNAME:TARGET%は小さく息を呑んだ。

    「……なるほど……こういう刺激なのね……」

    %CALLNAME:TARGET%は分析しようとするが、声が微かに震えている。

    「……興味深いデータね……もう少し……続けて……」

    観察者を装いながらも、%CALLNAME:TARGET%の頬は微かに紅潮していた。

    「……ふぅん」

    %CALLNAME:TARGET%はマッサージャーの振動を受けながら、冷静を装っている。

    「……振動の周波数と快感の相関関係……研究価値があるわね」

    しかし%CALLNAME:TARGET%の体は正直に反応し、時折びくりと震えていた。

    「……あなた、私で実験しているつもりかしら」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を睨んだが、その視線には拒絶の色がない。

    「……」

    %CALLNAME:TARGET%は無言でマッサージャーの刺激を受けている。

    本を読む手はいつの間にか止まり、視線が虚空を彷徨っている。

    「……悪くないわ……これは……」

    %CALLNAME:TARGET%はぼそりと呟いた。

    「……でも、調子に乗らないで。私はデータを収集しているだけよ」

    そう言いながらも、%CALLNAME:TARGET%の吐息は熱を帯びていた。
  priority: 2
- id: fallback
  content: >-
    「……何の真似かしら」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が持つマッサージャーを見て、冷ややかな目を向けた。

    「そんな道具を私に使おうなんて」

    %CALLNAME:TARGET%は呆れたように溜息をついた。

    「……まあいいわ。暇つぶしには丁度いいかもね」

    そう言って%CALLNAME:TARGET%は、無表情のまま%CALLNAME:MASTER%を受け入れた。

    「……」

    %CALLNAME:TARGET%は淡々とマッサージャーの振動を受けている。

    その表情は読み取れないが、どこか退屈そうでもある。

    「……これで満足？」

    %CALLNAME:TARGET%は冷めた声で問いかけた。

    「早く終わらせて、読書に戻りたいのだけど」

    「……むきゅ」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「下品な道具ね。本から得られる知識の方が、よほど価値があるわ」

    %CALLNAME:TARGET%は義務的に%CALLNAME:MASTER%の行為を受けている。

    「……ふぅ……まあ、悪くはないけど」

    口ではそう言いながら、%CALLNAME:TARGET%は離れようとはしなかった。

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついた。

    「あなたは私に何を求めているの。理解に苦しむわ」

    %CALLNAME:TARGET%は呆れたような表情を浮かべている。

    「……好きにしなさい。ただし、読書の邪魔はしないで」

    そう言って%CALLNAME:TARGET%は、本に視線を戻した。
  priority: 1
