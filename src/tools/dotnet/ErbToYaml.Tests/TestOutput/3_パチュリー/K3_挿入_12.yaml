character: パチュリー
situation: K3_挿入
entries:
- id: fallback
  content: >-
    「……今日は、私が上になるわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨りながら、静かに宣言した。

    普段は体が弱くて受身になりがちだが、今日は違う。

    「……んっ……自分で動くのは、疲れるけれど……」

    %CALLNAME:TARGET%は腰を沈めながら、%CALLNAME:MASTER%を見下ろした。

    「……あなたの顔を見ながら動くのは、悪くないわね」

    「はぁ……ん……っ……」

    %CALLNAME:TARGET%は自分のペースで腰を動かしながら、小さく喘いでいる。

    大図書館の静寂の中、%CALLNAME:TARGET%が主導権を握っている。

    「……本で読んだ通り、この体位は深さを調整できるのね……」

    %CALLNAME:TARGET%は知識を実践しながら、満足げに微笑んだ。

    「……%CALLNAME:MASTER%、私に任せて……全部、わかっているから」

    「ぁ……やぁ……自分で動くと、こんなに……」

    %CALLNAME:TARGET%は珍しく積極的に腰を振っている。

    体力がないはずなのに、今日の%CALLNAME:TARGET%は止まらない。

    「……%CALLNAME:MASTER%……私が、気持ちよくしてあげる……」

    %CALLNAME:TARGET%は愛情を込めて、%CALLNAME:MASTER%の頬に手を添えた。

    「……あなたのためなら、少しくらい疲れても構わないの」

    「……ふぅ……体力が……むきゅ……」

    %CALLNAME:TARGET%は動きながらも、息が上がってきている。

    「……でも、まだ止まらないわ。もう少しだけ……」

    %CALLNAME:TARGET%は意地を見せるように、腰の動きを続ける。

    「……あなたが気持ちよくなってくれるなら……」

    そう言って、%CALLNAME:TARGET%は%CALLNAME:MASTER%に身を預けるように倒れ込んだ。
  priority: 4
- id: talent_3_1
  content: >-
    「……っ……私が、上になるなんて……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨りながら、顔を真っ赤にしている。

    「……本で読んだ知識を、試してみたかったの……」

    %CALLNAME:TARGET%は照れ隠しのように言い訳をした。

    「……んっ……自分で動くと、違う感じがする……」

    慣れない主導権に、%CALLNAME:TARGET%は戸惑いを見せている。

    「んっ……ふ……こうすれば、いいのかしら……」

    %CALLNAME:TARGET%はぎこちなく腰を動かしている。

    「……あまり見ないで。恥ずかしいから……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と目が合い、慌てて目を逸らした。

    「……でも、私が動いている姿……そんなに変かしら……」

    羞恥と好奇心が入り混じった表情で、%CALLNAME:TARGET%は呟いた。

    「あ……やぁ……この角度……深い……」

    %CALLNAME:TARGET%は自分で角度を調整しながら、思わず声を漏らした。

    「……自分で動くと、好きなように……んっ……できるのね……」

    %CALLNAME:TARGET%は発見したように呟いた。

    「……%CALLNAME:MASTER%、私の動き……どう……？」

    照れながらも、%CALLNAME:TARGET%は評価を求めている。

    「……ん……ぁ……疲れてきた……」

    %CALLNAME:TARGET%は動きを続けながらも、体力の限界を感じている。

    「……体が弱いから、こういう主導的な体位は向いていないのだけれど……」

    %CALLNAME:TARGET%は息を整えながら、%CALLNAME:MASTER%を見下ろした。

    「……あなたのために、もう少しだけ頑張るわ……」

    そう言って、%CALLNAME:TARGET%は再び腰を動かし始めた。
