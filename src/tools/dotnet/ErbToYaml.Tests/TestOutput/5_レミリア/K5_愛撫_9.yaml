character: レミリア
situation: K5_愛撫
entries:
- id: fallback
  content: >-
    「んっ……ふぁ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の前で、ゆっくりと自らの秘所に指を這わせた。

    500年を生きた吸血鬼が、恋人の前でこんな姿を晒すなど。

    「……%CALLNAME:MASTER%だけよ、こんな姿を見せるのは」

    %CALLNAME:人物_レミリア%は紅い瞳を潤ませながら、%CALLNAME:MASTER%を見上げた。

    「んっ……あぁ……見てなさい、私の……全部……」

    紅魔館の主は、恋人だけに許した淫らな姿を曝け出していた。

    「あっ……やぁ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_レミリア%は甘い声を漏らしながら、自らを慰めている。

    その小さな指が、秘所をゆっくりと撫でていく。

    「ふふ……%CALLNAME:MASTER%のこと、考えながら……してるのよ」

    %CALLNAME:人物_レミリア%は頬を染めながら告白した。

    「んっ……あなたに触られてるみたいで……気持ちいい……」

    吸血鬼の主は、恋人への想いを込めて自らを愛撫していた。

    「……見てるのね、%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は挑発的に微笑みながら、脚を開いた。

    その指が、ゆっくりと自らの花弁を開いていく。

    「んっ……ほら、よく見なさい……私のここ」

    %CALLNAME:人物_レミリア%は見せつけるように、秘所を弄り始めた。

    「あぁ……こうして見られると……興奮するわ……」

    紅魔館の主は、恋人の視線を浴びながら悦んでいた。

    「ふぅ……んっ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に寄り添いながら、自らを慰めている。

    「%CALLNAME:MASTER%……手、握っていて……」

    %CALLNAME:人物_レミリア%は甘えるように、%CALLNAME:MASTER%の手を求めた。

    「んっ……あなたの温もりを感じながら……気持ちいいの」

    吸血鬼の冷たい身体が、快楽と恋人の温もりで熱を帯びていく。

    「……ずっと、一緒にいてね……%CALLNAME:MASTER%……」
  priority: 4
- id: talent_3_1
  content: >-
    「っ……な、なによ、見てるの？」

    %CALLNAME:人物_レミリア%は顔を真っ赤にしながら、それでも手を止めなかった。

    「べ、別に……%CALLNAME:MASTER%に見せてるわけじゃないんだから」

    そう言いながらも、%CALLNAME:人物_レミリア%の動きは止まらない。

    「んっ……あぁ……見たいなら、勝手に見てなさいよ……」

    恥ずかしそうにしながらも、%CALLNAME:人物_レミリア%は自慰を続けた。

    高貴な吸血鬼は、素直に「見てほしい」と言えないでいた。

    「……っ、ふぁ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%から視線を逸らしながら、自らを慰めている。

    「こ、こんなの……%CALLNAME:MASTER%が見たいって言うから……」

    誰もそんなことは言っていないが、%CALLNAME:人物_レミリア%は言い訳した。

    「んっ……や、やめなさいよ、そんなに見つめないで……」

    %CALLNAME:人物_レミリア%は恥ずかしそうに身を捩りながらも、手は止めなかった。

    「……あぁ……%CALLNAME:MASTER%のこと考えてなんか、ないんだからね……」

    「ふ、ふん……」

    %CALLNAME:人物_レミリア%は強がりながら、脚の間に手を伸ばした。

    「私が自分でするところを見たいんでしょう？　素直に言いなさいよ」

    そう言いながら、%CALLNAME:人物_レミリア%は指を動かし始めた。

    「んっ……あ……紅魔館の主が、こんな姿……」

    %CALLNAME:人物_レミリア%は自嘲するように呟いた。

    「……%CALLNAME:MASTER%にしか、見せないんだから……感謝しなさいよ」

    「……見てていいわよ、特別に許可してあげる」

    %CALLNAME:人物_レミリア%は上から目線で言い放った。

    だがその手が自らの秘所に触れた瞬間、声が震えた。

    「んっ……あ、あぁ……」

    %CALLNAME:人物_レミリア%は眉を寄せながら、快楽に耐えている。

    「……べ、別に気持ちよくなんかないわよ……」

    明らかに嘘だと分かる言葉を、%CALLNAME:人物_レミリア%は吐いた。
