- id: fallback
  content: >-
    「……これもメイドの務め……ですわね……」

    %CALLNAME:TARGET%は事務的に%CALLNAME:MASTER%の前に跪いた。

    「お客様のご要望にお応えするのは当然のこと……」

    しかし、実際に口に含むと表情が僅かに揺らいだ。

    「……んっ……思ったより……」

    「……何でもありませんわ……続けますわ……」

    %CALLNAME:TARGET%はぎこちなく舌を動かし始めた。

    「……ちゅる……ん……こうすれば……よろしいでしょうか……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を窺いながら口を動かしている。

    「……っ……反応がありますわね……」

    「プロとして……最適な方法で……」

    %CALLNAME:TARGET%は集中しているが、頬が僅かに染まっている。

    「……少し……変な気分ですわ……」

    自分の動揺を隠そうと、%CALLNAME:TARGET%は淡々と続けた。

    「……これは仕事ですから……」

    %CALLNAME:TARGET%は自分に言い聞かせながら舌を動かしている。

    「れろ……ちゅる……お客様の相手をするのも……」

    「……でも……こんなに……」

    %CALLNAME:TARGET%は言葉を詰まらせ、唇を噛んだ。

    「……何でもありませんわ……続けますわよ……」

    動揺を隠しながら、%CALLNAME:TARGET%は奉仕を続けた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は複雑な表情で%CALLNAME:MASTER%を見上げた。

    「こうして差し上げるのは……嫌ではありませんわ……」

    「いえ……何でもありませんの……ちゅる……」

    %CALLNAME:TARGET%は慌てて視線を逸らし、口の動きに集中した。

    「……早く済ませてくださいまし……」

    本心を隠しながら、%CALLNAME:TARGET%は黙々と舌を動かした。
