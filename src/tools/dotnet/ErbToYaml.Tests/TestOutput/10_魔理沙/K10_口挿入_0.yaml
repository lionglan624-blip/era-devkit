- id: fallback
  content: >-
    「お、おい……こんなこと、させるなよ……」

    %CALLNAME:人物_魔理沙%は動揺しながらも、%CALLNAME:MASTER%の一物を握らされた。

    「わ、私にこんなこと……何考えてるんだ……」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、ぎこちなく手を動かした。

    「……勝手に変な声出すなよ、気が散るだろ……」

    %CALLNAME:人物_魔理沙%は落ち着かない様子で、なんとか状況を受け入れようとしていた。

    「……何でこんなことになってるんだ」

    %CALLNAME:人物_魔理沙%は理不尽そうに呟きながら、手を動かしている。

    「こういうのは……もっと親しくなってからだろ……」

    %CALLNAME:人物_魔理沙%の抗議とは裏腹に、手は止まらなかった。

    「はぁ……仕方ない、早く終わらせるぞ……」

    %CALLNAME:人物_魔理沙%は諦めたように、手の動きを速めた。

    「……熱いな、これ」

    %CALLNAME:人物_魔理沙%は無表情を装いながら、%CALLNAME:MASTER%の一物を握っている。

    「こういうのは経験ないんだから……期待するなよ」

    %CALLNAME:人物_魔理沙%の手つきはぎこちなく、慣れていないのが明らかだった。

    「……文句あるなら、他の奴に頼めばいいだろ」

    %CALLNAME:人物_魔理沙%は強がりながらも、手を止めようとはしなかった。

    「……」

    %CALLNAME:人物_魔理沙%は無言で%CALLNAME:MASTER%の一物を握っている。

    「……これで満足なのか、お前は」

    %CALLNAME:MASTER%が反応すると、%CALLNAME:人物_魔理沙%は少し驚いた。

    「……ふーん、こうすると感じるのか」

    %CALLNAME:人物_魔理沙%は興味なさそうな振りをしながら、手を動かし続けた。
