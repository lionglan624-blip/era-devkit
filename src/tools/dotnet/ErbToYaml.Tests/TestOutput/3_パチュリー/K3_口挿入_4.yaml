- id: talent_3_1
  content: >-
    「……こ、これを……するのね……」

    %CALLNAME:TARGET%は顔を赤くしながら、体に泡を塗り広げた。

    「……文献では読んだことがあるけれど……実際にするのは……」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%の体に触れた。

    「……む、むきゅ……こんなに密着するなんて……」

    全身を擦りつけることに、%CALLNAME:TARGET%は激しく動揺していた。

    「……んっ……ぬるぬるして……変な気分……」

    %CALLNAME:TARGET%は泡まみれの体を%CALLNAME:MASTER%に押し付けている。

    「……あなたの体……熱いのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の体温を感じて、顔を赤くした。

    「……恥ずかしい……でも、続けるわ……」

    羞恥を堪えながら、%CALLNAME:TARGET%は体を動かし続けた。

    「……胸が……直接当たって……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸板に胸を擦りつけている。

    「……こんな恥ずかしいこと……本でしか知らなかったのに……」

    %CALLNAME:TARGET%は目を逸らしながら呟いた。

    「……あなたのためなら……我慢するわ……」

    恥ずかしさに耐えながらも、%CALLNAME:TARGET%は奉仕を続けた。

    「……はぁ、はぁ……体力が……」

    %CALLNAME:TARGET%は虚弱な体で全身を使う奉仕に息を切らしていた。

    「……で、でも……あなたに喜んでほしいから……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げて言った。

    「……もう少し……頑張るわ……」

    疲れた体に鞭打ちながら、%CALLNAME:TARGET%は体を擦りつけ続けた。
