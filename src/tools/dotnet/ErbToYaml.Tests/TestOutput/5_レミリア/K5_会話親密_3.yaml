- id: fallback
  content: >-
    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の話を興味深そうに聞いていた。

    「ふぅん、そう」

    %CALLNAME:人物_レミリア%は特に興味なさそうに、そう言った。

    つまらないか、と聞くと、

    「別に？ 退屈しのぎにはなるわ」

    そう言いながらも、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%から視線を外さなかった。

    「……続けなさい」

    「――で、続きは？」

    %CALLNAME:人物_レミリア%は先を促すように言った。

    「……私ばかり聞いているのも癪ね」

    「ええ、私を愉しませてみなさい」

    %CALLNAME:人物_レミリア%は挑戦的な笑みを浮かべた。

    「面白くなかったら、許さないわよ？」

    「――ふむ、なるほどね」

    %CALLNAME:人物_レミリア%は紅茶を片手に、静かに頷いた。

    「貴方、意外と見所があるわね」

    そう言いながら、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を値踏みするように見た。

    「……もう少し、話を聞いてあげてもいいわ」

    %CALLNAME:人物_レミリア%の口元には、微かな笑みが浮かんでいた。

    「……そう、それで？」

    %CALLNAME:人物_レミリア%は窓の外を眺めながら、%CALLNAME:MASTER%の話に耳を傾けている。

    「人間というのは、面白いことを考えるものね」

    「500年生きていても、飽きないわ」

    そう言って、%CALLNAME:人物_レミリア%はちらりと%CALLNAME:MASTER%を見た。

    「……貴方も、その一人かもしれないわね」
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:人物_レミリア%は退屈そうに%CALLNAME:MASTER%と話をしている。

    「――へえ、それで？」

    %CALLNAME:人物_レミリア%は表情を変えずに言う。

    「もう少し面白い話はないのかしら」

    %CALLNAME:人物_レミリア%はつまらなさそうに、%CALLNAME:MASTER%にそう言った。

    「……まあ、暇つぶしにはなるわね」

    「――ふうん、それだけ？」

    %CALLNAME:人物_レミリア%はぶっきらぼうにそう言った。

    「まあいいわ。時間を潰すくらいにはなったわね」

    そう言って、%CALLNAME:人物_レミリア%は紅茶を口に運んだ。

    「……用が済んだなら、下がりなさい」

    「――何の用かしら」

    %CALLNAME:人物_レミリア%は冷ややかな視線を向けた。

    「私は暇じゃないのよ」

    そう言いながらも、%CALLNAME:人物_レミリア%は話を聞く姿勢を崩さなかった。

    「……手短に済ませなさい」

    威厳を保ちながらも、どこか退屈を持て余している様子だった。

    「……」

    %CALLNAME:人物_レミリア%は無言で%CALLNAME:MASTER%の話を聞いている。

    「やっぱり、人間って使えないわね」

    %CALLNAME:人物_レミリア%は溜息をついた。

    「もっとマシな話はないの？」

    紅い瞳には、退屈と僅かな興味が混在していた。
  priority: 1
