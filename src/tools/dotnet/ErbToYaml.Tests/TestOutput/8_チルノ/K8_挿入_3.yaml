entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%、この体勢でお尻だと……すごく深いね」

    %CALLNAME:人物_チルノ%は四つんばいになり、尻を高く突き上げている。

    %CALLNAME:MASTER%が菊穴にゆっくりと挿入すると、腸壁がきゅうと締め付けてきた。

    「んっ……はぁ……顔見えないから、声で伝えるね……」

    %CALLNAME:人物_チルノ%は後ろを向いたまま、甘い声を漏らした。

    「あたいのお尻も……全部%CALLNAME:MASTER%のものだから……」

    「えへへ……後ろからお尻なんて、獣みたいだね」

    %CALLNAME:人物_チルノ%は四つんばいで尻を突き出し、%CALLNAME:MASTER%を待っていた。

    菊穴に挿入されると、きつく締め付けてぴくんと体が震える。

    「んあっ……こ、この体勢だとお腹の奥まで……っ」

    %CALLNAME:人物_チルノ%の小さな背中が快感に揺れていた。

    「あたいと%CALLNAME:MASTER%だけの秘密……お尻もね……」

    「はぁっ……%CALLNAME:MASTER%、もっと奥まで来ていいよ」

    %CALLNAME:人物_チルノ%は四つんばいのまま腰を揺らし、%CALLNAME:MASTER%を誘った。

    菊穴は%CALLNAME:MASTER%を締め付け、離さないようにぎゅうぎゅうと絡みつく。

    「んっ……あっ……後ろの穴、%CALLNAME:MASTER%の形に慣れてきた……」

    氷の妖精の体は熱を帯び、腸壁が%CALLNAME:MASTER%を包み込んでいた。

    「あたいのこと……後ろからでも独り占めしてよね」

    「……%CALLNAME:MASTER%、振り返るから、ちょっと見て」

    %CALLNAME:人物_チルノ%は四つんばいのまま首だけ振り返った。

    後ろの穴で繋がっているのに、その表情は幸せそうだった。

    「んっ……はぁ……この体勢、すごくきついけど……%CALLNAME:MASTER%となら平気」

    %CALLNAME:人物_チルノ%の菊穴は%CALLNAME:MASTER%をぎゅっと締め付けた。

    「あたいの全部……どこからでも%CALLNAME:MASTER%のもの……えへへ」
  priority: 4
- id: talent_3_1
  content: >-
    「ちょ……こ、この体勢でお尻なんて……恥ずかしすぎ……っ」

    %CALLNAME:人物_チルノ%は真っ赤な顔で四つんばいになっていた。

    後ろを向いているので表情は見えないが、耳まで赤くなっている。

    「んっ……後ろきつい……っ、でも顔見られないから……まだマシ……」

    %CALLNAME:人物_チルノ%の菊穴は%CALLNAME:MASTER%をきゅうと締め付けた。

    「……っ、こんなとこまで知られるなんて……ばかぁ……」

    「な、なんでお尻でこんな体勢……！　獣みたいじゃん……！」

    %CALLNAME:人物_チルノ%は四つんばいで尻を突き出す羞恥に震えていた。

    %CALLNAME:MASTER%が菊穴に挿入すると、きつく締め付けて離さない。

    「んあっ……っ、やっ……後ろ、すごい変な感じ……っ」

    %CALLNAME:人物_チルノ%は枕に顔を埋めて声を殺そうとしていた。

    「……っ、後ろ向いてるからって、お尻見ないでよ……っ」

    「はぁっ……あっ……後ろの穴、きつくて……っ」

    %CALLNAME:人物_チルノ%は四つんばいのまま快感に震えていた。

    腸壁が%CALLNAME:MASTER%を締め付け、ぎゅうぎゅうと圧迫している。

    「や……こんな声出したくないのに……お尻でなんて……っ」

    後ろ向きなので、%CALLNAME:人物_チルノ%の表情は%CALLNAME:MASTER%から見えない。

    「……っ、%CALLNAME:MASTER%のせいだからね……こんな体勢でこんなとこ……」

    「……振り向かないから……お尻なんて見ないで……」

    %CALLNAME:人物_チルノ%は顔を伏せたまま、尻だけを突き上げていた。

    菊穴は%CALLNAME:MASTER%を受け入れ、きゅうきゅうと締め付けている。

    「んっ……は……っ、この体勢だと……お腹の奥まで……」

    %CALLNAME:人物_チルノ%の菊穴はひくひくと%CALLNAME:MASTER%を包み込んでいた。

    「……後ろの穴でこんなことするなんて……あたいのばか……」
