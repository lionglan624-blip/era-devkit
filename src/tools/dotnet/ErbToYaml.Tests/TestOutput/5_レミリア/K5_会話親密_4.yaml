- id: fallback
  content: >-
    「――ん？　……お茶？」

    %CALLNAME:人物_レミリア%は警戒するような目で湯飲みを受け取った。

    「……変なものは入っていないでしょうね？」

    そう言いながらも、%CALLNAME:人物_レミリア%はお茶を口に含んだ。

    「……まあ、普通ね」

    %CALLNAME:人物_レミリア%は興味なさそうにそう言った。

    「あら……お茶を淹れたの？」

    %CALLNAME:人物_レミリア%は湯飲みを受け取り、ゆっくりとお茶を飲んだ。

    「ふぅん……」

    %CALLNAME:人物_レミリア%は特に感想を述べなかった。

    「まあ、いいわ。ご苦労」

    そう言って、%CALLNAME:人物_レミリア%は紅い瞳を%CALLNAME:MASTER%から逸らした。

    「――お茶？　私に？」

    %CALLNAME:人物_レミリア%は怪訝そうに湯飲みを見つめた。

    「……何か企んでいるの？」

    警戒しながらも、%CALLNAME:人物_レミリア%はお茶を口に運んだ。

    「……ふん、普通ね。特別なことはないわ」

    %CALLNAME:人物_レミリア%は素っ気なくそう言い、視線を逸らした。

    「――ん、お茶か」

    %CALLNAME:人物_レミリア%は億劫そうに湯飲みを受け取った。

    ずず、とお茶を啜る音だけが静かに響く。

    「……まあ、飲めなくはないわね」

    %CALLNAME:人物_レミリア%は無表情のままそう言った。

    「咲夜を見習いなさい。話はそれからよ」

    そう言い捨て、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%への興味を失ったようだった。
  priority: 1
