    「んむ……こ、こうですか……？　気持ちいいですか……？」

    慣れない動きながらも、一生懸命に奉仕しようとしている。

    「あっ……ん……なんだか……私も変な感じに……」

    %CALLNAME:人物_小悪魔%は困った顔をしながらも、やめようとはしない。

    「……もう少し……頑張りますから……」

    「%CALLNAME:MASTER%……こんなこと、させるなんて……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに俯きながら、腰を動かした。

    「でも……%CALLNAME:MASTER%になら……いいかも……って……」

