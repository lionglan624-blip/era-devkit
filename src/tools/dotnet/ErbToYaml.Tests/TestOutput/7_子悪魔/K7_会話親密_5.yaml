character: 子悪魔
situation: K7_会話親密
entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%をそっと後ろから抱きしめた。

    「……わぁっ」

    %CALLNAME:TARGET%は嬉しそうに体を預けてきた。

    「%CALLNAME:MASTER%……あったかいの……」

    妖精の小さな体が、%CALLNAME:MASTER%の温もりを全身で受け止めている。

    「こうしてると、なんだか安心するの……えへへ」

    %CALLNAME:TARGET%は幸せそうに目を細めて、%CALLNAME:MASTER%の腕をぎゅっと抱きしめた。

    「……大好き。%CALLNAME:MASTER%のこと、だいすきなの……」

    「――%CALLNAME:MASTER%！」

    %CALLNAME:TARGET%は自分から飛びつくように%CALLNAME:MASTER%に抱きついた。

    「えへへ……捕まえたの」

    %CALLNAME:MASTER%の腕の中で、%CALLNAME:TARGET%は無邪気に笑っている。

    「ねえ、あったかいね……%CALLNAME:MASTER%の心臓、どくどくしてる」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の鼓動に耳を当てて、嬉しそうにしている。

    「あたしね、こうしてるの、大好きなの。だってあったかいんだもん」

    %CALLNAME:TARGET%はぎゅっと%CALLNAME:MASTER%を抱きしめ返した。

    %CALLNAME:MASTER%が近づくと、%CALLNAME:TARGET%は両手を広げて待っていた。

    「えへへ……待ってたの」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%をそっと抱きしめた。

    「……んふふ、やっぱりあったかい」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋めて、すりすりと頬を寄せている。

    「%CALLNAME:MASTER%の匂い、好きなの……落ち着くんだよ」

    妖精は幸せそうに目を閉じて、%CALLNAME:MASTER%の温もりに包まれていた。

    「ずっとこうしてたいな……だめ……？」

    「……ねえ、%CALLNAME:MASTER%」

    %CALLNAME:TARGET%がそっと袖を引っ張った。

    「ぎゅって、して……？」

    おねだりするような上目遣い。%CALLNAME:MASTER%は%CALLNAME:TARGET%を抱きしめた。

    「……ふぁ……あったかい……」

    %CALLNAME:TARGET%は蕩けるような表情で%CALLNAME:MASTER%の腕の中に収まっている。

    「あたしね、%CALLNAME:MASTER%に抱っこされるの、一番好きなの……」

    妖精の小さな手が、%CALLNAME:MASTER%の背中をぎゅっと握った。

    「……しあわせ」
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%に後ろから抱きついた。

    「……ひゃっ！？ %CALLNAME:MASTER%……？」

    %CALLNAME:TARGET%は驚いて目を瞬かせたが、逃げようとはしなかった。

    「えっと……こういうの……していいんですか……？」

    %CALLNAME:TARGET%の頬がほんのりと赤く染まっている。

    「……あったかい。%CALLNAME:MASTER%の腕、あったかいです……」

    %CALLNAME:TARGET%は照れながらも、そっと身を寄せてきた。

    「咲夜さんには、ナイショにしてね……？」

    「あっ……」

    %CALLNAME:MASTER%に抱きしめられて、%CALLNAME:TARGET%は小さく声を漏らした。

    「急に……どうしたんですか……？」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%の腕の中で落ち着いている。

    「……あったかい。こういうの、初めてで……どきどきする」

    %CALLNAME:TARGET%の心臓が早鳴りしているのが伝わってくる。

    「あの……もうちょっとだけ、こうしててもいいですか……？」

    %CALLNAME:TARGET%は恥ずかしそうに、でも嬉しそうに目を伏せた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%をそっと抱き寄せた。

    「ふぇ……！？　え、ええっと……」

    %CALLNAME:TARGET%は顔を真っ赤にして、動けなくなっている。

    「あの……これって……その……」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%の服をそっと握った。

    「……嬉しい、です。こうしてもらえるの……」

    %CALLNAME:TARGET%は恥ずかしそうに俯きながら、ぽつりと呟いた。

    「%CALLNAME:MASTER%って、優しいんですね……」

    「わっ……！」

    %CALLNAME:MASTER%に突然抱きしめられて、%CALLNAME:TARGET%は目を丸くした。

    「%CALLNAME:MASTER%……？　どうしたの……？」

    最初は硬くなっていた体が、少しずつ力を抜いていく。

    「……あったかい。%CALLNAME:MASTER%の腕……」

    %CALLNAME:TARGET%はおずおずと%CALLNAME:MASTER%の背中に手を回した。

    「あたしも……こうしていいですか……？」

    妖精の小さな体が、ほんのりと温かくなっていた。
