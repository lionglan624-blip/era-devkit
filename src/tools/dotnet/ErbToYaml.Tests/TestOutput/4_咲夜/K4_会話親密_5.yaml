    %CALLNAME:人物_咲夜%は頬を赤らめながら、小さく抗議した。

    「ちゅ……ん……」

    %CALLNAME:人物_咲夜%は戸惑いながらも、%CALLNAME:MASTER%のキスを受け入れた。

    その唇はぎこちなく、しかし拒絶はしていない。

    「……ぷ、は……」

    「……もう少し、雰囲気を作ってからにしてほしいわ」

    %CALLNAME:人物_咲夜%は照れを隠すように、そっぽを向いた。

    %CALLNAME:MASTER%が唇を寄せると、%CALLNAME:人物_咲夜%は固まった。

    「ん……」

    軽く触れるだけの口づけに、%CALLNAME:人物_咲夜%は戸惑っている。

    「……%CALLNAME:MASTER%、あなたは……」

    何かを言いかけて、%CALLNAME:人物_咲夜%は口を噤んだ。

    「……いえ、何でもないわ」

    %CALLNAME:人物_咲夜%は複雑な表情で、視線を逸らした。

    「……%CALLNAME:MASTER%？」

    %CALLNAME:人物_咲夜%は近づいてくる%CALLNAME:MASTER%を、じっと見つめた。

    「んっ……」

