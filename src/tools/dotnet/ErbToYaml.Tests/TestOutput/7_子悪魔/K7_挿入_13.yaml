    「んっ……ぜんぶ、はいった……おしり、いたい……けど……」

    %CALLNAME:TARGET%は不安げに%CALLNAME:MASTER%を見下ろした。

    「わかんないけど……あたし、%CALLNAME:MASTER%のために、おしりでうごく……」

    芽生えた感情に突き動かされ、%CALLNAME:TARGET%はぎこちなくお尻を揺らしていた。

    「あっ……んっ……おしりでうごくと……へん、なかんじ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上で、自分でお尻を動かしている。

    本能が新しい快楽を貪る一方、心のどこかで戸惑いを感じていた。

    「あたしが……おしりで……%CALLNAME:MASTER%を……きもちよくしてる……？」

    %CALLNAME:TARGET%は不思議そうに自分の動きを見つめた。

    「……えへへ、おしりでも……なんか、うれしい……」

    悪魔の少女は照れながらも、%CALLNAME:MASTER%のためにお尻を動かし続けた。

