- id: fallback
  content: >-
    「え……足で……？　これを……？」

    %CALLNAME:人物_チルノ%は困惑した表情で%CALLNAME:MASTER%の一物を見つめた。

    「う、うーん……まあ、いいけど……」

    渋々といった様子で、%CALLNAME:人物_チルノ%は足を伸ばした。

    「ひゃっ！　なにこれ、すっごく熱い……」

    一物に足裏が触れた瞬間、%CALLNAME:人物_チルノ%は驚いて声を上げた。

    「……こ、こうすればいいの……？」

    戸惑いながらも、%CALLNAME:人物_チルノ%はゆっくりと足を動かし始めた。

    「ちょ、ちょっと%CALLNAME:MASTER%……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに%CALLNAME:MASTER%を見た。

    「いきなり足で触れって言うなんて……信じらんない」

    文句を言いながらも、%CALLNAME:人物_チルノ%は一物に足を押し当てた。

    「……まあ、あたいは最強だから、できないわけないけどさ」

    強がりを言いつつ、ぎこちなく足を動かし始めた。

    冷たい足裏が熱い肉棒を挟み込んでいく。

    「……これで満足なんでしょ？」

    「んー……よくわかんないけど……」

    %CALLNAME:人物_チルノ%は首を傾げながら%CALLNAME:MASTER%の一物を見つめた。

    「こうやって足で挟めばいいの？」

    好奇心半分、戸惑い半分といった様子で足を伸ばした。

    「わっ、なんか……ぴくってした……」

    %CALLNAME:人物_チルノ%は一物の反応に驚きながらも、興味深そうに足で触り続けている。

    「……へえ、足で触ると気持ちいいんだ」

    少しずつ動きに慣れてきたようだ。

    「……はあ」

    %CALLNAME:人物_チルノ%はため息をつきながら、%CALLNAME:MASTER%の前に座った。

    「あたいに足で触れって頼むなんて……%CALLNAME:MASTER%って変なの」

    そう言いながらも、%CALLNAME:人物_チルノ%は一物に足を伸ばした。

    「……まあ、やってあげないこともないけど」

    仕方なさそうに、%CALLNAME:人物_チルノ%はゆっくりと足を動かし始めた。

    ひんやりとした足裏が熱い肉棒を挟み込んでいく。

    「……早く終わらせてよね」
  priority: 2
- id: fallback
  content: >-
    「はあ？　足で触れって？　何言ってんの%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は呆れたような顔をした。

    「なんであたいがそんなことしなきゃいけないのよ」

    %CALLNAME:人物_チルノ%は腕を組んで%CALLNAME:MASTER%を睨んでいる。

    「調子乗んないでよね！　凍らせるわよ！」

    辺りに冷気が漂い始め、%CALLNAME:人物_チルノ%の怒りが伝わってくる。

    ……だが、結局は渋々と足を伸ばした。

    「……ほら、触ってやってるんだから感謝しなさいよね」

    「ちょっと……なにさ、これ」

    %CALLNAME:人物_チルノ%は嫌そうな顔で%CALLNAME:MASTER%の一物を見た。

    「こんなの足で触れって言うの？　信じらんない」

    %CALLNAME:人物_チルノ%は文句を言いながらも、命令には従った。

    「……ほら、触ってやってるんだから感謝しなさいよね」

    不機嫌そうに足を押し当てると、乱暴に動かし始めた。

    冷たい足裏が肉棒を挟み込み、ぎこちなく上下する。

    「早く終わらせてよね！」

    「あのさ、%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%はじっと%CALLNAME:MASTER%を見つめた。

    「あたいをなんだと思ってんの？」

    %CALLNAME:人物_チルノ%は不満げな表情で腰に手を当てた。

    「最強の妖精であるこのあたいに……そんなこと頼む？」

    %CALLNAME:人物_チルノ%は怒りながらも、結局は足を伸ばした。

    ひんやりとした足裏が一物に触れ、渋々と動き始める。

    「……覚えときなさいよね」

    「……」

    %CALLNAME:人物_チルノ%は無言で%CALLNAME:MASTER%を睨んでいる。

    「%CALLNAME:MASTER%って、ほんっと馬鹿じゃないの」

    %CALLNAME:人物_チルノ%は呆れたような声で言い放った。

    「まあいいわ。やってあげる」

    そう言いながら、%CALLNAME:人物_チルノ%は仕方なさそうに足を伸ばした。

    冷たい足裏が一物を挟み込み、ゆっくりと動き始める。

    「……でも、あんまり調子に乗んないでよね」
