character: 咲夜
situation: K4_挿入
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……こうして後ろから抱かれていると……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胡坐の上に座り、背中を預けている。

    「貴方の体温が……直接伝わってきますわ……」

    %CALLNAME:MASTER%が腰を突き上げるたび、%CALLNAME:TARGET%の体が小さく跳ねる。

    「んっ……あ……奥まで……届いて……」

    「この体勢……恥ずかしいですけれど……貴方に包まれているようで……好きですわ……」

    「ふぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕の中で、蕩けた声を漏らした。

    「後ろから抱きしめられると……安心しますの……」

    %CALLNAME:MASTER%が胸を揉みながら腰を動かすと、%CALLNAME:TARGET%は甘く喘いだ。

    「あっ……んぅ……胸も……奥も……同時に……」

    「%CALLNAME:MASTER%……もっと強く……抱きしめて……」

    完璧なメイドは、恋人の腕の中で素直な欲望を口にした。

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を自分の胸に導いた。

    「こうしていると……貴方と一つになっている気がしますわ……」

    結合部が見える体勢に頬を染めながらも、%CALLNAME:TARGET%は腰を揺らした。

    「あ……見えてしまいますわね……繋がっているところが……」

    「恥ずかしい……でも……離れたくありませんの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に身を委ね、甘い吐息を漏らし続けた。

    「……あ……%CALLNAME:MASTER%……耳元で囁かないでくださいまし……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の吐息を耳に感じ、体を震わせた。

    「くすぐったい……ですわ……でも……」

    %CALLNAME:MASTER%が深く突き上げると、%CALLNAME:TARGET%の声が甘く弾けた。

    「あぁっ……そこ……奥……気持ちいい……」

    「%CALLNAME:MASTER%……愛していますわ……ずっと……こうしていたい……」

    瀟洒なメイドは、恋人だけに見せる本音を漏らした。
  priority: 4
- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%……この体勢は……」

    %CALLNAME:TARGET%は後ろから抱きしめられ、戸惑いを見せた。

    「背中を……預けるのは……少し緊張しますわ……」

    しかし、%CALLNAME:MASTER%の体温を感じると、自然と力が抜けていく。

    「……あ……温かい……ですわね……」

    「こうしていると……守られているような……」

    %CALLNAME:TARGET%は小さな声で、正直な気持ちを漏らした。

    「あ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに合わせて、声を漏らしている。

    「後ろからだと……貴方の顔が見えなくて……」

    「でも……体温は感じますわ……鼓動も……」

    %CALLNAME:MASTER%が胸に触れると、%CALLNAME:TARGET%の体が震えた。

    「やっ……そこは……敏感で……」

    「%CALLNAME:MASTER%……意地悪しないで……」

    「……ふぁ……こんなに密着していると……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の体に包まれる感覚に、頬を染めた。

    「メイドとして……これは……」

    言いかけて、%CALLNAME:TARGET%は言葉を飲み込んだ。

    「……いえ……今は……いいですわ……」

    「%CALLNAME:MASTER%に抱かれているのが……心地よいですから……」

    葛藤しながらも、%CALLNAME:TARGET%は身を預け続けた。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は躊躇いがちに%CALLNAME:MASTER%の手を握った。

    「こうして……繋いでいても……いいですか……」

    許可を求めながら、%CALLNAME:TARGET%は指を絡めた。

    「あ……奥まで……入ってきて……」

    「んっ……%CALLNAME:MASTER%……もっと……」

    恥ずかしさと心地よさの狭間で、%CALLNAME:TARGET%は甘い声を漏らし続けた。
