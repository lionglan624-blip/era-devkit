    「……ふぅん」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を見ていた。

    「度胸だけはあるわね、%CALLNAME:MASTER%」

    %CALLNAME:MASTER%の指が中を撫でると、

    「……っ」

    %CALLNAME:人物_レミリア%は小さく息を吐いた。

    「……まあいいわ。今日のところは見逃してあげる」

    500年を生きた吸血鬼の心に、何かが芽生え始めていた。
