    「……なんか、ぞくぞくするのさ……」

    %CALLNAME:人物_フラン%は不思議そうに自分の胸を見つめた。

    「こういうの、されたことないから……」

    495年の孤独の中で、誰にも触れられることのなかった身体。

    「……悪くない、かもしれないのさ」

