character: 咲夜
situation: K4_愛撫
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、そこ……」

    %CALLNAME:TARGET%は頬を紅く染め、瀟洒なメイドらしからぬ表情を浮かべている。

    「メイドがこんな姿を見せるなんて……お嬢様には内緒にしてくださいね」

    %CALLNAME:MASTER%の舌が秘所に這うたび、%CALLNAME:TARGET%の体は小さく震えた。

    「んっ……ああ……%CALLNAME:MASTER%の舌、上手になりましたわね……」

    恋人だけに見せる甘い表情で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめた。

    「そこは……敏感なところですから……」

    %CALLNAME:TARGET%は羞恥に耐えながらも、脚を開いたまま動かない。

    完璧なメイドとしての矜持と、恋人への信頼が彼女をそこに留めていた。

    「……ふぁ……もっと……舐めて……」

    普段の冷静さからは想像できない甘えた声で、%CALLNAME:TARGET%は囁いた。

    %CALLNAME:MASTER%の舌が動くたび、透明な蜜が溢れ出してくる。

    「%CALLNAME:MASTER%……貴方だけですわ、私をこんな風にできるのは」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の髪をそっと撫でながら、快楽に身を委ねている。

    「んぅ……そこ、いい……」

    時を止めることもできる従者が、この瞬間だけは時間の流れに身を任せていた。

    「……もう少し……このまま……」

    恋人との甘い時間を、%CALLNAME:TARGET%は心から楽しんでいるようだった。

    「……っ、ああ……」

    %CALLNAME:TARGET%は声を抑えきれず、小さく喘いだ。

    メイド服の裾を握りしめ、押し寄せる快感に耐えている。

    「貴方の舌……熱いですわ……」

    銀髪が乱れ、普段の瀟洒な姿からは想像できない艶やかな表情を見せる。

    「……私、貴方に溺れてしまいそう……」

    %CALLNAME:TARGET%は恋人だけに見せる、蕩けた笑みを浮かべた。
  priority: 4
- id: talent_3_1
  content: >-
    「……そんなところを、じっと見ないでください……」

    %CALLNAME:TARGET%は恥ずかしそうに顔を背けた。

    だが、脚を閉じようとはしない。

    「……っ、舐めるなんて……」

    %CALLNAME:MASTER%の舌が触れると、%CALLNAME:TARGET%の体は小さく跳ねた。

    「……恥ずかしいですわ……でも……」

    拒絶の言葉は、最後まで続かなかった。

    「こ、こんなこと……メイドとして……」

    %CALLNAME:TARGET%は躊躇いながらも、%CALLNAME:MASTER%を受け入れている。

    「……んっ……そこ……」

    快感に耐えきれず、%CALLNAME:TARGET%は小さく声を漏らした。

    普段の冷静さはどこへやら、頬は紅く上気している。

    「%CALLNAME:MASTER%……私……おかしくなってしまいそうですわ……」

    「……っ、待って……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の頭にそっと手を添えた。

    止めるためではなく、むしろ引き寄せるように。

    「……ごめんなさい、止められなくて……」

    %CALLNAME:TARGET%は自分の欲望を恥じるように目を伏せた。

    「……貴方にされると……嫌じゃないの……」

    その告白は、%CALLNAME:TARGET%の精一杯の想いだった。

    「……ふぁ……」

    %CALLNAME:TARGET%は押し殺したような声を漏らした。

    完璧なメイドとしての仮面が、少しずつ剥がれていく。

    「%CALLNAME:MASTER%、貴方って……本当に……」

    何か言いかけて、%CALLNAME:TARGET%は言葉を飲み込んだ。

    「……もう少しだけ……続けてください……」

    恥ずかしそうに、でもはっきりと、%CALLNAME:TARGET%はそう言った。
  priority: 3
  condition:
