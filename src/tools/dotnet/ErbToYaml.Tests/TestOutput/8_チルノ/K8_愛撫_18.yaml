- id: fallback
  content: >-
    「は?　お尻に入れるって……何それ」

    %CALLNAME:TARGET%はアナルバイブを怪訝そうに見つめた。

    「%CALLNAME:MASTER%って変なもの持ってるわね」

    好奇心はあるようだが、警戒心も見え隠れしている。

    「……あたいにそれ使う気?　最強のあたいに?」

    偉そうに言いながらも、拒絶はしていない。

    「……まあ、ちょっとだけなら……」

    「ひゃっ!?　動いてる!　気持ち悪い!」

    アナルバイブの感触に、%CALLNAME:TARGET%は驚いた。

    「なによこれ……うにょうにょして……」

    初めての体験に、困惑が隠せない。

    「……%CALLNAME:MASTER%、変態なんじゃないの……」

    文句を言いながらも、%CALLNAME:TARGET%は耐えていた。

    「最強のあたいが負けるわけないでしょ……」

    「また例の?　あんた本当に変なの好きね」

    %CALLNAME:TARGET%は呆れた顔でアナルバイブを見た。

    「……しょうがないわね、付き合ってあげる」

    渋々ながらも、前回よりは抵抗が少ない。

    「……んっ……やっぱり変な感じ……」

    少しは慣れたのか、%CALLNAME:TARGET%は落ち着いていた。

    「……あんたって、本当によくわかんない」

    「ねぇ、これって楽しいの?　%CALLNAME:MASTER%的には」

    %CALLNAME:TARGET%は素朴な疑問を投げかけた。

    「あたいのお尻にこんなの入れて、何が面白いのよ」

    理解できないといった表情だが、拒絶はしていない。

    「……まあ、%CALLNAME:MASTER%が楽しいなら……いいけど」

    どこか呆れながらも、%CALLNAME:TARGET%は受け入れた。

    「最強のあたいに感謝しなさいよね」
