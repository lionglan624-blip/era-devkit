    「……早く、何かしろよ」

    「んっ……何見てんだ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の熱い視線に身じろぎした。

    視線だけで愛撫されているような感覚に、思わず息が乱れる。

    「……お前の目、なんか熱いぜ」

    %CALLNAME:人物_魔理沙%は照れ隠しに笑ったが、その顔は真っ赤だ。

    「……こういう焦らし、卑怯だと思うんだが」

    %CALLNAME:MASTER%は黙って%CALLNAME:人物_魔理沙%を観察し続けている。

    「……見てるだけかよ」

    %CALLNAME:人物_魔理沙%はため息をついたが、その頬は紅潮している。

    「私のこと、そんなに見たいのか？」

    %CALLNAME:人物_魔理沙%は恋人の視線を全身で感じながら、小さく身震いした。

    「……もう、好きにしろよ」

    %CALLNAME:人物_魔理沙%は観念したように、視線を受け入れた。
