- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%……こんな体勢は……」

    %CALLNAME:TARGET%は恥ずかしさで顔を背けようとした。

    「向かい合ったまま……後ろを……なんて……」

    しかし、%CALLNAME:MASTER%に顔を向けられ、目が合ってしまう。

    「……っ……見ないでください……こんな顔……」

    「メイドとして……あってはならない姿ですわ……」

    それでも抵抗できないのは、心の奥で望んでいるからだと%CALLNAME:TARGET%は気づいていた。

    「あ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに合わせて、堪えきれず声を漏らしている。

    「こんな……はしたない声……」

    「お尻で……感じるなんて……私……おかしくなって……」

    %CALLNAME:MASTER%の腰が深く沈むと、%CALLNAME:TARGET%の体が跳ねた。

    「あっ……奥……突かないで……」

    「……でも……止めないで……ください……」

    「……ふぁ……こんなに……お尻が……」

    %CALLNAME:TARGET%は自分の反応に戸惑いながらも、%CALLNAME:MASTER%を受け入れている。

    「メイドが……こんな淫らな姿を……」

    言いかけて、%CALLNAME:TARGET%は快感に言葉を奪われた。

    「あっ……んんっ……」

    「%CALLNAME:MASTER%……貴方のせいですわ……」

    葛藤しながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%から目を逸らせなかった。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は躊躇いがちに%CALLNAME:MASTER%にしがみついた。

    「こうしていると……顔を隠せますわ……」

    「こんな……恥ずかしい表情……見られたくありませんの……」

    「あ……でも……体は……正直ですわね……」

    「……ん……っ……%CALLNAME:MASTER%……もっと……」

    恥ずかしさと快感の狭間で、%CALLNAME:TARGET%は甘い声を漏らし続けた。
