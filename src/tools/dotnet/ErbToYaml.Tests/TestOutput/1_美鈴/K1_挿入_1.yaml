- id: fallback
  content: >-
    「……この体勢ですか」

    %CALLNAME:人物_美鈴%は淡々とした口調で言った。

    四つんばいになりながらも、特に動揺した様子はない。

    「……顔を見なくて済む分、まだましですね」

    %CALLNAME:人物_美鈴%は事務的に身を委ねた。

    「……%CALLNAME:MASTER%がそうしたいなら、構いませんが」

    その声には、かすかな拒絶が含まれていた。

    「……っ……」

    %CALLNAME:人物_美鈴%は声を抑えながら、%CALLNAME:MASTER%の動きに応じていた。

    「……門番の務めとして……お受けします」

    %CALLNAME:人物_美鈴%は感情を殺した声で言った。

    「……この体勢なら、顔を合わせなくて済みますし」

    その瞳には、諦めにも似た色が浮かんでいた。

    「……」

    %CALLNAME:人物_美鈴%は無言で%CALLNAME:MASTER%に背を向けていた。

    「……獣のような体勢ですね」

    %CALLNAME:人物_美鈴%は静かに呟いた。

    「……%CALLNAME:MASTER%は、こういうのがお好みですか」

    武術家の鋭い眼差しが、肩越しに%CALLNAME:MASTER%を見据えた。

    「……わかりました」

    %CALLNAME:人物_美鈴%は小さく頷いた。

    「……お嬢様の客人として、もてなすのも門番の務めです」

    %CALLNAME:人物_美鈴%は自分に言い聞かせるように呟いた。

    「……ただ、勘違いしないでください」

    「……これは、ただの義務です」

    毅然とした態度の中に、かすかな寂しさが見え隠れしていた。
