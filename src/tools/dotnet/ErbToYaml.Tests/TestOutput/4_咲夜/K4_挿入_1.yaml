- id: fallback
  content: >-
    「……これも……おもてなしですわ……」

    %CALLNAME:TARGET%は四つんばいの姿勢で、自分に言い聞かせた。

    「お客様のご要望にお応えするのは……メイドの務め……」

    しかし、%CALLNAME:MASTER%が後ろから進入すると、体は正直に反応してしまう。

    「っ……あ……」

    「……少し……感じているだけですわ……」

    %CALLNAME:TARGET%は自分の反応を言い訳するように付け加えた。

    「……ん……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は複雑な表情を浮かべている。

    「この体勢……獣のようで……困りますわ……」

    「お嬢様に見られたら……何と言い訳すれば……」

    %CALLNAME:MASTER%が深く突くと、%CALLNAME:TARGET%の体が跳ねた。

    「あっ……そこは……」

    言葉を途中で飲み込み、%CALLNAME:TARGET%は唇を噛んだ。

    「……これは……仕事……ですから……」

    %CALLNAME:TARGET%は何度も自分に言い聞かせている。

    しかし、四つんばいで犯される体は快感を覚え始めていた。

    「……ぅ……変な気分になってきましたわ……」

    「%CALLNAME:MASTER%のせいですからね……」

    %CALLNAME:TARGET%は責任を押し付けながらも、抵抗する様子はなかった。

    「……もう少し……続けても構いませんわ……」

    「……っ……」

    %CALLNAME:TARGET%は声を堪えようとしたが、漏れてしまう。

    「……後ろからなんて……まるで獣ですわね……」

    「%CALLNAME:MASTER%、貴方は……私を困らせてばかりですわ……」

    恨めしそうに言いながらも、%CALLNAME:TARGET%の腰は引かなかった。

    「……でも……嫌ではありませんの……」

    小さな声で、%CALLNAME:TARGET%はそう認めた。
  priority: 2
- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情で四つんばいの姿勢を取った。

    「お客様のご要望ですから……お相手いたしますわ」

    「ですが……この体勢は……少々品がありませんわね」

    %CALLNAME:MASTER%が後ろから進入しても、%CALLNAME:TARGET%は表情を崩さない。

    「……早く済ませてくださいまし」

    瀟洒なメイドは、あくまで事務的な態度を貫いていた。

    「……ふぅ……」

    %CALLNAME:TARGET%は小さく息を吐いた。

    「獣のような体勢……趣味が良いとは言えませんわね」

    「私に何を期待しているのか……無駄ですけれど」

    %CALLNAME:MASTER%が動いても、%CALLNAME:TARGET%は表情を崩さない。

    「……感情移入などしませんわよ」

    完璧なメイドは、あくまでプロフェッショナルを貫いていた。

    「……これは仕事です」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「どのような体勢であろうと……メイドの務め……」

    「……っ」

    一瞬、%CALLNAME:TARGET%の表情が揺らいだが、すぐに戻る。

    「……何でもありませんわ」

    冷静さを取り繕いながら、%CALLNAME:TARGET%は前を向いた。

    「……貴方に背中を見せるのは……少々不本意ですわ」

    %CALLNAME:TARGET%は冷たい声で言った。

    「私はメイド。貴方はお客様。それ以上でも以下でもありません」

    「……ん……」

    僅かに声が漏れ、%CALLNAME:TARGET%は唇を噛んだ。

    「……早く終わらせてください。お嬢様がお呼びですので」

    瀟洒な従者は、最後まで感情を見せなかった。
  priority: 1
