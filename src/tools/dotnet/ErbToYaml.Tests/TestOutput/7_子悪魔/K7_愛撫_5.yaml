- id: talent_3_1
  content: >-
    「ふぇっ……！　%CALLNAME:MASTER%、そこは……お尻なのに……」

    %CALLNAME:TARGET%は驚いて肩を跳ねさせた。

    %CALLNAME:MASTER%の舌が後ろの窄みに触れる感覚に、頬が真っ赤に染まる。

    「……な、舐めちゃうなんて……恥ずかしいよ……」

    %CALLNAME:TARGET%は抗議の声を上げながらも、逃げようとはしない。

    「……でも……%CALLNAME:MASTER%がしたいなら……」

    妖精は俯きながら、おずおずとお尻を突き出した。

    「んっ……やっ……そんなとこ、舐めないでぇ……」

    %CALLNAME:TARGET%は恥ずかしそうに身をよじっている。

    後ろを舐められる初めての感覚に、どう反応していいか分からない。

    「……へ、変な感じがする……」

    %CALLNAME:TARGET%は困惑した顔で振り返った。

    「……こういうのも、仲良しさんはするの……？」

    妖精は問いかけながらも、体は%CALLNAME:MASTER%の舌を受け入れていた。

    「ひぅ……そこ、舌で触られると……」

    %CALLNAME:TARGET%は小さく声を漏らし、体を震わせた。

    %CALLNAME:MASTER%の舌が後ろの窄みを愛撫するたび、甘い痺れが走る。

    「……なんか、お腹の奥が……きゅってなるの……」

    %CALLNAME:TARGET%は初めての感覚に戸惑いながら、シーツを掴んだ。

    「……恥ずかしいけど……嫌じゃない、かも……」

    小さな声で、%CALLNAME:TARGET%は正直に打ち明けた。

    「あっ……%CALLNAME:MASTER%、そこは……」

    %CALLNAME:TARGET%は赤くなった顔を枕に埋めた。

    「……お尻なんて、舐めないでって思うのに……」

    %CALLNAME:TARGET%の体は正直で、%CALLNAME:MASTER%の舌に少しずつ力が抜けていく。

    「……んっ……」

    %CALLNAME:TARGET%は小さく声を漏らし、腰をもじもじとさせた。

    「……%CALLNAME:MASTER%のせいで……変になっちゃう……」
