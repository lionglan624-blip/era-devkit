character: フラン
situation: K6_愛撫
entries:
- id: fallback
  content: >-
    「ねぇ……%CALLNAME:MASTER%の手、あったかい……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%に背中を預け、胸を差し出すように身体を反らせた。

    %CALLNAME:MASTER%の指が乳房に触れると、%CALLNAME:人物_フラン%は甘い吐息を漏らした。

    「んっ……%CALLNAME:MASTER%に触られるの、私……大好きなのさ」

    495年の孤独を癒すかのように、%CALLNAME:人物_フラン%は恋人の温もりに身を委ねた。

    「もっと……もっと触って？　私、壊れたりしないから……」

    悪魔の妹は、恋人の腕の中でだけ見せる、無防備な笑顔を浮かべていた。

    「あっ……やぁっ……そこ、気持ちいいのさ……」

    %CALLNAME:MASTER%が乳首を指先で転がすと、%CALLNAME:人物_フラン%は身を捩った。

    「私の胸……%CALLNAME:MASTER%のものだよ？　好きにしていいの」

    %CALLNAME:人物_フラン%は蕩けた瞳で%CALLNAME:MASTER%を見上げた。

    「……%CALLNAME:MASTER%といると、私、普通の女の子みたいになれるの」

    %CALLNAME:MASTER%の愛撫に身を任せながら、%CALLNAME:人物_フラン%は幸せそうに目を細めた。

    「壊すことしか知らなかった私が、こんなに気持ちいいなんて……不思議なのさ」

    「んんっ……%CALLNAME:MASTER%、もっと強くしてもいいよ……？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手を自分の胸に押し当てた。

    小さいながらも柔らかな乳房が、%CALLNAME:MASTER%の手の中で形を変える。

    「私、%CALLNAME:MASTER%になら……壊されてもいいって思うのさ」

    %CALLNAME:人物_フラン%は熱っぽい声で囁いた。

    「……冗談じゃないよ？　本気なの」

    紅い瞳が、愛おしそうに恋人を見つめていた。

    「はぁ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の胸に頬を寄せながら、胸への愛撫を受け入れていた。

    「こうしてると……地下に閉じ込められてた495年が、嘘みたいなのさ」

    %CALLNAME:MASTER%が優しく乳房を揉むと、%CALLNAME:人物_フラン%は甘い声を漏らした。

    「あっ……ん……%CALLNAME:MASTER%の手、やさしいね……」

    %CALLNAME:人物_フラン%は恋人の温もりに包まれ、安らぎの表情を浮かべた。

    「私、%CALLNAME:MASTER%のこと……絶対に壊さないから……」
  priority: 4
- id: talent_3_1
  content: >-
    「ひゃっ……！　む、胸……？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%に胸を触られ、顔を真っ赤にした。

    「そ、そういうの……したことないのさ……」

    戸惑いながらも、%CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手を払いのけようとはしなかった。

    「……%CALLNAME:MASTER%になら……いいけど……」

    %CALLNAME:人物_フラン%は恥ずかしそうに目を逸らした。

    「……変な声出ても、笑わないでね……？」

    「あ……そこ……くすぐったい……」

    %CALLNAME:MASTER%が乳首に触れると、%CALLNAME:人物_フラン%はびくりと身を震わせた。

    「んっ……なんだか……変な感じがするのさ……」

    %CALLNAME:人物_フラン%は自分の身体の反応を不思議そうに見つめた。

    「……これって、気持ちいいってこと……？」

    %CALLNAME:MASTER%の愛撫に、%CALLNAME:人物_フラン%は徐々に甘い声を漏らし始めた。

    「……%CALLNAME:MASTER%、教えて……この感じ、なんなの……？」

    「や……っ、急に……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手から逃げようとしたが、すぐに力を抜いた。

    「……逃げないよ。%CALLNAME:MASTER%相手なら……」

    %CALLNAME:MASTER%が優しく胸を撫でると、%CALLNAME:人物_フラン%は小さく息を漏らした。

    「あっ……ん……そうされると、どきどきするのさ……」

    %CALLNAME:人物_フラン%は頬を染めながら、%CALLNAME:MASTER%を見上げた。

    「……私のこと……好きだから、触ってるの……？」

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手を、そっと自分の胸に導いた。

    「触って……いいよ。私、%CALLNAME:MASTER%のことなら……怖くないから」

    %CALLNAME:MASTER%の指が乳房を包むと、%CALLNAME:人物_フラン%は熱い吐息を漏らした。

    「あ……んっ……%CALLNAME:MASTER%の手、温かい……」

    %CALLNAME:人物_フラン%は恥ずかしそうに、でも嬉しそうに微笑んだ。

    「……もうちょっと……触っててもいいのさ……」
