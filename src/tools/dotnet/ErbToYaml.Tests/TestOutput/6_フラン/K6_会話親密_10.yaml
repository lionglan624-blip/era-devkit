- id: talent_3_1
  content: >-
    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%と話しながら、紅い瞳で%CALLNAME:MASTER%をじっと見つめていた。

    「――ふぅん、そうなんだ」

    %CALLNAME:人物_フラン%は興味ありげにそう言った。

    「%CALLNAME:MASTER%って、面白いことするんだね」

    %CALLNAME:人物_フラン%はまじまじと%CALLNAME:MASTER%を見つめている。

    「……ねぇ、もっと教えてよ。%CALLNAME:MASTER%のこと、知りたいのさ」

    声にはどこか切ない響きがあった。

    「――それでね、%CALLNAME:MASTER%」

    %CALLNAME:人物_フラン%は笑みを浮かべながら話をしている。

    普段は閉じ込められている少女も、こうしていると無邪気な子供のようだ。

    「%CALLNAME:MASTER%は最近何かあった？」

    む、私の話もご所望かな、とおどける%CALLNAME:MASTER%。

    「うん、聞かせて。%CALLNAME:MASTER%のこと、もっと知りたいから」

    「――%CALLNAME:MASTER%？ 聞いてる？」

    聞いてるよ、と答えると、

    「そう？ ……よかった。話を聞いてくれる人って、あんまりいないから」

    %CALLNAME:人物_フラン%は少し寂しそうな顔をした後、すぐに笑顔に戻った。

    「だから、%CALLNAME:MASTER%が来てくれると嬉しいの」

    「――ねぇ、%CALLNAME:MASTER%」

    突然、%CALLNAME:人物_フラン%が声をかけてきた。

    何だ、と応じると、

    「%CALLNAME:MASTER%は私と居て、楽しい？」

    と、%CALLNAME:人物_フラン%が疑問を投げかけてきた。

    楽しいよ、と答えると、紅い瞳がきらりと輝いた。

    「……そっか。よかった。私も、楽しいのさ」
