- id: fallback
  content: >-
    %CALLNAME:MASTER%が小さな装置を取り出すと、%CALLNAME:人物_レミリア%は紅い瞳を輝かせた。

    「ふふ……今度はそれなのね。楽しみだわ」

    クリキャップが最も敏感な場所を覆い、%CALLNAME:人物_レミリア%は息を呑んだ。

    「っ……ひゃ……直接、そこに……」

    振動が密着した部分を刺激し、吸血鬼の小さな身体が跳ねた。

    「あぁっ……%CALLNAME:MASTER%……これ、すごい……逃げられない……」

    %CALLNAME:人物_レミリア%は恋人にしがみつき、快楽の波に溺れていった。

    「……ん、それは何かしら」

    %CALLNAME:人物_レミリア%はクリキャップを見て、興味深そうに首を傾げた。

    %CALLNAME:MASTER%が装置を取り付けると、吸血鬼は小さく声を漏らした。

    「っ……ぴったり、くっついて……ひぁっ！」

    振動が始まり、集中した刺激が%CALLNAME:人物_レミリア%を襲った。

    「やっ……そこ、ずっと……んんっ……頭が、おかしくなりそう……」

    500年を生きた吸血鬼は、恋人の前で無様に喘いだ。

    「また新しいおもちゃ？　%CALLNAME:MASTER%は私を飽きさせないわね」

    %CALLNAME:人物_レミリア%は余裕の笑みを浮かべていた。

    しかしクリキャップが密着した瞬間、その表情は一変した。

    「ひっ……！　これ、直接……っ、ああっ……！」

    圧迫と振動が最も敏感な部分を責め立て、%CALLNAME:人物_レミリア%は声を抑えられなかった。

    「%CALLNAME:MASTER%っ……もう、やぁっ……止まらないっ……！」

    紅魔館の主は、恋人の腕の中で甘く啼いた。

    %CALLNAME:人物_レミリア%は自ら脚を開き、%CALLNAME:MASTER%を待っていた。

    「さあ、今夜も私を楽しませてちょうだい」

    クリキャップが装着され、振動が始まった瞬間、吸血鬼は悲鳴に近い声を上げた。

    「ひぃっ！　あっ、あぁっ……そこ、そこぉっ……！」

    密着した振動が容赦なく快楽を送り込み、%CALLNAME:人物_レミリア%の理性を溶かしていく。

    「%CALLNAME:MASTER%っ……好き……大好きっ……もっとぉっ……！」

    永遠を生きる吸血鬼は、刹那の快楽に全てを委ねた。
