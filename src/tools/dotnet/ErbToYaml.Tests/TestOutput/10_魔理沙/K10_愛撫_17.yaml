- id: fallback
  content: >-
    「な……何だそれ、変な形の道具……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の手にあるバイブを怪訝そうに見た。

    「それを……どうするつもりだ……？」

    しかし%CALLNAME:MASTER%の意図を悟った瞬間、%CALLNAME:人物_魔理沙%の顔が赤くなった。

    「ちょ、ちょっと待て！　中に入れるのか！？」

    %CALLNAME:人物_魔理沙%は慌てて距離を取ろうとしたが、間に合わなかった。

    「おい、その変なの……こっちに向けるなって」

    %CALLNAME:人物_魔理沙%はバイブを警戒した。

    「私はそういう道具、慣れてないんだぜ……」

    だが%CALLNAME:MASTER%は聞かず、バイブを挿入した。

    「ひゃっ……！　や、やめ……振動……中で……っ」

    %CALLNAME:人物_魔理沙%は予想外の刺激に、混乱した表情を浮かべた。

    「は、初めて見るな……それ」

    %CALLNAME:人物_魔理沙%はバイブを興味深そうに、でも警戒しながら見た。

    「何に使うんだ……って、えっ、そこに入れるのか！？」

    バイブが挿入されると、%CALLNAME:人物_魔理沙%は驚いて息を呑んだ。

    「んっ……これ……動いてる……中で……っ」

    %CALLNAME:人物_魔理沙%は戸惑いながら、未知の感覚に翻弄された。

    「そ、それ……使う気か……？」

    %CALLNAME:人物_魔理沙%は不安そうにバイブを見つめた。

    「もうちょっと……心の準備を……」

    だが%CALLNAME:MASTER%は待たず、バイブを挿入した。

    「あっ……んっ……中で振動してる……こんなの初めてだぜ……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに顔を背けながらも、逃げ出そうとはしなかった。
