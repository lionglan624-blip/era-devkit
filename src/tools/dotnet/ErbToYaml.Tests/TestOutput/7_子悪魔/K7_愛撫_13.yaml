- id: fallback
  content: >-
    「え……えっと……それ、なんですか……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出した見慣れない道具を不思議そうに見つめた。

    「……こ、こわくないですか……？　動いてる……」

    おずおずと脚を開くと、電マが秘所に押し当てられる。

    「ひっ……！　ふぇ……！？　な、なんですかこれ……振動してる……！」

    %CALLNAME:TARGET%は驚いて体を強張らせたが、逃げることはしなかった。

    「あ、あの……%CALLNAME:MASTER%……こういうの、初めてで……」

    「そ、それを……あたしに、使うんですか……」

    %CALLNAME:TARGET%は不安そうに%CALLNAME:MASTER%を見上げた。

    「……%CALLNAME:MASTER%が言うなら……」

    覚悟を決めたように目を閉じると、電マの振動が伝わってくる。

    「んっ……！　ひぁっ……こ、これ……体が、おかしくなっちゃう……」

    初めての感覚に戸惑いながら、%CALLNAME:TARGET%は小さく震えていた。

    「……優しく……してくださいね……」

    「あの……あたし、そういう道具……苦手なんです……」

    %CALLNAME:TARGET%は怯えた目で電マを見つめている。

    しかし%CALLNAME:MASTER%に促され、渋々ながら体を預けた。

    「んぅ……っ……やっ……ぶ、ぶるぶるって……変な感じ……」

    電マの振動に翻弄され、%CALLNAME:TARGET%の体が小刻みに震える。

    「あぅ……止まらない……体が勝手に……反応しちゃう……」

    妖精は困惑しながらも、%CALLNAME:MASTER%を信じて耐えていた。

    「……%CALLNAME:MASTER%には……あたしは逆らいません……」

    %CALLNAME:TARGET%は観念したように呟いて、電マを受け入れる体勢を取った。

    振動が秘所に届くと、妖精の顔が一気に紅潮する。

    「ふぁっ……んっ……こ、こんな……初めて……体験します……」

    %CALLNAME:TARGET%は目を閉じて、未知の感覚に身を委ねている。

    「……%CALLNAME:MASTER%が……喜んでくれるなら……」

    小さな声でそう言って、妖精は健気に電マの快楽に耐えた。
