- id: fallback
  content: >-
    「なっ……！　何するんですか！？」

    %CALLNAME:人物_美鈴%は驚いて飛び退いた。

    後ろに触れようとした%CALLNAME:MASTER%を、警戒の目で見つめる。

    「そんなところ、触らないでください……！」

    %CALLNAME:人物_美鈴%は顔を真っ赤にしながら、きっぱりと拒絶した。

    「……私、門番なんです。そういうことは……」

    %CALLNAME:人物_美鈴%は困惑しながらも、毅然とした態度を崩さなかった。

    「ちょっ……そ、そこは……！」

    %CALLNAME:人物_美鈴%は慌てて身を守るように背を向けた。

    いや、それでは逆効果だと気づき、慌てて向き直る。

    「……%CALLNAME:MASTER%、何を考えてるんですか……」

    %CALLNAME:人物_美鈴%は困惑と羞恥で頭が混乱していた。

    「……とにかく、やめてください……！」

    %CALLNAME:人物_美鈴%は必死に訴えた。

    「……っ」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の手を弾いた。

    その顔には、驚きと怒りが入り混じっている。

    「いきなり、そんなところに触るなんて……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%を睨みつけた。

    「……信じられません。もう少し、常識を持ってください」

    %CALLNAME:人物_美鈴%は冷たい声で言い放った。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の行動に、ため息をついた。

    「そういうことは、もっと親しくなってからにしませんか」

    %CALLNAME:人物_美鈴%は諭すように、しかし毅然と言った。

    「……私とあなたは、まだそういう関係ではありません」

    %CALLNAME:人物_美鈴%は一歩距離を置いた。

    「お互いを知ることから、始めましょう」
