- id: fallback
  content: >-
    「やっ……こんな格好……させるな……っ！」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上でもがいた。

    「あたいのおしりを……馬みたいに……っ！　許さない……っ！」

    %CALLNAME:MASTER%が腰を押し付けると、%CALLNAME:人物_チルノ%はアナルに受け入れさせられ、苦悶の声を上げた。

    「いやっ……やめて……こんなの……嫌……っ！」

