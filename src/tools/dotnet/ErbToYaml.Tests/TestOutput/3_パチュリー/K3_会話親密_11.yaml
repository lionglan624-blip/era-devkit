- id: fallback
  content: >-
    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%の後ろに手を伸ばした。

    「……何をしているの」

    %CALLNAME:人物_パチュリー%は冷たい目で%CALLNAME:MASTER%を見据えた。

    「後ろの穴に触ろうだなんて……正気なの？」

    %CALLNAME:人物_パチュリー%は魔法で%CALLNAME:MASTER%の手を払いのけた。

    「出て行きなさい。二度と近づかないで」

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%に近づいた。

    %CALLNAME:人物_パチュリー%は本から顔を上げ、冷ややかな視線を向けた。

    「……その手は何のつもりかしら」

    %CALLNAME:人物_パチュリー%は淡々と言った。

    「私の後ろに触れようなんて……無礼を通り越して異常よ」

    「魔法で追い出す前に、自分から出ていきなさい」

    %CALLNAME:MASTER%の手が%CALLNAME:人物_パチュリー%の後ろに近づいた。

    「やめなさい」

    %CALLNAME:人物_パチュリー%は魔法の威圧を放った。

    「私と親しくもないのに、そんな場所を触ろうだなんて」

    「その図々しさには呆れるを通り越して怒りを覚えるわ」

    %CALLNAME:人物_パチュリー%は冷淡に言い放った。

    「……」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の動きに気づき、魔導書を構えた。

    「私の体に触れようとしているの？　しかも後ろを？」

    %CALLNAME:人物_パチュリー%は冷たい声で言った。

    「そういう関係ではないし、なる気もないわ」

    「消えなさい。文字通りの意味で」
