- id: fallback
  content: >-
    「……何？」

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の髪に触れようとしている。

    %CALLNAME:人物_パチュリー%は本から顔を上げ、怪訝そうな表情を浮かべた。

    「……髪を触りたいの？ 変わった趣味ね」

    されるがままに髪を撫でられながら、%CALLNAME:人物_パチュリー%は呟いた。

    「……まあ、読書の邪魔にならないなら、好きにすればいいわ」

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の手に触れた。

    「……っ」

    %CALLNAME:人物_パチュリー%は小さく体を震わせたが、手を引っ込めなかった。

    「……何をするつもり？」

    %CALLNAME:人物_パチュリー%は警戒するような視線を向けている。

    「……まあ、手を触るくらいなら……構わないけど……」

    「……ん」

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の肩にそっと手を置いた。

    %CALLNAME:人物_パチュリー%は本から視線を上げ、%CALLNAME:MASTER%を見た。

    「……何かしら。言いたいことがあるなら、言葉で言って」

    しかし、%CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の手を払いのけようとはしなかった。

    「……ふぅん。まあ、いいわ」

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の傍に座り、少しだけ肩が触れ合った。

    「……近いわね」

    %CALLNAME:人物_パチュリー%は淡々と言ったが、離れようとはしなかった。

    「……本を読むのに邪魔だと言っているのよ」

    %CALLNAME:人物_パチュリー%はそう言いながらも、本のページを捲る手が止まっている。

    「……まあ、今日は暖かいから。そのままでいいわ」
  priority: 2
- id: fallback
  content: >-
    「……何？」

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%に触れようとすると、

    %CALLNAME:人物_パチュリー%は冷たい目でこちらを見据えた。

    「唐突に触れないでくれる？」

    「そういうことは、もっと親しい間柄ですることよ」

    %CALLNAME:人物_パチュリー%は淡々と言い放ち、再び本に視線を落とした。

    「……」

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%に近づくと、

    %CALLNAME:人物_パチュリー%は無言で本を盾のように掲げた。

    「読書の邪魔をしないで」

    「用があるなら、まず言葉で言いなさい」

    %CALLNAME:人物_パチュリー%はそれ以上取り合う気配を見せなかった。

    「……誰に許可を得て触ろうとしているの？」

    %CALLNAME:人物_パチュリー%は本から顔を上げることなく、冷ややかに問いかけた。

    %CALLNAME:MASTER%が手を引くと、%CALLNAME:人物_パチュリー%は小さく息を吐いた。

    「わかればいいの。私の図書館では、静かに過ごして」

    「……あなたには興味がないわ。本の方がずっと面白いもの」

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%に触れようと手を伸ばした。

    「……止めて」

    %CALLNAME:人物_パチュリー%は本のページから目を離さず、ただ一言そう言った。

    「今、いいところなの。邪魔をしないで」

    %CALLNAME:MASTER%を完全に無視して、%CALLNAME:人物_パチュリー%は読書を続けている。

    ……どうやら、本当に興味がないらしい。
  priority: 1
