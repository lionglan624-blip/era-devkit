character: レミリア
situation: K5_愛撫
entries:
- id: fallback
  content: >-
    「あっ……そこ、乳首……っ」

    %CALLNAME:MASTER%が%CALLNAME:人物_レミリア%の小さな乳首を指先で摘まむと、甘い声が漏れた。

    %CALLNAME:人物_レミリア%の身体がびくりと震え、紅い瞳が潤んでいく。

    「んっ……や、いじわる……そんなに弄らないで……」

    %CALLNAME:MASTER%が乳首をくりくりと転がすと、%CALLNAME:人物_レミリア%は甘い息を吐いた。

    「……%CALLNAME:MASTER%、私のこと、好きにしていいわよ……」

    500年を生きた吸血鬼は、恋人の指先に蕩けていた。

    「ひゃっ……！　乳首、摘ままないで……」

    %CALLNAME:MASTER%が%CALLNAME:人物_レミリア%の乳首を指先で弾くと、小さな悲鳴が上がった。

    %CALLNAME:人物_レミリア%は恥ずかしそうに%CALLNAME:MASTER%を見上げている。

    「んあっ……そこ、敏感なのよ……知ってるくせに……」

    %CALLNAME:MASTER%が両乳首を同時に責めると、%CALLNAME:人物_レミリア%の背中が仰け反った。

    「やぁ……もう、%CALLNAME:MASTER%ったら……」

    紅魔館の主は、恋人にだけ見せる甘えた表情を浮かべていた。

    「んっ……ふぁ……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_レミリア%の乳首を丹念に愛撫していく。

    小さな突起が指の腹で転がされるたび、%CALLNAME:人物_レミリア%の吐息が熱くなる。

    「そこ……そう、気持ちいい……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胸に顔を埋めながら、快感に身を委ねた。

    「……私の乳首、%CALLNAME:MASTER%専用よ……もっと、触って……」

    高貴な吸血鬼は、恋人の愛撫に完全に蕩けていた。

    「あぁっ……乳首だけで、こんなに……」

    %CALLNAME:MASTER%が%CALLNAME:人物_レミリア%の乳首をねじるように責めると、甘い悲鳴が上がった。

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%にしがみつきながら、身体を震わせている。

    「んんっ……%CALLNAME:MASTER%、上手……」

    %CALLNAME:MASTER%が乳首を引っ張ったり、弾いたり、様々な方法で責めていく。

    「やっ……あぁ……乳首だけでイっちゃいそう……」

    %CALLNAME:人物_レミリア%は恥ずかしそうに呟きながら、快楽に溺れていった。
  priority: 4
- id: talent_3_1
  content: >-
    「っ……！　な、何を……」

    %CALLNAME:MASTER%が%CALLNAME:人物_レミリア%の乳首を摘まむと、予想外の声が漏れた。

    %CALLNAME:人物_レミリア%は慌てて口を押さえたが、すでに遅かった。

    「べ、別に感じてなんか……んっ……」

    %CALLNAME:MASTER%が乳首をくりくりと転がすと、%CALLNAME:人物_レミリア%の身体が震えた。

    「……%CALLNAME:MASTER%、いじわるね……」

    高貴な吸血鬼は、快感を認めまいと必死だった。

    「ひゃっ……乳首は、だめ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に乳首を弄られ、甘い声を上げた。

    「そ、そこ、敏感なの……知らないの？」

    照れ隠しのように言うが、その声は震えている。

    「んあっ……やぁ……そんなに責めないで……」

    %CALLNAME:人物_レミリア%は恥ずかしそうに顔を背けた。

    「……も、もう少しだけ……触ってもいいわよ……」

    「あ……んっ……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_レミリア%の乳首を弾くたび、小さな声が漏れる。

    %CALLNAME:人物_レミリア%は強がりを言おうとするが、快感で言葉にならない。

    「……っ、ちょっと、そんなに強く……」

    %CALLNAME:MASTER%が乳首をねじり上げると、%CALLNAME:人物_レミリア%の背中が仰け反った。

    「やぁっ……！　馬鹿……っ」

    罵倒しながらも、%CALLNAME:人物_レミリア%の身体は快感を求めていた。

    「……%CALLNAME:MASTER%、乳首ばっかり……」

    %CALLNAME:人物_レミリア%は恨めしそうに%CALLNAME:MASTER%を見上げた。

    だが%CALLNAME:MASTER%が両乳首を同時に責めると、

    「んああっ……！　やっ、両方は……だめ……」

    %CALLNAME:人物_レミリア%は甘い悲鳴を上げ、%CALLNAME:MASTER%にしがみついた。

    「……こんなの、はしたないわ……」

    そう呟きながらも、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%から離れようとしなかった。
