- id: fallback
  content: >-
    「ん……%CALLNAME:MASTER%、うしろから……」

    %CALLNAME:TARGET%は無感情な瞳で、%CALLNAME:MASTER%に尻を向けている。

    しかしその体は悪魔の本能に従い、%CALLNAME:MASTER%を締め付け始めていた。

