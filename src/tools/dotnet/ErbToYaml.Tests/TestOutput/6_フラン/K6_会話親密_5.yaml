    %CALLNAME:人物_フラン%は無邪気な笑顔で自ら胸を差し出すようにした。

    %CALLNAME:MASTER%がその柔らかさに手を伸ばすと、%CALLNAME:人物_フラン%は甘い声を漏らした。

    「んん……気持ちいい……もっと触っていいよ……」

    %CALLNAME:人物_フラン%の翼がぴくぴくと震えている。

    「フランね、%CALLNAME:MASTER%に触られると……なんだか幸せなのさ」

    紅い瞳に愛おしさと、どこか狂気を孕んだ光が揺れていた。

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手を取り、自分の胸に導いた。

    「……ほら、触って？ フランのこと、感じて？」

    %CALLNAME:MASTER%の手が小さな膨らみを優しく揉む。

    「あっ……んっ……そこ、ドキドキする……」

    %CALLNAME:人物_フラン%は頬を染めて、甘い吐息を漏らした。

    「%CALLNAME:MASTER%の手、離さないでね……離したら……壊しちゃうかも……」

    そう言いながらも、%CALLNAME:人物_フラン%は幸せそうに微笑んでいた。

    「%CALLNAME:MASTER%……今日もフランに触ってくれるの？」

    %CALLNAME:人物_フラン%は期待に満ちた瞳で%CALLNAME:MASTER%を見上げた。

    %CALLNAME:MASTER%がそっと胸に手を置くと、%CALLNAME:人物_フラン%は嬉しそうに身を震わせた。

    「んっ……あぁ……%CALLNAME:MASTER%の手、大好き……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の腕に抱きついた。

    「ずっとこうしていたいのさ……%CALLNAME:MASTER%とフランだけの時間……」

    495年の孤独を埋めるように、%CALLNAME:人物_フラン%は%CALLNAME:MASTER%の温もりを求めた。
