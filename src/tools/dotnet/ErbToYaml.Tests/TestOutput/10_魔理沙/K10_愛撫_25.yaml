    「……%CALLNAME:MASTER%……好きだぜ……」

    「……今日は、こっちでいこうぜ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の上に跨りながら、微笑んだ。

    「たまには私が働いてやるよ」

