- id: fallback
  content: >-
    「はぁ!?　なによそれ、気持ち悪い!」

    %CALLNAME:TARGET%はアナルバイブを見て露骨に嫌そうな顔をした。

    「お尻に入れる?　冗談じゃないわよ!」

    威勢よく拒否の姿勢を見せる。

    「最強のあたいにそんな変態的なこと……許さないんだから!」

    氷の妖精は不機嫌そうに翅をばたつかせた。

    「どっか行きなさいよ、変態!」

    「ちょっ、何すんのよ!」

    強引に進められ、%CALLNAME:TARGET%は悲鳴を上げた。

    「いやっ、やめ……動いてる!　気持ち悪い!」

    嫌悪感を露わにしながら、%CALLNAME:TARGET%はもがいた。

    「こんなの最強のあたいに対する侮辱よ!」

    抵抗しながらも、どうにもできない悔しさが滲んでいる。

    「絶対許さないんだから……覚えてなさいよ!」

    「またそれ!?　いい加減にしなさいよ!」

    %CALLNAME:TARGET%は嫌そうにアナルバイブを睨んだ。

    「あんた、本当に変態ね……最低……」

    心底嫌そうな表情を浮かべている。

    「……さっさと終わらせなさいよ、気分悪い」

    渋々ながらも、%CALLNAME:TARGET%は耐えることを選んだ。

    「最強のあたいを、こんな風に……絶対覚えてるから」

    「……またこれ?　飽きないの?」

    %CALLNAME:TARGET%は呆れと諦めの表情を見せた。

    「あんたって本当にどうしようもない変態ね」

    文句を言いながらも、抵抗する気力が薄れているようだ。

    「……好きにすればいいわよ、もう……」

    無気力にそう言いながら、%CALLNAME:TARGET%はため息をついた。

    「最強のあたいが、なんでこんな目に……」
