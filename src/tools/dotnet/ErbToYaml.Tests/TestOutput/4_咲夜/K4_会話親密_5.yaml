entries:
- id: fallback
  content: >-
    「ん……ちゅ、る……れろ……」

    %CALLNAME:人物_咲夜%は静かに目を閉じ、%CALLNAME:MASTER%の唇を受け入れた。

    時間を操る瀟洒なメイドの唇が、甘く蕩けていく。

    「……んむ……ぷは……」

    唇が離れると、%CALLNAME:人物_咲夜%は蕩けた表情を浮かべている。

    「……ふふ、瀟洒なメイドらしからぬ顔をしているわね、私」

    %CALLNAME:人物_咲夜%は頬を染めながら、幸せそうに微笑んだ。

    %CALLNAME:MASTER%が%CALLNAME:人物_咲夜%の唇に触れた瞬間、世界が静止した。

    「ん……ちゅる……んむ……」

    時が止まった世界で、二人だけの口づけが続く。

    %CALLNAME:人物_咲夜%の指先が、%CALLNAME:MASTER%の頬にそっと触れた。

    「……ちゅ、ぷ……はぁ……」

    「……このひとときだけは、私も瀟洒なメイドではなく……ただの女よ」

    %CALLNAME:人物_咲夜%は熱っぽい瞳で%CALLNAME:MASTER%を見つめ、再び唇を重ねた。

    「%CALLNAME:MASTER%……来てくださったのね」

    %CALLNAME:人物_咲夜%は微笑みながら、自ら%CALLNAME:MASTER%に唇を寄せた。

    「ちゅ……ん、れろ……んむ……」

    互いの舌が絡み合い、甘い吐息が漏れる。

    %CALLNAME:人物_咲夜%の瞳は潤み、頬は薔薇色に染まっている。

    「……はぁ……%CALLNAME:MASTER%の味、すっかり覚えてしまったわ」

    %CALLNAME:人物_咲夜%は恥ずかしそうに、しかし嬉しそうに囁いた。

    「んっ……ちゅる、ぢゅる……」

    %CALLNAME:人物_咲夜%は情熱的に%CALLNAME:MASTER%の唇を貪っている。

    普段の瀟洒な振る舞いはどこへやら、彼女の舌は甘く絡みついてくる。

    「れろ……んむ、ちゅ……ぷはっ」

    やがて唇が離れ、%CALLNAME:人物_咲夜%は熱に浮かされた目で%CALLNAME:MASTER%を見つめた。

    「……もっと、して……お嬢様のメイドとしてではなく、私として」

    %CALLNAME:人物_咲夜%は珍しく甘えた声で、そう懇願した。
