- id: fallback
  content: >-
    「ふぇっ……！　な、何……！？」

    %CALLNAME:TARGET%は驚いて身を引いた。

    %CALLNAME:MASTER%の手が胸の先に触れようとしていることに気づき、顔を真っ赤にしている。

    「い、いきなり乳首なんて……」

    %CALLNAME:TARGET%は警戒するような目で%CALLNAME:MASTER%を見ている。

    「……咲夜さんに怒られちゃいます……」

    妖精は困った顔で、周囲をちらちらと見回した。

    「ひゃっ……！　そ、そこは……」

    %CALLNAME:TARGET%は反射的に胸を押さえた。

    「乳首なんて触らないでください……恥ずかしいですから……」

    %CALLNAME:TARGET%は抗議の声を上げながら、%CALLNAME:MASTER%から距離を取ろうとしている。

    「……あたし、お仕事中なので……」

    言い訳をしながら、妖精は逃げ出す機会を窺っていた。

    「……そういうのは、もっと仲良くなってから……」

    「え……えっと……」

    %CALLNAME:TARGET%は突然の愛撫に固まっている。

    「あの……%CALLNAME:MASTER%、何かあったんですか……？」

    %CALLNAME:TARGET%は戸惑いながら、%CALLNAME:MASTER%の真意を測りかねている。

    「……あたし、何か悪いことしちゃいました……？」

    不安そうな表情で、妖精は%CALLNAME:MASTER%を見上げた。

    「……乳首は、やめてください……」

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の手を見つめている。

    どう反応していいかわからないようだ。

    「あの……あたし、こういうの、よくわからないです……」

    %CALLNAME:TARGET%は困惑した表情で首を傾げた。

    「……%CALLNAME:MASTER%は、あたしの乳首で何がしたいの……？」

    妖精は理解できないという顔で、%CALLNAME:MASTER%を見上げていた。
