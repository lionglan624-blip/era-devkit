- id: talent_3_1
  content: >-
    「え……そ、それ……つぶつぶがたくさん付いてる……お尻に、入れるんですか……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したアナルビーズを見て、頬を赤く染めた。

    「……%CALLNAME:MASTER%がしたいなら……あたし、我慢します……」

    アナルビーズが菊座に押し当てられ、最初の珠がゆっくりと肛門に沈んでいく。

    「んっ……！　あっ、入ってきて……また一つ……ぽこって……！」

    %CALLNAME:TARGET%は涙目になりながら、珠が一つずつ挿入される感覚に耐えていた。

    「……こ、こんなにいっぱい……お尻の中、変になっちゃいそうです……」

    「あ、あの……その、つぶつぶの……また使うんですか……」

    %CALLNAME:TARGET%は緊張した面持ちで、アナルビーズを見つめている。

    「……お尻に……恥ずかしいけど……%CALLNAME:MASTER%のためなら……頑張ります……」

    アナルビーズが肛門に一珠ずつ挿入されていく。

    「ひゃあっ……！　んっ、やぁっ……一つ入る度に……お尻が、押し広げられて……！」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕を掴み、必死に耐えている。

    「……%CALLNAME:MASTER%の前で……こんな……恥ずかしいの……」

    「ま、また……あれ、ですか……」

    %CALLNAME:TARGET%は恥ずかしそうに視線を逸らしながら、スカートを捲り上げた。

    アナルビーズが菊座に宛てがわれると、妖精は小さく身震いした。

    「んぅ……っ……あぁっ……入ってきて……ぽこ、ぽこって……」

    珠が一つずつ挿入され、%CALLNAME:TARGET%の体がぴくぴくと反応する。

    「やっ……声、出ちゃう……お尻の中で、珠がいっぱい……」

    妖精は片手で口を覆いながら、甘い喘ぎを堪えていた。

    「……こういうの、慣れないです……でも……」

    %CALLNAME:TARGET%は覚悟を決めたように目を閉じて、体を%CALLNAME:MASTER%に預けた。

    アナルビーズが一珠ずつ肛門に挿入されていく。

    「ふぁっ……んっ……！　一つ入る度に……お尻の奥に、押し込まれて……」

    %CALLNAME:TARGET%は涙を浮かべながら、独特の感覚に翻弄されている。

    「……%CALLNAME:MASTER%が……こうしたいなら……あたし、受け止めます……」

    健気な言葉とともに、妖精は全ての珠を受け入れた。
