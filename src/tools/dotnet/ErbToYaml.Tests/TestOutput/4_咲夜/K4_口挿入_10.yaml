- id: fallback
  content: >-
    「……これも……おもてなしの一環ですわ……」

    %CALLNAME:TARGET%は自分に言い聞かせながら、%CALLNAME:MASTER%の上に跨った。

    「お客様のご要望にお応えするのは……当然のこと……」

    しかし、腰を落としていくと体は正直に反応してしまう。

    「っ……あ……」

    「……少し……感じているだけですわ……」

    %CALLNAME:TARGET%は自分の反応を言い訳するように付け加えた。

    「……ん……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は複雑な表情で腰を動かしている。

    「上から動くのは……正直……疲れますわね……」

    「……でも、これも仕事ですから……」

    %CALLNAME:TARGET%が深く腰を落とすと、体が跳ねた。

    「あっ……そこは……」

    言葉を途中で飲み込み、%CALLNAME:TARGET%は唇を噛んだ。

    「……これは……仕事……ですから……」

    %CALLNAME:TARGET%は何度も自分に言い聞かせている。

    しかし、体は快感を覚え始めていた。

    「……ぅ……変な気分になってきましたわ……」

    「%CALLNAME:MASTER%のせいですからね……」

    %CALLNAME:TARGET%は責任を押し付けながらも、腰を動かし続けた。

    「……もう少し……続けても構いませんわ……」

    「……っ……」

    %CALLNAME:TARGET%は声を堪えようとしたが、漏れてしまう。

    「……プロとして……こんな声を出すべきではないのに……」

    「上から……貴方を見下ろしていると……」

    %CALLNAME:TARGET%の頬はほんのり紅潮していた。

    「……でも……嫌ではありませんの……」

    小さな声で、%CALLNAME:TARGET%はそう認めた。
  priority: 2
- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%の上に跨っている。

    「お客様のご要望ですから……お相手いたしますわ」

    瀟洒なメイドは、感情を完全に押し殺していた。

    「……早く済ませてくださいまし」

    「私には、お嬢様のお世話という仕事がありますので」

    %CALLNAME:TARGET%の動きは、事務的で機械的だった。

    「……ふぅ……」

    %CALLNAME:TARGET%は小さく息を吐きながら腰を動かしている。

    「上から動けばいいのですね……分かりましたわ」

    「感情を込める必要はありませんでしょう」

    %CALLNAME:TARGET%は淡々と腰を上下させる。

    「……感情移入などしませんわよ」

    完璧なメイドは、あくまでプロフェッショナルを貫いていた。

    「……これは仕事です」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「お客様の相手をするのも、メイドの務め……」

    「……っ」

    一瞬、%CALLNAME:TARGET%の表情が揺らいだが、すぐに戻る。

    「……何でもありませんわ」

    冷静さを取り繕いながら、%CALLNAME:TARGET%は動きを続けた。

    「……貴方に感情を見せる必要はありませんわ」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見下ろした。

    「私はメイド。貴方はお客様。それ以上でも以下でもありません」

    「……ん……」

    僅かに声が漏れ、%CALLNAME:TARGET%は唇を噛んだ。

    「……早く終わらせてください。お嬢様がお呼びですので」

    瀟洒な従者は、最後まで感情を見せずに動き続けた。
  priority: 1
