- id: fallback
  content: >-
    「あっ……ちょ、ちょっと……」

    %CALLNAME:TARGET%は驚いて体を固くした。

    「……尻は、ちょっと……」

    %CALLNAME:TARGET%は困惑しながらも、強くは拒まなかった。

    「……%CALLNAME:MASTER%、そういうことは、もう少し……」

    %CALLNAME:TARGET%は顔を赤くして、言葉を濁した。

    「ひゃっ……な、何を……」

    %CALLNAME:TARGET%は驚いて%CALLNAME:MASTER%を見た。

    「お、尻を触るなんて……その、えっちだぜ……」

    %CALLNAME:TARGET%は恥ずかしそうに俯いている。

    「……%CALLNAME:MASTER%って、意外と大胆なんだな……」

    困惑しつつも、どこか嬉しそうな様子だった。

    「えっ……あ、あの……」

    %CALLNAME:TARGET%は戸惑った表情で%CALLNAME:MASTER%を見上げた。

    %CALLNAME:MASTER%の手が、小ぶりで形の良い尻の曲線をなぞっている。

    「……魔法の研究中に、こういうことされると困るんだぜ……」

    口ではそう言いながらも、%CALLNAME:TARGET%の足は動こうとしない。

    「……%CALLNAME:MASTER%って、もしかしてこういうの好きなのか……？」

    「んっ……やだ、そこ……」

    %CALLNAME:TARGET%はビクッと肩を震わせた。

    「……尻を触るのは、その、ちょっと……」

    %CALLNAME:TARGET%は恥ずかしそうに視線を逸らした。

    だが、その頬は紅く染まり、完全に嫌がっているわけではなさそうだ。

    「……もう少し仲良くなってから、な？」
  priority: 2
- id: fallback
  content: >-
    「ちょっと、どこ触ってんだよ！」

    %CALLNAME:TARGET%は驚いて身を引いた。

    「……尻はさすがに、ダメだぜ」

    %CALLNAME:TARGET%は困った顔で%CALLNAME:MASTER%を見ている。

    「あんまりなれなれしくされると、困るんだけどな……」

    %CALLNAME:TARGET%は少し距離を取って、警戒するように立った。

    「うひっ！？　な、何すんだ！」

    %CALLNAME:TARGET%は飛び上がるように驚いた。

    「いきなり尻を触るなんて……失礼だぜ！」

    %CALLNAME:TARGET%は顔を赤くして、怒りと恥ずかしさが混じった表情をしている。

    「もう、%CALLNAME:MASTER%ってば……」

    %CALLNAME:TARGET%はため息をつきながらも、どこか呆れたような顔をしていた。

    「えっ……ちょ、ちょっと待てよ！」

    %CALLNAME:TARGET%は慌てて%CALLNAME:MASTER%の手を払いのけた。

    「いきなり尻を触るとか、どういうつもりだぜ……」

    %CALLNAME:TARGET%は帽子を深く被り直しながら、%CALLNAME:MASTER%を睨んでいる。

    「……まあ、悪気がないのは分かるけどさ」

    %CALLNAME:TARGET%は少し距離を取りつつも、完全に怒っているわけではなさそうだ。

    「わっ……！　な、なに急に……」

    %CALLNAME:TARGET%は反射的に飛び退いた。

    「尻を触るのは……その、まずいだろ……」

    %CALLNAME:TARGET%は顔を赤くして、尻を押さえている。

    「……べ、別に嫌ってわけじゃないけど、いきなりはダメだぜ」

    金髪の魔法使いは照れ隠しのように、そっぽを向いた。
  priority: 1
