    「あたいだけのものだからね、%CALLNAME:MASTER%は……ふふっ」

    「はぁっ……ん……%CALLNAME:MASTER%、もっとぎゅってして」

    %CALLNAME:人物_チルノ%が甘えた声で%CALLNAME:MASTER%に抱きついてくる。

    正面から繋がっているせいか、いつも以上に密着している。

    「あったかい……氷の妖精なのに、%CALLNAME:MASTER%といると溶けそう……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の胸に頬を押し付けた。

    「……こういうの、最強とか関係なく、好き」

    「えへへ……正面からだと、%CALLNAME:MASTER%の顔よく見える」

    %CALLNAME:人物_チルノ%は嬉しそうに%CALLNAME:MASTER%を見つめている。

    「あっ……んん……奥まで来てる……」

    腰が動くたびに、%CALLNAME:人物_チルノ%の表情が蕩けていく。

    「%CALLNAME:MASTER%……好き……あたい、本当に%CALLNAME:MASTER%のこと好きだよ」

    珍しく素直な言葉が、%CALLNAME:人物_チルノ%の口から漏れた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は潤んだ瞳で%CALLNAME:MASTER%を見上げた。

    「こうやって繋がってると……なんか安心する」

    %CALLNAME:人物_チルノ%の冷たいはずの体が、今は熱を帯びている。

    「んっ……はぁ……あたいのこと、ずっと離さないでよね」

    そう言って、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%をぎゅっと抱きしめた。
