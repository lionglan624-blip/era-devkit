- id: fallback
  content: >-
    「ひゃっ……！　な、何……！？」

    %CALLNAME:TARGET%は驚いて体を硬くした。

    %CALLNAME:MASTER%の手が後ろに触れている。

    「え、えっと……そこは……お尻なんですけど……」

    %CALLNAME:TARGET%は困惑した表情で%CALLNAME:MASTER%を見上げた。

    「……あの、もしかして、間違えてます……？」

    妖精は%CALLNAME:MASTER%の真意を測りかねている様子だった。

    「あ、あの……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は戸惑いながら、%CALLNAME:MASTER%の手を見つめている。

    「……そこ、触られるの……恥ずかしいです……」

    %CALLNAME:TARGET%は小さく身を縮こまらせた。

    「……でも……%CALLNAME:MASTER%がそうしたいなら……」

    %CALLNAME:TARGET%はおずおずと、されるがままになった。

    「……優しくしてくださいね……？」

    「んっ……ふぇ……変な感じ……」

    %CALLNAME:TARGET%は後ろを触られる感覚に、小さく声を漏らした。

    何が起きているのか、よく分かっていない様子。

    「……あの、%CALLNAME:MASTER%……これって……」

    %CALLNAME:TARGET%は不安げに%CALLNAME:MASTER%を見上げた。

    「……痛くしないですよね……？」

    妖精は臆病な瞳で、%CALLNAME:MASTER%の反応を窺っていた。

    「……あの、そこは……」

    %CALLNAME:TARGET%は困った顔で、%CALLNAME:MASTER%の愛撫を受けている。

    拒絶するほどではないが、理解できていない。

    「……こういうのも、するんですか……？」

    %CALLNAME:TARGET%は首を傾げながら、%CALLNAME:MASTER%を見つめた。

    「……あたし、よくわからないけど……」

    妖精はおとなしく、%CALLNAME:MASTER%の手に身を任せていた。
