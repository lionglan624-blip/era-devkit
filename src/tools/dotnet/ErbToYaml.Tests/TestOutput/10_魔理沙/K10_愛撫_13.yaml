  content: >-
    「その変なのは何だ？」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の手にあるローターを怪訝そうに見た。

    「見たことない道具だぜ……何に使うんだ？」

    しかし%CALLNAME:MASTER%の意図を悟った瞬間、%CALLNAME:人物_魔理沙%の顔が赤くなった。

    「ちょ、ちょっと待て！　そういうのに使うのか！？」

    %CALLNAME:人物_魔理沙%は慌てて距離を取ろうとした。

    「おい、それ何……って、うわあっ！」

    %CALLNAME:MASTER%が突然ローターを押し当て、%CALLNAME:人物_魔理沙%は悲鳴を上げた。

    「な、何するんだよ！　振動してるじゃないか！」

    %CALLNAME:人物_魔理沙%は慌てて逃れようとしたが、動けなかった。

    「あっ……や、やめろって……変な感じがするぜ……」

    %CALLNAME:人物_魔理沙%の抗議の声は、次第に甘い響きを帯びていった。

    「何するんだよ！」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%を睨んだ。

    「そんな変な道具……私に使う気か？」

    だが%CALLNAME:MASTER%は容赦なくスイッチを入れた。

    「うわっ！　振動……って、やめ……っ！」

    %CALLNAME:人物_魔理沙%の抗議は、ローターの刺激に遮られた。

    「何だそれ、魔法道具か？」

    %CALLNAME:人物_魔理沙%は興味を持ってローターを見た。

    「外の世界の物か？　どういう仕組みで……」

    %CALLNAME:MASTER%が無言で電源を入れると、低い唸りが響いた。

    「うわっ……動いた……って、ちょっ！　それを私に使うな！」

    %CALLNAME:人物_魔理沙%は何が起こるか悟る前に、その振動を体に受けた。
