    「あたし、まだ……たりない……」

    サキュバスの血が騒ぎ、%CALLNAME:TARGET%は飢えたように%CALLNAME:MASTER%を求めていた。

    「あたしね……じぶんでうごくの、はじめて……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に座り、不思議そうな顔をしている。

    しかし悪魔の本能は既に目覚め、%CALLNAME:MASTER%を搾り取ろうとしていた。

