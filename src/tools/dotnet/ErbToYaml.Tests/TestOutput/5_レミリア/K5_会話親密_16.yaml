character: レミリア
situation: K5_会話親密
entries:
- id: fallback
  content: >-
    「あっ……ん、ふぁ……指、中に……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指が膣内に侵入する感覚に、甘い声を漏らした。

    500年を生きた吸血鬼の秘所は、恋人の指を締め付けるように絡みついている。

    「……ふふ、貴方の指……私の中で動いているの、わかるわ……」

    %CALLNAME:TARGET%は紅い瞳を潤ませ、%CALLNAME:MASTER%にしがみついた。

    「……もっと奥まで……私を貴方のものにしなさい……」

    紅魔館の主は、愛する者にだけ見せる無防備な表情で喘いでいた。

    「や、ぁっ……そこ……いいっ……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の膣壁を優しく撫でている。

    %CALLNAME:TARGET%は身を捩り、快楽に溺れるように目を閉じた。

    「……んっ……貴方だけよ……私をこんなにしてしまうのは……」

    紅魔館の主は、普段の威厳をかなぐり捨て、%CALLNAME:MASTER%に全てを委ねている。

    「……永遠に、私の中から離れないで……」

    %CALLNAME:TARGET%は熱い吐息とともに、恋人への愛を囁いた。

    「ひ、ぁ……んんっ……指、動いて……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の中で指を蠢かせている。

    %CALLNAME:TARGET%の膣内は熱く潤み、恋人の愛撫を貪欲に求めていた。

    「……くっ、ぅ……私の弱いところ……全部知っているのね……」

    500年の孤独を埋めるように、%CALLNAME:TARGET%は%CALLNAME:MASTER%に縋りついている。

    「……貴方は私の運命……逃がさないわよ……永遠に……」

    %CALLNAME:TARGET%は蕩けた表情で、独占欲を露わにした。

    「あ、ぁっ……んっ……もっと、奥……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指を深く受け入れ、艶やかに喘いでいる。

    紅魔館の主の秘所は蜜を溢れさせ、恋人の指を離そうとしない。

    「……ふふ……貴方の指で……私、おかしくなりそう……」

    %CALLNAME:TARGET%は上気した頬で%CALLNAME:MASTER%を見つめ、妖艶に微笑んだ。

    「……このまま……私を壊しなさい……貴方だけに、許すわ……」

    500年の吸血鬼は、愛する者の前でだけ、己の全てを曝け出していた。
  priority: 4
- id: talent_3_1
  content: >-
    「ひゃっ……！ な、中に指を……」

    %CALLNAME:TARGET%は驚きながらも、%CALLNAME:MASTER%の侵入を拒まなかった。

    紅魔館の主の頬が紅く染まり、息が乱れ始めている。

    「……こんなこと……私に何をさせる気なの……」

    でも、その声には嫌悪は感じられなかった。

    「……っ、仕方ないわね……少しだけ、許してあげる……」

    %CALLNAME:TARGET%は視線を逸らしながら、%CALLNAME:MASTER%を受け入れた。

    「あ……ん、ぅ……そこは……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の膣内で動いている。

    %CALLNAME:TARGET%は威厳を保とうとしながらも、甘い声を抑えきれない。

    「……っ、貴方……大胆すぎるわよ……」

    紅魔館の主は上気した頬で、%CALLNAME:MASTER%を見つめている。

    「……でも、悪くはないわね……ふ、ぁ……」

    %CALLNAME:TARGET%は熱い吐息とともに、そう呟いた。

    「や、ぁっ……指、動いて……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指に膣壁を撫でられ、身を震わせた。

    「……こんな……500年生きても、こんな気持ち……」

    %CALLNAME:TARGET%は戸惑いながらも、快感に身を任せている。

    「……貴方には、何か特別なものを感じるわ……」

    紅い瞳が潤み、%CALLNAME:TARGET%は%CALLNAME:MASTER%に寄りかかった。

    「ひ、ぁ……んっ……そこ、いい……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の中で指を蠢かせている。

    紅魔館の主は快感に耐えるように目を閉じ、息を乱している。

    「……っ、調子に乗らないことね……でも……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕を掴み、離そうとしない。

    「……次も、期待しているわよ……」

    %CALLNAME:TARGET%は複雑な表情で、そう囁いた。
