    %CALLNAME:TARGET%は好奇心に満ちた瞳で、%CALLNAME:MASTER%を見上げた。

    「へー……こういうのも、あるんだ……」

    無邪気に感想を漏らしながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を待っていた。

    「んっ……あ、入ってきた……なんか、ふかい……」

