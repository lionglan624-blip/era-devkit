- id: talent_3_1
  content: >-
    「え、えっと……わ、私が上で……後ろを……？」

    %CALLNAME:人物_美鈴%は恥ずかしそうに%CALLNAME:MASTER%の上に跨った。

    アナルを使う体勢に慣れていないのか、頬が真っ赤に染まっている。

    「……こうすると……全部、見られちゃいますね……」

    %CALLNAME:人物_美鈴%は顔を赤くしながら、ゆっくりと腰を沈めた。

    「……後ろだから……余計に恥ずかしい……です……」

    照れながらも、%CALLNAME:人物_美鈴%は%CALLNAME:MASTER%から目を逸らさなかった。

    「あっ……ん……後ろに……入って……」

    %CALLNAME:人物_美鈴%は甘い声を漏らしながら、腰をくねらせた。

    「……自分で動くと……後ろでも……感じちゃう……」

    %CALLNAME:人物_美鈴%は困惑した表情を浮かべた。

    「……%CALLNAME:MASTER%……私、おかしくなっちゃいそう……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに俯きながらも、腰の動きは止めなかった。

    「……でも、止められない……です……」

    「……んっ……上からだと……深く入りますね……」

    %CALLNAME:人物_美鈴%は小さく身を捩った。

    「……後ろを自分から使うなんて……信じられない……」

    %CALLNAME:人物_美鈴%は観念したように体の力を抜いた。

    「……でも……%CALLNAME:MASTER%のためなら……」

    「……頑張って……動きます……」

    照れ隠しの言葉に、健気な想いが滲み出ていた。

    「……はぅ……後ろ、まだ慣れてなくて……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の上で、ぎこちなく体を揺らしていた。

    「……でも……%CALLNAME:MASTER%がしたいなら……」

    %CALLNAME:人物_美鈴%は健気な声で言った。

    「……私、自分から……後ろで気持ちよくさせます……」

    「……恥ずかしいけど……%CALLNAME:MASTER%の喜ぶ顔、見たいから……」

    恥ずかしそうに、でも嬉しそうに、%CALLNAME:人物_美鈴%は腰を動かし続けた。
