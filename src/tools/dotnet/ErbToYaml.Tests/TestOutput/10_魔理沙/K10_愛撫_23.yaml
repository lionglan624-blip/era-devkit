    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の脚を開かせると、腰を密着させた。

    「んっ……お前の中、熱いな……入れるぜ……」

    %CALLNAME:人物_魔理沙%がゆっくりと押し込んでいく。

    「あっ……きつい……でも、お前の反応見てると……もっと奥まで行きたくなるな」

