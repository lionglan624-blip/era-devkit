- id: fallback
  content: >-
    %CALLNAME:MASTER%がマッサージャーを取り出すと、%CALLNAME:人物_レミリア%は眉をひそめた。

    「……何のつもりかしら、それは」

    しかし拒絶するほどの強さはなく、%CALLNAME:人物_レミリア%は黙認した。

    「っ……ん……」

    振動が肌を這うと、吸血鬼は小さく息を吐いた。

    「……まあ、褒美として許してあげるわ」

    高飛車な態度の裏で、%CALLNAME:人物_レミリア%はどこか期待していた。

    「……ふぅん、そういう道具があるのね」

    %CALLNAME:人物_レミリア%は興味深そうにマッサージャーを見た。

    「使用人が主にそんなものを使うなんて……大胆ね」

    振動が身体に触れ、%CALLNAME:人物_レミリア%は思わず声を漏らした。

    「……っ、あ……これは……」

    予想外の快感に、吸血鬼は動揺を隠せなかった。

    「……今日のところは、見逃してあげるわ」

    %CALLNAME:MASTER%がマッサージャーを見せると、%CALLNAME:人物_レミリア%は鼻を鳴らした。

    「そんなもので私を喜ばせようというの？」

    傲慢な態度だったが、振動が肌に触れた瞬間、表情が変わった。

    「……っ！　な、何これ……」

    500年を生きた吸血鬼にも、これは初めての感覚だった。

    「……ふ、ふん……悪くないわね……」

    認めるような呟きが、かすかに漏れた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を紅い瞳で見つめた。

    「度胸だけはあるわね。私にそんなものを使おうなんて」

    マッサージャーの振動が身体を這い、吸血鬼は小さく身じろぎした。

    「……ん……っ……」

    威厳を保とうとしながらも、その頬はほんのりと紅く染まっていた。

    「……特別よ、あなただけ」
