- id: fallback
  content: >-
    「……二人に、同時に使われるのですか」

    %CALLNAME:人物_美鈴%は淡々とした口調で言った。

    前と後ろを同時に貫かれる体勢に、顔を歪める。

    「……門番の務めとして……お受けします」

    %CALLNAME:人物_美鈴%は感情を殺した声で言った。

    「……ただ、これ以上の屈辱はないと、覚えておいてください」

    武術家としての誇りが、その言葉に滲み出ていた。

    「……っ……」

    %CALLNAME:人物_美鈴%は声を押し殺しながら、二人の動きに耐えていた。

    「……前と後ろ……同時に……ですか」

    %CALLNAME:人物_美鈴%は機械的に言った。

    「……お望みなら、続けてください……」

    その声には、苦痛と屈辱が滲んでいた。

    「……これも、務めですから……」

    「……」

    %CALLNAME:人物_美鈴%は無言で二人に体を委ねていた。

    「……二人に同時に使われるとは……」

    %CALLNAME:人物_美鈴%は静かに言った。

    「……随分と、お楽しみのようですね」

    「……お好きにどうぞ。門番は道具ですから」

    冷たい口調の奥に、押し殺した感情が透けて見えた。

    「……わかりました」

    %CALLNAME:人物_美鈴%は小さく頷いた。

    「……二穴を同時に……お使いください」

    %CALLNAME:人物_美鈴%は事務的に告げた。

    「……ただ、勘違いしないでください」

    「……これは、ただの義務です。それ以上でも以下でもありません」

    毅然とした態度の中に、かすかな怒りが見え隠れしていた。
