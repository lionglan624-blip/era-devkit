character: 魔理沙
situation: K10_会話親密
entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%を後ろからそっと抱きしめた。

    「んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は目を閉じて、%CALLNAME:MASTER%の腕に手を重ねた。

    「こうやってると……本当に幸せだぜ」

    普通の魔法使いは照れくさそうに笑いながらも、離れようとしない。

    「魔法の研究よりこっちの方が好きなんて……%CALLNAME:MASTER%のせいだぜ」

    %CALLNAME:TARGET%はそのまま%CALLNAME:MASTER%の腕の中で身を預けた。

    「――ぎゅってして、%CALLNAME:MASTER%」

    %CALLNAME:TARGET%が珍しく素直にお願いしてきた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%を優しく抱きしめた。

    「……へへ、あったかいな。最高だぜ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の心臓の音を聞くように、胸に耳を当てている。

    「死ぬまで一緒にいてくれよな。……約束だぜ」

    金髪の魔法使いは、照れ隠しのように帽子を深く被った。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の前から抱きついた。

    「んっ……ふふ、そんなに勢いよく抱きつかなくても……」

    %CALLNAME:TARGET%は微笑みながらそう言う。

    「……へへ、%CALLNAME:MASTER%……」

    それから%CALLNAME:TARGET%は甘い声で%CALLNAME:MASTER%の名を呼び、首に腕を回して抱きつき返してきた。

    「……こうしてると、なんか落ち着くんだ。不思議だぜ」

    普通の魔法使いは、恋人の胸に顔を埋めた。

    「……なあ、%CALLNAME:MASTER%」

    %CALLNAME:TARGET%がこちらを見つめながら、そっと腕を広げている。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%を優しく抱きしめた。

    「……へへ、私からお願いするなんてな。恥ずかしいぜ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背中に腕を回し、ぎゅっとしがみついた。

    「でも、%CALLNAME:MASTER%の温もりが好きなんだ。……大好きだぜ」

    金髪の魔法使いは、幸せそうに目を細めた。
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%に抱きついた。

    「わっ……な、なんだよいきなり……」

    %CALLNAME:TARGET%は驚きながらも、%CALLNAME:MASTER%を押し退けなかった。

    「……もう、甘えん坊なんだから」

    頬を赤く染めながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%の背中を軽く叩いた。

    「……こうしてると、悪くないな……なんてな」

    照れ隠しで言ったつもりが、その声は確かに嬉しそうだった。

    「あ……%CALLNAME:MASTER%？」

    %CALLNAME:MASTER%に抱きしめられて、%CALLNAME:TARGET%は固まった。

    「……急に甘えてくるなよ、心臓に悪いぜ」

    だが、その声は怒っているようには聞こえない。

    %CALLNAME:TARGET%は恥ずかしそうに、%CALLNAME:MASTER%の体に身を預けた。

    「……あったかいな。こうしてるの、嫌いじゃないぜ」

    普通の魔法使いは、小さく呟いてから顔を背けた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の後ろから抱きついた。

    「うわっ……！　ちょ、ちょっと……」

    %CALLNAME:TARGET%は動揺しながらも、されるがままになっている。

    「……どうかしたのか、%CALLNAME:MASTER%……？」

    %CALLNAME:TARGET%はおずおずと尋ねてくる。

    「……まあ、いいけどさ。もうちょっとだけ、このままでいいぜ」

    そう言いながら、%CALLNAME:TARGET%は体から力を抜いた。

    「……その、いつまでするんだ？」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%に抱きついている。

    「飽きるまで」と%CALLNAME:MASTER%が答えると、

    「……そ、そうか」

    %CALLNAME:TARGET%は半ば諦めたように、そう言った。

    「……べ、別に嫌じゃないからな。勘違いするなよ」

    赤くなった頬を隠すように、%CALLNAME:TARGET%は帽子のつばを下げた。
  priority: 3
