  content: >-
    「……%CALLNAME:MASTER%……こんな……二人同時に……」

    %CALLNAME:TARGET%は前と後ろから同時に貫かれ、声を押し殺している。

    「頭が……真っ白になりそう……ですわ……」

    二つの熱が%CALLNAME:TARGET%の中で蠢くたび、全身が震える。

    「あああっ……前も……後ろも……」

    「%CALLNAME:MASTER%……貴方がいるから……耐えられますわ……」

    瀟洒なメイドは、愛する人を信じて極限の快楽に身を委ねていた。

    「ふぁ……んんっ……すごい……ですわ……」

    %CALLNAME:TARGET%は二つの熱に翻弄され、理性を失いかけている。

    「こんなに……気持ちよくなるなんて……」

    「前と後ろで……違う感覚が……混ざって……」

    %CALLNAME:MASTER%が動くと、連動してもう一方も深く沈む。

    「あっ……ああっ……どちらも……奥まで……」

    「……もう……メイドの矜持など……どうでもいいですわ……」

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の顔だけを見つめている。

    「二人に抱かれていても……貴方のことだけ……考えていますわ……」

    「貴方の熱が……私を満たしてくれる……それだけで……」

    二つの動きが重なり、%CALLNAME:TARGET%の体が大きく跳ねる。

    「あああっ……同時に……来て……」

    「貴方と……一緒に……壊れても……構いませんわ……」

    「……あ……%CALLNAME:MASTER%……キス……」

    %CALLNAME:TARGET%は二つの快楽に耐えながら、%CALLNAME:MASTER%に唇を求めた。

    「んちゅ……ん……」

    唇を重ねることで、%CALLNAME:TARGET%は正気を保とうとしている。

    「……好き……ですわ……%CALLNAME:MASTER%……」

    「前も後ろも……貴方に捧げますわ……」

    完璧なメイドは、愛する人の腕の中で蕩けるように微笑んでいた。
