- id: talent_3_1
  content: >-
    「っ……これを……握ればいいのかしら……」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%の一物に手を伸ばした。

    「……本では読んだことがあるけれど……実際に触れるのは……」

    %CALLNAME:TARGET%は顔を赤くしながら、おずおずと手を動かし始めた。

    「……む、むきゅ……熱くて、硬いわ……」

    知識と実体験の差異に、%CALLNAME:TARGET%は戸惑っていた。

    「……あ、こう……動かすの……？」

    %CALLNAME:TARGET%はぎこちなく手を上下させている。

    「……文献には、こうすると気持ち良いと……」

    %CALLNAME:TARGET%は知識を頼りに、手の動きを工夫していた。

    「……どう……？　変じゃない……？」

    不安そうに%CALLNAME:MASTER%の顔を覗き込んだ。

    「……んっ……こんなこと……」

    %CALLNAME:TARGET%は羞恥に顔を染めながら、手を動かし続けている。

    「……あなたのためなら……恥ずかしくない……わけないわ」

    %CALLNAME:TARGET%は正直に認めた。

    「……でも、続けるわ……あなたが望むなら……」

    恥ずかしさを堪えながらも、%CALLNAME:TARGET%は奉仕を続けた。

    「……%CALLNAME:MASTER%……見ないで……」

    %CALLNAME:TARGET%は視線を避けながら、手を動かしていた。

    「……こんな姿……恥ずかしいのよ……」

    しかし、手は止めようとしない。

    「……あなたを……気持ち良くしたいから……」

    小さな声で本音を漏らしながら、%CALLNAME:TARGET%は手を動かし続けた。
