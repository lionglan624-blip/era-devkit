- id: fallback
  content: >-
    「……私が上？　変な体勢なのさ」

    %CALLNAME:人物_フラン%は首を傾げながら、%CALLNAME:MASTER%の上に跨った。

    見下ろす位置にいることに、どこか落ち着かない様子だ。

    「こうすると……%CALLNAME:MASTER%を壊しちゃいそうで、怖いんだけど」

    ゆっくりと腰を下ろすと、%CALLNAME:人物_フラン%は息を呑んだ。

    「んっ……あ……私が動くと……こういう感じになるんだ……」

    悪魔の妹は、未知の感覚に戸惑いながらも興味を示していた。

    「%CALLNAME:MASTER%……動かないでね。私、力の加減がわからないから」

    %CALLNAME:人物_フラン%は真剣な顔で警告した。

    上から相手を押さえつける体勢は、破壊の力を抑えるのが難しい。

    「……でも、こうしてると%CALLNAME:MASTER%のこと、よく見えるのさ」

    %CALLNAME:人物_フラン%がゆっくり腰を揺らすと、不思議そうな顔をした。

    「あ……私が動くと……%CALLNAME:MASTER%の表情、変わるんだ……面白いかも」

    好奇心が、悪魔の妹を動かしていた。

    「……495年、ずっとひとりだったから」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見下ろしながら、ぽつりと呟いた。

    「こうやって誰かの上にいるの、初めてなのさ」

    紅い瞳には、孤独の記憶と新しい体験への興味が混在している。

    %CALLNAME:人物_フラン%が腰を動かすと、小さく喘いだ。

    「んっ……変な感じ……でも、悪くないかも……」

    その言葉は、%CALLNAME:人物_フラン%なりの精一杯の肯定だった。

    「%CALLNAME:MASTER%って、私に上になられて怖くないの……？」

    %CALLNAME:人物_フラン%は不思議そうに問いかけた。

    自分の力を知っているからこそ、相手の無防備さが理解できない。

    「……変な人。でも、嫌いじゃないのさ」

    %CALLNAME:人物_フラン%が試しに腰を落とすと、予想外の快感に目を見開いた。

    「あっ……これ……私が動くと、もっと気持ちいい……かも……」

    悪魔の妹は、新しい遊びに少しずつ夢中になっていった。
  priority: 2
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、今は私の下なのさ」

    %CALLNAME:人物_フラン%は上から見下ろしながら、無邪気に笑った。

    その紅い瞳には、危険な光が宿っている。

    「こうしてると……きゅっとしてドカーン、簡単にできちゃうよ？」

    %CALLNAME:人物_フラン%が腰を下ろすと、不思議そうに首を傾げた。

    「あ……こういう感じなんだ……私が動くと、%CALLNAME:MASTER%が変な顔する……」

    新しい玩具を試すように、悪魔の妹は感覚を確かめていた。

    「コンティニューできないんだよ？　わかってる？」

    %CALLNAME:人物_フラン%は警告するように言いながら、腰を動かした。

    上から押さえつける体勢で、完全に相手を支配している。

    「私がその気になれば、一瞬で壊せるのさ」

    しかし、%CALLNAME:人物_フラン%自身が腰を動かすと、その表情が揺らいだ。

    「んっ……あれ……なんか、頭がぼんやりしてくる……」

    快感に思考が鈍っていくのを、悪魔の妹は不思議そうに感じていた。

    「……面白いのさ、この遊び」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%を見下ろした。

    495年の孤独が生んだ、どこか虚ろな瞳。

    「私が上にいると……全部、私の思い通りになるの」

    %CALLNAME:人物_フラン%が激しく腰を動かすと、快感が押し寄せてきた。

    「あ……ん……壊したいのに、壊したくないって……変な気持ち……」

    破壊の衝動と快楽が混じり合い、悪魔の妹を困惑させていた。

    「%CALLNAME:MASTER%……私の玩具になってくれる？」

    %CALLNAME:人物_フラン%は無邪気に問いかけながら、腰を揺らした。

    その言葉の危険さを、本人は理解していない。

    「壊れるまで遊んであげるのさ……ふふ」

    しかし、快感が押し寄せると、%CALLNAME:人物_フラン%の表情が変わった。

    「んぅ……っ！　や……なにこれ……頭、変になる……壊すつもりだったのに……」

    支配者であるはずの悪魔の妹は、快感に翻弄されていた。
  priority: 1
