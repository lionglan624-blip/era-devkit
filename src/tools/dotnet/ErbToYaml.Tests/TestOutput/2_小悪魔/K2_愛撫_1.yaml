    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の突然の行動に、体を硬直させた。

    「そんなこと……許可してませんけど……！」

    %CALLNAME:人物_小悪魔%は必死に%CALLNAME:MASTER%から逃れようとしている。

    「……悪魔とはいえ、礼儀ってものがありますわ……」

    %CALLNAME:人物_小悪魔%は傷ついた顔で、%CALLNAME:MASTER%を見つめていた。

    「な、何を……！ 離してください！」

    %CALLNAME:人物_小悪魔%は驚きと困惑で顔を歪めている。

