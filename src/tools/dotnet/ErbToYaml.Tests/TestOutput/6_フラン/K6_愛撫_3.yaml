    %CALLNAME:人物_フラン%は恋人の指が自分の中で動くたび、快感に身悶えした。

    ぐちゅぐちゅと淫らな音が二人の間に響く。

    「んっ……はぁ……こんな音……恥ずかしいのさ……」

    顔を赤らめながらも、%CALLNAME:人物_フラン%は逃げようとはしなかった。

    「でも……%CALLNAME:MASTER%にされてると……幸せなの……」

    地下室でひとりだった頃には、想像もできなかった温かさだった。

    「%CALLNAME:MASTER%……私、%CALLNAME:MASTER%の指で一杯になってるよ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手に自分の手を重ねた。

    壊してしまわないように、優しく、確かめるように。

    「ふぁ……あっ……そこ……いいの……」

    %CALLNAME:人物_フラン%の膣内がきゅっと指を締め付けた。

    「私のこと……もっと知って……%CALLNAME:MASTER%だけの私でいたいのさ……」

