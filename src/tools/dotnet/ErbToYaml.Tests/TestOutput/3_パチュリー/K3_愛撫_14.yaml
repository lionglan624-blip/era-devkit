- id: fallback
  content: >-
    「……ん……それを……そこに……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出した小さな器具を見て、頬を染めた。

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の陰核にキャップを被せると、%CALLNAME:TARGET%の体が微かに強張った。

    「……あ……直接……振動が……」

    電源が入り、キャップが振動し始めると、%CALLNAME:TARGET%は目を閉じて身を震わせた。

    「……%CALLNAME:MASTER%……こんな……刺激……頭が……白くなるわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみつき、快感に耐えている。

    「……ひ……ゃ……っ……」

    クリキャップの振動が%CALLNAME:TARGET%の一番敏感な場所を刺激している。

    大図書館の静寂に、%CALLNAME:TARGET%の甘い喘ぎ声が響き渡った。

    「……圧迫されて……振動が……逃げ場がない……」

    %CALLNAME:TARGET%は淡々と分析しようとするが、声が震えて言葉にならない。

    「……%CALLNAME:MASTER%……このままだと……すぐに……」

    潤んだ瞳で懇願するように、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げた。

    「……あ……あぁ……」

    %CALLNAME:TARGET%は読みかけの魔導書を床に落とし、%CALLNAME:MASTER%にすがりついた。

    クリキャップの振動が陰核を直接責め続け、%CALLNAME:TARGET%の理性を蕩かせていく。

    「……こんな小さな道具で……こんなに……感じるなんて……」

    %CALLNAME:TARGET%の体がびくびくと痙攣し、大図書館に甘い声が響いている。

    「……%CALLNAME:MASTER%……私……もう……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の名を呼びながら、快楽の波に飲まれていった。

    「……ん……ふぅ……」

    %CALLNAME:TARGET%はクリキャップの振動に身を委ね、%CALLNAME:MASTER%に寄り添っている。

    陰核への集中した刺激が、%CALLNAME:TARGET%の体を甘く震わせていた。

    「……あなたは……私の弱点を……よく知っているわね……」

    %CALLNAME:TARGET%は恥ずかしそうに目を伏せながらも、逃げようとはしない。

    「……もっと……%CALLNAME:MASTER%の手で……私を……」

    そう呟いて、%CALLNAME:TARGET%は%CALLNAME:MASTER%の腕の中で蕩けていった。
