entries:
- id: fallback
  content: >-
    「あっ……%CALLNAME:MASTER%、それ……なんですか……？　ちっちゃくて黒いの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したニプルキャップを興味深そうに見つめている。

    「えへへ……おっぱいに付けるんですね……あたし、%CALLNAME:MASTER%のためなら頑張るの……」

    %CALLNAME:MASTER%が妖精の小さな乳首にクリップを装着すると、%CALLNAME:TARGET%の体がびくんと震えた。

    「んっ……！　挟まって……あっ、震えてる……！？」

    ニプルキャップが振動を始め、繊細な乳首に絶え間ない刺激を送り込んでいく。

    「やぁっ……%CALLNAME:MASTER%……おっぱいが、びりびりするの……」

    「んぅ……%CALLNAME:MASTER%、あの震えるやつ……また使ってくれるの……？」

    %CALLNAME:TARGET%は期待に満ちた表情で、ニプルキャップを見つめていた。

    「あれ、付けると胸がぽかぽかして……%CALLNAME:MASTER%と一緒だから嬉しいの……」

    ニプルキャップが小さな乳首に装着され、振動が始まる。

    「あっ……んっ……震えてる……おっぱいが、くすぐったくて……気持ちいい……」

    %CALLNAME:TARGET%は恥ずかしそうに身をよじりながら、振動の快感に浸っている。

    「……%CALLNAME:MASTER%のおもちゃで、こんな……幸せなの……」

    「えへへ……あたし、おっぱいにいろいろ付けられるの、慣れてきたかな……」

    %CALLNAME:TARGET%は恥ずかしそうに呟きながら、自分から胸を差し出した。

    ニプルキャップが妖精の乳首に装着され、振動が始まった。

    「んっ……あぁっ……びりびりって……乳首に伝わってくる……」

    小さな体が震え、%CALLNAME:TARGET%は甘い吐息を漏らしている。

    「……%CALLNAME:MASTER%……気持ちいいの……あたし、頑張ってるの……」

    一生懸命に快感を受け止める妖精の姿が、%CALLNAME:MASTER%を見上げていた。

    「あっ……また、してくれるんですね……嬉しいの……」

    %CALLNAME:TARGET%は無邪気に笑いながら、ニプルキャップを受け入れる体勢になった。

    「……んっ、付けて……%CALLNAME:MASTER%の手で……」

    ニプルキャップが乳首に装着され、振動が妖精の体を甘く責め立てる。

    「ひぁっ……！　んぅ……おっぱいが震えて……止まらない……」

    %CALLNAME:TARGET%は体を小刻みに揺らしながら、独特の刺激を味わっている。

    「……%CALLNAME:MASTER%のもので、胸がいっぱい……えへへ……」
  priority: 4
- id: talent_3_1
  content: >-
    「え……そ、それ……おっぱいに……付けるんですか……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したニプルキャップを見て、頬を赤く染めた。

    「……%CALLNAME:MASTER%がしたいなら……あたし、我慢します……」

    ニプルキャップが乳首に装着され、振動が始まった。

    「んっ……！　あっ、震えて……乳首が、びりびりして……！」

    %CALLNAME:TARGET%は涙目になりながら、絶え間ない刺激に耐えていた。

    「……こ、こんなの……おっぱいが、変になっちゃいそうです……」

    「あ、あの……その震えるやつ……また使うんですか……」

    %CALLNAME:TARGET%は緊張した面持ちで、ニプルキャップを見つめている。

    「……おっぱいに……恥ずかしいけど……%CALLNAME:MASTER%のためなら……頑張ります……」

    ニプルキャップが乳首に装着され、振動が始まった。

    「ひゃあっ……！　んっ、やぁっ……乳首が、ずっと震えて……止まらない……！」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕を掴み、必死に耐えている。

    「……%CALLNAME:MASTER%の前で……こんな……恥ずかしいの……」

    「ま、また……あれ、ですか……」

    %CALLNAME:TARGET%は恥ずかしそうに視線を逸らしながら、服の前を開けた。

    ニプルキャップが乳首に装着されると、妖精は小さく身震いした。

    「んぅ……っ……あぁっ……震えて……おっぱいが、じんじんして……」

    振動が続き、%CALLNAME:TARGET%の体がぴくぴくと反応する。

    「やっ……声、出ちゃう……乳首が、ずっと刺激されて……」

    妖精は片手で口を覆いながら、甘い喘ぎを堪えていた。

    「……こういうの、慣れないです……でも……」

    %CALLNAME:TARGET%は覚悟を決めたように目を閉じて、体を%CALLNAME:MASTER%に預けた。

    ニプルキャップが乳首に装着され、振動が始まった。

    「ふぁっ……んっ……！　びりびり……乳首に、ずっと……」

    %CALLNAME:TARGET%は涙を浮かべながら、独特の感覚に翻弄されている。

    「……%CALLNAME:MASTER%が……こうしたいなら……あたし、受け止めます……」

    健気な言葉とともに、妖精は振動の刺激を受け入れた。
