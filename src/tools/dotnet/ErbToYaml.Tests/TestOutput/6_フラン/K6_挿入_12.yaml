    「あっ……ん……変な感じ……でも、気持ちいい……かも……」

    悪魔の妹は、未体験の快楽に戸惑いながらも受け入れ始めていた。

    「ねぇ、%CALLNAME:MASTER%……私のこと、ちゃんと見てる……？」

    %CALLNAME:人物_フラン%は二人に挟まれながら、不安そうに尋ねた。

    もう一人に奪われてしまうのではないか、という恐れが胸をよぎる。

    「私……%CALLNAME:MASTER%だけのものでいたいのに……」

    二人が同時に突き上げると、%CALLNAME:人物_フラン%は甲高い声を上げた。

    「ひゃ……あぁ……っ！　でも……こんなの初めてで……気持ちいい……」

    独占欲と快楽の間で、悪魔の妹は揺れ動いていた。

    「前と後ろ……両方から来ると……すごいね……」

    %CALLNAME:人物_フラン%は呆然としたように呟いた。

    二つの快感が押し寄せるたびに、思考がぼんやりとしていく。

    「これ……癖になっちゃいそうなのさ……」

    %CALLNAME:MASTER%が奥まで突くと、%CALLNAME:人物_フラン%は唇を噛んだ。

    「んっ……ふぅ……%CALLNAME:MASTER%の方が……もっと深いの、分かる……」

    悪魔の妹は、二人の中でも意中の相手を意識していた。

    「あっ……二人の動き……バラバラ……っ」

    %CALLNAME:人物_フラン%は前後から異なるリズムで突かれていた。

    複雑な快感に、少女の理性は早くも揺らぎ始めている。

    「頭……おかしくなっちゃうのさ……%CALLNAME:MASTER%……」

    助けを求めるように恋人を見つめるが、快楽は止まらない。

    「ん……あぁ……でも……こういうの……嫌いじゃない……かも……」

    悪魔の妹は、新しい快楽を受け入れる準備ができつつあった。
