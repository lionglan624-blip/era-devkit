- id: talent_3_1
  content: >-
    「っ……わ、私がこうするの……？」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%の上に身を乗せた。

    「……本では読んだことがあるけれど……実際にするのは……」

    %CALLNAME:TARGET%は顔を赤くしながら、おずおずと腰を動かし始めた。

    「……む、むきゅ……こんなこと……」

    知識と実体験の差異に、%CALLNAME:TARGET%は戸惑っていた。

    「……ん……こ、こうすればいいの……？」

    %CALLNAME:TARGET%はぎこちなく腰を動かしている。

    「……文献には、こうすると気持ち良いと……」

    %CALLNAME:TARGET%は知識を頼りに、動きを工夫していた。

    「……どう……？　変じゃない……？」

    不安そうに%CALLNAME:MASTER%の顔を覗き込んだ。

    「……あなたの中……締め付けてくるわ……」

    %CALLNAME:TARGET%は羞恥に顔を染めながら、腰を動かし続けている。

    「……こんなこと……恥ずかしいわ……」

    %CALLNAME:TARGET%は正直に認めた。

    「……でも、続けるわ……あなたが望むなら……」

    恥ずかしさを堪えながらも、%CALLNAME:TARGET%は奉仕を続けた。

    「……%CALLNAME:MASTER%……見ないで……」

    %CALLNAME:TARGET%は視線を避けながら、腰を動かしていた。

    「……こんな姿……恥ずかしいのよ……」

    しかし、体は止めようとしない。

    「……あなたを……気持ち良くしたいから……」

    小さな声で本音を漏らしながら、%CALLNAME:TARGET%は動きを続けた。
