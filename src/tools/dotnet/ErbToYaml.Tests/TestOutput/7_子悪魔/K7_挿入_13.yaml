    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見下ろしながら、ゆっくりとお尻を揺らしている。

    悪魔の少女の頬が染まり、恥ずかしそうに目を逸らした。

    「%CALLNAME:MASTER%……あたしのおしり、みてる……？　どきどき、する……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に手を置き、支えにした。

    「あたし……おしりでも、%CALLNAME:MASTER%と、こうしてると……しあわせ……」

    感情と本能が混ざり合い、%CALLNAME:TARGET%は%CALLNAME:MASTER%を求めていた。

    「はぁ……ふぁ……おしりでうごくと……きもちいい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上で、自分のペースでお尻を動かしている。

    サキュバスの血が騒ぎ、お尻の快感は次第に強くなっていった。

    「あっ……おしりなのに……%CALLNAME:MASTER%のこと……もっと、ほしい……」

    %CALLNAME:TARGET%は自分でも驚いたように呟いた。

    「なんで……あたし、おしりでも……こんなに、%CALLNAME:MASTER%がすきなの……？」

    困惑しながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%から離れられないでいた。
