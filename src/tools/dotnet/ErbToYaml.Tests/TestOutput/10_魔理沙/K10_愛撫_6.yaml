    「……もう、お前には敵わないぜ」

    %CALLNAME:人物_魔理沙%は観念したように、恋人の胸に顔を埋めた。

    「……ん、もっと触っていいぜ」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに、でも嬉しそうに呟いた。

    %CALLNAME:MASTER%の手が優しく乳房を撫でると、%CALLNAME:人物_魔理沙%は安心したように目を閉じた。

