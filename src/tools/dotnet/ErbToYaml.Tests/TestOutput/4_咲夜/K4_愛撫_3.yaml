- id: fallback
  content: >-
    「っ……指を……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の行為に驚きを隠せなかった。

    「……%CALLNAME:MASTER%、これは流石に……」

    しかし、完全には拒絶しない。

    「……っ……」

    %CALLNAME:TARGET%は唇を噛みしめ、声を堪えた。

    「……今回だけですわよ……」

    「あ……その……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指が中に入ってくるのを感じ、体を強張らせた。

    「……メイドとして、このような行為は……」

    そう言いながらも、%CALLNAME:TARGET%の声は厳しさを欠いていた。

    「……まあ、お客様のおもてなしも……」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:TARGET%は複雑な表情で%CALLNAME:MASTER%を見つめた。

    「このようなことをなさると……お嬢様に報告しなければ……」

    言葉とは裏腹に、%CALLNAME:TARGET%は動かない。

    「……っ……」

    %CALLNAME:MASTER%の指が動くと、%CALLNAME:TARGET%は小さく声を漏らした。

    「……見逃して差し上げますわ。今回だけ……」

    「……っ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指に、僅かに体を震わせた。

    「……驚かさないでくださいまし」

    %CALLNAME:TARGET%は落ち着いた声で言いながらも、少し動揺している。

    「……そんなところまで……」

    %CALLNAME:TARGET%は困惑した表情を浮かべながらも、抵抗はしなかった。
  priority: 2
- id: fallback
  content: >-
    「……何をなさるつもりですか」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見た。

    「紅魔館のメイド長に、このような行為を……」

    %CALLNAME:TARGET%の声は静かだが、有無を言わせぬ威圧感がある。

    「……っ」

    しかし、体の反応までは制御できなかった。

    「……次はありませんわよ」

    「っ……失礼ですわね」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を睨みつけた。

    「私に触れる権利が、貴方にあるとでも？」

    %CALLNAME:TARGET%は毅然とした態度を崩さない。

    「……お嬢様にお仕えする身として、このような侮辱は……」

    「……っ」

    言葉が途切れ、%CALLNAME:TARGET%は唇を強く噛んだ。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%を見据えた。

    その視線には、軽蔑の色が滲んでいる。

    「お客様。紅魔館のメイド長に手を出すのは、賢明ではありませんわ」

    「……早く済ませてくださいまし」

    %CALLNAME:TARGET%は諦めたように目を閉じた。

    「……正気ですか」

    %CALLNAME:TARGET%は信じられないものを見るような目で%CALLNAME:MASTER%を見た。

    「時を止めれば、貴方の存在など一瞬で消せますのに」

    %CALLNAME:TARGET%は冷ややかに言い放った。

    「……っ……」

    しかし、体は正直に快感を感じ始めている。

    「……今回は見逃して差し上げますわ。二度目はありませんから」
  priority: 1
