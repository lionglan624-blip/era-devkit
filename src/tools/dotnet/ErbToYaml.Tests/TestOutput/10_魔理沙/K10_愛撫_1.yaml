  content: >-
    「えっ……ちょ、ちょっと待て%CALLNAME:MASTER%！」

    %CALLNAME:人物_魔理沙%は慌てて脚を閉じようとした。

    「そ、そこを舐めるって……本気か？」

    %CALLNAME:人物_魔理沙%は信じられないという顔で%CALLNAME:MASTER%を見た。

    「……き、汚いし……恥ずかしいんだが……」

    %CALLNAME:人物_魔理沙%は困惑しながらも、強く拒絶はしなかった。

    「んっ……や、やめ……っ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の行動に動揺している。

    「こ、こういうの、急すぎないか……？」

    %CALLNAME:人物_魔理沙%は顔を赤くしながら抗議した。

    「……もうちょっと、心の準備とか……」

    その言葉とは裏腹に、体は%CALLNAME:MASTER%を受け入れ始めていた。

    「あ……そ、そんなところ……」

    %CALLNAME:人物_魔理沙%は恥ずかしさに顔を覆った。

    「%CALLNAME:MASTER%、なんでそんなこと……」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、%CALLNAME:MASTER%を見つめた。

    「……も、もう……勝手にしろよ……」

    羞恥に耐えかねて、%CALLNAME:人物_魔理沙%は観念した。

    「ひゃっ……冷たい……いや、熱い……？」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の舌の感触に戸惑っている。

    「……こんなこと、誰にも言うなよ……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに%CALLNAME:MASTER%を睨んだ。

    「……まったく、%CALLNAME:MASTER%は何を考えてるんだぜ……」

    呆れたような声だが、%CALLNAME:人物_魔理沙%は逃げ出そうとはしなかった。
