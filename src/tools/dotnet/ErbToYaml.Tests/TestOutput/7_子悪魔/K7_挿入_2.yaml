    「%CALLNAME:MASTER%……ゆっくり、おくまで……きて……？」

    愛する者のために全てを捧げようと、%CALLNAME:TARGET%は%CALLNAME:MASTER%を受け入れていた。

    「んぅ……%CALLNAME:MASTER%、おしりの中……いっぱい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と正面から向き合いながら、腸内の感覚に耐えている。

    悪魔の少女の表情は、痛みと快楽が入り混じっていた。

    「あたしね……%CALLNAME:MASTER%のためなら……どこでもいいの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の首に腕を回し、しがみついた。

    「だから……もっと、おくまで……あたしのこと、つかって……？」

    サキュバスの献身と愛が混ざり合い、%CALLNAME:TARGET%は甘く%CALLNAME:MASTER%を求めていた。

    「ふぁ……おしり、すごい……%CALLNAME:MASTER%の、ぜんぶ入ってる……」

    %CALLNAME:TARGET%は正面から%CALLNAME:MASTER%を受け止め、荒い息を吐いている。

    悪魔の少女の腸内は%CALLNAME:MASTER%を強く締め付け、離すまいとしていた。

    「んっ……きもちいい……まえとちがうけど……これもすき……」

    %CALLNAME:TARGET%は恍惚とした表情で、%CALLNAME:MASTER%を見つめた。

    「ね……%CALLNAME:MASTER%も、きもちいい……？　えへへ……」

    無邪気な笑顔と悪魔の色香が混じり合い、%CALLNAME:TARGET%は%CALLNAME:MASTER%を誘っていた。
