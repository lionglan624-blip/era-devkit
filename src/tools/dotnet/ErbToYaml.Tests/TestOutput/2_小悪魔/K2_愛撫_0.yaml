    「……いいですわよ、もっと……私を感じさせてくださいな……」

    悪魔らしい妖艶な笑みを浮かべて、%CALLNAME:人物_小悪魔%はそう囁いた。

    「ひゃぁっ……くすぐったいですわ……」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の脇腹をそっと撫でた。

    %CALLNAME:人物_小悪魔%は身をよじりながらも、嬉しそうに笑っている。

    「もう……%CALLNAME:MASTER%ったら、いじわるなんですから……」

    「……でも、嫌じゃないですわ……むしろ、もっとしてほしい……かも……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに目を逸らしながら、そう呟いた。

    「んぅ……%CALLNAME:MASTER%の手、あったかい……」

    %CALLNAME:人物_小悪魔%は目を細めて、%CALLNAME:MASTER%の手に頬を寄せた。

    「悪魔って、案外寒がりなんですのよ……知ってました？」

    くすくすと笑いながら、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に甘えている。

    「……ふふ、嘘ですけど……%CALLNAME:MASTER%に触られたいだけですわ……」

    %CALLNAME:人物_小悪魔%は悪戯っぽく舌を出して、幸せそうに笑った。
