    「や、やめなさいよ……あたいは最強なんだから……っ」

    %CALLNAME:人物_チルノ%の威嚇も、今は説得力を欠いていた。

    「な……っ！　いきなりこんなことして……！」

    %CALLNAME:人物_チルノ%は正面から組み伏せられ、動けなくなっている。

    「あたいを誰だと思ってんの……凍らせるわよ……！」

    しかし、冷気を放つ余裕もないようだ。

    「……っ、怖くなんか……ないし……」

    強がりを言うが、%CALLNAME:人物_チルノ%の目には不安の色が浮かんでいた。

    「や、やめ……っ！」

    %CALLNAME:人物_チルノ%は必死に抵抗するが、力が入らない。

    「こんなの……こんなの反則だよ……！」

    %CALLNAME:人物_チルノ%の目には涙が滲んでいる。

    「……っ、あたいは……最強なのに……」

    いつもの自信満々な態度はなく、%CALLNAME:人物_チルノ%は怯えていた。

    「……」

    %CALLNAME:人物_チルノ%は無言で%CALLNAME:MASTER%を睨みつけている。

    「あんた……後で絶対許さないから……」

    声は震えているが、瞳には強い意志が宿っている。

    「……覚えてなさいよ、絶対に仕返ししてやるんだから」

