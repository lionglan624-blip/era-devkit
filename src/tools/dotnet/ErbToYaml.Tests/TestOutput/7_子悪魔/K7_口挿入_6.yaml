- id: talent_3_1
  content: >-
    「え、えっと……%CALLNAME:MASTER%のここを……触ればいいんですか……？」

    %CALLNAME:TARGET%は顔を真っ赤にしながら、恐る恐る手を伸ばした。

    「こ、こうですか……？　んっ……」

    小さな指が%CALLNAME:MASTER%の秘部に触れ、ぎこちなく動く。

    「……%CALLNAME:MASTER%のこんなとこ、触っちゃってます……」

    %CALLNAME:TARGET%は恥ずかしそうにしながらも、指を止めなかった。

    「……好きだから……頑張ります……」

    「あ、あたしが……%CALLNAME:MASTER%のおしりを……？」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%の後ろに回った。

    「こ、こうやって……撫でるんですよね……？」

    細い指先がおずおずと%CALLNAME:MASTER%の窄まりに触れる。

    「んっ……%CALLNAME:MASTER%、動かないでくださいね……」

    %CALLNAME:TARGET%は真剣な顔で、丁寧に愛撫した。

    「……気持ちよく……なってくれるといいな……」

    「%CALLNAME:MASTER%……あの……」

    %CALLNAME:TARGET%は躊躇いながらも、%CALLNAME:MASTER%の秘部に指を這わせた。

    「こ、こんなこと……恥ずかしいですけど……」

    ぎこちない手つきで、しかし丁寧に愛撫を続ける。

    「%CALLNAME:MASTER%が望むなら……あたし……」

    %CALLNAME:TARGET%は頬を染めながら、一生懸命指を動かした。

    「……上手にできてますか……？」

    %CALLNAME:TARGET%は緊張した面持ちで%CALLNAME:MASTER%に近づいた。

    「……あたしでいいなら……触らせてください……」

    小さな手が震えながらも、%CALLNAME:MASTER%の秘部を撫で始める。

    「んっ……こう……ゆっくり……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を気にしながら、指を動かした。

    「……%CALLNAME:MASTER%のこと、もっと知りたいです……」

    「……だから……こういうのも……頑張ります……」
