- id: fallback
  content: >-
    「え……えっと……それ、何に使うんですか……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したアナルバイブを不思議そうに見つめた。

    「……お、お尻に……入れる……？　ほ、本当ですか……？」

    おずおずと四つん這いになると、アナルバイブが菊座に押し当てられる。

    「ひっ……！　ふぇっ……！？　な、何か……入ってきて……！」

    アナルバイブが肛門に挿入され振動が始まった瞬間、%CALLNAME:TARGET%は驚きのあまり体を強張らせた。

    「あ、あの……お尻の中が……震えてる……初めてで……怖いです……」

    「そ、それを……あたしの……お尻に……入れるんですか……？」

    %CALLNAME:TARGET%は不安そうに%CALLNAME:MASTER%を見上げた。

    「……%CALLNAME:MASTER%が言うなら……」

    覚悟を決めて目を閉じると、アナルバイブが肛門にゆっくりと挿入された。

    「んっ……！　ひぁっ……こ、これ……お尻の中で……振動して……！」

    初めての感覚に戸惑いながら、%CALLNAME:TARGET%は小さく震えていた。

    「……優しく……してくださいね……お願いします……」

    「あの……そういう道具……あたし、苦手で……」

    %CALLNAME:TARGET%は怯えた目でアナルバイブを見つめている。

    しかし%CALLNAME:MASTER%に促され、渋々ながら体を預けた。

    「んぅ……っ……やっ……入って……お尻の中に、何かある……変な感じ……」

    振動に翻弄され、%CALLNAME:TARGET%の体が小刻みに震える。

    「あぅ……止まらない……お尻の中から……ずっと……」

    妖精は困惑しながらも、%CALLNAME:MASTER%を信じて耐えていた。

    「……%CALLNAME:MASTER%には……あたしは逆らいません……」

    %CALLNAME:TARGET%は観念したように呟いて、アナルバイブを受け入れる体勢を取った。

    アナルバイブが肛門に挿入され、振動が妖精の体を内側から刺激する。

    「ふぁっ……んっ……！　こ、こんなの……初めてです……」

    %CALLNAME:TARGET%は目を閉じて、未知の感覚に身を委ねている。

    「……%CALLNAME:MASTER%が……喜んでくれるなら……」

    小さな声でそう言って、妖精は健気にアナルバイブの刺激に耐えた。
