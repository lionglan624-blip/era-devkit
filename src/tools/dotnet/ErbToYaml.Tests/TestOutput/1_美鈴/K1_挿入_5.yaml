- id: fallback
  content: >-
    「え……わ、私が上に乗るんですか……？」

    %CALLNAME:人物_美鈴%は困惑した表情で%CALLNAME:MASTER%を見た。

    「こ、こうすればいいんですか……？」

    %CALLNAME:人物_美鈴%はおずおずと%CALLNAME:MASTER%の上に跨った。

    「……んっ……自分で動くの、よくわからなくて……」

    ぎこちない動きで、%CALLNAME:人物_美鈴%は腰を揺らし始めた。

    「……これで……いいんでしょうか……」

    「あ……ん……っ……」

    %CALLNAME:人物_美鈴%は思わず声を漏らし、慌てて口を押さえた。

    「す、すみません……自分で動くと、声が……」

    顔を真っ赤にしながら、%CALLNAME:人物_美鈴%は謝った。

    「……%CALLNAME:MASTER%は……この体勢が、お好みなんですか……」

    戸惑いながらも、%CALLNAME:人物_美鈴%は言われた通りに動き続けた。

    「……っ……上からだと……すごく、深くて……」

    %CALLNAME:人物_美鈴%は苦しそうに息を吐いた。

    「……私が動くのって……変な感じです……」

    %CALLNAME:人物_美鈴%は困ったように眉を下げた。

    「……%CALLNAME:MASTER%……私のこと、どう思ってるんですか……」

    不安そうな瞳が、答えを求めていた。

    「……ん……」

    %CALLNAME:人物_美鈴%は静かに腰を動かしていた。

    「……上からだと……%CALLNAME:MASTER%の顔、よく見えますね……」

    %CALLNAME:人物_美鈴%はぽつりと呟いた。

    「……なんだか……こうしてると……」

    「……悪くない、気がします……」

    複雑な感情を抱えながらも、%CALLNAME:人物_美鈴%は動きを止めなかった。
