entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%の指、中に入れるの？」

    %CALLNAME:人物_フラン%は期待に瞳を潤ませながら、%CALLNAME:MASTER%を見上げた。

    「いいよ……フランの全部、%CALLNAME:MASTER%だけのものなのさ」

    %CALLNAME:MASTER%の指がゆっくりと%CALLNAME:人物_フラン%の中に沈んでいく。

    「あっ……んぅっ……入ってくる……」

    七色の翼がびくびくと震え、宝石のような輝きを放っている。

    「%CALLNAME:MASTER%……ずっと、この感覚……覚えてるね……」

    495年の孤独を知る少女は、%CALLNAME:MASTER%の指に全てを委ねた。

    「……ふふ、%CALLNAME:MASTER%の指、あったかいね」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の指が中に入る感触を味わっている。

    「んっ……あぁ……奥まで、来てる……」

    金色の髪が揺れ、紅い瞳が蕩けるように細められた。

    「壊れそうなくらい……気持ちいいのさ……」

    %CALLNAME:人物_フラン%の中は、%CALLNAME:MASTER%の指を優しく締め付けている。

    「でもね……%CALLNAME:MASTER%に壊されるなら……いいかも」

    無邪気な声が、甘い吐息に変わっていった。

    「あっ……指が……中で動いてる……」

    %CALLNAME:MASTER%は%CALLNAME:人物_フラン%の中で指を動かしている。

    %CALLNAME:人物_フラン%は快楽に身を震わせながら、%CALLNAME:MASTER%にしがみついた。

    「……もっと……もっと奥まで……」

    「お姉様には内緒だよ？ こんなの見られたら……嫉妬しちゃうから」

    %CALLNAME:人物_フラン%は悪戯っぽく笑いながらも、腰を揺らしている。

    「%CALLNAME:MASTER%の指……フランの形、覚えてね……」

    狂気と純粋さが入り混じる少女は、%CALLNAME:MASTER%に全てを明け渡した。

    「んぁっ……そこ……いい……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_フラン%の中の敏感な場所を探り当てた。

    「はぁっ……あ……壊れちゃう……違う意味で、壊れちゃいそう……」

    %CALLNAME:人物_フラン%は涙目で%CALLNAME:MASTER%を見つめた。

    七色の翼が興奮で大きく広がり、部屋を彩っている。

    「%CALLNAME:MASTER%……永遠に……フランの中にいて……」

    「……%CALLNAME:MASTER%だけだよ、こんな気持ちにさせてくれるの」

    地下室の孤独を知る少女は、今、%CALLNAME:MASTER%の温もりの中にいた。
