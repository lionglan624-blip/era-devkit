- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……失礼いたしますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を寄せ、そっと唇を近づけた。

    瀟洒なメイドの舌が%CALLNAME:MASTER%の乳首を舐め上げると、甘い痺れが走った。

    「んっ……ちゅ……%CALLNAME:MASTER%の体……とても温かいですわ……」

    %CALLNAME:TARGET%は恋人の胸に頬を寄せながら、乳首を吸い続けている。

    「こうしていると……時を止めることも忘れてしまいますの……」

    %CALLNAME:TARGET%は恥じらいながらも、恋人だけに見せる表情で囁いた。

    「……もっと……甘えてもよろしいですか……？」

    「……んっ……ちゅぷ……」

    %CALLNAME:TARGET%の口が%CALLNAME:MASTER%の乳首を咥え、優しく吸い上げている。

    完璧なメイドは%CALLNAME:MASTER%の腕の中で、すっかり甘えた表情を見せていた。

    「%CALLNAME:MASTER%……こうしていると、赤ちゃんみたいですわね……」

    %CALLNAME:TARGET%は恥ずかしそうに微笑みながら、舌先で乳首を転がしている。

    「……貴方の温もりに包まれていると……安心いたしますの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋めたまま、幸せそうに呟いた。

    「……いつか、本当に母親になれたら……素敵ですわね……」

    「……れろ……んっ……」

    %CALLNAME:TARGET%の舌が%CALLNAME:MASTER%の突起を丁寧に舐め回している。

    時折甘噛みしながら、%CALLNAME:MASTER%の反応を窺っていた。

    「……%CALLNAME:MASTER%……気持ちいいですか……？」

    %CALLNAME:TARGET%は上目遣いで%CALLNAME:MASTER%を見つめている。

    「お嬢様のティータイムまで……まだ時間がありますわ……」

    そう言いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%から離れようとしない。

    「……もう少しだけ……こうさせてくださいまし……」

    「……ふぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の乳首を吸いながら、蕩けた表情を見せている。

    「……貴方を感じていると……体の奥が……」

    %CALLNAME:TARGET%は恥ずかしそうに言葉を濁した。

    「……疼いてしまいますの……」

    %CALLNAME:TARGET%の舌が乳首を弄ぶたび、%CALLNAME:MASTER%の体に甘い快感が走る。

    「もっと……もっと吸わせてくださいまし……」

    瀟洒なメイドは恋人の前で、すっかり甘えた声を出していた。
