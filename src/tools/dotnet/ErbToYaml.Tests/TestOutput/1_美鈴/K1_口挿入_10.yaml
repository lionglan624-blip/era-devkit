    「……でも……%CALLNAME:MASTER%のためなら……」

    %CALLNAME:人物_美鈴%は勇気を出すように深呼吸した。

    「……私だって、こういうこと……したいって思うの」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の目を見て、はっきりと言った。

    「……%CALLNAME:MASTER%に……喜んでもらいたいから」
