character: パチュリー
situation: K3_挿入
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、こっちに来て」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を手招きし、向かい合って座った。

    大図書館の静寂の中、二人は互いの膝の上で絡み合う。

    「……んっ……座ったまま、挿入って……顔が、近い……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の肩に手を置き、腰を沈めた。

    「……この体位、本で読んだわ……密着感が高いのよね」

    「はぁ……ん……っ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と向かい合いながら、静かに喘いでいる。

    胡坐をかいた%CALLNAME:MASTER%の上で、%CALLNAME:TARGET%は身を委ねている。

    「……この体勢、体力的には楽よ……支えてもらえるから」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の首に腕を回した。

    「……あなたの体温が、直接伝わってくる……悪くないわ」

    「ぁ……やぁ……顔が近いから、恥ずかしい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と目が合い、頬を紅く染めた。

    向かい合って座る体位は、互いの表情がよく見える。

    「……%CALLNAME:MASTER%……キスして……そうすれば、視線が……」

    %CALLNAME:TARGET%は照れ隠しのように唇を求めた。

    「……んっ……こうしていると、あなたと一つになれた気がする……」

    「……ふぅ……あ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に抱きつきながら、満ち足りた表情を浮かべている。

    「……対面座位というのは、心臓の音が聞こえるのね」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に耳を当てた。

    「……あなたの鼓動、早くなっている……私のせいかしら」

    そう言って、%CALLNAME:TARGET%は満足げに微笑んだ。
  priority: 4
- id: talent_3_1
  content: >-
    「……っ……向かい合って、座るの……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と向かい合いながら、顔を真っ赤にしている。

    「……顔が、近すぎる……恥ずかしいわ……」

    %CALLNAME:TARGET%は目を逸らしながらも、%CALLNAME:MASTER%の上に腰を下ろした。

    「……んっ……入って……この体位だと、深く感じる……」

    密着した体勢に、%CALLNAME:TARGET%は動揺を隠せない。

    「んっ……ふ……あ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに、小さく喘いでいる。

    「……本では、この体位は親密さが高いと書いてあったけれど……」

    %CALLNAME:TARGET%は知識と実感を照らし合わせようとしている。

    「……こんなに、心臓が……むきゅ……落ち着かない……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみついた。

    「あ……やぁ……そんなに見ないで……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と目が合い、慌てて目を閉じた。

    「……この体位、表情が丸見えなのよ……」

    %CALLNAME:TARGET%は羞恥に頬を染めながら、顔を逸らそうとする。

    「……%CALLNAME:MASTER%、キスして……そうすれば、目を閉じていられるから……」

    照れ隠しのように、%CALLNAME:TARGET%は唇を求めた。

    「……ん……ぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に抱きしめられながら、静かに喘いでいる。

    「……この体位、体力的には楽なのだけれど……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋めた。

    「……心臓の音が聞こえる……あなたのも、私のも……」

    そう呟いて、%CALLNAME:TARGET%は%CALLNAME:MASTER%に身を委ねた。
