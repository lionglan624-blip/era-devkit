- id: fallback
  content: >-
    「……何をさせようというのですか」

    %CALLNAME:TARGET%は冷たい声で%CALLNAME:MASTER%を制した。

    「紅魔館のメイドに、そのような無礼を強いるおつもり？」

    %CALLNAME:TARGET%の手には、いつの間にかナイフが握られていた。

    「お嬢様のお客様であっても、容赦はしませんわよ」

    瀟洒なメイドの瞳は、冷ややかに%CALLNAME:MASTER%を見据えている。

    「……次はありませんわ」

    「っ……失礼ですわね」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%から距離を取った。

    「私にそのような奉仕をさせる権利が、貴方にあるとでも？」

    %CALLNAME:TARGET%は冷たい視線を%CALLNAME:MASTER%に向けている。

    「時を止めて首を刎ねることなど、造作もありませんのよ」

    %CALLNAME:TARGET%は静かに警告した。

    「……お嬢様にご報告しますわ」

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の要求を無視した。

    「お客様。紅魔館のメイド長にそのような奉仕を強いるのは、賢明ではありませんわね」

    %CALLNAME:TARGET%の声は静かだが、有無を言わせぬ威圧感がある。

    「お嬢様のお怒りを買いたくなければ、今すぐお引き取りを」

    瀟洒なメイドは、完璧な作り笑いを浮かべていた。

    「……は？」

    %CALLNAME:TARGET%は信じられないものを見るような目で%CALLNAME:MASTER%を見た。

    「正気ですか？　メイド長の私に、そのような真似を」

    %CALLNAME:TARGET%は冷ややかに笑った。

    「貴方の時間を止めて、永遠にこのままにすることも可能ですのよ」

    「……今回は見逃して差し上げますわ。二度目はありませんから」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を睨みつけながら、その場を立ち去ろうとした。
  priority: 1
