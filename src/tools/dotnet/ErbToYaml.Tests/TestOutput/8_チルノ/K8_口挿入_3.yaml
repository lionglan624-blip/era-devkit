character: チルノ
situation: K8_口挿入
entries:
- id: fallback
  content: >-
    「ふふん、%CALLNAME:MASTER%！　あたいの太ももで気持ちよくしてあげるわ！」

    %CALLNAME:人物_チルノ%は自信満々に%CALLNAME:MASTER%の上に跨った。

    小さな体が%CALLNAME:MASTER%の一物を太ももで挟み込むと、ひんやりとした冷たさが伝わってくる。

    「んしょ、んしょ……こうやって動かせばいいのよね？」

    %CALLNAME:人物_チルノ%は得意げに腰を前後に動かし始めた。

    氷の妖精らしい冷たい肌が熱い肉棒を挟み、独特の心地よさを生み出していく。

    「ほら、気持ちいいでしょ？　最強のあたいがしてあげてるんだから！」

    威勢よく言いながらも、%CALLNAME:人物_チルノ%の頬は少し赤い。

    「えへへ……%CALLNAME:MASTER%、あたいの足で挟んであげるね」

    %CALLNAME:人物_チルノ%は嬉しそうに笑いながら、%CALLNAME:MASTER%の上に座った。

    冷たい太ももが熱い肉棒を包み込むと、その温度差が心地よい刺激となる。

    「あたいの足、冷たいでしょ？　でも、%CALLNAME:MASTER%のここ、すっごく熱いの」

    %CALLNAME:人物_チルノ%は不思議そうに見つめながら、ゆっくりと腰を動かした。

    「……こうすると、もっと熱くなるね……」

    ぐちゅ、と音を立てて一物が太ももの間を擦る。

    「%CALLNAME:MASTER%の気持ちいい顔、見てるの好きなんだ……えへへ」

    「ほら、あたいに任せなさい！」

    %CALLNAME:人物_チルノ%は張り切って%CALLNAME:MASTER%の一物に太ももを押し当てた。

    氷の妖精らしいひんやりとした肌が、熱を帯びた肉棒を挟み込む。

    「んー……上手くできてるかな？　ねえ、気持ちいい？」

    %CALLNAME:人物_チルノ%は確認するように%CALLNAME:MASTER%を見下ろした。

    ぬる、と一物が太ももの間を滑り、%CALLNAME:人物_チルノ%の秘部にも触れる。

    「ひゃっ……な、なんか変な感じ……でも、あたいにかかれば楽勝だから！」

    そう言いながら、%CALLNAME:人物_チルノ%は一生懸命に腰を動かし続けた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は珍しくおとなしく、%CALLNAME:MASTER%の上に跨っている。

    小さな太ももが%CALLNAME:MASTER%の一物をそっと挟むと、その冷たさが心地よい。

    「……こうやって%CALLNAME:MASTER%と繋がってると、なんか落ち着くの」

    %CALLNAME:人物_チルノ%は恥ずかしそうに呟きながら、ゆっくりと腰を動かした。

    ぐちゅ、ぐちゅと湿った音が響き、%CALLNAME:人物_チルノ%の顔が赤くなる。

    「あたいも……%CALLNAME:MASTER%のこと、大好きだからね……」

    いつもの威勢のいい態度はなりを潜め、甘えたような声で囁いた。
  priority: 4
- id: talent_3_1
  content: >-
    「え……す、素股……？　足で挟むってこと……？」

    %CALLNAME:人物_チルノ%は戸惑いながらも、%CALLNAME:MASTER%の一物を見つめた。

    「……わ、わかったわよ。やってあげる！」

    意を決したように、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上に跨った。

    ひんやりとした太ももが一物に触れると、%CALLNAME:人物_チルノ%の顔が赤くなる。

    「ひゃっ……熱い……。こ、こうすればいいの？」

    恐る恐る腰を動かしながら、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の顔色を窺った。

    「んっ……なんか、あたいも変な感じ……」

    「あっ……そ、その……」

    %CALLNAME:人物_チルノ%は真っ赤な顔で%CALLNAME:MASTER%の上に座っている。

    「べ、別にやりたくてやってるわけじゃないんだからね！」

    そう言いながらも、%CALLNAME:人物_チルノ%は太ももを一物に押し当てた。

    ぐちゅ、と湿った音が響き、%CALLNAME:人物_チルノ%は顔を赤くした。

    「……%CALLNAME:MASTER%が喜ぶなら……まあ、やってあげてもいいけど」

    照れ隠しにそっぽを向きながら、%CALLNAME:人物_チルノ%は腰を動かし続けた。

    「……ちゃんと気持ちよくなってよね」

    「んっ……こ、こうかな……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに%CALLNAME:MASTER%の一物を太ももで挟んでいる。

    冷たい肌が熱い肉棒を包み込み、ゆっくりと上下に擦れる。

    「あたいだって……こういうの、できないわけじゃないんだから」

    強がりを言いながらも、その動きはぎこちない。

    「……ど、どう？　気持ちいい……よね？」

    %CALLNAME:人物_チルノ%は不安げに%CALLNAME:MASTER%を見つめた。

    ぬるり、と一物が動くたび、%CALLNAME:人物_チルノ%も小さく声を上げている。

    「……%CALLNAME:MASTER%のせいだからね」

    %CALLNAME:人物_チルノ%は困ったような顔で呟いた。

    「あたいがこんなことしてるのは……全部%CALLNAME:MASTER%のせいなんだから」

    文句を言いながらも、%CALLNAME:人物_チルノ%は太ももで一物を挟み続けている。

    ひんやりとした肌が肉棒を優しく包み込む。

    「……でも、%CALLNAME:MASTER%のためなら……やってあげる」

    %CALLNAME:人物_チルノ%は恥ずかしそうに俯きながら、腰を動かし続けた。

    「……あたいも、ちょっと気持ちいいかも……なんて」
