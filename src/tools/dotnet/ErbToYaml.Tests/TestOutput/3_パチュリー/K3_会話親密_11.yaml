    %CALLNAME:人物_パチュリー%は戸惑いながらも、%CALLNAME:MASTER%の愛撫から逃げようとはしなかった。

    「……なんで、こんなところで……感じるの……」

    %CALLNAME:人物_パチュリー%は自分の体の反応に困惑している様子だった。

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の後ろの穴に指を這わせた。

    「あっ……や……そこは……」

    %CALLNAME:人物_パチュリー%は体を強張らせながらも、%CALLNAME:MASTER%を受け入れている。

    「んっ……はぁ……恥ずかしい……」

    %CALLNAME:人物_パチュリー%は頬を染め、%CALLNAME:MASTER%から視線を逸らした。

    「……あなたになら……少しだけ……許してあげるわ……」

    「んっ……あ……%CALLNAME:MASTER%……」

    %CALLNAME:人物_パチュリー%は%CALLNAME:MASTER%の愛撫に、小さく声を漏らしている。

    「後ろの穴なんて……こんなの、初めてよ……」

    %CALLNAME:人物_パチュリー%は戸惑いながらも、その体は快感に震えている。

    「……知識として、調べてみるのも……悪くないかもしれないわね……」

    %CALLNAME:人物_パチュリー%は照れ隠しのように知的な言い訳をした。
