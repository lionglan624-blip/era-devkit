    %CALLNAME:TARGET%は戸惑いながら、%CALLNAME:MASTER%のものを手に取った。

    「えっと……上下に動かせばいいんですよね……？」

    ぎこちない手つきで、%CALLNAME:TARGET%は見よう見まねで扱き始めた。

    「……熱い……なんか、すごい……」

    初めての感触に%CALLNAME:TARGET%は困惑しながらも、手を動かし続けている。

    「……%CALLNAME:MASTER%……あたし、ちゃんとできてますか……？」

    「……はい……やります……」

    %CALLNAME:TARGET%は緊張した面持ちで%CALLNAME:MASTER%の前に跪いた。

    「あの……優しくしてくださいね……？　あたし、怖いので……」

