- id: fallback
  content: >-
    「――……何？　お茶？」

    %CALLNAME:人物_パチュリー%は本から目を離さずにそう言った。

    「……まあ、いいわ。置いておいて」

    湯飲みを受け取ると、%CALLNAME:人物_パチュリー%はすぐに本に視線を戻した。

    「……邪魔しないで。読書に集中したいの」

    「――……」

    %CALLNAME:人物_パチュリー%は黙って湯飲みを受け取った。

    ちらりと中身を確認してから、小さく口をつける。

    「……ふぅん。まあ、飲めるわね」

    素っ気なく言うと、%CALLNAME:人物_パチュリー%は再び本に没頭し始めた。

    「――……お茶？」

    %CALLNAME:人物_パチュリー%は本のページをめくる手を止めずに言った。

    「……そこに置いておいて。後で飲むわ」

    %CALLNAME:MASTER%が湯飲みを置くと、%CALLNAME:人物_パチュリー%はちらりとだけ視線を向けた。

    「……ありがとう、とは言っておくわ」

    そう言うと、%CALLNAME:人物_パチュリー%はまた本に視線を落とした。

    「――……」

    %CALLNAME:人物_パチュリー%は無言で湯飲みを受け取った。

    本を読みながら、片手で湯飲みを口元に運ぶ。

    「……ん」

    特に感想も述べず、%CALLNAME:人物_パチュリー%は淡々とお茶を飲んでいる。

    読書の邪魔をされたくないという意思が、その態度から伝わってきた。
  priority: 1
