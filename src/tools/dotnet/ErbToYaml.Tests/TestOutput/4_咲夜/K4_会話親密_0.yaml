  content: >-
    %CALLNAME:人物_咲夜%は%CALLNAME:MASTER%の話を丁寧に聞いていた。

    「へえ、そうなの」

    %CALLNAME:人物_咲夜%は丁寧に相槌をうった。

    「%CALLNAME:MASTER%は、興味深い方ね」

    %CALLNAME:人物_咲夜%は微かに笑みを浮かべた。

    「……また、お話聞かせてくださいな」

    「あら、そういえば私も――」

    %CALLNAME:人物_咲夜%は自分の話を始めかけて、ふと口を噤んだ。

    「……いえ、何でもないわ。つまらない話ですから」

    %CALLNAME:人物_咲夜%は控えめに微笑んだ。

    「それより、%CALLNAME:MASTER%の話の続きを聞かせてくださいな」

    「――ええ、なるほど」

    %CALLNAME:人物_咲夜%は真剣な表情で%CALLNAME:MASTER%の話に耳を傾けている。

    「%CALLNAME:MASTER%のお話、為になりますわ」

    %CALLNAME:人物_咲夜%はそう言いながらも、どこか嬉しそうだった。

    「……お嬢様にもお伝えしてよろしいかしら？」

    「――そうでしたの」

    %CALLNAME:人物_咲夜%は相槌を打ちながら、静かに話を聞いている。

    「%CALLNAME:MASTER%も、色々とご苦労がおありなのね」

    %CALLNAME:人物_咲夜%は瀟洒な佇まいのまま、穏やかに微笑んだ。

    「……何かお手伝いできることがあれば、おっしゃってくださいな」
