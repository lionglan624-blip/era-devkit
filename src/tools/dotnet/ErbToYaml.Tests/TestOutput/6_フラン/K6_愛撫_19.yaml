character: フラン
situation: K6_愛撫
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……それ、ちっちゃくて黒いね。何なの？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にあるニプルキャップを興味深そうに覗き込んだ。

    「私の乳首に？　えへへ、楽しみなのさ」

    %CALLNAME:MASTER%がニプルキャップを装着し、電源を入れた。

    「ひゃあっ……！　震えてる……！　乳首がびりびりするのさ……！」

    %CALLNAME:人物_フラン%は恋人にしがみつき、甘い声を上げた。

    「%CALLNAME:MASTER%……これ、気持ちいい……壊さないように……我慢するね……」

    「んっ……あっ……%CALLNAME:MASTER%……乳首が……」

    %CALLNAME:人物_フラン%はニプルキャップの振動に、蕩けた表情を浮かべた。

    「ぶるぶるして……頭がぼーっとするのさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見上げて、幸せそうに微笑んだ。

    「こんな気持ちいいもの……外の世界にはいっぱいあるんだね」

    「%CALLNAME:MASTER%と一緒だから……私、怖くないの」

    495年の孤独を知る少女は、恋人との時間に至福を感じていた。

    「えへへ……またそれつけるんだね、%CALLNAME:MASTER%」

    %CALLNAME:人物_フラン%はニプルキャップを見て、嬉しそうに胸を突き出した。

    「私の乳首、%CALLNAME:MASTER%専用なのさ」

    装着して電源を入れると、%CALLNAME:人物_フラン%は声を詰まらせた。

    「あっ……！　やっ、来た……びりびり来てる……！」

    %CALLNAME:人物_フラン%は恋人の腕に爪を立て、快感に耐えた。

    「%CALLNAME:MASTER%……私、乳首から壊れちゃいそう……のさ……」

    「%CALLNAME:MASTER%……今日も乳首にそれつけてくれるの？」

    %CALLNAME:人物_フラン%はニプルキャップを見て、期待に頬を染めた。

    「えへへ……待ってたのさ」

    振動が始まると、%CALLNAME:人物_フラン%は甘い吐息を漏らした。

    「んっ……あっ……乳首だけなのに……すごい……」

    「%CALLNAME:MASTER%の……%CALLNAME:MASTER%だけの……のさ……」

    悪魔の妹は、恋人に与えられる快楽に酔いしれていた。
  priority: 4
- id: talent_3_1
  content: >-
    「な、なに……？　それ、ちっちゃいのさ……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つニプルキャップを警戒しながら見た。

    「乳首につけるの……？　恥ずかしいんだけど……」

    しかし拒否はせず、%CALLNAME:人物_フラン%は顔を赤くして待っていた。

    電源が入ると、%CALLNAME:人物_フラン%は目を見開いた。

    「ひゃあっ！？　震えてる……！　や、やぁっ、乳首が変になっちゃう……！」

    その声は悲鳴に近かったが、逃げようとはしなかった。

    「あっ……やっ……%CALLNAME:MASTER%……乳首が熱くなってきた……」

    %CALLNAME:人物_フラン%はニプルキャップの振動に、切ない声を漏らした。

    「びりびりして……頭が真っ白になる……のさ……」

    %CALLNAME:人物_フラン%は恨めしそうに、でもどこか期待を込めて%CALLNAME:MASTER%を見た。

    「……こんな恥ずかしいもの、%CALLNAME:MASTER%にしかつけさせないの……」

    紅い瞳には、羞恥と背徳的な快感が入り混じっていた。

    「ちょ、ちょっと……いきなりつけないで……」

    %CALLNAME:人物_フラン%はニプルキャップを見て、身構えた。

    しかし%CALLNAME:MASTER%は待たず、装着して電源を入れた。

    「んあっ！？　やっ、来た……！　乳首がびりびりする……！」

    %CALLNAME:人物_フラン%は甘い悲鳴を上げた。

    「あっ、あっ……こんなの知らなかった……変になっちゃう……のさ……」

    %CALLNAME:人物_フラン%は混乱しながらも、%CALLNAME:MASTER%から離れようとはしなかった。

    「んっ……はぁっ……乳首、ずっと震えてる……」

    %CALLNAME:人物_フラン%はニプルキャップの刺激に、息を荒くしていた。

    「%CALLNAME:MASTER%……こんな気持ち……初めてなのさ……」

    495年の孤独を知る少女は、新しい感覚に戸惑っていた。

    「……でも、%CALLNAME:MASTER%とだから……我慢できるの」

    %CALLNAME:人物_フラン%は照れながら、快感に身を任せた。
