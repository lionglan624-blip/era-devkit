    二つの動きに体が反応しそうになるのを、%CALLNAME:TARGET%は必死に堪えている。

    「……っ……」

    「……声など……出しませんわ……」

    「……」

    %CALLNAME:TARGET%は無言で二つの熱を受け入れている。

    「声を出せば……貴方たちの思う壺ですわ」

    「瀟洒なメイドは……このような状況でも……取り乱しませんの」

    二つの動きが激しくなっても、%CALLNAME:TARGET%は表情を変えない。

    「っ……」

    堪えきれない反応を見せながらも、%CALLNAME:TARGET%は声を押し殺し続けた。

    「……二人で寄ってたかって……」

    %CALLNAME:TARGET%は小さく呟いた。

    「卑怯者ですわね……」

    しかし、二穴責めの快感に体は正直に反応してしまう。

    「……くっ……」

    「……これで……満足ですか……」

    %CALLNAME:TARGET%は感情を押し殺しながら、ただ時が過ぎるのを待っていた。
