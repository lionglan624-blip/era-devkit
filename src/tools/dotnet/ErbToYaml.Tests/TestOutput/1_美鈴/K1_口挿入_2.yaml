  content: >-
    「――%CALLNAME:MASTER%……胸で、してあげる……」

    %CALLNAME:人物_美鈴%は甘い声でそう言って、胸元を開いた。

    豊かな双丘が露わになり、%CALLNAME:人物_美鈴%は一物を優しく挟み込んだ。

    「……ふふ、温かい……%CALLNAME:MASTER%の熱、感じる……」

    %CALLNAME:人物_美鈴%は胸を寄せて、ゆっくりと上下に動かし始めた。

    「……気持ちいい？　もっと強く挟んであげようか……」

    柔らかな谷間で一物を包み込み、%CALLNAME:人物_美鈴%は幸せそうに微笑んだ。

    「……ねえ、%CALLNAME:MASTER%……私の胸、好き……？」

    %CALLNAME:人物_美鈴%は恥ずかしそうに、でも嬉しそうに問いかけた。

    一物を胸で挟み、%CALLNAME:人物_美鈴%は緩急をつけて動かした。

    「……ふふ、硬くなってる……私のせいかしら……」

    %CALLNAME:人物_美鈴%は先端に息を吹きかけて、悪戯っぽく笑った。

    「……もっと気持ちよくしてあげる……%CALLNAME:MASTER%の好きなようにして……」

    愛おしげに胸を揺らしながら、%CALLNAME:人物_美鈴%は奉仕を続けた。

    「……%CALLNAME:MASTER%の、ここ……私の胸と相性いいのね……」

    %CALLNAME:人物_美鈴%は頬を染めながら、一物を胸で包み込んだ。

    「……柔らかいでしょ……？　武術家だけど、ここは……女の子だから……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに目を逸らしながら、胸を動かした。

    「……ん……私の乳首も、擦れて……気持ちいい……」

    顔を紅潮させながら、%CALLNAME:人物_美鈴%は一心に奉仕を続けた。

    「……%CALLNAME:MASTER%……一緒に、気持ちよくなろう……？」

    「――私の胸、%CALLNAME:MASTER%のためにあるの……」

    %CALLNAME:人物_美鈴%は愛を込めて囁いた。

    「……だから、いっぱい使って……」

    豊満な胸で一物を挟み、%CALLNAME:人物_美鈴%は丁寧に擦り上げた。

    「……ふふ、%CALLNAME:MASTER%の顔、とろけそう……」

    %CALLNAME:人物_美鈴%は嬉しそうに笑いながら、動きを速めた。

    「……全部、受け止めてあげるから……遠慮しないで……」
