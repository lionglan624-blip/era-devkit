  content: >-
    「え……足で……？　それは……」

    %CALLNAME:人物_小悪魔%は戸惑いながら、%CALLNAME:MASTER%の一物を見つめた。

    仕方なさそうに足を差し出すと、恐る恐る一物に触れる。

    「……やったことないですけど……こう……ですか？」

    %CALLNAME:人物_小悪魔%は足裏でそっと一物を撫でた。

    「……熱い……ですわね……」

    %CALLNAME:人物_小悪魔%は好奇心に負けたように、一物を足で観察している。

    「ふむ……こうなってるんですのね……」

    まるで研究するかのように、足指で表面をなぞった。

    「ん……%CALLNAME:MASTER%、変な顔してますわ」

    %CALLNAME:人物_小悪魔%は小さく笑いながら、足を動かし続けた。

    「……こういうのも、勉強になりますわね……」

    「し、しょうがないですわね……」

    %CALLNAME:人物_小悪魔%は渋々という態度で、足を一物に添えた。

    しかしその動きは丁寧で、少しずつ擦っている。

    「……ん……こう？　違う？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の反応を窺いながら、試行錯誤している。

    「……早く終わらせてくださいね……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の一物をじっと見つめている。

    「本で読んだことはありますけど……実践は初めてですわ」

    おそるおそる両足で挟み、一物を包み込んだ。

    「んっ……熱い……こんなに熱いんですのね……」

    %CALLNAME:人物_小悪魔%は驚きながらも、ゆっくりと足を動かし始めた。

    「……ふむ……これは……なかなか……」
