    翅がきらきらと発光し、%CALLNAME:人物_大妖精%は甘い吐息を漏らした。

    「……ふぁっ……珠が、奥まで……入ってきてる……」

    %CALLNAME:人物_大妖精%はアナルビーズが腸内深くへ進む感触に声を上げた。

    連なる珠が内壁を広げていき、背筋がぞくぞくする。

    「……んっ、あっ……%CALLNAME:MASTER%……全部入ったら、どうなっちゃうの……」

    %CALLNAME:人物_大妖精%は%CALLNAME:MASTER%にすがりつき、翅がばたばたと動いた。

    「……大好き……だから……こんな恥ずかしいことも、許してあげる……」

    快感に染まりながら、%CALLNAME:人物_大妖精%は愛を囁いた。

    「……ひっ……！　中の珠が……すごいの……」

    %CALLNAME:人物_大妖精%はアナルビーズの珠の連なりに体を震わせた。

    珠と珠の間の刺激が、腸壁を通して全身に広がっていく。

    「……あっ、やぁ……抜けそうで抜けない……おかしくなりそう……」

    翅がぴくぴくと跳ね、%CALLNAME:人物_大妖精%は甘い喘ぎを漏らした。

    「……%CALLNAME:MASTER%の前だから……全部、見せていいよね……」

    恋人に全てを許すように、%CALLNAME:人物_大妖精%は力を抜いた。
