    「……これで満足なのか、お前は」

    %CALLNAME:MASTER%が反応すると、%CALLNAME:人物_魔理沙%は少し驚いた。

    「……ふーん、こうすると感じるのか」

    %CALLNAME:人物_魔理沙%は興味なさそうな振りをしながら、体を動かし続けた。

