character: レミリア
situation: K5_口挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、私が騎乗してあげるわ」

    %CALLNAME:人物_レミリア%は妖艶に微笑み、%CALLNAME:MASTER%の腰に跨った。

    小さな身体が後孔に%CALLNAME:MASTER%を導き、ゆっくりと沈んでいく。

    「んっ……あぁ……全部、入ったわ……」

    %CALLNAME:人物_レミリア%は上から%CALLNAME:MASTER%を見下ろし、腰を揺らし始めた。

    「この角度……深くて、いいわね……%CALLNAME:MASTER%も気持ちいい？」

    紅魔館の主は、恋人を悦ばせるように官能的に腰を使った。

    「今夜は私が主導権を握るわ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を押し倒し、その上に座った。

    後孔に%CALLNAME:MASTER%を受け入れ、快感に紅い瞳を潤ませる。

    「あ……っ、奥まで……届いてる……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胸に手を置き、リズミカルに腰を上下させた。

    「ふふ……%CALLNAME:MASTER%のこと、全部私のものにしてあげる」

    500年の吸血鬼が、恋人を支配する悦びに酔いしれていた。

    「……%CALLNAME:MASTER%、こうされたかったのでしょう？」

    %CALLNAME:人物_レミリア%は悪戯っぽく笑い、%CALLNAME:MASTER%に跨った。

    後孔がゆっくりと%CALLNAME:MASTER%を飲み込んでいく。

    「はぁ……っ、きつ……いけど……この感覚、好きよ……」

    %CALLNAME:人物_レミリア%は甘い吐息を漏らしながら腰を動かした。

    「%CALLNAME:MASTER%……もっと私を見て……」

    紅魔館の主は、恋人の視線を独り占めしながら淫らに腰を振った。

    「私の重さなんて、羽みたいなものでしょう？」

    %CALLNAME:人物_レミリア%は軽やかに%CALLNAME:MASTER%の上に乗った。

    後孔に%CALLNAME:MASTER%が埋まっていく感覚に、甘い声を漏らす。

    「んっ……あ、あぁ……深い……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の顔を見つめながら腰を揺らした。

    「こうして上から見下ろすと……%CALLNAME:MASTER%の表情が全部見えるわ」

    永遠を生きる吸血鬼が、恋人の上で蕩けるような笑みを浮かべた。
  priority: 4
- id: talent_3_1
  content: >-
    「……私が上に乗ってあげるわ」

    %CALLNAME:人物_レミリア%は少し恥ずかしそうに%CALLNAME:MASTER%の上に跨った。

    後孔に%CALLNAME:MASTER%を導き、ゆっくりと腰を沈めていく。

    「あ……っ、入って、きた……」

    %CALLNAME:人物_レミリア%は慣れない感覚に眉をひそめた。

    「こ、こう動けばいいの……？」

    紅魔館の主は、ぎこちなくも懸命に腰を揺らし始めた。

    「……こういう体勢、初めてだけど……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の上にそっと座った。

    後孔が%CALLNAME:MASTER%を飲み込んでいく感覚に、小さく息を呑む。

    「ひぁ……っ、深い……こんなところまで……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胸に手を置いて身体を支えた。

    「……気持ちいい？　ならいいのだけど……」

    500年の吸血鬼が、好意を込めて腰を動かし始めた。

    「……上から見下ろすのも、悪くないわね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を見つめながら腰を落とした。

    後孔が%CALLNAME:MASTER%を締め付け、二人の身体が繋がった。

    「んん……っ、あ……奥まで、届いてる……」

    %CALLNAME:人物_レミリア%は恥ずかしそうに目を逸らした。

    「……変な顔しないで。見てるこっちが恥ずかしいわ」

    紅魔館の主は、照れ隠しをしながら腰を動かし続けた。

    「……私の方から、してあげるわ」

    %CALLNAME:人物_レミリア%は決意したように%CALLNAME:MASTER%の上に乗った。

    後孔にゆっくりと%CALLNAME:MASTER%を受け入れていく。

    「あぁ……っ、きつ……い……でも、入ってる……」

    %CALLNAME:人物_レミリア%は頬を染めながら腰を揺らした。

    「こうすると……%CALLNAME:MASTER%、気持ちいいの？」

    紅魔館の主は、相手の反応を窺いながら懸命に腰を使った。
