character: 魔理沙
situation: K10_愛撫
entries:
- id: fallback
  content: >-
    「お、またそれか。クリップ型のローターだっけ」

    %CALLNAME:人物_魔理沙%は黒いニプルキャップを見て、親しげに笑った。

    「外来のものは面白いぜ。私のコレクションにも欲しいくらいだ」

    %CALLNAME:MASTER%が%CALLNAME:人物_魔理沙%の乳首にキャップを装着する。

    「んっ……電源入れるんだろ？　覚悟はできてるぜ」

    振動が始まると、%CALLNAME:人物_魔理沙%は恋人に寄りかかった。

    「ふーん、今日は乳首責めか。お前、私の乳首好きすぎないか？」

    %CALLNAME:人物_魔理沙%は呆れたように笑いながらも、胸を差し出した。

    「……まあいいぜ。恋人なんだから、好きにしろよ」

    %CALLNAME:MASTER%がニプルキャップを両乳首に取り付け、電源を入れる。

    「あっ……振動が……直接乳首に……んんっ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の腕に抱きつき、刺激を受け入れた。

    「そのクリップローター、構造が面白いんだよな」

    %CALLNAME:人物_魔理沙%は研究者のような目でニプルキャップを観察した。

    「挟む力と振動が同時に……考えたやつは天才だぜ」

    %CALLNAME:MASTER%が%CALLNAME:人物_魔理沙%の乳首にキャップを装着し、スイッチを入れる。

    「んあっ……！　理屈じゃわかってても……実際は……くっ……」

    %CALLNAME:人物_魔理沙%は理性と快感の間で揺れながら、恋人に身を委ねた。

    「クリップローター……今日はこれで遊ぶのか」

    %CALLNAME:人物_魔理沙%は楽しそうに%CALLNAME:MASTER%を見上げた。

    「私の体、お前専用の実験台じゃないんだぜ？……って言っても聞かないか」

    %CALLNAME:MASTER%が乳首にキャップを被せ、振動を開始させる。

    「ひゃっ……あっ、強っ……！　んっ、もうちょっと……弱くしろよ……」

    抗議しながらも、%CALLNAME:人物_魔理沙%の体は快感に正直に反応していた。
  priority: 4
- id: talent_3_1
  content: >-
    「な、何だそれ……乳首に付けるやつ？」

    %CALLNAME:人物_魔理沙%はニプルキャップを見て顔を赤くした。

    「そういう変なもの、どこから持ってくるんだよ……」

    %CALLNAME:MASTER%が%CALLNAME:人物_魔理沙%の乳首にキャップを装着する。

    「ひゃあっ！？　振動し……んんっ……こんなの反則だぜ……」

    %CALLNAME:人物_魔理沙%は快感に抗えず、%CALLNAME:MASTER%にしがみついた。

    「え、それ……また乳首に？」

    %CALLNAME:人物_魔理沙%はクリップローターを見て目を逸らした。

    「……わかったよ、好きにしろって」

    %CALLNAME:MASTER%がキャップを装着し、電源を入れると、%CALLNAME:人物_魔理沙%は体を震わせた。

    「んっ……あっ……振動が……乳首から……全身に……っ」

    %CALLNAME:人物_魔理沙%は顔を真っ赤にしながら、声を噛み殺した。

    「クリップ型のローター……外来の道具は変なのばっかりだぜ」

    %CALLNAME:人物_魔理沙%は強がりながらも、目を逸らせなかった。

    「……本当に付けるのか？　もうちょっと普通のはないのかよ……」

    %CALLNAME:MASTER%は構わず%CALLNAME:人物_魔理沙%の乳首にキャップを装着した。

    「んあっ……！　だ、だから……んんっ……勝手に……あっ……」

    振動が始まると、%CALLNAME:人物_魔理沙%の抗議は喘ぎに変わった。

    「またそれか……お前、乳首責め好きすぎだろ……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに呟いた。

    「……もう、仕方ないな……」

    %CALLNAME:MASTER%がニプルキャップを取り付け、振動を開始させる。

    「んっ……はぁっ……直接振動が……乳首に……くぅっ……」

    %CALLNAME:人物_魔理沙%は快感に耐えながら、%CALLNAME:MASTER%を睨んだ。
