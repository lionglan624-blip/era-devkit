  content: >-
    「……それ、何？　ちっちゃくて黒いのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にあるニプルキャップを見つめた。

    「私の乳首に……つけるの？　ふぅん……変態なのさ」

    興味を示しながらも、%CALLNAME:人物_フラン%は身構えていた。

    電源が入ると、%CALLNAME:人物_フラン%は目を丸くした。

    「っ……！　震えてる……乳首がびりびりする……変な感じ……」

    「あっ……それ……乳首につけるの……？」

    %CALLNAME:人物_フラン%はニプルキャップを見て、少し顔を赤くした。

    「恥ずかしいんだけど……まあ、%CALLNAME:MASTER%がしたいなら……」

    振動が始まると、%CALLNAME:人物_フラン%は声を詰まらせた。

    「んっ……！　や、やぁ……乳首が熱い……のさ……」

    495年の孤独を知る少女は、困惑しながらも逃げようとはしなかった。

    「ひゃっ……！」

    %CALLNAME:人物_フラン%はニプルキャップの振動に、小さく声を上げた。

    「び、びっくりした……乳首がびりびりしてる……」

    %CALLNAME:人物_フラン%は非難するように言ったが、その声には力がなかった。

    「……%CALLNAME:MASTER%は、私の乳首で何がしたいの？」

    その問いには、警戒よりも純粋な好奇心が滲んでいた。

