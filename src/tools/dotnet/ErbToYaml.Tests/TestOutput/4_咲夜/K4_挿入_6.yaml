- id: fallback
  content: >-
    「……こちらの場所も……サービスの範囲内ですわ……」

    %CALLNAME:TARGET%は自分に言い聞かせながら、%CALLNAME:MASTER%の上に跨った。

    「プロのメイドとして……お客様のご要望には……」

    言い訳のように呟きながら、%CALLNAME:TARGET%は腰を下ろしていく。

    「っ……あ……きつい……」

    「……少し……待ってくださいまし……」

    %CALLNAME:TARGET%は苦しそうな表情で、体を慣らそうとしていた。

    「……これは……仕事ですから……」

    %CALLNAME:TARGET%は表情を崩さないよう努めながら、腰を動かしている。

    「変に思われるかもしれませんけれど……」

    しかし、体は正直に快感を感じ始めていた。

    「……っ……変な感覚ですわ……」

    「%CALLNAME:MASTER%のせいですからね……」

    %CALLNAME:TARGET%は責任を押し付けながらも、動きを止めなかった。

    「……お客様のために……動きますわ……」

    %CALLNAME:TARGET%は複雑な表情で腰を揺らしている。

    「こんな場所まで使うなんて……困った方ですわね……」

    恨めしそうに言いながらも、%CALLNAME:TARGET%の腰は止まらない。

    「あ……んっ……奥が……」

    「……少し……感じているだけですわ……」

    %CALLNAME:TARGET%は自分の反応を言い訳するように付け加えた。

    「……ご満足いただけますでしょうか……」

    %CALLNAME:TARGET%は事務的な口調で尋ねながら、腰を動かしている。

    「こちらの穴は……あまり得意ではありませんの……」

    それでも、メイドとしての務めを果たそうとする。

    「っ……ぁ……思ったより……」

    「……何でもありませんわ……続けますから……」

    %CALLNAME:TARGET%は複雑な表情で、奉仕を続けた。
