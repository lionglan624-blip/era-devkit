    %CALLNAME:人物_フラン%は無表情を装いながら、%CALLNAME:MASTER%に乳首を吸われていた。

    しかし、その頬は次第に赤く染まっていく。

    「……%CALLNAME:MASTER%、そんなに見ないで」

