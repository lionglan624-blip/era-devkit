- id: fallback
  content: >-
    「それ、何なのさ？　穴が開いてる」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つオナホールを無表情で見つめた。

    「私に使うの？　……ふぅん、変なの」

    %CALLNAME:MASTER%がオナホールを当てると、%CALLNAME:人物_フラン%は無造作に受け入れた。

    「きゅっとしたら壊れちゃうかな」

    その言葉が何を意味するのか、判断がつかなかった。

    「……まあ、壊さないでいてあげる。今日だけね」

    「別に……どうでもいいよ」

    %CALLNAME:人物_フラン%はオナホールを見ながら、無関心に言った。

    「私、なんでも壊せるのさ。でも、%CALLNAME:MASTER%は壊さないであげる」

    %CALLNAME:MASTER%が適当に動かすと、%CALLNAME:人物_フラン%は小さく声を漏らした。

    「……気持ちいいの？　ふぅん」

    悪魔の妹は、興味なさそうに言いながらも%CALLNAME:MASTER%を止めなかった。

    「つまんなくなったらやめるから、感謝しなさい」

    「……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を無表情で見つめた。

    「私にこれを使うの？　変なことするんだね」

    %CALLNAME:MASTER%がオナホールを動かすと、%CALLNAME:人物_フラン%の表情がわずかに歪んだ。

    「……っ……こんな感じなんだ」

    495年の孤独が育てた警戒心が、一瞬揺らいだように見えた。

    「……面白いかも。もう少しやってみて」

    「あなた、コンティニューできないのさ」

    %CALLNAME:人物_フラン%は不穏なことを口にしながら、オナホールを見つめた。

    「でも、それ、ちょっと気になるの。使ってもいい？」

    %CALLNAME:MASTER%がオナホールを動かすと、%CALLNAME:人物_フラン%は小さく身を震わせた。

    「……ふぅん。外の世界って、変なものがあるね」

    %CALLNAME:人物_フラン%は興味を持ったようだった。

    「また持ってきてもいいのさ。私を壊さないでいられたらね」
