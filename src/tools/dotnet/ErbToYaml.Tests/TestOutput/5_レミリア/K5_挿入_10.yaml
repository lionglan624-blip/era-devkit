character: レミリア
situation: K5_挿入
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、後ろ向きでするのね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に背を向けながら、その膝に腰を下ろした。

    「いいわ……あなたになら、背中を預けられる」

    %CALLNAME:MASTER%がゆっくりと後ろに挿入すると、%CALLNAME:人物_レミリア%は小さく息を漏らした。

    「っ……あ、ぁ……痛い、けど……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の腕に自分の手を重ねた。

    「……顔が見えなくても、あなたの温もりを感じるわ……」

    500年の吸血鬼は、恋人に全てを委ねていた。

    「んっ……この体勢、悪くないわね……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に背中を預け、もたれかかった。

    「あなたに抱かれていると……安心するの」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は声を上げた。

    「あっ……ぁあ……奥まで……っ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の首筋に頭を預けた。

    「痛……でも、あなたの体温が伝わってくる……嬉しいわ……」

    背中越しに伝わる温もりに、吸血鬼は身を委ねた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は後ろを向いたまま、%CALLNAME:MASTER%の手を取った。

    「こうしていると……守られている気がするわ」

    %CALLNAME:MASTER%が後ろからゆっくりと挿入すると、%CALLNAME:人物_レミリア%は眉を寄せた。

    「っ……くぅ……まだ、慣れない、けど……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の腕をきつく握った。

    「……あなたに包まれていると……怖くないの」

    紅魔館の主は、恋人の腕の中で痛みに耐えた。

    「ふふ……今日は背中を預けてあげるわ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の膝に座り、背中を預けた。

    「あなたの鼓動が聞こえる……」

    %CALLNAME:MASTER%が腰を持ち上げ、後ろに挿入した。

    「あぁっ……んっ……深、い……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の腕に身を沈めた。

    「痛いけど……こうして繋がっていると……幸せよ……」

    吸血鬼の誇りも、恋人の温もりの中で溶けていった。
  priority: 4
- id: talent_3_1
  content: >-
    「な……っ、後ろ向きで……っ？」

    %CALLNAME:人物_レミリア%は頬を染めながら、%CALLNAME:MASTER%に背を向けた。

    「……べ、別にいいけど……顔が見えないのは、少し寂しいわね……」

    %CALLNAME:MASTER%が後ろに挿入すると、%CALLNAME:人物_レミリア%は悲鳴を上げた。

    「っ！ 痛……っ、ば、馬鹿……もっとゆっくり……っ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の腕を掴んだ。

    「……顔が見えないから……声で分かって……痛いって言ってるの……っ」

    強がりながらも、その声は震えていた。

    「そ、そっち向きで……っ、恥ずかしいじゃない……」

    %CALLNAME:人物_レミリア%は抗議しながらも、%CALLNAME:MASTER%に背中を向けて座った。

    「……顔が見えないのは……楽だけど……」

    %CALLNAME:MASTER%がゆっくりと挿入すると、%CALLNAME:人物_レミリア%は顔を歪めた。

    「っ……あ、あぁ……痛い……っ、やぁ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手を握りしめた。

    「……こんな声……聞かれたくないのに……背中だと……隠せないじゃない……」

    高貴な吸血鬼は、想い人に弱さを見せていた。

    「……ふん、背中を向けるくらい、いいわよ」

    %CALLNAME:人物_レミリア%は虚勢を張りながら、%CALLNAME:MASTER%に背を向けて腰を下ろした。

    「……別にあなたを信用しているわけじゃないんだから」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は声を詰まらせた。

    「っ……くぅ……あ、痛……」

    %CALLNAME:人物_レミリア%は振り向かずに%CALLNAME:MASTER%の腕を掴んだ。

    「や……顔は見ないで……こんな情けない声……聞かれてるだけで十分よ……」

    責めるような言葉の裏で、心は揺れていた。

    「こ、こんな体勢で……恥ずかしいじゃない……」

    %CALLNAME:人物_レミリア%は顔を真っ赤にしながら、%CALLNAME:MASTER%に背中を預けた。

    「……でも……顔を見られないのは……助かるわ……」

    %CALLNAME:MASTER%が後ろに挿入すると、%CALLNAME:人物_レミリア%は目を見開いた。

    「っ！ あ、あぁ……っ、痛……い……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の膝を掴んだ。

    「……振り向かないで……今、きっと酷い顔してるから……」

    紅魔館の主は、素直になれない想いを抱えていた。
  priority: 3
