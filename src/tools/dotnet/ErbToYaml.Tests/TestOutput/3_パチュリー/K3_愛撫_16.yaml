entries:
- id: fallback
  content: >-
    「……ん……それを……入れるの……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が手にしたバイブを見つめ、静かに息を吐いた。

    %CALLNAME:MASTER%がゆっくりとバイブを挿入すると、%CALLNAME:TARGET%の体が微かに震えた。

    「……あ……振動が……中で……響いてる……」

    大図書館の静寂に、バイブの低い振動音と%CALLNAME:TARGET%の吐息が混ざり合っている。

    「……%CALLNAME:MASTER%……あなたに……全部……委ねるわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に身を寄せ、穏やかに微笑んだ。

    「……ひぁ……っ……」

    バイブの振動が%CALLNAME:TARGET%の奥深くを刺激している。

    %CALLNAME:TARGET%は読みかけの魔導書を机に置き、%CALLNAME:MASTER%にしがみついた。

    「……振動が……止まらない……頭が……蕩けそう……」

    %CALLNAME:TARGET%の瞳は潤み、いつもの冷静さは消え失せていた。

    「……%CALLNAME:MASTER%……このまま……壊れてもいい……」

    そう呟いて、%CALLNAME:TARGET%は快感の波に身を任せた。

    「……あ……あぁ……」

    %CALLNAME:TARGET%はバイブの振動に合わせて、小刻みに体を震わせている。

    膣内を満たす振動は、%CALLNAME:TARGET%の思考を甘く溶かしていった。

    「……こんな道具で……こんなに……理性が……」

    %CALLNAME:TARGET%は恥ずかしそうに目を伏せたが、その表情は蕩けている。

    「……%CALLNAME:MASTER%……もっと……奥まで……」

    %CALLNAME:TARGET%は珍しく素直に、自らの欲望を口にした。

    「……ん……ふぅ……」

    %CALLNAME:TARGET%はバイブの振動に身を委ね、%CALLNAME:MASTER%の腕の中で蕩けている。

    膣内を震わせる快感が、%CALLNAME:TARGET%の体を甘く痺れさせていた。

    「……あなたの温もりと……この振動と……両方感じられる……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げ、淡い微笑みを浮かべた。

    「……幸せ……よ……今……」

    その言葉は、普段の%CALLNAME:TARGET%からは想像できないほど素直だった。
  priority: 4
- id: talent_3_1
  content: >-
    「……!? そ、そんなもの……入れるつもり……？」

    %CALLNAME:TARGET%はバイブを見て、頬を真っ赤に染めた。

    「本で読んだことは……あるけど……まさか私が……」

    %CALLNAME:MASTER%がバイブを挿入すると、%CALLNAME:TARGET%は小さく悲鳴を上げた。

    「……ひゃっ……振動が……中から……くる……」

    %CALLNAME:TARGET%は恥ずかしさに顔を覆いながらも、%CALLNAME:MASTER%を拒まなかった。

    「……やぁ……振動……止めて……」

    バイブが膣内で振動し、%CALLNAME:TARGET%の体を揺さぶっている。

    「……む、むきゅ……こんなの……集中できないわ……」

    %CALLNAME:TARGET%は手元の本を閉じ、机にしがみついた。

    「……%CALLNAME:MASTER%……見ないで……変な声……出ちゃう……」

    %CALLNAME:TARGET%は羞恥に震えながら、甘い声を漏らしていた。

    「……っ……あ……」

    %CALLNAME:TARGET%はバイブの振動に、言葉を失っていた。

    膣内を満たす振動は、知識では説明できない快感を与えてくる。

    「……こんな……刺激……本には……載ってなかった……」

    %CALLNAME:TARGET%の体がびくりと跳ね、大図書館に甘い喘ぎが響いた。

    「……%CALLNAME:MASTER%……弱くして……壊れちゃう……」

    そう懇願しながらも、%CALLNAME:TARGET%の瞳は潤んでいた。

    「……ん……ぁ……だめ……」

    バイブの振動が強まり、%CALLNAME:TARGET%の体が大きく震えた。

    「……中が……熱い……振動が……響いて……」

    %CALLNAME:TARGET%は分析しようとするが、頭が真っ白になっていく。

    「……こんなところで……小悪魔に見られたら……」

    %CALLNAME:TARGET%は羞恥と快感の狭間で、%CALLNAME:MASTER%にしがみついた。
