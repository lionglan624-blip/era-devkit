    「んぅっ……あ……そんなところ触ったら……変な声……出ちゃうよ……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の後ろの穴に触れている。

    %CALLNAME:TARGET%は必死に声を堪えながら、%CALLNAME:MASTER%を見つめた。

    「……おしりなんて……普通は触らないのに……」

    「……%CALLNAME:MASTER%が……そうしたいなら……我慢、する……」

    %CALLNAME:TARGET%の羽が、そわそわと動いている。

    「きゃっ……あっ……%CALLNAME:MASTER%……そこ……」

    %CALLNAME:TARGET%の体が小さく震えている。

    「……こんなこと、されたこと……ないの……おしりなんて……」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%から目を逸らさない。

    「……でも、%CALLNAME:MASTER%となら……怖くない、かも……」

    %CALLNAME:TARGET%は小さく頷いた。

    「あぅっ……んっ……そこ……敏感なの……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の後ろの穴を優しく刺激している。

    %CALLNAME:TARGET%は恥ずかしそうに俯きながら、小さく喘いだ。

    「……%CALLNAME:MASTER%……わたしの……そんなところまで……」

    %CALLNAME:TARGET%は不安そうに、でも期待を込めた目で見上げてきた。

    「……優しくしてくれる……？」
