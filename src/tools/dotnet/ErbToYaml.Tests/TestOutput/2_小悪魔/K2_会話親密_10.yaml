character: 小悪魔
situation: K2_会話親密
entries:
- id: fallback
  content: >-
    「ふふ…%CALLNAME:MASTER%の腕の中、温かいですわ…」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%をそっと抱きしめた。

    %CALLNAME:人物_小悪魔%は嬉しそうに体を預け、%CALLNAME:MASTER%の胸に頬を寄せる。

    小悪魔らしいいたずらな笑みが、幸せそうな微笑みに変わっていく。

    「悪魔は契約に忠実ですの。この腕から離れない契約…結びませんか？」

    そう囁いて、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%を抱き返した。

    「あ…%CALLNAME:MASTER%」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%を迎え入れるように両腕を広げた。

    ぎゅっと抱きしめ合う。二人の体温が溶け合っていく。

    「こうしてると、悪魔だってこと忘れちゃいますの…」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の首筋に顔を埋め、幸せそうに息を吐いた。

    「…ずっと、このままでいたいですわ」

    囁くような声が、%CALLNAME:MASTER%の耳元で甘く響いた。

    %CALLNAME:MASTER%は後ろから%CALLNAME:人物_小悪魔%を抱きしめた。

    「んっ……ふふ、後ろからなんて、甘えん坊さんですの」

    %CALLNAME:人物_小悪魔%は振り返らず、%CALLNAME:MASTER%の腕に自分の手を重ねた。

    「……このまま、しばらくこうしていてくださいな」

    悪魔の尻尾が嬉しそうにぱたぱたと揺れている。

    「%CALLNAME:MASTER%の体温、悪魔の私には眩しいくらい温かいんですの」

    「%CALLNAME:MASTER%…」

    %CALLNAME:人物_小悪魔%は自分から%CALLNAME:MASTER%に抱きついた。

    「今日は私から抱きつかせてくださいな」

    甘えるように%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の胸に顔を埋める。

    「……%CALLNAME:MASTER%の匂い、大好きですの」

    悪魔の少女は恥ずかしそうに、でも幸せそうに目を閉じた。

    「ずっと、こうしていたいですわ……」
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%に抱きついた。

    「ひゃっ…！？ %CALLNAME:MASTER%…？」

    %CALLNAME:人物_小悪魔%は驚きながらも、嬉しそうに抱き返した。

    「も、もう…いきなりなんですの…」

    頬を薔薇色に染めながら、%CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の背中に腕を回した。

    「…でも、嫌じゃないですわ。むしろ…もっとしてほしいくらい」

    いたずらっぽく笑いながらも、その声は少し震えていた。

    「あ…%CALLNAME:MASTER%？」

    抱きしめられて、%CALLNAME:人物_小悪魔%は一瞬固まった。

    「…ふふ、甘えん坊さんですの」

    そう言いながらも、%CALLNAME:人物_小悪魔%は嬉しそうに目を細めた。

    「悪魔に抱きつくなんて、%CALLNAME:MASTER%も大胆ですわね」

    %CALLNAME:人物_小悪魔%は照れくさそうに笑いながら、%CALLNAME:MASTER%の頭を撫でた。

    「…でも、悪い気はしませんの」

    「……%CALLNAME:MASTER%、どうしたんですの？」

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の後ろから抱きついている。

    とりあえず、このままでいさせてくれ。

    「……そう、ですか」

    %CALLNAME:人物_小悪魔%は顔を赤くしながらも、じっとしていた。

    「……悪魔を抱き枕にするなんて、贅沢な人ですの」

    小さく呟きながらも、その声はどこか嬉しそうだった。

    「んっ……」

    %CALLNAME:MASTER%に抱きしめられて、%CALLNAME:人物_小悪魔%は小さく声を漏らした。

    「%CALLNAME:MASTER%、力強いですの……」

    照れくさそうに目を逸らしながら、%CALLNAME:人物_小悪魔%は抵抗しない。

    「……私、悪魔ですのよ？　こんなことされると……」

    %CALLNAME:人物_小悪魔%の尻尾が、照れたようにゆらゆらと揺れていた。

    「……勘違い、しちゃいますの」
  priority: 3
  condition:
    type: Talent
    talentType: 3
