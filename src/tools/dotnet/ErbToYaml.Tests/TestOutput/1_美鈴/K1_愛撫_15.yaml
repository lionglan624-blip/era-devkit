    「そ、そんなの中に……恥ずかしいって……」

    しかし振動が始まると、%CALLNAME:人物_美鈴%は抗えなくなる。

    「んっ……あっ……やぁ……奥に、当たる……」

    %CALLNAME:人物_美鈴%は恥ずかしさと快感の間で揺れていた。

    「え……それ、私の中に入れるの……？」

    %CALLNAME:人物_美鈴%は戸惑いながらも、%CALLNAME:MASTER%から目を逸らせない。

    「……もう、%CALLNAME:MASTER%ったら、こういうの好きなのね……」

    バイブが膣内に挿入されると、%CALLNAME:人物_美鈴%は息を呑んだ。

    「ひゃっ……！　振動、強い……あっ、んんっ……」

    %CALLNAME:人物_美鈴%は震える声で、%CALLNAME:MASTER%の名を呼んだ。

    「……%CALLNAME:MASTER%、バイブなんて持ってるんだ……」

    %CALLNAME:人物_美鈴%は困ったような、でも期待を隠せない表情を浮かべた。

    バイブがゆっくりと挿入され、振動が始まる。

    「あっ……やっ……中で震えて……」

    %CALLNAME:人物_美鈴%は思わず腰を引こうとするが、逃げられない。

    「んっ……%CALLNAME:MASTER%のこと……嫌いになれないの……」

    「……」

    %CALLNAME:人物_美鈴%は黙ってバイブを見つめ、覚悟を決めたように息を吐いた。

    「……%CALLNAME:MASTER%がしたいなら……入れて、いいわ」

    振動が膣内を襲うと、%CALLNAME:人物_美鈴%は声を上げた。

    「あぁっ……！　やっ、これ……すごい……っ」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%への想いを抑えきれず、身を任せた。
