- id: fallback
  content: >-
    「……何のつもりかしら」

    %CALLNAME:人物_レミリア%は冷たい視線で%CALLNAME:MASTER%を見た。

    「使用人の胸を吸えと？　身の程を知りなさい」

    %CALLNAME:人物_レミリア%は威厳を込めてそう言い放った。

    「……今回だけは気まぐれで付き合ってあげるわ」

    紅魔館の主は、不機嫌そうに乳首を舐めた。

    「次はないと思いなさい」

    「……ふん」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を見下すように言った。

    「私に吸わせたいの？　使用人の分際で」

    %CALLNAME:人物_レミリア%は嘲笑を浮かべた。

    「この程度の胸で満足させられるとでも？」

    500年を生きた吸血鬼は、高飛車に乳首を舐め上げた。

    「……咲夜を呼ぶ前に、感謝しなさい」

    「……大胆ね」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を睨みつけた。

    「紅魔館の主に吸わせることが許されると思っているの？」

    %CALLNAME:人物_レミリア%の紅い瞳が危険に光る。

    「あなたが誰か分かっているのかしら」

    吸血鬼は渋々と乳首に唇をつけ、形だけ吸い上げた。

    「……命が惜しいなら、これで満足しなさい」

    「……何かしら」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    「私はこう見えても忙しいのよ」

    紅魔館の主は、高飛車な態度を崩さなかった。

    「使用人の相手をしている暇はないわ……が」

    %CALLNAME:人物_レミリア%は気まぐれに乳首を舐めた。

    「……今日だけよ。咲夜には言わないことね」
