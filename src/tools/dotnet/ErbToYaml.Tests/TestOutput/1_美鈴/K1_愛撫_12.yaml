- id: fallback
  content: >-
    「ちょっ……何するんですか！？　それ何ですか！？」

    %CALLNAME:人物_美鈴%は驚いて電動マッサージャーから距離を取った。

    「いきなりそういうのは……困ります。本当に」

    %CALLNAME:人物_美鈴%は警戒するような目で%CALLNAME:MASTER%を見た。

    「……何を考えてるのか知りませんが、やめてください」

    %CALLNAME:人物_美鈴%は一歩後ろに下がった。

    「えっ……」

    %CALLNAME:人物_美鈴%は突然取り出された電マに固まった。

    「あ、あの……%CALLNAME:MASTER%？　これは一体……」

    %CALLNAME:人物_美鈴%は戸惑いながらも、どう対応していいかわからない様子だ。

    「……すみません、それ、しまってもらえますか」

    %CALLNAME:人物_美鈴%は困惑しながら、静かに%CALLNAME:MASTER%から離れた。

    「な、何を……！」

    %CALLNAME:人物_美鈴%は反射的に身を引いた。

    「……私、門番の仕事中なんですけど」

    %CALLNAME:人物_美鈴%は冷たい視線を%CALLNAME:MASTER%に向けた。

    「そういうものを持ち出すのは……もっと親しくなってからにしてください」

    %CALLNAME:人物_美鈴%はきっぱりと拒絶した。

    「……」

    %CALLNAME:人物_美鈴%は無言で%CALLNAME:MASTER%の手を止めた。

    「%CALLNAME:MASTER%……何をお考えかわかりませんが」

    %CALLNAME:人物_美鈴%は真剣な表情で%CALLNAME:MASTER%を見つめた。

    「私はまだ、あなたのことをよく知りません」

    「……そういう道具を使うような関係ではないと思います」

    %CALLNAME:人物_美鈴%は提案するように、しかし毅然と言い放った。
