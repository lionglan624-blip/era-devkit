character: フラン
situation: K6_愛撫
entries:
- id: fallback
  content: >-
    「ねぇ、%CALLNAME:MASTER%……それ、何なの？　すごく変な形なのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にある搾乳機を興味深そうに覗き込んだ。

    透明なカップと管の付いた奇妙な機械を、紅い瞳がきらきらと見つめている。

    「私のおっぱいにつけるの？　……面白そうだから、いいよ」

    %CALLNAME:人物_フラン%は無邪気に胸を差し出し、装着を待った。

    「わぁ……吸い込まれてる。なんか、くすぐったいのさ」

    %CALLNAME:人物_フラン%は身をよじりながらも、恋人の反応を楽しそうに見つめていた。

    「えへへ……%CALLNAME:MASTER%、また搾乳機で遊びたいの？」

    %CALLNAME:人物_フラン%は嬉しそうに言いながら、自分から胸を突き出した。

    「いっぱい吸われると、なんだかぼーっとしてくるのさ」

    搾乳機が動き始めると、%CALLNAME:人物_フラン%は小さく声を漏らした。

    「んっ……%CALLNAME:MASTER%に見られてると、もっとドキドキするの」

    495年の孤独を知る少女は、恋人に胸を弄ばれる喜びを噛みしめていた。

    「私の全部、%CALLNAME:MASTER%のものなのさ」

    「これ、乳首がすごく吸われる……びくびくしちゃうのさ」

    %CALLNAME:人物_フラン%は搾乳機に胸を揉まれながら、頬を染めて呟いた。

    「お姉様にも……こういうことしてるの？」

    %CALLNAME:MASTER%が首を振ると、%CALLNAME:人物_フラン%は目を輝かせた。

    「ふふっ、私だけなんだ。嬉しいのさ」

    %CALLNAME:人物_フラン%は搾乳機の刺激に身を任せながら、%CALLNAME:MASTER%に微笑んだ。

    「もっと……もっとしていいよ」

    「%CALLNAME:MASTER%……搾乳機、気持ちよくなってきた……」

    %CALLNAME:人物_フラン%は恥ずかしそうに言いながら、胸を押し付けた。

    「最初は変な感じだったのに……今は止めてほしくないのさ」

    %CALLNAME:人物_フラン%の胸が搾乳機に吸われて形を変えていく。

    「あっ……んっ……%CALLNAME:MASTER%、見ないで……恥ずかしいの」

    そう言いながらも、%CALLNAME:人物_フラン%は逃げようとはしなかった。

    「……嘘。いっぱい見てていいのさ」
  priority: 4
- id: talent_3_1
  content: >-
    「な、なにこれ……？　私のおっぱいに使うの？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つ搾乳機を警戒しながら見た。

    「吸われるのってどんな感じ……？　……まあ、試してあげてもいいよ」

    装着されると、%CALLNAME:人物_フラン%は小さく震えた。

    「わっ……引っ張られてる感じがするのさ」

    %CALLNAME:人物_フラン%は恥ずかしそうに目を逸らした。

    「……%CALLNAME:MASTER%、変なところ見ないでよ」

    「あっ……%CALLNAME:MASTER%、搾乳機が強くなってる……」

    %CALLNAME:人物_フラン%は搾乳機に揺れる胸を押さえながら、%CALLNAME:MASTER%を見上げた。

    「……なんか、おかしな声出そうになるのさ」

    その言葉には、羞恥と期待が入り混じっていた。

    「……%CALLNAME:MASTER%の前でこんな姿……恥ずかしいかも」

    %CALLNAME:人物_フラン%は照れながらも、搾乳機を外そうとはしなかった。

    「でも……嫌じゃないのさ」

    「こ、こんなの……恥ずかしいのさ」

    %CALLNAME:人物_フラン%は顔を背けながら、搾乳機に身を委ねた。

    「%CALLNAME:MASTER%に見られてると思うと……変な気持ちになる」

    %CALLNAME:人物_フラン%は恨めしそうに、でもどこか嬉しそうに言った。

    「……私のおっぱい、そんなに見たいの？」

    素直になれない悪魔の妹は、そっぽを向きながらそう呟いた。

    「……もう少しだけ、つけててあげるのさ」

    「%CALLNAME:MASTER%……私、ちゃんと気持ちよくなってる……？」

    %CALLNAME:人物_フラン%は不安そうに搾乳機に揺れる胸を見つめながら尋ねた。

    「こういうの初めてだから……わかんないのさ」

    %CALLNAME:MASTER%がその姿が可愛いと伝えると、%CALLNAME:人物_フラン%は顔を赤くした。

    「かっ……可愛いなんて……！」

    %CALLNAME:人物_フラン%は嬉しそうに身をよじった。

    「%CALLNAME:MASTER%がそう言うなら……もっとつけててもいいのさ」
