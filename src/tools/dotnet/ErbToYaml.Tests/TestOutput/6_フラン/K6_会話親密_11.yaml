entries:
- id: fallback
  content: >-
    「――わぁ、%CALLNAME:MASTER%がお茶を淹れてくれたの？」

    %CALLNAME:人物_フラン%は嬉しそうに湯飲みを受け取った。

    ぱたぱたと翼が嬉しそうに揺れている。

    ふー、と息を吹きかけてから、小さく口をつける。

    「……んっ、あったかい。おいしいのさ」

    %CALLNAME:人物_フラン%は幸せそうに目を細めた。

    「ねぇ、また淹れてくれる？ %CALLNAME:MASTER%のお茶、大好きだよ」

    495年の孤独を埋めるように、%CALLNAME:人物_フラン%はそっと%CALLNAME:MASTER%に寄り添った。

    「えへへ、%CALLNAME:MASTER%がお茶を持ってきてくれた」

    %CALLNAME:人物_フラン%は両手で湯飲みを包み込むように受け取った。

    ずず、と音を立ててお茶を啜る。

    「……んん、あったかい……おいしいね」

    %CALLNAME:人物_フラン%は嬉しそうに紅い瞳を輝かせた。

    「%CALLNAME:MASTER%のお茶を飲んでると、壊したくならないの」

    「不思議だね……ずっとこうしてたいのさ」

    無邪気な笑顔で、%CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見つめている。

    「――あっ、%CALLNAME:MASTER%だ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を見つけると、ぱっと表情を輝かせた。

    「今日もお茶？ 嬉しいのさ」

    差し出された湯飲みを、%CALLNAME:人物_フラン%は大事そうに受け取る。

    こくこく、と美味しそうにお茶を飲む姿は、まるで小さな子供のようだ。

    「……%CALLNAME:MASTER%といると、地下にいても寂しくないよ」

    %CALLNAME:人物_フラン%は湯飲みを両手で包んだまま、%CALLNAME:MASTER%の肩に頭を預けた。

    「ねえねえ、%CALLNAME:MASTER%」

    %CALLNAME:人物_フラン%は甘えるような声で%CALLNAME:MASTER%を呼んだ。

    「お茶、一緒に飲もう？」

    %CALLNAME:人物_フラン%は湯飲みを受け取ると、%CALLNAME:MASTER%の隣にぴったりと座った。

    ふぅ、と湯気を吹きながら、ゆっくりとお茶を味わう。

    「……%CALLNAME:MASTER%がいてくれて、本当によかったのさ」

    %CALLNAME:人物_フラン%は照れくさそうに、でも幸せそうに微笑んだ。

    紅い瞳に映る%CALLNAME:MASTER%の姿を、%CALLNAME:人物_フラン%はずっと見つめていた。
  priority: 4
