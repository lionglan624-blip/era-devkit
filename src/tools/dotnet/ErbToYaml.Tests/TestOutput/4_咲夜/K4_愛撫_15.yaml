- id: fallback
  content: >-
    %CALLNAME:MASTER%がバイブを取り出すと、%CALLNAME:TARGET%は怪訝な表情を浮かべた。

    「……それは何ですの。見たことのない道具ですわね」

    用途を察した%CALLNAME:TARGET%は、冷ややかな視線を向けた。

    「……お客様、それを私に使おうというおつもり？」

    %CALLNAME:TARGET%の声は冷静だが、僅かに動揺が見え隠れしていた。

    「……まあ、メイドとしてのおもてなしの範囲内なら……」

    「っ……これは……」

    バイブが挿入された瞬間、%CALLNAME:TARGET%は小さく驚いた。

    「……電動式……中で振動……」

    %CALLNAME:TARGET%は戸惑いながらも、すぐには振り払わなかった。

    「変なところに当てないでくださいまし……もう遅いですけれど」

    %CALLNAME:TARGET%は皮肉めいた口調で言いながら、振動を耐えている。

    「……ん……」

    バイブの振動に、%CALLNAME:TARGET%は僅かに眉をひそめた。

    「……悪くはありませんわね……いえ、そういう意味ではなく……」

    %CALLNAME:TARGET%は慌てて言い訳しながらも、声が僅かに上ずっている。

    「……お客様の相手も、メイドの務めですから」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    バイブの振動が%CALLNAME:TARGET%の敏感な場所を刺激し続けている。

    「……」

    %CALLNAME:TARGET%は無言で振動を受け止め、表情を変えまいと努めていた。

    「……%CALLNAME:MASTER%、それで満足ですの」

    %CALLNAME:TARGET%は淡々と問いかけながらも、声には僅かな震えがあった。

    「……早く終わらせてくださいまし」
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:MASTER%がバイブを取り出すと、%CALLNAME:TARGET%は氷のような視線を向けた。

    「……それで何をなさるおつもりですの」

    %CALLNAME:TARGET%の声には、一切の温かみがない。

    「紅魔館のメイド長を、そのような道具で弄ぶおつもり？」

    %CALLNAME:TARGET%の手には、いつの間にかナイフが握られていた。

    「……身の程を弁えなさいまし」

    「……は？」

    %CALLNAME:TARGET%は信じられないものを見るような目でバイブを見つめた。

    「それを私に使おうと？　正気ですの」

    %CALLNAME:TARGET%は嘲るように笑った。

    「時を止めれば、その機械ごと貴方を刻むことも造作もありませんわ」

    「……今回は見逃して差し上げますけれど、次はありませんわよ」

    バイブを見た%CALLNAME:TARGET%は、露骨に眉をひそめた。

    「……趣味が悪いですわね」

    %CALLNAME:TARGET%は一歩後ろに下がり、距離を取った。

    「お客様であっても、無礼な振る舞いは許しませんわ」

    「お嬢様のお怒りを買いたくなければ、それを仕舞いなさいまし」

    瀟洒なメイドの目は、冷ややかに光っている。

    「……」

    %CALLNAME:TARGET%は無言でバイブを見つめ、深いため息をついた。

    「お客様。紅魔館のメイドに、そのようなものを使うおつもりですか」

    %CALLNAME:TARGET%の声は静かだが、有無を言わせぬ威圧感がある。

    「……お引き取りを。次はありませんわ」

    完璧なメイドは、完璧な作り笑いを浮かべていた。
