- id: fallback
  content: >-
    「え……あたしの体で……洗うの……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見つめて固まっている。

    「その……こういうこと、したことないです……」

    おずおずと泡を体に塗り、恐る恐る%CALLNAME:MASTER%に密着してみる。

    「わっ……ぬるぬるする……」

    %CALLNAME:TARGET%は驚きながらも、言われた通りに体を擦り付け始めた。

    「……こう……ですか……？　あたし、ちゃんとできてますか……？」

    「あの……%CALLNAME:MASTER%……これって……」

    %CALLNAME:TARGET%は戸惑いながら、石鹸を泡立てた。

    「えっと……体を擦り付ければいいんですよね……？」

    ぎこちない動きで、%CALLNAME:TARGET%は見よう見まねで体を動かし始めた。

    「……ぬるぬる……なんか、変な感じ……」

    初めての感触に%CALLNAME:TARGET%は困惑しながらも、体を動かし続けている。

    「……%CALLNAME:MASTER%……あたし、上手にできてますか……？」

    「……はい……やります……」

    %CALLNAME:TARGET%は緊張した面持ちで泡を体中に塗った。

    「あの……優しくしてくださいね……？　あたし、怖いので……」

    小さな体が震えながら%CALLNAME:MASTER%に密着した。

    「……こう……？　もっと強く擦った方が……？」

    %CALLNAME:TARGET%は不安そうに%CALLNAME:MASTER%の顔色を窺いながら、体を動かしている。

    「……%CALLNAME:MASTER%が満足してくれたら……嬉しいです……」

    「……えっと……%CALLNAME:MASTER%のお手伝い……ですか？」

    %CALLNAME:TARGET%は首を傾げながら、石鹸を見つめた。

    「妖精メイドのお仕事……なのかな……」

    %CALLNAME:TARGET%は困惑しながらも、泡まみれの体で%CALLNAME:MASTER%に抱きついた。

    「……むにゅ……こうかな……」

    たどたどしい動きで、%CALLNAME:TARGET%は懸命に体を擦り付け始めた。

    「……咲夜さんには、絶対内緒ですよ……？」
