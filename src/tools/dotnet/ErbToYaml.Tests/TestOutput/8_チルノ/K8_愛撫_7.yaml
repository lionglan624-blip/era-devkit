character: チルノ
situation: K8_愛撫
entries:
- id: fallback
  content: >-
    「んっ……！　あ、あたいの先っぽ、弄るの……？」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の指が胸の突起に触れ、小さく身震いした。

    氷の妖精の肌は冷たいはずなのに、そこだけは不思議と熱を帯びている。

    「……そこ、敏感なんだから……もっと優しくして……」

    %CALLNAME:人物_チルノ%は甘えるような声で、%CALLNAME:MASTER%にお願いした。

    「えへへ……%CALLNAME:MASTER%にされると、なんか特別な感じがするね」

    %CALLNAME:人物_チルノ%は恥ずかしそうに笑いながら、胸を差し出すように体を預けた。

    「ふぁっ……！　そこ、ぎゅってしたら……」

    %CALLNAME:MASTER%が乳首を摘むと、%CALLNAME:人物_チルノ%の声が甘く跳ねた。

    くりくりと指で転がされるたびに、氷の妖精の体がびくびくと震える。

    「んっ……やぁ……あたい、溶けちゃいそう……」

    %CALLNAME:人物_チルノ%は熱っぽい吐息を漏らしながら、%CALLNAME:MASTER%にしがみついた。

    「……もっとして……あたいの全部、%CALLNAME:MASTER%のものだから……」

    愛しそうに%CALLNAME:MASTER%を見つめ、%CALLNAME:人物_チルノ%はそう囁いた。

    「あっ……ん……っ、そこばっかり……」

    %CALLNAME:MASTER%が執拗に乳首を責めると、%CALLNAME:人物_チルノ%は切なげな声を上げた。

    小さな突起はすっかり固く尖り、%CALLNAME:MASTER%の指に主張している。

    「……%CALLNAME:MASTER%、いじわるだよ……胸だけで、変になっちゃう……」

    %CALLNAME:人物_チルノ%は顔を真っ赤にしながら、恥ずかしそうに目を伏せた。

    「……でも、嬉しいの……あたいのこと、こんなに好きでいてくれて……」

    愛おしさをにじませながら、%CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の手に胸を押し付けた。

    「ひゃっ……！　引っ張ったら、だめぇ……」

    %CALLNAME:MASTER%が乳首を軽く引っ張ると、%CALLNAME:人物_チルノ%は可愛らしい悲鳴を上げた。

    だが、その声には嫌悪の色はなく、むしろ甘えが滲んでいる。

    「……もう……あたい、%CALLNAME:MASTER%には弱いんだから……」

    %CALLNAME:人物_チルノ%はとろけた表情で、%CALLNAME:MASTER%を見上げた。

    「……今日は好きにしていいよ……あたい、%CALLNAME:MASTER%のことが大好きだから」

    素直な愛情表現とともに、%CALLNAME:人物_チルノ%は体を%CALLNAME:MASTER%に委ねた。
