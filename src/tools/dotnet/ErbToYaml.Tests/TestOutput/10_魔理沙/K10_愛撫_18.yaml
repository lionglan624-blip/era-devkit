  content: >-
    「お、おい……そっちに入れるのか……？」

    %CALLNAME:MASTER%がアナルバイブを取り出すと、%CALLNAME:人物_魔理沙%は少し困惑した。

    「まあ……お前がそうしたいなら、いいけどさ」

    アナルバイブがゆっくりと菊穴に挿入され、%CALLNAME:人物_魔理沙%は息を詰めた。

    「んっ……うねうね動いてる……変な感じだぜ……」

    %CALLNAME:人物_魔理沙%は恋人にしがみつき、未知の快感に身を委ねた。

    「またその玩具か……お前、本当にそういうの好きだな」

    %CALLNAME:人物_魔理沙%は呆れたような笑みを浮かべた。

    「……まあ、恋人の頼みだし、断れないぜ」

    アナルバイブが挿入されると、%CALLNAME:人物_魔理沙%は小さく声を上げた。

    「あっ……振動してる……中で……腸壁に当たって……っ」

    %CALLNAME:人物_魔理沙%は顔を赤らめながら、%CALLNAME:MASTER%に体を預けた。

    「ふぅん……今日はそっちを責めたいのか」

    %CALLNAME:人物_魔理沙%はアナルバイブを見て、観念したように溜息をついた。

    「仕方ないな……お前の好きにしろよ」

    菊穴にアナルバイブが押し込まれ、振動が始まる。

    「んあっ……奥まで……うねうね動いて……変な声出るだろ……」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに、でも嬉しそうに%CALLNAME:MASTER%に寄り添った。

    「……ほら、力抜けって言うけど、無理だぜこれ」

    %CALLNAME:人物_魔理沙%はアナルバイブを挿入されながら呟いた。

    「お前のためだから我慢するけど……んっ……」

    振動がうねりながら腸壁を刺激し、%CALLNAME:人物_魔理沙%は体を震わせた。

    「あぁっ……直接響いて……頭ぼーっとしてきた……」

    %CALLNAME:人物_魔理沙%は恋人の腕に縋りながら、快楽に溺れていった。
