- id: fallback
  content: >-
    「……この体勢、不思議なのさ」

    %CALLNAME:人物_フラン%は四つんばいになりながら、首を傾げた。

    顔が見えない位置に%CALLNAME:MASTER%がいることに、どこか落ち着かない様子だ。

    「……本当に怖くないの？　私に背中を見せなくて」

    %CALLNAME:MASTER%が後ろから挿入すると、%CALLNAME:人物_フラン%は息を呑んだ。

    「っ……あ……後ろからだと……もっと奥まで……来てる……」

    悪魔の妹は、新しい感覚に戸惑いながらも受け入れていた。

    「……獣みたい」

    %CALLNAME:人物_フラン%は尻を突き出しながら、ぽつりと呟いた。

    495年の孤独の中、こんな体勢を取ることは想像もしなかった。

    「でも……嫌じゃないのさ。%CALLNAME:MASTER%となら」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_フラン%は小さく喘いだ。

    「ん……あっ……力の加減、気をつけないと……壊しちゃう……」

    快感の中でも、悪魔の妹は破壊の力を抑えようと必死だった。

    「%CALLNAME:MASTER%……私の後ろ姿、どう見える……？」

    %CALLNAME:人物_フラン%は興味半分、不安半分で問いかけた。

    自分では見えない姿を他人に晒すのは、不思議な気分だった。

    「……変じゃないなら、いいんだけど」

    %CALLNAME:MASTER%が奥まで突き入れると、%CALLNAME:人物_フラン%は声を漏らした。

    「はぁ……んっ……この角度……なんか、変な感じ……でも悪くない……」

    その言葉は、%CALLNAME:人物_フラン%なりの精一杯の肯定だった。

    「……後ろを向いてると、%CALLNAME:MASTER%が見えないのさ」

    %CALLNAME:人物_フラン%は不満そうに言った。

    しかし、%CALLNAME:MASTER%の体温を背中に感じると、少し安心したようだ。

    「……触ってるから、いるってわかるけど」

    %CALLNAME:MASTER%が激しく腰を打ちつけると、%CALLNAME:人物_フラン%は思わず声を上げた。

    「あっ……んっ……ちょっと……急に激しく……しないでよ……」

    その抗議の声は、どこか嬉しそうでもあった。
  priority: 2
- id: fallback
  content: >-
    「……へぇ、こういう体勢もあるんだ」

    %CALLNAME:人物_フラン%は興味深そうに四つんばいになった。

    しかしその紅い瞳は、背後の%CALLNAME:MASTER%を警戒している。

    「……後ろを取られるの、あんまり好きじゃないのさ」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_フラン%は不思議そうに首を傾げた。

    「あ……この角度だと……なんか違う感じがする……」

    新しい玩具を試すように、悪魔の妹は感覚を確かめていた。

    「獣の交尾みたい……面白いのさ」

    %CALLNAME:人物_フラン%は無邪気に笑った。

    その笑顔の裏に、どこか危険な光が潜んでいる。

    「でも%CALLNAME:MASTER%、私に背中を見せてていいの？　きゅっとしてドカーン、できちゃうよ？」

    %CALLNAME:MASTER%が構わず動くと、%CALLNAME:人物_フラン%の表情が揺らいだ。

    「んっ……あれ……なんか、力が抜けていく……」

    快感に思考が鈍っていくのを、悪魔の妹は不思議そうに感じていた。

    「……」

    %CALLNAME:人物_フラン%は無言で四つんばいの姿勢を取った。

    その紅い瞳は、感情を読み取らせない。

    「この体勢、無防備だよね。%CALLNAME:MASTER%のこと、すぐ壊せるのに」

    %CALLNAME:MASTER%が奥まで突き入れると、%CALLNAME:人物_フラン%は小さく声を漏らした。

    「っ……ん……でも今は、そんな気分じゃないのさ……」

    危険な言葉とは裏腹に、その体は快感を受け入れていた。

    「コンティニューできないの、わかってる？」

    %CALLNAME:人物_フラン%は警告するように言った。

    尻を突き出しながらも、その瞳は鋭く%CALLNAME:MASTER%を見ている。

    「私に後ろを取らせるなんて……%CALLNAME:MASTER%って本当に変わってるのさ」

    %CALLNAME:MASTER%が激しく腰を動かすと、%CALLNAME:人物_フラン%は言葉を失った。

    「あっ……んぅ……や……頭が……ぼんやりしてくる……」

    破壊の衝動を快感が塗り替えていく。
  priority: 1
