    キャップが蕾を覆い、振動が陰核を直接刺激する。

    「ふぁっ……んっ……！　こ、こんなの……初めて……」

    %CALLNAME:TARGET%は目を閉じて、未知の感覚に身を委ねている。

    「……%CALLNAME:MASTER%が……喜んでくれるなら……」

    小さな声でそう言って、妖精は健気にクリキャップの刺激に耐えた。
