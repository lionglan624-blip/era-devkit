entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……こんなところまで……触らせてくださるの……？」

    %CALLNAME:TARGET%は顔を赤らめながらも、恋人のために指を伸ばした。

    %CALLNAME:TARGET%の繊細な指先が、%CALLNAME:MASTER%の秘められた場所を優しく撫でる。

    「ふふ……緊張していらっしゃる……？」

    「大丈夫ですわ……優しくしますから……」

    メイドの器用な指が、丁寧に愛撫を続けた。

    「……%CALLNAME:MASTER%の全てを……知りたいですわ……」

    「こんな……はしたないご奉仕……」

    %CALLNAME:TARGET%は恥じらいながらも、%CALLNAME:MASTER%のために手を動かしている。

    「でも……貴方が望むなら……」

    %CALLNAME:TARGET%の指が優しく円を描くように愛撫する。

    「ん……こうすると……気持ちいいですか……？」

    「……もっと……感じてくださいまし……」

    %CALLNAME:TARGET%は恋人の反応を確かめながら指を動かした。

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げながら、その秘所に指を這わせる。

    「こんなことをする日が来るなんて……」

    「瀟洒なメイドとしては……想定外ですわね……」

    しかし、その表情には喜びが滲んでいた。

    「でも……貴方のためなら……何でも……」

    %CALLNAME:TARGET%は恋人にだけ見せる顔で微笑んだ。

    「……%CALLNAME:MASTER%……力を抜いてくださいまし……」

    %CALLNAME:TARGET%は優しく%CALLNAME:MASTER%の体を支えながら愛撫を続けている。

    「私が……気持ちよくして差し上げますわ……」

    %CALLNAME:TARGET%の指先が巧みに動き、敏感な場所を探り当てる。

    「ふふ……ここ……弱いのですね……」

    「……もっと……乱れてくださいまし……」

    完璧なメイドは、恋人のために献身的な奉仕を続けた。
