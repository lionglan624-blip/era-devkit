- id: fallback
  content: >-
    「……体で、洗えばいいの？」

    %CALLNAME:人物_フラン%は首を傾げながら、泡を体に塗った。

    地下室で過ごした長い年月、こんなことは知らなかった。

    「ふぅん……変なことするのさ……」

    %CALLNAME:人物_フラン%は興味本位で体を押し当ててみた。

    「……ぬるぬるする……これが、気持ちいいの……？」

    その声には、純粋な好奇心だけがあった。

    「%CALLNAME:MASTER%……私、こういうことよく知らないのさ……」

    %CALLNAME:人物_フラン%は正直に告白しながら、言われた通りに体を動かしていた。

    495年の隔離生活で、世間のことは何も知らない。

    「でも……%CALLNAME:MASTER%が教えてくれるなら……」

    %CALLNAME:人物_フラン%はぎこちなく、それでも一生懸命に体を擦りつける。

    「……こう？　……もっと強く？　……わかった……」

    素直に従う姿に、かつての凶暴さは見られなかった。

    「なんだか……体が熱くなってきた……」

    %CALLNAME:人物_フラン%は体を擦りつけながら、自分の変化に戸惑っていた。

    %CALLNAME:MASTER%に密着していると、胸の奥がざわざわする。

    「……これって、どういう気持ちなの……？」

    %CALLNAME:人物_フラン%は無自覚のまま、体の動きを速めていた。

    「……%CALLNAME:MASTER%のこと、もっと知りたくなってきたのさ……」

    その言葉は、芽生え始めた感情の表れだった。

    「……%CALLNAME:MASTER%といると、不思議な気持ちになるのさ」

    %CALLNAME:人物_フラン%はぼんやりと呟きながら、体を動かし続けていた。

    壊してしまいたい衝動と、大切にしたい気持ちが入り混じる。

    「私……%CALLNAME:MASTER%のことは、壊したくないの……」

    %CALLNAME:人物_フラン%は真剣な表情で%CALLNAME:MASTER%を見つめた。

    「……だから、こうして優しくするのさ……」

    悪魔の妹は、初めての感情に戸惑いながらも向き合っていた。
  priority: 2
- id: fallback
  content: >-
    「……体で洗えって言うの？」

    %CALLNAME:人物_フラン%は冷めた目で%CALLNAME:MASTER%を見つめた。

    その視線には、警戒と退屈が入り混じっている。

    「……まぁ、いいけど……」

    %CALLNAME:人物_フラン%は気怠そうに泡を塗った。

    「……早く終わらせてよね……」

    義務的な動きで、最低限の奉仕をするだけだった。

    「……ふぅん……」

    %CALLNAME:人物_フラン%は興味なさそうに体を動かしていた。

    その表情には、退屈さが滲み出ている。

    「……こういうの、何が楽しいの……？」

    %CALLNAME:人物_フラン%は投げやりな質問を投げかけた。

    「……まぁ、いいけど……あんたが喜ぶなら……」

    そこに愛情は欠片もなかった。

    「……」

    %CALLNAME:人物_フラン%は無言で体を擦りつけていた。

    その紅い瞳は、どこか虚ろに%CALLNAME:MASTER%を見ている。

    「……お姉さまなら、こんなこと許さないのにね……」

    %CALLNAME:人物_フラン%はぽつりと呟いた。

    「……でも、私はどうでもいいのさ……」

    悪魔の妹は、心をどこかに置き去りにしていた。

    「……これで満足……？」

    %CALLNAME:人物_フラン%は退屈そうに体を動かしながら、問いかけた。

    壊してしまおうかという衝動が、一瞬頭をよぎる。

    「……別に、このまま押しつぶしてもいいんだけど……」

    %CALLNAME:人物_フラン%は危険な微笑みを浮かべた。

    「……今日のところは、やめておいてあげる……」

    その言葉には、狂気の残滓が垣間見えた。
  priority: 1
