    %CALLNAME:TARGET%は機械的に一物を胸で挟んだ。

    「……私は読みたい本があるの……手短に」

    冷淡な態度で、%CALLNAME:TARGET%は義務的に胸を動かし続けた。

    「……」

    %CALLNAME:TARGET%は黙って胸を動かしている。

    「……こうすれば良いのでしょう……」

    %CALLNAME:TARGET%は事務的に言った。

    「……興味はありませんが……言われたから従っているだけよ」

    無感動な態度で、%CALLNAME:TARGET%は奉仕を続けた。

    「……はぁ……」

    %CALLNAME:TARGET%は溜息をつきながら胸を動かしている。

    「……こんなことに時間を費やすなんて……」

    %CALLNAME:TARGET%は不満そうに呟いた。

    「……本を読んでいた方がよほど有意義なのに……」

    明らかに嫌々ながら、%CALLNAME:TARGET%は奉仕を続けた。

    「……終わったら出て行ってくださいね」

    %CALLNAME:TARGET%は冷たく言い放った。

    「……私の胸では満足できないでしょうけど……」

    %CALLNAME:TARGET%は最低限の動きで胸を動かしている。

    「……早く終わらせて……それだけよ」

    投げやりな態度で、%CALLNAME:TARGET%は義務を果たしていた。
