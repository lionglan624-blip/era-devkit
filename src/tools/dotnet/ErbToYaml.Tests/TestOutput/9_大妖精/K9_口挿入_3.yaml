    %CALLNAME:人物_大妖精%は頬を染めながら、照れくさそうに呟いた。

    「……もっと、いっぱい擦らせてね……？」

    甘えるように、%CALLNAME:人物_大妖精%は腰を動かし続けた。

    「えへへ……%CALLNAME:MASTER%、力抜いていいよ……？」

    %CALLNAME:人物_大妖精%は優しく%CALLNAME:MASTER%の一物を太腿で包み、ゆっくりと腰を動かし始めた。

    翅がきらきらと光を放ち、妖精の幸せな気持ちを映し出している。

