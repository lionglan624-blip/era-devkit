    「あ、あんなところ見るなんて……は、恥ずかしいですわ……」

    %CALLNAME:人物_小悪魔%は両手で顔を覆いながらも、脚を閉じようとはしない。

    「……で、でも……%CALLNAME:MASTER%になら……見られても……」

    %CALLNAME:人物_小悪魔%は指の隙間から%CALLNAME:MASTER%を見つめて、小さく頷いた。

    %CALLNAME:MASTER%は%CALLNAME:人物_小悪魔%の秘裂をそっと押し開いた。

    「んっ……やぁ……そこ、見られると……恥ずかしい……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに顔を背けながらも、%CALLNAME:MASTER%から逃げ出さない。

    「……%CALLNAME:MASTER%……中まで見てるんですの……？」

    %CALLNAME:人物_小悪魔%は涙目で%CALLNAME:MASTER%を見つめている。

    「……悪魔が、こんなに照れるなんて……おかしいですわよね……」

    「あ……っ！ %CALLNAME:MASTER%……そこは……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に秘所を開かれて、甘い声を漏らしている。

    「そ、そんなにじっくり見られると……変な気持ちになっちゃいますわ……」

    %CALLNAME:人物_小悪魔%の秘所からは、とろりと蜜が溢れ始めていた。

    「……%CALLNAME:MASTER%……もう少しだけ……見ていても……いいですわ……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに目を伏せながら、小さくお願いした。

    「ひゃうっ……！ 開いちゃ……だめ……っ」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に花弁を開かれて、体を震わせた。

    「%CALLNAME:MASTER%……私のこと、からかってるんですの……？」

    %CALLNAME:人物_小悪魔%は潤んだ瞳で%CALLNAME:MASTER%を見つめている。

    「……いじわるな人……でも、嫌じゃ……ないですわ……」

    %CALLNAME:人物_小悪魔%は顔を真っ赤にして、小さな声で告白した。
