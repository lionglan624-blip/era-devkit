character: パチュリー
situation: K3_挿入
entries:
- id: fallback
  content: >-
    「……んっ……こんな体勢、まるで獣みたい……」

    %CALLNAME:TARGET%は四つんばいになりながら、頬を紅く染めている。

    大図書館の床に手をついた姿は、普段の知的な佇まいとは対照的だ。

    「……あ……後ろから、来るの……？ んっ……深い……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を受け入れ、背中を震わせた。

    「……顔が見えないのは、少し寂しいわ……でも、悪くない」

    「はぁ……ん……っ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに合わせて、小さく喘いでいる。

    本の山に囲まれた空間で、獣のように交わる背徳感。

    「……%CALLNAME:MASTER%、私の腰を、もっと支えて……体力がないから……」

    %CALLNAME:TARGET%は甘えるように頼んだ。

    「……あなたに委ねるから、好きにして……」

    「あ……やぁ……そこ、奥まで……」

    %CALLNAME:TARGET%は珍しく乱れた声を上げた。

    この体勢だと普段よりも深く感じる。

    「……ん……本で読んだ知識では、この角度は……むきゅ……」

    %CALLNAME:TARGET%は理論的に説明しようとして、感覚に負けた。

    「……もう、考えるのは後にするわ……」

    「……ふぅ……あ……」

    %CALLNAME:TARGET%は床に伏せるようにしながら、%CALLNAME:MASTER%を受け入れている。

    「……この体勢、体力的には楽なのよ。支えてもらえるから」

    %CALLNAME:TARGET%は照れ隠しのように言った。

    「……んっ……後ろからでも、あなたの温もりは感じられる……」

    そう呟いて、%CALLNAME:TARGET%は目を閉じた。
