- id: fallback
  content: >-
    「お尻に……正面から入れるの？　変なのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の顔を見ながら首を傾げた。

    495年の孤独の中では、こんなことは知らなかった。

    「まあ……%CALLNAME:MASTER%がそうしたいなら、やってみる」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の後孔に挿入すると、眉を顰めた。

    「いた……っ……お尻に入ってくる……変な感じ……」

    悪魔の妹は、新しい体験の痛みに戸惑っていた。

    「%CALLNAME:MASTER%……正面だと、顔がよく見えるね」

    %CALLNAME:人物_フラン%は素朴な感想を口にした。

    相手の表情を観察できるのは、なかなか面白い。

    「……お尻は痛いけど……%CALLNAME:MASTER%の顔、見えるのは悪くない」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_フラン%は小さく声を上げた。

    「んっ……ぁ……動くと……お尻の奥……変な感じ……」

    痛みと共に湧き上がる奇妙な感覚に、悪魔の妹は戸惑っていた。

    「こうして抱き合ってると……壊さないでいられるかも」

    %CALLNAME:人物_フラン%は自分の手を見つめながら呟いた。

    抱きしめていれば、破壊の衝動を抑えられる気がする。

    「地下室では……こうやって誰かと繋がること、なかったから」

    %CALLNAME:MASTER%が後孔を突くと、%CALLNAME:人物_フラン%は吐息を漏らした。

    「ん……あ……お尻……きつい……でも、なんか……落ち着く」

    悪魔の妹は、自分でも気づかないうちに%CALLNAME:MASTER%の存在を受け入れ始めていた。

    「%CALLNAME:MASTER%って、お尻に入れるの好きなの……？」

    %CALLNAME:人物_フラン%は素朴な疑問を口にした。

    世界を知らない少女にとって、全てが未知の体験だ。

    「……495年、ずっとひとりだったから。こういうの、わからない」

    %CALLNAME:MASTER%が深く挿入すると、%CALLNAME:人物_フラン%は声を漏らした。

    「んっ……あ……奥まで……きてる……痛い……けど……悪くない」

    その言葉は、悪魔の妹なりの精一杯の肯定だった。
  priority: 2
- id: fallback
  content: >-
    「ふぅん……お尻に、正面から入れるんだ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の顔を見ながら呟いた。

    新しい遊び方を見つけた子供のような好奇心が、紅い瞳に宿っている。

    「顔が見えるのは……まあ、いいね」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の後孔に挿入すると、眉が動いた。

    「……いた。……でも、%CALLNAME:MASTER%の顔が歪むのが見えて、面白いのさ」

    悪魔の妹は、相手の反応を観察することに興味を示していた。

    「%CALLNAME:MASTER%……お尻だと、どうなるの？」

    %CALLNAME:人物_フラン%は首を傾げながら聞いた。

    好奇心は強いが、痛みへの配慮は薄い。

    「壊れちゃう前に、教えてね……私、加減が苦手なのさ」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_フラン%は無表情のまま声を上げた。

    「……ん……あ……痛い……けど、こういうものなんだ……なるほどね」

    悪魔の妹は、新しい遊びの仕組みを理解しようとしていた。

    「……」

    %CALLNAME:人物_フラン%は無表情で%CALLNAME:MASTER%を見つめた。

    495年の孤独が生んだ、どこか虚ろな紅い瞳。

    「正面からだと……きゅっとしてドカーン、したくなるね」

    %CALLNAME:MASTER%が%CALLNAME:人物_フラン%の後孔を突くと、表情がわずかに揺れた。

    「……いた……でも、繋がってると……壊したくなくなる……なんでだろ」

    破壊衝動を鈍らせる何かに、悪魔の妹は戸惑いを隠せなかった。

    「%CALLNAME:MASTER%の顔……こんな近くで見えるね」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の顔を覗き込みながら言った。

    壊れやすいものがこんなに近くにいる感覚が、奇妙に新鮮だ。

    「こうしてると……逃げられないでしょ、%CALLNAME:MASTER%」

    %CALLNAME:MASTER%が後孔を抉ると、%CALLNAME:人物_フラン%は声を漏らした。

    「んっ……あ……お尻……すごい……でも、まだ壊さないのさ……遊び、終わってないから」

    悪魔の妹は、無邪気な残酷さと共に快楽を味わっていた。
  priority: 1
