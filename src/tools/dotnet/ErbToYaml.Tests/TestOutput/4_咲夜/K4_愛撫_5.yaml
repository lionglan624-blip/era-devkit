character: 咲夜
situation: K4_愛撫
entries:
- id: fallback
  content: >-
    「あっ……そ、そこは……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指が後ろの窄まりに触れると、瀟洒な仮面が僅かに揺らいだ。

    「……%CALLNAME:MASTER%、そこをいじるのは……恥ずかしいですわ……」

    メイド服の裾を握りしめながら、%CALLNAME:TARGET%は熱い吐息を漏らしている。

    「でも……貴方になら……見せても、いいですわ……」

    %CALLNAME:TARGET%は羞恥に頬を染めながらも、%CALLNAME:MASTER%から逃げようとはしなかった。

    「……もっと……触れてくださいまし……」

    恋人だけに許した、瀟洒な従者の秘密の姿だった。

    「ひゃっ……やぁ……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の菊穴をそっとなぞっている。

    %CALLNAME:TARGET%は身を震わせながらも、%CALLNAME:MASTER%に体を預けていた。

    「そんなところ……お嬢様に知られたら……」

    「……でも、止めないでくださいまし……」

    %CALLNAME:TARGET%の声には、隠しきれない甘さが滲んでいる。

    「貴方の指……熱い……」

    完璧なメイドが見せる、恋人への全幅の信頼だった。

    「んっ……あぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に後ろをいじられ、甘い声を漏らしている。

    「こんな姿……誰にも見せたことありませんのに……」

    %CALLNAME:MASTER%の指が窄まりを押し広げるたび、%CALLNAME:TARGET%の体は小さく跳ねた。

    「……%CALLNAME:MASTER%だけですわ……こんな私を……」

    %CALLNAME:TARGET%は目を潤ませながら、%CALLNAME:MASTER%を見つめている。

    「……もっと、深く……」

    恋人への愛情が、羞恥を上回っていた。

    「あっ……そこ、感じてしまいますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の愛撫に、声を抑えきれずにいる。

    「後ろで……こんなに気持ちよくなるなんて……」

    銀髪が乱れ、普段の瀟洒な姿からは想像できない艶やかな表情を見せる。

    「%CALLNAME:MASTER%……私、貴方に壊されてしまいそう……」

    %CALLNAME:TARGET%は甘く囁きながら、%CALLNAME:MASTER%の指を締め付けた。

    「……でも、それも悪くありませんわね……」

    恋人だけに見せる、蕩けた笑みだった。
  priority: 4
- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%、そこは……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の指が後ろに触れると、体を強張らせた。

    「そ、そのような場所を……いじるなんて……」

    抗議しようとしながらも、%CALLNAME:TARGET%の声には力がない。

    「……っ……恥ずかしい……」

    %CALLNAME:TARGET%は顔を真っ赤にしながらも、%CALLNAME:MASTER%の手を払わなかった。

    「……少しだけなら……お許しいたしますわ……」

    「ひっ……やめ……いえ……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の窄まりをなぞっている。

    %CALLNAME:TARGET%は拒もうとして、言葉を飲み込んだ。

    「……メイドとして、こんな姿は……」

    「……でも、貴方だから……」

    %CALLNAME:TARGET%は恥じらいながらも、%CALLNAME:MASTER%の愛撫を受け入れていた。

    「……感じてしまいますわ……」

    「あっ……そこ……」

    %CALLNAME:TARGET%は声を漏らし、慌てて口を押さえた。

    「……後ろなんて……いじらないでくださいまし……」

    そう言いながらも、%CALLNAME:TARGET%の体は逃げようとしない。

    「……%CALLNAME:MASTER%は、本当に意地悪ですわね……」

    %CALLNAME:TARGET%は恨めしそうに%CALLNAME:MASTER%を見つめながらも、抵抗をやめた。

    「んっ……」

    %CALLNAME:TARGET%は小さく喘ぎ、体を震わせた。

    「こんなところで感じるなんて……いけませんわ……」

    %CALLNAME:MASTER%の指が窄まりを押し広げるたび、%CALLNAME:TARGET%の呼吸が乱れていく。

    「……お嬢様に知られたら、私……」

    「……でも、止められませんわ……」

    %CALLNAME:TARGET%の声には、隠しきれない甘さがこもっていた。
