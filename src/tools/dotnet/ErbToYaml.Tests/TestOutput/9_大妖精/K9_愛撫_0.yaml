    %CALLNAME:MASTER%の手が肌を這うたび、%CALLNAME:人物_大妖精%の体が小さく震える。

    「……%CALLNAME:MASTER%は、わたしの弱いところ、よく知ってるね……」

    %CALLNAME:人物_大妖精%は恥ずかしそうに目を伏せた。

    「……でも、嬉しいの……%CALLNAME:MASTER%だから……」

    信頼を込めて、%CALLNAME:人物_大妖精%は%CALLNAME:MASTER%を見上げた。

    「……ん……」

    %CALLNAME:人物_大妖精%は目を閉じて、%CALLNAME:MASTER%の愛撫を受け入れている。

    普段は控えめな妖精も、今は恋人の腕の中で安らいでいた。

    「……%CALLNAME:MASTER%といると、怖いものなんてないの」

    %CALLNAME:人物_大妖精%はそっと%CALLNAME:MASTER%の手に自分の手を重ねた。

    「……わたし、%CALLNAME:MASTER%のこと、大好きだよ……」

