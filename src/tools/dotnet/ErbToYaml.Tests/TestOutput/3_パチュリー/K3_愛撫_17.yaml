- id: fallback
  content: >-
    「……それは……後ろに……入れるのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が手にしたアナルバイブを見て、静かに息を吐いた。

    %CALLNAME:MASTER%が菊穴を丁寧にほぐし、ゆっくりとアナルバイブを挿入すると、%CALLNAME:TARGET%の体が震えた。

    「……あ……うねって……腸壁を……なぞってる……」

    アナルバイブは触手のように蠢き、%CALLNAME:TARGET%の内壁を刺激し続けている。

    「……%CALLNAME:MASTER%……あなたになら……どこでも……委ねるわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋め、甘い吐息を漏らした。

    「……ひぁ……っ……後ろから……」

    アナルバイブの振動が%CALLNAME:TARGET%の腸内を蹂躙している。

    %CALLNAME:TARGET%は読みかけの古文書を机に落とし、%CALLNAME:MASTER%にしがみついた。

    「……うねうね……動いて……思考が……蕩けていく……」

    %CALLNAME:TARGET%の瞳は潤み、普段の冷静さは完全に消え失せていた。

    「……%CALLNAME:MASTER%……このまま……どこまでも……」

    そう呟いて、%CALLNAME:TARGET%は快感の渦に身を任せた。

    「……あ……あぁ……後ろが……」

    %CALLNAME:TARGET%はアナルバイブのうねりに合わせて、小刻みに腰を震わせている。

    腸内を満たす振動は、%CALLNAME:TARGET%の理性を甘く溶かしていった。

    「……こんな道具で……こんなに……後ろも……」

    %CALLNAME:TARGET%は恥ずかしそうに目を伏せたが、その表情は蕩けている。

    「……%CALLNAME:MASTER%……もっと……奥で……動かして……」

    %CALLNAME:TARGET%は珍しく素直に、自らの欲望を口にした。

    「……ん……ふぅ……」

    %CALLNAME:TARGET%はアナルバイブの振動に身を委ね、%CALLNAME:MASTER%の腕の中で蕩けている。

    腸壁を刺激する振動が、%CALLNAME:TARGET%の体を甘く痺れさせていた。

    「……前とは違う刺激……でも……心地いいわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げ、淡い微笑みを浮かべた。

    「……あなたといると……新しい発見ばかりね……」

    その言葉は、普段の%CALLNAME:TARGET%からは想像できないほど素直だった。
