- id: fallback
  content: >-
    「……何の真似かしら」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が差し出したオナホールを見て、冷ややかな目を向けた。

    「そんな下品な道具を……私に使えと……？」

    %CALLNAME:TARGET%は呆れたように溜息をついた。

    「……理解に苦しむわ。帰りなさい」

    そう言って%CALLNAME:TARGET%は、読書に戻ろうとした。

    「……」

    %CALLNAME:TARGET%は冷めた目で%CALLNAME:MASTER%を見た。

    「お断りよ。そんな下品なことに付き合う義理はないわ」

    %CALLNAME:TARGET%は淡々と拒絶した。

    「……知識の殿堂を汚さないで。さっさと帰りなさい」

    %CALLNAME:TARGET%は本を盾のように構えた。

    「……むきゅ」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「大図書館にふさわしくないわ、そんな物は」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を睨みつけた。

    「……精霊魔法で追い出されたくなければ、それをしまいなさい」

    冷たい声が大図書館に響いた。

    「……はぁ」

    %CALLNAME:TARGET%は深い溜息をついた。

    「あなたは私に何を求めているの。不愉快だわ」

    %CALLNAME:TARGET%は呆れたような表情を浮かべている。

    「……本を汚したら許さないわよ」

    %CALLNAME:TARGET%は冷めた目で%CALLNAME:MASTER%を一瞥し、読書に戻った。
  priority: 1
