entries:
- id: fallback
  content: >-
    「え、後ろの穴……？　……%CALLNAME:MASTER%がしたいなら、いいよ」

    %CALLNAME:人物_チルノ%は正面から%CALLNAME:MASTER%を見上げながら、体を預けた。

    %CALLNAME:MASTER%が菊穴にゆっくりと挿入すると、%CALLNAME:人物_チルノ%は小さく息を呑んだ。

    「んっ……きつい……変な感じ……でも、%CALLNAME:MASTER%となら大丈夫」

    %CALLNAME:人物_チルノ%の菊穴はぎゅっと%CALLNAME:MASTER%を締め付けてくる。

    「あたいのお尻も……%CALLNAME:MASTER%だけのものだからね」

    「はぁっ……後ろ、すごいきつい……」

    %CALLNAME:人物_チルノ%は正面から%CALLNAME:MASTER%を見つめながら、腰を揺らした。

    腸壁が異物を締め付け、%CALLNAME:MASTER%に心地よい刺激を与えてくる。

    「んっ……あ……こっちの穴だと、なんか違う……」

    %CALLNAME:人物_チルノ%は新しい感覚に目を丸くしていた。

    「でも……%CALLNAME:MASTER%が気持ちいいなら、あたいも嬉しいよ……」

    「えへへ……%CALLNAME:MASTER%、お尻でするの好きなんだ」

    %CALLNAME:人物_チルノ%は恥ずかしそうに笑いながら、体を開いた。

    %CALLNAME:MASTER%が菊穴を貫くと、きゅうっと締め付けてくる。

    「んあっ……お腹の奥、じんじんする……っ」

    氷の妖精の体は熱を帯びて、%CALLNAME:MASTER%を受け入れていた。

    「あたいの全部……%CALLNAME:MASTER%にあげるから……」

    「……%CALLNAME:MASTER%、正面からだと顔見えるね」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の首に腕を回した。

    後ろの穴で繋がっているのに、その表情は幸せそうだった。

    「んっ……はぁ……きついけど……%CALLNAME:MASTER%と繋がってる……」

    %CALLNAME:人物_チルノ%の菊穴は%CALLNAME:MASTER%を離さないように締め付けた。

    「こんなとこまであたいのもの……えへへ……最強でしょ？」
  priority: 4
- id: talent_3_1
  content: >-
    「え……お、お尻でするの……？　……べ、別にいいけど……」

    %CALLNAME:人物_チルノ%は真っ赤な顔で%CALLNAME:MASTER%を見上げた。

    %CALLNAME:MASTER%が菊穴に挿入すると、きつく締め付けてきた。

    「んっ……いた……っ、ちょっと痛い……っ」

    %CALLNAME:人物_チルノ%は涙目になりながらも、逃げようとはしなかった。

    「……べ、別に泣いてないし……目にゴミが入っただけだし……」

    「ちょ……こっちの穴なんて、恥ずかしすぎるんだけど……！」

    %CALLNAME:人物_チルノ%は顔を真っ赤にして%CALLNAME:MASTER%を睨んだ。

    しかし菊穴は%CALLNAME:MASTER%を締め付けて離さない。

    「んあっ……っ、変な感じ……お腹がぐるぐるする……」

    %CALLNAME:人物_チルノ%は戸惑いながらも、%CALLNAME:MASTER%を受け入れていた。

    「……っ、こんなとこまで知られるなんて……ばかぁ……」

    「はぁっ……あっ……後ろ、きつくて……っ」

    %CALLNAME:人物_チルノ%は甘い声を漏らしてしまい、慌てて口を押さえた。

    腸壁が%CALLNAME:MASTER%を締め付け、ぎゅうぎゅうと圧迫している。

    「い、今の声、聞かなかったことにして……っ！」

    %CALLNAME:人物_チルノ%は必死に威厳を保とうとしていた。

    「……っ、お尻でこんな声出すなんて……あたいのばか……」

    「……%CALLNAME:MASTER%、あんまり見ないでよ……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに目を伏せた。

    お尻の穴で繋がっている事実が、%CALLNAME:人物_チルノ%を羞恥で染めていた。

    「んっ……は……っ、こっちの穴、締め付けちゃう……」

    %CALLNAME:人物_チルノ%の菊穴はひくひくと%CALLNAME:MASTER%を包み込んでいた。

    「……%CALLNAME:MASTER%のせいだからね……こんなの……」
