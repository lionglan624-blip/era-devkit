- id: fallback
  content: >-
    「……それ、何？　おっぱいを吸う機械？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にある搾乳機を見つめた。

    「私に使いたいの？　ふぅん……」

    %CALLNAME:人物_フラン%は興味を示しながらも、身構えていた。

    「……いいけど。面白そうだし」

    装着されると、%CALLNAME:人物_フラン%は目を丸くした。

    「わっ、本当に吸ってる……変な感じなのさ」

    「お姉様も使ったことあるのかな……」

    %CALLNAME:人物_フラン%は搾乳機を興味深そうに眺めた。

    「咲夜がお世話してるところ、見たことあるのさ」

    搾乳機が動き始めると、%CALLNAME:人物_フラン%は声を漏らした。

    「……っ。ふぅん、こういう感じなんだ」

    その言葉には、純粋な興味が込められていた。

    「%CALLNAME:MASTER%って、変なもの持ってるね」

    「乳首がすごく吸われてる……」

    %CALLNAME:人物_フラン%は搾乳機の感覚を確かめた。

    「これで私のおっぱい、気持ちよくなるの？」

    %CALLNAME:人物_フラン%は首を傾げながら、%CALLNAME:MASTER%を見た。

    「……んっ、なんか熱くなってきたかも」

    %CALLNAME:人物_フラン%は警戒しながらも、搾乳機を外そうとはしなかった。

    「まあ……嫌じゃないから、続けてもいいのさ」

    「地下に来てこんなことする人、初めてなのさ」

    %CALLNAME:人物_フラン%は搾乳機を見つめながら呟いた。

    「でも、まあ……面白いから付き合ってあげる」

    搾乳機が%CALLNAME:人物_フラン%の胸を吸い上げると、表情が変わった。

    「……っ……こんな気持ち、初めてかも」

    495年の孤独を知る少女は、新しい感覚に目を丸くした。

    「もう少し試してもいいのさ」
  priority: 2
- id: fallback
  content: >-
    「それ、何なのさ？　私のおっぱいを吸うの？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つ搾乳機を無表情で見つめた。

    「……ふぅん。変なの。でも、やってみてもいいよ」

    装着されると、%CALLNAME:人物_フラン%は無感動に胸を見下ろした。

    「吸われてる。……きゅっとしたら壊れちゃうかな、これ」

    その言葉が何を意味するのか、判断がつかなかった。

    「……まあ、壊さないでいてあげる。今日だけね」

    「別に……どうでもいいよ」

    %CALLNAME:人物_フラン%は搾乳機を見ながら、無関心に言った。

    「私、なんでも壊せるのさ。でも、これは壊さないであげる」

    搾乳機が動くと、%CALLNAME:人物_フラン%は小さく息を吐いた。

    「……気持ちいいかどうかは、わかんないのさ」

    悪魔の妹は、興味なさそうに言いながらも搾乳機を外そうとはしなかった。

    「つまんなくなったらやめるから、感謝しなさい」

    「……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を無表情で見つめた。

    「私のおっぱいを機械で吸わせるの？　変なことするね」

    搾乳機が動くと、%CALLNAME:人物_フラン%の表情が僅かに歪んだ。

    「……っ……こういう感じなんだ」

    495年の孤独が育てた警戒心が、一瞬揺らいだように見えた。

    「……面白いかも。もう少しやってみる」

    「あなた、コンティニューできないのさ」

    %CALLNAME:人物_フラン%は不穏なことを口にしながら、搾乳機を見つめた。

    「でも、それ、ちょっと気になるの。私のおっぱいにつけてよ」

    搾乳機が動くと、%CALLNAME:人物_フラン%は小さく身を震わせた。

    「……ふぅん。外の世界って、変なものがあるね。おっぱいを吸う機械なんて」

    %CALLNAME:人物_フラン%は興味を持ったようだった。

    「また持ってきてもいいのさ。壊さないでいられたらね」
  priority: 1
