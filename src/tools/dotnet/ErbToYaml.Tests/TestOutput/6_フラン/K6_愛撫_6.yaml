    「私、そういうの……よくわからないのさ」

    %CALLNAME:MASTER%の手が胸に触れると、%CALLNAME:人物_フラン%はびくりとした。

    「っ……なんだか、変な感じ……」

    戸惑いながらも、%CALLNAME:人物_フラン%は逃げようとはしなかった。

    「……%CALLNAME:MASTER%は変わってるね。私に触りたいなんて」

    「ふぅん……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手を興味深そうに眺めた。

    「地下に来て、私の胸を触るの？　変な人なのさ」

    %CALLNAME:MASTER%が乳房に触れると、%CALLNAME:人物_フラン%は小さく息を漏らした。

    「……あ……なんだろう、この感じ……」

    %CALLNAME:人物_フラン%は自分の身体の反応に、少し驚いたようだった。

    「……もうちょっとだけ、続けてみて」

    「……っ」

