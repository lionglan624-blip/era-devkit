    サキュバスの血が反応し、体が勝手に快楽を求め始めていた。

    「この体勢……まえとちがう……おくまで、くる……」

    %CALLNAME:TARGET%は不思議そうに首を傾げた。

    「へんなの……でも、わるくない……」

