entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%の指が%CALLNAME:人物_パチュリー%の後ろの穴に触れた。

    「ひっ……そ、そこは……」

    %CALLNAME:人物_パチュリー%は本を取り落とし、驚きの声を上げた。

    「後ろの穴まで……本には載っていない領域ね……」

    %CALLNAME:MASTER%がそっと愛撫すると、%CALLNAME:人物_パチュリー%は小さく身を震わせた。

    「んっ……あ……変な感じ……でも……嫌ではないわ……」

    %CALLNAME:人物_パチュリー%は頬を赤らめながら、%CALLNAME:MASTER%に身を委ねた。

    「……あなたになら、どこを触られても……構わないから……」

    大図書館の静寂の中、%CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%の後ろの穴を愛撫し始めた。

    「あっ……そこ……あ……」

    %CALLNAME:人物_パチュリー%は目を閉じ、未知の感覚に身を委ねている。

    「んぅ……はぁ……こういう快感も……あるのね……」

    %CALLNAME:人物_パチュリー%は甘い吐息を漏らしながら、%CALLNAME:MASTER%の服を握りしめた。

    「……後ろでも感じるなんて……体の神秘ね……」

    %CALLNAME:人物_パチュリー%は知識欲と羞恥心の間で揺れながらも、快感に酔いしれていた。

    「あなた……そこも、欲しいの？」

    %CALLNAME:人物_パチュリー%は静かに%CALLNAME:MASTER%に背を向けた。

    %CALLNAME:MASTER%の指が後ろの穴に触れると、%CALLNAME:人物_パチュリー%は小さく声を上げた。

    「んっ……あっ……恥ずかしいわ……」

    %CALLNAME:人物_パチュリー%は顔を本で隠しながら、%CALLNAME:MASTER%の愛撫を受け入れている。

    「……むきゅ……こんなところで感じるなんて……」

    %CALLNAME:人物_パチュリー%は体の反応に驚きながらも、%CALLNAME:MASTER%から離れようとはしなかった。

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%を抱き寄せ、後ろの穴に指を這わせた。

    「ひゃっ……あ……」

    %CALLNAME:人物_パチュリー%は小さく喘ぎながら、%CALLNAME:MASTER%に寄りかかった。

    「……後ろの穴を触るなんて……いやらしいわ……」

    そう言いながらも、%CALLNAME:人物_パチュリー%の体は%CALLNAME:MASTER%の愛撫に反応している。

    「んっ……あ……もっと……優しく……して……」

    %CALLNAME:人物_パチュリー%は珍しく甘えた声で、%CALLNAME:MASTER%にねだった。

    「……あなただから、こんな姿を見せられるのよ……」
