character: パチュリー
situation: K3_愛撫
entries:
- id: fallback
  content: >-
    「んっ……あ……」

    %CALLNAME:TARGET%は手元の魔導書を閉じ、%CALLNAME:MASTER%の愛撫を受け入れた。

    「……%CALLNAME:MASTER%、今日は読書より私を選んでくれるの？」

    %CALLNAME:TARGET%は静かに目を閉じ、%CALLNAME:MASTER%の手の温もりに身を委ねている。

    「……嬉しいわ。こうしていると、魔力が満ちていくみたい」

    そう呟きながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%に寄り添った。

    「……ふぅ……」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の体をゆっくりと撫でている。

    %CALLNAME:TARGET%は淡々とした表情を保とうとしているが、頬が微かに上気している。

    「……あなたの手は、不思議ね。触れられると、心が落ち着くの」

    %CALLNAME:TARGET%は珍しく素直な言葉を口にした。

    「……もう少し、そうしていて」

    「あ……そこ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に愛撫されながら、小さく声を漏らした。

    大図書館の静寂の中、%CALLNAME:TARGET%の吐息だけが響いている。

    「……本の中では味わえない感覚ね、これは」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の顔を見上げ、微かに微笑んだ。

    「……あなたとの時間は、私の一番の研究材料よ」

    「……ん……くぅ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の愛撫に、身を震わせた。

    普段は感情を表に出さない%CALLNAME:TARGET%が、今は甘い表情を浮かべている。

    「%CALLNAME:MASTER%……私を壊さないでね……体が弱いんだから」

    そう言いながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%の手を離さなかった。

    「……でも、あなたになら壊されてもいいわ」
  priority: 4
- id: talent_3_1
  content: >-
    「っ……何するの……」

    %CALLNAME:TARGET%は驚いた様子で%CALLNAME:MASTER%を見上げた。

    しかし、抵抗する様子はない。

    「……別に、嫌じゃないわ。ただ、急だったから」

    %CALLNAME:TARGET%は頬を赤らめながら、視線を逸らした。

    「……続けていいわよ。本を読むのに邪魔じゃなければ」

    「あ……やぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の愛撫に、小さく声を上げた。

    手元の本のページが、めくられないまま止まっている。

    「……集中できないじゃない」

    そう言いながらも、%CALLNAME:TARGET%は本を閉じた。

    「……今日は、あなたの相手をしてあげるわ」

    「……ん……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に触れられて、目を伏せた。

    「……こういうの、慣れていないの。だから……」

    %CALLNAME:TARGET%は言葉を探すように、口をつぐんだ。

    「……優しくして。本みたいに丁寧に扱って」

    恥ずかしそうに、%CALLNAME:TARGET%はそう呟いた。

    「ふぁ……っ……」

    %CALLNAME:TARGET%は思わず声を漏らし、慌てて口を押さえた。

    「……聞こえたら、小悪魔に何を言われるか」

    %CALLNAME:TARGET%は周囲を警戒するように見回した。

    「……%CALLNAME:MASTER%、もっと奥の書架に行きましょう」

    そう言って、%CALLNAME:TARGET%は%CALLNAME:MASTER%の手を引いた。
  priority: 3
  condition:
