entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%の胸……見せて」

    %CALLNAME:TARGET%は魔導書を閉じ、%CALLNAME:MASTER%の胸元に手を伸ばした。

    「……文献によると、乳首への刺激は快楽神経に直結しているらしいわ」

    %CALLNAME:TARGET%の唇が%CALLNAME:MASTER%の乳首に触れ、そっと吸い上げた。

    「……ん……あなたの味がする……本には書いていない感覚ね」

    %CALLNAME:TARGET%は静かに目を閉じて、%CALLNAME:MASTER%の乳首を舌で転がした。

    「……ちゅ……れろ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋め、乳首を吸い続けている。

    大図書館の薄暗い灯りの中、%CALLNAME:TARGET%の白い髪が%CALLNAME:MASTER%の肌に触れている。

    「……%CALLNAME:MASTER%……あなたの体は、どんな魔導書より興味深いわ」

    %CALLNAME:TARGET%は珍しく甘えるような声で囁いた。

    「……もっと……吸わせて」

    「……んむ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の乳首を舌先で転がしながら、うっとりと目を細めた。

    「……不思議ね……こうしていると、魔力が高まる気がするわ」

    %CALLNAME:TARGET%の小さな手が%CALLNAME:MASTER%のもう片方の胸を撫でている。

    「……%CALLNAME:MASTER%となら……何時間でも研究したくなるわ」

    そう言って、%CALLNAME:TARGET%は再び乳首に吸い付いた。

    「……ふぅ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕の中で、赤ん坊のように乳首を吸っている。

    「……こうしていると、私も安心するのね……本には書いてなかったわ」

    %CALLNAME:TARGET%は微かに微笑みながら、%CALLNAME:MASTER%を見上げた。

    「……甘えさせてくれるあなたが好きよ。……言わせないで」

    %CALLNAME:TARGET%は照れ隠しに、また乳首に唇を寄せた。
