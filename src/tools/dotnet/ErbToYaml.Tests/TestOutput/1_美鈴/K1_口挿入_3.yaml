  content: >-
    「――%CALLNAME:MASTER%……私の上に、乗って……」

    %CALLNAME:人物_美鈴%は甘い声でそう言って、仰向けに横たわった。

    足を開いて%CALLNAME:MASTER%を招き入れ、%CALLNAME:人物_美鈴%は一物を太腿で挟み込んだ。

    「……ふふ、熱い……%CALLNAME:MASTER%の、感じる……」

    %CALLNAME:人物_美鈴%は腰を前後に動かして、陰唇で一物を擦り始めた。

    「……ん……私のところ、濡れてきちゃった……%CALLNAME:MASTER%のせいよ……」

    愛おしげに、%CALLNAME:人物_美鈴%は腰の動きを速めた。

    「……ねえ、%CALLNAME:MASTER%……こうやって、密着してると……幸せ……」

    %CALLNAME:人物_美鈴%は頬を染めながら、%CALLNAME:MASTER%を見上げた。

    太腿と秘所で一物を挟み、%CALLNAME:人物_美鈴%はゆっくりと腰を揺らした。

    「……ぬるって……私の愛液で、滑りやすくなってる……」

    %CALLNAME:人物_美鈴%は恥ずかしそうに、でも嬉しそうに呟いた。

    「……もっと気持ちよくしてあげる……%CALLNAME:MASTER%、好き……」

    武術家の鍛えられた脚が、一物を丹念に愛撫し続けた。

    「……%CALLNAME:MASTER%の、こんなに硬くなって……」

    %CALLNAME:人物_美鈴%は秘所に押し当てられた一物の感触に、うっとりと目を細めた。

    「……入れたい……？　でも、今日は……こうして……」

    %CALLNAME:人物_美鈴%は悪戯っぽく笑って、腰を前後に動かした。

    「……ん、あ……クリに当たる……気持ちいい……」

    %CALLNAME:人物_美鈴%は自分も快感を感じながら、一物を擦り続けた。

    「……%CALLNAME:MASTER%も……一緒に、気持ちよくなろう……？」

    「――私の体、全部%CALLNAME:MASTER%のものだから……」

    %CALLNAME:人物_美鈴%は愛を込めて囁いた。

    「……足も、ここも……好きに使って……」

    太腿を閉じて一物を包み込み、%CALLNAME:人物_美鈴%は秘所で丁寧に擦り上げた。

    「……ふふ、%CALLNAME:MASTER%の顔、とろけそう……」

    %CALLNAME:人物_美鈴%は嬉しそうに笑いながら、動きを速めた。

    「……全部、受け止めてあげる……いっぱい出して……」
