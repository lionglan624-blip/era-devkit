- id: talent_3_1
  content: >-
    「……こ、こんな場所まで……お望みですの……？」

    %CALLNAME:TARGET%は戸惑いながらも、%CALLNAME:MASTER%の上に跨った。

    「メイドとして……こんな姿は……」

    しかし、恋心が羞恥を上回り、%CALLNAME:TARGET%は腰を下ろしていった。

    「っ……あ……入って……きますわ……」

    「%CALLNAME:MASTER%……私……」

    複雑な表情で、%CALLNAME:TARGET%はゆっくりと腰を動かし始めた。

    「……ぅ……こっちは……まだ慣れませんわ……」

    %CALLNAME:TARGET%は眉を寄せながら、%CALLNAME:MASTER%を受け入れていく。

    「でも……%CALLNAME:MASTER%が望むなら……」

    恋する気持ちが、%CALLNAME:TARGET%を動かしていた。

    「あ……んっ……変な感じ……」

    「こんなところで感じるなんて……おかしいですわ……」

    戸惑いながらも、%CALLNAME:TARGET%の腰は止まらなかった。

    「……%CALLNAME:MASTER%……見ないでください……」

    %CALLNAME:TARGET%は恥ずかしそうに目を逸らしながら腰を動かしている。

    「こんな……はしたない姿……」

    しかし%CALLNAME:MASTER%に顔を向けられ、視線が絡み合う。

    「っ……あ……奥が……」

    「……嫌……じゃないですわ……本当は……」

    %CALLNAME:TARGET%は小さな声で本心を漏らした。

    「……こうして……私が動けばいいのですね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の望みに応えようと、腰を揺らし始めた。

    「メイドとして……いえ……それだけではなく……」

    言葉を濁しながら、%CALLNAME:TARGET%の動きが次第に速くなる。

    「あ……ふぁ……きつい……けど……」

    「止められませんわ……%CALLNAME:MASTER%……」

    葛藤しながらも、%CALLNAME:TARGET%は快感に身を委ね始めていた。
