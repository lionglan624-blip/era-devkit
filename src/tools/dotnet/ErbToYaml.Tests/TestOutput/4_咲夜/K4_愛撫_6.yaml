- id: fallback
  content: >-
    「えっ……%CALLNAME:MASTER%、む、胸を……？」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の乳房に伸びてきた。

    %CALLNAME:TARGET%は驚いて身を固くしている。

    「……そ、そのようなことは……」

    しかし%CALLNAME:TARGET%は%CALLNAME:MASTER%の手を払いのけることができなかった。

    「……お嬢様に知られたら……」

    %CALLNAME:TARGET%は困惑しながらも、拒絶はしなかった。

    「っ……あの……%CALLNAME:MASTER%……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の乳房に触れている。

    %CALLNAME:TARGET%は顔を赤くしながら、どうしていいかわからない様子だ。

    「……メイドとして……このようなことは……」

    「……でも……%CALLNAME:MASTER%なら……」

    %CALLNAME:TARGET%は小さく呟き、%CALLNAME:MASTER%の行為を黙認した。

    「あっ……」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%の乳房を包み込んだ。

    %CALLNAME:TARGET%は息を呑み、体を強張らせている。

    「……%CALLNAME:MASTER%……そこは……」

    %CALLNAME:TARGET%は抗議しようとしたが、言葉が続かなかった。

    「……わ、わかりましたわ……少しだけですよ……」

    %CALLNAME:TARGET%は観念したように目を伏せた。

    「……ひぅ……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の乳房を撫でている。

    %CALLNAME:TARGET%は小さく声を漏らしてしまった。

    「……す、すみません……変な声を……」

    %CALLNAME:TARGET%は恥ずかしそうに顔を背けた。

    「……あまり……見ないでくださいまし……」
