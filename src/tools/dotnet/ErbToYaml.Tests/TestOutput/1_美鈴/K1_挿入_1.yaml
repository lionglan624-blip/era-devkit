    「……でも、背中は見られてるんですよね……」

    %CALLNAME:人物_美鈴%はそう言いながらも、拒む様子はなかった。

    「……%CALLNAME:MASTER%になら……見せても、いいです……」

    「あ……ん……っ……こんなに、奥まで……」

    %CALLNAME:人物_美鈴%は甘い声を抑えきれずに漏らした。

    「後ろから……だと……すごく、深い、です……」

    %CALLNAME:人物_美鈴%は肩越しに%CALLNAME:MASTER%を見上げた。

    「……恥ずかしいですけど……嫌じゃ、ないです……」

    その声には、照れと喜びが入り混じっていた。

    「……んっ……こ、この体勢……獣みたいで……」

    %CALLNAME:人物_美鈴%は羞恥に頬を染めながら呟いた。

    「……でも……%CALLNAME:MASTER%がこうしたいなら……」

    %CALLNAME:人物_美鈴%は自分から腰を少し上げた。

    「……私……受け入れます……」

    恥ずかしそうに、でも嬉しそうに%CALLNAME:人物_美鈴%は微笑んだ。

    「……%CALLNAME:MASTER%のこと……信じてますから……」

    「は、はぅ……っ……後ろから、だと……」

    %CALLNAME:人物_美鈴%は声を抑えようとしながら喘いだ。

    「……顔が見えない分、他の感覚が……敏感に……」

    %CALLNAME:人物_美鈴%は言葉を詰まらせた。

    「……%CALLNAME:MASTER%……私……あなたのこと……」

    言いかけて、%CALLNAME:人物_美鈴%は恥ずかしそうに黙った。

    「……大切に、思ってます……」
