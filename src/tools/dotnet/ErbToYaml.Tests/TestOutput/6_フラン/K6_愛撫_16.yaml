  content: >-
    「……それ、何？　細長くて震えてるのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にあるバイブを見つめた。

    「私のそこに……入れるの？　ふぅん……変なの」

    興味を示しながらも、%CALLNAME:人物_フラン%は身構えていた。

    挿入されると、%CALLNAME:人物_フラン%は目を丸くした。

    「っ……！　なにこれ……中で震えてる……変な感じなのさ」

    「あっ……それ……入れるの……？」

    %CALLNAME:人物_フラン%はバイブを見て、少し顔を赤くした。

    「恥ずかしいんだけど……まあ、%CALLNAME:MASTER%がそうしたいなら……」

    バイブが挿入され振動が始まると、%CALLNAME:人物_フラン%は声を詰まらせた。

    「んっ……！　そ、そこ、奥……なのさ……」

    495年の孤独を知る少女は、困惑しながらも逃げようとはしなかった。

    「ひゃっ……！」

    %CALLNAME:人物_フラン%はバイブの挿入に、小さく声を上げた。

    「び、びっくりした……そんなもの入れるなんて……変態なのさ」

    %CALLNAME:人物_フラン%は非難するように言ったが、その声には力がなかった。

    「……%CALLNAME:MASTER%は、私をどうしたいの？」

    その問いには、警戒よりも純粋な好奇心が滲んでいた。

    「……ふぅん」

    %CALLNAME:人物_フラン%はバイブを興味深そうに見つめた。

    「これで何するの？　……ああ、そこに入れるんだ」

    %CALLNAME:MASTER%が挿入して振動を始めると、%CALLNAME:人物_フラン%は身を震わせた。

    「……んっ……中で動いてる……変なのさ。でも、嫌いじゃないかも」

    %CALLNAME:人物_フラン%は首を傾げながら、自分の反応を確かめていた。
