- id: fallback
  content: >-
    「ん……うしろむき……？　いいよ……」

    %CALLNAME:TARGET%は無感情な瞳で、%CALLNAME:MASTER%の膝の上に座った。

    しかしその体は悪魔の本能に従い、%CALLNAME:MASTER%を締め付け始めていた。

    「……あたし、おなかすいてたの……」

    %CALLNAME:TARGET%はぼそりと呟いた。

    「うしろからでも……ぜんぶ、もらえる……」

    サキュバスの眷属として、%CALLNAME:TARGET%は%CALLNAME:MASTER%から精気を求めていた。

    「ふぅん……%CALLNAME:MASTER%、うしろから、したいの……」

    %CALLNAME:TARGET%は淡々と%CALLNAME:MASTER%を受け入れた。

    悪魔の少女の瞳には、獲物を絡め取るような光が宿っている。

    「いいよ……すきにして……」

    %CALLNAME:TARGET%は本能に従い、%CALLNAME:MASTER%を誘うように腰を動かした。

    「そのかわり……ぜんぶ、もらうから……」

    無邪気な声で淫らな言葉を紡ぎながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を締め付けた。

    「……ん、うしろむきだと……おく、までくる……」

    %CALLNAME:TARGET%は後ろから繋がりながら、淡々と感想を漏らした。

    感情のない瞳とは裏腹に、体は本能的に快楽を求めていた。

    「%CALLNAME:MASTER%……もっと、うごいて……」

    %CALLNAME:TARGET%は自ら腰を動かし始めた。

    「あたし、まだ……たりない……もっと、ちょうだい……」

    サキュバスの血が騒ぎ、%CALLNAME:TARGET%は飢えたように%CALLNAME:MASTER%を求めていた。

    「あたしね……うしろむき、はじめて……」

    %CALLNAME:TARGET%は後ろから抱きしめられ、不思議そうな顔をしている。

    しかし悪魔の本能は既に目覚め、%CALLNAME:MASTER%を搾り取ろうとしていた。

    「でも……体が、しってる……こうすれば、いっぱいもらえる……」

    %CALLNAME:TARGET%は本能のままに腰を動かし始めた。

    「%CALLNAME:MASTER%……あたしのなかに、いっぱい、だして……？」

    無表情な顔で淫らな言葉を紡ぎながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%を絡め取っていた。
