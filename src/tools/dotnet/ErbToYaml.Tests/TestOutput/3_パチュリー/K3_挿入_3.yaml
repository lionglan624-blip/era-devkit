- id: fallback
  content: >-
    「……これが、後背位での肛門性交……」

    %CALLNAME:TARGET%は四つんばいになりながら、冷静を装っている。

    「……本で読んだ通り、深く入る体位と、肛門の狭さ……」

    %CALLNAME:TARGET%は分析的に言おうとしたが、声が震えている。

    「……あっ……そう、そこ……むきゅ……痛い……」

    観察者でいるつもりが、感覚に飲まれていく。

    「んっ……ふぅ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きを、なんとか観察しようとしている。

    「……獣の交尾に似た姿勢で、肛門を……興味深いわ……」

    %CALLNAME:TARGET%は淡々と言おうとしたが、顔が歪んでいる。

    「……なぜ、こんなに体が強張るのかしら……」

    自分の反応に、%CALLNAME:TARGET%自身が戸惑っている。

    「あ……そこ……っ」

    %CALLNAME:TARGET%は思わず声を上げ、恥ずかしそうに顔を伏せた。

    「……不覚だわ。こんな体勢で、肛門から声が出るなんて……」

    %CALLNAME:TARGET%は研究者としての冷静さを保とうとしている。

    「……%CALLNAME:MASTER%、今のは記録しないで……」

    そう言いながらも、体は%CALLNAME:MASTER%を受け入れ続けている。

    「……」

    %CALLNAME:TARGET%は黙って四つんばいの姿勢を取っている。

    研究者として、様々な体位と行為を経験しておくべきかもしれない。

    「……%CALLNAME:MASTER%、質問があるわ」

    %CALLNAME:TARGET%は息を整えながら、振り向こうとした。

    「……なぜ、この姿勢で、そこを選んだの？」
  priority: 2
- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情のまま、四つんばいになっている。

    「……後ろから、肛門で？ 変わった趣味ね。まあ、好きにしなさい」

    %CALLNAME:TARGET%は淡々と言い放った。

    「……ただし、体が弱いから激しくしないで」

    それだけを告げ、%CALLNAME:TARGET%は床に視線を落とした。

    「……ふぅ……」

    %CALLNAME:TARGET%は溜息をつきながら、%CALLNAME:MASTER%の行為を受けている。

    「……この姿勢で、肛門なんて……二重に変わった趣味ね」

    %CALLNAME:TARGET%は事実を述べるように言った。

    「……痛いから、早く終わらせて。読みかけの本があるの」

    投げやりな態度で、%CALLNAME:TARGET%は身を任せた。

    「……むきゅ……」

    %CALLNAME:TARGET%は不快そうに眉を寄せた。

    「……痛いわ。腕も疲れる。もう少し配慮して」

    %CALLNAME:TARGET%は体の弱さと痛みを訴えた。

    「……こういう行為は、私には向いていないのよ」

    冷たい口調で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を窘めた。

    「……」

    %CALLNAME:TARGET%は床を見つめながら、%CALLNAME:MASTER%の行為を受けている。

    頭の中では、次に読む本のことを考えているようだ。

    「……終わったら、すぐに大図書館から出て行って」

    %CALLNAME:TARGET%は冷淡に言った。

    「……私は本に戻るから」
  priority: 1
