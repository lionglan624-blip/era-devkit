  content: >-
    「……それ、何？　くねくねしてるのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にあるアナルバイブを見つめた。

    「私のお尻に……入れるの？　ふぅん……変態なのさ」

    興味を示しながらも、%CALLNAME:人物_フラン%は身構えていた。

    挿入されると、%CALLNAME:人物_フラン%は目を丸くした。

    「っ……！　なにこれ……中で動いてる……生き物みたい……」

    「あっ……それ……お尻に入れるの……？」

    %CALLNAME:人物_フラン%はアナルバイブを見て、少し顔を赤くした。

    「恥ずかしいんだけど……まあ、%CALLNAME:MASTER%がそうしたいなら……」

    アナルバイブが挿入され蠢き始めると、%CALLNAME:人物_フラン%は声を詰まらせた。

    「んっ……！　そ、そこ、奥でうねってる……のさ……」

    495年の孤独を知る少女は、困惑しながらも逃げようとはしなかった。

    「ひゃっ……！」

    %CALLNAME:人物_フラン%はアナルバイブの挿入に、小さく声を上げた。

    「び、びっくりした……お尻にそんなもの入れるなんて……」

    %CALLNAME:人物_フラン%は非難するように言ったが、その声には力がなかった。

    「……%CALLNAME:MASTER%は、私をどうしたいの？」

    その問いには、警戒よりも純粋な好奇心が滲んでいた。

    「……ふぅん」

    %CALLNAME:人物_フラン%はアナルバイブを興味深そうに見つめた。

    「これで何するの？　……ああ、お尻に入れるんだ」

    %CALLNAME:MASTER%が挿入して蠢きを始めると、%CALLNAME:人物_フラン%は身を震わせた。

    「……んっ……中でうねってる……変なのさ。でも、面白いかも」

    %CALLNAME:人物_フラン%は首を傾げながら、自分の反応を確かめていた。
