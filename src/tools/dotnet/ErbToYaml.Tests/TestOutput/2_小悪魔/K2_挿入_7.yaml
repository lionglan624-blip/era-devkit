    「……私、%CALLNAME:MASTER%のものですわ……全部……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の膝に座ったまま、うっとりと見つめている。

    「%CALLNAME:MASTER%……私、悪魔なのに……こんなに幸せでいいのかしら……」

    %CALLNAME:人物_小悪魔%は自ら腰を動かし、%CALLNAME:MASTER%を受け入れている。

    「あっ……ん……自分から動くの、恥ずかしい……でも、止まらない……っ」

    %CALLNAME:人物_小悪魔%の羽がぴくぴくと震えている。

