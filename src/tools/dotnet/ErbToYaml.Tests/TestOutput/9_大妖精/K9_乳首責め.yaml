  content: >-
    「んっ……あっ……そこ、弱いの……」

    %CALLNAME:人物_大妖精%は%CALLNAME:MASTER%に身を預け、乳首を優しく弄られている。

    小さな翅がぴくりと震え、妖精の体が敏感に反応していた。

