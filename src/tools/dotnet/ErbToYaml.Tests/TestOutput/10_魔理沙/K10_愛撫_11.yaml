    %CALLNAME:TARGET%は慌てて拒否の姿勢を見せた。

    「何考えてんだ、お前……私のことなんだと思ってるんだ」

    %CALLNAME:TARGET%は怒りと困惑が混じった表情で%CALLNAME:MASTER%を見た。

    「……悪いけど、そういうのはお断りだぜ」

    魔理沙はきっぱりと拒絶した。

    「……」

