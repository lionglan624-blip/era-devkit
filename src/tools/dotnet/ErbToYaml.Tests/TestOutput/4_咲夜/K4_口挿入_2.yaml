character: 咲夜
situation: K4_口挿入
entries:
- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……胸でお世話いたしますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の前に跪き、豊かな胸を押し当てた。

    「貴方の熱……私の胸で……感じさせてくださいまし……」

    %CALLNAME:TARGET%は一物を胸の谷間に挟み込み、ゆっくりと上下に動き始めた。

    「んっ……硬くて……熱いですわ……」

    柔らかな双丘が%CALLNAME:MASTER%の肉棒を優しく包み込んでいく。

    「もっと……気持ちよくして差し上げますわ……」

    「……ふふ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の一物を胸で挟みながら微笑んだ。

    「私の胸……気持ちいいですか……？」

    %CALLNAME:TARGET%は両手で胸を寄せ、より強く肉棒を締め付けた。

    「んっ……こうすると……もっと……」

    「貴方のためなら……何度でも……」

    %CALLNAME:TARGET%は恍惚とした表情で奉仕を続けた。

    「……%CALLNAME:MASTER%……私を見ていてくださいまし……」

    %CALLNAME:TARGET%は上目遣いで%CALLNAME:MASTER%を見つめながら胸を動かしている。

    「こうして差し上げられることが……幸せですわ……」

    柔らかな胸の感触が%CALLNAME:MASTER%を包み込んでいく。

    「ん……先走りが……ぬるぬるしてきましたわ……」

    %CALLNAME:TARGET%は頬を染めながらも、奉仕の手を緩めなかった。

    「全部……私の胸で……受け止めますわ……」

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は一物を胸で挟み、情熱的に動いている。

    「貴方のここ……私だけのもの……ですわよね……」

    「こうして奉仕できるなんて……メイド冥利に尽きますわ……」

    %CALLNAME:TARGET%は独占欲を滲ませながら、激しく胸を動かした。

    「んっ……ぷはっ……愛していますわ……%CALLNAME:MASTER%……」

    恋人への愛情を込めて、%CALLNAME:TARGET%は胸奉仕を続けた。
  priority: 4
- id: talent_3_1
  content: >-
    「……%CALLNAME:MASTER%……胸で……よろしいのですか……」

    %CALLNAME:TARGET%は恥ずかしそうに自らの胸を見つめた。

    「……こ、こんなこと……初めてですけれど……」

    %CALLNAME:TARGET%は意を決して胸で一物を挟み込んだ。

    「んっ……おおきい……ですわ……」

    「こ、こうすれば……いいのでしょうか……」

    不慣れながらも、%CALLNAME:TARGET%は懸命に胸を動かした。

    「……は、はしたないですわ……こんな……」

    %CALLNAME:TARGET%は顔を真っ赤にしながらも、胸を動かし続けた。

    「でも……%CALLNAME:MASTER%のためなら……」

    「んっ……気持ちよく……なっていますか……？」

    %CALLNAME:TARGET%は上目遣いで確認しながら、リズムを変えた。

    「……っ……もう少し……上手にできるよう……努力しますわ……」

    恥ずかしさと嬉しさが入り混じった表情で奉仕を続ける。

    「……こうして差し上げるなんて……」

    %CALLNAME:TARGET%は自分の行動に戸惑いを感じながらも、胸を動かし続けた。

    「メイドとして……ではなく……私が……したくて……」

    「んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は言葉を途中で飲み込み、奉仕に集中した。

    「……っ……見ないでくださいまし……恥ずかしい……」

    複雑な心境を隠しながら、%CALLNAME:TARGET%は胸奉仕を続けた。

    「……%CALLNAME:MASTER%……こんな私……嫌いになりませんか……」

    %CALLNAME:TARGET%は不安げに%CALLNAME:MASTER%を見上げながら胸を動かしている。

    「んっ……こんなはしたないこと……」

    「でも……貴方のためなら……何でも……」

    %CALLNAME:TARGET%は決意を固めたように、より激しく胸を動かした。

    「んっ……ぷはっ……最後まで……お世話させてくださいまし……」

    恥ずかしさを堪えながらも、%CALLNAME:TARGET%は懸命に奉仕した。
