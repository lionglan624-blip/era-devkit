entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%がローターを手に取ると、%CALLNAME:TARGET%は恥ずかしそうに視線を逸らした。

    「……また、それ使うの……？」

    小さな翅がそわそわと動いている。

    %CALLNAME:MASTER%がスイッチを入れると、かすかな振動音が響いた。

    「ひゃっ……んっ……」

    %CALLNAME:TARGET%は敏感に反応して、体を震わせた。

    「……%CALLNAME:MASTER%の手の方が、好きなんだけどな……」

    控えめな声でそう呟きながらも、%CALLNAME:TARGET%は逃げようとはしなかった。

    ローターの振動が%CALLNAME:TARGET%の敏感な場所を刺激する。

    「あっ……んっ……」

    %CALLNAME:TARGET%は恋人に身を預けながら、甘い声を漏らした。

    翅がふるふると震え、快感に耐えようとしているのがわかる。

    「……%CALLNAME:MASTER%……やっ、そこ……」

    %CALLNAME:TARGET%は頬を赤く染めながら、%CALLNAME:MASTER%の腕にしがみついた。

    「……でも……嫌じゃないの……%CALLNAME:MASTER%がしてくれるから……」

    %CALLNAME:MASTER%がローターの振動を強くすると、%CALLNAME:TARGET%は声を上げた。

    「やっ……強い……っ！」

    %CALLNAME:TARGET%は体をよじりながら、快感に身を震わせている。

    「んっ……はぁっ……%CALLNAME:MASTER%……」

    潤んだ瞳で恋人を見上げる%CALLNAME:TARGET%。

    「……もう少し、優しく……して……？」

    %CALLNAME:TARGET%は甘えるようにお願いした。

    %CALLNAME:MASTER%がローターを動かすたびに、%CALLNAME:TARGET%は小さく喘いだ。

    「あっ……んんっ……」

    %CALLNAME:TARGET%は恥ずかしそうに顔を%CALLNAME:MASTER%の胸に埋めた。

    翅が小刻みに震え、快感を堪えているのが伝わってくる。

    「……%CALLNAME:MASTER%……声、出ちゃう……」

    %CALLNAME:TARGET%は恋人の服を握りしめながら、幸せそうに微笑んだ。

    「……でも、%CALLNAME:MASTER%の前なら……いいの……」
  priority: 4
- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%がローターを見せると、%CALLNAME:TARGET%は目を丸くした。

    「え……それは……何……？」

    %CALLNAME:TARGET%は戸惑いながらも、興味深そうにローターを見つめている。

    %CALLNAME:MASTER%がスイッチを入れると、%CALLNAME:TARGET%は驚いた。

    「ひゃっ……！　動いてる……」

    それが体に押し当てられると、%CALLNAME:TARGET%は声を上げた。

    「あっ……んっ……変な感じ……」

    %CALLNAME:TARGET%は戸惑いながらも、振動に体を震わせていた。

    ローターの振動が%CALLNAME:TARGET%の体を刺激する。

    「やっ……んっ……」

    %CALLNAME:TARGET%は恥ずかしそうに顔を背けた。

    翅がぱたぱたと落ち着きなく動いている。

    「……%CALLNAME:MASTER%……これ、恥ずかしいの……」

    しかし、逃げようとはしない%CALLNAME:TARGET%。

    「……でも……%CALLNAME:MASTER%がするなら……」

    %CALLNAME:TARGET%は照れくさそうに、小さく頷いた。

    %CALLNAME:MASTER%がローターを押し当てると、%CALLNAME:TARGET%は身をすくめた。

    「あっ……そこ……っ」

    %CALLNAME:TARGET%は敏感に反応して、小さな声を漏らす。

    「んっ……はぁっ……」

    %CALLNAME:TARGET%の頬がみるみる赤く染まっていく。

    「……%CALLNAME:MASTER%……わたし、変な声出てる……？」

    不安そうに問いかけながらも、%CALLNAME:TARGET%の体は振動を求めていた。

    ローターの振動に、%CALLNAME:TARGET%は体を震わせた。

    「やっ……んんっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕をぎゅっと掴んだ。

    翅がふるふると小刻みに震えている。

    「……%CALLNAME:MASTER%……これ、すごい……」

    %CALLNAME:TARGET%は恥ずかしそうに俯いた。

    「……でも、冷たいから……手で触ってくれる方が好き……かも……」
