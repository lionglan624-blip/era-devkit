- id: fallback
  content: >-
    「……何してるの？」

    %CALLNAME:人物_フラン%は無表情で振り返った。

    「フランのお尻……触ろうとした？」

    紅い瞳がぞっとするような光を帯びた。

    「そういうことする人……今までみんな壊れちゃったのさ」

    「%CALLNAME:MASTER%も、壊れたいの？」

    「あれ……何のつもり？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の意図を察し、じっと見つめてきた。

    「フランに触ろうとする人、久しぶりなのさ」

    「……前に触ろうとした人はね、きゅっとして……ドカーンって」

    %CALLNAME:人物_フラン%は無邪気に笑った。

    「%CALLNAME:MASTER%は大丈夫？ 壊れない？」

    「……止まって」

    %CALLNAME:人物_フラン%は静かにそう言った。

    「フランのこと、何も知らないのに……触ろうとするの？」

    「495年間……誰も近づけなかったのに……」

    %CALLNAME:人物_フラン%の声に、どこか寂しげな響きがあった。

    「……まだ、ダメ」

    「%CALLNAME:MASTER%……何するつもり？」

    %CALLNAME:人物_フラン%は警戒するように%CALLNAME:MASTER%を見つめた。

    「フランに触ろうとしたでしょ。分かってるのさ」

    「……でもね、フランを触れる人は……」

    %CALLNAME:人物_フラン%は小さく首を振った。

    「……いないの。壊れちゃうから」

    無邪気な声が、逆に恐ろしく響いた。
