- id: fallback
  content: >-
    「はあ？　パイズリ？　あたいの胸で？」

    %CALLNAME:人物_チルノ%は呆れたような顔をした。

    「%CALLNAME:MASTER%、目悪いの？　見てわかんない？」

    %CALLNAME:人物_チルノ%は自分の小さな胸を指差した。

    「こんな胸でパイズリなんかできるわけないじゃん！　馬鹿じゃないの？」

    辺りに冷気が漂い始め、%CALLNAME:人物_チルノ%の怒りが伝わってくる。

    ……だが、結局は渋々と胸を押し当てた。

    「……ほら、やってやってるんだから感謝しなさいよね」

    「ちょっと……なにさ、これ」

    %CALLNAME:人物_チルノ%は嫌そうな顔で%CALLNAME:MASTER%の一物を見た。

    「こんなのあたいの胸で挟めって言うの？　信じらんない」

    %CALLNAME:人物_チルノ%は文句を言いながらも、命令には従った。

    「……ほら、触れてるでしょ。これでいいんでしょ」

    不機嫌そうに胸を押し当てながらも、%CALLNAME:人物_チルノ%は動き続けている。

    「早く終わらせてよね！」

    「あのさ、%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%はじっと%CALLNAME:MASTER%を見つめた。

    「あたいの胸見て、パイズリできると思う？」

    %CALLNAME:人物_チルノ%は不満げな表情で腰に手を当てた。

    「最強の妖精であるこのあたいに……無理なこと頼むな！」

    %CALLNAME:人物_チルノ%は怒りながらも、結局は胸を押し当てた。

    「……覚えときなさいよね」

    「……」

    %CALLNAME:人物_チルノ%は無言で%CALLNAME:MASTER%を睨んでいる。

    「%CALLNAME:MASTER%って、ほんっと馬鹿じゃないの」

    %CALLNAME:人物_チルノ%は呆れたような声で言い放った。

    「あたいの胸でパイズリなんて……どう考えても無理でしょ」

    そう言いながら、%CALLNAME:人物_チルノ%は仕方なさそうに胸を押し当てた。

    「……まあいいわ。手も使ってなんとかしてあげる」
