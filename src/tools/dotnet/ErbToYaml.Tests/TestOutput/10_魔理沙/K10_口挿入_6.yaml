- id: fallback
  content: >-
    「ん……こんなとこまで舐めて欲しいなんて、お前も変態だな」

    %CALLNAME:人物_魔理沙%は恥ずかしそうにしながらも、%CALLNAME:MASTER%の尻に顔を埋めた。

    「……でも、お前が望むなら……やってやるぜ」

    %CALLNAME:人物_魔理沙%はゆっくりと舌を伸ばし、窄まりを舐め始めた。

    「んっ……こうか……？　気持ちいい……？」

    %CALLNAME:人物_魔理沙%は恋人の反応を気にしながら、丁寧に舌を這わせた。

    「……お前を喜ばせたいんだ……だから、ちゃんと教えてくれよな」

    「ふふ……お前のここ、ピクピクしてるぜ」

    %CALLNAME:人物_魔理沙%は少し得意げに笑いながら、%CALLNAME:MASTER%のアナルを舐めた。

    「こうやって舌先で突くと……感じるんだな」

    %CALLNAME:人物_魔理沙%は器用に舌を動かし、窄まりを責め立てた。

    「んっ……こういうの、だんだん上手くなってきただろ？」

    %CALLNAME:人物_魔理沙%は恋人の快感を引き出すことに夢中になっていた。

    「……もっと気持ちよくしてやるからな」

    「……恥ずかしいけど、お前のためなら頑張れるぜ」

    %CALLNAME:人物_魔理沙%は顔を赤らめながら、%CALLNAME:MASTER%の尻に舌を這わせた。

    「んっ……こうして舐めてると、なんか……繋がってる気がするな」

    %CALLNAME:人物_魔理沙%は愛情を込めて、窄まりを丁寧に舐め上げた。

    「私がお前をこうして……気持ちよくしてるんだぜ」

    %CALLNAME:人物_魔理沙%は恋人のアナルを舌で愛撫しながら、幸せそうだった。

    「……もっとしてほしいなら、言ってくれよ」

    「なあ……ちゃんとこっち見てろよ」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の尻を舐めながら、視線を向けた。

    「私がお前のこと、こんなとこまで舐めてるんだぜ……見てろ」

    %CALLNAME:人物_魔理沙%は照れくさそうに笑いながらも、舌を動かし続けた。

    「んっ……こう、舌先でつつくと……」

    %CALLNAME:MASTER%が反応すると、%CALLNAME:人物_魔理沙%は嬉しそうになった。

    「……見られてると、もっと頑張れるんだぜ」
