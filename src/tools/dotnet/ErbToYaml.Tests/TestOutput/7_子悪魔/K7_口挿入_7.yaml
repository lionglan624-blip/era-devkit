- id: fallback
  content: >-
    「……%CALLNAME:MASTER%のここ……舐めればいいんですよね……？」

    %CALLNAME:TARGET%は真っ赤な顔で%CALLNAME:MASTER%のお尻に顔を近づけた。

    「んっ……ちゅ……れろ……」

    小さな舌が恐る恐る%CALLNAME:MASTER%のアナルに触れる。

    「……はぅ……こんなこと……%CALLNAME:MASTER%だから……できるんですよ……」

    %CALLNAME:TARGET%は恥ずかしさを堪えながら、懸命に奉仕を続けた。

    「……気持ちいいですか……？　あたし……頑張りますから……」

    「えへへ……%CALLNAME:MASTER%……今日もお世話しますね……」

    %CALLNAME:TARGET%は照れくさそうにしながら、%CALLNAME:MASTER%のお尻に顔を埋めた。

    「ちゅ……れろれろ……んっ……」

    一生懸命に舌を動かして、%CALLNAME:TARGET%は%CALLNAME:MASTER%を悦ばせようとしている。

    「あたしね……%CALLNAME:MASTER%のために頑張るの、好きなの……」

    %CALLNAME:TARGET%は潤んだ瞳で%CALLNAME:MASTER%を見上げた。

    「だから……もっといっぱいさせてくださいね……？」

    「%CALLNAME:MASTER%……あたし、上手にできてますか……？」

    %CALLNAME:TARGET%は不安げに問いかけながら、舌を這わせた。

    「ん……ちゅっ……ぺろぺろ……」

    小さな体で懸命に奉仕する姿は健気そのものだった。

    「こうやって……%CALLNAME:MASTER%のお役に立てるの……嬉しいの……」

    %CALLNAME:TARGET%は恥ずかしそうに微笑んだ。

    「……%CALLNAME:MASTER%が気持ちよくなってくれたら……あたしも嬉しいから……」

    「んふふ……%CALLNAME:MASTER%のここ……覚えちゃいました……」

    %CALLNAME:TARGET%は慣れた様子で%CALLNAME:MASTER%のアナルに舌を這わせた。

    「れろ……んっ……ちゅぷ……」

    %CALLNAME:MASTER%の体がぴくりと反応するのを感じて、%CALLNAME:TARGET%は嬉しそうにした。

    「あ……%CALLNAME:MASTER%……感じてくれてる……」

    %CALLNAME:TARGET%はより一層熱心に奉仕を続けた。

    「あたしがここ舐めると……%CALLNAME:MASTER%、こうなるんですよね……えへへ……」
