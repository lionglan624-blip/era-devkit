    %CALLNAME:人物_小悪魔%は驚いて脚を閉じようとしたが、%CALLNAME:MASTER%に押さえられた。

    「%CALLNAME:MASTER%……そういうのは……まだ早いんじゃ……」

    %CALLNAME:人物_小悪魔%は困惑した様子で%CALLNAME:MASTER%を見ている。

    「……いきなり過ぎますわ……」

    「あ……っ！ そ、そこは見ないでくださいな……！」

    %CALLNAME:人物_小悪魔%は秘所を開かれて、思わず声を上げてしまった。

    「%CALLNAME:MASTER%……い、いきなりは……」

    %CALLNAME:人物_小悪魔%は顔を真っ赤にして、秘所を隠そうとしている。

    「……もうちょっと、順序ってものがあるんじゃ……」

    %CALLNAME:人物_小悪魔%は恥ずかしそうに抗議しながらも、完全には逃げ出さなかった。

    「ひぅっ……！ そ、そこは……！」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に秘所を開かれて、体をびくりと震わせた。

