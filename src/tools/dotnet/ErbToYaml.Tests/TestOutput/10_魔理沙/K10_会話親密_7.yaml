- id: fallback
  content: >-
    「んっ……あ……そこ、後ろ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%に後ろの穴をいじられながら、魔法の勉強では見せない表情を浮かべている。

