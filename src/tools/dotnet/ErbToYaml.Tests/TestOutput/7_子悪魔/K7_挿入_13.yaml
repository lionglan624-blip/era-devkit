entries:
- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%、あたしのおしり……うえからね……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨り、ゆっくりとお尻を沈めていく。

    悪魔の少女は痛みを感じながらも、愛する人のために笑顔を浮かべていた。

    「んっ……ぜんぶ、はいった……おしりのなか、%CALLNAME:MASTER%でいっぱい……」

    %CALLNAME:TARGET%は幸せそうに%CALLNAME:MASTER%を見下ろし、腰を動かし始めた。

    「あたしね……おしりでも、%CALLNAME:MASTER%のこと、きもちよくする……だいすきだから……」

    サキュバスの献身と愛が溢れ、%CALLNAME:TARGET%は%CALLNAME:MASTER%のために全てを捧げていた。

    「%CALLNAME:MASTER%……あたしのおしり、つかって……？　あたしがうごく……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に手を置き、お尻を上下させている。

    悪魔の尻尾がゆらゆらと揺れ、%CALLNAME:TARGET%は一生懸命に腰を振っていた。

    「あっ……ん……おしりでうごくと……%CALLNAME:MASTER%、きもちいい……？」

    %CALLNAME:TARGET%は額に汗を浮かべながら、%CALLNAME:MASTER%を見つめた。

    「いっぱい……あたしのおしりに、だして……？　ぜんぶ、もらう……」

    愛情と献身に満ちた笑顔で、%CALLNAME:TARGET%は%CALLNAME:MASTER%を締め付けていった。

    「んっ……%CALLNAME:MASTER%の、おしりのおくまで……あつい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上で腰を揺らしながら、恍惚とした表情を浮かべている。

    悪魔の少女は自分のペースでお尻を動かし、甘い声を漏らしていた。

    「あたし……おしりでも、%CALLNAME:MASTER%といっしょ……しあわせ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を取り、自分の腰に当てさせた。

    「ね……おしり、つかまえて……あたしのこと、はなさないで……？」

    サキュバスの本能と愛情が混ざり合い、%CALLNAME:TARGET%は%CALLNAME:MASTER%に全てを委ねていた。

    「ふぁ……%CALLNAME:MASTER%、あたしのおしり、みて……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上でお尻を動かしながら、愛おしそうに見下ろしている。

    悪魔の瞳が潤み、%CALLNAME:MASTER%への愛情で満ちていた。

    「あたしね……おしりでも、%CALLNAME:MASTER%のために……いっぱい、うごく……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の頬に手を添え、微笑んだ。

    「ずっと……あたし、%CALLNAME:MASTER%のうえで……こうしてたい……えへへ……」

    無邪気な笑顔と悪魔の色香が混じり合い、%CALLNAME:TARGET%は%CALLNAME:MASTER%を魅了していた。
