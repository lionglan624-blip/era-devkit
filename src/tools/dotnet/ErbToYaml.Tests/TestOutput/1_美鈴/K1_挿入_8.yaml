    「……はぅ……後ろから抱きしめられると……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の腕の中で小さくなった。

    「……心臓の音、聞こえちゃいますよね……恥ずかしい……」

    %CALLNAME:人物_美鈴%は照れた声で言った。

    「……でも……%CALLNAME:MASTER%の心臓の音も、背中から感じます……」

    %CALLNAME:人物_美鈴%は嬉しそうに微笑んだ。

    「……同じくらい速いですね……ふふ……」
