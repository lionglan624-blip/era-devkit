character: フラン
situation: K6_愛撫
entries:
- id: fallback
  content: >-
    「ねぇ、%CALLNAME:MASTER%……それ、何なの？　穴が開いてるね」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の手にあるオナホールを興味深そうに覗き込んだ。

    柔らかそうな素材の玩具を、紅い瞳がきらきらと見つめている。

    「私に使うの？　……面白そうなのさ」

    %CALLNAME:MASTER%がオナホールを%CALLNAME:人物_フラン%のものに当てると、彼女は驚いたように目を丸くした。

    「ひゃっ……！　んっ、ぐにゅぐにゅしてる……%CALLNAME:MASTER%、これ気持ちいいのさ」

    %CALLNAME:人物_フラン%は無邪気に笑いながら、恋人の手つきに身を委ねた。

    「えへへ……%CALLNAME:MASTER%、また使ってくれるの？」

    %CALLNAME:人物_フラン%はオナホールを見て、嬉しそうに言った。

    「いつも私を気持ちよくしてくれるから……大好きなのさ」

    %CALLNAME:MASTER%が動かし始めると、%CALLNAME:人物_フラン%から甘い声が漏れた。

    「あっ……んんっ……%CALLNAME:MASTER%の手、上手なの……」

    495年の孤独を知る少女は、恋人と繋がれる喜びを噛みしめていた。

    「私、%CALLNAME:MASTER%に弄ばれるの……大好きなのさ」

    「これ、中がすごくぐにゅぐにゅしてる……」

    %CALLNAME:人物_フラン%はオナホールの感触を味わいながら、不思議そうに呟いた。

    「私の中も……こんな感じなのかな？」

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_フラン%は頬を染めた。

    「ふふっ、じゃあ%CALLNAME:MASTER%はこんな感触を味わってるんだね」

    %CALLNAME:MASTER%がオナホールを動かすと、%CALLNAME:人物_フラン%は目を細めた。

    「んっ……%CALLNAME:MASTER%が気持ちよくしてくれると、私も嬉しいのさ」

    「%CALLNAME:MASTER%……またこれ使うの？　嬉しいなぁ」

    %CALLNAME:人物_フラン%は期待に満ちた表情で、オナホールを見つめた。

    「私、%CALLNAME:MASTER%にいじめられるの好きなの」

    %CALLNAME:MASTER%がゆっくりと動かすと、%CALLNAME:人物_フラン%の表情が蕩けた。

    「あっ……んっ、そこいいのさ……もっと……」

    %CALLNAME:人物_フラン%は目を潤ませながら、恋人を見上げた。

    「壊れちゃいそう……いい意味で……%CALLNAME:MASTER%、もっとして」
  priority: 4
- id: talent_3_1
  content: >-
    「な、なにこれ……？　変な形なのさ」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の持つオナホールを警戒しながら見た。

    「穴が開いてて……私に使うの？」

    その意味に気づくと、%CALLNAME:人物_フラン%は顔を赤くした。

    「わ、私にするの……？　……まあ、いいけど」

    %CALLNAME:MASTER%がオナホールを当てると、%CALLNAME:人物_フラン%は小さく身を震わせた。

    「……んっ……変な感じ……でも、悪くないのさ」

    「あっ……%CALLNAME:MASTER%、そんなに動かしたら……」

    %CALLNAME:人物_フラン%は恥ずかしそうに顔を背けた。

    「……%CALLNAME:MASTER%がしてくれるから、気持ちいいの……？」

    その問いかけには、期待と不安が入り混じっていた。

    「……そっか。なんか、嬉しいかも……のさ」

    %CALLNAME:人物_フラン%は照れながらも、%CALLNAME:MASTER%の手を押しのけようとはしなかった。

    「もう少し……してもいいよ」

    「こ、こんなことするなんて……恥ずかしいのさ」

    %CALLNAME:人物_フラン%は顔を背けながら、オナホールの感触に耐えていた。

    「%CALLNAME:MASTER%ばっかり……私を弄んで……ずるい」

    %CALLNAME:人物_フラン%は恨めしそうに、でもどこか嬉しそうに言った。

    「……でも、%CALLNAME:MASTER%がしてくれるなら……」

    素直になれない悪魔の妹は、そっぽを向きながらそう呟いた。

    「……もっと気持ちよくしていいのさ」

    「%CALLNAME:MASTER%……私、ちゃんと感じてる……？」

    %CALLNAME:人物_フラン%は不安そうにオナホールの感触を味わいながら尋ねた。

    「こういうの初めてだから……わかんないのさ」

    %CALLNAME:MASTER%が気持ちいいかと聞くと、%CALLNAME:人物_フラン%は目を輝かせた。

    「ほんと！？　よかった……」

    %CALLNAME:人物_フラン%は嬉しそうに%CALLNAME:MASTER%の手の動きを受け入れた。

    「%CALLNAME:MASTER%がしてくれるなら……頑張って感じるのさ」
