- id: talent_3_1
  content: >-
    「っ……！　な、何をするつもりよ！」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の意図に気付き、顔を真っ赤にした。

    「そ、そんなところを舌で……信じられない……」

    だが%CALLNAME:MASTER%がそこに舌を這わせると、

    「ひゃあっ……！　や、やめ……んん……」

    %CALLNAME:人物_レミリア%の抗議は、甘い喘ぎに変わっていった。

    「……べ、別に気持ちよくなんか……ああっ……」

    「あ、あなた……本当に変態ね……」

    %CALLNAME:人物_レミリア%は羞恥に震えながら%CALLNAME:MASTER%を睨んだ。

    %CALLNAME:MASTER%の舌がそこを撫でるたび、身体が勝手に反応してしまう。

    「んっ……やぁ……そんなところ、舐めないで……」

    言葉とは裏腹に、%CALLNAME:人物_レミリア%の腰は微かに揺れていた。

    「……も、もう知らないわよ……こんなの……」

    高貴な吸血鬼は、羞恥に耐えながら快感を感じていた。

    「そ、そこは違うでしょう……っ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の行為に戸惑いの声を上げた。

    「……っ、ちょっと、舌が……」

    %CALLNAME:MASTER%が舌先を動かすと、%CALLNAME:人物_レミリア%の声が上擦った。

    「ひっ……あ、ああ……変な感じ……」

    %CALLNAME:人物_レミリア%は恥ずかしそうに顔を背けた。

    「……や、やめろとは言ってないけど……っ」

    「……%CALLNAME:MASTER%、本当にそんなことを……」

    %CALLNAME:人物_レミリア%は呆れた声を出しながらも、逃げなかった。

    %CALLNAME:MASTER%の舌が後ろの穴を舐め上げると、

    「んあっ……や……そこ……」

    %CALLNAME:人物_レミリア%は思わず声を漏らし、慌てて口を押さえた。

    「……聞かなかったことにしなさい……絶対に……」

    頬を真っ赤に染めた吸血鬼は、威厳を保とうと必死だった。
