    「んあっ……っ、前と後ろ……同時に来ると……すごい……」

    二人の動きが揃うと、%CALLNAME:人物_チルノ%は声を上げた。

    「あ……っ、お腹の奥と……お尻の奥が……繋がってる感じ……」

    %CALLNAME:人物_チルノ%は目を潤ませながら、二人を受け入れていた。

    「はぁっ……あっ……二人に挟まれると……あったかい……」

    %CALLNAME:人物_チルノ%は前後から抱きしめられ、幸せそうに目を細めた。

    「こうしてると……あたいが一番愛されてるって感じ……」

    二人の動きが激しくなると、%CALLNAME:人物_チルノ%の体が跳ねた。

    「んっ……やっ……っ、でも……嬉しい……っ」

    素直な言葉が、%CALLNAME:人物_チルノ%の口から漏れた。

    「……ねえ、二人とも」

    %CALLNAME:人物_チルノ%は前後に繋がれたまま、甘えた声を出した。

    「あたいのこと……ずっと離さないでよね……」

    二人に挟まれる安心感に、%CALLNAME:人物_チルノ%は身を任せていた。

    「んっ……はぁ……同時に動かれると……頭真っ白になる……」

    %CALLNAME:人物_チルノ%は快感に溺れながら、二人を抱きしめた。
