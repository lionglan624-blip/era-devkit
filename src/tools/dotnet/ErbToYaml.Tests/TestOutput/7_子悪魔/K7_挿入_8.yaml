    悪魔の血が騒ぎ、%CALLNAME:TARGET%の体は正直に快楽を求め始めていた。

    「むね……さわらないで……はずかしい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を払おうとしたが、力が入らなかった。

    「……でも……きもち、わるくない……なんでだろ……」

    芽生えた感情が、%CALLNAME:TARGET%を%CALLNAME:MASTER%に引き寄せていた。

    「んぅ……%CALLNAME:MASTER%、うしろから……おく、まできてる……」

