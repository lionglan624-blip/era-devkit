- id: fallback
  content: >-
    「……何故私がこんなことを……」

    %CALLNAME:TARGET%は冷たい目で%CALLNAME:MASTER%を見上げた。

    「……こんな場所を舐めるなんて……理解できないわ」

    %CALLNAME:TARGET%は不快そうに眉を寄せながらも舌を動かした。

    「……早く終わらせて。本を読む時間が減るわ」

    %CALLNAME:TARGET%は淡々と言いながら義務的に奉仕した。

    「……むきゅ……何故私がこんな目に……」

    %CALLNAME:TARGET%は不満を隠さなかった。

    「……行為としては、興味がないわけではないけれど……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の秘所を舐めながら分析した。

    「……あなたのためにしているわけではないわ」

    %CALLNAME:TARGET%は冷淡に言った。

    「……」

    %CALLNAME:TARGET%は無表情のまま、%CALLNAME:MASTER%に奉仕していた。

    頭の中では、次に読む本のことを考えている。

    「……終わったら、すぐに大図書館から出て行って」

    %CALLNAME:TARGET%は舌を動かしながら冷淡に言った。

    「……むきゅ……時間の無駄だわ」

    「……これは単なる生理的行為に過ぎないわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を舐めながら切り捨てるように言った。

    「……機械的にしているだけで、何も意味はないの」

    %CALLNAME:TARGET%は理論武装した。

    「……早く終わらせなさい。私は本を読みたいの」

    %CALLNAME:TARGET%は事務的に奉仕を続けた。
