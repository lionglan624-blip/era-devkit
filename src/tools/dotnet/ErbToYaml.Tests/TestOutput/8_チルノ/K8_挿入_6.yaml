- id: fallback
  content: >-
    「へぇ……お尻で上に乗るんだ……そんなこともできるんだね」

    %CALLNAME:人物_チルノ%は興味深そうに%CALLNAME:MASTER%の上に跨った。

    ゆっくりと菊穴に%CALLNAME:MASTER%を入れると、不思議そうな顔をした。

    「んっ……きつい……お尻だと全然違う感じ……」

    %CALLNAME:人物_チルノ%はぎこちなく腰を揺らしてみた。

    「自分でお尻で動くの……なんか変だね……」

    「あたいがお尻で上ってことは……あたいが動かすの？」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%を見下ろしながら首を傾げた。

    試しに腰を動かすと、菊穴が締め付けて予想外の感覚が走った。

    「わっ……んっ……お尻で自分から動くと、なんかすごい……」

    %CALLNAME:人物_チルノ%は新しい発見に目を丸くした。

    「こっちの穴だと……お腹の奥に当たる感じ……」

    「ねえ%CALLNAME:MASTER%、お尻でも上手にできてる？」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上で一生懸命腰を動かしていた。

    菊穴で%CALLNAME:MASTER%を受け入れながら、少しずつコツを掴んでいる。

    「んっ……はぁ……お尻で自分でするの、きつくて疲れるね……」

    %CALLNAME:人物_チルノ%は息を切らしながらも、動きを止めなかった。

    「でも……なんか不思議な感じ……嫌じゃないかも……」

    「……%CALLNAME:MASTER%、お尻でこれって合ってる？」

    %CALLNAME:人物_チルノ%は不安そうに%CALLNAME:MASTER%を見下ろした。

    自分からお尻で動くことに慣れておらず、戸惑っている様子だ。

    「んっ……こうすると……お腹の中に入ってく感じ……」

    %CALLNAME:人物_チルノ%はゆっくりと感覚を確かめながら菊穴で腰を動かした。

    「上に乗ってお尻でするの……思ったより難しいね……」
  priority: 2
- id: fallback
  content: >-
    「な……っ！　お尻で上に乗れって……やめてよ！」

    %CALLNAME:人物_チルノ%は無理やり%CALLNAME:MASTER%の上に跨らされていた。

    菊穴に%CALLNAME:MASTER%を入れられ、抵抗しようとするが腰を掴まれて動けない。

    「いたっ……お尻痛い……こんな体勢やめてよ……！」

    %CALLNAME:人物_チルノ%の菊穴は異物を拒むようにぎゅうと締め付けている。

    「あたいは最強なんだから……お尻でこんな屈辱……認めないから……！」

    「離しなさいよ！　お尻で上になんて……っ！」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上に乗せられ、もがいていた。

    しかし腰を掴まれ、菊穴で無理やり動かされてしまう。

    「んっ……やめ……お尻で自分から動いてるみたいに……しないでよ……っ」

    %CALLNAME:人物_チルノ%の目には涙が滲んでいた。

    「こんなの……お尻でこんな格好……屈辱だから……！」

    「やめて……お尻でこんな格好……っ」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上に跨らされ、菊穴を貫かれていた。

    腰を掴まれ、上下に動かされる。

    「んあっ……っ、いたい……お尻で動かされて……っ」

    %CALLNAME:人物_チルノ%は涙を流しながら必死に耐えていた。

    「最強なのに……お尻で上に乗せられるなんて……みじめ……」

    「……っ」

    %CALLNAME:人物_チルノ%は黙って%CALLNAME:MASTER%の上に乗せられ、菊穴を犯されていた。

    抵抗する力も失せ、されるがままになっている。

    「……覚えてなさいよ……」

    %CALLNAME:人物_チルノ%は震える声でそれだけ言った。

    「お尻でこんな屈辱……絶対に……忘れないんだから……」
  priority: 1
