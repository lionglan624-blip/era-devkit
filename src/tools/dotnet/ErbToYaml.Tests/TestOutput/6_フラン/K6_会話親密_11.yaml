    「――あっ、%CALLNAME:MASTER%がお茶を淹れてくれたの？」

    %CALLNAME:人物_フラン%は少し驚いた様子で湯飲みを受け取った。

    ふーふー、と息を吹きかけてから、ちびちびとお茶を啜る。

    「……おいしい。%CALLNAME:MASTER%、上手だね」

    %CALLNAME:人物_フラン%は素直に感想を言った。

    「……ねぇ、また来てくれる？ お茶を淹れに」

    翼がぴくぴくと恥ずかしそうに動いている。

    「わぁ……お茶？ 私に？」

    %CALLNAME:人物_フラン%は嬉しそうに湯飲みを手に取った。

    そっと口をつけ、ゆっくりと味わう。

    「……んっ、あったかい。なんだか落ち着くのさ」

    %CALLNAME:人物_フラン%は小さく微笑んだ。

    「%CALLNAME:MASTER%がいると、地下も寂しくないね」

    紅い瞳に、ほんのりと温かな光が宿った。

    「……%CALLNAME:MASTER%？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の姿を認めると、少し顔を赤らめた。

    「お茶……持ってきてくれたんだ」

    そう言いながら、おずおずと湯飲みを受け取る。

    ふぅ、と息を吹きかけてから、ちびりとお茶を啜る。

    「……うん、あったかい」

    %CALLNAME:人物_フラン%は湯飲みを抱えるように持ち、じっと%CALLNAME:MASTER%を見つめていた。

    「あれ……%CALLNAME:MASTER%」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%がお茶を持っているのを見て、翼をぱたぱたさせた。

    「私に……くれるの？」

    差し出された湯飲みを、そっと受け取る。

    お茶の香りが鼻をくすぐり、%CALLNAME:人物_フラン%は嬉しそうに目を細めた。

    「……%CALLNAME:MASTER%、優しいんだね」

    %CALLNAME:人物_フラン%はぽつりとそう呟いて、ゆっくりとお茶を飲んだ。
