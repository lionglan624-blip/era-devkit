- id: talent_3_1
  content: >-
    「え……指を……入れるの……？」

    %CALLNAME:人物_フラン%は頬を赤らめ、戸惑った表情を浮かべた。

    「こ、こういうこと……したことないから……」

    %CALLNAME:MASTER%の指がゆっくりと%CALLNAME:人物_フラン%の中に入っていく。

    「……っ！ あ……変な感じ……」

    %CALLNAME:人物_フラン%は初めての感覚に戸惑いながらも、逃げようとはしなかった。

    「……%CALLNAME:MASTER%だから……許してあげるのさ……」

    「んっ……指……動かないで……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の指が中にある感覚に慣れようとしている。

    「こんなの……知らなかった……」

    紅い瞳が潤み、無邪気な表情に快楽の色が混じっていく。

    「……でも……嫌じゃ……ないかも……」

    %CALLNAME:人物_フラン%は恥ずかしそうに%CALLNAME:MASTER%から目を逸らした。

    七色の翼が、緊張と期待で小さく震えている。

    「あ……やぁ……そこ、変なの……」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_フラン%の中を探っている。

    %CALLNAME:人物_フラン%は甘い声を漏らしながら、体をもじもじさせた。

    「……こういうこと、普通なの？ 外の世界では……」

    「フラン……よく分からないけど……」

    %CALLNAME:人物_フラン%は複雑な表情で%CALLNAME:MASTER%を見つめた。

    「%CALLNAME:MASTER%が教えてくれるなら……もう少しだけ……」

    「……指、奥まで来てる……」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の指が深く入る感覚に息を詰めた。

    「はぁ……ん……こんなの、初めて……」

    金色の髪が乱れ、頬が紅潮している。

    「……%CALLNAME:MASTER%のこと、もっと知りたくなっちゃう……」

    %CALLNAME:人物_フラン%は戸惑いながらも、%CALLNAME:MASTER%に身を委ねた。

    「……変なの……壊したいんじゃなくて……もっと、触れていたい……」
