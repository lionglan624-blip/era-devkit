    「%CALLNAME:MASTER%っ……もう止められない……イっちゃいそう……」

    紅魔館の主は、恋人の前で理性を失いかけていた。

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手にあるニプルキャップを見つめた。

    「……ねえ、今日は強めにして、私を狂わせてくれる？」

    珍しく甘えた声に、%CALLNAME:MASTER%がゆっくりとクリップを装着する。

    「ふぁっ……んっ……乳首、締め付けられて……」

