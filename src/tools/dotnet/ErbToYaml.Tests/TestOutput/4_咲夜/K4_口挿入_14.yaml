- id: fallback
  content: >-
    「……お客様のご要望ですから……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の背後に回った。

    「このような体勢を……お望みということですわね……」

    事務的な態度で、%CALLNAME:TARGET%は%CALLNAME:MASTER%の中に入っていく。

    「……っ……」

    「……これも……サービスの一環ですから……」

    %CALLNAME:TARGET%は自分に言い聞かせながら、腰を動かし始めた。

    「……ん……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を抱きながら、複雑な表情を浮かべた。

    「メイドがお客様を……このように抱くなど……」

    「……本来あるべき姿ではありませんわね……」

    しかし、%CALLNAME:TARGET%の体は快感を覚え始めていた。

    「……少し……気持ちよくなってきましたわ……」

    言い訳のように呟きながら、%CALLNAME:TARGET%は腰を揺らした。

    「……%CALLNAME:MASTER%……感じていますの……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を窺いながら動いた。

    「私も……少し……」

    「……いえ、何でもありませんわ……」

    %CALLNAME:TARGET%は言葉を飲み込み、動きを速めた。

    「……っ……あ……」

    快感に声が漏れ、%CALLNAME:TARGET%は唇を噛んだ。

    「……これは仕事……ですから……」

    %CALLNAME:TARGET%は何度も自分に言い聞かせながら%CALLNAME:MASTER%を抱いている。

    「お客様を……満足させるのも……メイドの務め……」

    「……ん……っ……」

    しかし、%CALLNAME:TARGET%の動きは次第に激しくなっていく。

    「……%CALLNAME:MASTER%のせいですからね……」

    責任を押し付けながらも、%CALLNAME:TARGET%は%CALLNAME:MASTER%を求めていた。
