    だが言われるまま、%CALLNAME:MASTER%に押し当てて動かし始める。

    「あ、あんまり見るなよな……」

    %CALLNAME:人物_魔理沙%は顔を背けながらも、手を止めなかった。

    「な、何でこういうことさせるんだよ……」

    %CALLNAME:人物_魔理沙%は困惑しながらオナホールを見つめた。

    「こんなの使ったことないんだからな……わかってるのか？」

    しかし%CALLNAME:MASTER%に促され、恐る恐る動かし始めた。

    「こ、こうか……？　気持ちいいか……？」

    %CALLNAME:人物_魔理沙%は不安そうに%CALLNAME:MASTER%の顔を窺った。

    「ちょ、ちょっと待ってくれよ……」

    %CALLNAME:人物_魔理沙%はオナホールを持つ手を震わせていた。

    「これ、結構生々しいっていうか……その、恥ずかしいんだけど」

    だが%CALLNAME:MASTER%の視線に促されて、渋々動かし始める。

    「ん……こ、こんな感じでいいのか……？」

    %CALLNAME:人物_魔理沙%の顔は耳まで赤く染まっていた。

    「う……やっぱり恥ずかしいぜ……」

    %CALLNAME:人物_魔理沙%はオナホールを動かしながら、顔を背けた。

    「でも……お前が気持ちよくなってくれるなら……」

    手の動きは次第に滑らかになっていく。

    「……もうちょっと、続けてやるからな」

