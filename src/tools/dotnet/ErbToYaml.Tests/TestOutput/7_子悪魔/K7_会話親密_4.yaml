- id: fallback
  content: >-
    「ふぇっ……！？ お、お尻……ですか……？」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%のお尻に触れた。

    %CALLNAME:TARGET%は困惑した表情で振り返った。

    「あの……こういうことって……していいんですか……？」

    %CALLNAME:TARGET%は戸惑いながらも、強くは拒絶しなかった。

    「……咲夜さんには、ナイショにしてくださいね……？」

    「ひゃっ……！」

    %CALLNAME:MASTER%にお尻を撫でられて、%CALLNAME:TARGET%はびくりと肩を震わせた。

    「え、えっと……なにしてるんですか……？」

    %CALLNAME:TARGET%は困惑しながらも、逃げ出そうとはしなかった。

    「……お尻を撫でる……って、普通のこと、なんですか……？」

    妖精は不思議そうに首を傾げている。

    「んっ……あの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にお尻を撫でられて、戸惑った表情を浮かべている。

    「こういうの……よくわからないですけど……」

    %CALLNAME:TARGET%は恥ずかしそうに視線を落とした。

    「……嫌じゃ、ないです。たぶん……」

    %CALLNAME:TARGET%の声は小さく、どこか期待するようにも聞こえた。

    「あっ……」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%のお尻に触れると、妖精は小さく声を漏らした。

    「えっと……あたし、どうしたらいいですか……？」

    %CALLNAME:TARGET%はどうしていいかわからず、もじもじしている。

    「……%CALLNAME:MASTER%は、優しい人……ですよね……？」

    不安そうに確認するように、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げた。

    「だったら……少しだけなら、いい……です……」
  priority: 2
- id: fallback
  content: >-
    「ひっ……！ な、なにするの……！？」

    %CALLNAME:MASTER%の手が%CALLNAME:TARGET%のお尻に触れた。

    %CALLNAME:TARGET%は驚いて飛び退こうとした。

    「お、お尻なんて……いきなり触らないでよ……！」

    %CALLNAME:TARGET%は真っ赤になって身を守るように縮こまっている。

    「……怖いよ……」

    「ふぇっ……！？」

    %CALLNAME:TARGET%はお尻を触られて、驚いて振り返った。

    「あ、あの……いきなりそういうことしないでください……」

    %CALLNAME:TARGET%は困惑した表情で、%CALLNAME:MASTER%を見つめている。

    「あたし、まだ%CALLNAME:MASTER%のこと、よく知らないから……」

    妖精は怯えた様子で、後ずさりをしている。

    「やっ……だめ……！」

    %CALLNAME:MASTER%がお尻に手を伸ばすと、%CALLNAME:TARGET%は身を縮こまらせた。

    「そういうの……お仕事中にしないでください……」

    %CALLNAME:TARGET%は辺りをきょろきょろと見回している。

    「咲夜さんに見つかったら……あたし、怒られちゃう……」

    妖精の瞳には、不安と戸惑いが滲んでいた。

    「あっ……！」

    %CALLNAME:TARGET%はお尻を触られて、小さく悲鳴を上げた。

    「な、なんでそんなところ触るの……？」

    %CALLNAME:TARGET%は理解できないという顔で、%CALLNAME:MASTER%を見つめている。

    「もうちょっと仲良くなってから……に、してほしいの……」

    %CALLNAME:TARGET%は申し訳なさそうに、でもはっきりと拒否の意思を示した。

    「……ごめんなさい。今は、ちょっと……」
  priority: 1
