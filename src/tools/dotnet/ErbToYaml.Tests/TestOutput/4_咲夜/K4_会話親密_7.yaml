    「や、やめなさい……！」

    %CALLNAME:人物_咲夜%は驚きと怒りの入り混じった表情で振り返った。

    「そのような場所に触れるなど……何を考えているの」

    %CALLNAME:人物_咲夜%はナイフを取り出し、%CALLNAME:MASTER%に向けた。

    「……もう一度触れたら、本当に刺しますわよ」

    冷たい殺気を纏いながら、%CALLNAME:人物_咲夜%は警告した。

    「……勘違いなさらないで」

    %CALLNAME:人物_咲夜%は冷静に%CALLNAME:MASTER%の手を払った。

    「私はお嬢様にお仕えするメイド。あなたの玩具ではありませんわ」

