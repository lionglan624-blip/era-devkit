    「んぅ……っ……やっ……ぴったり……吸い付いてるみたいで……変な感じ……」

    振動に翻弄され、%CALLNAME:TARGET%の体が小刻みに震える。

    「あぅ……止まらない……一番敏感なところ……ずっと……」

    妖精は困惑しながらも、%CALLNAME:MASTER%を信じて耐えていた。

    「……%CALLNAME:MASTER%には……あたしは逆らいません……」

