entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……そこ、お尻の穴……？」

    %CALLNAME:人物_フラン%は恋人を見上げながら、恥ずかしそうに呟いた。

    普段は誰も触れない場所を、恋人に委ねようとしている。

    「……%CALLNAME:MASTER%になら、いいよ。全部あげるって、決めたから」

    %CALLNAME:MASTER%が菊穴に亀頭を押し当てると、%CALLNAME:人物_フラン%は息を詰めた。

    「んっ……き、きつい……でも、%CALLNAME:MASTER%が入ってきてる……」

    495年の孤独を知る少女は、痛みの中にも喜びを見出していた。

    「ふぁ……後ろの穴って、こんな感じなんだ……」

    %CALLNAME:人物_フラン%は不思議そうな顔で%CALLNAME:MASTER%を見つめた。

    腸壁がきゅう、と異物を締め付けている。

    「痛いのに……%CALLNAME:MASTER%が気持ちいいなら、嬉しいのさ」

    %CALLNAME:MASTER%がゆっくりと腰を動かすと、%CALLNAME:人物_フラン%は甘い声を漏らした。

    「あっ……ん……変な感じ……でも、%CALLNAME:MASTER%と繋がってる……」

    恋人のために痛みを受け入れる姿は、悪魔の妹らしからぬ健気さだった。

    「んっ……お腹の奥まで……%CALLNAME:MASTER%が来てる……」

    %CALLNAME:人物_フラン%は腸内を貫く感覚に目を潤ませた。

    前とは違う異物感に、身体が小さく震えている。

    「痛いけど……%CALLNAME:MASTER%のためなら、我慢できるのさ」

    %CALLNAME:MASTER%が奥まで突き入れると、%CALLNAME:人物_フラン%は恋人にしがみついた。

    「あぁ……もっと奥まで……私の全部、%CALLNAME:MASTER%のものだから……」

    悪魔の妹は、恋人への愛を身体で証明していた。

    「%CALLNAME:MASTER%……こんなところまで……好きなんだね」

    %CALLNAME:人物_フラン%は恥ずかしそうに、それでも嬉しそうに微笑んだ。

    恋人に全てを晒す幸せを、噛みしめている。

    「私ね……こんなことしてくれるの、%CALLNAME:MASTER%だけなのさ」

    %CALLNAME:MASTER%が激しく腰を動かすと、%CALLNAME:人物_フラン%は甘い悲鳴を上げた。

    「んぅっ……！　お尻の穴……気持ちよくなってきた……壊れそうなくらい……」

    痛みが快感に変わっていく感覚に、悪魔の妹は身を震わせていた。
  priority: 4
- id: talent_3_1
  content: >-
    「え……お尻の穴で……するの……？」

    %CALLNAME:人物_フラン%は驚きに目を見開いた。

    そんなことができるとは、考えたこともなかった。

    「……本で読んだことないのさ。でも、%CALLNAME:MASTER%がしたいなら……」

    %CALLNAME:MASTER%が菊穴に亀頭を押し当てると、%CALLNAME:人物_フラン%は体を強張らせた。

    「ひっ……き、きつい……っ！　む、無理じゃないの……？」

    未知の感覚に戸惑いながらも、拒絶はしなかった。

    「ふぇ……後ろの穴って……前と全然違うのさ……」

    %CALLNAME:人物_フラン%は異物感に顔を歪めながら呟いた。

    腸壁が%CALLNAME:MASTER%を押し出そうときゅう、と締め付けている。

    「い、痛い……けど……%CALLNAME:MASTER%がしたいなら……頑張る……」

    %CALLNAME:MASTER%がゆっくりと腰を動かすと、%CALLNAME:人物_フラン%は息を詰めた。

    「んっ……あぁ……変な感じ……お腹の中、かき回されてる……」

    好きな人のために痛みを堪える姿は、どこか健気だった。

    「こんな遊び……普通の人はしないよね……？」

    %CALLNAME:人物_フラン%は不安そうに問いかけた。

    後ろの穴で繋がるなど、想像もしていなかったのだ。

    「……でも、%CALLNAME:MASTER%とだけなら……特別なのさ」

    %CALLNAME:MASTER%が奥まで挿入すると、%CALLNAME:人物_フラン%は声を漏らした。

    「あっ……んぅ……奥まで来てる……お腹、変になりそう……」

    痛みと快感の境界で、悪魔の妹は揺れていた。

    「%CALLNAME:MASTER%……私のお尻、気持ちいい……？」

    %CALLNAME:人物_フラン%は恥ずかしそうに、でも期待を込めて尋ねた。

    好きな人に喜んでもらえるなら、痛みも我慢できる。

    「……きついけど、%CALLNAME:MASTER%が喜んでくれるなら、嬉しいのさ」

    %CALLNAME:MASTER%が激しく腰を動かすと、%CALLNAME:人物_フラン%は叫んだ。

    「んっ……！　や、やぁ……！　頭、真っ白になる……っ！」

    恋心と快感に翻弄されながら、悪魔の妹は身を委ねていた。
