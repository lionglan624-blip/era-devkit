    495年の孤独が生んだ、どこか虚ろな瞳。

    「あ……なんか、くすぐったいのさ……」

    %CALLNAME:MASTER%の舌が触れると、%CALLNAME:人物_フラン%は少しだけ反応を見せた。

    「……面白いね。もっとやってみて」

    感情の読めない声で、%CALLNAME:人物_フラン%はそう言った。

    「地下に来て、こんなことするの？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%を不思議そうに見た。

    「あなた、コンティニューできないのさ。わかってる？」

    不穏なことを口にしながらも、%CALLNAME:MASTER%を止めようとはしない。

    「……退屈だったから、遊んでもらおうかな」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%の頭に手を置いた。

