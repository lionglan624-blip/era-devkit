- id: talent_3_1
  content: >-
    「え……こ、これを……舐めるの……？」

    %CALLNAME:人物_フラン%は%CALLNAME:MASTER%のものを見つめ、頬を赤らめた。

    「……わ、わかったのさ。やってあげるよ」

    おずおずと唇を近づけ、恐る恐る先端に口づけする。

    「ん……へ、変な味……でも、嫌じゃないの」

    %CALLNAME:人物_フラン%は戸惑いながらも、%CALLNAME:MASTER%のために舌を動かし始めた。

    その顔は羞恥と、どこか嬉しそうな表情が入り混じっていた。

    「……%CALLNAME:MASTER%がしたいなら……してあげるのさ」

    %CALLNAME:人物_フラン%は照れくさそうにそう言うと、%CALLNAME:MASTER%の前に跪いた。

    「こ、こうすればいいの……？　んっ……」

    ぎこちない動きで%CALLNAME:MASTER%のものを口に含み、舌を動かす。

    「ふぅ……んむ……上手くできてるかわからないけど……」

    %CALLNAME:人物_フラン%は不安そうに%CALLNAME:MASTER%を見上げた。

    「……%CALLNAME:MASTER%が気持ちよくなってくれたら、嬉しいのさ」

    「あ……%CALLNAME:MASTER%のここ、熱いね……」

    %CALLNAME:人物_フラン%は興味深そうに%CALLNAME:MASTER%のものを見つめた。

    「舐めてほしいの？　……しょうがないなぁ」

    照れ隠しのようにそう言いながら、舌を伸ばして先端を舐めた。

    「ん……れろ……ちゅ……」

    %CALLNAME:人物_フラン%は慣れない手つきで奉仕を続けた。

    「……こういうの、初めてなのさ……下手でも怒らないで？」

    「%CALLNAME:MASTER%……私でいいの……？」

    %CALLNAME:人物_フラン%は不安そうに尋ねながら、%CALLNAME:MASTER%のものに顔を近づけた。

    「……わかった。頑張ってみるのさ」

    小さな口が%CALLNAME:MASTER%を包み込み、一生懸命に動き始める。

    「んっ……ふぅ……むぐ……」

    %CALLNAME:人物_フラン%は時折むせそうになりながらも、奉仕を続けた。

    その健気な姿に、%CALLNAME:MASTER%への想いが滲み出ていた。
