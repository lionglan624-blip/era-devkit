  content: >-
    「ん……%CALLNAME:MASTER%……好き……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の背中に腕を回し、しっかりと抱きしめた。

    向かい合う体勢で、二人の体温が混ざり合う。

    「こうしてると……心臓の音、聞こえるね」

    %CALLNAME:人物_美鈴%は頬を紅く染めながら、幸せそうに微笑んだ。

    「……ずっと、このまま繋がっていたい」

    武術家の強い腕が、愛おしげに%CALLNAME:MASTER%を包み込んでいた。

    「はぁ……ん……深い……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%を見上げながら、甘い吐息を漏らした。

    正面から繋がることで、二人の視線が絡み合う。

    「……顔、見られてると恥ずかしいけど……」

    %CALLNAME:人物_美鈴%は目を逸らさず、愛しげに%CALLNAME:MASTER%を見つめ続けた。

    「でも……%CALLNAME:MASTER%の顔、見ていたいから……」

    恋人の温もりを感じながら、%CALLNAME:人物_美鈴%は幸福に浸っていた。

    「あっ……そこ、気持ちいい……」

    %CALLNAME:人物_美鈴%は腰をくねらせ、%CALLNAME:MASTER%の動きに応えた。

    門番として鍛えた体が、恋人の前では素直に反応を示す。

    「%CALLNAME:MASTER%……もっと、奥まで……」

    %CALLNAME:人物_美鈴%は自ら腰を動かし、より深い繋がりを求めた。

    「私のこと……もっと感じて……」

    普段の凛々しさとは違う、蕩けた表情が浮かんでいた。

    「……ん、ふぅ……%CALLNAME:MASTER%の体、あったかい……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の首に腕を絡め、引き寄せた。

    額と額が触れ合い、互いの吐息が感じられる距離。

    「門番の仕事中は、こんな風に甘えられないから……」

    %CALLNAME:人物_美鈴%は照れくさそうに笑った。

    「今だけは……私のこと、独り占めして？」

    武術家らしい芯の強さが、恋人への愛情に変わっていた。
