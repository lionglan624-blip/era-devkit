- id: fallback
  content: >-
    「またそれかよ……お前の手の方がいいんだけどな」

    %CALLNAME:人物_魔理沙%は呆れたように言いながら、%CALLNAME:MASTER%に身を寄せた。

    ローターが押し当てられると、小さく息を吐く。

    「んっ……まあ、お前がしたいならいいけどさ」

    %CALLNAME:人物_魔理沙%は恋人の肩に頭を預け、振動を受け入れた。

    「私より道具の方が好きなのか？」

    %CALLNAME:人物_魔理沙%は少し拗ねたように%CALLNAME:MASTER%を見た。

    「……まあいいけどさ。お前がそうしたいんなら」

    ローターの振動が秘所を責めると、%CALLNAME:人物_魔理沙%の声が甘くなる。

    「あっ……んん……そこ、弱いんだって……」

    %CALLNAME:人物_魔理沙%は恋人にしがみつき、快感に身を委ねた。

    「いきなり当てるなって……びっくりするじゃないか」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%を軽く睨んだが、拒絶はしなかった。

    ローターの振動が体を駆け巡ると、その表情が緩んでいく。

    「あ……ぁ……それ、ずるいぜ……」

    %CALLNAME:人物_魔理沙%は恋人の腕に縋りながら、甘い吐息を漏らした。

    「……好きにしろ」

    %CALLNAME:人物_魔理沙%は観念したように呟いた。

    %CALLNAME:MASTER%がローターを押し当てると、体がびくりと震える。

    「んっ……あぁ……お前には敵わないな……」

    %CALLNAME:人物_魔理沙%は恋人に身を預け、素直に快感を受け止めた。

    「……もっと、やってくれよ」
