- id: fallback
  content: >-
    「え、えっと……こういうの、初めてなんだが……」

    %CALLNAME:人物_魔理沙%は戸惑いながら、%CALLNAME:MASTER%の一物に手を伸ばした。

    「……本で読んだことはあるけど、実際にやるのは……」

    %CALLNAME:人物_魔理沙%はおそるおそる握ると、その熱さに驚いた。

    「うわっ……熱い……生きてるみたいだ……」

    %CALLNAME:人物_魔理沙%は興味深そうに、ゆっくりと手を動かし始めた。

    「こうか……？　合ってるのか……？」

    %CALLNAME:人物_魔理沙%は不安そうに%CALLNAME:MASTER%の顔を窺った。

    「痛かったら言えよな……加減がよくわからないんだ」

    %CALLNAME:人物_魔理沙%の手つきはぎこちないが、真剣だった。

    「……なるほど、こうすると反応するのか……」

    %CALLNAME:人物_魔理沙%は魔法の実験のように、興味津々で手を動かした。

    「ふーん……こういう感触なのか」

    %CALLNAME:人物_魔理沙%は知的好奇心から、%CALLNAME:MASTER%の一物を観察した。

    「触ると硬くなるんだな……不思議なもんだぜ」

    %CALLNAME:人物_魔理沙%は手を動かしながら、%CALLNAME:MASTER%の反応を見ていた。

    「……なんか、こうしてると私も変な気分になってくるな……」

    %CALLNAME:人物_魔理沙%は自分の体の反応に戸惑っていた。

    「……%CALLNAME:MASTER%、これで合ってるのか？」

    %CALLNAME:人物_魔理沙%は真剣な表情で訊ねた。

    「私、こういうの初めてだから……ちゃんと教えてくれよ」

    %CALLNAME:MASTER%が手を添えて教えると、%CALLNAME:人物_魔理沙%は素直に従った。

    「なるほど……こうやって動かすのか……」

    %CALLNAME:人物_魔理沙%は教わった通りに手を動かし、真剣に練習していた。
