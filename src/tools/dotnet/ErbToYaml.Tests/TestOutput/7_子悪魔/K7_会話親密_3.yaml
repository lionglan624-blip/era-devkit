- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%にキスをした。

    「んっ……！？」

    %CALLNAME:TARGET%は驚いて目を見開いたが、逃げようとはしなかった。

    「……ぷ、は……」

    唇が離れると、%CALLNAME:TARGET%は顔を真っ赤にして固まっている。

    「キ、キス……ですか……えっと……」

    %CALLNAME:TARGET%は戸惑いながらも、小さな声でぽつりと呟いた。

    「……嫌じゃ、ないです……たぶん……」

    「あっ……」

    %CALLNAME:MASTER%の唇が%CALLNAME:TARGET%の唇に触れた。

    %CALLNAME:TARGET%はびくりと肩を震わせたが、そのまま目を閉じた。

    「……んっ……」

    唇が離れると、%CALLNAME:TARGET%は呆然とした表情をしている。

    「えっと……これが、キス……？」

    %CALLNAME:TARGET%は困惑しながらも、頬を赤らめて俯いた。

    「……よくわからないけど……嫌じゃ、なかったです……」

    %CALLNAME:MASTER%がそっと顔を近づけてきた。

    「ふぇ……え、えっと……」

    %CALLNAME:TARGET%は戸惑いながらも、逃げずにその場に立っている。

    唇が軽く触れ合った。

    「……んっ……」

    %CALLNAME:TARGET%は目を閉じて、ぎゅっと手を握りしめている。

    「……ぷ、は……」

    唇が離れると、%CALLNAME:TARGET%は真っ赤になって俯いた。

    「あの……なんで、あたしに、キスなんか……」

    妖精は困惑しながらも、どこか嬉しそうだった。

    「あ、あの……%CALLNAME:MASTER%……？」

    %CALLNAME:MASTER%が近づいてくるのを見て、%CALLNAME:TARGET%は緊張で固まった。

    「……」

    そっと唇が触れる。%CALLNAME:TARGET%は息を止めてじっとしていた。

    「……んっ……」

    唇が離れると、%CALLNAME:TARGET%はぽかんとした顔をしている。

    「…………」

    しばらくして、%CALLNAME:TARGET%の顔がみるみる赤くなっていった。

    「き、キス……されちゃった……」

    %CALLNAME:TARGET%は自分の唇に指を当てて、呆然と呟いた。
