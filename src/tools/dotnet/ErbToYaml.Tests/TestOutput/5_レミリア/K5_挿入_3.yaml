- id: fallback
  content: >-
    「……後ろから、そこに？　変わった趣味ね」

    %CALLNAME:人物_レミリア%は怪訝そうに%CALLNAME:MASTER%を見た。

    言われるままに四つん這いになり、尻を%CALLNAME:MASTER%に向ける。

    「……まあいいわ。試してみましょう」

    %CALLNAME:MASTER%が菊穴に挿入すると、%CALLNAME:人物_レミリア%は息を詰めた。

    「っ……きつい……後ろからだと、違う感覚ね……」

    500年の吸血鬼は、未知の刺激に戸惑いを隠せなかった。

    「……ふぅん、そういう体勢でしたいの」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を見た。

    ゆっくりと四つん這いになり、腰を上げる。

    「顔が見えないのは……少し、不安ね」

    %CALLNAME:MASTER%が菊穴にあてがうと、その身体が強張った。

    「……っ、痛い……けど、悪くはないかもしれない」

    背を向けたまま、%CALLNAME:人物_レミリア%は新しい快感を探っていた。

    「……主を獣のように後ろから？　大胆ね」

    %CALLNAME:人物_レミリア%は不満そうに言いながら、体勢を取った。

    しかし、その瞳にはかすかな好奇心が見える。

    「……好きにしなさい」

    %CALLNAME:MASTER%が菊穴に押し入ると、%CALLNAME:人物_レミリア%は声を漏らした。

    「ん……っ、きつい……でも、悪くない……」

    認めたくない快感が、吸血鬼の身体を巡っていた。

    「……これが後背位でのアナル、というものね」

    %CALLNAME:人物_レミリア%は冷静を装いながら四つん這いになった。

    %CALLNAME:MASTER%の視線を背中に感じ、心臓が高鳴る。

    「……顔が見えないのは、少し落ち着かないわね」

    %CALLNAME:MASTER%が菊穴に挿入すると、%CALLNAME:人物_レミリア%は目を見開いた。

    「あ……っ、深い……この体勢だと、奥まで……」

    500年の吸血鬼は、新しい快感に身を震わせた。
  priority: 2
- id: fallback
  content: >-
    「……後ろからそこに？　随分と大胆なことを考えるわね」

    %CALLNAME:人物_レミリア%は冷たい視線で%CALLNAME:MASTER%を見た。

    命令通り四つん這いになるが、その態度は高飛車なまま。

    「使用人が主にそんなことをするなど、身の程知らずね」

    %CALLNAME:MASTER%が菊穴に挿入すると、%CALLNAME:人物_レミリア%は表情を変えなかった。

    「……ふん、その程度では私は揺らがないわよ」

    威厳を保ちながら、紅魔館の主は%CALLNAME:MASTER%を見下ろした。

    「……使用人が主を獣のように後ろから犯すとはね」

    %CALLNAME:人物_レミリア%は溜息をつきながら四つん這いになった。

    その姿には、不満と退屈さが漂っている。

    「精々頑張りなさい。私を楽しませてみせて」

    %CALLNAME:MASTER%が菊穴に押し入ると、%CALLNAME:人物_レミリア%はわずかに反応した。

    「……まあ、悪くはないわね」

    高飛車な態度は、背を向けていても崩れなかった。

    「……ほう、後ろからそこを責めると」

    %CALLNAME:人物_レミリア%は興味なさそうに%CALLNAME:MASTER%を見た。

    言われた通りに四つん這いになるが、威厳は失わない。

    「退屈しのぎには、なるかしらね」

    %CALLNAME:MASTER%が菊穴に挿入すると、%CALLNAME:人物_レミリア%は小さく息を吐いた。

    「……ふん、まあまあね」

    500年の吸血鬼は、感情を表に出さずに評価した。

    「……こんな体勢で後ろから犯すつもり？」

    %CALLNAME:人物_レミリア%は冷笑を浮かべた。

    だが命令には従い、四つん這いで尻を突き出した。

    「面白いわ。やってみなさい」

    %CALLNAME:MASTER%が菊穴に挿入すると、その締め付けが伝わる。

    「……その程度で私が乱れると思わないことね」

    紅魔館の主は、背を向けたまま余裕を崩さなかった。
  priority: 1
