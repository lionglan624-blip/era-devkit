- id: fallback
  content: >-
    「え……泡踊り……？　それは……」

    %CALLNAME:人物_小悪魔%は戸惑いながら、石鹸を見つめた。

    仕方なさそうに泡を体に塗り、%CALLNAME:MASTER%に近づく。

    「……やったことないですけど……こう……ですか？」

    %CALLNAME:人物_小悪魔%はそっと体を擦り付けた。

    「……ぬる……変な感触……ですわ……」

    まだぎこちない動きで奉仕している。

    %CALLNAME:人物_小悪魔%は好奇心に負けたように、体を密着させた。

    「ふむ……こうなるんですのね……」

    まるで研究するかのように、ゆっくりと動く。

    「すべ……ん……%CALLNAME:MASTER%、変な顔してますわ」

    %CALLNAME:人物_小悪魔%は小さく笑いながら、体を擦り続けた。

    「……こういうのも、勉強になりますわね……」

    冷静を装いながらも、頬がほんのり赤い。

    「し、しょうがないですわね……」

    %CALLNAME:人物_小悪魔%は渋々という態度で、体を擦り付けた。

    しかしその動きは丁寧で、少しずつ滑らせている。

    「……ぬる……んっ……こう？　違う？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の反応を窺いながら、試行錯誤している。

    「……早く終わらせてくださいね……」

    口ではそう言いながら、動きは止めない。

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の体をじっと見つめている。

    「本で読んだことはありますけど……実践は初めてですわ」

    おそるおそる体を密着させ、ゆっくりと擦り始めた。

    「んっ……熱い……%CALLNAME:MASTER%の体、熱いですわね……」

    %CALLNAME:人物_小悪魔%は驚きながらも、ぬるぬると動き始めた。

    「……ふむ……これは……なかなか……興味深い……」

    知的好奇心と羞恥が入り混じった表情を浮かべている。
