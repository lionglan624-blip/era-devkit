- id: fallback
  content: >-
    「……え、素股……ですか……」

    %CALLNAME:人物_美鈴%は困惑した表情を浮かべた。

    「……そういうの……経験ないんですけど……」

    渋々と横になり、%CALLNAME:人物_美鈴%は足を開いた。

    「……と、とりあえず……こうやって挟めばいいんですよね……」

    おそるおそる太腿で一物を挟み、%CALLNAME:人物_美鈴%は腰を動かした。

    「……これで合ってます……？」

    「……%CALLNAME:MASTER%のお願いだから……やりますけど……」

    %CALLNAME:人物_美鈴%は仕方なさそうに呟いた。

    「……本当は門番の仕事中なんですけどね……」

    ぶつぶつ言いながらも、%CALLNAME:人物_美鈴%は太腿を閉じた。

    「……こうやって……挟んで……動かして……」

    見よう見まねで腰を動かし、%CALLNAME:人物_美鈴%は不器用に奉仕した。

    「……早く済ませてくださいね……？」

    「……これも、修行の一環……ですよね……？」

    %CALLNAME:人物_美鈴%は自分に言い聞かせるように呟いた。

    「……下半身の鍛錬とか……そういう……」

    無理のある言い訳をしながら、%CALLNAME:人物_美鈴%は一物を太腿で挟んだ。

    「……ん……なんか、私も……変な感じ……」

    %CALLNAME:人物_美鈴%は秘所への刺激に驚いた顔をした。

    「……これって……気持ちいい、ってことですか……？」

    「……一回だけ……ですからね……？」

    %CALLNAME:人物_美鈴%はそう言いながら、横になった。

    「……誰かに見られたら困りますし……」

    周囲を気にしながら、%CALLNAME:人物_美鈴%は一物を太腿で挟んだ。

    「……ん……思ったより、熱い……」

    %CALLNAME:人物_美鈴%は顔を赤らめながら、腰を動かした。

    「……ほ、本当に一回だけですからね……」
