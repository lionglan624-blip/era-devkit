character: レミリア
situation: K5_口挿入
entries:
- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%、今夜は私が後ろから可愛がってあげるわ」

    %CALLNAME:人物_レミリア%は妖艶に微笑み、%CALLNAME:MASTER%の背後に回った。

    小さな冷たい手が%CALLNAME:MASTER%の腰を掴む。

    「……さあ、力を抜いて……私を受け入れなさい」

    %CALLNAME:人物_レミリア%はゆっくりと%CALLNAME:MASTER%の中に入っていった。

    「ん……%CALLNAME:MASTER%の中、温かい……気持ちいいわ……」

    紅魔館の主は、愛しい人の背中に身体を預けながら腰を動かし始めた。

    「%CALLNAME:MASTER%……後ろから抱きしめながら繋がるの、好きよ」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の背中に頬を寄せた。

    500年の吸血鬼が、恋人を後ろから包み込む。

    「……んっ……奥まで……入っていくわ……」

    %CALLNAME:人物_レミリア%は甘い吐息を漏らしながら腰を進めた。

    「……%CALLNAME:MASTER%の反応……後ろからだとよく分かるの」

    紅い瞳が恍惚と潤み、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を愛おしそうに抱きしめた。

    「ククク……%CALLNAME:MASTER%の背中、無防備でいいわね」

    %CALLNAME:人物_レミリア%は支配者の笑みを浮かべながら%CALLNAME:MASTER%の後ろに立った。

    小さな身体が%CALLNAME:MASTER%に覆いかぶさる。

    「さあ……私のモノになりなさい」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の中に深く沈み込んだ。

    「あぁ……気持ちいい……%CALLNAME:MASTER%……」

    支配者の仮面が外れ、500年の吸血鬼は快楽に溺れていく。

    「……ねえ、%CALLNAME:MASTER%……後ろから抱かせてくれる？」

    %CALLNAME:人物_レミリア%は珍しく甘えた声で囁いた。

    %CALLNAME:MASTER%の背後から腕を回し、身体を密着させる。

    「……こうして後ろから繋がると……%CALLNAME:MASTER%を独り占めしている気分になるわ」

    %CALLNAME:人物_レミリア%はゆっくりと腰を動かし始めた。

    「んっ……はぁ……%CALLNAME:MASTER%のこと……離さないわよ……」

    紅魔館の主は、恋人の温もりを全身で感じながら愛を注いだ。
