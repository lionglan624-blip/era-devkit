- id: fallback
  content: >-
    「――ん？　お茶……淹れてくれたの？」

    %CALLNAME:TARGET%は少し戸惑いながらも、湯飲みを受け取った。

    ふーふー、と冷ましてから、静かにお茶を口に含む。

    「……ふーん、悪くないわね」

    %CALLNAME:TARGET%は素っ気なく言ったが、その表情は満更でもなさそうだ。

    「まあ、あたいに気を遣ってくれるなんて、%CALLNAME:MASTER%も見る目あるじゃない」

    偉そうに言いながらも、%CALLNAME:TARGET%は嬉しそうにお茶を飲み続けた。

    「――へぇ、%CALLNAME:MASTER%がお茶なんて珍しいわね」

    %CALLNAME:TARGET%は興味深そうに湯飲みを受け取った。

    ずず、とお茶を啜る音が静かに響く。

    「……あら、意外とおいしいじゃない」

    %CALLNAME:TARGET%は少し驚いた様子でそう言った。

    「……でも、あたいの方がもっと上手に淹れられるわよ！　たぶん！」

    張り合うように言いながらも、%CALLNAME:TARGET%の顔はどこか嬉しそうだった。

    「――お茶？　ふぅん、あんたも気が利くじゃない」

    %CALLNAME:TARGET%は少し偉そうに湯飲みを受け取った。

    冷たい指先が、湯飲みの温もりに触れる。

    「……あったかいわね」

    そう呟いて、%CALLNAME:TARGET%は小さく息を吐いた。

    「あたいは氷の妖精だから、こういうの新鮮なのよ」

    %CALLNAME:TARGET%は何気なく言ったが、どこか心地よさそうにしている。

    「――ん、なに？　お茶？」

    %CALLNAME:TARGET%は不思議そうな顔で湯飲みを見つめた。

    「……まあ、もらっておいてあげるわ」

    恩着せがましく言いながらも、%CALLNAME:TARGET%はお茶を啜り始めた。

    「……ふぅん。%CALLNAME:MASTER%って、あたいのこと気にしてるの？」

    ちらりと%CALLNAME:MASTER%を見上げる%CALLNAME:TARGET%の目には、かすかな期待が浮かんでいた。
  priority: 2
- id: fallback
  content: >-
    「――ん？　……お茶？　あたいに？」

    %CALLNAME:TARGET%は少し警戒しながらも、湯飲みを受け取った。

    「……別に、毒とか入ってないでしょうね？」

    そう言いながらも、お茶の匂いを確かめてから口をつける。

    「……ふーん、普通ね。まあ、もらっといてあげるわ」

    %CALLNAME:TARGET%は偉そうに言いながら、お茶を飲み干した。

    「――へぇ、あんたがお茶ねぇ」

    %CALLNAME:TARGET%は胡散臭そうに湯飲みを見つめている。

    「……まあいいわ、飲んであげる。あたいは寛大だからね」

    最強の氷精は、尊大な態度でお茶を口に運んだ。

    「……ふん、悪くないわね。感謝しなさい、飲んでやったんだから」

    %CALLNAME:TARGET%は威張って言ったが、本気で怒っているわけではなさそうだ。

    「――なによ、急にお茶なんて」

    %CALLNAME:TARGET%は怪訝そうな顔で湯飲みを受け取った。

    「……あんた、何か企んでるんじゃないでしょうね？」

    疑いの目を向けながらも、%CALLNAME:TARGET%はお茶を一口飲んだ。

    「……まあ、普通のお茶ね。あたいをバカにしてるわけじゃなさそうね」

    %CALLNAME:TARGET%は納得したように頷いて、お茶を飲み進めた。

    「――お茶？　ふぅん……」

    %CALLNAME:TARGET%は首を傾げながら、湯飲みを手に取った。

    「あんた、あたいに気を遣ってるつもり？」

    生意気な口調とは裏腹に、%CALLNAME:TARGET%はしっかりお茶を飲んでいる。

    「……まあ、悪くないわね。次はもっと冷たい飲み物にしなさいよ」

    %CALLNAME:TARGET%はそう言い残して、最後まで飲み干した。
  priority: 1
