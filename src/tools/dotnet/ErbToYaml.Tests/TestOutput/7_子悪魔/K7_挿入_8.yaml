    「ふぁ……%CALLNAME:MASTER%のうで……あったかい……」

    %CALLNAME:TARGET%は後ろから抱きしめられ、安心したように息を吐いている。

    悪魔の少女は%CALLNAME:MASTER%の胸板に背中を預け、深く繋がっていた。

    「うしろからだと……%CALLNAME:MASTER%のこと、かんじる……ぜんぶ……」

    %CALLNAME:TARGET%は恍惚とした表情で、腰をくねらせた。

    「あたしの中……%CALLNAME:MASTER%で、いっぱいにして……」

    愛情と本能が溶け合い、%CALLNAME:TARGET%は%CALLNAME:MASTER%を締め付けていった。

    「あっ……んっ……%CALLNAME:MASTER%……すき……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに合わせ、小刻みに体を揺らしている。

    後ろから抱きしめられながら、悪魔の少女は幸せに満ちた声を上げていた。

    「むねも……さわって……あたし、ぜんぶ……%CALLNAME:MASTER%のもの……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を自分の胸に導いた。

    「えへへ……こうしてると、しあわせ……」

    無邪気に微笑みながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%との繋がりを楽しんでいた。

    「んっ……はぁ……%CALLNAME:MASTER%、うしろから……きもちいい……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に体を預け、蕩けるような表情を浮かべている。

    サキュバスの血が愛を求め、%CALLNAME:TARGET%は甘い声を漏らし続けていた。

    「あたしね……%CALLNAME:MASTER%のこと、だいすき……」

    %CALLNAME:TARGET%は首を傾け、%CALLNAME:MASTER%の顔を見上げた。

    「だから……いっぱい、だして……あたしの中に……ね……？」

    愛情を込めて、%CALLNAME:TARGET%は%CALLNAME:MASTER%を締め付けていった。
