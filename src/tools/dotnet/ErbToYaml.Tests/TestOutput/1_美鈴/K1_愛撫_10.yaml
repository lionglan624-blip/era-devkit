- id: fallback
  content: >-
    「ふふ……%CALLNAME:MASTER%の胸、あったかい……」

    %CALLNAME:人物_美鈴%は幸せそうに微笑みながら、%CALLNAME:MASTER%の胸に顔を埋めた。

    その仕草は門番というよりも、恋人に甘える女性そのものだ。

    「……んっ……ちゅ……」

    %CALLNAME:人物_美鈴%の唇が%CALLNAME:MASTER%の乳首に吸い付き、甘い音を立てている。

    「%CALLNAME:MASTER%……こうしてると、すごく安心するわ……」

    %CALLNAME:人物_美鈴%は恋人の温もりに包まれて、とろけるように甘えていた。

    「あっ……%CALLNAME:MASTER%の匂い……好き……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の胸に頬ずりしながら、乳首を舌でくすぐった。

    「……れろ……ちゅぷ……」

    %CALLNAME:人物_美鈴%の舌が乳首を転がし、%CALLNAME:MASTER%の体に甘い痺れを走らせる。

    「……ふふ、%CALLNAME:MASTER%、気持ちいい……？」

    上目遣いで見つめながら、%CALLNAME:人物_美鈴%は愛おしそうに乳首を吸い続けた。

    「私も……%CALLNAME:MASTER%を気持ちよくできて……嬉しいの……」

    「んむ……ちゅぅ……」

    %CALLNAME:人物_美鈴%は夢中で%CALLNAME:MASTER%の乳首を吸っている。

    時折甘噛みするように歯を立て、%CALLNAME:MASTER%をくすぐった。

    「……%CALLNAME:MASTER%の胸、柔らかくて……気持ちいいわ……」

    %CALLNAME:人物_美鈴%の片手がもう片方の胸をそっと揉みしだいている。

    「……ねぇ、%CALLNAME:MASTER%……ずっとこうしてていい……？」

    %CALLNAME:人物_美鈴%は恋人の胸の中で、至福の時間を過ごしていた。

    「%CALLNAME:MASTER%が好きだから……いっぱい甘えちゃうわね……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の腕の中で、幸せそうに体を預けた。

    「んっ……ちゅぷ……おっぱい、いい匂い……」

    %CALLNAME:人物_美鈴%は無邪気な表情で、夢中になって乳首を吸い続けている。

    %CALLNAME:人物_美鈴%の体が%CALLNAME:MASTER%の温もりに包まれて、とろけるように緩んでいた。

    「……%CALLNAME:MASTER%……大好き……ずっと一緒にいてね……」

    %CALLNAME:人物_美鈴%は愛しい人の胸の中で、幸せに浸っていた。
