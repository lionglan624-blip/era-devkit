- id: fallback
  content: >-
    「ちょっと、どこ触ってるのよ！」

    %CALLNAME:人物_美鈴%は驚いて身を引いた。

    「……お尻はさすがに、ダメですよ」

    %CALLNAME:人物_美鈴%は困った顔で%CALLNAME:MASTER%を見ている。

