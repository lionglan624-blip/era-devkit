character: 魔理沙
situation: K10_口挿入
entries:
- id: fallback
  content: >-
    「ん……こうやって足で挟むと、気持ちいいのか？」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の一物を両足で挟んだ。

    「足でするなんて……変なことさせるよな、お前は」

    %CALLNAME:人物_魔理沙%は照れくさそうに笑いながら、ゆっくりと足を上下に動かし始めた。

    「んっ……こう、足指で先端を弄ると……反応するな」

    %CALLNAME:人物_魔理沙%は恋人の顔を見ながら、器用に足を動かした。

    「……お前を喜ばせたいんだぜ。だから……ちゃんと教えてくれよな」

    「ふふ……お前のここ、すごく熱いな」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の一物を足裏で包み込むように擦った。

    「こうして足で触ってると……なんか、繋がってる気がするぜ」

    「んっ……私の足で気持ちよくなってくれると……嬉しいな」

    %CALLNAME:人物_魔理沙%は恋人の反応を確かめながら、足を動かし続けた。

    「もっと気持ちよくしてやるから……任せとけ」

    「……こういうの、だんだん上手くなってきただろ？」

    %CALLNAME:人物_魔理沙%は自信ありげに笑いながら、器用に足を動かした。

    「んっ……足指で挟んで、こうやって擦ると……」

    %CALLNAME:MASTER%が気持ちよさそうにすると、%CALLNAME:人物_魔理沙%は得意げになった。

    「ふふん、私だって努力してるんだぜ……お前のためにな」

    %CALLNAME:人物_魔理沙%は足裏で一物を挟み、ゆっくりと上下に動かした。

    「もっと……気持ちよくなれよ」

    「なあ……ちゃんとこっち見てろよ」

    %CALLNAME:人物_魔理沙%は足を動かしながら、%CALLNAME:MASTER%の目を見つめた。

    「私がお前のこと、足で気持ちよくしてるとこ……ちゃんと見てろ」

    「んっ……こう、足裏で擦ると……いいんだろ？」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに頬を染めながらも、足を止めなかった。

    「……見られてると、なんか……頑張れるんだぜ」

    %CALLNAME:人物_魔理沙%は恋人の視線を感じながら、愛情を込めて足を動かした。
  priority: 4
- id: talent_3_1
  content: >-
    「ち、違うからな！　べ、別にやりたくてやってるわけじゃ……」

    %CALLNAME:人物_魔理沙%は顔を真っ赤にしながら、%CALLNAME:MASTER%の一物を足で挟んだ。

    「足でなんて……変態なんだからな、お前は……」

    %CALLNAME:人物_魔理沙%は照れ隠しに強がりながらも、足を動かし始めた。

    「んっ……こ、こうやって擦ればいいんだろ……？」

    %CALLNAME:人物_魔理沙%は恥ずかしそうに顔を背けながらも、足は止めなかった。

    「……笑うなよ、一生懸命やってるんだから……」

    「こ、こんなことして……物好きなんだからな」

    %CALLNAME:人物_魔理沙%は文句を言いながらも、足を動かし続けている。

    「私の足なんかで……満足するなんて……」

    「んっ……こう、足指で挟むと……反応するな……」

    %CALLNAME:人物_魔理沙%の足使いは慣れないながらも、一生懸命だった。

    「……でも、気持ちいいなら……まあ、仕方ないか」

    %CALLNAME:人物_魔理沙%は照れながらも、足を動かし続けた。

    「んっ……なんか、大きくなってきた……？」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、足を動かし続けた。

    「こ、これって……私の足で気持ちいいってこと……？」

    %CALLNAME:MASTER%が頷くと、%CALLNAME:人物_魔理沙%は複雑な表情になった。

    「……別に嬉しくなんかないぜ……ただ、悪い気はしないってだけだ」

    %CALLNAME:人物_魔理沙%は照れながらも、少し得意げだった。

    「……もうちょっとだけ、やってやるよ」

    「……お前、もうちょっと反応してくれてもいいんだぜ」

    %CALLNAME:人物_魔理沙%は少し不満そうに呟いた。

    「こっちは足で一生懸命やってるんだから……」

    「んっ……こう擦ると……」

    %CALLNAME:MASTER%が気持ちよさそうな顔をすると、%CALLNAME:人物_魔理沙%は照れた。

    「なっ……そ、そんな顔されると困る……」

    「……もう、勝手にしろよ……」
