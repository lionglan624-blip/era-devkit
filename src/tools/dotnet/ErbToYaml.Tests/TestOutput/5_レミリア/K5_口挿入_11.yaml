- id: fallback
  content: >-
    「……触れてみてもいいかしら」

    %CALLNAME:人物_レミリア%は興味深そうに%CALLNAME:MASTER%を見つめた。

    細い指がそっと肌に触れると、その温かさに目を見開く。

    「……こんなに温かいのね。人間というのは」

    %CALLNAME:人物_レミリア%は珍しそうに%CALLNAME:MASTER%の肌を撫でた。

    「……不思議な感触だわ」

    紅魔館の主は、好奇心のままに%CALLNAME:MASTER%の体を探っていた。

    「……私の手、冷たいでしょう。驚かないで」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に触れる前に断った。

    吸血鬼の冷たい指が、恐る恐る肌に触れる。

    「……%CALLNAME:MASTER%の体温が、私の手に移ってくるようね」

    %CALLNAME:人物_レミリア%は不思議そうに手を見つめた。

    「……これが、生きているということなのかしら」

    500年を生きる吸血鬼は、人の温もりに何かを感じ取っていた。

    「……気まぐれよ。深い意味はないわ」

    %CALLNAME:人物_レミリア%はそう言いながら%CALLNAME:MASTER%の肌に触れた。

    しかしその手つきは、どこか優しさを帯びている。

    「……%CALLNAME:MASTER%の体、思ったより柔らかいのね」

    %CALLNAME:人物_レミリア%は感想を漏らした。

    「……もう少しだけ、触れていてもいいかしら」

    紅魔館の主は、自分でも気づかぬうちに%CALLNAME:MASTER%への関心を深めていた。

    「……暇つぶしに付き合いなさい」

    %CALLNAME:人物_レミリア%は傲慢に言い放ち、%CALLNAME:MASTER%に手を伸ばした。

    しかし触れた瞬間、その表情が僅かに和らいだ。

    「……なるほど。こういうのも、悪くないわね」

    %CALLNAME:人物_レミリア%は意外そうに呟いた。

    「……%CALLNAME:MASTER%、動かないで。もう少し触れさせなさい」

    500年の吸血鬼は、新しい発見をしたように%CALLNAME:MASTER%の肌を撫で続けた。
  priority: 2
- id: fallback
  content: >-
    「……私に触られたいの？　図々しいわね」

    %CALLNAME:人物_レミリア%は不機嫌そうに%CALLNAME:MASTER%を見下ろした。

    仕方なく手を伸ばし、ぞんざいに肌に触れる。

    「……ほら、触ってやったわよ。満足？」

    %CALLNAME:人物_レミリア%は面倒そうに言った。

    「……私の貴重な時間を使っているのだから、感謝しなさい」

    紅魔館の主は、最低限の義務を果たすだけのように触れ続けた。

    「……命令されたから触れているだけよ」

    %CALLNAME:人物_レミリア%は冷たく言い放ち、%CALLNAME:MASTER%の肌に指を這わせた。

    その動きはどこかぎこちなく、不慣れさが見える。

    「……こんなことに意味があるのかしら」

    %CALLNAME:人物_レミリア%は興味なさそうに呟いた。

    「……早く終わらせて、私を解放しなさい」

    500年の吸血鬼は、屈辱を怒りに変えて耐えていた。

    「……私の冷たい手で触られて、どうするつもり？」

    %CALLNAME:人物_レミリア%は嘲笑うように言った。

    吸血鬼の冷たい指が、わざと冷やすように肌を撫でる。

    「……ほら、寒くなってきたでしょう？」

    %CALLNAME:人物_レミリア%は意地悪く笑った。

    「……こんな私の手を望んだのは、あなたよ」

    紅魔館の主は、相手の反応を楽しむように愛撫を続けた。

    「……気まぐれで触れてあげているのよ」

    %CALLNAME:人物_レミリア%は傲慢に告げ、%CALLNAME:MASTER%に手を置いた。

    その動きは雑で、愛情のかけらも感じられない。

    「……感謝しなさい。紅魔館の主に触れてもらえるなんて、光栄でしょう」

    %CALLNAME:人物_レミリア%は高慢に言い放った。

    「……さあ、これで満足したら私を解放しなさい」

    紅魔館の主は、最後まで支配者然とした態度を崩さなかった。
  priority: 1
