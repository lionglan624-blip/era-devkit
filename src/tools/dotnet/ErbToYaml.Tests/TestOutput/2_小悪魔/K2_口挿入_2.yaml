entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……ふふっ、こういうのがお好みですの？」

    %CALLNAME:人物_小悪魔%は艶然と微笑みながら、%CALLNAME:MASTER%の上に跨った。

    秘所を一物に密着させると、ゆっくりと腰を動かし始める。

    「んっ……私の中、熱くなってきましたわ……」

    %CALLNAME:人物_小悪魔%は愛おしそうに%CALLNAME:MASTER%を見つめ、腰を前後に揺らした。

    「こうやって……擦り合わせるの……気持ちいいですわね……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の一物に秘所を押し当てた。

    「んぅ……ぬるっとして……いい感触ですわ……」

    じゅぷ、と淫らな音を立てながら、腰を前後に動かしている。

    「はぁ……%CALLNAME:MASTER%の……硬くて、熱い……」

    %CALLNAME:人物_小悪魔%は蕩けた表情で、悪魔の尻尾をゆらゆらと揺らした。

    「もっと……もっと気持ちよくしてあげますわ……」

    「ねえ、%CALLNAME:MASTER%……私の動き、上手になりました？」

    %CALLNAME:人物_小悪魔%は一物を秘所で挟み込みながら、嬉しそうに目を細めている。

    くちゅ、と濡れた音を立てながら、腰を擦り付ける。

    「んっ……ぴちゃ……ふふ、こうすると……気持ちいいでしょう？」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の反応を楽しむように、緩急をつけて腰を揺らした。

    「悪魔に奉仕されるって……どんな気分ですの……？」

    %CALLNAME:人物_小悪魔%は蕩けるような笑みを浮かべ、一物に秘所を擦り付けた。

    「%CALLNAME:MASTER%……私、あなたのこと……本当に好き……」

    ねっとりと腰を動かしながら、%CALLNAME:人物_小悪魔%は愛を囁く。

    「だから……こうやって奉仕できるのが……幸せですわ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の胸に手を置き、深く腰を沈めた。

    「んぅ……じゅる……ちゅぷ……全部……受け止めますわ……」
