- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……こちらの場所でも……お望みですのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨り、恥じらいながらも腰を下ろしていった。

    「あ……ぅ……きつい……ですわ……」

    慣れない感覚に眉を寄せながらも、%CALLNAME:TARGET%は最後まで受け入れた。

    「んっ……全部……入りましたわ……」

    「貴方のために……私が動きますから……」

    恋人のために、瀟洒なメイドは自ら腰を動かし始めた。

    「ふぁ……%CALLNAME:MASTER%……こんな恥ずかしい場所まで……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見下ろしながら、頬を紅潮させた。

    「メイドとしての誇りなど……貴方の前では意味がありませんわね……」

    腰を上下に動かすたび、%CALLNAME:TARGET%の吐息が甘くなっていく。

    「あ……んっ……深い……」

    「こんな姿……貴方にしか見せられませんわ……」

    %CALLNAME:TARGET%は恍惚とした表情で、恋人を見つめた。

    「……%CALLNAME:MASTER%……ここも……貴方のものですから……」

    %CALLNAME:TARGET%は自ら腰を沈め、%CALLNAME:MASTER%を奥深くまで受け入れた。

    「っ……ぁ……すごい圧迫感……」

    「でも……嫌じゃありませんの……貴方だから……」

    背徳的な快感に身を震わせながら、%CALLNAME:TARGET%は動きを止めない。

    「あ……気持ちいい……こんなところで……」

    完璧なメイドは、恋人の腕の中で淫らに腰を揺らし続けた。

    「……私の全部……%CALLNAME:MASTER%に差し上げますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に手をついて、腰を落としていった。

    「あ……んぅ……こっちは……きついですけれど……」

    苦しそうな表情の奥に、確かな悦びが見える。

    「貴方を……もっと感じたいの……」

    「ふぁ……奥まで……届いて……」

    %CALLNAME:TARGET%は恋人だけに見せる蕩けた表情で、腰を揺らし続けた。
