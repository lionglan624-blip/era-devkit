- id: fallback
  content: >-
    「……え、手……ですか？」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の手に触れると、

    %CALLNAME:TARGET%は戸惑った表情を浮かべた。

    「あの……こういうの、していいんですか……？」

    %CALLNAME:TARGET%は困惑しながらも、強くは振り払おうとしない。

    「……咲夜さんには、ナイショにしてくださいね……？」

    小さな声でそう言いながら、%CALLNAME:TARGET%はおずおずと手を握り返した。

    「……な、なにするんですか……？」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の髪に触れた。

    %CALLNAME:TARGET%は驚いた様子で、じっとこちらを見つめている。

    「髪……ですか……？　変なの……」

    されるがままに髪を撫でられながら、%CALLNAME:TARGET%は小首を傾げた。

    「……まあ、嫌じゃ……ないですけど……なんだか、くすぐったい」

    %CALLNAME:TARGET%は困ったような、でもどこか嬉しそうな顔をしていた。

    「あっ……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の肩に軽く手を置いた。

    %CALLNAME:TARGET%は少し身を強張らせたが、振り払おうとはしなかった。

    「えっと……あの……なにか、ありますか……？」

    %CALLNAME:TARGET%はどうしていいかわからない様子で、もじもじしている。

    「……嫌じゃ、ないです。たぶん……%CALLNAME:MASTER%だから」

    妖精の小さな肩が、少しずつ力を抜いていった。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の頬に軽く手を当てた。

    「ふぇっ……ほっぺ……？」

    %CALLNAME:TARGET%は驚いて目をぱちくりさせている。

    「あの……こういうことって、普通にするものなんですか……？」

    %CALLNAME:TARGET%は困惑しながらも、%CALLNAME:MASTER%の手を払いのけようとはしなかった。

    「……あったかい。%CALLNAME:MASTER%の手、あったかいです……」

    小さく呟いて、%CALLNAME:TARGET%はほんのり頬を赤らめた。
  priority: 2
- id: fallback
  content: >-
    「……え、なに……？」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%に触れようとすると、

    %CALLNAME:TARGET%は小さく身を縮こまらせた。

    「あの……いきなりは、ちょっと……」

    「怖いよ……」

    %CALLNAME:TARGET%は不安そうな瞳でこちらを見上げている。

    妖精の小さな体が、緊張でこわばっていた。

    「……ひっ……」

    %CALLNAME:MASTER%が近づくと、%CALLNAME:TARGET%は警戒した様子で一歩後ずさった。

    「あの……触らないでください……」

    %CALLNAME:TARGET%は怯えた表情で、両手を胸の前で組んでいる。

    「……咲夜さんに怒られちゃうから……」

    %CALLNAME:TARGET%は小さな声で、言い訳のようにそう言った。

    「お仕事中なの……だから、ごめんなさい……」

    「あ、あの……」

    %CALLNAME:MASTER%が手を伸ばすと、%CALLNAME:TARGET%はびくりと肩を震わせた。

    「まだ……あんまりお話もしてないのに……」

    %CALLNAME:TARGET%は困った顔で、そわそわと視線を泳がせている。

    「……もうちょっと仲良くなってから……に、してほしいの……」

    妖精の小さな体が、緊張で強張っていた。

    「あたし、知らない人には、ちょっと怖くて……」

    「……あの……」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の方へ歩み寄ると、

    %CALLNAME:TARGET%は戸惑った様子で立ち止まった。

    「えっと……なにか、用ですか……？」

    %CALLNAME:TARGET%は不安そうにこちらを見つめている。

    「……触るのは、ちょっと……まだ、心の準備が……」

    %CALLNAME:TARGET%は申し訳なさそうに、小さく首を振った。

    「ごめんなさい……また、今度にしてください……」
  priority: 1
