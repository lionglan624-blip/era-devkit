    「%CALLNAME:MASTER%……嫌じゃない……？」

    不安げに%CALLNAME:MASTER%の顔を覗き込んだ。

    「%CALLNAME:MASTER%のこと……こうやって抱けるなんて……」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%を見下ろしながら呟いた。

    正常位で挿入しながら、顔を見つめ合う体勢に恥ずかしさが込み上げる。

    「あっ……顔見られてる……恥ずかしい……」

    %CALLNAME:人物_チルノ%は赤い顔のまま腰を動かし続けた。

    「でも……%CALLNAME:MASTER%と繋がってるの……嬉しい……」

    素直になれない氷の妖精は、照れながらも懸命に腰を振った。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の上で小さく呟いた。

    「あたいが……%CALLNAME:MASTER%を気持ちよくするから……」

    決意を固めたように、腰の動きが少し大胆になった。

    「んっ……あたいも……気持ちいい……」

    氷の妖精は恥ずかしさと快感に挟まれながら、%CALLNAME:MASTER%を抱いた。
