- id: fallback
  content: >-
    「なにそれ？　おもちゃ？」

    %CALLNAME:TARGET%は見慣れない器具を不思議そうに見つめた。

    「……あたいは子供じゃないからね、おもちゃなんていらないけど」

    強がりながらも、好奇心は隠せていない。

    「……まぁ、見せてくれるなら見てあげてもいいわよ」

    %CALLNAME:TARGET%は偉そうに言いながら、ローターに視線を向けた。

    「あたいは最強だから、何が来ても大丈夫だし」

    「これ、何なの……？」

    %CALLNAME:TARGET%はローターの振動を受けて、困惑した声を上げた。

    「……ぶるぶるしてて変な感じ……なにこれ……」

    初めての感覚に、いつもの自信満々な態度が揺らいでいる。

    「……別に怖くないけど、なんか落ち着かないの」

    %CALLNAME:TARGET%は落ち着かなげに翅をぱたつかせた。

    「……%CALLNAME:MASTER%、これ何に使うの……？」

    「そこ、だめ……！」

    %CALLNAME:TARGET%は敏感な場所を刺激されて、思わず声を上げた。

    ローターの振動が体に響き、小さな体がぴくぴくと跳ねる。

    「……やだ、なにこの感じ……あたい、変になっちゃう……」

    普段の威勢のいい態度は消え去り、戸惑いだけが残っている。

    「……%CALLNAME:MASTER%……どうすればいいの……」

    頼りなげに、%CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げた。

    「なにこれ、なにこれ……」

    %CALLNAME:TARGET%は困惑しながら、ローターの振動に体を震わせていた。

    「……こんなの知らない……あたいの体がおかしくなる……」

    初めての快感に、自称最強の氷精は完全に翻弄されている。

    「……%CALLNAME:MASTER%、これ止めて……いや、止めないで……わかんない……」

    矛盾した言葉が、混乱を物語っていた。

    「……あたい、どうなっちゃうの……？」
  priority: 2
- id: fallback
  content: >-
    「何それ、気持ち悪いわね」

    %CALLNAME:TARGET%は嫌悪感を隠さずにローターを見つめた。

    「あたいにそんなもの使おうったって、無駄よ」

    威勢よく言い放ちながら、%CALLNAME:TARGET%は距離を取った。

    「最強のあたいには、そんな変なもの効かないんだから」

    自信たっぷりに胸を張るが、警戒心は明らかだった。

    「どこか他所でやりなさいよね！」

    「そんな変なもので触らないで！」

    %CALLNAME:TARGET%は振動するローターを見て、嫌そうに顔をしかめた。

    「気持ち悪いったらありゃしないわ！」

    翅がばたばたと警戒で震えている。

    「あたいは最強なんだから、そんな変なもの使わなくても……」

    %CALLNAME:TARGET%は言葉を濁しながら後ずさった。

    「……とにかく、あたいに近づかないで！」

    「何その音……気持ち悪いんだけど」

    %CALLNAME:TARGET%はローターの振動音を聞いて、眉をひそめた。

    「ぶーんって……虫みたいで変なの」

    興味はあるようだが、警戒心が勝っている様子だ。

    「……あたいに使おうとしてるの？　やめてよね」

    %CALLNAME:TARGET%は威嚇するように%CALLNAME:MASTER%を睨んだ。

    「最強のあたいに、そんな変なもの通用しないんだから！」

    「なにそれ、玩具？」

    %CALLNAME:TARGET%は見慣れない器具を胡散臭げに見つめた。

    「あたいは最強だから、おもちゃなんて興味ないわよ」

    強がりながらも、目はちらちらとローターを追っている。

    「……まぁ、見るだけなら見てあげてもいいけど」

    %CALLNAME:TARGET%は偉そうに言いながらも、少し距離を取った。

    「近づけたら凍らせるからね！　覚悟しなさい！」
  priority: 1
