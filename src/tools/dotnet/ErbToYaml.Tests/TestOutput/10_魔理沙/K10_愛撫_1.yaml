- id: talent_3_1
  content: >-
    「ひゃっ……！　ちょ、%CALLNAME:MASTER%、そこは……っ」

    %CALLNAME:人物_魔理沙%は驚いて脚を閉じようとしたが、%CALLNAME:MASTER%に押さえられた。

    「な、舐めるのか……そこ……」

    %CALLNAME:人物_魔理沙%は顔を真っ赤にしている。

    「……き、汚いだろ……やめ……あっ……」

    抵抗の言葉は、快感に飲み込まれていった。

    「あ……んっ……そんな、見ながら舐めるなよ……」

    %CALLNAME:人物_魔理沙%は恥ずかしさに目を逸らした。

    「……%CALLNAME:MASTER%の顔が……近いと、余計恥ずかしいんだぜ……」

    %CALLNAME:MASTER%の舌が蜜壺を這うたび、%CALLNAME:人物_魔理沙%の体が震える。

    「やっ……そこ……ダメ……っ」

    %CALLNAME:人物_魔理沙%は快感に耐えきれず、小さく喘いだ。

    「んっ……お、おい……そんなに舐めたら……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の頭を押そうとしたが、力が入らない。

    「……変な声、出ちゃうだろ……っ」

    %CALLNAME:人物_魔理沙%は羞恥に顔を歪めながらも、逃げようとはしなかった。

    「……%CALLNAME:MASTER%のせいで、おかしくなりそうだぜ……」

    その言葉には、責めと期待が入り混じっていた。

    「あっ……やぁ……」

    %CALLNAME:人物_魔理沙%は%CALLNAME:MASTER%の舌の動きに翻弄されている。

    「こんなの……されたの、初めてだぜ……」

    %CALLNAME:人物_魔理沙%は戸惑いながらも、体は正直に反応していた。

    「……%CALLNAME:MASTER%……もう、どうにでもしろよ……」

    観念したように、%CALLNAME:人物_魔理沙%は脚の力を抜いた。
