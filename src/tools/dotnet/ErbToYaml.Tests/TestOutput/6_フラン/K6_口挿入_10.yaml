entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……こうして上から見てると、顔がよく見えるのさ」

    %CALLNAME:人物_フラン%は恋人に跨りながら、紅い瞳を細めた。

    ゆっくりと腰を落とし、後ろに%CALLNAME:MASTER%を受け入れていく。

    「ん……入ってくる……私の後ろ、%CALLNAME:MASTER%でいっぱい……」

    %CALLNAME:人物_フラン%は恋人の顔を見つめながら、腰を揺らし始めた。

    「壊さないように……後ろで繋がってるの……嬉しいのさ」

    495年の孤独を知る少女は、上から恋人を見下ろす幸福に酔いしれていた。

    「ねぇ、%CALLNAME:MASTER%……私が上だと、こうしてずっと顔が見れるのさ」

    %CALLNAME:人物_フラン%は嬉しそうに恋人を見つめながら、腰を上下させた。

    後ろで%CALLNAME:MASTER%を受け入れたまま、両手を恋人の胸に置く。

    「えへへ……%CALLNAME:MASTER%の気持ちいい顔、私だけのもの」

    %CALLNAME:人物_フラン%は腰を深く沈めて、甘い息を漏らした。

    「後ろで繋がってると……壊さないでいられる気がするの」

    悪魔の妹は、恋人を独占する体勢に幸せを感じていた。

    「%CALLNAME:MASTER%……上から抱きしめちゃう」

    %CALLNAME:人物_フラン%は騎乗位のまま、恋人に覆いかぶさった。

    後ろで受け入れながら、恋人の首に腕を回して頬を寄せる。

    「こうすると……私が%CALLNAME:MASTER%を守ってるみたいでしょ？」

    %CALLNAME:人物_フラン%は恋人の耳元で囁きながら、奥まで受け入れた。

    「んっ……後ろ、きゅってなる……嬉しい……もっと動くね……」

    495年の孤独を知る少女は、恋人を上から包み込む喜びに満たされていた。

    「私がリードしてあげる……だって、%CALLNAME:MASTER%は私の恋人だから」

    %CALLNAME:人物_フラン%は自信満々に微笑みながら、腰を動かした。

    後ろで%CALLNAME:MASTER%を受け入れたまま、恋人の手を取って自分の胸に当てる。

    「ねぇ、私の心臓……ドキドキしてるでしょ？　%CALLNAME:MASTER%のことが好きだから」

    %CALLNAME:人物_フラン%は恋人を見下ろしながら、愛おしそうに笑った。

    「後ろでも……大切な%CALLNAME:MASTER%なら、全部受け止めたいの」

    悪魔の妹は、恋人への愛を全身で表現しながら腰を揺らし続けた。
