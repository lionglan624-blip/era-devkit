- id: talent_3_1
  content: >-
    「っ……%CALLNAME:MASTER%……上に乗るなんて……」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%の上にまたがった。

    「こんな体勢……恥ずかしいですわ……」

    しかし、ゆっくりと腰を沈めていく。

    「……っ……あ……入って……」

    「こ、こうすれば……良いのでしょうか……」

    %CALLNAME:TARGET%はぎこちなく腰を動かし始めた。

    「あ……んっ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上で腰を揺らしている。

    「メイドとして……自分から動くのは……」

    「でも……貴方を見ていると……止められなくて……」

    %CALLNAME:TARGET%が腰を落とすと、体が震えた。

    「あっ……深い……奥まで……」

    「%CALLNAME:MASTER%……気持ち良くなっていただけていますか……」

    「……ふぁ……こんなに……動いてしまうなんて……」

    %CALLNAME:TARGET%は自分の行動に戸惑いながらも、腰を止められなかった。

    「貴方のために……奉仕したくて……」

    「で、でも……こんなはしたない姿……」

    %CALLNAME:TARGET%は顔を赤らめながら、リズムを刻み続ける。

    「……ん……っ……%CALLNAME:MASTER%……」

    葛藤しながらも、%CALLNAME:TARGET%は止まらなかった。

    「……%CALLNAME:MASTER%……見つめないでください……」

    %CALLNAME:TARGET%は目を逸らしながらも、腰を動かし続けていた。

    「こんな……私の姿……恥ずかしいですわ……」

    「あ……でも……止められないの……」

    %CALLNAME:TARGET%は自分の快感に抗えず、ペースを上げていく。

    「……ん……っ……%CALLNAME:MASTER%……」

    恥ずかしさと心地よさの狭間で、%CALLNAME:TARGET%は必死に腰を振っていた。
