    「さあ、%CALLNAME:MASTER%。私を満足させてちょうだい」

    %CALLNAME:人物_レミリア%は自ら脚を開き、恋人を誘った。

    バイブが深く挿入されると、吸血鬼は甘く啼いた。

    「あっ……そこ……奥に当たって……！」

    振動が最奥を刺激し、%CALLNAME:人物_レミリア%の理性を溶かしていく。

    「%CALLNAME:MASTER%っ……もっと……もっと強くしてっ……！」

    紅魔館の主は、恋人の腕の中で快楽に身を委ねた。

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の手からバイブを受け取り、じっと見つめた。

    「……%CALLNAME:MASTER%の手で、入れてほしいわ」

    珍しく甘えた声に、%CALLNAME:MASTER%がゆっくりと挿入すると、

    「ふぁっ……んっ……入ってくる……」

    振動が始まり、%CALLNAME:人物_レミリア%は恋人の胸に顔を埋めた。

    「あぁっ……%CALLNAME:MASTER%……好きっ……中、気持ちいいっ……」

    永遠を生きる吸血鬼は、刹那の幸福に全てを委ねた。
