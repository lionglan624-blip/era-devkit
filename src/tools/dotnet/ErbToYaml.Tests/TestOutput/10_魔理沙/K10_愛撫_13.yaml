- id: talent_3_1
  content: >-
    「何だそれ、ピンクの……まさか」

    %CALLNAME:人物_魔理沙%はローターを見て顔を赤くした。

    「そ、そういうのは恥ずかしいんだけど……」

    %CALLNAME:MASTER%が構わずスイッチを入れると、低い振動音が響いた。

    「ちょ、ちょっと待てって！　心の準備が……」

    だが%CALLNAME:MASTER%は待たず、%CALLNAME:人物_魔理沙%は抗議の声を上げた。

    「それ何に使う……って、うわっ！」

    %CALLNAME:MASTER%がローターを近づけると、%CALLNAME:人物_魔理沙%は慌てて後ずさった。

    「お、おい！　いきなりすぎるだろ！」

    だが逃げ場はなく、ローターは%CALLNAME:人物_魔理沙%の体に押し当てられた。

    「あっ……んんっ……こ、これ……振動してる……」

    %CALLNAME:人物_魔理沙%は声を抑えきれず、顔を真っ赤にした。

    「そういう道具、ちょっと苦手なんだけど……」

    %CALLNAME:人物_魔理沙%は困ったように%CALLNAME:MASTER%を見た。

    「お前の手の方がまだ……って、あっ！」

    ローターが秘所に触れた瞬間、%CALLNAME:人物_魔理沙%は声を上げた。

    「んあっ……や、やっぱり苦手だって……でも……」

    %CALLNAME:人物_魔理沙%は抵抗しながらも、その刺激から逃れられなかった。

    「いきなり……んんっ！」

    %CALLNAME:MASTER%が突然ローターを押し当て、%CALLNAME:人物_魔理沙%は驚きの声を上げた。

    「ちょ……待て……準備が……」

    ローターの振動が容赦なく%CALLNAME:人物_魔理沙%の体を襲う。

    「あぁっ……こ、これ……強いぜ……」

    %CALLNAME:人物_魔理沙%は必死に耐えようとしたが、体は正直に反応していた。
