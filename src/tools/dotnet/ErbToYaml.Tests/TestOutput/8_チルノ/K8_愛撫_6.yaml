- id: fallback
  content: >-
    「えっ……む、胸？」

    チルノは%CALLNAME:MASTER%の行動に、目を瞬かせた。

    「な、なんで胸なんか触るのさ……」

    チルノは困惑しながら、%CALLNAME:MASTER%を見上げている。

    「……あたい、こういうのよくわかんないよ」

    普段の威勢のよさはどこへやら、チルノは戸惑っている様子だ。

    「……でも、%CALLNAME:MASTER%なら……いいかな」

    「ひゃっ……！」

    チルノは%CALLNAME:MASTER%の手が胸に触れた瞬間、びくりと肩を跳ねさせた。

    「ちょっと、いきなりは驚くって！」

    チルノは抗議するように言ったが、本気で怒っている様子ではない。

    「……%CALLNAME:MASTER%って、あたいをからかってるの？」

    少し不安そうに、チルノは問いかけた。

    「本気なら……ちゃんと言ってよね」

    「あ、あのさ……」

    チルノは胸を触られながら、どうしていいかわからない様子だ。

    「あたい最強だけど……こういうのは、苦手なんだよね……」

    チルノはいつもの威勢がなく、小さくなっている。

    %CALLNAME:MASTER%が手を止めようとすると、チルノは慌てて言った。

    「や、やめなくていいけど……！　その……ゆっくりしてよね」

    チルノは顔を赤くして、視線を逸らした。

    「うー……」

    チルノは%CALLNAME:MASTER%に胸を触られて、唸っている。

    「あたいの胸なんか触っても、つまんないでしょ……」

    自信がなさそうに言いながら、チルノは%CALLNAME:MASTER%をちらちら見ている。

    「……でも、%CALLNAME:MASTER%がそうしたいなら……」

    チルノは渋々といった様子で、%CALLNAME:MASTER%に身を任せた。

    「……変なことしたら、凍らせるからね」
  priority: 2
- id: fallback
  content: >-
    「ちょっ……何すんのさ！？」

    チルノは%CALLNAME:MASTER%の手を勢いよく払いのけた。

    「いきなり胸触るとか、何考えてんの！」

    チルノは怒りを露わにして、%CALLNAME:MASTER%を睨みつけた。

    「あたい最強なんだから、舐めてると凍らせるよ！」

    チルノは冷気を纏いながら、威嚇の姿勢をとった。

    「次やったら本気出すからね！」

    「はぁ！？」

    チルノは咄嗟に後ろに飛び退いた。

    「なんで胸なんか触るのさ！　意味わかんないし！」

    チルノは混乱と怒りが入り混じった表情で、%CALLNAME:MASTER%を見ている。

    「あたいとあんた、そんな仲じゃないでしょ！」

    チルノは強く言い放った。

    「……近づかないでよ、変なやつ！」

    「――っ！」

    チルノは胸を触られた瞬間、反射的に冷気を放った。

    周囲に薄氷が張り、空気が一気に冷え込む。

    「あんたバカなの！？　あたいに何してくれてんのさ！」

    チルノは怒りで顔を真っ赤にしている。

    「もう一回やったら、マジで凍らせるから！」

    チルノは臨戦態勢で%CALLNAME:MASTER%を警戒している。

    「やめてよ！」

    チルノは%CALLNAME:MASTER%の手を掴んで止めた。

    氷の妖精の冷気が%CALLNAME:MASTER%の手を冷やしていく。

    「あたいはね、誰にでも触らせるほど安くないの！」

    チルノは強がりながら、%CALLNAME:MASTER%を睨んだ。

    「……あんたのこと、嫌いになりたくないから……やめてよね」

    最後は少し寂しそうに、チルノは言った。
