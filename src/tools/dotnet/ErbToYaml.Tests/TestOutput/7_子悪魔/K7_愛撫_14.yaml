- id: fallback
  content: >-
    「いやです……そんな小さいの、何に使うんですか……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したキャップを見て、後ずさりした。

    「……えっ、あ、あそこに被せる……？　いやっ……！」

    しかし逃げ場がなく、キャップが蕾に被せられてしまう。

    「ひゃあっ……！？　やっ、やめて……ぴったりくっついて……取れない……！」

    振動が始まり、%CALLNAME:TARGET%は涙目になって%CALLNAME:MASTER%に懇願した。

    「……咲夜さん、助けて……直接、当たって……体、変になっちゃう……」

    「な、何ですかそれ……近づけないでください……！」

    %CALLNAME:TARGET%は恐怖で体を強張らせている。

    「……そんな小さいの……あそこに……？　いや……！」

    しかし%CALLNAME:MASTER%に押さえつけられ、キャップが蕾を覆ってしまう。

    「やっ……んっ……！？　な、何これ……逃げられない……振動が……！」

    %CALLNAME:TARGET%は初めての感覚にパニックになりながら、涙を溢れさせた。

    「お願い……外して……一番敏感なところ……ずっと当たって……」

    「……っ」

    %CALLNAME:TARGET%はキャップを見て、言葉も出ないほど怯えていた。

    声を上げる間もなく、キャップが蕾に被せられる。

    「ひぁっ……！　んっ……やっ……吸い付いてる……取れない……！」

    妖精の小さな体が、陰核への直接刺激に翻弄されている。

    「……どうして……こんなところに……こんなもの……」

    %CALLNAME:TARGET%は理解できないまま、逃げられない快楽に震えていた。

    「あたし……何か悪いことしましたか……」

    %CALLNAME:TARGET%は泣きそうな顔で%CALLNAME:MASTER%を見上げた。

    「こんな……あそこに直接……」

    キャップが被せられ、妖精の体が大きく跳ねる。

    「んっ……あぁっ……！　ぴったり……振動して……逃げられない……！」

    %CALLNAME:TARGET%は抵抗する力も失い、陰核への直接刺激に蹂躙されている。

    「……もう……どうにでも、してください……」
