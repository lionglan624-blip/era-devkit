- id: fallback
  content: >-
    「……何ですか、それ。おもちゃか何かですか？」

    %CALLNAME:人物_美鈴%はローターを胡乱げに見つめた。

    %CALLNAME:MASTER%がスイッチを入れると、怪訝そうに眉をひそめた。

    「……振動してますね。で、それを私に使おうと？」

    %CALLNAME:人物_美鈴%は呆れたような表情を浮かべた。

    「何を考えてるのか知りませんが、ちょっとやめてもらえます？」

    「ちょっと、何してるんですか」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の行動を制止した。

    「そんな変なもの、私に使わないでください」

    不快そうに%CALLNAME:人物_美鈴%は一歩後ずさった。

    「これ以上続けるなら、お嬢様に報告しますよ」

    %CALLNAME:人物_美鈴%は門番としての威厳を見せ、%CALLNAME:MASTER%を睨みつけた。

    「……失礼ですけど、限度がありますよ」

    %CALLNAME:人物_美鈴%は冷たい声で言い放った。

    「私、一応この館の門番なんです。そういう変な道具で遊ばれる筋合いはありません」

    %CALLNAME:人物_美鈴%は腕を組み、警戒の姿勢を取った。

    「いい加減にしてください」

    その声には、はっきりとした拒絶が込められていた。

    「……」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%を無言で見つめた。

    「%CALLNAME:MASTER%、私は本気で言ってるんですよ」

    %CALLNAME:人物_美鈴%の声は低く、怒りを押し殺しているようだ。

    「そういう道具を持ち出すのはやめて、まともに振る舞ってください」

    「門番として、これ以上は見過ごせません」

    %CALLNAME:人物_美鈴%は毅然とした態度で、%CALLNAME:MASTER%に警告した。
