- id: talent_3_1
  content: >-
    「……%CALLNAME:MASTER%……これで……よろしいでしょうか……」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%の体に触れた。

    「こうして……撫でれば……」

    「……っ……温かい……ですわ……」

    %CALLNAME:TARGET%は顔を赤らめながら、ぎこちなく手を動かした。

    「……気持ちよくなっていただけていますか……」

    心配そうに%CALLNAME:MASTER%を見上げる。

    「……んっ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は次第に手つきが滑らかになっていく。

    「こうすると……反応がありますわね……」

    「ふふ……貴方の気持ちいいところ……覚えましたわ……」

    %CALLNAME:TARGET%は少し得意げに微笑んだ。

    「もっと……上手になりますから……」

    恥ずかしさと嬉しさが入り混じった表情で愛撫を続ける。

    「……こんな……ことをしているなんて……」

    %CALLNAME:TARGET%は自分の行動に戸惑いながらも、手を止めなかった。

    「メイドとして……お世話するのは当然……ですけれど……」

    「で、でも……%CALLNAME:MASTER%だから……」

    %CALLNAME:TARGET%は言葉を途中で飲み込み、愛撫に集中した。

    「……もう少し……このまま……」

    複雑な心境を隠しながら、%CALLNAME:TARGET%は愛撫を続けた。

    「……%CALLNAME:MASTER%……見ないでくださいまし……」

    %CALLNAME:TARGET%は俯きながら、手を動かしている。

    「こんな……はしたないこと……」

    「でも……貴方のために……」

    %CALLNAME:TARGET%は意を決したように顔を上げた。

    「……最後まで……お世話させてくださいまし……」

    恥ずかしさを堪えながら、%CALLNAME:TARGET%は懸命に愛撫を続けた。
