  content: >-
    「んっ……ふふ、二人がかりなんて、あたいを相手にするのに必要なわけ？」

    %CALLNAME:人物_チルノ%は前と後ろから同時に貫かれながら、得意げに笑った。

    二人の熱が交互に押し寄せる感覚に、氷の妖精は小さく喘ぐ。

    「あっ……ん……まあ、%CALLNAME:MASTER%となら……特別に許してあげるけどね」

    身体の奥深くまで満たされる快感に、%CALLNAME:人物_チルノ%の頬が紅潮していく。

    「はぁ……両方から……すごい……でも、あたいは最強だから……平気なのよ……」

    強がりながらも、恋人を見上げる瞳は甘く蕩けていた。

    「ねえ%CALLNAME:MASTER%……二人分、ちゃんとあたいが受け止めてあげるから」

    %CALLNAME:人物_チルノ%は自信満々に胸を張った。

    前からも後ろからも押し寄せる快感が、少女の全身を駆け巡る。

    「ひゃっ……あ……っ！　ふ、ふふ……これくらい、どうってことないわ」

    二人が同時に突くと、%CALLNAME:人物_チルノ%は堪えきれずに声を上げた。

    「んぅ……%CALLNAME:MASTER%……もっとぎゅってして……最強のあたいを、独り占めしていいから……」

    強がりの裏側から、恋人への甘えが顔を覗かせていた。

    「あたいって人気者だからさ、二人に取り合いされるのも当然よね」

    %CALLNAME:人物_チルノ%は優越感に浸りながら呟いた。

    前と後ろ、交互に突かれるたびに、理性が溶けていく。

    「あっ……ん……でも、あたいは%CALLNAME:MASTER%のものだから……ね……」

    %CALLNAME:MASTER%を見上げる瞳には、独占欲と愛情が滲んでいる。

    「はぁ……両方すごいけど……%CALLNAME:MASTER%のが一番……分かるよ……」

    氷の妖精は、二人に挟まれながらも恋人だけを見つめていた。

    「二人がかりでも、あたいには勝てないんだから……んっ」

    %CALLNAME:人物_チルノ%は強がりながら、快感に身体を震わせた。

    前後から同時に押し込まれる感覚に、少女は思わず%CALLNAME:MASTER%にしがみつく。

    「あっ……ひゃ……こ、これくらい……平気……なんだから……」

    二人の動きが激しくなると、%CALLNAME:人物_チルノ%の声も甘くなっていく。

    「%CALLNAME:MASTER%……あたい……ちょっとだけ……甘えてもいい……？」

    珍しく素直な言葉が、氷の妖精の口から零れ落ちた。
