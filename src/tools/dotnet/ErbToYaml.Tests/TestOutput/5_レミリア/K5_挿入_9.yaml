- id: fallback
  content: >-
    「……後ろだと？ 随分と図々しい要求ね」

    %CALLNAME:人物_レミリア%は冷たい視線で%CALLNAME:MASTER%を睨んだ。

    「ふん……まあいいわ。後悔するのはあなたよ」

    %CALLNAME:MASTER%が後ろに挿入すると、%CALLNAME:人物_レミリア%は表情を歪めた。

    「っ……痛……っ、下手くそね……」

    %CALLNAME:人物_レミリア%は苛立たしげに%CALLNAME:MASTER%を睨んだ。

    「……こんな痛いだけの行為、何がいいのかしら」

    紅魔館の主は、高慢な態度を崩さなかった。

    「……使用人が主のそこを欲しがるとは、身の程知らずね」

    %CALLNAME:人物_レミリア%は不敵に微笑みながら、%CALLNAME:MASTER%と向き合った。

    「いいわ、付き合ってあげる。感謝しなさい」

    %CALLNAME:MASTER%が挿入すると、%CALLNAME:人物_レミリア%は眉をひそめた。

    「……っ、痛い……もっと上手くできないの……？」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を鋭く睨んだ。

    「……こんな程度で私を悦ばせられると思うな」

    500年の吸血鬼は、痛みを怒りに変えていた。

    「……ほう、対面座位でアナル？ 変わった趣味ね」

    %CALLNAME:人物_レミリア%は興味なさそうに言い、%CALLNAME:MASTER%の膝に座った。

    「私の体を使えるだけ光栄に思いなさい」

    %CALLNAME:MASTER%がゆっくりと挿入すると、%CALLNAME:人物_レミリア%は息を詰めた。

    「……っ、くぅ……痛いじゃない……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の胸を押した。

    「……もっと丁寧にしなさい。私を誰だと思っているの」

    威厳を保ちながら、吸血鬼は不快感を露わにした。

    「……今日は気まぐれで付き合ってあげているのよ？」

    %CALLNAME:人物_レミリア%は高飛車に言い放ち、%CALLNAME:MASTER%と向かい合った。

    「……感謝しなさい」

    %CALLNAME:MASTER%が後ろに挿入すると、%CALLNAME:人物_レミリア%は声を漏らした。

    「っ……あぁ……痛……っ、下手ね……」

    %CALLNAME:人物_レミリア%は苛立ちを隠さずに%CALLNAME:MASTER%を見た。

    「……次はもっとましな技を見せなさい」

    紅魔館の主は、最後まで支配者の態度を崩さなかった。
