- id: fallback
  content: >-
    「ひゃんっ……そ、そこ……だめですわぁ……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%に敏感な場所を弄られ、甘い声を漏らしている。

    「あっ、んんっ……%CALLNAME:MASTER%ったら……いじわるですの……」

    悪魔の尻尾がびくびくと震え、%CALLNAME:人物_小悪魔%の感じている様が伝わってくる。

    「でも……もっと、してくださいな……」

    潤んだ瞳で見上げながら、%CALLNAME:人物_小悪魔%は甘えるようにそう囁いた。

    「やぁっ……あっ、あぁっ……！」

    %CALLNAME:MASTER%の指が%CALLNAME:人物_小悪魔%の最も敏感な場所を的確に刺激する。

    %CALLNAME:人物_小悪魔%は堪えきれずに身をよじった。

    「ふぁっ……%CALLNAME:MASTER%、上手……ですわ……」

    頬を紅潮させ、息を乱しながらも、%CALLNAME:人物_小悪魔%は嬉しそうに微笑んだ。

    「悪魔を……こんなに蕩けさせるなんて……罪深いですのよ……？」

    「んっ……あっ……だ、だめ、そこばっかり……」

    %CALLNAME:人物_小悪魔%は%CALLNAME:MASTER%の手から逃れようと身をくねらせる。

    しかしその動きは弱々しく、むしろ快感を貪っているようにも見えた。

    「あぁっ……気持ちいい……ですの……」

    %CALLNAME:人物_小悪魔%は抵抗を諦め、%CALLNAME:MASTER%の指に身を委ねている。

    「もう……%CALLNAME:MASTER%のせいで……変になっちゃいますわ……」

    「ひぁっ……！　そ、そんなに激しく……」

    %CALLNAME:MASTER%は容赦なく%CALLNAME:人物_小悪魔%の敏感な突起を刺激し続けた。

    「あっ、あっ、あっ……だめっ……おかしくなっちゃう……」

    %CALLNAME:人物_小悪魔%の小さな翼がぴくぴくと痙攣している。

    「で、でも……止めないで……くださいませ……」

    快楽に溺れながらも、%CALLNAME:人物_小悪魔%は縋るように%CALLNAME:MASTER%にしがみついた。
