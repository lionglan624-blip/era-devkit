- id: fallback
  content: >-
    「あ……んっ……ふぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に秘所を弄ばれ、甘い吐息を漏らしている。

    500年を生きた吸血鬼の身体は、驚くほど敏感だった。

    「……ん、ふ……貴方の指、上手くなったわね……」

    %CALLNAME:TARGET%は蕩けた表情で、%CALLNAME:MASTER%を見つめている。

    「……もっと、私を悦ばせなさい……永遠に……」

    %CALLNAME:TARGET%は熱い吐息とともに、%CALLNAME:MASTER%にしがみついた。

    「やっ……あ、んっ……そこ……」

    %CALLNAME:MASTER%の指が%CALLNAME:TARGET%の敏感な蕾を優しく撫でている。

    「……くっ、ふ……ぁ……」

    %CALLNAME:TARGET%は威厳を保とうとしながらも、快感に身悶えしている。

    「……ククク、貴方は私を堕とすのが上手いわね……」

    紅い瞳が潤み、%CALLNAME:TARGET%は甘えるように%CALLNAME:MASTER%の肩に顔を埋めた。

    「……もう少しだけ……このままでいさせて……」

    「ひ、ぁ……んんっ……！」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の愛撫に、小さく身体を震わせた。

    「……ふふ、貴方には敵わないわね……」

    500年の孤独を埋めるように、%CALLNAME:TARGET%は%CALLNAME:MASTER%に身を任せている。

    「私の弱点を知っているのは……貴方だけよ……」

    %CALLNAME:TARGET%は上気した頬で、恋人だけに見せる笑みを浮かべた。

    「あっ……ん、ふ……や、ぁ……」

    %CALLNAME:MASTER%の指先が%CALLNAME:TARGET%の秘所を弄び、甘い蜜を引き出している。

    「……っ……貴方、本当に……私を堕としたいのね……」

    %CALLNAME:TARGET%は潤んだ瞳で%CALLNAME:MASTER%を見上げた。

    「……いいわ、全部受け入れてあげる……永遠を感じなさい……」

    紅魔館の主は、愛する者にだけ見せる脆さを曝け出した。
