- id: talent_3_1
  content: >-
    「……っ……そこは……違うわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を受け入れながら、顔を真っ赤にしている。

    「……肛門で、なんて……本でしか読んだことが……」

    %CALLNAME:TARGET%は論理的に説明しようとして、言葉に詰まった。

    「……あっ……狭い……むきゅ……」

    異物感と羞恥に、%CALLNAME:TARGET%は目を閉じた。

    「んっ……ふ……痛い、わ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の動きに、体を強張らせている。

    「……本では、この行為は慣れが必要と書いてあったけれど……」

    %CALLNAME:TARGET%は平静を装おうとしているが、声が震えている。

    「……実際は、こんなに……頭が、真っ白になる……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみついた。

    「あ……やぁ……そんなに見ないで……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%と目が合い、慌てて目を閉じた。

    「……こんな恥ずかしい行為で、正面から見られるなんて……」

    %CALLNAME:TARGET%は知識として理解していたが、羞恥は想像以上だった。

    「……%CALLNAME:MASTER%、キスして……そうすれば、気が紛れるから……」

    照れ隠しのように、%CALLNAME:TARGET%は唇を求めた。

    「……ん……ぁ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に組み敷かれながら、静かに喘いでいる。

    「……肛門の感覚を分析しようとしたのだけれど……」

    %CALLNAME:TARGET%は自分の反応を理解しようとしている。

    「……無理ね。こんなに落ち着かないのは、初めて……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の首に腕を回し、身を委ねた。
