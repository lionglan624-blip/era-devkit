- id: fallback
  content: >-
    「……」

    %CALLNAME:TARGET%は無表情で%CALLNAME:MASTER%の上に位置を取った。

    「お客様のご要望ですから……お相手いたしますわ」

    瀟洒なメイドは感情を押し殺し、腰を進めた。

    「……入りましたわ」

    「……早く済ませますので、お待ちください」

    %CALLNAME:TARGET%の声は、事務的な冷たさを帯びていた。

    「……ふぅ……」

    %CALLNAME:TARGET%は小さく息を吐きながら、腰を動かしている。

    「正常位というのは……私が主導する形ですわね」

    「貴方の反応から何かを読み取ろうとしても……無駄ですわ」

    淡々と動きながら、%CALLNAME:TARGET%は表情を崩さない。

    「……感情移入などしませんわよ」

    完璧なメイドは、あくまでプロフェッショナルを貫いていた。

    「……これは仕事です」

    %CALLNAME:TARGET%は自分に言い聞かせるように呟いた。

    「お客様の相手をするのも、メイドの務め……」

    %CALLNAME:TARGET%は機械的に腰を動かしている。

    「……特に感想はありませんわ」

    「……終わりましたら、お知らせしますわ」

    冷静さを保ちながら、%CALLNAME:TARGET%は義務を果たしていた。

    「……貴方に感情を見せる必要はありませんわ」

    %CALLNAME:TARGET%は淡々と腰を動かしている。

    「こうして奉仕しても……動じませんわ」

    「瀟洒なメイドは……いかなる状況でも冷静ですの」

    %CALLNAME:MASTER%の反応にも、%CALLNAME:TARGET%は表情を変えない。

    「……もう少しで終わりますわ」

    完璧なメイドは、あくまで義務として相手をしていた。
