situation: K7_愛撫
entries:
- id: fallback
  content: >-
    「あっ……それ、ちっちゃいのにぶるぶるするやつ……ですよね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出した小さな道具を見て、頬を染めた。

    「あそこに……直接、被せるんですよね……恥ずかしい……でも、嬉しいの……」

    %CALLNAME:MASTER%が妖精の秘所を開くと、小さな蕾が露わになる。

    クリキャップが陰核に被せられた瞬間、%CALLNAME:TARGET%の体が大きく跳ねた。

    「ひゃぁっ……！　んっ、あっ……直接、当たって……すごいの……！」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%にしがみつきながら、直接的な快楽に翻弄されている。

    「んぅ……%CALLNAME:MASTER%、今日はあのキャップ……使ってくれるんですか……？」

    %CALLNAME:TARGET%は期待に満ちた瞳で、クリキャップを見つめた。

    「あれ……すごく恥ずかしいけど……%CALLNAME:MASTER%が付けてくれるなら……」

    妖精が自ら脚を開くと、%CALLNAME:MASTER%は小さな蕾にキャップを被せた。

    振動が始まった瞬間、%CALLNAME:TARGET%は甘い悲鳴を上げる。

    「あっ……んっ……！　ぴったり……くっついて……振動が……逃げられないの……」

    %CALLNAME:TARGET%は蕩けた表情で、陰核への直接刺激に身を委ねていた。

    「えへへ……あたし、あのキャップ……好きになっちゃったかも……」

    %CALLNAME:TARGET%は恥ずかしそうに呟きながら、自分から腰を浮かせた。

    クリキャップが蕾に密着すると、妖精の体が震え始める。

    「ふぁっ……んあっ……圧迫されながら、振動して……頭、真っ白になる……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕を掴み、快楽に耐えようとしている。

    「……%CALLNAME:MASTER%……あたし……%CALLNAME:MASTER%のこと……大好き……」

    途切れ途切れの告白が、妖精の唇から漏れた。

    「あっ……また、あれですか……嬉しいの……」

    %CALLNAME:TARGET%は無邪気に笑いながら、クリキャップを受け入れる体勢になった。

    「……んっ、被せて……%CALLNAME:MASTER%の手で……」

    キャップが蕾を覆い、振動が陰核を直接刺激し始める。

    「ひぁっ……！　やっ……あぁっ……一番敏感なところに……！」

    %CALLNAME:TARGET%は腰を小刻みに揺らしながら、逃げられない快楽を受け止めている。

    「……%CALLNAME:MASTER%のものだから……全部……受け止めるの……」
  priority: 4
- id: talent_3_1
  content: >-
    「え……そ、それ……小さいけど……何に使うんですか……？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が取り出したクリキャップを不思議そうに見つめた。

    「……えっ、あ、あそこに被せる……？　恥ずかしい……」

    キャップが蕾に密着した瞬間、妖精の体が強張った。

    「んっ……！　あっ、ぴったりくっついて……ひぁっ、振動してる……！」

    %CALLNAME:TARGET%は涙目になりながら、陰核への直接刺激に耐えていた。

    「……こ、こんなの……初めて……体が、変になっちゃう……」

    「あ、あの……その、キャップみたいなの……また使うんですか……」

    %CALLNAME:TARGET%は緊張した面持ちで、クリキャップを見つめている。

    「……%CALLNAME:MASTER%が、したいなら……あたし、我慢します……」

    キャップが蕾を覆うと、振動が陰核を直接攻め始めた。

    「ひゃあっ……！　んっ、やぁっ……逃げられない……直接、当たって……！」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕を掴み、必死に耐えている。

    「……%CALLNAME:MASTER%の前で……こんな声……恥ずかしい……」

    「ま、また……あれ、ですか……」

    %CALLNAME:TARGET%は恥ずかしそうに視線を逸らしながら、スカートを捲り上げた。

    クリキャップが蕾に被せられると、妖精は小さく身震いした。

    「んぅ……っ……あぁっ……ぴったり……吸い付いてる、みたいで……」

    振動が始まり、%CALLNAME:TARGET%の体がぴくぴくと反応する。

    「やっ……声、出ちゃう……一番敏感なところ……ずっと刺激されて……」

    妖精は片手で口を覆いながら、甘い喘ぎを堪えていた。

    「……こういうの、慣れないです……でも……」

    %CALLNAME:TARGET%は覚悟を決めたように目を閉じて、体を%CALLNAME:MASTER%に預けた。

    キャップが蕾を覆い、振動が陰核を直接刺激する。

    「ふぁっ……んっ……！　きゅんって、する……体の奥まで、響いて……」

    %CALLNAME:TARGET%は涙を浮かべながら、クリキャップの快楽に翻弄されている。

    「……%CALLNAME:MASTER%が……こうしたいなら……あたし、頑張る……」

    健気な言葉とともに、妖精は逃げられない快楽を受け入れた。
