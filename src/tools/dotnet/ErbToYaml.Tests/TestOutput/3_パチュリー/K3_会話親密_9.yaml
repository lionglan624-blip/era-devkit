- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%にキスをした。

    「んっ……ん、む……」

    %CALLNAME:人物_パチュリー%は驚きながらも、%CALLNAME:MASTER%の口付けを受け入れている。

    「ちゅ……れろ……ん……ぷはっ」

    %CALLNAME:人物_パチュリー%は頬をほんのり染め、本を胸元で抱きしめた。

    「……キスなんて、研究したことがなかったわ。心拍数が上がるの」

    「……もう一度、データを取らせてもらってもいいかしら」

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%の唇に触れると、彼女は小さく息を呑んだ。

    「ん……んちゅ……」

    %CALLNAME:人物_パチュリー%は控えめに%CALLNAME:MASTER%の口付けに応えている。

    「……ちゅ、ぷ……はぁ……」

    唇を離すと、%CALLNAME:人物_パチュリー%は上気した顔で%CALLNAME:MASTER%を見つめた。

    「……あなたといると、体温が上昇するの。これも魔法の一種かしら」

    %CALLNAME:人物_パチュリー%は照れを隠すように本で顔を扇いでいる。

    %CALLNAME:MASTER%は%CALLNAME:人物_パチュリー%に口付けた。

    「むっ……ん、んむ……」

    %CALLNAME:人物_パチュリー%は少し戸惑いながらも、目を閉じて受け入れた。

    しばらくして唇を離すと、%CALLNAME:人物_パチュリー%は長い息を吐いた。

    「……ふぅ……これが、キス……」

    「本で読んだのとは、全然違うわね。……悪くないわ」

    %CALLNAME:人物_パチュリー%は頬を染めながら、そう呟いた。

    %CALLNAME:MASTER%が%CALLNAME:人物_パチュリー%に顔を近づけると、

    %CALLNAME:人物_パチュリー%は戸惑いながらも逃げなかった。

    「んっ……ちゅ……む……」

    唇が触れ合うと、%CALLNAME:人物_パチュリー%の体が微かに震えた。

    「……ぷ、はぁ……」

    %CALLNAME:人物_パチュリー%は顔を赤くして視線を泳がせた。

    「キスというのは……こんなに、胸が高鳴るものなのね……」

    本を胸に抱えたまま、%CALLNAME:人物_パチュリー%はどこか嬉しそうに呟いた。
