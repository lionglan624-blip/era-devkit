character: レミリア
situation: K5_挿入
entries:
- id: fallback
  content: >-
    「ん……%CALLNAME:MASTER%、来なさい」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%を引き寄せ、脚を絡めた。

    正面から抱かれる体勢で、二人の視線が絡み合う。

    「こうして……顔を見ながらするのも、いいわね」

    %CALLNAME:MASTER%が腰を進めると、%CALLNAME:人物_レミリア%は甘い吐息を漏らした。

    「あっ……深い……%CALLNAME:MASTER%を、感じるわ……」

    500年の吸血鬼が、恋人の腕の中で蕩けていく。

    「ふふ……この体勢が好きなの？」

    %CALLNAME:人物_レミリア%は艶やかに微笑みながら、%CALLNAME:MASTER%の首に腕を回した。

    %CALLNAME:MASTER%が深く挿入すると、その小さな身体がびくりと震えた。

    「やぁっ……んん……もっと、奥まで……」

    %CALLNAME:人物_レミリア%は自ら腰を押し付けてきた。

    「%CALLNAME:MASTER%……私を、満たして……」

    紅魔館の主は、恋人だけに見せる無防備な姿を晒していた。

    「……%CALLNAME:MASTER%」

    %CALLNAME:人物_レミリア%は紅い瞳で%CALLNAME:MASTER%を見つめた。

    正面から結ばれる二人の間には、言葉以上のものが通っていた。

    「あ……っ、そこ……いいわ……」

    %CALLNAME:MASTER%の動きに合わせて、%CALLNAME:人物_レミリア%も腰を揺らす。

    「ずっと……こうしていたい……」

    永遠を生きる吸血鬼が、この一瞬の幸せを噛み締めていた。

    「んっ……あ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の肩にしがみついた。

    顔を見合わせる体勢で、吸血鬼の表情が蕩けていく。

    「こうして……%CALLNAME:MASTER%の顔を見ながら……」

    %CALLNAME:人物_レミリア%は恥ずかしそうに目を細めた。

    「……っ、恥ずかしいけど……嫌いじゃないわ」

    高貴な吸血鬼の頬は、紅く染まっていた。
  priority: 4
- id: talent_3_1
  content: >-
    「な……っ、正面からなんて……」

    %CALLNAME:人物_レミリア%は顔を背けようとした。

    しかし%CALLNAME:MASTER%に抱きしめられ、逃げ場がない。

    「あっ……顔、見ないでよ……」

    %CALLNAME:MASTER%が腰を動かすと、%CALLNAME:人物_レミリア%は小さく声を上げた。

    「んっ……べ、別に気持ちいいわけじゃ……あぁっ……」

    強がりとは裏腹に、その体は正直に反応していた。

    「ちょ……この体勢は恥ずかしいって言ってるでしょ……」

    %CALLNAME:人物_レミリア%は頬を染めながら抗議した。

    だが、%CALLNAME:MASTER%の動きを止めようとはしなかった。

    「っ……やぁ……顔を見られながらなんて……」

    %CALLNAME:人物_レミリア%は目を閉じ、快感を堪えた。

    「……ば、馬鹿……」

    罵りの言葉も、どこか甘い響きを帯びていた。

    「……ふん、こんな体勢で私を落とせると思って？」

    %CALLNAME:人物_レミリア%は強がってみせた。

    しかし%CALLNAME:MASTER%が深く突き入れると、

    「ひゃっ……あ、あぁ……っ」

    威厳のある態度は一瞬で崩れ去った。

    「……ず、ずるいわよ、%CALLNAME:MASTER%……」

    %CALLNAME:人物_レミリア%は恨めしそうに、しかし離れようとはしなかった。

    「顔、近すぎるわよ……」

    %CALLNAME:人物_レミリア%は照れ隠しに%CALLNAME:MASTER%を睨んだ。

    正面から結ばれた二人の距離は、互いの吐息を感じるほど近い。

    「んっ……あ……まったく……」

    %CALLNAME:MASTER%の律動に合わせ、%CALLNAME:人物_レミリア%も息を乱していく。

    「……今日だけよ、こんなの許すの……」

    そう言いながら、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%に身を委ねていた。
