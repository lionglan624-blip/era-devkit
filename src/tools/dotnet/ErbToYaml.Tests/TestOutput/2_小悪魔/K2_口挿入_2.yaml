    「ちゅぷ……んっ……%CALLNAME:MASTER%……見ないでください……」

    恥ずかしそうにしながらも、%CALLNAME:人物_小悪魔%は腰を動かし続けた。

    「……こういうの……悪魔として、どうなんでしょう……」
