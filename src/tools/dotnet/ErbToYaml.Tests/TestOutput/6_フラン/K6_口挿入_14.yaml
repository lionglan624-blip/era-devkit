character: フラン
situation: K6_口挿入
entries:
- id: fallback
  content: >-
    「%CALLNAME:MASTER%……後ろから、入れるね……」

    %CALLNAME:人物_フラン%は恋人の背後から、そっと腰を近づけた。

    細い腕で%CALLNAME:MASTER%の体を抱きしめる。壊さないように、でも離れないように。

    「んっ……入っていく……%CALLNAME:MASTER%の中、温かい……」

    %CALLNAME:人物_フラン%はゆっくりと腰を進めながら、恋人の背中に頬を寄せた。

    「こうしてると……%CALLNAME:MASTER%を独り占めしてる気分なのさ……」

    悪魔の妹は、恋人との一体感に幸せそうに微笑んでいた。

    「ねぇ……後ろからだと、%CALLNAME:MASTER%の背中に抱きつけるのさ……」

    %CALLNAME:人物_フラン%は嬉しそうに恋人の背中に体を密着させた。

    495年の孤独を超えて、ようやく得た愛しい存在への触れ合い。

    「んっ……はぁ……%CALLNAME:MASTER%のこと、全部感じたい……」

    %CALLNAME:人物_フラン%は腰を動かしながら、恋人の耳元で囁いた。

    「壊さないで愛せるの……それが、嬉しいのさ……」

    恋人の背中越しに伝わる鼓動が、%CALLNAME:人物_フラン%の心を満たしていた。

    「%CALLNAME:MASTER%……大好き……」

    %CALLNAME:人物_フラン%は恋人の背後から、愛情を込めて腰を動かした。

    紅い瞳は潤み、純粋な幸福に満ちている。

    「こうやって繋がってると……%CALLNAME:MASTER%と一つになれる気がするの……」

    %CALLNAME:人物_フラン%は恋人の肩に軽く口づけながら、奥まで届かせた。

    「私の全部……受け止めてね……？」

    悪魔の妹は、恋人への深い愛を腰の動きに込めていた。

    「ふふ……%CALLNAME:MASTER%の背中、温かいのさ……」

    %CALLNAME:人物_フラン%は恋人の体温を感じながら、腰を進めた。

    地下室の冷たさしか知らなかった少女にとって、この温もりは何よりの宝物。

    「んっ……あっ……もっと奥まで……届けたい……」

    %CALLNAME:人物_フラン%は恋人をしっかり抱きしめながら、腰を振った。

    「離れたくない……ずっと、こうしていたいのさ……」

    その言葉には、495年の孤独を超えた切実な願いが込められていた。
  priority: 4
- id: talent_3_1
  content: >-
    「%CALLNAME:MASTER%……後ろから、するね……？」

    %CALLNAME:人物_フラン%は頬を染めながら、恋する相手の背後に立った。

    自分が主導権を握ることへの興奮と恥じらいが入り混じる。

    「んっ……入っていく……%CALLNAME:MASTER%の中……」

    %CALLNAME:人物_フラン%はゆっくりと腰を進めた。

    「こうしてると……%CALLNAME:MASTER%が私だけのものって感じるのさ……」

    独占欲に駆られた少女は、嬉しそうに腰を動かした。

    「ふふ……%CALLNAME:MASTER%の背中、無防備だね……」

    %CALLNAME:人物_フラン%はいたずらっぽく笑いながら、恋する相手の背後についた。

    支配する側に立つことへの新鮮な喜びが湧き上がる。

    「私が動くと……%CALLNAME:MASTER%、どんな顔するのかな……？」

    %CALLNAME:人物_フラン%は好奇心に満ちた目で腰を振った。

    「もっと……私のこと、感じてよ……」

    恋慕の炎は、後ろからの体勢でさらに燃え上がっていた。

    「ねぇ……%CALLNAME:MASTER%、私以外にこうされたことある……？」

    %CALLNAME:人物_フラン%は嫉妬を滲ませながら問いかけた。

    恋する相手の過去を知りたい、でも知るのが怖い。

    「……ないなら、いいのさ……私が最初だと嬉しい……」

    %CALLNAME:人物_フラン%は安心したように腰を進めた。

    「%CALLNAME:MASTER%の中……私だけのものにしたいな……」

    独占欲に駆られた告白は、甘く危うかった。

    「%CALLNAME:MASTER%……私のこと、見えないでしょ……」

    %CALLNAME:人物_フラン%は後ろから囁きながら、腰を動かした。

    見えないからこそ、自分の表情を隠せることに安堵する。

    「でも私には……%CALLNAME:MASTER%の背中が見えるのさ……」

    %CALLNAME:人物_フラン%は恋する相手の反応を楽しみながら、腰を振った。

    「好き……今だけは、言えるのさ……」

    見られていないことで解放された本音が、ぽつりと漏れた。
  priority: 3
