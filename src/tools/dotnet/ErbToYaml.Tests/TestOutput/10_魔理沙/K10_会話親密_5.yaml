- id: talent_3_1
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%にそっとキスをした。

    「んっ……ちゅ、む……」

    %CALLNAME:TARGET%は目を閉じて、%CALLNAME:MASTER%の唇を受け入れている。

    「……ぷは……はぁ……」

    %CALLNAME:TARGET%は顔を真っ赤にして、熱い息を吐いた。

    「……キスなんて……し、しょうがないな、許してやるぜ……」

    「……ばか、嬉しいに決まってるだろ……」

    %CALLNAME:TARGET%は照れくさそうにそっぽを向いた。

    「……%CALLNAME:MASTER%？」

    %CALLNAME:MASTER%が近づいてくると、%CALLNAME:TARGET%は目を閉じた。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の唇にキスをした。

    「ん……ちゅ、ぷ……はぁ……」

    %CALLNAME:TARGET%は頬を赤く染めながら、逃げようとはしなかった。

    「……%CALLNAME:MASTER%といると……なんか、ドキドキするんだよな……」

    %CALLNAME:TARGET%は恥ずかしそうに視線を逸らした。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の頬に手を添え、キスをした。

    「んっ……む、ちゅ……」

    %CALLNAME:TARGET%は少し戸惑いながらも、%CALLNAME:MASTER%の唇に応えた。

    「……ぷはっ……あつい……」

    %CALLNAME:TARGET%は熱に浮かされたように呟いた。

    「……もっと……してくれてもいいんだぜ……？」

    小さな声で言ってから、%CALLNAME:TARGET%は慌てて視線を逸らした。

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の手を取り、引き寄せてキスをした。

    「んっ……ちゅ、む……れろ……」

    %CALLNAME:TARGET%は最初こそ戸惑っていたが、次第に身を委ねた。

    「……ぷはっ……はぁ、はぁ……」

    「……%CALLNAME:MASTER%、ずるいぜ……こんなの、逃げられないだろ……」

    %CALLNAME:TARGET%は上気した顔で、%CALLNAME:MASTER%を見つめている。

    「……また、してくれよな……約束だぜ」
