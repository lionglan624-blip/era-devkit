    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を観察しながら腰を動かしている。

    「……角度……速さ……圧力……変数が多いわ……」

    %CALLNAME:TARGET%は学者らしく分析していた。

    「……でも、私も……変な感じがするの……これは何かしら……」

