- id: fallback
  content: >-
    「……それは……バイブレーターかしら」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が持つバイブを、興味深そうに観察した。

    「振動による膣内刺激……医学的には興味深いわね」

    しかしいざ挿入されると、%CALLNAME:TARGET%の表情が一変した。

    「……っ!? こ、これは……想像以上……」

    %CALLNAME:TARGET%は冷静を装おうとするが、声が震えている。

    「……ん……」

    バイブの振動が膣内を刺激し、%CALLNAME:TARGET%は小さく息を漏らした。

    「……振動の周波数と……膣壁の反応……データとして……」

    %CALLNAME:TARGET%は分析しようとするが、快感が思考を邪魔している。

    「……むきゅ……これは……予想外ね……」

    %CALLNAME:TARGET%は困惑した表情で、%CALLNAME:MASTER%を睨んだ。

    「……ふぅん……」

    %CALLNAME:TARGET%はバイブの振動を受けながら、冷静を装っている。

    「……振動刺激による生理的反応……研究価値があるわね」

    しかし%CALLNAME:TARGET%の体は正直に反応し、時折びくりと震えていた。

    「……あなた……私で実験しているつもりかしら……」

    そう言いながらも、%CALLNAME:TARGET%はバイブを抜こうとはしなかった。

    「……」

    %CALLNAME:TARGET%は無言でバイブの刺激を受けている。

    膣内を満たす振動は、%CALLNAME:TARGET%の知識欲すら麻痺させていた。

    「……悪くない……わね……これは……」

    %CALLNAME:TARGET%はぼそりと呟いた。

    「……でも……調子に乗らないで……私は……研究を……」

    言い訳が途切れ、%CALLNAME:TARGET%の吐息だけが大図書館に響いていた。
