- id: fallback
  content: >-
    「……何をなさっているのですか」

    %CALLNAME:TARGET%は冷たい声で%CALLNAME:MASTER%に問いかけた。

    %CALLNAME:MASTER%の手は%CALLNAME:TARGET%の胸に触れようとしていた。

    「お客様であっても、無礼な振る舞いは許しませんわ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を払いのけた。

    「……次はありませんわよ」

    瀟洒なメイドの目は、冷ややかに光っている。

    「っ……失礼ですわね」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手を素早く払いのけた。

    「私の体に触れる権利が、貴方にあるとでも？」

    %CALLNAME:TARGET%は冷たい視線を%CALLNAME:MASTER%に向けている。

    「お嬢様にお仕えする身として、このような行為は看過できませんわ」

    %CALLNAME:TARGET%は毅然とした態度で言い放った。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%の手を払い、距離を取った。

    「お客様。紅魔館のメイドに手を出すのは、賢明ではありませんわ」

    %CALLNAME:TARGET%の声は静かだが、有無を言わせぬ威圧感がある。

    「……お嬢様のお怒りを買いたくなければ、お引き取りを」

    瀟洒なメイドは、完璧な作り笑いを浮かべていた。

    「……は？」

    %CALLNAME:TARGET%は信じられないものを見るような目で%CALLNAME:MASTER%を見た。

    「正気ですか？　紅魔館のメイド長の胸に触れようとは」

    %CALLNAME:TARGET%は冷ややかに笑った。

    「時を止めれば、貴方の首を刎ねることなど造作もないのですけれど」

    「……今回は見逃して差し上げますわ。二度目はありませんから」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を睨みつけた。
  priority: 1
