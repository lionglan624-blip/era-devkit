- id: fallback
  content: >-
    「……っ！」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の要求に凍りついた。

    「……そのようなところを触れと……」

    冷たい視線を%CALLNAME:MASTER%に向ける。

    %CALLNAME:TARGET%は嫌々ながらも指を伸ばした。

    「……ご命令であれば……従いますが……」

    %CALLNAME:TARGET%は嫌悪を隠しきれない様子で呟いた。

    「……これは屈辱ですわ……」

    %CALLNAME:TARGET%は感情を押し殺した表情で指を動かしている。

    「紅魔館のメイドともあろう者が……」

    %CALLNAME:TARGET%の指が、機械的に%CALLNAME:MASTER%の秘所を撫でた。

    「……早く済ませてくださいませ……」

    「私には仕事がありますので……」

    冷たい言葉だけが返ってきた。

    「……」

    %CALLNAME:TARGET%は無言で%CALLNAME:MASTER%への奉仕を続けている。

    その表情からは何も読み取れない。

    %CALLNAME:TARGET%の指が、淡々と動き続ける。

    「……満足されましたか」

    %CALLNAME:TARGET%は感情のない声で問いかけた。

    「お気が済みましたら……お知らせくださいませ」

    「……このようなことで満足なさるとは……」

    %CALLNAME:TARGET%は軽蔑するような視線を向けた。

    「品性を疑いますわ……」

    しかし、%CALLNAME:TARGET%の指は要求通りに動いていた。

    %CALLNAME:TARGET%の指が、%CALLNAME:MASTER%の秘所を形式的に愛撫する。

    「……これで……よろしいでしょう……」

    「……何でもありませんわ」
