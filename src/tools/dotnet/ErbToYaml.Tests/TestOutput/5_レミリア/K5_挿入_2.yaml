- id: talent_3_1
  content: >-
    「な……っ、後ろって……そんな恥ずかしいこと……」

    %CALLNAME:人物_レミリア%は顔を真っ赤にして抗議した。

    しかし%CALLNAME:MASTER%に押し倒され、逃げ場がない。

    「ちょ……っ、本当にするの……？」

    %CALLNAME:MASTER%が菊穴に亀頭を押し当てると、%CALLNAME:人物_レミリア%は息を呑んだ。

    「いっ……た……っ、きつい……馬鹿……」

    痛みと羞恥で涙目になりながらも、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%から離れようとしなかった。

    「後ろでって……あんた、変態じゃないの」

    %CALLNAME:人物_レミリア%は呆れたように言いながらも、体勢を整えた。

    正面から組み敷かれ、%CALLNAME:MASTER%が菊穴に挿入を試みる。

    「っ……やぁ……そこ、違うって……わかってるの……？」

    %CALLNAME:MASTER%がゆっくりと押し進むと、%CALLNAME:人物_レミリア%は声を殺した。

    「んっ……くぅ……べ、別に……悪くないけど……」

    素直になれないまま、%CALLNAME:人物_レミリア%は快感を受け入れていった。

    「……後ろ、なんて……信じられないわ」

    %CALLNAME:人物_レミリア%は恥ずかしそうに顔を背けた。

    %CALLNAME:MASTER%が菊穴にあてがうと、その締め付けは強い。

    「っ……入って……くる……」

    %CALLNAME:MASTER%が腰を進めると、%CALLNAME:人物_レミリア%は小さく悲鳴を上げた。

    「あぁ……っ、きつい……でも……嫌いじゃない、かも……」

    羞恥に染まりながらも、%CALLNAME:人物_レミリア%は本音を漏らした。

    「こ、こんなこと……普通じゃないでしょ……」

    %CALLNAME:人物_レミリア%はぶつぶつと文句を言った。

    しかし%CALLNAME:MASTER%を拒絶することはなく、身を委ねている。

    「……し、仕方ないわね。今日だけよ……」

    %CALLNAME:MASTER%が菊穴に挿入すると、その狭さが伝わってくる。

    「ひぁっ……あ、あぁ……っ、ばか……もっと、優しく……」

    強がりも、背徳の快感の前には無力だった。
