- id: fallback
  content: >-
    「……ビーズ……後ろに入れるのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%が手にしたアナルビーズを、淡々と見つめた。

    %CALLNAME:MASTER%が菊穴に最初の珠を押し当てると、%CALLNAME:TARGET%は小さく息を吐いた。

    「……一つ……また一つ……数えていくわ……」

    珠が一つ入る度に、%CALLNAME:TARGET%の体が微かに震える。

    「……%CALLNAME:MASTER%……あなたになら……全部……飲み込めるわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げ、静かな信頼の眼差しを向けた。

    「……んっ……珠が……」

    アナルビーズの珠が%CALLNAME:TARGET%の菊穴に次々と飲み込まれていく。

    「……腸内で……連なってる感覚……独特ね……」

    %CALLNAME:TARGET%は読みかけの魔導書から目を離し、%CALLNAME:MASTER%に身を寄せた。

    「……引き抜く時が……本番かしら……」

    %CALLNAME:TARGET%は小さく微笑み、%CALLNAME:MASTER%の手を握った。

    「……楽しみにしてるわ……」

    「……はぁ……全部……入ったわね……」

    %CALLNAME:TARGET%は腸内のアナルビーズの存在を感じ、深く息を吐いた。

    珠の一つ一つが腸壁を圧迫し、不思議な充足感を与えている。

    「……%CALLNAME:MASTER%……これを……引き抜いて……」

    %CALLNAME:TARGET%は珍しく%CALLNAME:MASTER%に催促した。

    「……あなたの手で……感じさせて……」

    その言葉は、普段の%CALLNAME:TARGET%からは想像できないほど甘かった。

    「……ん……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の腕の中で、アナルビーズの感触を受け止めている。

    「……珠の数……数えてみようかしら……」

    %CALLNAME:TARGET%は知識欲と快感の狭間で、微かに唇を緩めた。

    「……%CALLNAME:MASTER%……ゆっくり……抜いてね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に囁き、目を閉じた。

    「……あなたのペースに……委ねるわ……」
  priority: 4
- id: talent_3_1
  content: >-
    「……!? そ、それは……ビーズ……？」

    %CALLNAME:TARGET%はアナルビーズを見て、頬を染めた。

    「後ろに……一つずつ入れていくの……？」

    %CALLNAME:MASTER%が最初の珠を挿入すると、%CALLNAME:TARGET%は声を漏らした。

    「……ひぁ……入って……きた……」

    珠が一つ入る度に、%CALLNAME:TARGET%の体がびくりと跳ねる。

    「……%CALLNAME:MASTER%……見ないで……変な顔……してるから……」

    「……や……また……一つ……」

    アナルビーズが%CALLNAME:TARGET%の菊穴に次々と飲み込まれていく。

    「……む、むきゅ……腸の中……珠が……連なって……」

    %CALLNAME:TARGET%は本を握りしめ、快感に耐えている。

    「……引き抜く時……どうなるの……怖いわ……」

    %CALLNAME:TARGET%は不安と期待が入り混じった瞳で、%CALLNAME:MASTER%を見つめた。

    「……っ……全部……入った……」

    %CALLNAME:TARGET%は腸内の充満感に、深い息を吐いた。

    「……動くと……珠が……腸壁を……」

    %CALLNAME:TARGET%は僅かに腰を揺らし、その感触を確かめている。

    「……%CALLNAME:MASTER%……お願い……ゆっくり……抜いて……」

    %CALLNAME:TARGET%は恥ずかしそうに俯きながら、%CALLNAME:MASTER%に懇願した。

    「……ん……ぁ……珠が……」

    %CALLNAME:TARGET%はアナルビーズの感触に、言葉を失っていた。

    「……一つ一つが……腸壁を……押してる……」

    %CALLNAME:TARGET%の体が小刻みに震え、大図書館に甘い吐息が響いた。

    「……こんなの……本には……載ってなかった……」

    %CALLNAME:TARGET%は羞恥と快感に、顔を真っ赤に染めていた。
