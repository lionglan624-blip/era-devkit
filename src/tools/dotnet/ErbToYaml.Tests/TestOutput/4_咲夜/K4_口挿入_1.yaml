- id: fallback
  content: >-
    「……%CALLNAME:MASTER%……お口でお世話いたしますわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の前に跪き、一物を見つめた。

    「貴方の全てを……受け止めさせてくださいまし……」

    %CALLNAME:TARGET%は愛おしそうに口を開き、肉棒を頬張った。

    「んっ……ちゅる……熱い……ですわ……」

    舌を絡めながら、メイドは恋人のために奉仕を始めた。

    「もっと……奥まで……入れさせてくださいまし……」

    「……ふふ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の一物を頬張りながら微笑んだ。

    「ぢゅる……れろ……ん……貴方の味……」

    「こうして差し上げられることが……幸せですわ……」

    %CALLNAME:TARGET%は頭を前後に動かし、丁寧に奉仕していく。

    「んむ……ちゅぷ……もっと気持ちよく……」

    完璧なメイドの舌が、亀頭を愛おしそうに舐め上げた。

    「……%CALLNAME:MASTER%……私を見ていてくださいまし……」

    %CALLNAME:TARGET%は上目遣いで%CALLNAME:MASTER%を見つめながら咥えている。

    「れろ……ぢゅる……こうすると……気持ちいいですか……？」

    舌先で鈴口を刺激しながら、%CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を窺った。

    「ん……震えていますわね……可愛い……」

    %CALLNAME:TARGET%は頬を染めながら、さらに深く咥え込んだ。

    「全部……私のお口で……受け止めますわ……」

    「……んっ……%CALLNAME:MASTER%の……おいしい……」

    %CALLNAME:TARGET%は恍惚とした表情で一物をしゃぶっている。

    「ちゅる……ぢゅるるっ……もっと……」

    「貴方のここ……私だけのもの……ですわよね……？」

    %CALLNAME:TARGET%は独占欲を滲ませながら、激しく舌を動かした。

    「んむ……ぷはっ……愛していますわ……%CALLNAME:MASTER%……」

    恋人への愛情を込めて、%CALLNAME:TARGET%は奉仕を続けた。
