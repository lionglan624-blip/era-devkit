- id: fallback
  content: >-
    「……これを……私がするの……」

    %CALLNAME:TARGET%は興味深そうに%CALLNAME:MASTER%を見つめた。

    「……やってみるわ……研究として……」

    %CALLNAME:TARGET%は言い訳をしながら、おそるおそる腰を動かし始めた。

    「……ん……独特の感触ね……」

    学者として観察しながら、%CALLNAME:TARGET%は実験を続けていた。

    「……ふむ……こうすると反応が変わるのね……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の反応を観察しながら動いている。

    「……角度、深さ……変数が多いわ……」

    %CALLNAME:TARGET%は学者らしく分析していた。

    「……でも、なぜか胸が騒ぐの……これは何かしら……」

    自分の感情に戸惑いを覚えていた。

    「……あなたはこれで満足するの……？」

    %CALLNAME:TARGET%は疑問を口にしながら、腰を動かし続けている。

    「……不思議ね……私が主導権を握るなんて……」

    %CALLNAME:TARGET%は首を傾げた。

    「……まあ、あなたがそう望むなら……続けるわ」

    淡々と、しかし確実に動きは続いていた。

    「……」

    %CALLNAME:TARGET%は黙々と腰を動かしていた。

    「……腰が疲れてきたわ……体が弱いのだから、仕方ないでしょう」

    %CALLNAME:TARGET%は少し休みながら言った。

    「……でも、約束したから……最後まで続けるわ」

    そう言って、%CALLNAME:TARGET%は再び動き始めた。
