  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%の秘所にゆっくりと指を差し入れた。

    「んっ……あぁ……%CALLNAME:MASTER%の指、入ってきた……」

    %CALLNAME:TARGET%は甘い吐息を漏らしながら、%CALLNAME:MASTER%にしがみついている。

    「あたしの中……ぜんぶ、%CALLNAME:MASTER%に触ってほしいの……」

    妖精の小さな体が、幸せそうに震えていた。

    「えへへ……こうしてると……%CALLNAME:MASTER%と繋がってるみたいで……嬉しい……」

    「あっ……ん……指、奥まで……」

    %CALLNAME:TARGET%は潤んだ瞳で%CALLNAME:MASTER%を見上げている。

    %CALLNAME:MASTER%の指が膣内をかき回すたび、%CALLNAME:TARGET%は小さく声を上げた。

    「%CALLNAME:MASTER%……もっと……もっと触って……？」

    %CALLNAME:TARGET%は無邪気にねだるように、腰を揺らしている。

    「あたしの中、%CALLNAME:MASTER%のものにして……全部……」

    「やぁ……んっ……き、気持ちいいの……」

    %CALLNAME:TARGET%は恥ずかしそうに顔を赤らめながらも、幸せそうな表情を浮かべている。

    「%CALLNAME:MASTER%の指……あったかい……」

    %CALLNAME:TARGET%の膣壁が%CALLNAME:MASTER%の指を優しく締め付けてきた。

    「ねぇ……これ、好きって気持ちと同じ……？」

    妖精は不思議そうに、でも幸せそうに問いかけた。

    「ふぁ……あぁ……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の胸に顔を埋めながら、愛撫を受け入れている。

    「中……すごく……とろとろになっちゃう……」

    妖精の体は熱を帯び、蜜が%CALLNAME:MASTER%の指を濡らしている。

    「%CALLNAME:MASTER%と一緒だと……安心するの……」

    %CALLNAME:TARGET%は甘えるように、%CALLNAME:MASTER%の腕をぎゅっと抱きしめた。

    「大好き……%CALLNAME:MASTER%……だいすき……」
