character: チルノ
situation: K8_口挿入
entries:
- id: fallback
  content: >-
    「ふふん、今日はあたいが後ろからだからね！」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の背中に覆いかぶさりながら、得意げに宣言した。

    四つんばいの恋人の後孔に自分のものを当てると、ゆっくりと腰を進めた。

    「んっ……%CALLNAME:MASTER%の中、あったかい……」

    %CALLNAME:人物_チルノ%は恋人の腰を掴んで、奥まで挿入した。

    「後ろからだと……%CALLNAME:MASTER%を独り占めしてるみたいでいいね」

    氷の妖精は恋人の背中に頬を寄せながら、幸せそうに微笑んだ。

    「%CALLNAME:MASTER%、あたいに任せて！　最強だから大丈夫！」

    %CALLNAME:人物_チルノ%は自信満々に恋人の背後に立った。

    後孔に自分のものを押し当て、ゆっくりと中に入っていく。

    「んふふ……こうやって後ろから抱きつくの……好き」

    %CALLNAME:人物_チルノ%は腰を動かしながら、恋人の背中に抱きついた。

    「%CALLNAME:MASTER%の声、もっと聞かせて？」

    氷の妖精は恋人の反応を楽しみながら、腰を揺らし続けた。

    「ねえ%CALLNAME:MASTER%、後ろから見る背中……綺麗だね」

    %CALLNAME:人物_チルノ%は恋人の背中を見つめながら、そっと腰を進めた。

    後孔に挿入すると、恋人の体温が自分の冷たい体に伝わってきた。

    「あ……奥まで入った……%CALLNAME:MASTER%の中、気持ちいい……」

    %CALLNAME:人物_チルノ%は恋人の耳元に顔を寄せて囁いた。

    「あたいだけのものって感じ……後ろから抱きしめられて嬉しい？」

    氷の妖精は恋人との繋がりを感じながら、満足げに腰を動かした。

    「えへへ、%CALLNAME:MASTER%を後ろから……なんか照れるね」

    %CALLNAME:人物_チルノ%は恥ずかしそうにしながらも、恋人の背後から抱きついた。

    後孔にゆっくりと挿入すると、恋人の体が少し強張った。

    「力抜いて……あたいが気持ちよくしてあげるから」

    %CALLNAME:人物_チルノ%は優しく囁きながら、腰を動かし始めた。

    「%CALLNAME:MASTER%のこと……後ろからでも愛してるよ」

    氷の妖精は恋人の背中に頬を寄せ、甘い吐息を漏らした。
  priority: 4
- id: talent_3_1
  content: >-
    「あ、あたいが後ろから……するの？」

    %CALLNAME:人物_チルノ%は顔を赤くしながら、%CALLNAME:MASTER%の背後に立った。

    後孔に自分のものを当てると、緊張で手が少し震えている。

    「んっ……入った……%CALLNAME:MASTER%の中、あったかい……」

    %CALLNAME:人物_チルノ%はゆっくりと腰を沈めた。

    「こうやって後ろから抱きつくと……なんか……ドキドキする」

    氷の妖精は好きな人の背中に顔を埋めた。

    「%CALLNAME:MASTER%……後ろ向いてて……恥ずかしいから……」

    %CALLNAME:人物_チルノ%は恥ずかしそうに呟いた。

    好きな人の後孔にゆっくりと挿入すると、甘い声が漏れた。

    「あっ……入った……%CALLNAME:MASTER%の体……あたいより温かい……」

    %CALLNAME:人物_チルノ%は腰を動かしながら、恋しそうに背中を見つめた。

    「好き……%CALLNAME:MASTER%のこと……後ろからでも伝わるかな……」

    氷の妖精の冷たい体が、好きな人の温もりで少し温まっていた。

    「後ろからだと……顔見えなくて……ちょっと寂しい」

    %CALLNAME:人物_チルノ%は%CALLNAME:MASTER%の背中を見つめながら呟いた。

    後孔に挿入しながら、恋人の腰にしがみついた。

    「でも……こうして繋がってるのは……嬉しい」

    %CALLNAME:人物_チルノ%はゆっくりと腰を揺らした。

    「%CALLNAME:MASTER%、気持ちいい……？　あたい、ちゃんとできてる……？」

    氷の妖精は不安げに好きな人の反応を窺った。

    「え、えっと……後ろから……こうすればいいの？」

    %CALLNAME:人物_チルノ%は戸惑いながら、%CALLNAME:MASTER%の後孔に自分のものを当てた。

    ゆっくりと腰を進めると、好きな人の体温が伝わってきた。

    「んっ……%CALLNAME:MASTER%の中……すごい……」

    %CALLNAME:人物_チルノ%は夢中で腰を動かし始めた。

    「後ろから抱きつくと……%CALLNAME:MASTER%の心臓の音、聞こえる……」

    氷の妖精は恋しそうに好きな人の背中に耳を当てた。
  priority: 3
