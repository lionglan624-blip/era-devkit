- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%、あたしの足で気持ちよくなってね？」

    %CALLNAME:TARGET%は嬉しそうに%CALLNAME:MASTER%の前に座り込んだ。

    小さな足を伸ばして、%CALLNAME:MASTER%のものを足裏で挟み込む。

    「んっ……こう？　あたしの足、柔らかい……？」

    %CALLNAME:TARGET%は一生懸命な顔で足を上下に動かしている。

    「あたし、%CALLNAME:MASTER%のこと大好きだから……いっぱいしてあげるの」

    妖精の小さな足が、懸命に%CALLNAME:MASTER%を擦り上げていく……

    「今日もあたしの足で、していい？」

    %CALLNAME:TARGET%は満面の笑みで%CALLNAME:MASTER%の股間に足を伸ばした。

    「むにゅ……んっ……挟まってる……ぷにぷにする……」

    %CALLNAME:TARGET%は慣れた様子で足を動かし始めた。

    「ふふっ……%CALLNAME:MASTER%の、あたしの足の間で元気になってる……」

    嬉しそうに%CALLNAME:TARGET%は足指を動かしている。

    「えへへ、いっぱい気持ちよくなってね……？」

    「%CALLNAME:MASTER%……あたし、もっと上手にしたいの……」

    %CALLNAME:TARGET%は真剣な表情で%CALLNAME:MASTER%の一物を足で挟んだ。

    「だから……いっぱい練習させてね？」

    小さな足裏が%CALLNAME:MASTER%のものを包み込み、ゆっくりと上下する。

    「んしょ……こう動かすと、気持ちいいって……」

    %CALLNAME:TARGET%は足指で先端をつつきながら、期待に満ちた目で見上げた。

    「……ね、あたし、ちゃんとできてる……？」

    「あ……%CALLNAME:MASTER%の、元気いっぱいだね……えへへ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の一物を愛おしそうに見つめた。

    「あたしの足で擦ると、もっと元気になるかな……？」

    %CALLNAME:TARGET%は嬉しそうに%CALLNAME:MASTER%の一物を足裏で挟んだ。

    「ふふっ……ぴくってした……かわいい」

    %CALLNAME:TARGET%はくすくす笑いながら、優しく足を動かしている。

    「%CALLNAME:MASTER%……大好き。あたしの足でいっぱい出していいよ……？」
