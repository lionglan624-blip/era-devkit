- id: fallback
  content: >-
    「……は？　何を言ってるんですか？」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の言葉に一瞬固まった。

    「自慰を見せろって……正気で言ってます？」

    %CALLNAME:人物_美鈴%は信じられないという顔で、%CALLNAME:MASTER%を睨んだ。

    「……お引き取りください。今すぐ」

    %CALLNAME:人物_美鈴%は冷たい声で、%CALLNAME:MASTER%を拒絶した。

    「……」

    %CALLNAME:人物_美鈴%は無言で%CALLNAME:MASTER%を見つめた。

    その目には、怒りと軽蔑が浮かんでいる。

    「%CALLNAME:MASTER%……あなた、頭おかしいんじゃないですか」

    %CALLNAME:人物_美鈴%は呆れたように首を振った。

    「門番として警告します。これ以上おかしなことを言うなら、力づくで追い出します」

    「ちょっと待ってください」

    %CALLNAME:人物_美鈴%は%CALLNAME:MASTER%の言葉を遮った。

    「今、何て言いました？　聞き間違いですよね？」

    %CALLNAME:人物_美鈴%は眉をひそめながら、%CALLNAME:MASTER%を見据えた。

    「……本気で言ってるなら、お嬢様に報告しますよ」

    %CALLNAME:人物_美鈴%は警告するように、低い声で告げた。

    「……」

    %CALLNAME:人物_美鈴%は黙って立ち上がった。

    「済みません、お嬢様〜」と心の中で謝りながら、門番は構えを取った。

    「%CALLNAME:MASTER%……今の発言、取り消す気はありますか」

    %CALLNAME:人物_美鈴%の目は真剣そのものだ。

    「取り消さないなら……私、本気で怒りますよ」
