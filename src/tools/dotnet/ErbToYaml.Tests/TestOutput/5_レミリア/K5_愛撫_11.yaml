- id: talent_3_1
  content: >-
    「……べ、別に吸いたいわけじゃないけど……」

    %CALLNAME:人物_レミリア%は顔を赤らめながら、%CALLNAME:MASTER%の胸元を見つめていた。

    「……吸血鬼としての本能よ。仕方ないでしょう」

    そう言い訳しながら、%CALLNAME:人物_レミリア%は乳首に唇をつけた。

    「んっ……ちゅっ……%CALLNAME:MASTER%、変な味……」

    顔を真っ赤にしながら、%CALLNAME:人物_レミリア%は乳首を吸い続けた。

    「……やめろって言わないのね……ば、馬鹿……」

    「……ふん、%CALLNAME:MASTER%から言い出したんだからね」

    %CALLNAME:人物_レミリア%は高飛車に言い放つと、%CALLNAME:MASTER%の胸に顔を寄せた。

    「私が吸ってあげるんだから、光栄に思いなさい」

    冷たい唇が乳首を含み、舌先でくすぐるように舐める。

    「んむっ……れろ……%CALLNAME:MASTER%、少しは感じてるの？」

    %CALLNAME:人物_レミリア%は恥ずかしそうに上目遣いで見た。

    「……特別よ。これは特別なの……」

    「……%CALLNAME:MASTER%、あなたって本当に……」

    %CALLNAME:人物_レミリア%は呆れたような表情を浮かべつつ、%CALLNAME:MASTER%の胸に手を伸ばした。

    「私に胸を吸わせるなんて……変わった趣味ね」

    しかし、その言葉とは裏腹に、%CALLNAME:人物_レミリア%の唇は乳首に吸い付いた。

    「んっ……ちゅぷっ……悪くないわね……」

    %CALLNAME:人物_レミリア%は快感に身を委ねるように乳首を舐めた。

    「……もう少しだけ……吸わせなさい……」

    「っ……そ、そんなに見つめないでよ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の視線から逃れるように胸に顔を埋めた。

    「私が吸いたいから吸うの……文句ある？」

    小さな口が乳首を含み、ちゅっちゅっと音を立てる。

    「……あぁ、もう……%CALLNAME:MASTER%のせいで……こんな気持ちになるなんて……」

    恥ずかしそうに乳首を舐めながら、%CALLNAME:人物_レミリア%は離れようとしなかった。

    高貴な吸血鬼は、自分の欲求に正直になれないでいた。
