- id: talent_3_1
  content: >-
    「ふぇ……おしりで、うえにのる……？　こんなの、はじめて……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の上に跨り、戸惑いながらもお尻を沈めていった。

