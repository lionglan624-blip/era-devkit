- id: talent_3_1
  content: >-
    「っ……そ、そこを……舐めるの……？」

    %CALLNAME:TARGET%は恥ずかしそうに%CALLNAME:MASTER%の後ろを見た。

    「……本では読んだことがあるけれど……実際にするのは……」

    %CALLNAME:TARGET%は顔を赤くしながら、おずおずと舌を伸ばした。

    「……む、むきゅ……こんな場所を……舐めるなんて……」

    知識と実体験の差異に、%CALLNAME:TARGET%は戸惑っていた。

    「……ん……こ、こうすればいいの……？」

    %CALLNAME:TARGET%はぎこちなく舌を動かしている。

    「……れろ……ちゅ……文献には、こうすると気持ち良いと……」

    %CALLNAME:TARGET%は知識を頼りに、舌の動きを工夫していた。

    「……どう……？　変じゃない……？」

    不安そうに%CALLNAME:MASTER%の顔を覗き込んだ。

    「……んっ……こんなこと……」

    %CALLNAME:TARGET%は羞恥に顔を染めながら、舌を動かし続けている。

    「……あなたのためなら……恥ずかしくない……わけないわ」

    %CALLNAME:TARGET%は正直に認めた。

    「……でも、続けるわ……あなたが望むなら……」

    恥ずかしさを堪えながらも、%CALLNAME:TARGET%は奉仕を続けた。

    「……%CALLNAME:MASTER%……見ないで……」

    %CALLNAME:TARGET%は視線を避けながら、舌を動かしていた。

    「……こんな姿……恥ずかしいのよ……」

    しかし、舌は止めようとしない。

    「……あなたを……気持ち良くしたいから……」

    小さな声で本音を漏らしながら、%CALLNAME:TARGET%は舌を動かし続けた。
