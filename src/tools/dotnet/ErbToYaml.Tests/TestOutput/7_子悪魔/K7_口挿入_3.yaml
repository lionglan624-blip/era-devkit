- id: fallback
  content: >-
    「えへへ……%CALLNAME:MASTER%、あたしのここで気持ちよくなってね？」

    %CALLNAME:TARGET%は嬉しそうに%CALLNAME:MASTER%の上に跨った。

    小さな体を密着させて、%CALLNAME:MASTER%のものを太ももで挟み込む。

    「んっ……こう？　あたしの足、柔らかい……？」

    %CALLNAME:TARGET%は一生懸命な顔で腰を前後に動かしている。

    「あたし、%CALLNAME:MASTER%のこと大好きだから……いっぱいしてあげるの」

    妖精の小さな太ももが、懸命に%CALLNAME:MASTER%を擦り上げていく……

    「今日もあたしの足で、していい？」

    %CALLNAME:TARGET%は満面の笑みで%CALLNAME:MASTER%の上に跨った。

    「むにゅ……んっ……挟まってる……」

    %CALLNAME:TARGET%は慣れた様子で腰を動かし始めた。

    「ふふっ……%CALLNAME:MASTER%の、あたしのおまたの中で元気になってる……」

    嬉しそうに%CALLNAME:TARGET%は腰を揺らしている。

    「えへへ、いっぱい気持ちよくなってね……？」

    「%CALLNAME:MASTER%……あたし、もっと上手にしたいの……」

    %CALLNAME:TARGET%は真剣な表情で%CALLNAME:MASTER%の上に跨った。

    「だから……いっぱい練習させてね？」

    小さな太ももが%CALLNAME:MASTER%のものを挟み込み、ゆっくりと前後に動く。

    「んしょ……こう動かすと、気持ちいいって……」

    %CALLNAME:TARGET%は腰を揺らしながら、期待に満ちた目で見上げた。

    「……ね、あたし、ちゃんとできてる……？」

    「あ……%CALLNAME:MASTER%の、元気いっぱいだね……えへへ」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の一物を愛おしそうに見つめた。

    「あたしのおまたで挟むと、もっと元気になるかな……？」

    %CALLNAME:TARGET%は嬉しそうに%CALLNAME:MASTER%の上に跨った。

    「ふふっ……ぴくってした……かわいい」

    %CALLNAME:TARGET%はくすくす笑いながら、優しく腰を動かしている。

    「%CALLNAME:MASTER%……大好き。あたしのおまたでいっぱい出していいよ……？」
