- id: fallback
  content: >-
    「っ！……何をするの？」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%に胸を触られて目を見開いた。

    「……いきなり触るなんて、無作法にも程があるわ。」

    %CALLNAME:TARGET%は腕を組んで胸を隠しながら、%CALLNAME:MASTER%を睨んでいる。

    「……まあ、今回だけは許してあげる。次はないと思いなさい。」

    「んっ……ちょ、ちょっと……」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の胸に手を伸ばした。

    「……随分と大胆ね。私を誰だと思っているの？」

    %CALLNAME:TARGET%は尊大な態度を崩さないが、頬がわずかに紅い。

    「……ふん、少しだけよ。調子に乗らないことね。」

    「やっ……！」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の手が胸に触れた瞬間、身を竦めた。

    「……予告もなしに触るなんて、子供のようね。」

    %CALLNAME:TARGET%は不満げに唇を尖らせている。

    「……でも、まあ……度胸だけは認めてあげるわ。」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の胸にそっと手を添えた。

    「……っ」

    %CALLNAME:TARGET%は一瞬身を固くしたが、すぐに力を抜いた。

    「……紅魔館の主に触れる勇気だけは認めてあげるわ。」

    %CALLNAME:TARGET%は高飛車に言いながらも、拒絶はしなかった。

    「……もう少し私を楽しませてから、出直しなさい。」
  priority: 2
- id: fallback
  content: >-
    %CALLNAME:MASTER%は%CALLNAME:TARGET%の胸に手を伸ばそうとした。

    「……止まりなさい。」

    %CALLNAME:TARGET%の紅い瞳が鋭く光った。

    「紅魔館の主に許しなく触れるなど……身の程知らずにも程があるわ。」

    「……まずは私を楽しませてごらんなさい。話はそれからよ。」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%の胸に触れようとした瞬間——

    「……無礼者ね。」

    %CALLNAME:TARGET%は指一本で%CALLNAME:MASTER%を押し留めた。

    「500年を生きる吸血鬼に触れる権利は、選ばれた者だけのものよ。」

    「……運命の糸が見えるようになったら、また来なさい。」

    %CALLNAME:MASTER%は%CALLNAME:TARGET%の胸に手を伸ばした。

    「……何のつもり？」

    %CALLNAME:TARGET%は冷たい瞳で%CALLNAME:MASTER%を見下ろした。

    「私は紅魔館の主よ。触れることを許す相手は自分で選ぶわ。」

    「……身の程を弁えなさい。貴方はまだその域に達していないのよ。」

    %CALLNAME:MASTER%が%CALLNAME:TARGET%に近づいた。

    「……ふふ、面白い人間ね。」

    %CALLNAME:TARGET%は扇子で%CALLNAME:MASTER%の手を押さえた。

    「私にそんなことを許されたいなら、もっと私を知りなさい。」

    紅魔館の主は優雅に微笑みながらも、明確に距離を取った。

    「……運命は、まだ貴方に微笑んでいないわ。」
  priority: 1
