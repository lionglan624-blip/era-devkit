entries:
- id: fallback
  content: >-
    %CALLNAME:MASTER%がマッサージャーを取り出すと、%CALLNAME:人物_レミリア%は艶やかに微笑んだ。

    「ふふ……また私を楽しませてくれるのね」

    振動が肌に触れ、%CALLNAME:人物_レミリア%の小さな身体がぴくりと震えた。

    「んっ……あぁ……いいわ、そこ……」

    紅い瞳を細め、吸血鬼は快感に身を委ねていく。

    「%CALLNAME:MASTER%……もっと、強くしてもいいのよ」

    恋人だけに見せる無防備な表情で、%CALLNAME:人物_レミリア%は甘く囁いた。

    「……ん、それは」

    %CALLNAME:人物_レミリア%はマッサージャーを見て、頬を染めた。

    「ふふ、%CALLNAME:MASTER%は私を甘やかすのが上手ね」

    振動が敏感な部分に触れると、吸血鬼は甘い声を漏らした。

    「あっ……やぁ……そんなに……んんっ……」

    %CALLNAME:人物_レミリア%は%CALLNAME:MASTER%にしがみつき、快楽に身を震わせた。

    「……%CALLNAME:MASTER%の前だと、カリスマも何もないわね……」

    恥ずかしそうに呟きながらも、その顔は幸せに満ちていた。

    %CALLNAME:MASTER%がマッサージャーのスイッチを入れると、低い振動音が部屋に響いた。

    「ククク……今夜は趣向を変えるのね」

    %CALLNAME:人物_レミリア%は余裕を見せていたが、振動が肌を這うと表情が変わった。

    「っ……あ、ぁ……これ、思ったより……」

    500年を生きた吸血鬼の身体が、機械の振動に翻弄されていく。

    「んっ……%CALLNAME:MASTER%……もう、止められないわ……」

    %CALLNAME:人物_レミリア%は潤んだ瞳で%CALLNAME:MASTER%を見上げ、身を預けた。

    「今夜は%CALLNAME:MASTER%に任せるわ」

    %CALLNAME:人物_レミリア%は自ら脚を開き、恋人を待った。

    マッサージャーの振動が最も敏感な場所に触れ、吸血鬼は声を抑えきれなかった。

    「ひぁっ……あぁ……そこ、そこよ……！」

    小さな身体が痙攣するように震え、%CALLNAME:人物_レミリア%は%CALLNAME:MASTER%の名を呼んだ。

    「%CALLNAME:MASTER%……好きよ……もう、離さないから……」

    永遠を生きる吸血鬼が、刹那の快楽に溺れていた。
