- id: fallback
  content: >-
    「……%CALLNAME:MASTER%、口で……してあげるわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の前に跪き、一物を見つめた。

    「……本で読んだ知識を、実践してみせるわ……」

    そう言って、%CALLNAME:TARGET%は一物を口に含んだ。

    「……んっ……ちゅ……れろ……」

    舌を這わせながら、%CALLNAME:TARGET%は丁寧に奉仕を始めた。

    「……あなたを気持ち良くできるなら……この研究も悪くないわ……」

    「……ん、ふ……あなたの、熱いわ……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%の一物を咥えながら呟いた。

    「……ちゅる……ん、む……こうすると、反応が良いのね……」

    %CALLNAME:TARGET%は学者らしく観察しながら、舌を動かしている。

    「……あなたの喜ぶ顔が見たいから……もう少し頑張るわ……」

    体が弱いながらも、愛する人のために%CALLNAME:TARGET%は奉仕を続けた。

    「……ぢゅる……ん……おいしい……」

    %CALLNAME:TARGET%は頬を染めながら、%CALLNAME:MASTER%の一物を舐めている。

    「……あなたの味……覚えたわ……」

    %CALLNAME:TARGET%は恥ずかしそうに言いながらも、口は離さなかった。

    「……もっと、奥まで……ん、く……」

    無理をしながらも、%CALLNAME:TARGET%は深く咥えようとした。

    「……%CALLNAME:MASTER%……」

    %CALLNAME:TARGET%は%CALLNAME:MASTER%を見上げながら、一物に舌を這わせた。

    「……こうして触れていると……あなたの体温が伝わってくるわ……」

    %CALLNAME:TARGET%は穏やかな表情で呟いた。

    「……れろ、ちゅ……私の口で、あなたを満たせるなら……」

    知識の魔女は、愛する人への奉仕に静かな喜びを感じていた。
